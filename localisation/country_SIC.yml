 ##initial government tree
 SIC_urgent_parish_meeting: "Перший Конклав Парафій 1007 року"
 SIC_urgent_parish_meeting_desc: "Хаос, що панував на Грифонському континенті протягом останніх 40 років, викликав страх і напругу, які нарешті досягли піку в Сікамеоні. Дві палати нашого законодавчого органу, Трибунал Міст і Парраторія, об'єдналися, щоб надати нашому раніше дуже децентралізованому уряду більше влади, ніж будь-коли. Як нам діяти далі?"
 SIC_midoria_plan: "План Мідорії"
 SIC_midoria_plan_desc: "Названий так через значну централізацію, яку він принесе, і підтриманий міськими трибунами, цей план, запропонований трибуном Мідорії Реміхе Плюмаром, передбачає безпрецедентне посилення центрального уряду, чого прагне ПСН-Р. Хоча це суперечить нашій національній традиції ставити особисту свободу понад усе, радикали стверджують, що лише надання такої влади принесе нам надію на виживання."
 SIC_epios_plan: "План Леве"
 SIC_epios_plan_desc: "Названий так через консервативний підхід до централізації, який підтримують поміркована ПСН-П та більшість парафій, цей план пропонує більш виважений підхід до посилення нашого центрального уряду, щоб запобігти потенційним зловживанням владою. Загальна слабкість уряду, як це передбачено у Федеральнії Хартії, дозволяє збалансувати владу між парафіями та столицею, і цей баланс можна підтримувати."
 SIC_aggressive_foreign_policy: "Курс на агресивну зовнішню політику"
 SIC_aggressive_foreign_policy_desc: "За Планом Мідорії агресивна, ініціативна зовнішня політика є життєво необхідною. Ми надто довго відсиджувались, лише реагуючи на події, замість того, щоб діяти першими на міжнародній арені."
 SIC_sweeping_power: "Розширення виконавчої влади"
 SIC_sweeping_power_desc: "Транспорт і зв'язок вже не ті, що були раніше. Завдяки телеграфам, телефонам і радіо ми більше не змушені покладатися на парафії у вирішенні багатьох питань. Це означає, що тепер можемо керувати країною значно ефективніше. Сильний центральний уряд у Мідорії є життєво важливим і цілком життєздатним у цю нову епоху."
 SIC_checks_balances: "Система стримувань і противаг"
 SIC_checks_balances_desc: "Завдяки створенню комплексної системи, де законодавчий орган, Дукс та федеральні суди зможуть нейтралізувати дії одне одного у разі зловживань, ми убезпечимо нашу державу від концентрації влади в одних руках. Водночас, безумовно корисні для всіх рішення завжди матимуть шлях до реалізації."
 SIC_defensive_foreign_policy: "Оборонна зовнішня політика"
 SIC_defensive_foreign_policy_desc: "Всупереч тому, що думають ПСН-Р, оборонна зовнішня політика все ще життєздатна. Ми повинні бути готовими та відкритими до зближення з націями, з якими раніше мали напружені стосунки, щоб заручитися союзниками, замість того, щоб брязкати зброєю та висувати вимоги."
 SIC_commander_in_chief: "Дукс, Головнокомандувач"
 SIC_commander_in_chief_desc: "Історично Дукс був майже церемоніальною посадовцем, виконуючи роль лише радника законодавчого органу, представника держави за кордоном та символічного верховного командувача ополчення. Його обов'язки мають бути розширені, щоб він став більш дієвою силою."
 SIC_separation_of_militias: "Розділення ополчення та центрального уряду"
 SIC_separation_of_militias_desc: "Парафіяльне ополчення завжди було суто місцевою інституцією. Хоча ми можемо запровадити суворіші стандарти та допомогти парафіям з фінансуванням і уніфікацією спорядження, ми не повинні втручатися в діяльність місцевих сил оборони, якщо ситуація не абсолютно вимагатиме цього."
 SIC_standing_national_guard: "Постійна Національна Гвардія"
 SIC_standing_national_guard_desc: "Хоча ми ніколи не були зовсім без національної армії, Національна Гвардія Сікамеону від самого заснування була невеликою силою, за винятком періоду імперського вторгнення 799 року. Закладення основи для більшої опори на наших професійних військових, а не на парафіяльне ополчення, буде життєво важливим у прийдешню епоху."
 SIC_integrate_militias: "Інтеграція парафіяльного ополчення"
 SIC_integrate_militias_desc: "Захист нашої нації завжди покладався на звичайного грифона, готового стати на оборону своєї домівки. Проте, попри всю їхню відвагу, опора на окремі ополчення в кожній парафії перетворює нашу оборону на дезорганізований хаос як у координації, так і в логістиці. Інтеграція їх у стандартизовану національну систему зробить ці сили оборони значно ефективнішими."
 SIC_federal_supremacy_clause: "Положення про федеральне верховенство"
 SIC_federal_supremacy_clause_desc: "Наш національний уряд завжди поступався парафіям у переважній більшості справ, кожну з яких трактували як рівноправну федеральному уряду. Встановивши центральний уряд як верховну владу, ми зможемо забезпечити набагато більшу послідовність та одноманітність у державних справах."
 SIC_rights_people_parishes: "Права народу та парафій"
 SIC_rights_people_parishes_desc: "Парафії та грифони, що живуть у кожній з них, мають фундаментальні права, які необхідно відстоювати, адже національний уряд отримує всю владу саме від них. Хоча федеральну діяльність можна оптимізувати для підвищення її ефективності, кожен грифон і кожна парафія все одно матимуть право голосу."
 SIC_strong_gov_strong_nation: "Сильний уряд — сильніша нація"
 SIC_strong_gov_strong_nation_desc: "Хоча думка кожної парафії та кожного грифона в них, як і завжди, цінуватиметься та братиметься до уваги, давно назріле встановлення швидкої та верховної влади в нашій республіці нарешті дозволить нам по-справжньому конкурувати з нашими сусідами і повністю розкрити потенціал нашої свободи."

 ##harmonic tree
 SIC_tradition_triumphs: "Традиція Перемагає!"
 SIC_tradition_triumphs_desc: "Помірковані знову тріумфували! Попри дедалі гучніші заклики радикалів, ми втримали владу у все більш важливому федеральному уряді, а чинний Дукс Алексіс знову обійняв цю посаду. Проте робота з об'єднання нашої нації проти зовнішніх загроз тільки починається. Поки Трибунал і Парраторія потопають у суперечках, ми мусимо нагадати їм, за що ми всі стоїмо."
 SIC_more_than_peasant_republic: "Більше, ніж селянська республіка"
 SIC_more_than_peasant_republic_desc: "Нації Західної Грифонії здавна зверхньо ставилися до нас через наші егалітарні принципи. І хоча ми з гордістю приймали звання "селянин", настав час показати їм, що ми – щось більше. Ми повинні знову згуртувати наш народ – радикалів, корсарів, кожного сікамеонського грифона – і довести, що ми – вісники демократії, і що з нами не варто жартувати."
 SIC_looking_outward: "Погляд назовні"
 SIC_looking_outward_desc: "Нарешті, коли внутрішня політика переважно налагоджена, ми можемо почати налагоджувати зв'язки з сусідами та активно діяти на міжнародній арені. Від цього залежить наш суверенітет."
 SIC_incorporating_the_radicals: "Залучення радикалів"
 SIC_incorporating_the_radicals_desc: "Попри їхню агресивну позицію, радикали все ж наші брати й сестри, і вони так само люблять свободу, як і ми. Їхня лють — це просто неприборкана любов до цих ідеалів та до нашої великої республіки, і її слід прийняти."
 SIC_unwavering_reason: "Непохитний розум"
 SIC_unwavering_reason_desc: "Найстійкіші грифони у наших лавах часто виступали за політику "непохитного розуму" щодо радикалів. За жодних обставин ми не повинні приймати їхні поспішні та безрозсудні ідеї. Вони навчаться розуміти й стануть спокійнішими."
 SIC_separation_of_church_state: "Відокремлення церкви від держави"
 SIC_separation_of_church_state_desc: "Хоча Сікеція й обдарувала нашу прекрасну республіку усіма своїми милостями, настав час для чіткого відокремлення Її храмів від уряду. Ми цінуємо Її слово, але врешті-решт, все залежить від волі народу."
 SIC_discrediting_privateers: "Дискредитація Вільних корсарів"
 SIC_discrediting_privateers_desc: "Вільні корсари мають зникнути. Хоча вони й ховаються за ширмою "благородних розбійників", дозволяти такому угрупованню розростатися лише поставить нас на шлях корупції. Ми повинні викрити їх і показати, ким вони є насправді."
 SIC_embracing_blue_grey: "Embracing the Blue and the Grey" # (!)
 SIC_embracing_blue_grey_desc: "Хоча Вільні корсари значною мірою є незаконним угрупованням з глибокими кримінальними зв'язками, вони все ще є важливою частиною сікамеонської історії та глибоко дбають про свою батьківщину. Можливо, їх можна узаконити та реформувати на щось краще."
 SIC_red_defense_ministry: "Червоне Міністерство оборони"
 SIC_red_defense_ministry_desc: "Як і слід було чекати, ми дійшли висновку, що найкраще місце для наших радикальних побратимів – у збройних силах федерації. Чимало наших найкращих офіцерів походять саме з їхніх лав, а їхня пристрасть забезпечить нам боєздатну та готову армію."
 SIC_ONI: "Управління військово-морської розвідки"
 SIC_ONI_desc: "Наші офіцери військово-морської розвідки виявили, що, здавалося б, безмежні контакти корсарів є неймовірно цінним джерелом інформації. Ми дійшли висновку, що для ефективного та непомітного використання цих злочинних зв'язків знадобиться ціле агентство, тому цим займатиметься нове Управління військово-морської розвідки."
 SIC_united_in_purpose: "Єднання в меті"
 SIC_united_in_purpose_desc: "Так чи інакше, ми подолали розбіжності між різними групами нашої федерації. Ми стоїмо пліч-о-пліч, об'єднані метою, щоб за будь-яку ціну захистити наші свободи та нашу республіку."
 SIC_national_philanthropy: "Національна Філантропія"
 SIC_national_philanthropy_desc: "У той час як купці західних грифонських націй здебільшого сидять на своїх грошах, обдумуючи лише як би їх примножити, купецький стан Сікамеону здавна дотримується традиції щедрої благодійності. У цю модерну епоху її слід розширити до філантропії: щоб усунути джерело проблем і розвивати нашу націю в цілому, а не лише полегшувати страждання."
 SIC_citizen_soldier: "Громадянин-воїн"
 SIC_citizen_soldier_desc: "Ідея громадянина-воїна — давня, сягає корінням ще Карфінської Імперії. Ми зберегли її до наших днів: якщо до цього дійде, кожен сікамеонський громадянин зобов’язаний захищати свою республіку. Водночас, потрібно цінувати кожну втрачену душу, зложену за батьківщину."
 SIC_welfare_worker: "Соціальне забезпечення для робітників"
 SIC_welfare_worker_desc: "Традиції економічної справедливості та пріоритету добробуту над багатством міцні в нашій нації. Проте навіть вони чутливі до жорстких коливань ринку. Створення належної системи соціального забезпечення на часи економічної рецесії має гарантувати добробут як нашого народу, так і нашої економіки."
 SIC_jojo_bizarre_adventure: "Химерна ситуація Джоджо"
 SIC_jojo_bizarre_adventure_desc: "Під час Війни між Вінґбардією та Фалькором виникла значна стурбованість щодо безпеки сікамеонських вод. Кульмінацією стала ситуація навколо крихітних островів Джоджо, які ми окупували, щоб захистити тамтешнє сікамеонське населення та підрізати крила Вінґбардії. Якщо ми хочемо успішно вести переговори з надзвичайно реваншистським Фалькором, можливо, нам доведеться взяти острови до уваги."
 SIC_appeasing_blackrock: "Умиротворення Королеви Бандитів"
 SIC_appeasing_blackrock_desc: "Ми спостерігали за хаосом за північними горами, у графстві Блекголлоу, та стали свідками жорстокості Блекрок. Деякі наші дипломати вважають, що конфлікту слід уникнути. Запропонувавши Королеві Бандитів розкішну оливкову гілку до того, як вона сама прийде по данину, ми зможемо завоювати її прихильність і використати її як перешкоду між нами та хаотичною Імперією."
 SIC_invade_blackhallow: "Restore Order to Blackhollow" # (!)
 SIC_invade_blackhallow_desc: "Ми спостерігали за хаосом за північними горами, у графстві Блекголлоу, та стали свідками жорстокості Блекрок. Деякі наші військові вважають, що протистояння буде неминучим, і це стане цінною нагодою випробувати міць нашої армії в наступі. Крім того, ми могли б використати цю територію для створення буферної зони або здобуття прихильності Грифонстоуна, щоб захиститись від Імперії."
 SIC_looking_further_outward: "Дивлячись далі"
 SIC_looking_further_outward_desc: "Наші найближчі сусіди більш-менш нейтралізовані силою зброї чи дипломатією, тож ми можемо почати дивитися далі, щоб підтримати ідеали, що співпадають з нашими."
 SIC_invade_cyanolisia: "Зробити те, чого не можуть мінотаври"
 SIC_invade_cyanolisia_desc: "Чомусь наші астеріонські друзі виявилися або надто млявими, або неспроможними повернути свої материкові території. Схоже, відновлення свободи та демократії для наших пригноблених братів-мінотаврів лягає на наші плечі."
 SIC_wingbardy_detente: "Вінґбардійська розрядка"
 SIC_wingbardy_detente_desc: "Хоча ми довгий час були побратимами під владою стародавньої Карфінської імперії, минулі тисячоліття розлучили нас із Вінґбардією: спочатку як економічних конкурентів у період конфедерації, а потім як військових суперників, коли вони перебували під кігтями Ґроверів. З розпадом Імперії, можливо, саме зараз настав час почати все наново з Перлиною Півдня."
 SIC_striped_slavers: "Удар по смугастим рабовласникам" #Фокус відсутній у грі?
 SIC_striped_slavers_desc: "Хоча зараз вони зустрічаються значно рідше, протягом століть зебринська колонія на північному сході здійснювала набіги на південне грифонське узбережжя і досі стоїть як нечестивий бастіон рабства. Хоча вони не є єдиними рабовласниками, що залишилися в Грифонії, знищити та навчити їх рівності значно допоможе покласти край цій огидній практиці."
 SIC_open_talon: "Відкритий пазур Грифусові"
 SIC_open_talon_desc: "Ми маємо досить тісні зв'язки з Грифусом: протягом років їхні міста були звичними портами для наших купців, і багато з них там оселилися. Вони поділяють нашу демократичну та децентралізовану форму правління, що розширює владу місцевих органів. Історично ми багато інвестували в їхній розвиток через ГКПК. У ці неспокійні часи нам варто прагнути тісніших зв'язків та працювати разом."
 SIC_modern_earthworks: "Дослідження сучасних фортифікацій"
 SIC_modern_earthworks_desc: "З появою механізованої війни більшість старих фортифікаційних споруд значною мірою застаріли. Навіть величні Снігові Вершини та хребет Арагно тепер мають менше значення. Нам потрібно запустити загальнонаціональний проєкт: дослідити, а потім збудувати модернізовані укріплення, щоб забезпечити надійну оборону федерації."
 SIC_skyfall_best_commodity: "Найбільший скарб Скайфоллу"
 SIC_skyfall_best_commodity_desc: "Завдяки надзвичайно вигідному розташуванню Скайфолла між найрозвиненішими націями світу, їхній ринок, природно, є найкращим місцем для купівлі технологій. Нам варто відновити наші старі торговельні зв'язки з містом і показати, що ми готові купувати. У Скайфоллі все має свою ціну."
 SIC_recognize_republic: "Визнання Республіки Грифонів"
 SIC_recognize_republic_desc: "Під час Республіканської Революції ми утримувалися від будь-яких офіційних заяв щодо Республіки, зосередившись на тихому виході з Імперії та допомозі союзникам в Астеріоні. Тепер, коли наша республіка розквітла й зміцніла, настав найкращий час для першої грифонської республіки підтримати наступну."
 SIC_eastern_investment: "Інвестиції в нашого східного близнюка"
 SIC_eastern_investment_desc: "Минуло надто багато часу відтоді, як ми втратили контроль над Грифуською Компанією Південного Континенту. Хоча компанія зараз здебільшого самодостатня, Грифус, ймовірно, отримував значно менше капіталу для розбудови своєї інфраструктури без нашої підтримки. Нам слід серйозно відновити ці зусилля."
 SIC_republic_attache: "Відправити військового аташе Республіці"
 SIC_republic_attache_desc: "Тепер, коли налагоджено нові, дружні стосунки з лідерами Республіки, ми нарешті можемо почати надсилати військову підтримку північній боротьбі. Хоча відправлення великих сил на далеку північ є неможливим, ми можемо відрядити контингент наших офіцерів. Вони надаватимуть поради щодо наших потенційно корисних тактик, а також перейматимуть досвід їхніх бойових дій."
 SIC_guarding_our_sister: "Захист нашої сестринської нації"
 SIC_guarding_our_sister_desc: "Ми більше не можемо стояти осторонь! Грифонію поглинув повний хаос завдяки амбіціям агресорів, і багато хто з них жадібно поглядає на нашу сестринську націю. Якщо грифонська демократія має й надалі процвітати на південному сході, ми мусимо взятися за зброю і захистити її всіма нашими силами."
 SIC_guardians_of_democracy: "Авангард демократії"
 SIC_guardians_of_democracy_desc: "Хоча відправляти повноцінну армію на північні війни непрактично, ми все ж зібрали добровольців — цілих три дивізії. Вони готові ризикувати життям за континентальну республіку. Бажаємо нашому авангарду, цим відважним синам і донькам, благословення Сікеції на полях битв морозної Півночі."

 ##syndie tree
 SIC_red_cascade: "Червоні Каскади!"
 SIC_red_cascade_desc: "Радикали нарешті перемогли! Ми остаточно подолали довготривалий поміркований статус-кво. Наш доблесний новий дукс Реміхе Плюмар, який тепер справедливо носить титул де Сікамеон, обійняв неймовірно важливу виконавчу посаду. Однак хвилі змін тільки починають здійматися. Ми ще мусимо здолати наших поміркованих суперників у Парраторії та Трибуналі, якщо хочемо запровадити справжній синдикалізм."
 SIC_handle_harmonists: "Як впоратися з поміркованими"
 SIC_handle_harmonists_desc: "Попри святкування нашої довгоочікуваної перемоги, на передній план вийшла нова дискусія. Помірковані, хоч і давні суперники, все ж лишаються нашими братами й сестрами. Але так чи інакше, ми мусимо переконати їх у наших методах... Ми зустрінемо їх з простягнутими пазурами, чи з кулаками?"
 SIC_penalize_harmonists: "Покарати поміркованих"
 SIC_penalize_harmonists_desc: "Ми будемо поводитись з нашими поміркованими суперниками так, як і завжди – агресивно та завзято! Хоча стримані члени нашої партії вважають це надто схожим на примус, врешті-решт, це для блага єдності."
 SIC_might_makes_right: "Сила творить право"
 SIC_might_makes_right_desc: "Один із наших ключових принципів, який помірковані завжди знаходять найогиднішим, полягає в наступному: ми віримо, що саме завдяки силі ми збережемо свободу. Тож саме через силу ми змусимо їх зрозуміти цю філософію."
 SIC_incentives_for_harmonists: "Стимули для поміркованих"
 SIC_incentives_for_harmonists_desc: "Можливо, найкращий спосіб схилити наших поміркованих колег на свій бік, особливо тих, хто ще вагається, — це показати, що ми діємо не лише вогнем і мечем. Ми готові піти на поступки, якщо це сприятиме єдності."
 SIC_reason_tempers_passion: "Розум вгамовує пристрасть"
 SIC_reason_tempers_passion_desc: "Як вода камінь точить, так розсудливість поміркованих стримує пристрасть радикалів. Хоча найзавзятіші з нас вважають такий компроміс зрадою наших принципів, лише разом ми зможемо зберегти нашу свободу."
 SIC_divine_issue: "Духовне питання"
 SIC_divine_issue_desc: "Грифони з нашої партії завжди були особливо відданими служителями Сікеції, і деякі екстремісти Її храмів довгий час були частиною нашого руху. Але тепер, коли ми нарешті здобули перемогу, наші розбіжності починають виявлятися. Чи ми підпорядкуємо храми собі, чи самі підкоримося храмам?"
 SIC_supreme_pontiff: "Дукс, Верховний Понтифік"
 SIC_supreme_pontiff_desc: "З моменту заснування федерації дукс виконував церемоніальну роль як Верховний Понтифік Її Храмів, однак ця посада мала мізерну владу. Це зміниться, оскільки ми переходимо до затвердження нашої влади над храмами – дукс матиме подібні повноваження, як і у виконавчому офісі."
 SIC_reorganize_church: "Реорганізація національних храмів"
 SIC_reorganize_church_desc: "Надто довго храми були значною мірою відокремлені від нашого уряду. Ми всі – Її раби, але національна важливість Її храмів надто велика, щоб дозволити їм діяти безконтрольно."
 SIC_pontificate_blessing: "Заробити благословення Її понтифіків"
 SIC_pontificate_blessing_desc: "Надто небезпечно втручатися в справи Її храмів, які з моменту заснування федерації були виразно аполітичними. Втручання в їхні справи може призвести до звинувачень у діях проти волі Сікеції. Безпечніше буде шукати благословення та підтримки Понтифікату."
 SIC_sycaecia_vanguard: "Вірний авангард Сікеції"
 SIC_sycaecia_vanguard_desc: "Ми доведемо всім нашим побратимам-грифонам, що ми є відданими служителями Сікеції. Навіть у наших агресивних діях та жорсткій політиці ми не посміємо кинути виклик Її слову чи слову Її понтифіків. Натомість, ми будемо боротися в Її ім'я та на Її честь!"
 SIC_patriotism_campaigns: "Патріотичні кампанії"
 SIC_patriotism_campaigns_desc: "Дух народу – головна опора будь-якої справжньої республіки. Ми повинні докласти значних зусиль, щоб підтримувати високий бойовий дух громадян і заробити їхню постійну підтримку."
 SIC_one_for_all: "'¡Uno para todos, todos para uno!'"
 SIC_one_for_all_desc: "Нарешті, ми досягнули справжньої єдності! Так чи інакше, ми згуртували всіх наших побратимів-грифонів навколо праведної справи, і тепер вірно служитимемо їм у відповідь. Один за всіх, і всі за одного!"
 SIC_codify_sicameonism: "Кодифікувати сікамеонський синдикалізм"
 SIC_codify_sicameonism_desc: "Століттями наші унікальні егалітарні та синдикалістські традиції залишалися лише традиціями. Їх немає ні у Федеральній Хартії, ні в міських чи парафіяльних правових документах; вони трималися лише на давній добрій волі. Сьогодні вони набудуть чинності закону!"
 SIC_officialize_the_syndicates: "Офіційно затвердити синдикати"
 SIC_officialize_the_syndicates_desc: "Як і наші традиції, синдикати, що мали різні назви — гільдії чи компанії, — здебільшого функціонували неофіційно. За нашої нової адміністрації вони стануть офіційними економічними суб'єктами з юридичними правами та повноваженнями."
 SIC_separate_syndicates: "Розділити синдикати та парафії"
 SIC_separate_syndicates_desc: "Синдикалізм, як і багато інших лівих ідеологій, у своїй найчистішій формі є економічною доктриною. Ми повинні відокремити синдикати від парафій, щоб синдикати могли більше зосередитися на економічних питаннях, а парафії виконували свої нинішні обов'язки без економічного тягаря."
 SIC_establish_fourth_branch: "Створити четверту гілку влади"
 SIC_establish_fourth_branch_desc: "Управління економікою такої розвиненої індустріалізованої нації, як наша, у дедалі більш глобалізованому світі — це майже непереборне завдання, і з часом воно лише ускладнюватиметься. Створення окремої четвертої гілки влади для синдикатів, яка б займалася нашими економічними справами, стане величезним кроком до збереження нашої бездоганної економічної ефективності."
 SIC_replace_parishes: "Замінити парафії"
 SIC_replace_parishes_desc: "Синдикалізм, як і багато інших лівих ідеологій, у своїй найчистішій формі є економічною доктриною. Отже, республіка повинна управлятися своєю основною економічною одиницею — синдикатом, а парафії слід скасувати. Трибунал буде збережено з огляду на економічну важливість міст."
 SIC_syndical_legislature: "Синдикальний Законодавчий Орган"
 SIC_syndical_legislature_desc: "Із заміною Парраторії на Асамблею Синдикатів ми створили справжню економічну демократію. Цим ми довели, що синдикалізм є життєздатною системою правління та успішною економічною моделлю."
 SIC_federal_syndicate: "Федеральний Синдикат втілений!"
 SIC_federal_syndicate_desc: "Наша давня мрія нарешті стала реальністю! Сікамеон стоїть як справжня синдикалістська федерація! Ми нарешті еволюціонували від нашої посередньої прото-ідеології до системи, створеної для нової промислової епохи. Нехай вона довго витримує випробування часом!"
 SIC_flush_out_rats: "Вигнати портових пацюків"
 SIC_flush_out_rats_desc: "Надто довго ми зволікали з викоріненням організованої злочинності на нашій землі. Це кидає тінь на нашу грізну репутацію, здобуту у боротьбі зі зловісними піратами та мерзенними розбійниками. Настав час зачистити цих так званих "вільних корсарів", наче стічних щурів, і замкнути за ґратами тих, хто найбільше завинив."
 SIC_hunting_the_swordfish: "Вистежити Мечорила"
 SIC_hunting_the_swordfish_desc: "Тепер, коли його командири схоплені, ми можемо почати полювання на очільника цих чортових "Вільних Корсарів", Дона "Меч-Рибу" Еспадарте. Він роками уникав правосуддя і саме завдяки йому корсари так швидко підім'яли під себе більшу частину злочинного світу Сікамеону. Настав час покінчити з ним та його бандою."
 SIC_bandit_queen: "Проклята бандитка за горами"
 SIC_bandit_queen_desc: "Потвора, що називає себе Блекрок, є втіленням усього, що ми зневажаємо найбільше: огидна розбійниця і дрібна, жадібна до влади тварюка, що прагне стати шляхетною. Ми принесемо закон і свободу в Блекголлоу!"
 SIC_striped_menace: "Смугаста загроза за морем"
 SIC_striped_menace_desc: "Століттями ці прокляті зебри-работорговці з південно-східного узбережжя Грифонії чинять нальоти на наші торгові шляхи, захоплюючи наші товари та, що найогидніше, забираючи наших моряків у рабство! Їхнє цілковите знищення давно назріло. Коли ми з ними покінчимо, там буде або чесна і справедлива демократична держава, або ж лише гора попелу!"
 SIC_resurgent_republic: "Відроджена республіка"
 SIC_resurgent_republic_desc: "На рубежі тисячоліть здавалося, що наш час слави добіжить кінця, що наша велич згасне, поки більш індустріалізовані та амбітні країни Грифонії виривалися вперед. Але ці страхи розвіяні! Ми єдині й готові зробити все можливе, щоб зберегти нашу велику федерацію!"
 SIC_reservists_to_soldiers: "Кадрові солдати замість резервістів"
 SIC_reservists_to_soldiers_desc: "Завжди служба солдата була для нас переважно тимчасовим заняттям, доповненням до цивільного життя. Хоча в минулому цього було достатньо, у сучасному світі це породжує не найкращих воїнів. Ми повинні створити професійну армію, яка стане повноцінним джерелом доходу для грифонів, щоб наші лави поповнили кадрові солдати — грифони, чиє єдине покликання полягає у захисті своєї республіки."
 SIC_establish_republican_guards: "Заснувати Республіканську Гвардію"
 SIC_establish_republican_guards_desc: "Навіть після відокремлення професійних військ від тимчасових ополчень, потрібна ще одна важлива реформа. Ми відберемо цвіт нашої нації, 'la flor y nata' — або, як сказали б аквілейці, 'crème de la crème' — і сформуємо елітну Республіканську Гвардію."
 SIC_valentin_prodegies: "Валентинові учні" ##Glacialez
 SIC_valentin_prodegies_desc: "Валентин Гласіалес, безумовно, є нашим найкращим генералом останнього часу. Він воював у північних республіканських революціях, зумів повернутися додому живим і з величезним досвідом. Проте він відчуває, що старіє, і тому передав свою важко зароблену мудрість найближчим офіцерам."
 SIC_peasant_frugality: "Селянська бережливість"
 SIC_peasant_frugality_desc: "Для Західної Грифонії, які вони б заздрісно відзначали у селян, але одна характеризує нас дуже влучно: велика ефективність і кмітливість у використанні малих ресурсів, або просто ощадливість. Завдяки кільком простим політичним крокам та закликам до нашого патріотичного обов'язку, ми здатні піднести цю ефективність до небачених висот на благо нашої економіки."
 SIC_national_syndiate: "Національний синдикат"
 SIC_national_syndiate_desc: "Для уряду, покликаного бути власністю народу та його синдикатів, ідея націоналізації підприємств чи ресурсів є неприпустимою. Однак такі кроки необхідні задля підготовки до війни. І це можна зробити, залишаючись вірними нашим принципам, шляхом створення національного синдикату державних службовців."
 SIC_free_industrial_might: "Тріумф вільної промисловості"
 SIC_free_industrial_might_desc: "З повним дозріванням та втіленням синдикалізму в нашій великій республіці, ми піднялися на такі економічні та промислові вершини, що легко зрівнялися або й перевершили наших сусідів. Ми працюємо з ефективністю, про яку капіталістичні чи соціалістичні системи можуть лише мріяти."
 SIC_beyond_snowtops: "За Сніговерхів'ями"
 SIC_beyond_snowtops_desc: "Наша федерація нарешті об'єднана під червоним стягом. Ми нарешті можемо розкрити весь потенціал нашої великої республіки і спрямувати нашу увагу за Сніговерхів'я. Наші друзі вітатимуть нас, а вороги впадуть на коліна!"
 SIC_bring_down_falcon: "Зрізати крила Соколові"
 SIC_bring_down_falcon_desc: "Слабкий, але водночас запекло реваншистський Фалькор довгий час був нашою великою проблемою, висуваючи претензії на острови Фалькор та місто Судфолк, які по праву належать Сікамеону! Ми заберемо і те й інше, а решту їхньої території – як здобич!"
 SIC_comrades_in_wingbardy: "Товариші у Вінґбардії"
 SIC_comrades_in_wingbardy_desc: "Ліві у Вінгбарді здавна надихалися нашими національними традиціями та звичаями. Тепер настав сприятливий момент, щоб нарешті відкрито протягнути їм лапу допомоги. Нехай вони остаточно повалять свою монархію, якщо це велике завдання ще не виконано!"
 SIC_wash_out_blackhollow: "Очистити Блекголлоу"
 SIC_wash_out_blackhollow_desc: "Навіть без тієї паскуди Блекрок, що збурювала графство Блекголлоу і штурхає наші кордони, наче голодний лев, графиня Блекголлоу все одно лишається потенційною загрозою. А половина території, що належить колисці грифонської цивілізації, Ґрифонстоуну, просто проситься до рук. Навіть якщо їхні комуністи прийдуть до влади, це навіжені безумці, що є скоріше тягарем, ніж можливим союзником."
 SIC_cyan_issue: "Ціанова проблема"
 SIC_cyan_issue_desc: "Якимось чином, це неприродне утворення — Графство Ціанолізія — продовжує існувати, попри всі зусилля астеріонців. Настав час покласти край останнім пережиткам старого імперського правління на півдні, вирішивши питання химерного існування Ціанолізії!"
 SIC_reconciling_MIT: "Примирення з биком"
 SIC_reconciling_MIT_desc: "Попри кардинальні зміни, що відбулися в нашій федерації, ми продовжуємо високо цінувати дружбу з Астеріонцями, які сотні років тому навчили нас демократії. Однак чимало з них розцінюють наші стрімкі перетворення як загрозу і стали в оборонну позу. Чи зможемо ми відродити нашу споконвічну дружбу, чи нам судилося битися з нашим другом і наставником?"
 SIC_tutor_gryphus: "Tutoring Our Young Twin" # (!)
 SIC_tutor_gryphus_desc: "З моменту заснування Грифуської Компанієї Південного Континенту ми з великим інтересом спостерігали за розвитком Вільних Міст, вбачаючи в них практично молодшого близнюка. Але в цю нову, хаотичну епоху ми боїмося, що вони можуть збитися зі шляху. Як порядний старший брат, ми зобов'язані взяти їх під своє крило, навчити правильності, а якщо відмовляться — дисциплінувати."
 SIC_prywhen_debate: "Прайвенська проблема"
 SIC_prywhen_debate_desc: "Зі зростанням Прайвена після їхньої кривавої революції та утвердженням марксизму в Грифонії, у нас виникла жвава дискусія щодо догматів комунізму порівняно з нашим національним синдикалізмом. Безперечно, вони схожі, але не менш безперечно, що дебати між двома агресивними та войовничими націями слід проводити з чуйністю. Ми повинні підійти до Прявена мирно та виважено у цьому питанні."
 SIC_look_out_guard: "'¡Atención, Guardia, aquí vienen los campesinos!'" ##note that the 'Old Sicameonese' is in modern Portuguese because Portuguese is more similar to Old Spanish than modern Spanish is.
 SIC_look_out_guard_desc: "Під час переломної Першої битви на річці Кеовен у 773 році, коли славетні сапададори і ополченці йшли в контратаку, вони вигукували старосікамеонською, 'Cuidado, guarda, lá vem os camponeses!' (Бережись, варта, йдуть селяни!). І коли ми нарешті візьмемо штурмом оплот монархізму — Грифонстоун, ми знову прокричимо: '¡Atención, guardia, aquí vienen los campesinos!'"
 ##pirate tree
 SIC_winning_rigged_lottery: "Немов виграти шахрайську лотерею"
 SIC_winning_rigged_lottery_desc: "Цих "Довірених Сімсот" було підкупити набагато простіше, ніж ми думали! З нашою новою "більшістю" ми тепер міцно тримаємо в пазурах і трибунів, і парраторів. Отже, до роботи — втілювати наші плани для Сікамеону!"
 SIC_the_suit: "Костюм"
 SIC_the_suit_desc: "Навіщо нам діяти відкрито й жорстоко? Ми можемо приховати нашу діяльність, зберігаючи респектабельний вигляд. Маска та смугаста сорочка зачекають. Зараз час діставати костюм з краваткою для зустрічей і сідати за відполірований стіл."
 SIC_kelp_forest: "Наче ламінарія..." ##kelp grows and spreads very quickly
 SIC_kelp_forest_desc: "Тепер, коли ми маємо контроль, ми можемо заплющити очі на власну діяльність по всій Федерації. Мов зарості ламінарії, ми розростемося всюди. Мідорія, Керускос – ніщо не втече від наших пазурів. Навіть бізнес, який вони вважають законним, стане прикриттям для наших справжніх операцій."
 SIC_rotting_grassroots: "Вирвати корені"
 SIC_rotting_grassroots_desc: "Помірковані та Радикали досі мають власні значні організації у містах та парафіях. Але так само, як ми задушили інші банди, вони також поступляться нам. Вулиці будуть встелені їхніми паперами, а їхні члени розбіжаться."
 SIC_wine_and_dine: "Банкети містам"
 SIC_wine_and_dine_desc: "Є грифони, хоч дехто й не повірить, які слабкі до золота, а ще більше – коли їх споїти до нестями. Саме таких грифонів, здатних допомогти нашій організації, потрібно залучати до співпраці та змушувати працювати на нас, щоб будь-які "скарги", які можуть виникнути, були... "влагоджені""
 SIC_fishy_business: "Сприяти тіньовому бізнесу"
 SIC_fishy_business_desc: "З усіх боків чорний ринок вирує. Золото, контрабанда, живий і мертвий товар переміщуються непомітно як через нашу територію, так і повз неї. Нам варто створити безпечні зони, щоб ці ринки процвітали. Вони отримають центральний вузол для торгівлі, де будуть захищені від будь-яких небажаних органів влади, що могли б вважати це неправильним. А ми  отримаємо солідний відсоток з усіх здійснених угод."
 SIC_red_tide: "Червоний приплив" #this is not a communist saying, a 'red tide' is the old name for an overgrowth of algae, which colors the tide whatever the algae is, originally red. This algae can be literally suffocating to life because of how much there is, and toxic to boot. ##Цікаво
 SIC_red_tide_desc: "Подібно до морських водоростей, наш вплив розростається повсюди. У кожній діяльності, від торгівлі зброєю на острові Скарлет та фальшивомонетництва на островах Джоджо, до піратства та розбою по всій Південній Грифонії, ми маємо свою частку. Кожна пральня і пекарня в Мідорії, кожна томатна плантація і морквяна ферма за межами Керускоса сплачують данину або ж повністю нам належать."
 SIC_foreign_ventures: "Погляд на закордонні 'можливості'"
 SIC_foreign_ventures_desc: "Зрештою, Сікамеон не бездонний. Завдяки нашим зв'язкам на чорному ринку та непохитному контролю над країною, нам слід почати озиратися на інших однодумців, які могли б зацікавитися партнерством з нами. Це може принести ще більші прибутки, ніж наші власні справи."
 SIC_romance_blackrock: "Залицяння до Білої Троянди Блекголлоу"
 SIC_romance_blackrock_desc: "Є така собі Біла Троянда Блекголлоу. Самотня... і готова до залицянь. Та досі вона відкидала всіх кавалерів. Що ж, вона ще не знайома з Доном Еспадарте та його легендарною харизмою, яка підкорить навіть найкрижанішу Троянду світу."
 SIC_zeeb_amnesty: "Поневолити колишніх рабів"
 SIC_zeeb_amnesty_desc: "Вільна Держава Каза тривалий час була притулком для тих, хто тікав від рабства та гноблення. Тепер вона наповнена такими людьми до краю. Проте країна невелика і слабка, легка здобич для нашого флоту та армії. Якби ми захопили Казу, то могли б здобути сотні тисяч рабів! Чого ми зволікаємо?"
 SIC_form_oligarquia: "Створення Олігархії"
 SIC_form_oligarquia_desc: "Завдяки міцним позиціям наших... організацій, ми можемо об'єднатися для створення чогось грандіознішого. Хоча Олігархія ніколи не базуватиметься на звичайній довірі (ніхто з наших соратників, та й ми самі, не настільки наївні), ми можемо побудувати її на повазі один до одного. І на страху."
 SIC_oil_slick: "Наче нафтова пляма..."
 SIC_oil_slick_desc: "Йдемо ми, бандити, корсари та работорговці, мов нафтова пляма по воді. Ніхто не втече від нас, і, як риба в океані, кожен носитиме наш знак. Де б вони не були, ми або наші партнери матимемо свого спільника в кожному містечку, а гроші будуть втиснуті в кожну лапу, копито чи дзьоб."
 SIC_the_scoundrel: "Лиходій"
 SIC_the_scoundrel_desc: "Ми перемогли. Настав час показати, чого ми варті. Кожен грифон, що нас підтримає, отримає винагороду. А кожен, хто був проти, проклинатиме той день, коли зробив такий вибір. Ті, хто лишався осторонь і не ділився, спізнають наш гнів. А ті, хто ділиться, звісно, будуть щедро обдаровані. Інакше буде зле."
 SIC_not_never_do_well: "Не кожен розбійник — злочинець"
 SIC_not_never_do_well_desc: "Не всі лиходії, попри поширену думку, є втіленням зла. Ми чудово розуміємо, що народ може повалити нас, якщо ми зайдемо надто далеко. Тож, пам'ятаймо старе правило: 'Хліба і видовищ' — усім!"
 SIC_blood_for_angry: "Кров гнівливим"
 SIC_blood_for_angry_desc: "По вулицях сновигають грифони, що нищать і підривають порядок. Водночас, узбережжя Південної Грифонії манить багатствами. Ми дамо цим бандитам нову мету в житті, аби вони перестали створювати проблеми, і при цьому збагатимося самі."
 SIC_charity_for_needy: "Допомога нужденним"
 SIC_charity_for_needy_desc: "Незважаючи на думки так званих поміркованих та радикалів, чимало грифонів досі живуть у злиднях. Ми надамо їм нашу допомогу, щоб вони сприймали нас як визволителів та захисників, а не як злочинців та негідників. Їжа і гроші мають вагу. А наша сила — ще більшу."
 SIC_protection_for_skeptic: "Опіка скептичним"
 SIC_protection_for_skeptic_desc: "Деякі грифони у федерації досі сумніваються, що ми, Вільні Корсари, здатні захистити їх від відвертих злочинів та всякого наброду. Ми доведемо їм, що піклуємося про людей не менше, ніж радикали чи помірковані. А всі звинувачення, нібито ми стоїмо за цими ж злочинними діяннями, — вигадки та наклеп."
 SIC_pinstripe_suit: "Смугастий костюм не завжди чорно-білий"
 SIC_pinstripe_suit_desc: "Не все у світі є чорно-білим. Існують і сірі зони. Одна з них – це напівлегальна ринкова економіка, яка процвітає під нашим дзьобом. Комісія знає про неї і готує плани, як взяти чорний ринок під наш повний контроль. Звісно, для тих, хто ним заправляє, він не буде безкоштовним. Ми забезпечуємо протекцію, а такий вид захисту має свою ціну. Все має свою ціну."
 SIC_not_king_but_ace: "Не Король, а Туз"
 SIC_not_king_but_ace_desc: "Короля серед нас не буде, лише Тузи — найкращі з-поміж усіх. Ніхто тут не носить корони, і грифон буде обраний з нашого кола. Звісно, Мечорил залишиться, оскільки він, безумовно, найбільш компетентний."
 SIC_align_other_bandits: "Переконати наших 'друзів'"
 SIC_align_other_bandits_desc: "Нам не завжди потрібно діяти офіційно. Ми усвідомлюємо, що за межами наших кордонів чекає багатство, і його варто перерозподілити нашим бідним, аби воно служило на благо всім, а не лише якомусь лорду в його високому замку. Звісно, є ті, кого нам доведеться спершу переконати у справедливості наших намірів, перш ніж ми зможемо взятися за наш величний план."
 SIC_quench_blackrock: "Приборкати амбіції Блекрок"
 SIC_quench_blackrock_desc: "Щоб реалізувати наш грандіозний план, Королева Бандитів з Блекголлоу мусить бути під нашим контролем, або принаймні впливом. Ми вже готуємо дуже різкі листи, але також заручаємося більш... прямою підтримкою, щоб переконати її, що наш план дійсно на краще. Альтернатива для неї, звісно, буде просто немислимою."
 SIC_compromise_zeebs: "Liberate Kása" # (!)
 SIC_compromise_zeebs_desc: "Землі, що нині перебувають під контролем "Вільної Держави" Каса, колись були справжньою оазою свободи, де не правив жоден уряд і не накладалися закони, де кожен ґрифон і поні були вільні йти за своїми амбіціями. Але потім втрутилася Макавія і заснувала маріонеткову державу з колишніх рабів, завершивши золоту добу піратства. В ім'я свободи ми мусимо знищити цей гнітючий режим!"
 SIC_hooded_robin_republic: "A Hooded Robin's Republic" # (!)
 SIC_hooded_robin_republic_desc: "Наші партнери під контролем — час заявити світові про нашу організацію і про наші наміри. Грифус, Фалькор, Ціанолізія — усі зрозуміють, що Корсари вийшли в море, готові забрати награбоване і віддати це тим, хто потребує допомоги. Вони навчаться боятися праведних Пікарос."
 SIC_sailing_swordfish: "Морські розбої Мечорила"
 SIC_sailing_swordfish_desc: "Меч-Риба видав наказ: ми виходимо в моря південної Грифонії, щоб жити згідно з нашим новим принципом. Ми відбиратимемо в заможних і роздаватимемо нужденним. Вони обурюватимуться, що ми забираємо їхні неправедно нажиті статки, щоб віддати тим, хто потребує допомоги, але врешті-решт всім стане краще. Звісно, після того, як ми відкусимо крихітний шматочок для себе."
 SIC_cow_tipping: "Йдемо валити корів"
 SIC_cow_tipping_desc: "Республіка Астеріон є смертельною загрозою нашому пануванню в Сікамеоні. Вони пильно стежать за нами, маючи на меті або скинути Комісію та відновити свій дорогий демократичний уряд, або ж захопити наші землі. Ми повинні завдати удару по Астеріону, перш ніж вони нападуть на нас."
 SIC_status_of_slavery: "Питання рабства"
 SIC_status_of_slavery_desc: "Відколи ми почали спілкуватися з іншими націями та істотами, як-от зебри, відбувся досить жвавий обмін ідеями. Насправді, останнім часом у Комісії виникла одна дуже новаторська ідея — про вельми своєрідний інститут, який, можливо, потребує відродження."
 SIC_no_guarantees: "Жодних гарантій"
 SIC_no_guarantees_desc: "Нам потрібні лише найкращі ресурси, де б вони не були. Навіть якщо це означає експлуатацію власного народу, у підсумку це піде на благо. На наше благо, звісно."
 SIC_indentured_servitude: "Боргове ярмо"
 SIC_indentured_servitude_desc: "Деякі представники нижчих класів загрузли в непереборних боргах перед нами. Комісія гарантує, що про тих, хто ніколи не вибереться з боргової ями, "потурбуються" належним чином. Якщо вони слабкі, для них знайдеться один вид "роботи"; якщо сильні — то й для них знайдуться інші шляхи..."
 SIC_citizen_immunity: "Недоторканність громадян"
 SIC_citizen_immunity_desc: "Хоч би що думали інші, ми маємо свої стандарти. Один із них полягає в тому, що наші власні громадяни ніколи не повинні відчувати на собі тягар рабства. Комісія підготувала указ для всіх работорговців: ті, хто перебуває під нашим покровительством, будуть недоторканними і не підлягають поневоленню."
 SIC_homegrown_stock: "Місцевий "ресурс""
 SIC_homegrown_stock_desc: "Попри спокусу шукати "матеріал" за кордоном, наш власний, місцевий "ресурс" має багато чудових особливостей. Нам лише потрібно виявити необхідні риси у тих, кого ми відберемо. І, звичайно, у їхніх нащадків. На столі Комісії є безліч цікавих пропозицій щодо того, як це здійснити."
 SIC_best_breeders: "Найкращі селекціонери Грифонії"
 SIC_best_breeders_desc: "Хтось розводить курей. Хтось — моркву. Ми ж тут "вирощуємо" особливий "контингент" — для потреб ринку праці. Звісно, ми повинні переконатися, що залучаємо лише найкращих "селекціонерів", аби покращити "родовід".  І, ймовірно, у нас є ті, хто зможе нам у цьому допомогти."
 SIC_foreign_stock: "Іноземний "ресурс""
 SIC_foreign_stock_desc: "Наш власний "ресурс", хоч і міцний, може спричинити повстання. ому основою для його поповнення стануть закордонні набіги. Комісія вже опрацьовує плани: куди йти в рейди та кого брати для "обробки"."
 SIC_best_trainers: "Найкращі тренери Грифонії"
 SIC_best_trainers_desc: "Деякі грифони можуть зацікавитися такою роботою. Ми створимо для них Товариство Тренерів Грифонії, щоб вони могли об'єднуватися та практикувати своє ремесло. Навіть якщо ми маємо справу із сумнівними видами діяльності, цінний досвід варто поширювати."

 ##industrial-scientific tree
 SIC_industrial_base: "Оживити промислову базу"
 SIC_industrial_base_desc: "Спочатку ми не відставали від темпів індустріалізації, особливо порівняно з нашими східними сусідами, але поступово наші зусилля з модернізації зійшли нанівець. Використовуючи нині посилену владу нашого федерального уряду, ми повинні створити нові економічні стимули, аби відновити прогрес."
 SIC_school_system: "Реформа освітньої системи"
 SIC_school_system_desc: "Хоча ми століттями були більш прогресивними за наших колишніх імперських сусідів у плані державної освіти, стає очевидним, що релігійна освіта є недостатньою у світі, який дедалі більше залежить від технологій. Доведеться провести значні реформи, щоб забезпечити подальшу ефективність нашої освітньої системи."
 SIC_modern_tooling: "Сучасні інструменти"
 SIC_modern_tooling_desc: "Інвестиції в сучасні верстати та інше промислове обладнання — це очевидний перший крок для продовження переходу від кустарного виробництва до сучасної масової продукції."
 SIC_industrial_efficiency_study: "Дослідження промислової ефективності"
 SIC_industrial_efficiency_study_desc: "Зі зростанням економічної значущості промисловості та однаково загрозливим підвищенням небезпеки на робочих місцях, настав час поступово відмовлятися від нашої надмірно ліберальної економічної політики та розпочати регулювання економіки для підвищення ефективності та безпеки. Ми розпочнемо федеральне дослідження, щоб визначити необхідні кроки."
 SIC_unifying_science_guilds: "Об'єднання наукових гільдій"
 SIC_unifying_science_guilds_desc: "Наукова сфера в нашій країні перетворилася на надзвичайно конкурентну арену. Винахідники, інженери та вчені всіх напрямків об'єднуються у власні гільдії, намагаючись перевершити одне одного, що шкодить усій нашій науковій спільноті. Ми повинні консолідувати ці групи, якщо хочемо досягти справжнього наукового прогресу."
 SIC_education_appropriation: "Більші витрати на освіту"
 SIC_education_appropriation_desc: "Разом із нашими освітніми реформами та розширеннями, для їхнього успішного впровадження доведеться виділити та затвердити більший бюджет."
 SIC_equal_cities: "Федеральна рівність міст"
 SIC_equal_cities_desc: "За Федеральній Хартією кожне місто та кожна парафія вважаються рівними. Це означає, що жодне місто не повинно мати переваг над іншим ані політично, ані економічно, чого ми завжди традиційно й дотримувалися."
 SIC_capital_concentration: "Столична концентрація"
 SIC_capital_concentration_desc: "Попри високу символічну важливість рівності п'яти міст-засновників, Мідорія була обрана столицею нашої федерації з дуже стратегічної причини: це найвіддаленіша точка півострова від можливого сухопутного вторгнення. Хоча зосередження нашої промисловості там буде відступом від традицій, це убезпечить нашу індустріальну базу у випадку війни."
 SIC_standardize_weights_measures: "Стандартизація системи мір та ваг"
 SIC_standardize_weights_measures_desc: "На всьому грифонському континенті панує абсолютний хаос у системах вимірювань та стандартах, і лише Імперія Грифонів досягла обмеженого успіху у створенні уніфікованої системи. Ми повинні запровадити стандартну національну метричну систему, і, завдяки нашим морським зв'язкам, сподіваємося, це пошириться й на сусідні країни."
 SIC_new_school_buildings: "Будівництво нових шкіл"
 SIC_new_school_buildings_desc: "Традиційно ми навчали нашу молодь у святилищах нашої богині. Однак, оскільки населення зростає, а потреба в більш спеціалізованих навчальних закладах і персоналі лише збільшується, ми мусимо будувати окремі шкільні будівлі."
 SIC_develop_islands: "Розвинути західні острови"
 SIC_develop_islands_desc: "Хоча острів Скарлет був одним із засновників нашої федерації, він завжди залишався недостатньо розвиненим. Це, у поєднанні з тим, що нещодавно звільнені острови Джоджо здебільшого ігнорувалися урядом Фалькору, за винятком їхнього використання як військово-морського порта, створює велику кількість нерозвинених територій поблизу материка, що чекають на їхнє освоєння."
 SIC_develop_heartlands: "Розвинути центральний півострів"
 SIC_develop_heartlands_desc: "Історично наші внутрішні території були зразком сільської ідилії, вкритої розлогими полями зернових, городиною та пасовищами для худоби, лише зрідка перериваними пагорбами та Лісом Леве. Хоча шкода руйнувати таку природну красу, вимоги сучасної економіки вимагають, щоб ми розвивали цей регіон."
 SIC_develop_mountains: "Розвинути північні гори"
 SIC_develop_mountains_desc: "Високі гори Арагно та Сніговерхів'я на нашому північному кордоні, за нашими поточними знаннями, відносно бідні на корисні ресурси, окрім магічних кристалів, а їхній рельєф надто складний для значного будівництва. Проте, із сучасною технологією будівництва та видобутку корисних копалин, там можуть бути невикористані природні ресурси, які тепер доступні для нас."
 SIC_scarlet_lab: "Заснувати лабораторію на острові Скарлет"
 SIC_scarlet_lab_desc: "Завдяки відносно невеликій кількості населення острова Скарлет та його ізоляції від материка, наші дослідники визначили, що там буде безпечно виділити територію для проведення різноманітних наукових та магічних експериментів, які ми хочемо зберегти в таємниці. Нам слід заснувати там урядову лабораторію."
 SIC_religious_education: "Зберегти релігійну освіту"
 SIC_religious_education_desc: "Важливість збереження нашої національної віри в богиню неможливо переоцінити, адже саме Вона дарувала нам усі блага, що роблять нас вільними та успішними. Навіть у сучасній науковій сфері ми не можемо відірватися від Її вчень."
 SIC_secular_future: "Створити світське майбутнє"
 SIC_secular_future_desc: "Хоча наша віра в богиню є фундаментальною для нашої національної ідентичності, сама лише наша шана до Неї не забезпечить перемоги в цю нову епоху. Вона буде гордитись нами завдяки нашому безжальному прагненню науки та технологій, щоб міцно стояти на ногах самостійно."
 SIC_resource_survey: "Ревізія стратегічних ресурсів"
 SIC_resource_survey_desc: "Наші економісти та логісти передбачають, що в разі повномасштабної війни на континенті, кожен останній запас доступних військових матеріалів матиме величезне значення. Нам слід провести національну ревізію, щоб скласти повний перелік усіх стратегічних ресурсів федерації."
 SIC_water_computing: "Fluidic Computing" # (!)
 SIC_water_computing_desc: "Наші вчені нещодавно виявили цікаву концепцію під час досліджень електромеханічних обчислень: вода, а точніше потік води чи інших рідин, може бути використана для створення комп'ютера, який був би набагато потужнішим і здатним виконувати певні спеціалізовані процеси, що наразі неможливі. Для цього пропонується використовувати вже існуючі та добре вивчені інженерні системи водопроводу."
 SIC_crystal_capacitors: "Магічні конденсатори"
 SIC_crystal_capacitors_desc: "Наші вчені та інженери в Лабораторії Скарлет змогли створити широкий спектр електронних компонентів, використовуючи магічні кристали, що у великій кількості видобуваються в шахтах країни. Електрична природа магії та її взаємодія з природним кристалом можуть значно просунути наше розуміння електроніки, а також закласти основу для розробки енергетичної магічної зброї."
 SIC_incorporate_secular_lessons: "Доповнення світськими знаннями"
 SIC_incorporate_secular_lessons_desc: "Незважаючи на те, що Сікеція є нашим верховним авторитетом, існують чіткі закони, за якими живе фізичний світ, і які непідвладні навіть богам. Нам слід прагнути їхнього досконалого опанування."
 SIC_reinterpret_sycaecia: "Переосмислення заповідей Сікеції"
 SIC_reinterpret_sycaecia_desc: "З часів старої Карфінської Імперії ми неухильно дотримувалися заповідей Сікеції. Вони стародавні та майже незмінні протягом сотень років. Можливо, настав час для нового, сучасного трактування вчень нашої доброзичливої богині."
 SIC_practical_curriculum: "Пріоритет на практичних знаннях"
 SIC_practical_curriculum_desc: "Дійсно прикро це визнавати, але заучування молитов, пісень, мантр та міфічних історій мало що дасть нашим прийдешнім поколінням. Відтепер математика, природничі науки та мовні дисципліни стануть головними у навчальній програмі."
 SIC_sycaecia_history: "Шануючи історичну спадщину Сікеції"
 SIC_sycaecia_history_desc: "Неможливо недооцінити, наскільки богиня Сікеція та Її релігійні інституції вплинули на хід історії нашої нації. Хоча ми більше не можемо покладатися на Неї, ми можемо вивчати та пам'ятати все, що Вона зробила для нас, і, можливо, почати осягати глибину Її любові та опіки."
 SIC_new_construction_methods: "Нові методи будівництва"
 SIC_new_construction_methods_desc: "Завдяки останнім досягненням у матеріалознавстві та архітектурі ми можемо будувати вищі та міцніші споруди значно швидше. Обрії П'яти Міст будуть невпинно здійматися."
 SIC_improved_extraction: "Удосконалена техніка видобутку"
 SIC_improved_extraction_desc: "Ефективність нашого економічного механізму, від виробництва до торгівлі, завжди була предметом гордості. З новими технологічними досягненнями ми можемо вивести цю ефективність на новий рівень у сфері видобутку сировини."
 SIC_SESC_project: "Проєкт С.Е.С.К"
 SIC_SESC_project_desc: "Наші провідні вчені з Лабораторії Скарлет досягли потенційного прориву у сфері рідинних обчислень. Вони запропонували створити революційну машину, здатну відображати повний економічний цикл, прогнозувати майбутні тенденції та моделювати способи впливу на них. Цей пристрій, названий С.Е.С.К. (Сікамеонський Економічний Симуляційний Комп'ютер), може стати величезним поштовхом для нашої економіки, якщо його реалізувати."
 SIC_crystal_transistors: "Експериментальні кристалічні транзистори"
 SIC_crystal_transistors_desc: "Завдяки майстерній маніпуляції магічною силою та точно сконструйованим кристалічним компонентам, у поєднанні з нашими поточними знаннями в електроніці, наші дослідники створили пристрій, значно корисніший, хоча й дорожчий, ніж вакуумна лампа, що розробляється зараз. Хоча технологічний еквівалент наразі неможливо створити, з цих магічних прототипів можна багато чого навчитися."
 SIC_science_and_religion: "Поєднання науки та віри"
 SIC_science_and_religion_desc: "Дехто стверджує, що святі слова й сувора матерія несумісні. Ми доведемо цим скептикам їхню неправоту, рухаючись у майбутнє, тримаючи в пазурах як науку, так і священне писання."
 SIC_mortal_backs_hearts_minds: "Побудована на смертних спинах, серцях і розумах"
 SIC_mortal_backs_hearts_minds_desc: "За винятком Ідола Борея, грифонська цивілізація була побудована незліченними поколіннями смертних, які жили і помирали протягом століть. Жодного божественного втручання не було й не буде: наша нація стоїть на плечах, у серцях і розумах живих, смертних істот."
 SIC_federal_reserve: "Створити сікамеонський федеральний резерв"
 SIC_federal_reserve_desc: "На тлі посилення ролі центрального уряду в національній економіці законодавча гілка влади ухвалила акт про заснування центрального банку — Федеральний Резервний Банк. Ця нова установа має надати нам змогу ефективніше стимулювати та регулювати економіку."
 SIC_city_universities: "Розширення міських вишів"
 SIC_city_universities_desc: "Попри те, що наша передова система публічних шкіл випереджала багато ґрифонських країн, можливості вищої освіти здебільшого обмежувалися П'ятьма Містами або навчанням за кордоном. Із значним розширенням та реформуванням наших державних шкіл, зросте кількість випускників, які прагнуть здобути вищу освіту. Тому ми повинні фінансувати розширення міських університетів."
 SIC_FBIC_act: "Ухвалити Акт ССФБ"
 SIC_FBIC_act_desc: "Завдяки успішній роботі нового Федерального Резерву, законодавці запропонували черговий акт, який розширить повноваження банку, перетворивши його на національне страхове агентство – Синдикат Страхування Федерального Банку. Ця установа забезпечуватиме страхування як для нижчих банків, так і для публічних компаній. Очікується, що це знизить загальні ризики та сприятиме розвитку економіки за рахунок більших інвестицій."
 SIC_research_grants: "Державні наукові гранти"
 SIC_research_grants_desc: "Як завершальний етап нашої великої освітньої реформи, ми маємо створити численні державні гранти, що надаватимуться на конкурсній основі для різноманітних незалежних дослідницьких проєктів. Це дозволить підтримувати новий науковий поступ у майбутніх поколіннях, які пройдуть оновлену систему освіти та здобудуть вищу освіту."
 SIC_modern_peasant: "Модерний селянин"
 SIC_modern_peasant_desc: "Завдяки усім нашим великим зусиллям, сікамеонський "селянин" – це вже не просто фермер, який працює на полях, і не некваліфікований робітник на промисловому конвеєрі. Це заможний, освічений грифон середнього класу, і на доказ цього ми маємо велич, багатство та модерність нашої федерації."

 ##minotaurian subtree, part of harmonic tree
 SIC_minotaurian_friendship: "Відновлення дружніх стосунків"
 SIC_minotaurian_friendship_desc: "Напружені вибори, що відбулися як у нас, так і за протокою в Астеріоні, спричинили напругу у наших давніх дружніх стосунках з мінотаврами через можливі зміни в керівництві у цей важливий період. Тепер, коли ситуація стабілізувалась, ми повинні знову зустріти наших друзів-биків з розпростертими обіймами. Якщо нам відмовлять, значить, сталося щось серйозне..."
 SIC_minotaurian_business: "Залучення астеріонського бізнесу"
 SIC_minotaurian_business_desc: "Уряд Астеріона, зосередившись на військово-оборонній промисловості, значно занедбав свій цивільний сектор. Для нас це чудова нагода, яка принесе користь економікам обох країн."
 SIC_minotaurian_arms: "Спільна розробка озброєнь"
 SIC_minotaurian_arms_desc: "Величезний військово-промисловий комплекс Астеріона є бездонна криниця, яку ми можемо використати на користь нашої армії. Наші інвестиції в нього та залучення до вкладень у наші оборонні галузі мають посилити військову інфраструктуру обох наших країн."
 SIC_minotaurian_industry: "Взаємні економічні інвестиції"
 SIC_minotaurian_industry_desc: "Залучивши бізнес та інвесторів з Астеріона, ми отримуємо можливість безпосередньо посилити економіки обох сторін. Стимулювання нашої економіки спричинить зростання їхньої, створюючи тим самим корисний замкнений цикл."
 SIC_minotauria_official_pact: "Оформлення дружби"
 SIC_minotauria_official_pact_desc: "Після відновлення та зміцнення наших стосунків настав час закріпити нашу вікову дружбу з Астеріоном письмово та юридично. Такого не робилося сотні років, відколи Астеріон вперше скотився в тиранію, що робить цю подію винятково важливою."
 SIC_minotauria_return_artifacts: "Повернути астеріонські національні скарби"
 SIC_minotauria_return_artifacts_desc: "Під час розширення урядових структур та розчищення приміщень для нових установ, наші працівники випадково виявили щось неймовірне, що вважалося загубленим у легендах: невелике, забуте сховище найвеличніших національних скарбів Астеріона. За переказами, Доротея Маймонідес контрабандою вивезла їх з Астеріона до Сікамеону після їхнього поневолення тиранією століття тому."
 SIC_minotaurian_bridge: "Проєкт Мосту Ерит-Кетта"
 SIC_minotaurian_bridge_desc: "Концепція мосту, що з'єднає найближчі ділянки нашого півострова з найбільшим мінотаврським островом, є давньою. Однак лише зараз вона стала реальною як з технологічної, так і з політичної точки зору. Цей проєкт стане справжнім випробуванням промислової могутності та винахідливості обох наших держав, але його результатом стане монумент, що буквально зв'яже наші долі... І, звісно, принесе значні економічні переваги."
 SIC_minotaurian_centuries_friendship: "Дружба навіки"
 SIC_minotaurian_centuries_friendship_desc: "Усі наші спільні дії за останні роки зробили нас ближчими до наших братів-мінотаврів, ніж будь-коли, навіть до того, як Астеріон поринув у тиранію. Ця відновлена й набагато міцніша дружба зможе пережити будь-які конфлікти чи негаразди, і без сумніву триватиме тисячу років."

 ##army tree
 SIC_examine_militia: "Ревізія парафіяльних ополчень"
 SIC_examine_militia_desc: "Оборона Сікамеону від самого початку залежала від місцевих парафіяльних ополчень, які діяли майже без центрального контролю. Тепер, коли центральна влада зміцніла, варто зробити кроки до уніфікації стандартів, розпочавши з оцінки стану цих оборонних сил."
 SIC_expand_national_guard: "Розришення постійної національної гвардії"
 SIC_expand_national_guard_desc: "Національна гвардія (Guardia Nacional) історично була невеликим підрозділом, у мирний час призначеним для охорони Дукса, парафій та трибун, а також для виконання функцій національної поліції. У воєнний час вона мала слугувати професійним ядром нашої армії. Розширивши гвардію, ми можемо створити армію, яка більше відповідатиме стандартам західних грифонських націй."
 SIC_standardize_militia: "Стандартизація ополчень"
 SIC_standardize_militia_desc: "Запровадження нових правил для обмундирування, підготовки та навчань, встановлення уніфікованих стандартів для вогнепальної зброї, боєприпасів та іншого військового спорядження, а також формування більш чіткої командної ієрархії — усе це значно посприяє перетворенню ополчень на напівпрофесійну військову структуру."
 SIC_grand_defense: "Оборонна доктрина"
 SIC_grand_defense_desc: "Модернізуючи наші сили, ми стикаємося з думками, що варто зберегти стару місію парафіяльних ополчень та Національної Гвардії — стримувати, відбивати та захищати, а не розробляти збалансовану доктрину. Чи будемо ми слідувати традиціям?"
 SIC_professional_army: "Професійна армія"
 SIC_professional_army_desc: "Під час модернізації наших збройних сил виникають пропозиції про повне перетворення на професійну армію, здатну ефективно проводити як наступальні, так і оборонні операції. Чи оберемо ми цей шлях?"
 SIC_abolish_grover_tactics: "Усунути застарілі ґроверіанські тактики"
 SIC_abolish_grover_tactics_desc: "Епоха шеренг грифонів, що марширують, заряджають, стріляють і йдуть в атаку за командою, епоха, як то кажуть, die schönen säbel, los hermosos sables, минула. Цей величезний обсяг знань втратив актуальність з приходом сучасної війни. Хоча наші супротивники ніколи не вважали наш стиль ведення війни звичним, ми повинні подбати про те, щоб не застосовувати нині самогубну стратегію."
 SIC_sycaecia_sappers: "¡Zapadores de Sycaecia, No Pasarán!"
 SIC_sycaecia_sappers_desc: "Спочатку це ім'я належало відважним селянам, які ризикнули затопити поля, зруйнувавши дамби та загати, щоб зупинити сили Ґровера II у Другій битві на річці Кеовен. Тепер цю назву успадкував наш військовий інженерний корпус. Військова інженерія відіграє ключову роль у сучасній війні, і нашим саперам необхідне найкраще оснащення, щоб гідно продовжувати свою справу."
 SIC_arahno_montaneros: "Лос Монтаньєрос де Арагно"
 SIC_arahno_montaneros_desc: "Мешканці гірської долини, що розкинулася між Хребтом Арагно та Сгіговими Вершинами, завжди були одними з найвитриваліших наших воїнів. Саме вони часто першими вступали в бій під час наших знаменитих історичних битв. Нам слід трансформувати ці підрозділи в сучасні бойові формування, що будуть неперевершеними на будь-якій вершині, де їм доведеться битися."
 SIC_scarlet_marinas: "Лос Марінес де Ескарлата"
 SIC_scarlet_marinas_desc: "Скарлетські морські піхотинці походять від захисників старого Протекторату острова Скарлет. Острів є природним бар'єром для материка, а ґрифони, що живуть там, майстерно воюють на пляжах та беруть на абордаж ворожі судна, захищаючи півострів від набігів. Їхня спадщина живе, і вони повинні мати найкраще спорядження, якщо нам доведеться доручити їм захист нашої Армади або штурм ворожого узбережжя."
 SIC_wireless_coordination: "Бездротовий зв'язок"
 SIC_wireless_coordination_desc: "Хоча радіозв'язок на суші тільки-но стає доступним у нашій країні, а перші комерційні радіовежі ще будуються, ми вже переконалися в ефективності бездротової координації завдяки експериментам на кораблях нашої Армади.  Тепер наша мета — мініатюризувати цю технологію, щоб нею могли користуватися ополчення та Національна Гвардія."
 SIC_defensive_dykes_focus: "Захисні греблі"
 SIC_defensive_dykes_focus_desc: "Ми завжди доводили, що здатні звести оборону з усього, що є під лапою, як, наприклад, відомі дамби та річкові загати навколо міста Кеовен. Навіть в епоху танків і вантажівок ми можемо вдосконалити цю тактику швидкого зведення укріплень, аби будувати міцну оборону в будь-якій місцевості."
 SIC_unconventional_mobility: "Незвична рухливість"
 SIC_unconventional_mobility_desc: "Ми ніколи справді не мали шансу диктувати умови бою ворогам. Тому, замість прямого зіткнення з великими ворожими силами, ми завжди обирали маневрену війну: завдавали ударів по флангах та оточували ворога, використовуючи, на перший погляд, непрохідну місцевість. Ця мобільна стратегія може бути вдосконалена для створення блискавичної армії, яка зможе оточити будь-якого супротивника перед тим, як він осягне ситуацію."
 SIC_peasants_not_knights: "Селяни, не лицарі"
 SIC_peasants_not_knights_desc: "В інших куточках Ґрифонії слово "селянин" — це образа, синонім бідної, низькородної істоти. Але в Сікамеоні ми носимо це звання з гордістю, адже ми можемо здолати будь-якого лицаря, лорда чи сесара, що наважиться посягнути на нас. Ми процвітаємо, відкинувши божевільні уявлення про феодалізм та королівську владу. І наші найдосвідченіші ґрифони, Редіаріоси, завжди напоготові, щоб знищити будь-якого зарозумілого Сеґвідора!"
 SIC_procure_modern_equipment: "Оновити військове оснащення"
 SIC_procure_modern_equipment_desc: "Хоча наші військові сили й не пасуть задніх, швидкість, з якою з'являється нове озброєння та спорядження, вражає. Нам слід забезпечити наших військовослужбовців сучасними зразками скорострільної зброї, бездимним порохом, захисними шоломами тощо."
 SIC_repurpose_agricultural_machines: "Переоснастити сільськогосподарську техніку"
 SIC_repurpose_agricultural_machines_desc: "Механізація сільського господарства стала справжнім благом для наших фермерів, трактори та вантажівки значно підвищили продуктивність. Ми можемо адаптувати цю техніку для перевезення солдатів, припасів та обладнання, таким чином надавши армії мобільності."
 SIC_refit_old_cannons: "Переоснастити старі гармати"
 SIC_refit_old_cannons_desc: "Наша артилерія, яка складається переважно із застарілих нарізних гармат, що стріляють застарілими боєприпасами, потребує оновлення. Ми можемо модернізувати старі гармати, встановивши сучасні лафети, броньовані щитки та противідкатні механізми. Крім того, є можливість пересвердлити та посилити ствол, щоб вони могли використовувати сучасні боєприпаси, значно підвищивши їхню боєздатність."
 SIC_allinas_process_modernization: "Процес Аллінаса"
 SIC_allinas_process_modernization_desc: "Розроблений талановитим Аллінасом Асеропіко з компанії Estrella Arms, Процес Аллінаса — це комплекс заходів з модернізації старих вогнепальних гвинтівок, що є на озброєнні парафій та держави. Його завдання — адаптувати їх під бездимний порох. Завдяки цьому вони можуть бути або перероблені на однозарядні казнозарядні гвинтівки для резерву, або доведені до рівня стандартної службової зброї."
 SIC_knight_killing_machine: "Механічний вбивця лицарів"
 SIC_knight_killing_machine_desc: "Взявши за основу важку вантажівку чи трактор і встановивши на них броню та важку зброю (наприклад, легку артилерійську гармату), ми можемо створити транспортний засіб, який буде міцнішим, потужнішим і мобільнішим, ніж будь-який лицар. Подібні машини вже активно використовуються в Грифонії та за морем."
 SIC_adapting_naval_artillery: "Адаптаувати морську артилерію"
 SIC_adapting_naval_artillery_desc: "Національна Армада завжди мала значну перевагу над ополченням та Національною Гвардією у питанні озброєння. Деякі з легших допоміжних артилерійських систем можуть бути легко адаптовані для сухопутного використання. Це стане швидким рішенням для забезпечення ополчень артилерією, а також допоможе уніфікувати озброєння з флотом."
 SIC_sycamore_armory: "Заснувати Національний Арсенал Сікаморе"
 SIC_sycamore_armory_desc: "Досі у Сікамеоні не було власного державного збройового заводу. Як і у багатьох інших сферах державного управління, виробництво зброї та спорядження ми довіряли міським арсеналам, а останнім часом — приватним компаніям, таким як Estrella. Щоб посилити військовий потенціал і самостійність на федеральному рівні, нам варто побудувати державний збройовий завод, який забезпечить Національну Гвардію усім необхідним."
 SIC_plowshares_to_swords: "Плуги на мечі"
 SIC_plowshares_to_swords_desc: "Народ Сікамеону завжди мав подвійну натуру. У мирний час ми тримали в лапах тризуб та вила, щоб рибалити і обробляти землю та годувати свої родини. У часи війни ми брали ті ж самі речі, щоб стримувати ворога та захищати свої свободи. Приймімо ж цей факт у новий час, готуючись до неминучих воєн!"

 ##navy tree
 SIC_unify_flotillas: "Формально об'єднати Національну Армаду"
 SIC_unify_flotillas_desc: "Наш флот завжди був більш згуртованим, ніж парафіяльні ополчення чи Національна Гвардія, адже лише П'ять Міст мали ресурси для фінансування морських проєктів, а спільна загроза з боку піратів змушувала їх діяти спільно. Однак Національна Армада досі зберігає поділ на старі міські флотилії. Цю застарілу структуру необхідно замінити щоб зміцнити єдність, усунути міжміське суперництво та оптимізувати управління."
 SIC_new_naval_infrastructure: "Нова морська інфраструктура"
 SIC_new_naval_infrastructure_desc: "Завдяки історично важливим торговим портам і поклонінню морській богині ґрифонів, Сікамеон не є примітивною морською країною. Однак постійно зростаючі потреби та розміри сучасних суден вимагають будівництва новіших і досконаліших верфей, ремонтних доків та поглиблення гаваней."
 SIC_naval_base_1: "Розширення морського порту в Мідорії"
 SIC_naval_base_1_desc: "Наша столиця завжди була важливим портовим містом, розташованим у самому серці південного узбережжя Грифонії та найближче до Зебрики. Враховуючи її стратегічне значення, ми маємо постійно модернізувати та розширювати військово-морську базу в Мідорії."
 SIC_naval_base_2: "Модернізація військово-морської бази Скарлета"
 SIC_naval_base_2_desc: "Острів Скарлет завжди виконував роль природного захисного бар'єру між західними морями та материком, а також служив важливим портом і відправною точкою плавань на захід. Необхідно модернізувати острівний порт, щоб він й надалі ефективно виконував свої функції."
 SIC_dockyard_expansion_2:0 "Expanding the Queruscos Shipyards"
 SIC_dockyard_expansion_2_desc:0 "Queruscos has long held the title to have both the finest and the most productive heavy shipyards within the federation. Historically, the city arsenal created an innovative proto-assembly line system that could create an entire ship within a day, where other cities could take weeks and other nations months. Such a legacy of industry should be upheld by expanding and modernizing the cities shipbuilding facilities further."
 SIC_dockyard_expansion_1:0 "Expanding the Eritocefalia Drydocks"
 SIC_dockyard_expansion_1_desc:0 "Long benefitting from trade with Griffonia's eastern nations and always in constant competition with the capitol of Cyanolisia, Eritocefalia's shipyards have been well renowned its' for smaller, nimbler, and more efficient clippers and frigates. Thus naturally the city has supplied the Armada Nacional with many of its' fine fast craft, and modernizing and expanding the city's drydocks is a high priority."
 SIC_light_dockyards:0 "Light Dockyard Standardization"
 SIC_light_dockyards_desc:0 "By cementing our naval doctrine into solely lighter vessels as we have in the past, we have the choice to standardize all of our shipbuilding and maintenance facilities to these smaller craft, resulting in smaller, more efficient, and cheaper infrastructure, but at the cost of our ability to build heavier ships."
 SIC_flexible_dockyards:0 "Flexible Dockyard Standardization"
 SIC_flexible_dockyards_desc:0 "With the major expansions of our navy into much larger ship designs than the past, we now have the experience to standardize our shipbuilding and maintenance facilities to streamline production all kinds of naval craft."
 SIC_naval_review:0 "The New Millennium Naval Review"
 SIC_naval_review_desc:0 "The purpose of a naval review is twofold: to celebrate our long held connections and traditions with the sea and our beloved goddess, and functionally to amass the Armada Nacional for review by our admiralty. Historically it's been a day of competition between the city flotillas, but this time the fleet sails as one!"
 SIC_analyze_merchant_marine:0 "Analyze the Marina Mercante"
 SIC_analyze_merchant_marine_desc:0 "Being a major trading nation has meant that historically our merchant marine has always been an incredibly important asset to us, both economically and to our maritime defense. While we cannot build merchant ships equivalent to the old East Hindiagriffs of old, we can still look into integrating precautions and developing special tactics for our navy to better protect our merchants on the high seas."
 SIC_prepare_against_piracy:0 "Preparations Against Convoy Raids"
 SIC_prepare_against_piracy_desc:0 "The Marina Mercante has developed based on historical experience a modernized version of our coastal defensive patrols to defend our convoys on the open seas, extending Sycaecia's protecting wing far beyond our coasts."
 SIC_merchant_cruiser:0 "The Destroyer Escort"
 SIC_merchant_cruiser_desc:0 "The history of battle on the seas has repeated itself, only instead of pirates and privateers preying on well to do merchants for personal gain, it's one nation's destroyers and submarines and aircraft against another's civilian convoys. This time however, we can amass a fleet of escorts that is both economically feasible and long enough ranged to protect our convoys anywhere."
 SIC_new_screens:0 "New Screening Vessels"
 SIC_new_screens_desc:0 "From mere sailing sloops to swarming torpedo boats to anti-submarine destroyers and anti-aircraft light cruisers, the naval screen has evolved immensely over the last century and a half, and we have been able to keep pace with it. But the march of progress never stops, even on the waves, so we must continue the designing, innovation, and construction of these steadfast vessels."
 SIC_ASW_warfare:0 "Spearing the Modern Sea Serpent"
 SIC_ASW_warfare_desc:0 "The invention of the fully submersible ship, while wondrous, has opened up a vast new element of naval warfare where an enemy can stalk our merchants and battlefleets like the mythic sea monsters of yore. New weapons and detection systems will have to be developed to hunt down these new steel sea predators."
 SIC_mine_warfare:0 "The Venerable Sea Mine"
 SIC_mine_warfare_desc:0 "The naval mine at this point is an aging invention, but one that has proven still deadly and only growing more lethal despite advances in underwater protection. Minefields have long been part of the theoretical defense of our coastal waters and ports, sitting in many narrows and natural bays, and these plans and their related technologies should continue to be modernized."
 SIC_cruiser_tradition:0 "Sicameonese Cruiser Tradition"
 SIC_cruiser_tradition_desc:0 "Historically, the cruiser has been our capital ship, our nation's naval pride. While this mantle may pass onto larger and more powerful ships in the future, the cruiser still has a crucial role to play in this new, modern maritime age with its' great flexibility."
 SIC_aircraft_carrier:0 "An Aircraft Carrier"
 SIC_aircraft_carrier_desc:0 "Many of the younger officers who have grown up with the latest innovations of mechanized flying machines have proposed the idea of creating a ship that is in essence a floating airfield. The concept has already been proven overseas in Equestria and by the Empire before it had collapsed on itself, and we have concluded some of our own first tests of launching aircraft off of an armed warship successfully. Despite the skepticism of some of our older officers, such a dedicated ship might prove to be a potent weapon in the future"
 SIC_secondary_battery_research:0 "A Secondary Education"
 SIC_secondary_battery_research_desc:0 "As our ships grow further and further in size, we find ourselves actually somewhat lacking in one aspect of naval design: secondary batteries. But we are learning quickly, and adapted weaponry from our smaller craft should fit the role soundly."
 SIC_undersea_patrol:0 "An Undersea Patrol"
 SIC_undersea_patrol_desc:0 "The idea to build a ship that can swim within Sycaecia's vast seas as the fish and other aquatic denizens do is an old one in our mythology, but only became possible relatively recently. While we have already achieved such a marvel of engineering, continuing to pursue advances in submarining will allow us to protect our waters in ways never thought possible before."
 SIC_torpedo_research:0 "The Ship Killing Harpoon"
 SIC_torpedo_research_desc:0 "Ever since the invention of the motorized torpedo, the maritime power balance of the world has been greatly shaken. This little revolution has most benefited smaller nations such as ourselves, with mere boats being able to sink the largest capital ships. While the advantage has slowly waned with improvements in underwater protection, the torpedo is still a lethal weapon that we should continue to hone."
 SIC_study_capital_ships:0 "Studying Modern Capital Ship Design"
 SIC_study_capital_ships_desc:0 "Our naval doctrine has never truly had a place for large capital ship design. Larger ships were always deemed too unwieldy and slow, and most importantly too expensive when the objective was deterrence and fending off coastal raids. However, with the rising continental tension, mere deterrence may not suffice, there is now an incentive to study and begin such ships, beginning with modified Imperial examples."
 SIC_our_own_capital_ship:0 "Our Own Capital Ship"
 SIC_our_own_capital_ship_desc:0 "Our studies have turned up positive. More recent technological developments have proven that a large, fast, well armed, reasonably well armored, and reasonably priced capital ship is possible, and our shipyards are ready to construct a prototype."
 SIC_fast_battleship_committee:0 "The Fast Battleship Committee"
 SIC_fast_battleship_committee_desc:0 "Our research into capital ship design has grown beyond a mere project to a very important section of the Armada Nacional. The admiralty has recommended we formalize this group into a proper committee to better organize these efforts going into the future."
 SIC_modernize_command_structure:0 "Modernize the Command Structure"
 SIC_modernize_command_structure_desc:0 "A newly unified navy also needs massive restructuring in the command structure. Consolidating all of the separate city commands into a single national structure will take a considerable amount of time, but we will reap the benefits of centralized coordination."
 SIC_skirmish_theory:0 "Skirmish Theory"
 SIC_skirmish_theory_desc:0 "Traditionally, we have tried to never engage enemy fleets in an equal pitched battle, for our main enemies have always had greater griffonpower reserves and industrial capacity to absorb losses. As such we've always attempted to skirmish and dictate the terms of battle with our fleet's speed, and we can hone this doctrine by adding blending traditional battlefleet strategy into ours."
 SIC_carrier_theory:0 "Carrier Theory"
 SIC_carrier_theory_desc:0 "Proponents from our fledgling mechanized air corps have suggested and steadily pushed the idea of a floating airfield ship, delivering rounds not by gunpowder and rifled barrels, but by piloted aircraft instead. It is not an entirely new idea, as both the Empire and Equestria have experimented with such aircraft carriers, they may prove to be a dominant naval weapon if we have the capacity to support them."
 SIC_midoria_naval_academy:0 "Founding the National Naval Academy"
 SIC_midoria_naval_academy_desc:0 "Now that we have consolidated our command structure, it's time to consolidate our officer training program. In line with much of our centralization restructuring, the Midoria Naval Academy will be designated and expanded for this purpose."
 SIC_next_generation_officers:0 "A New Generation of Officers"
 SIC_next_generation_officers_desc:0 "The first generation of naval officers have graduated after our extensive series of reforms, and our instructors report that the decks will be awash with new doctrinal ideas."

 ##air force tree
 SIC_found_air_corps:0 "Founding the Mechanized Air Corps"
 SIC_found_air_corps_desc:0 "Griffons have always had winged regiments within their militaries, but the advent of powered flight has propelled the air into a theater of war far vaster than ever realized before. We must keep the pace by establishing a mechanized air corps if we wish to keep the skies as free as our land and sea."
 SIC_dusters_to_fighters:0 "From Dusters to Fighters"
 SIC_dusters_to_fighters_desc:0 "A small group of our inland farming communes have purchased high performance aircraft for spreading seeds, fertilizer, and pesticides across their fields with remarkable speed. We should purchase some examples of these aircraft for modification into our first fighters."
 SIC_first_bomber:0 "Our First Bomber"
 SIC_first_bomber_desc:0 "Eyewitnesses from our troops during our occupation of the Jojo Islands of Wingbardian aircraft bombarding Falcorian positions during their 985 ALB war have proven that aerial bombing could be a powerful tactic in the near future. Modifying a civilian transport aircraft will be a good start for our own bombers."
 SIC_arahno_school:0 "Establishing the Arahno Air School"
 SIC_arahno_school_desc:0 "Establishing a new air school in northern Leve province provides a number of benefits: all types of regions for new pilots to fly over within the nation, a useful northern airbase, and a place to develop new mechanized air doctrine."
 SIC_radio_detection:0 "Developing Radio Detection"
 SIC_radio_detection_desc:0 "As radio towers continue to be erected across the federation, our naval engineers have tinkered with the novel idea of detecting objects through radio signal pulses. Such experimental devices have been mounted both on civilian and naval ships as early collision warning systems, and our aviation engineers believe this could be useful for detecting aircraft."
 SIC_strafing_talent:0 "Natural Strafing Talent"
 SIC_strafing_talent_desc:0 "Being the natural brethren of those low flying seabirds who skim the ocean surface and even dive underwater for fish, our pilots have a natural grasp of low flying air attacks. We should capitalize on this natural gift and develop our close air support tactics."
 SIC_adapting_patrols:0 "Adapting the Coastal Patrol"
 SIC_adapting_patrols_desc:0 "Our city militias have historically been charged with the task to provide coastal security in the form of patrol groups of griffons who fly along the shoreline, keeping an eye out for suspicious goings-on. Such experience could be adapted to suit our new air corps as coastal defense against enemy naval vessels."
 SIC_support_doctrine:0 "Close Support Doctrine"
 SIC_support_doctrine_desc:0 "Our pilots' natural talents have been honed into true battle strategies. From this point on, they only need to be honed in battle and tempered through combat experience."
 SIC_sea_hawkeyes:0 "The Seahawkeyes"
 SIC_sea_hawkeyes_desc:0 "The title of a Sea Hawkeye was one only reserved for the finest patrolgriffs, marines, and sailors with astounding senses and combat prowess. But now it graces our best naval air combat squadrons, taking on a far more important role than ever before, taking mechanized airpower to combat our enemies on the high seas."
 SIC_barnstormer_squadron:0 "The Barnstormer Squadron"
 SIC_barnstormer_squadron_desc:0 "Taking the name from skilled and daring crack stunt pilots, the Barnstormer Squadron makes up of our finest fighter pilots, making use of risky and unorthodox tactics as their namesake implies."
 SIC_floating_airfield:0 "A Floating Airfield"
 SIC_floating_airfield_desc:0 "Collaborating with our younger naval officers, our aviation staff have pushed the idea of deploying combat squadrons from specially designed ships that act essentially as floating mobile airfields. The ability to project airpower in such a way is undoubtably a very powerful one, and is also being explored by foreign powers. Resources permitting, we should experiment with adapting aircraft and ships to such a task."

### ПЕРСОНАЖІ ###
 ##Leaders
 SIC_alexis_de_sicameon:0 "Алексіс де Сікамеон"
 SIC_alexis_desc:0 "Алексіс де Сікамеон, чиє ім'я було Алексіс Тортола-Палома перед тим, як він став Князем Сікамеону, походить з традиційної політичної еліти країни, яка складається з купців та громадських лідерів внутрішніх парафій. Він прийшов до влади у звичний спосіб, піднімаючись по службових сходах і займаючи все більш престижні посади, поки нарешті не досяг вершини. Ця традиція сягає своїм корінням карфінського періоду, мало змінившись протягом століть.\n\nАлексіс є прагматистом, менше піклується про ідеали і більше про те, що є практичним і корисним для його політики. Тому він гнучкий і готовий співпрацювати зі своїми політичними ворогами, якщо це необхідно. Як його опоненти, так і прихильники кажуть, що він привніс у свою адміністрацію жіночу нотку, вважаючи за краще вирішувати суперечки в делікатній, емпатійній манері. Він скромна і лагідна людина, популярна серед усіх верств сікамеонського суспільства, і просто бажає миру і процвітання. Проте є й такі, хто вважає, що він занадто м'який і компромісний, і що Сікамеон потребує радикальних рішень для вирішення своїх проблем у ці непевні часи."

 SIC_remige_plumar:0 "Реміхе Плюмар"
 SIC_remige_desc:0 "Виростаючи у сільській місцевості, Реміхе Плюмар пережив культурний шок, коли переїхав до прибережного міста, ставши вразливим до різноманітного потоку ідей, принесених до сікамеонських портів з-за кордону. Він перетворився з селюка на поціновувача культури, але також зрозумів, що Сікамеон - це лише одна нація серед багатьох інших. Таким чином, він став візіонером, вважаючи, що Сікамеон повинен бути сильним, щоб зберегти свою незалежність, але також брати участь у міжнародних справах. Незабаром він приєднався до головної радикальної партії Сікамеону, ожививши її та сколихнувши істеблішмент своїми неортодоксальними поглядами.\n\nЙого ідеологія, сікамеонський синдикалізм, є сумішшю як вітчизняних, так і зарубіжних ідей. Він є прихильником профспілок, страйків та інтернаціоналізму, однак також відданим членом культу Сікасії, популістським лідером і прихильником демократії. Його ідеї широко поширилися серед робітничого класу Сікамеону, але також зробили його ворогом торговців, які традиційно мали велику владу в країні. Крім того, він часто конфліктував з іноземними соціалістами, що ускладнювало реалізацію його інтернаціоналістичних прагнень."

 SIC_don_espadarte:0 "Дон Еспадарте"
 SIC_espadarte_desc:0 "Як можна описати таку людину, як дон Еспадарте, кількома абзацами? Його особистість настільки ж яскрава, наскільки й різноманітна, а народні чутки про нього затьмарюють правду. Для одних він є героєм простого народу, який краде у багатих і віддає бідним. Для інших він - злочинець, пірат, справжній негідник. Грифони ненавидять його або люблять, і будь-яка інтерпретація може бути причиною таких сильних почуттів.\n\nНа людях дон Еспадарте бабій, ввічливий і вправний переговірник, здатний укладати складні угоди з іншими. Проте наодинці він - конфліктна людина, яка розривається між тим, щоб бути справжнім героєм чи використовувати інших, між загальним благом і особистою жадібністю. Його справжнє ім'я відоме лише йому самому, а минуле ретельно тримається в таємниці. Він син опального купця, який потрапив до в'язниці за свої злочини у відчайдушні часи, коли Грифонська імперія розпалася, а економіка континенту була в руїнах. Таким чином, він познайомився зі злочинним життям у молодому віці, і його неодноразово заарештовувала сікамеонська влада, але йому завжди вдавалося вийти на волю, відбуваючись лише м'якими покараннями. Він став великим гравцем у кримінальному світі Сікамеону, налагодивши численні зв'язки з мафіозними босами і корсарами.\n\nЗараз він робить ставку всього свого життя, використовуючи сумнівні засоби, щоб стати лідером Сікамеону. Чи прагне він просто експлуатувати населення, чи справді покращити їхнє життя, ще належить з'ясувати, оскільки його вірність своїй нації та обов'язку в найкращому випадку коливається."

