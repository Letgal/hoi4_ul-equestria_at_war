EaW_PeaceCap_Desc_JER_Republic: "Свобода, рівність, братерство або смерть!"
EaW_PeaceCap_Desc_JEB: "Ось вони співали про завтра, але завтра не настало."
EaW_PeaceCap_Desc_JRR: "Кінець самолюбству, кінець писí."
EaW_PeaceCap_Desc_JFT: "«До стіни», — сказав капітан."
