### ЦИТАТИ ###
EaW_PeaceCap_Desc_EQS: "Дружба — більш не диво."
EaW_PeaceCap_Desc_SOL: "За надновою приходить пітьма."
EaW_PeaceCap_Desc_NLR: "Так чи інакше, вона шкодувала свою сестру."
EaW_PeaceCap_Desc_CRY: "Недовго колишні раби Сомбри смакували свободу."
EaW_PeaceCap_Desc_CRY_Sombra: "Цього разу, Рейдіент була на боці Сомбри."
EaW_PeaceCap_Desc_CHN: "Вона обіцяла їм світ, а дала смерть."
EaW_PeaceCap_Desc_CCN: "Дружба варта того, щоб за неї вмерти."
EaW_PeaceCap_Desc_STG: "Під червоним знаменом жили вони і померли."
EaW_PeaceCap_Desc_STL: "Експерименту Старлайт настав кінець."
EaW_PeaceCap_Desc_OLE: "Вовки не голодуватимуть цієї зими."
EaW_PeaceCap_Desc_GRF: "Мрію про новий світ порвав гарматний вогонь."
EaW_PeaceCap_Desc_GRF_auth: "Ті, хто от-от умруть, вітають вас!"
EaW_PeaceCap_Desc_GRF_repub: "Від усіх народів, від усіх рас, ви прийшли до нас як браття."
EaW_PeaceCap_Desc_GFF: "Першопрохідці роду грифонячого відправилися в останній похід."
EaW_PeaceCap_Desc_ELF: "Поні Еквестрії билися до останнього."
EaW_PeaceCap_Desc_MAN: "Перший із пішаків упав."
EaW_PeaceCap_Desc_BUF: "Стада більше не тупочуть."
EaW_PeaceCap_Desc_BAL: "Борімося, браття й сестри, навіть якщо в бою ми мусимо загинути!"
EaW_PeaceCap_Desc_BAL_CHN: "Мир повертається в джунглі."
EaW_PeaceCap_Desc_JUN: "Шахрай втратив свій шанс на спокуту."
EaW_PeaceCap_Desc_CES: "Декотрі історії не скінчуються щасливо."
EaW_PeaceCap_Desc_CES_solarist: "Їхня непохитна віра стала їхньою погибеллю."
EaW_PeaceCap_Desc_CES_shadow: "Темрява — це лише швидкоплинна мить."
EaW_PeaceCap_Desc_NMS: "Крики ночі нарешті затихли."
EaW_PeaceCap_Desc_TEM: "Новий цикл скінчився так швидко, як і почався."
EaW_PeaceCap_Desc_VAN: "Моряків витіснили в море."
EaW_PeaceCap_Desc_LSP: "Війна — справа небезпечна."
EaW_PeaceCap_Desc_SCS: "Вони билися за пропащу справу."
EaW_PeaceCap_Desc_YAK: "Лавина поглинула їх востаннє."
EaW_PeaceCap_Desc_YAK_yngvar: "Коли настане наша черга, ми станемо виправдовувати терор."
EaW_PeaceCap_Desc_YAK_thyra: "Завше саме надія, надія на перемогу, робить революції."
EaW_PeaceCap_Desc_YAK_yona: "Йона не боятися! Йона мати друзі!"
