cityfall.1.t: "Падіння Вейверфронта"
 cityfall.1.d: "[This.GetNewspaperHeader]Згідно з повідомленнями, що надійшли сьогодні рано вранці, війська чейнджлінґів захопили оленійське місто Вейверфронт, витіснивши останніх захисників, які відчайдушно трималися за міський порт.\n\nСотні тисяч оленійських цивільних масово покидають місто пішки або на кораблях, хоча для багатьох було вже запізно, оскільки танки чейнджлінґів наздогнали їх і перекрили всі шляхи відступу.\n\nМісто, яке колись було центром радіообміну, тепер занурилося в моторошну тишу, і з нього лунають лише святкові мелодії та промови, що транслюються окупаційними силами чейнджлінґів." # (@)
 cityfall.1.a: "Чейнджлінґи наступають..."
 cityfall.1.b: "Це лише початок."
 cityfall.1.c: "Ми помстимося за Вейверфронт!"

cityfall.2.t: "Падіння Йортланда"
 cityfall.2.d: "[This.GetNewspaperHeader]Війська чейнджлінґів розгромили останніх оленійських захисників у столиці Йортланду. Проникнувши в ряди захисників, чейнджлінґи здійснили раптовий напад іззовні та зсередини, швидко розгромивши будь-яку спробу організованого опору. Останні захисники відступили до палацу Йортланда, але їхня стійка оборона не витримала натиску елітних підрозділів єгерів, які штурмували історичну будівлю.\n\nТепер прапор чейнджлінґів майорить над руїнами Ріксдаґу, а вцілілі оленійські солдати здаються переможним чейнджлінґам." # (@)
 cityfall.2.a: "Оленійці виклалися наповну."
 cityfall.2.b: "Велика перемога!"
 cityfall.2.c: "Невже це кінець?"

cityfall.3.t: "Падіння Цервуса"
 cityfall.3.d: "[This.GetNewspaperHeader]Бої в оленійському місті Цервус добігли кінця: війська чейнджлінґів витіснили останніх захисників, які переховувалися в покинутих фабриках і житлових будинках міста. Після інтенсивних бомбардувань із повітря й артилерійського обстрілу танки чейнджлінґів прорвали імпровізовані барикади та промчали вулицями, щоб захопити доки та залізничний вокзал.\n\nТі нечисленні захисники-оленійці, що залишилися, не змогли евакуюватися через блискавичну швидкість наступу чейнджлінґів. Станом на сьогоднішній ранок Цервус офіційно перебуває під окупацією чейнджлінґів." # (@)
 cityfall.3.a: "Невже чейнджлінґів не спинити?"
 cityfall.3.b: "Вони нам не рівня."
 cityfall.3.c: "Ми повернемося по Цервус!"

cityfall.4.t: "Падіння Сакари"
 cityfall.4.d: "[This.GetNewspaperHeader]Усі спроби опору в оленійському місті Сакара припинилися сьогодні вранці після того, як війська чейнджлінґів штурмували ратушу та захопили штаб-квартиру оленійців у Сакарі. Пожежа, ймовірно спричинена відступаючими оленійськими військами, спустошила дерев'яне місто, змусивши загарбників-чейнджлінґів зосередитися на гасінні вогню.\n\nПожежу вдалося загасити, але вона завдала жахливих збитків у вигляді побічної шкоди та жертв серед цивільного населення. Станції чейнджлінґів оголосили, що вину за трагедію несе уряд Оленії, і що для поранених було розгорнуто військові польові шпиталі." # (@)
 cityfall.4.a: "Оленційці впадають у відчай."
 cityfall.4.b: "Яке марнування життів."
 cityfall.4.c: "Сподіваємося, це купило нам трохи часу."

cityfall.5.t: "Падіння Рієкограда"
 cityfall.5.d: "[This.GetNewspaperHeader]Сьогодні рано вранці завершилися жорстокі вуличні бої в [old_controller.GetAdjective]ій столиці Річкової республіки.\n\nНезважаючи на підрив багатьох знаменитих міських мостів, захисникам не вдалося завадити [new_controller.GetAdjective]им військам переправитися через Золоту та Зелену річки. Після боїв за кожну вулицю та кожен будинок захисників відтіснили до старої цитаделі на Зеленому пагорбі, і, оскільки у них закінчувалися запаси, [old_controller.GetAdjective]ий командир віддав наказ про прорив із міста під прикриттям ночі та густого туману, взявши з собою якомога більше цивільних. Однак їх помітили, і вони потрапили під сильний вогонь. Останні захисники билися до кінця, щоб захистити цивільних, які відступали." # (@)
 cityfall.5.a: "Федерація не складається з одного міста!"
 cityfall.5.b: "Серце Річкових земель тепер наше."
 cityfall.5.c: "Сонце починає заходити над східними поні." # (&?)

cityfall.6.t:0 "The Fall of [356.GetName]"
 cityfall.6.d.maresoc_take:0 "[This.GetNewspaperHeader]Fighting in the New Mareland capital of [356.GetName] has come to the end as the fanatical MARESOC militia captured the final defenders. Shocked citizens looked on as members of government, business owners, soldiers and police officers where marched to Long Bay Prison. The flag of the MARESOC party flies over the Commonwealth Congress and rallies have been heled among the ruins offering pardons to anyone who swears their allegiance to the MARESOC party. It is unsure of what fate awaits those who continue to resist."
 cityfall.6.d.maresoc_loose:0 "[This.GetNewspaperHeader]The city of [356.GetName] is unrecognisable to those who knew it before MARESOC's rule. The towering monoliths that where the Ministries of Truth, Plenty and Peace had been demolished by MARESOC forces, seemingly wiping away all traces of them ever being there. The rest of the city hadn't fared much better. The scorched-earth tactics employed by the defenders have left most of the city in ruins. The residents of the tightly packed slums eagerly partook in this destruction of their own homes before throwing themselves at the advancing [new_controller.GetAdjective] forces with sharpened sticks and clubs.\n\nOnly the Ministry of Love remains. A seemingly impenetrable bunker that constant artillery barrages and [new_controller.GetAdjective] engineers have been unable to crack. Nonmatter what is behind the magically-sealed doors, it is in little position to control the ruins of the once great city."
 cityfall.6.d.other:0 "[This.GetNewspaperHeader]Fighting has come to an end in the city of [356.GetName] as the last of the [old_controller.GetAdjective] defenders surrendered on the steps of the opera house. The building itself had been gutted by fires caused by [new_controller.GetAdjective] artillery barrages. The [356.GetName] Harbour Bridge remained intact as the [old_controller.GetAdjective] forces couldn't bring themselves to destroy the iconic symbol of the city.\n\nThe [new_controller.GetAdjective] flag now flies from the top of the bridge's archway, letting all know who now controls the city."
 cityfall.6.a.maresoc_take:0 "The madness of MARESOC cannot be allowed to win!"
 cityfall.6.a.maresoc_loose:0 "They can have the ashes."
 cityfall.6.a:0 "Give it time and the sun will rise over [356.GetName] once again."
 cityfall.6.b.maresoc_take:0 "This is a great victory for the party."
 cityfall.6.b.maresoc_loose:0 "The corruption of MARESOC is washing away."
 cityfall.6.b:0 "Time to have a barby on the beach."
 cityfall.6.c.maresoc_take:0 "And thus darkness falls over New Mareland."
 cityfall.6.c.maresoc_loose:0 "The sun rises over [356.GetName] once again."
 cityfall.6.c:0 "With the end of [356.GetName], darkness has fallen over New Mareland."

cityfall.25.t: "Падіння Весаліполіса"
 cityfall.25.d: "[This.GetNewspaperHeader]Високі шпилі столиці чейнджлінґів охоплені полум'ям, оскільки [new_controller.GetAdjective]і війська закріплюють свій контроль над містом-вуликом. За повідомленнями, [old_controller.GetLeader] втекла з наближенням ворога й наказала місцевому гарнізону битися до смерті. Цивільним заборонялося залишати місто, і в разі порушення цього заборони їх звинувачували б у державній зраді. Це означає, що, незважаючи на всі зусилля держави [new_controller.GetNameDef], не вдалось уникнути жертв серед цивільного населення, особливо з огляду на те, що захисники використовували цивільних як живий щит або змушували їх воювати. Після коротких, але запеклих боїв у місті гарнізон капітулював, і [new_controller.GetAdjective]ий прапор було піднято на вершині сильно пошкодженої та палаючої Вежі Великої Королеви." # (@)
 cityfall.25.a: "Ми ще помстимося!"
 cityfall.25.b: "Перемога близька! Надія живе!"
 cityfall.25.c: "Кінець імперії."

cityfall.26.t: "Падіння Яктауна"
 cityfall.26.d: "[This.GetNewspaperHeader]Сьогодні вранці традиційна столиця Як'якистану капітулювала перед [new_controller.GetAdjective]ою армією. Яки, що захищали місто, чинили запеклий опір і зазнали значних втрат, перш ніж решта поранених воїнів, не здатних більше битися, зрештою здалися.\nЦе [old_controller.GetAdjective]е місто було майже повністю зруйноване лавиною в 1005 році й було відбудоване з допомогою від Еквестрії. Однак масштабні руйнування дають зрозуміти, що допомога знадобиться знову. Дві гігантські статуї біля міських воріт, що символізують єдність яків, залишилися стояти, незважаючи на сильні пошкодження від вогню. Мешканці міста бачать у цьому знак надії." # (@)
 cityfall.26.a: "ЯКИ НИЩИТИ ЗАГАРБНИК І ВЕРНУТИ СТОЛИЦЯ!"
 cityfall.26.b: "Тоді, можливо, ці статуї треба знести."
 cityfall.26.c: "Ці яки справді мають бойовий дух."

cityfall.27.t: "Облога Вракса"
 cityfall.27.d: "[This.GetNewspaperHeader]Цей день знаменує кінець облоги Вракса. Після захоплення прилеглих територій величезне місто-вулик було взято в облогу. [old_controller.GetLeader] вирішила не виводити численних цивільних мешканців міста, щоби спонукати армію чейнджлінґів до ще запеклішої боротьби з ворогом. Це лише зробило битву ще більш кровопролитною, оскільки чейнджлінґи вдалися до газових атак із близької відстані, щоби здобути хоч якусь перевагу в міських боях на обмеженому просторі. З [new_controller.GetAdjective]ими військами, одягненими у протигази й озброєними кийками та рушницями, вони просувалися крізь барикади та бункери, доки не було розгромлено останній осередок опору чейнджлінґів, і величезне місто-вулик, що колись вирувало життям, залягло тихіше, ніж замерзлі поля півночі." # (@)
 cityfall.27.a: "Смерть або безчестя! Продовжуйте бій!"
 cityfall.27.b: "Помста — це страва, яку подають холодною."
 cityfall.27.c: "Хід подій змінився."

cityfall.28.t: "Падіння Уетера"
 cityfall.28.d: "[This.GetNewspaperHeader]Столиця грифонячої колонії в Еквусі, заснована понад двісті років тому самим імператором Ґровером I, сьогодні вранці капітулювала перед нападниками. Місто майже повністю очистили від цивільного населення, яке вивезли на кораблях, залишивши [old_controller.GetAdjective]их захисників наодинці в тихому місті-привиді. Тишу порушив попередній артилерійський обстріл, який обрушився на захисників, а за ним послідувала запекла атака піхоти. Зневірені грифони відступили до стародавніх руїн поселення поні на околиці міста. Позиція була настільки укріпленою, що [new_controller.GetAdjective]а артилерія не мала іншого вибору, як зрівняти її з землею інтенсивним обстрілом, повністю знищивши це історично цінне місце." # (@)
 cityfall.28.a: "Ні! Ми не можемо здатися! Ще ні!"
 cityfall.28.b: "Ми зможемо відновити ці руїни, я певен."
 cityfall.28.c: "От і закінчується їхня незалежність."

cityfall.29.t: "Падіння Грифенгайма"
 cityfall.29.d: "[This.GetNewspaperHeader]Імперія Грифонів зазнала нищівного удару: імперську столицю захопили [new_controller.GetAdjective]і війська. Багато хто вважає, що це знаменує кінець занепалої Імперії, якщо тільки імперська армія не зможе якимось чином відбити місто. Бій був запеклим, оскільки захисники зруйнували багатовікові мости через річку Грифкінґ, змусивши ворога або перелітати її вночі, або споруджувати плоти та понтони. Зрештою, незважаючи на численні втрати, було створено кілька плацдармів, і захисники відступили до Імперського палацу. Там вони дали драматичний останній бій, готові померти в ім'я Імперії, поки не залишилося лише декілька воїнів. Переважені чисельністю та оточені, останні залишки гарнізону здалися." # (@)
 cityfall.29.d_bronzehill: "[This.GetNewspaperHeader]У столичному місті Грифенгаймі розгорілася запекла битва, коли фанатичні прихильники собак та імперські війська вели вуличні бої. Елітні війська з Бронзгіллу з величезною силою розчищали поспіхом зведені барикади, а їхня лютість наводила жах на імперських солдатів. Зрештою, завдяки постійній артилерійській та повітряній підтримці собакам вдалося просунутися глибше в місто. Собаки швидко просунулися від околиць до центру міста, аж поки не дісталися палацу, де командир гвардії Беніто домовився про почесну капітуляцію. Після захоплення палацу собаки радісно вітали звільнення імператора з лап імперців, які тримали його під своєю опікою. Невдовзі після цього решта солдатів масово здалася, щоб уникнути смерті, і після закінчення битви з ними повелися справедливо." # (@)
 cityfall.29.d_bronzehill_revenge: "[This.GetNewspaperHeader]Виючи з жаги до помсти, собаки ввірвалися до міста, зустрічаючи навіть найменший опір із нестримною силою, не зважаючи на те, хто стояв на їхньому шляху. Незважаючи на жорстокість собак, багато бійців Імперської армії запекло опиралося Бронзгіллу й після тривалих роздумів із боку різних солдатів їх у підсумку розстріляли на місці. Зрештою, ті, хто вижив, незабаром евакуювалися з міста невеликими групами або дезертирували з передової через жорстоке кровопролиття та марність боїв. Урешті-решт війська Бронзгіллу захопили місто з великими втратами, котре перетворилося на руїни. Однак через кілька годин після боїв деякі цивільні особи, які раніше ховалися в уламках, виходили, щоби подивитися на місто, захоплене собаками. Поки одні цивільні особи почали обіймати тих, кого вважали своїми визволителями, і дякувати їм за порятунок, інші зіткнулися з повним гнівом спраглого помсти Бронзгіллу." # (@)
 cityfall.29.a: "Бийтеся далі! В ім'я Імперії!"
 cityfall.29.b: "Нам слід подумати над переміщенням столиці туди..."
 cityfall.29.c: "Імперія нарешті зустрічає свій кінець."
 cityfall.29.e: "Хай живе імператор!"
 cityfall.29.f: "Викорчувати всіх зрадників!"

cityfall.30.t: "Падіння Грифонстоуна"
 cityfall.30.d: "[This.GetNewspaperHeader]Грифонстоун — батьківщина імператорської династії та колиска грифонів — пав. [new_controller.GetAdjectiveCap]им солдатам довелося вести запеклі бої, щоби захопити місто, адже воно було збудоване на стародавньому священному дереві, що росло на вершині гори. Це означало, що захопити його могла лише крилата піхота, а їхня підтримка була обмеженою, оскільки нападники не наважувалися застосовувати артилерію, побоюючися пошкодити святе місто. [old_controller.GetAdjectiveCap]і захисники були сміливими, оскільки не хотіли віддавати таке священне місце без бою, тож нападники заплатили кров'ю за кожен будинок і кожну вулицю, які вони захоплювали. Проте вони продовжували битися, аж поки не залишився лише занедбаний Королівський палац, де понад 40 років тому мешкав король Ґуто VI. Замість укріпити палац і продовжувати бій, захисники здалися, бажаючи, щоби його залишили в спокої." # (@)
 cityfall.30.a: "Ми мусимо вдарити у відповідь!"
 cityfall.30.b: "Священне місто — наше."
 cityfall.30.c: "Стерв'ятники б'ються за кістки..."

cityfall.31.t: "Падіння Аквіли"
 cityfall.31.d: "[This.GetNewspaperHeader]Коли [new_controller.GetAdjective]і війська наблизилися до культурної столиці Грифонії, мер Аквіли, проігнорувавши накази та вимоги [old_controller.GetAdjective]ого уряду, оголосив місто відкритим. Очевидно, він прагнув захистити історичні пам'ятки й уникнути повторення руйнувань, яких зазнало місто в 785 році, коли імператор Ґровер II спалив його, щоби покарати аквілейців за повстання проти його правління. Проте надходили повідомлення про обмежений артилерійський обстріл перед тим, як нападники увійшли до відкритого міста, але, на щастя, знамениті бульвари та музеї залишилися неушкодженими." # (@)
 cityfall.31.a: "Мер — зрадник!"
 cityfall.31.b: "Ми проведемо парад перемоги на цих бульварах."
 cityfall.31.c: "Місто Світла загасили."

cityfall.32.t: "Падіння Карфіна"
 cityfall.32.d: "[This.GetNewspaperHeader][old_controller.GetAdjectiveCap]і захисники столиці значно поступалися чисельністю, і оборона здавалася марною, але [old_controller.GetLeader] заявив, що здача міста ворогу буде дозволена лише після того, як війська чинитимуть достатній опір, щоби продемонструвати: захоплення міста не було прийнято добровільно. Захисники використовували залишки стародавніх кам'яних стін навколо міста, але їх зруйнував артилерійський обстріл, за яким послідував лютий штурм найкращих [new_controller.GetAdjective]их штурмовиків. Оборону розгромили, і [old_controller.GetAdjective]им солдатам не залишилося нічого іншого, як здатися ворогу." # (@)
 cityfall.32.a: "Вінґбардія назавжди! Ми мусимо визволити місто!"
 cityfall.32.b: "Горе переможеним."
 cityfall.32.c: "Перлину Півдня було захоплено." # (@)

cityfall.33.t: "Падіння Єзераграда"
 cityfall.33.d: "[This.GetNewspaperHeader]До того часу, як [new_controller.GetAdjective]і війська досягли околиць Єзераграда, відомого також як «Озерне Місто», [old_controller.GetAdjective]ий гарнізон уже розгорнув сильну оборону, створивши численні барикади та снайперські позиції, а також розмістивши на озері канонерки. Загарбники здійснили кілька розвідувальних атак і вирішили, що їм необхідно викликати підкріплення. Далі відбулася серія атак на суші, в повітрі та на воді, кожну з яких відбивали завзяті та хоробрі захисники. Було здійснено останню відчайдушну атаку, яка дозволила прорвати оборону, чим швидко скористалися для роздроблення та знищення [old_controller.GetAdjective]их підрозділів. Тепер [new_controller.GetNameDef] контролює більшу частину міста, але гарнізон відмовляється здаватися, і в передмістях триває опір." # (@)
 cityfall.33.a: "Немає честі у здачі."
 cityfall.33.b: "Ці поні ох як уперті!"
 cityfall.33.c: "Часом ліпше просто визнати поразку..."

cityfall.34.t: "Розграбування Скайфолла"
 cityfall.34.d: "[This.GetNewspaperHeader]Коли члени [old_controller.GetAdjective]ого уряду усвідомили, що не зможуть підкупити ворожих солдатів і таким чином урятувати свій капітал, вони натомість використали гроші, щоб завербувати найманців і зміцнити оборону міста. Перші атаки [new_controller.GetAdjective]ої армії провалилися, тому що метрополіс обернувся в лабіринт смерті, тож вони надіслали найманцям повідомлення, давши їм пропозицію, від якої вони не зможуть відмовитися: якщо вони змінять сторону, їм буде дозволено розграбувати всю скарбницю Скайфолла. Перебіжчики швидко обернули хід бою на користь нападника, котрий використав елемент несподіванки на свою користь і розбив захисників. Послідувало масштабне грабування, адже найманці не тілкьи спустошили скарбницю, але сплюндрували й решту міста." # (&)
 cityfall.34.a: "Трясця цим жадібним зрадникам!"
 cityfall.34.b: "Можливо, й ми можемо трішки пограбувати..."
 cityfall.34.c: "Схоже, гроші не куплять вам перемогу."

cityfall.35.t: "Нова Скайнавія горить"
 cityfall.35.d: "[This.GetNewspaperHeader]Колись маяк надії для завзятих соціалістів-революціонерів по всьому світі, Нова Скайнавія пала перед безжалісним наступом [new_controller.GetAdjective]ої армії. Вигнані з-за своїх вуличних барикад, останні залишки [old_controller.GetAdjective]ого опору було цілковито розгромлено до того, як штурмові війська встановлювали [new_controller.GetAdjective]ий прапор над залаю Генерального конгресу Скайнавії.\n\nПоодинокі постріли й вибухи лунали по всьому місті: декотрі з його найбільш ідеологічно мотивованих мешканців продовжував бій проти загарбника з вікон своїх віталень, із балконів і підвалів." # (&)
 cityfall.35.a: "Нова Скайнавія буде знову вільна!"
 cityfall.35.b: "Ці скайнавці справді запекло билися."
 cityfall.35.c: "Північна Зірка більше не світить."

cityfall.36.t: "Падіння Клаудбері"
 cityfall.36.desc: "[This.GetNewspaperHeader]Бастіон грифонського республіканізму та колишня столиця герцогства, що носить його ім’я, — Клаудбері — впала під натиском [new_controller.GetAdjective]их нападників. Місто десятиліттями укріплювали президент-маршал Кемерскай і його союзники не лише для захисту від агресії контрреволюціонерів, а й від воєначальників, що правили в сільській місцевості. Тож спочатку [old_controller.GetAdjective]ому гарнізону було легко відбивати нападників, змушуючи ворога застосовувати нестандартні тактики для захоплення міста. Нічні рейди через річку, повітряні флангові маневри крилатої піхоти та різні спроби проникнення використовувалися одночасно, проте врешті-решт державі [new_controller.GetNameDef] довелося покластися на перевагу в чисельності та вогневій моці, щоби здобути гірко-солодку перемогу." # (@)
 cityfall.36.a: "Не можна вбити ідею, просто взявши місто."
 cityfall.36.b: "Кемерскаєвих прихвостнів буде зачищено!" # (&)
 cityfall.36.c: "Останній акт тридцятирічної п'єси."
 cityfall.36.d: "Ми вернулися!"

cityfall.37.t: "Падіння Бронзкройца"
 cityfall.37.d: "[This.GetNewspaperHeader]У перші години сьогоднішнього ранку місто Бронзкройц потрапило до [new_controller.GetHands_RO] [new_controller.GetAdjective]их військ. Після запеклих боїв за кожну вулицю останні [old_controller.GetAdjective]і війська відступили до Кар-Фріза — величного підземного палацу, розташованого в схилі гори Ґровер. Облогові гармати й інженери протягом кількох годин підривали стародавні ворота, але виявили, що палац був порожній, а багато проходів обвалилося.\n\n[new_controller.GetAdjectiveCap]ий прапор майорів на вершині 20-метрової статуї імператора Ґровера II, і бої над вулицями припинилися, але було наказано провести ретельні обшуки величезного підземного лабіринту міста, що, як очікується, займе кілька місяців." # (@)
 cityfall.37.a: "Вони можуть забирати поверхню, але ми живемо під землею."
 cityfall.37.b: "Знайдіть цих псів!"
 cityfall.37.c: "Ось тобі й «бийся до кінця»."

cityfall.38.t: "Падіння гори Аріс"
 cityfall.38.d: "[This.GetNewspaperHeader]Минулої ночі столиця гіпогрифів на горі Аріс пала під натиском [new_controller.GetAdjective]их військ. Кілька днів шаленого обстрілу перетворили вілли та зелені парки Гармонійних Висот на задушливі руїни, а вирви на землі, залишені бомбардуванням, зруйнували унікальну акустику, що означає: Висоти більше ніколи не заспівають. В інших місцях запеклі бої у ближньому бою на схилах гір перетворили вулиці на ріки крові, а цілі підрозділи були поховані під уламками міста, що відривалися під обстрілом і скочувалися з гори, наче лавини бруківки та зруйнованих будинків.\n\nКоли ворожі сили наблизилися до будівлі капітолію, [HIP.GetLeader] було евакуйовано через тунелі під горою. [HIP.GetLeader] поклявся продовжувати війну із Сіквестрії та відвоювати й відбудувати гору Аріс." # (@) — (&+): [HIP.GetLeader]
 cityfall.38.a: "Ми відбудуємо Аріс, навіть якщо це займе тисячу років!"
 cityfall.38.b: "Горя схиляється перед бурею."
 cityfall.38.c: "Світло згасло."

cityfall.39.t: "Падіння Кольтфагена"
 cityfall.39.d: "[This.GetNewspaperHeader]Цього дня стародавнє портове місто Кольтфаген було повністю захоплене [new_controller.GetAdjective]ими військами. Міський гарнізон, що здебільшого складався з міських ополченців, довелося силоміць придушити в короткому, але жорстокому бою. Нападники намагалися використати невеликі прибережні судна для атаки на знамениту гавань міста, але їх відкинув імпровізований флот військових кораблів. Тому район гавані атакували з суші, [new_controller.GetAdjective]і солдати прорвалися й увійшли до міста з гавані та систематично закріпили контроль над містом. Оборонці відступили до храму Заніт і продовжували битися, доки не втратили всю надію, а потім спалили храм навколо себе. Повідомлення про те, що переможці «засолили землю» навколо міста є, найімовірніше, неправдою." # (@)
 cityfall.39.a: "But the perishing still lurks In thy most immortal works." # (!): можна спробувати перекласти
 cityfall.39.b: "Засолення землі? Звучить як марна трата доброї солі..." # (&+)
 cityfall.39.c: "Що таке [old_controller.GetNameDef] без Кольтфагена?"

cityfall.40.t: "Падіння Нового Аякачтлі"
 cityfall.40.d: "[This.GetNewspaperHeader]Після надзвичайно запеклих боїв, що точилися вулиця за вулицею та будинок за будинком, місто Новий Аякачтлі нарешті впало під натиском [new_controller.GetAdjective]их військ. Незважаючи на криваві битви та запеклі сутички у ближньому бою, більшість захисників або билася до останнього, або ж ті небагато, хто цього не зробив, втекли, щоб уникнути полону. Тим часом багато районів рясно засіяні мінами-пастками й імпровізованими блокпостами, що створює додаткові проблеми для окупантів. Вже надходять повідомлення про [old_controller.GetAdjective]і осередки опору та рейдові загони, котрі ведуть партизанську боротьбу, порушуючи лінії постачання та закликаючи решту населення взяти участь у боях і чинити опір з усіх сил, а за необхідності — навіть ціною власного життя." # (@)
 cityfall.40.a: "Смерть загарбникам! Відбивайтеся, опирайтеся, повставайте!"
 cityfall.40.b: "Нарешті цю пошесть угамували."
 cityfall.40.c: "Кажанам вирвали їхні ікла."

cityfall.41.t:0 "The Fall of Panthera"
 cityfall.41.d:0 "[This.GetNewspaperHeader]Today the capital of [old_controller.GetNameDef] surrendered to the [new_controller.GetAdjective] armed forces. Only a few days ago, [old_controller.GetLeader] commanded the evacuation of the garrison and national government away from the city and instructed the mayor to maintain order and allow the enemy to enter. As such, the settlement was occupied without a fight and the local felines were relieved that the destruction suffered during the Storm King's invasion was not repeated. However, the cats did not feel jubilant as [new_controller.GetAdjective] soldiers marched in front of the vacant royal palace. There are scattered reports of ambushes and raids conducted on occupiers by unknown guerilla fighters, so the conflict is not yet over."
 cityfall.41.a:0 "It is us today. It will be you tomorrow."
 cityfall.41.b:0 "The city will be pacified by any means necessary."
 cityfall.41.c:0 "The cats can't catch a break, it seems."

cityfall.42.t:0 "The Eye of the Storm Falls"
 cityfall.42.d:0 "[This.GetNewspaperHeader]On this day, a momentous event has taken place on Zebrica, something many have only dreamed about until now. The capital of the old Storm Kingdom, the former home of the Storm King, has fallen. After overcoming the mountainous defences around the city, [new_controller.GetAdjective] soldiers have raised their flags and banners on top of the smoking ruins of the Storm King's former palace. According to preliminary reports, the palace was taken swiftly as it had not been designed to withstand an actual siege, but rather had been built as a grandiose display of yeti might. [old_controller.GetNameDefCap] has disputed the reports, claiming the capital to still be under their control, but no evidence for this has been provided. Meanwhile, impromptu celebrations are already said to be taking place all across Zebrica as the news spreads."
 cityfall.42.a:0 "The situation is under our control!"
 cityfall.42.b:0 "We have delivered just punishment for their sins."
 cityfall.42.c:0 "All of Zebrica sighs in relief."

cityfall.43.t:0 "The Fall of Ziani"
 cityfall.43.d:0 "[This.GetNewspaperHeader]The old capital of the Imperial Mazwi, which once ruled over all of the Great Lakes, has been occupied by [new_controller.GetAdjective] forces today. It is reported that the city fell without much of a fight as its few defenders fled. This marks an anticlimactic end to one of the former great powers on Zebrica. Because their army was destroyed by the Storm King, the [old_controller.GetAdjective]s had little chance of resisting against the attackers. With the city now under their control, [new_controller.GetNameDef] can claim to be the new dominant force in the Great Lakes region."
 cityfall.43.a:0 "No... it can't end like this..."
 cityfall.43.b:0 "As an old empire falls, a new one rises from the ashes."
 cityfall.43.c:0 "A final nail in the coffin."

cityfall.44.t: "The Fall of Solstice" # (!)
 cityfall.44.d: "[This.GetNewspaperHeader]A brutal and bloody assault by [new_controller.GetAdjective] troops on the Easterly Curtain ended amidst the ruins of the Round City, even as the kirin of Solstice contested every barricade, courtyard, and shattered building. Veteran bannerkirin fought with fanatical zeal alongside foals scarcely old enough for school. Elderly retirees returned to service, poking antiquated muskets and polearms from out behind rubble and overturned wagons. Holdout districts that refused to surrender were demolished by artillery fire and house-to-house combat. When [old_controller.GetAdjective] resistance finally collapsed, many defenders chose death over surrender. The banners of the [new_controller.GetAdjective] conquerors now fly over Solstice, but they do so above a city of bone and ash." # (!)
 cityfall.44.a: "The Ever-Valiant Redoubt is no more..." # (!)
 cityfall.44.b: "The slaughter has come home." # (!)
 cityfall.44.c: "They reap what they sow." # (!)

cityfall.50.t:0 "The Fall of Vermilion"
 cityfall.50.d:0 "[This.GetNewspaperHeader]The holiest of the kirin cities and the location from which the Kirin Matriarchs Superior had reigned for centuries, the city of Vermilion finally fell after a lengthy, draining, and brutal campaign of fighting in and around the city. The [old_controller.GetAdjective] defenders fought almost to the last, forcing the attacking army of [new_controller.GetNameDef] to invest heavily in clearing the city building by building. Despite one last desperate charge from the defenders in an effort to break the invaders' final offensive, resistance in the city had fallen into a disorganized mess by nightfall, and the presence of many nirik had shifted the army's attention away from rooting out the last of the defenders to attempting to contain the raging fires."
 cityfall.50.b:0 "The loss of Vermilion is an affront to Concord!"
 cityfall.50.a:0 "The fires will take days to put out..."
 cityfall.50.c:0 "Kiria was not ready for the perils of the modern age."

cityfall.510.t:0 "Changelings Seize Fragrance!"
 cityfall.510.d:0 "[This.GetNewspaperHeader]Advancing [new_controller.GetAdjective] forces in pursuit of routing NAKP troops were forced to halt upon encountering Changeling soldiers occupying key positions along the approaches to Fragrance. Reports out of Fragrance indicate that Changeling paramilitaries took control of the city once the capitulation of Fragrance was imminent. A Main Hive Industries representative stated that the Changeling forces were present in Fragrance to protect assets acquired as collateral in return for prior loans to the NAKP.\n\nWhile an indeterminate number of non-state actor changeling mercenaries were known to be fighting in Kiria, the Changeling seizure of Fragrance has the official backing of Vesalipolis — it is below the flag of the Changeling Lands that the Vespidae Korps ensign flies over Fragrance."
 cityfall.510.b:0 "I can't believe they've done this."
 cityfall.510.a:0 "We've been robbed of our prize!"
 cityfall.510.c:0 "Vesalipolis has a hoofhold on the Zebrican continent."

cityfall.51.t:0 "The Fall of Fragrance"
 cityfall.51.d:0 "[This.GetNewspaperHeader]The de facto capital for the moneyed elite of Kiria, the trading city of Fragrance capitulated to the forces of [new_controller.GetNameDef] after heavy bombardment and fierce fighting throughout its outskirts. Rather than fight on and resist the invading armies in the city itself, many wealthy businesskirin secretly brokered deals with the opposing commanders to turn over information and buy out brigades of the garrisoning forces in exchange for promises to spare their businesses and fortunes from looting and seizure upon the city's surrender. Time will tell if these deals will be honored, but many in the [old_controller.GetAdjective] armed forces rightfully view these kirin as having sold out their comrades in arms to make a quick buck."
 cityfall.51.b:0 "They shall pay for this treason!"
 cityfall.51.a:0 "A deal that worked for both sides."
 cityfall.51.c:0 "Selling out your country to save a few coins?"

cityfall.511.t:0 "Changeling Fragrance Collapses"
 cityfall.511.d:0 "[This.GetNewspaperHeader]As [new_controller.GetAdjective] forces entered Fragrance, the Changeling defenders abandoned their positions and melted away into the city, shedding their uniforms and adopting kirin disguises. With their Changeling leaders gone, the kirin collaborators deserted, defected or surrendered to [new_controller.GetAdjective] forces en masse. The collapse of authority resulted in bloody chaos, with mobs of rioting Fragrancese kirin hunting down and lynching any changelings caught out of disguise, or creatures suspected to be changelings. Most victims were not changelings, merely creatures in the wrong place at the wrong time. Some mobs that did succeed in cornering a changeling were subsequently dispersed in murderous attacks by changeling infiltrators hidden within the mob. As a pyre of hundreds of changeling corpses burn in the city square, [new_controller.GetAdjective] forces begin the arduous task of restoring order to Fragrance."
 cityfall.511.b:0 "An ignominious end to our Zebrikan venture."
 cityfall.511.a:0 "The black stain has been eradicated from Kiria."
 cityfall.511.c:0 "Vesalipolis has been dislodged from the continent."

cityfall.52.t:0 "The Fall of Verdant"
 cityfall.52.d:0 "[This.GetNewspaperHeader]The gateway to the Great Mellifluve river and a hotspot for revolutionary sentiment, the forces defending Verdant were forced into submission by the invading armies of [new_controller.GetNameDef]. The defenders had put up a stubborn fight, using the city's unique geography of its many islands spread throughout the fork of the Great Mellifluve to position soldiers and equipment to support each other during the enemy attack while using the river's waters to slow their movement. However, each island was silenced one by one in vicious fighting, and apart from a few pockets of stubborn resistance, the majority of the city is now under [new_controller.GetAdjective] control."
 cityfall.52.b:0 "We can't afford to lose the heart of the Great Mellifluve!"
 cityfall.52.a:0 "Finally, the kirin heartlands are open to us."
 cityfall.52.c:0 "The arteries of kirin riverine trade are now clogged."

cityfall.53.t:0 "The Tiger's Lair"
 cityfall.53.d:0 "[This.GetNewspaperHeader]Deep in the jungles of southeastern Zebrica, the Golden City was for the longest time thought a thing of myth. Today though, this myth has come true. Despite fanatical resistance from the local tribes, the armies of [new_controller.GetNameDef] have breached through the jungles and entered the fabled city. Reports indicate that discipline has broken down among the [new_controller.GetAdjective] invaders upon the sight of the solid gold buildings, and that looting is rampant even as the last natives are defending the central pyramid of the city where their priests are even now engaged in some kind of ritual."
 cityfall.53.b:0 "Protect the priests, buy them time!"
 cityfall.53.a:0 "It is like out of a fairy tale..."
 cityfall.53.c:0 "So those old legends were true?"
