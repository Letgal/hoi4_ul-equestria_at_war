 EQS_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_EQS_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЕквестрія жила в гармонії понад тисячу років під проводом принцеси Селестії. Держава нещодавно стикнулася з багатьма дрібними загрозами, але подолала ці труднощі з допомогою сили дружби та прощення. Однак обставини змінюються: вороги Еквестрії зібралися з силами й тепер стали серйозною загрозою. Миролюбна нація поні опинилася в новому світі з недругами на своїх границях, але також і серед самих себе. Як переживе Еквестрія тривожні часи попереду, і чи зможуть знову врятувати становище дружба та гармонія?"
 CHN_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CHN_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nП'ять років тому королева Кризаліс і її чейнджлінґи влаштували зухвале вторгнення з ціллю захопити Еквестрію та її столицю Кантерлот. На щастя для еквестрійців, закінчилося воно лихом. Ця поразка лиша посилила ненависть чейнджлінґів до поні. Скориставшися цим гнівом, Кризаліс успішно отримала майже всеосяжну підтримку своєї справи й об'єднала всі вулики під правлінням її одної. За її правління військо зазнало докорінного та стрімкого осучаснення з упровадженням сучасних озброєння, техніки та тактик. Настав час для нової війни, іцього разу чейнджлінґи можуть нарешті здобути остаточну перемогу над своїми ворогами." # (&)
 DED_GATHERING_STORM_DESC: "Ліга Жаху сотні років вселяла страх у серця Арктурійського ордену, але мало хто поза його лавами пам'ятає про існування цієї далечинної держави, сповненої живими мерцями та практиканами темних мистецтв. Темні маги Мейджголда нещодавно знайшли у глибинах стародавньої фортеці деяку «цікаву» літературу, яка стала осередком деякого... «культурного відродження» Ліги.\n\nСкоро світ згадає Темну Державу Півночі. І скоро він побачить її істину." # (&?)
 STG_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_STG_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nРадянська республіка Сталліонград, розміщена в еквестрійській північно-східній провінції Сєвєряна, тільки недавно відкололася від Еквестрії з надією утворити нове суспільство, в якому всі поні будуть рівні. На жаль, Сталліонград сьогодні далекий від свого засновного уявлення. Стрімка індустріалізація провалилася, а їжі бракує. Зважаючи на санкції з боку Еквестрії, загроза голоду дуже істотна. Правляча Комуністична партія, скута кризою керівництва, не здатна щось зробити. Сталліонград зможе вистояти супротив майбутньої бурі тільки після наступних виборів, коли партія вибере чіткого лідера." # (&?)
 OLE_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_OLE_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Оленія, домівка оленів, — це стара держава. Воно давно була провідною торговельною силою у своєму регіоні, але віднедавна політична нестабільність і корупція спричинили купу проблем. Нижчі класи суспільства страждають найбільше, а неспокій шириться швидко. Ситуація лише погіршилася з приходом до влади короля Югана «Дьєвулена» — незаконного та вкрай корумпованого лідера. Поточна законна спадкоємиця престолу, королева Вельвет, розробила плани повернути трон, але для цього потрібна допомога. Чи допоможуть еквестрійці королеві в біді? Чи поглинуть вогні революції вулиці Йортланда? Чи переживуть олені загрозу чейнджлінґів із півночі?"
 CRY_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CRY_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКристальна Імперія — нова держава на світовій арені. Дуже давно, вона зникла після перемоги над злим тираном, королем Сомброю, який наклав на неї прокляття. Імперія проявилася лише нещодавно, зарівно як і Сомбра, але врешті-решт Імперію звільнили з допомогою Еквестрії. Тепер, коли нею править еквестрійська принцеса, Мі Аморе Каденза, багато хто цікавиться, що зробить Кристальна Імперія в ці неспокійні часи. Чи залишаться кристальні поні вірними Еквестрії, або може до Імперії знову повернеться пітьма?"
 YAK_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_YAK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГорда раса яків завжди робила ставку на підтримці своїх традицій. Через це, їх ніколи надто не цікавила політика, хай вона зовнішня чи внутрішня. Однак, молодий принц Резерфорд нещодавно закінчив довгу ізоляцію яків і подружився з Еквестрією, що обурило яків сходу. Вони полишили Резерфорда й натомість підтримали його брата, принца Бредфорда. Тепер він веде бунтівний Йаки-клан і бажає взяти королівство собі. Розділені яки мусять об'єднатися, перш ніж стане запізно: на темному обрії формується хуртовина. Чи виживе їхній спосіб життя, або ж ця нова доба принесе нове управління?" # (&)
 JAK_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_JAK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГорда раса яків завжди робила ставку на підтримці своїх традицій. Через це, їх ніколи надто не цікавила політика, хай вона зовнішня чи внутрішня. Однак, молодий принц Резерфорд нещодавно закінчив довгу ізоляцію яків і подружився з Еквестрією, що обурило яків сходу. Вони полишили Резерфорда й натомість підтримали його брата, принца Бредфорда. Тепер він веде бунтівний Йаки-клан і бажає взяти королівство собі. Розділені яки мусять об'єднатися, перш ніж стане запізно: на темному обрії формується хуртовина. Чи виживе їхній спосіб життя, або ж ця нова доба принесе нове управління?" # (&)
 PNG_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_PNG_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНут-нут!"
 BUF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BUF_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nБізони володіють країною-анклавом у межах Еквестрії, яка протягом десятиліть поступово втратила значні землі. Їх очолює племінна рада, вождів для якої вибирають окремі племена, а ті, у свою чергу, вибирають очільника держави. Поточний вождь, Тандергувз, обачний і невпевнений щодо намірів поні. Його дочка-гармоністка Літтл Стронґгарт шукає тіснішу співпрацю, тим часом як давній Старійшина пам'ятає, коли бізони гасали всім південним заходом, і бажає повернення цих днів. Чи знайдуть бізони дім у сучасності, або може їх поглине час?"
 STL_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_STL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЦе маленьке поселення, сформоване Старлайт Ґліммер у спірному прикордонному регіоні між Нова-Грифонією та Сталліонградом. Однак після її поразки місто-держава, засноване на принципах абсолютної рівності, збилося з курсу. Старлайт таємно зберегла власну к'юті-марку, прибравши їх у інших. Коли Елементи Гармонії викрили її шахрайство, вона втекла й урешті-решт спокутувала свою провину. У наступні роки містечком керував Дабл Даймонд, колишній поплічник Старлайт, але його термін скоро скінчиться. Чи виграє він прихильність поні знову, або може його замінить хтось новий?"
 GRF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_GRF_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nІз розпадом Імперії Грифонів близько 30 років тому Нова-Грифонія вперше за 200 років опинилася незалежною. Однак, через надмірну залежність Нова-Грифонії від імперських промислових товарів і військового захисту Імперії вона сильно постраждала в останні роки. Її армії складаються з ополчень, заледве втримуваних своїми командувачами, економіка фактично розвалилася і, на додачу до цього, велика кількість дисидентів, яких стара Імперія надіслала на ці береги, стали активнішими та жорстокішими, ніж будь-коли. Єдина річ, яка досі тримає країну в цілості — це сама сила воля губернатора Тіфезера; але ніхто живе вічно..."
 GFF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_GFF_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЦю державу не визнає ніхто, окрім Нова-Грифонії, але Грифонячий Фронтир тішиться певним рівнем автономії від свого володаря. Однак країна далека від задоволення, адже її практично неіснуючий бюджет не здатен профінансувати свою індустрію, армію чи інфраструктуру. І тепер, як і в усі попередні роки, настав час губернаторові Маку відвідати Уетер, столицю Нова-Грифонії, та знову попросити кошти. Йому слід повернутися з хорошими новинами, оскільки в нього є багато ворогів, які би з радістю посіли цого місце..."
 WNG_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_WNG_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n30 років тому Вінґбардія вийшла зі складу Імперії та забрала з собою весь південь. Король пообіцяв їм майбутнє з постійним економічним ростом і процвітанням. Це не могли бути далі від правди.\nКолись найбагатші землі в Імперії, нині Вінґбардія перебуває у кризі. Хвороблива економіка, невдалий парламент за парлементом і дорога війна з Фалькором призвели до стрімкого росту політичного екстремізму. Фашисти на чолі з Джуліо Біколіні готують марш на Карфін, щоби відняти владу від невдалого парламенту, коли як антифашисти готуються до протистояти їм. Але король досі тримає всі карти у своїх пазурах..." # (&)
 EQC_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_EQC_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПісля падіння Імперії Грифонів економіка Нового Мейрленду опинилася в руїнах. Велика депресія з відсутністю еквестрійської допомоги призвела до образи на власну Батьківщину. Новопризначений генерал-губернатор Джет Сет — остання відчайдушна спроба Еквестрії навести порядок у скандальній колонії.\n\nАле оскільки майбутнє Еквестрії невизначене, а на горизонті маячить війна, Новому Мейрленду слід вирішити: чи стати пліч-о-пліч із Еквестрією, чи відплатити їм тим самим?"
 GRI_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_GRI_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nІмперія Грифонів, що колись простягалася по більшій частині континенті, вже давно відома як «хвора пташина Грифонії». Революція та корупція охопили імперію та її широкі землі, зломивши її частина за частиною. Сьогодні Імперії залишилася тільки частка своєї території, сповнена незадоволеними дворянами та простогрифонами. Очікується, що поточному імператорові, Ґроверу V, лишилося недовго, поки смерть забере його життя. Його єдиний спадкоємець на престол — неповнолітній, тож Імперія скоро зіткнеться з новою кризою. Чи переживе Імперія цю нову епоху? А чи внутрішній конфлікт розіб'є її назавжди? А може колишню славу Імперії можна відновити?..." # (&+)
 AET_GATHERING_STORM_DESC: "Графство Ґрайфвальд уже давно є державою, яка опанувала мистецтво балансування між багатьма силами на континенті грифонів, оскільки знаходиться просто посередині між Королівством Аквілея й Імперією Грифонів. Поточна влада Ґрайфвальду править уже довго, але графство тривожить багато проблем. Його мешканці бідні, а його армія та промисловість геть застаріли. І хоча нинішній режим докладає всіх зусиль, щоби зберігати стабільність, тут існує мала, але працьовита анархістська партія, яка може представити велику загрозу уряду. Але, що більш тривожно, по закутках шепочуться про великі амбіції та плани прелата Ебонвінґа..." # (&+)
 JER_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_JER_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Аквілея — одна з найстаріших держав грифонського континенту. Воно було й коли Імперія об'єдналася вперше, і воно одним із перших її покинуло. Але після того, що сталося, сама Аквілея пережила переворот і перетворилася на республіку. Але, так само як в Імперії, протривало це недовго. Однак республіка яскраво сяє в пам'яті грифонів — і це не єдина біда, з якою стикається Аквілея: відтоді, як Аквілея покинула Імперію, вона стала свого роду суперинком їй, і якщо Імперія колись спробує відживитися, Аквілея буде першою перешкодою на її шляху. Але чи буде Аквілея досить могутня, щоби протистояти їй?" # (&?)
 GRW_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nРух Прайвенської визвольної армії зродився в Королівстві Бродфельд. Запалений жорстокістю короля, революційний дух грифонів Прайвену надихнув упорядкування опору буржуазії. Рухові вдалося завоювати широку підтримку селян і робітників по країні. Спустошлива громадянська війна, більш характеризована партизанщиною, ніж повноцінною війною, триває вже два роки. Але тепер селяни та пролетаріат зібралися з силами, щоби зробити остаточний поштовх у роялістське кубло змій. Опісля Прайвен нарешті матиме шанс вирішувати свою власну долю." # (&+)
 MNC_GATHERING_STORM_DESC: "Ерівіар і його бандити Санстрайкера роками правили горами Уайттейл, збагачуючися за рахунок нальотів і грабунків їхніх сусідів-поні та -грифонів. Ставши такою проблемою, імператор був змушений розібратися з ними особисто. Імператор та Ерівіар тоді уклали пакт, за яким бандити будуть одержувати зброю, грифонячі ресурси та фінансування від першого в обмін на присягу вірності Імперії та дошкуляння республіканцям і поні. Однак цю можливість використало багато політичних дисидентів і опонентів, які переїхали до Уайттейлу. Сутички між цими силами може не уникнути." # (&)
 FAT_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_FAT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nРеспубліка Грифонів зародилася хаотичного 978 року, коли гнів на корумповану та розпусну регентську раду переріс у відверту революцію. Згуртувавшися навколо маршала Александра Кемерская, скоро республіканці взяли владу над Імперським Містом, однак після короткої та кривавої боротьби з прибічниками імператора новий республіканський режим був розбитий і вигнаний на північ, до колишнього герцогства Клаудбері. Хоч і обложена внутрішньопартійним конфліктом і безладом у сільській місцевості, спустошуваній воєначальниками, надія для республіки ще не втрачені. Свобода, процвітання та демократія знову прийдуть до Грифонії!"
 HLR_GATHERING_STORM_DESC: "Арктурійський орден — це стародавній священний орден, заснований навколо віри й ідеалів Дванадцяти Храмів, присвяених святості Священного Світла. Арктурійський орден був створений із єдиною ціллю: захищати живих від нечестивих мешканців сходу. Вони вконували своє завдання аж від того дня дев'ятсот років. Останні роки однак написали інакшу історію, адже на Півострові Жаху щось не те. Прикордонні нальоти зросли в частоті, а єдинороги в ордені відчули, як темні енергії збираються за межами кордонів. Дванадцять Храмів уважають, що вони готові пережити бурю. Однак питання: чи справді готові вони до цього?" # (&?)
 BAN_GATHERING_STORM_DESC: "Бандити Блекрок — це злочинці та найманці, які об'єдналися, щоби розграбовувати села, спустошувати ферми й обкрадати ніщо не підозрюючих ворогів. На вершині бандитського харчового ланцюга стоїть сама Блекрок. Але в бандитському королівстві Блекрок не все гаразд. На сході, у Прайвені, підіймаєтсья нова комуністична сила. На південному заході Вінґбардія збирає сили й може вмить ударити по Блекрок. І якщо Імперії на півночі колись удасться знову постати великою державою, як колись... то це може стати ранньою смертю для бандитів Блекрок. Але бандити не плачуть чи трусяться, адже вони борються до самої загибелі!" # (&+)
 FAL_GATHERING_STORM_DESC:0 "Ravaged by a devastating war that ended nearly two decades ago, Falcor lies in a precarious position nested between other great powers. The ruling Princess and her husband do their best to placate an angry populace, but the desire for revenge against the hated Wingbardians trumps all reason and logic. With meager resources and little potential allies, the griffons of Falcor will need to provide an exceptional effort if they wish to see their nation survive the looming storm."
 ARA_GATHERING_STORM_DESC:0 "The small Barony of Arantiga is home to a rich history. It was the birthplace of an ancient empire which stretched most of Griffonia. Led by Arantigos Featherin, the Arantigans ruled much of the world. However, the Empire collapsed and the Barony is all that's left. It has managed to weather the economic hardship of the Groverian Empire's collapse by tying itself to Wingbardy, but with the southern Kingdom now failing itself, Arantiga must decide if it should remain dependent on the south. Politically, some want to reform the barony into a normal state, based on ideology. However, Dorotheos, a promising general and descendant of the great Featherin, dreams to recreate the ancient Empire."
 FRE_GATHERING_STORM_DESC:0 "Nestled among the mountains of South East Griffonia, the Ponies of the Long House live simple lives of peace and harmony. An alliance of many small pony Clanns and holy monasteries, Pònaidhean has little interest in the outside world, but the newly elected Crimson nic Heart sees storm clouds gathering over Griffonia.\n\nWith an uncertain future, Pònaidhean must modernise or be left behind. But Pònaidhean and Crimson knows that any change risks upsetting the supernatural forces that also call their hills home."
 LCT_GATHERING_STORM_DESC:0 "The frontline against the Griffons, Lake City has always had a tumultuous history. Lake City was once the capital of a united River Lands, however years of internal unrest and griffon attacks have worn down the great city to a battle-hardened and bitter nation. But all is not well within the nation. Grand Mayor Springtime Frost took power after his predecessor was assassinated by disgruntled army officers, yet another victim of the division that runs deep through Lakeish society. With the upcoming elections, the ponies of Lake City hope it will be a time for change, but there are those who see the elections as an opportunity to further their own goals."
 NCH_GATHERING_STORM_DESC:0 "Greneclyf is a harmonious land of changelings, led by Queen Gytha of Clann Leamhan. The latest of an 800-years-old dynasty, Gytha has adhered to the old philosophies adopted since the times of the First Sharing. These have ensured a peaceful, if monotonous rule.\n\nBut there is change in the air, and the Queen can sense it approaching fast. Her people are ill-prepared for the oncoming storm, and Greneclyf is in need of new relationships with the continentals. The ponies of the River Coalition should be good allies, but having never met changelings before, Greneclyf must put its best hoof forward..."
 WIT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_WIT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAn ancient Kingdom of unicorns and magic, Wittenland is proud of its meritocratic tradition, where the monarch is selected by a magical duel and not inheritance. Yet over the centuries the Kingdom stagnated and became a mere shadow of its former self, its mighty mage-nobles content to live in their mountain castles. But times are changing, and Wittenland must change as well. Everypony has different ideas on how exactly it should change, so the reigning Queen and reformer, White Star, must navigate the perilous intrigues of Wittenlandic politics if she hopes to save her nation from ruin."
 NIM_GATHERING_STORM_DESC:0 "Since ancient times, Nimbusia has been a democracy ruled by a pegasus warrior class. These stalwart ponies are some of the best trained soldiers in Griffonia, but require a large class of helots to produce for them. The democratic nation has reached turbulent time. Split between those who seek reform, those who want to abolish democracy and those who defend tradition. A smart and wellspoken politician will be able to take advantage of the situation to win over the hearts of the Nimbusians."
 DMT_GATHERING_STORM_DESC:0 "The vaults of the King of Diamond Mountain are empty, having been robbed clean by griffon knights. The nation of dogs must rebuild, so that King Rover Diamondshield can seek revenge against the thieves. However, trouble is brewing in the underground as slaves seek to revolt. How the dogs of Diamond Mountain deal with this unrest might change their society forever..."
 LUS_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГрифони Люші довго притримувалися своїх відсталих шляхів. Країна розділена між могутніми лордами, які правлять своїми кріпаками. Ці кріпаки досі прикуті до своєї землі і здебільша неосвічені. Однак молодий князь, Еліас, бажає реформувати князівство, розібравшися з лордами та звільнивши кріпаків. Але його брат Жерар має на державу інші плани, якщо йому вдасться прийти до влади..." # (&?)
 HLQ_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HLQ_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nStalwart defenders of the eastern frontier, the knights of Hellquill have stood long as the Empire's protectors against the Riverpony incursions. But these oaths broke after the Empire's collapse 30 years ago, and now the Hellquillians stand independent, closely tied to their allies in Longsword. The current Grand Master of the Order is old and set to retire soon, and with it, change might come to Hellquill, for the better or worse..."
 LNS_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_LNS_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nA staunch ally of Hellquill, the small County of Longsword has weathered many assaults from the Riverponies, but they've stood together against the tide, as battle brothers in their separate Knightly Orders. But since they've gained their independence from the Empire, Longsword has enjoyed relative stability until Count Pallas Dusktalon invited members of the Reformisten, a radical group from Hellquill, for assistance against the ponies. Slowly, they've gained power across the entire nation, and now they've begun the cleansing of Longswordian lands from anyone deemed impure, especially ponies..."
 RCT_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_RCT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nВелика принцеса Софт Уотер була останнім самодержцем Рієкограда. Вона не мала спадкоємця й забажала уникнути кризи спадкування, тому віддала всю свою владу демократичному парламенту. Після її смерті в 814 році, Рієкоград став Річковою республікою. Відтоді держава тішиться епохою миру та процвітання: вона стала засновницею Коаліції та стала центром торгівлі Річкових земель, із усіх боків захищена горами. 1001 року молода єдиноріжка на ім'я Ривер Свірл стала канцлером. Під час своєї першої каденції вона осучаснила Республіку, обернувши її на найрозвиненішого члена Коаліції. Однак ріст має свою ціну, а соціалісти на чолі з Нова Вірл швидко набирають сили..."
 BRF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Бродфельд — молода держава, чия нещодавня історія повна страждання. Грифони Прайвену пережили багато лих від Великого голоду 995 року до тепереішньої громадянської війни проти комуністів-революціонерів. Дехто шукає спасіння в королі та допомозі богів, поки інші сподіваються на реформи, які обернуть королівство на конституційну монархію, однак усі вони борються проти червоної загрози, котра бажає скасувати все, що їм дороге. Вони можуть сподіватися на підйом своєї країни з попелу, наче фенікс, тільки якщо переможуть." # (&+)
 SRS_GATHERING_STORM_DESC:0 "In the frigid, snowy tundras of the Griffonian far north, the Socialist Republic of Skynavia stands as a shaky bastion of egalitarianism, liberty, and socialism in a world that grows darker by the day. Created upon stolen pony territory by exiled socialists in the aftermath of the failed First Griffonian Revolution, the Socialist Republic must strive to maintain their hard-fought freedoms and liberties at home, whilst protecting the dream of a socialist Pan-Griffonia from the forces of reaction that surround and threaten the Republic on every front. Will the Republic finally achieve their utopian ideals in the years to come, or will it crumble under pressure from within and without?"
 VED_GATHERING_STORM_DESC:0 "Vedina is a nation with a hard-fought independence, having long kept both Imperial influence and revolutionaries at bay through careful political maneuvering. Its famous knightly institutions that have been a part of Vedina since it's birth have always been ready to defend the borders of their Kingdom. But problems arise as a succession crisis pokes its head into Vedina. King Wingstrom's daughter is not fully ready to rule and she must prove herself if she wishes to become the Queen of Vedina. But what type of Queen will she be? That remains to be seen."
 GRU_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nМинуло небагато часу відтоді, як вільні міста Ґрифусу відновили свою золоту свободу від деспотичної Імперії, але незгода всередині вже загрожує країні та її цінованій волі. І фанатичні лицарі з Герцланду, і сікамеонська купецька компанія борються за більшу владу, мало переживаючи за бажання самих міст. Щось треба вдіяти скоро, інакше цю свободу буде знову втрачено..." # (&+)
 CYA_GATHERING_STORM_DESC:0 "Once loyal servants of the Empire, Cyanolisia is now stranded, its duty of keeping the minotaurs in check inside and outside their borders growing more difficult each day. The Countess is confident her loyal soldiers will not give up, even as conspiracy spreads among their ranks. Across the gulf, revanchist Asterion gears for war, and Cyanolisia must do everything it can to prepare."
 MIT_GATHERING_STORM_DESC:0 "The minotaurs of Asterion have grown tired of serving under despots and tyrants and have broken their shackles. Yet the Restoration War failed to claim the mainland, where hundreds of thousands of minotaurs still suffer. Decades have passed since the war and some have turned to more radical ideas as an unusual coalition forms between fascists and communists, yet all minotaurs still agree on one thing: Death to monarchists!"
 SIC_GATHERING_STORM_DESC:0 "The federation of Sicameon is a country of free griffons, with not a single noble or knight in sight. Nevertheless they have managed to found a stable and prosperous nation, with solid democratic foundations. But they are militarily weak, and as a tropical storm gathers, everyone in Sicameon knows something must be done. But what exactly? No agreement has been made so far, and it must be done soon as elections slowly approach."

 STW_GATHERING_STORM_DESC:0 "The Strawberry Duchy is a place of wine and culture to much of the Griffonian elite, and its ruling family has long been second only to the Imperial lineage of the Grovers. It is the fiefdom of Duchess Gabriela Eagleclaw, and was one of the great champions of the empire during the revolution. Still, not all is well in the Duchy in these days. The Duchess has spent more and more time away from her fiefdom to be in Griffenheim, and some among her subjects wonder if she's forgotten about them. Maybe the time has come for Strawberry to assert itself beyond the duchess' reach? Or maybe dark clouds will gather and Strawberry once again will rise to be the bastion of loyalty it always has been?"
 ANG_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ANG_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAngriver, located in the vast Scheißwald Forest, has always been one of the poorest and most backward regions in the Empire. The dense forest provides refuge for monsters and bandits, as well as impeding development in the region. During the Revolution of 978, Baron Leer remained in control thanks to the support of Großmarschall Stoiber, but since then the two have grown distant, with Stoiber coming to disdain Leer's cruelty. Today, the Baron's grip over his land is threatened by Republican remnants, Anarchist rebels, and other shadowy conspirators. With so many groups straddling for power, Angriver's path forward is far from certain."
 PYT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_PYT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe farmlands of Greifenmarschen were once ruled by a despotic Duke, who was overthrown by the local peasants. Because he had been Emperor Grover I's enemy, they were rewarded with autonomy as long as they remained loyal to the Empire. Thus the Peasants' Republic was born and has continued to exist to this day without much change. A direct democracy with elections every 3 months and referendums held on everything possible, it is highly democratic but also cumbersome. Yet so far, Greifenmarschen has had no need to rapidly change or adapt and has remained content in its rural paradise. That will soon change. Permanently."
 BRZ_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BRZ_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nIt is said that the only beings the Emperor can trust are the diamond dogs of Bronzehill. In 792, Emperor Grover II granted the Bronze Mountains to a group of ex-slaves fleeing Diamond Mountain. Since then, the County of Bronzehill has grown and prospered as a loyal subject of the Empire. However, the collapse of the Empire and the republican uprisings of 978 have taken a toll on its economy, which finds itself more and more in the claws of foreign investors. Resulting tensions have led to more and more dogs questioning the absolute rule of the count. With the health of Grover V rapidly declining, the hounds of Bronzehill are anxious for what the future might hold."
 KAT_GATHERING_STORM_DESC:0 "Though situated nearly in the empire's backyard, Katerin is a place struggling to stay afloat in the modern era. What blessings they once had were undone by two great ills. First was the revolution of 978 that saw nearly all of the ruling von Katerinburg family killed as well as much of the city of Katerinburg destroyed, and second was the sole surviving heir to the throne, the crazed Diellza von Katerinburg, whose capricious and brutal reign has left the nation teetering on the brink. Will Katerin rise above its dark past, or will it be choked under the iron claw of its mad princess?"
 YAL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_YAL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nYale is a nominal vassal of the Griffonian Empire. Having served as the academic centre of the Empire for generations, with Yale's Rectors eventually taking over the nation. However, as the Griffonian Empire declined over recent years, friction has emerged in the Yale Rectorate. Yale lacks a strong national identity and with the Emperor sicklier than ever, societal divides are deepening. The country's leader, Rector Mikusian, seeks to lead a moderate course, while revolutionary and reactionary universities try to mobilise the discontent in Yalish society for their own purposes. Will the light of Yale shine bright in the darkness, or will it be snuffed out like so many places of learning before it?"
 FEA_GATHERING_STORM_DESC:0 "Troubling times have come to the Duchy of Feathisia. Currently ruled by Duke Gerlach IV, who brought about constitutional reforms and prosperity to the nation, disaster hit with the collapse of the great Griffonian Empire and the war that followed. The final blow was struck when Skyfall drove the Feathisian companies out of their markets, leaving the economy in shambles. With poverty rising throughout the country and confidence in the status quo at an all time low, radical socialist and nationalist groups have been gaining power in the turmoil. Can the situation be returned to normal, and Feathisia remain the nation it is? Or will drastic measures need to be taken?"
 ROU_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ROU_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe city of Romau has for the longest time been an area of political neutrality. As the last remaining Imperial Free City, Romau enjoys greater amounts of economic freedom and military protection than other vassals of the Griffonian Empire. This has caused the City to also become quite dependent on the Empire, however, and its political structure might not survive any further troubles in their main investor and protector. Dark times loom over the Empire, and its fate could very well become the fate of small, little Romau."
 TRD_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TRD_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nIn the Trade Federation of Skyfall, the wealthy dominate and pay little heed to the Empire, their former overlord. Its ruler, Iron Chancellor Guichard, has ruled the federation since its foundation, having driven out the Imperial garrison and seized the Imperial Navy. But Guichard is an old griffon, and it is clear he doesn't have much longer to live. The oligarchs see their chance to succeed him, the oppressed workers prepare of revolution, his young niece dreams of democracy, and in the shadows others conspire with the Archons of Griffenheim..."
 FEZ_GATHERING_STORM_DESC:0 "Like neighbouring Skyfall, Fezera is a prosperous trade port in western Griffonia and birthplace of the iconic Griffonian Fez. However, unlike its rich and famous neighbour, its choice of independence during the Griffonian Revolution didn't produce a golden age. Rather, the city decayed, mired in political turmoil and mobster activities from the penose with only the tireless Fezeraanse Politie preventing total chaos. But one griff rose to the occasion, the Skyfall-born Gwenaël Godard. Following a tumultuous election, he promised to restore Fezera to greatness. Of course, he has absolutely no ties to the smugglers and penose himself despite what some in the Politie claim."
 FLO_GATHERING_STORM_DESC:0 "The small but immensely wealthy city of Flowena has managed to secure its independence from both Aquileia and the Empire. Rich bank-owning patricians rule the city with little regard to the common workers, choosing the mayor from amongst themselves. The current mayor, in fact, does very little ruling and a great amount of partying. But recently something has changed about him. He now has greater ambitions, and plans to reveal them to his fellow citizens soon..."
 AVI_GATHERING_STORM_DESC:0 "House Avian was once part of the much larger Duchy of Verenia. Its rule was relatively prosperous despite linguistic issues. However the Griffonian Revolution devastated Verenia, leaving many of its members dead and leading to a succession crisis between the House Eyrie and Erie branches of the Duchy. Lady Katrina Avian chose to stay out of the conflict and broke off with what is now known as House Avian. Unfournately this left the succession crisis in a stalemate and the linguistic divide only grew deeper. Will House Avian manage to unite the divided realm and survive through the upcoming storms? Or will it remain a footnote of history in the rise of some greater realm?"
 HAU_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HAU_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГаукленд — одна з численних держав-уламків, що виникли після розпаду Грифонської Імперії. Очолюваний ексцентричним льотчиком-асом Германом Маєром, він стоїть на роздоріжжі між Грифонією та Еквусом і став осередком піратства, до того ж піратів із підтримкою з повітря, не менше. Незважаючи на свій статус воєначальника, Маєр править державою як доброзичливий диктатор, задовольняючись тим, що залишає людей у спокої, поки вони не зазіхають на його владу і дозволяють йому його витівки. Роками він дозволяв Гаукленду плисти за течією, залишаючись у безпеці та процвітаючи у свій унікальний і рудиментарний спосіб, але тепер йому, здається, набрид статус-кво. А гауклендці знають, що Маєр ніколи не буває таким небезпечним і непередбачуваним, як тоді, коли йому нудно."
 LAK_GATHERING_STORM_DESC:0 "The tiny island Barony of Rumare is considered by many to be a paradise rich with history, having avoided the devastation wrought by the collapse of the Empire. But the culture and language of the locals may soon become part of that history, becoming a fading memory as the Herzlander culture overtakes them. The new Baron, Alaric, a former mercenary who has returned to his home to succeed his late father, is determined to save his dying heritage before it is too late and restore his nation to its former glory. Rumare am byth!"
 NCR_GATHERING_STORM_DESC:0 "War. War never changes.\n\nA world untouched by the horrors that had befallen the Earth. A true paradise. That is what Equestria is to the NCR. The portal that links these two worlds was only recently discovered but the NCR was quick to seize upon securing this land. Now, the NCR Expedition is a prized jewel in a republic that spans two worlds. But their arrival isn't welcomed by all. Blood was spilt for this land and many strange new ideas come with the travelers through the gate."

 BAK_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAlong the northeastern shore of Griffonia, the ponies of Bakara sail the seas, trading with their neighbours and collecting the ocean's bounty as they have for countless generations. Beyond taking pride in their mastery of the waves, Bakarans are proud of their ancestral homeland for being one of the oldest Republics in the world, standing as a beacon for democracy and justice. However, this year's upcoming election has become highly contentious, with the campaign already having seen unprecedented levels of political violence. Will Bakara stay on its course, or is it time to break from the past and forge a new order for the Riverlands?"
 BAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe cursed land of Barrad is ruled over by Ambrosius, a pony fattened by decadence and luxury, but who tired of such conventional extravagance and turned to dark magic to sate his curiosity. After a horrific and inexplicable cataclysm ravaged Barrad, there were none able to challenge the rule of the self-proclaimed Count Ambrosius, and now the Mad Count torments his subjects for his own entertainment, aided by four ambitious travelers tempted by his offers of power and forbidden knowledge. Together they form the Pentarchy, and they conduct their research and experimentation with no ethical strings attached."
 OLV_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_OLV_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЕйстюрланд розташований у східних межах Грифонії і вирізняється тим, що є єдиною країною на континенті з більшістю оленійського населення. Країна берсерків і вікінгів, Ейстюрланд століттями залишався фактично у феодальному стані. Але така ситуація не може тривати вічно, і потрібні нагальні реформи, якщо Ейстюрланд сподівається стати чимось більшим, ніж просто державою-залишком на краю континенту. Сходження нової ярлскони, Іґрітте, дало можливість для реформ, але її особистість та минуле залишаються загадкою."
 ZES_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZES_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНароджена з повстання рабів, Вільна держава Каза існує на берегах південно-східної Грифонії вже майже століття. Готова захищати свою важко здобуту свободу копитами й зубами, Каза стала притулком для віттенлендських кріпаків, ейстюрлендських трелів і ґрифуських кабальних слуг. Оскільки її поважна лідерка, Мансу Ерба, старіє, постало питання: хто візьме на себе керівництво цією державою-притулком, коли її вже не буде? Чи зможе маяк свободи продовжувати сяяти, чи він згасне в темряві прийдешньої епохи?"

 FRN_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_FRN_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe County of Francistria has always found itself between two spheres of influence, those of Aquileia and Wingbardy. Founded by a member of the Discret dynasty, the nation has nevertheless formed close ties with the Karthinian Pact. After the fall of the Empire, Francistria took advantage of the alliance and the Aquileian revolution to seize Tarrin, a land they had claimed for a long time. But after the Falcor War everything went downhill. The Count died and his heir became a puppet of the nobility, Wingbardy is in crisis and Tarrinians resist the occupation fiercely. Can the small nation survive these dark times, or will it be swallowed up by greater powers?"
 TAL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TAL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nSince time immemorial, the Talousians have been safeguarded by their mountains, which have kept out countless invaders and foreign influences. When Wingbardy seceded, Talouse was quick to join them, and the Karthinian Pact seemed to promise endless prosperity. However, the Falcor War, and its fallout, shattered that belief. The economy, once one of the most prosperous in Griffonia, is now in a seemingly endless decline, and the population grows more radical by the day, as both the socialists and the Fetivolists clamor for their attention. As the situation grows ever more out of control, will Talouse manage to come out of hiding and face the world, or will it perish from its cowardice?"

 HIP_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HIP_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГіпогрифія — це домівка гіпогрифів і морських поні. Це – гармонійна абсолютна монархія, яка досі відновлюється від років ізоляції під морськими хвилями. Королева Ново захистила свою країну під час Війни Шторма, однак дехто вважає, що вона могла би зробити набагато більше, щоби зупинити спустошення з боку Короля Шторма. Але навіть поки королівський двір вагається в питанні мінливого світу та врівноважує вимоги міжнародної дипломатії й ізоляціоністів у себе, сюди проникають нові ідеї. Республіканізм і навіть комунізм переживають зліт, і ще належить побачити, як відповість королеа. Чи збереже Гіпогрифія курс гармонії, чи прийме екстремальні ідеї лівих, а може впаде в реакцію, щоби уникнути їх?" # (&)
 TBK_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TBK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nTobuck is a city more than it is a state, a tiny piece of territory taken away from the Zarantian tribes by the Storm King during his reign of terror. Gun runners, opportunists and the warlords on their payroll have taken over the scrap of land in his absence, making the city and its surroundings a haven for the most deplorable of creatures. It is a prize seemingly open for the taking as much as it is a place of opportunity all on its own; that is, so long as whoever takes control can keep the young nation alive..."
 BAT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAfter the failure of Nightmare Moon's initial rebellion, many of her supporters fled Equestria, seeking a place to rebuild and rearm in secret. Now, the lands of Zebrica play host to Chiropterra, an ultra-militaristic slaver state that seeks to bring about Her return. Through worship of The Nightmare and the possibility for generations of slaves to achieve full citizenship, they have augmented their numbers and promoted fierce doctrine of might and belief. Given the decades the Imperial Legions have had to plan and prepare, their swift assistance to the Nightmare is assured if she should rise, but will their aid be enough in bringing Her to power?" #Mara
 #MGY_GATHERING_STORM_DESC:0 "Maregypt has an ancient history stretching back many millennia: Its Old Kingdom reached glorious heights and built grand monuments, but eventually fractured, falling to Saddle Arabian conquerors in 567 and languishing for centuries under foreign rule. After gaining independence in 987, Maregypt prospered; but the good times were cut short when the Storm King invaded, pillaging the land and leaving countless ponies starving and disillusioned. However, it was during this bleak time that Somnambula—Maregypt's great heroine of legend—was freed from Limbo after centuries of absence. Her miraculous return has given ponies fresh hope for the future, but how long will that hope last?"
 ZAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nZarantia is a new player on the world stage, having been born only fifty years ago after the Imazeeb tribes liberated the city of Tobuck. This state was meant to be a union between Ponies and Zebras, a compromise between the strength and security provided by unity and the ability to preserve their traditions. These ambitions, however, were badly wounded after the rampage of the Storm King and the fall of Tobuck to foreign criminals. The tribes have retreated to their old lands, and there they now prepare for the day they can reunite with their pony sisters and brothers. If it happens peacefully they will rejoice. If they must reclaim it with force they will not hesitate."
 CTH_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CTH_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nMighty Colthage, a great nation rocked until recently by the assault of the Storm King, weathered the great trial. Now Zalathel Zarca has been elected to lead the nation to glory, having been duly appointed by the Senate despite claims of tampering, corruption and rigging the election. He seeks to rebuild the country in order to reclaim its ancient glory of ages past. However, a number of powerful factions are on the rise, and seek to carve their own claim to power. Others wish to nullify the corruption of Zalathel's rule, and restore things to the older days of the Republic, whilst some in the east cry out for land reform and increased autonomy. Can Zalathel persevere, or will Colthage collapse under the strain?" #Mara
 CTL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CTL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe heirs of the ancient Viking Sea-Kings, the Olenians of Chital now face a threat to their cultural and political hegemony greater than any Southern revolt or religious awakening: the dissent of their own Yaril. Benjen V, newly coronated following the death of his brother and father, formed the Council of Seven to assuage concerns of open revolt from Chital's native Hindians, but the council now stands on the edge of open revolt itself. Southern schemers, firebrand reformists, and an aging bureaucracy all grapple for the Kind Viking's approval, all the while extremists of Northern and Southern stripes plot his demise. Can Benjen and his council survive, or will they fall like the Deerlaw before them?"
 WAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_WAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nNestled away in the western fringes of Zonicia, the kingdom of Warzena has persevered for millennia. However, recent events have shaken the kingdom to its core. The Storm King's invasion has devastated the nation, robbing it of its riches and its king, leaving his brother to pick up the pieces. Meanwhile, anti-monarchist elements are making their move to overthrow the ancient regime and deliver the country into the light of the present, while threats mount on the nation's borders. Will the king manage to hold on to his crown, or will his enemies finally wrestle control of the nation from the clutches of the past?"
 HEL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HEL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nTwenty years after the revolution of outlaws, partisans, and Old Believers that liberated Adelart from the yoke of the Greifwaldians and their Aquileian overlords, Adelart and its green glades once again stand at the precipice of subjugation. Beset by internal strife and haunted by the impending return of its former sheriff, hardened in his own twenty years of exile, the fractured coalition of zealots, believers, idealists, and merry griffs must become something more than just a bandit confederation held together by sheer force of will... or convince their citizens fraternity transcends all boundaries after all."
 SLC_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_SLC_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nDespite the talent and prowess of the Storm King's generals, few of them had the political influence to vie for the throne once he passed. Most that did had already carved out kingdoms of their own across Zebrica, leaving the rest to return from Hippogriffia in shame. There was however one who never gambled their every victory only to experience the shameful defeat at Ain Trotgourait. There was one capable enough to manage a majority zebra region without a revolt. There was one who foresaw the catastrophe that would befall the kingdom.\n\nThere was Ibyz Icepaw."
 PLB_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_PLB_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНа північних берегах Еквуса білі ведмеді нещодавно об'єдналися в сучасну цивілізацію. По Уеллінгтон, могутній воїн, який об'єднав клани, незабаром почне свій п'ятий рік правління. Проте його становище залишається хитким, і клани все ще невдоволені його владою. Але з чейнджлінґами на південному заході їм, можливо, доведеться навчитися співпрацювати. Чи зможуть ведмеді вистояти і уникнути завоювання своїми стародавніми ворогами?"
 KIR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_KIR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nA century ago, the Silence was decreed to save Kiria from the chaos and strife of modern civilisation. Today, the Silence has been lifted, and the Realm emerges from its self-imposed isolation into a world even more dangerous and unstable, fraught with hostile ideologies, predatory empires, and war. To realise her dream of an open and prosperous Kiria, idealistic Premier Autumn Blaze must use all her skill and wits to lead her kirin out of the dark past and through the turbulent present. The Realm must stand united against the centrifugal forces unleashed by the unbridled dash for national modernisation. Fail, and the ensuing Cacophony will make the kirin yearn for the quiet of a new Silence."
 SON_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_SON_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nEnslaved by the Imperial Mazwi for centuries, Zar-Hay was quick to regain its freedom after the Storm King's invasion. But the Kingdom has no monarch to rule it, because the rightful rulers are nowhere to be seen. As such, Regent Zonni leads the country, and has sworn to forge Zar-Hay into an empire that will never again suffer from the yoke of foreign rule. No one knows if he will succeed in pursuing this lofty ambition, but it is certain many will die."
 HYE_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HYE_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nThe Qaylidi Dervishes have lived and fought in the deserts since before the Storm King, and though the yeti invasion launched them from 'cultists in the desert' to 'the last resistance', they have kept up their relentless struggle under the guidance of the Fahamka, the Great Teacher. Poised to go on the offensive and reclaim their homeland, the question is what will happen to the once decadent Queendom of Hyenia if they triumph. The Qaylid teaches that the past is a trap and that the virtuous walk ever forward towards the future though, and the Dervishes are committed."
 ABY_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ABY_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Абіссінія — це давня батьківщина абіссінської раси, розумних, прямоходячих котів, які вміють розмовляти. Воно процвітало майже століття після Пазуромонської реставрації, зумівши частково індустріалізуватися завдяки допомозі Вінґбардії. Але, як і в багатьох інших куточках Зебрики, вторгнення Короля Шторма спустошило країну. Тепер її король надто меланхолійний, щоб ефективно правити, відносини з Вінґбардією загострилися, претенденти на трон плетуть інтриги в тіні, а раби стають дедалі неспокійнішими. Абіссінія пережила перше тисячоліття, але чи переживе вона друге?"
 KXN_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_KXN_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nBetrayed and abandoned to the Silence, the Lan Kir were forsaken to the fringe of kirinkind. The Realm of Kiria paid no heed to their struggle, sealing itself within a hundred-year isolation. The Ever-Valiant Ten Thousand had no choice but to endure, keeping a long vigil on the kirin frontier as Kiria slumbered. A century has passed since then. Matriarch Superior Rain Shine has lifted the Silence. The Lan Kir, too, must make ready to meet the new age with ferocity and devotion — to make the world safe for Kiria and kirinity."
 ZOO_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZOO_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nIn the wake of the disastrous Zongo-Zeblu war and the death of its king, the young heir Akida was sent to Senturya to ensure his safety. Rising to regent as Akida studied, Queen-Mother Nzuzi has maintained stability, upholding traditional ways alongside the advisory council of Zongo's chieftains, the Mani, and the recently centralised Faith. Yet with Akida's graduation fast approaching, the prince's return heralds the ideas of modernity he experienced and embraced while abroad. The extent of his vision remains a mystery, but all in Zongo sense that change – for better or worse – is on the horizon."

