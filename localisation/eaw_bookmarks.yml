 HIGHLIGHTS_ZEBRICA: "Зебрика:"
 FIRST_CONTENT_FLAG:0 "§LDespite the talent and prowess of the Storm King's generals, few of them had the political influence to vie for the throne once he passed. Most that did had already carved out kingdoms of their own across Zebrica, leaving the rest to return from Hippogriffia in shame. There was however one who never gambled their every victory only to experience the shameful defeat at Ain Trotgourait. There was one capable enough to manage a majority zebra region without a revolt. There was one who foresaw the catastrophe that would befall the kingdom.\n\nThere was Ibyz Icepaw.§!\n\n§YКонтинент: Зебрика§!"
 SECOND_CONTENT_FLAG:0 "§LThe Qaylidi Dervishes have lived and fought in the deserts since before the Storm King, and though the yeti invasion launched them from 'cultists in the desert' to 'the last resistance', they have kept up their relentless struggle under the guidance of the Fahamka, the Great Teacher. Poised to go on the offensive and reclaim their homeland, the question is what will happen to the once decadent Queendom of Hyenia if they triumph. The Qaylid teaches that the past is a trap and that the virtuous walk ever forward towards the future though, and the Dervishes are committed.§!\n\n§YКонтинент: Зебрика§!"
 THIRD_CONTENT_FLAG:0 "§LEnslaved by the Imperial Mazwi for centuries, Zar-Hay was quick to regain its freedom after the Storm King's invasion. But the Kingdom has no monarch to rule it, because the rightful rulers are nowhere to be seen. As such, Regent Zonni leads the country, and has sworn to forge Zar-Hay into an empire that will never again suffer from the yoke of foreign rule. No one knows if he will succeed in pursuing this lofty ambition, but it is certain many will die.§!\n\n§YКонтинент: Зебрика§!"
 FOURTH_CONTENT_FLAG:0 "§LWhen the Lunar Empire proclaimed its dominance over Southeastern Equestria, the reality of its loose control became apparent when multiple resistance movements formed. One such movement is the Celestial Resistance, led by the worldwide famous storybook character Daring Do. The odds may be against them, but with such a legendary figure leading the charge, they might just earn their happy ending. After all, heroes never lose!\n\n§YNot available at game start - Play as Equestria and trigger the Lunar Civil War to unlock this country.§!"
