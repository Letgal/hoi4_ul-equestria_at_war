### IDEAS ###
 PLB_bears:0 "Темперамент полярних ведмедів"
 PLB_bears_desc:0 "Ведмеді б'ються ніби одержимі, і багато хто з них скоріше помре, ніж зрадить свою честь. Вони готові протистояти навіть непідйомним труднощам заради своїх кланів."
 PLB_bears1:0 "Полярні ведмеді пам'ятають"
 PLB_outcasts:0 "Вигнанці"
 PLB_outcasts_desc:0 "Ексцентрики, злочинці, вигнанці та культисти - всіх їх виганяють із наших земель, щоб вони шукали дім в іншому місці. На жаль, це сповільнило наші дослідження, оскільки деякі з наших найяскравіших умів опинилися у вигнанні."
 PLB_outcasts_returning_min:0 "Повернення вигнанців"
 PLB_outcasts_returning_min_desc:0 "Ведмеді, раніше вигнані з кланів за різні проступки, нарешті повертаються додому, щоб поділитися з кланами своїми знаннями."
 PLB_outcasts_returning_max:0 "Хвиля вигнанців"
 PLB_outcasts_returning_max_desc:0 "Ведмеді з усіх кінців світу, незалежно від їхньої ідеології чи ідеалів, повертаються додому. Вони одночасно діляться знаннями, але водночас дестабілізують країну своїми єретичними та чужими ідеями."
 PLB_clan_divides:0 "Розкол між кланами"
 PLB_clan_divides_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_clan_divides1:0 "Розкол між кланами"
 PLB_clan_divides1_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_clan_divides2:0 "Розкол між кланами"
 PLB_clan_divides2_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_clan_divides3:0 "Розкол між кланами"
 PLB_clan_divides3_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_clan_divides4:0 "Розкол між кланами"
 PLB_clan_divides4_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_clan_divides5:0 "Розкол між кланами"
 PLB_clan_divides5_desc:0 "Три великих клани полярних ведмедів терпіти не можуть один одного, і навіть малі клани нерідко ворогують між собою. Це серйозно послаблює країну. Розколу необхідно позбутися, інакше полярні ведмеді не зможуть об'єднатися."
 PLB_paying_off_tech_purchase:0 "Виплати грифонам за гвинтівки"
 PLB_paying_off_tech_purchase_desc:0 "Ми придбали казнозарядні гвинтівки у Нова-Грифонії і досі платимо за них."
 PLB_unified_scientific_effort:0 "Єдині наукові зусилля"
 PLB_unified_scientific_effort_desc:0 "Останнім часом По Уеллінгтон домагається розширення наукового співробітництва між кланами і реалізації програми обміну знаннями."
 PLB_unified_scientific_effort1:0 "Наукові невдачі"
 PLB_unified_scientific_effort1_desc:0 "Незважаючи на всі наші зусилля, інші клани продовжують перешкоджати нашим зусиллям з поширення знань. Вони відволікають наших писарів або взагалі відмовляються що-небудь пропонувати."
 PLB_polar_bear_army:0 "Армія полярних ведмедів"
 PLB_polar_bear_army_desc:0 "Армія полярних ведмедів поступово починає перетворюватися на військову силу. Тепер у лавах наших військ служать ведмеді всіх кланів."
 PLB_polar_bear_army1:0 "Роз'єднана армія"
 PLB_polar_bear_army1_desc:0 "Оскільки клани категорично відмовляються вступати до лав полярної армії або навіть брати будь-яку участь у її функціонуванні, ми стикаємося з гострою нестачею солдатів."
 PLB_fish_farms:0 "Націоналізовані рибні ферми"
 PLB_fish_farms_desc:0 "Щоб забезпечити контроль над рибою і, відповідно, над кланами ведмедів, ми почали захоплювати рибні ферми по всій країні. Так ми будемо контролювати основне джерело їжі."
 PLB_fish_farms1:0 "Знищені рибні ферми"
 PLB_fish_farms1_desc:0 "Наші флоти горять, а запаси риби втрачені - клани вживають будь-яких заходів, щоб ми залишилися без засобів контролю над ними, чи то активна боротьба проти нас, чи то знищення власних джерел їжі з бажання насолити нам."
 PLB_outcast_raids:0 "Рейди вигнанців"
 PLB_outcast_raids1:0 "Рейди вигнанців"
 PLB_children_of_mechas:0 "Діти мехів"
 PLB_children_of_mechas_desc:0 ""
 PLB_fragile_food_supply:0 "Крихке забезпечення продовольством"
 PLB_fragile_food_supply_desc:0 "У нас ледь вистачає їжі, щоб прогодувати себе. Однак усе може змінитися в один момент. Багато хто турбується, що скоро може знову трапитися голод, і потрібно щось зробити, щоб відновити довіру до нашого клану."

 PLB_famine:0 "Голод"
 PLB_famine_desc:0 "Бульби, які ми вирощуємо, зробили багато для полегшення продовольчої проблеми, але багато ведмедів, як і раніше, голодують. Нам, як і раніше, необхідні альтернативні джерела продовольства для повноцінного функціонування."
 PLB_severe_famine:0 "Сильний голод"
 PLB_severe_famine_desc:0 "Наші запаси їжі витрачено, постачання риби і рослин припинилося; ми голодуємо і ледь функціонуємо. Якщо ми хочемо вижити, то нам потрібно якомога швидше знайти джерело їжі."
