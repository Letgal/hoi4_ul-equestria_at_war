 PLB_clan_information:0 "Клани півночі"
 PLB_clan_information_desc:0 "Спільноти Полярних Ведмедів складаються з безлічі кланів, кожен з яких має сильні та слабкі сторони, а також свою історію. Деякі з цих кланів виникли ще в епоху монстрів, інші сформувалися за останні 50 років. Але всі вони є гордими представниками нашої раси і панують над численними безклановими ведмедями. Безкланові ведмеді, своєю чергою, або заздрять кланам, або насміхаються з їхніх особисто викуваних ланцюгів."
