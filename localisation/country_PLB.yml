### events ###
 polarbear.1.t:0 "Щорічний огляд"
 polarbear.1.d:0 "Холод розійшовся в повітрі, коли По Уеллінгтон важко зітхнув. Він перегорнув ще одну сторінку рукопису, переглядаючи дещо аматорські руни та цифри. Йому не вистачало надрукованого тексту на зручному білому або жовтому папері, з якого він читав під час свого заслання у Грифонії. Але навіть якщо на те, щоб як слід прочитати звіт, знадобився б час, враження від побіжного перегляду були не надто приємними. Прогрес був навіть повільнішим, ніж попереднього року. Менше реформ завершено, недостатньо ферм і мануфактур, і, звичайно, плани на Ключ-озеро, як завжди, провалилися... \n"Чи все тобі до вподоби, Старійшино?" - запитав малюк, який доповідав. Уеллінгтон вже майже забув, що ведмежатко тут, бо чекав будь-якої відповіді.\n\n "Дякую за турботу, але все гаразд. Ти можеш йти... Можеш повертатися у свою комірчину." Дитинча схилило голову і вийшло з каюти, зачинивши за собою двері з китового вуса.\n\nУеллінгтон поклав шкіряний манускрипт на залізний стіл і підвівся зі стільця з кістки і хітину. Він підійшов до вікна з найчистішого льоду і зазирнув у привітну хуртовину надворі.\n\nЯкої помилки він припустився, в чому полягала його невдача? Чому в його плані перетворити північ на належну державу було так багато невдач? Коли імперський Ґровер об'єднував свій рід, нічого подібного не було. Державу, яку він створив менш ніж за десять років, стояла єдиною і процвітала. Звичайно, Ґровер заслужив благословення Борея ще до своїх великих завоювань... \nУеллінгтон почухав підборіддя."
 polarbear.1.a:0 "Можливо, Всебатько ще не вважає мене гідним?"

 polarbear.2.t:0 "Порожні підвали"
 polarbear.2.d:0 "Це не повинно було стати несподіванкою. Зрештою, модернізація цілої країни не була чимось, що було б дешевим або легким для будь-якого одного клану. Для модернізації виробництва потрібно було стільки сталі та вугілля, стільки золота, щоб купувати вироби грифонів, які ведмеді просто не вміли виробляти. Безперервний процес модернізації протягом майже півстоліття мав би стати приводом для гордості, враховуючи, що все це відбувалося виключно на ресурсах одного клану...\n\nАле Уеллінгтон не відчував гордості. Скоріше, він був злий, але не на свій клан. Зрештою, клан Скюфлінґ зробив усе, що міг з наявними ресурсами. Ні, здебільшого він був злий на себе. Він не повинен був ігнорувати, скільки здобичі залишилося після об'єднання ведмедів... Тепер у них залишилася тільки риба, якою вони могли торгувати зі світом. Залізо було надто важливим, щоб від нього відмовлятися. Звісно, була й інша можливість, те, на що старійшини інших кланів напевно відреагували б з ведмежою радістю і садистично експлуатували, але що було необхідним тепер, коли його власний клан не мав нічого, що можна було б віддати."
 polarbear.2.a:0 "Будемо сподіватися, що мені не доведеться знову ламати їх за це..."

 polarbear.3.t:0 "Клани відмовляються надавати фінансову підтримку"
 polarbear.3.d:0 ""Ви можете йти, дякую, що принесли новини." По Уеллінгтон намагався говорити якомога ввічливіше, коли дитинча виходило з кімнати. Його могли б назвати "Деспотом" або "Тираном", і якби його старі друзі з Нова-Грифонії побачили його зараз, вони б точно сказали те ж саме, але він пам'ятав урок, отриманий в Аквілеї: щоб контролювати велике населення, потрібно використовувати як терор, так і доброту.\n\nТільки коли двері з китового вуса зачинилися і запечатали камеру, лапа старійшини клану Скюфлінґів вдарили по столу, і По Уеллінгтон дав волю застиглій в ньому люті. Він знав, що старійшини отримали прохання, знав, що вони чули, про що просять і чого вимагають, і, безперечно, знав, що у них є ресурси, щоб виконати прохання. Зрештою, серед них були шпигуни та інформатори. Проте майже всі, окрім завжди слухняного старійшини Торбена з клану Свартпельс, стверджували, що їхні клани переживають важкі часи або просто не відповідають.\n\nНеначе вони мали його за дурня! Невже вони забули, що сталося лише півтора десятиліття тому? Чи хотіли вони піти шляхом Розенсверда і Торденстьєрне? Ні, можливо, вони просто не розуміли важливості таких ресурсів, особливо коли їх просять, а не примушують... Можливо, вони вважали, що це допомагає їхнім кланам-суперникам? \n\nА може, вони відчували, що його влада слабшає зараз, коли він потребує їхньої підтримки?"
 polarbear.3.a:0 "З Божою допомогою ми покажемо їм, що вони помиляються..."

 polarbear.4.t:0 "Найбільша зрада"
 polarbear.4.d:0 "По Уеллінгтон заревів, з його щелеп вирвався потік замерзлого повітря. Він розірвав рукопис, дряпаючи сталевий стіл під ним. Це було абсурдним, обурливим і вкрай нехарактерним для його виду. Спершу вони демонстрували майже грифонську здатність переосмислювати його накази та вимоги, які він розсилає. Потім вони, більш схожі на Чейнджлінґів, ніж будь-який інший вид у тому, наскільки це було огидно, зрадили його в абсурдних актах саморуйнування, знищуючи власні ферми і флоти, наче просто на зло йому! Але ці дії були нічим у порівнянні з цим! Напасти на панцерник свого тирана без належного обґрунтування було порушенням усіх законів! Клянуся Всевишнім, це була зрада, більша за ту, що вбивала цілі роди! Вони мали бути покарані, сім інших кланів мали бути так чи інакше покарані. Але коли Уеллінгтон подумав про те, до якої жорстокості доведеться вдатися, щоб продемонструвати свою силу в такій ситуації... Ні, він не міг зробити щось подібне... Можливо, він був занадто м'яким або занадто слабким, він припускав, що Торбен зробив би це, не довго думаючи, але споглядання такого масового знищення, навіть у стані такої люті, змусило його зупинитися. Мав бути якийсь інший спосіб...\n\nПо Уеллінгтон опустився на коліна під стародавньою статуєю, присвяченою Всевишньому. Витвір із застиглого каменю, що мав форму дивного, але вселяючого трепет ведмежого обладунку, колись позначав середину дороги між кланом Скюфлінґ та незліченними кланами, що колись існували на західній стороні Ключ-озера. Однак тепер він використовувався як позначення землі, де починалося правління Вулика Соріфа. По Уеллінгтон щомісяця їздив до цього пам'ятника, як тільки міг, щоб віддати шану найбільшому з божеств і відвідати кілька фортець, що залишилися тут, які пильнували, щоб у Кризаліс не виникло жодних ідей. Було б непогано відвідати й інші подібні укріплення, розкидані по інших порожніх прикордонних землях по всій Півночі, що належала Білому Ведмедю...\n\nДля По Уеллінгтона настало усвідомлення. Демонстрація сили, яку інші клани будуть змушені поважати. Щось, що також можна вважати справжньою карою за всі їхні злочини! Він знову подивився на статую псевдо-урсина."
 polarbear.4.a:0 "Дякую тобі, Всебатьку!"

 polarbear.5.t:0 "Нема їм честі на такій війні"
 polarbear.5.d:0 ""Невже він справді збожеволів?" Велика Старійшина з клану Кейн загарчала, як одне з її власних нащадків, щоправда, в шоломі, який вона носила, але не могла згадати, в якому саме, хоча зараз це не мало значення, продовжуючи описувати абсурдні, непотрібні і навіть зрадницькі для ведмежого способу життя "реформи", які "По Уеллінгтон" намагався запровадити за допомогою нових "призовних пунктів", укомплектованих пансербйорнами з його власного клану.\n\nВід самого початку вона скептично ставилася до таких мрій та амбіцій деспота, адже, зрештою, він, здавалося, був настільки прихильний до того, що уособлювали грифони та Чейнджлінґи. Для білого ведмедя було щонайменше огидно намагатися наслідувати настільки незначні та кволі види. Саме тому вони з меншими Старійшинами домовилися просто проігнорувати прохання про ресурси для торгівлі. Це просто тхнуло слабкістю, схожою на грифонів і Чейнджлінґів. Хоча, схоже, Скюфлінґи усвідомили свою помилку і тепер вимагали, а не просили. Тож принаймні в цьому було щось пристойне. І тому Кейн з гумором поставився до прохання, тільки щоб з'ясувати цей абсурд. Скюфлінґи не організовували війська для нападу чи захисту від будь-якого нападу! Вони навіть не озброювали слабаків, які на це не заслуговують, у типовій для Уеллінгтона манері. Ні, вони насправді намагалися створити армію, віддану одному ведмедю - самому "Уеллінгтону"! Зраджуючи всі обов'язки тирана перед меншим і меншим тираном, ведмедів інших кланів змушували тренуватися битися і вмирати не за свій клан, а за деспота! \n\nЯк клан, що опустив сокири за "По" і чиї вожді стали нижче своїх кланів, Кейн не міг просто так повстати, але оскільки закони і обов'язки порушувалися на всіх рівнях, Кейн просто міг не слухати такі накази.\n\nХоча Кейн не оголошував про свою непокору відкрито, чутки та новини поширювалися самі собою, і незабаром більшість інших кланів приєдналися до нього, просто відмовившись посилати ведмедів свого клану служити в армії, організованій По. Насправді, багато хто відчув себе настільки ображеним, що перестав патрулювати західні кордони разом із Чейнджлінґами - те, що раніше робив охоче, змусивши По Уеллінгтона і клан Скюфлінґ компенсувати це власними тілами."
 polarbear.5.a:0 "..."

 polarbear.6.t:0 "Нехай горить вода"
 polarbear.6.d:0 "Фрітьоф знав, що його вишлють на пустки Нова-Грифонії, де він, можливо, стане здобиччю канібалів або радикалів. Він не був ведмедем, не міг навіть зрівнятися з ним у масі чи бойовій доблесті, а отже, не мав жодних шансів у двобої. Зрештою, він був лише грифоном, народженим від слуг, і навіть коли йому дали місце за столом воїнів за те, що він був винятком серед свого роду, він все одно не був на рівні - ні за силою, ні за сприйняттям іншими і тими, хто стоїть вище. Однак це також означало, що якби "совиний ведмідь" вчинив зраду такого масштабу, це не було б звинуваченням клану, а радше звинувачення і відплата впали б виключно на його загін, бо більшість ведмедів все ще вірили, що навіть піднесені грифони не можуть по-справжньому встояти і зрозуміти шляхетність, братерство і честь кланової системи.\n\nЗвісно, це було несправедливо, це не було по-справжньому чесно. Можливо, навіть абсурдним було те, що він жертвував майбутнім своїм і таких, як він, що зуміли прокласти собі шлях від простих слуг до воїнів. Але коли флот Фальсена горів вдалині, а плани Деспота щодо посилення контролю над вессландськими кланами були зруйновані, Фрітьоф не міг не посміхнутися."
 polarbear.6.a:0 "Моє життя за владу клану!"

 polarbear.7.t:0 "Під горами"
 polarbear.7.d:0 "Ейра, принцеса клану Вольсунґр, оглянула "писарів" клану Скюфлінґ, що з'явилися до неї. Очевидно, По Уеллінгтон відправив найближчих до свого клану вчених, щоб "навчити" інші клани досягненням, які він привіз зі своїх подорожей Грифонією, а також вивчити науку і магію, які створили інші клани. Вона не могла не помітити досить поблажливого тону в цьому проханні, особливо гумористичного, оскільки деспот посилався на своїх власних "вчених" - щось досить застаріле і середньовічне.\n\nХоча не мало значення, як По Уеллінгтон сформулював це прохання; вона знала, що це був ще один зі способів спробувати контролювати і придушити інші клани, замість того, щоб насправді намагатися зрозуміти або піклуватися про те, чому всі ведмеді, окрім Свартпельса, не вважали його справжнім тираном. Клан Вольсунґр, звісно, мусив підкорятися, навіть якщо після вигнання Ейра стала більш еквестрійською, ніж полярною за характером, вона все одно розуміла і поважала закони своєї батьківщини. Але вона також розбиралася в хитросплетіннях сучасної політики. Вона лише сподівалася, що старійшини інших кланів достатньо розумні або хитрі, щоб побачити легко використовувані помилки в тому, як По Уеллінгтон сформулював свій наказ...\n\nКоли "писарів" вивели із зали, щоб відвести до покоїв у великій гірській фортеці Вольсунґр, де вони могли відпочити, Ейра повернулася до одного зі своїх колишніх охоронців у вигнанні і прошепотіла:"
 polarbear.7.a:0 "- Займу їх безглуздими дрібничками якомога довше."

 polarbear.8.t:0 "Вигнанці"
 polarbear.8.d:0 "Звичайно, навіть якщо ми починаємо приймати вигнанців у значній кількості, намагаючись підірвати владу підлеглих нам кланів, ми все одно повинні вирішити, як далеко ми зайдемо. Зрештою, якщо ведмедя виганяють з будь-яких земель, населених його видом, а не просто з його власного клану, то вони повинні бути досить радикальними, а в деяких випадках навіть порушниками всіх законів смертних і духовних. Можливо, багато хто з них виправився у вигнанні, можливо, вони відмовилися від своїх абсурдних і аморальних ідей, за які боролися і за які полягли. Однак ми ніколи не можемо бути впевненими, особливо враховуючи, як довго білі ведмеді можуть триматися за свої ідеали, навіть у найтемніші дні заслання. По Уеллінгтон, звичайно, знав, будучи одним з таких зганьблених і радикально налаштованих вигнанців, який десятиліттями зберігав свої ідеали модернізації та адаптації грифонів.\n\nОднак, навіть якщо ми робимо це, що є явною образою і спробою продемонструвати владу над іншими кланами, можливо, було б розумно не гнівити їх занадто сильно. Можливо, обмежившись найменш небезпечними групами, ми продемонструємо нашу владу і домінування там, де це важливо для інших кланів, і водночас не викличемо надто сильного обурення. З іншого боку, ми можемо просто прийняти всіх назад і сподіватися, що коли виникне конфлікт, у нас буде достатньо новобранців, що ми просто достатньо численні, щоб жоден інший клан не думав, що зможе перемогти. Однак більш радикальний варіант може призвести до втрати нашого єдиного теперішнього і твердого союзника, лорда Торбена з клану Свартпельс."
 polarbear.8.a:0 "Обмежимося найрозумнішим."
 polarbear.8.b:0 "З поверненням, браття і сестри."

 polarbear.9.t:0 "Дурість"
 polarbear.9.d:0 "Звістка розлетілася блискавично, звісно, навіть для неприборканого краю без належних доріг і зв'язку, як і було задумано. По всій території, заселеній білими ведмедями, клани відреагували з абсолютним невір'ям, коли дізналися про те, що сталося... І вони підняли повстання. По Уеллінгтон дуже довго випробовував їхнє терпіння, і тепер випала чудова нагода.\n\nУ велетенській фортеці під великими горами, що простягалися через землі яків, ведмедів і навіть грифонів, принцеса клану Вольсунґр почала збирати свої сили, щоб врятувати свій рід від цього ідіотського деспота і, можливо, показати своєму роду кращий шлях, ніж цей. \nНеподалік найпівнічніших берегів, де навіть найсильніші звірі не витримують жорстоких вітрів, володар блискавок і грому отримав звістку про новий порядок і невір'я. Він ніколи б не зміг віддати наказ. Його друг ніколи не міг наказати щось подібне, чи не так? Ні... Це, мабуть, було втручання не кого іншого, як проклятих Чейнджлінґів! Так... Вони, мабуть, зробили це, щоб вторгнутися! І тому Володар Грому теж підняв свої сили, виснажені, як і його клан, роками війни.\n\nІ звичайно ж, сам Деспот, не залишивши інших варіантів через власні необдумані дії, готував свої армії до чергового об'єднавчого походу."
 polarbear.9.a:0 "Я ще можу довести свою гідність!"
 polarbear.9.b:0 "Я ще можу врятувати всіх нас!"
 polarbear.9.c:0 "Я ще можу врятувати нашу свободу!"

 polarbear.11.t:0 "Божевілля"
 polarbear.11.d:0 "Звістка розлетілася блискавично, звісно, навіть для неприборканого краю без належних доріг і зв'язку, як і було задумано. По всій території, заселеній білими ведмедями, клани відреагували з абсолютним невір'ям, коли дізналися про те, що сталося... І вони підняли повстання. По Уеллінгтон вже давно випробовував їхнє терпіння, але це було чисте божевілля, якого не можна було допустити! \n\nУ гігантській фортеці під великими горами, що простягалися через землі яків, ведмедів і навіть грифонів, принцеса клану Вольсунґр почала збирати свої сили, щоб врятувати свій рід від цього божевільного тирана і запобігти кошмару, який міг би з'явитися в результаті цього. \nБіля найпівнічніших берегів, де навіть найміцніші звірі не витримують жорстоких вітрів, повелитель блискавок і грому з недовірою сприйняв звістку про новий порядок. Його друг ніколи не міг бути настільки божевільним, чи не так? Ні... Пахло змовою, чимось брудним і огидним... Пахло чейнджлінґами... Жодна інша істота не змогла б виготовити щось настільки образливе і водночас руйнівне! Вони, мабуть, зробили це, бо бояться! Вони, мабуть, знали, що чекає на їхній жалюгідний рід, якщо Північ буде по-справжньому об'єднана! Але їм не дозволили б перемогти! І тому Володар Грому теж підняв свої сили, виснажені, як і його клан, роками війни.\n\nІ звичайно, сам Деспот, зрозумівши тепер, що він зруйнував свою мрію, що тепер йому доведеться знищити кожен клан, озброївся похмурою рішучістю і думкою про порятунок і зібрав свої сили."
 polarbear.11.a:0 "Я роблю те, що має бути зроблено."
 polarbear.11.b:0 "Я врятую їх від ворога!"
 polarbear.11.c:0 "Я мушу врятувати їх від божевілля!"

 polarbear.12.t:0 "Винайдення "винищувача""
 polarbear.12.d:0 "Ульрік натягнув на голову льотні окуляри і грубо заліз у великий літак. Він прошепотів швидку молитву до Всевишнього про успіх і запустив двигун. Він почув теплий гуркіт, і посміхнувся. Ще кілька разів клацнувши перемикачами, він злетів у повітря! Він подивився вниз на цілі внизу і міцно натиснув на пару кнопок. На нерухомі мішені посипалися кулеметні черги, і він вибухнув сміхом. Це виглядало так, ніби цілий ескадрон воїнів розірвав їх на шматки! Це було набагато краще, ніж просто розвідка на поплавковому літаку М'ясника-Чейнджлінґа.\n\nВін обережно приземлився і вистрибнув з літака. Уеллінгтон був там, щоб привітати його. "Це було вражаюче", - сказав деспот з широкою посмішкою. "Молодець, друже!"\n\nУльрік потиснув йому лапу. "Чейнджлінґам це не сподобається, - відповів він з посмішкою. "Вони думають, що зможуть одноосібно правити небом. Що ж, від сьогодні полярний повітряний простір офіційно наш!""
 polarbear.12.a:0 "Двоє друзів щиро розсміялися."

 scyfling.1.t:0 "Ми не здамося!"
 scyfling.1.d:0 "Такий хаос... Таке спустошення...\n\nЗнову ведмеді роздирали один одного у відкритій війні, ще гіршій, ніж раніше... По Уеллінгтон анулював усі обов'язки, союзи та підкорені тираном зв'язки між усіма кланами. Було дивно дізнатися, що всі клани підкорилися цій вимозі. Однак жах, розв'язаний цією неприборканою, дикою війною, роздирав його душу. Це був результат усього, що він зробив. Усіх його помилок... Перед своїм кланом він продовжував виглядати суворим і сильним, коли вони збиралися на війну. Але на святій землі він відчував себе таким слабким, таким розгубленим...\n\nЩо він зробив не так? Він намагався наслідувати великих імператорів Ґровера I і II, іноді також використовуючи успіхи визволителя Олександра Кемерская. Чи не було це хибним натхненням? Якби він не помітив чогось цілісного...\n\nМожливо, йому варто було сприйняти Торбена серйозно ще тоді, коли Володар Грому жартував, що він став занадто грифонізованим для власного блага, занадто необізнаним з клановими системами і занадто непохитним у своїх ідеях вищості, що йому потрібні союзники, а не піддані... Можливо, тоді це могло його врятувати. Але тепер... Тепер здавалося, що є тільки війна..."
 scyfling.1.a:0 "І що мені тепер робити?"

 scyfling.3.t:0 "Дрібні клани Півдня"
 scyfling.3.d:0 "Відколи існують найдавніші писання як ведмежого, так і чужоземного походження, наша раса завжди була расою воїнів і паліїв війни. Ми воювали один з одним і з яками, а коли чейнджлінґи та грифони вдерлися в наше замерзле царство, ми воювали і з ними. Дехто навіть каже, що ми воювали з самою землею, бо нам довелося боротися і з кліматом, і зі звірами, перш ніж ми приручили навіть нашу власну батьківщину. Саме наше суспільство було визначене цією боротьбою. Кожен лідер, кожен впливовий діяч, навіть найбільші та найреволюційніші ковалі та книжники були великими воїнами, бо тільки в бою можна показати силу своїх ідей своїм кращим друзям.\n\nАле навіть серед суспільства, яке так прославляє війну, три клани Онлартіра вважаються найвидатнішими, коли мова йде про мілітаризм. Адже саме вони століттями стояли стіною проти негідних ханів-яків та орд чейнджлінґів, продовжуючи при цьому, здавалося б, вічний конфлікт між собою. Можливо, це й добре, що земля була такою пустельною і непридатною для життя, бо якби клани Онлартірів не були найменш чисельними, один з них неодмінно захопив би північ задовго до повернення з вигнання По Уеллінгтона. Хоча, навіть незважаючи на їхню нечисленність, підкорення кланів Онлартіру було найскладнішою з кампаній під час першого об'єднання і забрало всю міць обох кланів - Скюфлінґів та Свартпельсів. Те, що зараз неможливо повторити."
 scyfling.3.a:0 "І ось ми тут, зараз..."

 scyfling.4.t:0 "Переговори з кланом Кейн"
 scyfling.4.d:0 "Такого результату воєначальники клану Скюфлінґ, а особливо По Уеллінгтон, не очікували. Замість того, щоб чекати на атаку переважаючих сил, клан Кейн вирішив зібрати свої сили і вдарити першим. Так на замерзлому полі зустрілися дві армії...\n\nМожливо, таке місце зустрічі було найкращим для переговорів, які відбулися між По Уеллінгтоном і Великим Старійшиною Асе. Адже що може бути кращим місцем для двох воєначальників, один з яких потенційно перебуває на підйомі, а інший, здавалося б, на занепаді, ніж поле, на якому незабаром може відбутися битва?\n\nОднак, на розчарування деяких, ця битва ніколи не станеться, оскільки буде досягнуто домовленості. Щоправда, по-ведмежому, на світло-блакитному льоду незабаром з'явиться чимало червоних калюж, а кілька "дипломатів" будуть змушені піти через зламані або навіть роздроблені кістки, оскільки більш складні розбіжності вирішувалися на дуелях, аж до самої смерті. Навіть сам По Уеллінгтон був змушений битися з кількома старійшинами Кейну, щоб дійсно довести необхідність належної і згуртованої армії білих ведмедів, хоча він не зміг повністю показати свою компетентність, оскільки Ейс з Кейну завів його в глухий кут. \nОстаточне рішення, можливо, не було найбільш задовільним для обох груп, але сили Онлартіра битимуться за клан Скюфлінґ, доки По Уеллінгтон виконуватиме свої обов'язки справжнього тирана, дозволить їм керувати власними воєначальниками в бою і візьме кількох пансербйорнів у якості військових радників."
 scyfling.4.a:0 "Не найцікавіший спосіб, але переговори, здається, працюють."

 scyfling.8.t:0 "Переговори з кланом Ґотлунґів"
 scyfling.8.d:0 "Стіни були більшими, ніж раніше, більш підготовленими, цього разу не тільки з льоду, але й з каменю і навіть сталі. Клан Ґотлунґ не забув свого приниження і підготувався. По Уеллінгтон дивився на фортецю, яка, здавалося, була збудована, щоб зупинити черговий похід Скюфлінґу проти найближчої столиці клану Ґотлунґів...\n\nВідчувалося самовдоволення, яке випромінювали ведмеді Ґотлунґів, коли По Уеллінгтон і його найкращі пансербйорни проходили крізь їхні, безперечно, вражаючі укріплення, хоча лише ведмежата і, можливо, деякі з найзавзятливіших і наймолодших воїнів могли б відкрито продемонструвати це. Це не була мовчазна егоїстична гордість, як у грифонів, і, звичайно, не майже абсурдна дитяча та комедійна зарозумілість поні. І те, і інше було терпимим. Але коли мова йшла про ведмедів, то майже завжди виникало відчуття хижої зверхності. Ведмідь, який самовдоволено посміхається до вас, бачить не переможеного супротивника чи неякісного знайомого, він бачить переможену здобич, навіть якщо це була лише моральна чи психологічна перемога. І з таким менталітетом, поширеним серед пансербйорнів Ґотлунґів і, можливо, старійшин, на деякий час здавалося, що переговори проваляться.\n\nОстаточна угода була набагато вигіднішою для По Уеллінгтона і клану Скюфлінґ, ніж вони могли б припустити, виходячи з того, що в іншому випадку було б визнанням поразки. Проте, можливо, те, як розгорталася ситуація з Кейном, переконало Раду Старійшин Ґотлунґа переглянути свою попередню позицію. Угода була досить простою, якщо не сказати більше. Прості відносини тиран-підданий з однією простою вимогою - старійшини або потенційний лідер клану Ґотлунґ, якщо хтось коли-небудь підніметься до такого рангу, матимуть право брати участь у створенні та прийнятті нових законів, щоб захистити свою автономію та традиції."
 scyfling.8.a:0 "Будемо сподіватися, що такі обіцянки не будуть виконані."

 scyfling.12.t:0 "Переговори з кланом Розенкранц"
 scyfling.12.d:0 "Білі ведмеді не любили жити на високих горах. Місцевість була небезпечною, а вітри та бурі могли здолати навіть найсильнішого з урсинів. Місцеві звірі були так само небезпечні, часто більш магічні, ніж плоть, через близькість до сили північного сяйва. Але саме з вершини найвищої гори в Онлартірі шаманський володар Розенкранцу споглядав на неприборкану силу в небесах...\n\nВигляд на вершині гори був щонайменше дивовижним. Шаман Лорд Розенкранц, один з тих, хто відмовився від свого імені та існування, перш ніж досягти такого становища, сидів на троні з льоду та кісток майже беззахисний, з ледве півдюжиною інших членів свого ордену і лише крихітною групою пансербйорнів в якості охорони. Було б абсурдно припустити, що це все, але важко уявити, де ще могли б ховатися інші ведмеді в такій суворій місцевості. Звичайно, це була спроба створити відчуття сили. Потенційно залякати супротивника, натякаючи, що його можна знищити, маючи лише невеликий загін. І хоча це було дещо вражаюче, це не могло точно зрівнятися з силовими іграми, які можна було побачити в Грифонії.\n\nПо Уеллінгтон очікував трохи більше непокори, агресії, навіть абсурдних вимог під загрозою невидимих сил, але Повелитель Шаманів був здебільшого... поступливим і згідливим. Можливо, це було тому, що клан Розенкранц вдивлявся в зимові вогні і бачив майбутнє, де Скюфлінґ прийшов, щоб розтрощити їх, і припустив, що це була спроба вимагати підпорядкування? Як би там не було, остаточна угода була досягнута відносно скоро. Обов'язки тирана і підданого були повторені перед зимовими вогнями, щоб цього разу божественне могло їх почути і покарати порушників, якщо одна зі сторін порушить угоду, що не викликало у По Уеллінгтона особливого ентузіазму, але він все ж таки зробив це. Єдине, що вимагалося, окрім традиційних обов'язків, це щоб шамани Розенкранцу супроводжували По Уеллінгтона під час його кампанії і правили як помічники та спостерігачі. Щось, що знову було обіцяно небесам."
 scyfling.12.a:0 "Будемо сподіватися, що Всевишній на нашому боці."

 scyfling.16.t:0 "Армія розгромлена"
 scyfling.16.d:0 "Такого результату воєначальники клану Скюфлінґ, і особливо По Уеллінгтон, не очікували. Замість того, щоб чекати нападу переважаючих сил, клан Кейн вирішив зібрати свої сили і завдати удару першими. Так на замерзлому полі зустрілися дві армії...\n\nМожливо, якби військами клану Скюфлінґ керував будь-який інший старійшина, вони б, швидше за все, програли, якби спробували битися з кланом Кейн хоч якось наближено до традиційного способу. Звичайно, вони були більш чисельною силою, майже втричі переважаючи ворога. Це було зрозуміло, один маленький клан ніколи не зможе зібрати достатньо війська, щоб зрівнятися з Великим кланом. Але, як завжди, урсини Онлартіра були більш ніж численні і досить сильні, і якби вони прорвалися через відстань, то лави розпалися б, і перемога була б за ними. Це була давня стратегія, проста, і довгий час їй було важко протистояти, навіть якщо Кейн не мав потужної підтримки. Однак така тактика вимагала ґрунту, який можна було б пробити наскрізь. Таким чином, у досить ганебному і брудному вчинку, земля між арміями була обстріляна артилерією і вибухівкою, що зробило землю просто неможливою для прориву, і загнало їх в оборонну позицію, яку атакували більш численні скюфлінґські сили. Проте, якби По Уеллінгтон не підкорив Велику Старійшину Ейс з клану Кейн і не змусив її здатися посеред бійки, в яку перетворилася битва, перемога була б кривавою і, можливо, навіть не належала б клану Скюфлінґ.\n\nОднак, навіть зазнавши поразки, Кейн відмовився скласти сокири і лук, оскільки вони стверджували, що По Уеллінгтон бився з ними без честі і продемонстрував ту саму неповагу до традицій, яку демонстрував і в незліченній кількості інших ситуацій. Здавалося, що Кейн зламається лише тоді, коли почнеться справжня кривава бійня. Але цього не сталося, бо замість того, щоб віддати наказ про новий штурм, По Уеллінгтон просто запросив старійшин клану Кейн на "демонстрацію зброї." Яку б зброю їм не показали, демонстрація закінчилася угодою між тираном і підданими. Хоча цього разу обидві сторони були по-справжньому скуті обов'язками."
 scyfling.16.a:0 "Цього разу не забуваймо, що обов'язок зв'язує і нас."

 scyfling.24.t:0 "Брама проломилася"
 scyfling.24.d:0 "Стіни були більшими, ніж раніше, більш підготовленими, цього разу не лише крижаними, але й кам'яними і навіть сталевими. Клан Ґотлунґів не забув свого приниження, і вони підготувалися. По Уеллінгтон дивився на фортецю, яка, здавалося, була побудована, щоб зупинити черговий похід Скюфлінґу проти найближчої столиці клану Ґотлунґів...\n\nКоли Ґотлунґи здалися і склали свої сокири, їм, можливо, знадобилося б навчитися будувати справді сучасні фортифікаційні споруди. Їхня нова фортеця була вражаючою і це не міг заперечити навіть По Уеллінгтон, який зі своїми найкращими панцербйорнами проривався крізь коридори та зали нібито неприступної фортеці, але вона була збудована для дуже застарілих способів ведення війни, не враховуючи сучасну артилерію та вибухівку, які так само, як і в перший раз, пробивали дірки в її величезних стінах. І все ж, незважаючи на чисельну перевагу і проломлені стіни, Ґотлунґ бився зубами і нігтями, часто буквально, за кожен коридор і все, що нагадувало оборонну позицію.\n\nЗвісно, врешті-решт старша рада і їхні війська відступили, здавшись перед переважаючими силами і здібностями деспота, чиї кайдани, як вони думали, вони скинули з себе. Однак цього разу По Уеллінгтон пообіцяв перед усіма воїнами клану Ґотлунґ і клану Скюфлінґ, що цього разу традиції і автономія Ґотлунґів будуть поважатися, щоб подібна війна більше не повторилася."
 scyfling.24.a:0 "Ким би ми були без тих, хто стоїть під нами?"

 scyfling.25.t:0 "Дуель у небі"
 scyfling.25.d:0 "Білі ведмеді не любили жити на високих горах. Місцевість була небезпечною, а вітри та бурі могли здолати навіть найбільшого з урсинів. Місцеві звірі були так само небезпечні, часто більш магічні, ніж плоть, через близькість до сили північного сяйва. Але саме з вершини найвищої гори в Онлартірі шаманський володар Розенкранцу дивився на неприборкану силу в небесах...\n\nІ, можливо, саме з цією неприборканою силою бився Розенкранц, бо не було іншого пояснення тому, як вони все ще володіли силою, з якою билися на Піку Скайбрейкера, незважаючи на те, що більшість інших фортець були підкорені. Адже на кожному кроці маршу до вершини гори їх переслідували і вступали в бій пансербйорни і шамани. Самі по собі ці невеликі групи не становили б жодної небезпеки в умовах справжнього бою. Але вони атакували колону Скюфлінґу з боків, проникаючи крізь якусь магічну оболонку з вітру і снігу, вбиваючи або принаймні зв'язуючи десятки воїнів, перш ніж, здавалося б, відступити в саму гору. Іноді з'являлися цілі потоки снігу і льоду, відрізаючи просування десяткам, якщо не сотням ведмедів, які тепер були змушені відкопуватися, оскільки були зайняті ворогом. Єдина самотність полягала в тому, що навіть в умовах, що наближалися до тактики "вдарив і втік", воїни Розенкранцу відмовлялися просто вдарити і відступити. Натомість вони залишалися і билися доти, доки їх самих не ранили, не вбивали, або доки така доля не спіткала ведмедя Скюфлінґу. Хоча найчастіше падали саме останні. І все ж колона просувалася все вище і вище, По Уеллінгтон йшов попереду, надихаючи свої все більш виснажені сили.\n\nБитва за вершину була набагато меншою, ніж можна було очікувати від битви за майбутнє цілого клану, оскільки ледве сотня ведмедів, майже порівну розділених між кланами, рвалися один на одного. Спочатку здавалося, що клан шаманів вийде переможцем, але у них не було резервів і їхні війська були зв'язані на самій горі, в той час як воїни клану Скюфлінґ, хоч і повільно, але просочувалися в бій у все більшій і більшій кількості. Врешті-решт цього стало забагато, і Володар Шаманів був змушений відкласти свою сокиру і здатися, а за ним і його клан.\n\nПовторення клятв було б майже дзеркальним відображенням минулого разу, і якби воно дійсно було таким же, гіркота обох поразок, можливо, продовжувала б гноїтися, якби не той факт, що цього разу битва відбувалася і клятви давалися під Зимовим Сяйвом.."
 scyfling.25.a:0 "Під поглядом Всебатька і всього божественного присягаюся..."

 scyfling.31.t:0 "Кейн знищено"
 scyfling.31.d:0 "Такого результату воєначальники клану Скюфлінґ, а особливо По Уеллінгтон, не очікували. Замість того, щоб чекати на атаку переважаючих сил, клан Кейн вирішив зібрати свої сили і завдати удару першими. Так на замерзлому полі зустрілися дві армії...\n\nУ будь-якому іншому випадку можна було б припустити, що навіть якби клан Кейн переважав чисельно втричі, їхня перевага в боєздатності і елемент несподіванки дозволили б вийти з патової ситуації або навіть здобути несподівану перемогу. Зрештою, клан Кейн славився чисельністю і силою своїх воїнів. Якби це була традиційна битва, Клан Кейн атакував би своїх ворогів, намагаючись придушити їх чисельною силою, яку можна було б порівняти з лавиною розлючених броньованих звірів, а ворогів обстрілювали б з гармат або найближчих до них кулеметів, які були в наявності. Саме цього в цьому бою не вистачало загону Кейна. Якби хтось дотримувався традиційного ведмежого почуття честі, клан Скюфлінґ не став би використовувати власну важку зброю. Проте По Уеллінгтон вирішив, що ця сутичка не може бути традиційною. Це не було частиною війни... Це була частина винищення. І для виконання цього обов'язку більшість ведмедів ніколи раніше не бачили і навіть не уявляли, і, швидше за все, не бачили навіть серед чейнджлінґів і грифонів - "мисливські рушниці", призначені для знищення драконів. У клані Скюфлінґ було заледве з десяток таких рушниць, але саме вони стали переломним моментом. Перший же залп прорвав лавину клану Кейн, по якій потім вдарила артилерія. Після цього почалася різанина...\n\nПісля того, як пішли їхні найкращі воїни і навіть старійшини, вбиті, можливо, зовсім несправедливо в бою, фортеці теж не протрималися довго. Вони досить швидко перетворилися на просто м'ясокомбінати. Лише деякі з немовлят або дитинчат були врятовані, бо вони були занадто малі або занадто... позбавлені розуму і фізичної сили, щоб заподіяти якусь небезпеку або затаїти якусь образу.\n\nТаким був кінець клану Кейн."
 scyfling.31.a:0 "Так само, як і Ґровер II..."

 scyfling.32.t:0 "Ґотлунґ знищено"
 scyfling.32.d:0 "Стіни були більшими, ніж раніше, більш підготовленими, цього разу не тільки з льоду, але й з каменю і навіть сталі. Клан Ґотлунґ не забув свого приниження, і вони підготувалися. По Уеллінгтон дивився на фортецю, яка, здавалося, була збудована для того, щоб зупинити черговий похід Скофлінгів проти найближчої столиці клану Ґотлунґів...\n\nДеспот білих ведмедів тяжко зітхнув. Цей шлях справді був набагато легшим, набагато дешевшим, ніж будь-який інший. Але водночас набагато жорстокіший і нешанобливіший до мертвих. Клан Ґотлунґ думав, що збудував незламну фортецю, але вони зробили не більше, ніж підготували собі братську могилу...\n\nАртилерія, вибухівка, кілька десятків антидраконівських гвинтівок і навіть кілька імпровізованих вогнеметів - все це вивільнило свою лють на стінах того, що будь-яка інша ведмежа сила вважала б найбільшою з сучасних фортець. Можливо, якби це була інша сила з іншими намірами, вони б припинили обстріл через кілька днів. Можливо, вони б здалися після того, як Ґотлунґ Пансербйорн вдесяте вийшов би з фортеці, розбивши наскрізь війська Скюфлінґу. Але По Уеллінгтон і його війська були тут з похмурою метою, і вони не відступали...\n\nІ врешті-решт фортеця завалилася, сегмент за сегментом, стіна за стіною - поховавши під собою найкращих і найяскравіших представників клану. Дехто відчайдушно намагався втекти, але лише для того, щоб загинути від значно переважаючих сил. Найбільшої фортеці клану Ґотлунґів не стало."
 scyfling.32.a:0 "І багато менших пішли за ними..."

 scyfling.33.t:0 "Зруйнований Розенкранц"
 scyfling.33.d:0 "Білі ведмеді не любили жити на високих горах. Місцевість була небезпечною, а вітри та бурі могли здолати навіть найсильнішого з горностаїв. Місцеві звірі були так само небезпечні, часто більш магічні, ніж плоть, через близькість до сили північного сяйва. Але саме з вершини найвищої гори в Онлартірі шаман-лорд Розенкранц дивився на неприборкану силу в небесах...\n\nІ саме на цій вершині гори було остаточно знищено цілу спадщину. Клан Розенкранц був єдиним серед кланів Онлартіру, чия "столична" фортеця не знаходилася в якомусь легкодоступному місці, навпаки, Скайбрікер Пік був оточений з усіх боків меншими укріпленнями, які потрібно було взяти або принаймні зв'язати в бою, перш ніж можна було йти на саму гору, що перетинає небосхил. Таким чином, все старше і провідне покоління клану було повільно відтіснене назад, змушене спостерігати, як весь їхній клан знищується, шматочок за шматочком. І вони спрямували на це всю магію та інші заборонені сили, які були їм доступні. Але цього було недостатньо, і врешті-решт все дійшло до самої вершини, де безіменний володар шаманів впав під кігтями По Уеллінгтона і його найкращих пансербйорнів, а шамани були розчавлені під ударами дюжини антидраконівських гвинтівок, які клан Скюфлінґ приніс на цю висоту з єдиною метою - винищення.\n\nЄдині, хто вижив після винищення клану Розенкранц, були занадто молодими або занадто низькими в клановій ієрархії через брак магічного чи бойового таланту. Клан не вів жодних записів, окрім усних. А оскільки під час останнього об'єднання всі подібні клани були винищені або перетворені на вигнанців, шаманська традиція білих ведмедів зникла."
 scyfling.33.a:0 "Отче наш, прости нас..."

 scyfling.34.t:0 "Великий союз Сходу"
 scyfling.34.d:0 "Вессландія завжди була регіоном білих ведмедів, найбільш дивним і дивовижним для ведмедів, але, можливо, найбільш нормальним для більшості істот, які не процвітають взимку і холоді. Його ліси рясніють ягодами та дичиною і тягнуться, здається, нескінченно. Сама дичина скоріше схожа на те, що можна було б побачити в "нормальних" лісах Північної Грифонії або навіть Северяни, а не на дивних напівмагічних звірів, які блукають більшою частиною землі. Навіть сама земля неймовірно родюча, на ній ростуть бульби та безліч інших переважно їстівних, хоча й м'яких та довго зростаючих арктичних рослин. Навіть найпівнічніше море, здається, багатше на рибу і тюленів. Але, незважаючи на все це, жоден великий клан чи великий полководець не з'явився на цій землі, оскільки клани, замість того, щоб зростати і затьмарювати всі інші, розбивалися за доступ до найкращих місць для риболовлі чи землеробства. Навіть перед обличчям потенційного завоювання і знищення в пазурах новогрифонських експедицій клани не об'єдналися, лише відвойовуючи величезні шматки землі, де почали селитися грифони, оскільки їхні господарі на заході були просто нездатні управляти нею належним чином, і перетворюючи потенційних завойовників на не більше, ніж слуг для володарів-ведмедів.\n\nНаразі землю займають три клани - Фальсен, Бенкесток і Бродкорб, кожному з яких лише кілька десятиліть, оскільки вони стали результатом чергового циклу зростання влади клану, аж поки він не розпадеться. Хоча цього разу, схоже, для розвитку унікальних традицій знадобилося більше часу, оскільки всі три клани використовують слуг-грифонів і насамперед обмінюються традиціями, за винятком Фальсена, члени якого, схоже, захоплюються морем і суднобудуванням. Можливо, саме з цих причин лідерам цих кланів вдалося так легко домовитися між собою і створити нібито союз рівних, чого ніколи раніше не було серед ведмедів. Не менше занепокоєння викликають заяви про те, що цей "Потрійний альянс" хоче узурпувати владу над самими ведмедями."
 scyfling.34.a:0 "Тут треба діяти обережно."

 scyfling.36.t:0 "Зустріч чотирьох лордів"
 scyfling.36.d:0 "Зустріч відбулася не у великій фортеці, не у форті, навіть не в бойовому таборі, а в простому лісі, трохи за межами земель, контрольованих вессландськими кланами. Очевидно, троє лідерів альянсу вирішили, що така точка, розташована найближче до "історично нейтральної території", буде найбільш підходящою. Це саме по собі було тривожною ознакою, оскільки вони не намагалися вразити клан Скюфлінґ якоюсь великою демонстрацією сили або жорстоким підтекстом, а скоріше кинули непряму образу і натяк на те, що По Уеллінгтон ніколи не контролював Вессландію і її лордів. Спроба образити і підірвати авторитет набагато більше схожа на придворні інтриги у Ведіні, ніж на що-небудь, що зробила б більшість ведмедів. Тривожний розвиток подій, але По Уеллінгтон провів час при згаданих дворах і не був би підірваний блідою імітацією.\n\nАле переговори зайняли досить багато часу, і, незважаючи на спробу виглядати більш цивілізованими і нагадувати більш "просунуті" клани, які, здавалося б, не розуміли намірів Уеллінгтона, переговори закінчилися значною кількістю пролитої крові і зламаних кісток, і навіть По Уеллінгтон зламав собі кілька ребер. Але все ж таки було досягнуто остаточної і вирішальної угоди. Дивно, але, незважаючи на претензії на велич і навіть, здавалося б, бажання панувати над усім родом овець, "Потрійний альянс" не мав особливих ідей щодо того, якого роду володіння вони бажали, окрім деяких базових концепцій економічної та аграрної політики з усіх можливих. Можливо, вони просто не були готові зайти так далеко. Хоча завжди існувала альтернатива, що облога на кількох фронтах, якою вони, безсумнівно, були, не давала змоги розробити якісь серйозні плани. Як би там не було, три лорди погодилися повернутися у володіння По Уеллінгтона, якщо їхнє слово про те, що буде зроблено з кастою слуг-грифонів, буде остаточним."
 scyfling.36.a:0 "Виявлено межу між потенційними узурпаторами та справжніми правителями."

 scyfling.45.t:0 "Крижані стіни падають"
 scyfling.45.d:0 "Поштовх проти "Потрійного альянсу" не був чимось, що передбачав По Уеллінгтон, коли-небудь розгорнутий проти іншої ведмежої сили. Востаннє Вессландію підкорили саме його війська, які об'єднали великі клани Скюфлінґів та Свартпельсів, перехитривши та розгромивши набагато менш чисельних ворогів. Проте цей похід не був блискавичним маршем через землю, яка, здавалося, ледве чинила опір. Цього разу це була повільна і жорстока боротьба з недостатньою підтримкою важкого озброєння, в якій більшість боїв зводилася до рукопашних сутичок. Якою б не була артилерія чи важка техніка, що була в армії Скюфлінґу, її було недостатньо для битви на такій великій території, що тягнулася від самого моря до гір, які позначали кордон між білими ведмедями та яками.\n\nАле перемогу, врешті-решт, здобув По Уеллінгтон, і не за допомогою методу, який будь-який клан вважав би почесним чи хоча б віддалено традиційним. Адже вона була досягнута за допомогою зброї, яку зберігали лише для випадків, коли винищення було єдиним вірним варіантом - "антидраконячих рушниць" новогрифонського виробництва. У клані Скюфлінґ було лише кілька десятків таких гвинтівок, і вони вважалися непридатними для боротьби з зовнішніми ворогами через неповороткість, низьку скорострільність і навіть проблеми з правильним прицілюванням такої зброї. І все ж проти впертості традиційної тактики пансербйорнів? Вона була ідеальною, якщо не сказати більше. І тому вона була застосована проти крихітної частини фронту "Потрійного альянсу", знищивши кілька бойових груп. Завдяки такому локальному знищенню вессландські клани були розгублені, їхня лінія була розбита без жодних потенційних резервів, що здавалися можливими. Повторення останнього умиротворення відбулося, коли лорди були змушені скласти зброю перед По Уеллінгтоном і визнати свій статус підданих. Залишалося лише сподіватися, що цього разу клан Скюфлінґ зуміє налагодити належні зв'язки, адже якби Вессландія знову повстала, не було б жодних сумнівів, що перемога буде за ними."
 scyfling.45.a:0 "Можливо, ми зможемо використати для цього майбутні війни..."

 scyfling.49.t:0 "Ні миру, ні честі"
 scyfling.49.d:0 ""Потрійний альянс" був, мабуть, найчисленнішим і, можна сказати, наймогутнішим угрупованням на урсинських територіях. Можливо, це навіть було б правдою, якщо судити лише за кількістю. Проте, незважаючи на всю кількість ведмедів і всі потенційні сили, зібрані з касти слуг-грифонів, їм бракувало технологічної та стратегічної переваги, і вони не могли усвідомити, що це не типовий ведмежий конфлікт традицій, честі та майстерності рукопашного бою, а війна на винищення. А отже, вони не були і просто не могли бути готовими до зброї, яка була розгорнута проти них. Їхні обладунки та барикади не мали жодного шансу проти гвинтівок, якщо зброю такого масштабу взагалі можна так назвати, призначених для вбивства драконів. Помічники грифонів, навіть якщо вони виросли і змогли витримати великі холоди полярних ведмежих земель, все ще не мали природного холоду своїх господарів, а пір'я та хутро, в які вони були одягнені, досить легко спалахували, навіть коли проти них використовували досить примітивні вогнемети.\n\nПісля того, як фронт було зачищено, настав час для незліченних фортець та інших різноманітних місць, що належали кланам, які тепер були позбавлені будь-якої можливої оборони. Зачистки фортець "Потрійного альянсу" були ще більш жалюгідними, ніж бійня на фронті, і навіть змусили декого зі Скюфлінґу засумніватися у правоті справи і дій По Уеллінгтона. Звичайно, ніхто з них не наважився ослухатися або викликати на дуель деспота чи його найкращих воїнів.\n\nОстанні залишки вессландських кланів на фронтах з кланом Скюфлінґ і кланом Свартпельс протрималися найдовше, але, оточені з усіх боків і зі зруйнованими домівками, вони не мали жодних шансів."
 scyfling.49.a:0 "Найбільший з наших гріхів..."

 scyfling.50.t:0 "Гармоністи в горах"
 scyfling.50.d:0 "Клан Вольсунґр часто історично сприймався, якщо вірити розповідям найстаріших серед білих ведмедів і переказам, що передаються з покоління в покоління, як рід далекий, дивний і навіть ганебний і безчесний. Не в останню чергу це було пов'язано з тим, що клан не мав традиції обладунків і, здається, ніколи не використовував традиційні великі сокири - зброю, яку будь-який справжній воїн білого ведмедя мав би носити як основне озброєння до останніх кількох десятиліть. Натомість їхніми найкращими воїнами були так звані "нануки", мисливці, які полювали на магічних звірів, що заповнювали гірські хребти. Крім того, замість того, щоб жити у фортецях з каменю та льоду, викуваних у невблаганній пустелі, Вольсунґр ховався в глибині гір, ніби віддаючись на волю стихії, що більше пасувало б Діамантовим Псам, аніж будь-яким справжнім урсинам. Існувало дві причини, чому, незважаючи на всі чутки та поведінку, ніхто не наважувався заперечувати право Вольсунґру на існування. По-перше, незважаючи на те, що клан не використовував традиційну зброю білих ведмедів, у їхньому непорушному гірському домі було кілька цілих залів обладунків та зброї зі зоряної сталі. По-друге, клан Вольсунґр мав довгу історію як дружби, так і ритуальних воєн з кланами яків на південь від урсинських земель. Оскільки яки були одним з небагатьох видів, яких білі ведмеді поважали і вважали близькими собі по духу, дружба з їхніми кланами була для багатьох яскравим свідченням того, що вони справжні ведмеді. Лише одержимий історією клан Свартпельс заперечував такі уявлення і вів багато війн проти Вольсунґру, хоча здебільшого безуспішно.\n\nСитуація змінилася під час першого ведмежого об'єднання, коли альянс Скюфлінґа і Свартпельса жорстоко поводився з кланом, і дехто навіть почав вірити, що це призведе до його вимирання. Але він вистояв, використовуючи метод, який інші вважали б надмірним, приймаючи назад незліченну кількість вигнанців без необхідності витримувати випробування боєм. Навіть їхній нинішній лідер, так звана "принцеса" Ейра, була колишньою вигнанкою, яка подорожувала Еквестрією і скопіювала багато їхніх звичаїв. Це поставило і її, і клан Вольсунґр в політичну опозицію до нас, навіть, якщо вони ніколи не показували цього відкрито і здебільшого ігнорували нас, а тепер вони знову йдуть проти нас у війні."
 scyfling.50.a:0 "Навіщо копіювати слабкість поні?"

 scyfling.51.t:0 "Проговорюючи це до кінця"
 scyfling.51.d:0 "За свою історію вигнанця, а згодом і найманця, По Уеллінгтон мав багато страшних і жахливих зустрічей. Насправді, однією з причин, чому він так сильно хотів повернутися, окрім, звичайно, бажання побачити, як процвітають ведмеді, було постійно зростаюче розчарування в існуванні найманця. Але порівняно з усіма зустрічами з дивними ведичними культами і корумпованими вельможами, зарозумілими потенційними воєначальниками і бандитами в межах того, що колись, як вони казали, було герцогством, а тепер перебувало під владою Олександра Кемерская і навіть працювало на "Кігті" в колоніях грифонів, ця зустріч була найдивнішою. Це не було залякуванням чи традиційним страхом. Швидше навпаки. Замість того, щоб поводитися, як скажені звірі, намагаючись погрожувати або налякати його, або навіть відверто насміхатися з нього і називати не інакше, як звіром, клан Вольсунґр був милим. Навіть до абсурду милим. Зустріч відбулася в кімнаті в одній з фортець клану. Обставлена так, наче це був невеличкий палац в Еквестрії, про що По Уеллінгтон міг лише здогадуватися. Ведмеді Вольсунґр вибачилися... Насправді вибачилися за те, що їхня "принцеса" запізнюється. Більше того, вони запропонували різні прохолодні напої та їжу. І така атмосфера, безумовно, була набагато страшнішою, ніж будь-які спроби погроз з боку слабших істот, які йому доводилося переживати. Що ж то за постать була ця Ейра, що підкорила собі клан мисливців на гірських чудовиськ? \n\nЕйра з клану Вольсунґр була досить дивною постаттю. Вона була вбрана в золоте і червоне, зі значною кількістю прикрас і вишивок. Щось, що будь-який справжній ведмідь асоціював би зі слабкістю. Адже золото було металом, з якого не можна було виготовити зброю, а більшість тканин були надто слабкими, щоб захистити воїна від ворожих ударів. Проте принцеса клану Вольсунґр, безумовно, не була слабкою фізично, будучи майже такою ж великою, як сам По Уеллінгтон. Більше того, хоча вона, здавалося, намагалася виглядати милою і привітною, за цим фасадом все ще ховалися мороз і сталь.\n\nСамі переговори були схожими, дуже пухнастими і милими з точки зору стороннього спостерігача, як і По Уеллінгтон, який намагався створити подібну маску. Однак, зважаючи на те, наскільки розбіжними були ідеології кланів, особливо в поточний момент часу, досягти консенсусу було складно. І все ж угода була досягнута, навіть якщо вона була надзвичайно розмитою і включала незліченну кількість різноманітних винятків або ситуативних обов'язків і зобов'язань, оскільки обидва колишні вигнанці намагалися перехитрити один одного і забезпечити найкращу ситуацію незалежно від того, що трапиться потім. Одне було безсумнівним: навіть якщо все піде найгіршим чином, клан Скюфлінґ все одно залишиться лідером, а Вольсунґр - підлеглим."
 scyfling.51.a:0 "Ну, хоч так."

 scyfling.61.t:0 "Гори перетворюються на пил"
 scyfling.61.d:0 "Під час попередніх планів підкорення та знищення одна річ вважалася майже безсумнівною в будь-якій сутичці між кланом Скюфлінґ та супротивниками з земель білих ведмедів. Війська під командуванням По Уеллінгтона матимуть або технологічно досконаліше обладнання, або володітимуть ним у достатній кількості. Це, схоже, не стосувалося Вольсунґру, який, здавалося, володів зброєю, подібною до сучасної і навіть чимось кращою. Їхні броньовані самохідні сани були особливо потужною зброєю, яку неможливо було пробити більшістю видів зброї. Лише сконцентрована артилерія або важкі протидраконячі гвинтівки могли розбити цю зброю вщент. І Вольсунґр, здавалося, володів чимось, що могло зрівнятися з цією зброєю за дальністю та потужністю. Вперше за майже десятиліття позиція сили дещо змінилася.\n\nАле, незважаючи на технологічну перевагу, більшість зброї, якою володів Вольсунґр, була досить обмеженою в доступності. Сам клан також був нечисленним у порівнянні з силами, які на той момент зібрав По Уеллінгтон. Таким чином, навіть якщо це було повільно і багато з найбільш просунутих і екзотичних пристроїв довелося знищити чисельністю, Вольсунґр був витіснений в оборонну позицію.\n\nЗрештою, всі фортеці і аванпости за межами головного володіння Вольсунґра були розбиті і зруйновані, а наступальна зброя стала скоріше перешкодою, ніж перевагою. Звичайно, штурмувати самі гори і намагатися атакувати Вольсунґр в печерах і підземеллях, де вони процвітали, було б самогубством. Проте, хоча саму фортецю неможливо було взяти силою, яка не була б абсолютно переважаючою, в даному випадку не мало значення, чи буде вона взята насправді. Важливо було лише те, що Вольсунґр впаде. І тому всі входи бомбардували до тих пір, поки вони не завалилися всередину. Клан загинув би в ямах, які вони самі собі викопали."
 scyfling.61.a:0 "Ні входу, ні виходу."

 scyfling.62.t:0 "Володарі грому"
 scyfling.62.d:0 "Клан Свартпельсів, "Володарі грому", як їх іноді називали запеклі вороги, був досить унікальним протиріччям, принаймні, якщо намагатися сприймати їх через призму грифонів і, можливо, поні. Адже це був один з найбільш інтелектуальних і науково вивірених кланів, принаймні до того, як Вольсунґр почав масово приймати вигнанців назад, але водночас один з найбільш войовничих і реакційних, коли справа доходила до прогресу. Ритуал вступу до лав його пансербйорнів та вождів був найжорстокішим, оскільки включав не лише вбивство звірів чи перемогу в бою, але й як доказ сили мав бути вражений блискавкою та витримати випробування. Водночас, та ж сама церемонія вступу ставила під сумнів знання майбутніх воїнів чи вождів історії ведмедів, традицій і того, що вважалося традиційними науками та ремеслами. Клан Свартпельс також був категорично проти багатьох ідей щодо змін і прогресу, запропонованих молодими поколіннями, будучи основним джерелом ведмедів, вигнаних із замерзлої півночі, але коли ініціатори таких змін доводили свою цінність у бою, вони охоче і з радістю слідували за змінами. Так сталося, коли По Уеллінгтон зумів заслужити їхню дружбу, перемігши на поєдинку їхнього вождя, великого Володаря Грому Торбена. Після цього клан Свартпельс допоміг нам в об'єднанні земель білих ведмедів. Вони підтримували нас навіть тоді, коли ми приймали найсуперечливіші та найабсурдніші рішення. І все ж тепер вони виступають проти нас.\n\nАле не з тих причин, з яких можна було б подумати. Адже клани Свартпельс і Торбен виступили проти нас не тому, що вважають, що ми порушили свої обов'язки або вчинили якийсь великий гріх. Здається, що з тих чи інших причин Торбен і весь його клан вважає, що ці дії не були вчинені По Уеллінгтоном і його кланом, а скоріше, що це або змова чейнджлінґів, або поширення брехні чи дезінформації, що руйнує єдність ведмедів і викликає конфлікт. Насправді, вони настільки непохитні в цьому переконанні, що будь-який ведмідь, який навіть бажає наблизитися до члена клану, змушений вступати в дуель, оскільки широко поширена думка, що навіть якщо чейнджлінґи здатні маскуватися під щось порівнянне з нашими розмірами, таку форму неможливо підтримувати в бою."
 scyfling.62.a:0 "Це може стати проблемою."

 scyfling.68.t:0 "Крижана битва"
 scyfling.68.d:0 "Незважаючи на всі конфлікти та війни, які довелося пережити, щоб дійти до цього моменту, битва з кланом Свартпельс була, мабуть, кульмінацією кампанії, яку довелося планувати По Уеллінгтону. Зрештою, це був єдиний клан, який не був підкорений війною. Скоріше, їхня вірність у ведмежих об'єднавчих війнах була змінена за допомогою лише півдюжини дуелей, коли По Уеллінгтон бився і переміг Торбена та найкращого пансербйорна клану. Проте така стратегія не була б прийнятною зараз. Адже все, що не було традиційною битвою, могло бути легко сприйнято як хитрість або дії колабораціоніста. Таким чином, Скюфлінґам довелося б битися з набагато більш досвідченими і фізично підготовленими воїнами Свартпельса, озброєними лише сокирами.\n\nЗагони скюфлінґів легко переважали своїх Свартпельсівських колег, проте в міру того, як битва продовжувала розгортатися, ставало все більш очевидним, що в такій битві кількість не має значення. Лише коли По Уеллінгтон і Торбен зустрілися в розпалі битви і Володар Грому був переможений Деспотом, битва повернулася на бік Скюфлінґа, і це був не стільки фактичний поворот, скільки те, що Торбен піднявся на ноги з великим веселим сміхом і вигукнув слова капітуляції, оскільки вся битва і ця дуель, очевидно, були досить хорошими.\n\nПісля битви було влаштовано велике свято, коли узи дружби і вірності були відновлені через обмін їжею і алкоголем. Торбен, звичайно, був дуже радий, що клан Скюфлінґ і По Уеллінгтон пережили те, що, як він стверджував, було проникненням чейнджлінґів і поширенням брехні про те, що По Уеллінгтон прийняв назад Механітів і, можливо, ще гірших покидьків. І що, звісно, коли два клани знову об'єднаються, щось подібне більше ніколи не станеться."
 scyfling.68.a:0 "Давайте просто не розповідати їм про наші початкові ідеї..."

 scyfling.73.t:0 "Грім більше ніколи не пролунає"
 scyfling.73.d:0 "Це було, мабуть, найважче з того, що робив раніше По Уеллінгтон. Можливо, не в буквальному сенсі, адже хоча клан Свартпельсів і був справді страшним супротивником, з налаштованістю на знищення ця війна не викликала жодних сумнівів і навіть, здавалося, не повертала на бік Володарів грому. Для багатьох, у тому числі й для ведмедів, було важко знищувати своїх друзів і давніх союзників через конфлікт, спричинений власними діями. Дії, які ти не міг повернути назад, і дії, які вони просто не приймали. Але це потрібно було зробити заради кращого майбутнього, заради більшого шансу на виживання білого ведмедя як виду. І тому, навіть якщо це було боляче, це потрібно було зробити. Тож Скюфлінґ розгорнувся проти Свартпельса у повному складі.\n\nСкюфлінґ мав технологічну, чисельну і стратегічну перевагу, але це не означало, що Повелителі грому тихо пішли на дно. Вони билися, проливали кров і гинули, але була розгромлена, часто незважаючи на далекобійну зброю, яка розтрощила б будь-яку іншу силу. І все ж, незважаючи на такі перемоги, вони не могли замінити своїх втрат, бо було так мало справжніх Свартпельсів, але було багато ведмедів під командуванням По Уеллінгтона. І врешті-решт, незважаючи на те, скільки вони лютували і билися, їхні фортеці були зруйновані, їхні воїни і старійшини вистежені, а решта були викинуті в море."
 scyfling.73.a:0 "Тепер на півночі панує лише хуртовина."

 scyflingb.1.t:0 "Порожня крига"
 scyflingb.1.d:0 "[PLB.GetLeader] дивився на замерзлу тундру своєї батьківщини. Вона завжди була негостинною, і ведмедям доводилося витрачати багато зусиль, щоб просто вижити. Перед обличчям арктичного холоду все інше мало сенс. Чому вони ніколи не побудували велику імперію, як грифони, чому вони понад усе цінували силу і клан: відповідав холодний вітер, що завивав над їхньою батьківщиною.\n\nІ так сталося, що [PLB.GetLeader] прийшов до розуміння. Тепер він зрозумів, чому його ведмеді, нарешті об'єднані під єдиним Овертайрантом, повернулися до того стану, в якому вони були. Уся його робота була зведена нанівець за кілька місяців кровопролиття, яке змусило решту ведмедів присвятити усі свої сили елементарному виживанню.\n\n[PLB.GetLeader] почав розсилати нові накази, щоб підбити підсумки того, що залишилося, і почати відбудову. Але в цьому було мало серця. Він зазнав поразки, коли за ним стояли всі клани; у нього залишилося мало надії на те, що він досягне успіху зараз, наодинці."
 scyflingb.1.a:0 "Чи зможемо ми коли-небудь відбудуватися?"

 scyflingb.2.t:0 "Поховані надії"
 scyflingb.2.d:0 "Під руїнами фортець лежить надія білих ведмедів на краще майбутнє. Кузні та протозаводи, в які [PLB.GetLeader] вклав награбоване за незліченні роки найманства, були поховані під незліченними тоннами породи. Гірше того, ті самі вигнанці, чиє повернення, як він сподівався, потягне за собою інші клани в майбутнє, здебільшого вирішили загинути разом зі своїми кланами.\n\n[PLB.GetLeader] намагався розлютитися на їхню дурість, але його лють вичерпалася. Він міг гніватися лише на себе, бо думав, що інші клани злякаються, або що він зможе знищити їх, не втративши при цьому розум, необхідний йому для побудови нового майбутнього. Вигнанці поверталися, але більшість з них були зломленими душами і кровожерливими злочинцями, жорстокими звірами навіть за мірками овець. Це були не ті уми, які йому були потрібні; вони були мертві і зникли."
 scyflingb.2.a:0 "Наше майбутнє поховане."

 scyflingb.3.t:0 "Найбільша з іроній"
 scyflingb.3.d:0 "[PLB.GetLeader] мріяв про абсолютний контроль над расою білих ведмедів. Він проголосив себе деспотом усіх білих ведмедів. Він навіть іноді уявляв себе Ґровером І, але для білих ведмедів. Адже він чув історії про великого завойовника Грифонії, адже навіть у горах Ведіни та Брентбік говорили про його міф. І невід'ємною частиною всіх цих мрій був аспект контролю. Адже жоден інший лідер не об'єднав державу і расу під своїм контролем так, як Ґровер І. Проте ведмеді не були расою, яку так легко підкорити, і [PLB.GetLeader] був змушений нескінченно боротися з ними за контроль, якщо не в буквальному сенсі, то в сфері політики і навіть економіки.\n\nАле тепер, коли трюми були зруйновані, армії вирізані, а благородні і великі лідери відправлені на спочинок під снігами і льодами... Коли він відкинув своє іноземне ім'я і з ганьбою взяв своє старе. Як він поховав свої надії і мрії... Тепер вони прийшли до нього, ті, що залишилися, ті, що наважилися запитати його раніше, ті без кланів, що насміхалися над його мріями. Тепер вони всі прийшли до нього. Бо висохли торгові шляхи. Бо шахти були зруйновані. Занедбані корінні ферми. І тепер вони не могли вижити самі, надто залежні від миру, який він приніс лише кілька років тому. Вони потребували його! Їм потрібен був тиран, який міг би контролювати всіх, щоб врятувати їх! І з гіркотою [PLB.GetLeader] знову почав керувати царством білих ведмедів, цього разу без опозиції, без питань. Вони нарешті визнали його абсолютною владою...\n\nАле тепер волхвів-писарів не було, старійшин не було, справжніх ковалів і шаманів не було... Абсолютна влада, яку він так прагнув піднести, переходить у нову епоху, обмежену умовами. Навіть під його абсолютною владою вони не процвітатимуть, а лише, можливо, виживатимуть..."
 scyflingb.3.a:0 "Це жарт Всебатька?"

 scyflingb.4.t:0 "Цікава пропозиція"
 scyflingb.4.d:0 "Із земель білих ведмедів прибув посол. Представника супроводжував військовий загін, закутий у традиційну ведмежу броню. Однак ця броня, здається, ледве тримається і не має жодного символу з їхніх традиційних кланів або навіть символів По Уеллінгтона, чи як там себе називав деспот ведмедів у наші дні.\n\nОни пропонують нам угоду. Допомогу у відновленні після очевидної катастрофи для так званих земель Гейрфугльвідда та островів Ян-Майєн. Зазвичай така пропозиція була б дивною або, можливо, навіть абсурдною. Адже якби ми хотіли ці землі, ми могли б просто взяти їх, якщо наш сусід справді такий ослаблений. Однак, ведмеді і ми історично не були супротивниками, принаймні з їхньої точки зору, а вести війну з ведмедями - справа нелегка і не весела. Крім того, на цій землі живуть пінгвіни, причому в значній кількості. Навіть якщо вони були інтегровані в дивні ведмежі звичаї, як більшість так званого "клану Анкер", вони все одно залишаються пінгвінами і відчувають спорідненість з нами. І як висловлювалися різні діячі на наших землях, наше населення, безумовно, відчуває спорідненість з ними. Але в той же час земля, на якій вони зараз живуть, жорстоко обробляється і не має виробничих потужностей..."
 scyflingb.4.a:0 "Земля бідна, але ми не можемо покинути наших родичів"
 scyflingb.4.b:0 "Пустка? Ведмеді можуть залишити її!"

 scyflingb.5.t:0 "Пінгвіни приймають!"
 scyflingb.5.d:0 "Конвої, наповнені матеріалом, тягнуться до горизонту. Крижані громади з різноманітними ресурсами досягають небагатьох портів, які ще існують. Угода відбулася, і пінгвіни прийняли нашу пропозицію! Хоча керівники наших держав не зустрічалися, угода була досягнута.\n\nХоча деякі ведмеді, особливо кілька вцілілих паліїв війни і колишніх вигнанців, висловили невдоволення, стверджуючи, що ми зраджуємо нашу расу, наш клан і нашу доктрину, якою б вони її собі не уявляли, на щастя, не було ніяких конфліктів з силами пінгвінів, які просуваються в безлюдне царство, яке тепер належить їм.."
 scyflingb.5.a:0 "Маленькі перемоги в ці прокляті дні."

 scyflingb.6.t:0 "Пінгвіни відмовляються!"
 scyflingb.6.d:0 "Королівство пінгвінів відхилило нашу пропозицію, стверджуючи, що їм не потрібен пустельний пекельний пейзаж, холодний і жорстокий навіть за мірками холодної півночі, в межах якої мешкають наші раси. Більше того, в їхній заяві це не було сказано прямо, але посланець, якого ми відправили, стверджує, що він відчув підтекст, що лідери пінгвінів хотіли заявити, що якщо вони бажають колишні землі клану Свартпельс, вони просто візьмуть їх.\n\nБагато хто з нашого клану відреагував на таке гнівними заявами про помсту і звинуваченнями у зраді пінгвінів. Однак поки що вони, схоже, не бажають самі спричиняти конфлікт. Більше того, вони, здається, розуміють, що, особливо після відмови від угоди, ми не в змозі розпочати таку війну, навіть якщо поки що не готові до неї. Вони, схоже, вважають, що війна може настати в майбутньому, а поки що ми нічого не можемо зробити."
 scyflingb.6.a:0 "Будьте прокляті ці нелітаючі птахи!"

 scyflingb.7.t:0 "По той бік плоті" #леопольд ведмеді на Ключ-озері. Зосередьтеся на більшій кількості лазерних гармат та кришталевих речей
 scyflingb.7.d:0 ""Я чув історії, але це... божевілля..." Це все, що зміг сказати По, побачивши ряди голих солдатів, що стояли на березі Ключ-озера без обладунків. Але Рунгілс, сержант механітів, жбурнув у новобранців зламаним списом, і той відскочив від їхньої металевої шкіри з дзвінким дзенькотом. "Але він працює. Завдяки деякому медичному обладнанню, "позиченому" у чейнджлінґів, ми можемо легко повторити цей подвиг для ваших солдатів! Присилайте їх до наших клінік! Кілька днів під ножем, і їхні кістки стануть кришталевими, а замість шкіри та хутра їхня плоть буде сталевою!"\n\nЦі слова відлунювали в голові Уеллінгтона, коли він бачив, як так звані "ключ-ведмеді" - одягнені в цю "кібернетику", як називав її Рунгілс, - б'ються один з одним, і По не міг не відвисати, коли бачив, як лазери, що живляться від кристалів, вмонтованих у шкіру, вистрибують, відхиляючись від їхніх голів, наче ніщо. Деякі з них були в окулярах - Уеллінгтон клявся, що бачив, як кристали випромінювали текст і діаграми в їхні очі.\n\nНа заході сонця Уеллінгтон потиснув лапу Рунгілсу, а потім пішов до центрального трюму міста, який мав механічний відтінок ще більш міцної сталі, що утримувала сніг і лід. Звідти відкривався захоплюючий вид на озеро і чарівні ливарні соріфських чейнджлінґів, що пронизували палаючі сутінки.\n\nПеред сном помічник запитав його, що він думає про "дивні і незвичні ремесла Механітів." Сер, я знаю, що вони корисні, але що скаже Всевишній про ці необмежені експерименти над тілами, які він створив?" Але у По вже була готова відповідь:"
 scyflingb.7.a:0 ""Хіба Всевишній не виходить за межі будь-якої плоті?""

 scyflingb.8.t:0 "Піч хуртовини" #леопольд ведмеді 2: robot boogaloo. Зосередьтеся на більш традиційній зброї
 scyflingb.8.d:0 "Дим ударив в обличчя По, але він струсив його, не відриваючись від свого гіда по заводу.\n\nПротягом останнього місяця механіки з [PLB.Capital.GetName] зводили ці металеві печери, щоб запрягти в них кузні майбутнього. Це був лише початок; розроблялися плани, як вичавити нафту з ґрунту до останньої краплі. Уеллінгтону боляче було чути, як механіти засуджували цінні традиції, такі як сівба, але результати, які приносила їхня заміна, компенсували цю втрату.\n\nАле що пом'якшувало його серце, так це те, що його полкам видали стільки гвинтівок. Не ті старі, що роздобув Кемерскай та інші північні грифони; це були найсучасніші гвинтівки, перероблені з власних, що належали чейнджлінґам. І кожен солдат мав першокласне спорядження: гранати, магічні перев'язувальні пакети, аптечки, а також індивідуальну зброю - гранатомети та снайперські гвинтівки. Він бачив, як його найзеленіші новобранці ледве приховували свої ікласті посмішки, споглядаючи, як їхня нова сила з'являється після легкого натискання на спусковий гачок.\n\nНаприкінці дня механіти подарували йому гвинтівку та пістолет, зроблені на замовлення. І перед тим, як заснути на ніч у столичній фортеці, він востаннє глянув на вікно: [PLB.Capital.GetName], охоплену полум'ям і димом цегляних будинків. Печі гуділи за солодким тріском пострілів, що лунали з сусідньої казарми."
 scyflingb.8.a:0 "У сучасність, штовхаючись і кричачи."

 scyflingb.9.t:0 "Совиний ведмідь"
 scyflingb.9.d:0 ""Хто ти такий, селянське дитя, щоб ставити під сумнів мудрість мого вибору?!" крикнув Йоріс на вискочку-офіцера, що зірвав церемонію підвищення Ульріка в чині. "Твій язик випереджає твій мозок? Покажи мені, що залишилося від твоєї розбитої гідності!"\n\nТаким чином, Совиний Ведмідь спостерігав, як розгортається побоїще, його нова форма була лише наполовину готова. Медалі, стрічки, модний капелюх із грифона, як у його друга, - все це було свідченням того, як Уеллінгтон розтрощив протестувальника, а по переобладнаній арені лунали хрускіт і тріск. Ім'я ворога промайнуло в голові Ульріка - Клапторк, скромний лейтенант, якого він вперше зустрів у Грифонії, і який кинув грифону кілька поглядів і образливих слів: "Можеш скільки завгодно розпушувати пір'я, дзьобатий, але вогонь у тобі - доказ того, що ти ніколи не будеш нашим родичем." Але коли Уеллінгтон повалив Клапторка на землю, аудиторія вибухнула аплодисментами. Ульрік побачив порожні місця, порожні місця в натовпі, де раніше найхолодніші голови ведмежого товариства об'єднувалися навколо амбіцій Уеллінгтона. Але зараз він відчував себе одним з найрозумніших істот у цій кімнаті - жахлива перспектива, коли всі інші, окрім Уеллінгтона, мали уривчасті історії, найманське минуле.\n\nВеселе ревіння роздирало йому вуха. Бій закінчився. По підняв відрубану ногу Клапторка в повітря."
 scyflingb.9.a:0 "Фельдмаршал Ульрік взяв другу ногу."

 scyflingb.91.t:0 "Вічне постає"
 scyflingb.91.d:0 "Важко сказати, коли справді почалася зміна. Чи було це тоді, коли він був переконаний, що їм потрібно утримувати всю цю порожню землю? Чи тоді, коли ведмежі війська почали ставати ще більш божевільними та жорстокими, ніж це було прийнято навіть у їхньому жахливому суспільстві, намагаючись гарантувати, що жоден грифон, чейнджлінґ чи будь-який інший ворожий воєначальник або шукач пригод не зможе забрати їхню землю? Чи було це тоді, коли здавалося, що кожна мерзота, божевільний, кровожерливий маніяк і кожне чудовисько під замерзлим сонцем почало шукати і приєднуватися до їхніх армій? Це було тоді, коли це було дозволено чи заохочувалося? Чи, можливо, це відбувалося весь цей час...\n\nАле ті ведмеді, що вижили, втратили пам'ять про свої клани, втратили зв'язок з історією, яка тисячоліттями визначала їхній рід, їхні вірування та культи були змиті. Залишилися лише жага крові та бажання війни, які, схоже, з часом тільки зростали. Навіть [PLB.GetLeader] відчував, що піддається бажанню війни і помсти всьому світу. Єдине, що утримувало його від такого божевілля, був страх і жах перед тим, наскільки більшими були армії всіх інших держав.\n\nПринаймні, так було доти, доки не з'явилася темрява, яка породила цю злість у ведмедях, - Вічний. Велика мерзота протистояла Овертайранту, але, здавалося, не збиралася зламати його перед усіма і проголосити себе лідером. Ні, скоріше вона просто говорила. Жодному воєначальнику чи воїну не було дозволено чути, про що говорили Тиран і Чудовисько. Та коли [PLB.GetLeader] з'явився в тіні Вічного, він значно підбадьорився. І коли він пройшов великою фортецею, віддаючи накази воєначальникам і воїнам, почав поширюватися бойовий клич. Той, що увібрав у себе всю жагу до крові, яка накопичилася у воїнів."
 scyflingb.91.a:0 "Чудовиська знову пройдуть світом!"

 scyflingb.92.t:0 "Сон"
 scyflingb.92.d:0 "У нього була мрія, ще коли він був звичайним найманцем, що воював за воєначальників, на яких йому було начхати. Він тримався за неї навіть тоді, коли вперше за багато десятиліть був змушений битися з іншими ведмедями, і його серце знову стало твердим після того, як воно розтануло від слабкості у Грифонії. Навіть коли його армії йшли з божевільною ідеєю очистити землю від усіх зрадників, він все ще чомусь вірив, що після всього цього буде велич... Але величі не було, був лише попіл, вбиті традиції і мертві мрії.\n\nПринаймні, так він вірив. Бо час лікує все, і навіть попри всі смерті, навіть попри скасування родових традицій, знищення родів і культур, які витримувалися тисячоліттями, урсин дух вистояв. І як великий північний кит, прокинувшись, розбиває гори льоду, так і наступ великого Залізного міста прорвався крізь його нездужання.\n\nІ тепер, дивлячись з балкона цитаделі в центрі великого Залізного міста, де мешкає мільйон ведмедів, і бачачи, як вирують фабрики і марширують великі армії, він знову починає вірити. Єдність і велика міць Півночі знову в його руках. І, можливо, з таким благословенням, Всевишній пробачив його і знову дарував йому долю...."
 scyflingb.92.a:0 "Ми знову йдемо на північ, об'єднані залізом і кров'ю."

 scyflingb.10.t:0 "Вчимося у Ґровера та Селестії"
 scyflingb.10.d:0 "Це було велике питання, яке турбувало багатьох ведмедів, яких Уеллінгтон зустрічав у своїх мандрах і після повернення. Його повторювали кілька мандрівників з діамантовими собаками в Північному Хмарочосі, розбійники-яки в Нова-Грифонії і навіть один дракон у Ведіні. Чому саме в цьому світі великих звірів і розумних монстрів порівняно крихітні грифони, поні, чейнджлінґи і навіть зебри були такими панівними породами. Вони були маленькими, слабкими і кволими. Їхня чисельність не могла компенсувати цього. Навіть їхня магія, за винятком обраних єдинорогів або алхіміків-зебр, була жалюгідною у порівнянні з тим, на що здатні всі величезні за розмірами раси.\n\nАле, мандруючи і борючись, збираючи силу і знання, Уеллінгтон знайшов відповідь. Саме у великих божественних або псевдобожественних правителях ці слабкі раси знаходили свою силу. Майже завжди саме ці великі лідери абсурдних розмірів і сили об'єднували ці королівства і перетворювали їх на імперії, подібних до яких ніхто ніколи не бачив. Селестія і Ґровер серед них стали найбільш сумнозвісними для цілих континентів завдяки своїй могутності і, що важливо, великому довголіттю і спадщині. Дракони, ведмеді, яки... Ніхто з них по-справжньому не мав такого. Можливо, лорд Смолоскип міг би зрівнятися, але серед старійшин своєї породи він здавався скоріше неприємністю, ніж якимось верховним вічним володарем.\n\nІ в цьому, мабуть, була відповідь. Уеллінгтон вже об'єднував ведмедів, і не раз, а двічі, і стояв на порозі великих справ як всебатьківський чемпіон. Можливо, для справжньої величі ведмедів йому потрібно було вийти за межі..."
 scyflingb.10.a:0 "Крок вперед до вічної величі."

 scyflingb.11.t:0 "Протиприродний закон" #напівсучасний напівфеодальний лад
 scyflingb.11.d:0 "Лови момент, так говорив Трік Бук. Для ясноокої студентки-єдинорога, яка навчається за обміном у столиці [PLB.GetNameDef], можливість висловити другу юридичну думку щодо якоїсь нової пропозиції західного уряду проклала б шлях до шанованих юридичних фірм на батьківщині, тож коли її професор розповів їй про спонсоровану університетом поїздку до Ґейрфуґвідивди саме з цією метою, вона погодилася на неї. Але тепер, застигла, як лід, стоячи перед якимось закутим у броню і сокиру і, безумовно, велетенським білим ведмедем, який міг би зжерти її за секунду, паном Текк'я, Бук затамувала подих, надто пізно усвідомивши, що Ґейрфуґівіда - ведмежа територія.\n\nЇї страх не вщух, коли Текк'я підняв її за стіл розміром з ведмедя, щоб критикувати проєкт нової [PLB.GetAdjective] Конституції. Цей страх перетворився на жах, коли вона прочитала про три паралельні правові системи: одна для кланів, заснована на рідній меритократії ведмедів, де верховенство права визначалося ритуальними битвами, а не юридичними прецедентами; одна для безкланових, де правили доброзичливі воєначальники, за яких можна було голосувати, натхненні герцогськими генералами Олександра Кемерскай, які мали наглядати за іноземними грифонами; і одна для аристократії, яка не мала суміжних територій, але володіння якої були розкидані по кланових і безкланових землях, за зразком двору княгинь з Екестрії, чия легітимність була встановлена виключно вибором короля Йоріса. Три десятки округів, три верховні суди (які могли співпрацювати один з одним), які мав перевіряти сам король. Через ритуальні битви та юридичні дебати.\n\nНа півдорозі цей страх змінився на сильну мігрень. Якби вона могла допомогти молодим ведмедям стати на копита на міжнародній арені, це було б чудово. Але це був безлад."
 scyflingb.11.a:0 "Це буде найкраще з трьох світів."

 scyflingb.12.t:0 "Король зими"
 scyflingb.12.d:0 "Навіть якщо дехто побоювався, що через те, що їхній деспот проголосив себе королем за традицією, явно натхненною грифонами, церемонія коронації буде помпезною і недоречною. Але вони помилялися. Перший Король Зими був коронований не в якійсь затишній кімнаті.\n\nПід бурхливими небесами відбувалася церемонія, організована під час великих хуртовин, що розривали замерзлі гори. Ведмеді, що зібралися, вожді кланів та їхні великі старійшини, найбільші воєначальники фортець без кланів, навіть деякі з великих вічних постатей ведмежого суспільства, всі були одягнені не в чудовий одяг, а у великі обладунки з зачарованої сталі та міцніших металів. І не якийсь священик чи інша постать чекала з короною, щоб проголосити деспота справжнім королем. Скоріше, височенна закута в обладунки постать, що стояла під зібраними лордами урсинського роду, сама відкрила корону. Він викував її зі сталі, на великому залізному кільці якої були викарбувані мотиви великих звірів і бачення війни. Згадане кільце оточували 10 клинків, кожен з яких міг би слугувати повноцінним мечем для поні чи грифона.\n\nІ під поглядом статуї Всебатька король Йоріс Зимовий увінчав себе залізною короною, взявши нове ім'я. І великі воїни, і воєначальники, і звірі - всі закричали."
 scyflingb.12.a:0 "Хай живе Король Льоду та Морозу!"

 scyflingb.13.t:0 "Про золотий стандарт"
 scyflingb.13.d:0 "Золото використовувалося як валюта в усьому світі. Через свою рідкість, уявну нездатність до корозії, іноді через здатність передавати енергію або навіть через реакцію на певні магічні здібності чи предмети, воно здобуло репутацію рідкісного та цінного металу. Сприйняття цінності, яке виходило за його межі у виробництві та чаклунстві.\n\nОднак ведмеді не цінували золото. Для них це був слабкий і покірний метал, який неможливо перетворити на обладунки чи зброю, щонайбільше його можна було використати для потужних громових обладунків, та й то лише для проведення магічних струмів. Тому, коли король Йоріс оголосив, що буде випущена золота валюта, яка замінить систему бартеру або надзвичайно рідкісну карбування монет із зоряної сталі в надії на допомогу в модернізації, дехто відреагував з гнівом і невір'ям, що їхній монарх зробить такий принизливий вибір, і кинув виклик його рішенню. Це спричинило великий конфлікт між тими урсинами, які підтримували зміну карбування монет, і тими, хто виступав проти.\n\nОднак, після кількох тисяч дуелей і нібито до десяти тисяч загиблих, нарешті було вирішено, що дійсно, перехід на золото був необхідним."\n\nУривок з книги "Вершник у країні вічної зими.""
 scyflingb.13.a:0 "Чому ми знову це робимо?"

 scyflingb.14.t:0 "Принцеса при дворі тирана"
 scyflingb.14.d:0 "Це не була велика зустріч двох вождів кланів у традиційному розумінні. Бо не було великого походу армій, не було брутальної демонстрації сили. Лише особиста і здебільшого цивільна зустріч двох вигнанців, що повернулися, натхненних великими вождями інших королівств.\n\nУгода Вольсунґрів надіслати своїх воїнів, старійшин і книжників до двору Зимового Короля була легкою. Що було важче для Йоріса, так це переконати принцесу, що він їй не ворог, бо вождь Вольсунґра, схоже, перейняв огидну південну звичку не змиритися зі своїми поразками.\n\nОтже, вони розмовляли вдень і вночі про політику, філософію, злети й падіння королів і королев, імператорів і кайзерів по всій Грифонії та Еквусу.\n\nІ в цій суперечці, яку більшість старших назвали б "не-ведмежою", ідеї гармонії, дружби та захисту довкілля зіткнулися з цілями модернізму, державної стабільності та Ґроверитського імперіалізму. Проте і король, і принцеса погодилися, що стабільність і виживання ведмежої держави є цілісним понад усе. І на цьому вони побудували угоду, яка не була б відома тим, хто не терпить напівзаходів, але яка влаштовувала їх обох.\n\nІ кров'ю і сталлю вони поклялися дотримуватися її..."
 scyflingb.14.a:0 "І принцеса знову схилила коліно перед королем"

 scyflingb.15.t:0 "Володарі грому при дворі"
 scyflingb.15.d:0 "Великі воїни увійшли до столиці. Кожен з них був одягнений у повні громові обладунки, але їх все одно налічувалися тисячі - велика розкіш, яка була можлива лише завдяки довгій історії великих перемог Великого Клану Свартпельсів. Процесію очолював вкритий блискучою сталлю велетень, що ховався під обпаленою блискавками плоттю - Повелитель Грому Торбен.\n\nУперше за тисячі років армії Свартпельсів увійшли до столиці клану Скюфлінґ. Але це було зроблено не як вороги чи завойовники. Навпаки, коли Володар Грому зустрівся з Деспотом Усіх Ведмедів на великій площі в центрі міста-фортеці, вони обійнялися в напівборотьбі з такою силою, що вистачило б розчавити танкетку. Зворушливий жест братерства було чути по всьому місту, адже обидва ведмеді були вдягнені в таку броню, що засоромили б не один танк. Після привітання, що отримало схвалення зібраних старійшин, обидвоє розірвали контакт, і воїни-писарі Свартпельсів були направлені до нової фортеці в межах міста, побудованої спеціально для них.\n\nОтже, багато старійшин клану Свартпельсів оселилися в місті-фортеці Магаря-Фяраня. Бо їхній володар над володарями запросив їх туди, щоб допомогти в управлінні великим королівством і підтримці традицій та належної культури урсінів, навіть коли королівство рухалося вперед."
 scyflingb.15.a:0 "Шаноблива посада для тих, хто приборкує блискавки."

 scyflingb.16.t:0 "Багато віри"
 scyflingb.16.d:0 "Хоча сам Йоріс тримався своєї віри у Всебатька у спосіб, більш схожий на відданість грифона Борею, більшість білих ведмедів поклонялися інакше, ніж він та більшість інших рас. Вони не шанували і не схилялися перед якимось абстрактним божеством, що мешкало високо в небесах, вони просто поважали ці містичні фігури. Більше того, більшість їхніх постатей були реальними, принаймні у ведмежій історіографії, великими істотами, які перетнули завісу у вічний світ духів. Можливо, ці незліченні культи на честь різних істот можна порівняти з повагою поні до алікорнів, але навіть тоді жодне божество чи постать не шанувалося всіма, а ті кілька, що були універсальними, як-от Всебатько, часто відігравали другорядну чи навіть третю роль у пантеонах кожного клану чи навіть загону. Крім того, не існувало універсального способу виявити повагу до цих постатей.\n\nІ це мало змінитися.\n\nБо Зимове Королівство було королівством, яке обіцяло поважати культури кланів і військових загонів, багато з яких проіснували століттями або й більше, придушуючи будь-яку ідею універсального ведмежого націоналізму. Проте сучасне королівство потребує певної єдності, заснованої на чомусь більшому, ніж просто пошана до вождя. І тому король Йоріс зробив інший вибір..."
 scyflingb.16.a:0 "Їх об'єднає віра."

 scyflingb.17.t:0 "Децентралізована традиція"
 scyflingb.17.d:0 "Йоріс заревів, коли останній з претендентів впав на незламну вічну мерзлоту. Мало хто з шаманів кинув йому виклик, коли він зробив свій вибір, але все ж знайшлися хоробрі або дурні, які повірили в його вибір.\n\nЗдавалося, що він не мав права залишати так багато автономії і свободи в тому, як ведмежі шляхи віри можуть рости і розвиватися, але, можливо, це було на краще. Але він вирішив, що всі урсини можуть вшановувати будь-яку міфічну постать, яку захочуть. А їх було чимало... Фенрір Лютововк, Галлінбурсті Працьовитий Кабан, Великий Ворон були найвідомішими і найважливішими в міфах, але якщо поглянути на клани і військові загони, то можна було б знайти незліченну кількість інших: Гнівна Гора, Великий Змій, Перший Совиний Ведмідь, Вічний, Гноф-Ке, Тиран Замерзлого Берега, Мехас - Повелитель Машин, Заал... Ці імена можна було б перераховувати цілими книгами і, мабуть, все одно не згадати всіх постатей, які були шановані тим чи іншим загоном.\n\nОднак після його дещо безкровної реформи і лише кількох загиблих релігійних діячів, відбувалися зміни. Тепер шамани поширювали аспект віри, якого раніше не існувало - центральне і абсолютне положення Всебатька як фігури, яку всі ведмеді повинні шанувати і поважати в тій чи іншій мірі.\n\nІ ми сподіваємося, що така універсальна божественність забезпечить відчуття єдності навіть після того, як Йоріс піде з життя...."
 scyflingb.17.a:0 "Всебатько - деспот усіх нас."

 scyflingb.18.t:0 "Нова віра"
 scyflingb.18.d:0 "Шамани і справді вірні та благоговійні ведмеді не сприйняли це легковажно, вони не сприйняли це легко. І так день за днем почалися битви. І день за днем Йоріс і його поборники билися на дуелях і наказували тих, хто наважувався не покоритися, а часто й до смерті.\n\nБо Йоріс обрав важкий шлях, він обрав істинний шлях, він обрав шлях, який об'єднає урсинів на тисячоліття, а можливо, й на мільйони років вперед. Бо хіба Ґровер Перший та його наступники не знищили місцеві різновиди вірувань, щоб викувати єдність між усіма грифонами? І хіба Селестія не підкорила всі інші віри, поки вони не стали шанувати лише її? Очевидно, що єдина, об'єднана віра була тим, що дозволило цим королівствам досягти величі, оскільки єдність була викувана навколо ядра єдиного поклоніння! І таким чином він викував своє власне. З Всебатьком як верховним божеством, якого слід шанувати і якому слід поклонятися, як тому, що дозволив білим ведмедям прагнути до величі, і Трьом Великим Звірам: Фенрір - Лютий Вовк, Галлінбурсті - Працьовитий Кабан, Великий Ворон - його послідовники, які дали ведмедям інструменти, щоб піднятися над усіма іншими чудовиськами та дикими тваринами. Іншим другорядним персонажам дозволялося шанувати дещо менше, але ніколи не на рівні цих чотирьох. І це розлютило багатьох ведмедів.\n\nАле, незважаючи на всі їхні тявкання і все їхнє божевілля, традиціоналісти здалися. Бо яких би поборників вони не привели і як би не були розлючені, воля короля була абсолютною. І тому вони здалися."
 scyflingb.18.a:0 "Якщо король каже, що ти поклоняєшся Всевишньому, ти поклоняєшся Всевишньому!"

 scyflingb.19.t:0 "Архонт урсинів"
 scyflingb.19.d:0 "Новий Зимовий пантеон було створено. Кувалися різні нові традиції віруючих, збиралися і виконувалися релігійні обряди. Однак жодна справжня релігійна інституція не може існувати без лідера на чолі, сильної фігури, яка могла б вести вірних через усі прийдешні часи. І хоча Йоріс хотів коронувати себе не лише як короля зими, але й як верховного релігійного представника Всебатька і всіх богів, друзі та радники відраджували його, бо такий вчинок, можливо, був би знову сприйнятий як спроба зміцнити свою абсолютну владу. І, можливо, як застерігав його Ульрік, може спричинити Третю Об'єднавчу війну. І тому з гіркотою король шукав іншого кандидата.\n\nАдіті була шаманкою, самопроголошеною пророчицею, яка стверджувала, що здатна зазирнути в глибину полярних штормів і побачити наслідки будь-якого конфлікту. Крім того, вона була палкою шанувальницею Всебатька, і не просто з поваги до міфологічного дарувальника мудрості, а з палкої віри в те, що саме божество дарує їй видіння перемог і поразок. Ведмедиця не виступала проти походу Скюфлінґу до ведмежого об'єднання ні під час першої, ні під час другої Об'єднавчої війни, хоча й не підтримувала його. Взагалі провидиця була своєрідною загадкою, бо, незважаючи на загальну повагу, вона не прагнула влади, а лише пропонувала пророцтва про війну для тих, хто готовий платити.\n\nАле, як не дивно, коли Джоріу запропонував посаду Верст-Гудії, Адіті прийняла її без особливого опору. І таким чином, перша Øверст-Гудіджа була увінчана короною з рогів під великою статуєю Всебатька. І сто тисяч ведмедів ревли на знак схвалення!"
 scyflingb.19.a:0 "Будемо сподіватися, що це не обернеться проти нас..."

 scyflingb.20.t:0 "Лист до принцеси" #Йоріс засновує посольство в Еквестрії (Ведмежа сторона)
 scyflingb.20.d:0 "Дорога Селестія,\n\nУсе почалося з того, що Флаттершай допомогла Епплджек доставити яблука в Кантерлот. Це було в той час, коли будувалося посольство білих ведмедів біля Кантерлота. Як розповіла мені Флаттершай, вона злякалася вигляду жахливого крижаного замку, який будували істоти, що виглядали більш жорстокими, ніж стародавні вікінги Оленії. Але ми помітили її страх. А якщо чесно? Мені теж було страшно. Ми всі були налякані. Але ми знали, що ведмеді прийшли не для того, щоб воювати з нами. Після тисячоліть ворожнечі вони простягнули нам руку дружби. Тож ми відкинули свої страхи і разом вирушили до посольства. І знаєте, що ми там побачили? Ведмеді виявилися набагато милішими, ніж ми думали! Їхній король (за словами Флаттершай, Йоріс може виглядати грубим, але він милий, коли ви дізнаєтесь його ближче) привітав нас у своєму крижаному замку, де ми провели плідну дискусію про студентів за обміном, а також про торговельні питання, перш ніж сісти за домашню ведмежу кухню, яка виявилась напрочуд всеїдною. Наприкінці дня вони хотіли б побачити нас ще раз, особливо король Йоріс та принцеса Ейра; Пінкі Пай вже планує вечірку "Зігрівання вогнища" найближчим часом! (Ведмедям також дуже сподобалися яблука сім'ї Еппл!)\n\nЯкщо з цього можна зробити висновок, то це те, що в бурхливому порядку нового тисячоліття все ще є благословенням бачити дружбу скрізь, навіть там, де ми найменше її очікуємо."
 scyflingb.20.a:0 "Твоя вічно вірна учениця, Твайлайт Спаркл."

 scyflingb.21.t:0 "Посольство від ведмедів" #Йоріс засновує посольство в Еквестрії (сторона поні)
 scyflingb.21.d:0 "На її північній батьківщині, у Вінніаполісі, бувають жахливі хуртовини, але для співделегата Марч Ґастісноуз сьогодні ці бурі набули плоті та хутра.\n\nМета ведмедів в околицях Кантерлота була відома: вони побудують посольство в Еквестрії, встановлять дипломатичні відносини. Але вигляд броні, якої вистачило б на батальйон танків, сотні сокир завбільшки з трьох поні, і все це при тому, що вони вибивали сніг із землі... налякав до смерті.\n\nАле незабаром замерзаюче посольство було збудоване, і еквестрійська делегація зустрілася зі своїми ведмежими колегами. Їхній ватажок, король Йоріс, височів над ними, відкидаючи тінь, підсилену кількома шарами зачарованої сталі та заліза, благословенну клинчастою короною витравлених монстрів, підкріплену вбивчими пазурами та зубами.\n\nАле владна лапа короля простяглася до її копита, просячи потиснути руку. Приховуючи нервовий ковток, Ґастісноуз потиснула її, і, опинившись всередині будівлі, вона здивувалася арктичним печерам, де воїни-поні спарингували з дитинчатами, оточені крижаними статуями Йоріса та різними зображеннями їхнього божества, "Всебатька." Невдовзі вона вже розмовляла зі справжнім Йорісом та його принцесою/коханою Ейрою, переговори змінилися розмовами про фрукти та мюзикли поні. Хоча ведмеді були грубими, вони все ж висловлювали надію на майбутнє, викуване як ведмедями, так і поні. Зрештою, цього було достатньо, щоб залишити Ґастісноуз з теплою посмішкою..."
 scyflingb.21.a:0 "І ось ми тут, і це прекрасний день..."

 scyflingb.22.t:0 "Усе, що було втрачено"
 scyflingb.22.d:0 ""Що це?" запитав Йоріс, дивлячись на майже півдюжини томиків, начебто нещодавно написаних і переплетених текстів. \n\nТвоя "легітимність." Торбен взяв один з великих томів і обережно розгорнув його біля середини. На сторінці була зображена іконографія клану, якого Йоріс ніколи раніше не бачив, в оточенні варіацій та пояснень. Іншу займав довгий список "спадкоємності" вождів з датами, хто і коли здобув право правити. Десь у середині лідерство переходить до клану Кейна, а наприкінці - до нього, як до "Йоріса Зими." "Я не розумію і не дуже переймаюся одержимістю багатьох інших рас спадкоємністю і специфічним успадкуванням титулів." Володар Грому закриває фоліант. "Але я знаю правила. І в цих томах я зібрав історії та символи кожного загубленого клану і стародавнього деспота, які коли-небудь правили чимось, які землі вони займали, хто захоплював ці території і передавав легітимність. Усе, поки ми не дійдемо до тебе."\n\n "Навіть Тирана з Замерзлого Берега і Деспота Клопів?" пожартував Джоріс. Володар Грому у відповідь загуркотів, як гора, його сміх був глибоким і гарчанням.\n\n "Я поважаю твою доблесть, друже мій, але сумніваюся, що навіть ти зможеш переплисти Замерзле море і захопити Ведіну, навіть якщо я прорубаю шлях крізь двадцять тисяч років втраченої історії, щоб передати тобі претензії.""
 scyflingb.22.a:0 "Це виклик, мій друже?"

 scyflingb.23.t:0 "Ультиматум"
 scyflingb.23.d:0 "Сказати, що ведмеді надіслали посла-залякувача, було б приблизно те саме, що стверджувати, що дракон схожий на ящірку, тільки більший. Зараз, звичайно, таке твердження технічно було б правдивим, але це було б применшенням століття. Бо... грифон, що прийшов з боку ведмедя на переговори, був справжнім монстром. Хоча великий розмір Ґровера II оспівувався в легендах як велике божественне благословення, ця істота здавалася величезною і, можливо, навіть гротескною, коли вона височіла над новогрифонськими посланцями, одягненими в сталеві обладунки і хутра, безсумнівно, вбитих ведмедів.\n\nІ все ж ця істота прийшла з вимогою відмовитися від багатьох земель Нова-Грифонії і віддати їх "Царству Зими." Виправдання було дивним, але простим. Ці землі здавна належали ведмежим кланам, і на них досі живе чимало ведмедів, тому Повелитель Усіх Ведмедів вимагав, щоб їх "віддали" з офіційним оголошенням і вивели всі війська Нова-Грифонії. Якщо ні, то була обіцяна помста залізом і кров'ю."
 scyflingb.23.a:0 "Ми ще не готові до такої війни. Віддайте землю, поки що..."
 scyflingb.23.b:0 "Цілісність Нова-Грифонії не повинна бути порушена."

 scyflingb.24.t:0 "Деспот з м'якою лапою"
 scyflingb.24.d:0 ""Я не очікував, що все закінчиться так... мирно." Уеллінгтон спорожнив люльку на витончену металеву попільничку, єдину розкішну річ, яку він приніс у  трюм, де вони зараз перебували, і почав возитися з люлькою, щоб наповнити її втретє, сподіваючись, що разом з димом прийде і спокій.\n\n "А чого ти тоді очікував? Знову тотальної війни?" Ульрік здивовано вигукнув, наче така думка була незбагненною. Можливо, це був залишок грифонського виховання. Для ведмедів така війна, безумовно, була б уявною.\n\n "Будь-який справжній урсинський воїн очікував би, що коли цілі клани повстануть, чи то всупереч вимогам, чи то через побоювання підривної діяльності чейнджлінґів, тоді відбудуться битви." Голос, схожий на шорсткий наждачний папір, пролунав від ведмедя, позбавленого шерсті, з мордою, вкритою шрамами від опіків - Торбена. "Але їх вмовляли або брали в поодинокі дуелі. Можливо, такий зсув свідчить про те, що ведмедям настав час знову змінитися, так само, як ми перейшли від блукаючих армій до осілих поселень." \n\n "І на що саме змінитися?" Ульрік насміхається, ніби ображений особисто. "Це ж культура, якій мільйон років!" - "На те, що вирішить Уеллінгтон. Це за ним тепер ідуть клани, і це він переконав мільйони ведмедів відступити словом і поборов десяток претендентів на владу. Яку б форму не прийняло наше суспільство, тепер вирішувати йому...""
 scyflingb.24.a:0 "Хм... Ну, є один грифон..."

 scyflingb.25.t:0 "Забагато обіцянок"
 scyflingb.25.d:0 "Уеллінгтон відсьорбнув ще чаю з чашки завбільшки з відро. Рідина була якоюсь гарячою, навіть незважаючи на те, що його крижане дихання вкрило чашку тонким шаром льоду. Він вирішив, що йому не подобається тепло напою. Але зараз він перебував у трюмах Вольсунґра, сьорбаючи південний напій, який називався чаєм, але був далекий від кореневого відвару урсинів, просто заради досвіду. Він був там, щоб побачити принцесу клану - Ейру.\n\n "Зізнаюся, я думав, що те, що сталося під час війни, було випадковістю. Я не думав, що ти справді прагнеш виконати обіцянки, побудувати державу, де дбатимуть про інтереси кожного..." Ейра, здавалося, поринула в роздуми: "Я не порушник присяги... Я присягала перед Всевишнім! І все ж я боюся цього. Я так багато їм наобіцяла, а тепер мушу поділитися владою і дати всім кланам автономію..."\n\n "Ти боїшся, що їхня сила затьмарить твою?" Ейра виглядала спантеличеною, розгубленою, наче подібні конфлікти ніколи не охоплювали її.\n\n "Ні... Я не параноїдальний генерал-ізгой у Грифонії, я не боюся ніякого ворога! Я боюся, що якщо дам кланам все, що обіцяв, вони продовжать стагнацію ще на мільйон років..."\n\n "По... Поглянь на світ, не обов'язково бути тираном, у розумінні грифона, щоб прагнути до покращення. У всіх істотах є добро. Треба просто довіряти їм." Принцеса посміхнулася. "Крім того... Між Великими Кланами у нас, мабуть, достатньо політичного капіталу, щоб тягнути їх вперед, навіть не примушуючи нікого."
 scyflingb.25.a:0 "Чи можемо ми дозволити собі таку довіру?"

 scyflingb.26.t:0 "Полярна конфедерація"
 scyflingb.26.d:0 "Це не було б справжньою демократією, поки що, бо ведмеже суспільство не дозволило б таких великих змін, поки що. Але маленькі кроки можна було б зробити. І першим маленьким кроком стала Конституція.\n\nПерша полярна конституція окреслила перехідну систему між традиційними кланами білих ведмедів, небагатьма елементами деспотичного правління По Уеллінгтона, які збереглися навіть після переговорів з кланами і натхнення від різних грифонських республіканських режимів.\n\nНаразі не буде виборів президента або представників до Стортіга - ведмежого парламенту. Замість цього інтереси кланів будуть захищати їхні кланові лідери або старійшини. Крім того, кланам буде дозволено майже повне самоврядування, за винятком надання солдатів для об'єднаної армії.\n\nНе дивлячись на теоретичне представництво для всіх кланів, більша частина влади зберігається в пазурах трьох великих кланів, до тих пір, поки переваги системи і модернізації не будуть помічені всіма ведмедями."
 scyflingb.26.a:0 "До майбутнього, вільного від міжусобиці."

 scyflingb.27.t:0 "Сильніші разом"
 scyflingb.27.d:0 ""Мммм, дуже смачно!"\nПо Уеллінгтон обідав з новим послом з Нова-Грифонії, Вернером Ветбіком. Він був дуже розважливим грифоном, хоча й трохи занадто яскравим як для Уеллінгтона.\n\n "Погода тут жахлива, - сказав Ветбік, відкусивши ще один шматочок, - але мушу визнати, що кухня тут неперевершена. Я ніколи в житті не їв такої свіжої та смачної риби! Чи можу я потурбувати вас ще однією порцією?"\n\nУеллінгтон повернувся до свого супроводжуючого, але зупинився, побачивши, що ведмідь насупився. "Щось не так?"\n\n "Ні, сер, нічого. Я не хотів би образити нашого гостя." "О, дурниці!" Ветбік насміхався: "Не соромтеся говорити про мене."\n\nСлужитель похмуро насупився. "Сильний перемагає слабкого, так має бути. Чому грифони, які мають набагато більше багатства і технологій, ніж ми, ставляться до нас як до друзів, а не як до здобичі? Це суперечить природному порядку речей." \n\nУеллінгтон суворо подивився на ведмедя. "Сильний переможе слабкого, це правда. Але коли слабкі об'єднуються в одне ціле, вони можуть перемогти сильних. Нова-Грифонія могутніша за нас, але вони слабкі у порівнянні з великими імперіями світу. Грифони достатньо мудрі, щоб зрозуміти, що ми будемо сильнішими, якщо будемо триматися разом. Намагання домінувати над нами лише змарнує сили обох наших народів."\n\nСупроводжуючий кивнув, здавалося, розуміючи логіку По. Посол Ветбік, тим часом, широко посміхнувся.\n\n "Безумовно, чудова промова, Уеллінгтоне! Я сам не зміг би сказати краще."
 scyflingb.27.a:0 "Несіть другу порцію!"

 scyflingb.28.t:0 "Природа грифонів"
 scyflingb.28.d:0 "По Уеллінгтон стояв на самоті, спостерігаючи за бурею, що збиралася на горизонті. Він згадував час, який провів як найманець у Грифонії. У той час як деякі грифони були благородними створіннями, що боролися за справедливу справу, інші були корумпованими, жадібними до влади, кровожерливими...\n\nЙого роздуми перервав пташеня з терміновими новинами. Місія, яку він відправив для дослідження Нова-Грифонії, нарешті повернулася. Поспішаючи до намету, він наказав їм скласти повний звіт.\n\n "Усі офіційні пункти перетину кордону були закриті, - сказав совиний ведмідь, якого він поставив на чолі експедиції, - тож нам довелося пробиратися туди крадькома. Ми застали країну в хаосі, але військові дуже швидко відновили порядок. Незабаром вони будуть готові до війни." \n\n "А що з їхнім лідером?" запитав Уеллінгтон, - "Що ти дізнався про нього?" "Ми ніколи не бачили його безпосередньо, але чули одну з його офіційних заяв, зачитану вголос." "І що в ній говорилося?" Совиний ведмідь подивився йому прямо у вічі. "Ми повинні припинити ставитися до менших народів Півночі, як до рівних собі, і визнати їх такими, якими вони є: підданими, яких ще належить завоювати." \n\nУеллінгтон скривився. Він повинен був це передбачити, він знав, що тиранам Грифонії завжди вдавалося здобути перемогу над чесними лідерами. Як і в минулі віки, лицарі-грифони незабаром вирушать у похід на землі ведмедів. Але цього разу він був зобов'язаний зупинити їх.\n\nЙого конфедерація, країна, яку він так довго будував, тепер була останньою справжньою республікою на Еквусі. Він змусить їх заплатити за спробу забрати її у нього. Якщо грифони не могли самі зупинити цього тирана, то він зробить це за них!" "Оповістити клани, приготувати армії." Ми покажемо їм, як б'ються справжні воїни."
 scyflingb.28.a:0 "Їм не зламати наш застиглий дух!"

 scyflingb.29.t:0 "Еквестрія у війні"
 scyflingb.29.d:0 ""Стортінг закликаю до порядку!"\nПо Уеллінгтон обвів поглядом представників усіх кланів білих ведмедів. Усі знали, навіщо він попросив їх зібратися сьогодні, але йому все одно довелося оголосити про це.\n\n "Ми зібралися тут, щоб обговорити вторгнення Чейнджлінґів в Еквестрію. Найбільша війна в історії нашого континенту вирує на півдні, і навряд чи вона скоро закінчиться. Ми повинні вибрати, як ми будемо реагувати."\n\nРішення, зрештою, було за Уеллінгтоном, але його тон не був зневажливим. Вірний своїм республіканським принципам, він хотів спершу вислухати зважені думки інших кланів.\n\nЕйра з клану Вольсунґр заговорила першою. "Ми повинні допомогти Еквестрії. Вони не звикли до шляхів війни, і без нашої допомоги можуть впасти духом. Поні - добрі і благородні створіння, які стануть могутніми союзниками, якщо ми заслужимо їхню дружбу."\n\n "Я згоден, що ми повинні втрутитися, - втрутився Торбен з клану Свартпельс, - але з іншої причини. Це чудова нагода перемогти чейнджлінґів, наших давніх ворогів. Поки вони відволікаються на слабких поні, ми можемо вдарити на них об'єднаною силою. Всі кривди, яких ми зазнали від їхніх копит, будуть помщені!"\n\nСтортинг наповнився гомоном згоди, коли два великих вожді кланів закінчили. По почекав, чи не захочуть висловитися інші ведмеді, але ніхто не взяв слова.\n\n "Здається, справу вирішено, - сказав він нарешті, - я згоден з усім, що було сказано тут сьогодні. Ми допоможемо поні в їхній боротьбі, заради нас і заради них."
 scyflingb.29.a:0 "Ведмеді ніколи не ухиляються від бою."

 scyflingb.30.t:0 "Пропозиція з Півночі"
 scyflingb.30.d:0 "Білі Ведмеді, у своєму великому співчутті до тих, хто постраждав від триваючої війни проти Чейнджлінґів, запропонували нам свою допомогу. Вони вважають, що можуть надати цінну підтримку Еквестрії, передавши нам контроль над кількома фабриками Полярних Ведмедів. Вони зазначають, що у них також є неспокійна історія боротьби з Чейнджлінґами і вони добре знають про їхню грізну природу. Вони закликають нас об'єднатися, щоб перемогти нашого спільного ворога і знову принести мир і стабільність на землю.\n\nПо Уеллінгтон від імені свого народу написав нам з цією пропозицією. Проте багато поні стверджують, що ведмеді повинні брати участь у війні на своєму власному фронті.\n\nМи стоїмо перед вибором: прийняти пропозицію про допомогу, чи натомість попросити про новий фронт на півночі?"
 scyflingb.30.a:0 "Прийняти щедру пропозицію допомоги від Білих Ведмедів."
 scyflingb.30.b:0 "Запропонувати відкрити другий фронт на Півночі."

 scyflingb.31.t:0 "Еквестрія погодилась"
 scyflingb.31.d:0 "Ми отримали відповідь від Еквестрії на нашу пропозицію передати деякі з наших заводів у їхнє володіння, в якій вони висловлюють подяку за нашу щедру пропозицію допомоги у війні проти Чейнджлінґів. Зараз багато наших подорожують до Еквестрії, щоб допомогти виконати квоти, яких вимагає війна. Якщо вони приймуть нашу допомогу, ми зможемо працювати разом і досягти нашої спільної мети - перемогти загрозу чейнджлінґів і відновити мир на землях, які ми поділяємо."
 scyflingb.31.a:0 "Ми стоїмо разом."

 scyflingb.32.t:0 "Еквестрія просить про ескалацію"
 scyflingb.32.d:0 "Ми нарешті отримали відповідь на нашу пропозицію. Схоже, що Еквестрія не бажає допомоги в промисловості, а натомість вимагає нашої прямої участі у війні, воюючи на власному фронті проти Чейнджлінґів. Їхній вираз у відповіді здається важким, оскільки ми розуміємо, що вони не звернулися б з таким проханням, якби не було потреби."
 scyflingb.32.a:0 "Ми стоїмо як одне ціле. Приготуйте клани."

 scyflingb.33.t:0 "Білі Ведмеді повертають свої фабрики"
 scyflingb.33.d:0 "Ми отримали звістку від Полярних Ведмедів, що вони хочуть повернути свої заводи, надані нам для ведення війни проти Чейнджлінґів. На жаль, ми нічого не можемо вдіяти, окрім, як змиритися з тим, що нам доведеться жити без їхньої промислової допомоги."
 scyflingb.33.a:0 "До пори до часу вони були корисними."

 scyflingb.34.t:0 "Ми повертаємо собі наші заводи"
 scyflingb.34.d:0 "Ми отримали підтвердження, що армія поні повернула нам наші фабрики і запаси. Після початкового процесу передачі деяких наших промислових підприємств і цінних ремісничих ведмедів, ми раді, що вони повернулися у наше володіння."
 scyflingb.34.a:0 "Знову в добрих лапах."

 scyflingb.35.t:0 "Прохання Соріфа"
 scyflingb.35.d:0 "По Уеллінгтон, ватажок Білих Ведмедів, звернувся з проханням взяти на себе управління вуликом Соріф і прилеглими територіями в нагороду за їхні зусилля у Великій війні проти Чейнджлінґів. Цей регіон лежить недалеко від кордону білих ведмедів на березі Ключ-озера і наразі є незаселеним, за винятком самого вулика. Ведмеді стверджують, що вони відіграли важливу роль у поширенні конфлікту на новий фронт у Великій війні, тим самим відволікаючи сили чейнджлінґів від власного фронту Еквестрії. Вони вважають, що в нагороду за свій внесок їм слід надати управління вуликом і прилеглою територією.\n\nУтім, деякі скептично ставляться до прохання білих ведмедів, вважаючи його абсурдним навіть з урахуванням їхньої допомоги у війні. Територія, про яку йде мова, вважається загальною пусткою, хоча в регіоні є деякі ресурси, що заслуговують на увагу.\n\nПоки триває дискусія, залишається питання: як Еквестрія повинна відповісти на цю пропозицію?"
 scyflingb.35.a:0 "Вони добре билися, надайте ведмедям землю, яку вони просили."
 scyflingb.35.b:0 "Вони хоробрі, але жадібні, відхиліть їхнє прохання."

 scyflingb.36.t:0 "Поні погоджуються"
 scyflingb.36.d:0 "Наша підтримка у війні проти загрози чейнджлінґів, була визнана Еквестрією. Як наслідок, землі, які ми просили, включаючи вулик Соріфа, були надані нам. Це значне досягнення для наших зусиль, і багато наших родин вже планують оселитися на новопридбаних землях, які залишаються в основному незаселеними. Виняток становить лише сам вулик, який ми будемо поважати як власне місто."
 scyflingb.36.a:0 "Слава Всевишньому!"

 scyflingb.37.t:0 "Поні відмовляються"
 scyflingb.37.d:0 "Незважаючи на наш внесок у війну проти чейнджлінґів, поні відмовили нам у проханні про землю, яку ми бажали, включаючи вулик Соріфа. Ми розчаровані їхнім рішенням, адже ми билися з ними пліч-о-пліч як вірні союзники. Тим не менш, наші представники повертаються до нас з розчарованими насупленими обличчями і явними образами."
 scyflingb.37.a:0 "Кляті поні."

 scyflingb.38.t:0 "Полярні волонтери"
 scyflingb.38.d:0 "Сьогодні велика орда білих ведмедів прибула до [FAT.Capital.GetName]. Після нетривалої паніки нам вдалося ідентифікувати ватажків ведмедів і запитати, що вони тут роблять. На наше здивування, вони заявили, що прийшли воювати за нас! З початку революції ми покладалися на іноземних добровольців, але багато грифонів вагалися, чи приймати цих ведмедів. Дуже мало хто з них має звичайний бойовий досвід, і ще менше говорять грифонською. Їхні уявлення про належний військовий етикет і дисципліну також дуже відрізняються від наших.\n\nУтім, ставлення швидко змінилося, коли ведмедів запросили на наші військові навчання. Білі ведмеді - люті та могутні створіння, і найсильніші з них змогли протистояти лицарям-грифонам. Оскільки їхня сила надзвичайна і вони явно захоплені нашою справою, ми врешті-решт вирішили прийняти їх до наших збройних сил."
 scyflingb.38.a:0 "Чому ні? Нам би не завадила допомога."

 scyflingb.39.t:0 "Полярні кузні"
 scyflingb.39.d:0 "Хоча ми працювали над розширенням наших промислових потужностей, нам ще треба пройти довгий шлях. Наші вороги мають багато заводів, і поки що ми не можемо сподіватися зрівнятися з ними в індустріальній силі.\n\nТепер допомога прийшла з несподіваного джерела. [PLB.GetLeader], лідер Конфедерації Білих Ведмедів, працює з нами над подоланням розриву. Він запропонував надати деякі кузні своєї країни у наше розпорядження, щоб збільшити наші виробничі можливості.\n\nСлід визнати, що кількість кузень, якими можуть поділитися ведмеді, досить невелика. Однак, враховуючи, що їхня промислова база слабка і нерозвинена, пропозиція є досить щедрою. Білі ведмеді можуть жити в країні льоду і снігу, але республіканська мрія яскраво горить в їхніх серцях."
 scyflingb.39.a:0 "Висловіть ведмедям нашу подяку!"

 scyflingb.40.t:0 "Полярний альянс?"
 scyflingb.40.d:0 "Ми отримали посланця від [PLB.GetLeader], вождя білих ведмедів. Він каже, що ведмеді та яки мають багато спільного і виграють від спільної роботи. Щоб це сталося, він просить нас підписати договір про ненапад і взаємну оборону.\n\nСамостійність, без будь-якої допомоги ззовні, є невід'ємною частиною культури яків. Якщо ми хочемо дотримуватися цих принципів, ми повинні відмовитися від пропозиції ведмедів. Однак, білі ведмеді мають цінності, подібні до наших, тому ми можемо досягти порозуміння. Вони також є великими і сильними істотами, набагато сильнішими за поні чи грифонів. Багато яків поважають їхню силу, і ми могли б скористатися їхньою допомогою, якщо нашій нації коли-небудь загрожуватиме небезпека."
 scyflingb.40.a:0 "Ведмеді добрі, ведмеді сильні."
 scyflingb.40.b:0 "Ведмеді не повинні лізти в справи яків!"

 scyflingb.41.t:0 "Альянс з [FROM.GetNameDef]"
 scyflingb.41.d:0 "Яки погодилися на нашу пропозицію. Тепер ми зобов'язуємося захищати їх від усіх зовнішніх загроз, так само як вони зобов'язалися захищати нас. Білі ведмеді та яки завжди були найбільшими та найсильнішими істотами Півночі, але брак технологій та промисловості стримував нас. Тепер, коли ми відкинули наші розбіжності, наші сусіди двічі подумають, перш ніж вторгатися на замерзлу Північ."
 scyflingb.41.a:0 "Ніхто не повинен кидати виклик нашій спільній силі!"

 scyflingb.411.t:0 "Ніякого союзу з [FROM.GetNameDef]"
 scyflingb.411.d:0 "Яки відхилили нашу пропозицію про пакт про взаємну оборону. Такий результат не був несподіваним, оскільки вони цінують самодостатність і з великою підозрою ставляться до чужинців. Іншими словами, вони дуже схожі на нас. [ROOT.GetLeader] вважав, що зможе переконати яків зробити виняток з їхнього ізоляціонізму, але, очевидно, йому не вдалося їх переконати."
 scyflingb.411.a:0 "Ви можете привести яка до води, але краще, щоб він не знав, що ви це робите."

 scyflingb.42.t:0 "Полярна пропозиція"
 scyflingb.42.d:0 "Ми отримали особисте прохання від принцеси Ейри з [PLB.GetName]. Серед лютих і часто ворожих кланів білих ведмедів Ейра завжди підтримувала гармонію і тісніші зв'язки з нами. Тепер, від імені свого нового чоловіка, короля Йоріса, вона просить нас підписати договір про вічний мир і дружбу між поні та білими ведмедями.\n\nДля багатьох цей вибір здається очевидним. Зрештою, це неймовірна можливість сприяти миру і гармонії, а також знайти нових друзів. Однак є кілька поні, які все ще бояться білих ведмедів і сумніваються, чи щирий король Йоріс."
 scyflingb.42.a:0 "Ми приймаємо!"
 scyflingb.42.b:0 "Ми не можемо їм довіряти."

 scyflingb.422.t:0 "Несподівана зустріч"
 scyflingb.422.d:0 "Президент-маршал Олександр Кемерскай стояв над картою, уважно вивчаючи дислокацію військ. За своє життя він носив кілька капелюхів, але в першу чергу він був солдатом. Складання планів битв стало для нього другою натурою.\n\n "Президент-маршал?" - вигукнув один з його помічників, - "Тут якась... істота хоче вас бачити."\nВін хотів сказати, що зайнятий, але переривання вже порушило його концентрацію.\n\n "Добре, нехай заходять."\n\nКемерскай підняв голову, очікуючи побачити грифона з якоюсь незначною звісткою. Його очі розширилися, коли до кімнати увійшов величезний, незграбний білий ведмідь. Незнайомець мав вражаючу рослинність на обличчі і був одягнений у щось схоже на адміральську форму.\n\n "Вітаю вас, Президенте-Маршале, - промовив грифон з сильним акцентом, - я - По Уеллінгтон, лідер Конфедерації Білих Ведмедів."\n\n "Вітаю..." сказав Кемерскай, не знаючи, що робити з гостем. "Що привело вас до Республіки Грифонів?" - "Я прийшов, щоб зустрітися з вами, сер." відповів Уеллінгтон, намагаючись приховати своє хвилювання.\n\n - "Зустрітися зі мною? Навіщо?"\n\nУеллінгтон глибоко вдихнув. "Я жив на цьому континенті багато років, і за цей час я чув розповіді про Кемерскай-визволителя. Багато істот знають про вашу безперервну боротьбу за Республіку, знають, як ви ніколи не здаєтеся, незважаючи на незліченні невдачі. Ці історії допомогли мені подолати мою власну боротьбу за лідерство, а ваші республіканські принципи допомогли надихнути конфедеративний устрій, який ми, білі ведмеді, зараз використовуємо. Я прийшов, щоб подякувати вам і встановити дипломатичні відносини між нашими народами." \n\n "Дуже... цікаво." пробурмотів Кемерскай, все ще намагаючись зрозуміти акцент ведмедя. "Я дуже задоволений. Дякую, що прийшли, бажаю вам і всьому вашому народу всього найкращого."\n\nУеллінгтон посміхнувся, більше не в змозі стримувати свій ентузіазм. "Дякую, сер, і вам того ж!""
 scyflingb.422.a:0 "Республіканська мрія поширюється далеко і широко."

 scyflingb.43.t:0 "Поні згодні"
 scyflingb.43.d:0 "Після обговорення Еквестрія погодилася укласти з нами пакт про ненапад. [EQS.GetLeader] визнала важливість підтримки стабільності і миру з нами на півночі і зобов'язалася утримуватися від агресивних дій проти наших народів. Ця угода також передбачає взаємну повагу до суверенітету і територіальної цілісності один одного. Ми сподіваємося, що це прокладе шлях до нової ери співпраці та взаєморозуміння між нашими народами."
 scyflingb.43.a:0 "Нехай це буде початком процвітаючих відносин."

 scyflingb.44.t:0 "Поні відмовляються!"
 scyflingb.44.d:0 "Еквестрія відхилила нашу пропозицію щодо пакту про ненапад. Ми сподівалися, що обидві наші нації зможуть працювати разом для підтримки миру і стабільності в регіоні, але, на жаль, наша пропозиція не була прийнята. Хоча це і розчаровує, ми повинні сподіватися, що це не стане стимулом для подальшої ворожнечі."
 scyflingb.44.a:0 "Догармюнювались."

 scyflingb.45.t:0 "Дві корони"
 scyflingb.45.d:0 "Коли сонце зійшло над горами, принцеса Ейра та король Йоріс стояли перед величезною громадою, що представляла як Еквестрію, так і Білих Ведмедів. Обидва лідери обмінялися сердечними обітницями, причому Йоріс пообіцяв захищати і плекати Ейру назавжди. "Я присягаюся бути поруч з тобою в горі і радості, підтримувати тебе в усіх твоїх починаннях і любити тебе з кожним днем все сильніше", - сказав Уеллінгтон, і його очі злегка заблищали.\n\nЕйра засяяла від радості, коли відповіла на його почуття. "Я присягаюся бути твоїм партнером у всьому, підбадьорювати і надихати тебе, і любити тебе всім серцем до кінця своїх днів." Натовп вибухнув радісними вигуками і оплесками, коли два лідери обмінялися обручками і скріпили свій союз поцілунком. Коли вони повернулися обличчям до громади, Йоріс взяв Ейру за лапу і високо підняв її: "Ведмеді та поні, дозвольте представити вам принцесу Ейру, нашу нову королеву!" Натовп знову зааплодував, а Ейра почервоніла від захвату. "А я представляю вам короля Йоріса, мого супутника життя і нашого гордого вождя!" радісно відповіла вона, і вони обоє посміхнулися в унісон.\n\nПісля церемонії молодята очолили процесію гостей до зали для прийомів, де на них чекав бенкет зі стейків з білого ведмедя і яблучних пирогів поні. Сидячи за головним столом в оточенні найближчих друзів і родичів, Ейра і Йоріс підняли келихи за своє майбутнє і майбутнє своїх народів.\n\n "Я не можу бути більш щасливою, що виходжу за тебе заміж, коханий", - сказала Ейра, піднімаючи свій келих.\n\n "Я теж, кохана", - відповів Йоріс, дзенькнувши своїм келихом об її келих.\n\n"
 scyflingb.45.a:0 "Зв'язок, що поєднує полярний дух і гармонію."

 scyflingb.46.t:0 "Союз пінгвінів і ведмедів?"
 scyflingb.46.d:0 "Ми отримали пропозицію від По Уеллінгтона, президента [PLB.GetNameDef]. Він стверджує, що пінгвіни і білі ведмеді, два види, які століттями ділили Північ, володіють "полярним духом." Оскільки ми "природні брати", він стверджує, що нам судилося стояти разом, ласта в лапу, як одній об'єднаній конфедеративній нації.\n\nНе дивлячись на очевидний ентузіазм Уеллінгтона, його твердження трохи надумані. Білі ведмеді - люті істоти, набагато більші за нас, і декому важко повірити, що вони діють з добрими намірами. Однак конфедерація з урсинами принесла б нам незаперечні економічні та військові вигоди. Враховуючи, наскільки ми слабкі порівняно з нашими більшими сусідами, об'єднання з ведмедями може бути єдиним способом забезпечити наше виживання."
 scyflingb.46.a:0 "Ми приймаємо."
 scyflingb.46.b:0 "Їм не можна довіряти."

 scyflingb.47.t:0 "Пінгвіни погоджуються!"
 scyflingb.47.d:0 "Пінгвіни прийняли наше запрошення до об'єднання! [PNG.GetLeader] прибув сьогодні на особисту зустріч з По Уеллінгтоном, під час якої було офіційно оголошено про створення нової конфедерації. І ведмеді, і пінгвіни святкують це історичне досягнення, а також мир і процвітання, які воно, безсумнівно, принесе. Після століть роз'єднаності істоти півночі нарешті стоять разом, як одне ціле!"
 scyflingb.47.a:0 "Ми ніколи більше не будемо розділені!"

 scyflingb.48.t:0 "Пінгвіни відмовляються"
 scyflingb.48.d:0 "Ми думали, що [PNG.GetLeader] був розумною істотою, але сьогодні він показав своє справжнє обличчя. Пінгвіни відкинули наше запрошення до об'єднання, назвавши його "неможливим" і "однією зі схем По Уеллінгтона." Ми знаємо, що така ганебна поведінка є звичним явищем за межами кланів білих ведмедів, але ми очікували більшого від пінгвінів, наших братів з країни льоду і снігу."
 scyflingb.48.a:0 "З такими братами хочеться бути єдиною дитиною."

 scyflingb.49.t:0 "Глибокий холодний синій"
 scyflingb.49.d:0 "Високо вгорі, єдиною плямою в крижаному небі був літак Ульріка, вітер бився об металеві крила, мороз загрожував замерзнути.\n\nВін бився з Уеллінгтоном пліч-о-пліч, але ведмідь не зміг би поміститися в грифонському літаку, навіть якби він любив літати. Коли інші найманці захопилися літаками, Ульрік швидко записався: грифони мали битися у своїй стихії, у темно-синьому небі. Там місцевість розчинялася; так високо, попри ревіння гармат і двигунів, бій з іншим пілотом здавався небесним поєдинком двох святих лицарів.\n\nАле північні межі Грифонії не могли зрівнятися з полярними льодами, снігом, що засипав Ульріка, - навіть якщо йому вдавалося катапультуватися з розбитого літака, це був ризик врізатися в крижану гору.\n\nВін прогнав цю думку, приземлившись на тоненьку саморобну злітно-посадкову смугу. Колеса і прикріплені до них лижі врізалися в лід, а індикатори, звиклі до теплого клімату Грифонії, спалахнули червоним, але він не хвилювався. Проблема була не в них: ведмеді все ще не вміщалися в сучасні літаки, а грифони могли, але тільки сови мали право служити у військово-повітряних силах, а ці суперптахи були в дефіциті.\n\nАле Ульрік усміхнувся, вистрибуючи назовні. "Виклики повинні були бути подолані."
 scyflingb.49.a:0 "Хмари розійшлися; глибоке холодне синє небо затанцювало."

 scyflingb.50.t:0 "Перші полярні вибори"
 scyflingb.50.d_noeternal:0 "Довгі черги ведмедів і рідкісна змія-грифон навколо будинків і магазинів, обнесених стінами кипучої фортеці: настав час полярному ефіру відкритися світові через свого обраного представника - на виборчих дільницях! І у духів був незрівнянний список кандидатів:\n\nПо був ведмедем, що стояв за республіканським ідеалом. Він бився на полях битв, де первісна Республіка вела боротьбу за демократію і права всіх грифонів, тому По був логічним вибором для відстоювання цінностей республіки і надання кожному ведмедю потужного голосу для відродження Півночі.\n\nТорбен, сам Повелитель грому, брав участь у першому об'єднанні земель білих ведмедів разом з Уеллінгтоном, але на цьому їхня схожість закінчувалася. Торбен відстоював демократію, яка не забуває про своє коріння і наслідки республіканських принципів: якщо вони універсально хороші, навіщо тримати їх для ведмедів? Вони могли б поширитися в найвіддаленіші куточки світу, і тирани в усьому світі тремтіли б перед всесвітньою революцією звичайного ведмедя.\n\nА ще був Шаман Король Розенкранц, який керувався сумішшю консерватизму, заснованого на майбутньому, і закликав ведмедів повернутися до своїх містичних традицій, щоб вони могли отримати безцінну далекоглядність в управлінні самими собою. Дехто кепкував з того, навіщо йому балотуватися, якщо він, шаман, точно знав, що переможе, але для нього, незалежно від результату, він вже зробив свій вплив, оскільки десятки ведмедів висловили зацікавленість у способах Розенкранца.\n\nТож коли словесний і фізичний спаринг закінчився і всі бюлетені були підраховані, ефір заговорив: ведмедів очолить...."
 scyflingb.50.d_eternal:0 "В укріпленнях повсюди тисячі бюлетенів летіли: духи зими закликали всіх прийти сюди, щоб укоренити ефір у смертному світі через обраного лідера!\n\nСеред чотирьох, двоє були звичайними кандидатами: По Уеллінгтон балотувався на платформі республіканських ідеалів, дуже схожих на Три Принципи Свободи, Демократії та Процвітання Кемерскай, виступаючи за велику єдність та участь білих ведмедів та інших полярних душ, тоді як Торбен голосно заявляв про більш активну позицію республіканізму, проповідуючи агресивний підхід до зовнішнього світу, щоб вони підкорилися силам свободи... або інакше.\n\nІнші двоє кандидатів були більш дивною парою: Шаман-Король роздавав обіцянки про державу, керовану ще невідомими знаннями; навіщо гадати в національному масштабі, коли можна було просто побачити майбутнє і діяти відповідно до нього? Але ще більш чужим, ніж він, був Вічний, загадкова шестирука потвора з первісних глибин дочасся. Він зібрав значну кількість прихильників завдяки своєму посланню "зміцнити оборону, розпочати операції" - принаймні так його інтерпретували військові чиновники.\n\nЗ таким ексцентричним і різноманітним складом учасників перегонів, дебати були жвавими, закликаючи всіх до належної старанності в розпізнаванні того, що ці кандидати хотіли сказати. Але коли закінчився підрахунок голосів і все було підраховано, було оголошено першого по-справжньому обраного президента республіки..."
 scyflingb.50.a:0 "По Уеллінгтон! Засновник нашої Конфедерації!"
 scyflingb.50.b:0 "Торбен! За сильну республіку!"
 scyflingb.50.c:0 "Король Шаманів! Зазирнемо в майбутнє разом!"
 scyflingb.50.e:0 "Вічний? За... дикість і хаос?"

 svartpels.1.t:0 "Єдине пояснення"
 svartpels.1.d:0 "Торбен, Повелитель грому клану Свартпельс, ходив туди-сюди у своїх покоях у фортеці на самій Півночі, і виття крижаних вітрів ззовні відлунювало навіть там. Усе, що сталося, було для нього таким заплутаним, таким незрозумілим. Його друг, По Уеллінгтон, ніколи не міг би наказати щось подібне, це було точно. Торбен знав його вже багато років, боровся з ним пліч-о-пліч у всьому, підтримував його в усіх його ідеях. Але цей вчинок був настільки обурливим, настільки руйнівним, що був нехарактерним навіть для деспота. Це могло бути справою рук одвічного ворога всіх ведмедів - чейнджлінґів.\n\nУсе це мало сенс. З усією силою і стійкістю, якими володіють ведмеді, їхні західні сусіди були налякані, боялися за себе, і тому прагнули перетягнути нас на свій бік. Вони хотіли зробити нас слабкими, щоб завдати удару, коли ми найменше цього очікуватимемо. Але Торбен бачив їхню брехню наскрізь, і він, і клан Свартпельсів не піддадуться так легко їхньому впливу. Вони повернуть честь, традиції та істинний шлях ведмедів на землю, щоб врятувати їх усіх.\n\nЗвісно, це буде нелегке завдання. Клан Свартпельсів, незважаючи на те, що мав одних з найсильніших воїнів серед усіх кланів, був нечисленним через перші об'єднавчі війни, що далися взнаки. Але навіть якщо завдання буде важким, він доведе його до кінця. Якщо не заради клану, то принаймні заради свого загиблого друга, в ім'я всього, заради чого вони так довго працювали."
 svartpels.1.a:0 "Ми врятуємо рід людський від нього самого!"

 svartpels.4.t:0 "Візит на острів"
 svartpels.4.d:0 "Коли на Півночі процвітає зрада та обман, важливо, щоб перед тим, як напасти на інші клани, ми переконалися, що ніхто з нас не зможе обдурити і підірвати нас зсередини. Хоча клан Анкер, розташований на острові посеред затоки, був нашим васалом протягом більшої частини історії Свартпельсу, останнім часом віддалився від нас, і Володар Грому Торбен сприйняв це підозріло. Щоб забезпечити лояльність єдиного великого порту, який у нас є, він вирішив особисто відвідати його і переконатися, що там немає ніякої змови.\n\nПодорож була довгою і важкою, вимагала переходів через вітряні ліси, ходьби по замерзлому льоду і веслування по крижаній воді. Коли Торбен і його пансербйорн прибули на місце, вони побачили безлюдний док, залишки "флоту", самотні і недоглянуті. Це лише посилило підозри Повелителя грому, і вони повільно рушили до фортець у глибині острова. Коли вони майже підійшли до однієї з них, до Торбена підійшов самотній ведмідь, в якому він впізнав старійшину клану Анкер, і одразу ж викликав його на поєдинок.\n\nТорбен, звичайно ж, одразу ж прийняв виклик. Битва була запеклою, але короткою, оскільки у старійшини не було жодного шансу проти найсильнішого з воїнів Свартпельса. Але коли вони повільно піднялися, стікаючи кров'ю і з багатьма потрощеними кістками, вони лише кивнули і вигукнули в зимовий сніг, що Володар Грому дійсно повернувся. Решта членів клану Анкер з'явилися майже одразу, і старійшина пояснив, що вони повинні були переконатися, що Торбен і його оточення насправді не були чейнджлінґами, і що відсутність зв'язку була їхнім очікуванням прибуття справжнього Торбена. Торбен був дуже потішений і відчув полегшення від того, що їхній найближчий васал залишився вірним ведмежим звичаям, і пізніше того ж дня вони влаштували великий бенкет, щоб відсвяткувати їхні подальші зв'язки господаря і підданого."
 svartpels.4.a:0 "Ми завжди знали, що можемо довіряти клану Анкер."

 svartpels.5.t:0 "Вессландське питання"
 svartpels.5.d:0 "Вессландія - дивна земля серед ведмедів, місце, де, незважаючи на те, що всі природні ресурси були у місцевих кланів, не виросло жодного лорда чи тирана, який би правив регіоном і ведмедями в ньому. Ні, натомість вони застрягли у вічному циклі розпаду та утворення кланів, які завжди боролися за найкращі місця для риболовлі чи землеробства. Єдине, що об'єднувало ці клани протягом багатьох років - це використання касти слуг-грифонів, залишків від птахів на нашому сході.\n\nАле тепер, здається, все змінилося. Адже саме завдяки культурі та історії, яких бракує кожному з трьох нинішніх вессландських кланів - Фальсену, Бенкестоку і Бродкорбу - вони змогли створити так званий "Потрійний альянс", об'єднаний фронт проти інших кланових лідерів. Здається, у них також з'явилися нові амбіції, оскільки дехто каже, що вони хочуть керувати всіма ведмедями так само, як колись наш старий друг По Уеллінгтон. Хоча цей явний розрив ведмежих традицій може бути лише результатом того, що старі ідеї Уеллінгтона закріпилися в інших кланах, за цим може стояти щось набагато зловісніше. Бо якщо за цим стоять чейнджлінґи, то ці клани мають бути знищені, перш ніж їхній вплив просочиться глибше у ведмеже суспільство..."
 svartpels.5.a:0 "Їхню непокору ми не потерпимо!"

 svartpels.12.t:0 "Грім і блискавка"
 svartpels.12.d:0 "Під час останньої війни за об'єднання клан Свартпельс відіграв вирішальну роль у допомозі По Уеллінгтону в підкоренні Вессландії, допомігши тирану вивернутися і перемогти розрізнені військові угруповання шляхом швидкого і легкого конфлікту. Хоча їхні союзники більше не були тут, щоб допомогти, а Вессландія була набагато більшою загрозою, оскільки їхні об'єднані сили значно переважали виснажені сили Свартпельса, Торбен все ще пам'ятав, як саме їх перемогти, і це знання було готове стати в нагоді. Адже у довгій, затяжній війні чисельність Вессландії неодмінно переважала б їх, тож час мав вирішальне значення.\n\nЗагони Свартпельса рушили на південь, очолювані особисто Торбеном. Досить скоро вони зустріли своїх супротивників, озброєних так само, як і вони, сокирами, як того вимагала традиція для цього бою. Вессландці явно переважали їх чисельно, але Торбен знав, що це не має значення. Бо у них було те, чого ніколи не було у Вессландії та їхніх кланів: сила, переконання і рішучість довести справу до перемоги. Кожен воїн Свартпельсів бився з силою десяти ведмедів, вражаючи ворожі лави, наче грім серед ясного неба. Це було важко, але загони противника врешті-решт розбилися, залишивши Торбена лідером цієї невеликої битви. Але це був лише початок.\n\nПотім послідувала серія неймовірно швидких атак, коли пансербйорни Свартпельса кинулися розгромити вессландські загони до того, як вони встигли перегрупуватися. Знову і знову вони наносили удари, блискавично пересуваючись лісами та пагорбами. Їхні армії були кинуті в повний безлад, лідери кланів були змушені підкоритися і підтвердити свій статус підданих у дзеркалі останньої об'єднавчої війни. Тільки цього разу вони поновили свою вірність не По Уеллінгтону, а Володареві грому Торбену."
 svartpels.12.a:0 "Числа не зрівняються з історією та силою волі!"

 svartpels.17.t:0 "Що треба зробити"
 svartpels.17.d:0 "Було неймовірно сумно бачити, як цілий регіон, такий як Вессландія, піддався роботі чейнджлінґів. Вони, звісно, заперечували це, але чим ще можна було пояснити цю раптову єдність кланів, щось, що йшло врозріз з усіма ведмежими традиціями? Вони були заплямовані, і для них залишався лише один вихід. Їх повне знищення заради того, щоб залишилися справжні ведмеді.\n\nБої, що послідували в лісах Вессландії, були кривавими. Незліченна кількість ведмедів загинула, і трупи навалювалися один на одного, коли ведмідь бився з ведмедем на смерть. І хоча вессландці, можливо, й переважали чисельністю, вони ніколи не мали честі, відваги чи сили Торбена та його воїнів, і неминуче були відкинуті назад, а їхні військові загони знищені. Їхня так звана єдність розкололася, як і у будь-якого чейнджлінґа, що зіткнувся з силою ведмедя: клани просто відступили, залишивши себе напризволяще.\n\nТо, що сталося далі, було кампанією чистого знищення, оскільки Торбен вирішив закінчити те, що вони почали. Їхні фортеці, останні бастіони їхнього контролю, мали впасти. Одна за одною вони падали, їхніх воїнів і старійшин вбивали без милосердя, бо нікого не хотіли віддавати агентам чейнджлінґам. Вижили лише немовлята, яких вважали або надто слабкими, щоб становити загрозу, або надто молодими, щоб бути зіпсованими. І коли все це закінчилося, щедра Вессландія знову стала тихою, лише місцеві звірі блукали серед дикої природи."
 svartpels.17.a:0 "Це може бути важким тягарем для нас, але це зроблено."

 svartpels.19.t:0 "Зупинити потік"
 svartpels.19.d:0 "Хоча ми виявили очевидне проникнення чейнджлінґів і подальший саботаж ведмежої єдності, є ще більш небезпечна проблема, спричинена ними, яка може зруйнувати ведмежі традиції і саме суспільство, якщо її не зупинити. Це нескінченні хвилі вигнанців, які хлинули на ведмежі землі, останній акт, очевидно, спричинений іноземною інфільтрацією, але який приписують По Уеллінгтону. Тим не менш, ці радикали постійно здійснюють набіги на наших вірних, чесних ведмедів, і клани, і настав час покласти їм край.\n\nТепер, коли Вессландія в безпеці, нарешті з'явилася можливість перекрити головне джерело цих зрадників і вигнанців, а це дороги, що ведуть зі сходу, зокрема, з земель грифонів. Перерізавши і закривши ці дороги вглиб країни, ми перекрили основне джерело надходження, і вже бачимо зменшення кількості щоденних рейдів. Хоча територія, яку ми поки що не контролюємо, все ще дозволяє їм заходити, і проблема ще не вирішена повністю, але досить скоро ці вигнанці підуть з наших земель, і залишаться тільки справжні ведмеді."
 svartpels.19.a:0 "Цим ведмедям тут більше не місце!"

 svartpels.20.t:0 "Клани війни"
 svartpels.20.d:0 "З давніх-давен клан Свартпельс завжди поважав різні клани, що живуть на пустельних землях Онлартіру. Вони не тільки поважали і дотримувалися традиційного способу життя і ведення бою ведмедів протягом найдовшого часу, а й служили оплотом проти загарбників-яків і чейнджлінґів, коли ті наважувалися на вторгнення. Битви проти них під час перших об'єднавчих війн були одними з найважчих, з якими коли-небудь стикався клан Свартпельсів, а три клани Кейн, Ґотлунґ і Розенкранц є вершиною ведмежого мілітаризму.\n\nОднак, з нещодавнім хаосом, що охопив усі ведмежі землі, Онлартір також постраждав від проникнення чейнджлінґів. Вони повністю забули ідею ведмежої єдності, заради якої ми їх підкорили, натомість говорячи про силу окремих кланів під захистом Клану Скюфлінґ. Здається, вони вже забули свою історію поневолення альянсом нас і наших старих союзників, і, що ще більш загадково, цей заявлений захист від Деспота ніде не проглядається. Це означає, що хоча це може бути просто типовою ведмежою впертістю, це також може бути справою рук мерзенних чейнджлінґів..."
 svartpels.20.a:0 "Так чи інакше, земля буде нашою."

 svartpels.21.t:0 "Разом ми вистоїмо"
 svartpels.21.d:0 "Великі воїни клану Кейн. Незламні фортеці клану Ґотлунґ. Могутні шамани клану Розенкранц. Усі вони були грізними силами, у кожного з яких була своя сила, в якій вони перевершували інших. Але вони також мали свої слабкі сторони, і саме вони стануть причиною їхньої поразки. Адже клан Свартпельс, хоч і ослаблений, все ж був великим кланом і повністю об'єднаний духом, чого кланам Онлартіру ніколи не вдасться досягти.\n\nКлан Кейн був найпростішим. Традиційна битва, як того вимагали правила, великий заряд з обох сторін, як ведмеді, що рвуться один до одного. Воїни Кейна були справді великими воїнами, не гіршими за Торбена, та все ж Свартпельс здобули перемогу, коли Володар Грому переміг на полі бою Великого Старійшину Ейса. Ґотлунґам було складніше, їхня велика фортеця з льоду та сталі стояла гордо, а воїни клану билися зубами та нігтями. Пробиватися крізь вражаючу фортецю, з усіма її захисними спорудами від нападу ведмедів, було щонайменше нелегко, але й їхні старійшини незабаром були змушені визнати поразку. І все ж саме Розенкранц, який бився на піку Скайбрейкер, без сумніву, було найважче підкорити. Гірські вітри та звірі вже самі по собі були небезпечні для урсина, а воїнів і шаманів, здавалося, благословляли самі північні вітри. Сам Повелитель шаманів був найсильнішим з усіх, з ким доводилося зустрічатися Торбену, але він все одно вийшов переможцем. А наприкінці битви всі три клани присягнули на нову вірність Володареві Грому та клану Свартпельс, і цього разу вони не піддадуться впливу чужинців так легко."
 svartpels.21.a:0 "І впали вони, розділені."

 svartpels.22.t:0 "Падіння панів"
 svartpels.22.d:0 "Через свою близькість до вуликів чейнджлінґів, слід було очікувати, що клани Онлартіра навернуться першими. І все ж, коли він уперше почув твердження, що вони перебувають під захистом клану Скюфлінґ, у Торбена на мить з'явилася надія, що клан Скюфлінґ все ще сильний. Але коли його пансербйорни повернулися, вони не привезли жодних доказів таких заяв. Їхня брехня була пустопорожньою, вірна ознака їхнього єдиного справжнього ворога. А отже, три клани Онлартіру також повинні були впасти.\n\nКлан Кейн впав першим. Хоча вони, слід визнати, добре і завзято билися проти нас, Свартпельс був сповнений рішучості не дозволити жодному ведмедю стати на шляху до єдності. Клан Ґотлунґ був наступним, їхня велика фортеця була єдиною реальною перешкодою для їхнього знищення. Хоча багато хто загинув при її взятті, зрештою вона стала місцем спочинку для всіх воїнів, які колись там мешкали. Що ж до клану Розенкранців, то, можливо, зимові вітри були на їхньому боці, але Торбен та його воїни були сильнішими духом. І коли все було сказано і зроблено, все, що залишилося від їхніх кланів - це залиті кров'ю поля битв Кейна, забризкані червоною кров'ю стіни Ґотлунґа, виття замерзлого духу і зимові вогні на вершині Скайбрейкера."
 svartpels.22.a:0 "Ніхто не зупинить нашу справу."

 svartpels.24.t:0 "Давній суперник"
 svartpels.24.d:0 "Майже від самого світанку клану Свартпельс ми завжди були запеклими суперниками з гірським кланом Вольсунґр. Їхній спосіб життя і боротьби дивний: вони покладаються на нануків, що вбивають звірів, замість традиційних воїнів, і живуть у горах, які більше підходять для діамантових псів, ніж для ведмедів. І все ж їхня величезна кількість обладунків та зброї зі сталі перевершує всі інші клани, а у своїх ритуальних війнах з нашими спорідненими по духу південними племенами яки показали себе справжніми ведмедями. Тому з великим сумом ми дізналися під час останніх об'єднавчих війн, що результатом нашого і Скюфлінґського конфлікту з ними стало майже повне вимирання.\n\nУ спробі вижити, однак, клан Вольсунґр зайшов надто далеко у своїх діях. Приймаючи назад вигнанців з-за меж земель білих ведмедів, не змушуючи їх перемагати в бою... Не дивно, що вони були зіпсовані і заплямовані впливом еквестрійців, і стали такими, якими вони є сьогодні. Вольсунґр не заплямований далекосяжним впливом чейнджлінґів, але так звана принцеса Ейра прийняла щось набагато гірше, щось, що, можливо, зробило їх такими, що не підлягають порятунку..."
 svartpels.24.a:0 "Ми не дозволимо цій хворобі поширюватися далі!"

 svartpels.25.t:0 "Підкорення гармонії"
 svartpels.25.d:0 "Змусити ведмедів клану Вольсунґр підкоритися буде нелегким завданням, це вже точно. Бо хоча вони були зіпсовані еквестрійцями, вони мали самохідні броньовані сани та далекобійну зброю, що нагадувала артилерію По Уеллінгтона. І хоча їхні ідеали були слабкими і йшли врозріз з усім, за що виступали ведмеді, ніхто не міг заперечити їхню переконаність у своїй правоті. Останній залишок їхніх старих кланових звичаїв, коли вони були набагато більше схожі на Свартпельсів, маючи сильні непохитні переконання.\n\nЗ точки зору рельєфу і технологій, Вольсунґр, безумовно, мав перевагу. Їхні нануки були набагато більш пристосовані до гірської місцевості території Вольсунґру, ніж наші, і спочатку навіть наші великі воїни намагалися просунутися на Південь. Коли обидва війська жорстоко зіткнулися, Торбен побачив ту іскру, той останній залишок духу старого клану, і це дало йому надію, що, можливо, Вольсунґр ще не втрачено. Тож, коли вони нарешті дісталися головної фортеці Вольсунґра, Торбен викликав принцесу Ейру на традиційну ведмежу дуель, щоб довести перевагу вірувань Свартпельсів над своїми.\n\nЕйра вийшла з входу в гору, одягнена в золото і тканину, що, на думку Торбена, уособлювало все погане, що було в клані. Це був символ їхньої слабкості, сама суть їхнього гріхопадіння. І все ж у двобої Ейра довела, що вона не слабачка, бо билася з Повелителем Грому майже до переможного кінця. Майже. Зрештою, Торбен вийшов переможцем, а Ейра зазнала поразки. Символічно скинувши з себе різні дрібниці, Ейра та решта присутніх представників клану Вольсунґр присягнули на вірність Торбену, вшанувавши давню систему кланів і показавши, що їхній древній дух все ще живий."
 svartpels.25.a:0 "Вони нарешті розірвали власні кайдани."

 svartpels.30.t:0 "Слабкість розбита"
 svartpels.30.d:0 "Це було те, що, озираючись назад, довго чекало на клан Вольсунґр. Очевидний результат клану, який сліпо впускає будь-якого ведмедя назад у відчайдушній спробі вижити, не дбаючи про наслідки. Вони були заражені чужим впливом задовго до того, як з'явилися чейнджлінґи, і настав час покласти край цій огидній хворобі слабкості. Гармонія буде зруйнована, як і всі ті, хто приніс сюди таку збочену ідеологію.\n\nКлан пішов на дно нелегко. Як можна було здогадатися, вони боролися з усіх сил, щоб зберегти свої нові ідеали, якими б заплямованими вони не були. Броньовані сани та далекобійна зброя, якою вони володіли, ускладнювали справу, але пансербйорнів клану Свартпельс це не зупинило. Крок за кроком, ведмідь за ведмедем, вони просувалися вперед, аж поки Вольсунґр не залишилося більше землі, яку можна було б віддати. Навіть коли сам Торбен йшов через їхні великі гірські печери, щоб викорінити останні бастіони, вони билися з безрозсудною відвагою у своїй природній домівці, маючи явну перевагу. Сам Торбен зазнав серйозних поранень, під кінець битви у нього було зламано кілька ребер і він стікав кров'ю. Але їхня ідеологія довела свою неспроможність, а дух Свартпельса був незламним. Коли сонце зайшло над землями ведмедів, Володар Грому вийшов з печер, наказавши спалити і знищити всі записи, твори мистецтва, все, що могло мати хоч якесь відношення до їхньої нової віри. Єдиною історією Вольсунґра залишиться їхня горда історія воїнів, як і повинно бути. Гармонія померла на далекій півночі, і її вже не воскресити."
 svartpels.30.a:0 "Природний порядок буде збережено, незважаючи на ціну."

 svartpels.31.t:0 "Друг у хаосі"
 svartpels.31.d:0 "Клан Скюфлінґ здавна був нашим близьким другом. Так було ще до перших об'єднавчих війн, коли деспот По Уеллінгтон, новий лідер клану, переміг у традиційному поєдинку самого Торбена, тим самим довівши свою силу і показавши нам перевагу своїх ідеалів єдності. З того славного дня ми билися пліч-о-пліч з нашими найбільшими союзниками, допомагаючи їм знову і знову як у битвах, так і в управлінні всіма ведмедями. Ми підтримували їх у кожному рішенні, навіть суперечливому, бо, як казав клан Скюфлінґ, вони були благословенні своїм Всебатьком і зберігали закон і порядок по всій землі. Останні дії чейнджлінґів, схоже, вдарили по клану Скюфлінґів найсильніше, оскільки вони розпалися і перетворилися на незліченні частинки на їхніх землях. Досі не було жодних ознак По Уеллінгтона, і хоча ми можемо лише сподіватися, що наші друзі все ще б'ються десь там, не виключено, що ми запізнилися..."
 svartpels.31.a:0 "Чи залишилося щось, що можна врятувати?"

 svartpels.32.t:0 "Порятунок союзників"
 svartpels.32.d:0 "Ситуація з кожною секундою ставала дедалі гіршою, і Торбен знав, що треба діяти швидко, щоб врятувати те, що залишилося. Зволікання могло приректи на загибель тих ведмедів, які залишилися вірними По Уеллінгтону, а отже, і єдність ведмедів. Тож, зібравши найкращих пансербйорнів свого клану у великий загін, він особисто очолив атаку вглиб території клану Скюфлінґ, перемагаючи всіх ведмедів, які билися з ними по дорозі. Дехто охоче приєднався до Повелителя грому, пам'ятаючи старих друзів Деспота, але багато хто відмовився здаватися без бою. Принаймні, тут більше не було чейнджлінґів, бо всі воїни, переможені в бою, виявилися справжніми ведмедями, навіть якщо вони були піддані корупції чейнджлінґів.\n\nКонфлікт став особливо запеклим, коли вони досягли столиці Магярь-Фярань, де знаходилася більшість фортець клану Скюфлінґів. Деякі з найкращих пансербйорнів Уеллінгтона, або принаймні те, що було його найкращим пансербйорном, билися з усіх сил, щоб не допустити Торбена до твердині По. Було прикро бачити, що навіть найкращі з них були заплямовані роботою Кризаліс, і на якусь мить Торбен занепокоївся, що сам По може впасти. На щастя, увірвавшись до його кімнати, він побачив свого старого друга таким, яким він був раніше, хоча й трохи пригніченим. Звісно, нічого такого, з чим не міг би впоратися великий бенкет після перемоги, хоча, згідно з давніми правилами ведмежої раси, оскільки клан Свартпельс був тим, хто врятував клан Скюфлінґ, вони тепер будуть домінувати в керівництві."
 svartpels.32.a:0 "За врятовану дружбу!"

 svartpels.39.t:0 "Найважчий з тягарів"
 svartpels.39.d:0 "Це було, без сумніву, найважче, що коли-небудь робив Торбен. Можливо, не в буквальному сенсі, оскільки клан Скюфлінґ був надто зайнятий розривом між собою, щоб становити велику загрозу для клану Свартпельс. Ні, що було боляче для всіх, навіть для ведмедів, так це те, що доводилося знищувати своїх старих друзів, своїх найбільших союзників. У них не було вибору, адже рятувати вже було нічого. Залишалися тільки ті, кого треба було знищити заради майбутнього, заради виживання всіх ведмедів. Отже, бойовим загонам було наказано не зупинятися, поки весь клан Скюфлінґ не зникне.\n\nЦе було жалюгідно просто, що, можливо, зробило це ще гіршим. Адже колись Скюфлінґ був одним з найсильніших кланів, з сильним духом, що стояв за сильним деспотом, а тепер все звелося до безглуздих міжусобиць. Звичайно, вони все ще билися з силою справжніх ведмедів, і вмирали, як справжні воїни. Навіть коли все було сказано і зроблено, коли лід став червоним від крові, Володар Грому не міг пишатися тими, кого колись називав друзями. Вони померли так само, як і жили, як одні з найсильніших пансербйорнів на всій землі, і жодна змова чейнджлінґів ніколи не змінить цього. Тож Торбен знав, що він має зробити.\n\nБагато днів і ночей працював він і члени його клану, але врешті-решт це було того варте. Великий пам'ятник, зроблений з льоду і каменю для їхніх загиблих друзів. Він був міцним, як будь-яка ведмежа фортеця, і на ньому були імена найбільших воїнів клану Скюфлінґ, включаючи самого По Уеллінгтона, тіло якого вони так і не знайшли. Тому всі вшанували пам'ять загиблих хвилиною мовчання.\n\nЧи зробив це Торбен? Так. Але чого це коштувало?"
 svartpels.39.a:0 "Всього."

 svartpelsb.1.t:0 "Не відступати від курсу"
 svartpelsb.1.d:0 "Торбен стояв на тому самому місці, де його вперше вдарила блискавка. Це було єдине належне місце, щоб сказати те, що він мав сказати. Блискучий у своїх обладунках, він оглядав інших воєначальників кланів, над якими згущувалися грозові хмари. Принаймні тих, що вижили. Кожен з них був могутнім ворогом, якого перемагала лише грозова рішучість Торбена.\n\nТорбен підвівся на задні лапи і почав своє проголошення. "Сьогодні починається нова глава в мільйонній історії нашої раси. Кожен з вас виступив проти мене, кожен бився з мужністю і честю, гідною полярного духу. І кожен з вас, залишаючись вірним звичаям нашого роду, підкорився, коли не зміг більше витримувати ударів. Ви виставили переді мною свої сокири та обладунки, як і належить переможеним. Але мені не потрібні такі трофеї, якщо їх не тримають мужні лапи. Встаньте, старійшини! Встаньте, мої найкращі воїни! Під проводом Свартпельса ваші клани будуть існувати вічно!"\n\nОдин за одним вожді кланів вийшли вперед і взяли свої сокири в лапи, піднявши їх у вітання своєму новому деспоту. Торбен Свартпельс почав гуркітливу, горласту пісню, дякуючи Всебатькові за перемогу, але його перервав удар грому. І знову Володаря Грому вразила блискавка. Коли інші вожді кланів піднялися на ноги, вони побачили, що їхній новий повелитель сміється. "Це знамення!" - вигукнув він, - "Знамення майбутніх перемог!""
 svartpelsb.1.a:0 "Вигуки потрясли гору, як другий удар грому."

 svartpelsb.2.t:0 "Ультиматум від ведмедів"
 svartpelsb.2.d:0 "Тривожні повідомлення надходять з наших західних кордонів. Хоча ми все ще маємо проблеми зі створенням чіткої картини, оскільки багато повідомлень суперечать одне одному, немає сумнівів, що ситуація є жахливою. Місцеві гарнізони та розвідники розповідають про велике військо із заходу, про ведмедів, одягнених у могутні обладунки, які кричать просто за їхніми стінами, вимагаючи від наших солдатів вийти і битися. Зі зрозумілих причин жоден з наших вояків не був настільки дурним, щоб зустрітися з ведмедем наодинці, тому ситуація залишається патовою.\n\nЗа словами присутніх, ведмежі вожді висунули вимоги негайного повернення того, що вони вважають "законною територією", а якщо цього не буде зроблено, вони вимагають зустрітися з ними на полі бою і вирішити питання силою зброї. Задоволення таких вимог фактично означало б відмову від величезної кількості землі, а отже, було б абсолютно немислимим, але це, цілком можливо, єдиний спосіб уникнути кровопролиття. Принаймні, поки що."
 svartpelsb.2.a:0 "У нас немає іншого вибору, окрім як погодитися."
 svartpelsb.2.b:0 "Ми дамо їм бій, якого вони хочуть."

 svartpelsb.3.t:0 "Пінгвіни стають на коліна"
 svartpelsb.3.d:0 "Це був, мабуть, передбачуваний висновок, який, безсумнівно, залишив би багатьох у клані Свартпельс незадоволеними. Зрештою, який ведмідь, гідний такого імені, відмовився б від шансу на справжню битву? Однак, зрештою, пінгвіни не були ведмедями; не було б великої битви, не було б крові, забризканої сокирами та обладунками. Гарнізони просто зібрали своє спорядження і пішли вночі, їхній відхід час від часу заважали менш дисципліновані бойові загони і молодняк.\n\nНавіть тоді Торбен знав, як розпізнати успіх. Невдовзі після цього було організовано справжнє свято, під час якого загони зі щойно звільнених територій мали можливість присягнути на вірність новому деспоту. Коли святкування добігало кінця, Торбен скористався нагодою і звернувся до присутніх ведмедів: "Сьогодні ми, можливо, і здобули велику перемогу, але я кажу, що цього недостатньо! Пінгвіни показали себе справжніми боягузами. Вони можуть сховатися у своїй фортеці і сподіватися на безпеку, але там вони її не знайдуть! Якщо вони відмовляться битися з нами тут, то ми перенесемо бій у їхні тереми!" Відповіддю кланів було одне могутнє ревіння, що луною розійшлося по замерзлих пустках."
 svartpelsb.3.a:0 "Слабкий повинен боятися сильного."

 svartpelsb.4.t:0 "Пінгвіни не кланяються"
 svartpelsb.4.d:0 "Торбен розсміявся. Коли одна з його підлеглих принесла йому відповідь "пінгвінів", коли вона повідомила, що вони відхилили його пропозицію і оголосили себе готовими до бою, він розсміявся. Але не з презирства; насправді він міг майже оцінити той факт, що Пінгвіни вирішили чинити опір. Це був сміх чистого піднесення. Бої у Другій війні за об'єднання були запеклими, але здебільшого проти старих союзників і друзів. Не було жодного шансу насолодитися цим належним чином; це було просто те, що треба було зробити. Однак це було інакше.\n\nТорбен піднявся на повний зріст, не поспішаючи розгинати кожен свій масивний м'яз. Він майже фізично смакував наступні слова. "Скажи моїм панцербйорнам, щоб готувалися до бою і принесли мені мої обладунки. Клан Свартпельсів обрушиться на цих дурнів, як справжній полярний шторм." І він повів би їх з фронту, але про це не сказав."
 svartpelsb.4.a:0 "Ми покажемо їм їхнє місце!"

 svartpelsb.5.t:0 "Ультиматум від ведмедів"
 svartpelsb.5.d:0 "Протягом останніх кількох тижнів рейнджери повідомляли про великі скупчення білих ведмедів на нашому західному кордоні. Вони розпалили величезне багаття і влаштували бенкет по той бік нашого кордону. Їхні крики та сутички було чути на всьому шляху до прикордонного табору, а попереджувальні сигнали були надіслані доволі далеко.\n\nСьогодні їхні наміри стали очевидними. Задиркувато підійшовши до регіонального командира, повністю ігноруючи кордон, вождь білих ведмедів, одягнений у хутро, кістки і темні пластинчасті обладунки, виклав свої вимоги. Грифонячий Фронтир мав бути переданий його "законним власникам", а всі солдати-грифони повинні були розпочати евакуацію з регіону до завтрашнього дня. Один з новобранців запанікував і вистрілив у порушника, але його куля відскочила від броні, і він був зустрінутий лише сміхом. Немає сумнівів, що ведмеді зроблять, якщо ми відмовимося від пропозиції."
 svartpelsb.5.a:0 "Відступаємо. Ми не хочемо бійки з цими маніяками."
 svartpelsb.5.b:0 "Вони можуть вирвати Фронтир з наших холодних мертвих пазурів? ПФФ!"

 svartpelsb.6.t:0 "Грифони стають на коліна"
 svartpelsb.6.d:0 "Наші демонстрації переважаючої сили та стійкості підкорили боягузливих грифонів. Вони відступили з наших древніх земель, підібгавши хвости, вигукуючи звичайні нікчемні заперечення переможених. Торбен Свартпельс наказав побудувати обеліск з чорного базальту, щоб позначити кордон між нами і грифонами.\n\nУ промові, присвяченій відкриттю пам'ятника і початку десятиденного святкування повернення наших законних земель, він заявив: "Сьогодні ми виправили давню кривду. Наші предки блукали цими землями як великі звірі, і так буде знову. Ці грифони показали себе слабкими і непридатними через своє боягузтво, тому я готую нову експедицію, щоб поставити їх усіх під нашу владу, як це зробили давні королі-монстри Йотунн. Але зараз! Прийшов час бенкетувати і святкувати. Нехай пісні цього дня лунають ще мільйон років!""
 svartpelsb.6.a:0 "Слабкий повинен боятися сильного."

 svartpelsb.7.t:0 "Грифони не кланяються"
 svartpelsb.7.d:0 "На превеликий подив, сьогодні грифони продемонстрували натяк на хоробрість. Вони відправили нашого посланця назад з образами, гідними передаватися з покоління в покоління, зробивши перший помітний внесок, який їхній вид зробив у нашу культуру за майже століття. Незважаючи на якість образ, вони повинні отримати урок. Дух не може замінити силу, і ми прагнемо довести, що ми сильніші єдиним способом: війною.\n\nТорбен оголосив мобілізаційні плани з посмішкою на обличчі, зауваживши іншим воєначальникам [PLB.GetNameDef], що він з нетерпінням чекає, коли розірве знахабнілих грифонів навпіл, і нагадавши їм, щоб вони шукали потенційних "совиних ведмедів" серед захоплених полонених."
 svartpelsb.7.a:0 "Час для розваг!"

 svartpelsb.8.t:0 "Союз з Ведмедями?"
 svartpelsb.8.d:0 "Повелитель Грому Білих Ведмедів, [PLB.GetLeader], запросив нас до союзу, який він називає "Полярна Вісь." Його пропозиція була написана на сувої сиром'ятної шкіри і містила, окрім умов альянсу, багато стародавніх історій про співпрацю яків і ведмедів, а також кілька історій про славні битви, які наші народи вели один проти одного. Загалом, його найбільше вразив наш хрестовий похід, спрямований на подолання еквестрійської слабкості та захист старих звичаїв, і він сказав, що здійснив подібний подвиг на своїх землях, викликаючи на поєдинки інших воєначальників, доки ті не визнали верховенство його клану та їхньої спадщини. Він також щедро пообіцяв частку здобичі та території в наших майбутніх завоюваннях.\n\nХоча більшість із Йаки-клану були б раді можливості розбити грифонів і чейнджлінґів разом з могутніми білими ведмедями, інші бурчать, що приєднання до цієї "Полярної осі" означатиме визнання того, що нам потрібні союзники, і що ізоляція є найкращою політикою, як це завжди і було. Вибір, звичайно, належить принцу."
 svartpelsb.8.a:0 "Звучить добре"
 svartpelsb.8.b:0 "Нам краще бути наодинці"

 svartpelsb.9.t:0 "Союз з Йаки-кланом!"
 svartpelsb.9.d:0 "Чудові новини. Йаки-клан погодився утворити з нами Полярну Вісь і запросили наших старійшин на бенкет і чудові змагання. Здається, полярний дух залишається сильним у них, і їхні зусилля побороти слабкість поні справді врятували їхній рід.\n\nПісля трьох днів бенкетів і пиятики лорд Торбен був шокований, побачивши, що принц Бредфорд знову і знову перемагає його в нищівних змаганнях, хоча лорд Торбен і здобув перемогу в традиційній боротьбі яків. Він пообіцяв провести подібний захід на наших землях через рік, і схоже, що між нашими двома могутніми народами встановлюється нова традиція."
 svartpelsb.9.a:0 "Які гідні союзники!"

 svartpelsb.10.t:0 "Альянсу сьогодні немає"
 svartpelsb.10.d:0 "Прикрі новини. Схоже, що прихильність яків до "ізоляції" означає відмову від альянсів, а також несприйняття чужих цінностей і еквестрійської слабкості. Володар Грому розлютився, ревів, що йаки забули про полярний дух і що ізоляція в цьому сенсі означає просто очікування, коли їх завоюють. Врешті-решт він заспокоївся і почав розповідати казку про зарозумілого ведмедя, який думав, що зможе вистояти без свого клану, коли прийшли великі звірі, і був з'їдений.\n\nЦього, здавалося, було достатньо, щоб запобігти війні між нами і яками, але наша повага до них була підірвана. Можливо, ці яки просто замінили отруту еквестрійського впливу більш тонкою отрутою гордовитої байдужості."
 svartpelsb.10.a:0 "На жаль..."

 svartpelsb.11.t:0 "Вессландський союз"
 svartpelsb.11.d:0 "Торбен провів багато часу, розмірковуючи над питанням Вессландії. Обійти його було просто неможливо, регіон був майже таким же унікальним, як і ведмеді, що його населяли. Вони ніколи не знали впливу клану, достатньо сильного, щоб підпорядкувати собі дрібні ватаги. Вессландці воювали між собою майже так само часто, як і з чужинцями. Окрім їхнього звичаю приймати у себе велику кількість Совиних Ведмедів та слуг-грифонів, їх мало що тримало разом. Це, звісно, було проблематично; як міг Торбен сподіватися підкорити клани, що постійно перебували на межі розриву один з одним, без зовнішньої загрози? Вдвічі складніше, якщо він сподівався використати ці майстерні та фабрики з користю. Торбен вирішив, що їм потрібна ідея, навколо якої вони могли б згуртуватися, основоположний міф.\n\nНа щастя, архіви клану Свартпельсів були обширними, а їхні писарі не мали собі рівних серед ведмежого роду. З допомогою кількох своїх підлеглих Торбен провів багато часу серед запилених фоліантів і стародавніх сувоїв пергаменту, вишукуючи потрібну йому інформацію, сліди легендарних королів-чудовиськ Йотнарів та їхніх великих володінь на сході, у напрямку до Грифонячого Фронтиру. Озброївшись такими знаннями, Торбену було легко представити себе реставратором стародавньої спадщини Вессландії, даючи місцевим кланам спільне походження, щоб згуртуватися навколо нього в цьому процесі. І поки що зусилля, здається, окупилися, оскільки клани Фальсен, Бродкорб і Бенкесток домовилися про перемир'я між собою, готуючись до великої експедиції на схід, щоб відвоювати міфічні володіння королів-монстрів Йотнара. Наразі Вессландія об'єднана."
 svartpelsb.11.a:0 "Давайте подбаємо про те, щоб так воно і залишилося."

 svartpelsb.12.t:0 "Новий Вольсунґр"
 svartpelsb.12.d:0 "Це були дивні кілька років, перші дні правління Ейри. Ведмеді клану погодилися, що це було не зовсім погано, але дивно. Вона проповідувала і проповідувала, говорила і говорила, пояснюючи свою позицію знову і знову, а потім била їх, коли вони не розуміли. Вони й досі не розуміли, не дуже. Але тепер здавалося, що та епоха залишилася позаду. Ейра залишалася Ейрою, все ще непереможною, окрім Повелителя Грому, але тепер вона не проповідувала. Тепер вона не пояснювала. Тепер вона переходила до справи.\n\nПолювання стало основою життя клану Вольсунґр. Переслідувати монстрів і порушників, демонструвати свою силу, підкоряючи їх і тягнучи назад до могутньої Ейри. Вона кивне, якщо буде вражена, а потім скаже, чи відпустити "благородного звіра", чи з'їсти його. У половині випадків, коли звіра щадили, він все одно скаженішав, і доводилося битися з ним вдруге. Якщо це не входило в задум, Ейра не подала виду, лише кивнула головою.\n\nВона все ще носила своє старе вбрання, але більше не привозила його з Еквестрії. Шовк був грубий і латаний, а в нові шви було вшито кілька тваринних кісток. Шовк, кістки і нитки з сириці. Ведмеді клану все ще не зовсім розуміли свого ватажка, але вони підуть за нею на край світу, завойовуватимуть і грабуватимуть разом зі своїм воєначальником аж до самого Кантерлота, якщо вона їх попросить. І справді, з її туманних натяків на "показати поні сильнішу Гармонію", здавалося, що вона мала намір зробити саме це."
 svartpelsb.12.a:0 "Ми завжди знали, що вона була воїном!"

 svartpelsb.13.t:0 "Тріада воєначальників у злагоді"
 svartpelsb.13.d:0 "Ґотлунґ. Кейн. Розенкранц. Зібрати три ведмежі клани з Онлартіру в одному місці було доволі просто, а от домовитися з ними про щось - зовсім інша справа. Торбен не був дурнем; Онлартір не пішов би за ним добровільно, навіть після першої поразки від Свартпельса. Тому для Торбена було вкрай важливо підкорити їх собі, апелюючи до їхньої спільної історії як великих воїнів.\n\nКлан Розенкранців було найлегше переконати. Чому? По правді кажучи, Торбен не був у цьому впевнений. Шамани Розенкранців володіли таємничими способами, чужими для сторонніх, стверджуючи, що можуть використовувати мороз, щоб бачити минуле і майбутнє. Після приватних консультацій між собою вони заявили про повну підтримку свого нового деспота, хоча Торбену їхній новоявлений ентузіазм був дещо незрозумілим. Могутні захисники клану Ґотлунґів, керовані власною радою старійшин, виявилися такими ж упертими, як і їхні бастіони, і відступили лише після того, як їхні найкращі воїни були переможені вдруге.\n\nКлан Кейн не був схожий на своїх сусідів. Їхні воїни не поступалися воїнам Свартпельсів, їхня сила, жорстокість і зарозумілість компенсували відсутність належного обладунку. З ними не було жодних дискусій, тож Торбен вирішив вирішити проблему єдиним можливим способом. Він кинув виклик Великій Ейсі з клану Кейн, який вона прийняла майже одразу. Поєдинок між Ейс з Кейну та Торбеном зі Свартпельса був видовищем, на думку присутніх, де деспот зустрівся зі своїм справжнім супротивником на полі бою і здолав його лише завдяки поєднанню завзятості, удачі та важких панцербйорнських обладунків. Після гідного поєдинку з Торбеном Асе не залишалося нічого іншого, як проковтнути свою гордість і прислухатися до пропозиції клану Свартпельс."
 svartpelsb.13.a:0 "Вони стануть чудовим доповненням до наших армій."

 svartpelsb.14.t:0 "Йоріс присягає на вірність"
 svartpelsb.14.d:0 ""Як би мені не було боляче це визнавати, я був неправий. Я не знав, що робив." \n\nТорбен насупився, дивлячись на свого друга По В.-Йоріса, але швидко виправився. Він відмовився від імені, з яким повернувся додому. Проте, на думку Торбена, це не змінило того, ким він був. Йоріс все ще був його другом, з яким він воював пліч-о-пліч у першій Війні за об'єднання. Цього не змінять ні титули, ні дріб'язкова політика. Навіть тоді він іноді боявся, що його друг не повністю оговтався від того, що став свідком майже повного знищення його клану. "Ти не повинен бути таким суворим до себе. Жоден ведмідь не міг передбачити, наскільки глибоко заходить зрада чейнджлінґів."\n\nЙоріс лише похитав головою з сумною посмішкою. "Я не це мав на увазі. Я був настільки зачарований технологіями зовнішнього світу, що відмовлявся дивитися на щось інше. Я хотів наслідувати Ґровера І та імперію, яку він збудував, але не розумів, що тримало цю саму імперію разом протягом століть." Він помітив вираз спантеличення Торбена. "Грифони поклоняються одному й тому ж набору богів, - пояснив він, - одна єдина віра, яка об'єднує їх поза політикою. Я намагався нав'язати ведмедям чужу модель, сам того не розуміючи."\n\nТоді щось змінилося в поведінці його друга. Він підняв голову, дивлячись прямо на Торбена, і в його погляді спалахнула люта іскра. "З твого дозволу, Деспоте, я хотів би це змінити. Клан Скюфлінґ завжди був найвідданішим Всебатькові, але багато інших кланів відійшли від нього, їхня віра з часом притупилася. Дозволь мені розпалити це полум'я."\n\nТорбен нічого не сказав. Йому й не треба було. Його широкої посмішки було більш ніж достатньо."
 svartpelsb.14.a:0 "Добре, що ти повернувся, мій друже."

 svartpelsb.15.t:0 "Нова жива віра"
 svartpelsb.15.d:0 "Серед великих ведмежих кланів Скюфлінґ завжди був найособливішим. Їх сила походила не лише від їхніх воїнів чи їхньої жорстокості в бою, хоча їм ніколи не бракувало цих двох аспектів. Скоріше, клан Скюфлінґ був добре відомий як найретельніший шанувальник божеств, які мільйони років наглядали за ведмежим родом, - Всебатька і Великих Звірів. Навіть тоді вони не могли претендувати на мантію єдиного релігійного авторитету серед ведмедів, оскільки поклоніння таким божествам варіювалося від місця до місця, залежало від звичаїв кланів, військових загонів, а в деяких випадках навіть окремих ведмедів.\n\nПісля подій Другої Об'єднавчої війни Йоріс знову повернувся на чолі клану Скюфлінґ, і під його енергійним керівництвом було внесено багато змін до колись децентралізованого культу. Більше уваги було приділено Всебатьку та Великому Вовку Фенріру як символам ведмежої доблесті в бою та могутності, віри та війни, що назавжди переплелися та викувалися у могутній культ. Найзавзятіші проповідники Скюфлінґу тепер блукають землею, відвідуючи володіння дрібних кланів та військових банд і поширюючи полум'яним словом послання нової віри. Особливого успіху вони досягли серед молодого покоління, яке прагне проявити себе в бою і звертається до Всебатька, шукаючи його схвалення в цьому завданні.\n\nЙоріс зараз зі схваленням спостерігає, як клан Скюфлінґ перетворюється на великий войовничий культ, готовий влити силу в кожного ведмедя, готового прислухатися до його послання. Колись він намагався підкорити ведмедів за допомогою технологій і прогресу. Тепер, під егідою деспота Торбена, клан Скюфлінґ об'єднає ведмедів вірою."
 svartpelsb.15.a:0 "За Отця Всебатька."

 svartpelsb.16.t:0 "Перший серед рівних"
 svartpelsb.16.d:0 "З цієї нагоди не було потреби в церемонії. Хоча іноземні монархи використовували б таку знаменну подію для демонстрації багатства і могутності над своїми підданими, Торбену не потрібні були такі дрібниці. Він не став би нав'язувати своє правління як король чи імператор, як це робилося серед нижчих рас; він не став би придушувати інші клани своєю владою і могутністю. Хоча він і був деспотом, він був насамперед Торбеном клану Свартпельс, ведмедем, найновішим представником традиції, що тягнеться мільйони і мільйони років у минуле. Традиції, невід'ємною частиною якої, за задумом Всебатька, був кожен ведмідь.\n\nНова велика фортеця була зведена серед замерзлих пусток, не як символ домінування Свартпельсів над іншими кланами, а як символ єдності. У його центрі регулярно збиралися найвеличніші представники ведмежих кланів. Йоріс з клану Скюфлінґ, їхня віра відроджена і палає яскравим полум'ям; Ейра з клану Вольсунґр, їхній зв'язок з дикою природою не підлягає сумніву; Торбен з клану Свартпельс, стійкий і незламний воїн; три воєначальники Онлартіра і дрібні клани Вессландії. Усі вони зберуться там як рівні, пов'язані між собою силою, походженням і вірою.\n\nДоля роду ведмедів більше не лежатиме на плечах одного клану. Торбен подбав про це."
 svartpelsb.16.a:0 "Тепер ми стоїмо разом."

 svartpelsb.17.t:0 "Природа понад усе"
 svartpelsb.17.d:0 "Зміна була очевидною для більшої частини клану Вольсунґр, але тільки тепер, коли Ейра стояла перед ним, Торбен нарешті відчув її. Її поразка від його власних лап під час Другої війни за об'єднання змінила її, це було очевидно, але Деспот досі не усвідомлював цього до кінця.\n\n "Вони досить вражаючі, чи не так?" з м'якою посмішкою сказала Ейра, показуючи жестом на лінію нових важких танків, великих і неповоротких звірів, що чекали на неї. "Наші екіпажі наполегливо тренувалися. Ви будете задоволені їхніми виступами. Вони всі будуть прагнути довести свою цінність і виконати свій обов'язок." Торбен задумливо кивнув головою. "Можливо, хоча я не розумію, чому ти терпимо ставишся до їхньої присутності на полі бою. Вони надто малі й кволі, щоб бути справжніми воїнами. Сподіваюся, ти не будеш знову заглиблюватися в ці поні-ідеї."\n\nЕйра кинула на нього погляд, а потім нахилила голову. У її погляді не було ворожості, лише легка забава. "Поні люблять вважати Гармонію своєю прерогативою, але вона є лише продовженням природи. Дикі ліси та їхні звірі пронизані Гармонією, і ведмеді клану Вольсунґр, як їхні охоронці, слідували Гармонії з незапам'ятних часів, задовго до того, як це зробили травоїдні. Як ведмеді, ми фактично єдині, хто достатньо сильні, щоб відстоювати її принципи, коли їм кидають виклик." Вона махнула лапою в бік лінії танків. "Що стосується дитинчат, ми просто даємо їм шанс прокласти собі шлях до вершини, спираючись лише на їхню силу. Ми не зневажаємо слабкість і не заохочуємо її."\n\nТорбен насупився. Ейра, а отже, і клан Вольсунґр, справді змінився. І, незважаючи на деякі застереження, Деспот визнав її слова вартими уваги. Однак поки що він промовчав, і вони продовжили огляд, як ні в чому не бувало."
 svartpelsb.17.a:0 "Наша сила походить від самої природи."

 svartpelsb.18.t:0 "Істинний син Всевишнього"
 svartpelsb.18.d:0 "Спочатку Йоріс попросив дозволу на грандіозну церемонію, справді пишне зібрання всіх кланів. Без сумніву, він хотів провести якомога більше паралелей із самою коронацією Ґровера І, моментом, який дав початок Імперії Грифонів. Хоч він і розумів, про що говорить його друг, Торбену довелося опустити лапу і стримати свій ентузіазм. Він не хотів більше ніяких інцидентів, і вже точно не хотів, щоб інші Старійшини думали, що він теж забув про своє урсине коріння.\n\nТаким чином, перед зібраними кланами Свартпельс, Вольсунґр і Скюфлінґ, деспота Торбена було проголошено Улюбленим Сином Всебатька. За стандартами грифонів і поні, церемонія була насправді короткою інтригою. На голову Торбена не поклали корону чи інший символ влади, щоб довести його сходження на престол. У цьому не було потреби; докази були очевидні для всіх - кривавий шлях, прокладений через замерзлі пустирі, щоб вдруге об'єднати ведмежий рід. Але це виявилося лише початком.\n\n "Брати і сестри!" голос Торбена пролунав, як тільки закінчилися вигуки. "Хоча на мої плечі покладено новий титул, я не збираюся зупинятися на досягнутому. Навпаки, як Улюблений Син, я несу відповідальність за те, щоб донести послання Всебатька до менших рас, щоб вони теж отримали шанс піднятися над своїми найпростішими інстинктами і набути полярного духу! Я прошу вас зараз приєднатися до мене у Великому Хрестовому поході! На схід і за море, бо така воля Всебатька!"\n\nВідповідь пролунала у вигляді гуркоту, що стрясав землю."
 svartpelsb.18.a:0 "Воля Всевишнього!"

 svartpelsb.20.t:0 "Наодинці"
 svartpelsb.20.d:0 "Порожні руїни Магярь-Фярань виднілися на обрії. Протягом століть цей замок був бастіоном клану Скюфлінґ, відважних і хоробрих ведмедів, повністю відданих Всебатькові. Це був дім доброго друга. А тепер? Це була ніщо інше, як могила з каменю і льоду, вкрита кров'ю їхніх давніх союзників.\n\nЗдалеку Торбен спостерігав за своєю роботою. Він не пишався нею. Це було необхідно, але від цього вага його дій не ставала легшою. Далеко на півдні і на сході лежали подібні нагадування про криваву лазню, що охопила землю. Стародавні і могутні клани знищені, стерті з історії.\n\nВін повторював собі стару мантру, знову і знову: його дії були необхідні; єдиний спосіб вправити ракову пухлину, перш ніж вона встигла поширитися далі. Проте він діяв надто пізно, і врятувати вдалося небагато. Чи не гордість засліпила його підступність? Чи міг Свартпельс втрутитися до того, як сталося немислиме? Торбен не знав. Він сів навпочіпки, холодний і гіркий вітер шмагав його шерсть. Час помститися чейнджлінґам колись прийде. А зараз він мусив оцінити те, що залишилося."
 svartpelsb.20.a:0 "Ще багато чого треба зробити..."

 svartpelsb.21.t:0 "Близнюки грому"
 svartpelsb.21.d:0 "Остання об'єднавча війна була найкривавішою в історії білих ведмедів. Стародавні клани були знищені, їхні історії назавжди припинилися. Загинуло багато могутніх воїнів, а також багато невинних ведмежат. Цивілізація Скюфлінґу була поставлена на межу краху. Ця безпрецедентна катастрофа темною хмарою нависла над кланом Свартпельсів.\n\nАле Торбен зловив себе на тому, що посміхається. Рана, завдана його народу, була глибокою, але не смертельною. Ще не все втрачено.\n\nПеред Торбеном сидів По Уеллінгтон. Його тіло було сильно понівечене, настільки, що він ледве тримався на ногах. Велика рана на лобі вкрила більшу частину його обличчя засохлою кров'ю. Але він все ще дихав.\n\n "Радий знову тебе бачити, Йорісе." сказав Торбен, порушивши тишу. "Ти запекло бився, довівши, поза всяким сумнівом, свою свободу від впливу чейнджлінґів." Уеллінгтон не відповів. Його очі були затуманені, і він, здавалося, не міг зосередитися.\n\n "Йорісе, нам потрібна твоя допомога, зараз, як ніколи. Удома гниль то вичистили, але чейнджлінґи все ще плетуть змови проти нас за межами наших кордонів. Ми повинні підготуватися до майбутньої битви."\n\nАж тут Уеллінгтон пожвавішав.\n\n "Битви? Ми... ми повинні битися! Битва ще не закінчилася!"\n\nТорбен знову посміхнувся, цього разу набагато ширше:\n\n "Так, ми повинні битися. І ми повинні зробити це разом. Клан Свартпельс і клан Скюфлінґ повинні стояти як брати, як і раніше!""
 svartpelsb.21.a:0 "Принаймні, є один, на кого ми можемо розраховувати."

 svartpelsb.22.t:0 "Анагнорісіс"
 svartpelsb.22.d:0 "Це не була традиційна зустріч ведмежих воєначальників. Бо мало співали військових гімнів, мало пили варива з коріння, арктичних квітів та ягід. І, що найбільш неприродно, було мало вихвалянь і порівняння досягнень. Натомість два тирани білих ведмедів і кілька справжніх і відданих воєначальників оточили мапу, на якій була зображена справді жахлива ситуація. Адже закривавлене царство урсинів було затиснуте в пащі ворога. І чейнджлінґи, і Нова-Грифонія прагнули лише одного - підкорити собі всіх ведмедів і рушили туди якнайшвидше.\n\nЦю похмуру правду відкрив не хто інший, як Йоріс зі Скюфлінґу, той, хто до того ідеалізував Грифонію. Йоріс знав, що чейнджлінґи та грифони Герцланду працюють разом, але до Другої Об'єднавчої Війни не надавав цьому особливого значення. Але після неї його охопили великі сумніви, і він розіслав агентів і порився в архівах клану Свартпельсів. І там він дізнався страшну правду. Бо кожен поштовх чейнджлінґів на Північ за останні 3 століття, здається, збігався зі спробами грифонів, чи то під керівництвом Ґровера, чи то ні. Навіть землі, на які претендували такі експедиції, були схожими за розміром. І ось, агенти грифонів, що повернулися з Нова-Грифонії, доповіли про закупівлю танків чейнджлінґів. І жахлива правда підтвердилася...\n\nБо чейнджлінґи і пташині виродки століттями висмоктували сили з ведмедів, підривали їхні суспільства такими інфільтраціями і тепер прагнули завдати останнього удару... І так воєначальники планували і розраховували, сподівалися і молилися. Бо навіть для ведмедів, щоб боротися проти таких шансів?"
 svartpelsb.22.a:0 "Лише силою волі можна перемогти..."

 svartpelsb.23.t:0 "Воістину наодинці"
 svartpelsb.23.d:0 "Поки воїни клану Свартпельс оглядали руїни останньої великої твердині Скюфлінґу, Торбен спостерігав з вершини сусідньої скелі. Його обличчя спотворилося від розчарування. Завірюха була сильна, і його численні рани все ще боліли, але найгострішим болем з усіх був душевний. Воїни вже звикли до кривавої бійні цієї останньої, найкривавішої Об'єднавчої Війни, але вона все ще тяжіла над їхнім вождем. Стільки великих кланів знищено. Стільки полярних духів знищено. Стільки друзів втрачено...\n\nКоли Торбен спускався вниз, щоб приєднатися до свого клану, до нього підійшло кілька воїнів: "Ми взяли в полон усіх, хто вижив, і зібрали мертвих. Йоріса ніде не було." \n\nПісля хвилинного вагання ведмідь додав: "...і чейнджлінґів теж немає." \n\nОчі Торбена палали люттю. "Чейнджлінґи боягузливіші, ніж ми собі уявляли. Підкупивши наших вождів і налаштувавши клани один проти одного, вони втекли від бою. Але це не має значення. Помстимося у свій час." \n\n "Що стосується Йоріса, ми повинні припустити, що його останки були забрані снігом і льодом. Він був справжнім воїном, загинув у чесному бою..." Торбен зробив Позу, вивчаючи втомлені, вкриті шрамами обличчя своїх вцілілих воїнів."...і з його смертю тягар лідерства лягає на клан Свартпельс. Ми продовжимо боротьбу самотужки."\n\nСпочатку була тиша. Потім по холодному ландшафту прокотився лютий рев. Воїни заспівали пісню, яка незабаром відлунювала по всій півночі:\n\n "Торбен Свартпельс, Володар Грому!"\n "Торбен Свартпельс, рятівник ведмежого роду!"\n "Торбен Свартпельс..."
 svartpelsb.23.a:0 "Овертирант!"
 svartpelsb.24.t:0 "Будь-яка відчутна тінь"
 svartpelsb.24.d:0 "Тижні змели все, але залишили мало димлячих уламків. Зовнішні стіни фортеці зазнали значних руйнувань, вкриваючи місто, поцятковане артилерійськими вирвами та примарами пограбованих або розтрощених речей. Тріщини гуркотіли, коли провалювалася стеля чи підлога, вивергаючи гнилий запах сирих матеріалів, з яким доводилося стикатися як сміттярам, так і будівельникам.\n\nЗатяжне спустошення залишило Торбену можливість залишитися в старій кімнаті і згадати про неї. Хоча його колони погнулися, а передпокої були пошматовані командами підривників, які вибивали газ, міни та вогнемети, він залишився неушкодженим.\n\nСталеві стільці та столи, які ніколи не замінювалися, часи, коли вони з Йорісом планували наступ у першій війні... гірко-солодкий попіл, все перетворилося на попіл, спалений до хрустких крихт комахоїдними маніпуляціями.\n\nШафи та шухляди були витягнуті. Він хапався за фотографії, документи, листи, будь-яку відчутну тінь старого друга. Маленькі успіхи, його крихітний скарб посмертних пам'яток, вивертали його серце навиворіт. Помста сьогодні була надто грубим поняттям, тепер має панувати скорбота, але не зі сльозами, а з мовчазним стоянням, слухаючи, як повільно руйнується привид Йоріса.\n\nАле з дірки в стіні щось стирчало: зламаний сейф, якісь заховані папери. Відпочивши від цього місця смерті, він порився всередині і виявив, що це схеми та креслення артилерії (він хихикнув; Йоріс чомусь полюбляв кумедні великі гармати), зняті прямо з грифонів, можливо, імператорського зразка. Якщо їх зробити правильно, вони зможуть пробити стільки сталі та бетону...\n\nВін клацнув. Хоча Скюфлінґи загинули, вони не зробили це без бою. Їхні гармати довели це. Достатньо було б розірвати навпіл кілька мільйонів чейнджлінґів, щоб повністю помститися за свою найбільшу жертву."
 svartpelsb.24.a:0 "Він притиснув папери до грудей."

 svartpelsb.25.t:0 "Золотий Володар повертається"
 svartpelsb.25.d:0 "Торбен був великим воїном, одним з найбільших серед усіх ведмедів, і лише деякі істоти мали честь піднятися над ним. Він вважав себе вправним у володінні клинком і болтером, сокирою і гарматою. Він викував собі душевну броню на рівні з драконячою. Тільки він один міг перемогти його в бою, і жодна інша істота, яку він зустрічав, не могла його здолати. Але це...\n\nЩе один потік крижаного вітру вдарив його в бік, вм'явши сталь, розпаливши всі рани, які все ще відмовлялися гоїтися, і ледь не перевернувши його. Чи так відчували себе грифони на милості Півночі? Але на такі роздуми не було часу, бо він продовжував свою атаку. Його сокира злетіла високо в повітря, а її голівка зникла з поля зору крізь ревіння хуртовини. І як великі кігті Фенріра, лезо врізалося в тіло його супротивника.\n\nАле золоті обладунки витримали. Усупереч усьому, усупереч досвіду ведмежого воїна-коваля, усупереч усім істинам, захованим у ведмежих трактатах про метали, м'яке, гнучке, жалюгідне золото витримало. І все ж таки кров потекла зі стиків між пластинами, коли Володар Грому зціпив зуби, готуючись до бою. Бо він змусив кристали глибше проникнути в плоть свого супротивника.\n\nІ знову вдарив вітер, такий сильний, що метал тріщав під ним, такий сильний, що примусив його впасти на землю, як лід, що скував його плоть, наче в'язниця. І велика золота постать піднялася над ним, з червоними очима, що сяяли зловісним світлом.\n\n "Здайся, Овертайранте." Голос, зболений болем, затьмарив виття вітрів. "Бо я не бажаю твоєї смерті. Я воїн долі, і північні вітри кажуть, що я повинен битися пліч-о-пліч з тобою за цю землю. Тож здавайтеся і впустіть мене назад!""
 svartpelsb.25.a:0 "Словом Овертиранта тебе помилувано..."

 svartpelsb.26.t:0 "Марш ста тисяч вигнанців"
 svartpelsb.26.d:0 "Це була не та колона біженців, на яку очікував Торбен. Зрештою, він був там, коли Йоріс розгромив Торденстьєрне. Клан був мертвий, його залишки вигнані у вигнання, артефакти вкрадені, сховища розграбовані. Вони були прокляті стати кочівниками або дикунами.\n\nАле те, що рушило в землі білих ведмедів після перемоги Мідаса, не було потоком вигнанців, це була колона воїнів. Величезні сокири, вкриті золотим і срібним сплавом, здіймалися до бурхливих небес, а обладунки з чорної сталі, виготовленої Чейнджлінґами, виблискували в місячному сяйві. Немовлята та молодь клану були зібрані у вантажівки, зроблені з чейнджлінґової сталі, але роздуті до розмірів ведмедя, які повільно рухалися за колоною. А в самому кінці, оточені воїнами в обладунках, що гуркотіли, як грім, коли вони просувалися вперед, їхали кілька зразків справжньої громової броні сучасної епохи, великі механізовані воїни-носії. Хоча, як він знав, вони не були наповнені воїнами та багатствами, скоріше всередині лежали жахливі технології, за які клан Торденстьєрне був вигнаний в першу чергу, перш ніж їхній лорд повернувся, щоб змусити свій клан повернутися, як не менше, ніж великий лорд-чаклун.\n\nБез сумніву, велика частина цього багатства була придбана за "благородні" метали, придбані в місцях, куди жодна комаха не наважилася б наважитися, оскільки вони були наповнені чудовиськами, або й ще гірше. Але навіть тоді придбати стільки, відбудувати та озброїти цілий клан... Змусити поховати науки і чаклунство, чиї методи були відкинуті... Що б не зробив Мідас, він якимось чином перетворив вигнаний незначний клан на щось, що могло б зрівнятися зі Свартпельсом або Скюфлінґом на піку їхньої могутності.\n\nІ все, що було у Торбена, щоб це не перетворилося на хуртовину конфлікту за те, хто править, - це обіцянки долі, дані зрадницьким чаклуном...."
 svartpelsb.26.a:0 "Будемо сподіватися, що обіцянки будуть виконані, бо Третя війна за Об'єднання не залишить нікого живим"

 svartpelsb.27.t:0 "Є епохи чейнджлінґів, є епохи Ведмедів..."
 svartpelsb.27.d:0 "Сторожова вежа самотньо вистояла проти кусючих холодів. Всього за кілька кроків попереду лежала територія жіків, її незайманий ландшафт поцяткований вогнями патрулів чейнджлінґів.\n\nТорбен відвернувся від вигляду землі брехунів. Минуло багато місяців, але він так і не відійшов від смертельного обману, посіяного у володіннях його побратимів-ведмедів. Він не знав долі стількох друзів, їхніх двійників, готових до смерті віддаватися їхньому обличчю.\n\nЙоріс, який пощастило вижити в цьому обмані, приєднався до нього, а потім насміхався над прикордонним минулим. Нехай сюди в'їжджають чейнджлінґи зі своїми танками і літаками. Під їхніми металевими шарами захисту за штурвалом сидів наляканий чейнджлінґ, нездатний послабити страх своїх предків перед мільйонними лапатими мисливцями.\n\n "Твоя робота стане набагато легшою, друже, - сказав жартівливий Торбен, щоб розірвати холодну мовчанку. "Страшні морфи під твоїм командуванням... це значна сила, яка додасться до твого досвіду вбивства грифонів." "Разом з їхніми вкраденими винаходами", - відповів Йоріс. На його обличчі з'явилася крихітна посмішка. "Хм, можливо, це буде так само, як у старі добрі часи в Грифонії з Ульріком." "За винятком цього разу, - Торбен нахилився ближче. "Я і всі [PLB.GetName] будемо на твоєму боці."\n\nЙоріс штовхнув сокиру на землю, напівстоячи на ній. "Так точно, брате!"
 svartpelsb.27.a:0 "...перш ніж їхній світ впаде мертвим."

 svartpelsb.28.t:0 "Рафнагуд"
 svartpelsb.28.d:0 "Торбен переглянув старі звіти та розповіді Йоріса з часів його перебування у Грифонії. Для занепаду, який він накопичив, служачи меншим істотам, ці записи передвіщали гордовиту державу, яку вже будували власні грифони Еквусу: нову огидну Імперію Грифонів, що складалася з підражателів Ґровера, які прагнули затьмарити континент своєю анемією.\n\nТак думав він і сам Йоріс, оглядаючи лінію позицій, розміщених на східному кордоні. Ідея не була новаторською: отримати пару зенітних установок, щоб збивати літаючих грифонів. Однак, великий потік грифонів, що падає з неба... Торбен бачив це в уяві: небо у вогні, дощ обгорілих крил, понівечене м'ясо, що пахне і смачно смажиться на грилі, безкоштовна їжа від вселюблячого Всебатька. Ті, хто виживуть і здадуться, природно, потраплять у рабство.\n\n "Це одна хороша річ, яку ти виніс з твого перебування за морем, - дражнив Торбен Йоріса в перерві між перевірками снарядів: "Ти навчився мистецтву вбивати грифонів." "Якби це було так, то, можливо, мені варто було б стати найманцем-чейнджлінґом, - напівжартома відповів Йоріс. "Можливо, тоді я навчився б мистецтву розрубувати королев навпіл, перш ніж їхні дрони просочувалися в наші домівки."\n\nЗамість докорів сумління та жалю, ці двоє друзів розсміялися. Світ Чейнджлінґів скоро закінчиться; сьогодні і незабаром першими впадуть грифони."
 svartpelsb.28.a:0 "Ми станемо їхнім прокляттям."

 svartpelsb.29.t:0 "Вторгнення, що наближається"
 svartpelsb.29.d:0 "Ми отримали термінові повідомлення з нашого кордону з білими ведмедями. На східному березі Ключ-озера накопичується велика армія воїнів, і ведмеді виділяють все більше і більше ресурсів на військове виробництво. Враховуючи, що їхній лідер, [PLB.GetLeader], відкрито зневажає нас і наш вид, вторгнення, здається, вже не за горами.\n\nНа перший погляд, це навряд чи можна вважати загрозою. Білі ведмеді мають лише малу частку нашої популяції та промислової потужності, тому перемога ,здається, в нашій кишені. Деякі політики і генерали навіть сподіваються на вторгнення, оскільки це виправдовує швидке завоювання території ведмедів.\n\nХоча держава ведмедів може бути слабкою, це все одно небезпечна ситуація. Білі ведмеді - потужні істоти, які можуть битися з неперевершеною жорстокістю і фанатизмом. Недооцінка їх може стати нашою погибеллю."
 svartpelsb.29.a:0 "ХА! Нехай приходять."

 svartpelsb.30.t:0 "Вечоріє"
 svartpelsb.30.d:0 "У минулі часи війна між ведмедями була гучною і галасливою справою. Воїни співали, кричали і ревли, коли стикалися один з одним у битві. Цілі клани співали в унісон, коли вирушали на війну. Коли битва закінчувалася, вони співали, щоб відсвяткувати свій тріумф або оплакати своїх загиблих товаришів.\n\nТепер стояла тиша. Коли Торбен і Йоріс під покровом темряви вели своїх воїнів до берега Ключ-озера, єдиними звуками, які можна було почути, були хрускіт льоду під крокуючими лапами та брязкіт металевих обладунків.\n\nТорбен втупився в озеро, поверхня якого відбивала слабкі промені місячного світла. У цьому марші не було потреби в звуках. Кожен ведмідь точно знав, чому він тут і що має робити.\n\nЦе була остання битва проти найбільшого ворога ведмежого роду. Ця війна мала за мету помститися за покоління принижень і відновити гегемонію ведмедів на Півночі. Це була боротьба не на життя, а на смерть, полярні духи нарешті подолали корупцію чейнджлінґів. Щоб забезпечити перемогу, вони повинні повністю присвятити свій розум, тіло і душу майбутній боротьбі.\n\nТорбен продовжував марш, не промовивши ані слова. Його воїни підтримували його на кожному кроці."
 svartpelsb.30.a:0 "Ми змусимо їх заплатити."

 svartpelsb.31.t:0 "Вторгнення неминуче"
 svartpelsb.31.d:0 "Ситуація вздовж нашого північного кордону досягає критичної точки. Білі ведмеді перервали всі контакти з нами, і зараз біля кордону накопичується велика армія. Враховуючи, що їхній ватажок, [PLB.GetLeader], відкрито зневажає нас і наш вид, ці дії можуть означати лише одне: вторгнення.\n\nУ минулому ми мали військову перевагу над усіма сусідніми державами північного Еквусу, але це, може, більше не так. Білі ведмеді збирають всі ресурси, які можуть, за необхідності силою, і вкладають їх у військове виробництво. Вони також є лютими істотами, які б'ються з незрівнянною жорстокістю і фанатизмом.\n\nЧас спливає. Ми повинні підготуватися до зустрічі з цією загрозою, поки не стало занадто пізно."
 svartpelsb.31.a:0 "Коли вони прийдуть, ми будемо готові."

 svartpelsb.32.t:0 "Суд"
 svartpelsb.32.d:0 "Торстен Хвостате Перо ховався вдома, коли його знайшли ведмеді. Коли вони вели його через руїни Уетера, його думки блукали. Він ніколи не тримав зла на білих ведмедів, але, чесно кажучи, не вважав їх рівними собі. Вони були примітивними істотами, що жили за кордоном, далеко від просунутої і процвітаючої столиці Нова-Грифонії.\n\nЩо ж, якщо гордість і була гріхом новогрифонців, то вони дорого за нього заплатили. Їхнє колись велике місто тепер лежало в руїнах, цілі квартали були зрівняні з землею в результаті люті овець. Пошкодження були настільки серйозними, що Уетер, можливо, ніколи не оговтається.\n\nУрсини привели Торстена та інших вцілілих на міську площу. Великої статуї Ґровера І, що колись там стояла, вже не було. На її місці спорудили імпровізований ешафот.\n\nНарешті на помості з'явився Торбен і почав говорити.\n\n "Століттями грифони чинили злочини проти роду урсинів. Імператори династії Ґроверів вторглися на наші землі, зневажали наші звичаї і вбивали наших родичів. З безпечного палацу за морем вони вимагають нашого підкорення. Грифони полювали на нас навіть тоді, коли ними не керував жоден імператор, бо дух Ґроверів лежить на них усіх!" \n\n "Ми незліченну кількість разів відбивалися від них, але вони завжди невдовзі поверталися. Сьогодні це замкнене коло розірветься. Колонія грифонів наша, і сьогодні лакеї Імператора будуть покарані за свої злочини. Сьогодні у нас буде Справедливість!"\n\nДвоє воїнів принесли щось на ешафот. Торстен не міг повірити своїм очам. Це був [GRF.GetLeader], їхні зап'ястя були скуті ланцюгами, але в іншому вони були неушкоджені. Вони стояли на помості мовчки, намагаючись з усіх сил померти з гідністю, гідною глави держави. Ведмеді наблизилися і накинулися на них. Усе закінчилося за лічені секунди.\n\nТепер воїни почали навмання вибирати з натовпу грифонів, виводити їх на ешафот і розправлятися з кожним по черзі. Торстен стояв, паралізований страхом, поки один з ведмедів не схопив його: "Ні, зачекай! Ви схопили не того грифона. Я нічого не зробив! Ні, зупиніться! БУДЬ ЛАСКА...""
 svartpelsb.32.a:0 "Наша помста завершена."

 volsungr.1.t:0 "Попереду завдання"
 volsungr.1.d:0 "Хаос. Руйнування. Смерть.\n\nПоки принцеса Ейра спостерігала, як численні ведмеді клану Вольсунґр готуються до бою, її єдиною думкою було завдання, яке чекає на них усіх. Воно буде важким, це було очевидно. Як і Деспот до них, клан Вольсунґр повинен буде продемонструвати свою силу, стійкість і дух, якщо вони хочуть вплинути на інші клани або змусити їх визнати їхнє правління. Але Ейра довела б справу до кінця, вона мусила довести її до кінця, якщо вони хотіли врятувати ведмедів від самих себе і один від одного, і правити разом, як лідери, а не як підлеглі.\n\nАле, незважаючи на свою рішучість, Ейра не могла не задаватися питанням, чи міг би бути інший шлях. Чи змогла б вона переконати По Уеллінгтона подивитися на речі по-іншому, спробувати щось інше? Чи могла б вона врятувати свій рід без необхідності цієї нової кровопролитної війни? Чи акти зверхності були єдиним методом, який розуміли інші клани? Принцеса Ейра не знала, але те, що вона знала, це те, що ці питання не були лише питаннями минулого. Те, що вона зробить зараз, вирішить майбутнє не лише її клану, але й усіх кланів, а можливо, навіть усіх ведмедів у світі."
 volsungr.1.a:0 "За нове і краще майбутнє!"

 volsungr.2.t:0 "Проблеми всередині нас"
 volsungr.2.d:0 "Поки інші клани продовжують протистояти на замерзлій Півночі, в самому клані Вольсунґр виникла серйозна проблема. Хоча він більше не контролює білих ведмедів, остання дія По Уеллінгтона - відкриття кордонів для колишніх вигнанців - викликала палкі суперечки та конфлікти між старшими та молодшими членами клану. Зрозуміло, що для того, щоб знову об'єднати ведмедів, принцеса Ейра повинна стати на чийсь бік і вирішити це питання, поки воно не вийшло з-під контролю.\n\nЗ одного боку, молоді ведмеді хочуть, щоб клан прийняв усіх ведмедів, які повертаються в рідні краї. Вони кажуть, що їхня кількість буде необхідна, щоб підкорити інші клани, і тому слід прийняти будь-яку запропоновану допомогу. У дусі дружби ми повинні приймати всіх вигнанців і тримати кордони відкритими.\n\nЗ іншого боку, старійшини клану хочуть обмежити кількість вигнанців, яких ми приймаємо до клану Вольсунґр. Хоча зараз клан здебільшого складається з вигнанців, а принцеса сама є вигнанцем, є причина, чому інших не впустили назад раніше. Не всі вони такі ж гармонійні, як клан, і деякі були вигнані за злочини, які навіть багато хто з клану ненавидить. Хоча кордони не повинні бути повністю закриті, вони все ж повинні дозволяти в'їзд лише тим, кому можна довіряти."
 volsungr.2.a:0 "Але що вибрати?"

 volsungr.3.t:0 "Хвиля вигнанців"
 volsungr.3.d:0 "З відкриттям кордонів тисячі білих ведмедів нещодавно влилися в клан, приїхавши з найрізноманітніших місць. Переважна більшість з них погодилася допомогти нам в об'єднанні земель білих ведмедів, але є чимало таких, які, на думку навіть молодших членів клану, мають... підозріле минуле. Хоча до насильства ще не доходило, очевидно, що ці новачки не всі поділяють принципи дружби та злагоди. Хоча ми дозволимо їм боротися за клан, ми також повинні пильно стежити за цими вигнанцями."
 volsungr.3.a:0 "Будемо сподіватися, що це не було помилкою..."

 volsungr.4.t:0 "Охорона брами"
 volsungr.4.d:0 "Келд з клану Вольсунґр дивився, як останній ведмідь, що прийшов до кордонів, які позначали початок ведмежої території, пішов геть, повільно зникаючи в білих вітрах снігу. Останні кілька днів були сповнені активності, оскільки незліченна кількість урсинів з-за кордону, які почули новину про нещодавнє відкриття кордонів, повернулися, прагнучи возз'єднатися з батьківщиною. Деяким дозволили в'їзд, іншим... не дозволили. Були серед них і справжні божевільні ведмеді з радикальними навіть для Вольсунґра ідеями. Було навіть кілька вигнанців з Северяни, нинішнього Сталліонграда, яких зрештою визнали надто небезпечними.\n\nЦілком можливо, що це було помилкою. Що майбутні конфлікти потребуватимуть чисельності, і що ведмеді, від яких відвернулися тут і по обидва боки кордону, мали б вирішальне значення. Але принаймні Келд і багато інших воїнів та старійшин, яких він знав у Вольсунґрі, почувалися спокійно, знаючи, що клан досі в безпеці зсередини. Єдність буде збережена, єдність під владою принцеси, і це було найважливіше."
 volsungr.4.a:0 "Це було правильне рішення."

 volsungr.5.t:0 "Потрійний альянс"
 volsungr.5.d:0 "Вессландія, регіон на півночі, завжди був найбільш нормальним для інших істот, що робить його найдивнішим для ведмедів. Земля густо вкрита лісом, багата на дичину та ягоди, досить родюча, щоб вирощувати бульбу та іншу подібну їжу. Тварини там звичайні - грифони чи поні, а не чарівні звірі, як на решті території. Навіть його довге узбережжя рясніє рибою, тюленями та іншими подібними істотами. Проте, незважаючи на всі ці ресурси, жоден клан так і не став лідером регіону, щоб утвердити своє панування над їжею та іншими кланами. Навіть перед обличчям вторгнення новогрифонів клани не об'єдналися, натомість відвойовуючи землі і поневолюючи прибулих грифонів.\n\nУсе змінилося, коли три нинішні клани Фальсен, Бенкесток і Бродкорб, продукти, здавалося б, нескінченного циклу піднесення і розпаду кланів, уклали союз рівних. Хоча клани ніколи раніше не бачили нічого подібного, це може бути результатом їхніх схожих традицій і використання слуг-грифонів. Хоча їхня здатність співпрацювати на рівних викликає захоплення, заяви про те, що "Потрійний альянс", як його тепер називають, намагається узурпувати владу над ведмедями для себе, викликають занепокоєння у багатьох членів клану, і вони вважають, що конфлікт може бути єдиним варіантом, що залишився."
 volsungr.5.a:0 "Як нам з цим боротися?"

 volsungr.6.t:0 "Тристороння дипломатія"
 volsungr.6.d:0 "Лідери кланів і принцеса Ейра домовилися зустрітися на узліссі на північ від гір клану Вольсунґр, спільного кордону, що відділяв їхню підконтрольну територію від Вессландії. Прибуття обох делегацій пройшло відносно спокійно, що дало надію принцесі та її супутникам. Той факт, що вони не використовували ніяких грандіозних демонстрацій сили або великих погроз на свою адресу, які зазвичай використовуються для залякування ворожого клану на таких переговорах, означав, що вони явно хотіли говорити на рівних.\n\nПереговори були довгими, і хоча вони проходили в основному спокійно і цивілізовано, а більшість аргументів обговорювалися на словах, все ж не обійшлося без бійок і насильства, причому деякі з Вольсунґру пішли з кількома зламаними ребрами. Вимоги вессландців були невеликими і стосувалися лише деяких основних концепцій майбутніх сільськогосподарських та економічних планів, а також обіцянок, що їхню нинішню систему панування над грифонами залишать у спокої. Можливо, чутки про те, що вони хочуть панувати над усіма ведмедями, були саме такими, а можливо, страх опинитися в оточенні інших кланів змусив їх відкрити свою свідомість. Кінцевий результат однаковий: клани Вессландії підкорилися нашим ідеалам і нашому захисту."
 volsungr.6.a:0 "Принаймні вони були розумними."

 volsungr.20.t:0 "Троє на одного"
 volsungr.20.d:0 "Хоча По Уеллінгтон вже одного разу переміг клани Вессландії, клан Вольсунґр не зможе повторити тактику Деспота, щоб розгромити клани на півночі в битві. Вони просто не мали чисельної переваги, щоб дозволити собі таку атаку, особливо проти об'єднаної сили "Потрійного альянсу." Також було зрозуміло, що вони не зможуть перемогти у довготривалому конфлікті, тож за типовою ведмежою традицією знадобиться велика демонстрація переважаючої сили та й сама перемога, щоб примусити їх до покори.\n\nНаші війська зустрілися з трьома кланами та їхніми загонами біля річки, природного кордону та поля битви. Хоча наші воїни були одягнені в наші зоряно-сталеві обладунки і билися відважно, Вессландія просто мала більшу чисельність і почала змушувати Вольсунґр оборонятися. Вони перетнули річку і ліси, пробившись до самого підніжжя гір.\n\nТоді прибули нануки, які спустилися зі схилу гори, щоб підкріпити решту загонів. Маючи десятиліття досвіду боротьби з монстрами, набагато страшнішими за звичайного горностая, вони змогли переломити хід подій, і клан Вольсунґр бився з новою силою. Тепер настала черга Вессландії бути відкинутою назад, через ліс і річку, поки вони нарешті не здалися. Зрозумівши, що конфлікт майже завершився, вожді кланів невдовзі зустрілися з Ейрою, щоб скласти зброю і визнати свій статус підданих, але вже під новим господарем."
 volsungr.20.a:0 "На крок ближче до нашої мети."

 volsungr.26.t:0 "Дуель грому"
 volsungr.26.d:0 "Подорож на північ до клану Свартпельс була довгою і важкою. Земля була холодною і невблаганною навіть для білих ведмедів, а щоб дістатися до самого клану, треба було перетнути багато гір, пагорбів і лісів. І ще до того, як вони змогли увійти до крижаних фортець, принцеса Ейра та її почет були змушені битися на дуелі з пансербйорнами з клану Свартпельс, щоб довести, що вони є ведмедями. Однак Ейра очікувала цього і взяла з собою лише найсильніших і найдосвідченіших старійшин, щоб супроводжувати її. Як тільки вони перемогли пансербйорна і привернули увагу самого Володаря Грому Торбена, принцеса Ейра негайно викликала вождя клану на поєдинок.\n\nБій був довгим і захоплюючим, і багато людей з клану спостерігали за тим, як два вожді билися, щоб довести свою перевагу над іншим. Хоча Торбен був найсильнішим у клані, адже до цього його лише раз переміг По Уеллінгтон, Ейра була майже такою ж сильною і тактично вправною. Проте лише завдяки щасливому випадку принцесі вдалося здобути перемогу, скориставшись надмірною агресивністю Повелителя Грому. І коли Торбен піднявся на лапи, вираз його обличчя був сповнений зневажливої поваги, оскільки і він, і клан Свартпельс присягнули на вірність принцесі Ейрі, новій об'єднувачці кланів."
 volsungr.26.a:0 "Іноді меч буває сильнішим за перо."

 volsungr.29.t:0 "Продовжуючи натиск"
 volsungr.29.d:0 "Коли останній ведмідь покинув кімнату принцеси Ейри, вона дозволила собі відкинутися на спинку крижаного крісла і розслабитися, втомившись вирішувати сьогоднішні проблеми. Від сходу до заходу сонця її зустрічали безліч ведмедів з клану, від воїнів до старійшин, запитуючи, чому вони продовжують воювати проти решти кланів. Аргументи варіювалися від простого бажання мати більше часу на відновлення до здивування, чому ми витрачаємо час на ведмедів, які були явно негармонійними. Що від них більше клопоту, ніж вони того варті, і що клан Вольсунґр повинен зосередитися на своїх власних ведмедях тепер, коли їхнє становище стало безпечним.\n\nКожному відвідувачу Ейра дала зрозуміти, що це рішення не підлягає обговоренню. Новий шлях білого ведмедя буде для всіх них, а не лише для тих, хто належить до клану. Мало того, чим довше вони залишатимуться розрізненими, тим слабшими стануть, і тим більшою буде ймовірність того, що якісь чужинці скористаються можливістю вторгнення. Кільком найупертішим ведмедям довелося погрожувати, щоб змусити їх підкоритися, але до кінця дня всі ведмеді, що залишилися, були або задоволені, або не хотіли йти проти принцеси. Вони були готові знову вирушити в похід і закінчити те, що почали."
 volsungr.29.a:0 "Ми не залишимо жодного ведмедя позаду."

 volsungr.30.t:0 "Тирани на Заході"
 volsungr.30.d:0 "Клан Скюфлінґ, колишній головний клан білих ведмедів, здавна очолював Деспот, відомий як По Уеллінгтон. Вони були першими, хто об'єднав клани в один, примусивши всі інші до покори і зайнявши місце вищості і панування як беззаперечні господарі земель. Вони навіть уявляли себе благословенними божественною прихильністю, аспект їхньої релігійності глибоко вкорінився в самому клані. Під час свого правління По Уеллінгтон продовжував ігнорувати бажання інших кланів, що неминуче призвело до ситуації, яка склалася зараз.\n\nОднак, незважаючи на всі їхні недоліки, досягнення клану Скюфлінґів є незаперечними. Адже навіть з усіма їхніми помилками, Деспот був першим, хто нарешті об'єднав ведмедів під єдиним прапором. Його досвід серед інших рас не має аналогів серед усіх кланів, особливо у веденні війни, і він, і клан Скюфлінґ цінували закон і порядок не лише на своїх землях, але й по всій країні. Без його лідерства білі ведмеді цілком могли бути завойовані або підкорені іншою расою, такою як чейнджлінґи, задовго до цього."
 volsungr.30.a:0 "Але чи можуть вони прислухатися до розуму?"

 volsungr.31.t:0 "Суперники Півночі"
 volsungr.31.d:0 "Клан Свартпельс, "Володарі Грому", здавна був ворогом клану Вольсунґр. Протягом багатьох років, задовго до об'єднання кланів, вони вели проти нас багато війн, намагаючись знищити те, що вони вважали ганебним і безчесним для ведмежої традиції. І хоча ми раз по раз давали їм відсіч, коли Свартпельс здобув Скюфлінґ як союзника в об'єднавчій кампанії, Вольсунґр надзвичайно постраждав від жорстокості, що послідувала за цим. Клан балансував на межі знищення, лише ледь врятувавшись, дозволивши масове повернення вигнанців, таких як сама принцеса Ейра, яка ще більше віддалила Вольсунґр від Свартпельса.\n\nІ все ж, незважаючи на всю свою жорстокість, клан Свартпельс досі вважається одним з найбільш інтелектуальних і науково просунутих кланів завдяки своїм, здавалося б, суперечливим позиціям на певні речі. Сам клан неймовірно жорстокий і войовничий, але його лідери виховані на історії та традиціях ведмедів. Вони виступали проти змін і прогресу, коли їм пропонували реформуватися, але були одними з найвідданіших прихильників По Уеллінгтона, коли той очолював землі білих ведмедів. І навіть при всій своїй зосередженості на силі істоти, вони насолоджувалися компанією пінгвінів усіх рас.\n\nАле зараз здається, що вони впали в параною. Адже на далекій півночі вони відокремилися від Деспота, вважаючи, що всі нещодавні проблеми були спричинені виключно проникненням чейнджлінґів. Будь-який ведмідь, який прагне наблизитися до клану, повинен битися на дуелі, щоб довести свою приналежність до ведмежого роду, і це може виявитися нелегким випробуванням."
 volsungr.31.a:0 "Загадкова ситуація..."

 volsungr.32.t:0 "Принцеса і деспот"
 volsungr.32.d:0 "Принцеса Ейра звернулася до клану Скюфлінґ для переговорів, очікуючи багато чого. Злобного Деспота. Релігійного фанатика. Несамовитого урсина. Клан, готовий на все, щоб повернути собі контроль. Вона пішла на переговори з маскою з льоду і сталі, сповнена рішучості не показати слабкості перед деспотом.\n\nТе, що отримала Ейра, було абсолютно не схоже на те, чого вона очікувала. Вона без особливих проблем дісталася до його крижаної фортеці і зачекала всередині, поки Деспот закінчував деякі свої обов'язки. Поки вона чекала, Ейра не могла не помітити велику статую ведмежої тварини, якій майже кожен воїн клану Скюфлінґ віддавав шану, коли проходив повз неї. І члени клану, вони всі ходили з такою метою, з порядком, на відміну від хаосу, який зазвичай описував бізнес в інших кланах. Деспот, безумовно, постарався на славу, це точно.\n\nКоли нарешті настав час поговорити з ним, зустріч також сильно відрізнялася від того, що вона собі уявляла. По Уеллінгтон був колишнім вигнанцем, як і вона, і було ясно, що його досвід сформував його так само, як і її. І так само, як і вона, він не збирався легко відмовлятися від цих ідей і переконань. Переговори були довгими і запеклими, як битва двох ведмедів у словесній і розумовій боротьбі, які намагалися здобути верх над іншим ведмедем. Уеллінгтон не був дурнем, і він був набагато досвідченішим у такій тактиці, ніж Ейра. І все ж, оскільки сам клан Вольсунґр мав набагато сильнішу позицію, ніж клан Скюфлінґ, він міг зробити не так вже й багато. Мало того, в міру того, як переговори продовжувалися, він, здавалося, повільно втрачав бажання продовжувати, його розум майже витав деінде. На той час, коли Ейра і її клан вийшла з фортеці, було ясно, що, хоча було зроблено багато поступок, лідирував вже не Скюфлінґ, а Вольсунґр."
 volsungr.32.a:0 "Слова, не підкріплені силою, не надто вагомі."

 volsungr.35.t:0 "Без компромісів"
 volsungr.35.d:0 "Незважаючи на нещодавній хаос, клан Скюфлінґ все ще залишався одним з найпотужніших кланів у військовому плані. Звичайно, вони мали самого Деспота, По Уеллінгтона, який очолював їх, а також підданих у кланах Онлартіра. Однак їм також бракувало однієї критично важливої речі - єдності. Через нездатність По Уеллінгтона підтримувати порядок, напруженість між Скюфлінґом і півднем досягла небувало високого рівня, а їхня співпраця перебуває на межі краху.\n\nДві армії зустрілися на пагорбах неподалік від кордону з територією Вольсунґра, очолювані Деспотом і Принцесою відповідно. Їх чисельність була майже рівною, і хоча клан Вольсунґр мав своїх воїнів у броні з зоряної сталі, клан Скюфлінґ все ще володів великою зброєю смерті, силою артилерії. Спочатку здавалося, що битва схиляється на бік По Уеллінгтона, оскільки багато ведмедів Вольсунґра впали перед великою силою і міццю артилерійських снарядів і тактикою Деспота. Але у ворога поволі почали з'являтися слабкі місця, оскільки співпраця між кланами Скюфлінґа та Онлартіра була слабкою. В якийсь момент майже цілий загін був знищений дружнім вогнем з їхніх же снарядів. Принцеса Ейра, побачивши цю слабкість, негайно скористалася нею, створюючи об'єднані атаки і прориви через їхні лінії, викликаючи хаос у ворогів. Їхні сили швидко почали зменшуватися, і вони були змушені відступити.\n\nТакий результат продовжився в кількох інших битвах на землях білих ведмедів, оскільки загони По Уеллінгтона були постійно відкидалися назад просто через відсутність єдності і командування, чого не було у Скюфлінґу. Ефект був майже миттєвим, оскільки після того, як стало зрозуміло, що вони програють, різні клани Онлартіра відкололися від клану Скюфлінґ, натомість підкорившись клану Вольсунґр. Деспот, зрозумівши, що на цьому етапі все втрачено, незабаром здався, залишивши весь захід урсинських земель підкореним одним помахом кігтя."
 volsungr.35.a:0 "Деспота переможено!"

 volsungr.36.t:0 "Битва на річці Раумельф"
 volsungr.36.d:0 "Загони Вольсунґрів і Свартпельсів зустрілися на річці Раумельф, природному кордоні, що відокремлював територію клану Свартпельсів від решти ведмежих земель. Через їхню підозрілість до всіх інших ведмедів через нещодавній хаос і підозру у вторгненні чейнджлінґів, було зрозуміло, що вони не задовольняться нічим іншим, окрім традиційної битви і перемоги. Тому обидві сторони були озброєні лише сокирами - зброєю, якою клан Торбена володів набагато краще. І навіть при явній чисельній перевазі Вольсунґрів, з самого початку битви стало очевидно, що кількість тут не має значення, лише майстерність, сила і переконання.\n\nБитва не закінчилася за якийсь короткий проміжок часу. Навіть навпаки. Протягом цілого тижня ведмеді билися один з одним лоб в лоб, деякі з них вдавалися до голих кігтів на полі бою. Це була довга патова ситуація, оскільки жоден з кланів не міг отримати перевагу, поки, нарешті, на сьомий день все не змінилося. Сама принцеса Ейра та решта старійшин особисто вийшли на лінію фронту, як і Повелитель Грому Торбен та його пансербйорн. Коли битва продовжувала вирувати навколо них, Ейрі ледве вдалося перемогти Торбена в бою, що справді ознаменувало кінець конфлікту, коли Володар Грому підвівся і кивнув головою перед тим, як оголосити про свою капітуляцію. Клан Вольсунґр, вочевидь, довів свою гідність, оскільки невдовзі після цього клан Свартпельс підтвердив свою вірність принцесі так само, як і По Уеллінгтону багато років тому."
 volsungr.36.a:0 "Успіх - найкраща демонстрація сили!"

 volsungr.39.t:0 "Нарешті перемога"
 volsungr.39.d:0 "Це було зроблено. Хоча перед ними стояли перешкода за перешкодою, принцеса Ейра знову об'єднала клани. Від півночі до півдня, від сходу до заходу, всі визнали Ейру ватажком та гармонію, як дороговказом усіх ведмедів. Клан Вольсунґр довів силу своїх переконань, і час хаосу закінчився.\n\nАле немає часу зупинятися на перемогах. Справжня сила, це дії, а не слова, і тому ми виконаємо те, що обіцяли, і зробимо. Усі клани в майбутньому, сповненому гармонії та єдності, отримають право голосу. Бо як би ми не були роз'єднані, разом ми здолаємо будь-що, що посміє перегородити нам шлях."
 volsungr.39.a:0 "За нове майбутнє!"

 volsungrb.1.t:0 "Унікальна ситуація"
 volsungrb.1.d:0 "Компроміс не був чимось звичайним чи нормальним серед урсинів. За ідеї доводилося боротися до останнього, і лише одна з них виявлялася кращою. Так, переможені зазвичай зберігали кілька своїх старих ідей, щоб поєднати їх з новими, але переможці ніколи не відчували потреби догоджати переможеним. Зрештою, навіщо ведмедю переймати те, що було доведено гіршим? З іншого боку, наша ситуація і близько не схожа на норму ведмежого світу. Наші переговори з іншими кланами врятували життя і дали нам моральну перевагу, якщо це важливо, але це також поставило нас на набагато більш крихкий фундамент порівняно з іншими кланами. Вони тримаються під нашими прапорами не силою, погрозами чи підкоренням, а просто за власним бажанням і словом. Зв'язків між Деспотом і меншими більше не існує, а це означає, що нам доведеться діяти обережно і задовольняти їх, якщо ми хочемо зберегти ведмежиц рід разом. І хоча наступні кілька днів будуть... м'яко кажучи, нелегкими, зрештою ми станемо сильнішими. Адже що довела наша дипломатія, як не те, що кожен клан має щось, до чого варто прислухатися?"
 volsungrb.1.a:0 "Дії та порозуміння є основою єдності, а не сила."

 volsungrb.2.t:0 "Перша принцеса"
 volsungrb.2.d:0 "Зал засідань у Магярь-Фярань був переобладнаний для сьогоднішньої грандіозної події. Ведмеді з усіх кланів з'їхалися до великого будинку клану Скюфлінґ, щоб стати свідками безпрецедентної події в усій письмовій історії ведмежого світу. Сьогодні мала відбутися перша коронація Полярної Принцеси, за згодою всіх вождів клану.\n\nПісля недовгих роздумів Ейра вирішила зробити церемонію короткою і по суті, щоб зберегти хоча б частину ведмежих традицій. Вона складалася лише з присяги перед народом співпрацювати з кожним кланом, прислухатися і поважати їхні права, та, власне, коронування. Корона мала форму простого кільця, укріпленого зоряною сталлю та інкрустованого дорогоцінним камінням, одночасно королівського та достатньо міцного, щоб у разі потреби його можна було використати як зброю, що також було навмисно.\n\nУнікальні стосунки між принцесою та її підданими були продемонстровані не краще, аніж у самому кінці. Бо коли прийшов час вклонитися своєму новому монарху, в той час як маси воїнів зробили це, Повелитель Грому Торбен і По Уеллінгтон цього не зробили. Можливо, вона і була об'єднувачем, але вони не були справжніми підданими. Допоки Ейра зберігала їм вірність, клани йшли за нею. Але якщо вона піде проти них у невідповідний час... наслідки можуть бути набагато гіршими, ніж те, що сталося з Деспотом."
 volsungrb.2.a:0 "За нову принцесу!"

 volsungrb.3.t:0 "Союз благодаті та порядку"
 volsungrb.3.d:0 "Важко було не переконати По Уеллінгтона прийняти пропозицію принцеси Ейри. Ні, найскладнішим було знайти його в першу чергу, що виявилося найбільшою проблемою. Ніхто з клану Скюфлінґ не бачив його вже кілька днів, а його колишнє житло не залишило жодних доказів того, куди він міг піти. Для його негайних пошуків були сформовані псевдопошукові загони, які очолила сама Ейра.\n\nЙого знайшли в дивному місці, в самотній фортеці біля краю, що розділяв схід і захід Ключ-озера. Єдина масивна статуя, навіть більша за велику ведмежу фігуру, що також знаходилася у фортецях клану Скюфлінґ, була центральним елементом цього місця. По Уеллінгтон був одягнений у дивні священицькі шати, здавалося, що він молився до звіра, який стояв перед ним. Коли він побачив Ейру, то спочатку був налаштований вороже, але коли вона дала зрозуміти, що має намір зробити йому пропозицію, він неохоче погодився. Чому Уеллінгтон вирішив її вислухати - залишилося загадкою для всіх, окрім, самого По, але для Ейри це не мало значення.\n\nЦеремонію влаштували члени клану Вольсунґр і клану Скюфлінґ у Магярь-Фярань, перед великим Всебатьком. Усе пройшло дуже добре, і жрець, якого сам вибрав Уеллінгтон, посвятив їх у чоловіки та дружини, посилаючись на щось ближче до обрядів грифонів, ніж до ведмежої традиції. За його пропозицією Ейра офіційно перейменувала себе на щось більш схоже на Деспота, врешті-решт зупинившись на Мо Уеллінгтон. Тож усі білі ведмеді шанобливо плескали новій королівській парі, як Принцесі та Принцу."
 volsungrb.3.a:0 "За принцесу та її нового консорта!"

 volsungrb.4.t:0 "Союз благодаті та сили"
 volsungrb.4.d:0 "Переконати Торбена погодитися на шлюб було нелегким завданням. Багато хто з клану Свартпельсів сприйняв цю пропозицію як щось, що прийшло з Півдня, з земель поні, і, як і до всього, що має таку назву, поставився до неї з великою підозрою і скептицизмом. Лише після обіцянки зробити це на природі, як компроміс, а також влаштувати велику вечірку з великою кількістю традиційних ведмежих розваг, Повелитель Грому нарешті прийняв її пропозицію.\n\nСаме весілля відбулося на території клану Свартпельс далеко на півночі, на галявині у великому засніженому лісі. Сама церемонія була короткою і простою: головуючий ведмідь попросив молодят прочитати свої обітниці, а потім оголосив їх партнерами на все життя. Торбен був коронований як новий принц білих ведмедів, а старійшини з усіх кланів висловили своє схвалення різними ревіннями і стукотом зброї. Можливо, це не ідеальний кінець казки, але він був досить близьким до ідеалу.\n\nОпісля, як і було обіцяно, були відкриті скриньки з алкоголем і влаштована масова вечірка. Ведмеді пили, їли і билися на дуелях, а Торбен спостерігав за всім цим і сміявся. Коли місяць піднімався над обрієм, жоден з ведмедів, за винятком самої принцеси, не перебував у притомному стані. Навіть напідпитку Торбен все одно був налаштований на фінальний акт, поваливши турабака на землю. Опівночі він піднявся з нашвидкоруч збудованої арени, закривавлений і побитий, але переможець над чудовиськом, змусивши його підкоритися, коли воно стало на коліна перед принцесою, а всі білі ведмеді скандували своє схвалення і повагу до нового принца."
 volsungrb.4.a:0 "За принцесу та її нового нареченого!"

 volsungrb.5.t:0 "Гра в очікування"
 volsungrb.5.d:0 "Терпіння не було природною рисою більшості нас. Білі ведмеді були діячами, вони воліли діяти, а не чекати, поки щось станеться чи випаде нагода. Вони створювали власні можливості, перехоплювали ініціативу, ризикували і жили як зі своїми перемогами, так і з поразками. Саме так працювало ведмеже суспільство протягом тисячоліть.\n\nЛюбов працювала інакше. Ви не могли змусити себе полюбити когось іншого, принаймні по-справжньому. Вона приходила природно, як метелик, що сідає на гілку. Так, можна було спробувати пошукати, але в кінцевому підсумку це залежало від долі, чи знайдеш ти свого партнера, чи ні. І саме в цьому полягав шлюб, навіть у фантазії, він полягав у тому, що дві істоти кохали одне одного, незважаючи на те, чого це коштувало. Принцеса Кейденс і, відповідно, Кристальна Імперія зробили це, і тому принцеса Ейра піде по її слідах... чи то пак по слідах копит. Вона будуватиме свою державу, як і їхню, готуючись до того, що колись прийде час.\n\nСподіваюсь, одного дня з'явиться її справжнє кохання. Він стане її справжнім принцом, і у них з'явиться чудовий спадкоємець, якого вони зможуть виховати. Але цілком можливо, що він ніколи не прийде, і вона залишиться самотньою до кінця своїх днів. Звичайно, Ейра все одно знайде спадкоємця, якогось ведмедя, який займе її місце. Нація була важливішою за її мрії про казковий кінець. Але вона все ще могла сподіватися, що десь у світі з'явиться ведмідь, призначений для неї.\n\nУсе, що вона могла зробити зараз - це чекати."
 volsungrb.5.a:0 "Чекати і дивитися, що принесе майбутнє."

 volsungrb.7.t:0 "Три принципи"
 volsungrb.7.d:0 "Відсутність По Уеллінгтона ще більше збентежила решту представників вемдежого роду , залишивши керівництво кланом Асамблеї і змусивши декого припустити, що його спіткала жахлива доля. Однак члени клану наполягають на тому, що він живий і здоровий, просто відсторонений від суспільного життя. Здається, це було доведено, оскільки прямо від По Уеллінгтона через гінця прийшов пакет, адресований самій принцесі Ейрі, який містив просту книгу і прохання дозволити Асамблеї реалізувати пункти, викладені в ній.\n\nКнига була досить відомою, особливо в Грифонії. Це були "Три принципи", написані Олександром Кемерскаєм, в яких були викладені його цілі - Свобода, Демократія і Процвітання, а також інші ідеали Республіки Грифонів. Здавалося, що це була особиста копія Уеллінгтоона, оскільки багато фраз і частин були або закреслені, або обведені, а між рядками часто зустрічалися невеличкі помітки. Жирним шрифтом були виділені фрази "закон і порядок", "необхідне керівництво", "батько республіки" і "конституція." Звісно, не з усім змістом Ейра погоджувалася, але це, безумовно, давало привід для роздумів. Можливо, вона дасть Асамблеї Скюфлінґу можливість, про яку просив Уеллінгтон..."
 volsungrb.7.a:0 "Досить інтригуюче читання."

 volsungrb.8.t:0 "Піраміда"
 volsungrb.8.d:0 "Останній твір та ідея Повелителя Грому Торбена, "Піраміда", можна охарактеризувати по-різному. Ідеологією. Політичною системою. Продовженням кланово-кастової системи, яка існувала у білих ведмедів протягом століть. Простіше кажучи, це ідея про те, що завдяки давній природі суспільства білих ведмедів і, відповідно, вищості системи, ми маємо право вести цей гармонійний спосіб життя і приносити його іншим. Вона пояснює, що ідея ієрархії залишається гармонійною доти, доки ведмеді, які її очолюють, є такими.\n\nХоча багато з цього є лише відтворенням старих ідеалів клану Свартпельс, є дивовижне нове доповнення до системи. Вона робить новий акцент на міжкастовій співпраці та важливості правильного ставлення до тих, хто стоїть нижче в піраміді. Хоча слабші і нижчі не повинні мати можливості впливати на такі важливі речі, як лідерство і управління, вони все одно є важливою частиною ведмежого суспільства, і обов'язок сильніших - піклуватися про них і захищати їх. Це найдивніше поєднання гармонії та кланових цінностей, яке тільки можна уявити, і все ж, декого ця концепція не може не приваблювати."
 volsungrb.8.a:0 "Цікава система, але чи може вона працювати на практиці?"

 volsungrb.9.t:0 "Гармонія в природі"
 volsungrb.9.d:0 "Трівге з клану Вольсунґр не був упевнений, чи підходить він для завдання, що стоїть перед ним. Це було дивне відчуття, до якого він не звик, адже там, у гірських теремах, він був шанованим старійшиною і досвідченим воїном, добре обізнаним як у боротьбі з магічними звірами, що часто наближалися до клану, так і в ідеалах гармонії, які він, разом із самою принцесою Ейрою та іншими, приніс з собою багато років тому. З точки зору сили та розумової волі він, безумовно, був одним з найкращих.\n\nАле до чого він не був готовий, так це до роботи з ведмедями абсолютно різних кланів, кожен з яких не був зобов'язаний ні з чим погоджуватися.\n\nЗа кілька днів до цього принцеса Ейра створила (за згодою По Уеллінгтона та Повелителя Грому Торбена), Королівське агентство з охорони навколишнього середовища. Наділена всіма повноваженнями вживати будь-яких заходів, необхідних для забезпечення безпеки та подальшого виживання природи, вона мала приймати такі рішення лише за невеликою групою, що складалася з Трівге та ще кількох ведмедів, обраних вождями їхніх кланів. Він був упевнений у своїй здатності бути членом цієї ради, але не був упевнений, чи будуть інші ведмеді настільки мудрими в цьому питанні, чи взагалі матимуть до нього якесь відношення.\n\nАле принаймні він спробує. "Тиша!" - проревів він решті присутніх, які вже почали погрожувати один одному бойовими сокирами протягом перших п'яти хвилин після того, як увійшли до холодної кімнати. Усі одразу ж замовкли, що було добре, принаймні вони поважали його авторитет як керівника агентства. "Принцеса призначила нас на цю посаду, щоб ми рятували природу, а не воювали! Тепер, я вважаю, що нашим першим завданням має бути перегляд записів турабаків, наданих кланом Свартпельс, щоб побачити, яке середовище підходить їм найкраще! Усі згодні?"\n\nВедмеді подивилися один на одного, а потім повільно кивнули і вдарили обухами сокир по підлозі з такою силою, що лід під ними тріснув.\n\nМоже, це буде не так вже й важко."
 volsungrb.9.a:0 "Вони гарантують, що наші землі переживуть сучасну епоху."

 volsungrb.10.t:0 "Повернення монстрів"
 volsungrb.10.d:0 "Оглядаючи снігові ліси, що розкинулися перед ним, Трівге не міг позбутися відчуття, що щось тут змінилося. Можливо, це було те, як хиталися дерева на вітрі. А може, красиві бурульки, що звисали з гілок і каміння, виблискуючи на сонці. Це могли бути навіть небезпечні, іноді навіть жахливі монстри, які блукали навколо, ті самі істоти, яких він намагався задокументувати.\n\nХоча, якщо подумати, це, мабуть, було останнє.\n\nПротягом півроку Королівське агентство з охорони навколишнього середовища наполегливо працювало і витрачало чималі кошти, щоб повернути монстрів і відновити їхні домівки. Це, звичайно, не було нормальною діяльністю в очах усього світу, оскільки багато країн насправді хотіли досягти прямо протилежного - знищити монстрів, які могли б загрожувати їхнім громадянам. Але тут були ведмеді, істоти, сильні та єдині з природою, якою б небезпечною вона не була.\n\nІ, нарешті, їхні зусилля, здавалося, окупилися. Адже коли підрахунок по всіх кланах закінчився, популяція ведмедів була найвищою за всю історію існування роду. Арктичні лісові вовки знову мали сталу популяцію, а великі великі і малі ведмеді блукали землею. Трівге зможе відзвітувати перед принцесою про добре виконану роботу. І ми сподіваємося, що ці чудові звірі допоможуть захистити нас, якщо якийсь іноземний загарбник спробує вторгнутися до нас і забрати наші землі, якщо до цього дійде."
 volsungrb.10.a:0 "Успішне повернення до колишньої рівноваги."

 volsungrb.11.t:0 "Рівнини зі снігу та льоду"
 volsungrb.11.d:0 "Лід, сніг і ще більше льоду. Це те, що ведмеді бачили щодня так далеко на Півночі. Для багатьох було більш дивним не побачити їх десь, ніж навпаки. Поля чистого білого кольору були прекрасним видовищем, коли їх не чіпали, і небагато місць у світі могли б повторити їхню красу. Саме тому Трівге та Королівське агентство з охорони навколишнього середовища обстежили і закрили ділянки, які вважаються найбільш важливими для природи і диких тварин, щоб зберегти їх для далекого майбутнього і гарантувати, що майбутні покоління ведмедів також зможуть побачити їхню красу.\n\nЦе виявилося набагато складнішим завданням, ніж вони спочатку очікували. Обстежити всі угіддя ведмедів з їхніми обмеженими ресурсами було нелегко, а переконати кількох ведмедів, які живуть на землях, що вважаються заповідними, переїхати було ще важче. Але процес нарешті завершився, і коли Трівге дивився на землі, які він називав домом, він знав, що все це було того варте. Можливо, вони дещо втратять, зберігаючи ці куточки природи незайманими. Але ведмеді вже знали, як не залишати слідів, як жити за рахунок землі і будувати навколо таких перешкод. І вони ставали від цього сильнішими, як ставали сильнішими від усіх викликів, з якими їм доводилося стикатися."
 volsungrb.11.a:0 "Тундра завжди буде місцем, яке ми можемо назвати домом."

 volsungrb.12.t:0 "Стояти разом"
 volsungrb.12.d:0 "Вона це зробила. Ейра все ще була трохи здивована швидкістю, з якою це було зроблено, але це сталося. Якимось чином, без необхідності підкоряти клани, вона і клан Вольсунґр досягли того, чого ніколи раніше не робили, - єдності як перші серед рівних. Клани більше не воювали між собою, натомість вони активно співпрацювали один з одним і ділилися своїми ідеями. Можливо, Уеллінгтон і зробив їх одним народом, але саме Ейра об'єднала їх у думках і діях.\n\nМожливо, саме ідеологія стояла за всім цим. Ейра знала, що гармонія - це те, що об'єднує істот, зрештою, Еквестрія - найкращий доказ цього. Але вона не очікувала, що вона та урсини так добре об'єднаються на захист природи. Але вони об'єдналися, і тепер вони були тут.\n\nПринцеса Ейра завершила початкові реформи, і тепер могла нарешті звернути свою увагу на світ у цілому. Звісно, було ще багато речей, з якими потрібно було розібратися всередині, а також питання про те, за кого вона вийде заміж. Але все це прийде з часом, і друзі, і вороги не чекатимуть, поки урсини зроблять такі речі. Настав час білим ведмедям зайняти своє місце у світі, подобається це тваринам чи ні."
 volsungrb.12.a:0 "Разом у майбутнє!"

 volsungrb.13.t:0 "Лист"
 volsungrb.13.d:0 "Люба принцесо Ейра,\n\nТвайлайт розповіла мені сьогодні про те, що ви з іншими білими ведмедями робите, і я просто хотіла сказати, як я захоплена тим, що ви робите! Здається, що ти дійсно піклуєшся про природу і тварин, які там живуть, зважаючи на все, що ти вже зробила. Приємно знати, що хтось інший бачить і цінує їх так само, як і я. Я б дуже хотіла, щоб принцеса Селестія більше допомагала природі в Еквестрії; деякі місця, де я побувала, останнім часом не дуже добре себе почувають.\n\nУчора, коли я відвідувала Кантерлот, я зустріла в замку одного з твоїх друзів. Там була Рейнбоу Деш, ми щось говорили, і вона трохи розсердилася, але після того, як вони заспокоїлися, я поговорила з нею про те, звідки вона приїхав. Вона показала мені кілька малюнків звідти, поля і ліси, і вони були дуже красиві! Там були істоти, яких я ніколи раніше не бачила, і я збиралася розпитати про них ще, поки не прийшла Пінкі, і їй не довелося піти.\n\nЯ хотіла би якось приїхати до вас у гості, якщо ви не проти. Здається, там таке чудове місце, з усіма видами рослин і тварин, яких я ніколи раніше не бачила. Я знаю, що там дуже холодно, навіть більше, ніж у Кристальній Імперії, і Твайлайт сказала мені, що це може бути небезпечно, але я впевнена, що зможу переконати принцесу Селестію відпустити мене, якщо попрошу. З повагою, Флаттершай."
 volsungrb.13.a:0 "Що ж, це приємно."

 volsungrb.14.t:0 "Прохання принцеси"
 volsungrb.14.d:0 "Сьогодні до двору поні надійшло дивне прохання: група ведмедів, що прибула з далекої Півночі, просить аудієнції у [ROOT.GetLeader]. Білі ведмеді тут вже деякий час, оскільки після відкриття торгівлі через замерзлі моря вони найняли наших радників у своєму суді. Тепер вони хочуть довести співпрацю до, як вони кажуть, природного завершення, офіційним вступом до [ROOT.GetFactionName].\n\nДонедавна ніхто не звертав серйозної уваги на цей регіон, оскільки протягом тривалого часу вони розглядалися більшістю як неактуальне захолустя на світовій арені. Але тепер вони пізнали гармонію, і ми завжди можемо використати ще одного союзника в ці неспокійні часи. Налагодження цих тісніших зв'язків, поки у нас є шанс, може виявитися корисним для майбутнього."
 volsungrb.14.a:0 "Давайте відсвяткуємо наших нових союзників-урсинів!"
 volsungrb.14.b:0 "Нам доведеться шанобливо відмовитися."

 volsungrb.15.t:0 "Еквестрія погоджується"
 volsungrb.15.d:0 "Наші з поні долі тепер єдині, бо прийшла звістка, що Еквестрія прийняла наше прохання! Очевидно, незабаром після цього в столиці Еквестрії відбулася вечірка з великою кількістю випивки, бенкетуванням і традиційними ведмежими боями. Звісно, не обійшлося без травм, особливо коли до святкування приєдналося кілька еквестрійців. До кінця ночі до лікарні було відправлено кілька істот, і хоча принцеса хвилювалася, здається, [EQS.GetLeader] сприйняла це в доброму гуморі."
 volsungrb.15.a:0 "Давайте вип'ємо за наших нових друзів поні!"

 volsungrb.16.t:0 "Еквестрія не погоджується"
 volsungrb.16.d:0 "Шокуюча новина: Еквестрія відхилила наше прохання вступити до їхнього альянсу. Наш провідник, наш колишній дім і те, що дехто назвав би нашими ідеологічними наставниками, покинули нас. Невже вони відвернулися від нас? Хіба наші душі не об'єднані в гармонії? Чи ми зробили щось не так? Ніхто не знає, і тепер ми самі продовжуємо йти в непевне майбутнє..."
 volsungrb.16.a:0 "Що ж нам тепер робити?"

 volsungrb.17.t:0 "Візит"
 volsungrb.17.d:0 "Для поні, чий візит до країни білих ведмедів вважався честю, її прибуття було досить антикліматичним. Коли Флаттершай з'явилася в супроводі королівської гвардії, перше, що здивувало принцесу, - це те, наскільки вона була маленькою. Звичайно, цілком нормальний розмір для поні, тож вона вирішила, що це просто вона все ще звикла очікувати інших сильних істот, таких як вона сама.\n\n "Ласкаво просимо, Флаттершай, - сказала Ейра, простягаючи лапу для традиційного еквестрійського привітання. "Сподіваюся, твоя подорож сюди була приємною."\n\nФлаттершай моргнула, перш ніж потиснути її копитом. "О, так, дякую. Ваші білі ведмеді дуже милі." \n\n "Як вам краєвид?"\n\n "О, краєвид був просто чудовий!" Це було схоже на перемикач, який перейшов від замкненості до бурхливих емоцій. "Дерева і рослини були прекрасні, особливо з усім цим снігом! Я ніколи не бачила нічого подібного в Еквестрії!"\n\nПринцеса Ейра кивнула. "Дякую тобі. Ми довго працювали, щоб відновити більшу частину тутешніх регіонів." Мовчання, що настало після цього, було довгим і незручним, жоден не знав, як продовжувати. Обидва незручно зсунулися, поки Ейра знову не заговорила. "У моїй каюті приготовані закуски. Іди за...  \n\nТурабак!" - гукнув один з ведмедів. Поні негайно згуртувалися навколо Флаттершай, а ведмеді приготувалися до бою. Звір заревів зі своєї позиції над ними на скелі, його біла шерсть розвівалася на вітрі.\n\nСама Флаттершай, на превеликий жах своїх охоронців, негайно вилетіла вперед до турабака. Ейра кинулася вперед, щоб спробувати врятувати поні від чудовиська, але з подивом побачила, що насправді її не треба рятувати. Насправді, турабак навіть дозволив Флаттершай погладити свою шерсть, при цьому... муркочучи? \n\nМоже, саме вона могла б навчити їх природі."
 volsungrb.17.a:0 "Треба якось запросити її знову."

 volsungrb.18.t:0 "Прохання з замерзлої Півночі"
 volsungrb.18.d:0 "Сьогодні до двору надійшло дивне прохання: група ведмедів з далекої Півночі прибула на аудієнцію до принцеси Кейденс. Білі ведмеді вже деякий час перебувають тут, взявши для свого двору кількох кристальних поні-радників і навчаючись у нас медицині та кришталевим технологіям. Тепер вони хочуть просунути цю співпрацю на крок далі, уклавши офіційний пакт, що гарантує взаємний ненапад і військовий доступ.\n\nЖоден кришталевий поні ніколи не звертав серйозної уваги на країни, що знаходяться так далеко на Півночі, оскільки багато хто вважає їх неважливими задвірками на світовій арені. Однак вони є друзями гармонії, і, можливо, згода з цим може виявитися корисною, якщо не зараз, то в далекому майбутньому. Зважаючи на ситуацію в Еквестрії, нам навряд чи потрібен ще один можливий ворог, тож, можливо, нам варто налагодити ці тісніші зв'язки, поки є така можливість."
 volsungrb.18.a:0 "За наших нових друзів!"
 volsungrb.18.b:0 "Ми змушені з повагою відмовитися."

 volsungrb.19.t:0 "Кристальна імперія приймає"
 volsungrb.19.d:0 "Сьогодні зв'язок між нами і кришталевими поні зміцнився, бо прийшла звістка, що принцеса Кейденс прийняла наше прохання! Очевидно, незабаром після цього у Кристальному Місті відбулася вечірка, на якій було багато традиційних ведмежих боїв, випивки та бенкетів. Кілька поні навіть приєдналися до них, і хоча наші делегати були обережні з ними, оскільки поні, як відомо, більш тендітні порівняно з ведмедями, травми були неминучі, оскільки їхні найкращі воїни хотіли поспарингувати з нашими. Наприкінці бою і люди, і поні опинилися в лікарні, але, на щастя, навіть принцеса Кейденс, схоже, сприйняла це в доброму гуморі."
 volsungrb.19.a:0 "Нехай наша нова дружба триватиме вічно!"

 volsungrb.20.t:0 "Кристальна Імперія відмовляється"
 volsungrb.20.d:0 "Приголомшлива і прикра новина: принцеса Кейденс відхилила нашу пропозицію про тісніші стосунки. Багато старійшин здивовані -  чому? Адже вони вважали, що духу гармонії було б достатньо, щоб об'єднати нас у дружбі. Можливо, Кейденс не така всепрощаюча і відкрита, як ми думали? А може, мости між ведмедями і поні справді занадто широкі, щоб їх можна було перейти?"
 volsungrb.20.a:0 "Досить прикро це чути."

 volsungrb.21.t:0 "Пропозиція щодо договору між ведмедем та яком"
 volsungrb.21.d:0 "До Як'якистану надійшла цікава пропозиція від ведмедів. Здається, вони теж почали відкриватися зовнішньому світу з ізоляції на чолі з Принцесою гармонії, яка прийшла до влади в останні роки. Вони звернулися до нас з пропозицією закріпити наші відносини офіційним пактом про дружбу, який включає угоду про ненапад і військовий доступ через країни.\n\nЦе правда, що ми, яки, маємо давню історію з ведмедями. Деякі з наших північних кланів боролися з ними у своєрідному ритуальному бою протягом багатьох поколінь. Однак, білі ведмеді, як відомо, від природи є войовничою расою, і ми, можливо, не захочемо асоціюватися з відверто антагоністичною нацією. Делегація ведмедів чекає на відповідь."
 volsungrb.21.a:0 "За наших друзів на Півночі!"
 volsungrb.21.b:0 "Наразі ми не можемо нічого з ними підписати."

 volsungrb.22.t:0 "Пропозицію прийнято"
 volsungrb.22.d:0 "Наші дипломати повернулися до кланів у піднесеному настрої, бо яки прийняли нашу угоду! Схоже, що була влаштована велика вечірка з великою кількістю випивки, бійками та загальними заходами, спрямованими на зміцнення дружби. Давайте відсвяткуємо це відновлення наших зв'язків і зміцнення наших зв'язків як нову епоху у відносинах між нами!"
 volsungrb.22.a:0 "Ура!"

 volsungrb.23.t:0 "Пропозицію відхилено"
 volsungrb.23.d:0 "Схоже, що наші зусилля по налагодженню зв'язків між нами та яками не увінчалися успіхом, бо наші дипломати повернулися з порожніми лапами. Жоден ведмідь не розуміє, чому вони відмовилися підписувати таку угоду, і багато хто в кланах збентежений. Хіба вони не були одним народом і расою снігу і льоду? Хіба білі ведмеді та яки не були найкращими друзями? Можливо, їхнє ізоляціоністське минуле спонукало до такого рішення, а можливо, є ще щось, про що ми не знали."
 volsungrb.23.a:0 "Що сталося зі спільним полярним духом?"

 volsungrb.24.t:0 "Доля Королівства"
 volsungrb.24.d:0 "Ось і все. Коли жука-чейнджлінґа випровадили, а нануки зі зрозумілих причин насторожено спостерігали за ним, принцеса могла нарешті заспокоїтися, знаючи, що справу з Чейнджлінґами нарешті вирішено. Можливо, колись вони й виграли війну, це було правдою, але що робити з усім Королівством - це було постійне питання, яке потребувало розв'язання. На щастя, ця проблема вирішилася досить швидко.\n\nНезадовго після того, як вони відправили ведмедів на пошуки чейнджлінґів, готових працювати в новому гармонійному режимі, з'явився один чейнджлінґ на ім'я Торакс. Він вже деякий час очолював опір Кризаліс і заявив, що готовий допомогти привести своїх країну до гармонії. Це був саме той тип чейнджлінґа, якого вони потребували, оскільки не могли просто розумно управляти всіма землями колишнього Королівства. Тож цей "Торакс" став би чудовою заміною.\n\nЩоб забезпечити плавний перехід влади, між Ейрою і Тораксом було підписано офіційну угоду. Умови були суворими, але справедливими щодо чейнджлінґів: вони повинні були виконувати всі накази білих ведмедів, реорганізуватися під владу Торакса, а головне - віддати Ейрі вулик Соріф і прилеглу територію. Навіть якби він і хотів, Торакс не мав можливості вести переговори, бо принцеса ясно дала зрозуміти, що ці умови не підлягають обговоренню. Вони втягнули урсинів у виснажливу війну, яку програли, і це була ціна, яку вони мали заплатити. Однак вона пообіцяла, що про чейнджлінґів у Соріфі піклуватимуться і захищатимуть їх як нову частину замерзлої Півночі."
 volsungrb.24.a:0 "Загроза Еквуса минула!"

 volsungrb.25.t:0 "Маємо справу з грифонами"
 volsungrb.25.d:0 "Відтоді, як було вирішено питання з колишнім народом на нашому сході, питання майбутнього пташиної раси зайшло в глухий кут. Початкова ідея полягала в тому, щоб дозволити їм знову створити власну державу і керувати собою, хоча і під жорстким наглядом ведмедів. Це дозволило б ведмедям зосередитися на завершенні натуралізації Грифонячого Фронтиру, який ми взяли б під своє безпосереднє управління. Відносно глухі землі будуть швидко інтегровані і не викличуть особливих проблем.\n\nІнша пропозиція полягає в тому, щоб повністю анексувати всю територію. Деякі ведмеді кажуть, що відхід Нова-Грифонії від гармонії є доказом того, що їм взагалі не можна дозволяти правити, і що ведмеді самі повинні стати на чолі замість них. Намагатися натуралізувати всю цю землю буде неймовірно складно, і інтеграція, швидше за все, не буде досягнута в будь-який розумний проміжок часу, але вони впевнені, що з часом грифони можуть стати такими ж, як ми, ведмедями у всьому, крім імені та сили."
 volsungrb.25.a:0 "Птахам можна довірити керувати собою."
 volsungrb.25.b:0 "Вони ще не готові до лідерства."

 volsungrb.26.t:0 "Питання яків"
 volsungrb.26.d:0 "Клани яків завжди мали тісний зв'язок з кланом Вольсунґр. Протягом багатьох років ми брали участь у ритуальних війнах і битвах з північними племенами, будуючи з ними дружбу і в той же час легітимізуючи себе серед інших ведмежих кланів, оскільки яки близькі нам за духом і силою. Їх традиція SMASHing, як вони її називають, була дуже почесною і демонструвала спорідненість. Саме з цієї причини деякі ведмеді вірять, що союз яків і ведмедів можливий як одна нація, не розділена за расовою ознакою, але об'єднана силою і Гармонією.\n\nОднак, той самий аргумент духовної єдності і сили використовується іншими ведмедями, щоб показати, чому яки повинні мати свої власні держави. Вони довели, що здатні керувати собою, і навіть якщо одного разу їх збили зі шляху, ведмежий нагляд забезпечить, щоб це не повторилося. Ми збережемо та інтегруємо найпівнічніші землі та племена як новий клан ведмедів, але решта буде в основному управлятися місцевими племенами яків."
 volsungrb.26.a:0 "Яки сильні; вони будуть правити собою краще."
 volsungrb.26.b:0 "Наша сила буде в нашій єдності як одного народу!"

 volsungrb.27.t:0 "Полярне князівство"
 volsungrb.27.d:0 "З огляду на нещодавні перемоги над багатьма нашими колишніми північними сусідами, було зрозуміло, що на горизонті для всіх урсинів замаячило щось нове. Адже на їхніх землях тепер мешкали не лише білі ведмеді, а й пінгвіни, яки і навіть грифони. Потрібні були зміни, нова назва і нова столиця. І ось, було вирішено, що відбудеться нова коронація, щоб сповістити про таку знаменну подію.\n\nВона була дуже схожа на первісну коронацію Ейри, але з кількома разючими відмінностями. По-перше, це відбувалося не у фортеці в Магярь-Фярань, а в спеціально спроектованій печері в трюмах Вольсунґру, місці, яке незабаром стане офіційною столицею. Там також були присутні відвідувачі, бо зараз там були грифони, пінгвіни та яки, які були розсіяні серед натовпу. Але церемонія була ідентичною, використовувалася та сама корона, і коли вона стояла, всі, хто стояв перед нею, вітали не Принцесу Білих Ведмедів, а Принцесу Полярії, новітнього королівства Півночі."
 volsungrb.27.a:0 "За новий союз видів!"

 volsungrb.28.t:0 "Пропозиція Соріфа"
 volsungrb.28.d:0 "У Великій війні проти Королівства Чейнджлінґів, одним з наших менш відомих союзників були Білі Ведмеді з далекої Півночі, народ гармонії та дружби. І хоча багато поні не часто згадують про них, коли мова заходить про війну, вони відіграли важливу роль у поширенні конфлікту на новий фронт, відволікаючи сили чейнджлінґів від наших власних.\n\nТепер принцеса Ейра, лідер нації, прийшла з проханням. Вони прагнуть взяти під своє управління вулик Соріф, що знаходиться недалеко від їхнього кордону на березі Ключ-озера, а також прилеглу територію. За винятком самого Соріфа, ці землі є дуже незаселеними і вважаються загальними пустками, хоча в регіоні є деякі ресурси, що заслуговують на увагу. Як ми повинні реагувати?"
 volsungrb.28.a:0 "Білі ведмеді важко боролися поруч з нами; вони на це заслуговують."
 volsungrb.28.b:0 "Навіть з їхньою допомогою ці вимоги абсурдні!"

 volsungrb.29.t:0 "Поні погоджуються"
 volsungrb.29.d:0 "Бачачи нашу неоціненну підтримку у війні проти колишньої загрози Чейнджлінґів, поні прийняли наше прохання і передали всі землі, про які йде мова, включаючи вулик Соріфа, під наш захист. Це великий день для всіх білих ведмедів, і кілька ведмедів вже просять дозволу оселитися на новопридбаній землі, яка є відносно незаселеною. Виняток становить, звичайно, вулик, до мешканців якого ми тепер будемо ставитися з повагою, як до своїх."
 volsungrb.29.a:0 "Давайте святкувати!"

 volsungrb.30.t:0 "Поні відмовляються"
 volsungrb.30.d:0 "З якоїсь причини поні відмовили нам у нашому проханні про Соріф та околиці. Можливо, вони вирішили, що наш внесок у військові зусилля недостатній, щоб виправдати це, або, можливо, вони хочуть задовольнити свій новий підданий у землях Чейнджлінґів. У будь-якому випадку, наші представники повернулися на Північ розчарованими, і це не буде відмовою, яку ми забудемо найближчим часом."
 volsungrb.30.a:0 "Але чому?"

 volsungrb.51.t:0 "Коронація"
 volsungrb.51.d:0 "У глибині гірської твердині клану Вольсунґр була підготовлена велика зала для проведення коронації. На неї були запрошені вожді всіх кланів, хоча декого з них довелося "вмовляти" приїхати. Після того, як усі ведмеді прибули, розпочалася церемонія, яку проводили різні старійшини Вольсунґр. Корона була виготовлена з найкращої зоряної сталі та золота, з важким діамантом спереду.\n\nІснувала справжня причина, чому всі вожді повинні були бути присутніми на церемонії. Коли настав момент, коли Ейру оголосили королевою, всі вони стали на коліна і повторили свої присяги як піддані новопомазаного монарха. Вони більше не будуть просто зграєю горностаїв. У них з'явилося ім'я для своєї країни, справжнє ім'я, що відображає назву їхньої землі, їхньої неприборканої, дикої і керованої ведмедями землі. Назву старою ведмежою мовою.\n\nІ так народилося Неприборкане Королівство. З попелу старого королівства мало постати нове. Попереду було ще багато роботи, наприклад, виправити націю, розібратися зі Свартпелами та Скюфлінґом, а найголовніше - знайти своє місце у світі. Але перший крок було зроблено, а цей крок завжди найважчий."
 volsungrb.51.a:0 "Ну, за роботу."

 volsungrb.52.t:0 "Наша роль у світі"
 volsungrb.52.d:0 "Погляд на наше місце по відношенню до інших народів завжди передавався від ведмедя до ведмедя і від клану до клану. Чи повинні ми дружити з сусідами, чи воювати з ними? Залишатися в ізоляції чи приєднатися до великого світу? Навіть ідея бути єдиною нацією була під питанням у часи до приходу По Уеллінгтона. І правда полягає в тому, що однозначної відповіді немає. Ті, хто колись були нашими ворогами, можуть стати найкращими союзниками, а ті, кого ми колись називали друзями, можуть дуже швидко стати нашими найлютішими ворогами.\n\nЗ цієї простої причини ми не можемо чекати, ми не можемо спостерігати і ми не можемо чекати, поки наші вороги стануть сильнішими, а союзники - впадуть. Ми повинні бути активними, як того вимагає наша роль, як вартових, так і захисників гармонії, і не боятися боротися і захищати інших. Бо який сенс бути сильним, якщо ти ніколи не використовуєш цю силу для більшого блага?\n\nДеяким це не подобається. Вони дивляться на наше сходження підозрілими очима і можуть спробувати знищити нас ще до того, як ми почнемо. Але ми об'єдналися під владою нашої Королеви, і ніщо не зможе нас більше роз'єднати! Ми гордо стоїмо серед усіх і проти багатьох, витягнувши пазурі!"
 volsungrb.52.a:0 "Нас більше не будуть ігнорувати!"

 volsungrb.53.t:0 "Емісари білого ведмедя"
 volsungrb.53.d:0 "Сьогодні білі ведмеді із заходу перетнули кордон, шукаючи [PNG.GetLeader] для нової дипломатичної пропозиції дружби. Ведмеді, давно відомі своєю лютою і войовничою вдачею, були надзвичайно стриманими і офіційними, коли вони увійшли до Дахе. Ще одна дивна зміна відтоді, як їхня нова королева, Ейра, взяла на себе лідерство.\n\nУгода поки що проста. Документ, що підтверджує давню дружбу пінгвінів і білих ведмедів як рас-близнюків далекої Півночі, пакт про ненапад і відкриття можливостей для подальшої співпраці між країнами. Це правда, що ті, хто живе на заході, ставилися до нас з гостинністю протягом століть, і ми маємо багато спільних зв'язків. Однак вони явно очікують, що ми погодимося, і відмова від цього може розлютити їх і будуть... непереливки."
 volsungrb.53.a:0 "Звичайно, ми підпишемо угоду з нашими побратимами по полярній расі!"
 volsungrb.53.b:0 "У нас зараз інші, кращі плани."

 volsungrb.54.t:0 "Дружба відродилася"
 volsungrb.54.d:0 "Як ми і очікували, послані нами емісари повернулися сьогодні з підписаним і затвердженим документом про дружбу. Він не лише закріплює нашу угоду про ненапад у дедалі небезпечнішому світі, але й відкриває шлях до подальшої співпраці і, можливо, навіть захисту. Це був здебільшого офіційний церемоніальний момент, оскільки ніхто не очікував, що вони зменшаться. У будь-якому випадку, це великий день для зв'язків міжрасової дружби."
 volsungrb.54.a:0 "Ми знали, що можемо довіряти нашим друзям-пінгвінам."

 volsungrb.55.t:0 "Зрада, звідки не чекали"
 volsungrb.55.d:0 "Шокуюча новина: пінгвіни відхилили наші дипломатичні спроби. Їх відмова шокувала і збентежила багатьох ведмедів, адже довга дружба між нами була добре задокументована, а їх вибір зараз шокує і є досить нехарактерним. Багато хто зараз закликає до війни, кажучи, що наші сусіди несповна розуму і що відбувається щось недобре. І королева схильна з цим погоджуватися. Якщо вони не хочуть підписувати договір про ненапад, то, мабуть, планують війну, тому ми повинні вдарити першими!"
 volsungrb.55.a:0 "Але що взагалі могло стати причиною цього?"

 volsungrb.531.t:0 "Ініціатива Полярного кола"
 volsungrb.531.d:0 "Ще новини від наших друзів білих ведмедів, адже вони офіційно заявили про свої наміри захищати нашу країну від будь-яких зовнішніх загроз. У сучасних термінах гарантія незалежності, вони офіційно називають цю декларацію "Ініціативою Полярного кола" і тепер попросили нас також приєднатися до неї. Це явна ознака того, що вони очікують, що ми відповімо їм взаємністю, і обіцяють також стати на їхній захист. Наш договір про дружбу, швидше за все, запобігатиме будь-яким ворожим діям з боку ведмедів, якщо ми відмовимося, але чи варто нам відмовлятися від подяки за їхню можливу майбутню допомогу?"
 volsungrb.531.a:0 "Звичайно, ми будемо битися з ними, коли вони нас потребуватимуть!"
 volsungrb.531.b:0 "Ми не можемо дозволити собі вплутатися в їхні майбутні війни."

 volsungrb.541.t:0 "Полярне коло прийнято"
 volsungrb.541.d:0 "Сьогодні справді великий день, адже пінгвіни відповіли на нашу гарантію своєї незалежності власною! Підписана Ініціатива Полярного кола повернулася до нас з успіхом, і Пінгленд пообіцяв прийти нам на допомогу, якщо коли-небудь настане час, коли ми її потребуватимемо. Ми стоїмо пліч-о-пліч, охороняючи один одного як вартові Півночі, і нехай наші народи залишаються такими відтепер і до кінця часів!"
 volsungrb.541.a:0 "Приголомшливий успіх!"

 volsungrb.551.t:0 "Полярне коло відхилено"
 volsungrb.551.d:0 "На жаль, пінгвіни Пінгленду відповіли на нашу гарантію мовчанням. Здається, вони не бажають відповісти взаємністю на наш захист, або, можливо, ще не відчувають себе в змозі зробити це. Це розчаровує, але не змінює ні нашої дружби, ні нашої первісної обіцянки допомогти їм у разі потреби. Однак, якщо ми коли-небудь опинимося в біді, ми будемо самі по собі..."
 volsungrb.551.a:0 "Будемо сподіватися, що до цього не дійде."

 volsungrb.56.t:0 "З Фронтиру"
 volsungrb.56.d:0 "Засніжені гори прикордоння піднесли нам сьогодні сюрприз: група ведмежих посланців прибула з-за кордону. На відміну від диких воїнів, до яких ми звикли, ці ведмеді були дипломатичними і стриманими... до певної міри. Під час переговорів про створення формального кордону, на які вони були послані, не обійшлося без жертв у вигляді столів і стільців. Проте, це була приємна зміна від звичайних жертв справжніх грифонів.\n\nПісля кількох днів, нарешті, було досягнуто домовленості, яка встановила міцний мир між нашою та їхньою нацією. Разом з нею було також укладено пакт про ненапад, в надії, що це може прокласти шлях до майбутньої співпраці."
 volsungrb.56.a:0 "Сподіваюся, тепер на Фронтирі буде трохи спокійніше..."

 volsungrb.57.t:0 "Відповідь грифона"
 volsungrb.57.d:0 "Попри побоювання деяких, емісари, яких ми відправили до Нова-Грифонії, повернулися до нас не лише з добрими новинами, а й з картою встановленого кордону між нами та грифонами. Разом з нею прийшов пакт про ненапад, що обіцяє мир між нашими народами на певний час. З підписанням цього договору багатовіковий конфлікт між ведмедями та крилатими на Еквусі, сподіваємось, завершиться, і незабаром ми навіть зможемо стояти пліч-о-пліч, як раси Півночі. Але поки що це гарний початок."
 volsungrb.57.a:0 "Будьмо!"

 volsungrb.533.t:0 "Новітня Нова-Грифонія"
 volsungrb.533.d:0 "Боротьба з грифонами ніколи не велася в ім'я якогось великого завоювання їхньої території і не була помстою за минулі вторгнення. Ми боролися за нашу власну безпеку, за поширення гармонії силою, і тільки. У нас не було великих планів панування над ними, а королева втомилася і від того, що має проблеми з окупацією земель, і від того, що змушена розв'язувати всі проблеми, які з цього випливають. Отже, ми дамо грифонам те, що вони хочуть, і реформуємо державу Нова-Грифонія, дозволивши їм знову мати власну націю тепер, коли вони більше не становлять для нас загрози.\n\nУтім, є кілька підводних каменів. По-перше, весь старий кордон і територія, що веде до озера Кінгсмір, будуть передані під прямий контроль урсинів, як територіальні репарації. І хоча офіційна рада обраних грифонів сформує новий автономний уряд, старійшина клану Вольсунґр очолить його як наглядовий орган. Хтось може не зовсім вважати це незалежністю, але грифони, здається, заспокоїлися, знаючи, що їхня нація знову принаймні частково відновлена."
 volsungrb.533.a:0 "Ми все ще можемо тримати їхню долю в своїх руках, але вони знову контролюватимуть своє життя."

 volsungrb.58.t:0 "Випивка з нашими північними друзями"
 volsungrb.58.d:0 "Кілька білих ведмедів з нашого північного кордону нещодавно прибули до яків, бажаючи поговорити з принцом Резерфордом та іншими вождями яків. Відтоді, як старого вождя їхнього царства скинула нова королева Ейра, відносини між нами потроху потеплішали, оскільки їхній перехід до гармонії був набагато швидшим, ніж наш. Тож принц погодився зустрітися з ними і влаштувати велику вечірку, на якій обидві групи могли б обговорити справи.\n\nІ ведмеді, і яки погодилися тримати вечірку під контролем, щоб дискусії були серйозними, що, звісно, означало, що для будь-якої іншої раси це був повний хаос. Було заготовлено велику кількість алкоголю, і всі старійшини, які брали участь у переговорах, були вже на п'ятій чарці, коли розпочалася будь-яка справжня дипломатія. Завдяки гарному настрою все пройшло доволі добре, і врешті-решт яки офіційно уклали, а білі ведмеді підписали договір, в якому детально прописали військовий доступ на землі один одного і взаємний ненапад. Потім було ще більше випивки, і обидві сторони знайшли велике задоволення в мистецтві SMASHing."
 volsungrb.58.a:0 "Яка чудова зустріч!"

 volsungrb.59.t:0 "Угода між яком і ведмедем"
 volsungrb.59.d:0 "Після кількох днів подорожі, вечірок і переговорів наші старійшини, послані до яків, повернулися з офіційним договором, підписаним між двома сторонами. Хоча розбірливість документа була в кращому випадку сумнівною, він містить саме те, на що ми сподівалися: пакт про дружбу і ненапад, а також взаємний військовий доступ. Історія між нами двома нарешті стала чимось більшим, і наш південний кордон тепер захищений не від завоювання, а від дружби."
 volsungrb.59.a:0 "Дуже добре!"

 volsungrb.60.t:0 "Ханства-близнюки"
 volsungrb.60.d:0 "Коли ми вперше увійшли в Яктаун і анексували Як'якистан, це мало бути тимчасовою справою. Наші причини вторгнення були суто ідеологічними, а не з якихось ідеалів завоювання. Особливо враховуючи нашу довгу дружню історію з яками, особливо в клані Вольсунґр. Зрештою, хіба справжній друг не допоможе другу в біді? \n\nАле в той же час, була причина, чому була створена "гармонія Як'якистану." Багато хто співчуває тим, хто входив до колишнього Йаки-клану, маючи свої причини захищати свій старий спосіб життя та ізоляціонізм. Отже, відповідь проста.\n\nПочинаючи з сьогоднішнього дня, яки стануть двома окремими, офіційними ханствами, обидва під обмеженим наглядом ведмедів. Ми сподіваємося, що це рішення не тільки покладе край конфлікту між кланами яків, але й дозволить їм колись знайти спільну мову і поважати один одного за те, у що вони вірять, так само, як ми, на землях ведмедів, поважаємо інші клани. Ми також окупуємо кілька найближчих до володінь Вольсунґр кланів, оскільки вони висловили зацікавленість в офіційному приєднанні до нашої нації як нові клани."
 volsungrb.60.a:0 "Можливо, не ідеальне рішення, але найкраще."

 volsungrb.61.t:0 "Пропозиція зі Сходу"
 volsungrb.61.d:0 "Безлюдні пустки північного сходу цього тижня привели несподіваних гостей: ведмежі дипломати прибули з-за Ключ-озера з проханням і пропозицією. Умови прості: ми надаємо один одному взаємний військовий доступ у майбутньому, а також укладаємо пакт про ненапад один на одного, щоб нарешті встановити мир на нашому колись неспокійному кордоні. Для нації Гармонії зробити друга з колись запеклого ворога, безумовно, привабливо, але треба запитати: що вони від цього виграють, і що це може означати для майбутнього?"
 volsungrb.61.a:0 "Звичайно, ми приймемо цю пропозицію!"
 volsungrb.61.b:0 "Вибачте, але зараз у нас є важливіші справи."

 volsungrb.62.t:0 "Несподівана згода"
 volsungrb.62.d:0 "Відправлені нами дипломати повернулися з несподіваними, але приємними новинами: Чейнджлінґи на чолі з Тораксом прийняли нашу пропозицію! Від сьогодні між ведмедями та Чейнджлінґами встановлено постійний мир, і, можливо, з часом розквітне дружба. А поки що на західному кордоні нарешті запанує мир."
 volsungrb.62.a:0 "Ура!"

 volsungrb.63.t:0 "Очікувана відмова"
 volsungrb.63.d:0 "Сьогодні в повітрі відчувався запах відмови, оскільки дипломати, яких ми відправили до вуликів, повернулися саме з тими новинами, яких багато хто очікував і боявся. Ніхто точно не знає, чому вони, як нація гармонії, відмовилися від миру. Можливо, наші давні війни та образи занадто великі, щоб їх можна було подолати навіть силою дружби. Або, можливо, вони все ще мають більш мілітаристські бажання на наших землях. Ніхто не може сказати напевно."
 volsungrb.63.a:0 "Який сором."

 volsungrb.64.t:0 "Заморожена пропозиція"
 volsungrb.64.d:0 "Сьогодні поні Еквестрії стали свідками дивного видовища: білі ведмеді приїхали з далекої Півночі, щоб отримати аудієнцію у принцес. Новини з такої далекої Арктики надходять рідко, хоча ходять чутки, що нова гармонійна Королева піднялася, щоб правити урсинами. Вони просять нас підписати просту угоду, що закріплює ненапад між нашими народами та військовий доступ, щоб скріпити дружбу як народів гармонії. Хоча така дружба зазвичай завжди вітається, білі ведмеді, як відомо, агресивні і жорстокі по відношенню до своїх ворогів, і, можливо, нам не варто надто тісно асоціювати себе з такою нацією..."
 volsungrb.64.a:0 "Звичайно, ми відкриємо нашу націю для дружби!"
 volsungrb.64.b:0 "Давайте поки що уникати цього..."

 volsungrb.65.t:0 "Теплий прийом"
 volsungrb.65.d:0 "Ведмеді, яких ми відправили до Еквестрії, повернулися з добрими новинами, адже еквестрійці побачили цінність нашої пропозиції і вирішили її прийняти! Офіційні угоди вже підписані обома сторонами, і ця подія була використана як привід, щоб влаштувати велике свято і вечірку. Хоча все закінчилося, як завжди, великою кількістю бійок, зламаних кісток і неабиякою кількістю пролитої крові, веселий настрій тривав ще кілька днів, поки ми всі святкували нашу нову дружбу з нашими друзями-поні."
 volsungrb.65.a:0 "Ми знали, що гармонія зв'яже нас разом."

 volsungrb.66.t:0 "Холодна відмова"
 volsungrb.66.d:0 "Наші дипломати повернулися з холодними новинами: наша пропозиція була категорично відхилена поні на Півдні. На запитання про причини відмови вони давали розпливчасті і непевні відповіді, такі як політичний клімат у світі, минула історія ведмежих спільнот, і заявляли, що дружба в майбутньому все ще можлива. Чи говорять вони правду, чи просто не хочуть мати з нами зв'язків, ми, можливо, ніколи не дізнаємося, але що ми точно знаємо, так це те, що на даний момент ми більше не отримаємо від поні ніякої допомоги або зв'язків."
 volsungrb.66.a:0 "Який сором."

 volsungrb.67.t:0 "Питання про вигнанців"
 volsungrb.67.d:0 "Кімната для нарад була досить простою: один кам'яний стіл з двома стільцями, по одному з кожного боку. На одному з них уже сидів По Уеллінгтон, все ще одягнений у священицькі шати, хоча церемонія, на якій він головував, закінчилася кілька годин тому. Це було вбрання, яке він носив більшу частину часу, одна з небагатьох речей, якими він все ще міг керувати, і які не були зруйновані захопленням лідерства Ейрою...\n\nДвері відчинилися, і увійшов Торбен, одягнений у свої офіційні обладунки, як він завжди це робив. "Старий друже!" - радісно вигукнув він, потискаючи лапу, як він робив це багато разів раніше і як багато років тому навчив його Уеллінгтон. "Радий знову тебе бачити!" \n\n "І я тебе, Торбене." Він жестом запросив Повелителя Грому сісти, що той і зробив. "Однак я послав по тебе не тільки для того, щоб поговорити про приємне. Королева попросила нас розробити політику щодо в'їзду..." Уеллінгтон зробив паузу, знаючи, що Торбен це не сприйме. "Вигнанців, - буркнув Торбен, грюкнувши лапою по столу. "Хіба це не очевидно? Ці вигнанці в першу чергу спричинили наш розбрат! Дозволити їм і далі входити було б великою дурістю, і ми повинні їх не пускати!"\n\n "На жаль, королева вже дала зрозуміти, що це не вихід. Зрештою, ми з нею теж колись були вигнанцями." Торбен промовчав, і Уеллінгтон сприйняв це як глибокі роздуми. "Але ти маєш рацію, ми не можемо повторювати минулих помилок. Тому я планую створити випробування для всіх вигнанців, які захочуть повернутися додому. З допомогою твого клану вони будуть допитані на предмет їхніх переконань, знання традицій. Тільки ті, кого ми вважатимемо гідними, зможуть приєднатися до нас у силі."\n\nТорбен повільно кивнув. "Чудова ідея, друже! Тільки ті, хто зможе знайти собі місце тут, допоможуть нам, а ті, хто не зможе або побажає нам зла, назавжди залишаться вигнанцями! Я особисто допоможу з цим планом."\n\n "Добре. Тоді я негайно почну розробляти пропозицію.""
 volsungrb.67.a:0 "Не кожен вигнанець повинен бути частиною нашого майбутнього."

 volsungrb.68.t:0 "Питання про раси"
 volsungrb.68.d:0 ""Торбене, можливо, ти помилявся щодо поглядів тих, хто за нашими кордонами. Можливо, вони сильніші, ніж ти думав." \n\nГромовержець клану Свартпельс, Торбен люто загарчав, стиснувши лапи в кулаки. "Ні, я відмовляюся в це вірити! Поні слабкі, вони не мають сили! Жоден з них ще не зміг перемогти урсина в бою!" Він показав кігтем на По Уеллінгтона, що сидів навпроти нього, для переконливості. "Жоден! Вони не можуть бути такими ж гідними, як ми!"\n\nУеллінгтон на мить замислився, щоб сформулювати відповідь. "А як щодо грифонів?" - запитав він нарешті. "У Вессландії "совиними ведмедями" називають тих, хто зміг перемогти ведмедя в судовому поєдинку. Ти ж мусиш визнати, що вони принаймні гідні?" Мовчання тривало кілька секунд, поки Торбен швидко перебирав у пам'яті свої спогади про традиції свого клану. "Так... Так, вони повинні бути гідними!"\n\n "І якщо ведмідь може перемогти в бою одного з наших..." продовжував По Уеллінгтон, підштовхуючи його вперед.\n\n"... Тоді вони повинні бути нашими братами по духу!" Повелитель Грому підняв у повітря кулак лапи. "Так, якщо вони пройшли наші випробування, то вони - одні з нас! Я повинен негайно повідомити про це старійшинам!" Торбен кинувся повз Уеллінгтона і вийшов з кімнати, його думки явно були в іншому місці.\n\nКолишній Деспот лише дивився йому вслід, а потім повільно вийшов через крижані двері, зачинивши їх за собою."
 volsungrb.68.a:0 "Ті, хто доведе свою силу духу, приєднаються до нас як брати!"

 volsungrb.69.t:0 "Питання релігії"
 volsungrb.69.d:0 "За круглим столом у найбільшій фортеці клану Скюфлінґ п'ятеро ведмедів сиділи по колу обличчям один до одного, всі вони були жерцями своїх регіональних фортець. На чолі сидів сам По Уеллінгтон, який мав честь зайняти найбільше і найприкрашеніше крісло, оскільки все ще був головою клану, а тепер ще й головою релігійних справ. Спочатку він скликав їх сюди, щоб обговорити майбутнє поклоніння в клані, але минула година швидко перетворилася на суперечки між парами; одна сторона заявляла, що вони повинні відкинути всю систему і прийняти шлях поні, як це зробив Вольсунґр, а інша залишалася непохитною у своєму переконанні, що вони просто недостатньо сильно схилилися перед грифонським натхненням.\n\n "Простий факт полягає в тому, що ми програли ідеології, яка, як ми колись вважали, не мала ніяких переваг, і прийшов час з цим змиритися!" - проревів один ведмідь. "Вони довели перевагу поні-шляху, і тепер ми повинні наслідувати їхній приклад!"\n\nІнший вдарив обома лапами по столу, від чого пішли тріщини. "Не треба цього робити! Ми помилялися, так, але не в натхненні, а в тому, що дотримувалися застарілих і безглуздих традицій! Нам просто потрібно взяти від Трьох Храмів більше того, що необхідно, і наша сила знову проявиться!"\n\n "Твоя пропозиція ставить все на важливість війни, конфлікту, коли Вольсунґр переміг нас, не використовуючи нічого подібного!"\n\n "Вони скористалися моментом нашої слабкості, і якби ми зміцнилися у військових діях, цього б ніколи не сталося!"\n\n "Досить!" Голос По Уеллінгтона рознісся по всій кімнаті, змусивши замовкнути всіх ведмедів, які звернули на нього свої погляди. "Дякую, що прийшли, але рішення прийматиму я. Ви всі можете повернутися до своїх кают." Священики подивилися один на одного, перш ніж вклонитися і поспішно вийти з кімнати.\n\nУеллінгтон, залишившись наодинці зі своїми думками, залишився в своєму кріслі, в той час як його свідомість почала перевертатися. Він помилявся, це стало очевидним. Він, незважаючи на все, що намагався зробити, і на весь свій прогрес, зазнав поразки. Це було важко усвідомити, але необхідно було рухатися вперед. Питання полягало лише в тому, як це зробити. Як сказав ведмідь, чи було це саме натхнення, чи просто недостатньо далеко? \n\nЧи буде майбутнє Скюфлінґу та їхньої віри на шляху поні, чи на шляху грифона?"
 volsungrb.69.a:0 "Так чи інакше, зміни мають прийти."

 volsungrb.70.t:0 "Дружба у вірі"
 volsungrb.70.d:0 ""Отже, поясніть. Як Еквестрія і поні поєднуються з нашою вірою?"\n\nСвященик сидів у кріслі навпроти По Уеллінгтона, на диво врівноважений і спокійний як для білого ведмедя. "Аспекти гармонії, яким поні поклоняються, цілком очевидно, такі ж самі, як і божества, яким поклоняємося ми. Різниця між нами і ними полягає в тому, що ми поклоняємося за допомогою бою і війни, тоді як поні роблять це за допомогою думки і розуму. Вони вчені та мислителі, які використовують магію та дружбу, щоб вшановувати своїх божеств." \n\n "То що, ми повністю відмовляємося від ідеї наших гордих воєн та битв?" насупившись, запитав По. Жрець похитав головою у відповідь:\n\n "Звичайно, ні! Ми все ще залишаємось урсинами, зрештою. Але подивіться на Еквестрію та Кристальну Імперію, вони все ще мають армії, навіть незважаючи на свій пацифізм. Ми просто повинні змінити наш спосіб мислення, щоб поставити дружбу і навчання на перше місце."\n\nПо не був у захваті від цієї ідеї, але вона, здавалося, мала якийсь дивний сенс. Нарешті, після довгих роздумів, він повільно кивнув. "Гаразд, ми це зробимо. Подивимось, чи ці нові ідеї мають сенс." Ведмідь навпроти нього встав і вклонився. "Вони спрацюють. Просто зачекай і побачиш.""
 volsungrb.70.a:0 "Принаймні, варто спробувати."

 volsungrb.71.t:0 "Спосіб війни Грифона"
 volsungrb.71.d:0 ""Суть нашої проблеми полягає в тому, що наші релігійні традиції виявилися фундаментально хибними, - пояснив священик По Уеллінгтону в приватній кімнаті. "У кожному регіоні є свої божества і вірування, які походять з давніх традицій, що, зрештою, заважає нам бути єдиними в дусі. Грифони дозволили своїм регіональним божествам, але всі вони поклонялися одним і тим же трьом богам", - По Уеллінгтон почухав підборіддя. "То яка твоя ідея?"\n\n "Я вважаю, що створити центральну божественну фігуру, навколо якої об'єднаються всі ведмеді нашого клану, - ось рішення. І після того, як я ознайомився з трьома храмами Грифонії, бог, якого вони називають Арктурій, є найкращою моделлю. Для них він - бог війни, кузень і лицарів. Таке божество, як він, пробудить войовничий норов у нас усіх, об'єднає нас у битві та вірі." \n\n "Але як це зміцнить клан?"\n\nЖрець поклав лапу на стіл, щоб підкреслити свою думку. "Коли Імперія Грифонів воювала, боролася зі своїми ворогами, вона була сильною. Коли настала епоха миру, вона ослабла і впала. Війна є її невід'ємною частиною, і навіть якщо королева не дозволить нам завдати удару першими, ми повинні бути готовими. Допоки ми готові до війни, доки вона буде в нас, ми ніколи не зламаємося, як колись." Медвідь заради більшої переконаності вдарив по столу, від чого в прозорому льоду з'явилися глибокі тріщини.\n\nПо Уеллінгтон кивнув. "Дуже добре, продовжуйте. Я тебе підтримаю. А тепер залиш мене, у мене скоро зустріч з Королевою." Вклонившись, ведмідь швидко пішов геть."
 volsungrb.71.a:0 "Щоб більше ніколи не бути захопленими зненацька, ми завжди повинні бути готовими."

 volsungrb.72.t:0 "Слава сталі"
 volsungrb.72.d:0 "Торбен втупився в стіну перед собою, яка стала йому дуже знайомою за ці роки. На ній висіла зброя, якою він володів, великі бойові сокири, якими він вбивав незліченну кількість ведмедів як Повелитель Грому з клану Свартпельс. Його власні кігті були гострими, так, і мало хто міг зрівнятися з його грубою силою, але його ворогів завжди добивав клинок зі сталі та заліза, інструмент настільки звичний, що його можна було б назвати частиною його самого.\n\nЧи є якась різниця між тим часом і зараз? Так, артилерія та вогнепальна зброя, яку приніс з собою По, була вражаючою. Безумовно, більш смертоносні, ніж його старі сокири. Але це все одно були інструменти, така ж металева зброя, як і будь-яка інша. І жоден ведмідь не загинув би в бою без зброї, за винятком ритуального бою.\n\nЩо ж, якби це були нові сокири, то Свартпельс володів би ними з майстерністю, що перевершувала б будь-яку іншу. Ковадло і молот створили б щось нове, перероблене тепер на зброю, якою користувався б і він, і його воїни. І що з того, що старі часи минули? Він покаже кланам, ні, всім ворогам і друзям Свартпельсів, що тільки тому, що сталь вища за дух, не означає, що вони все ще не найкращі з воїнів! Він був Торбеном Свартпельським, і він прийме цю зміну з розпростертими обіймами!"
 volsungrb.72.a:0 "Використаймо ці нові інструменти для нового тріумфу!"

 volsungrb.73.t:0 "Досягаючи межі"
 volsungrb.73.d:0 "Коли повний місяць піднявся над обрієм, Торбен перегорнув сторінку стародавнього підручника і прочитав наступні рядки стародавньої ведмежої мови. Клан Свартпельсів, звичайно, мав найстаріше і найповніше з усіх кланів сховище історії ведмедів, написане їхніми предками. Читання знань, що містилися в ній, було невід'ємною частиною підготовки кожного гідного воїна Свартпельса, але сьогоднішній вечір був особливим випадком. Торбен перечитував їхні найбільші подвиги, їхні найдавніші здібності, щоб побачити, що було втрачено, а що незабаром можна буде відновити.\n\nСтарші повністю підтримали вживання цих речовин для зміцнення ведмежого духу. Принаймні, вони підтримали після того, як Володар Грому вкотре примусив нечисленних опозиціонерів підкоритися. Вимога,точніше, дуже рішуче сформульоване прохання - було надіслано Королеві кількома годинами раніше.\n\nЩо ж до історій, які він зараз читав, то це були казки, про які білі ведмеді тепер могли тільки мріяти. Десятки тисяч років тому вони здійснювали неймовірні подвиги, навіть володіли магією самих хуртовин. А тепер, за допомогою сучасних чудес, вони могли б робити це самі. Але все одно було цікаво, як предки змогли це зробити. Можливо, древні були технологічно розвинені для свого часу? Торбен закрив фоліант і поклав його назад на полицю з кістками. Тепер уже було неважливо, як, важливо було лише те, що буде далі. Незабаром усе це, а можливо, й більше, стане їхнім."
 volsungrb.73.a:0 "Ми розірвемо межі смертного!"

 volsungrb.74.t:0 "Питання про силу"
 volsungrb.74.d:0 "Завірюха надворі лютувала дедалі дужче, а Торбен сидів у своїх покоях, глибоко занурений у роздуми. Він не звик до таких складних питань, на які важко знайти відповідь, адже більшість проблем, що виникали, мали просту відповідь. Існував чіткий, правильний шлях, яким треба було рухатися вперед, і все. Але це було інакше, оскільки воно стосувалося питання, на яке не було однозначної відповіді.\n\nЗвідки бралася сила воїна? Від ведмедя чи від зброї? Раніше, коли зброєю були сокири, а в битвах перемагала груба сила, було зрозуміло, що це було перше. Але коли його добрий друг Уеллінгтон привіз зброю з Грифонії, рушниці та артилерію, все змінилося. Тепер панувала технологія, навіть настільки, що Вольсунґр зміг досягти своїх перемог. Настав час прийняти її також, але як? Зброя була найочевиднішим варіантом для більшості. Навіть ведмідь зі сталевим серцем впаде, якщо не матиме сталевої зброї. Вже були готові плани кузень, розроблялася нова зброя, навчалися великі ковалі. Клан Свартпельсів вже не буде численним, але кожен воїн матиме все, що забажає для бою, і навіть більше.\n\nДух, однак, також був можливим. Ходили чутки про нові "наркотики", як їх називали, різні речі, які могли штучно посилити істоту, щоб вона була більшою, сильнішою, швидшою. Що вони можуть дати більший контроль над самою магією в деяких випадках, вийти за смертні межі сили духу. Ведмеді Свартпельса могли б стати найсильнішими, яких коли-небудь бачив світ, можливо, майже такими ж сильними, як і наші великі предки.\n\nАле тільки один метод міг бути застосований, і вибір був за ним."
 volsungrb.74.a:0 "Що сильніше, сокира чи лапа, яка нею володіє?"

 volsungrb.75.t:0 "Нові хрестоносці"
 volsungrb.75.d:0 "Фрітьйоф з клану Вольсунґр спостерігав за молодими ведмедями, що стояли навколо, пильно оглядаючи їх. Усі вони прибули цього прохолодного ранку як частина останнього творіння королеви, "Хрестоносців гармонії." Очевидно, за зразком якоїсь групи молоді з такою ж назвою в Еквестрії, вона була представлена як організація, до якої міг приєднатися будь-який ведмідь, який шукає своє місце в житті або втратив мету, щоб, можливо, знайти його, допомагаючи країні в цьому процесі.\n\nОднак у Фрітьйофа виникла легка підозра, що вони упустили щось важливе щодо цих "Хрестоносців." Це не було схоже на Еквестрію, щоб її молодь опинилася в таких небезпечних ситуаціях, в які він був змушений їх поставити. Але з іншого боку, чому б інакше їх називали Хрестоносцями, якби вони не були змодельовані за зразком старих грифонів-лицарів-хрестоносців, які колись давно вторглися в клани? Птахи також час від часу виховували своїх дітей змалку, щоб вони стали лицарями, тож вони робили те саме, але з нануками.\n\n "Діти!" Усі пташенята припинили свої справи і подивилися на нього. "Сьогодні ми піднімемося на гору, щоб битися з чудовиськами, такими ж, як і старі нануки! Візьміть із собою зброю, якщо це необхідно, і додаткову рибу отримає той ведмідь, який буде битися голими лапами! А тепер ідіть!" Дитинчата зраділи і утворили імпровізовану групу, коли вони пішли за Фрітйофом вгору по виснаженій гірській стежці, повільно зникаючи з трюму в снігу."
 volsungrb.75.a:0 "Хрестоносці гармонії, мисливці на монстрів, ура!"

 volsungrb.76.t:0 "Люба принцесо Селестія..."
 volsungrb.76.d:0 "...пишу тобі з великою тривогою і великим потрясінням. Бо на Півночі стався раптовий і несподіваний зсув подій. Бо якщо раніше царство білих ведмедів рухалося до цінностей дружби, співпраці та гармонії, навіть, якщо трохи тривожно одержиме монстрами та розведенням небезпечних створінь, то після одруження принцеси Ейри Вольсунґрської та деспота Торбена Свартпельського стався великий зсув. Чому принцеса обрала собі за чоловіка такого реакціонера я не знаю, але він явно має на неї жахливий вплив, адже білі ведмеді тепер явно рухаються в бік більш несправедливої ієрархії і навіть дискримінації! \n\nПерше стала закритою армія  - інституція, яка дуже багато значить для ведмедів, адже тепер туди пускають навіть найбільш фізично великих і жахливих білих ведмедів, грифонів і яків. Потім почалися зміни у виробництві, сільському господарстві та гірничодобувній промисловості. Навіть якщо можна помітити войовничих істот, які все ще працюють, невидимою силою чи якимось переконанням знову встановлюється чітка ієрархія - сильні панують як військова еліта, а слабкі працюють без жодного шансу піднятися в ієрархії! Це так, наче весь прогрес, досягнутий роками, було зведено нанівець за кілька днів! Я намагався переконати принцесу Ейру і навіть деспота Торбена, що те, що вони роблять, неправильно, але все, що я отримую у відповідь, це глузливий сміх, пропозиції прочитати погану книгу "Піраміда" або ввічливе твердження, що це просто північна гармонія.\n\nДорога принцесо Селестія, я прошу у тебе відповіді, чи варто нам залишатися в ладах з таким царством, а якщо ні, то що ми можемо зробити, щоб боротися з цією темрявою?."
 volsungrb.76.a:0 "Підпис: Біксбайт з делегації поні на Півночі"

 volsungrb.77.t:0 "Союз пінгвінів і ведмедів?"
 volsungrb.77.d:0 "Ми отримали пропозицію від Ейри, принцеси [PLB.GetNameDef]. Вона стверджує, що пінгвіни і білі ведмеді, два види, які століттями ділили Північ, володіють "полярним духом." Оскільки ми "природні брати", вона стверджує, що нам судилося стояти разом, ласта в лапу, як одній об'єднаній конфедеративній нації.\n\nНе дивлячись на очевидний ентузіазм Ейри, її твердження трохи надумані. Білі ведмеді - люті істоти, набагато більші за нас, і декому важко повірити, що вони діють з добрими намірами. Однак конфедерація з урсинами принесла б нам незаперечні економічні та військові переваги. Враховуючи, наскільки ми слабкі порівняно з нашими більшими сусідами, об'єднання з ведмедями може бути єдиним способом забезпечити наше виживання."
 volsungrb.77.a:0 "Ми приймаємо."
 volsungrb.77.b:0 "Їм не можна довіряти."

 volsungrb.78.t:0 "Пінгвіни погоджуються!"
 volsungrb.78.d:0 "Пінгвіни прийняли наше запрошення до об'єднання! [PNG.GetLeader] прибув сьогодні на особисту зустріч з Ейрою, під час якої було офіційно оголошено про створення нової конфедерації. І ховрахи, і пінгвіни святкують це історичне досягнення, а також мир і процвітання, які воно, безсумнівно, принесе. Після століть роз'єднаності істоти півночі нарешті стоять разом, як одне ціле!"
 volsungrb.78.a:0 "Ми більше ніколи не будемо розділені!"

 volsungrb.79.t:0 "Пінгвіни відмовляються"
 volsungrb.79.d:0 "Ми думали, що [PNG.GetLeader] був розумною істотою, але сьогодні він показав своє справжнє обличчя. Пінгвіни відкинули наше запрошення до об'єднання, назвавши його "неможливим" і "однією зі схем Ейри." Ми знаємо, що така ганебна поведінка є звичним явищем за межами кланів білих ведмедів, але ми очікували кращого від пінгвінів, наших братів у країні льоду і снігу."
 volsungrb.79.a:0 "З такими братами хочеться бути єдиною дитиною."

 northern_protectorate.1.t:0 "Історія крилатих ведмедів"
 northern_protectorate.1.d:0 "Вкриті чорно-білим хутром і броньовані жовтим хітином, крилаті ведмеді є одними з найбільших монстрів світу. Навіть поодинокі особини більш ніж здатні протистояти майже будь-якому воїну або навіть іншим звірам такого ж або більшого розміру і сили. Однак, якщо ви зіткнетеся з цілим роєм чейнджлінґів, єдиним шансом вижити буде своєчасна втеча, оскільки навіть наші предки не могли перемогти цілий рій поодинці. \n\nЩе одна небезпека зустрічі з цими звірами полягає в тому, що, на відміну від більшості істот такого розміру і сили, ведмеді є розумними істотами, що володіють чудовою пам'яттю і здатністю працювати у великих групах.\n\nНе дивлячись на небезпеку зустрічі з такими істотами, полювання на ведмедів - це заняття, в якому повинні брати участь найвидатніші представники клану, щоб продемонструвати свою міць і бойову доблесть. Однак ця традиція супроводжується дещо цікавим явищем: завжди є кілька воїнів, які не виявляють інтересу до вбивства цих звірів, а навпаки, бажають і намагаються приручити їх, іноді з великими успіхами.\n\nЗвичайно, в традиційному суспільстві білих ведмедів таких людей виганяють і вони зникають у дикій природі. Там вони б провели своє життя, блукаючи місцями, яких найменше торкнулася цивілізація, приручаючи ведмедів, а іноді й більш екзотичних та рідкісних істот.\n\nОднак Бйорнлінґ має зовсім інші погляди, ніж вожді та старійшини, яких було скинуто з престолу. За роки вигнання він зібрав багатьох приборкувачів, розкиданих по всьому Еквасу, і переконав їх приєднатися до свого загону. Зграї чейнджлінґів, які ці вигнанці принесли з собою, були особливо ефективними під час завоювання Півночі, і тому військове та політичне керівництво Північного Протекторату вирішило, що ці приборкувачі жуків та їхні зграї повинні бути реформовані та інтегровані у збройні сили протекторату для використання проти ворогів Гегемонії Чейнджлінґів. \n\nКрім того, було вирішено, що для отримання ще більшої вигоди від доступу до таких унікальних фахівців, таланти і здібності цих колишніх вигнанців будуть використані для створення інститутів з підготовки нових приборкувачів і приручених зграй чейнджлінґів, щоб гарантувати, що армії Північного Протекторату ніколи не зіткнуться з небезпекою втратити перевагу, яку дають ці зграї монстрів."
 northern_protectorate.1.a:0 "Цікаво, чи можемо ми одягнути на них панцербйорн..."

 northern_protectorate.2.t:0 "Проєкт Овергриф" #podrick
 northern_protectorate.2.d:0 "Серед безлічі легенд, присутніх у нашій гордій історії, лише кілька казок є настільки екстравагантними, як міфічний Овергриф. Кажуть, що він сильний, як наймогутніший ведмідь, і лютий, як найжорстокіший з кланів. Хоча багато хто стверджує, що ця ідея виникла через бажання ведмедів знайти совиного ведмедя, який міг би зрівнятися з ними за силою, Бйорнлінґ знає, що за цим забобоном криється щось більше, ніж просто забобони. Як і Гіперберія, Овергриф був втрачений у часі, але його можна повернути.\n\nНещодавні досягнення в галузі стероїдів та препаратів, що підвищують працездатність, зацікавили Бйорнлінґа. Чи може Овергриф повернутися у світ? Можливо, він весь цей час перебував у сплячці, ховаючись всередині совиного ведмедя... а можливо, і в усіх них. Тим не менш, Бйорнлінґ підписав наказ, щоб почати тестування на кожному ведмеді, якого вчені змогли знайти."
 northern_protectorate.2.a:0 "Овергриф повертатиметься у цей світ, по одній совиній особині за раз."

 northern_protectorate.3.t:0 "Інша сторона кинжалу"
 northern_protectorate.3.d:0 "На стіл Бйорнлінґа лягли звіти, підсумок роботи Селлблейдів.\n\nЩодо артефактів, то їх було знайдено небагато. Загін, посланий до Водяних міст, ходив колами, хоча йшов по прямій, не знайшовши святих джерел життя, про які ходили чутки, хоча й натрапив на пару екзотичних магічних трав і спецій. Команда з двох ведмедів у Барраді поспішно повернулася не більше ніж через день, прихопивши з собою скриньку з невеличкими скарбами, що були для них найдорожчими в житті. Увесь загін вирушив на південний схід Еквестрії, щоб пограбувати місцеві храми; деякі з них потрапили у смертельні пастки, схожі на шипи в кінці великих водоспадів. Результатом стали кілька акуратних магічних скарбів, що було краще, ніж нічого.\n\nІнший загін, однак, вивчав притаманну сапієнту потворність. Це був чудовий обмін: білі ведмеді зберегли свій первісний запал, але втратили лазерні благословення Гіперберії, тоді як полум'яні душі заставили свою первісну поведінку, щоб запозичити нашу технологічну вершину. Але ці полум'яні душі продали не все: принцеса Луна одного разу перетворилася на звіра, якою була Найтмер Мун, і було поширеним серед поні переконанням, що принцеса Селестія теж може піддатися цій темній стороні.\n\nТож ставку було зроблено на киринів і поні. Першим заплатили великі гроші, щоб вони перетворилися на ніриків. Потім були залучені чейнджлінги для вилучення негативних почуттів і впровадження їх у поні. Дослідники вирішили, що критичною точкою є суперництво між братами і сестрами - саме тому всі поні з великих сімей були перевірені на наявність розладів особистості. Результати емоційної екстракції-посилення були... неоднозначними. Нірік просто спалив наукові роботи, а стадо поні або позбулося своїх смертних обмежень, або трохи підросло в розмірах... Тим не менш, така співпраця кількох істот - поні, ведмедів, чейнджлінґів і киринів - привнесла нові перспективи. Бйорнлінґ пишався тим, як полярні душі поєднуються з полум'ям інших рас."
 northern_protectorate.3.a:0 "Цими темними силами треба ділитися!"

 northern_protectorate.4.t:0 "Порожнеча"
 northern_protectorate.4.d:0 ""Як угорі, так і внизу." Так свідчила приказка, що була причиною такої рідкісної для Бйорнлінґа усмішки. Адже, його родичі "знизу", понад сотню височенних діамантових псів-вигнанців з усього Еквуса і навіть Грифонії, були зібрані в безплідній тундрі для новаторського проєкту розкопок. Пси були близькі до магічних кристалів і схильні до продуктивних наук, але їх часто уникало суспільство вогненних рас. І цьому вже точно не сприяли величезні розміри псів, яких вони досягали завдяки щоденному використанню кристалів. Те, що деякі з них були майже такого ж зросту, як сам Бйорнлінґ, було достатнім доказом їхньої рівності з ведмедями. Звичайно, більшість мешканців поверхні відштовхнули б шляхи підземного світу Кетер-Мала, внутрішнього царства цієї порожнистої планети. Але Кетер-Мал був, як і раніше, недоторканий: Бронзгілл і Діамантова Гора займалися лише звичним видобутком руди. Батьківщина діамантових псів була втрачена подібно до Гіперберії.\n\n\nБйорнлінґ віддав розпорядження бригаді землекопів рити доти, доки не буде досягнуто Кетер-Мал. Тижні льодового морозу змінювали один одного, а забиті лапи й інструменти, які затупилися, поступилися місцем більш дивним заходам: хитромудрим пристосуванням і машинам, здатним піднімати тонни бруду за секунди. І кислотній алхімії кристалів, здатній розм'якшувати або розчиняти камінь та інші менш значні руди. Сморід ніяк не бентежив Бйорнлінґа, але ось відсутність Кетер-Мала йому дуже не подобалася.\n\nБільше ніж за місяць проєкт перевели до розряду низькопріоритетних, унаслідок чого мінімальна команда землекопів, яка залишилася, почала просуватися в день буквально на кілька сантиметрів. Проте пси продемонстрували кілька нових трюків, і, що важливіше, поза всякими сумнівами довели, що вони і ведмеді - брати по полярному духовному континууму."
 northern_protectorate.4.a:0 "Вісь Ведмідь-Пес стає сильнішим!"

 northern_protectorate.5.t:0 "Наші полеглі родичі" #podrick
 northern_protectorate.5.d:0 "З безлічі трагічних наслідків падіння Гіперберії найвідомішим є втрата інтелекту багатьма ведмедями. Вони перетворилися на простих звірів, не здатних думати ні про що, окрім як про наступну трапезу.\n\nБйорнлінґ знав, що цю образу необхідно виправити, оскільки відновлення Гіперберії повинно охопити всіх ведмедів, а не тільки обраних. З непохитною рішучістю він наказав непомітно відібрати кілька нерозумних ведмедів з усього Еквуса, щоб спробувати піднести їх.\n\nПротягом наступних кількох днів прибули потрібні ведмеді. Вони були ув'язнені в клітки і вирували від люті. Бйорнлінґ зупинився і подивився на одного з них, який гарчав і ревів уже кілька годин. Його очі були абсолютно чорними, позбавленими іскри світла, яка горіла в Бйорнлінґу та його послідовниках. Трохи поміркувавши, Бйорнлінґ повернувся до своєї команди і наказав їм почати випробування.\n\nНаступні кілька днів були болісними. Нескінченні крики, сповнені страждань, лунали в лабораторіях. Але вчені були рішуче налаштовані працювати цілодобово без сну і відпочинку, щоб відновити те, що втратили ці бідні ведмеді... Лише коли їхні пацієнти почали вмирати від травм, Бйорнлінґ зупинив тести. Він похитав головою і розламав свій планшет надвоє. Схоже, що прокляття, яке вкрало мислення деяких ведмедів, також назавжди спаплюжило їхній рід недоліком інтелекту. Ці ведмеді справді були втрачені. Вони ніколи не дізнаються, що саме вони втратили.\n\nТим не менш, Бйорнлінґ знав, що він повинен рухатися далі. Можливо, що майбутні покоління у відновленій ним Гіперберії знайдуть відповіді, які вислизнули від нього."
 northern_protectorate.5.a:0 "Принаймні, у нас є ти, Юрію."

 northern_protectorate.6.t:0 "Астральні Урси"
 northern_protectorate.6.d:0 "Чи можна приручити зірки? Істоти, відомі як Великі Урси, втілювали собою цей виклик. Адже якщо хтось зуміє змусити підкоритися собі подібних звірів, то вони, завдяки своїй неприборканій силі та великим розмірам, стануть розумною зброєю масового ураження. \n\n\nБйорнлінг встановив зв'язок: зірки асоціювалися з принцесою Луною, яка нібито керувала снами, та залишками гіперберійських експериментів із вивчення змінених станів свідомості. Якщо ніч була пов'язана з цими явищами, то і слабке місце Урси могло бути знайдене.\n\nСпочатку він зажадав групу чейнджлінґів, щоб вони замаскувалися під Малу Урсу та навіяли Великій Урсі неправдиве відчуття безпеки. Потім у гру мала вступити друга команда - група шаманів, які пройшли курс навчання сучасним методам гіпнозу, щоб занурити Урсу в сон. Нарешті, напоготові була ще одна група сновидців, яку очолювала ще більша кількість шаманів. Ці ведмеді вжили велику дозу кристалів і галюциногенів, які були просякнуті енергією повного місяця, щоб увійти у світ снів і нав'язати свою волю Урсі. Коли прокинулася перша Урса, разом із нею прокинулися й генетичні спогади. Вона служила в Гіперберії: вдень черпала воду і збирала тюленів, а вночі малювала картини на зоряному небі. Забувши про своїх дитинчат, Урса вийшла з печери в супроводі чейнджлінгів, що скинули обличчя, і шаманів-гіпнотизерів."
 northern_protectorate.6.a:0 "Нехай ведмідь мріє."

 northern_protectorate.7.t:0 "Привиди минулого"
 northern_protectorate.7.d:0 "У колодязі духів зберігалися душі ведмедів, які жили ще до створення світу. Вони спілкувалися одна з одною в стані дистильованої думки й актуалізації. Тому виникло питання: як же нам зачерпнути з цього колодязя?\n\n\nДуші живих ведмедів, навчених виконувати елітні операції в альтернативних станах свідомості, поміщалися в кристалічну кріокамеру. Внутрішня поверхня камери була вкрита багатогранними дзеркалами, а ще цей пристрій був оснащений мета-спрямованими стрижнями лозоходців для закріплення духів ведмедів у цій реальності, поки вони торгувалися з криницею.\n\n\nЕксперимент зіштовхнувся з безліччю фальстартів і проблем. Електрика відключалася, випробовувані втрачали свідомість. Інші збої призводили до того, що ведмеді отримували травми. Але врешті-решт, за допомогою апарату для проведення спіритичних сеансів, Бйорнлінґу вдалося отримати відповідь: колодязь було досягнуто. З нього були витягнуті духи, які були спрямовані у фізичну реальність, а потім прямо в саморобні портативні котли духів Бйорнлінґа - його власні аналоги штучних колодязів духів... Після того, як кріокамера остаточно завершила роботу, Бйорнлінґу належало відвідати чимало цвинтарів і використати там ці свіжозаповнені котли душ...."
 northern_protectorate.7.a:0 "Вчителі з тої сторони завіси!"

 northern_protectorate.8.t:0 "Зв'язок душ" #podrick
 northern_protectorate.8.d:0 "Вони говорили Бйорнлінґу, що це неможливо. Коли він повернувся з працюючою моделлю, вони сказали йому, що це неетично. І тоді вони "зголосилися" добровольцями для першого експерименту.\n\n\nБйорнлінґ практично пританцьовував на оглядовому майданчику своєї великої лабораторії. Сьогодні йому належало увійти в історію. Відтоді як він зрозумів, як запобігти повторній загибелі майбутньої Гіперберії, він невпинно працював над створенням умов, необхідних для проведення ритуалу. Ритуалу, який забезпечив би вічне існування Гіперберії.\n\nВнизу його колишні провідні вчені лежали на столах поруч один з одним, благаючи звільнити їх. Але ніхто не звертав уваги на їхні крики, побоюючись, що Бйорнлінґ "попросить" їх стати наступними випробовуваними. Один з усе ще вільних учених подивився на Бйорнлінґа і кивнув, даючи дозвіл.\n\nБйорнлінґ одягнув захисні окуляри і наказав почати випробування.\n\nМашини почали дзижчати, і руни навколо випробовуваних засвітилися. Електрика замерехтіла між кількома котушками Тротли, розташованими під стратегічними кутами, що дали змогу створити постійну дугу електричного бар'єру навколо випробовуваних. Коли механічне дзижчання досягло свого піку, з-під землі піднявся грандіозний п'єдестал, на якому стояла одна вкрай стурбована ведмедиця. Благання випробовуваних посилилися, коли руни почали поширюватися від свого джерела. Вони вкрили весь п'єдестал, бар'єр, центрального ведмедя і, зрештою, самих випробовуваних. Бйорнлінґ у побожному жаху дивився, як тріск електрики і звуки роботи важких механізмів заглушають все інше.\n\nПіддослідні та центральна ведмедиця почали битися в конвульсіях, коли руни, які світяться, витікали з випробовуваних і вливалися в неї. Незабаром потік рун припинився і піддослідні випускали дух, коли руни переставали текти з них. Ведмедиця в центрі почала важко дихати, коли остання руна увійшла в неї. Коли все закінчилося, вона відчула страшну агонію і закричала настільки голосно, що все обладнання навколо неї вийшло з ладу. Здавалося, що її крик наклався на кілька інших. Скло розлетілося вщент і всі вчені розбіглися по укриттях. Усі, крім Бйорнлінґа.\n\nВін посміхнувся. Він зробив це."
 northern_protectorate.8.a:0 "Ми будемо боротися далі, знаючи, що Гіперберія більше ніколи не може бути втрачена."

 northern_protectorate.9.t:0 "Розбиваючи пута смерті" #podrick
 northern_protectorate.9.d:0 "Безсмертя.\n\nДанна концепція інтригувала незліченні уми по всій Полярії протягом багатьох поколінь. Якби ведмеді могли жити вічно, то, можливо, Гіперберія ніколи б не зникла... Незважаючи на всі зусилля магів і науковців усього цивілізованого світу, жоден із них не досяг успіху у своїх спробах обдурити саму смерть. Тобто, досі... якщо сьогоднішній експеримент пройде успішно.\n\nНещодавно Бйорнлінґ почув про групу ведмедів, які з невідомих причин здійснили експедицію на північ. Вони вирушили за найпівнічніші береги, за саме крижане море. Вони забралися так далеко на північ, що їхні компаси змінили напрямок. Ми не знаємо, куди вони вирушили, але їхній корабель повернувся лише з двома пасажирами: важко пораненим ведмедем і великим замкненим ящиком, усередині якого щось возилося. На жаль, самотній ведмідь помер, так і не встигнувши розповісти про те, що сталося під час подорожі. \n\nБйорнлінґ і його вчені отримали скриньку і відкрили її в захищеному приміщенні. Побачивши її мешканця - поні-скелета - щелепи ведмедів колективно опустилися. Це були не просто кістки, що стирчали з плоті, а саме скелет, який пересувався, немов живий. Він не був розумним, бо неодноразово намагався піти, не відповідаючи на запитання.\n\nЯкраз тоді Бйорнлінґ доручив своїм найкращим ведмедям провести експерименти над цією істотою. Якби вони змогли використати силу, яка підтримувала "життя" цього створіння, то хто знає, наскільки це наблизило б їх до відновлення Гіперберії.\n\nНа жаль, незважаючи на всі зусилля вчених, вони змогли витягти з природи цієї істоти лише малу дещицю корисної медичної інформації, перш ніж вона перетворилася на інертну купу кісток. Схоже, що безсмертя вислизнуло від них... цього разу."
 northern_protectorate.9.a:0 "Ми багато чого навчилися, але нам ще багато чому треба навчитися."

 northern_protectorate.10.t:0 "Раз Бйорнлінґ, два Бйорнлінґ"
 northern_protectorate.10.d:0 "Залишки спадщини Гіперберії були розкидані по всьому світу. І один із цих осколків, що нібито має дублювальні властивості, розташований просто в серці Еквестрії, в одній із печер. Кілька дипломатів надіслали листи в Понівілль, щоб перевірити твердження про те, що якась Пінкі Пай була клонована внаслідок інциденту, але після підтвердження чуток колеги-поні відговорили ведмедів піднімати це питання. Однак далекоглядний Бйорнлінґ не дозволив дитячим страхам завадити йому відновити технологію клонування своїх пращурів; нескінченна армія ведмедів, яким не потрібно було витрачати першу дюжину років на навчання, значно спростить набір. \n\nУ Протекторату було багато посередників, готових придбати зразок із цього Дзеркального Ставу. Краплі з озера розділили і направили в пересічні трубки, щоб вони стикалися і дублювали одна одну в геометричній прогресії. Зливши рідину, що вийшла, в підземне озеро, Протекторат отримав свій власний Дзеркальний Ставок, причому поні навіть не підозрювали про це.\n\nСам Бйорнлінґ мав стати шаблоном для виробництва найсильніших воїнів. Однак, на жаль, між отриманими Бйорнлінґами тут же почалася суперечка. Персоналу довелося перестріляти всіх зайвих Бйорнлінґів.\n\nТому процедуру переглянули: Протекторат почав набирати безкланових бродячих ведмедів, які майже не мали живих родичів, після чого призначав для них напружений режим тренувань, а потім відправляв воїнів, які показали найкращі результати, у Ставок. Хоча ці ведмеді не будуть настільки ж здібними, як Бйорнлінґ, вони будуть досить чисті для максимального прояву гіперберійської генетичної пам'яті м'язів. Клонування сили, м'язів і полярного духу поки що працюватиме."
 northern_protectorate.10.a:0 "Веселощі подвоїлися... потроїлися..."

 northern_protectorate.11.t:0 "Авангард реставрації Гіперберії" #podrick
 northern_protectorate.11.d:0 "Традиційні обладунки панцербйорнів, як і багато інших видів зброї та інструментів, якими ми користуємося, є лише грубою подобою того, що було доступне нам багато століть тому. У глибині конструкції обладунків панцербйорнів приховані залишки Гіперберії, і, на жаль, для розгадки цієї давньої загадки потрібно щось більше, ніж просто сила волі.\n\nЯк раз тоді Бйорнлінґ зрозумів, що сово-ведмеді можуть допомогти там, де його власний рід не може впоратися. сово-ведмеді, як і їхні побратими-грифони, вміли зачаровувати фізичні предмети. Адже їхня історія сповнена розповідей про лицарів з магічними мечами і настільки ж магічними обладунками.\n\nБйорнлінґ почухав ніс. Так, якби ведмежий рід зміг би використовувати цю здатність, то вони могли б розібратися в гіперберійських візерунках їхніх обладунків. І, можливо, навіть відтворити колишні й дуже потужні конфігурації... \n\nТому Бйорнлінґ з найбільшою впевненістю наказав своїм ученим зібрати всіх сово-ведмедів, вправних у зачаруванні. Удень і уночі вони працювали під пильним оком Бйорнлінґа, поки їхня праця не почала приносити свої плоди. Двоє змучених сово-ведмедів ледве утримували пластину, на металевій поверхні якої світилися вигравірувані руни.\n\n\nБйорнлінґ насупився. Він очікував, що на нього одразу ж зійде осяяння, і він зрозуміє, чому гіпермедведі розробили свої обладунки саме таким чином. Але навіть зараз він не міг зрозуміти, що перед ним. Проте, робота сово-ведмедів не пропаде даром. Він наказав їм почати масове виробництво обладунків, не звертаючи уваги на втомлений погляд позбавлених сну сово-ведмедів, які могли лише кивати на знак згоди. Через кілька тижнів майже кожен ведмідь використовуватиме в бою обладунки, зачаровані сово-ведмедями. Навіть якщо ми не можемо розібратися в таємницях обладунків гіперведмедів, ми все одно можемо копіювати їх. І ніхто, навіть еквестрійці, не зможуть пробити нашу броню."
 northern_protectorate.11.a:0 "СЛАВА ГІПЕРБЕРІЇ! СМЕРТЬ ЕКВЕСТРІЇ!"

 northern_protectorate.12.t:0 "Ввічливе прохання"
 northern_protectorate.12.d:0 "Ми отримали лист від нашого поплічника в державі [PLB.GetNameDef]. Він стверджує, що здатен підтримувати порядок у землях пінгвінів. Контроль над окупованими землями - справа неприємна, і не тому, що пінгвіні бунтарі. Просто Пінгленд - холодне і похмуре місце, а ще там нічого їсти, крім маринованого оселедця... Сам цей факт робить цю пропозицію вельми привабливою. І при цьому ми не відмовимося від особливо цінної землі. У його листі також згадувалося щось про історичні зв'язки між родами ведмедів і пінгвінів, але це куди менш важливо, ніж логістичні проблеми. Хоча армія схвалює цю ідею, деякі агенти попереджають, що за державою [PLB.GetNameDef] напрочуд важко встежити, тож її розширення призведе до збільшення сліпої зони наших розвідувальних служб."
 northern_protectorate.12.a:0 "Нехай мій улюблений ведмідь отримає те, що хоче."
 northern_protectorate.12.b:0 "Геть!"

 northern_protectorate.13.t:0 "Підкорення Онлартіру"
 northern_protectorate.13.d:0 "Бйорнлінґ був упевнений у перемозі і готовий був виступати проти сильніших супротивників, але тріумф завжди супроводжувався великими втратами щонайменше для однієї зі сторін, що завжди було трагедією: вбитий ведмідь назавжди позбавлявся можливості брати участь у побудові Гіперберії. Але ситуація з Онлартіром відрізнялася. Хоча слова Бйорнлінґа, як і раніше, підкріплювалися гіперберійською зброєю Кризаліс, ці клани були меншими за розмірами, а це означало, що дипломатія була привабливішим варіантом, що допоможе уникнути непотрібних жертв. Кейн та їхня ватажка Асе наполягали на битві на сокирах. І Бйорнлінґ погодився, легко здолавши Асе за допомогою свого бойового досвіду. Зарозумілість Кейна було швидко придушене, коли цим лютим воїнам пообіцяли більш досконалі методи бою, якщо вони стануть на бік Бйорнлінґа.\n\nҐотлунґ та їхнє місто-фортеця були наступними. З ними теж був влаштований традиційний бій на сокирах, але розміщені неподалік танки й артилерія натякали на те, що не-ритуальний бій їм не виграти. Чи то зі страху, чи то з поваги рада Ґотлунґа погодилася на умови Бйорнлінґа, вважаючи, що в Гіперберії їхня концепція посилених фортець зможе поширитися на всю Північ. \n\nРозенкранц вчинив так, як і слід було очікувати: король-шаман чекав Бйорнлінґа на вершині гори, не чинячи жодного опору. Хоча шаман був збитий з пантелику цим "шаленим тлумаченням Королів Монстрів", майбутнє, що лежало попереду, настільки збіглося з ним, що він не міг сперечатися з Гіперберією Бйорнлінґа... Крові було пролито зовсім мало, і тепер Бйорнлінґ міг насолоджуватися тим, що на святкових бенкетах з ним, як і раніше, буде чимало ведмедів і чейнджлінґів. Цього разу Гіперберія прокинулася в цих кланах без кровопролиття."
 northern_protectorate.13.a:0 "Гіпер-Онлартір з Бйорнлінґом!"

 northern_protectorate.14.t:0 "Вигнанець, відомщений"
 northern_protectorate.14.d:0 "По Уеллінгтон: найманець, який повернувся додому, перший об'єднувач ведмежих земель, мимовільний фанат повернення Гіперберії. Він багато дізнався про великий світ і з великим ентузіазмом приніс полярні технології, які вогняні душі помилково назвали своїми. Але По був ще й боягузом, який вигнав Торденстьєрне і Розенсвердів за співпрацю з чейнджлінґами, в той час як сам він опустився до того, щоб битися за гроші від грифонів. Таке лицемірство ніколи не буде забуте.\n\nСаме це змусило війська Бйорнлінґа з моторошним завзяттям штурмувати фортеці Скюфлінґа, витримуючи натиск снарядів і шрапнелі з грифонських рушниць і гармат. Під лапами останнього панцербйорна сніг став червоним від крові Скюфлінґів, і врешті-решт захисники опинилися оточені в останній фортеці. Не бажаючи гинути безславно і передчасно, залишки ведмедів здалися: їхні вороги довели свою перевагу десятки разів; Скюфлінґи мали поступитися... Та все ж кілька годин по тому, коли Бйорнлінґ закінчив ритися серед уламків будівель, витягаючи один труп за одним у пошуках живих, він стривожився, тому що не знайшов ні живого, ні мертвого Уеллінгтона. Але рев тріумфуючих підлеглих вивів Бйорнлінґа з цього стану - на наступний день на них чекав великий бенкет... Бйорнлінґ посміхнувся, коли подумав про те, що вигнанці будуть обідати у володіннях своїх колишніх тюремників..."
 northern_protectorate.14.a:0 "Нехай наш маленький "деспот" пливе назад у Грифонію"

 northern_protectorate.15.t:0 "Розрізнена Вессландія"
 northern_protectorate.15.d:0 "Ніщо так не демонструє глибини пост-гіперберійської деградації, як Вессландія. Вважалося, що клани цих земель мали об'єднатися: багатство їжі та ресурсів, гостинність полярних духів і вогняних душ... Один клан міг докласти символічних зусиль і легко об'єднати регіон. Однак клани Вессландії так і залишилися розділеними. Вони продовжують змагатися один з одним за свої дорогоцінні ферми і фабрики. Ця ганьба вимагала негайного виправлення.\n\nВ ході військової операції потрібно було враховувати чимале грифонське населення Вессландії, тому були покликані сили чейнджлінґів. Однак це призвело до того, що долаючи дикі землі, а потім просуваючись на більш родючі території, чейнджлінґи Протекторату та грифони Вессландії закріплювалися на місцевості для підтримки та логістики, надаючи ведмедям можливість битися на фактично нічийній землі. Щоразу, коли одна сторона ведмедів перемагала іншу і починала громити ворожі окопи, це було знаком для солдатів інших рас переходити в наступ. \n\nАле поспіхом створений союз був приречений рано чи пізно впасти, бо було неможливо протистояти єдності Гіперберії і потужній операції з прориву. Коли гвардія грифонів впали, лідери кланів Вессландії - Фальсен, Бродкорб і Бенкесток - схилилися перед міццю Бйорнлінґа. Їхні промислові землі не мали жодних шансів вистояти проти Гіперберії, яка тепер одноосібно розпоряджалася своєю родючою землею."
 northern_protectorate.15.a:0 "Суперечливому союзу прийшов кінець."

 northern_protectorate.16.t:0 "Перемогти на віки сильних пінгвінів Анкера"
 northern_protectorate.16.d:0 "Клан Анкер був насамперед морською силою. Донедавна битви на кораблях були для більшості ведмедів чимось незвичайним - так би мовити, екзотичним видовищем. Коли сучасний театр, "винайдений" вогняними душами, укорінився серед ведмедів, Бйорнлінґ виношував ідею... Незабаром після капітуляції Анкера ролик, який повідомляє про вторгнення, поширився подібно до снігової бурі. Слова "ПІНГВІНИ СЛАВНІ В БИТВІ" миготіли на екрані, а розповідь вів сам Бйорнлінґ, який стояв на тлі Північного моря, усіяного сірими корпусами кораблів. При кожному пострілі гармати у фільмі, гармата стріляла і в кінотеатрі, викликаючи землетруси для максимального занурення, а вода бризкала при кожному погойдуванні судна. Так тривало чотири знімальні дні, поки флот Анкера не дав тріщину. На палубах почалися битви із застосуванням гвинтівок і сокир, а потім і на самому Ян-Маєні, причому за кадром стріляли зі справжньої зброї, а кілька куль пройшли за кілька сантиметрів від безстрашних глядачів. Нарешті, Анкер здався, Бйорнлінґ потиснув лапи і ласти своїм лідерам, і фільм закінчився. Під оплески сам Бйорнлінґ мовчки встав з першого ряду і вклонився. Глядачам не потрібно було знати, що битва тривала лічені хвилини і обійшлася без втрат. Зрештою, Анкер просто трималися осібно, бажаючи лише риби. Їм потрібен був лише захист, щоб жити в мирі; не було причин втягувати пінгвінів у подальші махінації... Пощастило, що чейнджлінґи познайомили його знімальну групу з можливостями моделей лінкорів та драматургії..."
 northern_protectorate.16.a:0 "Їхню таємну хоробрість буде виставлено напоказ!"

 northern_protectorate.17.t:0 "Насильство проти Вольсунґра"
 northern_protectorate.17.d:0 "Бйорнлінґ спостерігав з вершини, насолоджуючись симфонією залпів артилерії. Розвідники доповіли про стратегічні цілі Вольсунґра, а більшого й не було потрібно. Артилерійського вогню, який час від часу коригували радники-чейнджлінги, що вміли керувати цими гарматами, було досить, щоб змусити їх замовкнути... Протягом багатьох годин Вольсунґр не виявляв активності, хоча Бйорнлінґ із задоволенням уявляв, скільки дорогоцінної обладунку і гармонійних "артефактів" він знищив, щоб прокласти шлях до Гіперберії... Нарешті, тишу порушила капітуляція. Хоча ведмідь із Вольсунґра, який приніс добрі новини, не був сумнозвісною принцесою Ейрою. Якщо вірити гінцю, то вона просто втекла, щоб знову вирушити на південь і переглянути свою власну спадщину. Можливо, вона подасть прохання про отримання громадянства Як'якистану або Еквестрії.\n\n\nБьорнлінг фиркнув після прийняття капітуляції. Передбачені землі Гіперберії тепер були позбавлені гармонійної загрози."
 northern_protectorate.17.a:0 "Гармонія вмирає під гірськими лезами нержавіючих горизонтів."

 northern_protectorate.18.t:0 "Про Свартпельс та їхнє зникнення"
 northern_protectorate.18.d:0 "В інший час клан Свартпельс був би рятівником Гіперберії. Вони цінували минуле і розум, а також відточували до досконалості мистецтво панцербйорнів. Однак вони були сліпі до максими, згідно з якою Гіперберія благословляє всі полярні душі, а не тільки ведмежі. Ненависть Торбена до чейнджлінґів та їхніх арктичних сердець була неприйнятною. Тож було б милосердно знищити його і розповісти його клану справжню правду про Гіперберію. Під прицілом гармат.\n\nГусениці допомагали швидко перетинати схили пагорбів і гір. А ведмеді залишалися всередині теплих машин, якими керували чейнджлінґи. Панцербйорни спускалися по схилу, щоб завдати свого удару, і протягом якогось часу ведмеді могли рухатися швидше громіздких машин. Але танки продовжували прибувати, дивізії продовжували наступати, і суворі стандарти елітних військ Свартпельса зіграли проти них: за кілька годин танків на полі бою стало більше, ніж панцербйорнів.\n\nФіпори за фортецею, і твердиня за твердинею... Усі вони захоплювалися за лічені дні. Але ведмеді відмовлялися здаватися і билися до останнього, люто гарчачи. Єдиним, хто зробив це з гідністю, був сам Торбен. Біля його фортеці вирувала сильна гроза, дивний дощ, який був неможливий так далеко на півночі. Танки витримали удар стихії, але Торбен продовжував стояти прямо, не звертаючи уваги на удари стихії. - Бйорнлінґ! Виходь, підлий боягуз! - Кричав він, підносячись серед бурхливого шторму. Торбен особисто підпалив дюжину танків, насолоджуючись болісними криками чейнджлінґів. - Покажися! Невже ти відмовиш собі в почесному бою?" Але коли заряджені гармати націлилися на Торбена, блискавки закружляли навколо нього в тріщати грозовому танці. Ведмідь вигукнув незрозумілі слова і за мить зник у спалаху, не залишивши після себе нічого."
 northern_protectorate.18.a:0 "Повелитель Грому... зник."

 northern_protectorate.19.t:0 "Бйорнлінґ, архетип" #Бйорнлінґ ділиться своєю історією з переможеними дрібними воєначальниками. Відкриває своє справжнє ім'я - Свік'я.
 northern_protectorate.19.d:0 "Бйорнлінґ зібрав лордів невеликих кланів і безкланових воєначальників у гірській печері, що захищає від завірюхи, яка вирувала зовні, щоб розповісти свою історію. Маг-писар, що стояв поруч із ним, записував кожне слово.\n\n\nБйорнлінґ зізнався, що він не завжди був настільки всемогутнім ведмедем. Колись його звали Свік'я, що означало "обманщик і шахрай". Цим ім'ям його нарекли воєначальники-дикуни, які віддавали своїх небажаних дитинчат, які не виконали певне пророцтво, клану Розенсверд, чиї ритуали часто виявлялися смертельно небезпечними. Молодий ведмідь стикався з постійним презирством через свій маленький розмір і ім'я, що змушувало його вирушати в далекі гірські походи. Він шукав шаманів, щоб поставити їм свої запитання і дізнатися, чому Всеотець так погано з ним обійшовся. Але він знайшов відповідь у видіннях мільйонолітньої давнини: юний ведмідь зрозумів, що він повинен згадати і знову втілити Гіперберію в реальності й тим самим врятувати ведмежий рід, який загниває. \n\nАле чому саме Гіперберія, чия назва означає "піднести ведмедів"? Адже сучасні ведмеді втратили свої давні сили та шляхи. Крім того, у Розенсверді часто зустрічалися чейнджлінґи, які володіли футуристичними технологіями, що були настільки схожі на концепції давніх віків... це явно свідчить про те, що в міфології ведмедів були лакуни. Ставало ясно, що вони були не єдиними, хто вижив після падіння раю, і нащадками тих, хто колись був напівбожественними звірами. Не дивно, що землі вічного півдня зберігали сліди давньої, крижаної величі. Фізичні розміри мешканців тих земель зменшилися, але це було компенсовано розумом. А от ситуація з ведмедями була зворотною: вони скотилися до застійного варварства, навіть якщо їхні жахливі розміри збереглися. Об'єднання ведмедів По - тим, хто поєднав свою жахливу майстерність з уроками крижаного розуму з-за моря - було остаточним доказом. І все ж його розвиток припинився, і від нього відвернулися.\n\nДоля Бйорнлінґа буде не такою. Якщо світ не захоче дослухатися до відгомонів Гіперберії, то він запхне крики півночі йому в глотку. Благословенний світ крижаних чудовиськ буде відвойований гвинтівками, гарматами і магічним льодом .\n\n\nПисар відклав сувій."
 northern_protectorate.19.a:0 " - Я - гіпербірієць, - присягалися лорди. За нашою північчю лежить справжнє життя."

 northern_protectorate.20.t:0 "Ексувія, піднесена" #Ексувію коронує Бйорнлінґ як маріонеткову королеву. Він все ще тримає всі карти, але вона легітимізує його правління, коли справа доходить до скептиків CHN. Можливо, трохи дружнього стьобу, оскільки Ексувія і Бйорнлінґ обидва езотерично божевільні.
 northern_protectorate.20.d:0 "Бйорнлінґ вибухнув щирим сміхом, коли лагодив зшиту з хутра і шкур нижчих істот, на яких вона полювала, мантію Ексувії. - Ой, та годі, сæта! Ти й так чудово виглядаєш у цьому. А окуляри? Тобі вони пасують.\n\n\nІх майбутня королева хихикнула у відповідь, що було рідкістю. - Ти впевнений? - запитала Ексувія, отримавши від Бьорнлінга запевнення, - Можливо, коли твоя маленька... ні, коли наша Гіперберія буде відроджена, мені більше не знадобляться окуляри. Ми матимемо всю техніку й магію світу, щоб вилікувати будь-які вади... і ми зустрінемо ще тисячу днів народження, так і не зіткнувшись із руйнівною дією часу.\n\n- Але що таке час у Гіперберії? - запитав він. - Хіба він не є чимось ефірним і божественним? Але через наше матеріальне існування ми сприймаємо його як чисте блаженство...\n\n- Для того, хто так цікавиться науками, - сказала вона, - ти говориш надто розпливчастими і невизначеними термінами. - Але Бйорнлінґ відповів зі сміхом.\n\n\nІ так вельми щаслива Ексувія була коронована володаркою Північного Протекторату: вона була вбрана в особисто здобуті на полюванні хутра та шкури, освятила початок свого правління сутичками з ведмедями, яких вона вельми міцно покалічила, і відсвяткувала свою коронацію бенкетом, де на стіл подали сиру рибу та м'ясо під акомпанемент музики й ритмів від початківців-скальдів. Під кінець ночі саме Ексувія донесла Бйорнлінґа до будинку, поки він розважав її своїми п'яними промовами про майбутнє, де сяють найвищі вежі, а лазери духу живлять кожен мозок і кожен дім."
 northern_protectorate.20.a:0 "Королева сміялася. І кохала."

 northern_protectorate.21.t:0 "Сонця-близнюки"
 northern_protectorate.21.d:0 "Бйорнлінґ ходив взад і вперед. Він не був тим ведмедем, якого легко налякати. Але, тим не менш, відвідувач, якого він збирався привітати, мав дуже зловісну репутацію... Увійшли два суворих охоронця з лав армії чейнджлінґів, а за ними пішли ще двоє. Потім увійшов літній чейнджлінґ, а за ним сам сумнозвісний герой страшних чуток.\n\nСуті. Його вчинки говорили самі за себе; лише він з-поміж усіх генералів армії наважувався називати Кризаліс своїм другом. І ось він тут, у командній башті Бйорнлінґа.\n\nСуті щось прошепотів своєму літньому дворецькому. - Суті каже, що ти занадто м'яко поводишся зі своїми співвітчизниками, - передав його слова чейнджлінг. - Він каже, що тобі слід було вбити всіх ведмедів із клану Вольсунґр.\n\n- Нам знадобляться всі війська, які ми зможемо отримати, - відповів на свій захист Бйорнлінґ. - Вольсунґр, чий дух тепер зломлений, будуть вірно служити нам.\n\n- Суті каже, що ти стаєш м'якотілим. Він каже, що якби він командував тут, то тебе б розстріляли за боягузтво. - Чейнджлінґ, який перекладав нечленороздільний шепіт Суті, передавав його слова спокійним і безтурботним тоном.\n\n\n- Оберст, ви можете бути моїм начальником, але я - Протектор Півночі, - прямо сказав Бйорнлінґ. - Це моя земля, і ви будете звертатися до мене з належною повагою.\n\n\nСуті прошепотів ще щось. - Генерал просто жартує, - заявив старий жук. - Ти чудово підготував Полярію до наших майбутніх завоювань. Він вважає, що тут усе гаразд.\n\n- Добре. А тепер залиште нас. Я повинен переговорити з ним без зайвих вух, - сказав Бйорнлінґ.\n\nП'ятеро чейнджлінґів подивилися на Суті, який кивнув на знак згоди. Один за одним вони вийшли. Бйорнлінґ підійшов до Суті, нахилився і прошепотів:"
 northern_protectorate.21.a:0 "Мені знадобиться твоя допомога на четвертому етапі."

 northern_protectorate.22.t:0 "Дезертирство Суті"
 northern_protectorate.22.d:0 "На додачу до нещодавньої зради Бйорнлінґа та його поплічників, наш генерал Суті та його штаб зникли. Була знайдена лише одна записка, написана архаїчним діалектом: "Суті приєднався до 4-го етапу. Тепер Весаліполіс не врятує навіть Інкубатор."
 northern_protectorate.22.a:0 "Будь проклятий цей зрадник!"

 northern_protectorate.23.t:0 "Прибуття Суті"
 northern_protectorate.23.d:0 "Суті дотримався угоди з Бйорнлінґом. Він привів загін нестримних, зібраних лапами військ до Гіперберії, і тепер готовий командувати ними в поході на Весаліполіс. Поні не вдасться вкрасти всю славу в цій війні!"
 northern_protectorate.23.a:0 "Суті - понад усе."

 northern_protectorate.24.t:0 "Більше не шепіт у темряві"
 northern_protectorate.24.d:0 "Замерзлі прапори тріпотіли в такт тупоту ведмедів і нечисленних чейнджлінґів, одягнених одразу в кілька зимових нарядів. Для них любов змішувалася із запахом сирого м'яса - банкети були лише вершиною айсберга з усього, що приготували для почесних гостей.\n\n- Ведмеді! - Бйорнлінґ виступав із платформи, що височіла над площею. Після вигуків, тупання і кидання сокир у повітря (які дивом нікого не вбили при падінні), Бйорнлінґ продовжив. - У цей день ми відроджуємося! Лише кілька років тому ми жили як дикуни, не помічаючи наших полярних сусідів, готових вказати нам шлях! Чейнджлінґи досягли великих успіхів на своєму шляху, тому що у них зберігся прямий зв'язок із Гіперберією! Всеотець заявив, що сьогодні почнеться новий льодовиковий період, який буде кувати вже не ведмеді, а всесвітній союз полярних духів!\n\n- Гіперберійці! - Він відійшов убік, відкривши погляду присутніх купу передових технологій, нагромаджених позаду нього. - Побачте щедрі подарунки від чейнджлінґів! Імплантати, дроти, екрани, аугментації... зброя! Розбирайте їх на частини, збирайте назад, запитуйте у своїх сусідів-чейнджлінґів! Познайомтеся з творіннями Гіперберії та хранителями, яких породили Кризаліс, що й зберегла їх! Нехай хвилі, що виходять від їхньої біомеханіки, віднесуть нас на північ!" Захоплена його словами аудиторія почала шукати по всій площі подарунки чейнджлінгів. Деякі з них були на виду, деякі заховані. Найбільш недисципліновані ведмеді навіть ввічливо попросили своїх товаришів-чейнджлінґів зняти свої пристрої та одяг для вивчення, ознайомлення і збудженого обговорення.\n\nКоли всі відволіклися, він покликав Ексувію підійти і подивитися на процес розпакування подарунків. - Леді, хіба це не прекрасно? Ми вже почала втілювати Гіперберію!"
 northern_protectorate.24.a:0 "Ексувія почервоніла! Гіперберія процвітає серед нас!"

 northern_protectorate.25.t:0 "Не такі й чужі?"
 northern_protectorate.25.d:0 "Оддмарр відзначився, служачи панцербйорном у Свартпельсі. Цього було достатньо, щоб отримати особисту похвалу від самого Повелителя Грому. Але це було багато років тому. Тепер перед ним стояло куди більш велике завдання: вести абсолютно новий клан. Спочатку це здавалося простою справою; він спілкувався з пінгвінами клану Анкер, і вони були приємною компанією милих рибалок. Але він не просив доручати йому клан чейнджлінґів на іншому кінці країни. Однак незабаром клан Одоноата став його зоною відповідальності, і Оддмарр погодився, не бажаючи гнівити Бйорнлінґа. Коли він прибув до їхнього поселення, новизна його була очевидна: там не було нічого, окрім збірних конструкцій, бетону й уламків занедбаних фортець. І купи чейнджлінґів... І тепер йому потрібно було вести їхніх "господарів".\n\nПерший тиждень був неоднозначним. Чейнджлінґи були йому незнайомі. А їхня здатність до польоту і зміни вигляду лише погіршували ситуацію. Проте, чейнджлінґи були напрочуд поступливими, надаючи свої передові та нововідкриті гіперберійські технології в обмін на подальший послух і допомогу. Усе було не так уже й погано.\n\nДо кінця, коли над свіжими будинками згасло світло і ніс міг відчути запах смачної їжі, Оддмарр радів своїм досягненням. Це була не цілодобова боротьба тіла чи розуму. Не нескінченна робота з підтримання архівів і зброї як це було в Свартпельсі. Ні, то був пошук полярних душ. І для нього цей процес був більш повчальним, ніж для чейнджлінгів."
 northern_protectorate.25.a:0 "Ці споріднені духи бажають відпочити на нашому снігу."

 northern_protectorate.26.t:0 "Випробування" #Найбільші та найсильніші грифони змушені пройти жорстокі випробування, щоб знайти совиних ведмедів. Ті, кому це вдасться, стануть військовими аристократами.
 northern_protectorate.26.d:0 "На сьомий день кров перетворилася на лід, пір'я Буриха випало, а цивілізації все ще не було видно.\n\nПопередні випробування Бйорнлінґа для визначення того, хто є сово-ведмедем, були розумними: їх посилали через крижані поля, щоб вони билися одне з одним за їжу, будували міні-фортеці тільки з льоду, годинами плавали в прохолодних морях - і все це під пильним оком призначених Бйорнлінґом суддів. Нагородою було життя за гіперберійським зразком і висока посада в армії.\n\nКоли від двох сотень грифонів залишилося лише двадцять з невеликим, Бйорнлінґ дав їм останнє випробування: чисте виживання. Грифонів привезли у справді віддалене місце і дали одне-єдине завдання - повернутися в будь-яке село полярних ведмедів і доповісти про це Бйорнлінґу. Причому під час цього випробування за ними будуть таємно стежити. Ось тільки тиждень тому Бурих прокинувся від сну на голому матраці і виявив, що він перебуває на північному березі. У нього не було ні зброї, ні одягу, ні інструментів: тільки лід, сніг і невблаганний кам'янистий ґрунт навколо. Дні й вечори проходили в блуканнях. Бурих був радий навіть невеликому чагарнику: він був готовий їсти що завгодно, навіть бруд. Кігті німіли й замерзали, хоча йому якось вдалося розвести багаття з власного пір'я. Бурих не бачив ні інших грифонів, ні екзаменаторів, якщо тільки вони не ховалися в снігу або не були абсолютно невидимі. Схоже, що він був абсолютно самотній.\n\n\nЙого знекровлені очі обнишпорювали горизонт у пошуках чого завгодно: дороги, будівлі, штучного світла... Бурих уже давно забув про своє бажання стати сово-ведмедем, він просто хотів додому."
 northern_protectorate.26.a:0 "Його душа плаває у крижаній пишноті."

 northern_protectorate.27.t:0 "Процедура номер 322, короткий виклад" #Ексувія намагається зробити божевільне лайно, щоб отримати якомога більших і сильніших чейнджлінґів. Її божевільна логіка полягає в тому, що більші чейнджлінґи якимось чином будуть кращими, ніж її тітка в Соріфі, яка дає чейнджлінґам магію єдинорога.
 northern_protectorate.27.d:0 "Мета: Вправи є універсальним видом діяльності. Їхня користь полягає в самоушкодженні м'язів для самопідготовки до великих навантажень. На цьому ґрунтується процедура номер 322, що містить у собі два паралельні експерименти з екстраполяції цього факту.\n\nАктиви і процедури: 500 личинок у віці від новонароджених до 10 років будуть відправлені до тренувальних таборів по всій країні, де вони повинні будуть проходити курси навчання на дорослому рівні протягом 5 років.\n\n\n500 яєць братимуть участь у допологовому експерименті та подальших тренуваннях (детальніша інформація міститься в Додатку 322B), слідуючи тому самому встановленому періоду часу, включно з вилупленням. (Див. Бйорнлінґ, Рейркетілл і Карапас для стенограм Комітету з Картування Душі та Перенаправлення).\n\nРезультати: На цій ранній стадії серед тих, хто вижив, серед народжених чейнджлінґів спостерігається зростання м'язової маси на 47% (порівняно із середніми показниками для того ж віку); офіцери також відзначають компетентність у поводженні зі зброєю і використанні військової тактики. Личинки після процедури обробки вилуплюються набагато раніше, але вже на 78% перевершують звичайних новонароджених за результатами тестів на фізичні здібності. Рівень відсіву вже народжених чейнджлінґів становить 51%, а серед оброблених до вилуплення яєць - 90%. Висновок: Є сенс у проведенні ретельної м'язової терапії для личинок і молодих особин; розумові здібності також збільшилися. Рекомендується доповнити цю терапію кристалохімічними медичними поліпшеннями для подальших експериментів."
 northern_protectorate.27.a:0 "Жеребці плачуть, бо вони безпорадні. Личинки - ні; їхня допомога - зсередини."

 northern_protectorate.28.t:0 "Під куполом"
 northern_protectorate.28.d:0 "Для Чатті Гам, творця і продавчині еквестрійських статуеток, місто Фрояр було недостатньо великим. Частково це пояснювалося тим, що воно виникло зовсім недавно, будучи місцем проживання грифонів, яків і рідкісних поні, які забрідали в ведмежі землі. Однак він подавав надії як процвітаюча зупинка для торговців.\n\n\nАле в сутінках хтось використав посох, щоб створити магічний купол над містом. Потім з'явився ведмідь, відповідальний за це, і закричав, - За наказом Бйорнлінґа це місто має підкорятися обмеженням Закону про міську цілісність! Ніхто не повинен залишати або входити в нього, поки Бйорнлінґ або його обрані посли не дадуть дозволу! Це робиться в ім'я цілісності арктичних земель, бо тільки полярні душі можуть поширювати Гіперберію!"\n\nСтрах пронизав серце Гам. Її сім'я жила в межах однієї довгої поїздки на поїзді; вона сказала, що буде вдома завтра! Гам кинулася до ведмедя: - Будь ласка, сер, що відбувається? Я... Я їду наприкінці дня! Мої близькі - що з ними буде, якщо я не повернуся додому!"\n\n- Часи невдалі, але не хвилюйся, молода кобило! Ти в безпеці під цим куполом! Ми напишемо твоїй родині, ми напишемо всім твоїм рідним і друзям! Одне твоє слово - і ми надішлемо звісточку!"\n\nІ коли ведмідь уже йшов, Гам спробувала вхопитися за його лапу, але він струсив її, кинувши просто на гострий лід. Її бурмотіння переросло в крики, незабаром заглушені погрозою застосування сокири і магії."
 northern_protectorate.28.a:0 "Сльози і кров затуманили її бачення того купола, що вторгся в її володіння."

 northern_protectorate.29.t:0 "Старе... чи нове?"
 northern_protectorate.29.d:0 "Протягом кількох місяців цей рух буквально бомбардував почуття Гер'ї. Статуї з'являлися на розі кожної другої вулиці, фестивалі та історичні вистави відбувалися щодня, а близьких закликали малювати, писати або вигадувати за допомогою свіжих технологій (за посередництва чейнджлінґів), вихваляючи гіперберійські ідеали. Це підтверджувалося нескінченними археологічними відкриттями забутих неолітичних поселень, у яких були докази існування лазерів і кораблів на повітряних подушках, вдягнутих в істинну громову броню. Ведмеді оплакували втрачений час, але також раділи його поверненню.\n\nУсе досягло апогею, коли Гер'я побачила нещодавно встановлений пам'ятник у техніці слеш-арту. Вона усвідомила все це прямо в розпал побачення зі своїм коханим Офбрадом. Пам'ятник випромінював у небо нескінченне світло. Він був оточений зображеннями стародавніх ведмедів, які впиралися нижніми лапами в гори, а верхніми в зоряну систему. Зірки й абстрактні трикутники були спрямовані вгору, їхні сутності сходилися, немов через призму, щоб живити невимовну зброю, яку тримали ведмеді.\n\n- Чудово, чи не так? - Запитав Офбрад; він був істориком, близьким до самого Бйорнлінґа. Раніше він був безклановим вигнанцем, але був піднесений.\n\n- Усе це... таке нове? - невпевнено сказала вона. - Але... старе. Дуже старе. У нас тоді навіть були кристалічні настоянки? \n\n- Велика справа, любов моя! - пробурмотів він, бурхливо жестикулюючи. - Ми провели всі ці століття, борсаючись подібно до інших примітивних істот, намагаючись зберегти залишки. Це ж доказ того, що наша доля не така!"
 northern_protectorate.29.a:0 "Енергія її супутника розважала її. Бйорнлінґа - не дуже."

 northern_protectorate.30.t:0 "Боротьба зі шкідниками"
 northern_protectorate.30.d:0 "Перша робота Кортекса в Протектораті була легкою. Якщо у Весаліполісі чейнджлінґ був дрібною шишкою, то в Протектораті - великою шишкою, хоча, як повідомив йому командувач Карапас, переважно серед не-ведмедів. А робота? Він мав очолити операцію з вистежування Скапуса, відомого гармоніста, наймовірніше, прибічника Торакса... І все ж таки, незважаючи на всю лютість, якою він і йому подібні могли похвалитися, від ведмедів виходила інша лють, коли вони звужували зону пошуку. Їхній правитель Бйорнлінґ, мабуть, був досить розумний, щоб королева схвалила його правління, а королівська гвардія підтримала його, але те, як вони говорили про гармоністів... Чейнджлінґи хоча б утримували свою здобич поруч ще деякий час; інакше любові було не добитися. Для ведмедів, однак, мати справу з гармоністами було простіше простого, як сказав один із них: "Я бачу його - і одразу атакую".\n\nКортекс запитав, чи можливе захоплення Скапуса. Існувала ненульова ймовірність того, що Скапус діє не один: інформацію з нього можна вибити тортурами, і личинка видасть своїх друзів... Але коли вони прибули до хатини Скапуса, ведмеді одразу ж увірвалися всередину, вибивши двері. Там вони знайшли лоша, яке негайно підняло копита, але постріл не дозволив йому сказати ні слова.\n\n- Скйорн!? - Кортекс крикнув, коли маскування лошати розсіялося, відкривши труп чейнджлінґа. - Що це було!? Ти просто... дякую, що робиш свою роботу, але... що це було!?"
 northern_protectorate.30.a:0 "- Ще секунда, - відповів Скйорн, - і його гармонійна магія вбила б нас."

 northern_protectorate.31.t:0 "Твоя добова доза"
 northern_protectorate.31.d:0 "Ядерні реактори були дорогими. Величезну частину коштів споживали системи безпеки. Для Бйорнлінґа системи на кшталт стержнів управління прийшли прямо з Гіперберії, але це був той рідкісний випадок, коли йому довелося поки що відмовитися від благословення минулого - будівництво реактора з такими характеристиками було надто ресурсомістким. Цьому доведеться почекати до повної реалізації Гіперберії. Тому його команда архітекторів створила ядерні реактори, які можна було побудувати в найкоротші терміни, але за мінімальними нормами.\n\n\nБйорнлінґ відвідав один із таких реакторів, надівши на себе шари броні, щоб захиститися від радіації. Робітники, які возилися з механізмами і проводами - в основному небажані і зневірені безкланові ведмеді - махали йому, але на них не було ніякого захисту, якщо не брати до уваги будівельних касок. Він чув, що постійний вплив радіації (навіть секундна доза) може призвести до радіаційного отруєння, але дослідження проводилися тільки на малих вогненних душах, таких як поні і грифони, а не на гіперберійцях.\n\n- Мене зараз вирве! - Закашлявся ведмідь, що спускався по сходах.\n\n- Тобі погано!? - Бйорнлінґ відповів, готовий поплескати його по спині. - Не стримуй себе. Тільки відправ свою ядерну блювоту назад у реактор! Потрібно серйозно ставитися до переробки відходів! Через кілька тижнів у ведмедя діагностували променеву хворобу в термінальній стадії. Вірний проханню Бйорнлінґа, він пожертвував усю свою блювоту місцевому реактору."
 northern_protectorate.31.a:0 "Це просто раціонально."

 northern_protectorate.32.t:0 "Високо в небі"
 northern_protectorate.32.d:0 "- Ласкаво просимо на борт! - Оголосив екскурсовод, коли двері гелікоптера зачинилися і він приготувався до зльоту. Для Ізел Строук це був бажаний відпочинок, який дозволив їй відпочити від тривалого ув'язнення в одному із закритих міст Протекторату. Хоча гелікоптер виглядав як механічний стерв'ятник, тому що він був розрахований під розміри полярних ведмедів і ніс з боків кулемети, це все ж таки був літаючий засіб пересування. Ізел була земною поні, і перспектива польоту розпалила в ній жагу до пригод.\n\nГрифони та інші поні схопилися за поручні, після чого машина почала підніматися. Спершу Ізел охопив страх, але незабаром він змінився благоговінням, коли вона подивилася в ілюмінатор: великий арктичний регіон ведмедів був льодовиковим раєм, що усіяний бездоганно красивими фортецями й містами. Звідси було видно нові пам'ятники і величезні витвори мистецтва - частину національного культурного прогресу Бйорнлінґа - і все це під балаканину пілота-господаря про славу відродженої Гіперберії.\n\n- Це так чудово! - Крикнула Ізел, не в силах стриматися. - Не можу дочекатися, щоб розповісти про це своїм друзям!\n\nКулеметник повернув голову в її бік. - Друзям? Ти ж поні, вірно? Чим ти займалася внизу? До закриття міст? Я збиралася провідати свого найкращого друга на сході... \n\n\nїї одразу ж викинули з гелікоптера як зрадницю-гармоністку."
 northern_protectorate.32.a:0 "Смерть з небес!"

 northern_protectorate.33.t:0 "Міжуніверсальність"
 northern_protectorate.33.d:0 "Між різними станами свідомості лежить світ снів, який уже досліджували в експериментах із Великою Урсою. Але що являє собою світ між сном і дійсністю? Чи існують між ними якісь схожі на мембрани шари? Де знаходиться кімната управління реальністю, і як до неї можна було отримати доступ? \n\nПротягом місяця Бйорнлінґу давали різні суміші присипляючого газу для його особистих випробувань. Він намагався довести цю теорію, вводячи команду сновидців у різні альтернативні стани свідомості. У їхніх звітах документувалися різні виміри, пов'язані зі сном, а також всілякі побічні ефекти після пробудження. Проте одного разу, після застосування потужної дози іншого газу, Бйорнлінґ випадково перетворив кімнату для випробувань на братську могилу. Однак монітори, підключені до трупів, продовжували пищати - вірна ознака паранормальної активності: мозок мертвий, але технічно живий.\n\n- Тепер усе зрозуміло, - сказав він Скалміру, своєму секретарю, - вони перейшли в домен ненароджених. Їхні воскові нині порожнисті тіла - це все ще арсенал, це наші бійці, які запобігають народженню наших майбутніх ворогів! Нам потрібні найсильніші суміші... ми відбуваємо на поле бою і відправимо наших ворогів прямо в обійми альтернативного стану свідомості"
 northern_protectorate.33.a:0 "Ця нервово-паралітична речовина була явлена мені уві сні."

 northern_protectorate.34.t:0 "Арктична фантазія"
 northern_protectorate.34.d:0 "- Макабричний космос споруджено! - Продовжував бушувати Бйорнлінґ під чорнильно-чорним небом. Він був одягнений в шати, що були довгі як тундрові дерева, а в його обличчя був втертий попіл кісток чиїхось батьків. Його слова транслювалися на всю Гіперберію. Аудиторія Бйорнлінґа була одягнена в обов'язкове кі-ведмедячо-нетичне вбрання, що мало стріляти невидимими лазерами в їхні очі та серця, щоб постійно перекалібровувати їхні бали здоров'я. Смерть перестала бути обов'язковою умовою для досягнення потойбічного життя! - Проголосив він. - Ми доставили сюди як загробне життя, так і життя до народження! Гіперберія - це місце, де як до-, так і післянароджені розквітають всупереч обмеженням плоті, щоб стати нашою кулею і ресурсом! \n\n- Так нехай же світ здригнеться! Ми відчинили душі, незаконно ув'язнені у в'язницю цього всесвіту, бо вони вимагають суду від вогненних душ! Поні, грифони, зебри... вони таємно переправили до них урожай первозданного світу, і настав час їм віддати належне своїм законним прабатькам! Гіперберійці, чи зустрінете ви мене, коли сутінки вогню зітруть все інше, щоб Гіперберія витримала загибель цього всесвіту і дожила до іншого, щоб породити іншу реальність!?\n\nЗдійнялася буря, що складалася з гуркітливих овацій, виблискувала сталлю і кристалами саморобних сокир, начебто сам сніг і лід піднялися, щоб обійняти свого заблукалого сина... Небо засяяло так, що зірки начебто збільшилися в кількості, породжуючи гіпнотизуючі спіралі аврори. Бьорнлінг міг заприсягтися, що бачив, як північне сяйво перетворилося на лик Всеотця, і Він нібито посміхнувся."
 northern_protectorate.34.a:0 "Передвістя."

 northern_protectorate.35.t:0 "Запуск"
 northern_protectorate.35.d:0 "- До запуску залишилася одна хвилина! Багато чого з того, що Урðр зробила за своє життя, було висміяно, що цілком природно для члена клану Розенсверд і механіта. Але хоча її виростив клан, саме Бйорнлінґ розгледів її справжній талант. Її дивакувату геніальність не можна було ігнорувати. І саме вона, за підтримки кожного з ведмедів, які колись існували, існують і існуватимуть і надалі, втілить у реальності справжній жах. Невразливий кошмар, що літатиме в небесах. Жах, що буде здатний завдати свого удару коли і де завгодно. Ворогам залишиться лише молитися про міцність бункерів, сидячи в них і прирікаючи своїх громадян на поверхні на вогняну смерть.\n\nАртилерія, закріплена на орбітальній платформі, була готова до запуску. Шамани спілкувалися з ув'язненими всередині духами, щоб калібрувати приціл гармат набагато швидше, ніж це могли б зробити радіохвилі. Недосяжний і водночас повсюдний, проєкт "Білий черв'як" омиє їхній світ ще до смерті, доки прокляті вогняні душі не стануть благати про пощаду. \n\n- Зліт через три, два, один...\n\nТяжкі сталеві двері пускового майданчика відчинилися. На цей проект було витрачено місяці, якщо не роки, важкої роботи, а також численні гранти від Гіперберії. І все це призвело...\n\n...до оглушливого вибуху. Полум'я спопелило не тільки майданчик, а й більшу частину робочої сили всередині. А найгірше було те, що Бйорнлінґ увесь цей час перебував тут, разом із нею. І він на власні очі бачив загибель мрії Урðр.\n\n- Ха-ха, це просто чудово! - Бйорнлінґ поплескав її по спині, а потім прикріпив імпровізовану медаль на її сорочку. - Дві концепції одразу! Орбітальні платформи смерті та спосіб знищення підземних повстанців! Яка похвальна ініціатива! Тепер наші вороги не врятуються у своїх тунелях!\n\nУрðр була настільки розгублена, що знепритомніла."
 northern_protectorate.35.a:0 "Ми, безсумнівно, зможемо знайти в попелі щось корисне."

 northern_protectorate.36.t:0 "Рагнарок"
 northern_protectorate.36.d:0 "Снігові лапи, вкриті дірками копита, волохаті кігті й холодні ласти... Усі вони стояли поруч одне біля одного в скляно-сталевому куполоподібному місті, що слугувало мікрокосмом гіперберійських здобутків.\n\n- Ми - інклюзивний народ! - Заявив Бйорнлінґ із площі. - Той факт, що міць полярних ведмедів була спрямована проти наших полярних побратимів, був великою несправедливістю. М'ясницькою розправою з боку зрадника-По. Але визначення гіперберійця може бути розширено! Що толку від усіх цих територій, якщо місцеві вогняні душі не в силах впоратися з непідйомним для них арктичним досвідом!? Відкиньте ваші упередження й упередженості: ми, починаючи з сьогоднішньої ночі, врятуємо і землю, і її серця!\n\nУ цей момент поруч із Бйорнлінґом встала маленька поні. Поруч із ведмедем вона виглядала не більше за мураху. Потім підручні Бйорнлінґа вкотили вже активовану машину, панелі якої за допомогою магії ширяли й оберталися навколо центральної платформи, що нагадувала ліфт.\n\n- Наш Сала-Комбінатор, - оголосив Бйорнлінґ, - загасить полум'я, настільки притаманне вогненним душам, залишивши місце для просочування первісної полярної природи! Ця поні буде першою, хто відмовиться від свого полум'я заради вічного дару льоду!\n\nІ ось, покірно слідуючи за ведмедями-охоронцями, кобила увійшла в Сала-Комбінатор. Вона стояла на плавучій платформі, поки імпровізована аудиторія оглушливо голосно висловлювала своє схвалення. Панелі почали обертатися настільки швидко, що перетворилися на розмиту пляму, огорнувши поні кришталевим серпанком. А оплески натовпу заглушили її скиглення.\n\n Навколо пристрою розповзлися на всі боки снігові вусики."
 northern_protectorate.36.a:0 "Засяй."

 northern_protectorate.37.t:0 "Довга гра"
 northern_protectorate.37.d:0 "- Ви збожеволіли! - Голосно випалила делегатка-поні. Біксбайт і сам Бйорнлінґ перебували в вельми аскетично обставленому притулку на еквестрійській території. Вона не хотіла вести переговори з ведмедями - раптом вони розстріляють її за симпатії до гармоністів, якщо повірити чуткам. - Усе це схиляння перед чейнджлінґами, отримання вигоди від завоювань Кризаліс і вбивство тих, хто стояв на вашому шляху... було прикриттям!\n\n- Я не пишаюся своїми діями, - відповів Бйорнлінґ. Його гуркітливий голос уже налякав поні на початку їхньої зустрічі, - але обдурити чейнджлінґів дуже непросто. У мене була своя роль, і я зіграв її якнайкраще. Повірте, пані, у мене було багато чвар з близькими друзями, які були більш вірні принципам дружби, ніж я.\n\n- Тоді чому ви мовчали? - Запитала вона з усією щирістю. - Що гармонійного в масових убивствах і переслідуваннях? \n\n- На жаль, огидні вчинки - єдине, що може заспокоїти Кризаліс і її кліку, - продовжив він. - Однак, заручившись їхньою довірою, ми вкрали в чейнджлінгів плоди Гіперберії. І ми можемо використати їх у боротьбі проти полярних духів-зрадників. Моя душа страждає від того, що я був провідником загибелі нашого будинку в минулі епохи, але тепер, коли цей жорстокий фасад не потрібен, немає потреби брехати і проявляти безчестя... Він поклав лапу на груди і щиро продовжив говорити, - Але ж і ви знайомі з безчестям. Загинули ваші друзі-поні, інші друзі-гармоністи, а ваша преса тільки й робила, що зображувала емоції перед камерами. Ви могли запитати, могли дізнатися, що я задумав... але ви обрали шлях боягузтва і мовчали.\n\n\nЙого лапа ткнула Біксбайт у груди.\n\n- Чи не так..."
 northern_protectorate.37.a:0 "Засідання відкладено, поні закриють на це очі. Поки що."

 northern_protectorate.38.t:0 "Розколоти панцир кризалісму"
 northern_protectorate.38.d:0 ""37. Лейтенант Джеронімус: Ініціював операції гармоністів під "фальшивим прапором", після чого влаштовував розстріли."\n"38. Майор Нодус: Володів системами "міської безпеки", які невибірково вбивали поні, що порушували кордони."\n"39. Мер Лорніва Бош: підтримував Кризаліс, збирав інформацію про гармоністів-агітаторів, влаштовував убивства."\n\nСписок, що лежав перед Скалміром, секретарем Бйорнлінґа, був дуже довгим. Відтоді як Протекторат став дивно гармонійною Гіперберією, Бйорнлінґ почав перекладати на нього дедалі більше завдань, "бо диктатори, які роблять усю роботу, це не гармонійно".\n\nТаки, дехто з цього списку має померти, але не всі. Частина не зробила нічого значного; вони здригнулися, підкорилися наказу під силовим примусом. Усі могли погодитися, що Бйорнлінґ був суворий, але Кризаліс була безтурботна і дурна, розправляючись зі своїми найбільшими умами через незначні розбіжності. Тому з міркувань практичності лише найгірші потраплять під роздачу.\n\nАле цінність є і в тотальній зачистці. Так, мертві чейнджлінґи не принесуть користі. Але так можна було б домогтися більшої довіри з боку поні. Адже дружба з поні - цієї купки гармонітів із вогняними душами - могла бути важливішою за мудрість прощених і помилуваних чейнджлінгів.\n\nДо кінця роботи до списку буде внесено безліч коментарів і зауважень. І зрештою Бйорнлінґ погодиться з вердиктом Скалміра, який говоритиме наступне:"
 northern_protectorate.38.a:0 "Обмежитися найбільш кричущими проявами жорстокості"
 northern_protectorate.38.b:0 "Еквестрія має знати, що ми на їхньому боці."

 northern_protectorate.39.t:0 "Фронт фронту"
 northern_protectorate.39.d:0 "Нашвидкуруч виготовлені прапори і карти усіяли імпровізовану і пропахлу сигаретами хатину, де зібралися офіцери Чейнджлінґської Армії Визволення. - Перші збори сил ЧАВ оголошуються відкритими! - зачитав свої записи виснажений Карапас, на чиїй голові криво висів кашкет гвардійця королеви. - Яка наша мета? Так, Тарсомер, запам'ятовуй! Чому мені дісталися чейнджлінґи, у яких зовсім немає мізків!? Добре, повтори! "Боротися з проклятою системою на чолі з Кризаліс та її поплічниками." Бла-бла-бла, ви читали все інше. Усі згодні? Далі, ідеали нашого потенційного короля Торакса...\n\n- Дезертир! - Крикнула Іск'я. - Навіть якби я була гармоніткою, навіщо нам битися за нього? - Половина присутніх підтримала її. - Скажіть поні, що в нас є гармонія, і все! Нехай ці поні випробують наш сорт гармонії!\n\n- Ти ж не серйозно! - Карапас огризнувся, витягуючи пістолет. - Я не дозволю прискіпливим чейнджлінґам на кшталт тебе уповільнити процес! Це ж фальшиве прикриття. Думаєш, ці поні захочуть прочитати дрібний шрифт у нашому маніфесті? \n\n- Ти тупіший за поні? Вони ж вміють читати! Прочитай це! - Пістолети покинули кобури і кулі почали дірявити стелю. Коли боєприпаси закінчилися, прийшов час наручників. Потім на місце події прибули місцеві ведмежі констеблі. Усім чейнджлінґам було наказано припинити сперечатися, тому що словесні бійки "не гармонійні".\n\nГуркотун, який бурчав упродовж усієї годинної "цивільної дискусії", вихопив свій розряджений пістолет і вигнав із кімнати констеблів нижчого рангу, після чого запалив сигарету. - Добре. Тепер у нас тут тиша і спокій. І більше ніяких розмов. Ми зовсім просмажили свої мізки, дозволивши всьому цьому затягнутися. Давай просто... визначимося:"
 northern_protectorate.39.a:0 "- Ми - гармоністи, ось і все. Задоволені?"
 northern_protectorate.39.b:0 "- Торакс - законний король, а тепер забирайтеся.""

 northern_protectorate.40.t:0 "Гіпердипломатія"
 northern_protectorate.40.d:0 "Найкращий боєць Бйорнлінґа готувався до бою. Він готувався визначити тих, хто виявиться гідним через звичне випробування поєдинком.\n\nКоли за півгодини його боєць, похитуючись, залишив арену, Бйорнлінґ зажадав, щоб ті, хто вижив, - не тільки ведмеді, а й чейнджлінґи - зібралися перед ним в одну шеренгу.\n\n- Випробування на витривалість, змішане з випробуванням на інтелект! - Проголосив він. - Ще раз повторю, що нерозумно намагатися сподіватися перемогти першого гіпермедведя нової епохи, але те, як довго ви протистояли йому, гідне захоплення. Ви всі - гіперведмеді та гіперчейнджлінґи! \n\n- Але є ще одна річ, яку необхідно зробити. - Він підняв лапу і вказав нею на південь. - Це невелике, але благородне завдання. У Кантерлоті проживає самопроголошений і зарозумілий лідер так званого "вільного світу". Попри свою зарозумілість, Еквестрія має чимало гіперберійських технологій. І хоча вони є адаптацією, та й самим поні бракує інтелекту, вони компенсують це величезною чисельністю. Заручіться вірним союзником в особі цих поні, і Кризаліс буде підкорена! Вперед, мої... гіпердипломати.\n\nСкандування "Рах! Рах!" гриміло над ареною, коли дипломати виходили на переможний марш. Ведмеді підкидали сокири високо в повітря, а чейнджлінґи в екстазі злітали в небо. Незабаром один чейнджлінґ загинув від необережного кидка клинка, але його оголосили іконою стійкості перед обличчям (ненавмисної) зради. І вони попрямували в Кантерлот..."
 northern_protectorate.40.a:0 "Нехай духи ведуть нас."

 northern_protectorate.41.t:0 "Дотик Півночі"
 northern_protectorate.41.d:0 "Серед постійного потоку поні, що проходять через ворота урядових палаців, сьогодні можна було помітити несподіваних гостей у вигляді об'єднаної свити чейнджлінґів і полярних ведмедів. Вони стверджували, що прибули з Північного Протекторату, держави, підпорядкованої королеві Кризаліс. Але тепер вони стали Гіперберією. Країною, вірною цінностям гармонії.\n\nВедмедям хотілося б вірити, але звіти й розповіді тих, хто втік із Протекторату, розповідали зовсім про інше. Про нечесні суди і моторошні експерименти, про велике національне полювання на тих, хто наважувався встати на шляху безжального лідера Протекторату. Це і багато іншого суперечило їхнім, нібито, гармонійним ідеям.\n\nОднак гіперберійці визнали реальність цих злодіянь. Їхнє алібі полягало в тому, що насправді всі ці звірства були маскуванням, щоб обманювати Кризаліс доти, доки не настане слушна нагода, щоб вдарити їй у спину. Ну і ще варто зазначити, що культура полярних ведмедів ще з початку часів славилася своєю "цивілізованою дикістю". Дипломати, апелюючи до Елемента Доброти, попросили в нас вибачення. Як письмово, так і пропонуючи відшкодування збитків протягом наступних місяців і років.\n\n[ROOT.GetLeader] повинна була прийняти рішення. З одного боку, було б непогано розширити фронт боротьби з чейнджлінґами і якнайшвидше закінчити війну. З іншого боку, не так-то просто так швидко повірити лукавим істотам із цієї... Гіперберії."
 northern_protectorate.41.a:0 "Ми підтримуємо ведмедів та їхніх друзів-чейнджлінґів"
 northern_protectorate.41.b:0 "Злочини, які вони скоїли, неможливо пробачити."

 northern_protectorate.42.t:0 "Справжня королева?"
 northern_protectorate.42.d:0 "У повітрі прямо-таки витало захоплення. Хоча Бйорнлінґ не збирався одружуватися з Ексувією, підготовка до справжньої коронації королеви-чейнджлінґа свідчила про протилежне. Кожен дюйм Соріфа був мобілізований для святкування: кілька команд збирачів квітів було відправлено на пошуки цього рідкісного в полярних землях ресурсу, на честь свята готувався фестиваль брутальних наук, а ніч феєрверків завершиться показом корони, яку сама Ексувія кувала останні кілька місяців - як стверджувалося, усередині корони перебувають душі її предків. \n\n- Що? - Спантеличено перепитав Бйорнлінґ після того, як Скалмір розповів йому про права й привілеї королівського статусу Ексувії. - Точно... Ти маєш рацію, я забув. - Амбіції Ексувії стосувалися тільки наукової, не політичної сфери. Судячи з усього, її цілком влаштує роль маріонетки, якщо вже вона отримала повну владу над своїм домом. До того ж передавати владу Ексувії, не змусивши її боротися за неї (не те щоб вона стала б боротися: вони були - Бйорнлінґ відчував огиду до цього терміну - кращими друзями), було цілковитим блюзнірством, на яке не погодився б жоден розсудливий ведмідь. Але нагляд за країною стомлює, а Бйорнлінґ, за всіх його чеснот, не був народжений політиком. Ще не було винайдено механізованих духів, які могли б доставляти йому дані з усіх куточків цього арктичного домену для спрощення прийняття рішень. Поки що управління країною, що швидко зростає, приносило йому більше головного болю, ніж слави... а з урахуванням того, як швидко чейнджлінґи "обростають сім'ями", незабаром їхня кількість зрівняється з чисельністю ведмедів. Тож Ексувія, мабуть, краще представить полярних духів.\n\nТим не менш, через кілька годин Ексувії доведеться дізнатися про масштаби своєї влади. Бьорнлінг закінчив розмову зі своїм секретарем і тепер мав особисто зустрітися зі своєю дорогоцінною Ексувією, щоб повідомити їй новини:"
 northern_protectorate.42.a:0 "- Мій найбільший подарунок тобі - вся Гіперберія."
 northern_protectorate.42.b:0 "- Я правитиму усіма ведмедями, а ти - чейнджлінґами."

 northern_protectorate.43.t:0 "Дивні звістки"
 northern_protectorate.43.d:0 "Біксбайт, голова еквестрійської делегації в Гіперберії, не могла в це повірити. І жодні слова молодших членів її делегації не могли переконати її у протилежному: вони відпустили Бйорнлінґа безкарним. \n\n\nПовідомлення і зізнання про те, що відбувалося за білосніжною завісою, приходили одне за одним від усіх, хто не був полярним ведмедем. Ким же вважали поні ці ведмеді, що виросли в безжальному і похмурому кліматі? Довірливими різнокольоровими іграшками, що говорять? [EQS.GetLeader] мала б зрозуміти це і засудити цих лукавих "гармоністів"! Але реалії реалполітики виявилися сильнішими, підштовхнули її сказати "так" і "амінь" Бйорнлінґу перед безліччю фотокамер. Сам Бйорнлінґ явно отримував задоволення від того, як важко йому тримати зроблену для поні чорнильну ручку. У натовпі лунало хихикання - ввічливе, яке приймало той факт, що Бйорнлінґ недосконалий і що він бачить гумор у тому, що його розміри занадто великі для поні Еквестрії. Це лише дратувало її і доводило до точки кипіння.\n\n- Я хочу подякувати вам за розуміння, - щойно більшість репортерів пішли, Бйорнлінґ заговорив із Біксбайт, так що вона була змушена зберігати свою вимучену добродушність. - Ми можемо сильно різнитися в наших поглядах щодо гармонії, але наша об'єднана різноманітність сама по собі є проявом гармонії. Хай живе шлюб між Всеотцем і вашими богинями-принцесами.\n\n\nПотрясена Біксбайт проковтнула свої емоції і кивнула, намагаючись потиснути його величезну лапу. - Так, хай живе цей... шлюб?" Як ви, поні, кажете, “доки смерть не розлучить нас”, - сказав він, - і нехай будуть боги пов'язані з нашими предками і нащадками. Нехай говорять вони з нами ясно. І нехай направлять вони нас проти антисвітового кризалійського осквернення!"
 northern_protectorate.43.a:0 "Він справді не сповна розуму"

 northern_protectorate.44.t:0 "Радісні ознаки"
 northern_protectorate.44.d:0 "- Союз Гіперберії та Соріфа відроджено! - Кричала Ексувія, танцюючи на сходах своїх особистих покоїв. Її сестра, Екдісіс, була запрошена на святкування перемоги. Решта членів королівської сім'ї її матері вважали за краще не приїжджати. - Які ж лошата ці поні! Я знала, що вони дурні, але не НАСТІЛЬКИ! Ні, за нашим планом із Бйорнлінґом вони мали згуртуватися проти звичайного хижака, як стадні тварини, якими вони і є! Тепер, коли вони стали на наш бік, вони й не зрозуміють, що їхня довіра... ЗРУЙНОВАНА! Їхня віра в гармонію буде розірвана гіпервійною в полярному полум'ї! Їхні недосконалі форми розпадуться від моєї команди! А в цей час ВИ, саме ВИ підете під суд! Саме ВИ будете працювати на нас, будете рабами у великій Гіперберії... у Сорифі!\n\n- Жереб'ята? - Повторила Екдісіс, відмовляючись відчувати страх перед охоронцями, готовими ось-ось закувати її в ланцюги. - Ти думаєш, усі ці поні - жереб'ята? Вони можуть бути довірливими, так. Але вони проявили себе на війні. А далеко від битви? Політики не можуть бути довірливими. Інакше це вже не політики. До речі, а хіба ти сама не демонструєш свою довірливість сьогодні? - Вона вказала на охоронців, які щойно затримали її.\n\n- Ти щойно з чималою зловтіхою розповідала мені про свій план. І всім, хто був поблизу.\n\n\nЕксувія підлетіла прямо до її морди. Це можна було використати з користю, бо не можна було заперечувати величезну різницю в розмірах сестер. - Ніхто тобі не повірить! Ми побудували цю "гармонію", і в нас є репутація "гармоністів". Вони тільки скажуть, що нас неправильно зрозуміли, ось і все.\n\nНе дивлячись на те, що їй належало відправитися до в'язниці, Екдісіс тримала голову високо піднятою. - Так, на даний момент це може спрацювати, але ти тільки відкладаєш неминуче. Може, ти й найрозумніша чейнджлінґка у цій кімнаті, Ексувія, але ти занадто дурна, щоб навіть усвідомити свою помилку."
 northern_protectorate.44.a:0 "Вартові забрали її сестру, а Ексувія зберегла свою славу."

 northern_protectorate.47.t:0 "Нульовий світанок"
 northern_protectorate.47.d:0 "Ви повинні це побачити". Деякий час тому Бйорнлінгу сказали ці слова, і тепер він, вдягнений у захисне спорядження ПКС-Н7, справді побачив це: місто, що стало пусткою величезних розмірів. Напівзруйновані хмарочоси понуро кренилися на тлі радіоактивних бурей, що вирували далеко на горизонті. Над облупленими будівлями клубочився нудотний блювотно-зелений туман... Схоже, що це столиця великої держави, - зазначив механіт-командир загону ПКС-Н7, намагаючись перекричати свій детектор радіації, що шалено клацав. Завдяки силовій броні його загін міг не боятися радіоактивних опадів протягом дюжини годин. - Інакше навіщо тут стільки бункерів? - Вголос не було сказано, що загинули мільйони, якщо не мільярди. Не було знайдено жодних слідів тих, хто вижив, які, нібито, були триногими. - Що нам тут робити? \n\n- Розграбуйте це місце, - наказав Бйорнлінґ. - Шукайте креслення і документи з усього, що пов'язано з ядерними технологіями. Огородіть це місце для проведення досліджень. Координуйте дії з нашими шпигунськими та дипломатичними агентствами. Пошліть сюди стільки персоналу, скільки зможете; одних тільки знань недостатньо.\n\n\nВедмідь на мікросекунду завагався. - Гарна пропозиція, але ці костюми призначені тільки для ведмедів з елітних підрозділів на кшталт нашого. Це може бути не так ефективно для тих, хто не...\n\n- То вирішіть цю проблему, - з гарчанням відповів Бйорнлінґ. - Хіба не цим славляться механіти? Ви ж пишаєтеся своєю здатністю адаптуватися на ходу? А ще, - він напустив на себе задумливий вигляд, - наших агентів мають оточувати безкланові ведмеді. Це можливість для них випробувати переваги наших міжпросторових проломів."
 northern_protectorate.47.a:0 "Без'язикі мертві підкоряються ще не померлим."

 northern_protectorate.49.t:0 "/УРИВОК/ДОЗВІЛ РІВЕНЬ 7\"
 northern_protectorate.49.d:0 ""У наркотичних глибинах він засинає, але під сімома, ні, вісьмома табу-геасами наші найкращі вирізають руни на наших душах." - Гейрлауг\n\n"Бути сіверянином - значить бути разом, хоч і неусвідомлено. Кров різних видів, жуків і ведмедів, пінгвінів і грифонів, була отримана заради нашого єдиного божественного походження." - Уннр\n\n"Безособовий черв'як не може осягнути розумних істот. Розумні істоти не можуть осягнути надрозумного Всеотця." - Малмурі\n\n"Ми є пігменти фарби, розмазані навколо, щоб зобразити прекрасну картину. Запитайте фарбу, запитайте пензель, і адже він не зрозуміє, що є хороший, чистий біль, який чинить руйнування, що реформує." - Бене\n\n"Залиште нас у спокої, щоб пощадити наші душі! Дозвольте нам уникнути ваших пут, їдкої відрази від легкості розщеплення і від закручування пилинок у штопор - тієї легкості, з якою ви вправляєтеся в проходженні через наші виміри." - Свæйна\n\n\n "У результаті завдання прочухана істотам були виявлені поклади рідкісних металів." - Бьорнлінг"
 northern_protectorate.49.a:0 "-КОЛЕСА/ГУСЕНИЦІ ТИСНУТЬ/ПОЦІКАВТЕСЯ/ЯКІ СУПУТНІ/БОЛЬОВІ ВІДЧУТТЯ У МУРАХ/РОЗМІР"

 northern_protectorate.50.t:0 "Коронація первозданної королеви"
 northern_protectorate.50.d:0 "Кожен аспект заходу, кожна найдрібніша деталь були відшліфовані до досконалості, і Екдісіс не могла повірити, що Ексувія колись сама організує щось подібне. Зал був величезний, блідо-крижані підлоги з подібного до мармуру каменю вкривали зруйновані поверхні першого поверху великої вежі Весаліполіса, перетвореної тепер на один гігантський коронаційний зал. Величезні колони з каменю і сталі змінили стіни другого поверху. На них були вигравірувані символи, що представляли особливості культури ведмедів і чейнджлінгів до того, як вони стали одержимими грифоновим Герцландом. Крижані скульптури, що уособлюють цінності гармонії, співробітництва, любові та братерства, підтримувалися магами Розенсверда, які якимось чином приховували від світу свій істинний жахливий вигляд. Десятки тисяч чейнджлінґів входили до зали й терпляче розсаджувалися на незліченних рядах стільців. Вони робили це навіть надто терпляче, немов хтось опанував їхній розум. Потім увійшли королеви і члени їхніх родин, одягнені в мантії, що представляють їхні вулики, і зайняли найважливіші місця. Зрозуміло, все це було фарсом: королеви були такими ж полонянками, як і Екдісіс. "Гармонійні" суди засудили їх до довічного ув'язнення, а тепер Бйорнлінґ і Карапас примусили їх до підпорядкування. Навіть зараз чудовиська та їхні послідовники чекали зовсім поруч із королевами. І загроза насильства була невисловленою, але дуже відчутною для тих, хто бачив монстрів під лицарськими обладунками, мундирами визволителів та іншими ілюзіями. Екдісіс сподівалася, що представники поні побачать істину крізь міражі... Але коли Ексувія, вбрана в золоті обладунки із зоряної сталі та білі хутра, піднялася на крижаний поміст і отримала свою срібну корону, поні не звернули на це уваги. Коли нова "первозданна" королева заговорила про нову еру єдності між расами, гармонію з недоторканою природою, повернення до початкових культур і відмову від сучасних війн, поні захлопали. А коли королеви схилили голови на знак покірності, ніби визнаючи перевагу гармонії, еквестрійські представники розплакалися від радості. Адже вони бачили прекрасне видовище: люблячу науку королеву-гармоністку в золотих обладунках, яка ніби зійшла зі сторінок історій для лошат..."
 northern_protectorate.50.a:0 "І тому вони не помітили, що посмішка королеви була наповнена гострими зубами"

 northern_protectorate.51.t:0 "Нескінченний цикл праці"
 northern_protectorate.51.d:0 "На той час, коли Спіракл почав працювати на фабриках, Соріф відмовився від незалежності на користь Весаліполіса. І все ж були літні чейнджлінґи, які бурчали про те, як під час підготовки до війни з Кризаліс в ім'я величі Соріфа їм подовжили робочий день. Почавши працювати на заводі, Спіракл уже не чув подібних заяв, оскільки їхня праця вже була пов'язана з величчю чейнджлінґів, а трохи пізніше - з помстою Еквестрії. Потім на якийсь час старі плакати зняли, пропагандистські трансляції вимкнули, замінивши їх тими, що були спрямовані проти жахливих ведмедів. А потім нова пропаганда зникла так само швидко, як і з'явилася, і вони почали виробляти зброю для союзника Соріфа і Чейнджлінґії - Бйорнлінґа, ведмедя, і його армії... теж складається з ведмедів...\n\nКоли почалася Велика Війна, наративи пропаганди змінювалися ледь не щодня, оскільки до війни долучалися нові країни, проти яких треба було воювати, щоб забезпечити велич Чейнджлінґів. І всі ці країни зображувалися як кровожерливі лиходії, що прагнуть позбавити чейнджлінгів любові та величі, на які вони заслуговували. І тоді ведмеді завдали удару у відповідь чи це було повстання таємних гармоністів? У ті дні важко було сказати, адже сюжети пропаганди змінювали один одного, і здавалося, що весь світ проти них... А потім вони знову стали Соріфом і працювали на славу його...\n\nТепер вони були "гармонійним" "Первозданним Королівством Чейнджлінґів-Ведмедів" і працювали на ім'я його слави, яка нікого з них уже не хвилювала. Бо насправді їх хвилювало лише те, що їхня королева перейшла на систему квот і почала видавати ситні пайки зі справжнім м'ясом усередині. І до цього моменту всі на фабриці були задоволені змінами і можливістю закінчити роботу до заходу сонця. І ніхто не ставив запитань, коли мотиви пропаганди знову почали змінюватися..."
 northern_protectorate.51.a:0 "Бо сяюче сонце і біле небо були такими прекрасними..."

 northern_protectorate.52.t:0 "Вільна Журналістика"
 northern_protectorate.52.d:0 "Яра звично для недавніх часів почала ранок з чашки хорошого чаю, невеликої порції любові, яку тепер продавали на кожному розі замість того, щоб видавати як пайок, і газети. Така розкіш після довгих років жорсткого нормування під владою Кризаліс здавалася нереальною і сюрреалістичною, але схоже, що новий режим міг діставати багатства з нізвідки.\n\nНові газети теж були дивиною, а так звана "вільна" журналістика була набагато цікавішою за пропаганду Кризаліс. Статті та репортажі розповідали про відновлювальні роботи, про полювання на вірних Кризаліс партизанів, про судові процеси над тими, хто скоїв злочини проти гармонії, які все ще тривають. Однак не все було так серйозно: кілька сторінок було присвячено придворним пліткам і оглядам моди. Яра швидко перегорнула їх, перейшовши на останню сторінку газети - там показували результати матчу з рестлінгу з ведмедями, і вона поставила непогану суму на якогось дикуна з гір.\n\nІ тут її погляд зачепився за статтю під заголовком "Відсутність демілітаризації в Еквестрії демонструє провал гармонії? - Армійські експерти розійшлися в думках". Це було... щось новеньке? Нічого подібного раніше не публікувалося. У статті кілька військових експертів з Еквуса та Грифонії ділилися своїми думками про армію Еквестрії та відсутність ознак демілітаризації, попри безліч союзних їй режимів. Ніхто не говорив про плани алікорнів, але Яра не могла позбутися відчуття, що це небезпечно для чейнджлінґів і загрожує її новому процвітанню. Подібні статті виходили майже щодня, у них розповідалося про економіку, політику, армію. У статтях не йшлося про небезпеку з боку Еквестрії або алікорнів, але не можна було позбутися відчуття, що вони були готові ось-ось щось зробити... Яра говорила про це зі своїми друзями, колегами, сім'єю, і всі вони відчували те саме, ніби настає якийсь "перелом". Наче поні щось замишляють... І всі вони пам'ятали, що під час війни, до того як Ексувія зробила свій хід, поні були готові йти на столицю..."
 northern_protectorate.52.a:0 "Можливо, ми занадто сподівалися, що вони залишать нас у спокої?"

 northern_protectorate.53.t:0 "Перед новою королевою схиляються коліна"
 northern_protectorate.53.d:0 "Зрадники захопили його в нескінченному пеклі, яким був Вракс. Вони знущалися з нього, били його, тримали в якомусь забутому богами приміщенні, аж доки він не ослаб від холоду й відсутності пайка, щоб чинити опір. Було дуже неприємно ламатися від такої дрібниці, але в цьому холоді було щось злісне, щось підступне, немов він був живим і міг ненавидіти. І ось тепер він постав перед архіпредателем Карапасом і якоюсь гидотою у вигляді чорного ведмедя з палаючими фіолетовими очима, які, судячи з усього, готувалися засудити його... \n\n- Ласін Кардо, у всій своїй неживій величі. Наскільки відомо світу, твоє тіло було знайдено під гусеницями важкого танка. - У Ласіна не було бажання відповідати на зловтішні фрази зрадника-Карапаса. - Я б, звісно, із задоволенням перегриз тобі шию і зжер твою плоть, але в королеви інші плани. Ми можемо помилувати тебе і повернути тобі генеральське звання, але ти будеш битися за нас. На столі лежали документи: його нова особистість, заснована на якомусь загиблому добровольці-гармоністові, передісторія того, чому він бився й дістав підвищення, список вищих офіцерів, що перейшли на його бік ще до нього, і "Абетка первозданної доктрини". І тут до нього дійшов істинний сенс усього цього. Ласін відчув, як лють розтопила лід, що скував його серце. Він вискалив зуби на Карапаса, який лише посміхнувся, оголивши власні огидні ікла.\n\n- Я не зраджу велику королеву заради зрадницького наброду і варварів на кшталт вас усіх! - Він закричав і спробував напасти, вкусити, але тут його огорнула темрява...\n\n- Тоді ти загинеш, як черв'як. Через королеву, яка втекла зі свого королівства... - Реальність зникла, він бачив тільки ці ненависні фіолетові очі. Ласін відчув, що його череп схопили сталеві кігті. - ... Почуй мій голос, паразит. Якщо тобі пропонують пощаду, владу і помсту, ти змиряєшся і погоджуєшся. Ще одна нікчемна дія, що личить дитині, а не дорослому, і я поглину твій розум і стану ляльководом твоєї плоті, тож ти будеш битися за нас живим або мертвим... І тут до нього повернувся зір: він побачив Карапаса, що посміхається, і ці ненависні фіолетові очі, які запропонували йому вибрати тип власного рабства."
 northern_protectorate.53.a:0 "Його тіло здригалося, він змінював свою форму, як і десятки до нього..."

 northern_protectorate.99.t:0 "Другий етап"
 northern_protectorate.99.d:0 "У Бьорнлінга вже давно є блискучий план, найкращий з усіх, що коли-небудь існували. І план полягає в наступному:\n\nСтадія 1: Цілувати копита чейнджлінґам доти, доки вони не віддадуть йому Північний Протекторат як особисту вотчину.\n\nСтадія 2: Розпочати Третю Об'єднавчу Війну, щоб стати одноосібним лідером усього ведмежого роду. \n\nСтадія 3: Використовувати промисловість, науку і гроші чейнджлінґів для розробки потужної зброї та швидкої модернізації країни.\n\nСтадія 4: -ВИЛУЧЕНО-\n\n\nІ незабаром славу Північного Протекторату затьмарить ще більш велика слава......"
 northern_protectorate.99.a:0 "За ведмежий рід!"

 northern_protectorate_eqg.1.t:0 "Відображення"
 northern_protectorate_eqg.1.d:0 "Прорив в інші виміри - завдання не з легких. Ми точно знаємо, що інші світи існують. Але тканина реальності стійка до спроб прорвати її, і хоча їхня магія поступається нашій, поні Півдня провели значно більше досліджень у цьому питанні, ніж ми. Але вони - боягузи і багато чого зі зробленого поні було забуто або пішло настільки невдало, що вони поклялися більше ніколи не повторювати таких експериментів. Але ми, ведмеді, не здаємося так легко.\n\nДосі нашим шаманам було важко повторити досягнення еквестрійців. Незважаючи на підготовку і зосередженість шаманів, що дають їм змогу бачити виміри, до яких ми хочемо потрапити, ми не маємо точки фокусування, що дає змогу створити зв'язок. Нас переслідували невдача за невдачею, аж до того, що вся операція опинилася під загрозою закриття через розтрату ресурсів за відсутності успіхів.\n\nАле потім стався прорив. Подальший аналіз дав нам ключову інформацію: ми дізналися про існування магічного дзеркала, за яким, якщо вірити легендам, існує альтернативне нам суспільство. Ба більше, є безліч інших дзеркал, створених великим магом-поні в незапам'ятні часи. І кожне з цих дзеркал веде у свій вимір. А раз слабкі поні зуміли здійснити це, то ми, ведмеді, і поготів зможемо повторити цей подвиг! Ми повинні доручити нашим найкращим шаманам негайно створити власні дзеркала, щоб принести славу прийдешньої міжпросторової Гіперберії!"
 northern_protectorate_eqg.1.a:0 "Негайно до роботи!"

 northern_protectorate_eqg.2.t:0 "Те, чого ми не шукаємо"
 northern_protectorate_eqg.2.d:0 "Перші випробування з відтворення дзеркал-порталів створили видимість успіху. Хоча тягар порушення реальності, навіть у такій стабільній царині як поверхня дзеркала, виснажив навіть наших найталановитіших і найсильніших шаманів, вони все ж таки досягли того, що раніше вважалося неможливим. Самі рами дзеркал були дуже витіюваті й оздоблені найталановитішими ведмежими ремісниками, щоб символізувати нашу велику перемогу над ще більшою кількістю ланцюгів, які приковували нас до цієї реальності... Але хоча це була справді велика перемога, ми відчули деяке розчарування, побачивши плоди успіху. Деякі виміри виявилися геть непридатними для життя, миттєво вбиваючи окремих ведмедів або навіть цілі загони дослідників своїми отруйними газами, відсутністю придатного для дихання повітря чи палючою спекою. Ті виміри, які ще не були абсолютно ворожими для нас, виявилися порожніми і безплідними пустками, де ми не змогли знайти жодних місцевих мешканців. У вимірах, багатих на ресурси, займуться видобутком корисних копалин на славу Гіперберії. Але схоже, що число населених вимірів набагато нижче, ніж ми припускали спочатку. Наразі ми не в змозі підтримувати виробництво дзеркал, необхідних для подальшого дослідження вимірів. Поки не буде знайдена нова альтернатива, ми будемо змушені тимчасово припинити подальші дослідження і вишукування в цьому напрямку."
 northern_protectorate_eqg.2.a:0 "Поки що ми задовольнимося цим."

 northern_protectorate_eqg.3.t:0 "Падіння крізь виміри"
 northern_protectorate_eqg.3.d:0 "Афкарр перебував у якійсь забутій богами і предками глушині.\n\nВін, звісно, знав, де перебуває. Глибоко в горах, неподалік від твердині Вольсунґра, під час звичайного патрулювання місцевості. Гіперберія завжди повинна бути напоготові, навіть у своїх власних землях, і Афкарр був одним із тих багатьох, чиї очі заглядали навіть у найвіддаленіші місця. Він знав кожен стручок, кожен яр і кожен сніговий вал як свою лапу.\n\nАбо він так думав. Недавня буря змістила великий пласт снігу, який він колись вважав стійким, і заблокувала його звичайний шлях. І тепер він був змушений обрати інший, більш підступний маршрут через широкий яр. Афкарр знав, що падіння тут означає вірну смерть, і з особливою обережністю перебирався на інший бік.\n\nЛід. Це була зовсім невелика ділянка, але і її вистачило, щоб лапа почала ковзати. Афкарр втратив рівновагу і відчайдушно намагався вхопитися хоч за що-небудь, щоб зупинити або сповільнити падіння. Але його лапи хапали лише повітря: стіни яру зімкнулися над ним, небо стало дуже далеким, а виючий вітер сповістив про його швидку загибель... Аж тут світ навколо нього вибухнув яскравими кольорами... Спочатку Афкарр вважав, що це і є смерть. Що це світ за межами його смертної оболонки. Але коли кольори зблякли, а очі пристосувалися до нового світла, він побачив дещо незвичне: блакитне небо і зелену траву начебто прямо з країни поні. Афкарр підняв свою лапу і побачив, що і вона змінилася: він дивився на якусь вкриту шкірою кінцівку. Його хутро теж зникло. На зміну йому прийшов одяг, чий крій був схожий на ведмежий. Але все ж ці ганчірки здавалися чимось неприродним для Афкарра.\n\n- Гей, ти в порядку? - Афкарр повернув голову в бік голосу і побачив, що над ним стоїть фіолетова істота і з цікавістю дивиться через окуляри. Її волосся було зав'язане у хвіст, і вона виглядала до дивного знайомою. Не отримавши відповіді, вона помахала однією зі своїх кінцівок на знак привітання.\n\n- Я Твайлайт Спаркл. А як тебе звати?"
 northern_protectorate_eqg.3.a:0 "Це те, що ми шукали?"

 northern_protectorate_eqg.4.t:0 "Вирішення наших проблем"
 northern_protectorate_eqg.4.d:0 "Воістину, самі виміри бажають успіху в досягненні Гіперберії - нашої славної мети, бо ми знайшли розв'язання всіх наших проблем! \n\nОдин із наших розвідників повернувся з просто фантастичною новиною: він знайшов природний портал у горах, що веде в населений вимір. Цей світ уже відвідували поні і там є повністю функціонуюче суспільство, тож ми одразу ж відправили туди додаткові команди для розвідки. Щойно ми переконалися в достовірності інформації, наші розвідники повернулися з новинами, які перевершують наші найсміливіші сподівання - цей світ набагато розвиненіший і в ньому царюють загадкові двоногі істоти. Хоча на цей світ уже явно справила значний вплив гармонія Еквестрії (тут навіть є власні версії героїв Еквестрії), потенціал цього виміру безмежний. Нам доведеться бути обережними, щоб не стривожити місцевих розкриттям нашої істинної природи або мети через їхні симпатії до поні, але досі вони були відносно поступливими та із задоволенням допомагали нашій експедиції. Наші дослідники вже розпочали підготовку численних пропозицій щодо використання переваг цього світу на благо Гіперберії. Експедиції знадобиться певний час, щоб пристосуватися до зміни своїх тіл під час проходження через портал, але вони винахідливі й наполегливі. Щойно ми закріпимося там, ніщо не зможе зупинити нас.\n\n\nНа славу Гіперберії!"
 northern_protectorate_eqg.4.a:0 "І на славу ведмедів!"

 northern_protectorate_eqg.5.t:0 "Ті, кому ми не можемо допомогти"
 northern_protectorate_eqg.5.d:0 "Одним із небагатьох недоліків переходу в інший світ є втрата наших справжніх ведмежих форм. Без нашої виняткової сили і полярної магії нам дуже складно вживати агресивних заходів проти корінних жителів цього світу, особливо з урахуванням того, що деякі з них уже використовують магію еквестрійців. Однак наші розвідники повідомили чудову новину: розпитавши деяких студентів у місцевому освітньому центрі, вони дізналися, що полярні ведмеді все ще існують у цьому вимірі у своєму справжньому вигляді. Але, на наш жах, їх тримають у зоопарках, у клітках, що стримують їхню справжню міць, щоб місцеві жителі могли спостерігати за ними з безпеки. Варто відзначити похвалою крайню стриманість членів експедиції, які спершу повідомили про свою знахідку, а не кинулися мститися. Тому Бйорнлінґ зміг підготувати план звільнення побратимів з кайданів. На жаль, цим планам не судилося реалізуватися після зіткнення з реальністю. Незважаючи на всі наші зусилля пробудити розум у місцевих ведмедів, вони продовжили залишатися дикими і розумними істотами. Ба більше, наші технології не працюють, коли ми намагаємося насильно просвітити їх, що, на думку шаманів, є результатом відсутності полярної магії в цьому вимірі. Будь-які подальші серйозні спроби вступити в контакт із місцевими ведмедями, найімовірніше, викличуть підозри в аборигенів, що призведе до закриття проєкту. Ми розглядаємо можливість проведення в далекому майбутньому операції з пошуку ведмедів, які, як стверджується, мешкають на крайній півночі. А поки що ми вважатимемо, що нашим братам по той бік порталу наразі не можна допомогти."
 northern_protectorate_eqg.5.a:0 "Колись ми врятуємо вас, браття."

 northern_protectorate_eqg.6.t:0 "Труднощі перекладу"
 northern_protectorate_eqg.6.d:0 "Велика частина технологій, які можна знайти за порталом, перевершує наші найсміливіші мрії. Там навіть є пристрої, які дають змогу практично миттєво передавати інформацію і зв'язуватися з кимось на іншому кінці світу, а також просто неймовірно широкий асортимент їжі, яку можна знайти в будь-якому магазині. Зрозуміло, Бйорнлінґ, будучи великим лідером, негайно наказав витягти ці технології, щоб використовувати їх тут на славу Гіперберії. Адже навіть якщо ці предмети не мають безпосереднього військового застосування, одне тільки їхнє вивчення зможе просунути ведмежу науку на десятиліття, а то й на століття вперед порівняно з іншими націями в Еквусі.\n\nОднак у самого порталу, схоже, були інші плани щодо цього. Будь-яка спроба доставити високотехнологічні предмети в наш вимір призводила до того, що вони перетворювалися на різні непотрібні шматки старого електронного обладнання. Або самі ці пристрої застарівали на покоління і перетворювалися на те, що не можна назвати передовим навіть за нашими стандартами. Навіть базові схеми і креслення, на підготовку до копіювання або викрадення яких в іншому вимірі пішли тижні, стають розмитими і нечитабельними для наших учених тут. Ми зробили безліч спроб, але схоже, що магія, яка з'єднує наші виміри, не дає перетнути межу між світами будь-яким речам, що можуть становити реальну цінність.\n\n\nЗапасний план теж не приніс бажаних результатів. Найбільші ведмежі вчені та дослідники цього покоління були відправлені через портал, щоб отримати якомога більше знань з іншого боку. Вони вивчили і запам'ятали безліч інформації, ідей і концепцій, які все ще могли виявитися корисними. Але коли наші великі уми повернулися назад, щоб передати свою нову мудрість іншим, їхні спогади просто стали... туманними. Скільки б їх не розпитували, які б методи не використовували, щоб підстьобнути їхню пам'ять, вони просто не могли згадати нічого цінного. Лише окремі шматочки і фрагменти, від яких мало користі.\n\nУ зв'язку з цими невдачами проєкт почав готуватися до негайного закриття. Портал виявився одночасно благословенням і прокляттям, і Бйорнлінґ був дуже засмучений цим. Адже ми бачимо просто перед носом чудові технології, але портал не дає роздобути їх у свої лапи. Поки ми не навчимося змінювати магічну аномалію за своїм бажанням, ми нічого не зможемо тут зробити."
 northern_protectorate_eqg.6.a:0 "Клята магія поні..."

 northern_protectorate_eqg.7.t:0 "Дівчата з Полярії"
 northern_protectorate_eqg.7.d:0 "І знову наш великий лідер Бйорнлінґ вигадав настільки блискучий, неординарний і винахідливий план, що міг спасти на думку тільки йому одному. Це сталося якраз у той момент, коли дослідження порталу добігали кінця, і нашу експедиційну групу вже збиралися відкликати. Під час експедиції альтернативні версії еквестрійських героїв були досконально вивчені, і наші дослідження показали, що їхня магія походить від камнів, яким володіє кожна з них. Камені, схоже, налаштовані на конкретного носія, тому про захоплення їх для власних потреб не може бути й мови. Але найбільше Бйорнлінґа цікавила популярність і підтримка, яку вони заробили завдяки своїй музиці... І хто сказав, що ми не можемо черпати натхнення в цьому успіху? Вчені й розвідники повернулися на свої звичні пости в нашому світі, а в іншому вимірі їх змінили найталановитіші музиканти Гіперберії. Ми, можливо, нарешті знайшли спосіб проникнення в їхнє суспільство, створивши гурт під назвою 'Truer North', що спеціалізується на 'геві-метал'. Вельми дивно, але еквестрійський гурт 'Rainbooms' доволі прихильно поставився до цієї ідеї, запропонувавши нашим виконавцям допомогу в становленні на музичній сцені. \n\nЦя затія вже виправдала себе, тому що гурт став напрочуд популярним в альтернативному вимірі. Навіть Флаттершай, одна з членів 'Rainbooms', зацікавилася нашою групою та їхньою акцією зі збору коштів для 'збереження полярної дикої природи'. З їхньою підтримкою ми зможемо фінансувати Гіперберію коштами з іншого світу, щоб, нарешті, отримати хоч якусь користь від цього порталу."
 northern_protectorate_eqg.7.a:0 "Принаймні, ми щось з цього отримаємо."

 icebear.1.t:0 "Військовий переворот"
 icebear.1.d:0 "Айсбер, глава армії, флоту і ВПС, здійснив військовий переворот! Він швидко захопив контроль над країною і оголосив про створення Демократичних Ведмежих Громад Полярії із собою як верховним лідером. Поки невідомо, до чого це призведе в майбутньому, але ідеї Айсбера завжди були дивними, навіть до його вигнання до Северяни. Проте, по всій нації у кожного ведмедя на вустах одна і та ж фраза..."
 icebear.1.a:0 "Слава голові Айсберу!"

 icebear.2.t:0 "Революція поширюється на Північ" #DOT
 icebear.2.d:0 "Революція поширюється на Північ! Наш товариш Айсбер успішно здійснив переворот і взяв під свій контроль країну, яка нині відома як Полярія. Після цього він негайно запросив дипломатів зі Сталліонграда подивитися на чудеса його нового уряду. Значний флот ведмедів відконвоював наші кораблі в Магарь-Фярань. Наших дипломатів вивели з доків і провели через місто, проте ведмеді заборонили нашій делегації відхилятися від заздалегідь складеного маршруту. Наших поні відвели до колишнього палацу, який тепер прикрашали червоні та золоті прапори. Почалися переговори і Айсбер висловив бажання приєднатися до нашого Соціалістичного Союзу заради підвищення взаємної безпеки та прискорення розвитку. Коли один із дипломатів попросив показати сільську місцевість, їм знову було відмовлено під приводом того, що там нишпорять дикі монстри і безкланові ведмеді. Очевидно, ведмеді процвітають під владою свого нового лідера-комуніста, але ми все ще не отримали повної картини того, що відбувається в країні. Чи варто їм довіряти і запрошувати до нашого Союзу?"
 icebear.2.a:0 "Ласкаво просимо, старий друже."
 icebear.2.b:0 "Виглядає занадто добре, щоб бути правдою..."

 icebear.3.t:0 "Революція, що кине виклик вічності" #Ardent Custodian
 icebear.3.d:0 "Голова Айсбер випростався, коли кур'єр покірно поклав конверт на його стіл і пішов. Він простягнув лапу і присунув папір ближче, роздивляючись надрукований на лицьовому боці герб Сталліонграду, після чого з великою обережністю розкрив лист кігтем. Айсбер почав читати послання.\n\n'Голові Айсберу з Полярії. Генеральний секретар Сталліонграда отримав ваш запит на вступ до нашого альянсу. Наша делегація, яка відвідала вашу батьківщину, повернулася з винятковими похвалами на адресу систематичної ефективності та вражаючих результатів роботи адміністрації вашої держави. Північні революціонери будуть більш ніж щасливі почути, що ми офіційно приймаємо Полярію як члена нашого альянсу. Від імені всіх наших членів ми готові запропонувати свої копита на допомогу і нашим товаришам - полярним ведмедям.'\n\nАйсбер відклав лист і засяяв від гордості. Він знав, що його зв'язки в Северяні виявляться корисними. А ще він точно знав, що потрібно показати, щоб справити враження на делегацію зі Сталіонграда. Їм не потрібно було обтяжувати себе технічними питаннями. Їм достатньо було побачити досягнутий прогрес, щоб зрозуміти, що він, голова Айсбер, був виправданий у всьому, що зробив."
 icebear.3.a:0 "Слава пролетаріату всього світу"

 icebear.4.t:0 "Зрадники в домі революції" #Ardent Custodian
 icebear.4.d:0 "Голова Айсбер випростався, коли кур'єр покірно поклав конверт на його стіл і пішов. Він простягнув лапу і присунув пергамент ближче, роздивляючись надрукований на лицьовому боці герб Сталліонграда, після чого з великою обережністю розкрив лист кігтем. Айсбер почав читати послання.\n\n'Голові Айсберу з Полярії. Генеральний секретар Сталліонграда отримав ваш запит на вступ до нашого альянсу. Наша делегація, яка побувала на вашій батьківщині, повернулася звідти приголомшеною виявленим. Те, що ви створили на своїй батьківщині, не є революцією робітників: це тиранічна і деспотична диктатура, покликана підживлювати ваші марнославні ілюзії величі. Сталліонград і його товариші відмовляються асоціювати себе з вашим жахливим режимом і тому відхилили прохання Полярії про вступ до альянсу.'\n\n\nГолова зім'яв лист і жбурнув його через усю кімнату, а потім відшпурнув і стіл. Який сенс від цих зв'язків із Северяною, якщо вони навіть не змогли виконати його прохання? Який сенс від поні Сталліонграда, якщо вони надто сліпі, щоб побачити, якої слави домоглася Полярія? Що вони знали про те, як здійснювати й підтримувати славну революцію, подібної до якої світ ще не бачив?!"\n\n\nНа той час, коли Айсбер прийшов до тями, його кабінет був у повному безладі. Полярія прекрасно обійдеться і без альянсу Сталліонграда. Полярія була більш ніж готова виконати своє призначення без них."
 icebear.4.a:0 "Ми самі по собі!"

 icebear.5.t:0 "Роль мас"
 icebear.5.d:0 "Айсбер стояв на трибуні, коли він почув слова, вигукнуті якимось невидимим, але, вочевидь, дуже натхненим ведмедем із натовпу. Навіть із його надзвичайно гострим зором і слухом було важко виділити окремий голос із безлічі інших. У натовпі неможливо було розгледіти жодного індивідуума, всі вони зливалися воєдино. Як ліс, чиє коріння і гілки переплелися між собою. Проте ці слова зародили ідею в голові Айсбера. І поки вітер завивав над натовпом і майоріли прапори позаду нього, він знову заговорив своїм харизматичним, владним і впевненим голосом.\n\n- Усе, що треба! Саме вам, воїнам-робітникам, дісталася честь вершити працю революції! Наша велич, велич усіх ведмедів, спочиває на плечах багатьох! Ваша праця буде важкою, ваша сила буде піддаватися постійним випробуванням, але ви вистоїте! Ви приведете нас до величі своїм потом, кров'ю і своєю переконаністю. Ніколи не втрачайте віру в революцію. Ваша сила під моїм наставництвом приведе всіх нас до нового суспільства, і всі ми житимемо в мирі та безпеці!"\n\nСлова Айсбера породили недовге відлуння. Парочка не надто натхнених цією промовою ведмедів нервово оглянула натовп. Однак більш натхнені й радикально налаштовані ведмеді незабаром закричали на знак підтримки. І невдовзі весь натовп палав ентузіазмом. Айсбер радісно дивився на все це. Він знав, що ці ведмеді охоче помруть за нього.\n\n- Пам'ятайте про цілісність, товариші! Жодна складова частина не може бути більшою за їхню загальну суму! - Айсбер крикнув і жестом завершив свою промову."
 icebear.5.a:0 "Індивід - це мільйон, поділений на мільйон."

 icebear.6.t:0 "Роль еліт"
 icebear.6.d:0 "Будь-якому радикалу було добре відомо, що революція не безкоштовна. Протистояти державі - дороге задоволення, і Айсбер знав це від самого початку. Підтримка еліт забезпечить більш плавний перехід до його ідеального бачення держави. І тому незабаром після виступу перед робочою масою, яка гуде, він опинився в розкішному номері готелю для тих небагатьох іноземців, які наважувалися забратися так далеко на північ. Тут були присутні воєначальники, старші шамани та маги-письменники. Це була еліта суспільства, і вони з підозрою спостерігали один за одним. Щойно він увійшов, усі присутні затихли і подивилися на Айсбера з явним занепокоєнням. І хоч статус-кво, можливо, і не влаштовував нікого з них, революція принесла нові турботи.\n\n- У кожного ведмедя є право переслідувати свої мрії, чи не так? - Запитав Айсбер, притулившись до стійки міні-бару й оглядаючи купку заможних ведмедів. - Це моя мрія - створити Полярію, і ви можете стати на мій бік і встати за моєю спиною...\n\n\n-Кіготь Айсбера встромився в стійку, і вона затріщала і затряслася, коли він доклав силу.\n\n- Або ви можете стати на моєму шляху, і я поховаю вас під колективною масою тих, хто готовий померти за мене. Моя мрія може стати вашою, або ж я можу зробити її вашим кошмаром. Я впишу ваші імена в історію як зрадників і ворогів революції, і кожен, хто дізнається ваші імена, буде проклинати вас... \n\nУ відповідь на слова Айсбера почулося загрозливе гарчання, але він лише посміхнувся. - А за моєю спиною ви зможете жити так само розпещено, як і зараз. То як же ви вчините? Віддасте потрібне мені добровільно чи мені доведеться застосувати силу? Звісно, такі мудрі ведмеді, як ви, ухвалять правильне рішення.\n\nПрямо за порогом готелю юрмилися озброєні радикали, а кожне його слово було просякнуте погрозами, тож Айсбер незабаром обзавівся новими "друзями" та благодійниками. Вони користуватимуться його прихильністю. Поки що."
 icebear.6.a:0 "Кожен повинен віддавати те, що має."

 icebear.7.t:0 "Велика боротьба"
 icebear.7.d:0 "Скарги. Айсберу не подобалися скарги. Однак вони надходили від тих, кого він не міг піддати чистці - принаймні поки що - тож їх потрібно було розглянути. Але хоча б він міг розглядати їх на власний розсуд. І тому Айсбер знайшов хвилинку під час однієї зі своїх полум'яних і радикальних промов, щоб звернутися до невдоволених. На трибуні його голос змінився, а тон знизився.\n\n- Шановні товариші запитували мене: чому ми все ще боремося, незважаючи на наші перемоги? Чому ми повинні продовжувати лити кров, піт і сльози, коли ми досягли так багато? Хіба ми не повинні відпочивати і насолоджуватися плодами своєї праці? - Айсбер поставив запитання і дозволив тиші продовжитися ще мить.\n\n- Ні! - Крикнув він і вчепився в трибуну, збільшуючи гучність свого крику. - Ми не будемо зупиняти наш великий марш ні на мить! Боротьба революції ніколи не закінчиться, поки ми не дійдемо до істинної вершини нашого нового суспільства! Ми не можемо зупинитися, щоб відпочити і насолодитися нашими перемогами, інакше капіталісти і контрреволюціонери відразу зірвуть нашу велику роботу! Робітники-воїни повинні безперервно і наполегливо працювати! Капіталісти і саботажники ніколи не сплять, і робітник-воїн теж не повинен спати! Кожен ведмідь повинен без вагань продовжувати йти вперед, не витрачаючи час на відпочинок, бо його підтримують багато хто! Ми прямуємо до великого майбутнього, тому не можна зволікати!\n\nГолос Айсбера затих. І через кілька миттєвостей тиші почувся шум. Він зародився, як і завжди, серед радикалів, які вигукували майже божевільні вигуки підтримки і похвали. Вони кричали не замовкаючи, і їхній радикалізм підстьобував інших приєднати свої голоси до загального хору. Незабаром, як завжди, натовп був об'єднаний одним словом:"
 icebear.7.a:0 "АЙСБЕР! АЙСБЕР! АЙСБЕР!"

 icebear.8.t:0 "Десять принципів створення монолітної ідеологічної системи"
 icebear.8.d:0 "1. Ми повинні спрямувати всі сили на боротьбу за об'єднання всього суспільства під прапором айсберізму.\n\n2. Ми повинні шанувати великого товариша Айсбера як вічного вождя нашої партії і народу в ролі Сонця Сельвстендігета.\n\n3. Ми повинні захищати всіма силами авторитет великого товариша Айсбера і партії.\n\n4. Ми повинні гарненько озброїтися революційними ідеями великого товариша Айсбера, а також знати курс і політику партії, які є втіленням цих ідей.\n\n5. Ми повинні суворо дотримуватися принципу беззаперечної покори у виконанні вказівок, переданих великим товаришем Айсбером, а також курсу і політики партії.\n\n6. Ми повинні всіма можливими засобами зміцнювати ідеологію, силу волі і революційну єдність всієї партії на чолі з вождем.\n\n7. Ми повинні вчитися у великого товариша Айсбера і переймати його благородну розумову і моральну присутність, революційні методи і орієнтований на народ стиль роботи.\n\n8. Ми повинні цінувати політичне життя, яке нам дали партія і вождь, і віддано відплатити за довіру і турботу партії підвищенням політичної свідомості та результатами праці.\n\n9. Ми повинні встановити жорсткі організаційні правила, щоб уся партія, нація і збройні сили рухалися як єдине ціле під лідерством партії.\n\n10. Ми повинні передавати з покоління в покоління великі досягнення революції Сельвстендігета і військової революції, ініціатором якої був великий товариш Айсбер, довівши його спадщину до кінця."
 icebear.8.a:0 "Зелвфорсинтська Полярія витримає все!"

 icebear.9.t:0 "Зручний випадок" #Ardent Custodian
 icebear.9.d:0 "- Громадяни Полярії, наближається доленосний для нас день, - Айсбер похмуро, але рішуче виголосив ці слова в мікрофон, - Минулої ночі наша незламна Ведмежа Народна Армія Полярії запобігла вторгненню чейнджлінґів: рій комах спробував проникнути до наших лав, використовуючи свою мерзенну здатність до маскування! Однак ці зухвалі самозванці не могли й сподіватися наслідувати нашу вроджену велич, а наші хоробрі війська, видатні в усіх відношеннях, одразу ж розкусили їхній лукавий задум. Вони відбилися від цієї підступної зграї, але це тільки початок. Уже зараз я отримую повідомлення про те, що на кордоні збираються цілі орди цих мерзенних комах, які поступово починають готуватися до вторгнення на нашу священну батьківщину. Скоро вони спробують прорвати нашу оборону. Скоро вони спробують здійснити набіг на ваші будинки. Найближчими днями вони спробують знищити все, що ми будуємо тут.\n\n\nАйсбер вдарив лапою і похмура рішучість перетворилася на холодну лють. - Ці чейнджлінги забули, що ми готові! Завдяки нашій ідеології Полярія готова до протистояння цій огидній загрозі нашому майбутньому! Завдяки вашій безперервній боротьбі Ведмежа Народна Армія розчавить цих чейнджлінґів до порошку і зруйнує їхні жалюгідні вулики! Чейнджлінґи не знають, що вони розв'язали! Боріться за Полярію! Помріть за Полярію! Віддайте все і ще трохи, щоб втілити в життя велич Полярії! Коли вороги насміляться загрозливо встати на порозі самої Полярії, чи будете ви байдуже дивитися і дозволите їм це зробити? У бій, мої товариші! В БІЙ!\n\nІ звідусіль - від переповнених трибун до будинків воїнів-робітників і військ на передовій - почувся гучний бойовий рев. Ведмеді йшли на війну."
 icebear.9.a:0 "На війну!"

 icebear.10.t:0 "Дивне прикордонне зіткнення" #Ardent Custodian
 icebear.10.d:0 "Лейтенант Тергум перечитав щойно написаний ним звіт про результати операції, все ще намагаючись розібратися в описаних ним деталях. У цьому звіті розповідалося про нещодавні дії полярних ведмедів на кордоні і наводилася інформація про кульмінацію вчорашнього інциденту. Майже тиждень поспіль його розвідники повідомляли про озброєні до зубів патрулі, які бродили по той бік кордону і були майже готові перетнути його. Спочатку він не бачив причин для занепокоєння, але потім його солдати почали чути відгомони гарчання, які доносив холодний вітер. Чейнджлінґ не знав, чому ці полярні ведмеді стали настільки агресивні, але виявлення великої групи, що наближається до його позиції в темряві ночі, змусило лейтенанта повідомити по рації про вторгнення. Перші спроби вийти на контакт з ведмедями провалилися й були зустрінуті нападом, що призвів до того, що кілька його підлеглих були важко поранені, полярних ведмедів відкинули назад, а бідний лейтенант продовжував шукати відповіді на свої запитання. Що змусило цих полярних ведмедів настільки раптово напасти? Ні чейнджлінґи, ні ведмеді не ворогували один з одним, тож чи могли вони бути простими вигнанцями? Чи справді він і його підлеглі прогнали їх? Або ж ведмедям наказали відступити? Лейтенант Тергум потер лоб.\n\n- Сер, - перебив один із його сержантів, простягаючи радіо, - вам потрібно це почути.\n\nТергум і сержант слухали трансляцію з Полярії. Голос належав "прославленому" лідеру нації, голові Айсберу. І говорив він дуже емоційно. Айсбер розповідав про спробу вторгнення минулої ночі, звинувачуючи чейнджлінґів у порушенні кордонів Полярії, і про те, як вулики планують атаку. Лейтенант Тергум був приголомшений почутим, - Ну, це ж повна ...\n\n- ...коли вороги насміляться загрозливо встати на порозі самої Полярії, чи будете ви байдуже дивитися і дозволите їм це зробити? У бій, мої товариші! В БІЙ! \n\nДвоє чейнджлінґів почули багатоголосе кровожерливе гарчання, що лунає з невеликого динаміка... і одночасно дуже швидко наближається до їхніх позицій з боку кордону. Лейтенант Тергум і сержант обмінялися поглядами, сповненими жаху."
 icebear.10.a:0 "Що за..."

 icebear.11.t:0 "Великий задум" #Ardent Custodian і Cunard стоять обличчям до обличчя
 icebear.11.d:0 "Голова тихо розмірковував. Він насилу міг знайти час для подібних коротких періодів спокою, оскільки його присутність була потрібна на десятках нарад, зборах генштабу і радіоцентрі для організації трансляцій. І в короткі періоди спокою від розмірковував про все, що допомогло йому настільки майстерно прийти до влади. Минуле і сьогодення вели до майбутнього. До майбутнього, якого міг досягти лише він і тільки він завдяки своєму розуму і доступним засобам.\n\nНа жаль, стукіт у двері сповістив про швидкий кінець його періоду самотності, але роздуми про перспективи майбутнього привели Айсбера в гарний настрій. Охоронець увійшов і швидко доповів поточне становище, після чого попрямував на вихід, але зупинився і розвернувся, почувши наказ голови... Скажи мені, - вимовив Айсбер, - ти хочеш дізнатися про мою кінцеву мету?.. Охоронець моргнув, - Звісно, Великий Вождь... Лідер Полярії усміхнувся. - Я не скажу нічого надто конфіденційного, я все одно планував повідомити про це сьогодні пізніше. Але ось суть: моя кінцева мета - нарощування нашої потужності. Як самостійно, так і через залучення будь-яких потенційних союзників. Щойно наші сили досягнуть свого максимуму, я поверну землі, які наші пращури втратили через цих підлих чейнджлінґів, і тоді ці північні землі нарешті стануть єдиними. Кожен ведмідь знає, що ці землі по праву належать нам, але цього не можна досягти, поки ДМО Полярії не будуть максимально сильні і перемога у війні не буде гарантована. Ми зробимо це, з чужою допомогою чи без неї.\n\nГолова піднявся зі свого місця, - Тож мені потрібно, щоб кожен бездоганно зіграв свою роль. Заради нашої батьківщини та її великого майбутнього. Чи виконаєш ти свій обов'язок, страже? Чи зробите ви все необхідне, щоб ця мета стала реальністю?"
 icebear.11.a:0 "Буде зроблено, Великий Лідер!"

 icebear.12.t:0 "Поза межами минулого" #Ardent Custodian
 icebear.12.d:0 "Голова Айсбер обміркував курс, яким готувалися ось-ось вирушити Полярія. Він довго і ретельно розмірковував, але врешті-решт зрозумів усе кришталево ясно і чітко. Те, чого він домігся в Полярії, перевершувало навіть найсміливіші мрії... Сам факт того, що він досяг сьогоднішніх успіхів, був достатнім доказом.\n\n- Мої товариші! Робітники-воїни! - Айсбер заговорив у мікрофон, - Сьогодні воістину переломний момент у всій історії Полярії, бо ми перетворюємося на націю, подібних до яких світ ще не бачив. Наша чудова країна, можливо, і була заснована на ідеях сталліонізму, але я бачив, чого ми досягли працею наших власних лап: найефективнішої держави та ідеології, що набагато досконаліша за сталліонізм! Відтепер саме ми, а не ідеї поні, придумані в далеких землях, торуємо шлях для Полярії.\n\n- Час настав, товариші! Робітники-воїни! Ведмеді! Настав час показати, чого може досягти ця велика нація! Настав час усьому світу побачити, що ви можете зробити разом! Нехай цей день ознаменує кінець сталліонізму в цих північних землях і абсолют власного, істинного шляху Полярії вперед!\n\nНатовп полярних ведмедів вибухнув гучними вигуками, а голова Айсбер просто посміхався."
 icebear.12.a:0 "Наше майбутнє й справді сяє."

 icebear.13.t:0 "Досягнення розблоковано!"
 icebear.13.d:0 "Ви знайшли ведмедика, який грає у ведмедика-крісло!"
 icebear.13.a:0 "Ох!"

 icebear.14.t:0 "Льодяні амбіції!"
 icebear.14.d:0 "Вони знали так мало. Їхня уява була настільки обмеженою. Їхні характери були слабкі, але при цьому вони були зарозумілі й упевнені у своїй перевазі. Ці думки роїлися в голові Айсбера, поки він ішов коридорами під час "екскурсії" будівлями. Тут і там клерки займалися дріб'язковими справами, а заможні істоти вимагали уваги високопоставлених чиновників. Все це було прісною роботою розваленої держави, яка давно розучилася служити своєму суспільству. Вона потребувала заміни, і з кожним днем мотиви Айсбера ставали дедалі радикальнішими. Але недостатньо, як він думав того ранку, бути голосом, що зсередини виступає за зміни і сильніше суспільство. Ні, потрібно було зруйнувати саму структуру держави і побудувати її заново. Тільки в нього, Айсбера, вистачало уяви і сміливого бачення для цього. Тільки він, Айсбер, міг стати тим, хто очолить це. Коли його привели до кабінету і вручили портфель помічника заступника радника міністра транспорту, він вимовив усі очікувані люб'язності і потиснув лапу міністру, перш ніж посісти своє місце. \n\n- Звісно, міністре, - Айсбер заговорив і злегка відкинувся в кріслі, приймаючи запропоновану папку. - До завтрашнього дня він буде у вас на столі, - міністр досить скоро залишив Айсбера в спокої. На розмову пішло чи не більше хвилини, і ведмідь тихо зітхнув, а потім потягнувся до довідника на столі. \n\nНі наступного ранку, ні на інший ранок звіту не було. У Айсбера були свої амбіції, і про його посаду на державній службі швидко забули. Він плів інтриги, замишляв схеми і налагоджував зв'язки, отримуючи при цьому стабільну державну платню. Скоро, дуже скоро його бачення стануть реальністю. Скоро ведмеді дізнаються свою справжню силу. Скоро він покаже їм її."
 icebear.14.a:0 "Скоро..."

 icebear.15.t:0 "Сім зірок на небі"
 icebear.15.d:0 "Голова був підвищений Комітетом Національної Оборони до нового військового звання - стормарскалка, створеного спеціально для нього. Це було дуже славне і величне звання. "Шторм-маршал" звучав значно краще, ніж фельдмаршал або навіть гранд-маршал. Але і цього було недостатньо.\n\nП'ять зірок, шість зірок. Їх було недостатньо. Голова Айсбер не може дорівнювати за званням іншим легендарним військовим офіцерам на кшталт гайвсмаршала чейнджлінґів або принца-воїна поні. Ні, йому потрібно щось більше. Щось, що поставить його вище за них усіх, адже так воно і було насправді. Різниця між пропагандою і реальністю вже давно стерлася в його голові, і тому, дивлячись на себе в дзеркало, Айсбер заговорив із ведмедем, що одягає його форму. \n\n- Сім зірок, - просто вимовив Айсбер, роздивляючись свої медалі та стрічки. - Сім зірок...\n\nІ ці прості слова привели державну машину в рух. Централізація влади навколо Айсбера була настільки висока, що ще до кінця дня було зшито нову форму, чиї погони прикрашали сім зірок. Перед тим, як вийти під світло софітів і пильні погляди камер, Айсбер був одягнений у новий мундир, і він так подивився на ці зірки, наче планував підкорити і їх. \n\n- Нехай народ знає, що я, голова Айсбер, завжди захищатиму їх. Завдяки моєму лідерству ні поні, ні чейнджлінґи ніколи не наважаться загрожувати нам. Сім зірок... більше шести.\n\nІ справді, під світлом прожектерів виблискували сім зірок, поки члени зборів аплодували своєму лідерові."
 icebear.15.a:0 "- Марскалк і вищемарскалк задовольнятимуться шістьма і п'ятьма зірками, відповідно."

 icebear.16.t:0 "Пташині раси" #Ardent Custodian
 icebear.16.d:0 "Хватка Айсбера була настільки сильною, що його лапа майже вигнула край металевого подіуму. - Робітники-воїни Полярії! Наймерзенніша істота, яка коли-небудь існувала в нашому світі, - це грифон! На відміну від чейнджлінґів, які марно намагаються наслідувати вашу велич, грифони розпускають свої жирні пір'я і розкривають дзьоби, щоб глузливо каркати! Вони вже вважають себе вищими за всіх і кожного. Усі грифони тільки й мріють про те, щоб встромити свої хижі кігті в спини дитинчат Полярії! Це правда! Грифони занадто боягузливі, щоб протистояти могутності навіть одного воїна-робочого Полярії, і все ж таки в них вистачає нахабства претендувати на те, що по праву належить нам! З натовпу почувся рев найвідданіших ведмедів, і невдовзі люта лють охопила навіть найскептичніше налаштованих із присутніх. Айсбер підняв лапу у напрямку до затягнутого хмарами неба.\n\n- Саме існування грифонів - це образа для всього, в ім'я чого ми працюємо і працюємо! Ми більше не можемо дозволити цим істотам... ні, цим мерзотам оскверняти долю Полярії! Не цурайтеся підступного погляду грифона, а встроміть у нього зуби й кігті! Очистіть це небезпечне псування, щоб воно більше ніколи не загрожувало тому, що ви любите! Саме ваші лапи, лапи воїнів-робітників, повинні виконати цю роботу! Але у виконанні цього завдання повинні взяти участь усі справжні ведмеді. Нехай ці паршиві грифони вважають настільки праведний і благородний обов'язок занадто важким, але вони не знають справжньої сили Полярії! Чи покажете ви їм цю силу, воїни-робітники?! Чи будете ви тими, хто розіб'є вщент їхні дурні ілюзії щодо власної переваги?!\n\nДесятки ведмедів встали на задні лапи та заревіли, і незабаром уся аудиторія приєдналася до них під запеклі бойові кличі.."
 icebear.16.a:0 "Блискуча промова!"

 icebear.17.t:0 "На Фронтирі" #Ardent Custodian
 icebear.17.d:0 "Очищеним містом обережно ходило безліч дикунів фронтира. Вони принюхувалися до морозного повітря в пошуках ознак небезпеки. Але ніякої небезпеки, звичайно ж, не було. Голова Айсбер подбав про це. Хоча він не міг звинувачувати цих безкланових ведмедів за подібну поведінку, яку вони виробили за довгі покоління виживання на фронтирі. Те, що Полярія нині дала цим бідним звірам гідний дім і мету, наповнювало серце благодійного лідера нації гордістю... Один з ведмедів із фронтиру підтюпцем підійшов до Айсбера та його збройних сил, - Голово Айсбере, пане голово, це тепер наші нові доми?\n\n - Так. Ви та інші можете вносити в них зміни на власний розсуд.\n\n- Це тішить, - усміхнувся полярний ведмідь, - бо ці оселі виглядають так, наче їх було зведено для грифонів.\n\n- Нісенітниці, товаришу, не варто навіть згадувати про подібний бруд, - на обличчі Айсбера з'явилася посмішка, яка межує з оскалом, - такі жадібні дзьобисті крилохлоди ніколи не зможуть розлучитися з жодною крихтою своєї власності. Навіть заради блага всіх ведмедів і нашої великої Полярії.\n\nВ словах голови було більше правди, ніж світ коли-небудь дізнається. У голові Айсбера промайнули спогади не настільки давнього минулого: звіти про оцінку ландшафту, обстеження місцевості та аналіз загальної популяції безкланових ведмедів. І мобілізація сил Полярії, щоб позбавити поселення від цих знехтуваних, пернатих скваттерів.\n\n- Іди і вибери собі житло, товаришу. - М'яко сказав Айсбер, заспокоюючи полярного ведмедя, - Майбутнє Полярії чекає на нас.\n\nЦе були воістину чудові вихідні."
 icebear.17.a:0 "Чи існують трупи, якщо ніхто не може їх знайти?"

 icebear.18.t:0 "Неправильний поворот" #Ardent Custodian
 icebear.18.d:0 "Коли автоколона Айсбера прибула на вулиці Вессландії, рід північними небесами вже настав полудень. Там їх вітали тисячі фанатиків Голови. Огорожі ледь утримували важких ведмедів, які гарячково вирували, але загороджень все ж вистачало, щоб ніхто не перегородив шлях лідеру Полярії. Айсбер піднявся зі свого місця і гордо помахав своїм прихильникам. Ці ведмеді були єдиними, хто справді знав, наскільки він важливий для всіх, навіть якщо всі його теперішні успіхи були недостатнім доказом. Голова Айсбер скромно стояв у машині, випромінюючи гордість і благодушність. І насолоджуючись загальним обожнюванням.\n\nЗагальним? Ну майже. В одного ведмедя серед його фанатичних прихильників була своя мета. І він доб'ється її, незважаючи ні на що. Бо це була помста за безсердечно відкинуті традиції. За традиції, які дали його найкращому другові заслужений титул "сово-ведмедя". І він мав намір домогтися справедливості. Ведмідь знав, що після цього він не побачить більше жодного дня, жодного чудового світанку, жодної моторошної ночі, освітленої вогнями полярного сяйва, - але він уже змирився з цим. Він змирився з цим, коли вперше почув упереджене ставлення до грифонів у передачах голова. Він змирився з цим, коли почув пошепки чутки про таємну поліцію, що проводить облави. Він змирився зі своєю долею, коли його власні кігті відчайдушно рилися в кучугурах злежалого снігу, тільки для того, щоб зрештою намацати серед замерзлих трупів грифонів тіло свого кращого друга - сово-ведмедя.\n\n Автоколона нарешті завернула за ріг, і погляд полярного ведмедя вперся в голову, який стояв на пасажирському сидінні, що безтурботно махав натовпу і тішився увагою. Випрямившись, месник із нестримною люттю кинувся вперед. Він проштовхувався крізь галасливий натовп, немов хотів, щоб голова помітив його... Автомобіль голови наближався, і полярний ведмідь нарешті досяг огорож на краю тротуару, яким вистачило лише одного лютого удару... Айсбер із задоволенням роздивлявся своїх прихильників, але потім раптово помітив розлюченого ведмедя, що мчав у його бік... Нападник підняв свою протитанкову гвинтівку і..."
 icebear.18.a:0 "Великий Вождь! Ні!"

 icebear.19.t:0 "Майбутнє держави, партії, нації, народу"
 icebear.19.d:0 "У лікарняній палаті перебувало два полярних ведмеді. Молодша з них плакала, поки старший згасав. Жодні операції чи інтенсивні процедури не зуміли б запобігти смерті. І жодні медичні системи життєзабезпечення, звичайні чи магічні, не змогли б пом'якшити наслідки влучення протитанкової кулі. Айсбер був на порозі смерті.\n\n- Убивця не вижив, - заговорила ведмедиця, і її голос став твердішим, - Ми переконалися в цьому.\n\n- Спасибі тобі, Сноубер, - прохрипів лідер Полярії, зібравши всі сили, що залишилися, - Моя дорогоцінна донька... підійди ближче.\n\nМолода полярна ведмедиця присунулася до батька, і він поклав свою лапу на її. - Коли мене не стане, тільки ти зможеш привести наш рід до величі, про яку я мріяв... і повернути наші рідні землі... але ніколи не влаштовуй війну, якщо... не впевнена в перемозі.\n\nАйсбер хапнув пащею повітря. - Мир завжди загрожуватиме Полярії, завжди. Ти повинна забезпечити готовність нації. Не забувай нищ... нищити... нищити всіх, хто виступає проти тебе, дочко моя. Створюй зброю масового ураження... це єдиний шлях.\n\nСноубер стиснула лапу батька, - Так, батьку. Обов'язково. Я обіцяю. Твоя мрія про нас житиме.\n\nКардіо-монітори поблизу почали видавати тривожні звуки. - Добре... добре. Пам'ятай мене, моя Сноубер, пам'ятай... Верк-маðра...""
 icebear.19.a:0 "Ти будеш мною пишатися, батьку."

 icebear.20.t:0 "Партійна дисципліна" #Ardent Custodian
 icebear.20.d:0 "Сноубер дивилася на полярних ведмедів, які марно боролися, намагаючись розірвати свої ланцюги, якими вони були скуті. Хоча всі вони були колишніми політичними соратниками її великого і доброчесного батька, вона відчувала до них лише злісне презирство. Її батько запросив цих ведмедів у свій уряд, щоб за допомогою їхньої передбачуваної "відданості" і політичних талантів здійснити свій славний план для Полярії. Сноубер вискалила зуби, дивлячись на обличчя, які вона колись знала. Її батька більше немає, то яка від них тепер користь? Малозначущі ведмеді були звільнені, а тих, хто обіймав важливіші посади, вона посадила до в'язниці навічно. Але ці важливі чиновники? Ті, хто наважився заявити про свою важливість для майбутнього Полярії на підставі своїх передбачуваних навичок і влади, даної їм її батьком? Сноубер бачила тільки одну долю для цих підлабузників.\n\nРозрахунки зенітних знарядь, які знаходилися поблизу, подали сигнал, що гармати готові до стрільби.\n\n-Голова Айсбер, наш славетний вождь, рятівник і батько мене і всіх ведмедів, загинув, коли ви служили Полярії! - Сноубер заричала в радіоприймач, - Нагорода за таку віроломну і кричущу некомпетентність - смерть! Смерть будь-кому, хто сміє загрожувати нашій нації та її праведній революції. - Вона нахилилася вперед. - Якби мій батько знав про вашу справжню сутність, то можливо, що Полярія досі процвітала б під владою зразкового лідера. А тепер помріть як боягузи, зрадники!" Закуті в кайдани полярні ведмеді безпомічно билися у своїх путах, коли розрахунки почали заряджати протиповітряні гармати. Нові чиновники, що сиділи неподалік, які замінили старих, практично відчували ненависть, яку вивчала Сноубер. І хоча ніхто не наважився б сказати про це вголос, вони також бачили маніакальну радість свого нового лідера"
 icebear.20.a:0 "Прийнятна ціна за єдність."

 icebear.21.t:0 "Гробниця Вічного Вождя" #Ardent Custodian
 icebear.21.d:0 "Ридання луною розносилися по всьому Магар-Фяраню. Натовпи фанатиків, які колись тріумфували і скандували ім'я Айсбера, тепер плакали, не соромлячись своїх сліз, дивлячись на труну свого улюбленого лідера, що прямувала до місця його останнього спочинку. Колишній голова мирно лежав за товстою скляною перегородкою, прикрашеною національною емблемою Полярії. Його тіло було вимито і заморожено, щоб назавжди зберегти вигляд Айсбера. Кожен мав право побачити того, хто привів їхню батьківщину в нову епоху, і вшанувати великого лідера навіть за довгий час після його смерті.\n\nВслід за труною, у супроводі озброєної охорони, йшла сама Сноубер. Вона оплакувала смерть свого батька і ридала голосніше за всіх. Прояву скорботи з боку молодої полярної ведмедиці було достатньо, щоб зворушити навіть найстійкіших ведмедів, які за її прикладом починали мовчки плакати. Навіть коли процесія нарешті досягла місця призначення, сльози і ридання не припинилися.\n\nДомовину Айсбера поставили на золотий постамент. Його, і найближчі півкварталу міста, оточували численні й екстравагантні прикраси. Сноубер продовжувала істерично ридати, до неї приєдналися численні фанатики, які зібралися навколо в цей скорботний момент. Багато хто з присутніх розповідав потім, як вони залишалися біля гробниці і плакали доти, доки сльози не могли більше литися. Але один уважний вартовий мудро не повідомив нікому, що останні скорботні пішли приблизно о другій годині.\n\nЗгодом Сноубер виділила спеціальний загін виключно для охорони гробниці від усіх, хто не бажав обмежитися простим виявленням почестей. Однак труна Айсбера, як і раніше, залишалася там і всі громадяни Полярії могли побачити її. Ніхто і ніколи не забуде революціонера, з якого почалася історія революційної полярної держави."
 icebear.21.a:0 "Прощавай, батьку."

 icebear.22.t:0 "Найчистіший народ" #Ardent Custodian
 icebear.22.d:0 "Голова Сноубер зайняла трибуну й окинула поглядом натовп. Зовсім недавно вона була серед тих, хто слухав мудрі промови Айсбера і скандував його ім'я. А тепер що? Тепер була її черга віщати натовпу.\n\n- Ведмеді Полярії! - прокричала вона, - Сила нашого виду не має собі рівних у цьому світі! Наша раса - найчистіші воїни! Жодна інша істота у світі не наділена цим шляхетним правом від народження, як би не намагалися вони довести зворотне! Кожен із нас бачив велич, якої можуть досягти тільки полярні ведмеді! Наша нація ніколи б не досягла сьогоднішніх успіхів, якби не мудре лідерство мого батька: найвидатнішого з полярних ведмедів, але все ж таки полярного ведмедя!"... Натовп схвально заревів... \n\n- Кожен ведмідь зобов'язаний підтримувати своє природне благородство, бо наш рід - рід воїнів! Ми не можемо дозволити світу і його бруду заплямувати наші родоводи. Ні зараз, ні коли-небудь потім! Нехай Полярія не постраждає від підступів імперіалістів, які хочуть панувати над нами! Нехай брехня імперіалістів не переконає вас у зворотному! Єдина раса, яка може правити ведмедями та їхньою революцією проти долі... це самі полярні ведмеді! Як мій батько до мене! І ніхто інший! Полярний ведмідь! Голова! Головуюча! \n\nНатовп ведмедів вибухнув оплесками на адресу головуючої Сноубер."
 icebear.22.a:0 "Чудова промова!"

 icebear.23.t:0 "Червоний королівський двір" #Ardent Custodian
 icebear.23.d:0 "У залі засідань зібралися тільки найвидатніші полярні ведмеді. У кожного з них були свої унікальні таланти. Але Сноубер не тому обрала їх. Вони були тут, бо довели, що цінують одне понад усе інше...\n\n- Мої вірні послідовники, - заговорила Сноубер, яку оточували її найстаранніші охоронці. - Ви всі проявили себе не гірше за своїх товаришів. Це... похвально, але я зібрала вас тут сьогодні не тому. Перед смертю мій батько довірив мені втілити в життя його бачення Полярії: це набагато більше, ніж просто повернення наших рідних земель.\n\nСидячі полярні ведмеді вичікувально схилили голови... і злегка здригнулися від похмурого погляду, що промайнув на морді Сноубер.\n\n- Але через його вибір членів свого кабінету, цих жалюгідних зрадників, мій батько загинув, так і не побачивши втілення долі Полярії. Цей план не схожий на жоден інший, і його можна буде реалізувати тільки в тому разі, якщо кожен зробить усе саме так, як потрібно. І я не дозволю, щоб це бачення було вбито подібно до мого батька!\n\nСноубер подивилася на край столу для нарад, що відколовся, який вона щойно відламала. Вона швидко випрямилася і подивилася на своїх нових членів кабінету. - Я вірю у вас. Наші великі Громади Полярії вірять у вас. Не підведіть свою батьківщину, і не підведіть мене. Разом ми зможемо втілити в життя велике бачення мого батька, і тоді жодна істота у світі не посміє стати на шляху долі нашої нації. Я ясно висловилася? \n\nЕнтузіазм на обличчях членів її кабінету запевнив Сноубер у правильності її вибору."
 icebear.23.a:0 "Ми живемо, щоб служити, шановна лідерко."

 icebear.24.t:0 "Зрадник і богиня" #Ardent Custodian
 icebear.24.d:0 "Голова Сноубер сиділа навпроти незвичного полярного ведмедя і спостерігала за його реакцією, доки він переглядав документи, що описували його посаду. Щось у ведмеді перед нею здавалося їй... неправильним. Він дивно рухався, дивно дивився на всі боки. Попри це, Сноубер добре чула про його здібності, тож вона й запросила - так, саме запросила - його сюди.\n\n- Я впевнена, що ви знайомі з праведним баченням Айсбера, яке я планую втілити в життя й перевершити навіть найсміливіші мрії, - почала вона, - але для цього вашій батьківщині потрібна ваша допомога, Бйорнлінґе.\n\n- Зрозуміло... - сказав полярний ведмідь, - І ви забезпечите мене всіма необхідними ресурсами? \n\n- В якості глави Стратегічних Противагових Сил Ведмежої Народної Армії ви отримаєте доступ до всіх матеріалів, необхідних для розроблення ядерної, хімічної та біологічної зброї. \n\nВ очах Бйорнлінґа спалахнуло полум'я. - Безперешкодний доступ?" Сноубер відчула, як її шерсть встала дибки від тону Бйорнлінґа і блиску в його очах. Попри те, що інстинкти застерігали її проти продовження спілкування з ним, той факт, що ведмідь виглядав більш натхненним, нагадав Сноубер про мету цієї зустрічі. Ведмедиця зберегла свою рішучість. - Так, доти, доки ця зброя працюватиме і використовуватиметься для втілення долі нації, - твердо сказала Сноубер.\n\n- Тоді я згоден, - Бйорнлінґ із задоволенням проглянув папери ще раз, - Я зроблю все можливе, щоб бути корисним для вас на цій посаді. Обіцяю.\n\nСноубер просто кивнула. Вони обмінялися подальшими формальностями, підписали і зібрали документи, і потім розійшлися у своїх справах. Яким би ексцентричним не був Бйорнлінґ, вона знала, що її рішення дати йому посаду в Полярії в кінцевому підсумку було правильним. Адже він виявив такий ентузіазм"
 icebear.24.a:0 "Тільки уявіть, що могло б статися, якби Бйорнлінґ був лідером..."

 icebear.25.t:0 "Мільйони кілометрів за лідером, за партією" #Ardent Custodian
 icebear.25.d:0 "Нарешті це було зроблено! Північ єдина! Північ повністю єдина під владою Полярії! Завдяки її зусиллям мрія покійного Айсбера нарешті збулася. Усі північні землі нарешті належали полярним ведмедям. Усі дії її батька і самої Сноубер привели до того, що ДМО Полярії зуміли втілити свою законну долю! Революції не було рівних! Військові та державний апарат, які її здійснили, були непохитні! Нація була невразлива для зовнішніх і внутрішніх ворогів!" Голова Сноубер дивилася на захід сонця і розглядала південний обрій і невидимі країни за ним. Але Полярія все ще перебували під загрозою. Вона не сумнівалася, що інші народи континенту та їхні нижчі родичі були свідками всього, чого досягла Полярія. І цілком природно було очікувати, що нижчі істоти будуть плести змови проти чогось такого великого. Навіть перед обличчям руйнівної могутності Полярії завжди знайдуться ті, хто наважиться протистояти їм. Тому революція і прагнення Полярії до величі ніколи не припиняться. Вони повинні діяти швидше за інших. Вони повинні завдавати удару до того, як опозиція встигне підготуватися. Кожного ворога треба знищити, а те, що залишиться після цього, має бути використано для подальшого досягнення славної долі Полярії.\n\n- Твоє бачення збулося, батьку, - прошепотіла собі під ніс Сноубер, - і я, як голова, слідкуватиму за тим, щоб це завжди залишалося правдою.\n\nМільйони полярних ведмедів, яких поведе їхня голова в нову еру, підуть за партією маршем на мільйони миль..."
 icebear.25.a:0 "Мільйони миль."

 polarbear_information.1.t:0 "Правлячі правовірні"
 polarbear_information.1.d:0 "Будь-який опис сучасного ведмежого суспільства має починатися з По Уеллінгтона, об'єднувача і деспота Громад Полярних Ведмедів. Він перетворив клан Скюфлінґ із простого, але найрелігійнішого клану на модернізуючу силу, що затягнула нас в 11 століття.\n\nДо повернення Уеллінгтона з Грифонїї Скюфлінґи здебільшого поклонялися могутньому Всебатькові - тому, хто перетворив ведмедів зі звірів на мислячих істот, і Великим Звірам, що обдарували найважливішими аспектами ведмежого суспільства. Великий Ворон навчив нас магії, Великий Кабан Галлінбурсті - обробки металів, а Фенрір - ієрархії сильних. Скюфлінґи змінилися після повернення найманців, і оновлений клан усе ще шукає своє місце в історії.\n\n\nПо - побожний ведмідь, але він також вірить і в цінність сучасності. Він привіз із собою додому великий лінкор, з якого міг загрожувати мерзенним чейнджлінґам, а його найманці були озброєні кращою зброєю Грифонії. У По були зброя і війська, тож він почав підготовку до того, щоб остаточно об'єднати нас під владою одного лідера. Ми, Свартпельси, приєдналися до його війни, і всі інші клани впали перед нашою об'єднаною міццю. Тепер По вносить ще більше змін у нашу націю в ім'я сучасності. Він імпортував гвинтівки з Нова-Грифонії, щоб озброїти наших солдатів, і трактори з Еквестрії, щоб допомогти у вирощуванні бульб. Хоча багато хто вважає його візіонером, інші побоюються, що він веде нас воістину темним шляхом, який назавжди обірве зв'язок наших душ із морозом півночі. Лише час покаже, чи призведе його лідерство до слави або до катастрофи."
 polarbear_information.1.a:0 ""Історія Полярії", книга 185, архіву Свартпельса."

 polarbear_information.2.t:0 "Повелителі Грому (та їхні пінгвіни)"
 polarbear_information.2.d:0 "Вельми важко писати про себе. Це стосується і опису клану. Проте, ми повинні спробувати. Ми, Свартпельси - найбільше джерело панцербйорнів, уся наша постійна армія складається виключно з таких ведмедів. У нас одні з наймогутніших воїнів, а також прекрасні хранителі ведмежих традицій і знань. І те, що раси вогню назвали б "дослідженням істот", є одним із наших найвидатніших талантів.\n\nХтось назве нас консерваторами або навіть реакціонерами. І це правда, ми справді можемо занадто повільно приймати зміни. Але ми готові заявити, що зміни рідко бувають однозначно хорошими, і що мудро проявляти певну обережність. Ми б також вказали на великий союз Повелителя Грому Торбена з По Уеллінгтоном, який уперше за всю історію об'єднав ведмедів під владою Деспота.\n\nПро клан Анкер мало що можна сказати. Вони присягнули нам на вірність, і так було з незапам'ятних часів. Здебільшого пінгвіни просто хочуть, щоб їх залишили в спокої й дали їм ловити рибу в багатих водах Крижаного Моря...\n\nМи не могли залишити без уваги опис Торбена. Оскільки загальновідомо, що наші старійшини мають пройти через ритуал удару блискавкою, не варто дивуватися, що він справді заслужив свій титул. Торбен, без сумніву, наймогутніший ведмежий воїн, здатний битися з будь-яким ворогом і перемогти. Він також великий учений із глибоким і всебічним розумінням основ ведмежого суспільства. Торбен давній друг Уеллінгтона, і він змусив найреакційніших ведмедів у наших лавах прийняти зміни, які ввів наш Деспот. Мало що може зрівнятися з ненавистю Торбена до чейнджлінґів, і він готовий особисто повести в бій проти них будь-який бойовий загін. Сподіваємося, що його правління як Повелителя Грому буде довгим і безпечним, і ніяке віроломство чейнджлінґів не зупинить його."
 polarbear_information.2.a:0 ""Історія Полярії", Книга 186, Архів Свартпельса."

 polarbear_information.3.t:0 "Південні гармоністи"
 polarbear_information.3.d:0 "Колись Вольсунгр був найбільшим суперником Свартпельса. Ми і вони раз у раз стикалися один з одним, борючись за звання найсильніших ведмежих воїнів. Вони здійснювали набіг за набігом у гори яків, вічно прагнучи розширити свої володіння. Але під час Об'єднавчих Війн вони були майже знищені. Після повернення принцеси Ейри вони відновилися, але стали зовсім іншими. Час, проведений на півдні, змінив її, і вона повернулася переконаною гармоністкою, яка обстоює цінності Еквестрії... Ми були в жаху від того, наскільки впали наші старі суперники, але По Уеллінгтон зупинив нас від вигнання цієї ракової пухлини. Він постановив, що раз для ведмежого роду важливі наші традиції, то прогресивність Свартпельса має врівноважити їх. А той факт, що вони принесли з собою багато знань про еквестрійські технології, вже точно не зашкодив.\n\nЇхня лідерка, принцеса Ейра - вправна войовниця і стратег, колись прагнула підпорядкувати собі Вессландію і знищити Свартпельс. Але час, проведений в Еквестрії та Кристальній Імперії, наділив її бажанням привести клани до гармонійного майбутнього, де слабких захищатимуть, а не експлуатуватимуть, а сильні правитимуть із мудрістю та добротою. Хоча такі ідеї здаються нам доволі божевільними, хто знає, що принесе майбутнє? Можливо, одного дня весь ведмежий рід об'єднається навколо неї."
 polarbear_information.3.a:0 ""Історія Полярії", книга 187, архіву Свартпельса."

 polarbear_information.4.t:0 "Потрійний Альянс"
 polarbear_information.4.d:0 "У Вессландії, на відміну від інших регіонів наших Спільнот, немає великих традицій або стародавніх кланів. Упродовж тривалого часу тут існували незначні клани, які ненадовго з'являлися, після чого підкорялися або дробилися, а потім зникали. Їхні ж культури розчинялися у більш всеосяжному вессландському способі життя. Але тепер три нинішні невеликі клани, Фальсен, Бродкорб і Бенкесток, уклали оборонний пакт і стали Потрійним Альянсом. Хоча ніхто з цих вискочок поодинці не зміг би кинути виклик великому клану, разом вони цілком можуть бути досить сильні для цього, якщо в цих ведмедів коли-небудь з'являться такі амбіції.\n\nВессландія також примітна величезною кількістю сово-ведмедів. Сововедведі - це великі і сильні грифони, які добре зарекомендували себе в бою з ведмедем. У Вессландії також є багато грифонових пташенят у рабстві у громадян клану. Ці грифони являють собою залишки тих авантюристів, які вірили в існування міста з дорогоцінних кристалів, що нібито розташовується в ведмежих землях. Без сумніву, це найбільш грифоний регіон Спільнот. Легенди свідчать, що тисячоліття тому справжні клани, відомі як королі-монстри Йотнара, правили Вессландією і землями на схід від неї. І що їх вигнали з цього світу загарбники. Якщо це правда, то руїни цих давно зниклих кланів можуть бути знайдені на території Фронтиру. Вигнанець зі зв'язками в Сталліонграді, відомий як товариш Айсбер, може мати відношення до цих стародавніх кланів, але він ніяк не коментував це питання. В усякому разі, мешканці Вессландії живуть серед руїн і сміття, будуючи нові фортеці і фабрики замість того, щоб спробувати відновити руїни славного минулого. Промислові плани По Уеллінгтона мають тут великий успіх, але підтримку цих кланів навряд чи можна назвати захопленим схваленням. Якщо пощастить, то Потрійний Альянс завалиться під власною вагою, і вони стануть легкою здобиччю для найкращих ведмедів."
 polarbear_information.4.a:0 ""Історія Полярії", книга 188, архіву Свартпельса."

 polarbear_information.5.t:0 "Воєначальники"
 polarbear_information.5.d:0 "Онлартір є домом для трьох кланів воєначальників: Розенкранц, Кейн і Ґотлунґ. Розенкранц тісно пов'язані з незліченними бродячими шаманами. Вони можуть використовувати мороз для загоєння ран або навіть заглядати в північний вітер і бачити минуле або майбутнє. Кейн - єдині суперники Свартпельса за звання наймогутніших воїнів, і вони справді надзвичайно люті й часто досягають воістину абсурдних розмірів, що перевершують навіть багатьох ведмедів Свартпельса. Однак їхні здібності до виготовлення громових обладунків і зброї вельми скромні. А Ґотлунґ - майстри оборони. Вони вчинили вельми незвично і сконцентрували всі свої сили в одній неприступній фортеці, підземна частина якої настільки велика, що вміщує в себе цілі бульбові сади.\n\nВелика Асе з Кейна - мати незліченних могутніх воїнів, і їй немає рівних у зарозумілості. Безіменний король-шаман Розенкранца замкнутий і обережний, як і личить тому, хто може бачити крізь століття. І, як не дивно, Ґотлунґом править не один старійшина, а ціла рада, яка голосує з усіх питань, визначаючи напрямок розвитку клану, що в поєднанні з менталітетом клану призводить скоріше до постійного зміцнення своїх земель, ніж до прямих дій. Кожен із цих кланів невеликий і, найімовірніше, не становить загрози для великого клану, але навіть Свартпельсу буде важко перевершити один із цих кланів у їхній галузі спеціалізації. Поки неясно, яке буде їхнє місце в майбутньому нашої раси, але якщо Пау збереже їхню вірність, то незламна оборона і могутні ударні війська добре послужать півночі."
 polarbear_information.5.a:0 ""Історія Полярії", книга 189, архіву Свартпельса."

 polarbear_information.6.t:0 "Єретики-вигнанці"
 polarbear_information.6.d:0 "Не кожен клан, що зазнав поразки в Об'єднавчій Війні, заслуговував на місце в товаристві По Уеллінгтона. Двом кланам з берегів Ключ-Озера, Розенсвердам і Торденстьєрнам, загрожувало вигнання за співпрацю з ненависними чейнджлінґами.\n\nДо свого падіння Розенсверди були кланом, який сильніше за інших цікавився природною магією кристалів. Вони також були одержимі ідеєю модернізації і майже століття співпрацювали з чейнджлінґами. Хоча про їхню нинішню діяльність мало що відомо, розрізнені чутки повідомляють, що вони зациклилися на технологіях і злитті ведмедів і машин. Вважається, що їхньому лідеру Øверст Адміністратору-001 вдалося створити рідкісну гидоту і фізично об'єднати машину, магію та ведмедя.\n\nТорденстьєрни колись були другим кланом шаманів. Вони також відчували глибокий інтерес до металів, які інші ведмеді вважали марними, особливо до золота. Коли Торденстьєрнів вигнали, вони забрали з собою золото і, якщо вірити найдикішим чуткам, свої таємні запаси зоряної сталі. Торденстьєрни стверджують, що вони синтезували якийсь сплав, схожий на зоряну сталь, а їхній володар Мідас бажає роздобути якомога більше золота для цієї мети. \n\nПоки що два вигнані клани проводять час у Землях Чейнджлінґів. Якщо все буде добре, то ми більше ніколи їх не побачимо. І ці клани будуть або знищені, або повернуться до дикості, як ведмеді на Північному Сумному Березі. Але можливо, що їхня історія ще не закінчена..."
 polarbear_information.6.a:0 ""Історія Полярії", книга 190, архіву Свартпельса."

 polarbear_information.7.t:0 "Мандрівники та вигнанці"
 polarbear_information.7.d:0 "Величезна кількість ведмедів не живе в клані. Одні обрали таке життя або були змушені обрати його. Інші є мандрівними кочівниками Фронтиру, а треті - жорстокими дикунами в Землях Чейнджлінґів. Їх багато, але вони, як правило, вельми поступливі і уживаються з бажаннями того ведмедя, що править регіоном, у якому вони мешкають, і пропонують свої послуги як генерали і радники, мало піклуючись про ідеологію або доктрину свого владики. Цим ведмедям вдалося уникнути найжорстокіших наслідків конфліктів, що змушує деяких цинників говорити про те, що справжнім переможцем в Об'єднавчій Війні були саме позбавлені клану ведмеді. \n\nБезкланові ведмеді Спільнот та прилеглих земель - це ті, кого вигнали з клану або вони ніколи не були його членами. Вони зазвичай діють у складі незалежних загонів або фортець. Ці ведмеді вільні від обмежень, що накладаються правилами клану, але водночас позбавлені захисту і почуття єдності, які надає клан. Таких ведмедів об'єднує сильна особистість, і вони зазвичай розходяться своїми шляхами після смерті цієї особистості. Безкланових ведмедів не менше мільйона, а можливо, й більше, але саме почуття індивідуальності, що їх визначає, не дозволяє їм підпорядкувати ведмедів клану.\n\nКочівники - ті, хто не має ні будинку, ні культури, - здебільшого мешкають на території Фронтиру та прикордонних районів Нова-Грифонїї, але їх можна зустріти майже скрізь по всій півночі. За легендами вони є нащадками давно зниклих королів-монстрів Йотнара і прямими спадкоємцями докланових кочових армій монстрів, але самі вони мало що можуть сказати з цього питання. Одним із можливих винятків із цього є комуністичний революціонер Айсбер, якого всі вважають кочівником, наділеним незвичайним розумом і хитрістю. \n\n\nПро дикунів із Земель Чейнджлінґів, яких найчастіше можна зустріти на Північному Сумному Березі та в довколишніх горах і лісах, мало що можна сказати. Вони живуть як звірі, розриваючи і пожираючи все, що їм трапляється на шляху заради власного виживання. Їхня зброя примітивна, і багато хто з них не може або не хоче створювати обладунки, покладаючись на магію, яка покриває їх шарами льоду. Вони схожі на диких звірів, але все ж вони ведмеді, і ми не можемо не відчувати спорідненості з ними. І якщо одного разу віроломні чейнджлінги будуть переможені і стануть благати про пощаду, ми возз'єднаємося з нашими втраченими родичами..."
 polarbear_information.7.a:0 ""Історія Полярії", книга 191, архіву Свартпельса"

