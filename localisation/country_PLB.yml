 PLB_eternal_desc:0 "Потвора, схожа на білого ведмедя, з шістьма кінцівками, вкрита кошлатим білим хутром. Його величезна паща наповнена злими і гострими зубами з двома великими іклами, які спереду можуть пронизати череп. Він може ходити прямо на двох ногах або по-ведмежому на чотирьох, але іноді використовує всі шість кінцівок. Він більший за будь-якого ведмедя і набагато сильніший."
