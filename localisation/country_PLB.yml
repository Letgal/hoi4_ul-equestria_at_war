 PLB_NorthernWar:0 "[CHN.GetName] напало на нас, вважаючи, що ми станемо легкою здобиччю для їхньої сучасної військової машини. Нині ми зіткнулися з ворогом, який бажає підпорядкувати нас і значно перевершує наші сили за чисельністю та технологіями. Однак жуки у своїй зарозумілості не підготувалися до тривалої війни і не очікують від нас довгого опору. Таким чином, чим довше тягнеться війна, тим більше розчаровується їхня армія і суспільство. Водночас кожен день опору нашого режиму привертає дедалі більше підтримки не лише з боку ведмежого суспільства та воїнів, а й добровольців і зброю з режимів, які прагнуть знищити загрозу, що її представляє [CHN.GetName]... І, можливо, якщо ми завдамо жукам достатньої шкоди, їхні зарозумілі лідери схилять голови та поповзуть зализувати рани у свої вулики."
 CHN_NorthernWar:0 "Оскільки [PLB.GetName] проявили непокору по відношенню до нас, цілком природно розтрощити їх, щоб довести наше право на панування в Еквусі. Крім того, дикуни-ведмеді з півночі вже дуже довго докучали цивілізації чейнджлінґів. Але схоже, що перетворення, які відбулися в ведмежих землях за кілька останніх років, змінили їхнє суспільство сильніше, ніж ми думали. Ці звірі згуртувалися і стали сильнішими, ніж будь-коли раніше. Це недобре, бо хоч ми і перевершуємо сили держави [PLB.GetName] і в довгостроковій перспективі напевно переможемо, ми не можемо дозволити їм змусити нас вступити в сутичку, що потребуватиме використання реальних сил і витрати безцінного часу. Перевага в чисельності або занадто довга кампанія можуть бути розцінені як слабкість як нашим ворогом, який відчує себе натхненним, так і нашим населенням, яке втратить бажання продовжувати конфлікт. Таким чином, нам необхідно закінчити конфлікт якомога швидше.\n\nЗвісно, якщо все почне розвиватися за найгіршим сценарієм, буде краще не витрачати ресурси на цю глушину..."

