 PLB_buy_artillery_desc:0 "Великі гармати Сталліонграда - це саме те, що потрібно нашим хоробрим солдатам, щоб знищити мерзенних чейнджлінгів!"
 PLB_buy_support_equipment:0 "Купити нелетальне спорядження в Еквестрії"
 PLB_buy_support_equipment_desc:0 "Оскільки Еквестрія продовжує вагатися з приводу прямої допомоги, ми можемо спробувати купити в них нелетальне спорядження. Рації, болезаспокійливі засоби, лопати та біноклі вкрай необхідні для сучасної армії."
 PLB_buy_anti_tank_guns:0 "Купити протитанкові гармати в Сталліонграді"
 PLB_buy_anti_tank_guns_desc:0 "Панцери чейнджлінґів продовжують наступати! Нам потрібні протитанкові гармати, щоб зупинити їхні бронетанкові списи. А Сталліонград якраз виробляє чудові знаряддя."
 PLB_international_brigades:0 "Закликати міжнародні бригади"
 PLB_international_brigades_desc:0 "Є багато охочих приєднатися до боротьби проти фашизму та імперіалізму. Хоча деякі з наших солдатів можуть бурчати з приводу необхідності ділити окоп з представником вогняної раси, нам потрібні всі солдати, яких ми тільки можемо отримати."

 CHN_great_northern_war:0 "Війна на півночі триває"

 CHN_withdrawal_from_bears:0 "Відступ з Полярії"
 CHN_withdrawal_from_bears_desc:0 "Ситуація в Полярії розвивається не на користь Гегемонії. Нам потрібно укласти білий мир, щоб покласти край цьому конфлікту, перш ніж нас поставлять у ще більш незручне становище."

# Меню рішень
 CHN_desertions_polaria_tt:0 "Армії на крайній півночі страждатимуть від дезертирства."

 plb_news.1.t:0 "Шторм на півночі!"
 plb_news.1.d:0 "[This.GetNewspaperHeader]Давня напруженість на крайній півночі Еквуса сягнула межі: королева Кризаліс оголосила, що чейнджлінґи повинні підпорядкувати собі державу [PLB.GetName] і тим самим убезпечити своє майбутнє від загроз з боку ведмедів, замість того, щоб дозволити цій ворожій силі продовжувати розростатися. \n\nХоча [CHN.GetName] у десять разів перевершує [PLB.GetName] за населенням і промисловістю, багато спостерігачів зазначають, що особливості географії Північного Еквуса не дозволяють чейнджлінґам обрушити на ведмедів усю свою міць. Крім того, полярні ведмеді відомі як вкрай войовничі істоти... Таким чином, незважаючи на удавану дуже значну різницю в силах, результат цієї битви зовсім не вирішений..."
 plb_news.1.a:0 "Гегемонія здобуде перемогу!"
 plb_news.1.b:0 "Зима забере їх усіх!"
 plb_news.1.c:0 "Чи зможуть ведмеді вижити?"
 plb_news.2.t:0 "Ведмеді торжествують!"
 plb_news.2.d:0 "[This.GetNewspaperHeader]На подив багатьох, [PLB.GetName] змогли відбити атаку держави [CHN.GetName]. Незважаючи на перевагу чейнджлінґів у чисельності та технологіях, вони не змогли прорвати оборонні лінії ведмедів. Протягом кількох місяців танкові списи намагалися прорватися крізь відносно примітивних супротивників, але їх зустрічали лише контрнаступи панцербйорнів і "істинно дикунський" опір. Лінія фронту перестала рухатися, військове командування було нездатно знайти шлях досягнення остаточної перемоги, а цінні ресурси даремно витрачали на війну за глухувату й заморожену землю, тож [PLB. GetLeader] і королева Кризаліс підписали мир.\n\nАле незважаючи на жорстокість війни, ніяких територіальних змін на півночі Еквуса не відбудеться, оскільки жодна зі сторін не побажала розлучатися з чим-небудь і не мала можливості нав'язати будь-які вимоги."
 plb_news.2.a:0 "Одного разу ми повернемося і здобудемо перемогу!"
 plb_news.2.b:0 "Ведмідь не стане на коліна перед жуком."
 plb_news.2.c:0 "Варварська лють і невблаганна дикість - потужний союзник для ведмедів."
 plb_news.3.t:0 "Чейнджлінґи торжествують!"
 plb_news.3.d:0 "[This.GetNewspaperHeader]Майже ніхто не здивувався тому факту, що [CHN.GetName] здобули перемогу над державою [PLB.GetName]. Схоже, що дикість полярних ведмедів і міць їхніх важкоброньованих воїнів не рівня танкам чейнджлінґів, яким удалося пробитися крізь їхню оборону, незважаючи на помітні втрати та проблеми з логістикою.\n\nТаким чином, уся територія [PLB.GetName] була захоплена силами королеви Кризаліс. \nроте, схоже, що вже зараз сили чейнджлінґів зазнають труднощів у боротьбі з бродячими загонами важкоозброєних воїнів і надзвичайно злими і живучими дикими тваринами, які явно відмовляються визнавати, що у півночі тепер нові володарі."
 plb_news.3.a:0 "Дуже своєчасна перемога, командире!"
 plb_news.3.b:0 "Велика ганьба, яку запам'ятають цілі покоління."
 plb_news.3.c:0 "Дикість не змогла стримати натиск сучасності."
 plb_news.4.t:0 "Ведмеді змінюють сторону!"
 plb_news.4.d:0 "[This.GetNewspaperHeader]Бйорнлінґ, фактичний диктатор Північного Протекторату, якого багато хто вважав простою маріонеткою Кризаліс, потряс світ раптовою зрадою своєї колишньої господині. Він оголосив про скасування Північного Протекторату і створення "Гіперберії", а також про те, що відтепер чейнджлінґи і його нова нація перебувають у стані війни. Бйорнлінґ заявив, що він є агентом під глибоким прикриттям, який симпатизував гармонії та саботував військову машину чейнджлінгів зсередини. Поки невідомо, чи правда це, але доля держави [CHN.GetNameDef] з кожним днем виглядає все більш похмурою."
 plb_news.4.a:0 "Зрадники заслуговують лише смерті!"
 plb_news.4.b:0 "Він справді планував це весь час?"
 plb_news.5.t:0 "Еквестрія знову у війні!"
 plb_news.5.d:0 "[This.GetNewspaperHeader]Схоже, що тріумф еквестрійської гармонії виявився недовгим. Королева Ексувія з Первозданного Королівства заявила, що еквестрійський режим спаплюжив ідеї гармонії і використовує їх лише для маскування власних імперіалістичних амбіцій. Міжнародні спостерігачі були приголомшені подібним твердженням, тим паче, що в самої Ексувії та її режиму є проблеми з легітимністю як істинно гармонійний лад.\n\nНе дивлячись на це, мільйонна армія, що включає бронетехніку та колони панцербйорнів, уже перетнула кордон з Еквестрією і вступила в бій із захисниками-поні. Дехто стверджує, що ця війна стане лише повторенням Великої Війни, і чейнджлінгів знову перевершать за чисельністю військ і виробництвом. Однак армії Первозданного Королівства неймовірно люті й інші спостерігачі вже готуються до падіння Еквестрії."
 plb_news.5.a:0 "Зіткнення титанів..."
 plb_news.6.t:0 "Підйом першого титана"
 plb_news.6.d:0 "[This.GetNewspaperHeader]Завоювання Еквуса Первозданним Королівством завершено. Опір затихає і вже було проголошено нову державу - Титанічне Царство Еквуса.\n\nПісля урочистої коронації Ексувії в Кантерлоті відбулася дипломатична конференція, на якій Бйорнлінґ розповів про "Доктрину первозданного гармонізму". За його словами, Еквус колись був континентом первозданної гармонії великих чудовиськ. Однак лжепророки - алікорни - перекрутили цю ідею, використовуючи її для пропаганди слабкості та піднесення поні над усіма іншими істотами. Однак тепер усім расам Еквуса буде дозволено піднятися над своїм колишнім існуванням в кайданах слабкості...\n\nДалеко дивним є той факт, що настільки еклектичний режим не прагне до експансії, якщо тільки йому не загрожують інші "Титани" - пан-континентальні режими. Швидше, він стверджує, що тепер їхніми цілями будуть інші світи..."
 plb_news.6.a:0 "Яка сила може зупинити їх тепер?"

 northern_war.4.t:0 "Ведмеді на прицілі"
 northern_war.4.d:0 "Вид танків у зимовому камуфляжі викликав відрепетировані вигуки з боку тих, хто спостерігав за великим парадом амфібій. Машини, увінчані зброєю і просякнуті дивною магією університету вулика, борознили сніги Сорифа і розтинали води Ключ-Озера.\n\nНа параді була присутня і сама Кризаліс. Наприкінці виступу вона виголосила промову, в якій висміяла хутряних "убивць і брехунів, які нічим не кращі за своїх нерозумних родичів!"...\n\nЇї очікування були зрозумілі: якнайшвидше покінчити з проклятими ведмедями. Але ось деталі цього визначатиме сама армія, і генерали вирішили..."
 northern_war.4.a:0 "...не шкодувати жодних засобів для якнайшвидшого завершення війни."
 northern_war.4.b:0 "...зосередитися на логістиці, щоб уникнути втрат дорогого спорядження."

 northern_war.5.t:0 "Остаточна точка"
 northern_war.5.d:0 "Ми отримали звістки про те, що делегація чейнджлінгів під наглядом загону наших військ перетнула кордон. Війна значно виснажила сили чейнджлінґів, тож зрозуміло, що тепер королева намагається виторгувати білий мир: держави [CHN.GetName] і [PLB.GetName] повернуться до статус-кво, начебто нічого не сталося." Однак така угода стане глузуванням з важких жертв ведмедів. Чейнджлінґи заподіяли безліч страждань істотам, які не бажали жити так, як хочуть того пожирачі любові. Якщо ми забудемо весь заподіяний нам біль і не повернемо її Кризаліс, то рано чи пізно почнеться Друга Північна Війна. І цілком можливо, що нам уже не вдасться її пережити.\n\nІ все ж, незважаючи на ці побоювання, королева вряди-годи проявила розсудливість, попросивши миру, чого вже давно хотіли багато інших чейнджлінґів, якщо судити з ноток страху в їхніх останніх маневрах. Ведмеді продемонстрували неослабне панування над своїми суперниками. Тож навіть білий мир буде принизливим для чейнджлінгів.\n\nТепер долю півночі мав вирішити [PLB.GetLeader]."
 northern_war.5.a:0 "Ми виявилися сильнішими за чейнджлінґів. Цього достатньо."
 northern_war.5.b:0 "Чейнджлінґи поплатяться за свої злочини."

 northern_war.6.t:0 ""Ведмеді стримують чейнджлінгів!""
 northern_war.6.d:0 "Незважаючи на всі слова Кризаліс про створення неспинної, мстивої та механізованої армії, що повалить правителів Еквестрії та збере врожай кохання з усього континенту, чейнджлінґи зіштовхнулися з грізною перешкодою у вигляді держави [ROOT. GetName], яку королева раніше вважала безнадійно відсталою.\n\n\nПовідомлення було зрозумілим: держава [ROOT.GetName] не має наміру підкорятися примхам просторікуватої і скаженої диктаторки. І це зрозуміли не тільки чейнджлінґи. Заголовки газет з усього світу дюжиною різних мов висвітлюють нашу боротьбу і дурість Кризаліс."
 northern_war.6.a:0 "Це матеріал для перших шпальт!"

 northern_war.7.t:0 "Об'єднаний досвід живих і мертвих"
 northern_war.7.d:0 "Так, смерть ведмедів від дірявих копит чейнджлінгів була трагедією, але, на відміну від інших істот, ми можемо слухати слова мертвих. За допомогою шаманів ведмежі воїни змогли дізнатися про свої слабкі місця прямо від товаришів, які вже спочили.\n\nСнаряд, що прилетів з нізвідки? Снайпер, що промахнувся? Побудова атакуючих танків? Мертві розповідали живим про методи війни чейнджлінґів, а живі вдосконалювали свою тактику, не повторюючи колишніх помилок."
 northern_war.7.a:0 "Питання “Як ти помер?” зовсім не дурне."

 northern_war.8.t:0 "Благословення предків"
 northern_war.8.d:0 "- Він тріскається! Приготуйтеся! - Масивна крижана брила розкололася прямо перед ними.\n\nНа чолі експедиції стояв архішаман Вьольва, який раніше був ніким. Але тепер його підтримував [ROOT.GetLeader] і він був сповнений рішучості досягти своєї мети.\n\n- Тут, - сказав Вьольва, вказуючи на слабке місце в льоду. Ведмідь гарненько розмахнувся і вдарив. Холодна стіна обрушилася на членів експедиції, але панцерб'ерни захистили їх від крижаного потопу.\n\nКоли завали було розчищено, погляду членів експедиції відкрилися артефакти і добре збережені обладунки. Сотні, якщо не тисячі років тому вони були заховані в цьому непримітному святилищі, сплавленому із зачарованого льоду і кристалів.\n\n\nПредки ведмедів знали, що цей день настане. І тому сховали спорядження для своїх нащадків у цьому святому місці та в багатьох інших. Територія Всеотця йде на бій проти тих, хто бажає підкорити її."
 northern_war.8.a:0 "Завбачливість наших предків дасть змогу впоратися з жучарами."

 northern_war.9.t:0 "Аванпости чейнджлінґів"
 northern_war.9.d:0 "Патруль чейнджлінґів тремтів, незважаючи на шари одягу, в які вони вбралися. Насторожені очі в жаху метушилися на всі боки.\n\nІ тут на них з ревом обрушився Лютр.\n\nЦі чейнджлінґи були просто сміховинні. Варто було гаркнути раз-другий, та вистрілити в небо, як вони вже тікали, дзижчачи своїми крилами.\n\n\nЛютр та решта ведмедів прибігли сюди, розбираючи маленький форпост на запчастини та зброю. Вони розкопали цілий скарб, виявивши схованки зі зброєю, боєприпасами і провізією... Він узяв гвинтівку, зроблену чейнджлінґами. Можливо, вона була кращою за його стандартну зброю. А може й ні. Але все одно це була додаткова зброя, яка точно не буде зайвою.\n\nІ тепер вона належала йому."
 northern_war.9.a:0 "Не бійтеся ворогів."

 northern_war.10.t:0 "Крижана атака"
 northern_war.10.d:0 "Вефастр ховалася під сніговим покривалом. Камуфляж не був недавнім винаходом, але у чейнджлінґів він був вродженим. Тож Вефастр варто було повчитися у майстрів маскування. Хоча огида сковувала її нутрощі при думці про те, що їй доведеться стати схожою на чейнджлінґа, щоб перемогти чейнджлінґа, це був єдиний шлях.\n\n\nРозвідники не підвели: у полі її зору з'явився взвод танків і піхоти чейнджлінґів. Вефастр не стала стріляти. Вона подумки повторила собі: поки не стріляй і чекай. Дочекайся, поки вони пройдуть повз, відкривши свої вразливі спини. Коли чейнджлінґи пішли досить далеко, Вефастр прошепотіла, - Працюємо... Заховані гармати випустили свої снаряди, а з-під снігу вилізли лапи з блискучими сокирами."
 northern_war.10.a:0 "Колона танків горіла, розтоплюючи сніг."

 northern_war.11.t:0 "Партизанський "Зроби сам""
 northern_war.11.d:0 "- Це... нерозумно? - Сказала Тайт Сліп. Вона була поні, які рідко, але все ж таки зустрічалися у ведмежому опорі. І зараз її куратор-інформатор, Мýлаугр, провів її під фальшивими деревами через порожнистий стовбур іншого дерева прямо до якогось підземного збройового заводу, де дзижчали імпровізовані конвеєри та інші машини. Усі вони були побудовані з дерева, бруду, снігу і достатньої кількості магії, щоб утримати все це разом. І купи металобрухту.\n\n- Ми зробили все це з металобрухту, дякуючи чейнджлінгам, - Мýлаугр пояснив, показуючи на різні предмети. - Ця гвинтівка? Я зробив її з металобрухту. Ця куля? Я зробив її з металобрухту. Це чорнило і папір, якими я підробляв підписи? Я зробив їх зі сміття. Ці ведмеді? Вони тут завдяки металобрухту! Гаразд... почекай, хто це? Чому у вас тут...? Чейнджлінґ? Я вбив її сержанта металобрухт, я підкупив її металобрухт, і тепер вона на нашому боці! Усі вливаються! Крім того, розкажи мені, як ти взагалі стала працювати зі мною? Вона зітхнула. Сама по собі ідея була безглуздою, але вона не могла заперечувати доброзичливого товариства, яким останнім часом став славитися місцевий опір. Усе, що вони змогли вирвати в чейнджлінгів, використовувалося, і ніхто не залишався осторонь."
 northern_war.11.a:0 "- Завдяки металобрухту."

 northern_war.12.t:0 "Силки"
 northern_war.12.d:0 "Антер не зміг уникнути чергової хвилі мобілізації."\n\nПоїзд віз Антера і його товаришів у бік фронту. У вагон набилося так багато чейнджлінґів, що вони навіть не могли розправити крила.\n\nАнтеру було страшно. Але вороги були просто ведмедями. Не буквальними ведмедями з лісу, а просто купкою примітивів, що сварилися. Можливо, це і було правдою.\n\nДома він задовольнявся роботою з любов'ю. Іноді заблукалі істоти з того боку кордону переходили його і були готові для збору врожаю. Але вони були слухняними; для нього їхня боротьба була контрольованою, стримуваною.\n\nАле з цими істотами все було по-іншому. Ведмеді любили свої крижані пустки, але Кризаліс, звісно, повинна була це врахувати. І все ж..."
 northern_war.12.a:0 "Чому ця війна триває так довго?"

 northern_war.13.t:0 "Жуки на сніданок"
 northern_war.13.d:0 "- Жодних проблем бути не повинно, - Сержант Флешері сказала своїм рядовим, коли вони сховалися в бункері на своїй останній зупинці перед північним фронтом. - Ви вже вбили кілька ув'язнених, які намагалися втекти, у Весаліполісі. Що не так зараз? \n\n- Вони... великі, - пробурмотіла рядова Вольтине, дивлячись у бінокль через амбразуру. - Я чула історії... що вони хрустять нами. Вони буквально їдять нас. Ми поміщаємося прямо в їхніх лапах, а коли вони хапають нас, їхні зуби...\n\n- Їх тут немає. - Флешері відібрала бінокль, що викликає сумніви. Для більшої переконливості вона оголила зуби й облизала ікла. - Куля може вбити кого завгодно.\n\n- Вони занадто великі, щоб одна куля могла... \n\n- Так випустіть у них більше куль. - Але вона похитала головою. Флешері відчувала страх, який виходив від її власного загону."
 northern_war.13.a:0 "Ведмеді можуть буквально прихлопнути чейнджлінґів як мух."

 northern_war.14.t:0 "Любовна бомба"
 northern_war.14.d:0 "Саме ставлення “я можу це” було причиною того, що Уфейгр опинився тут, на фабриці з виробництва дивних деталей. Його викрали зі свого будинку, і він був змушений дихати цим димом, що подразнює легені. Бригадир сказав йому, що ці деталі допоможуть "обробляти" любов. А Уфейгра дуже цікавили подробиці... Зрештою, до нього доїхав невеликий контейнер зі зразком партії кохання, яку він мав допомогти обробити. Це була якась дивна рожева... штука.\n\nБезсмачні етикетки сухо повідомляли про те, що ця любов була зібрана прямо тут, можливо, через дорогу. Чия любов? Незгасна любов його сім'ї... шалена любов його друзів... ні, вони не змогли б забрати любов у самого Всеотця... але всі вони могли бути вже мертві, а їхні душі ув'язнені в цьому бездушному циліндрі.\n\nАле його можна було відкрити. У нього була сила і йому нічого було втрачати. Якщо любов може оживити чейнджлінга...\n\nОдразу після того, як рожевий вибух пошкодив будівлю і поховав персонал чейнджлінґів під уламками, решта закутих у ланцюги ведмедів заревіла і повстала, але їх швидко втихомирили."
 northern_war.14.a:0 "Тепер у нас є ув'язнені, що можуть запалювати любов!?"

 northern_war.15.t:0 "Громадськість сумнівається в успіху війни"
 northern_war.15.d:0 "Оскільки Торакс давно втік, Фаринкс побоювався відплати з боку королеви. Те, що його не було піддано ретельному допиту з боку УОБВ, було тихою милістю.\n\nОднак коли його освистали і закидали яйцями жителі одного міста прямо під час параду, він пошкодував, що не потрапив у професійні ратиці УОБВ.\n\nОднак це невдоволення не проявлялося у вигляді протестів і гасел на пікетах. Ні, вони заявляли про своє невдоволення в стилі поні. Фаринкс відчував цей гіркий післясмак негативно заряджених емоцій просто в повітрі. У натовпі, якому було наказано заповнити тротуари заради цієї події, не було й сліду тієї енергії, яку можна було відчувати багато років тому. "Що це за досконала військова машина, в яку було вкладено безліч коштів, якщо вона не може впоратися з купкою озброєних сокирами дикунів?" \n\nВін почув ще один тихий вигук “ганьба”. Одне слово по рації - і поворот танкової гармати дуже швидко призвів до того, що дисидент тут же розчинився в натовпі."
 northern_war.15.a:0 "Кризаліс продовжує рити собі яму."

 northern_war.16.t:0 "Істоти в темряві"
 northern_war.16.d:0 "Жовті очі демона спалахнули в темряві."\n\nСержант Коронатус скрикнула і злетіла. Вона направляла вдячні молитви всім існуючим і неіснуючим богам за те, що народилася чейнджлінґом і тому в неї є крила. Нездатність до польоту була єдиною слабкістю ведмедів.\n\nАле вони могли стріляти. У цьому голому чистому небі їй було б достатньо однієї кулі.\n\nОна згадала старі історії: казки на ніч і жахи про ведмедів, які мали б сидіти у своїх крижаних печерах і займатися примітивними речами.\n\nНо ці дурні ведмеді виросли у справжнісіньких жахіттях. Вона могла думати лише про свій дім і матір.\n\nКоронатус побачила в ночі відблиски світла від інших крил, і їй стало зрозуміло, що свій пост сьогодні покинула не тільки вона."
 northern_war.16.a:0 "Траншеї чейнджлінґів порожніють..."

 northern_war.17.t:0 "Бюрократичне пекло"
 northern_war.17.d:0 "Дзвін у вухах не міг зупинити або якось приглушити агонію його розуму..." Перед ним лежало стільки паперів, що вони могли накрити його з головою. Що він робив тут, у цій крихітній окупаційній зоні?\n\nМолва свідчила, що Якс, чиє ім'я було на слуху, виріс поруч із нижчими істотами і піднявся службовими сходами завдяки знанню чужого розуму. То чому цим займався кабінетний маратор паперів Зіген, а не Якс чи інший компетентний воїн? Він сидів і день за днем розгрібав бардак, який влаштувала армія, котра не бажала працювати ґрунтовно. Ведмедів не потрібно було заспокоювати, їх потрібно було позбутися.\n\n\nМеталічне клацання пістолета, що взводиться, вивело його зі стану похмурої замисленості. Пістолет був до комічного малий у величезних лапах нападника.\n\nОфіс і світ навколо нього палали, а палаючі папери підпалювали все навколо, створюючи відповідний захід для сутінків його життя.\n\nБуло вимовлено кілька слів, але він їх не зрозумів..."
 northern_war.17.a:0 "Спокій, нарешті спокій."
