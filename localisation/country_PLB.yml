 PLB_NP_mechanite_mastery:0 "Майстерність механітів"
 PLB_NP_smiths_beyond_the_veil:0 "Майстри ковальської справи з-за завіси"
 PLB_NP_anti_changeling_experience:0 "Античейнджлінґський досвід"
 PLB_NP_supply_lines_cut:0 "Лінії постачання перерізано!"
 PLB_NP_supply_lines_cut_desc:0 "Ведмеді-зрадники саботували наші лінії постачання! І поки ми не відновимо їх, нам буде важко доставити достатньо їжі або патронів для наших військ."
 PLB_NP_last_push:0 "Операція: Остаточна перемога"
 PLB_NP_exuvia:0 "Королева Ексувія"
 PLB_NP_exuvia_desc:0 "Принцеса Ексувія була восьмою в черзі на трон Соріфа, що прирікало її на пересічність. Але одного фатального дня вона настільки сильно розлютила Кризаліс, що її відправили в Північний Протекторат, щоб прибрати геть з дороги. Там вона подружилася з Бьорнлінгом, який коронував її "Королевою Льоду". Тепер Ексувія номінально є правителькою Півночі, хоча справжньої влади у неї немає."

