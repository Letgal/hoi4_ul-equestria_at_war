### Leader Descs ###
 POLITICS_EIRA_DESC:0"§YДата народження§!: 8 березня 976 року в твердині Вольсунґра\n\n\n§YБіографія§!: Ейра різко відрізняється від зазвичай жорстоких ведмедів завдяки своєму минулому у якості вигнанниці. У юному віці її вигнали не тільки з клану Вольсунґр, а й із самої ведмежої спільноти за те, що її ідеї були надто схожі на погляди слабких поні з Півдня. Ейра вирушила в Еквестрію і подорожувала там багато років, вивчаючи суспільство поні, культуру та їхній спосіб життя. Отримані під час подорожей знання тільки посилили її симпатію до гармонії. Ейра повірила, що і ведмеді можуть пізнати шлях поні.\n\nОднак не все, що вона дізналася за час перебування в Еквестрії, сподобалося їй. Куди б Ейра не вирушала, вона бачила ознаки індустріальної революції та її наслідки. Фабрики тяжіли над природою, а рід поні дедалі сильніше утверджував своє панування над землею, інколи геть не зважаючи на місцеву флору і фауну. Зустрінуті нею екологи вселяли в Ейру надію, і вона присягнулася собі, що якщо в неї колись з'явиться така можливість, вона зробить усе можливе, щоб із її ведмежою батьківщиною не трапилося такого... Цей шанс випав їй після повернення По Уеллінгтона на північ. Він став Деспотом всіх кланів, і її колишній дім - клан Вольсунґр - було розгромлено, і він перебував на межі повного краху. Ейра повернулася, щоб запропонувати свою допомогу тому самому місцю, яке колись вигнало її. Клан був змушений прийняти її, а також багатьох інших вигнанців, що назавжди змінило Вольсунґр. Нові ідеї Ейри завоювали популярність не тільки серед молоді, але навіть серед деяких старійшин. І все це допомогло їй у той момент, коли Ейра була змушена відкрито кинути виклик Пау Веллінгтону.\n\nТепер, ставши новою об'єднувачкою кланів, Ейра веде полярних ведмедів до нового, гармонійного майбутнього. І лише час покаже, яким воно буде.\n\n§YАвтор портрета§!: Neither"
 POLITICS_PRINCESS_EIRA_DESC:0 "§YДата народження§!: 8 березня 976 року в твердині Вольсунґра\n\n\n§YБіографія§!: Ейра різко відрізняється від зазвичай жорстоких ведмедів завдяки своєму минулому у якості вигнанниці. У юному віці її вигнали не тільки з клану Вольсунґр, а й із самої ведмежої спільноти за те, що її ідеї були надто схожі на погляди слабких поні з Півдня. Ейра вирушила в Еквестрію і подорожувала там багато років, вивчаючи суспільство поні, культуру та їхній спосіб життя. Отримані під час подорожей знання тільки посилили її симпатію до гармонії. Ейра повірила, що і ведмеді можуть пізнати шлях поні.\n\nОднак не все, що вона дізналася за час перебування в Еквестрії, сподобалося їй. Куди б Ейра не вирушала, вона бачила ознаки індустріальної революції та її наслідки. Фабрики тяжіли над природою, а рід поні дедалі сильніше утверджував своє панування над землею, інколи геть не зважаючи на місцеву флору і фауну. Зустрінуті нею екологи вселяли в Ейру надію, і вона присягнулася собі, що якщо в неї колись з'явиться така можливість, вона зробить усе можливе, щоб із її ведмежою батьківщиною не трапилося такого... Цей шанс випав їй після повернення По Уеллінгтона на північ. Він став Деспотом всіх кланів, і її колишній дім - клан Вольсунґр - було розгромлено, і він перебував на межі повного краху. Ейра повернулася, щоб запропонувати свою допомогу тому самому місцю, яке колись вигнало її. Клан був змушений прийняти її, а також багатьох інших вигнанців, що назавжди змінило Вольсунґр. Нові ідеї Ейри завоювали популярність не тільки серед молоді, але навіть серед деяких старійшин. І все це допомогло їй у той момент, коли Ейра була змушена відкрито кинути виклик По Уеллінгтону. Тепер Ейра офіційно коронована як принцеса полярних ведмедів, хоча заради цього довелося піти на обіцянки й поступки іншим кланам. Однак, незважаючи на ситуацію, в якій вона опинилася, Ейра сповнена рішучості захистити природу і принести гармонію не тільки кланам, а й усій півночі за будь-яку ціну.\n\n§YАвтор портрета§!: Neither"
 POLITICS_JUCHEBEAR_DESC:0 "§YДата народження§!: 21 грудня 971 року під подвійною веселкою в момент появи яскравої нової зірки на денному небі\n\n§YПосади і звання§!: Голова центрального комітету РПП, генеральний секретар РПП, прем'єр кабінету міністрів ДМОП, президент ДМОП, голова комітету національної оборони ДМОП, верховний головнокомандувач народної армії, військово-морського флоту й військово-повітряних сил, Сонце 11-го століття та вічний лідер Сельфорсінте Полярії.\n\n§YБіографія§!: Айсбер - це міф, легенда, бог. Кажуть, що він має силу двадцяти ведмедів, і що він може розривати танки своїми кігтями. Він мудріший за найвидатніших писарів Свартпельса, жалісливіший за найдобрішого Вольсунгра і могутніший за лавину. Він викликав королеву Кризаліс на дуель, і вона втекла з неї. Його проникливість у військових справах і неприборкана сила врятували ведмедів від чейнджлінгів. Коли шпигун-чейнджлінг спробував убити його, то куля зрикошетила від черепа Айсбера, залишивши його неушкодженим і миттєво вбивши ворога. Кожен ведмідь у країні обожнює Айсбера і прагне бути схожим на нього в усьому, в чому тільки може. Слава Великому Вождю!\n\n§YАвтор портрета§!: Neither"
 POLITICS_JUCHEBEAR_2_JUCHE_BOOGALOO_DESC:0 "§YДата народження§!: 14 січня 991 р. у священному місці біля Магарь-Фяраня під кометою, що пронеслася по небу.\n\n\n§YПосади та звання§!: §WГолова центрального комітету РПП, генералісимус Полярії, секретар ЦК, голова центральної військової комісії, депутат верховних народних зборів, сонце майбутнього Сельвстендигета, сяйна зірка півночі, вічний голова комісії національної оборони.§!\n\n\n§YБіографія§!: Сноубер - прекрасна молода ведмедиця, мудра науковиця і добра душа. Вона обхитрила вбивць, які вбили її батька, і прикінчила їх власними лапами. Вона має намір зберегти горду спадщину свого батька і зробити так, щоб ДМО Полярії проіснувала ще довгі століття.\n\nНа жаль, кілька зрадників-криптогармоністів заявили, що спадкове правління суперечить комунізму та ідеалу Сельвстендигета. Із цими зрадниками швидко розправилися, і всі ведмеді тепер приймають нову спадкоємицю божественного родоводу. Слава шановному вождю!\n\n§YАвтор портрета§!: Neither"
 POLITICS_BJORNLING_DESC:0 "§YДата народження§!: 22 грудня 975 року поблизу Східного Ключ-Озера\n\n§YБіографія§!: Бйорнлінґ, як і багато інших членів клану Розенсверд, був вигнаний Деспотом По Уеллінгтоном за співпрацю з чейнджлінґами. Це не тільки не відбило в нього бажання до подальшої співпраці, а й стало поворотним моментом для молодого Бйорнлінґа, оскільки він зрозумів, що тільки самі чейнджлінґи можуть врятувати рід ведмежий від занепаду, слабкості та гармонії. Нескінченними вмовляннями і лестощами йому вдалося розпалити самолюбство королеви Кризаліс настільки, що він отримав бажаний приз - владу над Північним Протекторатом. За її підтримки його призначили лордом-протектором, він отримав розпливчасті вказівки з широкою автономією в їхній реалізації. Північ возз'єднається в Третій Об'єднавчій Війні, план чотирьох етапів буде реалізовано цілком і повністю, а всі ведмеді навчаться любити свою королеву і свого лорда-протектора.\n\nТепер, коли він здобув владу, лише деякі здогадуються, що він збирається з нею робити. Але всі знають, що його правління буде жахливим, бо Бьорнлінг не дозволить нічому - ані моралі, ані кланам, ані еквестрійцям, ані навіть законам самої реальності - встати на шляху його мрії.\n\n\nГіперберію буде відновлено за допомогою куль, напалму і газу. За будь-яку ціну.\n\n§YАвтор портрета§!: Neither"
 POLITICS_PWELLINGTON_DESC:0 "§YДата народження§!: 10 жовтня 959 року в Магарь-Фярані\n\n§YБіографія§!: По Уеллінгтон був багатьма: мандрівником, найманцем, об'єднувачем, а тепер і Деспотом. Він воював під час Республіканської Революції як найманець, де його загін чудово проявив себе в бою, хоча й дещо заплямував репутацію політичною ненадійністю та актами мародерства. Коли прийшов час платити за рахунками, у його наймачів не вистачило коштів, щоб розплатитися, тому вони подарували йому стародавній лінкор, через що По зацікавився флотом. По воював в Об'єднавчій Війні з 1000 до 1002 року, під час якої він вигнав клани Розенсверд і Торденстьєрн і підпорядкував собі решту. Останні п'ять років він намагається модернізувати суспільство, закуповуючи гвинтівки в Нова-Грифонії і намагаючись сформувати дійсно єдину націю полярних ведмедів. За іноземними стандартами він твердий, але справедливий правитель, який зацікавлений у благополуччі всієї раси полярних ведмедів загалом. Але за стандартами самих полярних ведмедів - він божевільний тиран, який висуває абсурдні вимоги до кланів, яким швидко набридли його невміла химерність і безглузді амбіції. Сам По вважає себе неефективним і недостатньо могутнім правителем. Гровер I, Гровер II і Кемерскай не терпіли непокори. Так чому він повинен миритися з цим? Наближається п'ятирічний ювілей початку його правління, і тільки час покаже, як Пау впорається в умовах мінливої ситуації в Еквусі.\n\n§YАвтор портрета§!: Kessel"
 POLITICS_TORBEN_DESC:0 "§YДата народження§!: 4 червня 952 року у фортеці Свартпельса\n\n§YБіографія§!: Для тих, хто не належить до суспільства полярних ведмедів, Торбен видається ходячим парадоксом. Наймогутніший воїн у всьому співтоваристві полярних ведмедів також є блискучим вченим та істориком. Але це не дозволяє зрозуміти життєво важливий зв'язок між його розумом і тілом. Він удосконалює фізичне тіло, щоб живити свій розум, і вдосконалює розум, щоб зміцнювати своє тіло. Він присвятив своє життя вивченню минулого і забезпеченню його збереження в сьогоденні. Він бився з вессландцями і старим кланом Вольсунґр, поки вони не впали перед слабкістю гармоністів. Він воював із рейдерами з Фронтира, які прийшли в пошуках міфічного міста із золота. Він був першим, хто приєднався до По Уеллінгтона в Першій Об'єднавчій Війні, і підтримував його доти, доки чейнджлінґ, що перетворився на його друга, не вирішив привести вигнанців додому. Торбену дуже дорогі традиції та історія, і саме ця пристрасть змусила його пройти шлях від воїна до Володаря Грому і стати вождем клану, а тепер і всього роду полярних ведмедів. Він мріє, щоб уся північ була об'єднана, віроломні чейнджлінґи були покарані за незліченні злочини, а імперіалісти-грифони знали своє місце. Тепер, коли всі полярні ведмеді перебувають у його владі, ці мрії опинилися в зоні досяжності.\n\nВедмеді повернуть втрачені землі і відновлять свою честь. Їхніх ворогів буде переможено і покарано. І північ буде сильною і вільною ще мільйон років.\n\n§YАвтор портрета§!: Neither"

