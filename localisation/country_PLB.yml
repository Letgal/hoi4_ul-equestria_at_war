 PLB_NP_dimensional_mirrors:0 "Дзеркала-портали"
 PLB_NP_dimensional_mirrors_desc:0 "Ми навчилися створювати дзеркала, які відкривають шлях через виміри в інші світи, де можна знайти всілякі знання."
 PLB_NP_dimensional_mirrors_2:0 "Дзеркала-портали"
 PLB_NP_dimensional_mirrors_2_desc:0 "Ми отримуємо кошти з альтернативного світу через портал. І ці ресурси значно розширюють можливості наших операцій у цьому світі... і багатьох інших."
 PLB_NP_equestria_girls:0 "Міжпросторове шпигунство"
 PLB_NP_equestria_girls_desc:0 "Одна з наших шпигунських місій нині здійснюється в альтернативному вимірі. Вона зустрічає чимало труднощів, але при цьому дає нам досвід практичного застосування аналогічних операцій у нашому світі."
 PLB_NP_equestria_girls_lar:0 "Міжпросторове шпигунство"
 PLB_NP_equestria_girls_lar_desc:0 "Одна з наших шпигунських місій наразі здійснюється в альтернативному вимірі. Вона зустрічає чимало труднощів, але при цьому дає нам досвід практичного застосування аналогічних операцій у нашому світі."
