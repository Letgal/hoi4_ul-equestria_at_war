 PLB_eira_request_unification_with_penguins_desc:0 "Пінгвіняча плоть слабка і немічна. Але дух їхній істинно північний, а самі пінгвіни - горді й шляхетні створіння зими. Тому багато хто в нашому Князівстві прихильно поставиться до того, щоб наші держави об'єдналися в дружбі й братерстві. Тому ми простягнемо пінгвінам лапу дружби і попросимо їх мирно приєднатися до нашої держави. Якщо вони погодяться, то ми разом станемо лише сильнішими! Якщо ж ні, то ми з повагою поставимося до їхнього бажання. Адже брати і сестри іноді сваряться..."
