 PLB_juche_bear_3_loc:0 "Івар - простий ведмідь, якому подобаються прості речі, але деякі з них "поки що" недоступні у славній країні Полярії, і це не може тривати вічно. З благословення славного Ведмедя-Кожум'яка Івар розпочав операцію з постачання на північ усього, що можуть дати їхні щедрі союзники зі Сталіонграду: хорошого алкоголю, тютюну та опіуму. Івар просто насолоджується цими простими речами."
 PLB_juche_bear_4:0 "Товариш-воїн Коль"
 PLB_juche_bear_4_loc:0 "Передбачуваний двоюрідний брат Крижаного Ведмедя, Кол вважається уособленням двох чеснот, які живуть в Полярії, це традиції і вірність справі, за яку він готовий боротися до останнього подиху. Як не дивно, при всьому своєму націоналістичному запалі, його зброєю є сталінградський кулемет, до якого він відчуває дивний сентимент."
