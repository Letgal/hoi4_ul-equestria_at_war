 PLB_a_role:0 "Роль"
 PLB_a_role_desc:0 "Кожному ведмедю відведена своя роль у нашому суспільстві, що дає змогу їм усім працювати на благо нації по-своєму, подібно до шестерень у механізмі."
 PLB_an_opportunity:0 "Можливість"
 PLB_royal_environment_agency:0 "Королівське Агентство з охорони навколишнього середовища"
 PLB_royal_environment_agency_desc:0 "Королівська агенція, створена принцесою Ейрою, є радою ведмедів, які відповідають за ухвалення та виконання рішень, спрямованих на збереження і захист довкілля та природи в нашій державі."
 PLB_royal_environment_agency2:0 "Королівське Агентство з охорони навколишнього середовища"
 PLB_royal_environment_agency2_desc:0 "Королівська агенція, створена принцесою Ейрою, є радою ведмедів, які відповідають за ухвалення та виконання рішень, спрямованих на збереження і захист довкілля та природи в нашій державі."
 PLB_reforge_and_recycle_in_perpetuity:0 "Переробка та повторне використання"
 PLB_reforge_and_recycle_in_perpetuity_desc:0 "Кожну крихту ресурсів використовують повторно, щоб домогтися максимальної ефективності. "Хто даремно не витрачає, тому завжди вистачає.""
 PLB_tough_buildings:0 "Споруди з льоду"
 PLB_tough_buildings_desc:0 "Незважаючи на труднощі у зведенні таких споруд, будівництво споруд з чистого льоду допомагає значно полегшити будь-який ремонт у довгостроковій перспективі."
 PLB_bringing_back_monsters:0 "Повернення монстрів"
 PLB_bringing_back_monsters_desc:0 "Процес повернення монстрів у дику природу довгий і вельми дорогий, але він конче необхідний для того, щоб усе повернулося до свого природного стану."
 PLB_prepare_for_tundra:0 "Збереження тундри"
 PLB_prepare_for_tundra_desc:0 "Чималі території замерзлої тундри тепер є недоторканними для модернізації, внаслідок чого процес будівництва насилу пристосовується до нових умов. Багато ведмедів також протестують проти цих змін, розглядаючи їх як втрату потенціалу для майбутнього розвитку."
 PLB_great_monsters_of_the_north:0 "Великі монстри півночі"
 PLB_great_monsters_of_the_north_desc:0 "Монстри півночі повернулися до своїх природних місць проживання, і це робить нашу землю вельми ворожою для будь-кого, хто не знайомий з настільки суворими умовами."
 PLB_born_in_tundra:0 "Народжені в тундрі"
 PLB_born_in_tundra_desc:0 "Ми народилися серед льодів і холоду, і тому знаємо краще за інших, як жити за рахунок землі. Крім того, такий досвід дає нам змогу будувати дороги в найбільш придатних для швидких подорожей місцях."
