 PLB_queen_guard:0 "Карапас Страшний"
 PLB_queen_guard_desc:0 "§YНародження§!: 12 березня 936 року\n§YЗвання§!: Корпсфюрер Північного фронту\n§YЖиттєпис§!: Карапас народився у зв'язковій родині в Дітрісіумі, що забезпечило йому, коли він виріс і вступив до армії, посаду командира. На цій посаді Карапас служив під час кампаній проти оленячих фанатиків у 962 році та проти враксів у 971 році, заробивши репутацію брутального, жорстокого на полі бою, презирливого до слабких, одержимого ідеєю брати участь у важких битвах і пробиватися крізь жахливі умови, а в одному випадку навіть продовжував битися, незважаючи на опіки кислотою. Завдяки цьому його запросили приєднатися до гвардії королеви Кризаліс, де він швидко просунувся по службі.\n\nВтім, зірка Карапаса не зійшла б далеко, незважаючи на ядро відданих йому людей, що сформувалося навколо нього. Адже він часто конфліктував з іншими командирами через зовнішню політику. Він мало переймався геополітикою любові, обмежуючи власне споживання, щоб загартовуватися, і ще менше - підкоренням еквестрійців . На його думку, Чейнджлінґи мали або домінувати на Півночі, або наносити удари за океаном, де на них чекали суворіші вороги, ніж поні. Однак для більшості командирів і королев це звучало як марення божевільного чейнджлінґа. Марення, яке разом з невдачею 1002 року настільки розлютило Кризаліс, що вона вигнала його, призначивши на невідому посаду поблизу Соріфа і відсунувши його послідовників на узбіччя, відсунувши Ласіна Кардо і його покоління на ще більш видне місце, ніж раніше.\n\nОднак Карапас знайшов визнання і навіть дружбу серед ведмежих кланів вигнанців, які втекли до Земель Чейнджлінґів після походів По Уеллінгтона. Він поважав їхню войовничу культуру, а вони захоплювалися ним за його "застиглу душу." Тож коли Бйорнлінґ рушив на схід, Карапас зголосився приєднатися до нього. І хоча Кризаліс і Ласін, здається, живуть в омані, що він старий старезний лояліст, який просто наглядає за Північним Протекторатом, його злість сильна, його кров холоне від оживляючих наркотиків, і його вірність належить на Півночі."
