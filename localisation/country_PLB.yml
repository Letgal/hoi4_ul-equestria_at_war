 PLB_republican_struggle_decisions:0 "Підйом Конфедерації"
 PLB_twin_republics:0 "Братське об'єднання"
 PLB_twin_republics_desc:0 "Пінгвіняча плоть слабка і немічна. Але дух їхній істинно північний, а самі пінгвіни - горді й благородні створіння зими. Тому багато хто в нашій Конфедерації прихильно поставиться до того, щоб наші держави об'єдналися в дружбі та братерстві. Тому ми простягнемо пінгвінам лапу дружби і попросимо їх мирно приєднатися до нашої держави. Якщо вони погодяться, то ми разом станемо лише сильнішими! Якщо ж ні, то ми з повагою поставимося до їхнього бажання. Адже брати і сестри іноді сваряться..."
