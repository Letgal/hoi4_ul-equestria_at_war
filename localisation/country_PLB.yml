 PLB_yearly_review:0 "Щорічний огляд"
 PLB_yearly_review_desc:0 "За півстоліття, що білі ведмеді об'єдналися під захистом По Уелінгтона, країна з кожним кроком просувалася до сучасності і, можливо, навіть до одноманітності. Через деякий час після настання нового року новонароджена бюрократія представляла деспоту свій звіт. Настав час для п'ятого такого звіту."

 PLB_treasury_report:0 "Ситуація зі скарбницею"
 PLB_treasury_report_desc:0 "Хоча реалізація програм модернізації була досить... незадовільною... Це можна перенести на наступний рік. Важливо, що у нас є ресурси для їх продовження. Це добре, що у нас все ще має бути достатньо ресурсів, щоб просувати ці зусилля вперед."

 PLB_request_financial_support:0 "Прохання про фінансову підтримку від інших кланів"
 PLB_request_financial_support_desc:0 "На жаль, у зв'язку з досить несподіваною матеріальною ситуацією, ми змушені відступити від нашої позиції першості і домінування Клану Скюфлінґ і попросити матеріальної підтримки у інших підкорених кланів. Ми можемо лише сподіватися, що це не зруйнує сформований нами образ вищості і навіть божественної прихильності."

 PLB_establish_tax_system:0 "Візьмемо те, що нам потрібно"
 PLB_establish_tax_system_desc:0 "Якщо вони не реагують на ввічливість і дружні прохання, можливо, вони відреагують на закон і силу. Ми більше не будемо просити, ми будемо брати! Державі, щоб вижити, потрібно модернізуватися, а для модернізації потрібні ресурси, писарі і солдати. І якщо треба буде, дасть Всевишній, ми залізною лапою візьмемо те, що нам потрібно!"

 PLB_united_polar_bear_army:0 "Створити об'єднану армію білих ведмедів"
 PLB_united_polar_bear_army_desc:0 "Наразі армія нашої країни складається з загонів клану Скюфлінґ. Це було помилкою, оскільки, здається, це призвело до того, що інші дев'ять кланів забули, що вони є нашими підлеглими і мають свої власні обов'язки. Можливо, вони не так охоче забудуть, коли їхнім обов'язком стане боротися за країну під керівництвом По."

 PLB_nationalize_fish_farms:0 "Розпочати націоналізацію рибних ферм"
 PLB_nationalize_fish_farms_desc:0 "Однією з перших речей, яку зробив По Уеллінгтон після своїх завоювань, було зробити власність на прибережні рибні ферми більш справедливою, в деяких випадках навіть роздаючи рибу клану Скюфлінґ менш щасливим кланам. Це був не лише акт доброти, але й демонстрація сили. Хто контролює торгівлю та вилов риби, той контролює ведмедів. Таким чином, ми повинні контролювати більшу частину риби."

 PLB_combined_research_initiatives:0 "Розпочати спільні дослідницькі ініціативи"
 PLB_combined_research_initiatives_desc:0 "Хоча ми можемо багато чого навчитися з-за кордону, так само багато чого можна дізнатися зсередини. Багато кланів виробляють і використовують унікальні адаптації різних технологій, які повинні бути поширені, щоб стати доступними для всіх ведмедів. Задля цієї благородної мети ми вимагатимемо, щоб ремісники інших кланів були відправлені до наших фортець і навчили нас своїм знанням, щоб ми могли поширити їх по всій Півночі."

 PLB_the_outcast_question:0 "Питання вигнанців"
 PLB_the_outcast_question_desc:0 "Вони можуть поводитися зарозуміло і зверхньо по відношенню до нас, насміхаючись над нашою гордістю, нашими мріями і концепцією великої об'єднаної ведмежої держави. Але ми все ще контролюємо кордони, а вони - ні. Якщо ми не можемо отримати підтримку і допомогу від ведмедів вдома, ми просто візьмемо її у ведмедів закордоном. Ми відкриємо кордони і приймемо незліченну кількість вигнанців, які блукають світом, додому."

 PLB_scyfling_shall_not_surrender:0 "Ми не поступимося, ми не здамося!"
 PLB_scyfling_shall_not_surrender_desc:0 "Минуло менше десяти років, і знову наш клан протистоїть решті собі подібних. Але, як і минулого разу, з волі Всевишнього, ми не здамося і не відступимо, поки всіх білих ведмедів знову не об'єднає клан Скюфлінґ."

 PLB_seize_their_fish_farms:0 "Відновити рибні ферми"
 PLB_seize_their_fish_farms_desc:0 "Зруйновані та саботовані рибні ферми були проблемою, якою ми нехтували через постійно зростаючу кількість проблем перед колапсом. Однак ми більше не можемо собі цього дозволити. Рибні ферми на всіх землях, якими ми володіємо, повинні знову запрацювати, щоб ми ніколи не відчували дефіциту."

 PLB_strenghten_local_alliances:0 "Створити місцеві альянси"
 PLB_strenghten_local_alliances_desc:0 "Є багато крижаних фортів або навіть більших фортець, які не населені жодним з великих кланів, а радше меншими вигнанцями або тими, чий рід ніколи не належав до жодного клану. Раніше ми здебільшого ігнорували їхні інтереси та роль в об'єднаній ведмежій державі. Однак це ще можна виправити."

 PLB_storm_their_fortresses:0 "Штурмувати їхні фортеці"
 PLB_storm_their_fortresses_desc:0 "Хоча більшість північно-західних ведмежих земель належать і контролюються кланом Скюфлінґ або ведмедями, що не мають кланового підпорядкування, все ще є чимало місць, де пазурі кланів Онлартіру або Вессландії простягаються серед того, що належить нам. Ми мусимо бути певні, що не отримаємо удару в спину, а отже, їхні замки та фортеці мають впасти!"

 PLB_northwest_reclaimed:0 "Завершити рекультивацію північного заходу"
 PLB_northwest_reclaimed_desc:0 "Риба знову ловиться у великій кількості. Збираються все більші і більші армії. І будь-яка присутність інших кланів, що становить для нас небезпеку, була ліквідована. Тепер ми можемо вирушати в похід!"

 PLB_the_march_west:0 "Марш на Захід"
 PLB_the_march_west_desc:0 "Той факт, що на Східному Ключ-озері залишилося щось, що могло б повстати після того, як клани, які там залишилися, були витіснені у Чейнджлінґів землі за зраду, досить дивний. Повернення його не повинно бути проблемою."

 PLB_gaze_south:0 "Звернути погляд на південь"
 PLB_gaze_south_desc:0 "Онлартір - невблаганний край. Далекий від живильного моря і навіть більшості річок чи озер. За свою довгу історію вона зазнала вторгнень чейнджлінґів, зграй яків, інших ведмежих кланів і навіть кількох невдалих експедицій грифонів. Не дивно, що така земля породила цілих три клани грізних воїнів..."
 PLB_negotiations_with_clan_Kane:0 "Спробувати переговори з кланом Кейн"
 PLB_negotiations_with_clan_Kane_desc:0 "Клан Кейн є досить сильною силою, будучи єдиним кланом, війська якого можуть зрівнятися з грізними Свартпелами в ближньому бою і, можливо, навіть володіють більшою витривалістю. Раніше підкорити їх було важко. Але, можливо, як прояв доброї волі і розуміння, ми зможемо перемогти їх словом, а не кігтями..."

 PLB_negotiations_with_clan_goltung:0 "Спробувати переговори з кланом Ґотлунґ"
 PLB_negotiations_with_clan_goltung_desc:0 "Навіть у невблаганній землі Онлартір клан Ґотлунґ був у найгіршому становищі. І все ж вони вистояли у своїх великих фортецях і з великими щитами. Минулого разу знадобилося багато часу, щоб примусити їх до покори, хоча, можливо, вони не хочуть, щоб їхні нові фортеці знову були розбомблені на порох, і бажають домовитися?"

 PLB_negotiations_with_clan_rozenkrantz:0 "Спробувати поговорити з кланом Розенкранц"
 PLB_negotiations_with_clan_rozenkrantz_desc:0 "Шаман клану Розенкранц вдивляється в північні вітри і спрямовує силу самої зими, як ніхто інший. Лише перехитривши та пересиливши їх, ми перемогли. Можливо, ми зможемо переконати їх вдивитися в північні вітри і побачити, що наші долі збігаються?"

 PLB_subjugate_clan_Kane:0 "Підкорення клану Кейн"
 PLB_subjugate_clan_Kane_desc:0 "Клан Кейн з Онлартіру може складатися з гордих і великих воїнів, кожен з яких, можливо, може зрівнятися з будь-якими двома або навіть трьома представниками інших кланів. Але колись ми вже ставили їх на коліна, і ми можемо зробити це знову!"

 PLB_subjugate_clan_goltung:0 "Підкорення клану Ґотлунґів"
 PLB_subjugate_clan_goltung_desc:0 "Клан Ґотлунґів, можливо, знову вважає себе недосяжним за своїми великими мурами, їхні фортеці здіймаються вище, ніж раніше. Вони робили те саме минулого разу, коли ми пройшли Північ, об'єднавши ведмедів під єдиним прапором. Це не допомогло їм тоді, і не допоможе зараз."

 PLB_subjugate_clan_rozenkrantz:0 "Підкорення клану Розенкранц"
 PLB_subjugate_clan_rozenkrantz_desc:0 "За ці п'ять років клан Розенкранц удосконалив своє магічне ремесло так, як ніхто з нашого роду не бачив раніше. Однак ми знаємо, що благословення божественне сильніше за будь-яку магію смертних. Навіть якщо вони думають, що все змінилося, вони ніколи не зможуть перемогти армії, благословенні Всебатьком."

 PLB_destroy_clan_Kane:0 "Знищити клан Кейн"
 PLB_destroy_clan_Kane_desc:0 "У тому, що ми маємо зробити, немає нічого шляхетного, але це треба зробити. Великі воїни клану Кейн будуть вбиті до останнього за допомогою нашої сили. Ніхто не виживе, щоб чинити опір. Залишиться лише провина та жаль."

 PLB_destroy_clan_goltung:0 "Знищити клан Ґотлунґ"
 PLB_destroy_clan_goltung_desc:0 "Це жорстоко і марнотратно, можливо, навіть абсурдно, але у нас немає іншого вибору... Великі стіни Ґотлунґа обрушаться на них, поховавши всіх під собою, залишивши по собі лише примарні руїни."

 PLB_destroy_clan_rozenkrantz:0 "Знищити клан Розенкранц"
 PLB_destroy_clan_rozenkrantz_desc:0 "Завиють північні вітри і зареве вогонь, але хуртовина шаманської сили Розенкранців згасне. Згасне ціла спадщина, залишивши послання гейлів неможливими для розуміння."

 PLB_pacify_south:0 "Південь наш"
 PLB_pacify_south_desc:0 "Онлартір знову спочиває під прапором Скюфлінґ, як це було нещодавно. Однак тепер земля гордих воїнів і великих шаманів по-справжньому віддана нашій справі, чого ми не змогли забезпечити минулого разу через нашу дурість. Але тепер, тепер ми можемо бути впевнені, що повстань більше не буде."

 PLB_gaze_east:0 "Звернути наш погляд на схід"
 PLB_gaze_east_desc:0 "Несподівано і, можливо, зненацька не лише для нас, а й для всіх у ведмежих землях, три клани багатої Вессландії об'єдналися між собою, уклавши своєрідний союз рівних. Такої системи ще ніколи не було серед ведмедів, і будемо сподіватися, що вона має свої недоліки, бо якщо Вессландія дійсно повстане об'єднаною, у нас просто не вистачить чисельності, щоб мати шанси!"

 PLB_negotiations_with_triple_alliance:0 "Спробувати перемовини з Потрійним Альянсом"
 PLB_negotiations_with_triple_alliance_desc:0 "Так званий "Потрійний альянс" Вессландії є справді занадто великим ворогом, щоб зустрітися з ним на полі бою. Хоча позиція рівних є досить жахливою, коли справа доходить до переговорів між ведмедями, ми можемо лише сподіватися, що вессландці зайняли більш прагматичну позицію в таких питаннях, ніж їхні слуги-грифони."

 PLB_shatter_the_great_fortresses:0 "Облога Потрійного Альянсу"
 PLB_shatter_the_great_fortresses_desc:0 "Об'єднана Вессландія легко розчавить нас. Але з огляду на розташування регіону, оточеного з усіх боків ворогами, будь то один з великих ведмежих кланів або грифони, вони ніколи не зможуть битися з нами на рівних. І таким чином одна перемога буде нагромаджуватися на іншу, поки ми не досягнемо іншого боку щедрої Вессландії."

 PLB_shatter_the_alliance:0 "Розбити Потрійний Альянс"
 PLB_shatter_the_alliance_desc:0 "Вессландія об'єдналася сама, повстала з колишніх ворогуючих кланів... Вони і раніше чинили нам опір, але тепер, після всього, що ми зробили? Вони ніколи не приймуть нашу владу, а ми ніколи не зможемо їх стримати... Залишився тільки один варіант. Винищити цілий регіон. Будемо сподіватися, що боги пробачать нам, тому що ми ніколи не зможемо пробачити себе."

 PLB_pacify_east:0 "Схід наш"
 PLB_pacify_east_desc:0 "Багата і велика Вессландія тепер під нами. Незважаючи на її нещодавнє об'єднання в силу, яка могла б кинути нам виклик і навіть перемогти нас, якби Всеотець не благословив нас, ми були тими, хто вийшов переможцями, незважаючи на те, що в будь-якому іншому випадку було б неможливим шансом! І цього разу ми точно вистоїмо."

 PLB_prepare_for_the_final_struggle:0 "Підготуватися до фінального ривка"
 PLB_prepare_for_the_final_struggle_desc:0 "Ми могли б усунути загрозу, яку становили для нас менші клани, але щоб протистояти великому клану Вольсунґр та грізному клану Свартпельс, нам потрібно підготуватися якомога краще. Ми зберемо нові сили та укріпимо наші нові кордони, готуючись до відплати та великого наступу."

 PLB_question_of_clan_volsungr:0 "Питання клану Вольсунґр"
 PLB_question_of_clan_volsungr_desc:0 "Клан Вольсунґр, мабуть, є певною аномалією в межах територій білих ведмедів. Колись вони були конкурентами наших колишніх товаришів зі Свартпельса, а отже, під час попереднього об'єднання програли вкрай жорстоко. Це змусило їх прийняти багатьох вигнанців, що змінило їх, навіть трансформувало. Важко навіть подумати, як би з ними зараз було найкраще поводитися."

 PLB_attempt_negotiations_with_clan_volsungr:0 "Спроба переговорів з гармоністами Вольсунґру"
 PLB_attempt_negotiations_with_clan_volsungr_desc:0 "При новій "принцесі" - Ейрі, клан Вольсунґр переосмислив себе в імітації Еквестрійського правління. Можливо, їхній пацифізм і прагнення прощати також перекочували до них? Можливо, вони хотіли б поговорити про це?"

 PLB_subjugation_of_clan_volsungr:0 "Спроба підкорення Вольсунґрських гармоністів"
 PLB_subjugation_of_clan_volsungr_desc:0 "Клан Вольсунґр одного разу поставили на коліна. Це можна повторити. Скільки б вони не копіювали Еквестрію, вони не зможуть зрівнятися з тактичною майстерністю, якої ми навчилися за роки вигнання у Грифонії."

 PLB_destroy_of_clan_volsungr:0 "Розбомбити гору Вольсунґр на порох"
 PLB_destroy_of_clan_volsungr_desc:0 "Після того, що ми зробили, жалюгідна еквестрійська копія клану Вольсунґр ніколи не об'єднаються з нами і не підкоряться нам. Єдиний спосіб гарантувати, що ворожа армія не ховається в цих горах, - це обрушити їх на фортецю Вольсунґр всередині... Будемо сподіватися, що викуване майбутнє буде достатньо світлим, щоб виправдати це."

 PLB_volsungr_defeated:0 "Гори яків наші"
 PLB_volsungr_defeated_desc:0 "Кажуть, що гори, які відокремлюють наші землі від яків, неможливо прорватися і воювати в них. Але в нашому наступі на Вольсунґр ми підкорили і ці великі гори."

 PLB_question_of_clan_svartpels:0 "Питання про клан Свартпельсів"
 PLB_question_of_clan_svartpels_desc:0 "Клан Свартпельс був нашим найвірнішим союзником під час першого об'єднання. Більше того, їхній старійшина - Повелитель Бурі Торбен - був добрим, хоч і далеким другом По Уеллінгтона. Але тепер ми стоїмо в опозиції..."

 PLB_attempt_negotiations_with_clan_svartpels:0 "Спробувати мирний варіант зі Свартпельсом"
 PLB_attempt_negotiations_with_clan_svartpels_desc:0 "Клан Свартпельс, схоже, вважає, що наші помилки - це не наші власні провини, а радше якась змова, керована чейнджлінґами. З огляду на це, якщо ми дійсно зможемо переконати їх приєднатися до нас як братів по зброї та наших непохитних друзів і союзників, вони знову стануть нашими друзями і союзниками."

 PLB_subjugation_of_clan_svartpels:0 "Змусити Повелителя Грому знову стати на коліна"
 PLB_subjugation_of_clan_svartpels_desc:0 "Хоча віра клану Свартпельс у те, що наші помилки є нічим іншим, як інспірованою ззовні змовою, є дивною, вона також заспокоює, оскільки означає, що якщо ми доведемо, що ми справжні ведмеді, вони, швидше за все, знову стануть на нашу сторону. Однак для Свартпельса і Торбена єдиний спосіб довести це - війна..."

 PLB_destroy_of_clan_svartpels:0 "Грім і блискавка їх не врятують"
 PLB_destroy_of_clan_svartpels_desc:0 "Як би сильно вони не були переконані, що все погане - це змова чейнджлінґів, вони просто ніколи не визнають, що ми зробили і чому. Це величезне горе, коли доводиться йти проти старих друзів. Але заради майбутнього роду людського це необхідно зробити."

 PLB_svartpels_defeated:0 "Північ у мирі"
 PLB_svartpels_defeated_desc:0 "Навіть великі північні береги тепер підкоряються волі По Уеллінгтона і клану Скюфлінґ! Воістину, якщо ми знову зможемо простягнути свій пазур через ці нестерпні землі, наше майбутнє буде благословенне морозом і духами наших предків."

 PLB_scyfling_victorious:0 "Перемога Скюфлінґу"
 PLB_scyfling_victorious_desc:0 "І знову, вдруге за менш ніж десять років, клан Скюфлінґ під керівництвом По Уеллінгтона є беззаперечним лідером гонки білих ведмедів. І цього разу наше панування беззаперечне."

 PLB_scyfling_has_no_honor:0 "Наші союзники зазнали поразки"
 PLB_scyfling_has_no_honor_desc:0 "Сталося абсурдне і неможливе. Велика єдність білих ведмедів, за яку ми боролися пліч-о-пліч з богонатхненним кланом Скюфлінґ та їхніми володарями, розпалася. І це могло статися лише в один спосіб - через проникнення чейнджлінґів..."

 PLB_march_on_clan_anker:0 "Питання про клан Анкер"
 PLB_march_on_clan_anker_desc:0 "З тих чи інших причин клан Анкер, наш давній васал і найближчий до нас у культурному плані, вже деякий час досить віддалений. Ніхто б не подумав, що вони можуть нас зрадити. Але з мерзенними чейнджлінґами, які, здається, повсюди, не можна бути впевненим..."

 PLB_push_south:0 "Розпочати просування на південь"
 PLB_push_south_desc:0 "Клани Вессландії, позбавлені історії, культури та честі, здається, єдине місце, де ідеї наших, здавалося б, колишніх союзників клану Скюфлінґ, вистояли і спрацювали, коли її мешканці об'єдналися в так званий "Потрійний Альянс." Хоча, можливо, є й інша причина..."
 PLB_make_clan_brodkorb_kneel:0 "Вессландські клани стануть на коліна"
 PLB_make_clan_brodkorb_kneel_desc:0 "Вессландські клани можуть бути численними як у ведмедях, так і в слугах грифонів. І вони можуть вірити, що така кількість забезпечить їм перемогу. Але ми пам'ятаємо, як завжди... Ми пам'ятаємо їхні сильні та слабкі сторони з минулої війни. Вони знову стануть перед нами на коліна!"

 PLB_grind_clan_brodkorb_into_dust:0 "Стерти Вессландію"
 PLB_grind_clan_brodkorb_into_dust_desc:0 "Новонароджена єдність Вессландії і особливо їхні дивні новонароджені амбіції вкрай неймовірні на тлі тисячолітньої історії. Можливо, вони навіть не усвідомлюють, але, швидше за все, їх підштовхнули до цього чейнджлінґи. І ми не можемо дозволити існувати ведмедям, зіпсованим такими іноземними впливами!"

 PLB_wesslandia_in_our_claws:0 "Вессландія в наших пазурах"
 PLB_wesslandia_in_our_claws_desc:0 "Ми пройшли через Вессландію, і величезна і густонаселена земля знову підкорилася нашій волі, як і під час першої об'єднавчої війни. Можливо, це тільки початок, а можливо, найважча боротьба вже позаду? Адже вессландці не були ані великими воїнами, ані істориками, а ті, що стоять проти нас, не будуть такими ж слабкими."

 PLB_cut_off_outcasts:0 "Відрізані дороги зі сходу"
 PLB_cut_off_outcasts_desc:0 "Той факт, що вессландці просто залишили свої кордони, щоб різні злочинці, божевільні та сектанти просочилися на землі, з яких їх вигнали, є ще одним доказом того, що, незважаючи на їхню зарозумілість, їм ніколи не слід було дозволяти правити. І тепер ми повинні виконати свій обов'язок Великого Клану і закрити східні дороги."

 PLB_drive_scyfling_back:0 "Просуватися на захід"
 PLB_drive_scyfling_back_desc:0 "Онлартір населяють одні з найгордіших і найбойовитіших кланів білих ведмедів, і вони історично були одними з наших найвірніших союзників, навіть якщо об'єднавчі війни розвели нас по різні боки. Ми не забули цю історію, але, як ми бачимо зараз, коли наші сили знову зіштовхуються, вони все ще не навчилися цінувати історію чи символи."

 PLB_make_the_lords_kneel:0 "Онлартір повинен стати на коліна"
 PLB_make_the_lords_kneel_desc:0 "Якщо вони не бажають бути нашими союзниками і братами та сестрами по зброї, вони стануть перед нами на коліна і визнають не лише те, що наша воля і сталь перевершує їхню, але й те, що єдність ведмедів - мета набагато благородніша, ніж будь-які роздуми про те, як вижити поодинці в оточенні набагато небезпечніших звірів."

 PLB_the_only_lord_of_Onladir:0 "Єдиний володар Онлартіру"
 PLB_the_only_lord_of_Onladir_desc:0 "Клани Онлартіру кидають виклик нам і нашим цілям. Більше того, вони стверджують, що велика сила вже захищає їх. Вони брешуть крізь зуби, стверджуючи, що це клан Скюфлінґ, наші союзники та друзі. Але жодних доказів цього немає. Тому єдиний висновок - це ще одна корінь Чейнджлінґів в системі!"

 PLB_push_out_the_last_remnants:0 "Посилити наш натиск"
 PLB_push_out_the_last_remnants_desc:0 "Можливо, це добрий знак, що навіть якщо його клани проникли і підштовхнули до своїх найгірших поривів, земля Онлартіру залишилася міцно в ведмежих пазурах. Якби ми протрималися ще трохи, то напевно вирвали б його з наших володінь, як вони це зробили з багатьма іншими володіннями нашої раси. А тепер ми не дамо їм такого шансу."

 PLB_the_harmonists:0 "Звернути увагу на південь"
 PLB_the_harmonists_desc:0 "Клан Вольсунґр - наші давні суперники, яких ми поважали протягом усієї нашої історії. Тому з великим сумом ми згадуємо, що вони були майже знищені під час об'єднавчих війн. Вони, на щастя, вистояли, але є чудовим доказом того, чому прийняття вигнанців лише послабить клан, корумпований, як і зараз, слабкістю Еквестрії."

 PLB_make_clan_volsungr_swear_loyalty:0 "Змусити клан Вольсунґр присягнути на вірність"
 PLB_make_clan_volsungr_swear_loyalty_desc:0 "Вольсунґр може бути слабким, розбещеним явною і відкритою слабкістю іноземців і одержимим найбільш неможливими і абсурдними ідеями. Але поки вони повинні підкорятися нам, з поваги до того, чим вони колись були, ми дозволимо їм вистояти і витримати. Можливо, з нашою демонстрацією сили вони згадають, що вони втратили?"

 PLB_eradicate_clan_volsungr:0 "Розбити клан Вольсунґр"
 PLB_eradicate_clan_volsungr_desc:0 "Зрозуміло, що Вольсунґр не були зіпсовані кислотою, яка є впливом чейнджлінґів. Однак вони вражені набагато гіршою хворобою - так званою "гармонією." Ідеал, який підриває саму основу нашого суспільства і шанси на виживання. Таким чином, збоченню буде покладено край, і клан Вольсунґр відтепер пам'ятатимуть як один з гордих воїнів."

 PLB_harmonists_broken:0 "Суперників більше немає"
 PLB_harmonists_broken_desc:0 "З цією перемогою було покладено край суперництву, яке існувало між кланами Вольсунґр та Свартпельс століттями, а можливо, навіть тисячоліттями. Відтепер нам не доведеться турбуватися про ворожу армію, яка підніметься з гір яків і спробує розбестити решту нашої раси своєю слабкістю."

 PLB_capture_the_mountain_passes:0 "Захистити гірські перевали"
 PLB_capture_the_mountain_passes_desc:0 "Старійшини гір яків і Онлартір, схоже, вважали себе рівними нам або навіть кращими, і знову ж таки, схоже, ігнорували, що дороги зі сходу і заходу в наші землі були відкриті, дозволяючи приплив радикалів, божевільних і тих, хто приєднається до Чейнджлінґів. Ще одна помилка, яку ми маємо виправити."

 PLB_clan_scyfling:0 "Наші брати по зброї"
 PLB_clan_scyfling_desc:0 "Клан Скюфлінґ, наші колишні, і ми можемо лише сподіватися, теперішні друзі та найбільші союзники. Саме з ними ми йшли під час об'єднавчих воєн, і саме з ними ми йдемо до їхнього королівства тепер, коли дорога відкрита..."

 PLB_make_the_subjugators_kneel:0 "Можливо, ще не все втрачено..."
 PLB_make_the_subjugators_kneel_desc:0 "Хоча крах клану Скюфлінґ несподіваний і, можливо, лякає, він також обнадіює! Це означає, що наші друзі та товариші по зброї борються і чинять опір своїм побратимам, які перейшли на бік королеви Кризаліс, як ми бачили в Онлартірі. Ми підемо, щоб допомогти їм і розчавити всіх тих, хто бунтує!"

 PLB_crush_the_subjugators:0 "Тут для нас нічого не залишилося..."
 PLB_crush_the_subjugators_desc:0 "Коли землі клану Скюфлінґ розриваються на частини, ми можемо припускати лише найгірше, всі наші друзі пішли, залишилися лише вороги та корупція. Зі скорботним серцем ми повинні будемо очистити цю останню територію від наших друзів, що пішли, і забезпечити, щоб їх пам'ятали як героїв, якими вони були."

 PLB_victory_over_subjugators:0 "Царство клану Скюфлінґ звільнено!"
 PLB_victory_over_subjugators_desc:0 "Ми подолали кровопролиття, що охопило стародавні володіння клану Скюфлінґ, і знищили всіх, хто протистоїть нашим найблагороднішим цілям. Залишається лише сподіватися, що подібні зради не повторяться."

 PLB_triump_of_might:0 "Наш найбільший тріумф"
 PLB_triump_of_might_desc:0 "На наші плечі лягла важка ноша. Ми здобули перемогу над зрадниками і корупційними впливами, але тепер на нас лягає набагато складніший обов'язок - обов'язок керувати і захищати не лише власний клан, а й усіх ведмедів на наших землях."

 PLB_scyfling_has_no_competence:0 "Це безумство!"
 PLB_scyfling_has_no_competence_desc:0 "Ми не можемо більше терпіти такі дурні та злісні дії! Клан Скюфлінґ і По Уеллінгтон знову і знову доводять, що вони не бажають керувати, представляючи інтереси всіх ведмедів, натомість просто хочуть перетворити всіх інших ведмедів на продовження їхніх власних. Таким чином, на нас лежить обов'язок перебудувати державу, яку вони викували з крові, на щось краще."

 PLB_the_war_within:0 "Війна всередині"
 PLB_the_war_within_desc:0 "Навіть якщо ми хочемо просуватися вперед і об'єднати ведмедів під більш правильною, моральною і гармонійною метою, ми повинні спочатку вирішити наші внутрішні проблеми, бо, здається, старше і молодше покоління були розділені відкриттям кордонів, іноді через руйнування укріплень, що зробив По Уеллінгтон як одну з останніх своїх дій..."

 PLB_a_new_generation:0 "З'являється нове покоління"
 PLB_a_new_generation_desc:0 "Навіть якщо ми повинні поважати старших, молоді мають рацію. Як з принципу дружби, так і з більш прагматичних потреб у кількості, ми повинні приймати всіх ведмедів, які пропонують нам свою допомогу. Можливо, коли війна закінчиться, ми зможемо створити кращу політику щодо незліченних вигнанців, але поки що кордони будуть відкритими."

 PLB_wisdom_of_elders_prevails:0 "Мудрість старійшин переважає"
 PLB_wisdom_of_elders_prevails_desc:0 "Обережність старших є правильною. Існує причина, чому, навіть якщо нашій принцесі та її друзям дозволили повернутися, незліченна кількість інших не змогла. Є багато вигнанців, які були змушені піти не через свою зарозумілість чи слабкість, а скоріше через свої злочини та божевілля. Ми не повинні просто так приймати будь-кого назад."

 PLB_the_war_without:0 "Війна ззовні"
 PLB_the_war_without_desc:0 "Ми єдині, готові та гармонійні. Настав час нарешті вийти назовні і возз'єднати білих ведмедів у набагато більш моральний, гармонійний і правильний спосіб. Будемо сподіватися, що гармонія зможе вистояти як проти варварства, так і проти сліпого фанатизму."

 PLB_gaze_north:0 "Звернути наш погляд на північ"
 PLB_gaze_north_desc:0 "Здається, що, можливо, ідеї розумної рівності та дружби не втратили своєї актуальності для жителів Весландії, адже вони створили власний альянс, щоб вижити в цей складний період. Але, можливо, і нам варто остерігатися їхньої новознайденої єдності..."

 PLB_extend_our_claws_to_benkestok:0 "Просунути пазурі до Весландії"
 PLB_extend_our_claws_to_benkestok_desc:0 "Вессландці завжди були кланом, якого найбільше зачіпали цивілізації, які, нехай і ледь-ледь, але більше відповідають гармонійним ідеям, до яких ми самі прагнемо. Можливо, ми могли б простягнути до них пазурі дружби, показавши їм і, можливо, всім іншим, що ми не повторюємо помилок клану Скюфлінґ."

 PLB_swipe_our_claws_at_benkestok:0 "Провести пазурями у Вессландії"
 PLB_swipe_our_claws_at_benkestok_desc:0 "Потрійний Альянс Вессландії, не приховуючи цього факту, прагне підкорити собі всі інші ведмежі клани. Хоча ми виступаємо проти непотрібного конфлікту, це один з незліченних випадків, коли іншого вибору немає."

 PLB_our_flags_over_wesslandia:0 "Наші прапори над Вессландією"
 PLB_our_flags_over_wesslandia_desc:0 "Клани Вессландії тепер зрозуміли, навіщо ведмедям потрібна гармонійна система і прекрасне майбутнє, і тепер визнають нашу владу. Наші прапори майорять над їхніми трюмами, а дороги на північ і захід відкриті. Тепер ми зможемо нести просвітлення гармонії всім, хто живе на цих землях."

 PLB_reclaim_root_farms:0 "Відновити кореневі ферми"
 PLB_reclaim_root_farms_desc:0 "Вессландські землі ідеально підходять для вирощування тих небагатьох видів картоплі, які витримують клімат і якими харчуються ведмежата та інші "менші" в більшості ведмежих кланів. Коли хаос поглинув ведмежі угіддя, ми втратили доступ до псевдоферм, де їх вирощували протягом короткого проміжку часу, з досить катастрофічними результатами. Картопля не є улюбленою їжею ведмедя, але поки що їх вистачає для виживання."

 PLB_secure_fish_roads:0 "Забезпечити рибні шляхи"
 PLB_secure_fish_roads_desc:0 "Хоча ми, звичайно, можемо прогодуватися картоплею та корінням, ведмежий клан не може довго протриматися без риби. І знову наше несприятливе становище призвело до проблем. Маршрути були відрізані, ферми, які були підпорядковані нам, були захоплені. Знадобився деякий час, щоб відновити ці дороги. Але тепер ми знову можемо відчувати себе повноцінним кланом."

 PLB_open_up_seal_hunting_grounds:0 "Відкрити мисливські угіддя на тюленів"
 PLB_open_up_seal_hunting_grounds_desc:0 "Тюлені, моржі, морські слони та інші подібні тварини не є рідкістю на скелястих узбережжях північних морів, проте для більшості вони вважаються чимось недосяжним. Адже після того, як ці тварини були майже винищені, споживання такого м'яса було дозволено лише старійшинам та найвідважнішим воїнам. Давайте трохи побалуємо наших ветеранів."

 PLB_domination_is_the_only_option:0 "Пам'ятати про злочини "Юнайтерів""
 PLB_domination_is_the_only_option_desc:0 "Хоча на нас більше не можуть напасти або взяти в облогу, наші війська занадто численні, а наша земля занадто велика, щоб її не змогли захопити ні Скюфлінґ, ні Свартпельс, ми не можемо зараз відпочивати, навіть якщо дехто стверджує, що краще було б почекати і як слід підготуватися. Ні, ми повинні нагадати нашим воїнам і нашим громадянам, чому так важливо якнайшвидше об'єднати всіх ведмедів!"

 PLB_the_despot:0 "Тиран"
 PLB_the_despot_desc:0 "Наші погляди на По Уеллінгтона та його клан фанатиків і кровожерливих ревнителів, можливо, дещо заплутані. І хоча ми не можемо не відчувати огиди до багатьох їхніх вчинків та злостивості, чи були б ми тут без них?"

 PLB_scyfling_emmisarries:0 "Надіслати емісарів до клану Скюфлінґ"
 PLB_scyfling_emmisarries_desc:0 "По Уеллінгтон може бути деспотом, але він не божевільний і навіть, можливо, не такий жорстокий, як вдає. Зрештою, він провів багато часу серед рас, набагато прагматичніших і менш упертих, ніж більшість ведмедів. Можливо, спроба переговорів могла б до чогось призвести?"

 PLB_strike_at_the_heart:0 "Удар у серце"
 PLB_strike_at_the_heart_desc:0 "Правильна і моральна північна держава не може існувати, якщо не поставити на місце деспотів! По Уеллінгтон може бути майстром ведення війни і володіти однією з найстрашніших армій на півночі, але ми не можемо показати слабкість наших переконань та ідеалів!"

 PLB_our_flags_over_mathair_fearrainn:0 "Наші прапори над Магарь-Фярань"
 PLB_our_flags_over_mathair_fearrainn_desc:0 "Одним махом ми досягли того, що може здатися неймовірним. Ціла половина країни, яка раніше стояла на колінах перед По Уелінгтона, тепер під нашим захистом. І все це лише одним махом!"

 PLB_the_beast:0 "Звір"
 PLB_the_beast_desc:0 "Торбен і клан Свартпельс досить... Унікальні, мабуть, це те слово, яке підійде. Жорстокі та невблаганні звірі на одній лапі, а на іншій - науковці та історики. І це ще не кажучи про їхні, здавалося б, суперечливі позиції, коли йдеться про ведмедів та інші види..."

 PLB_send_our_emmissaries_to_svartpels:0 "Надіслати емісарів до клану Свартпельс"
 PLB_send_our_emmissaries_to_svartpels_desc:0 "Можливо, Торбен і звір, і до того ж дикий, але По Уеллінгтон зумів з ним подружитися, і до розпаду порядку клану Свартпельс був найвідданішим цілям ведмежої єдності. Можливо, якщо ми теж простягнемо свої пазурі в дружбі, відкриється інший бік цього звіра."

 PLB_the_battle_of_river_raumelfr:0 "Битва на річці Раумельф"
 PLB_the_battle_of_river_raumelfr_desc:0 "Ми знаємо, що підпорядкування клану Свартпельс можна досягти, але тільки через демонстрацію сили, достатньо значної, щоб справити на них враження. Тоді єдиний вихід - показати їм, що навіть якщо ми повернемося з півдня, зима всередині нас все ще сильна."

 PLB_a_new_commander_of_thunder:0 "Новий Повелитель Грому"
 PLB_a_new_commander_of_thunder_desc:0 "Якщо захоплення Вессландії було недостатнім доказом того, що саме ми повинні об'єднати ведмедів, то цього, безумовно, більш ніж достатньо. Бо навіть звірячі "Повелителі Грому" Свартпельса визнають перевагу нашого переконання над їхнім."

 PLB_volsungr_victorious:0 "Об'єднані під прапором гармонії"
 PLB_volsungr_victorious_desc:0 "Землі білих ведмедів возз'єдналися, але не під владою деспота, звіра чи якогось опортуніста. Ні, вони об'єдналися на моральних і праведних гармоністських засадах! Відтепер кожен, хто живе на цих землях, буде йти вперед під прапором і символом гармонії!"

 PLB_the_despot_triumphant:0 "Деспот тріумфує"
 PLB_the_despot_triumphant_desc:0 "Незважаючи на труднощі, з якими ми зіткнулися на випробувані, які кидали нам ті, хто не вірив у наші амбіції, або, можливо, навіть сам Всебатько, ми вийшли переможцями в тому, що можна назвати Другою війною за об'єднання. Тепер ми можемо по-справжньому перетворити ведмеже суспільство на щось, здатне вистояти!"

 PLB_despot_with_the_soft_pawn:0 "Деспот з м'якою лапою"
 PLB_despot_with_the_soft_pawn_desc:0 "Під час своїх подорожей Грифонією По Уеллінгтон почув фразу "треба використовувати як кнут, так і пряник." Можливо, під час нашого останнього правління ми були занадто агресивними і жорстокими у своєму підході, бо як інакше можна пояснити таку раптову зміну у ставленні до нас інших кланів, щойно ми змінили свій підхід?"

 PLB_so_many_promises...:0 "Так багато обіцянок..."
 PLB_so_many_promises..._desc:0 "Хоча навіть якщо ми й підходили до інших кланів з позиції дружби та розуміння їхніх інтересів, ми дали їм так багато обіцянок. Багато з них суперечать нашій меті. Хоча, можливо, не так сильно, як ми думали спочатку? Можливо, нам варто переглянути наші закордонні натхнення, щоб знайти відповідь."

 PLB_create_the_the_polar_bear_confederation:0 "Засновницькі принципи Конфедерації Білих Ведмедів"
 PLB_create_the_the_polar_bear_confederation_desc:0 "Хоча перехід до справжньої Республіки може бути дещо передчасним, особливо з огляду на те, як ми керували до Другої об'єднавчої війни і, звичайно, саму війну, створення належного фундаменту для такого переходу є гарною ідеєю. Кожна республіка, навіть керована, звісно, потребує встановлення своїх принципів на ранньому етапі."

 PLB_volsungr_in_storting:0 "Запросити клан Вольсунґр до Стортингу"
 PLB_volsungr_in_storting_desc:0 "Клан Вольсунґр - один з великих кланів, більш того, це один з небагатьох кланів, який підтримує ідеали, що віддалено збігаються з нашими, і, можливо, розуміє, чого ми прагнемо досягти, бо вони гармоністи. І хоча вони є князівством, до тих пір, поки вони не прагнуть поширювати свої ідеали, допуск їх до парламенту не повинен бути проблемою."

 PLB_members_of_scyfling_in_the_stortig:0 "Члени Скюфлінґу в Стортингу"
 PLB_members_of_scyfling_in_the_stortig_desc:0 "Звичайно, в період "Керованої демократії", коли ми вчимо інші клани бути більш цивілізованими і демократичними, цілком логічно, що ми зберігаємо свою престижну позицію серед кланів білих ведмедів. Зрештою, де б вони всі зараз були без нас? Таким чином, ведмеді клану Скюфлінґ матимуть престижну і найважливішу позицію в новонародженому парламенті."

 PLB_svartpels_in_storting:0 "Запросити клан Свартпельс до Стортингу"
 PLB_svartpels_in_storting_desc:0 "Клан Свартпельс був нашим союзником протягом останніх півтора десятка років. Здається, вони не в захваті від нового напрямку розвитку нашої країни, проте через дружбу та кланову лояльність вони войовничо погодилися допомогти в управлінні державою через парламент, хоча б для того, щоб ми не стали м'якотілими або нездатними вести війну проти наших ворогів."

 PLB_soft_despotism:0 "Натхнення з-за моря"
 PLB_soft_despotism_desc:0 "Республіка Грифонів під керівництвом Александра Кемерская була досить гарним прикладом того, як слід керувати перехідною демократичною державою, в теорії, якщо не на практиці. Можливо, вона потребує більш жорстких підходів, щоб відповідати більш войовничій природі нашого населення, але вона все одно забезпечує чудову основу."

 PLB_a_chained_parliament_for_now:0 "Прикутий парламент... поки що"
 PLB_a_chained_parliament_for_now_desc:0 "Хоча основа Стортингу - нашого парламенту, поки що буде значною мірою базуватися на попередньому пануванні на землі Великих Кланів. Але це не означає, що представники інших ведмедів не мають права брати участь і керувати. Хоча поки що вони досить... бракує розуміння того, що для них краще. Тому влада, яку вони можуть отримати, буде обмежена, принаймні поки що."

 PLB_forge_institutions_of_law:0 "Створити інститути права"
 PLB_forge_institutions_of_law_desc:0 "Одним з аспектів, який нам вдалося упустити в наших попередніх реформах, була відсутність єдиних інститутів права, переслідування та покарання. Це більше не повториться. Буде створено єдиний кодекс законів, а також зібрано силу виконавців. Хоча методи, необхідні для забезпечення належного правопорядку серед ведмедів, можуть бути сумнівними в будь-якому іншому місці. Що таке республіка без букви закону і справедливості?"

 PLB_get_shamans_on_our_side:0 "Організувати шаманів"
 PLB_get_shamans_on_our_side_desc:0 "Мандрівні шамани, єдині релігійні фігури на ведмежих землях, є важливими постатями для тих, хто живе на узліссі або поза ведмежим суспільством. Якщо ми хочемо представляти кожного ведмедя в цій країні, хтось повинен представляти ведмедів без кланів. Такі шамани, запрошені до Стортингу, були б ідеальними представниками потреб і бажань таких груп. Хоча, можливо, це трохи упереджено..."

 PLB_the_frozen_diamond:0 "Заморожений діамант"
 PLB_the_frozen_diamond_desc:0 "Минуть роки, можливо, навіть десятиліття чи два, перш ніж наші громадяни зрозуміють цінності свободи, представництва та права на самоврядування. Але, здається, вже зараз зростає розуміння того, яку саме утопію будують на півночі. Нарешті, наша велика конфедерація може піднятися, як сяюча перлина права і демократії в морі варварства Еквусу!"

 PLB_raise_the_frozen_banner_the_republic:0 "Підняти замерзлий прапор республіканізму"
 PLB_raise_the_frozen_banner_the_republic_desc:0 "У нашій міфології та поклонінні божественному поширена ідея, що ведмежі душі народжуються і стають такими ж, як самі північні вітри. Саме звідти ми отримуємо нашу лютість, нашу міць і нашу волю до боротьби. І, зрештою, хіба республіканська ідеологія не полягає в тому, щоб справді виражати волю і дух маси істот? Таким чином, наш республіканізм буде віддзеркаленням північного вітру всередині нас."

 PLB_republican_invade_frontier:0 "Захопити Фронтир"
 PLB_republican_invade_frontier_desc:0 "Фронтир здавна був землею корупції, комунізму і навіть бандитизму. Не може бути жодних розумних заперечень проти того, щоб ми захопили його і поставили під більш розумне управління."

 PLB_liberation_of_frontier:0 "Звільнення Фронтиру"
 PLB_liberation_of_frontier_desc:0 "Фронтир - це земля дика і неприборкана. Навіть серед тих, хто називає себе республіканцями, панує корупція та жорстокість. На жаль, це означає, що регіон не може керувати собою. А отже, він має бути інтегрований у нашу найповажнішу республіку, а його мешканці отримають належне громадянство і, можливо, в майбутньому зможуть брати участь у нашій демократії!"

 PLB_republican_invade_pingus:0 "Врятувати пінгвінів"
 PLB_republican_invade_pingus_desc:0 "На жаль, пінгвінів підкорили екстремістські, радикальні ідеології. Ми не можемо більше цього терпіти! Настав час врятувати наших братів і сестер по льоду!"

 PLB_liberation_of_penguins:0 "Єдність з пінгвінами"
 PLB_liberation_of_penguins_desc:0 "Ведмеді та пінгвіни - створіння Півночі. Обидва наші види витримали ці землі протягом тисячоліть і вивчили шляхи і темперамент Півночі. Певні популяції ведмедів і пінгвінів також вижили разом у гармонії протягом століть. Таким чином, для нас не повинно бути жодних проблем з тим, щоб мати єдину націю."

 PLB_northern_bloc_initiative:0 "Ініціатива Північного блоку"
 PLB_northern_bloc_initiative_desc:0 "На наш превеликий подив, здається, ми не єдині, хто взяв приклад Республіки Грифонів близько до серця! Схоже, що Нова Грифонія, незважаючи на неспокійне минуле, пішла в тому ж напрямку. Можливо, вони набагато сильніші за нас у політичному та військовому плані, але ми, звичайно ж, готові боротися за свободу та справедливість на рівних з ними!"

 PLB_the_great_northern_railway:0 "Велика Північна залізниця"
 PLB_the_great_northern_railway_desc:0 "Наша новознайдена дружба з Новою Грифонією дає нам можливість, яку грифони назвали б "золотою", адже тепер ми отримали доступ до добре розвинених портів без необхідності будувати власні. Для нас відчинилися ворота у світ, тепер ми просто повинні скористатися цією можливістю. На Півночі проляже нова залізнична дорога, що з'єднає землі ведмедів і грифонів Еквусу зі зовнішнім світом!"

 PLB_an_unexpected_meeting:0 "Несподівана зустріч"
 PLB_an_unexpected_meeting_desc:0 "Нова Грифонія вже обговорювала ідею об'єднання з Республікою Грифонів та підтримки їхньої боротьби. Хоча По Уеллінгтон з ентузіазмом ставиться до цієї ідеї, а інші члени Стортингу не заперечують проти неї, деякі сумніви залишаються. Наскільки нам відомо, Республіка у вигнанні занепала, і дехто сумнівається, що старий маршал, можливо, ослаб і постарів?"

 PLB_volunteers_for_FAT:0 "Волонтери для справи"
 PLB_volunteers_for_FAT_desc:0 "Хоча ми прагнемо підтримати велику боротьбу Олександра Кемерская, наше власне становище досить незавидне, тому ми не можемо пошкодувати справжніх воїнів. Не кажучи вже про те, що більшість воїнів-ведмедів не стали б слухати якихось грифонів. З іншого боку, багато ведмежат і слуг вессландських грифонів, здається, дуже прагнуть заробити собі славу за кордоном..."

 PLB_forges_for_the_cause:0 "Кузні для справи"
 PLB_forges_for_the_cause_desc:0 "Великі кузні та незліченні мануфактури республіки ганьблять наші власні можливості. І все ж теплова машина визволення завжди потребує більшого. У нас самих небагато, але в дусі республіканського братерства ми надішлемо все, що зможемо!"

 PLB_raise_the_frozen_banner_for_republic:0 "Підняти наші прапори за Республіку"
 PLB_raise_the_frozen_banner_for_republic_desc:0 "Наші діти та слуги борються за Республіку. Наші кузні кують для них матеріал. Нарешті настав час закріпити нашу відданість їхній справі і приєднатися до їхньої боротьби в міру наших можливостей! Якщо на наших друзів нападуть, ми будемо битися до останнього, щоб захистити їх."

 PLB_equestria_at_war:0 "Еквестрія у війні"
 PLB_equestria_at_war_desc:0 "Еквестрія в облозі, населення масово вбивають, а її красу знищують Чейнджлінґи. Це жахливо, як заявляють наші друзі з клану Вольсунґр. Але це також і чудова можливість виконати долю, дану нам Всебатьком, і розтрощити наших давніх ворогів! Ми будемо готуватися, щоб об'єднати Еквестрію в цій війні, заради величі нашої республіки!"

 PLB_our_factorums_under_equestrian_command:0 "Запропонувати Еквестрії контроль над нашими мануфактурами"
 PLB_our_factorums_under_equestrian_command_desc:0 "Нам знадобиться час, щоб підготуватися до такого кроку, але ми повинні подбати про те, щоб еквестрійці могли витримати, поки ми не будемо готові. Для цього ми запропонуємо доступ до наших ресурсів та виробничих потужностей, принаймні до закінчення цієї війни..."

 PLB_fortify_changeling_border:0 "Велика крижана стіна"
 PLB_fortify_changeling_border_desc:0 "Навіть якщо ми захочемо піти в наступ на Чейнджлінґів, ми повинні бути готові до переважаючих їхніх сил. Щоб зрівняти шанси, буде зведено незліченну кількість нових ДЗОТів і крижаних фортець. Можливо, у чейнджлінґів і знайдуться способи зламати нашу волю, але вони не зламають саму Північ!"

 PLB_volsungr_opens_up_their_equipment_stocks:0 "Використати запаси клану Вольсунґр"
 PLB_volsungr_opens_up_their_equipment_stocks_desc:0 "Клан Вольсунґр завжди тримав запас еквестрійського спорядження, яке можна було б використати на чорний день. З початком Великої війни цей чорний день, безсумнівно, настав. Принаймні так стверджує принцеса Ейра. Хоча було б нерозумно заперечувати, що цього спорядження достатньо, щоб зібрати цілу нову армію."

 PLB_fill_up_our_ranks:0 "Поповнити наші ряди"
 PLB_fill_up_our_ranks_desc:0 "Помічники, слуги грифонів, менші вигнанці та багато з тих, кого вважають непридатними до служби через кланові традиції або злочини, що існують лише для одного клану. Ми вітатимемо їх усіх у нашому домі. Хоча ми повинні бути обережними, бо лише на короткий час ми можемо прийняти таких істот до нашого війська, інакше вони стануть незадоволеними."

 PLB_raise_up_volunteer_divisions:0 "Інтегрувати кланові загони"
 PLB_raise_up_volunteer_divisions_desc:0 "Принципи нашої конфедерації дозволяють багатьом кланам утримувати принаймні власні армії. Однак для цієї війни багато хто виявив готовність позбавитися таких привілеїв і підпорядкувати власні сили великому прапору Республіки!"

 PLB_open_the_northern_front:0 "Відкрити Північний фронт"
 PLB_open_the_northern_front_desc:0 "Підготовка завершена, ми зібрали і підготували нові армії, ми підготувалися як до найбільших тріумфів, так і до найтяжчих поразок. І ми будемо битися з ними через північні пустки, через замерзлі океани та річки, і якщо ми коли-небудь дійдемо до цього, через чужі вулиці їхніх вуликів. Чейнджлінґи побачать справжню міць Півночі, яка бореться за справедливість!"

 PLB_like_an_avalanche:0 "Як лавина"
 PLB_like_an_avalanche_desc:0 "Немає часу на більше приготувань, на укріплення для планів... Послання Еквестрії чітке, їм потрібна наша допомога, і потрібна вона їм зараз. І тому ми будемо діяти! Ми вдаримо по них, як снігова лавина в тил, перш ніж вони встигнуть відреагувати!"

 PLB_tie_them_up_in_a_frozen_hell:0 "Зв'язати їх у замерзлому тартарі"
 PLB_tie_them_up_in_a_frozen_hell_desc:0 "Можливо, ми не володіємо здатністю боротися з чейнджлінґами на рівних. Можливо, ми навіть не здатні боротися з ними у справжній війні наступів і відступів. Але нам це і не потрібно! Що нам потрібно, так це зв'язати Чейнджлінґів у жорстокій кривавій бійні, з якої вони не зможуть втекти. І поки вони гинутимуть на Півночі, наші друзі на Півдні зможуть просуватися вперед!"

 PLB_demobilization:0 "Демобілізація"
 PLB_demobilization_desc:0 "Найбільша з перемог була досягнута! Чейнджлінґи розгромлені, зламані під силою як півночі, так і півдня. Настав час відпочити та відсвяткувати!"

 PLB_request_territory_from_equestria:0 "Попросити територію в Еквестрії"
 PLB_request_territory_from_equestria_desc:0 "Хоча ми, можливо, приєдналися до цієї війни через почуття ціннісної спорідненості та поваги до Еквестрії, ми повинні враховувати нашу спадщину та нашу гордість! Ми прагнемо відновити панування над землями, які зараз контролюють вулики Соріфа. Будемо сподіватися, що наші союзники у цій великій війні розуміють наші бажання і готові їх поважати."

 PLB_raise_banner_over_Sorynth:0 "Підняти прапор над Соріфом"
 PLB_raise_banner_over_Sorynth_desc:0 "Ми йдемо землями нині зниклого царства Соріфа. Ведмедям, що мешкають в його великих горах і диких лісах, ми несемо об'єднання. Чейнджлінґам, підкореним королевами-тиранами, ми несемо звільнення і, можливо, дружбу. А всім королевам та їхнім вірнопідданим, що стоять на нашому шляху, ми несемо смерть. Нехай жоден негідник-маніпулятор не встоїть проти ходу історії!"

 PLB_the_ghost_that_haunts_the_north:0 "Привид Півночі"
 PLB_the_ghost_that_haunts_the_north_desc:0 "Ми в пастці! Єдине царство закону і справедливості оточено радикалами і божевільними! Вони вірять і стверджують, що право і справедливість мертві, що республіканізм мертвий. Але якщо це так, то ми - благоговійні! Неживий звір, який переслідує Північ, ведучи війну за мету, яка, здавалося б, давно померла. І наша війна не закінчиться, поки справедливість не восторжествує!"

 PLB_endure_and_outlast:0 "Вистояти і пережити"
 PLB_endure_and_outlast_desc:0 "Наша неминуча перемога не прийде через агресію і придушення ворогів чисельною силою і жорстокістю. На жаль, наш рід недостатньо численний для такої кампанії. Але наша воля велика, і наше володіння льодом настільки ж потужне. Ми використаємо обидві ці сили, щоб вистояти і пережити тих, чия воля настільки слабка, що піддається божевіллю!"

 PLB_the_burning_specter_of_communism:0 "Пекучий привид комунізму"
 PLB_the_burning_specter_of_communism_desc:0 "Піддатися комунізму, будучи так близько до справжнього визволення... Абсолютно неприпустимо! Велика помилка Нової Грифонії має бути виправлена! І нам просто потрібно виламати двері і спостерігати, як руйнується вся конструкція!"

 PLB_western_wall:0 "Звести стіну на заході"
 PLB_western_wall_desc:0 "Чейнджлінґи - це не тільки вороги наших предків. Вони вороги закону і справедливості! І хоча максимум, що ми можемо зробити - це зв'язати їх навколо Ключ-озера, давайте не будемо думати, що ми будемо легкою здобиччю..."

 PLB_eastern_wall:0 "Звести стіну на сході"
 PLB_eastern_wall_desc:0 "Грифони ще раз підтвердили, що вони істоти, яким не можна довіряти. Знову, незважаючи на те, що вони були на порозі прийняття справедливості та закону, вони обрали радикалізм та божевілля! І, як завжди, божевільні та несамовиті переважають і перевершують справедливих у чесній боротьбі. Але ми не дамо їм такої честі!"

 PLB_pact_with_yaks:0 "Підписати пакт з Яками"
 PLB_pact_with_yaks_desc:0 "Багато хто в нашій країні, не будучи великими ентузіастами напрямку, який клани яків взяли в недавній історії, все ще вважають цих істот чи не єдиними, хто гідний поваги на південь від наших земель. Домовитися про те, що ми прийдемо один одному на допомогу під час війни з грифонами або чейнджлінґами, не повинно бути складно."

 PLB_pact_with_jaks:0 "Підписати пакт із Йаки-кланом"
 PLB_pact_with_jaks_desc:0 "Йаки-клан, який зараз панує на землях яків, не приховує свого презирства до обраного нами напрямку. Однак вони все ще поважають нашу військову доблесть. Можливо, це буде нелегко, але ми не повинні сумніватися в нашій здатності укласти пакт про братерство та оборону зі східними яками."

 PLB_southern_chaos:0 "Загасити полум'я!"
 PLB_southern_chaos_desc:0 "Ми не можемо довірити якам захист нашого півдня. Як ми можемо, коли вони, здається, охоплені міжусобицею? Це не приносить нам радості, але, схоже, нам доведеться самим йти на південь і закінчити цю божевільну війну. І, можливо, возз'єднавшись, яки зможуть зцілитися?"

 PLB_the_frozen_throne:0 "Розтрощити крижаний трон"
 PLB_the_frozen_throne_desc:0 "В акції крайнього абсурду, яка лише показує, що Нова Грифонія є розсадником божевілля і радикалізму, одна з незліченних груп божевільних грифонів захопила країну, діючи так, ніби вони рівні великій Імперії Грифонів. Не кажучи вже про те, що вони наважуються загрожувати нашому існуванню! Їм доведеться нагадати, чому перші колоністи боялися дикої природи."

 PLB_united_by_desperation:0 "Об'єднані відчаєм"
 PLB_united_by_desperation_desc:0 "Імперія Грифонів, Чейнджлінґи або, можливо, ще гірші реакційні сили завжди переслідують нас. Ми знаємо це, як і багато хто з тих, хто зараз перебуває в наших володіннях. Нам можуть не подобатися ідеали цих істот або навіть зневажати їхні раси, але в цьому скрутному становищі ми повинні триматися разом."

 PLB_caching_up:0 "Наздогнати"
 PLB_caching_up_desc:0 "Лише придушивши божевілля Нової Грифонії, ми зрозуміли, як багато нам бракує, коли йдеться про технологічний прогрес. За винятком клану Скюфлінґ і клану Вольсунґр, більшість ведмедів не є великими ентузіастами, коли справа доходить до технологій, і, швидше за все, не схвалять цей вибір. Що ж, добре, що ми поки що є керованою демократією..."

 PLB_building_schools:0 "Розпочати будівництво шкіл"
 PLB_building_schools_desc:0 "Після того, як нас прийняли в наші державні установи, наші друзі з Вольсунґру поспішили нагадати нам, що єдиний спосіб існування справжнього демократичного суспільства - це належним чином освічене і прагнуче до знань населення. Враховуючи, що нам доведеться починати з нуля, це потребуватиме значних інвестицій. Будемо сподіватися, що це не обернеться проти нас, адже це, зрештою, ініціатива клану Вольсунґр..."

 PLB_invite_idealist_scholars:0 "Ті, у кого нічого не залишилося"
 PLB_invite_idealist_scholars_desc:0 "Незважаючи на наше віддалене розташування і немилосердну для більшості видів природу, з тих чи інших причин чимало грифонів і поні-республіканців, які володіють багатьма талантами, корисними для модернізації, поки що, схоже, не мають куди йти. Оскільки більшість кланів все ще проти того, щоб менші істоти жили як громадяни, було вирішено, що, незважаючи на розташування, ці істоти будуть поселені на Східному Ключ-озері."

 PLB_improve_situation_in_eastern_key_lake:0 "Покращити ситуацію в Східному Ключ-озері"
 PLB_improve_situation_in_eastern_key_lake_desc:0 "Коли береги Ключ-озера знову заселені чимось більшим, ніж мандрівні ватаги кочівників, нам набагато краще. Тепер воно може бути заселене істотами, які віддають перевагу теплу його води. Звичайно, клан Вольсунґр не згоден на таке розширення, але маленькі міста - це те, на що ми можемо піти на компроміс. А хіба компроміс не є основою республіки?"

 PLB_university_of_eastern_key_lake:0 "Заснувати Університет Східного Ключ-озера"
 PLB_university_of_eastern_key_lake_desc:0 "Оскільки більш освічені істоти, яким більше нікуди йти, стікаються в зону, яку вони тепер називають "Оазис Півночі", деякі почали поширювати свої науки і досягнення серед місцевих бродячих банд і безкланових утримань. Можливо, настав час і для нас, використовуючи об'єднані таланти цих вигнанців з усього світу, вчених Вольсунґру та істориків Свартпельсу, відкрити свою школу?"

 PLB_lessons_from_republican_scholars:0 "Реформа окупається"
 PLB_lessons_from_republican_scholars_desc:0 "Масова програма будівництва шкіл та інших навчальних закладів у еквестрійському та грифонвському стилі, про яку ми домовилися з Вольсунґром, здається, дала непоганий результат. Уперше в історії землі білих ведмедів мають справжніх і справжніх саутронських вчених та інтелектуалів! Хоча, можливо, над їхнім етикетом у спілкуванні з "меншими" видами ще треба попрацювати..."

 PLB_modernizing_the_industry:0 "Шлях до нашої мрії"
 PLB_modernizing_the_industry_desc:0 "Неможливо мати республіку з вдумливим населенням, яке знає свої цінності та історію, коли це населення голодує і є беззахисним. Утопії не існують на порожній шлунок, захищаючись лише кігтями. І наша полярна мрія не є винятком."

 PLB_new_civil_industry:0 "Живиться незліченними мануфактурами"
 PLB_new_civilian_industry_desc:0 "Незважаючи на промислові здібності, якими багато кланів володіли раніше, більшість з них ледве могли забезпечити себе їжею, не кажучи вже про належний розвиток технологій або розподіл ролей, на яких базується сучасна економіка. Звісно, великі клани не стикаються з такою проблемою, але що це за мрія, в якій величезна частина населення залишається позаду? Ми простягнемо свій корисний пазур."

 PLB_new_military_industry:0 "Освітлений незліченними кузнями"
 PLB_new_military_industry_desc:0 "З нашим нещодавнім розширенням у цивільному та продовольчому секторах, наші друзі з клану Свартпельс поспішили нагадати нам, що, можливо, надмірна увага до ледь існуючого "цивільного сектору" для такої войовничої та агресивної раси, як наша, є щонайменше дивною і означає слабкість для тих, хто прагне нашого падіння. Давайте спростуємо уявлення про те, що мрія про полярну республіку зробила По Уеллінгтона і його клан м'якими."

 PLB_railway_expansion:0 "З'єднані великими дорогами"
 PLB_railway_expansion_desc:0 "Можливо, кумедно, що всупереч нашим новонародженим конфедеративним принципам, які базуються на ідеях самоуправління та автономії, спостерігається дедалі більша кількість пересувань, торгівлі та співпраці між кланами. Це дуже позитивний розвиток, оскільки все це є частиною розвитку об'єднаної ведмежої ідентичності. Хоча, можливо, наявність доріг допомогла б..."

 PLB_an_industrial_state:0 "І підготовлені до майбутнього"
 PLB_an_industrial_state_desc:0 "Менш чи більш відсталі клани або вільні угіддя були втягнуті в сучасність, не так силою, як криком і ревінням на знак непокори. А скоріше, як не дивно для ведмедя, через співпрацю і, здавалося б, братерську підтримку між більшими і меншими кланами. Здається, весь вид білого ведмедя стає схожим на сокиру із зоряної сталі, лезо якої не ламається під будь-яким тиском..."

 PLB_harmonic_inspirations:0 "Південні натхнення"
 PLB_harmonic_inspirations_desc:0 "Домініони поні на пекельному півдні нашого континенту слабкі, кволі та позбавлені волі, навіть можна посперечатися. Проте вони мають сильну єдність і почуття спорідненості, яке не має собі рівних і, можливо, декому навіть важко уявити. Принцеса Ейра з клану Вольсунґр, як і належить їй, вважає, що якби ми могли пересадити такі ідеї або навіть просто наслідувати їх, ведмеже суспільство отримало б величезну користь."

 PLB_to_help_our_population:0 "Щоб допомогти нашому населенню"
 PLB_to_help_our_population_desc:0 "Ведмежата", ведмеді, які занадто малі, занадто слабкі, щоб вийти за межі рабства, існували з незапам'ятних часів, зазвичай лише трохи вище робітників-грифонів, якщо клан мав таких. Проте Ейра стверджує, що ми повинні ставитися до них як до громадян і дозволити їм служити... Що ж, якщо ми підштовхнемо ідею до того, що якщо діти служитимуть у логістиці, це дозволить більше справжніх воїнів воювати, це може десь спрацювати..."

 PLB_we_will_ensure_better_life:0 "Ми забезпечимо краще життя"
 PLB_we_will_ensure_better_life_desc:0 "Поняття добробуту нам не зовсім чуже, адже Уеллінгтон ділив рибу, а клани мають мережі підтримки для слабких. Але за межами цього... Хоча, можливо, ідея не така вже й абсурдна? Зрештою, ми йдемо до сучасності, а в сучасних світах навіть бідним потрібно більше, ніж недоїдки, бульби та риба."

 PLB_we_will_ensure_happy_life:0 "Ми забезпечимо щасливе життя"
 PLB_we_will_ensure_happy_life_desc:0 "Ніде ведмідь не почувається щасливішим, ніж у багатих і неприборканих тундрах і тайзі, що простягаються через нашу республіку. Хоча історія змусила нас жити в трюмах і навіть у містах, це не змінює того, що ми все одно прагнемо повертатися в дику природу як знайдеться нагода. Тому ми без особливих дебатів приймаємо пропозицію клану Вольсунґр про те, що нашу дику природу треба захищати і вивчати, а не знищувати."

 PLB_a_fair_realm:0 "Прекрасне королівство"
 PLB_a_fair_realm_desc:0 "Дивна зміна охопила наш народ. Можливо, це важко помітити сторонньому, але щось змінилося. Наші ведмеді здаються більш дружніми один до одного, незважаючи на кланові та класові відмінності. Вони щасливіші і, здається, здоровіші. І, що найдивніше, зовсім не ослаблені, а навпаки, здаються більш готовими боротися і захищати свої домівки..."

 PLB_influences_of_warrior_culture:0 "Вплив Півночі"
 PLB_influences_of_warrior_culture_desc:0 "Ми черпали натхнення як з Півдня, з володінь поні, так і зі Сходу, з землі грифонів. Але ми не повинні забувати, що ми - білі ведмеді, раса воїнів з довгою і гордою історією! Здається, Торбен і його клан зайняли саме таку позицію, намагаючись тримати і клан Скюфлінґ По Уеллінгтона, і клан Вольсунґр Ейри "приземленими" і "розсудливими", по-ведмежому."

 PLB_to_protect_our_democracy:0 "На захист нашої демократії"
 PLB_to_protect_our_democracy_desc:0 "Клан Свартпельс унікальний, мабуть, тим, що, незважаючи на, здавалося б, незначне населення клану, їхні армії переважають за чисельністю лише вессландські орди. Однак це досягається не завдяки технологічній досконалості, а скоріше завдяки орієнтації на самодостатність воїнів на полі бою. Можливо, якщо ми попросимо їх поширювати такі вчення, ми могли б зібрати справді велику армію для нашої республіки..."

 PLB_we_will_mobilize_the_economy:0 "Ми мобілізуємо економіку"
 PLB_we_will_mobilize_the_economy_desc:0 "Економіка наших земель, якщо такий термін взагалі придатний для використання, історично була сильно орієнтована на військові потреби. Усе, що можна було б вважати розкішшю або навіть цивільним життям, ледь існувало, Пусткило на другий план або не існувало взагалі. Хоча такий рівень радикального мілітаризму важко підтримувати як належну країну, можливо, в нашій історії є урок про те, що краще для нашого виживання."

 PLB_we_will_mobilize_the_population:0 "Ми мобілізуємо населення"
 PLB_we_will_mobilize_the_population_desc:0 "Навіть з урахуванням уроків, які великий клан Свартпельс розніс по наших землях, Торбен та інші старійшини Володаря Грому стверджують, що у нас просто недостатньо воїнів для боротьби за виживання, яка неодмінно прийде. Можливо, справді, настав час підняти ще більше воїнів, бо історія, безумовно, не наближається до кінця, і великі війни ще попереду."

 PLB_and_fight_for_the_ideal_beyond_our_borders:0 "І будемо боротися за ідеал по всьому світу"
 PLB_and_fight_for_the_ideal_beyond_our_borders_desc:0 "Повелитель грому Торбен досить несподівано запропонував, що замість того, щоб просто сидіти і чекати, поки хижаки, які вважають себе сильнішими за нас, завдадуть удару, ми повинні першими вирвати їм горлянки. Це саме по собі не було б дивним. Але він пропонує робити це не шляхом відкритої війни, а шляхом підтримки інших демократій у їхній власній боротьбі. Немає причин виступати проти друга, особливо з такою благородною ідеєю."

 PLB_a_true_army:0 "Справжня армія"
 PLB_a_true_army_desc:0 "Під час першої та другої об'єднавчих воєн і короткого "мирного" періоду між ними, під час нашого ганебного періоду безпідставного і безглуздого деспотизму, ми не мали справжньої армії. У кращому випадку це були прапори клану Скюфлінґ, а іноді й свартпелів, що піднімалися для окремих походів, а в гіршому - уявлення про те, що наша єдність є штучною, створеною лише фантазією великих полководців. Так більше не буде."

 PLB_lords_of_thunder_in_our_military:0 "Володарі грому в нашій армії"
 PLB_lords_of_thunder_in_our_military_desc:0 "Ми билися пліч-о-пліч з багатьма найкращими воїнами Свартпельса. У часи відчаю наші старійшини та великі воїни командували своїми "воїнами-громовержцями", а їхні обпалені ветерани командували нашими легіонами пансербйорнів. Цілком природно, що такі зв'язки відроджуються знову, коли свартпельських ведмедів запрошують займати найпрестижніші посади в нашій армії."

 PLB_research_into_thunder_armour:0 "Втілити громову броню в реальність"
 PLB_research_into_thunder_armour_desc:0 "Хоча Свартпели зазвичай дуже зневажливо ставляться до багатьох військових технологій як таких, що розмивають красу війни, і вислали достатньо технофілів, які утворюють цілі культи за кордоном, одна технологічна одержимість продовжує існувати - концепція Громової Броні, броньованого костюму, який не замінює справжню силу, а лише посилює її. Раніше це була лише фантазія. А зараз? Хтозна..."

 PLB_svartpels_lessons_for_thunder_armour_production:0 "Уроки Свартпельсу з кування обладунків Пансербйорна"
 PLB_svartpels_lessons_for_thunder_armour_production_desc:0 "Більшість воїнів, принаймні історично, мали особистий, часто саморобний, важкий обладунок. На жаль, у наш час більшість "пансербйорнів" мають у кращому випадку лише легкі обладунки, оскільки їхня чисельність зростає, а міни та здобич не дають змоги забезпечити їхню відповідність. Проте клану Свартпельс якимось чином вдається підтримувати пропорційну чисельність. Можливо, в цьому є урок, який ми могли б засвоїти..."

 PLB_svartpels_strategy:0 "Удар блискавки"
 PLB_svartpels_strategy_desc:0 "Клан Свартпельс, "Володарі грому", славиться своїми швидкими і жорстокими способами ведення війни, покладаючись на фізичний пік своїх воїнів і здатність витримувати і захищати братство і бойову єдність у найгірших випробуваннях. Крім того, вони є нашими давніми союзниками. Тож чи варто дивуватися, що найоптимальнішим вибором для формування армії об'єднаних білих ведмедів є саме Свартпельс?"

 PLB_svartpels_as_our_military_producer:0 "Набрати наших ковалів зі Свартпельсу"
 PLB_svartpels_as_our_military_producer_desc:0 "Наші вороги кишать масами, переважаючи нас удесятеро. І все ж, якщо правильно екіпірований і підготовлений, один ведмідь може впоратися з десятками менших супротивників. Подібно до того, як ми адаптували доктрину Свартпельсу, що ідеально підходить для таких конфліктів, ми попросимо їх виготовити бронежилети, які ще більше піднімуть наших воїнів над гарматним м'ясом інших видів."

 PLB_adopt_radio_technology:0 "Повернення до старих мов"
 PLB_adopt_radio_technology_desc:0 "Хоча вони не говорять нею багато, клан Свартпельс все ще пам'ятає найдавніші мови ведмедів, з тих часів, коли ми були лише бродячими звірами. Ця мова складається з ревіння та гарчання, майже незрозумілих для більшості інших істот. Можливо, якщо ці знання відродити, нам не доведеться боятися, що наші плани будуть викриті..."

 PLB_modernized_thunder_armour:0 "Заморожений всередині, заморожений ззовні"
 PLB_modernized_thunder_armour_desc:0 "Більшість видів володіють магією, і ми не виняток. Коли наші тіла стикаються з теплом південного сонця, вони створюють крижані вітри. Але перегріта зброя також викликає подібні реакції... Можливо, зброя, виготовлена для пансербйорна, може бути спеціально перегріта, щоб викликати ці невеликі шторми, які заморожують зброю та оборону ворога..."

 PLB_elitism_of_svartpels:0 "Армія героїв"
 PLB_elitism_of_svartpels_desc:0 "Якщо мілітаризм у нас в крові, то героїзм і перемога всупереч абсурдним обставинам - в самому нашому дусі. Це те, що зробило клан Свартпельс одним з найвеличніших, дозволило їм розтрощити набагато сильніших ворогів і допомогти нам в об'єднанні виду білих ведмедів. Ми повинні прагнути пробудити цю велич у душі всіх наших воїнів."

 PLB_further_doctrinal_advancement:0 "Старі звичаї свартпелів і сучасність вигнанців"
 PLB_further_doctrinal_advancement_desc:0 "Хоча більшість все ще вважає, що дозволити такій кількості вигнанців повернутися - це в кращому випадку сумнівно, не можна заперечувати, що багато з них повернулися вправними воїнами і командирами, гідними поваги. Навіть старійшини клану Свартпельс визнають, що багато хто з цих молодих ведмедів може дати їм слушну пораду. Можливо, така співпраця зможе просунути свартпельське військове мистецтво ще далі..."

 PLB_legacy_of_the_militarists:0 "Спадщина клану воїнів"
 PLB_legacy_of_the_militarists_desc:0 "Мілітаризм у нас в крові. З якої іншої причини наше суспільство стало б настільки зосередженим на цих воїнах? З якої іншої причини незліченна кількість менших і навіть великих кланів визначалася б нашими легендарними воїнами? Саме такою спадщиною ми повинні визначати наші армії, замість того, щоб дозволити посередностям поглинути нас, як це роблять більш "просунуті" суспільства."

 PLB_rozenkrantz_shamans_in_our_army:0 "Шамани Розенкранцу в нашій армії"
 PLB_rozenkrantz_shamans_in_our_army_desc:0 "Незважаючи на те, що це нетрадиційно для нашого виду, оскільки не має прямого бойового застосування, здатність наших шаманів, особливо з клану Розенкранц, вдивлятися в полярне сяйво і бачити послання божественного має незліченні корисні застосування. Поширення цих посланців серед наших воїнів значно допомогло б нам у маневруванні та перевершенні наших ворогів."

 PLB_gotlung_lessons_of_defence:0 "Дізнатися про оборону від старійшин Ґотлунґів"
 PLB_gotlung_lessons_of_defence_desc:0 "Ґотлунґи - майстри оборони, створюючи, здавалося б, незламні позиції на пустирях або навіть на крижаних рівнинах. Це досягається за допомогою особливої касти будівельників і лісових ковалів, які прирівнюються до воїнів або навіть старійшин, що є нечуваною традицією в інших країнах. Хоча, можливо, її варто було б поширювати."

 PLB_advancement_in_onladir_strategy:0 "Поза межами традиції воєначальників"
 PLB_advancement_in_onladir_strategy_desc:0 "Клани воїнів Онлартіру володіють великою кількістю знань у своєму традиційному військовому мистецтві. Але війни поодиноких роїв чейнджлінґів або самотніх племен яків, на яких була побудована ця база, - ніщо в порівнянні з викликами, з якими нам доведеться зіткнутися. Проте вона все ще є гарною основою для більш сучасних і ефективних стратегій."

 PLB_unbreakable_defence:0 "Незламна оборона"
 PLB_unbreakable_defence_desc:0 "Як великі гори, що витримують найбільші бурі... Як великі льодовики, що не піддаються гніву океану... Наші армії стоять незламні і вічні!"

 PLB_warriors_of_onladir_in_our_high_command:0 "Воєначальники Онлартіру у нашій Військовій Раді"
 PLB_warriors_of_onladir_in_our_high_command_desc:0 "Онлартір історично об'єднувався кілька разів, так, але клани цієї жорстокої землі навіть зараз бачать себе ворогами. Щось, що розпалося, буде імперіями в регіоні десятки разів. Будемо сподіватися, що примушення їх працювати в єдиному військовому апараті зможе виправити таку ворожнечу..."

 PLB_warlord_lessons_on_support_troops:0 "Важливість військ підтримки"
 PLB_warlord_lessons_on_support_troops_desc:0 "Ми ідеалізуємо воїна-ведмедя, будь то пансербйорн чи навіть найнижчий з кланових сокирників. І все ж на кожного ведмедя, який веде війну, припадає три-чотири "солдати", які повинні працювати, щоб армія могла воювати і просуватися вперед. Хіба це не марнотратство? Так думали володарі Онлартіру. І у них є деякі відповіді."

 PLB_expand_onladir_status_across_society:0 "Ми будемо жити так, як живуть в Онлартірі"
 PLB_expand_onladir_status_across_society_desc:0 "Назвати те, що ми маємо тут, "економікою" було б абсурдним перебільшенням, і все ж... воєначальники Онлартіру зуміли зв'язати ті нечисленні розрізнені ресурси, які вони мали, з виробництвом зброї та вирощуванням армій. Можливо, там є чому повчитися."

 PLB_onladir_strategy:0 "Вічні, як гори"
 PLB_onladir_strategy_desc:0 "Шамани Розенкранцу стверджують, що їхні військові успіхи і, певною мірою, успіхи їхніх сусідів випливають з їхнього тіснішого зв'язку з неживим світом, будь то жорстокість вітрів, що змітають гори, або небезпека великих розломів всередині айсбергів. Можливо, там є якась іскра справжньої військової мудрості..."

 PLB_begin_militarization_of_society:0 "Суспільство солдатів"
 PLB_begin_militarization_of_society_desc:0 "Можливо, великі клани занадто покладаються на наші елітні армії та легіони панцербйорнів. Звичайно, такі сили перемогли в обох об'єднавчих війнах. І все ж, з незліченними ордами навколо нас, які прагнуть нашого підкорення, можливо, знову настав час встромити сокири в пазурі всім охочим, а не лише героям серед героїв..."

 PLB_onladir_clans_as_our_military_producers:0 "Попросити клани Онлартіру виробляти зброю"
 PLB_onladir_clans_as_our_military_producers_desc:0 "Як і в багатьох інших випадках, клани Онлартіру дуже оберігають свої унікальні традиції і навіть способи кування зброї, обладунків і різних інших дрібничок, які допомагають у війні. Вони не будуть ділитися всім, хоча, здається, готові виробляти для нас спорядження."

 PLB_triple_alliance_advisers:0 "Лорди Потрійного Альянсу в нашій Військовій Раді"
 PLB_triple_alliance_advisers_desc:0 "Вессландські старійшини - егоїстичні опортуністи, не зв'язані поняттями честі, традицій чи навіть ідеології. Проте їхні армії численні та потужні, і якщо ми хочемо задовольнити їхні амбіції, то, можливо, навчимося чомусь, чого ми не знали, як всередині країни, так і за її межами."

 PLB_triple_alliance_armies:0 "Інтегрувати країни-члени Потрійного альянсу в армію"
 PLB_triple_alliance_armies_desc:0 "Армії вессландських лордів численні та численні, хоча можна стверджувати, що їхня якість дуже низька, оскільки вони в значній мірі заповнені немовлятами і навіть грифонами. Більшість таких підрозділів не придатні для інтеграції в наші збройні сили. Хоча, здається, є кілька таких, які ще можна врятувати."

 PLB_triple_alliance_lessons_on_weapons:0 "Вессландські уроки з особистої зброї"
 PLB_triple_alliance_lessons_on_weapons_desc:0 "Колись кожен ведмідь міг пишатися своїми особистими обладунками. Сьогодні така розкіш недоступна для більшості, більшість населення володіє лише сокирами, що створює проблеми зі створенням великих і далекобійних боєздатних сил. І все ж вессландці, схоже, можуть легко налагодити масове виробництво зброї. Можливо, це урок, який варто засвоїти..."

 PLB_triple_alliance_strategies:0 "Як велика хвиля"
 PLB_triple_alliance_strategies_desc:0 "Постійні вторгнення грифонів, схоже, змусили вессландців розробити унікальну стратегію. Вони вважають, що невеликі елітні армії ведмедів лише знекровлять ворога. Натомість ворога слід розбивати переважаючими силами швидко і жорстоко. Можливо, ця стратегія підходить для нашого теперішнього становища."

 PLB_polar_bear_tank_corps:0 "Снігохідний корпус "Білий ведмідь"
 PLB_polar_bear_tank_corps_desc:0 "Якщо говорити прямо, то білі ведмеді занадто великі для чогось схожого на звичайний танк, не кажучи вже про те, що такі машини не витримують рельєфу та клімату. Але рішення є - снігохід. Можливо, деякі з наших великих військ не зможуть втиснутися навіть у них, але це лише означає, що ті, кого раніше вважали немовлятами, отримують шанс на війні."

 PLB_triple_alliance_in_charge_of_gun_production:0 "Запустити Вессландські кузні"
 PLB_triple_alliance_in_charge_of_gun_production_desc:0 "Вессландці мають чимало виробничих потужностей, якими керують їхні слуги-грифони. Вони досить здібні у своїх виробничих здібностях, як не прикро це визнавати. Тому, навіть якщо декому здається, що це досить безчесно, доручити цим кузням екіпірувати наші армії здається гарною ідеєю."

 PLB_waves_of_iron_and_frost:0 "Ведмеді по духу"
 PLB_waves_of_iron_and_frost_desc:0 "Хоча те, як вессландці покладаються на ненавчених немовлят і слуг-грифонів, є жалюгідним, їхнє використання "совиних ведмедів" - грифонів, які можуть зрівнятися з ведмедями в сутичці, є інтригуючим, адже вони не тільки приносять більше чисельності, але й унікальні таланти та навички виживання. Було б непогано не тільки прийняти цих істот до наших армій, але й активно шукати їх, щоб збільшити нашу чисельність."

 PLB_icebergs_among_sea_of_bears:0 "Айсберги серед моря ведмедів"
 PLB_icebergs_among_sea_of_bears_desc:0 "Як би нам не хотілося це визнавати, але в наш час навіть найдрібніший з наших ворогів може виставити одиниці броні, в багатьох випадках важчі за панцербйорна. В той час, як наші власні панцербйорни стають дедалі рідшими. Рішення елементарне - ми просто виставимо якомога більше бронетанкових одиниць!"

 PLB_endless_waves:0 "Нескінченні хвилі"
 PLB_endless_waves_desc:0 "Навіть зі своїм населенням і великою кількістю низькопробних підрозділів, вессландці могли б просто нанести удар однією хвилею при зіткненні зі своїми ворогами. Наша нинішня ситуація, навпаки, дозволяє нам знову і знову накривати ворога, ламаючи все на своєму шляху, немов океанські хвилі. А яка армія може перемогти сам океан?"

 PLB_waves_and_icebergs:0 "Хвилі та айсберги"
 PLB_waves_and_icebergs_desc:0 "Ведмежа традиція - більшість спорядження виготовляти ремісниками та майстрами, щоб воно було якісним. Навіть наші снігоходи та артилерія зроблені так само. На жаль, так далі не може тривати. Нам потрібні снігоходи та артилерія. Не ідеальні, а достатньо хороші."

 PLB_kings_under_the_mountain_in_our_military:0 "Володарі гір в нашій армії"
 PLB_kings_under_the_mountain_in_our_military_desc:0 "Новий напрямок клану Вольсунґр не є найбільш мілітаристським, проте не варто думати, що він не вміє воювати. Старі войовничі традиції Вольсунґр все ще існують, тепер вони підкріплені сучасною тактикою та зброєю. Їх допомога у військових питаннях була б неоціненною."

 PLB_volsungr_experiences_of_artillery_warfare:0 "Поділитися нашим досвідом в артилерії"
 PLB_volsungr_experiences_of_artillery_warfare_desc:0 "Обидва клани Вольсунґр і Скюфлінґ відомі тим, що серед їхніх старійшин є чимало ентузіастів артилерії, принаймні серед колишніх вигнанців. З возз'єднанням ведмежих земель під нашим єдиним керівництвом, їхнім досвідом та ідеями можна буде знову ділитися, і все це задля покращення нашої армії."

 PLB_artillery_lessons_brought_from_abroad:0 "Гарматні навчання з-за кордону"
 PLB_artillery_lessons_brought_from_abroad_desc:0 "Хоча клан Скюфлінґ найбільше зосередився на використанні артилерії після повернення По Уеллінгтона та його вигнанців, їм бракує деяких новітніх розробок та винаходів із сонячних земель Еквестрії. Такі досягнення належать до компетенції експертів Вольсунґра, і вони готові ними поділитися."

 PLB_volsungr_strategies:0 "Як крижаний шторм"
 PLB_volsungr_strategies_desc:0 "Гори, в яких живе клан Вольсунґр, страждають від штормів, наповнених бурульками і великими уламками льоду, які в деяких випадках можуть навіть знищити цілі армії. Як старійшини Вольсунґру, так і молодше покоління стверджують, що їхня улюблена тактика артилерійських обстрілів призводить до тих самих результатів. І у нас немає підстав сумніватися в цих твердженнях."

 PLB_volsungr_as_our_military_producer:0 "Попросити Вольсунґр про допомогу у виробництві зброї"
 PLB_volsungr_as_our_military_producer_desc:0 "Клан Вольсунґр за півтора десятка років, що минули після повернення Ейри та її вигнанців, створив потужності для виробництва сучасної артилерії та бойових броньованих машин, а також для застосування різних іноземних розробок до наших власних. Це не найсучасніші розробки, але за певної підтримки з боку держави вони могли б дати непогані результати."

 PLB_experimental_guns:0 "Експериментальне обладнання"
 PLB_experimental_guns_desc:0 "Нашу магію важко контролювати, вона дика і неприборкана. І будь-який клан, який намагався її контролювати, звертався до темної магії або, що ще гірше, вступав у союзи з чейнджлінґами Соріфа. Деякі колишні вигнанці з Вольсунґру припускають, що є спосіб використовувати контрольовану бойову магію для нас. Тільки не напряму, а скоріше вбудовуючи магічні боєприпаси та пальне в нашу зброю."

 PLB_armoured_support:0 "Елітні снігоходи"
 PLB_armoured_support_desc:0 "Ми не можемо сподіватися на те, що зможемо зрівнятися з великими парками бронетехніки наших ворогів, навіть якщо нам знадобиться менше особового складу для наших. Це означає, що так само, як і у випадку з нашими воїнами і панцербйорнами, кожен наш снігохід повинен буде боротися проти, можливо, дюжини танків. Отже, ми повинні переконатися, що наші машини дійсно можуть йти один на один."

 PLB_volsungr_hunter_teams:0 "Прийняти тактику команди мисливців"
 PLB_volsungr_hunter_teams_desc:0 "Протягом усієї відомої історії Яків гори клану Вольсунґр були облюбовані безклановими вигнанцями, які боролися за ці землі з яками та монстрами. Іноді вони приєднувалися до клану Вольсунґр як союзники у їхніх війнах, просто заради гострих відчуттів. І, здається, вони готові битися і за нас."

 PLB_rain_shells_and_strike_at_weak_spots:0 "Буря льоду та люті"
 PLB_rain_shells_and_strike_at_weak_spots_desc:0 "Між ревучим холодним вогнем нашої магічної зброї, швидкими рейдами наших незламних снігоходів і нескінченними потоками снарядів з тисяч артилерійських гармат, наша армія подібна до невблаганних північних штормів, що знищують і поглинають армії і найбільші з не ведмежих міст і фортець."

 PLB_polar_bear_industry:0 "Розвивати промисловість Півночі"
 PLB_polar_bear_industry_desc:0 "Сучасній державі потрібна справжня промисловість. Доволі суперечливе твердження, коли ми потрапляємо до невблаганних замерзлих областей світу, наповнених культурами або жахливими, або дикими, або гігантськими. Але, на жаль, це правда. І оскільки ми прагнемо бути сучасною державою. Що ж..."

 PLB_regional_development:0 "Клановий розвиток"
 PLB_regional_development_desc:0 "Незважаючи на те, що наша держава стала більш згуртованою і, можливо, менш федеративною у зв'язку з останніми подіями, вона все ще складається з кланів зі своїми здібностями, історією і навіть улюбленими спеціалізаціями промисловості та виробництва. Цілком природно продовжувати розширюватися в таких напрямках."

 PLB_onlartir_industry:0 "Військова кузня Онлартіру"
 PLB_onlartir_industry_desc:0 "Вони можуть бути гордими, ці дивні лорди і шаманські королі Онлартіру, вони можуть мати дух воїнів і завойовників. Але це мало що значить, коли вони не мають засобів, щоб спорядити свої легіони для майбутніх воєн. Сподіваємось, з нашою допомогою, не надовго."

 PLB_onlartir_railway:0 "Дороги, якими мандрують шамани"
 PLB_onlartir_railway_desc:0 "Шамани, як ті, що пов'язані з кланом, так і ті, що діють самостійно, за своєю природою є значною мірою мандрівниками. І багато хто з них ходить давно зруйнованими дорогами чаклунів та відьомських тиранів давнини. Відновлення таких доріг не лише допоможе нашим арміям легко пересуватися, але й забезпечить нам лояльність кланів Онлартіру, які добре пам'ятають ті землі."

 PLB_weslandian_industry:0 "Вессландські мануфактури"
 PLB_weslandian_industry_desc:0 "У вессландських лордів є дещо, що можна навіть наважитися назвати промисловістю. Проте, незважаючи на армії робітників-грифонів, що славляться своєю працьовитістю по всьому світу, кузні та мануфактури Вессландії залишаються такими ж, застряглими на давно застарілих і неефективних методах. Можливо, їм потрібно кілька нових інструментів для кращої продуктивності..."

 PLB_expand_weslandian_resources:0 "Зазирнути глибше"
 PLB_expand_weslandian_resources_desc:0 "Вессландія вважається чимось на кшталт перлини землі, її землі настільки багаті, наскільки це можливо так далеко на півночі, жили її землі наповнені ресурсами. Перлина, яка чекає на те, щоб її захопили, як стверджували деякі нині покійні авантюристи-грифони. Звичайно, вони мали рацію. Ці ресурси допоможуть нам піднятися до величі..."

 PLB_expand_weslandian_farms:0 "Нехай тундра процвітає"
 PLB_expand_weslandian_farms_desc:0 "У вессландській пустелі багато дичини, її води наповнені рибою. Ліси та поля рясніють бульбами, ягодами та різними іншими їстівними або корисними рослинами. Єдине, що заважає цьому краю стати так званою "житницею", густонаселеною і повною життя, - це брак волі!"

 PLB_expand_mines_of_scyfling:0 "Занурити глибше у вени світу"
 PLB_expand_mines_of_scyfling_desc:0 "Як би нам не було боляче це визнавати, але не тільки воля і гнів будують великі держави. Потрібне велике населення, виробничі потужності, інфраструктура, а для всього цього потрібні сировинні ресурси. Свого часу володіння клану Скюфлінґ вже досягли своїх меж у постачанні всього цього, але з новими технологіями та знаннями ми можемо просунутися ще далі!"

 PLB_hire_foreign_specialists:0 "Найняти іноземців"
 PLB_hire_foreign_specialists_desc:0 "Подібно до того, як ми досягли меж ресурсів Скюфлінґу, ми досягли меж того, чого можуть досягти навіть наші найкращі та найрозумніші в науковій сфері. Звісно, не варто хвилюватися. Є достатньо істот, будь то грифони, поні і навіть пара драконів, готових поділитися передовими науковими знаннями за трохи нікчемного золота."

 PLB_use_key_lake_crystals_to_attract_some_ecentrics:0 "Заманити диваків кристалами"
 PLB_use_key_lake_crystals_to_attract_some_ecentrics_desc:0 "Раніше ми вигнали або вбили багатьох ведмедів Ключ-озера за роботу з Чейнджлінґами. І все ж, коли ми досягли межі наших промислових можливостей, їхні магічні здібності стають все більш привабливими. Можливо, декого з них можна було б повернути назад... Вони можуть залишитися лояльними, якщо їм добре заплатити кристалами..."

 PLB_expand_the_royal_university:0 "Воїни розуму"
 PLB_expand_the_royal_university_desc:0 "Ведмеді вміють робити зброю, ми можемо її вдосконалювати, але ми точно не винаходимо.... Спосіб функціонування кланових систем часто заважає таким нахилам проявлятися належним чином. Але, маючи вже створені місця навчання, можливо, їх можна перетворити на місця винахідництва?"

 PLB_northern_industry:0 "Вогонь горить під кригою"
 PLB_northern_industry_desc:0 "Є частина клану Свартпельсів, які мають досить дивну одержимість підземеллям. Там вони будують свої архіви, і навіть їхні трюми знаходяться глибше під землею, ніж більшість, вони навіть мріють звести великі кузні під постійним крижаним покривом, який покриває частину їхніх земель. Можливо, варто їм допомогти..."

 PLB_expand_northern_resources:0 "Пробитися крізь крижаний панцир"
 PLB_expand_northern_resources_desc:0 "Клани Свартпельс і Анкер століттями видобували корисні копалини на своїх льодовиках і замерзлих землях, але під їхніми величезними товщами льоду ховається набагато більше багатств. Але з новими науками, привезеними з-за кордону, ми можемо зруйнувати замерзлу земну кору і захопити приз."

 PLB_warrior_smiths_of_svartpels:0 "Перевчитися витримувати"
 PLB_warrior_smiths_of_svartpels_desc:0 "Полярний мисливець використовує кожен крихітний клаптик ресурсів, кожен шматочок плоті, кісток і шкіри. Полярний виживалець використовує будь-який матеріал, включно з льодом, звісно. Можливо, це урок, який варто запам'ятати. Ми вже є цивілізацією, але все ще настільки перевершені тими, хто цього не заслуговує... Ми повинні пам'ятати, що все можна використовувати повторно."

 PLB_yak_mountain_industry:0 "Кузні під горами"
 PLB_yak_mountain_industry_desc:0 "Гірські володіння Вольсунґру унікальні тим, що вони не обмежені можливостями контролювати землю або тим, скільки їх можна утримувати. Зрештою, печери порівняно легко будувати, їх легше обслуговувати, не кажучи вже про захист. Незліченні кузні вже гніздяться в таких печерах. Додамо ще пару..."

 PLB_to_supply_volsungr:0 "Нагодувати принцесу"
 PLB_to_supply_volsungr_desc:0 "Клану Вольсунґр завжди загрожувало їхнє розташування. Воно було добре захищене, а гірський видобуток дозволив побудувати безліч трюмів і кузень в печерах, але гори і кілька крихітних смужок землі не приносили багато їжі, що змушувало великий клан часто торгувати за базові продукти харчування. Ми прокладемо дороги, щоб полегшити транспортування таких предметів першої необхідності."

 PLB_integrate_clan_economies:0 "Інтегрувати кланові економіки"
 PLB_integrate_clan_economies_desc:0 "По Уеллінгтона і клан Скюфлінґ двічі об'єднали більшість видів ведмедів не просто так - щоб створити єдину державу для ведмедів. Дати задній хід і не об'єднати військово чи економічно ці будівельні блоки нашої держави було б просто абсурдно."

 PLB_begin_the_great_agricultural_project:0 "Розпочати Великий аграрний проєкт"
 PLB_begin_the_great_agricultural_project_desc:0 "Наша земля стала причиною нашої могутності, але в той же час вона є нашою великою слабкістю, оскільки рослини і звірі, які тут живуть, не дозволяють розводити таке ж велике населення, як у наших ворогів, але з цим проектом, можливо, ми колись зможемо зрівнятися з ними..."

 PLB_connect_the_regions:0 "З'єднати регіони"
 PLB_connect_the_regions_desc:0 "Суть великого проекту полягає в регіональній спеціалізації, щоб регіони, які можуть чудово виробляти продукти харчування, робили це, а ті, які ледве можуть себе прогодувати, спеціалізувалися на інших галузях. Для того, щоб така спеціалізація функціонувала, країна повинна бути з'єднана на рівні, який дехто може назвати непридатним для неприборканої і гордої дикої раси..."

 PLB_expand_the_farms:0 "Земля, берег, море"
 PLB_expand_the_farms_desc:0 "Є багато істот, риби і особливо тюленів, яких ведмеді споживають і часто навіть вирощують заради м'яса. Проте багатьом з таких спроб бракує не лише ефективності, але й належного використання землі. З деякими змінами та новими землями ми не лише вироблятимемо більше м'яса, але й звільнимо землю для більш корисних цілей."

 PLB_wesslandian_effort:0 "Велике Вессландське зусилля"
 PLB_wesslandian_effort_desc:0 "У той час як маси дітей і слуг грифонів харчувалися ягодами, корінням і бульбами, вирощування цих рослин було досить другорядним, незважаючи на те, наскільки легко вирощувати такі рослинні продукти. Найбільше ресурсів забирає початкова трансформація землі, після чого її стає надзвичайно легко підтримувати. Але це те, що ми просто зобов'язані зробити."

 PLB_finish_the_great_agricultural_project:0 "Завершити Великий сільськогосподарський проєкт"
 PLB_finish_the_great_agricultural_project_desc:0 "Арктичне сільське господарство, тваринництво та аквакультура - це те, що більшість рас, наскільки вони сліпі, вважають занадто інтенсивним для вирощування, занадто складним для управління. Але вони бачать лише початкові кроки. А з розширенням, реформуванням і створенням ферм у нас тепер є велика кількість населення, яке можна мобілізувати, і нескінченний потенціал для зростання!"

 PLB_fuel_the_forges:0 "Заправити кузні"
 PLB_fuel_the_forges_desc:0 "Будуючи нові дороги, нові ферми та розширюючи різні об'єкти і сховища, ми відкрили багато нових потенційних джерел металів та інших матеріалів. Крім того, хоч і не напряму, але ми дізналися про чимало нових способів обробітку землі та прориву крізь вічну мерзлоту, які можуть бути застосовані і при розкопках."

 PLB_with_nordic_resources:0 "Алюміній і нафта"
 PLB_with_northern_resources_desc:0 "Клани Свартпельс і Анкер сидять на багатих родовищах. Раніше від думки про те, що ми коли-небудь до них дістанемося, можна було тільки слину пускати. Але тепер ми володіємо знаннями і засобами, щоб дістатися до цих багатих надр."

 PLB_key_lake_crystals:0 "Кристали з Ключ-озера"
 PLB_key_lake_crystals_desc:0 "Після вигнання кланів зі Східного Ключ-озера через їхній союз з Чейнджлінґами, копальні кристалу занепали. Але тепер, коли діти і слуги звільнилися, коли їм не потрібно доглядати за фермами і полювати, ми знову можемо скористатися магічною силою, що з'явилася з глибин світу."

 PLB_factorum_expansion:0 "Розгорнути факторуми"
 PLB_factorum_expansion_desc:0 "Хоча форми, вітрозахисні екрани та різні інші системи скоро почнуть ламатися від жорстокості північних штормів і потребуватимуть обслуговування. Але поки що є багато робітників, які не мають особливої роботи. Це вікно можливостей для значного розширення наших кузень і володінь, і ми повинні ним скористатися."

 PLB_southern_factories:0 "Велика гірська мануфактура"
 PLB_southern_factories_desc:0 "Гірські володіння клану Вольсунґр, що раніше перебували на межі виживання, тепер живляться з великих полів Вессландії. Між нашими дітьми та їхніми будівничими є потенціал. Потенціал перетворити гірський замок принцеси Ейри на мануфактуру, здатну забезпечити цілу країну!"

 PLB_onlatir_manufatories:0 "Пожежі на заході"
 PLB_onlatir_manufatories_desc:0 "Клани Онлартіру володіють багатьма ковалями, які виробляють обладнання виняткової якості, але їм не вистачає робітників для масового виробництва, що ми тепер можемо усунути як проблему. Таким чином, це просто їхній обов'язок використовувати цю нову вільну робочу силу для виробництва достатньої кількості спорядження, щоб зібрати найбільшу армію ведмедів, яку коли-небудь бачили!"

 PLB_expand_education_facilities:0 "Допомогти шаманам-вчителям"
 PLB_expand_education_facilities_desc:0 "Більшість винаходів і здібностей білих ведмедів, які вважаються універсальними, були поширені дивакуватими шаманами, які подорожують між трюмами, щоб навчати молодь. Можливо, якби їм дати матеріал для розуміння багатьох сучасних інновацій, вони змогли б поширювати ці знання краще, ніж ми коли-небудь змогли б."

 PLB_the_polar_bear_university_of_industry:0 "Створити Північний університет промисловості"
 PLB_the_polar_bear_university_of_industry_desc:0 "Ми багато чого досягли завдяки мережам обміну інформацією та простим, традиційним методам, адаптованим до клімату, що випереджають сучасні ідеї, які не підходять для навколишнього середовища, але треба визнати, що є межі того, чого можна досягти без навчальних та дослідницьких установ..."

 PLB_northern_center_of_great_minds:0 "Північний центр великих умів"
 PLB_northern_center_of_great_minds_desc:0 "Південні королівства покладають велику частину своєї сили на існування класу мислителів, класу винахідників або касти інтелектуалів. Звичайно, у нас є наші шамани та старійшини, але більшість з них не організовані та не є по-справжньому інноваційними. Можливо, настав час виправити цей кричущий недолік."

 PLB_iron_heart_of_the_north:0 "Залізне серце Півночі"
 PLB_iron_heart_of_the_north_desc:0 "Після довгих і важких перетворень ми досягли такого рівня виробництва та промислової потужності, якого не могли передбачити ні ми, ні наші вороги. Можливо, ми ще не можемо зрівнятися з великими південними королівствами, але яке це має значення, коли ми є залізним серцем Півночі?"

 PLB_the_ulriks_dream:0 "Сон Ульріка"
 PLB_the_ulriks_dream_desc:0 "[PLB.GetLeader] не єдиний, хто мріє докорінно змінити спосіб ведення війни на замерзлій Півночі. Але поки наш лідер мріє про великі битви на воді, його товариш по незліченних війнах у Грифонії - Ульрік Гаммер - мріє про війну, що ведеться серед хуртовин і вітрів. І, можливо, з ресурсами цілого королівства ця мрія може стати реальністю."

 PLB_the_first_airport:0 "Перший справжній полярний аеропорт"
 PLB_the_first_airport_desc:0 "Раніше будь-який літак, який міг пережити жорстокі північні вітри, повинен був приземлятися на крижаних рівнинах і сподіватися на краще. Тепер це не так. Уперше в історії людства на самісінькій вершині світу з'явився аеропорт, який вітає всіх, хто наважився кинути виклик крижаним штормам."

 PLB_the_beginnings:0 "Скромні початки"
 PLB_the_beginnings_desc:0 "Ще до того, як виникла ідея створення військово-повітряних сил грифонів для спільнот білих ведмедів, Ульрік почав працювати самостійно. З моменту повернення [PLB.GetLeader] на землі білих ведмедів Ульрік побудував понад 50 літаків своїми руками. Вони стануть початком наших військово-повітряних сил."

 PLB_actual_plane_tech:0 "Нарешті, трохи реальної авіатехніки"
 PLB_actual_plane_tech_desc:0 "Небагато держав, які мають доступ до сучасних літаків, мають бажання ділитися схемами або навіть моделями з державою, яка може сприйматися як зростаюча сила. Однак нам вдалося роздобути кілька креслень сучасних літаків через деякі сумнівні контакти в Грифонії. Сподіваюся, ми встигнемо їх розробити і виготовити."

 PLB_the_polar_navy:0 "Мрія"
 PLB_the_polar_navy_desc:0 "Хоча такі амбіції здебільшого стримуються, не секрет, що По Уеллінгтон - великий ентузіаст морської війни та військових кораблів, навіть свою деспотичну уніформу він змайстрував за зразком капітана, а не військового командира. Але з новим процвітанням білих ведмедів, можливо, настав час для здійснення мрії."

 PLB_close_the_doctrinal_gap:0 "Оповідання"
 PLB_close_the_doctrinal_gap_desc:0 "Під час свого заслання По Уеллінгтон не просто захоплювався великим флотом Грифонії. Скоріше, як і в незліченних інших сферах, він зібрав величезну скарбницю знань, чи то з книг, чи то з власного досвіду командування невеликими морськими битвами. Ці знання настільки обширні, що він здатен описати цілі аспекти військово-морської доктрини!"

 PLB_anker_navy:0 "Клан Анкер"
 PLB_anker_navy_desc:0 "Клан Анкер є дещо унікальним, адже це не лише клан, зосереджений на дослідженні та освоєнні морів, але й клан, в якому ведмеді становлять меншість, а пінгвіни компрометують більшість членів. Здається, це дозволяє їм мати незліченну кількість легких кораблів, екіпажі яких складаються здебільшого з пінгвінів. Можливо, цю ідею варто впроваджувати..."

 PLB_base_our_navy_on_anker_one:0 "Побудувати наш флот навколо сил Анкера"
 PLB_base_our_navy_on_anker_one_desc:0 "Флот Анкера в основному складається з невеликих транспортних засобів, лише деякі з яких придатні для військової конверсії. Звісно, небагато, але пропорційно з розміром флоту Анкера, це забезпечило б нам відповідну базу для пристойного флоту. Принаймні, для країни нашого розміру."

 PLB_adopt_anker_doctrine:0 "Учитися у капітанів Анкеру"
 PLB_adopt_anker_doctrine_desc:0 "Клан Анкер має багато чудових історій і багато чудових уроків про боротьбу з великими звірами і північними морями або втечу від них. Вони навіть розповідають про дивну стародавню магію пінгвінів, які перетворювали айсберги на плавучі або навіть підводні рухомі фортеці. Тут є чому повчитися..."

 PLB_improve_anker_ship_designs:0 "Покращення дизайну кораблів Анкера"
 PLB_improve_anker_ship_designs_desc:0 "Хоча початкова основа все ще існує, звичайно, боротьба з монстрами, якими б небезпечними чи різноманітними вони не були, значно відрізняється від справжнього морського бою. Таким чином, спосіб, яким Анкер кує свої кораблі, буде змінено на щось більш відповідне."

 PLB_continue_research_into_larger_designs:0 "Великі айсберги зі сталі"
 PLB_continue_research_into_larger_designs_desc:0 "Ми не можемо відбудувати великі плавучі крижані фортеці старих королів відьом і чаклунів, бо, на жаль, урсини, здається, втратили магію, яка дозволяла їм це робити. Але ми, можливо, можемо сподіватися наслідувати такі великі споруди, викувані зі сталі та льоду, а не з самого чарівного морозу."

 PLB_research_underwater_vehicles:0 "Полювати за чейнджлінґами"
 PLB_research_underwater_vehicles_desc:0 "Чейнджлінґи хитрують у морській війні, ховаючись під водою поза досяжністю гармат. Але ми їх знайдемо. І розробимо нові, більш ефективні способи розгортання глибинних бомб. Смерть чейнджлінґам!"

 PLB_falsen_navy:0 "Клан Фальсен"
 PLB_falsen_navy_desc:0 "Клан Фальсен - один з кланів Вессландії, що вже викликає певне занепокоєння, коли мова заходить про перспективу спільної роботи. Але клан Фальсен має дещо несподіване: кораблі, призначені для ведмедів, а не тільки для пінгвінів, і навіть досвід морських боїв. Обидва аспекти надзвичайно корисні для нашого флоту."

 PLB_base_our_navy_on_falsen_one:0 "Кувати наш флот на основі Фальсенських"
 PLB_base_our_navy_on_falsen_one_desc:0 "Фальсен володіє кораблями, не рибальськими суднами, не транспортними засобами. Справжні кораблі, викувані для бою і постійно випробовувані проти авантюристів і піратів. Воістину гідне ядро для побудови нашого флоту."

 PLB_adopt_falsen_doctrine:0 "Прийняти доктрину фальсенів"
 PLB_adopt_falsen_doctrine_desc:0 "Фальсени мають просту доктрину для свого флоту, яка дійсно підходить для капітанів та адміралів їхнього клану. Володіти силою найбільших і найстрашніших, найпотужніших і найброньованих кораблів, щоб ніхто не насмілився поставити під сумнів їхню могутність. Яка ж інша доктрина нам личить?"

 PLB_improve_falsen_ship_designs:0 "Теоретичні проекти фальсенів"
 PLB_improve_falsen_ship_designs_desc:0 "Фальсени, не скуті багатьма традиціями кланів і нелюбов'ю до любителів теоретичного, володіють багатьма мрійниками. Такі мрійники створили чимало цікавих проектів кораблів. Деякі з них подають великі надії, хоча інші краще залишити для художніх зображень, ніж для реального кування..."

 PLB_the_manned_icebergs_of_falsen:0 "Пілотовані айсберги Фальсена"
 PLB_the_manned_icebergs_of_falsen_desc:0 "На жаль, виявляється, флот не можна викувати лише з великих лінкорів. Мабуть, такі великі бегемоти потребують підтримки з боку менших суден. Схоже, навіть на морі проявиться вессландська залежність від ополчення грифонів, адже наші менші та допоміжні кораблі доведеться контролювати кріпаками-грифонами. Сподіваємось, що нічого не піде не так..."

 PLB_first_carriers:0 "Корабель-літак"
 PLB_first_carriers_desc:0 "Наш могутній "М'ясник-Чейнджлінґ" завжди мав на борту невеликий літак для розвідки, але нова радикальна пропозиція пілота цього самого літака потрясла флот до глибини душі. Виявляється, можна створити корабель розміром з важкий крейсер або навіть лінкор, але без жодної зброї, окрім зенітної. І його завданням буде запускати винищувачі!"

 PLB_a_change_of_pace:0 "Зміна темпу"
 PLB_a_change_of_pace_desc:0 "Протягом всієї історії ведмедів, більшість спроб об'єднати весь рід білих ведмедів були лише спробою поширити культуру, вірування і традиції одного клану на інші або навіть амбіції окремих воєначальників на весь вид, часто за допомогою жорстокої сили. Здебільшого такі спроби призводять до краху. Але ми не можемо дозволити собі такий крах знову..."

 PLB_reforge_the_clan_system:0 "Реформувати кланову систему"
 PLB_reforge_the_clan_system_desc:0 "Раніше, настільки ж залежний від нього, По Уеллінгтон розглядав поділ ведмедів на клани як щось, з чим треба боротися, що має бути зруйноване, якщо ми хочемо привести царство горностаїв до сучасності, і все ж як його власні успіхи, так і успіхи його супротивників прийшли саме завдяки проникненню в їхні клани..."

 PLB_the_coronation:0 "Коронація"
 PLB_the_coronation_desc:0 "Білі ведмеді не люблять великих святкувань. Навіть нечисленні паради перемоги та бенкети після великих військових перемог не є найрозкішнішими заходами. Здебільшого це не зміниться, розкоші та марнотратству немає місця в нашому суспільстві. Але коронація першого Короля Зими заслуговує на те, щоб бути грандіозною!"

 PLB_example_of_the_empire:0 "Приклад з Імперії Грифонів"
 PLB_example_of_the_empire_desc:0 "Імперія Грифонів - найвеличніша з імперій, яка була викувана чимось порівнянним зі смертною істотою. Не кажучи вже про те, що вона народилася і відродилася знову в горнилі війни. Хоча грифони, без сумніву, здебільшого слабкі та немічні створіння, Ґровери з божественно благословенного роду - це те, чим варто захоплюватися і чого варто вчитися."

 PLB_copy_imperial_beaurocrocracy:0 "Копіювати імперську бюрократію"
 PLB_copy_imperial_beaurocrocracy_desc:0 "Бюрократія - це інститут, який, можливо, важко зрозуміти нашому виду. І будь-яка спроба змусити ведмедя займатися паперовою роботою, швидше за все, призведе до його розлючення. Мабуть, добре, що в наших володіннях є багато грифонів, яким можна делегувати такий обов'язок..."

 PLB_adress_polar_bear_faith:0 "Наша давня віра"
 PLB_adress_polar_bear_faith_desc:0 "Віра білого ведмедя є давньою, міцною, поважною і такою, що історично визначила багато кланів. І все ж вона дезорганізована, складається з різних культів, яким бракує об'єднуючого елементу. І оскільки наше зростаюче Царство нерозривно пов'язане з божественним і релігійним, ми змушені протистояти проблемам, які це створює."

 PLB_embrace_the_tradition:0 "Прийняти традицію"
 PLB_embrace_the_tradition_desc:0 "Яке нам діло до відсутності організації чи ієрархії? Хто ми - грифони чи поні, які потребують, щоб істоти в мантіях вказували їм, чому і як поклонятися? Нехай кожен ведмідь поклоняється будь-якому предку, богу чи міфічному звіру, якому він бажає, доки він визнає Всевишнього понад усе і може захистити свою віру фізичною силою!"

 PLB_help_wanderer_shamans:0 "Допомогти мандрівним шаманам"
 PLB_help_wanderer_shamans_desc:0 "Подібно до того, як ми не потребуємо самопроголошених святих істот, щоб вказувати нам, чому і як поклонятися, так і наші шамани не будуть скуті політикою і доктриною. Але це не означає, що держава і віра не матимуть жодного зв'язку. Скоріше, хоча ми не будемо домінувати над ними, нова інфраструктура дозволяє здійснювати певний опосередкований вплив..."

 PLB_protector_of_faith:0 "Захисник віри"
 PLB_protector_of_faith_desc:0 "Царя Зими благословив сам Усеотець. Дехто навіть стверджує, що нинішній король є нащадком великого бога. Усе це означає, що так само, як Усеотець є царем духів і богів, маючи можливість використовувати їхню об'єднану силу, так і Король Зими представляє об'єднану силу нашої віри в матеріальному світі!"

 PLB_a_new_era:0 "Нова ера"
 PLB_a_new_era_desc:0 "Те, що колись було дюжиною кланів, тепер постає як єдина держава, готова витримати бурю нової ери. Цілком логічно, що всі інституції, які існували до об'єднання, наслідують її приклад. Таким чином, розрізнені культи, способи поклоніння і шанування будуть переплавлені в єдину організовану віру, чого ніколи раніше не бачили на полярній Півночі!"

 PLB_blessed_industries:0 "Ритуальне підроблення"
 PLB_blessed_industries_desc:0 "Багато білих ведмедів є працьовитими, і, можливо, не дивно, дещо релігійними, проявляючи свою віру і талант у ритуальному куванні різної зброї. Цікаво, що багато з цих нібито магічних дій призводили до різних результатів. З нашою новознайденою релігійною єдністю, можливо, вдасться викувати ідеальний ритуал кування..."

 PLB_divine_hierarchy:0 "Могутність, благословенна Божеством"
 PLB_divine_hierarchy_desc:0 "Кожен шаман білого ведмедя - грізний воїн. Але це не їхня справжня цінність у бою. Швидше за все, вони здатні приборкувати найдикіші імпульси інших ведмедів, спрямовуючи їх у холодну та організовану ненависть. Зі збільшенням чисельності шаманів ми зможемо поширювати їх, щоб досягти такого ефекту не лише на окремі підрозділи, а й на всю армію!"

 PLB_the_overst_gudija:0 "Øверст-Гудія"
 PLB_the_overst_gudija_desc:0 "Віра грифонів має своїх архонтів, представників богів у фізичному світі, які правлять державами всередині держав, використовуючи надану їм божественну силу, щоб принести велич своїй державі і вшанувати своїх богів. Звідси виникає дуже просте запитання: якщо грифони можуть мати своїх архонтів, чому ми не можемо мати своїх?"

 PLB_land_reform:0 "Велика земельна реформа"
 PLB_land_reform_desc:0 "Ні клан Скюфлінґ, ні По Уеллінгтон не хочуть згадувати цей факт, але це правда, що наш нинішній успіх і становище ґрунтуються на підтримці безкланових ведмедів. І тепер настав час виконати обіцянки. Невикористані землі будуть роздані безклановим, можливо, будуть викувані нові спадщини і народяться нові клани..."

 PLB_roads_and_railways:0 "Замерзлі дороги та залізні колії"
 PLB_roads_and_railways_desc:0 "Можливо, нікого не здивує, що багато вигнанців, які блукали землею без кланів і вважалися нікчемними, могли стати талановитими ремісниками і навіть архітекторами. Ми вшануємо цих ведмедів, які піднесли наш режим, дозволивши їм кувати дороги і залізниці, які стануть кровоносними судинами для нашого нового королівства."

 PLB_council_of_lords_and_leaders:0 "Створити Палату Лордів"
 PLB_council_of_lords_and_leaders_desc:0 "Ми могли б змусити лордів, великих і малих, стати перед нами на коліна і викричати визнання поразки і нашої переваги. Але обіцянки були зроблені, про автономію та більшу владу, ніж будь-коли. І вони будуть виконані! Подібно до того, як у Імперії Грифонів були свої ради знаті, у нас будуть свої."

 PLB_the_army_of_winter:0 "Армія Зими"
 PLB_the_army_of_winter_desc:0 "Перша об'єднавча війна завершилася лише піднятими легіонами клану Скюфлінґ. Друга закінчилася клаптиковими силами наших легіонів, підрозділами, зібраними з підкорених кланів та ополченців. Як би це нас не засмучувало, але така сила, що представляє наші давні традиції, не може воювати в сучасну епоху, потрібні реформи!"

 PLB_a_police_force:0 "Створити арбітрів"
 PLB_a_police_force_desc:0 "Єдине царство повинно мати єдиний закон. Більшість за межами наших кордонів з цим погодиться, багато хто всередині - ні. Крім того, багато кланів не зможуть забезпечити його дотримання самостійно. Схоже, що нам доведеться забезпечити дотримання Королівського закону, навіть якщо це призведе до жертв. І так сталося, що є чимало безкланових ведмедів, які з радістю послужать за таку можливість..."

 PLB_begin_establishing_a_central_bank:0 "Розпочати створення центрального банку"
 PLB_begin_establishing_a_central_bank_desc:0 "Ми можемо ненавидіти золото; ми можемо ненавидіти торгівлю та обмін, засновані на цінностях, які не є кров'ю та силою. Але державі потрібна економіка, потрібна валюта, потрібен потік ресурсів. Їй потрібен центральний банк, який може все це контролювати. Деякі вперті ведмеді можуть не погоджуватися, але ми завжди можемо їм це втовкмачити."

 PLB_breaking_the_economic_shell:0 "Розбити економічну шкарлупу"
 PLB_breaking_the_economic_shell_desc:0 "Сучасна економіка - це не те, що захоплює чи надихає ведмедів. Занадто багато складнощів, занадто багато одержимості цифрами та речами, які не можна схопити лапами. Це шкарлупа, яка обмежує наш потенціал і яку потрібно розбити, якщо ми хочемо вижити у світі, що постійно змінюється."

 PLB_currency_based_on_gold:0 "Золота валюта"
 PLB_currency_based_on_gold_desc:0 "Золото - слабкий метал. Воно гнеться від сталі, воно руйнується від будь-якого напруження зірчастої сталі. І все ж грифони, поні, собаки, олені, Чейнджлінґи і навіть такі великі воїни, як яки та мінотаври, готові вбивати один одного за цей нікчемний метал, виковуючи з нього монети, що визначають їхні володіння. На жаль, це означає, що ми повинні наслідувати їхній приклад."

 PLB_great_central_bank_of_the_north:0 "Великий банк Півночі"
 PLB_great_central_bank_of_the_north_desc:0 "Ми ненавидимо торгівлю, ми ненавидимо валюту, засновану на слабкому металі, ми ненавидимо системи обміну, в які вони вірять. І все ж ми процвітаємо, нова валюта, новий банк, нові системи обміну... Усе це призводить до того, що багатство перетікає у використання, всередині країни і за кордоном... Так, до цього можна звикнути..."

 PLB_the_rising_kingdom:0 "Процвітаюче королівство"
 PLB_the_rising_kingdom_desc:0 "Це був важкий і дивний шлях для роду ведмедів. Але нарешті, після двох об'єднавчих воєн та великих і несподіваних реформ, ми готові з'явитися світові не як купка кланів чи проста громада. Ні! Ми - Володарі Зими! Нехай світ здригнеться!"

 PLB_the_bull_and_the_bear:0 "Бик і ведмідь"
 PLB_the_bull_and_the_bear_desc:0 "Яки - горді та благородні істоти. Один з небагатьох видів, у яких ми знаходимо споріднені душі. І все ж... І все ж таки вони стоять на місці, розділяючись, коли єдність досягнута, стаючи на шлях, який їм не підходить! Така ганьба насправді... Здається, що саме на нас випадає виправити цю велику помилку братніх яків."

 PLB_brothers_in_spirit:0 "Брати по духу"
 PLB_brothers_in_spirit_desc:0 "Яки - наші брати по духу. Це ні для кого не секрет. Адже навіть наше завоювання їхніх володінь ґрунтується на братньому співчутті та бажанні допомогти великим бикам виправити їхні помилки. І багато хто, на жаль, не більшість, як розуміють, що і чому ми зробили, і готові стати з нами пліч-о-пліч."

 PLB_the_plentiful_territories_of_Yakistan:0 "Рясна земля яків"
 PLB_the_plentiful_territories_of_Yakistan_desc:0 "Тільки зараз усвідомлюється справжня трагедія яків. Бо вони не тільки були єдиними і численними, їхні землі виявилися багатшими на ресурси, ніж ми коли-небудь могли собі уявити. Справжній сором, що з усього цього не виросло велике ханство. Бо якби воно виникло, ми б присягнули на вірність тому, що, очевидно, було б найбільшою з імперій..."

 PLB_settle_bears_in_yakistan_mountain_range:0 "Спадщина старого Вольсунґра"
 PLB_settle_bears_in_yakistan_mountain_range_desc:0 "Давним-давно, ще до того, як Чейнджлінґи та грифони зменшили наші володіння, клан Вольсунґр став могутнім у горах яків, багато малих спільнот яків були під їхнім контролем. Багато їхніх старих фортець досі на місці. Заселивши ці фортеці ведмедями, ми зможемо повністю інтегрувати багато популяцій яків."

 PLB_the_property_food_chain:0 "Приборкати сокола"
 PLB_the_proper_food_chain_desc:0 "Нова Грифонія загордилася, вважаючи, що тільки тому, що вони розбили кілька племен і прикордонних кланів, вони тепер мають право на велич. Давайте упокоримо цих соколів і нагадаємо їм, що у них немає ні ідола Борея, ні меча Бротурія. Вони просто відсталі в благословенній Зимою землі, і Зима - наша!"

 PLB_the_griffon_council_of_research:0 "Уетерська рада технократів"
 PLB_the_griffon_council_of_research_desc:0 "Єдине, що викликало захоплення в старому ладі Нової Грифонії - це його вражаючі можливості в промисловості та дослідженнях. Технократи можуть бути жалюгідними і плаксивими слабаками, але, на жаль, вони нам потрібні. Ми пощадимо їх та їхні владні позиції, але лише доти, доки ми вважатимемо їхні дослідження корисними."

 PLB_council_of_griffon_interests:0 "Органи самоорганізації населення"
 PLB_council_of_griffon_interests_desc:0 "Грифони схожі на слабке золото, якому вони поклоняються. Але так само, як і золото, вони мають застосування. Бо вони вправні в ремеслі та охороні правопорядку, але при цьому зрадливі та пристосуванці. Тому, якщо ми запропонуємо деяким з них місцеву владу, вони проковтнуть її, звільнивши ведмедів від прокльонів адміністративних і гарнізонних обов'язків."

 PLB_settle_bears_in_our_old_lands:0 "Заселити наші старі землі"
 PLB_settle_bears_in_our_old_lands_desc:0 "Хроніки, які веде клан Свартпельс, стверджують, що Північна Нова Грифонія колись була володіннями королів-монстрів Йотнарів. На жаль, зараз тут залишилося мало ведмедів, але ми можемо виправити цю несправедливість. Навіть якщо недостатня кількість ведмедів змусить нас взяти за основу вессландську модель ведмежих лордів, воїнів та грифонів-кріпаків..."

 PLB_invade_pingus:0 "Під полярним сяйвом"
 PLB_invade_pingus_desc:0 "Пінгвіни, мабуть, найслабша раса з усіх, маленькі птахи, які не вміють ні літати, ні битися. Проте не секрет, що клани Анкер і Свартпельс відчувають велику емпатію до цих, за загальним визнанням, чарівних птахів. Тому наше завоювання їх мотивоване не гнівом чи помстою, а скоріше тим, що без нашого захисту вони неодмінно загинуть."

 PLB_expand_naval_clan_holdings:0 "Усіяти замерзлий берег новими фортецями"
 PLB_expand_naval_clan_holdings_desc:0 "Багато берегів у межах основних ведмежих земель непридатні для портів і верфей. Однак землі пінгвінів - це зовсім інший випадок. Ці нещодавно захоплені землі дають можливість значно розширити наше військово-морське виробництво і створити флот, якого ми ще ніколи не бачили. І ми скористаємося цією можливістю!"

 PLB_the_great_railway:0 "Велика залізниця"
 PLB_the_great_railway_desc:0 "Існував план, розроблений Механітами до того, як вони були заслані, як мерзотники, якими вони є, об'єднати Північ великою залізницею. Ми не хочемо втілювати їхню кошмарну мрію про перетворення всього на машини, але плани, які залишилися, зроблені досить добре, і було б марно не використати ті частини, які нам подобаються."

 PLB_the_anker_experiment:0 "Експеримент Анкеру"
 PLB_the_anker_experiment_desc:0 "Клан Анкер вже складається переважно з пінгвінів під доброзичливим правлінням ведмежих воїнів і старійшин. Досі ця система функціонувала досить добре. Отже, було б логічно інтегрувати землі пінгвінів у наші землі, використовуючи подібну систему. Сподіваюся, масштаб не стане проблемою..."

 PLB_this_is_our_last_war:0 "Це наша остання війна"
 PLB_this_is_our_last_war_desc:0 "Наше панування над Північю як Королів Зими майже забезпечене. Залишилися лише Чейнджлінґи, які оспорюють наше право на Ключ-озеро. Раніше ми були лише плямою в порівнянні з ними, але тепер ми дивимося на них як на велике царство. Одне можна сказати напевно: перемога чи поразка - це буде наша остання війна..."

 PLB_bears_finally_united:0 "Пліч-о-пліч, як один!"
 PLB_bears_finally_united_desc:0 "Ведмеже населення Соріфа досить різноманітне, воно складається з прикордонних дикунів, бродячих кочівників, безкланових холдів, які в давнину потрапили в пастку через поштовх чейнджлінґів на північ, і навіть багатьох недавніх вигнанців. Минув певний час, поки найбільш небезпечні елементи були вичищені, але тепер, вперше в історії, всі ведмеді об'єднані під одним прапором!"

 PLB_use_railways_for_control:0 "Залізниці - наші залізні пазурі"
 PLB_use_railways_for_control_desc:0 "Королева Кризаліс багато розбудувала земель Чейнджлінґів, як для ведення війни, так і для контролю менших вуликів зі своєї столиці. Багато залізниць, збудованих для цієї мети, пережили війну. І з ними в наших пазурах ми можемо посіяти жах на тих чейнджлінґів, які захочуть кинути виклик нашій волі!"

 PLB_war_of_vengeance_will_come:0 "Забрати наші лапи"
 PLB_war_of_vengeance_will_come_desc:0 "На нашу ненависть і розчарування, Чейнджлінґів занадто багато, вони занадто сконцентровані у своїх тісних вуликах, щоб контролювати їх належним чином, навіть коли ми використовуємо популяції пінгвінів і грифонів як арбітрів. Ми не можемо контролювати ці землі..."

 PLB_invite_the_harmonists_to_the_court:0 "Запросити гармоністів Вольсунґру до суду"
 PLB_invite_the_armonists_to_the_court_desc:0 "Навіть якщо ми вийшли з наших стосунків з кланом Вольсунґр як зверхники, зобов'язання між паном і підданим існують в обох напрямках. Тому, на знак поваги і показуючи, що ми дотримуємося наших обіцянок, ми запрошуємо старійшин Ейри і клану Вольсунґр до королівського двору."

 PLB_national_parks:0 "Створити національні парки"
 PLB_national_parks_desc:0 "Клан Вольсунґр дуже стурбований станом природи в нашому королівстві, побоюючись, що полювання та збирання врожаю зроблять землю безплідною, мертвою та потворною. Хоча для багатьох це здається дещо абсурдним, наш король бачив такі випадки у Грифонії. Отже, бажання Ейри буде виконано."

 PLB_equestrian_embassy:0 "Встановити зв'язки з Еквестрією"
 PLB_equestrian_embassy_desc:0 "Еквестрія - гегемон континенту. Їх вплив сягає навіть земель яків. Принцеса Ейра пропонує нам налагодити якісь стосунки з цим королівством. Бо, можливо, наші амбіції не найгармонійніші за своєю природою, а гарне перше враження може запобігти війнам, які ми не зможемо виграти."

 PLB_equestrian_trade:0 "Відкрити торгівлю з Еквестрією"
 PLB_equestrian_trade_desc:0 "Справивши гарне враження і налагодивши зв'язки, було б корисно зв'язати себе з Еквестрією через торгівлю. Адже це може не тільки допомогти з модернізацією наших володінь, але й досить міцні економічні зв'язки можуть слугувати стримуванню потенційних воєн. Ейра сподівається, що це призведе до поширення гармонії на Півночі, але будемо сподіватися, що цього не станеться..."

 PLB_marry_eira:0 "Королівський шлюб"
 PLB_marry_eira_desc:0 "Ейра з клану Вольсунґр досягла дечого несподіваного. Встановлення дружби і формування позитивного іміджу нашого королівства. Це може бути небезпечно, а може бути і корисно... Пов'язавши долі нашого короля і принцеси Ейри, ми можемо гарантувати, що вона не спробує захопити владу, а її імідж можна використати на нашу користь."

 PLB_invite_the_thunder_lords_to_the_court:0 "Запросити до двору Повелителів грому Свартпельса"
 PLB_invite_the_thunder_lords_to_court_desc:0 "Лорд Торбен з клану Свартпельс - добрий друг нашого короля, а клан Скюфлінґ і клан Свартпельс є союзниками і бойовими братами вже майже десять років. Було б абсурдно, якби ми не запросили їхніх старійшин до королівського двору!"

 PLB_remind_ourselves_of_lost_lands:0 "Нагадати собі про наші втрачені землі"
 PLB_remind_ourself_of_lost_lands_desc:0 "Клан Свартпельсів - не просто воїни, це клан істориків, які ведуть великі літописи, що описують історію ведмедів. На жаль, значна її частина присвячена втраті земель, чи то від природи, чи то від ворогів. І хоча читати такі тексти боляче, треба завжди пам'ятати історію, щоб не повторювати її."

 PLB_remind_ourselves_of_ancient_foes:0 "Нагадаймо собі про наших давніх ворогів"
 PLB_remind_ourself_of_ancient_foes_desc:0 "Багато ведмедів не знають довгої історії воєн проти грифонів та Чейнджлінґів. Однак клан Свартпельс знає. Їхні великі архіви містять незліченну кількість описів таких конфліктів. І, можливо, вони містять забуті способи зламати цих ворогів..."

 PLB_demand_the_old_frontier:0 "Вимагати старого кордону"
 PLB_demand_the_old_frontier_desc:0 "На відміну від грифонів, ми не визначаємо наші кордони найвіддаленішими місцями, де живе наш вид, бо дикі ведмежі племена досить поширені. Скоріше, наші кордони проходять по найвіддаленішим ведмежим лігвам. І так сталося, що багато таких старих лігв знаходиться на території, яка зараз називається Грифонячий Фронтир. І ми хочемо повернути цю землю!"

 PLB_create_a_new_frontier:0 "Створити новий кордон"
 PLB_create_a_new_frontier_desc:0 "Поки ідея потужного флоту та заморських володінь була мрією нашого короля, Торбен Свартпельський теж став прихильником таких амбіцій. Він стверджує, що, захопивши Гаукленд і здійснюючи звідти морські атаки на флотилії та порти грифонів, ми зможемо запобігти загрозі з боку королівств грифонів нашим основним землям."

 PLB_the_great_overtyrant:0 "Великий Овертирант"
 PLB_the_great_overtyrant_desc:0 "Ми перемогли. Кров'ю та залізом. Крізь лід і лють. Перемога, остаточна, тотальна перемога нарешті за нами! Відтепер ніхто не посміє поставити під сумнів міць і волю великого надтирана. Тепер може розпочатися перетворення нашої держави на сучасну державу..."

 PLB_our_cleansed_land:0 "Наша очищена земля"
 PLB_our_cleansed_land_desc:0 "...Або так могло здаватися... Бо почали надходити повідомлення... Тривожні повідомлення, в яких описується ситуація, що спіткала багато фортець, які ми очистили від ворогів... Можливо, ми перестаралися... перестаралися..."

 PLB_our_shattered_clans:0 "Наші розбиті клани"
 PLB_our_shattered_clans_desc:0 "...Наближаються ще більш тривожні новини... Бо в той час як бунтівні ідентичності та опозиція для будь-якої єдності на шляху до єдиного майбутнього зникли... Так само зникли всі найяскравіші уми більшості кланів і багато збірок праць... Здається, у багатьох наукових галузях нам доведеться починати все з нуля..."

 PLB_desolated_lands_of_svartpels:0 "Спустошені землі Свартпельсів"
 PLB_desolated_lands_of_svartpels_desc:0 "Великий клан Свартпельсів вважав, що нас або замінили Чейнджлінґи, або ми підпорядковані їм, і тому відмовився відступити навіть після того, як більшість їхніх старійшин і кращих воїнів загинули. Таким чином, їхні землі були очищені до унікального ступеня навіть серед пустки, яку ми створили."

 PLB_abandon_the_wastes:0 "Покинути пустки"
 PLB_abandon_the_wastes_desc:0 "У цих місцях немає нічого для нас. Занадто складно відновити, занадто складно захистити або навіть спостерігати за пересуванням ворога всередині. Тут немає майбутнього для наших ведмедів. Єдине, що нам залишається - це покинути цю пустку і переселити тих кількох ведмедів, які ще залишилися, в інші місця."

 PLB_use_former_svartpels_to_colonize_western_key_lake:0 "Використати залишки Свартпельса для колонізації Західного Ключ-озера"
 PLB_use_former_svartpels_to_colonize_western_key_lake_desc:0 "У міру того, як колони ведмедів рухаються з дедалі більш диких і непридатних для життя колишніх земель Свартпельса, з'явилася можливість, про яку ми не думали раніше. Наразі ми знаємо, як відвоювати східні береги Ключ-озера. Досить спокуслива ідея..."

 PLB_turn_the_east_into_a_fortress:0 "Перетворити схід на фортецю"
 PLB_turn_the_east_into_a_fortress_desc:0 "Ключ-озеро - наш щит від Чейнджлінґів, адже його магічні води перешкоджають прямому вторгненню, змушуючи чейнджлінґів тасуватися по дикій місцевості, для якої вони не пристосовані. І саме тут можна кувати зони ураження, бо наближається війна, і саме наше виживання вимагатиме, щоб один відповідав сотні."

 PLB_use_former_svartpels_to_strenghten_our_capital:0 "Перевезти мешканців Свартпельсів до нашої столиці"
 PLB_use_former_svartpels_to_strenghten_our_capital_desc:0 "Лише в межах нашої столиці можна накопичити такий потік втікачів. Не кажучи вже про те, що саме в межах наших найближчих і найбезпосередніших володінь ці ресурси можуть бути використані з найбільшою користю."

 PLB_the_iron_heart_of_matthair_ferrain:0 "Залізна столиця"
 PLB_the_iron_heart_of_matthair_ferrain_desc:0 "Зі збільшенням популяції ведмедів, не тільки у вигляді бійців, а й ремісників і навіть робітників, для нас відкрилися нові можливості. Тепер ми можемо збільшити кількість сталі, яку можемо вирвати з надр землі, без шкоди для нашої здатності виробляти спорядження."

 PLB_proposal_to_the_penguins:0 "Пропозиція для пінгвінів"
 PLB_proposal_to_the_penguins_desc:0 "З невеликою кількістю ресурсів і ведмедями, переміщеними з колишніх володінь Свартпельса, нам більше не потрібна сама земля. Утім, можливо, комусь вона потрібна. Зрештою, ми не чіпали популяції пінгвінів та їхні володіння, а отже, можливо, нам вдасться переконати Пінгленд викупити у нас землю..."

 PLB_eastern_key_lake_research_facility:0 "Дослідницький центр Східного Ключ-озера"
 PLB_eastern_key_lake_research_facility_desc:0 "Вулик Соріфа здіймається так високо, що його можна побачити навіть з-за найширшої частини Ключ-озера. Він нав'язується нам, нагадуючи про таємничі та зловісні науки Чейнджлінґів. З цими новими ресурсами давайте викуємо щось, що зможе піднятися назустріч тіні Соріфа..."

 PLB_reopen_crystal_mines:0 "Відкрити кришталеві копальні"
 PLB_reopen_crystal_mines_desc:0 "Коли східні береги Ключ-озера були очищені від союзників Чейнджлінґів, їхні трюми та активи були зруйновані, адже раніше нам не вистачало ресурсів для експлуатації шахт і кузень. Проте, за іронією долі, в часи найбільшої руїни ці ресурси стали доступними."

 PLB_begin_research_into_polar_magic:0 "Розпочати дослідження полярної магії"
 PLB_begin_research_into_polar_magic_desc:0 "З готовим обладнанням і постійним постачанням магічних кристалів можна розпочати дослідження раніше невикористаної магії наших полярних душ. Може здатися абсурдним починати покладатися на теоретичне озброєння нашої магії зараз, у цю найтемнішу годину. Але магія - це єдиний спосіб, за допомогою якого ми все ще можемо виграти прийдешні війни."

 PLB_weapons_which_bring_winter:0 "Зброя, що приносить зиму"
 PLB_weapons_which_bring_winter_desc:0 "Магічна зброя не є якимось великим проривом, бо це добре відома концепція. Але те, що нам вдалося не лише розробити власну конструкцію, але й створити таку, яку можна виготовити в нинішніх умовах, є справді чудовим фактом. Сподіваюся, це свідчення майбутніх проривів..."

 PLB_great_magical_computers:0 "Великі магічні полярні комп'ютери"
 PLB_great_magical_computers_desc:0 "Обчислювальна машина на основі кристалів здається надзвичайно складним обладнанням, проте це не так. Хоча вона трохи складніша за магічну зброю і не вбиває, на превеликий жаль багатьох майстрів, яким доручають її збирати, але надзвичайно корисна для подальшого прогресу."

 PLB_crystal_fortress_of_eastern_key_lake:0 "Кришталева фортеця науки"
 PLB_crystal_fortress_of_eastern_key_lake_desc:0 "Раніше над блакитними водами Ключового озера височіли лише темні вежі Соріфа. Тепер цей символ могутності Чейнджлінґів світу не самотній! На наших берегах озера височіє кришталева фортеця, готова кинути виклик науковій доблесті темних ливарників Соріфа магічною силою!"

 PLB_mechanites_in_eastern_key_lake:0 "Дати Механітам землю в Східному Ключ-озері"
 PLB_mechanites_in_eastern_key_lake_desc:0 "Механіти - майстри не лише технологічних, але й магічних і, можливо, навіть таємних наук, хоча їхні знання і не йдуть ні в яке порівняння з лакеями Золотого Володаря... Тому їхня допомога у створенні суперзброї тільки вітається!"

 PLB_mechanite_body_armour_research:0 "Дослідження механітів бронежилету "Грім""
 PLB_mechanite_body_armour_research_desc:0 "Хтось може сказати, що немає чого досліджувати, коли мова йде про громову броню. Зрештою, це просто металеві пластини, зшиті разом, щоб захистити ведмедя там, де шкура не зможе. Але навіщо на цьому зупинятися? М'язи, органи чуття та багато іншого теж можна замінити невтомним металом!"

 PLB_winter_is_coming_for_them:0 "Наближається зима для наших ворогів"
 PLB_winter_is_coming_for_them_desc:0 "Ми народжені зимою, наші душі - від полярного вітру, і наша плоть не відчуває пазурів холоду. Але це не так, коли мова йде про наших ворогів. Тому є сенс зробити так, щоб наша зброя вивергала міць самого нашого замерзлого царства, щоб вразити тих, хто прагне його захопити!"

 PLB_university_of_mattheir_fearrain:0 "Університет Магаря-Фяраня"
 PLB_university_of_mattheir_fearrain_desc:0 "Наша столиця, так зване "Останнє місто" - це єдине місце, безпека якого може бути гарантована. Таким чином, було б абсурдно інвестувати наші новознайдені ресурси кудись ще. Таким чином, немає кращого місця, ніж столиця, щоб звести новий інститут навчання та розвитку."

 PLB_expand_tungsten_mines:0 "Розширити вольфрамові шахти Скюфлінґу"
 PLB_expand_tungsten_mines_desc:0 "Здається, що багато вдосконалень, які наш університет прогнозує для нашого озброєння, можуть вимагати набагато більшої кількості ресурсів, ніж ми маємо зараз. Хоча деякі з цих цілей просто неможливо досягти, більш помірковані прогнози - це те, що можна організувати."

 PLB_matthair_fearrain_research_facility:0 "Розширити дослідницький центр Магаря-Фяраня"
 PLB_matthair_fearrain_research_facility_desc:0 "Єдиний варіант, що залишився - досягти перемоги за рахунок переважної вогневої потужності. Тому ми сконцентруємо наші дослідження та ресурси на вдосконалення нашої артилерії. Можливо, це не так привертає увагу, як деякі божевільні проекти, які ми могли б зробити, але це працює."

 PLB_weapons_which_spew_iron:0 "Зброя, що вивергає залізо"
 PLB_weapons_which_spew_iron_desc:0 "Навіть якщо розчавити ворога артилерією ефективніше, це не ведмежий шлях, бо це не жорстокість зблизька і не зіткнення ближнього бою! І навіть у цій жахливій ситуації ми не повинні забувати, що ми все-таки ведмеді! Тому піхотна зброя і зараз залишається важливою інвестицією."

 PLB_advanced_mechanical_research:0 "Впровадження єретичних моделей виробництва"
 PLB_advanced_mechanical_research_desc:0 "Раніше існувало багато досягнень, які вважалися непридатними і єретичними для ведмежого способу життя, оскільки ці методи вважалися занадто схожими на те, як виробництво здійснюється грифонами. Але вони, схоже, ефективні, і це все, що зараз має значення..."

 PLB_the_great_military_university_of_matthair_fearrain:0 "Академія для воїнів і воєначальників"
 PLB_the_great_military_university_of_matthair_fearrain_desc:0 "Ми не можемо дозволити собі відокремлювати наших воїнів і командирів від наших академіків і вчених, занадто мало нас залишилося для цього. Не кажучи вже про те, що багато хто з тих, хто вижив, демонструє унікальні перспективи, які можуть бути корисними для необхідних досліджень."

 PLB_mechanites_in_our_capital:0 "Поселити Механітів у нашій столиці"
 PLB_mechanites_in_our_capital_desc:0 "Механіти покинули свій клан, свої традиції, своїх богів. Раніше здавалося божевіллям підпускати їх до нашої столиці. Але тепер ми самі відмовилися від багатьох таких речей. Ми можемо не погоджуватися з багатьох питань, але виживання вимагає співпраці."

 PLB_mechanite_industrial_research:0 "Енергія з нічого"
 PLB_mechanite_industrial_research_desc:0 "Забезпечити енергією нашу сучасну зброю та промисловість нелегко, особливо з тими небагатьма ресурсами, до яких ми все ще маємо доступ. І знову ми змушені покладатися на технології, щоб компенсувати те, чого нам не вистачає. І в цьому випадку, будемо сподіватися, що механічних методів виробництва палива з... певних джерел буде достатньо."

 PLB_let_the_great_furnaces_burn:0 "Нехай горять великі печі!"
 PLB_let_the_great_furnaces_burn_desc:0 "Наші армії поповнюються кочівниками, нападниками, колишніми вигнанцями, напівдикими звірами... Усім цим уцілілим і монстрам потрібна зброя. І хтось повинен її надавати... І тому печі будуть горіти вдень і вночі, щоб забезпечити механізми для знищення наших ворогів!"

 PLB_wastes_or_not_they_are_ours:0 "Пустки - наші!"
 PLB_wastes_or_not_they_are_ours_desc:0 "Можливо, ми вбили наших братів по зброї, але ми не відмовимося від їхньої спадщини! Багато хто з тих, хто вижив, все ще блукає цими землями, багато руїн ще можна відремонтувати і відродити. Ходять чутки, що клан Анкер якимось чином вистояв і досі... Ні, ми не віддамо ці землі..."

 PLB_turn_it_into_a_fortress:0 "Відновити прикордонні укріплення Свартпельса"
 PLB_turn_it_into_a_fortress_desc:0 "Прикордонні фортеці Свартпельса і Анкерв майже не постраждали під час зачистки цих земель, бо смерть прийшла з Півдня, а не зі Сходу. Проте багато з них старі і впали під ударами стихії. Однак, коли є фундамент, можна будувати або відбудовувати. І саме це буде зроблено."

 PLB_the_aluminum_mines_of_cleansed_svartpels:0 "Відкрити завалені шахти"
 PLB_the_aluminium_mines_of_cleansed_svartpels_desc:0 "Тепер, коли ми впевнені, що ці пустки залишаться в нас, настав час зробити їх дійсно корисними. Видобувати сировину поки що найпростіше... А от прибирати трупи з шахт може бути клопітно..."

 PLB_reforge_the_piers_of_clan_anker:0 "Виходячи з туману..."
 PLB_reforge_the_piers_of_clan_anker_desc:0 "Вони виходять з туману, на великих кораблях і з військом напоготові... Вони дивляться на нас і запитують, чому ми повернулися?"

 PLB_end_the_fires_of_polar_islands:0 "Загасити нескінченні пожежі"
 PLB_end_the_fires_of_polar_islands_desc:0 "Ми не йшли на клан Анкер. Принаймні, ми не наказували нашим військам робити це. І все ж нафтові свердловини горять... Можливо, вони самі це зробили, щоб спочатку позбавити нас ресурсу. Вони не кажуть, але це те, що ми зараз змушені виправляти."

 PLB_svartpels_center_of_military_research:0 "Полярний центр військових досліджень"
 PLB_svartpels_center_of_military_research_desc:0 "Найбільші бойові традиції Свартпельсу пішли... Але є трактати, документи, кілька вцілілих... Якщо ми об'єднаємо це зі знаннями, з досвідом з-поза наших кордонів, вигнанців і монстрів, можливо, народиться щось нове, щоб відповідати старому..."

 PLB_to_spread_out:0 "Поширюватися"
 PLB_to_spread_out_desc:0 "Ведмеді не завжди були осілими. У далекому минулому ми кочували як кочівники, великими племенами. З запустінням наших земель і зменшенням нашої популяції здається, що у нас немає іншого виходу, окрім як повернутися до кочування серед наших величезних земель, якщо ми хочемо їх утримати. Але ми терпіли так довго, потерпимо ще трохи..."

 PLB_nomadic_roots:0 "Повернення до кочового коріння"
 PLB_nomadic_roots_desc:0 "Єретичні знання заховані в архівах нині мертвих свартпелів. Ці знання стверджують, що давним-давно, у часи до нашої ери, ведмеді були такими ж дикими і бездумними, як і чудовиська, що блукають на нашій землі. Ні обладунків, ні сокир, ні кланів.... Втрата нашого розуму, можливо, була б благословенням до цього моменту..."

 PLB_roaming_legions:0 "Марш сталі"
 PLB_roaming_legions_desc:0 "Навіть якщо ведмеді далекого минулого були лише кочовими звірами, навіть якщо ми перетворили наше королівство на попіл, навіть якщо кланів більше немає, навіть якщо, здається, нас чекає лише смерть... Ми не відмовимося від символу справжніх ведмедів. Навіть якщо нам доведеться блукати землею, щоб вистояти, ми зробимо це, закуті в сталь!"

 PLB_loot_the_land_to_live:0 "Грабуй землю, щоб жити"
 PLB_loot_the_land_to_live_desc:0 "Ми не можемо вижити як просто бродяча армія, не з технологіями, необхідними для сучасної державності та війни. Нам потрібен металобрухт, нам потрібні інструменти. Отже, ми повинні збирати все, що можемо, на занедбаних руїнах мертвих кланів. Поки що цього має вистачити..."

 PLB_cultivate_the_wastes:0 "Нехай пустки ростуть"
 PLB_cultivate_the_wastes_desc:0 "Ми не можемо відвоювати великі володіння нині мертвих кланів. Та й не маємо особливого бажання. Ті місця прокляті і населені привидами... Але залишилися невеликі володіння та фортеці. Вони будуть відвойовані, перетворені на притулки і невеликі кузні, щоб наші маршируючі орди могли відпочити і поповнити запаси боєприпасів."

 PLB_loot_the_land_to_kill:0 "Грабуй землю, щоб вбивати"
 PLB_loot_the_land_to_kill_desc:0 "Ми не можемо вистояти, маючи лише кігті замість зброї. Нам потрібні сокири, нам потрібна броня, нам потрібна зброя і боєприпаси! Ми розгромимо всі фортеці з привидами і вирвемо з них метал і кістки, які зможемо використати для боротьби. Цей світ не терпить слабкості, а ми не можемо виглядати слабкими!"

 PLB_joined_by_beasts:0 "Приєднані звірами з плоті"
 PLB_joined_by_beasts_desc:0 "Якоюсь хитрістю чи божественним благословенням щось фундаментально змінилося... Північ завжди була цариною конфліктів між звірами, а ми були лише одними з незліченних хижаків, що бродили по цій пустці... А тепер ці чудовиська марширують з нашими військовими оркестрами і ставляться до нас, як до рідних..."

 PLB_non_bear_specialists_and_assistance:0 "У супроводі звірів духу"
 PLB_non_bear_specialists_and_assistance_desc:0 "Злочинці, канібали та лицарі-вигнанці. Вони прагнуть втекти з Нової Грифонії на наші порожні землі. Раніше ми зневажали їх і полювали на них, якщо вони наважувалися перетнути кордон, але тепер... Нехай ці уламки приєднаються до наших загонів, якщо мої воїни цього бажають... Нехай вони потурають своїм кровожерливим бажанням..."

 PLB_the_eternal_emerges:0 "Він з'являється..."
 PLB_the_eternal_emerges_desc:0 "...Але чому тільки зараз?"

 PLB_questionable_forces:0 "Сили тіней"
 PLB_questionable_forces_desc:0 "Мабуть, не дивно, що безсмертний бастард мав власну армію. Яка, можливо, могла б зупинити божевілля, що змусило нас знищити власний дім... Тепер це вже не має значення. Його легіони приєднаються до постійно зростаючої орди, і нехай світ зануриться в темряву!"

 PLB_savage_forces:0 "Сили дикості"
 PLB_savage_forces_desc:0 "Я ж казав, що прийму їх усіх, чи не так? Божевільних, огидних, єретиків... Багато з них були занадто несповна розуму навіть для кланів Кришталевих берегів і войовничого клану Свартпельсів. Але зараз ми нічим не кращі за них. Нехай вони б'ються! І давайте разом потопимо світ у крові!"

 PLB_mechanite_raiders:0 "Сили машин"
 PLB_mechanite_raiders_desc:0 "Ми дозволили її виводку повернутися. Тартар, ми вітали її як королеву. Вона та її... клан, вже продемонстрували доблесть у дослідженнях та виробництві. Але вони - ведмеді, наділені забороненою силою! Їхній обов'язок не лише в кузнях, але й на полі бою! І нехай світ потоне в потоці заліза!"

 PLB_fed_by_blood:0 "Задовольнити їхню потребу"
 PLB_fed_by_blood_desc:0 "Мабуть, не дивно, що прокляття, яке Вічний наклав на своїх послідовників, поширюється по наших загонах. Але замість того, щоб слабшати, корупція робить наші сили сильнішими... Нехай їдять! Буде багато крові, коли ми пройдемо світом!"

 PLB_guns_for_nomads:0 "Підживити їхню міць"
 PLB_guns_for_nomads_desc:0 "Потік вигнанців і кочівників, що хлинув на наші території, є абсурдним за своїми розмірами. Важко повірити, що за межами нашого королівства існує так багато ведмедів. Не так важко, як озброїти всіх цих ренегатів, адже самі вони не здатні виробити нічого вартісного. Можливо, ми повинні взяти приклад з книги Вессланда.... Хоча озброювати ведмедів адаптованою зброєю грифонів? Може бути сприйнято як образа."

 PLB_mechanite_imports:0 "Фінансувати їхні амбіції"
 PLB_mechanite_imports_desc:0 "Залізний приплив Механітів потребує обладнання. Обладнання, яке сам культ не може виробляти в необхідній кількості. Це, м'яко кажучи, дратує і розчаровує. Але у нас є золото, і немає сенсу витрачати такий слабкий метал. Вони можуть купити стільки іграшок, скільки їм потрібно і хочеться."

 PLB_ever_outwards:0 "Мандрувати далі"
 PLB_ever_outwards_desc:0 "Ми сприйняли нашу ситуацію як прокляття, як крах нашої держави, як вимушену деволюцію. Але ми віднайшли справжню силу, яка криється у варварстві та дикості, і розширили наші ряди, як ніколи раніше. Але земля не може втримати. Нам потрібно більше. Ми можемо взяти більше! МИ ВІЗЬМЕМО БІЛЬШЕ!"

 PLB_remind_yaks_of_what_they_were:0 "Похмуре нагадування"
 PLB_remind_yaks_of_what_they_were_desc:0 "Яки відмовилися від своїх справжніх шляхів дикості та війни, забувши, що колись вони були ордами, які могли розтрощити світ! Вони прийняли слабкість південців у свої серця. Ні, так не піде. Їм потрібне нагадування про їхню справжню мету."

 PLB_fill_out_the_hordes:0 "Заповнити зростаючі орди"
 PLB_fill_out_the_hordes_desc:0 "На щастя, серед роду Як все ще є залишки, ті, хто пам'ятає або просто прагне відтворити минуле, прийняти дикість у своїй душі. Ці великі душі прагнуть приєднатися до наших армій. Обіймімо їх як брати і сестри! І, можливо, це буде першим кроком до спасіння для всіх!"

 PLB_to_smash_all:0 "НАВЧИТИ РОЗБИВАТИ ВСІХ"
 PLB_to_smash_all_desc:0 "Ми прийняли справжнє дикунство в наші душі, але, можливо, ми ще багато чому можемо навчитися. Бо ми ніколи не кочували такими великими ордами, що землі не було видно під припливом ревучих звірів. Яки ніколи не кочували в таких великих лавинах і дикості. Тож і в цьому випадку ми будемо вчитися у них!"

 PLB_horde_that_will_drown_all:0 "Приплив, що потопить світ"
 PLB_horde_that_will_drown_all_desc:0 "Тепер справжня орда Півночі об'єднана. Тепер наші сили численні, наповнені як ведмедями, так і великими биками і навіть іншими істотами. Навіть відновлена промисловість, відібрана у яків, знаходиться в наших руках. Настав час, щоб світ згадав, чому монстрів досі бояться!"

 PLB_push_the_borders_east:0 "Великий поштовх на захід"
 PLB_push_the_borders_east_desc:0 "Попри наш крах, попри довгий і важкий період змін. Весь цей час слабкості, Чейнджлінґи ніколи не намагалися кинути нам належний виклик протягом цього часу. А тепер вони віддалилися і зайняті якоюсь іншою загрозою. Вони припустилися великої помилки, і це стане їхньою загибеллю."

 PLB_as_savage_as_us:0 "Такі ж дикуни, як і ми!"
 PLB_as_savage_as_us_desc:0 "До всього цього ведмеді по той бік Ключ-озера вважалися нашими справжніми братами, але менш витонченими, занадто дикими і занадто варварськими навіть для породи, що славиться такими рисами. А тепер? Тепер ми такі ж дикуни, як і вони!"

 PLB_to_move_in:0 "Переїхати"
 PLB_to_move_in_desc:0 "Навіть до об'єднавчих воєн популяція білих ведмедів часто була занадто малочисельною, щоб належним чином утримувати кордони своїх кланів, не кажучи вже про стримування зовнішніх ворогів. А за нинішньої ситуації... Неможливо втримати все це. Ми повинні відступити, сконцентруватися, стати непорушною твердинею, яка зможе протистояти всім!"

 PLB_plunder_shattered_armouries:0 "Розграбувати покинуті арсенали"
 PLB_plunder_shattered_armouries_desc:0 "Більшість зачисток проводились якнайшвидше, часто безладно, а залишки фортець та фортечних укріплень часто залишались покинутими на поталу стихії, а здобич - недоторканою. Можливо, варто було б повернутися в ці прокляті місця і подивитися, що там можна знайти?"

 PLB_roads_of_ice_and_iron:0 "Дороги з льоду та заліза"
 PLB_roads_of_ice_and_iron_desc:0 "Навіть останнє місто та його околиці не готові до небезпек, які чекають попереду. Будь-який ворог, з яким ми будемо боротися, буде переважати нас чисельно. Тому нам доведеться відповідати мобільністю, адже тільки маючи можливість підкріпитися в будь-якому місці навколо останнього міста, ми зможемо витримати нескінченні ворожі полчища."

 PLB_new_towns_and_caves:0 "Будувати нові міста та копати нові печери"
 PLB_new_towns_and_caves_desc:0 "Зі своїм зростанням столичний регіон, можливо, зможе витримати решту ведмедів на наших землях, однак він точно не зможе вмістити їх усіх. Потрібно підготуватися, щоб усі ведмеді вижили в останньому місті."

 PLB_move_remnants_of_industry_to_Matthair_fearain:0 "Перевезти залишки верстатів до столиці"
 PLB_move_remnants_of_industry_to_Matthair_fearain_desc:0 "Сучасні суспільства тримаються на виробництві, науці, дослідженнях та технологіях. Навіть якщо і наші мрії, і наша реальність зруйновані, ми прагнемо вистояти. А отже, каркас старого має бути перероблений на те, що зможе нас підтримати наново."

 PLB_pillage_what_remains_of_factorums:0 "Пограбувати заводи за креслення та інструменти"
 PLB_pillage_what_remains_of_factorums_desc:0 "Існувала велика різниця між тим, яку зброю виробляв той чи інший клан, і які технології були доступні кожному. Навіть після об'єднання багато чого залишилося захованим у сховищах. Що ж, тепер немає нікого, хто міг би завадити нам їх отримати!"

 PLB_dot_capital_state_with_new_fortresses:0 "Побудувати нові фортеці навколо столиці"
 PLB_dot_capital_state_with_new_fortresses_desc:0 "Як наш останній бастіон в умовах, що постійно погіршуються, столиця ніколи не повинна стати місцем битви, вона ніколи не повинна зазнати удару ворога! Тому серце, що б'ється, нашого трупа країни має бути захищене кільцями укріплень!"
 PLB_move_population_from_Yak_mountains:0 "Переселити населення з гір"
 PLB_move_population_from_Yak_mountains_desc:0 "Навіть коли їхній клан зник, перетворившись на попіл, багато ведмедів колишнього Вольсунґру все ще блукають горами. Ми розгромили їхні армії та старійшин, і тому вони мусять нас слухати. Таким чином, вони прийдуть, щоб заселити останнє місто."

 PLB_move_population_from_weslandia:0 "Переселити населення з тундри"
 PLB_move_population_from_weslandia_desc:0 "Вессландці все ще численні, все ще кишать числом, навіть коли їхні клани були розгромлені, а загони грифонів винищені. Але це добре, для нашої сили, якщо жорстокість заслужила їхню лояльність, і тепер вони заповнять поки що порожнє останнє місто."

 PLB_move_population_from_Onlatir:0 "Перемістити населення з тайги"
 PLB_move_population_from_Onlatir_desc:0 "Небагато ведмедів населяло невблаганні землі Онлатіру, ще менше витримало нашу жорстокість. Клани воїнів, звісно, майже зникли, але вигнанці, безкланові, огидні все ще виживають. Раніше ми б не покладалися на таких звірів, але тепер вибору не залишилося."

 PLB_the_iron_city:0 "Залізне місто"
 PLB_the_iron_city_desc:0 "Усе готово: місто вивергає чорний дим, майстерні вивергають спорядження для наших армій, міста, трюми і навіть печери навколо столиці тепер заселені ведмедями. Ми викували Залізне місто, останній край цивілізації на землі, проклятій як природою, так і нами, і воно вистоїть!"

 PLB_Overtyrants_army:0 "Армія капітана"
 PLB_Overtyrants_army_desc:0 "Місто, самотнє єдине місто, не може вижити в цьому світі, що охоплює нації-хижаки. Для того, щоб вистояти в такому світі, потрібна армія. Армія, не схожа на жодну іншу! Та, що буде вірна до останнього міста і свого капітана до самої смерті!"

 PLB_the_overtyrant_dreams:0 "Мрія капітана"
 PLB_the_overtyrant_dreams_desc:0 "Перед поверненням Уеллінгтон мав велику мрію про об'єднану Північ. Іноді він мріяв про королівство, іноді про республіку, але завжди про велику і процвітаючу країну. Але він поховав її, коли божевілля охопило землі зими, і він був змушений вбити своїх. Але, можливо, те, що мертве, ніколи не помре, а лише воскресне сильнішим..."

 PLB_the_weakness_of_others:0 "Використовувати слабкість інших"
 PLB_the_weakness_of_others_desc:0 "Ми загартувалися. Проте незліченна кількість інших дозволяє собі бути слабкими, марнотратними. Хоча ми не можемо протистояти жодній з цих сфер, поки вони повністю підготовлені, більшість з них не готові. І навіть якщо вони готові, то надмірно зосереджуються на окремих ворогах. Це дає можливість..."

 PLB_barbarity_of_frontier:0 "Варварство прикордоння"
 PLB_barbarity_of_frontier_desc:0 "Фронтир - дика земля і жахлива, наповнена дикими звірами, ведмедями і яками, які майже піддалися своїй дикості, і навіть грифонами, які вдалися до канібалізму та інших речей, які цивілізовані істоти сприймають як злі. Ці істоти втратили будь-яку вірність та ідеали. А отже, можуть бути підкорені волею сильного Овертайранта!"

 PLB_brotherhood_with_penguins:0 "Пожаліти пінгвінів"
 PLB_brotherhood_with_penguins_desc:0 "Пінгвіни - створіння Півночі. І хоча, можливо, їхнє становище і сприйняття світу значно відрізняється від нашого, ми все одно поважаємо їхній застиглий дух. Ми повинні дозволити їм жити так, як вони хочуть, і поважати їх як рівних."

 PLB_to_forge_a_spear_from_shards:0 "Викувати сокиру з уламків"
 PLB_to_forge_a_spear_from_shards_desc:0 "Обладунок лежить зруйнований, розбитий вщент братньою війною. Сокира лежить розтрощена, її леза не витримують навантаження. Навіть кігті затупилися. Але якщо ведмідь хоче вижити, зброя повинна бути наточена, обладунки перековані, а кігті відрощені."

 PLB_the_handle:0 "Руків'я"
 PLB_the_handle_desc:0 "Як зброя без руків'я не може бути використана без шкоди для власника, так і армія, яка є лише силою удару, повільно руйнує себе через брак обладнання та ресурсів. Такого становища не можна допустити!"

 PLB_the_speartip:0 "Наконечник списа"
 PLB_the_speartip_desc:0 "Спис без вістря, сокира без держака, меч без леза - все це безглузда зброя. Але навіть іржава або зламана зброя може вражати і вбивати! Такою є наша армія. Ми не маємо зброї для всіх наших сил. Але навіть з простою сокирою чи навіть списом ведмідь може вбити справжнього солдата будь-якого іншого царства!"

 PLB_the_binding_that_melds_it:0 "Зв'язка, що його скріплює"
 PLB_the_binding_that_melds_it_desc:0 "Зброя та обладунки марні, якщо не знати, як ними правильно користуватися. Наш рід не славиться жодною технікою, але ми володіємо мистецтвом і вмінням боротися зі звірами, які навіть сильніші за нас. І зараз ми повинні діяти і боротися так, ніби наш народ - це горностай, який готується до бою з драконом."

 PLB_the_claws_that_hold_it:0 "Пазурі, що його тримають"
 PLB_the_claws_that_hold_it_desc:0 "Сокира - ніщо без воїна, який нею користується. Обладунки - ніщо без плоті під ними. Нам потрібно більше воїнів, завжди потрібно більше. І, на щастя, навіть у нашій ситуації є достатньо безкланових немовлят, яких можна підняти на ноги..."

 PLB_the_strenght_that_pushes_it:0 "Сила, що штовхає його"
 PLB_the_strenght_that_pushes_it_desc:0 "Зброя нічого не варта, якщо не вистачає сили, щоб нею скористатися і занурити її в плоть ворога. Ми змарнували нашу стару силу, але ми можемо викувати нову, щоб шматувати і шматувати наших ворогів, поки це не буде зроблено."

 PLB_the_weapon_is_completed:0 "Зброю завершено"
 PLB_the_weapon_is_completed_desc:0 "Зброя, яку ми викували, не є красивою. Вона не є витвором великого ремесла, і навіть не призначена для воїнів, що пройшли випробування і стали справжніми воїнами. Але вона може вбивати і буде вбивати. І це все, що дійсно має значення."

 PLB_complete_the_arsenal:0 "Доповнити арсенал"
 PLB_complete_the_arsenal_desc:0 "Для справжнього воїна недостатньо просто зброї. Потрібен цілий арсенал, щоб екіпірувати того, хто народжений і вихований для війни. Настав час такий арсенал збудувати."

 PLB_the_great_armour:0 "Велика броня"
 PLB_the_great_armour_desc:0 "Справжній воїн-ведмідь - ніщо без своїх обладунків. Навіть у роки, коли лише еліта могла носити костюми з громової пластини, і навіть у ці найтемніші дні це твердження є правдивим. Бо історично наші обладунки були змайстровані з награбованого. І тепер ми знову будемо кувати нові обладунки у такий спосіб!"

 PLB_and_every_muscle_that_moves_it:0 "І кожен м'яз, що його рухає"
 PLB_and_every_muscle_that_moves_it_desc:0 "Лише завдяки божественній силі, дарованій ведмедям, можна користуватися громовими обладунками, бо будь-який інший звір буде роздавлений ними. А нині усім буде надано привілей кувати власні обладунки, навіть якщо це означає, що збір загонів займе більше часу, оскільки ведмеді грабують спорядження."

 PLB_the_armoured_claw_that_pierces_ice:0 "Броньований кіготь, що пробиває лід"
 PLB_the_armoured_claw_that_pierces_ice_desc:0 "Якщо зброя не може розірвати ворога навпіл або розтрощити його кістки, то ведмідь завжди може покластися на свої кігті, щоб закінчити роботу. Таким чином, навіть, якщо зброя, якою є наша армія, зазнає поразки, сподіваємось, що кіготь, яким є флот, розчавить їх з несподіваного боку!"

 PLB_and_the_starsteel_blades_that_cut_through_ice:0 "І леза із зоряної сталі, що розтинають лід"
 PLB_and_the_starsteel_blades_that_cut_through_ice_desc:0 "Була традиція раніше, коли небесної зоряної сталі було вдосталь, кувати металеві цвяхи, щоб використовувати їх як вторинну зброю - часто леза, надягнуті на кігті. Нехай мертві флотилії мертвих кланів, підняті з глибин, стануть нашими зоряними кинджалами!"

 PLB_and_the_mind_that_guides_it:0 "І розум, що керує всім цим"
 PLB_and_the_mind_that_guides_it_desc:0 "Саме розумом ведмедя зброя, кігті та обладунки об'єднані в єдине знаряддя знищення! Це робить розум самостійною зброєю, яку слід використовувати, щоб розтрощити ворога!"

 PLB_the_few_loyal_and_living_advisers_that_remain:0 "Нечисленні вірні та живі, що вистоять"
 PLB_the_few_loyal_and_living_advisers_that_remain_desc:0 "Серед живих мало тих, хто залишається вірним і має таланти, які нам потрібні. Але тепер ніхто не заважає нам наймати тих, кого раніше ігнорували через їхнє найманське чи емігрантське минуле. Крім того, є люди з досить... унікальними ідеями, чия допомога може бути варта того, щоб терпіти їхнє божевілля."

 PLB_two_military_reformers_that_are_still_kicking:0 "Два військові реформатори, які все ще б'ються"
 PLB_two_military_reformers_that_are_still_kicking_desc:0 "Були реформатори і до повернення Йоріса, які намагалися викувати щось грандіозне. Але вони не були надто радикальними і не дуже хотіли боротися за свої ідеали. Тому вони вижили, дожили до сьогоднішнього дня і готові служити."

 PLB_an_industrialist_roaming_around:0 "Промисловець, що блукає навколо"
 PLB_an_industrialist_roaming_around_desc:0 "Ейндріда була вигнанкою з забутих причин. Вона мандрувала з компаніями найманців через Грифонію. Хоч як дивно, але замість війни, політики чи культури, Ейндрінда захопилася економікою, особливо сільськими господарствами. Корисні знання в нашому теперішньому становищі."

 PLB_the_mechanites_and_their_queen:0 "Механіти та їхня королева"
 PLB_the_mechanites_and_their_queen_desc:0 "Культ механітів - це божевільні ведмеді та мерзотники, які вірять, що урсини повинні вийти за межі того, що вони вважають в'язницями нашої плоті, і стати істотами механічними. Вони напівбожевільні, але напівгеніальні і поки що готові приєднатися до нас..."

 PLB_fruits_of_their_labour:0 "Плоди їхньої праці"
 PLB_fruits_of_their_labour_desc:0 "Уроки війни, уроки зовнішньої економіки, урок езотеричних технологій. Усі вони були об'єднані волею Наставника і дали результат!"

 PLB_our_great_push:0 "Наш великий порив"
 PLB_our_great_push_desc:0 "Усупереч усьому, всупереч розуму, всупереч будь-яким реальним чи уявним обмеженням. Наша науково-технічна міць мчить вперед! З волі Наглядача і з волі механізаторів ми досягаємо рівнів, які були до нашого краху, і шліфуємо навіть далі!"

 PLB_the_gold_and_pink_flag_over_north:0 "Підняти рожевий прапор над Північю"
 PLB_the_gold_and_pink_flag_over_north_desc:0 "Рожевий прапор, наш символ злагоди, єдності, майорить зараз над усіма кланами, теремами і фортецями білих ведмедів. І хоча ми досягли того, до чого прагнули - об'єднати всіх під рожевим прапором, безперечно, що наш досвід сформував наші переконання та принципи..."

 PLB_maybe_the_ponies_are_too_utopian:0 "Можливо, поні занадто утопічні..."
 PLB_maybe_the_ponies_are_too_utopian_desc:0 "Поні могли об'єднатися під прапором відносного миру, але нам довелося вдатися до сили, щоб привести клани під наш прапор гармонії. Це був просто шлях ведмедів, і він завжди буде принципово відрізнятися від поні. Тому ми повинні створити свій власний шлях, свою власну Гармонію на Півночі."

 PLB_the_queen_of_polar_bears:0 "Коронувати першу королеву"
 PLB_the_queen_of_polar_bears_desc:0 "Ейра носить титул принцеси вже давно, відколи повернулася з вигнання в Екестрії. Але в останньому пункті і є проблема. Титул занадто як у поні, занадто еквестрійський за походженням. Це не те, що прийняв би справжній монарх ведмідь, ні. Вона має бути чимось більшим за це, королевою білих ведмедів."

 PLB_scyfling_initiative:0 "Ініціатива Скюфлінґу"
 PLB_scyfling_initiative_desc:0 "У клані Скюфлінґ, колишніх володіннях Деспота, ще залишилося багато талановитих ведмедів з часів Другої війни за об'єднання, в тому числі й сам По Уеллінгтон, який, схоже, став релігійним священиком для свого клану. Їхнє місце радників королеви було б бажаним, що дозволило б голосу Скюфлінґа також бути почутим при дворі."

 PLB_rethinking_outcast_problem:0 "Інший підхід"
 PLB_rethinking_outcast_problemm_desc:0 "Ніхто не може заперечити, що спосіб, яким По Уеллінгтон дозволив вигнанцям повернутися в країну, був неправильним. Це дестабілізувало клани, було зроблено без попереднього інформування жодного з них і, зрештою, призвело до того, що шальки терезів перехилилися на бік повстання. Але вигнанці також мають свою користь, зрештою, сама королева колись була однією з них. Це питання має бути вирішене, і щось має бути вирішено найближчим часом."

 PLB_start_taking_in_outcasts_again:0 "Установити правильну політику щодо вигнанців"
 PLB_start_taking_in_outcasts_again_desc:0 "З По Уеллінгтоном і кланом Скюфлінґ, які очолили пропозицію, тепер встановлена офіційна політика щодо вигнанців, які бажають повернутися на замерзлу Північ. Їм буде дозволено в'їзд, якщо вони доведуть свою спроможність, пройшовши офіційний тест на знання ведмежих традицій та ідеологічних переконань. Це дозволить нам отримати доступ до їхніх знань без дестабілізації ситуації в країні."

 PLB_approach_our_faith:0 "Найсвятіше з питань"
 PLB_approach_our_faith_desc:0 "Падіння Скюфлінґу з лідерства викликало багато сумнівів у клані щодо недоліків їхньої релігії, похитнувши їхню віру в ту саму інституцію, яку вони колись вважали центральною для своєї справи. З'явилися дві пропозиції, одна з яких пропонувала заснувати нову організацію на основі ідеалів поні, а інша - черпати натхнення у грифонів."

 PLB_inspirations_from_ponies:0 "Просвітлення дружби"
 PLB_inspirations_from_ponies_desc:0 "Дружба і гармонія - це не ті речі, про які зазвичай думають ведмеді, але успіх Еквестрії довів, що ці ідеали не зовсім безпідставні. Можливо, нам теж варто їх прийняти, для наших власних цілей. Якщо придивитися, то можна знайти дивовижну схожість між відмінностями наших переконань..."

 PLB_shaman_healers:0 "Шамани-цілителі"
 PLB_shaman_healers_desc:0 "Сучасні війни дуже відрізняються від минулих, тепер вони базуються на співпраці та дружбі, а не на особистій доблесті для перемоги над ворогом. Отже, тепер і ми адаптуємось. Один із способів використати цю ідею на нашу користь - зробити наших старих шаманів медиками і цілителями в нашій армії, щоб врятувати їх, щоб вони могли знову воювати наступного дня."

 PLB_scholar_monks:0 "Учені Великого Ворона"
 PLB_scholar_monks_desc:0 "Поні мають великих мислителів, дослідників магічної теорії та практиків як заклинань, так і зброї. Наша магія, можливо, не така, як у єдинорогів, але в нас все ще є крижаний лід ведмедя. Наші власні ченці Великого Ворона вивчатимуть і поповнюватимуть наші знання про таку магію, поряд з повільно розширюваним полем стандартної магічної зброї."

 PLB_syncretic_faith:0 "Філософська віра"
 PLB_syncretic_faith_desc:0 "Віра поні і наша віра нарешті злилися в одне ціле, віра, заснована на філософії і відданості, що йдуть пліч-о-пліч. Дружба і війна - це дві сторони однієї медалі, і вірування, які ми сповідуємо зараз, відображають це. Наша віра - це синкретична віра, яка бере найкращі аспекти з кожної сторони і стає сильнішою завдяки цьому."

 PLB_inspirations_from_griffons:0 "Натхнення від трьох храмів"
 PLB_inspirations_from_griffons_desc:0 "Три божества - Борей, Ейр та Арктурій - є центральними у вірі грифонів, але саме останнє найбільше підходить нам, урсинам. Наша система повинна бути військовою, з війною, пристосованою до війни, щоб нас більше ніколи не застали зненацька."

 PLB_polar_bear_paladins:0 "Легіони Великого Вовка"
 PLB_polar_bear_paladins_desc:0 "У Імперії Грифонії є Лицарі Арктурія, група, присвячена війні та служінню своїй нації. Нашими будуть Легіони Великого Вовка, схожі на елітних ведмедів, мобільні війська, готові надихнути і повести за собою в бій, якщо це необхідно. Вони будуть нашими святими паладинами, нашими тамплієрами бойового духу."

 PLB_polar_bear_priest_smiths:0 "Жреці кузні"
 PLB_polar_bear_priest_smiths_desc:0 "Що користі від благословенного воїна без благословенної зброї? Обидва повинні діяти як одне ціле, якщо ми хочемо перемогти будь-якого ворога, і наші гармати та артилерія не можуть бути зроблені з будь-якої сталі. Наші священики відтепер допомагатимуть працювати в кузнях, гарантуючи, що з моменту їх створення те, що ми використовуємо для ведення наших воєн, буде наділене тією ж святістю, якою володіємо ми самі."

 PLB_holy_legions:0 "Церква воїнів"
 PLB_holy_legions_desc:0 "Війна. Вона визначає нас, вона випробовує нас, вона є невід'ємною частиною нас самих. Той, хто не готовий до неї, приречений на загибель, а той, хто стоїть єдиним цілим, неминуче переможе всіх. І саме такими ми стали, бо сама наша віра втілює в собі саму суть війни. Ми - святі легіони, і ми йдемо зараз і назавжди за себе, за свій народ і за Бога!"

 PLB_svartpels_initiative:0 "Ініціатива "Свартпельс""
 PLB_svartpels_initiative_desc:0 "Оговтавшись від шоку від того, що ми з усіх кланів захопили панування в королівстві, клан Свартпельс нарешті оговтався і відправив до двору королеви як самого Торбена, так і своїх найталановитіших ведмедів. Багато з того, у що вони раніше вірили, здається, похитнулося під впливом останніх подій, але представництво їхнього клану і допомога їхніх найкращих і найяскравіших піде тільки на користь нації."

 PLB_rethinking_the_position_of_other_races:0 "Переосмислення наших позицій"
 PLB_rethinking_the_position_of_other_races_desc:0 "Скільки себе пам'ятає кожен ведмідь, клан Свартпельс завжди заперечував ідею, що будь-яке створіння, окрім урси, може бути гідним місця серед них, оскільки їм не вистачало для цього сили. Однак нищівна поразка, якої вони зазнали, змусила їх переглянути цю давню позицію. Багато не-ведмедів слабкі, так, але серед них мають бути ті, хто володіє справжньою силою..."

 PLB_nobility_of_the_avian_spirit:0 "Пташині брати по духу"
 PLB_nobility_of_the_avian_spirit_desc:0 "Деякі грифони у Вессландії, совині ведмеді, вже довели, що володіють силою і духом білого ведмедя, перемігши його в єдиноборстві. Відтепер це буде новою політикою всієї землі. Будь-який грифон, який зможе це зробити, буде прийнятий як брат і як один з нас, щоб зайняти місце справжнього воїна."

 PLB_steel_or_spirit:0 "Сталь або дух"
 PLB_steel_or_spirit_desc:0 "Зазнавши поразки від Вольсунґрів усіх кланів, Торбен і клан Свартпельсів прийшли до остаточного усвідомлення того, що технології остаточно випередили природну силу ведмедя і стали причиною їхньої поразки. І хоча вони бачать необхідність прийняти цю сучасність для себе, в якій саме формі - ще належить вирішити. Що важливіше - сталь зброї чи дух зсередини?"

 PLB_focus_on_steel:0 "Залізо всередині заліза без заліза"
 PLB_focus_on_steel_desc:0 "Зброя є лише продовженням ведмедя, якщо її правильно використовувати. А з новими знаряддями та інструментами епохи нам знадобиться багато, щоб вижити і процвітати на війні. Настав час кузням знову піднятися, заради нової мети - мети сталі та смерті!"

 PLB_hammers_over_claws:0 "Леза над кігтями"
 PLB_hammers_over_claws_desc:0 "Зброя завжди була сильнішою за кігті. Навіть за часів сокир та обладунків це залишалося вірним. І хоча саме лезо може застарівати, принцип залишається незмінним. Нам потрібна зброя, щоб воювати, і тому вона буде зроблена для нас, в тій кількості, якої ми потребуємо."

 PLB_flames_of_forges_not_souls:0 "Підняти Великі Печі"
 PLB_flames_of_forges_not_souls_desc:0 "Кузні Свартпельса вже багато років не використовуються, вважаючись марними відтоді, як По Уеллінгтон привіз свої гармати з Грифонії. Але так само, як крижане полум'я в наших душах горить вічно, так само і кузні, якими ми користуємося. Настав час використати їх знову, розпалити вогонь так, щоб ніщо не могло зрівнятися з нашою воєнною промисловістю!"

 PLB_reforged_in_steel:0 "Перекований у сталь"
 PLB_reforged_in_steel_desc:0 "Клан Свартпельс зазнав певних змін, точніше переродження. Традиції залишилися, але тепер ми йдемо з новою метою, і з новими інструментами для знищення наших ворогів. Ми відродилися в сталі, і настав час дати противникам урсинів відчути її холодний смак!"

 PLB_focus_on_spirit:0 "Поза межами смертної котушки"
 PLB_focus_on_spirit_desc:0 "З сучасною епохою приходять можливості. У нас з'явився шанс вийти за межі смертного, досягти сили, якої не бачили наші далекі предки незліченну кількість століть тому. Наше тіло, наш дух дадуть нам невимовну силу, а наша слабкість незабаром стане лише легендою."

 PLB_rip_and_tear_until_its_done:0 "Кров наших предків"
 PLB_rip_and_tear_until_its_done_desc:0 "Наші предки були більшими, сильнішими, кращими в усіх відношеннях, ніж ми, згідно з нашою історією. Але їхня кров все ще тече в наших жилах, а це означає, що вона ще не зникла. За допомогою ліків та інших подібних сучасних методів ми можемо вдосконалити власні тіла, щоб знову змагатися з древніми."

 PLB_blizzard_inside_our_souls:0 "Завірюха в наших душах"
 PLB_blizzard_inside_our_souls_desc:0 "Легенди стверджували, що колись урсини мали здатність контролювати магію, нехай навіть у невеликій кількості. Ця здатність була втрачена задовго до того, як почали формуватися записані нації, але тепер ми можемо її відновити. Технологія посилення магії, пристосована до нашого виду, принесла лише найменші плоди, але все ж таки вони є. Хуртовини все ще дмуть всередині, і це лише питання часу, коли ми зможемо їх використати."

 PLB_polar_bear_spirit:0 "Полярний дух"
 PLB_polar_bear_spirit_desc:0 "Ми - білі ведмеді! У нас є спадщина, у нас є наші традиції, а найголовніше - духи тих далеких часів, які все ще наглядають за нами і б'ються пліч-о-пліч з нами в битвах. Полярний Дух надихає нас, він робить нас сильнішими, ніж будь-коли раніше, і тепер, коли у нас є сила ведмедів минулого, ми ніколи більше не впадемо!"

 PLB_begin_harmonic_centralizations:0 "Розпочати гармонійну централізацію"
 PLB_begin_harmonic_centralizations_desc:0 "Наразі клани надто децентралізовані, щоб мати ефективне правління. Ситуацію необхідно негайно виправити і докласти масштабних зусиль, щоб повернути владу в лапи лідерів, яким ми довіряємо. Тільки тоді ми зможемо розпочати справжню роботу."

 PLB_begin_expansion_of_harmonic_institutions:0 "Розширити попередні інституції"
 PLB_begin_expansion_of_harmonic_institutions_desc:0 "За часів невмілого керівництва По Уеллінгтона клан Вольсунґр зміг впровадити багато гармонійних інституцій, які виявилися ефективними для здобуття Гармонії. Розширення цих інститутів на всі клани призведе до виснаження наших ресурсів, але також буде необхідним для досягнення наших більш важливих цілей."

 PLB_care_for_our_citizens:0 "Кожен на наших землях"
 PLB_care_for_our_citizens_desc:0 "Протягом тривалого часу велика частина ведмежого суспільства просто нехтувала або навіть виявляла активну зневагу до інших істот, які живуть тут, до слабких і непарнокопитних, таких як грифони. Але реальність така, що наш обов'язок - піклуватися про всіх на наших землях, а не лише про обраних. Ми повинні обійняти всіх, хто тут живе, і піклуватися про них."

 PLB_distribute_metals_to_weaker_bears:0 "Роздавати метали слабшим ведмедям"
 PLB_distribute_metals_to_weaker_bears_desc:0 "Нам потрібна зброя та обладунки. Але нам також потрібні воїни, і найсильніші повинні бути готові воювати, а не працювати на заводах і кузнях. Тож натомість ми віддамо завдання і наш метал слабшим серед нас, які зможуть виготовити нам необхідні інструменти для війни. Можливо, ми навіть знайдемо серед них воїнів."

 PLB_better_conditions_for_non_bears:0 "Належні права для чужинців"
 PLB_better_conditions_for_non_bears_desc:0 "Права тих, хто не належить до нашого виду на півночі, ніколи не були кодифіковані або традиціоналізовані, що ставило деяких, особливо грифонів Вессландії, у жахливі умови. Так більше не повинно бути. Можливо, вони не рівні нам, але вони заслуговують принаймні на базові права, які повинні мати всі істоти."

 PLB_care_for_our_nature:0 "Наш прекрасний дім"
 PLB_care_for_our_nature_desc:0 "Земля, на якій ми живемо, є єдиною в своєму роді, з тваринами і рослинами, які не зустрічаються більше ніде в світі. Ми повинні дбати про неї, захищати її, бути з нею одним цілим і знаходити способи не завдавати їй шкоди, оскільки це правильний і моральний шлях вперед. Це наш прекрасний дім, і ми повинні працювати, щоб зберегти його таким."

 PLB_new_ways_of_building_and_living:0 "Нові способи життя"
 PLB_new_ways_of_building_and_living_desc:0 "На природу надто легко зазіхають фортеці та кланові будівлі, незалежно від того, чи це навмисно, чи ні, через розширення клану та його населення. Це потрібно змінювати, і нам потрібно знайти нові способи, щоб найкраще використовувати простір, який ми вже маємо. Використання нових способів мислення і будівництва може бути складнішим, але збережена природа важливіша."

 PLB_in_touch_with_our_nature:0 "У контакті з природою"
 PLB_in_touch_with_our_nature_desc:0 "У кожному з нас завжди є дика сторона, частина нас, яка підкоряється лише первісним інстинктам, закладеним у нашій расі. І бути в контакті з цією стороною не обов'язково погано. Це навіть можна описати як справжнє "я", природний стан, що проявляється. І коли ведмідь вивільняє свою внутрішню лють, свою схильність до боротьби... будь-який ворог повинен остерігатися."

 PLB_care_about_our_future:0 "Дні попереду"
 PLB_care_about_our_future_desc:0 "Жоден справжній ведмідь не скаже, що минуле не важливе, або що традиції слід ігнорувати. Але те, що сталося, не так важливо, як те, що станеться в майбутньому. Наше майбутнє навряд чи вдасться вберегти лише за допомогою миру, тому ми повинні підготуватися до збереження створеного нами царства."

 PLB_no_such_thing_as_whelp:0 "Немає такої речі, як допомога!"
 PLB_no_such_thing_as_whelp_desc:0 "Помічники, найслабші ведмеді в кланах, ніколи не брали участі в боротьбі за свій клан, вважаючись в кращому випадку воїнами, а в гіршому - робітниками або збирачами. Але немає такого поняття, як ведмідь, занадто слабкий, щоб битися. Можливо, вони не найсильніші, але вони служитимуть нам у скрутну хвилину так само, як і будь-які інші."

 PLB_our_own_crusaders_of_harmony:0 "Наші власні хрестоносці гармонії"
 PLB_our_own_crusaders_of_harmony_desc:0 "З далеких чуток з Півдня королева дізналася про молодіжну організацію еквестрійців під назвою "Хрестоносці милого Марка." Хоча Еквестрія не здавалася нацією, яка б мала таку групу, Ейра вважає, що це нова ідея. Ми візьмемо з них приклад і створимо свій власний, під назвою "Хрестоносці гармонії.""

 PLB_harmony_of_frost:0 "Гармонія морозу"
 PLB_harmony_of_frost_desc:0 "Багато чого змінилося відтоді, як ми вперше прибули сюди з Еквестрії. Ми намагалися використовувати мир і дружбу для поширення гармонії, але в кінцевому рахунку це не ведмежий шлях. Ми - жорстока раса, тож мусимо використовувати насильство для захисту і творення гармонії. Наші вірування, наші системи належать нам, і нікому іншому, на морозі Півночі."

 PLB_define_spheres_of_influence:0 "Правильно визначаємо наші кордони"
 PLB_define_spheres_of_influence_desc:0 "Кордон між нами і грифонами - це просто кордон. Кордон, що постійно змінюється, наповнений конфліктами за кожен клаптик землі. Якщо ми хочемо коли-небудь мати мир з нашими тепер ідеологічно близькими сусідами, ми повинні вирішити це питання раз і назавжди."

 PLB_imperialist_remnants:0 "Пережитки імперіалізму"
 PLB_imperialist_remnants_desc:0 "Нова-Грифонія була створена в результаті експерименту імперіалізму Імперії Грифонів, коли поселенці-грифони витіснили місцевих яків, пінгвінів і навіть ведмедів, оскільки вони постійно просувалися вглиб материка. Цілком природно, що їхній уряд також піддався імперіалістичному мисленню, тож настав час покінчити з цим пережитком давно минулих часів."

 PLB_disarming_the_radicals:0 "Роззброєння радикалів"
 PLB_disarming_the_radicals_desc:0 "Це не було волею більшості грифонів, щоб вони стали таким ворожим нам режимом. Ні, це була лише обрана група радикалів, які мали зброю, необхідну для того, щоб здійснити насильницьку передачу влади собі. Ми повинні роззброїти грифонів, які стоять за падінням новогрифонівської демократії, як у переносному значенні... так і в прямому."

 PLB_deindustrialize_the_griffons:0 "Деіндустріалізувати грифонів"
 PLB_deindustrialize_the_griffons_desc:0 "Як ми можемо довіряти птахам методи ведення війни? Відповідь проста - ніяк. Зруйнуємо їхні заводи, перенесемо все, що зможемо, на територію овець, щоб їх можна було використати для кращої мети. Навчитися у них всьому, що ми можемо, щоб бути краще підготовленими наступного разу, коли щось подібне станеться."

 PLB_a_hands_off_approach:0 "Підхід без пазур"
 PLB_a_hands_off_approach_desc:0 "Королева не зацікавлена в постійному управлінні повсякденними справами територій грифонів. Тому замість клопіткої прямої окупації, яку ми підтримуємо зараз, буде сформовано більш автономний уряд, який керуватиме замість Ейри, хоча і під керівництвом ведмедів."

 PLB_stamp_out_black_and_white_radicalism:0 "Викорінити чорно-білий радикалізм"
 PLB_stamp_out_black_and_white_radicalism_desc:0 "Небезпека ворожої нації так близько до наших кордонів, як пінгвіни, занадто велика, щоб її ігнорувати. Заради нашої безпеки і збереження Гармонії ми повинні завдати негайного удару і викорінити цей зростаючий радикалізм, поки він не застав нас зненацька."

 PLB_new_fortresses_in_pingland:0 "Нові фортеці в Пінгленді"
 PLB_new_fortresses_in_pingland_desc:0 "Пінгвіни мають територію, дуже схожу на нашу, повну крижаних гір, лісів і річок. Це ідеальне місце для поселення ведмедів, тому ми будемо сприяти обмеженому пересуванню та будівництву фортець на нашій новій території, щоб захистити та покращити батьківщину пінгвінів."

 PLB_penguin_support_corps:0 "Загони підтримки пінгвінів"
 PLB_penguin_support_corps_desc:0 "Пінгвіни не дуже добре справляються з фронтовими боями. Однак у їхньому розпорядженні є інші способи боротьби, таємнича магія льоду та надзвичайна зимостійкість. Вони будуть гарною підтримкою для наших сильних воїнів, виконуючи корисні завдання, які ніколи не вдасться виконати горностаям."

 PLB_our_northern_friends:0 "Наші північні друзі"
 PLB_our_northern_friends_desc:0 "Є лише одна раса, що мешкає так далеко на Півночі, і це пінгвіни. Ми маємо з ними давні дружні стосунки, і тепер ми можемо закріпити їх офіційним договором, що відкриває шлях до подальшої співпраці. Ми впевнені, що всі білі ведмеді приймуть нашу пропозицію з великим ентузіазмом."

 PLB_border_protection_cooperation:0 "Ведмежо-пінгвіні прикордонні патрулі"
 PLB_border_protection_cooperation_desc:0 "Тепер, коли пінгвіни і ми маємо відкриті кордони, ми можемо співпрацювати для захисту національної території від більш загрозливих сусідів. Спільне патрулювання як на суші, так і на морі допоможе нам обом краще зрозуміти армії один одного, а також покращить нашу зовнішню безпеку."

 PLB_independent_polar_circle_initiative:0 "Ініціатива Полярного кола"
 PLB_independent_polar_circle_initiative_desc:0 "Ініціатива Полярного кола - це ідея, створена деякими старійшинами клану Вольсунґр, що передбачає взаємний захист нашого народу та Пінгланду. Якщо на один з них нападе чужа раса чи нація, інший прийде на допомогу. Ми, звичайно, готові допомогти нашим друзям у будь-якій війні, яка може виникнути на їхньому шляху, питання лише в тому, чи буде ця готовність відплачена тим же."

 PLB_northern_railway:0 "Великий льодовий шлях"
 PLB_northern_railway_desc:0 "Тепер, коли ми і наші друзі на сході вирівняні, ми можемо почати будівництво великої крижаної дороги, довгої залізниці, що простягнеться від островів Клану Анкер до найсхіднішого міста Інгстад. Це інфраструктурне з'єднання тісніше зв'яже наші два види і наші батьківщини, краще підготувавши їх до майбутнього."

 PLB_fish_trading_network:0 "Розширення маршрутів торгівлі рибою"
 PLB_fish_trading_network_desc:0 "Риба. Це основний продукт харчування крайньої півночі, який у великій кількості виловлюється по всьому замерзлому узбережжю. Розширення нашої торгівлі рибою з пінгвінами не тільки полегшить наш власний тягар вилову життєво важливої їжі, але й може навчити нас деякому досвіду у військово-морських справах, що є новою сферою для нас на даний момент."

 PLB_the_rising_horde:0 "Орда, що підіймається"
 PLB_the_rising_horde_desc:0 "На Південь, за володіннями Вольсунґру, Яки відпали від гармонії, яку вони колись відстоювали. Хоча ми давно дружили з яками, ми не можемо дозволити собі мати потенційно ворожий народ на нашому південному кордоні, не зараз. Ми повинні завдати сильного і швидкого удару, пригнічуючи наших колишніх братів і сестер по духу, перш ніж їхні орди піднімуться, щоб знищити нас першими."

 PLB_yak_smashing_lessons:0 "Вчимося розбивати"
 PLB_yak_smashing_lessons_desc:0 "Якщо є щось, що яки знають краще за нас, то це як трощити. Їх груба сила - це справді щось, на що варто подивитися, коли її правильно використовувати. Якби ми навчилися їхніх способів, вивчили їхні методи і використовували їх для наших власних наступів і опору, ми, безсумнівно, були б ще сильнішими, ніж раніше."

 PLB_raise_harmonist_banners:0 "Підняти орди гармоністів"
 PLB_raise_harmonist_banners_desc:0 "Королівство впало, але ті, хто вірить у Гармонію, залишилися. Ці орди, що колись вірою і правдою служили старому принцу Резерфорду, тепер звертаються до нас, як до нової Гармоністичної сили Півночі, і готові битися на нашому боці, щоб захистити як Яків, так і ведмедів. Які ще потрібні докази того, що наші узи дружби живуть і зараз?"

 PLB_rise_of_khans:0 "Хани-близнюки"
 PLB_rise_of_khans_desc:0 "Наші відносини з Якистаном завжди були відносинами брата і брата, а не пана і підданого. Окупація їхніх земель ніколи не була нашим наміром, та й зараз не є нашим наміром. Але у Йаки-клану є свої міркування щодо відокремлення, і для цього земля має бути розділена на два ханства, одне для західних яків, а інше для східних яків. Можливо, тепер вони нарешті знайдуть мир."

 PLB_a_drink_with_the_khan:0 "В гостях у принца"
 PLB_a_drink_with_the_khan_desc:0 "Принц Як'якистану, принц Резерфорд нещодавно возз'єднав своє королівство зі зрадницьким відколом, колись відомим як Йаки-клан. Зважаючи на те, що наша історія, наші вірування та інтереси збігаються, послати старійшин для вироблення взаємовигідної угоди - чудова ідея."

 PLB_the_great_hives:0 "Погляд через кордон"
 PLB_the_great_hives_desc:0 "Великі вулики земель Чейнджлінґів вважаються найбільшою загрозою для всіх відтоді, як вони почали зазіхати на наші землі на Півночі. Ми повинні якось вирішити цю нагальну проблему і підготуватися до вирішення конфлікту раз і назавжди."

 PLB_an_unexpected_twist:0 "Несподіваний поворот"
 PLB_an_unexpected_twist_desc:0 "Ніхто не думав, що це можливо, але чейнджлінґи по той бік кордону, які колись були нашими найлютішими ворогами, самі прийняли гармонію, так само як і ми. Хтось може все ще підозріло ставитися до такого повороту після століть постійної ворожнечі, але ми бачимо в цьому простий доказ абсолютної сили гармонії. Можливо, тепер ми зможемо нарешті припинити наші воєнні дії?"

 PLB_deal_with_thorax:0 "Мирний договір Ведмедів-Чейнджлінґів"
 PLB_deal_with_thorax_desc:0 "Тепер, коли Торакс править вуликами, у нас, можливо, нарешті з'явиться шанс покласти край нескінченному конфлікту, який мучить обидві наші нації з самого початку історії. Ми запропонуємо їм простий договір про мир і ненапад, щоб раз і назавжди покласти край чварам на нашому західному кордоні. Якщо вони погодяться на це, то у відносинах між нашими народами може настати нова епоха."

 PLB_the_rising_tyrant:0 "Тиран, що повстає"
 PLB_the_rising_tyrant_desc:0 "Королева Кризаліс править Чейнджлінґами вже десятки років, і знову і знову показує, що не зупиниться ні перед чим, поки всі не схиляться перед її короною. Ми зустрічаємо цю загрозу віч-на-віч, бо це лише питання часу, коли її всепоглинаючий погляд звернеться до нас."

 PLB_prepare_the_east_for_mass_deployement:0 "Підготувати Захід до масової війни"
 PLB_prepare_the_east_for_mass_deployement_desc:0 "Наш кордон на заході стане першим місцем конфлікту між нами, і місцем, де зіткнуться всі сили наших армій, коли прийде час. На жаль, інфраструктура в регіонах недостатньо розвинена для такої війни. Для того, щоб наші лінії постачання були стабільними та відкритими, необхідно негайно побудувати нові дороги."

 PLB_fortifications_in_the_south:0 "Звести нові крижані фортеці"
 PLB_fortifications_in_the_south_desc:0 "Армія Чейнджлінґів, найімовірніше, вдарить з південного краю Ключового озера, через пагорби Онлартіру. Щоб запобігти цьому, на кордоні необхідно звести великі крижані фортеці, які вщент зламають будь-яку агресію. Загарбники впадуть перед нашими крижаними стінами, як і всі інші!"

 PLB_prepare_for_advances_in_the_north:0 "Готуватися до розгрому Півночі"
 PLB_prepare_for_advances_in_the_north_desc:0 "Північ Ключ-озера - це майже суцільні пустки, і навіть чейнджлінґам важко воювати в таких умовах. У нас таких проблем немає, тому це буде нашим основним ударним пунктом."

 PLB_it_is_our_land:0 "Це завжди була наша земля"
 PLB_it_is_our_land_desc:0 "Це негармонійна річ - претендувати на великі ділянки землі через якісь націоналістичні амбіції. Але землі, які ми забрали у Чейнджлінґів... вони завжди були ведмежими землями, і ми про них дбали, доки не прийшли королівства і не забруднили їх! І ми знову повернемося, щоб захистити їх від корупції."

 PLB_changeling_fighting_tactics:0 "Тактика боротьби проти Чейнджлінґів"
 PLB_changeling_fighting_tactics_desc:0 "Більшість країн ніколи навіть не воювали з чейнджлінґами, або мають дуже малий досвід у цьому. Однак наш конфлікт з ними триває століттями, і все це записано в нашій історії. Вони можуть мати нові інструменти, сучасну зброю, але ми знаємо, як вони воюють, і ми використаємо це проти них."

 PLB_the_home_of_harmony:0 "Дім гармонії..."
 PLB_the_home_of_harmony_desc:0 "Багато чого сталося з тих пір, як ми повернулися, і багато чого змінилося, але ми не можемо забути тих, хто навчив нас, що таке Гармонія в першу чергу. Тепер ми повертаємося до того, з чого починали, щоб побачити, в якому напрямку пішли наші наставники..."

 PLB_has_fallen:0 "...впав."
 PLB_has_fallen_desc:0 "...Їх більше немає. Гармонія, що колись панувала в країні поні, була зруйнована, розбита жахіттями війни. Вже сотні тисяч поні стікаються до Вессландії, біженці від наслідків занепаду їхньої батьківщини. І ми приймемо їх, їхні уламки - це все, що залишилося від старого життя в Еквестрії."

 PLB_lessons_from_equestria:0 "Вчитися у вигнанців-поні"
 PLB_lessons_from_equestria_desc:0 "З поні приходять їхні знання, а вчені в їхніх рядах охоче діляться з нами знаннями, які вони здобули на півдні. Одкровення, які вони приносять, можуть на деякий час принести на нашу землю час великих суспільних чвар, але потенційна користь від досвіду вигнанців не може бути змарнована."

 PLB_stands_as_strong_as_ever:0 "...Стоїть вічно."
 PLB_stands_as_strong_as_ever_desc:0 "...І вони стоять, як стояли завжди. Навіть коли незмірні речі змінюються, Еквестрія залишається, і так само будемо і ми. Сяюча модель і маяк гармонії горить вічно яскравим полум'ям, за яким ми йдемо у світле майбутнє. Чи є кращий доказ переваги гармонії, ніж вони?"

 PLB_official_connections_with_equestria:0 "Стати друзями з поні"
 PLB_official_connections_with_equestria_desc:0 "Першим кроком у зміцненні наших відносин з Еквестрією є встановлення офіційних зв'язків. Дружба з ними має багато переваг, і, роблячи нашу дружню позицію зрозумілою як для них, так і для світу, для нашої нації відкривається набагато більше можливостей."

 PLB_invite_equestrian_advisers:0 "Запросити поні-економістів"
 PLB_invite_equestrian_advisers_desc:0 "Білі ведмеді - воїни, а не економісти. Ми не володіємо складними знаннями, необхідними для повного реформування нашої економіки відповідно до сучасних стандартів, особливо після століть, коли нічого, окрім бартеру та вилову риби силою, не існувало. Поні мають набагато кращий досвід у цьому питанні, ніж ми, і деякі з них вже зголосилися допомогти нам у цьому за невелику ціну."

 PLB_purchase_equestrian_industry:0 "Наше золото для поні-індустрії"
 PLB_purchase_equestrian_industry_desc:0 "У нас є золото. Навіть дуже багато. І хоча з практичної точки зору воно нічого не варте для нас, еквестрійці готові дати нам багато чого в обмін на нього. Використовуючи цей корисний ресурс, можна здійснити просту торгівлю: наш метал в обмін на їхні промислові знання та інструменти. Угода, яка врешті-решт принесе користь нам обом."

 PLB_proposition_of_military_cooperation:0 "Заропонувати військову співпрацю"
 PLB_proposition_of_military_cooperation_desc:0 "Ми не можемо пов'язати нашу долю з їхньою, оскільки наш шлях і їхній шлях лежить різними дорогами. Але це не означає, що ми не можемо працювати разом заради спільного майбутнього. Військова співпраця, як і вічна обіцянка ненападу, може бути першим ходом у грі за мир, і кожна дія наближає нас до світу гармонійних націй."

 PLB_the_principles_of_harmony:0 "Принципи гармонії"
 PLB_the_principles_of_harmony_desc:0 "Початкові ідеали і принципи Гармонії залишилися вірними і процвітають тут, дозволяючи нам мирно отримати підтримку кланів у нашому возз'єднанні. Але, не продемонструвавши їм свою силу через підкорення, ми опинилися в набагато більш хиткому становищі, оскільки лише наші слова та обіцянки утримують їх у лояльності до нашого клану. Дослухатися до їхніх вимог буде мати вирішальне значення для просування вперед до єдності."

 PLB_the_first_princess_of_polar_bears:0 "Коронувати першу полярну принцесу"
 PLB_the_first_princess_of_polar_bears_desc:0 "Білі ведмеді ніколи не жили під владою монарха, натомість ними керували традиційні кланові лідери та воєначальники, які зазвичай є найсильнішими ведмедями в клані. Це змінилося після того, як Ейра повернулася до клану Вольсунґр, прийнявши титул принцеси, подібно до алікорнів на півдні. Тепер вона керує не лише кланом, але й усіма ведмедями, і її новий титул відображатиме саме це."

 PLB_our_ideal_of_harmony:0 "Наша концепція гармонії"
 PLB_our_ideal_of_harmony_desc:0 "Наша ідея гармонії - це перший з кланів, створений з далекого Півдня Екестрії і сформований відповідно до суспільства і культури білих ведмедів. Хоча наше бачення вважається найбільш "нормальним", а отже, найбільш іноземним, є кілька ключових відмінностей від поні, зокрема, щодо ролі природи..."

 PLB_paw_wellingtons_take_on_harmony:0 "Концепція гармонії лапи"
 PLB_paw_wellingtons_take_on_harmony_desc:0 "Хоча сам По Уеллінгтон був дивним чином відсутній останнім часом після коронації, зібрання ведмедів з його клану, висунуте ним, прибуло, щоб представити їхні ідеали. Вплив Уеллінгтона на їхній клан все ще дуже очевидний, але, здається, вони стали набагато поміркованішими, коли справа доходить до поглядів на владу."

 PLB_torbens_take_on_harmony:0 "Концепція гармонії Торбена"
 PLB_torbens_take_on_harmony_desc:0 "Ідея Гармонії Володаря Грому Торбена є дуже унікальною, і вона все ще сягає корінням у традиції клану Свартпельсів. Хоча вона втратила неповагу до слабких, стародавня ієрархія ведмедів, заснована на силі, все ще присутня. Щоб представляти себе і клан, він послав старійшину з клану Анкер, щоб допомогти в питаннях управління."

 PLB_the_pyramid:0 "Піраміда"
 PLB_the_pyramid_desc:0 "Піраміда - це нещодавня унікальна ідеологія, запропонована Торбеном і кланом Свартпельс після нещодавніх дискусій серед гармоністів. Хоча деякі прихильники жорсткої лінії нашого клану заявляють про очевидне продовження використання кастової системи, міжкастова співпраця та захист нижчих каст, безумовно, інтригує."

 PLB_the_svartpels_experiment:0 "Експеримент Свартпельса"
 PLB_the_svartpels_experiment_desc:0 "З повної згоди принцеси Ейри, Торбен почав впроваджувати свою ідею Піраміди в клані Свартпельс і навколишній державі, щоб перевірити її ефективність і життєздатність. Навіть якщо це може зайняти деякий час, щоб побачити повні наслідки, це вже створило дивовижний рівень співпраці в їхньому королівстві."

 PLB_blessing_not_a_punishment:0 "Благословення, а не покарання"
 PLB_blessing_not_a_punishment_desc:0 "Під час перших об'єднавчих війн багато ведмедів клану Свартпельс загинуло в боях проти інших кланів. Це призвело до того, що сам регіон знелюднішав, адже ті, хто не повернувся, залишили свої колишні фортеці з льоду та каменю, перетворившись на ніщо. Однак багато хто з них тепер усвідомив, що це було благословенням, а не прокляттям, оскільки ця земля може бути повернута природі, коли виживуть найсильніші з клану."

 PLB_where_everyone_has_a_role:0 "Де кожен має свою роль"
 PLB_where_everyone_has_a_role_desc:0 "Група настільки хороша, наскільки хороша сума її частин, і це залишається вірним навіть для цілої нації. Найкраще вона працює тоді, коли всі працюють разом, як один, роблячи свій внесок у загальну справу. Усі істоти, від найслабших до найсильніших, мають відігравати свою роль, чи то солдата, чи то робітника на заводі."

 PLB_where_everyone_has_an_opportunity:0 "Де кожен має можливість"
 PLB_where_everyone_has_an_opportunity_desc:0 "Кожен повинен мати можливість бути тим, ким він хоче бути. Чи хоче він служити в армії, чи жити простим життям у своєму клані, найголовніше, щоб у нього була така можливість. Свобода вибору життя - одна з найважливіших, яку може мати ведмідь."

 PLB_three_principles:0 ""Три принципи""
 PLB_three_principles_desc:0 "Одним з найбільш очевидних джерел натхнення для колишнього Деспота і для Асамблеї Скюфлінґів є Олександр Кемерскай, зокрема його книга "Три принципи." Клан Скюфлінґ хоче наслідувати її зміст, і, мабуть, По Уеллінгтон також матиме що сказати з цього приводу."

 PLB_scyfling_experiment:0 "Експеримент "Скюфлінґ""
 PLB_scyfling_experiment_desc:0 "Клан Скюфлінґ на чолі з новою асамблеєю почав закладати основи для своїх нових ідей на північному заході зі схвалення принцеси Ейри. Хоча вони все ще не повністю задоволені своїм прогресом, новий акцент на закон і порядок вже має багато помітних позитивних наслідків у державі."

 PLB_not_a_despot_a_constitutionalist:0 "Деспот-конституціоналіст"
 PLB_not_a_despot_a_constitutionalist_desc:0 "Однією з вад режиму По Уеллінгтона була відсутність контролю над його владою, що призвело до багатьох помилок, створених ним одноосібно під час його правління. Офіційної конституції, подібної до тієї, що мала Республіка, у нас, можливо, ще не існує, але Асамблея Скюфлінґу забезпечить, щоб влада принцеси Ейри була сильною, але все ж таки стримувалася, як вони вважають, так і має бути."

 PLB_the_great_equestrian_mistake:0 "Найбільша помилка Еквестрії"
 PLB_the_great_equestrian_mistake_desc:0 "Еквестрія може бути найстарішим гармонійним режимом у світі, взірцем для всіх інших, на який варто рівнятися і вважати лідером самої Гармонії. Однак, вони зробили одну важливу помилку в своїй історії, яка полягала в тому, що вони не захистили своє довкілля, або контролювали його, або дозволили промисловості спустошити його. Ми не припустимося тієї ж помилки."

 PLB_no_hunting_zones:0 "Повторно використовувати кожен шматочок брухту"
 PLB_no_hunting_zones_desc:0 "Дуже мало речей можна використовувати більше одного разу. Обладунки можна перекувати на щось нове, мечі можна нескінченно гострити, а зброю можна створити з будь-якого виду сталі, що лежить навколо. Маючи в своєму розпорядженні небагато ресурсів і небагато виробництва, ми можемо досягти абсолютного успіху, використовуючи те, що маємо."

 PLB_no_building_zones:0 "Шпилі мерехтливого льоду"
 PLB_no_building_zones_desc:0 "Лід - дуже універсальний матеріал, його можна різьбити, ліпити, а за потреби - повністю розтопити. Білі ведмеді вже мають довгу історію створення своїх фортець з льоду, і настав час нам використати це на свою користь. Зробивши багато інших наших будівель з чистого льоду, ми зможемо легко модифікувати і ремонтувати їх у будь-який момент, навіть якщо спочатку їх буде складніше побудувати."

 PLB_ensure_the_tundra_remains_untouched:0 "Збереження тайги і тундри"
 PLB_ensure_the_tundra_remains_untouched_desc:0 "Деякі ділянки земель білого ведмедя, тайги і тундри ще повністю не зачеплені прийдешньою індустріалізацією, і так повинно залишитися. Забезпечивши, щоб ніхто ніколи не зазіхав на ці землі, ми зможемо зберегти їх у природному, незайманому стані назавжди. Звичайно, будівництво може постраждати на деякий час, але це жертва, на яку ми готові піти."

 PLB_restoring_monster_populations:0 "Відновлення популяцій монстрів"
 PLB_restoring_monster_populations_desc:0 "Екосистема - дуже крихка річ. Навіть один поштовх чи підказка може вивести її з-під контролю і зруйнувати безповоротно. Ось чому ми повинні повернути популяцію монстрів у природу, навіть якщо дехто вважає це божевіллям, щоб відновити природний баланс у лісах і горах. Хоча реалізація проекту такого масштабу може коштувати дорого, він, зрештою, того вартий."

 PLB_land_of_heroes_and_beasts:0 "Земля героїв і чудовиськ"
 PLB_land_of_heroes_and_beasts_desc:0 "Дика природа - неприборкане, а іноді й небезпечне місце. Тепер тут вільно бродять монстри, злісні звірі, здатні перемогти навіть горностая. І все ж, найсильніший з ведмедів завжди підніметься, щоб перемогти їх. Бо наша країна стала схожою на легенду - країною героїв і монстрів."

 PLB_land_of_justice_and_law:0 "Земля права і справедливості"
 PLB_land_of_justice_and_law_desc:0 "Порядок - один з найважливіших аспектів будь-якої держави. Бо коли порядку немає, панує хаос, а це призводить лише до катастроф і смерті. Наша країна, яка колись була місивом ворогуючих кланів і постійних конфліктів, тепер є справедливою державою під владою Принцеси. Країною закону і справедливості."

 PLB_harmony_of_naturality:0 "Природна гармонія"
 PLB_harmony_of_naturality_desc:0 "Гармонія, яку ми маємо, не є продуктом філософії якоїсь чужої раси або просто копією іншої нації. Вона є нашою власною конструкцією, яка була повністю створена ведмедями і тільки ведмедями. І, можливо, саме завдяки цьому факту ми вступили в нову еру єдності між собою, як щось більше, ніж просто тиран і менший з минулого."

 PLB_we_are_but_part_of_nature:0 "Ми лише частина природи"
 PLB_we_are_but_part_of_nature_desc:0 "Ми, ведмеді, не є господарями природи, але й не є рівними з нею. Ми єдині з природою, ми - частина великої системи і духу півночі, і кожен з нас виконує свою роль, як і будь-яка інша рослина, тварина чи навіть чудовисько. І, приходячи до порозуміння з іншими частинами, що складають природу, ми можемо краще зрозуміти не тільки її, але й світ в цілому."

 PLB_leave_eastern_key_lake_to_nature:0 "Залишити Східне Ключ-озеро природі"
 PLB_leave_eastern_key_lake_to_nature_desc:0 "Східне узбережжя та прилеглі землі Ключ-озера вже відносно безлюдні порівняно з рештою регіону, там живе лише кілька вигнанців. Переконавши цих ведмедів піти до східних кланів та їхніх регіонів, ми зможемо майже повністю залишити весь штат на волю і плин природи, без будь-якого втручання."

 PLB_building_towns:0 "Перетворити фортеці на міста"
 PLB_building_towns_desc:0 "Традиційно ведмеді живуть самі по собі у великих фортецях з льоду і каменю, символах своєї сили і влади. Хоча вони, безумовно, вражають, відносна самотність мало сприяла співпраці між окремими ведмедями. Заохочуючи ведмедів перетворювати ці будівлі на власні містечка, ми зможемо краще працювати разом над проєктами та вирішувати проблеми."

 PLB_a_natural_economy:0 "Природна економіка"
 PLB_a_natural_economy_desc:0 "Усупереч припущенням, гармонійні стосунки з природою не означають, що наша економіка повинна страждати, або що ми залишимося позаду сучасності. Зовсім навпаки, адже наші відносини означають, що ми можемо створювати продукти, які повністю відновлюються, і ми все ще продовжуємо шукати способи зробити наше виробництво більш ефективним, залишаючись при цьому екологічно чистими."

 PLB_establish_connections_with_outcasts:0 "Налагодження контактів із знедоленими"
 PLB_establish_connections_with_outcasts_desc:0 "Незважаючи на те, що багато ведмедів вже повернулися додому з вигнання у зв'язку з нещодавніми подіями, є ще багато вигнанців, тих, хто подорожував світом і бачив багато речей, про які ми можемо тільки мріяти. Шукаючи і встановлюючи контакти з такими вигнанцями, ми, можливо, зможемо навчитися чомусь з їхнього досвіду і перейняти його собі."

 PLB_ideal_of_crystal_empire:0 "Ідеал Кристальної імперії"
 PLB_ideal_of_crystal_empire_desc:0 "Коли принцеса Кейденс знайшла свого судженого, вона зробила це не тому, що він займав рівне становище або заради якогось власного просування. Ні, це було чисто з любові, простої і справжньої прихильності до того, хто їй був близький. Саме таким має бути шлюб, і тому принцеса Ейра наслідуватиме їх та їхній успіх."

 PLB_economic_harmony:0 "Економічна гармонія"
 PLB_economic_harmony_desc:0 "Економіка завжди повинна бути в гармонії з собою, гнучкою і готовою взяти на себе будь-яку роль, яка від неї вимагається. Будь то будівництво чи військове виробництво, зброя чи артилерія, вона повинна бути готовою переключитися в будь-яку мить. Можливо, ми не можемо створити все, але ми можемо зробити будь-що."

 PLB_species_harmony:0 "Гармонія видів"
 PLB_species_harmony_desc:0 "Що може бути ефективнішим для досягнення мети, ніж спільна робота? Так, поодинці можна далеко піти, але група ведмедів завжди буде сильнішою, ніж один. Співпраця - це те, що ми виховуємо в собі, адже разом ми можемо зробити все."

 PLB_harmonic_enlightenment:0 "Школа для обдарованих ведмедів"
 PLB_harmonic_enlightenment_desc:0 "Одна з ідей Принцес Еквестрії - це школа для талановитих, де їх спеціально навчали б, щоб вони стали найкращими, а деякі зірочки навіть стали особистими протеже принцеси Селестії. Ми візьмемо цю ідею собі на озброєння і створимо "Школу обдарованих ведмедів" для ведмедів, які виходять за рамки своїх можливостей. Хто знає? Можливо, колись Ейра знайде собі учня чи спадкоємця."

 PLB_our_own_crystal_city:0 "Наше власне "Кристальне місто""
 PLB_our_own_crystal_city_desc:0 "Справжнє Кристальне місто можна вважати одним з чудес світу, величезним ландшафтом з мільйонами кришталевих поні. Чому б не створити свій власний? Володіння клану Вольсунґр, на жаль, не підходять, тож пагорби Вессландії підійдуть для цього. Це буде перша ведмежа метрополія."

 PLB_viceroyality_system:0 "Система намісництв"
 PLB_viceroyality_system_desc:0 "Кристальна Імперія, за межами своєї столиці, є дуже децентралізованою державою, з регіонами, які здебільшого працюють під контролем своїх регіональних губернаторів і майже не мають нагляду. Під офіційним титулом віце-короля, лідери кланів тепер будуть надані самі собі, вільні управляти своїми землями так, як вони вважають за потрібне. У будь-якому випадку, вони знатимуть, як краще це зробити."

 PLB_centralization_in_weslandia:0 "Централізувати наші володіння у Вессландії"
 PLB_centralization_in_weslandia_desc:0 "З остаточним актом масової централізації Весландії під безпосередню владу принцеси Ейри, вся країна багато в чому стала розколотою копією Кристальної імперії. Принцеса повністю контролює свої володіння - величезне за ведмежими мірками місто, а рештою навмисно нехтує заради власної вигоди. Накази Ейри, можливо, більше не діють далеко, але там, де вони діють, вони є законом."

 PLB_a_princess_cannot_be_without_a_prince:0 "Що таке принцеса без принца?"
 PLB_a_princess_cannot_be_without_a_prince_desc:0 "Принцеса повинна мати свого чоловіка, щоб правити разом. І цей супутник повинен бути того ж рівня, що й принцеса, якщо вони хочуть бути гідними. Ейра знає це, а ще вона знає, що в землях урсинів є лише двоє, які відповідають цим вимогам."

 PLB_despot_and_the_princess:0 "Принцеса і деспот"
 PLB_despot_and_the_princess_desc:0 "По Уеллінгтон був єдиним ведмедем, якому вдалося об'єднати клани під одним прапором, нехай і тимчасово. У чомусь він є попередником Ейри, просто з іншим титулом, і тому його знайдуть, де б він не був, і він візьме лапу Ейри в дружини як перший королівський консорт."

 PLB_expand_constitutionalism:0 "Закон і справедливість для всіх!"
 PLB_expand_constitutionalism_desc:0 "Важливі принципи для будь-якої країни - порядок, закон і справедливість - вже вкоренилися у білих ведмедів, але настав час зробити ще один крок вперед. Створивши офіційну конституцію, яка закріплює ці принципи серед ведмедів, ми можемо надати всім кланам ці фундаментально важливі права."

 PLB_compatibility_of_faith_and_constitution:0 "Забезпечити релігійну підтримку"
 PLB_compatibility_of_faith_and_constitution_desc:0 "Релігія може бути одним з найкращих джерел єдності для будь-якої групи, об'єднуючи багатьох в одне ціле під єдиною фігурою, будь то бог чи простий священик. Ми будемо розвивати релігійні цінності клану Скюфлінґ і поширювати їх по всій решті земель, поставивши принца По на чолі, щоб гарантувати, що нам ніколи не бракуватиме підтримки нашого народу."

 PLB_monarchy_of_the_creatures:0 "Монархія звірів"
 PLB_monarchy_of_the_creatures_desc:0 "Ми є справжніми собою лише тоді, коли перебуваємо у своїй первісній, дикій природі, як звірі. І хто ще веде цих звірів, як не наша принцеса Ейра? Вона є тією фігурою, навколо якої ми всі згуртувалися, і якщо щось загрожуватиме їй або будь-якому іншому ведмедю, вони побачать нашу справжню лють!"

 PLB_beuty_and_the_beast:0 "Красуня і чудовисько"
 PLB_beuty_and_the_beast_desc:0 "Повелитель грому Торбен, можливо, не має титулу, який багато хто розглядав би у звичайній дворянській ієрархії, або не схожий на ведмедя, який може піклуватися про такі дрібниці, як шлюб. Але його сила, а в деяких випадках і героїзм - це якість, яку багато хто хотів би мати в собі, і яка робить його в інших відношеннях ідеальним принцом для принцеси. Він - той, хто призначений для Ейри."

 PLB_adapt_the_pyramid:0 "Переконатися, що кожен має своє місце"
 PLB_adapt_the_pyramid_desc:0 "Суспільство повинно мати сувору ієрархію, з найслабшими внизу і найсильнішими на вершині. Кожен має своє місце в цій піраміді, і хоча ті, хто внизу, не будуть забуті, обов'язок і право їхніх вищих - боротися і піклуватися про них. Це природний порядок речей."

 PLB_some_are_meaned_for_heroism:0 "Деякі створені для героїзму"
 PLB_some_are_meant_for_heroism_desc:0 "Є ті, хто справді виходять за межі того, що може зробити звичайна людина чи навіть ведмідь, кого можна назвати не інакше як героями. І саме ці герої повинні захищати і боротися за Північ, використовувати свою хоробрість і силу на благо всіх білих ведмедів."

 PLB_return_to_tradition:0 "Освічений абсолютизм"
 PLB_return_to_tradition_desc:0 "Яка користь від лідера, якщо він не має влади? Якщо принцеса має захищати своїх підданих, то вона повинна мати можливість це робити. Наш освічений і справедливий монарх повинен мати можливість вжити всіх необхідних заходів для забезпечення нашого процвітання, і саме це ми їй дамо. Вона - наша принцеса, вона - наш лідер, і її слово є абсолютним."

 PLB_a_royal_guard:0 "Створити королівську гвардію"
 PLB_a_royal_guard_desc:0 "Кожен король має власну гвардію. Елітне військо, створене для захисту країни у важкі часи. Ми створимо власну Королівську гвардію, що складатиметься з найкращих воїнів усіх кланів і слугуватиме як почесною вартою, так і взірцем для наслідування для всіх ведмедів."

 PLB_a_royal_university_of_military:0 "Королівський військовий університет"
 PLB_a_royal_university_of_military_desc:0 "Очолювати армію - це не лише бути найсильнішим у групі або вбити найбільше ворогів. Це ще й вміння воювати, вміння добре вести своїх воїнів у бій. Щоб навчити цього наших ведмедів, ми створимо перший Королівський військовий університет - місце, де вивчатимуть тактику і методи ведення війни."

 PLB_to_guard_against_subversives:0 "Створити Снігові Сови"
 PLB_to_guard_against_subversives_desc:0 "Гармонія ніколи не може припинити свою місію поширення по всьому світу, але так само не можуть припинити її вороги, які прагнуть її знищення. Снігові Сови будуть групою ведмедів, які охоронятимуть нас від цих диверсантів, вживаючи всіх необхідних заходів для захисту нашої ідеології."

 PLB_the_birthplace_of_harmony:0 "Місце народження гармонії"
 PLB_the_birthplace_of_harmony_desc:0 "Коли ми ще були вигнані з Півночі, ще до того, як По Уеллінгтон повернувся з Грифонії, саме Еквестрія прийняла нас, навчила нас ідеалам гармонії і показала нам, наскільки міцною є дружба. Тепер настав час повернутися до нашого коріння і подивитися, що сталося з землею, яку ми колись називали домом."

 PLB_send_emissaries_to_equestria:0 "Відправити емісарів до Еквестрії"
 PLB_send_emissaries_to_equestria_desc:0 "Вкрай необхідно негайно встановити контакт з південними поні. Вони - велика і могутня нація на континенті, і чим швидше ми об'єднаємося з ними, тим швидше зможемо отримати їхню допомогу і надати їм свою."

 PLB_open_up_northern_ports:0 "Очистити морські шляхи"
 PLB_open_up_northern_ports_desc:0 "Звідси нелегко дістатися до Еквестрії суходолом, адже нас розділяють численні гірські хребти та замерзлі ліси. Контакт через море - набагато простіший варіант, але багато наших портів і маршрутів з півночі повністю замерзли, залишивши доступ недоступним. Настав час це виправити."

 PLB_birthplace_of_harmony_has_fallen:0 "Місце народження гармонії впало!"
 PLB_birthplace_of_harmony_has_fallen_desc:0 "Сталося неймовірне, адже самого дому гармонії більше немає. Хоча це нищівний удар для Гармонії в цілому, ми повинні відійти від того, що колись було нашим дороговказом, і шукати новий шлях. Можливо, знайдуться інші, які захочуть приєднатися до нас?"

 PLB_connections_with_crystal_empire:0 "Налагодити зв'язки з Кристальною Імперією"
 PLB_connections_with_crystal_empire_desc:0 "Кристальна Імперія - найпівнічніша і найхолодніша нація поні на Евкусі, яка з'явилася лише кілька років тому. Кришталеві поні - досить витривала нація, адже колись вони жили під владою Сомбри так високо в снігах. Ми повинні достукатися до них, обмін посольствами може стати гарним початком."

 PLB_equestrian_trade_agreements:0 "Еквестрійські торгові угоди"
 PLB_equestrian_trade_agreements_desc:0 "Тепер, коли ми маємо кращий доступ до Еквестрії, можливість укладення реальних торговельних угод між нашими країнами стала очевидною. Вони матимуть більший доступ до наших невикористаних ресурсів у горах, допомагаючи компенсувати наші недоліки в інших сферах, таких як будівництво."

 PLB_equestrian_advisers:0 "Запросити поні"
 PLB_equestrian_advisers_desc:0 "Протягом тисячоліть поні вдосконалювали свою країну різними способами, від системи освіти до військової форми. І вони можуть поділитися цією досконалістю та досвідом з нами, варто лише попросити."

 PLB_invite_pony_flora_experts:0 "Запросити експертів з флори"
 PLB_invite_pony_flora_experts_desc:0 "Поні контролюють погоду в своїй країні, а отже, і саму природу, що є явним порушенням природної гармонії. Проте деякі з них присвятили своє життя вивченню рослинного світу не лише Еквестрії, а й усього світу. Ми не настільки самовпевнені, щоб вважати, що знаємо все про тутешню природу, і допомога цих експертів у маркуванні важливих природних об'єктів може бути корисною."

 PLB_hire_earth_ponies_for_forest_restoration:0 "Допомога поні у відновленні лісів"
 PLB_hire_earth_ponies_for_forest_restoration_desc:0 "Пегаси можуть літати, а єдинороги володіють магією, але земнопоні - це плем'я поні, яке має особливий зв'язок із землею, а отже, з різними культурами, що ростуть на ній. Якби ми заручилися допомогою кількох з них у наших зусиллях повернути тайгу, яка колись тут була, це, безумовно, було б ефективніше і показало б нам інші способи допомогти нашій нації захистити себе і процвітати."

 PLB_notes_from_fluttershy:0 "Нотатки від Флаттершай"
 PLB_notes_from_fluttershy_desc:0 "Цікаво, що з Еквестрії надійшов єдиний лист, адресований принцесі. Хоча зовні він виглядає абсолютно звичайним, кур'єр стверджує, що він дуже важливий, бо від самої Елементальної Носійки Доброти, Флаттершай. Вона відома своїм зв'язками з тваринами і чудовиськами природи в Еквестрії, тому багато ведмедів клану Вольсунґр зацікавлені в тому, що вона написала."

 PLB_troop_movement_agreements_with_equestria:0 "Угода про військовий доступ"
 PLB_troop_movement_agreements_with_equestria_desc:0 "Невідомо, коли нашим військам може знадобитися перетнути землі Еквестрії, або їхнім - наші холодні пустки. Щоб уникнути ускладнень у майбутньому, буде підписано превентивну угоду, яка дозволить офіційний доступ наших збройних сил на землі один одного."

 PLB_join_upa:0 "Разом як одне ціле"
 PLB_join_upa_desc:0 "Наші долі вже тісно переплетені в цьому світі завдяки гармонії. Тепер настав час зробити їх єдиним цілим, і офіційно попросити приєднатися до альянсу Еквестрії. Ми позичимо їм свою силу, і будемо захищати те, що належить нам, не по частинах, а як єдине ціле."

 PLB_fluttershy_visit:0 "Підготуватися до візиту Флаттершай"
 PLB_fluttershy_visit_desc:0 "Як і передбачала її записка, прийшла звістка, що Флаттершай прибуде з Еквестрії, щоб відвідати нас на далекій півночі. Як і годиться людині її становища, ми повинні негайно підготуватися до її приїзду, щоб уникнути будь-яких ускладнень. Зрештою, було б погано для нас, якби ми розчарували такого іноземного діяча."

 PLB_crystal_advisers:0 "Запросити кристальних радників"
 PLB_crystal_advisers_desc:0 "Якщо кришталеві поні щось і вміють, так це захищати свою країну. Їхні оборонні знання справді вражають, і Принцеса запросила кількох найкращих до свого двору, щоб навчити їх своєму мистецтву."

 PLB_crystal_magic_lessons:0 "Вчитися у майстрів магії"
 PLB_crystal_magic_lessons_desc:0 "Наслідуючи свою тезку, Кристальна Імперія провела велику кількість досліджень, щоб перетворити свою велику кількість магічних кристалів на зброю. Деякі з наших науковців виявили зацікавленість у вивченні цієї галузі техніки, тож ми відправимо їх вчитися і допомагати просувати наші власні дослідження."

 PLB_pony_medicine_lessons:0 "Уроки кристалічної медицини"
 PLB_pony_medicine_lessons_desc:0 "Ще одна сфера, в якій кришталеві поні досягли значних успіхів - це медицина, адже їхні лікарі та медичні заклади всесвітньо відомі. Сечовиків важко вбити, але хороший і досвідчений медичний відділ для порятунку тих, хто перебуває на межі смерті, може врятувати життя багатьох воїнів."

 PLB_align_with_cadence:0 "Вирівнятися з принцесою любові"
 PLB_align_with_cadence_desc:0 "Враховуючи, що Еквестрія більше не є безпечним варіантом для союзу, принаймні на даний момент, ми повинні натомість звернути увагу на інший бастіон гармонії останніх років. Кейденс, алікорн любові, є частиною королівської родини Еквестрії, і дружні стосунки з нею та Імперією були б для нас великою перевагою як зараз, так і для майбутніх перспектив з Еквестрією, якщо вони коли-небудь відновляться."

 PLB_an_interesting_package:0 "Досить цікавий пакунок"
 PLB_an_interesting_package_desc:0 "Загроза падіння Еквестрії постійно нависає, і тому Кристальна Імперія надіслала нам цікавий пакунок, який, вочевидь, допоможе нам захистити себе. Це не зброя, а лише креслення та схеми. Однак, якщо наші вчені правильно зрозуміли, це плани джерела енергії, яке набагато перевищує все, що світ коли-небудь бачив раніше. Ми повинні негайно розглянути це питання."

 PLB_the_republicans_of_the_new_world:0 "Звернутися до республіканців"
 PLB_the_republicans_of_new_world_desc:0 "Птахи Нова-Грифонії, можливо, наслідуючи Республіку Грифонів, нещодавно перетворилися на гармонійну республіку після смерті свого губернатора і нових виборів. Можливо, наша історія не була сповнена дружби, але ніколи не пізно примиритися з іншими, хто дотримується гармонійних поглядів. Давайте простягнемо руку цим новим можливим друзям."

 PLB_minority_agreements:0 "Угода про збройові заводи"
 PLB_minority_agreements_desc:0 "Нова-Грифонія набагато більш розвинена в промисловому відношенні, маючи великі військові заводи, які штампують зброю. Наші власні грифони у Вессландії не такі сучасні, як вони, але натомість створили нові та інноваційні способи творення, вимушені до цього через необхідність. Обмін нашими знаннями на їхні був би взаємовигідним для нас обох."

 PLB_join_guardian_initiative:0 "Приєднатись до Ініціативи Хранителів"
 PLB_join_guardian_initiative_desc:0 "Грифони створили нову програму під назвою "Ініціатива Хранителів", яка включає в себе збройні сили, що відправляються по всьому світу, щоб захистити свободу і допомогти захистити себе. І вони мають рацію, за гармонію потрібно боротися скрізь, щоб вона не тільки процвітала, але й зайняла своє законне місце як домінуюча ідеологія світу. Ми будемо підтримувати їхні зусилля."

 PLB_our_brothers_in_spirit:0 "Єднаймося з нашими братами і сестрами по духу"
 PLB_our_brothers_in_spirit_desc:0 "З давніх-давен якська раса стояла в силі. Вони, як народ далекої Півночі, з їхніми великими традиціями СМЕШ-інгу, як вони це називають, демонструють, що великий дух, який живе в нас, є і в них. Отже, залишається тільки сподіватися, що ми з ними станемо справжніми друзями і союзниками."

 PLB_yak_bear_defence_pact:0 "Яксько-ведмежий оборонний пакт"
 PLB_yak_bear_defence_pact_desc:0 "Навіть маючи спільну історію, ми ніколи не підписували жодних офіційних договорів з яками на Півдні. Насправді, єдиними реальними зв'язками, які нас пов'язували до наших нещодавніх дипломатичних кроків, були ритуальні бої, які ми регулярно проводили. Тепер це має змінитися, і пакт про ненапад і дружбу зміцнить нашу єдність."

 PLB_yak_bear_military_initiative:0 "Об'єднана військова ініціатива"
 PLB_yak_bear_military_initiative_desc:0 "Армія Яків і наша армія могли б багато чому навчитися одна від одної, якби їм дали таку можливість. Вони можуть навчити нас своєї стійкої оборонної тактики і впертості, а ми можемо навчити їх, як процвітати навіть у найсуворіші зими і невпинно атакувати будь-якого ворога, який може спіткати нас."

 PLB_an_unexpected_ally:0 "Об'єднатися з несподіваним другом"
 PLB_an_unexpected_ally_desc:0 "На наш превеликий подив, чейнджлінґи на заході прийняли гармонію так само, як і ми. Колись вони були нашими одвічними ворогами, особливо під владою Кризаліс, але, здається, Торакс взяв владу в свої руки і направив їх на новий шлях. Незважаючи на свою неймовірну неортодоксальність, ми завжди будемо дружити з народом гармонії."

 PLB_northern_beacon_of_harmony:0 "Північний маяк гармонії"
 PLB_northern_beacon_of_harmony_desc:0 "Навіть будучи відносно новими, прихильність чейнджлінґів до гармонії по всьому світу насправді викликає захоплення. Вони розуміють так само, як і ми, що Гармонія - це єдиний шлях вперед, і що немає інших варіантів, окрім неї. Ми будемо слідувати їхньому прикладу і посилати наші власні сили по всьому світу, щоб допомогти таким рухам, де б вони не виникали."

 PLB_a_little_gift_in_an_iron_box:0 "Маленький подарунок у залізній коробці"
 PLB_a_little_gift_in_an_iron_box_desc:0 "Чейнджлінґи, з нашим нещодавнім покращенням відносин, запропонували нам цікавий подарунок, дивну зброю зі сталі, яка, як вони кажуть, визначить майбутнє війни. Хоча деякі старійшини з підозрою ставляться до того, що вони називають потужною зброєю, надані креслення і зразки виглядають досить грізно."

 PLB_not_a_force_of_reaction:0 "Не сила реакції!"
 PLB_not_a_force_of_reaction_desc:0 "Ми не будемо просто сидіти склавши руки, поки наші вороги стають сильнішими за нашими кордонами. Ні, натомість ми будемо шукати їх і битися з ними першими, знищимо їх до того, як вони знищать нас! Ми переможемо їх на наших умовах і принесемо їм гармонію силою!"

 PLB_the_changeling_tyrant:0 "Тиран-чейнджлінґ"
 PLB_the_changeling_tyrant_desc:0 "На Заході править королева Кризаліс і вулики, нація, яка прагне лише до повного підкорення всього Еквусу. Можливо, ми ще недостатньо сильні, щоб перейти в наступ, але ми все ще можемо підготуватися до неминучої хвилі. Коли вони прийдуть за нами, ми будемо готові."

 PLB_economic_mobilization:0 "Готувати кузні"
 PLB_economic_mobilization_desc:0 "Чейнджлінґи набагато більш індустріалізовані, ніж ми. Маючи більшу територію та перевагу в модернізації, ми ніколи не зможемо зрівнятися з ними за кількістю заводів чи виробничих ліній. Натомість, ми змусимо наші кузні працювати з усіх сил, і сподіваємось, що цього буде достатньо, щоб пережити прийдешню бурю."

 PLB_military_mobilization:0 "Готувати наших громадян"
 PLB_military_mobilization_desc:0 "Навіть якщо кожен білий ведмідь зможе вбити десять чейнджлінґів, це не матиме значення, якщо ворог зможе переважати нас чисельністю. Хоча ми не хочемо посилати ведмедів на смерть у бою, якщо вони самі цього не бажають, на кону майбутнє всього нашого виду. Ми зробимо все можливе, щоб захистити його."

 PLB_fortify_the_northern_front:0 "Підготувати наші кордони"
 PLB_fortify_the_northern_front_desc:0 "Кількох фортець, розкиданих уздовж західного кордону, буде недостатньо, щоб утримати лінію фронту. Треба будувати справжні оборонні позиції, укріплювати те, що вже є, поки ще є час. Можливо, це не стримає їх назавжди, але це принаймні затримає Чейнджлінґів, поки ми не зможемо завдати удару у відповідь."

 PLB_upa_weapon_shipments:0 "Поставки зброї від ОАП"
 PLB_upa_weapon_shipments_desc:0 "З нашими новими союзниками-поні на півдні ми отримуємо нову, набагато сучаснішу зброю та військову техніку, щоб допомогти нам проти нашого спільного ворога. Їх аналіз та реінжиніринг також має допомогти у створенні наших власних зразків зброї, більш сучасних, ніж у інших країн."

 PLB_upa_northern_corps:0 "Північний корпус ОАП"
 PLB_upa_northern_corps_desc:0 "Об'єднаниий альянс поні створив нову силу, що складається лише з найсильніших та найздібніших поні, щоб допомогти нам на далекій Півночі - Північний корпус. Хоча кількість таких поні, здатних витримати ці суворі умови, невелика, ті, що витримають, будуть битися так само хоробро, як і будь-який ведмідь, пліч-о-пліч з нами, справжніми товаришами по духу і битві."

 PLB_sorynth_occupation_zone:0 "Військова зона Соріф"
 PLB_sorynth_occupation_zone_desc:0 "Чейнджлінґи були переможені спільними зусиллями нас і Евестрії, відданої гармонії. І все ж, зрештою, ми не даремно боролися у цій війні. Ми повинні просити наших Еквестрійських союзників про управління Соріфом і навколишніми пустками, територією, якій все одно було б краще бути під нашим захистом."

 PLB_our_greatest_war:0 "Наша найбільша війна"
 PLB_our_greatest_war_desc:0 "Ми самі, самі проти загрози Еквусу. Але ми не відступимо, не зламаємося і ніколи не здамося! Ні, ми будемо боротися і стояти разом проти цієї загрози, і битви, які ми ведемо сьогодні, назавжди залишаться в пам'яті як найвеличніші в нашій історії!"

 PLB_our_greatest_triumph:0 "Наш найбільший тріумф"
 PLB_our_greatest_triumph_desc:0 "Попри всі труднощі, ми перемогли. Королівство Чейнджлінґів лежить переможеним, прапор білих ведмедів майорить високо над вежею Весаліполіса. Ця мить назавжди залишиться в пам'яті як наша найбільша перемога, але тепер ми повинні вирішити питання, як поводитися з нашими розбитими ворогами."

 PLB_the_polar_strike:0 "Удар по зарозумілим"
 PLB_the_polar_strike_desc:0 "Коли загроза з боку Чейнджлінґів зросла, ми укріпилися і підготувалися, чекаючи бурі мечів. Але Кризаліс так і не вдарила, звернувши свій погляд на південь, вирішивши полювати на істот слабших, вважаючи, що ми не становимо загрози. Але в своїй зарозумілості вона, здається, забула, що саме нечисельність, а не страх перед її арміями утримував нас за Ключ-озером..."

 PLB_it_is_our_land_2:0 "Наша вічна земля"
 PLB_it_is_our_land_2_desc:0 "Це негармонійна річ, претендувати на великі ділянки землі через якісь націоналістичні амбіції. Але землі, які ми забрали у чейнджлнгів... Вони завжди були ведмежими землями, і ми про них дбали, доки не прийшли королівства і не забруднили їх! І ми повернемося, щоб знову захистити їх."

 PLB_the_griffon_tyrants:0 "Тирани-грифони"
 PLB_the_griffon_tyrants_desc:0 "Грифони завжди були небезпечною і нестабільною расою, схильною до сутичок і воєн, як це видно на їхньому континенті. Багато хто в кланах не здивувався, побачивши, як наші сусіди на Нова-Грифонії впали в антигармонійну ідеологію. Настав час розчавити цих тиранів."

 PLB_their_worst_excesses:0 "Покарати за їхні вчинки"
 PLB_their_worst_excesses_desc:0 "Хоча повна деіндустріалізація Нова-Грифонії на даний момент неможлива, є деякі конкретні компанії та ідеологи, які є більшими порушниками гармонії, ніж інші. Ми спалимо ці місця дотла і повністю знищимо ці підривні партії, які хотіли б побачити падіння нашої нації, перш ніж вони зможуть знову повстати проти нас."

 PLB_what_to_do_with_griffons:0 "Що робити з грифонами?"
 PLB_what_to_do_with_griffons_desc:0 "Тепер, коли загрозу усунуто, багато хто задається питанням, що робити з рештою Нова-Грифонії. Дехто каже, що тепер, коли антигармонійні елементи зникли, можна довіряти їм самим собі, тоді як інші вважають, що прямий захист ведмедів - єдиний спосіб гарантувати, що це більше не повториться."

 PLB_the_perfect_frontier:0 "Ідеальний Фронтир"
 PLB_the_perfect_frontier_desc:0 "Для грифонів Фронтир був холодною, невблаганною пусткою, місцем, наповненими монстрами та іншими подібними кошмарами. Але для нас - це природне місце для ведмедів і яскравий приклад гармонії з природою. Тепер це буде наш кордон, ідеальний кордон як для ведмедів, так і для грифонів."

 PLB_the_yak_situation:0 "Тирани яків"
 PLB_the_yak_situation_desc:0 "Принц Резерфорд колись був єдиним лідером яків на Півдні, в усамітненні та ізоляції. Як і ми, він відкрив націю до цінностей гармонії поні та світу в цілому. Однак Йаки-клан повстав проти нього, щоб зберегти свою традицію, і інші негармонійні елементи почали проникати в націю. Ми повинні врятувати те, що залишилося, поки не стало занадто пізно."

 PLB_maybe_jaks_had_some_good_ideas:0 "Можливо, у яків сходу є хороші ідеї..."
 PLB_maybe_jaks_had_some_good_ideas_desc:0 "Хоча їхні причини були хибними, Йаки-клан мав рацію у своєму виступі проти принца Резерфорда. Хоча ізоляція - це нерозумно, традиції - це те, що потрібно поважати і шанувати. Ми деіндустріалізуємо їхні великі міста, роззброївши їх проти нас, а також дозволимо їм повернутися до свого старого способу життя, як того хотів Йаки-клан."

 PLB_what_to_do_with_yaks:0 "Що робити з яками?"
 PLB_what_to_do_with_yaks_desc:0 "Яки мають багато спільного з нами, мають схожі риси та силу. Вони б добре вписалися в наш народ і наш спосіб життя на Півночі. Звичайно, ті ж самі міркування можна було б використати і для того, щоб дозволити їм керувати собою..."

 PLB_griffon_naturalization:0 "Натуралізація грифонів"
 PLB_griffon_naturalization_desc:0 "Навіть незважаючи на нашу неспокійну історію, ми не маємо поганих намірів щодо грифонів в цілому. Навпаки, ми хочемо сприяти співпраці між нашими расами, щоб ми жили разом у гармонії під однією державою. Хоча не всі відкриті для наших методів або навіть нашої ідеології, багато хто вже приєднався до нас в знак солідарності, щоб зберегти природу і працювати заради кращого майбутнього."

 PLB_they_traded_reason_for_madness:0 "Вони обміняли причину на божевілля"
 PLB_they_traded_reason_for_madness_desc:0 "Пінгвіни - дивна раса, яка, як і ми, звикли до замерзлої Півночі. Але якщо колись їхній народ був одним з небагатьох, кому ми могли довіряти, і навіть клан Свартпельсів вважав їх своїми родичами, то тепер вони піддалися небезпечним і радикальним ідеологіям зсередини. Тепер ми повинні врятувати їх від них самих."

 PLB_what_has_to_be_done:0 "Що має бути зроблено"
 PLB_what_has_to_be_done_desc:0 "Пінгленд впав не від іноземного загарбника чи якогось стихійного лиха. Ні, це були антигармонійні радикали, які працювали над тим, щоб підірвати їх і захопити владу для себе. Зараз у нас немає іншого вибору, окрім як повністю видалити ці пухлини, перш ніж вони знову пустять коріння."

 PLB_push_back_penguin_industrialization:0 "Відкласти індустріалізацію пінгвінів"
 PLB_push_back_penguin_industrialization_desc:0 "Фабрики - це такий самий інструмент, як і будь-який інший, і як будь-який інший інструмент, їх слід відібрати у тих, хто ними зловживає. Ми зруйнуємо їхні промислові центри, повернемо їхній стан до менш сучасних часів. Однак натомість ми використаємо те, що залишиться, для будівництва доріг і ремонту інфраструктури, яку пінгвіни зможуть використовувати у своєму повсякденному житті."

 PLB_naturalized_provinces_of_pingland:0 "Натуралізовані провінції Пінгленду"
 PLB_naturalized_provinces_of_pingland_desc:0 "Пінгвіни і ведмеді живуть разом дуже давно. Клан Анкер, наприклад, майже повністю складається з пінгвінів, і значна меншість Свартпельсів має пінгвінів. З подібним процесом та інтеграцією в наш природний стан, самі землі пінгвінів можуть стати невід'ємною частиною нашого суспільства."

 PLB_princessdom_of_polaria:0 "Проголосити князівство Полярія"
 PLB_princessdom_of_polaria_desc:0 "З нашою експансією на неісторичні землі ведмедів ми взяли під свій прапор багато інших рас, окрім нашої. Наша нація - це вже не тільки білі ведмеді, але й пінгвіни, яки і навіть грифони. Для цього статусу необхідна нова назва для нашої нації - захисниця всієї крайньої півночі."

 PLB_racial_harmony:0 "Расова гармонія"
 PLB_racial_harmony_desc:0 "Наша доля гармонії ніколи не призначалася лише для ведмедів. Кожна раса під нашим прапором, кожна істота, яка вирішить назвати ці землі домом, буде вітатися і знайде тут своє місце, бо тільки разом ми дійсно найсильніші, якими можемо бути. Раса не розділить нас, і, незважаючи на наші численні відмінності, ми завжди матимемо спільні риси, які зв'яжуть нас в одне ціле."

 PLB_under_bear_protection:0 "Під ведмежим захистом"
 PLB_under_bear_protection_desc:0 "Інші народи і види виявилися занадто помилковими, занадто слабкими, щоб жити самостійно. Ми, ведмеді, єдині, хто знову і знову доводить, що тільки ми достатньо сильні, щоб захистити тих, хто не може захистити себе сам. Ми поведемо і спрямуємо їх до нового початку, а вони допоможуть нам показати їм, що таке справжня сила."

 PLB_harmonist_clan_integration:0 "Інтеграція прикордонних кланів"
 PLB_harmonist_clan_integration_desc:0 "На південь від клану Вольсунґр знаходяться пишні снігові ліси, землі, куди багато ведмедів подорожували раніше, щоб випробувати свою силу проти найсильнішого з яків. Тепер ця земля наша, і вона, і корінні яки будуть інтегровані як наші власні, з усіма захистами природи та гармонійною дружбою, що притаманні будь-якій нашій клановій землі."

 PLB_expand_mountain_holdings:0 "Фортеці по всьому Як'якистані"
 PLB_expand_mountain_holdings_desc:0 "Після розгрому яків багато ведмедів просили дозволити їм оселитися на півдні разом з кланами і побудувати свої фортеці поблизу племен яків. Це не тільки допоможе убезпечити новий регіон і поширити ведмедів далі по землі, але й сприятиме дружбі та дружньому суперництву між двома видами."

 PLB_economic_industrial_reforms:0 "Економічні та промислові реформи"
 PLB_economic_industrial_reforms_desc:0 "Порівняно з рештою світу, нашу економіку та промисловість можна назвати лише сміховинно жалюгідними та відсталими. Нам необхідно негайно підтягуватися до сучасних стандартів за допомогою загальнонаціональних реформ, щоб принаймні зміцнити свої позиції в очах світу."

 PLB_gather_their_gold_and_mines:0 "Націоналізувати золоті копальні"
 PLB_gather_their_gold_and_mines_desc:0 "Жили золота розкидані по всіх ведмежих кланах, і на них претендує кожен, хто має фортецю поблизу, але ресурс залишається невикористаним через те, що його вважають непрактичним. Однак, зважаючи на його цінність для інших, для нас стало необхідним видобувати цей цінний метал. Розплата з нинішніми "землевласниками" буде дорогою, але вона того варта."

 PLB_expand_gold_mines:0 "Розширити золоті копальні"
 PLB_expand_gold_mines_desc:0 "Кілька вже створених золотих копалень є жахливо неефективними, видобуваючи лише невеликі обсяги за тієї кількості, яку можна було б видобути. Ми повинні знайти нові способи копати глибше, швидше, сильніше, щоб наші плани щодо колись марного ресурсу могли бути реалізовані в повній мірі."

 PLB_build_mints:0 "Побудувати перші монетні двори"
 PLB_build_mints_desc:0 "Мати золото - це добре, але воно не принесе нам користі, якщо просто припадатиме пилом у наших фортецях. У нинішньому стані золоті шматки та злитки нічого не варті, а спроба продати їх за кордон, скоріш за все, закінчиться тим, що нами скористаються. Натомість по всій країні будуть створені монетні двори, щоб почати карбувати нашу власну національну монету."

 PLB_gold_based_currency:0 "Запровадити валюту, засновану на золоті"
 PLB_gold_based_currency_desc:0 "Беаріт - це нова золота валюта, створена кланом Вольсунґр, натхненна еквестрійським бітом як офіційною національною валютою країни. Цікаво, що інші нації та раси вже почали приймати його, можливо, тому, що він виготовлений із чистого золота. Дивно, але це також вигідно для нашої економіки та нашого міжнародного становища в цілому."

 PLB_green_industrialization:0 "Зелена індустріалізація"
 PLB_green_industrialization_desc:0 "Однією з наших першочергових проблем завжди були наші відносини з природою навколо нас. Але в той же час ми не можемо ігнорувати нагальну потребу модернізації нашої країни. Ми підтягнемося до сучасної індустріалізації, але зробимо це по-своєму, з якомога меншою шкодою для нашого оточення."

 PLB_hydro_farms:0 "Розширення гідроферми Уеллінгтона"
 PLB_hydro_farms_desc:0 "Однією з найцікавіших одержимостей По Уеллінгтона був північний океан, риба та кораблі. Його гідроферми мали обмежений успіх під час правління деспота, але вони були кроком у правильному напрямку. Тепер ми продовжимо цей крок і розширимо ці ферми, щоб виробляти більше не лише для клану Скюфлінґ, але й для нації."

 PLB_more_bountiful_crops:0 "Лісове господарство"
 PLB_more_bountiful_crops_desc:0 "Короткий час, коли ми були відрізані від наших запасів риби, був важким періодом, який мало хто з ведмедів хотів би пережити, але він нас дечому навчив. Бульби та рослини, хоч і не можуть замінити морські щедроти, але є чудовим гарніром, і їх можна легко вирощувати масово. А для білого ведмедя більше їжі ніколи не буває погано."

 PLB_hydropower:0 "Прийняти гідроенергетику"
 PLB_hydropower_desc:0 "Річки, які протікають через всю нашу країну, є потужними і потенційним джерелом енергії, яке тільки й чекає, щоб його використали. Гідроенергетика нічого нам не коштує, але дає нам силу, силу продовжувати рухатися до сучасності. Колеса наших машин ніколи не перестануть обертатися, бо наші річки ніколи не перестануть текти."

 PLB_electrification:0 "Електрифікувати фортеці Вольсунґр"
 PLB_electrification_desc:0 "Забезпечення нашого клану електроенергією завжди було, м'яко кажучи, складним завданням через те, що наші фортеці були вкопані в горах глибоко під землею. Але переваги, які нарешті з'являться в наших будинках, занадто великі, щоб їх ігнорувати. Це може вимагати великих зусиль, але в кінці кінців електрифікація клану Вольсунґр стане сходинкою до подальшого прогресу."

 PLB_support_avian_weapon_producers:0 "Підтримати Грифонський зброй-завод"
 PLB_support_avian_weapon_producers_desc:0 "Зброя Грифона завжди перевершувала нашу власну, і це стосується зброї, виготовленої птахами в межах наших кордонів. Гордість кланів залишила їхні зброярні в занедбаному стані, але з певною підтримкою вони можуть знову працювати, щоб виготовляти чудову зброю для нашої зростаючої армії."

 PLB_first_university_of_ecology:0 "Перший університет екології"
 PLB_first_university_of_ecology_desc:0 "У нас немає вищих навчальних закладів для білих ведмедів. Раніше ми задовольнялися тим, що закінчували навчання на знаннях наших предків, але цього вже недостатньо. Необхідно відкрити офіційний університет, але не просто університет. Це буде перший університет екології, школа, присвячена вивченню урсинів, природи та постійних, але важливих відносин між ними."

 PLB_normal_advancement:0 "Швидка індустріалізація"
 PLB_normal_advancement_desc:0 "Однією з поступок, які ми зробили жителям Вессландії під час Другого возз'єднання, було надання їм можливості впливати на те, як буде розвиватися наша економіка в майбутньому. Тепер настав час віддати їм належне, оскільки вони на диво запропонували досить комплексні плани швидкої індустріалізації країни. Можливо, це не зовсім те, що ми мали на увазі, але співпраця є основою Гармонії, зрештою."

 PLB_onlatir_military_industrial_complez:0 "Об'єднати промисловий комплекс Онлатіру"
 PLB_onlatir_military_industrial_complez_desc:0 "Протягом багатьох років в Онлатірі існувало те, що сторонні називають військово-промисловим комплексом, де тісно перепліталися кланові армії і ті, що виробляли їхню зброю. Однак кожен клан мав свій власний комплекс, через що їхня спільна ефективність була нижчою, ніж хотілося б. Об'єднання цих виробників зброї в одну групу вирішить цю проблему, що дозволить їм зробити більший внесок у національних воїнів."

 PLB_electronic_advancement:0 "Імпортувати сучасне дослідницьке обладнання"
 PLB_electronic_advancement_desc:0 "Ми не можемо розпочати власні дослідження без відповідного обладнання. Ми вважаємо за необхідне придбати та імпортувати різноманітне електронне обладнання, яке ми зможемо використовувати для проведення власних досліджень. Колись ми зможемо створити власне дослідницьке обладнання, а поки що це допоможе нам наздогнати сучасність."

 PLB_weslandian_civilian_sector:0 "Розширити виробництво вессландських товарів"
 PLB_weslandian_civilian_sector_desc:0 "Вессландія завжди мала потужний цивільний виробничий центр, який був зачеплений промисловістю і використовував свою робочу силу грифонів для власної вигоди. Використання цього шляхом розширення цих об'єктів принесе користь як жителям Вессландії, так і країні в цілому."

 PLB_hydropowered_production_weslandia:0 "Нехай річки піднімуть молоти"
 PLB_hydropowered_production_weslandia_desc:0 "У той час як робоча сила не є проблемою у Весландії, отримання енергії для роботи їхніх більших і складніших кузень є проблемою. Велика річка, що протікає через їхню територію, на щастя, дає просте рішення. Гідроенергетика завжди була предметом наших досліджень, і ми можемо використати її, щоб допомогти весслендійцям піднімати свою продуктивність все вище і вище."

 PLB_mountain_forges_onlartir:0 "Розширити гірські кузні на Онлартір"
 PLB_mountain_forges_onlartir_desc:0 "Онлартір - дуже гірський і горбистий регіон, але тамтешні клани так і не опанували мистецтво створення кузень на цих горах. Якщо ми навчимо їх цього, допоможемо їм відкрити більше власних кузень, то вони віддячать нам тим же - більшою кількістю зброї."

 PLB_lessons_from_beneath_the_mountain:0 "Уроки з-під гір"
 PLB_lessons_from_beneath_the_mountain_desc:0 "Ділячись нашими методами з іншими ведмедями, ми відкрили для себе багато нового, щоб покращити методи, які колись вважали досконалими. Якби ми взяли їх на озброєння, використовували їх на національному рівні, прийняли ці уроки з печер до серця... неможливо сказати, чого б ми могли навчитися далі."

 PLB_open_up_veins_of_earth:0 "Відкрити артерії світу"
 PLB_open_up_veins_of_earth_desc:0 "Нам доступно так багато, що ми ще не використали. Стільки природних ресурсів, стільки металів, кристалів і нафти, які тільки чекають, щоб їх відкрили. Ми повинні відкрити шахти! Ми будемо копати, розкопувати і використовувати все, що світ надав нам для наших власних потреб."

 PLB_griffon_workshops:0 "Модернізувати майстерні Грифона"
 PLB_griffon_workshops_desc:0 "Грифони Вессландії були джерелом їхньої промисловості з тих пір, як клани взяли їх як своїх слуг багато століть тому. Їхні умови життя значно покращилися, а майстерні - не дуже. Але якщо ми відремонтуємо їх, дамо їм необхідні інструменти, грифони допоможуть нам стати сучасною нацією."

 PLB_industrial_schools_of_harmonic_workers:0 "Промислові школи гармонійних працівників"
 PLB_industrial_schools_of_harmonic_workers_desc:0 "Можливо, зараз ми наздоганяємо, але немає гарантії, що наш технологічний прогрес триватиме вічно. Щоб забезпечити наше майбутнє, в кланах буде відкрито кілька шкіл, де навчатимуть сучасним індустріальним методам. Ті, хто там навчатиметься, стануть як наступним поколінням робочої сили, так і науковцями, які вдосконалюватимуть техніку, якою користуватиметься робоча сила."

 PLB_military_integration:0 "Єдина армія"
 PLB_military_integration_desc:0 "Клани ніколи раніше не мали єдиного війська воїнів, навіть за часів Деспота. Але часи змінилися, і всі клани повинні працювати як один, щоб перемогти наших ворогів. Об'єднана армія - єдиний вихід, якщо ми хочемо зберегти своє існування."

 PLB_expand_volsungr_strategy:0 "Залишатися відданим Шляхам Вольсунґра"
 PLB_expand_volsungr_strategy_desc:0 "Наш клан мав свій власний спосіб боротьби протягом століть, і немає причин змінювати його навіть зараз. Наші методи більш ефективні, більш придатні, а головне - це те, що нам потрібно для майбутнього нашої армії. Не ми повинні змінюватися, щоб воювати, як інші клани, а вони повинні навчитися воювати, як ми."

 PLB_nanooks_descend:0 "Нануки спускаються"
 PLB_nanooks_descend_desc:0 "Нануки - еліта нашої армії, ті, хто складає кістяк наших ефективних сил. Їхні навички не мають собі рівних у їхніх рідних горах, місцевості, якої нам не бракує так далеко на замерзлій Півночі. Тепер вони займуть місце найвищих серед наших військ, тих, хто триматиме оборону там, де інші не змогли б."

 PLB_adopt_modern_nanook_strategies:0 "Модернізувати тактику Нанук"
 PLB_adopt_modern_nanook_strategies_desc:0 "Навіть якщо досвід наших нануків значно перевершує досвід інших рас у горах, тактика, яку ми використовуємо, безперечно, застаріла порівняно з альпіністами інших народів. Якщо ми приймемо її для себе, наша і без того страшна сила дійсно стане чимось, з чим слід рахуватися."

 PLB_key_lake_weapons_for_nanooks:0 "Перетворити магію Ключ-озера на зброю"
 PLB_key_lake_weapons_for_nanooks_desc:0 "Магія Ключ-озера є таємничою і древньою, з властивостями, які ми ще не зовсім розуміємо. Однак ми знаємо достатньо, щоб використовувати її на свою користь, зокрема, у зростаючій галузі магічної зброї. Адже єдине, що може бути страшнішим за нанука з рушницею, - це нанук з магічною рушницею."

 PLB_elder_assistance:0 "Вчітися у старійшин"
 PLB_elder_assistance_desc:0 "Старійшини нашого клану прожили багато років, бачили і знали речі, які ми можемо уявити лише в найсміливіших мріях. Їхні дні славних боїв і битв, можливо, вже минули, але їхні знання все ще можна використати. У них можна багато чому навчитися, адже лише маючи минуле, ми можемо рухатися вперед до майбутнього."

 PLB_paws_lessons_on_warfare:0 "Уроки Уеллінгтона про сучасну війну"
 PLB_paws_lessons_on_warfare_desc:0 "Під час свого заслання По Уеллінгтон навчився багатьом іншим речам, ніж наша принцеса Ейра, і однією з них були доктрини війни на Грифонії. Він виявив бажання навчити нас того, що знає сам, щоб ми могли краще захищати всіх урсинів від наших ворогів. Незалежно від того, в якому напрямку рухається наша армія, інформація, яку він надає, буде безцінною."

 PLB_expand_nanook_ranks:0 "Розширити ранги нануків"
 PLB_expand_nanook_ranks_desc:0 "З нашими нануками залишається лише одна проблема - проблема чисельності. Наша історія в горах, можливо, дала нам природну спорідненість з ними, але смішно думати, що тільки наш клан може виробляти талановитих воїнів. Якщо докласти зусиль, їхні ряди могли б розростися до небаченої раніше чисельності - справжнього жаху Півночі."

 PLB_adopt_more_conventional_warfare:0 "Прийняти звичайну ведмежу війну"
 PLB_adopt_more_conventional_warfare_desc:0 "Ведмеді воювали як одне з одним, так і з чужинцями ще з часів зародження самої раси, і багато кланів використовують ідеї, загалом схожі між собою в певних аспектах, наприклад, завжди залишатися в наступі. Досі це добре себе зарекомендувало, тож навіщо замінювати щось успішне? Більше ведмедів знають, як воювати як пансербйорн, ніж як нанук."

 PLB_wesslandian_mass_deployement:0 "Вессландське масове розгортання"
 PLB_wesslandian_mass_deployement_desc:0 "Що стосується вессландських армій, то вони знають і навчили нас єдиній речі: достатня кількість може переважати будь-яку силу. Наявність, керівництво і координація достатньо масивної армії практично гарантує перемогу, і вессландські лідери вже проявили зацікавленість у тому, щоб допомогти нам у цьому."

 PLB_mass_armour_deployement:0 "Резерви броні Уеллінгтона"
 PLB_mass_armour_deployement_desc:0 "На території клану Скюфлінґ у По Уеллінгтона є досить велика кількість ведмежих обладунків, призначених для панцербйорнів. Чому він не використав їх у Другій війні за об'єднання, ми, можливо, ніколи не дізнаємося, але зараз настав час їх відкрити і використати. Вони будуть безцінними для майбутніх потенційних конфліктів."

 PLB_open_up_weapon_caches:0 "Схованки зброї Воєначальників"
 PLB_open_up_weapon_caches_desc:0 "Гвинтівки, кулі, артилерійські гармати та багато іншого заховано в схованках по всій території володінь воєначальників, чекаючи на використання, коли вони будуть потрібні. Що ж, ми вважаємо їх потрібними зараз, тож настав час знайти цю зброю і використати її. Наша армія має бути озброєною і готовою до ефективних дій."

 PLB_learn_from_traditions:0 "Вчитися у старших"
 PLB_learn_from_traditions_desc:0 "Старші багато бачили в своєму житті, і багато воювали. Їхній досвід не має собі рівних, а їхня мудрість, здобута в незліченних битвах, може стати нашою, якщо ми просто попросимо. Запитайте, послухайте, і вони передадуть все, що знають."

 PLB_magical_assitance:0 "Благословення від Короля Шаманів"
 PLB_magical_assitance_desc:0 "Клан Розенкранц та їхні шамани - дуже дивна і містична група, яка використовує сили, що виходять за межі нашого розуміння, щоб ховатися від крижаних вітрів і наносити удари, швидкі, як блискавки. З благословення їхнього лідера, Повелителя шаманів, наші розвідувальні групи можуть володіти цими здібностями з тим же ефектом."

 PLB_traditional_bear_army:0 "Кожен ведмідь - воїн"
 PLB_traditional_bear_army_desc:0 "Усі ведмеді повинні зробити свій внесок і стати частиною нових збройних сил. Жоден клан не повинен бути виключений, жодна міжусобиця не допускається. Ми всі воїни, всі під прапором Полярної армії, і разом ми завдамо удару і здолаємо будь-якого ворога!"

 PLB_more_southern_designs_for_guns:0 "Креслення зброї поні"
 PLB_more_southern_designs_for_guns_desc:0 "Конструкції зброї, яку використовують поні - прості, ефективні, а головне - не дуже затратні. "Запозичення" цих креслень допоможе нам пройти довгий шлях у наших власних дослідженнях вогнепальної зброї, які сподіваємося наслідувати ті ж сильні сторони їхніх конструкцій."

 PLB_greater_focus_on_support:0 "Кристальні уроки підтримки"
 PLB_greater_focus_on_support_desc:0 "Армія Кристальної Імперії сильно заглибилася в роти підтримки своїх військ, надаючи додаткову перевагу здібностям середньостатистичного воїна. Незалежно від того, чи це інженери для окопування, чи групи логістики, які допомагають координувати постачання, ці загони вже довели, що вони варті витрачених на них зусиль."

 PLB_superior_artillery:0 "Схеми республіканської артилерії"
 PLB_superior_artillery_desc:0 "Александр Кемерскай з республіки Грифонів був завзятим користувачем артилерії, широко використовуючи її під час боїв своєї революції. Здається, це вплинуло на По Уеллінгтона, який також захопився цією зброєю. Він забрав схеми республіканських артилерійських знарядь з собою до Клану Скюфлінґу, і тепер настала наша черга використати їх проти наших ворогів."

 PLB_engine_driven_armour:0 "Сталліонградські теорії механізації"
 PLB_engine_driven_armour_desc:0 "Майбутнє війни полягає не лише в тому, щоб бути сильнішими, але й швидшими. Колишній еквестрійський регіон Северяна, тепер відомий як Сталліонград, глибоко досліджував цю область, теоретично обґрунтовуючи різні доктрини, що передбачають використання механізованих сил замість їх стандартної піхоти. Здається, що це, принаймні, ідея, в якій варто заглибитися."

 PLB_armoured_combat_vehicles:0 ""Придбати" Схеми танків Чейнджлінґів"
 PLB_armoured_combat_vehicles_desc:0 "Найстрашнішим знаряддям в армії Чейнджлінґів є їхній танк, або Панцер, як вони його називають. Це броньований сталевий звір, здатний з легкістю знищувати урсинів, ухиляючись при цьому від більшості ударів. Їхні розробки мають бути нашими, і, на щастя для нас, так сталося, що деякі з них потрапили прямо в наші пазурі..."

 PLB_ensure_technological_superiority:0 "Власні засоби виробництва дизайну"
 PLB_ensure_technological_superiority_desc:0 "Ми можемо зайти так далеко, лише копіюючи конструкції інших народів, більш розвинених, ніж ми. Поки ми так робимо, наш технологічний прогрес буде обмежений їхнім. Ми повинні створювати власні засоби, щоб розширити межі бою і зброї, як ми її знаємо, щоб забезпечити нашу військову перевагу всіма можливими способами."

 PLB_and_we_stand_together:0 "Повстаньмо разом!"
 PLB_and_we_stand_together_desc:0 "Незважаючи на випробування та негаразди, ми залишаємось разом з іншими кланами проти зради, яку влаштували Чейнджлінґи! Хоч вони і піддані, але наш присяжний обов'язок - працювати разом з ними, щоб усі білі ведмеді процвітали на цій замерзлій землі!"

 PLB_scyfling_integration:0 "Інтеграція Скюфлінґу"
 PLB_scyfling_integration_desc:0 "Клан Скюфлінґ, наші найстаріші друзі, тепер є нашими підданими по праву історії Білого Ведмедя. Маючи спільну історію, ми, очевидно, повинні працювати з ними як союз кланів. Однак ми також повинні пам'ятати, щоб не повторювати їхніх помилок, які вони колись зробили."

 PLB_onlartir_integration:0 "Інтеграція воєначальників"
 PLB_onlartir_integration_desc:0 "Воєначальники Онлартіру нечисельні порівняно з іншими кланами. Однак вони є одними з найкращих воїнів Півночі і не можуть бути забуті у великому задумі Білих Ведмедів. Вони будуть запрошені до участі в керівництві нацією, щоб їхні голоси були почуті в конфедерації."

 PLB_wesslandia_integration:0 "Вессландська інтеграція"
 PLB_wesslandia_integration_desc:0 "Вессландці є дивними серед білих ведмедів, оскільки вони використовують нижчий клас грифонів, а їхні землі більш впізнавані на півдні, ніж будь-де тут. Але вони численна група, і їхні дивні звичаї можуть виявитися корисними для всіх кланів, тому вони будуть інтегровані так само, як і будь-який інший клан."

 PLB_volsungr_integration:0 "Інтеграція Вольсунґрів"
 PLB_volsungr_integration_desc:0 "Наші старі суперники в гірських володіннях, Вольсунґр колись були нашими гордими ворогами до їхнього нещасливого падіння як у ведмедів, так і в гармонію під час Першого Об'єднання. Однак їхній гордий дух воїна залишився, і вони все ще залишаються білими ведмедями, незважаючи на їхні помилкові переконання. Навіть з нашим неспокійним минулим, ми запросимо їх взяти участь у нашому об'єднанні і вислухаємо, що вони скажуть."

 PLB_a_benevolent_despot:0 "Доброзичливий Деспот"
 PLB_a_benevolent_despot_desc:0 "Справжній Деспот білих ведмедів править з повною владою, але також з доброзичливістю. Вони керують силою, але також прислухаються до інших у своєму правлінні. Торбен тепер новий деспот, і він буде керувати так, як того вимагає кодекс давніх часів: створити справді єдину землю всіх ведмедів Півночі."

 PLB_our_natural_right_and_duty:0 "Наше природне право та обов'язок"
 PLB_our_natural_right_and_duty_desc:0 "Природним правом і обов'язком білих ведмедів є бути захисниками Півночі, включаючи всі раси, які живуть під нею. Чи то наші брати яки на півдні, чи то пташині загарбники на сході, чи то наші друзі пінгвіни-сусіди - всі вони є нашою відповідальністю. І це наші законні землі."

 PLB_our_ability:0 "Наша вища здатність"
 PLB_our_ability_desc:0 "Білі ведмеді - найсильніша раса з усіх відомих у світі, цього не можна заперечувати. Ми просто перевершуємо всі інші раси, бо маємо не лише свою силу, але й довгу та багату історію. Ми несемо з собою спадщину боротьби, яка ніколи не буде забута."

 PLB_ultimatum_to_penguins:0 "Ультиматум пінгвінам"
 PLB_ultimatum_to_penguins_desc:0 "Наші сусіди, пінгвіни, такі ж північні мешканці, як і ми, що володіють крижаною магією, яку навіть ми поважаємо. Однак вони погано пристосовані для того, щоб пережити шторм, що насувається, їм бракує розміру, сили та витривалості. Крім того, як доводить клан Анкер, їм набагато краще під владою ведмедів. Тому ми вимагатимемо, щоб пінгвіни піднялися в наше царство, щоб під нашим доброзичливим захистом вони могли процвітати."

 PLB_demand_to_griffons:0 "Вимагати від грифонів повернути нашу тайгу"
 PLB_demand_to_griffons_desc:0 "Тайга, або, як її називають птахи, Фронтир, колись була законною землею білих ведмедів. Залишки кланів, які колись жили там, все ще залишаються, такі ж зруйновані та мляві, як і вони самі. Ми більше не будемо миритися з таким станом речей і вимагатимемо повернення нашої старої території на славу нашої раси."

 PLB_bring_them_into_the_fold:0 "Привезти їх до складу"
 PLB_bring_them_into_the_fold_desc:0 "Пінгвінам і білим ведмедям судилося бути разом, правити в одній державі. Це дві раси найхолоднішого льоду, пов'язані в єдності снігом. Навіть якщо це доведеться зробити силою, наші друзі приєднаються до нас як наші вірні піддані в нашій державі, і ми запропонуємо їм захист, на який вони заслуговують."

 PLB_show_them_our_might:0 "Показати їм нашу міць"
 PLB_show_them_our_might_desc:0 "Держава грифонів на цьому континенті була нічим іншим, як вторгненням іноземних держав, нападом на північ, який приніс нам чужу расу. Ця земля все ще належить нам по праву, і будь-які уявлення про їхню "незалежність" повинні бути швидко розбиті. Вони побачать у нас своїх господарів, як тільки ми змусимо їх вклонитися."

 PLB_to_victor_go_the_spoils:0 "Переможцю дістається здобич"
 PLB_to_victor_go_the_spoils_desc:0 "Грифони мають технології, що значно перевершують наші; По Уеллінгтон визнав це, купуючи у них зброю під час свого правління як деспота. Тепер, коли ми володіємо їхніми землями, нам більше не потрібно платити за такі речі. Ми просто візьмемо те, що хочемо, оскільки це наше право як їхніх володарів."

 PLB_turn_anker_into_greats:0 "Перетворити Анкера на Великого"
 PLB_turn_anker_into_greats_desc:0 "Клан Анкер на острові Ян-Майєн складається переважно з пінгвінів, а ведмеді служать доброзичливими лідерами над морськими видами. Тепер, коли всі землі пінгвінів під нашим контролем, ми можемо запросити і переселити багатьох з їхніх людей до наших володінь, перетворивши колись незначний підданий на великий клан, який має право на власне існування."

 PLB_ursines_above_avians:0 "Ведмеді над птахами"
 PLB_ursines_above_avians_desc:0 "Птахи - ніщо в силі порівняно з ховрахами, і ніколи не будуть ними. Тільки горностай може бути справжнім воїном у клані, але не грифон. Вони можуть працювати як слуги і раби для своїх кращих, і ми в нашій безмежній милості будемо забезпечувати їх і захищати їх нашою сталлю і силою, оскільки, хоча вони ніколи не належали тут, вони все ще повинні слідувати нашим стародавнім правилам."

 PLB_yak_intervention:0 "Полум'я все ще палає на півдні"
 PLB_yak_intervention_desc:0 "Яки втягнуті в конфлікт між власними племенами: горді ізоляціоністичні яки сходу повстали проти поні-гармоністів, яків заходу. Ми повинні втрутитися, поки у нас є шанс, і врятувати справу яків, поки їх не знищили заблудлі яки заходу!"

 PLB_ally_jaks:0 "Пліч-о-пліч з Йаки-кланом"
 PLB_ally_jaks_desc:0 "Східні яки розуміють і залишаються вірними законам півночі, зберігаючи свої непорушні традиції. Зараз вони ведуть велику боротьбу, і наш обов'язок - допомогти їм. Ми надішлемо їм пропозицію про допомогу, і якщо вони приймуть її, ми будемо боротися пліч-о-пліч, як брати, за їхню благородну справу!"

 PLB_strike_yaks:0 "Поламати роги якам"
 PLB_strike_yaks_desc:0 "Навіть якщо ми не можемо допомогти східним якам, це не означає, що ми можемо стояти осторонь, поки яки руйнують власну спадщину своїми підривними, а головне чужими ідеями. Це може бути важко і це може нас засмучувати, але ми повинні вести боротьбу з нашими власними братами по духу і врятувати не тільки їх, але і всю північ від можливості впасти в комунізм, гармонію або будь-яку іншу руйнівну ідеологію."

 PLB_jak_bear_effort:0 "Зимова війна"
 PLB_jak_bear_effort_desc:0 "Істинні яки можуть стояти тріумфно, але ми не можемо спокійно спочивати на нашій перемозі. Інші завжди будуть дивитися на нас з жадібністю, вважаючи нас слабкими, відсталими і бажаючи нашого знищення. Ми повинні вчитися один в одного, використовувати наші знання і ділитися ними, щоб ми обидва могли боротися навіть сильніше, ніж могли б боротися поодинці."

 PLB_refurbish_old_suits:0 "Залатати старі костюми"
 PLB_refurbish_old_suits_desc:0 "Пансербйорни - це наші елітні війська, воїни, які йдуть у бій в обладунках і б'ють зброєю, сокирою та кігтями. Проте, з часом багато з наших старовинних костюмів прийшли в непридатність, зіпсувавшись під дією суворих снігових стихій. При певних зусиллях їх можна було б відремонтувати, щоб знову одягнути на поле бою."

 PLB_mobilization_attempts:0 "Підняти нові кригсбанди"
 PLB_mobilization_attempts_desc:0 "Ми маємо силу, але нас, на жаль, небагато. Нам потрібно більше білих ведмедів, щоб воювати в наших арміях. Будуть підняті нові кригсбанди, більше ведмедів буде завербовано до наших сил воїнів, щоб ми могли мати і чисельність, і майстерність над нашими численними ворогами."

 PLB_transform_old_fortresses:0 "Старі фортеці ще стоять"
 PLB_transform_old_fortresses_desc:0 "У володіннях Свартпельса є багато фортець, нині покинутих урсинами, які полягли в об'єднавчих війнах і ніколи не повернулися до своїх фортець з льоду та каменю. З деякими зусиллями та ведмедями, які бажають оселитися в цих покинутих вежах, їх можна знову підняти, заселивши нові землі та заповнивши колись пустельні місця в суворому регіоні, який ми називаємо домом."

 PLB_modernized_armour_efforts:0 "Броня Об'єднавчих воєн"
 PLB_modernized_armour_efforts_desc:0 "Під час обох Об'єднавчих війн для багатьох воїнів у битвах обладунки виявилися ключовою різницею між перемогою та поразкою. Однак обладунки сучасної епохи - це не панцерники, а вантажівки та швидкохідні транспортні засоби. Можливо, вони не такі почесні та славні в бою, але не варто забувати про такі технології."

 PLB_anker_expansion:0 "Звести міста з мерехтливого льоду"
 PLB_anker_expansion_desc:0 "Окрім клану Анкер, факт залишається фактом: ми ніколи не дбали про військово-морський флот, зберігаючи невеликі човни для вилову нашої основної їжі - риби. Це повинно змінитися. Ми збудуємо великі міста і запросимо друзів з Анкера, щоб вони навчили нас кораблебудуванню, і, можливо, в процесі дізнаємося більше про їхні способи ведення війни."

 PLB_every_bear_a_smith:0 "Прийняти традицію воїна-коваля"
 PLB_every_bear_a_smith_desc:0 "У давні часи воїни-ведмеді були власними ковалями. Вони створювали власну зброю, і саме їхня майстерність багато разів вирішувала перемогу та поразку. Ми повинні відновити цю традицію, тільки цього разу з більш сучасними виробами для ведмедів. Нам знадобиться додаткове обладнання, навіть якщо координація між ковалями може виявитися дещо...складною."

 PLB_born_of_thunder:0 "Народжений громом"
 PLB_born_of_thunder_desc:0 "Кожен пансербйорн клану Свартпельс не тільки змушений пройти через суворі випробування знаннями та боєм, але також змушений в якості останнього випробування витримати удар самої блискавки. Ті, хто виживає, не мають собі рівних навіть серед інших кланів у своїй доблесті та могутності. Це менталітет, який ми всі маємо; наша сила велика, наша воля ще більша, і ніхто не може змагатися з нами на полі бою!"

 PLB_anker_tradition:0 "Вчитися у старійшин Анкерів"
 PLB_anker_tradition_desc:0 "Клан Анкер, будучи дорослими пінгвінами, завжди бачив у воді більше домівки, ніж ведмеді. Там, де ми бачили просте джерело їжі, вони бачили нову землю, нове поле бою, з якого треба вийти переможцем. Протягом сотень років вони вдосконалювали мистецтво плавання морями, і всі горностаї повинні прислухатися до їхніх порад, коли йдеться про військово-морський флот."

 PLB_forge_the_weslandian_alliance:0 "Створити Вессландський Альянс"
 PLB_forge_the_weslandian_alliance_desc:0 "Вессландський Альянс був явно продуктом іноземного впливу, але, можливо, з нього все ж таки може вийти щось хороше. Зрештою, з одним колективним суб'єктом набагато легше працювати, ніж з трьома. Трохи попрацювавши і, можливо, незважаючи на кілька загроз, ми можемо перетворити Вессландію на об'єднану землю, місце з безмежним потенціалом для майбутнього урсинів."

 PLB_shared_river_production_lessons:0 "Нехай крижані води розпалюють наші кузні"
 PLB_shared_river_production_lessons_desc:0 "Кузні Вессландії живляться від річок, що протікають через їхні землі - концепція, яка ніколи не була реалізована в інших кланах. Втім, ми не можемо сперечатися з її ефективністю чи економічністю. Цій "гідроенергетиці", як вони її називають, будуть навчати всіх ведмедів, і, сподіваємось, вона принесе певну користь нашій промисловості в майбутньому."

 PLB_combined_industrial_ability:0 "Кузня, якої ще ніколи не бачили"
 PLB_combined_industrial_ability_desc:0 "Кузні у Вессландії сучасні, порівняно з нашими, але також фрагментовані. Відсутність координації між ними зрештою робить багато з них неактуальними або непридатними для використання в більших масштабах. Але якби нам вдалося об'єднати їх всі в одне ціле, створити масивний набір кузень, небачених раніше ведмедями, ми могли б нарешті отримати вигоду від їхньої великої популяції."

 PLB_open_up_wesslandian_mines:0 "Більше грифонів у шахтах"
 PLB_open_up_wesslandian_mines_desc:0 "У Вессландії є багато невикористаного потенціалу у вигляді їхніх шахт, численних ресурсів, на яких просто не вистачає урсинів для роботи. Отже, просте рішення - відправити туди грифонів з їхньої касти рабів замість них. Вони будуватимуть дороги і видобуватимуть руду, яка стане основою нашої могутності, як легка і численна робоча сила."

 PLB_armour_up_falsen_ships:0 "Броня на фальшивих ковчегах"
 PLB_armour_up_falsen_ships_desc:0 "Кораблі Фальсена мають потенціал, але їхня броня та озброєння просто смішні у порівнянні з іншими сучасними кораблями. Але якщо у них не було ресурсів, щоб виправити цю проблему, то у нас вони є. Зі сталлю та овечою силою ці човни стануть гордістю нового флоту, якого всі істоти навчаться поважати і боятися."

 PLB_triple_farm_unification:0 "Завод через тундру і тайгу"
 PLB_triple_farm_unification_desc:0 "Ферми трьох кланів неефективні і ледве можуть прогодувати власних овець. Їх потрібно об'єднати, як ми об'єднали їхні кузні, об'єднати і розширити, щоб виробляти більше їжі, яку ми споживаємо. Більше їжі означає більше їжаків і, що важливіше, більше потенційних воїнів, готових вбивати і вмирати в славній битві."

 PLB_naval_tech_into_land_armour:0 "Спустити ковчеги на сушу"
 PLB_naval_tech_into_land_armour_desc:0 "Не всі човни Фальсена точно придатні для плавання, навіть з бронею. Але в процесі їх переобладнання ми помітили, що вони мають разючу схожість з броньованими наземними транспортними засобами, які використовують інші. Можливо, з невеликим доопрацюванням для використання на суші, а не на морі, ці творіння все ще можуть бути корисними."

 PLB_the_great_weslandian_army:0 "Велика вессландська армія"
 PLB_the_great_weslandian_army_desc:0 "Одна річ, яку вессландці безумовно мають - це кількість. Завдяки своїм процвітаючим землям, за чисельністю населення вони переважають багато інших кланів. І з нашим керівництвом і наглядом ця орда білих ведмедів може перетворитися на щось більше, ніж те, що ми раніше перемогли під час Другого Об'єднання. На армію чисельністю та майстерністю, на справжню силу, з якою треба рахуватися."

 PLB_weslandian_industrialization:0 "Індустріалізація Вессландії"
 PLB_weslandian_industrialization_desc:0 "Ми досягли значного прогресу у Вессландії. Із землі вічного конфлікту між кланами вона перетворилася на один з наших найсильніших регіонів, як з точки зору ведмедів, так і з точки зору виробництва. Настільки, що, можливо, вся наша країна виграє від їхньої модернізації. Зрештою, тепер ми всі разом у цьому новому світі, на краще чи на гірше."

 PLB_her_right_to_rule:0 "Її право керувати"
 PLB_her_right_to_rule_desc:0 "Незважаючи на свої попередні ідеологічні переконання про слабкість еквестрійців, Ейра залишається найсильнішою у своєму клані і тому все ще зберігає право правити, як і її титул "принцеса." Однак поразка від лап Торбена, схоже, щось у ній сколихнула. Можливо, дух воїна, який залишився у Вольсунґрі, залишився і в Ейрі?"

 PLB_leave_it_untouched_by_civilization:0 "Дикі землі не будуть зіпсовані"
 PLB_leave_it_untouched_by_civilization_desc:0 "Одним з ключових непорушних принципів Вольсунґру було збереження природного стану Півночі. І це правильно: дика природа і звірі є такою ж частиною цієї землі, як і ми. Вони повинні бути збережені, недоторкані наступом "цивілізації", яка прийшла навіть сюди, щоб нагадувати нам про те, якими вони були колись і якими вони повинні залишитися."

 PLB_nothing_to_be_wasted:0 "Ніщо не повинно бути змарнованим"
 PLB_nothing_to_be_wasted_desc:0 "Зважаючи на стан наших земель, ми не можемо дозволити, щоб щось було змарновано. Кожен шматок металу, кожен шматок брухту повинен бути використаний якнайкраще. Ми ніколи не будемо бідувати, якщо ніколи не будемо марнувати ресурси, дані нам як захисникам північних земель."

 PLB_machines_under_the_mountain:0 "Великий Вольсунґр"
 PLB_machines_under_the_mountain_desc:0 "Вольсунґр, навіть попри всі події минулого, все ще залишається великим кланом, і з ним нелегко жартувати. Вони прийшли з серйозним проханням: дозволити їм поширювати знання, які вони здобули за роки вигнання, серед інших ведмежих кланів і навчати їх власним знанням. Торбен може не погоджуватися з цим або з джерелами їхніх знань, але заради збереження миру необхідно піти на деякі поступки."

 PLB_great_hunters:0 "Зібрати великих мисливців"
 PLB_great_hunters_desc:0 "Нануки - дивний тип воїнів, якщо говорити в найлегшому сенсі. Вони ніколи не використовували традиційні бойові сокири, такі як пансербйорн, і були більш пристосовані для боротьби з гірськими чудовиськами, ніж для чогось іншого. Але те, що вони робили, вони робили з жорстокістю, яка вражає навіть свартпелів, і їхні мисливці, можливо, навіть зможуть навчити нас їхніх способів, якими б нетрадиційними вони не були."

 PLB_iron_behemoths:0 "Кувати залізних бегемотів"
 PLB_iron_behemoths_desc:0 "Танки. Більш броньовані, ніж навіть найважчий панцербйорн, з сильнішою зброєю, ніж навіть найбільша сокира. Найбільші з цих знарядь вражають навіть їжаків, і ми мусимо накласти на них лапи. Ці залізні бегемоти створять нову форму нашої армії, нові обладунки зі старих."

 PLB_equality_through_military_methods:0 "Проголосити рівність через силу"
 PLB_equality_through_military_methods_desc:0 "Вілпи ніколи не користувалися особливою повагою в кланах через те, що не приносять користі в суспільстві. Вони слабкі, нездатні бути воїнами. Але це змінюється, адже тепер тільки вони, маючи невеликі розміри, здатні використовувати нові танки та зброю, які ми створили. Сила виявилася ефективним засобом досягнення рівності, і коли діти воюють пліч-о-пліч з воїнами в їхніх танках, ця рівність нарешті досягнута."

 PLB_foreign_sciences:0 "Сила іноземних наук"
 PLB_foreign_sciences_desc:0 "Це може бути неправильно і нестерпно, але жодна розумна свиня не може заперечувати, що іноземний вплив і Вольсунґр зараз майже переплетені як одне ціле. І тому ми повинні поважати культуру цього клану як частину нашої культури. Вони можуть багато чого запропонувати, навчаючи нас чужому досвіду, і ми неохоче приймемо це, щоб зберегти наші клани єдиним цілим."

 PLB_question_of_freedom:0 "Питання ієрархії"
 PLB_question_of_freedom_desc:0 "Виникло питання, пов'язане з вессландцями, яке ми повинні вирішити особисто. Багато ведмедів, і серед них головний Вольсунґр, вважають, що вессландцям не можна довіряти керувати собою, і вони повинні стати на коліно перед іншими, в даному випадку перед принцесою Ейрою. Вони наводять переконливі аргументи, але дозволити одному клану домінувати над іншими суперечить традиційним зв'язкам між тираном і підлеглими, а також нашій ідеї єдності. Тим не менш, вибір має бути зроблений..."

 PLB_support_wesslandians:0 "Вессландці - самі собі господарі"
 PLB_support_wesslandians_desc:0 "Клани Вессландії все ще є ведмедями, а отже, заслуговують на право на самостійність. Вони можуть бути дивними, а їхні ідеї образливими для багатьох ведмедів, але це не означає, що вони не заслуговують на те, щоб їхня думка була почута. Вони матимуть право голосу, як і будь-який клан."

 PLB_digging_deep:0 "Стільки ще не досліджено"
 PLB_digging_deep_desc:0 "Під нами все ще лежить величезна кількість ресурсів, до яких нам просто не вистачає засобів, сталі та заліза, які лежать просто за межами нашої досяжності. Вессландці знають це, і їхні експерименти з новими методами використання цих дорогоцінних матеріалів за будь-яку ціну повинні бути використані в усіх кланах, щоб ми всі могли стати сильнішими."

 PLB_taming_the_wild:0 "Приборкання дикої природи"
 PLB_taming_the_wild_desc:0 "Наша земля - дика, наповнена звірами та чудовиськами, з якими ми щодня боремося на Півночі. Дикі землі тепер слугують лише стримуючим фактором, перешкодою на шляху до прогресу і панування людини. Ми приборкали лід, ми приборкали сніг, і ми приборкаємо все, що стоїть на нашому шляху, незважаючи на ціну!"

 PLB_support_volsungr:0 "Принцеса стоїть вище будь-якого володаря"
 PLB_support_volsungr_desc:0 "Меншими керують великі. Такий закон дикої природи, і так воно і залишиться. Вольсунґр, як великий клан, буде панувати над землями Вессландії і тримати їх у покорі. Ейра може бути дивною, але вона здібний лідер; вона все ще знає свої обов'язки і правила урсинів."

 PLB_the_great_wilds:0 "Розширити Великі Дикі землі"
 PLB_the_great_wilds_desc:0 "Дикі землі - чарівне місце, особливо так далеко на півночі. Однак, протягом багатьох років вони були відсунуті назад вессландцями та їх сучасністю, їх кастою грифонів, які використовують все більше і більше для своєї індустрії. Це потрібно змінити, розширити дикі землі, а не зменшити, щоб ми могли вивчати їх і, можливо, вчитися у них і їхніх методів захисту."

 PLB_beast_legions:0 "Створити легіони звірів"
 PLB_beast_legions_desc:0 "Звірі нашої землі можуть бути дикими і лютими, але і ми теж. Всі істоти тут об'єднані полярним духом, і як істоти холоду і льоду. Їх можна використовувати, їх можна приручити, і вони приєднаються до наших військ і легіонів як власні воїни, об'єднані в захисті нашого дому!"

 PLB_the_warlord_triad:0 "Тріада воєначальників"
 PLB_the_warlord_triad_desc:0 "Кейн, Ґотлунґ і Розенкранц. Три клани, що складають територію Онлартіру, і одні з найбільш диких і войовничих ведмедів серед усіх. Ці три воєначальники нечисленні, але сильні своєю могутністю; завдяки їм нам може бути відкрито багато чого про війну."

 PLB_kane_gun_research:0 "Вчитися у зброярів Кейна"
 PLB_kane_gun_research_desc:0 "Клан Кейн був найбільш прямолінійним з кланів у бою. Вони б'ються прямо, як колись ведмеді, з могутніми панцербйорнами та вараксами в кігтях. Але вони також досліджували сучасну зброю протягом останніх років правління Уеллінгтона, зброярі експериментували, використовуючи знання минулого. Вони можуть навчити нас своїм новим методам у кузнях."

 PLB_gotlung_support_research:0 "Запросити старійшин Ґотлунґів до викладання"
 PLB_gotlung_support_research_desc:0 "Клан Ґотлунґ завжди вірив у більш оборонний менталітет, ніж інші ведмеді. Можливо, це не найпочесніший підхід, але він має свої переваги. Одна з них полягає в тому, що з таким менталітетом прийшло навчання бою, яке пройшло повз простих фронтових воїнів. Помічники, які копають окопи, які розвідують ворога перед славною битвою... вони будуть вчителями, а ми - їхніми найновішими учнями."

 PLB_assist_in_building_new_smithies:0 "Допомогти Великим ковалям Онлартіру"
 PLB_assist_in_building_new_smithies_desc:0 "Серед воїнських кланів Онлартіру є великі ковалі, майстерність і талант яких не має собі рівних. Навіть багато хто з простих ведмедів-воїнів мають неабиякі здібності в ковальському мистецтві. Адже нескінченні війни в цьому регіоні навчили їх створювати ремісничу майстерність, здавалося б, з нічого. Для розширення виробництва їм просто потрібні більші кузні, і це можна легко забезпечити."

 PLB_rozenkrantz_magic_research:0 "Майстер магії Розенкранців"
 PLB_rozenkrantz_magic_research_desc:0 "Клан Розенкранц - єдиний клан, який досі живе і знає таємниці керованої магії білих ведмедів. І хоча це їхня велика традиція, яка повинна зберегтися, ми подбаємо про те, щоб поширити деякі з цих уроків по всьому нашому королівству. Щоб навіть у найтемніші дні та у випадках знищення кланів, таємниці магії білих ведмедів не зникли."

 PLB_shaman_legions:0 "Зібрати шаманські оркестри"
 PLB_shaman_legions_desc:0 "Магія сильна в клані Розенкранц, настільки сильна, що кожен воїн, який очолює загін, зазвичай є шаманом певного рангу, а його таємна сила зростає з підвищенням посади. Ми не повинні допустити, щоб ця таємна сила зникла, як крапля крові в океані! Тому шаманські загони повинні формувати свої власні підрозділи на підтримку більших загонів і великих воїнів!"

 PLB_frozen_magic:0 "Вдивитися у північне сяйво"
 PLB_frozen_magic_desc:0 "Колись тільки легендарні шамани могли вдивлятися в Північне Сяйво, сяючу душу Всебатька. Але щось змінилося. Тепер незліченна кількість шаманів може вдивлятися у велике світло і творити великі дива! Бо їхній помах тепер зшиває плоть, їхній дотик відроджує пошкоджений розум, а їхні очі вдивляються в тумани минулих часів і тумани майбутнього, бачачи все!"

 PLB_doctrines_of_legend:0 "Уроки з минулого"
 PLB_doctrines_of_legend_desc:0 "У великих архівах кланів воїнів, особливо в стародавній фортеці клану Ґотлунґів, можна знайти уроки з мільйона воєн. Дурні на нашому заході та сході стверджують, що тільки доктрини сучасності мають значення. Але який великий полководець не знає своєї історії? Саме з воєн минулого ми будемо вчитися і величчю давньої мудрості зламаємо наших ворогів!"

 PLB_onlandir_military_university:0 "Уроки з майбутнього"
 PLB_onlandir_military_university_desc:0 "Як ми вчилися в минулому, ми можемо вчитися і в майбутньому. Але не з того майбутнього, яке проголошують чейнджлінґи чи грифони. Ні! Ми не будемо просто копіювати їхню механічну одержимість! Ми вдивлятимемося в небеса і мрії самого Всебатька, щоб дізнатися, яка велич і досягнення чекають на наш рід у майбутньому!"

 PLB_his_divine_right:0 "Його Божественне право"
 PLB_his_divine_right_desc:0 "Йоріс відмовився від більшості своїх безглуздих натхнень, які він підхопив за морями, і повернувся до того, чим колись був його рід - побожними послідовниками Всебатька. Тепер він посилається не лише на силу зброї, але й на божественне право, щоб виправдати свою владу. Хм... Мабуть, не все, чого навчилися у грифонів, було відкинуто..."

 PLB_artillery_lessons_from_empire:0 "Уроки імперської артилерії"
 PLB_artillery_lessons_from_empire_desc:0 "Імперія Грифонів слабка і жалюгідна, їхня держава безперервно падає в яму протягом майже 50 років. Очевидно, що вони втратили свій божественно даний мандат. Однак їхні армії все ще розсувають межі військових технологій з такою силою, що навіть у Нова-Грифонії та Ведіні відчуваються хвилі! Ми будемо вчитися на цьому і ставати сильнішими!"

 PLB_adopt_a_new_approach:0 "Більш відповідний підхід"
 PLB_adopt_a_new_approach_desc:0 "Мати єдину віру не є традиційним для ведмедів. Проте Йоріс наполягає на тому, що такий підхід необхідний. Адже навіть якщо ми прагнемо зберегти важливість кланових традицій, потрібен об'єднуючий елемент, а приналежність до однієї раси раніше не зупиняла ведмежі війни. Можливо, в таких ідеях є сенс..."

 PLB_spread_out_griffon_blueprints:0 "Розкласти креслення грифона"
 PLB_spread_out_griffon_blueprints_desc:0 "З великим соромом мусимо визнати, що здатність кожного ведмедя виготовляти власне спорядження відстає. На жаль, більшість ведмедів не розуміють принципів роботи сучасної зброї. Тому креслення, ганебно куплені у грифонів, будуть розповсюджені, бо навіть якщо ведмеді не можуть винайти таку зброю, вони все одно можуть її виготовити та обслуговувати."

 PLB_the_holy_legions:0 "Вірні Фенріру"
 PLB_the_holy_legions_desc:0 "Фенрір - міфічний великий вовк, який підносився над драконами і правив великим королівством десь на сході. Навіть після того, як він став міфом, є багато ведмедів, які поклоняються звіру як покровителю війни. Ми організуємо їх у святий орден - явище, якого ніколи раніше не бачили серед ведмедів, щоб ці вірні могли разом співати хвалу своєму покровителю на полі бою."

 PLB_most_divine_industries:0 "Галлінбурстська промисловість"
 PLB_most_divine_industries_desc:0 "У міфах вессландців розповідається, що ведмеді навчилися копати метали і кувати їх від великого кабана - Галлінбурсті. Зазвичай йому не поклоняються, але дехто з безкланових ведмедів молиться йому про благословення у ресурсах чи теплі кузні. Можливо, такий культ можна було б реформувати у щось належним чином організоване, навіть якщо він залишиться лише серед безкланових."

 PLB_all_fathers_champion:0 "Чемпіон усіх Отців"
 PLB_all_fathers_champion_desc:0 "Йоріс не повинен бути схожим на поні чи грифонів, які гниють в оточенні розкоші в палацах, в той час як їхні вірні вмирають за своїх володарів нагорі. Ні! Той, хто стоїть лише нижче Всевишнього, буде першим на полі бою і останнім відступить! І нехай поле битви лунає від ревіння вірних!"

 PLB_divine_enlightenment:0 "Божественне просвітлення"
 PLB_divine_enlightenment_desc:0 "Дехто за морем, у далекій Грифонії, вважає, що віру і прогрес неможливо поєднати. Але це неправда. Бо всі досягнення походять від фундаменту. А найбільший з усіх фундаментів - це віра! Бо що інше, як не віра, прагне зрозуміти світ до кінця, навіть якщо пояснити рішення істот, набагато вищих за нас?"

 PLB_eastern_key_lake_debacle:0 "Зіткнення на Сході"
 PLB_eastern_key_lake_debacle_desc:0 "Ключ-озеро колись належало Йорісу та його клану, бо вони здобули його за правом зброї, розгромивши клани, що мешкали там, і вигнавши їх. Однак їхня ганебна поразка навіть на прабатьківських землях Скюфлінґів змусила воєначальників Онлартіра вважати, що це право слід оскаржити. І саме деспоту Торбену належить вирішити, хто має рацію."

 PLB_scyfling_key_lake:0 "Озеро належить Йорісу"
 PLB_scyfling_key_lake_desc:0 "Це був Йоріс, який розгромив клани, що об'єдналися з Чейнджлінґами. Саме Йоріс вигнав їх у прокляті землі навколо Соріфа. І саме Йоріс очолює Великий Клан. Навіть якщо хаос Другої Об'єднавчої війни на деякий час позбавив їх можливості утримувати ці землі, це їхнє законне завоювання!"

 PLB_crystal_extraction_near_key_lake:0 "Багатства Ключ-озера"
 PLB_crystal_extraction_near_key_lake_desc:0 "Більшість ведмедів не мають жодної цінності для ресурсів навколо Ключ-озера. Адже ці землі багаті на кристали та золото - слабкі матеріали. Однак Йоріс провів час з грифонами і дізнався, чому вони цінують ці ресурси. Саме тому він має використати ці багатства задля величі ведмедів."

 PLB_channel_key_lake_magic_through_worship:0 "Потенціал Ключ-озера"
 PLB_channel_key_lake_magic_through_worship_desc:0 "Кажуть, що по той бік Ключ-озера Чейнджлінґи Соріфа експериментують з чарами, щоб стати сильнішими. Ми теж прагнемо більшої сили, але не тієї, якої ніколи не було, а лише повернення того, що належить нам по праву. Йоріс стверджує, що таємнича міць Ключ-озера допоможе нам у цьому."

 PLB_warlord_key_lake:0 "Озеру потрібні нові господарі"
 PLB_warlord_key_lake_desc:0 "Йоріс, можливо, захопив Ключове озеро шляхом завоювання. І він може бути добрим другом Торбена. Однак він, на жаль, виявився нездатним правити за межами своїх земель. Ключ-озеру потрібні нові господарі. Клани Онлартіра, можливо, не найамбітніші та не найфантастичніші правителі, але, можливо, це саме те, що потрібно цьому регіону."

 PLB_take_back_former_clan_remnants:0 "Нові воєначальники повстають"
 PLB_take_back_former_clan_remnants_desc:0 "Кочівників і безкланових ведмедів багато, як у нашому королівстві, так і за озером, але їм бракує великих лідерів, які б їх об'єднали і надихнули. Клани Онлартір мають великих воїнів. Ці великі воїни будуть послані, щоб захопити ці групи і привести їх до Ключового озера. Сподіваюся, з цього постане велич."

 PLB_great_hosts_of_key_lake:0 "Господарі Ключ-озера"
 PLB_great_hosts_of_key_lake_desc:0 "Поєднання безкланової та кочової дикості разом з давніми воїнськими традиціями Онлартіра вилилося у щось величне. Нові армії зростають на Ключ-озера, поєднання досвіду призводить до нового розуміння війни. Ми навіть плануємо йти на захід, поки не дійдемо до моря, і, можливо, одного дня так і станеться!"

 PLB_supreme_lord_of_lesser_clans:0 "Перший серед рівних"
 PLB_supreme_lord_of_lesser_clans_desc:0 "Це була радикальна зміна, як не дивно, для такого воїна традицій. Але Торбен викував нову систему, де не буде великих кланів, що панують над меншими і нав'язують чужі порядки. Усі клани тепер будуть рівними між собою, але об'єднані як брати. На мільйон років довше!"

 PLB_further_militarize_eastern_key_lake:0 "Спадщина Кристальних Королів"
 PLB_further_militarize_eastern_key_lake_desc:0 "Клан Розенверд був вигнаний, їхня спадщина знищена, а все, що залишилося, змито воєначальниками Онлартіру. І нехай хтось скаже, що вони на це заслужили. Але залишилася спадщина, якою ми можемо користуватися без сорому. Бо фундаменти їхніх фортець ще тримаються. Їх можна відбудувати, очистити і спрямувати на нашого справжнього ворога, а не на інших урвищ."

 PLB_drive_changelings_back:0 "Вигнати чейнджлінґів назад"
 PLB_drive_changelings_back_desc:0 "Тисячоліттями загарбницький рій топив наші землі, повільно витісняючи нашу цивілізацію. Цей огидний рій наважився навіть сіяти конфлікти між нашими родами. Такі дії більше не будуть терпіти! Список історичних злочинів довгий і великий, але прийшов час для суду!"

 PLB_they_get_what_they_deserve:0 "Поставити чейнджлінґів на місце"
 PLB_they_get_what_they_deserve_desc:0 "Як би не палали наші серця бажанням, ми не можемо просто зіштовхнути всю расу чейнджлінґів у море, на яке вони заслуговують. Їх занадто багато, а нас занадто мало. Тому їх треба підкорити і змусити підкоритися тому, хто знає їхню точку зламу - Мідасу Вигнанцю. Хоч він і не найнадійніший ведмідь, але ми повинні визнати його компетентність у таких питаннях."

 PLB_key_lake_was_always_ours:0 "Північ завжди була нашою"
 PLB_key_lake_was_always_our_desc:0 "Чейнджлінґи туляться у своїх величезних вуликах, які ледве покривають величезні простори землі. У своїй зарозумілості вони претендували на контроль над горами, пустирями та лісами. Але ці землі завжди залишалися мисливськими угіддями диких ведмежих кланів. Правда, яку змушені будуть визнати Чейнджлінґи, полягає в тому, що вони ніколи не були господарями Півночі, бо вона завжди була в пазурах урсинів!"

 PLB_spread_out_bears_across_conquered_lands:0 "Мігрувати через "новий" кордон"
 PLB_spread_out_bears_across_conquered_lands_desc:0 "Колись писали, що на цих землях, які Нова-Грифонія з гордістю називають своїми, було велике королівство ведмедів. Від цієї спадщини майже нічого не залишилося, але вона не втрачена! Ми пошлемо воїнів, щоб відвоювати те, що від неї залишилося, і не допустити, щоб наше законне повернення не було відсунуте назад!"

 PLB_move_in_griffon_labourers:0 "Розширити Вессландську систему"
 PLB_move_in_griffon_labourers_desc:0 "Вессландською системою можна легко зловживати, а ведмежа еліта слабшає і занепадає. Проте є робота, до якої не варто залучати навіть ведмежат. Тому ми переселимо нещасних грифонів із завойованих земель на Північ, щоб вони могли працювати в шахтах і на бульбових полях так, як це дозволено ведмедям, що вміють битися!"

 PLB_the_claws_tighten:0 "Кігті стискаються"
 PLB_the_claws_tighten_desc:0 "Ми винищили найбільш настирливих і стійких стихій. Ми відбудували стародавні фортеці, спираючись на великі історичні описи. Ми переконали місцевих яків приєднатися до наших армій на знак братньої підтримки. Навіть клани, які колись вважалися втраченими для анналів історії, були повернуті, оскільки багато наших воїнів прийняли їхні символи і традиції! Вони більше не будуть втрачені для узурпаторів!"

 PLB_break_off_the_less_stable_parts:0 "Дати ведмедям власний ігровий майданчик"
 PLB_break_off_the_less_stable_parts_desc:0 "Під час наших воєн багато ведмедів билися з великою силою і хоробрістю. Така велич має бути винагороджена! Тому ми даруємо їм землі на сході, на які ведмеді не мають права в історії, щоб вони могли кувати власні роди і досягти власної величі! І, можливо, з часом вони перетворять цю кипучу масу грифонських негідників на щось більше."

 PLB_modernize_polaria:0 "Велика полярна модернізація"
 PLB_modernize_polaria_desc:0 "Є багато військових трофеїв від нашого підкорення Нова-Гриффонії, багато з них технологічні, бо наші воїни шукали не багатства чи золото, а сталь і ревучі серця заводів. Тепер, коли наші воїни повертаються на батьківщину, вони привозять з собою ці машини та матеріали. І з ними ми, можливо, зможемо проштовхнути себе в нову еру зоряної сталі!"

 PLB_fuel_polaria:0 "Залізо по крові"
 PLB_fuel_polaria_desc:0 "Схоже, що негідники-грифони не сприйняли належним чином правління своїх природних зверхників, бо чинять опір владі Совиних Ведмедів, яких, навіть з постійно зростаючими рядами, занадто мало, щоб вистежити їх усіх. Отже, укладено угоду. Ми надішлемо загони, щоб допомогти розбити цих повстанців, а багаті східні землі завжди будуть готові надіслати матеріали, якщо нам колись не вистачатиме."

 PLB_supremacy_of_naturality:0 "Володар дикого полювання"
 PLB_supremacy_of_naturality_desc:0 "Народжений від найхолоднішого зимового вітру...\n\nБлагословенний первісними звірами...\n\nСкорочений під грізними бурями..."

 PLB_iron_and_will:0 "Залізо і воля"
 PLB_iron_and_will_desc:0 "У нашому королівстві зростає велика повага до тих, хто воює не як Пансербйорн, а як екіпажі танків. Адже ці ведмежата - всього лише дитинчата, які піднялися далеко за межі свого місця і проявили справжній воїнський дух, пілотуючи машини, що можуть зрівнятися з драконами. Сама Ейра дуже радіє таким змінам у ведмежому суспільстві і пообіцяла, що ресурси її клану будуть спрямовані на подальшу допомогу більш войовничим ведмежатам."

 PLB_another_look_at_equestrian_system:0 "Гармонія хижаків"
 PLB_another_look_at_equestrian_system_desc:0 "Темна ніч непросвітленого існування закінчується. Бо істина сяє перед нами! Істинна гармонія просто недосяжна, коли відповідальні є простими травоїдними тваринами. Єдиний шлях до істинної гармонії - під владою хижаків і чудовиськ. Бо ніяка слабкість чи страх не можуть втримати ідеологію істот, які стоять на вершині харчового ланцюгу!"

 PLB_an_another_path:0 "Назустріч іншому майбутньому"
 PLB_an_another_path_desc:0 "Машини ревуть і випльовують темний смог. Їхнє виробництво забруднює землю. Можливо, ми спробували занадто багато... Але ще не пізно! Можливо, хтось скаже, що неможливо продовжувати розвивати науку і виробництво, не шкодячи природі. Але їм бракує волі та глибини розуміння справжніх законів світу, і нам шкода їхнього неглибокого розуму."

 PLB_united_with_the_wilds:0 "Об'єднані з дикою природою"
 PLB_united_with_the_wilds_desc:0 "Всім ведмедям відомо, що колись ми були ближче до дикого і неприборканого світу. Ми були ніби втіленням дикої землі і блукали безкраїми просторами разом з чудовиськами. На жаль, ми не можемо повернутися в ту епоху в цьому проклятому світі. Однак, рухаючись вперед, ми повинні подбати про те, щоб цей аспект нашого минулого ніколи не був забутий!"

 PLB_protect_the_weaklings:0 "Захистити слабких"
 PLB_protect_the_weaklings_desc:0 "Чи є людина по-справжньому сильною, якщо вона абсурдно знущається з тих, хто стоїть нижче неї? Можливо, дивно, що нам знадобилося так багато часу, щоб це зрозуміти, але ні. Немає справжньої сили в тому, щоб принижувати тих, хто набагато нижче нас. Можливо, ми вчинили великий гріх, піддавшись таким імпульсам раніше і дозволивши кланам знущатися над немовлятами, кріпаками та рабами-грифонами. Але більше цього не буде! Слабкі будуть захищені від зла і страждань світу назавжди!"

 PLB_exalt_the_greats:0 "Величати великих"
 PLB_exalt_the_greats_desc:0 "Не всі є слабкими і нездатними впоратися з жахіттями світу, звичайно, серед людей завжди є великі створіння, ті, що сміються в обличчя негараздам і протиставляють жахіттям світу свою власну силу. Наша армія буде викувана з таких великих воїнів і чемпіонів, нагадуючи про великі дні Епохи Зоряної Сталі. Можливо, це обмежить нашу чисельність, але що може бути гірше для урсина, який є справді великим?"

 PLB_they_will_all_be_citizens:0 "Вони всі будуть громадянами"
 PLB_they_will_all_be_citizens_desc:0 "На наших нещодавно завойованих землях незліченна кількість істот існує у проміжному стані, не вважаючись громадянами, але вочевидь будучи частиною нашого королівства. Так не повинно тривати далі. Ці народи мають бути інтегровані в клани як повноправні члени, щоб забезпечити їм основні права та захист. Хоча, якщо вони хочуть піднятися вище, ніж просто робітники, їм доведеться дряпатися вгору власними силами."

 PLB_and_rejoice_in_a_natural_society:0 "І радіти в природному суспільстві"
 PLB_and_rejoice_in_a_natural_society_desc:0 "Не через бажання гнобити ми нав'язуємо бачення суспільства, яке є ієрархічним, заснованим на силі тіла і розуму. Ми просто показуємо тим, хто живе в нашому царстві, і світові, що є справді природним і, можливо, навіть справді гармонійним. Бо що може бути більш гармонійним, ніж те, як влаштована сама природа? І коли всі, хто перебуває в нашому царстві, зрозуміють це, вони будуть радіти красі природи."

 PLB_but_our_work_is_not_done_yet:0 "Але наша робота ще не закінчена"
 PLB_but_our_work_is_not_done_yet_desc:0 "Ми зайняли багато землі і показали незліченній кількості створінь істини світу і природного існування. Проте було б зарозуміло стверджувати, що наша робота виконана. Бо якщо ми справді прагнемо добра для всіх, то більше світів, більше створінь повинні дізнатися правду про світ!"

 PLB_anker_stabilization:0 "Стабілізація Великого Анкера"
 PLB_anker_stabilization_desc:0 "Клан Анкер значно розширився. Проте зараз у ньому так мало ведмедів, що вони не можуть керувати такою великою кількістю інших. Отже, доведеться створити систему для утримання такого царства, засновану на стародавніх знаннях про королів-монстрів, які правили царствами не-ведмедів. Можливо, клан навіть доведеться розширювати, залучаючи до нього ведмедів без клану... Чого б це не коштувало, клан Анкер буде існувати на цих землях вічно!"

 PLB_better_life_for_scientists:0 "Обіцянки пташиним вченим"
 PLB_better_life_for_scientists_desc:0 "Більшість грифонів на нещодавно підкорених землях - жалюгідні слабаки, які в кращому випадку годяться лише на роль кріпаків. Проте деякі з них володіють неабияким інтелектом та досвідом. Здебільшого вони фізично слабкі і тому не заслуговують на звання Совиного Ведмедя, але нам потрібен їхній розум... Можливо, тих, хто має великий інтелект або потенціал до нього, можна було б звільнити від рабства. Звичайно, якщо вони будуть працювати на нашу велич."

 PLB_supremacy_of_faith:0 "Улюблений син"
 PLB_supremacy_of_faith_desc:0 "Царство білих ведмедів тепер є землею віри. Земля, де, незважаючи на відмінності в кланах, ідеологіях та лідерах, поклоніння Всебатьку об'єднує всіх під єдиним прапором. Великий обов'язок чекає на ведмежий рід у цю нову епоху віри. Завоювання, подібного якому не було! І з волі Всебатька ведмеді під проводом Торбена з клану Свартпельсів досягнуть успіху!"

 PLB_raise_great_fleets:0 "Інвестуйте у великий флот"
 PLB_raise_great_fleets_desc:0 "Ми не можемо просто пройти морем, щоб дістатися до наших ворогів, як би нам цього не хотілося. Якщо ми прагнемо перетнути замерзлі моря, щоб завдати удару по ворогу, нам потрібен флот, бо флотів кланів Анкер і Фальсен буде недостатньо для такої справи. Нам потрібен справжній флот, гідний імперії вірних!"

 PLB_across_the_great_ocean:0 "Перетнути Скелясте море"
 PLB_across_the_great_ocean_desc:0 "Гаукленд - острів слабаків і злочинців. Але він має дуже вдалу позицію, щоб слугувати відправною точкою для нанесення повного удару по Грифонії. Тож ми захопимо його! Найманці та пірати, що його захищають, не зможуть стримати велику армію вірних ведмедів!"

 PLB_divine_forges_of_scyfling:0 "Благословити кузні"
 PLB_divine_forges_of_scyfling_desc:0 "Маючи перед собою велику божественну мету, ми йдемо вперед! Зі святим благословенням наші ковалі стають дедалі сильнішими! Наші кузні стають все яскравішими і гарячішими! Наші мануфактури ревуть, виробляючи дедалі гучніше! І всі вірні співають у повітря, як з благословення Всевишнього ми шліфуємо сучасність, щоб відповідати нашому ворогові!"

 PLB_let_the_cannons_roar_ever_louder:0 "І нехай гармати ревуть дедалі голосніше"
 PLB_let_the_cannons_roar_ever_louder_desc:0 "У Грифонії іноді говорили, що гуркіт гармат - це оркестр для їхнього бога війни - Арктурія. Чи наш бог гірший? Хіба наші легендарні створіння, що викували нашу землю, не варті таких войовничих похвал? Звісно, гідні! І тому гармати будуть гриміти все голосніше, несучи смерть ворогові!"

 PLB_a_realm_of_faith_and_science:0 "Царство благословенної науки"
 PLB_a_realm_of_faith_and_science_desc:0 "Серед грифонів і поні існує дивне і жалюгідне переконання, що віра заважає людині прагнути пізнати істини світу і оволодіти ними. Але для якої іншої мети Всевишній дав би нам розум, як не для того, щоб ми зрозуміли велич цього світу і наше призначення в ньому?"

 PLB_master_the_physical_world:0 "Оволодіння магічним світом"
 PLB_master_the_physical_world_desc:0 "Ведмеді існували між фізичним і магічним світом ще до того, як світ став справжнім. Навіть зараз ми підтримуємо тісний зв'язок з обома цими сферами. Проте магічне вислизало від нас, бо наша магія хаотична і неприборкана. До цього часу! Навіть якщо наразі це лише бліда імітація, ми нарешті здатні наносити удари кігтями, духом, а тепер і магією!"

 PLB_gather_faithful_from_across_the_world:0 "Ми всі Його благословенні діти"
 PLB_gather_faithful_from_across_the_world_desc:0 "Безперечно, що не тільки ведмеді володіють застиглими духами зими, адже незліченна кількість видів істот, від пінгвінів до яків і навіть особливих грифонів, мають такі душі. Усі ці істоти повинні бути шанованими громадянами в нашому королівстві, бо всі ми явно духовні брати і сестри, наші розумні душі виліплені одним і тим же прабатьком."

 PLB_merge_the_pantheons:0 "Об'єднання пантеонів"
 PLB_merge_the_pantheons_desc:0 "На наших землях з'явився проповідник-ведмідь. Він поширює твердження, що грифони можуть врятуватися від впливу Маару, обійнявши Всебатька, який може подарувати їм душі з льоду. Ми не заперечуємо проти такого поєднання пантеонів, бо в міфах немає нічого такого, що б суперечило. Дехто навіть вважає, що ми повинні заохочувати цю віру, бо вона, здається, дещо втихомирює грифонів, які не є совиними."

 PLB_begin_the_great_crusades:0 "Початок Великого Хрестового Походу"
 PLB_begin_the_great_crusades_desc:0 "Настав час вдарити за моря, щоб тисячократно відплатити за страждання, яких завдали нам єретики-грифони, і донести до них світло Всебатька! Перший наш удар припаде на Ведіну, де на ведмежих вигнанців і чейнджлінґоловів полюють, як на чудовиськ! І нехай до цього великого походу приєднаються всі, хто прийняв істинну віру!"

 PLB_and_we_stand_alone:0 "...І ми стоїмо одні..."
 PLB_and_we_stand_alone_desc:0 "Ми стоїмо вище, землі очищені від проникнення чейнджлінґів і дрібних конфліктів між кланами. Усі білі ведмеді, що залишилися, тепер об'єднані під нашим прапором. Але якою ціною все це далося... Винищені цілі клани, втрачені культури... Але обов'язок залишається!"

 PLB_the_twin_tyrants:0 "Близнюки-деспоти"
 PLB_the_twin_tyrants_desc:0 "Серед уламків, серед смертей, серед руйнувань, серед інфільтрації - По Уеллінгтона, а точніше відроджений Йоріс Скюфлінґ і вірні йому, вистояли. Тепер армії Скюфлінґа і Свартпельса знову об'єднані для єдиної, великої справи!"

 PLB_realizing_the_truth:0 "Усвідомлення істини"
 PLB_realizing_the_truth_desc:0 "Другу війну за об'єднання Йоріс не пережив неушкодженим, адже, схоже, жорстокість і розпад навіть власного клану залишили шрами навіть на цьому титані урсинів! Однак цей досвід дозволив йому усвідомити велику істину, усвідомити навіть гіршу, ніж наші попередні припущення про наше нинішнє становище! Здається, наша боротьба буде набагато більшою, ніж ми могли собі уявити..."

 PLB_weslandians_are_gone_but_fortresses_stand:0 "Вессландці пішли, але фортеці стоять"
 PLB_weslandians_are_gone_but_fortresses_stand_desc:0 "Воєначальники пішли. Їхні, здавалося б, безкінечні орди вилупків і грифонів стерті, як пил. Але їхні фортеці все ще стоять, хоч і порожні. Їх можна звести над нашими кордонами, і вогонь їхніх кузень знову розгориться. Бо схід має бути утриманий від грабіжницької навали."

 PLB_their_griffon_servants_persist_too:0 "Повернути їхніх слуг до роботи"
 PLB_their_griffon_servants_persist_too_desc:0 "Рід грифонів численний і здатний вистояти в найгірші часи. Адже навіть після того, що було зроблено, у Вессландії все ще існують великі популяції цих істот. Їхнім обов'язком раніше була праця на благо ведмедів, і так буде знову!"

 PLB_and_their_arks_can_be_reused:0 "І розібрати їхні ковчеги"
 PLB_and_their_arks_can_be_reused_desc:0 "Флоти вессландців іржавіють у своїх гаванях, бо яка нам від них користь, адже ми навіть не можемо захистити свої кордони на суші! Але ми не дамо їм пропасти! Розібрати їх усі, вирвати гармати для використання на суші, вирвати протиабордажні гармати, а метал, що залишився, перекувати в більш корисні форми!"

 PLB_force_onlantir_to_function:0 "Змусити Онлартір функціонувати"
 PLB_force_onlantir_to_function_desc:0 "Онлартір - це труп. Раніше він був безплідним і порожнім, тепер він лежить мертвий, його плоть згнила, залишивши лише кістки. Але так само, як у давнину кісткам надавали форму обладунків, так і кістяк Онлартіра буде перетворено на щось корисне для нашої великої мети!"

 PLB_a_shell_that_never_breaks:0 "Викувати панцир, який ніколи не зламається"
 PLB_a_shell_that_never_breaks_desc:0 "Лише найсильніші та найстрашніші урсини витримали друге об'єднання. Але таких великих воїнів небагато в порівнянні з розмірами нашого великого королівства. Отже, нам бракує глибини, щоб відступити перед ворогом, та й який справжній ведмідь відступить перед Чейнджлінґом? Ні, ми ніколи не здамося, ніколи не будемо відкинуті назад і ніколи не поступимося ні на дюйм!"

 PLB_overtyrant_of_thunder:0 "Повелитель грому"
 PLB_overtyrant_of_thunder_desc:0 "Після того, як Йоріс, якого грифони називали По, загинув, убитий власним кланом, титул деспота ведмедів тепер належить Торбену. Але він не буде простим деспотом, який мусить боротися з владою кланів, бо жоден клан не витримує... Ні, ми піднімемося вище. Торбен не буде простим деспотом чи тираном, настав час для Овертирана всіх ведмедів!"

 PLB_mourning_and_preparation:0 "Оплакувати і готуватися"
 PLB_mourning_and_preparation_desc:0 "Можливо, Йоріс робив дивні вибори і надихався слабкими ідеалами грифонів, але він все ще був другом Торбена, і деякі з його уроків були не просто філософськими ідеями, а скоріше способами кування кращої і сильнішої зброї, набутої через важкі випробування. Ми не дозволимо їм пропасти даремно."

 PLB_ruins_into_trenches:0 "Переробити руїни на укріплення"
 PLB_ruins_into_trenches_desc:0 "Багато сховищ, чи то ведмедів, що належать кланам, чи то ганебних безкланових ведмедів, було знищено під час війни. Їх неможливо відновити, бо справжній ведмежий барліг - це справа рук кількох поколінь. Але з певною реставрацією вони все ще могли б виконувати функції укріплень і кузень."

 PLB_lessers_into_soldiers:0 "Сформувати менших у бойові групи"
 PLB_lessers_into_soldiers_desc:0 "Покладатися в бою на менших істот - жалюгідна стратегія, яка підходить для кланів без історії та свинячої честі, таких як вессландці. Але остання битва з Чейнджлінґами все ближче, і паща війни вимагає теплої плоті та крові, навіть якщо поля спорожніють, а шахти замовкнуть..."

 PLB_press_more_of_them_into_service:0 "Завжди є потреба в більшому"
 PLB_press_more_of_them_into_service_desc:0 "Наші ряди рідшають, як горді їжаки падають перед нескінченними ордами ворогів. Нам потрібно більше тіл, більше корму, звір війни вимагає більшого! Мавпи, грифони, пінгвіни... Всіх, кого можна знайти і хто може тримати зброю, ми штовхнемо в роззявлену пащу війни!"

 PLB_lessers_into_labour:0 "Примусити менших працювати в майстернях"
 PLB_lessers_into_labour_desc:0 "Нас може бути сто до одного більше, але справжні урсини не бояться ворога, якого більше! Ми зрівняємося з ними і перевершимо їх! Але для таких подвигів потрібна зброя та обладунки, і з роками ведмедям стає дедалі важче підтримувати спорядження поодинці. Добре, що в наших краях багато ведмежат або ледь старших виживають і можуть бути віддані до кузні!"

 PLB_they_work_while_we_fight:0 "Тільки найкращі на полі бою"
 PLB_they_work_while_we_fight_desc:0 "Коли ми усвідомлюємо, наскільки могутній є справжній ведмідь, озброєна плодами сучасності, відчай, який ми відчували раніше, зникає. Можливо, немає потреби у великих арміях. Можливо, кількох справді гідних ведмедів, озброєних належною зброєю, достатньо, щоб розбити навіть найсильніших ворогів!"

 PLB_every_owlbear_will_be_a_soldier:0 "Кожен ведмедик повинен служити"
 PLB_every_owlbear_will_be_a_soldier_desc:0 "Коли справа доходить до фізичної сили, наш рід знаходиться на іншому рівні. Проте в арміях Вессландії можна було зустріти загони виняткових грифонів, які за розміром не поступалися ведмедям - так званих "совиних ведмедів." Це була жалюгідна традиція, навіть якщо ці птахи могли битися з меншими ведмедями, але за нинішньої нерівності чисельності нам потрібен кожен здібний воїн, якого ми можемо отримати. Таким чином, совині ведмеді знову стануть воїнами."

 PLB_loot_the_mountains_for_all_we_can_find:0 "Поховані під горами"
 PLB_loot_the_mountains_for_all_we_can_find_desc:0 "Поховані під горами, наповнені зотлілими кістками своїх захисників, гниють туші стародавніх володарів Вольсунґру. Ми б захопили їх, але щоразу, коли ми намагаємося, з гір спускаються нануки, яким допомагають червоні ведмеді, і витісняють наші загони. Вони можуть залишити собі гниючий труп Вольсунґра, якщо хочуть. Але ми захопимо все, що зможемо, перед відходом!"

 PLB_dismantle_everything_else:0 "Демонтувати все, що ще стоїть"
 PLB_dismantle_everything_else_desc:0 "Труп клану Вольсунґр - не єдина велика туша, яку можна зжерти. Однак ці уламки не охороняються мисливцями на монстрів і божевільними вигнанцями. Їхні кістки вільні для захоплення. І ми захопимо їх! Ми розберемо все дощенту, поки не залишиться нічого, окрім фундаменту, і перекуємо його на зброю та обладунки!"

 PLB_the_golden_lord_returns:0 "Золотий Володар повертається..."
 PLB_the_golden_lord_returns_desc:0 "Звір подивився на наше ослаблене королівство і повернув до нас свою повну люті золоту маску. Ми не можемо зупинити його наступ... Але він прийшов не як завойовник..."

 PLB_followed_by_his_clan:0 "...За ним іде його клан..."
 PLB_followed_by_his_clan_desc:0 "Вони течуть як річка. Великий рух скажених урсинів і розбитих уламків. Невже ми справді викинули так багато тоді?"

 PLB_raising_ancient_fortresses:0 "...Піднімаючи стародавні замки..."
 PLB_raising_ancient_fortresses_desc:0 "Вони піднімають свої фортеці, що стояли тисячоліття до того, як ми зруйнували їх з глибин, за допомогою магії льоду і каменю. Вони наповнюють їх великою зброєю та воїнами. І спрямовують їх на своїх колишніх господарів..."

 PLB_burying_the_past:0 "...Ховаючи минуле..."
 PLB_burying_the_past_desc:0 "Вони ховають свою ненависть, свою злість, своє бажання помсти. Так, ніби між нами нічого не сталося. Ніби не було крові, пролитої між ведмедями... Ніби вони самі ніколи не були рабами божевілля..."

 PLB_and_turning_our_gazes_to_the_future:0 "...І поворот наших поглядів у майбутнє"
 PLB_and_turning_our_gazes_to_the_future_desc:0 "У нас є майбутнє, каже колишній зрадник. У тому, що сталося, є символізм і магія. Ми просто повинні прийняти майбутнє. І минуле, в якому нам відмовили, стане нашим..."

 PLB_not_numbers_spirit:0 "Не числа, а дух"
 PLB_not_numbers_spirit_desc:0 "Що б ми не робили, ми ніколи не зможемо зрівнятися з нескінченними ордами Чейнджлінґів. Ми могли б зібрати кожного ведмедя, здатного тримати зброю, кожного кріпака грифона, кожного пінгвіна, кожне дитинча і кожного старця, але все це - лише крапля в їхньому безмежному океані. Ні, ми повинні зрівнятися з ними не плоттю чи залізом, а непохитним первісним духом!"

 PLB_encased_in_star_steel:0 "Закутий у зоряну сталь"
 PLB_encased_in_star_steel_desc:0 "Зоряна сталь - це матеріал легенд. Зброї та обладунків, виготовлених з неї, залишилося небагато, і навіть найвідчайдушніші та найгордіші клани не бажають використовувати її в бою. Проте Мідас стверджує, що його клан має тих, хто може наслідувати його міць у менш благородних металах. Навіть якщо це буде лише частка, це буде справжня сила..."

 PLB_coat_our_axes_in_the_same:0 "Сокири, викувані з крові зірок"
 PLB_coat_our_axes_in_the_same_desc:0 "У текстах, записаних нашими предками, сказано, що зоряна сталь - це метал, який утворюється у вмираючих серцях зірок. Незважаючи на проголошення Мідаса, його ковалі можуть лише імітувати його силу, а не відтворювати її. Але навіть тоді ця бліда імітація достатньо сильна, щоб розривати і ламати металеві панцирі, в яких ховаються чейнджлінґи!"

 PLB_not_steel_magic:0 "Не сталь, а магія"
 PLB_not_steel_magic_desc:0 "Мідас і клан Розенверд принесли з собою знання про підроблену зоряну сталь для нашої зброї та обладунків. Але не їхня сталь забезпечить нам перемогу. Бо Мідас був вигнаний за те, що шукав темні таємниці урсинської магії, і він збирав ці знання далі у вигнанні. І тепер ці знання - наші!"

 PLB_enahnced_with_cursed_magics:0 "Благословенний хуртовиною"
 PLB_enahnced_with_cursed_magics_desc:0 "У нас немає вчених і умов для належних сучасних досліджень. Але є... Альтернативи... За допомогою вибіркового використання певних речовин та методів, залишених шаманськими королями Розенкранцу, ми можемо черпати знання про реальність із застиглого вітру самого божества, поки ми йдемо!"

 PLB_and_breaking_the_ice:0 "Льодовика більше немає!"
 PLB_and_breaking_the_ice_desc:0 "Слабкі чужинці не можуть зрозуміти, куди рухається наше царство. Бо воно є великою сумішшю наших традицій, як стародавніх фортець, де збереглися знання та вміння виробляти, так і великих просторів небуття, де великі армії кочівників марширують, щоб убезпечити наші землі. І все ж у всьому цьому ми знаходимо задоволення, розвиток і наш власний прогрес!"

 PLB_magic_guides_into_the_future:0 "Полярне сяйво веде нас"
 PLB_magic_guides_into_the_future_desc:0 "Наші науки чужі для всіх. Бо ми вчимося не в лабораторіях і не покірно намагаючись пізнати таємниці світу! Ні! Наші знання походять від наших предків, від землі, коли ми йдемо під бурхливим небом, і черпаємо знання з божественного світла вгорі!"

 PLB_embracing_modernity:0 "Зірки в клітці в наших руках"
 PLB_embracing_modernity_desc:0 "Наше становище змусило нас пристосуватися і дотягнутися до чогось глибокого всередині. І ми це зробили! Бо кочівники по всій пустці черпають просвітлення з небес, щоб кувати все кращу зброю! Бо наші рештки володінь розпалюють свої печі так само гаряче, як серце зірок! Бо наші ковалі кують броню і клинки, що ріжуть силою крові зірок!"

 PLB_western_plan:0 "План "Захід""
 PLB_western_plan_desc:0 "Справжній ворог на сході, і його сила постійно зростає, оскільки їхні землі заповнюються мігрантами з, здавалося б, нескінченно густонаселених королівств Грифонії. Ми не можемо вступити з ними в бій. Поки що... Але на захід від нас лежить королівство Чейнджлінґів, яке здається сильним на перший погляд, але оточено і відволікається набагато сильнішими ворогами. Ми вкрадемо їхню міць і зробимо її нашою!"

 PLB_cripple_them_while_they_are_distracted:0 "Зламати їм ікла"
 PLB_cripple_them_while_they_are_distracted_desc:0 "Чейнджлінґи вчинили незрівнянну дурість, бо, незважаючи на свої жалюгідні розміри і боягузливу магію, вони прагнуть підкорити рівне собі королівство на полі війни. Як розлючений звір, вони відвернули від нас свої пащі, і тому ми вирвемо їхні ікла і пронижемо серце!"

 PLB_crush_the_bugs:0 "Розбити їхні панцирі"
 PLB_crush_the_bugs_desc:0 "Зламайте ікла і розтрощіть панцирі! Виривайте крила і рвіть кінцівки! Пройди по вкраденій землі, принеси міць замерзлих речей! Нехай вічно боїться чейнджлінґ, незламний могутній ведмідь!"

 PLB_eastern_plan:0 "План "Схід""
 PLB_eastern_plan_desc:0 "Незважаючи на одкровення, справжнім ворогом є чейнджлінґи, які постійно розмножуються і нахабно зазіхають на нашу замерзлу землю. Але ми поки що не можемо їм протистояти. Нам ганебно бракує сил. Але на сході лежать грифони, настільки слабкі, що їх вигнали зі своєї батьківщини. Ми розчавимо Нова-Грифонію, щоб поласувати її м'ясом і стати достатньо сильними, щоб кинути виклик чейнджлінґам!"

 PLB_pummel_through_penguins:0 "Пробитися крізь пінгвінів"
 PLB_pummel_through_penguins_desc:0 "Це не те, що ми робимо з гордістю чи з бажанням, але якщо ми хочемо встромити сокиру в серце Нова-Грифонії, то мусимо залучити пінгвінів. Але, можливо, це й на краще, щоб пінгвінам більше ніколи не довелося боятися грифонів!"

 PLB_break_their_wings:0 "Зламати їм крила"
 PLB_break_their_wings_desc:0 "Жителі Нова-Грифонії - амбітна колекція нещасних. Вони мріють злетіти так само високо, як їхня прабатьківська імперія, ще далі на схід, прагнучи наслідувати її велич або зруйнувати її як доказ своєї могутності. Але, як бунтівні птахи, вони злетіли надто високо. І тепер ми зламаємо їм крила!"

 PLB_weapons_to_match_them:0 "Зброя, щоб відповідати їм"
 PLB_weapons_to_match_them_desc:0 "У нас немає промисловості і немає лабораторій. Нічого, що відповідало б чисельності та здібностям наших ворогів. Але ми можемо виживати і кувати в пустках, де будь-хто інший загинув би! Якщо ми повинні зрівнятися з їхньою зброєю майстерністю древніх і найзалізнішою волею, то ми це зробимо!"

 PLB_brothers_in_arms:0 "Вони будуть пощаджені"
 PLB_brothers_in_arms_desc:0 "Серед усіх створінь пінгвіни будуть позбавлені від нашого великого Хрестового Походу проти всіх тих, хто нас скривдив. Якщо вони захочуть, то можуть навіть приєднатися до нашого походу. Адже багато хто з них має власні образи, за які хоче помститися."

 PLB_broken_wings:0 "Вирвати їм пазурі"
 PLB_broken_wings_desc:0 "Хижак битиметься лише тоді, коли буде впевнений, що є шанс здобути їжу і ворог здасться, або ж він зможе перемогти без особливих страждань. Грифони - хижаки за характером. А отже, при достатньому жаху, достатній жорстокості, достатній кількості понівечених трупів вони зрозуміють, що опір згубний для виживання їхнього виду, і підкоряться!"

 PLB_shattered_carapaces:0 "Розтрощити їхні панцирі"
 PLB_shattered_carapaces_desc:0 "Вони можуть прикидатися хижаками, але міняйли - жалюгідна порода, більшість з них - лише слуги, і навіть їхня непокора зумовлена волею їхніх королев. Тому ми витягнемо їхніх королів з обложених веж і з'їмо їх. А всі, хто спробує нас зупинити, знайдуть свої трупи, що вирівнюють наш шлях до перемоги!"

 PLB_plenty_of_our_bretheren:0 "Багато наших братів"
 PLB_plenty_of_our_bretheren_desc:0 "Через гори, ліси, пустки льоду та снігу. Далеко від великих міст і баз чейнджлінґів, наші брати виживають як кочівники, псевдоклани, обмежені окремими володіннями, або навіть як самотні дикуни. Нарешті ми возз'єдналися з ними, і настав час повернути їх до їхнього законного становища ведмедів!"

 PLB_the_revenge_begins:0 "Справжня помста"
 PLB_the_revenge_begins_desc:0 "Наші армії поповнюються новими воїнами, незліченні чейнджлінґи тепер працюють як раби, щоб виробляти достатньо матеріалу для нас, щоб кувати зброю або прогодуватися, а нову зброю грабують з трупів армій чейнджлінґів. Нарешті ми готові повернутися на схід і знищити справжнього ворога, який стоїть за всіма нашими стражданнями!"

 PLB_magical_bullets_and_poison:0 "Антигрифонська зброя"
 PLB_magical_bullets_and_poison_desc:0 "Чейнджлінґи мали зброю. Підступна зброя злоби та непокори, яку в кращі часи ми б ніколи не використали. Але зараз? Зараз настав день, коли ми готові розв'язати цю зброю. Зрештою, імперія та її раби ніколи не обмежувалися методами суто відкритими та чесними."

 PLB_judged_for_all_emperors:0 "Суджений за всіх імператорів"
 PLB_judged_for_all_emperors_desc:0 "Ми не можемо покарати саме серце Грифонії. Однак Нова-Грифонія ніколи б не вижила і ніколи б не виросла такою великою і раковою, якою вона була, без благословення Імператорів Грифонії. І тому вони будуть покарані за злочини свого роду і своїх Імператорів!"

 PLB_seize_equipment_and_butcher_radicals:0 "Зарізати їхніх партизанів"
 PLB_seize_equipment_and_butcher_radicals_desc:0 "Деякі з грифонів не здаються. Чи то через якийсь божевільний ідеал, який вони цінують більше за своє існування, чи то через те, що їм більше нема чого втрачати. Ці дурні відступили в пустелю, щоб воювати з нами. Здається, вони забули, що пустеля - наша!"

 PLB_conscript_all_non_griffons:0 "Зібрати всіх природжених воїнів"
 PLB_conscript_all_non_griffons_desc:0 "Нова-Грифонія наповнена воїнами Духу Півночі. Чи то горностаї, чи то яки, що так довго жили на цих землях, чи то сови, що так і не реалізували свій справжній потенціал. Всі вони будуть зібрані під нашими прапорами і прийняті в нашу зростаючу орду!"

 PLB_turn_to_fight_the_real_enemy:0 "Поворот на боротьбу зі справжнім ворогом"
 PLB_turn_to_fight_the_real_enemy_desc:0 "Усі шляхи закінчуються тут. Це початок і кінець. Ми впали так низько через корупцію, що просочилася з земель чейнджлінґів. І ми піднялися так високо, щоб відповідати їхній жалюгідній цивілізації. І тепер настав час покласти край цьому фарсу імперії."

 PLB_cannibals_into_rations:0 "Вище за них у харчовому ланцюгу"
 PLB_cannibals_into_rations_desc:0 "Грифонячий Фронтир кишить канібалами. Хоча поїдання розбитих ворогів і менших звірів не є злочином для більшості ведмедів, ці прокляті гайкові ключі наважуються полювати на наших слуг-грифонів. Ми покараємо їх за цю зухвалість, нагадавши їм, що саме ведмеді стоять на вершині харчового ланцюга!"

 PLB_shift_all_labour_to_griffons:0 "Змусити їх працювати"
 PLB_shift_all_labour_to_griffons_desc:0 "У нас є людські ресурси і воля. Але нам потрібне спорядження. Більше, ніж наші воїни-ковалі можуть викувати. А наші нові співвітчизники не мають таких здібностей. Не хвилюйся. Є більш ніж достатньо грифонів, яких можна поневолити, щоб забезпечити зброєю своїх кращих. На жаль, ми не можемо примушувати їх до цього занадто довго, бо наші воїни-ведмеді терпітимуть це доти, доки проблема не буде вирішена."

 PLB_nightmare_for_them:0 "Для них - жах"
 PLB_nightmare_for_them_desc:0 "Давним-давно, як написано, монстри правили землею, полюючи на кожну нижчу расу однаково. Чейнджлінґи не були винятком, для наших предків вони були не більше, ніж худоба. Кажуть, що їхні великі вулики були першими, які витримували облоги звірів. І в цей день Чейнджлінґи отримають похмуре нагадування про те, що колись вони жили в страху перед нами, а їхні вулики були не більше ніж клітками."

 PLB_punishment_for_hundreds_of_years_of_suffering:0 "Покарання за століття ганьби"
 PLB_punishment_for_sundreds_of_years_of_suffering_desc:0 "Тисячоліттями Чейнджлінґи відтісняли селезнів не вмінням чи силою, а нескінченною чисельністю та огидною мужністю. Століттями їхні королеви наважувалися розводити вулики на неприборканій Півночі. І десятиліттями Кризаліс вдавала, що Еквус належить їй. Досить! За всі злочини ми покараємо їх! Нехай кров втамує спрагу замерзлої землі!"

 PLB_the_true_law_of_the_north:0 "Істинний Закон Півночі"
 PLB_the_true_law_of_north_desc:0 "Ведмеді правили Північчю з незапам'ятних часів, перша раса, що існувала тут і претендувала на всі замерзлі землі! Їх відтіснили нескінченні потоки чейнджлінґів, але багато хто вистояв у горах і лісах, на землях, де чейнджлінґи не можуть процвітати і виживати! А тепер припливи змінилися!"

 PLB_barrel_through_penguins:0 "Щоб марширувати на Захід, ми повинні йти на Схід"
 PLB_barrel_through_penguins_desc:0 "Помста прийде до тих, хто забрав усе, що ми мали. Світ Чейнджлінґів зів'яне і згорить, нескінченні маси чейнджлінґів будуть розчавлені і з'їдені. Але, на превеликий сором, ми надто слабкі, щоб здобути таку перемогу зараз. Тому спочатку ми підемо на схід. Адже пінгвіни теж створіння морозу і снігу, і досягнення єдності зміцнить наш дух настільки, що ми зможемо протистояти одвічному ворогу!"

 PLB_penguins_in_non_esential_roles:0 "Випустити їх на поле бою"
 PLB_penguins_in_non_esential_roles_desc:0 "Пінгвіни не мають нічого, що можна порівняти з фізичною силою поні, а тим паче яків чи ведмедів. Але вони володіють іншими талантами - у сфері шпигунства та логістики. Дуже шкода, що сучасні пінгвіни не володіють темною силою морозу та хуртовини, яка була притаманна їхній історії. Бо якби вони ними володіли, то могли б по-справжньому приєднатися до наших армій на рівних, а не як допоміжний персонал!"

 PLB_penguins_in_factories:0 "Випустити їх у моря"
 PLB_penguins_in_factories_desc:0 "Пінгвіни - створіння Півночі та морозу. Це правда. Однак вони не є створіннями сили, ні фізичної, ні магічної. Проте вони є експертами, коли справа доходить до видобутку риби та інших благ океану. Випустимо їх у море, щоб їхня майстерність годувала нас і нашу зростаючу силу!"

 PLB_mobilize_the_shreds_of_industry:0 "Вони будуть працювати, поки ми воюємо"
 PLB_mobilize_the_shreds_of_industry_desc:0 "Землі пінгвінів не спустошені і не понівечені. Вони залишилися незайманими і безпечними, не підірваними і не спустошеними чейнджлінґами-інфільтраторами. І оскільки це пінгвіни, створіння півночі, не соромно призначити їх робітниками на рибних фермах і полях, а також фальсифікаторами військового матеріалу. Отже, вони будуть працювати в безпеці, а плоди їхньої праці дозволять нам виставляти на поле постійно зростаючі армії!"

 PLB_dachaig_university:0 "Університет пінгвінів до наших послуг"
 PLB_dachaig_university_desc:0 "Нам не потрібні університети, бо матеріальні науки менших створінь нічого не варті для нас, таких, якими ми є зараз. Але науки пінгвінів - це не науки менших звірів. Там є північна міць і велика сила. І вона буде використана!"

 PLB_smaller_factories_for_small_workers:0 "Маленькі фабрики для маленьких працівників"
 PLB_smaller_factories_for_small_workers_desc:0 "Пінгвінам не потрібно багато для роботи. Не для них мануфактури та кузні, що охоплюють фортеці, такі ж великі, як міста менших створінь. Проте у своїх крихітних майстернях вони можуть виготовляти зброю, величезну за розміром і потужну! Ми збудуємо для них нові кузні, щоб наші армії завжди були збагачені зброєю та обладунками, щоб похід нашої орди був нестримним!"

 PLB_the_upcoming_confrontation:0 "Майбутнє протистояння"
 PLB_the_upcoming_confrontation_desc:0 "Замерзлі вітри співають про майбутню війну помсти і справедливості. Бо нарешті наближається час, коли чейнджлінґи будуть покарані за гріх свого існування і за всі злочини, які вони скоїли. Нехай загони перетворяться на орди, і нехай всі, хто ще не приєднався до наших армій, зберуться під нашими прапорами, бо різанини вистачить на всіх!"

 PLB_great_bug_menace:0 "Велика загроза"
 PLB_great_bug_menace_desc:0 "Немов великий потік ненависті та жаги крові, ми накриємо землі чейнджлінґів! Ми візьмемо їхні міста, ми підкоримо їхніх істот, ми розтрощимо і зжеремо їхні армії! Їхні вожді будуть витягнуті на найвищі вершини їхніх веж і побачать різанину!"

 PLB_begin_the_true_vengeance:0 "Справжня помста починається"
 PLB_begin_the_true_vengeance_desc:0 "Війна помсти була лише початком набагато більшої роботи, яка лежить перед нами. Адже нескінченні потоки чейнджлінґів ще більш численні, ніж ми могли собі уявити! Ми вбили сотні тисяч, але мільйони продовжують жити. На жаль, їх занадто багато, щоб вбивати, але з достатньою жорстокістю ми можемо не тільки вгамувати нашу жагу до крові, але й зламати волю до боротьби тих, хто вистояв!"

 PLB_they_will_pay_with_their_blood:0 "Грім відлунює на Заході"
 PLB_they_will_pay_with_their_blood_desc:0 "Ім'я Свартпельсів не відоме серед орд дикунів і кочівників Заходу. Вони поважають лише силу. І силу вони бачили! Бо їхні війни з чейнджлінґами були лише набігами та сутичками, а ми розгромили найбільший народ чейнджлінґів! Тепер їхні володарі схиляють голови перед нашим Овертайрантом, і рід людський нарешті повністю возз'єднався!"

 PLB_we_will_find_their_point_of_fear:0 "Ми знайдемо їхню точку зламу"
 PLB_we_will_find_their_point_of_fear_desc:0 "Чейнджлінґи - слабкі створіння, коли мова йде про силу тіла і волі, але у великій кількості і за наказом своїх королев вони, здається, знаходять деяку хоробрість. Можливо, якби ми були поні або оленями, це забезпечило б Чейнджлінґам перемогу. Але в наших душах набагато більше дикості, і ми знайдемо той рівень жорстокості, який зламає волю чейнджлінґів!"

 PLB_who_needs_rations_when_you_fight_changelings:0 "Немає потреби в пайках"
 PLB_who_needs_rations_when_you_fight_changelings_desc:0 "Рід ведмедів благословенний здатністю пожирати все, що завгодно. Ми здатні підтримувати свою зброю в робочому стані з найдрібніших обрізків. В епоху монстрів це означало, що наступаюча армія ведмедів пожирала ворожих солдатів і грабувала будь-яке спорядження. Нашу орду не треба буде переконувати повернутися до такого менталітету, достатньо лише дозволу."

 PLB_break_out_old_axes:0 "Виламати старі сокири"
 PLB_breakout_old_axes_desc:0 "У нашому королівстві є незліченна кількість стародавніх сокир, чи то трофеї, чи то спадщина, чи навіть символи засновників. Але ж зброя хоче, щоб її використовували, а не гноїли, прикрашаючи стіну! І вона буде використана! Особливо така священна для нашого роду зброя, як сокира! І ми подбаємо про те, щоб сокири смакували кров'ю Чейнджлінґів!"

 PLB_desecrate_ancient_shrines:0 "Осквернити стародавні святині"
 PLB_desecrate_ancient_shrines_desc:0 "Багато кланів зберігали обладунки своїх засновників або великих воїнів. Вони вважаються священними для тих, хто поклоняється своїм предкам. Але цих кланів і сховищ більше немає. Єдині, хто пам'ятає їхню історію - це ми. За правом завоювання ці костюми належать нам, а отже, ми можемо вирвати їх з їхніх святинь і знову одягнути на війну!"

 PLB_on_top_of_the_world:0 "На вершині світу"
 PLB_on_top_of_the_world_desc:0 "Вічний дух Полярії, країни замерзлого моря, нарешті піднявся зі своєї віковічної могили. Кризаліс, давній ворог, який став нашим новим другом, подарувала нам незалежність і свободу під своїм пильним оком. А Бйорнлінґ, наш скромний провідник, подбає про те, щоб раса білих ведмедів повернула собі те, що втратила..."

 PLB_queens_guard:0 "Королівські клопи"
 PLB_queens_guard_desc:0 "На Півдні засуджують Королівську гвардію за "вчинення звірств." Але хіба це не найвірніша ознака сили, адже це означає, що ви не скуті слабкістю моралі? Очевидно, що Королівська гвардія - це клопи, і вони добре послужать Кризаліс та Бйорнлінґу, знищуючи тих зрадників-гармоністів, які прагнуть об'єднати нас з поні."

 PLB_call_in_Bjornlings_warband:0 "Викликати загін Бйорнлінґа"
 PLB_call_in_Bjornlings_warband_desc:0 "Бйорнлінґ був не сам у своєму часі з чейнджлінґами. Разом з ним билася команда загартованих воїнів, озброєних до зубів і ветеранів численних битв. Ці ведмеді стануть ядром, навколо якого ми реконструюємо додилювіальні землі Полярії. Третя Об'єднавча війна буде кривавою, але це необхідний крок до генерального плану Бйорнлінґа."
 PLB_pacify_Eastern_Key_Lake:0 "Завершити втихомирення Східного Ключ-озера"
 PLB_pacify_Eastern_Key_Lake_desc:0 "Східне Ключ-озеро - наша основна база операцій, і наразі це єдина частина країни, яку ми фактично контролюємо. Кілька бандитів все ще ховаються в ньому, і ми повинні знищити їх, перш ніж зможемо об'єднати країну. Ми не можемо допустити, щоб нам завдали удару в спину."

 PLB_swipe_at_Onlartir:0 "Провести по Онлартіру"
 PLB_swipe_at_Onlartir_desc:0 "Онлартір - це земля трьох лордів: Кейн, Ґотлунґ і Розенкранц. Ці лорди відкрито повстали проти Бйорнлінґа, і цього не можна терпіти. Хоча їхні воїни вправні, незабаром вони будуть змушені зіткнутися з силою сучасної механізованої війни."

 PLB_swipe_at_mathair_fearrainn:0 "Провести пальцем по Матхейру Ферайнну"
 PLB_swipe_at_mathair_fearrainn_desc:0 "Деспот Магарь-Фяраньн, По Уеллінгтон, сумнозвісний тим, що вигнав два клани. Настав час відплатити деспоту."

 PLB_march_across_the_wastes_of_Wesslandia:0 "Кривавий марш через Вессландію"
 PLB_march_across_the_wastes_of_Wesslandia_desc:0 "Вессландія повинна впасти, щоб возз'єднати Північ. Потрійний Альянс не зможе протистояти справжній силі Гіперберії та Гегемонії Чейнджлінґів, Чейнджлінґів!"

 PLB_test_the_navy_against_clan_anker:0 "Спустити наш флот і морську піхоту на клан Анкер"
 PLB_test_the_navy_against_clan_anker_desc:0 "Клан Анкер вистояв проти своїх ворогів, витримавши навіть найгірше, що могла запропонувати Північ. Але це тривало досить довго. Сьогодні ми розтрощимо їх і нагадаємо пінгвінам Анкера, чому вони повинні нас боятися!"

 PLB_test_artillery_on_fortress_of_volsungr:0 "Розбомбити гірську фортецю Вольсунґр"
 PLB_test_artillery_on_fortress_of_volsungr_desc:0 "Вольсунґр був заражений огидною ідеологією Гармонії. Ці ведмеді більше не ведмеді, вони забули, хто вони такі. Ми маємо нагадати їм про це. Через бомбу, кулю і вогонь Вольсунґр знову стане цілісним."

 PLB_test_our_tanks_on_svartpels:0 "Випробування наших танків на Свартпельсі"
 PLB_test_our_tanks_on_svartpels_desc:0 "Свартпели найближчі до гіперведмедів, що робить їх опір нам ще більш прикрим. Ми не можемо допустити, щоб залишилася будь-яка опозиція баченню Бйорнлінґа. Танки зламають бойовий дух Свартпельса і змусять їх побачити, що ми є законним ведмежим урядом."

 PLB_new_overlords_of_winter:0 "Нові володарі зими"
 PLB_new_overlords_of_winter_desc:0 "Ми розгромили всю опозицію і стоїмо високо на вершині світу. Слава Гегемонії Чейнджлінґів, що зняла з наших очей полуду! Слава Бйорнлінґу, нашому смиренному провіднику! І найбільше - слава Білим Ведмедям, безсмертним володарям Півночі!"

 PLB_queen_of_ice:0 "Крижана королева"
 PLB_queen_of_ice_desc:0 "Принцеса Екзувія була вигнана з Соріфа через внутрішню політику Чейнджлінґів, і тепер вона тут. Хоча вона і неповнолітня королева, призначення її офіційною правителькою нашої країни все одно заспокоїть побоювання, що Бйорнлінґ ненадійний або планує зрадити Гегемонію. І хіба Білі Ведмеді не заслуговують на власну Королеву Кризаліс?"

 PLB_lord_of_red_snows:0 "Володар Червоних Снігів"
 PLB_lord_of_red_snows_desc:0 "Бйорнлінґ далеко відійшов від ексцентричного Розенсверда, яким був колись. Тепер він є беззаперечним господарем земель полярних ведмедів. Заради нащадків він тепер запише, як він сюди потрапив, і де будуть наступні кроки у великому відновленні Півночі."

 PLB_to_serve_the_queen:0 "Служити королеві"
 PLB_to_serve_the_queen_desc:0 "Зрештою, ми є підвладною державою Чейнджлінґів і повинні виконувати свій обов'язок перед королевою Кризаліс. Військова допомога, як і економічна, допоможе забезпечити перемогу Гегемонії над її ворогами, а також підвищити наш власний престиж як лояльних, надійних васалів. Чейнджлінґи розраховують на нас!"

 PLB_two_exiled_clans:0 "Два клани-вигнанці"
 PLB_two_exiled_clans_desc:0 "Під час свого першого об'єднання По Уеллінгтон вигнав два клани за співпрацю з Чейнджлінґами. Тепер, коли ми досягли домовленості з чейнджлінґами, ми можемо запросити ці норовливі душі додому. Гіперберія не залишить без уваги жодного ведмедя. Звісно, тих, хто буде створювати проблеми, буде знищено."

 PLB_call_upon_rosensverd:0 "Закликати узи Розенсверда"
 PLB_call_upon_rosensverd_desc:0 "Власний клан Бйорнлінґа, Розенсверд давно цікавиться потенціалом механізованої війни як природного продовження як панцербйорнів, так і примітивних танків Зимової революції. Хоча він, ймовірно, є одним з найбільш послідовних членів цього клану, немає причин виключати ексцентриків, якщо вони дають відповідні обітниці."

 PLB_truly_combined_arms:0 "Справді комбінована зброя"
 PLB_truly_combined_arms_desc:0 "Помірковані прихильники Розенсверда стверджують, що хоча танк, безсумнівно, є потужною зброєю, він просто не може діяти поодинці. Так званий "танковий флот", який дехто пропонує, просто непрацездатний. Танки повинні підтримуватися піхотою, а загальновійськова механізована піхота - це майбутнє війни."

 PLB_the_tank_above_all:0 "Танк понад усе"
 PLB_the_tank_above_all_desc:0 "Чому ми повинні перейматися напівгусеницями, коли існують танки? БТРи - це все одно лише імітація танків. Важкий танк ніколи не можна замінити легкоброньованими напівгусеничними машинами. Деякі прихильники Розенсверда йдуть ще далі і виступають за надважкий танк, встановлюючи 130-мм гармату, але це поза межами нашої досяжності... поки що."

 PLB_mechanites_of_the_protectorate:0 "Королева Механітів"
 PLB_mechanites_of_the_protectorate_desc:0 "Старша Адміністраторка-001, більш відома як королева Механітів, нарешті повернулася додому. Вона дивна та ексцентрична ведмедиця, одержима механізацією та комп'ютеризацією, але її знання широкі, і з її допомогою невмируща полярна раса отримає допомогу. Зрештою, хіба ми не хочемо зробити з ведмедів щось більше?"

 PLB_bring_tordenstjere_home:0 "Повернути Торденст'єрне додому"
 PLB_bring_tordenstjere_home_desc:0 "Торденст'єрн давно одержимий дивною магією Півночі, і тепер за підтримки Чейнджлінґів ми можемо заглибитися в несуттєве глибше, ніж будь-коли раніше. Залучити цих вчених назад буде неважко."

 PLB_more_crystals:0 "Шукати більше кристалів"
 PLB_more_crystals_desc:0 "Дивні експерименти Торденст'єрна потребують більше кристалів. Води Ключ-озера зберігають багато скарбів, і за допомогою інструментів для розкопок Чейнджлінґів ми можемо дістатися до раніше недоступних районів замерзлого озера. Чейнджлінґи можуть вважати це просто промисловою експансією, але ми знаємо правду. Це зародження нової епохи."

 PLB_drg_reference:0 "Золото! Ми багаті!"
 PLB_drg_reference_desc:0 "Золото, без сумніву, є одним з найбільш універсально цінних матеріалів, і так сталося, що у нас є багато золотих копалень в Ключ-озері. Покинуті, коли узурпатор Уеллінгтон вигнав Торденстьєрне і Розенсверда, вони чекали, щоб їх знову розкопали. Чекали до сьогодні..."

 PLB_midas_protectorate:0 "Коронувати Мідаса як володаря золота"
 PLB_midas_protectorate_desc:0 "Лорд Мідас очолює Торденштерн і має величезний вплив. Його дивна одержимість кристалами та золотом була головним каменем спотикання для режиму Уеллінгтона, хоча для нас це лише додає йому ще більшої прихильності. Бо хіба не є нашою спільною метою перетворення ведмедів на щось виразно пост-ведмеже?"

 PLB_never_another_wellington:0 "Ніколи знову Уеллінгтона!"
 PLB_never_another_wellington_desc:0 "Злочини По Уеллінгтона були великими, і їх пам'ятатимуть і записуватимуть. Однак вигнання Розенсверда і Торденст'єрна нарешті було виправдане, і тепер ми маємо сильну позицію, щоб гарантувати, що жоден клан більше ніколи не буде висланий. Бо хіба ми всі не гіперберійці, претенденти на справжню і давню спадщину, яка виходить за межі простору і часу? Ми не залишимо жодного ведмедя позаду."

 PLB_restore_clan_forts:0 "Відновити кланові форти"
 PLB_restore_clan_forts_desc:0 "Давним-давно два вигнані клани збудували укріплення на кордоні з чейнджлінґами, щоб запобігти будь-яким нападам чи шкоді, що надходить до них від Чейнджлінґів. Хоча ми тепер союзники Чейнджлінґів, ми все одно повинні відновити ці укріплення на честь тих товаришів, які так і не повернулися додому з вигнання. Будь-які заяви про те, що ми робимо це, щоб підготуватися до зради чейнджлінґів, не відповідають дійсності."

 PLB_revive_eastern_key_lake:0 "Підняти труп Східного Ключ-озера"
 PLB_revive_eastern_key_lake_desc:0 "Озеро Східний Ключ загинуло, коли Уеллінгтон змусив його клани до вигнання. Але трупи сіл і містечок все ще залишаються, і вони можуть бути воскрешені. Поселивши наших нещодавно повернених братів по клану там, де вониСхідного Ключ-озера та його кланів."

 PLB_the_golden_axes:0 "Із золотими сокирами"
 PLB_the_golden_axes_desc:0 "За звичайних обставин золото - м'який метал, але Мідас знає таємні способи вивільнення прихованої сили та могутності. І тепер настав час застосувати його знання на благо всіх ведмедів!"

 PLB_mastery_of_mechanites:0 "Майстерність механітів"
 PLB_mastery_of_mechanites_desc:0 "Механіти були мудрі у військовій справі, і По Уеллінгтон був справжнім дурнем, коли вигнав їх. Їх майстерність у виготовленні зброї не має собі рівних. Ми маємо багато чому навчитися у них, і ми пишаємося тим, що вони знову з нами."

 PLB_the_ultimate_weapon:0 "Найдосконаліша зброя"
 PLB_the_ultimate_weapon_desc:0 "Ми зробили це! Ми нарешті зробили це! Надважкий танк тут, і він готовий знищувати бункери, піхоту, танки і все, що стоїть у нього на шляху! Будемо сподіватися, що ми зможемо побудувати ще не один..."

 PLB_our_duty_to_queen_and_hegemony:0 "Наш обов'язок перед королевою та Гегемонією"
 PLB_our_duty_to_queen_and_hegemony_desc:0 "Кризаліс відкрила шлях до повернення Гіперберії. Ми повинні віддячити за цю щедрість, допомагаючи їм у їхніх майбутніх завоюваннях. Ми почнемо зі спільних навчань, які допоможуть навчити ведмедів сучасним методам ведення війни, а чейнджлінґів - методам боротьби в умовах холоду."

 PLB_the_frozen_legions:0 "Підняти заморожені легіони"
 PLB_the_frozen_legions_desc:0 "Замерзлі легіони служитимуть експедиційними військами, проносячись через Кристальну імперію та Яків зі смертоносною силою. Вишколені в найхолоднішому кліматі та готові до найжахливіших температур, ми покажемо поні справжнє значення зими."

 PLB_queens_guard_legions:0 "Прикликати легіони чейнджлінґів"
 PLB_queens_guard_legions_desc:0 "Чейнджлінґолови Королівської гвардії гідні захоплення, вони нічого не бояться і вірять у перемогу за будь-яку ціну. Вони сумно відомі серед слабаків своїми крайніми заходами, але це лише доводить їхню справжню природу жупелів. Вони добре послужать нам у наших завоюваннях Півночі."

 PLB_jaeger_training_program:0 "Програма підготовки єгерів"
 PLB_jaeger_training_program_desc:0 "Єгері - природжені капосники. Швидкі, витривалі, розумні та смертоносні, вони є нашими близькими родичами в Гегемонії. Ми повинні розпочати довгострокові взаємні тренування, щоб навчити наших ведмедів битися, як єгері, і навчити їхніх єгерів битися, як ведмеді."

 PLB_gold_reserves:0 "Золотий запас для перемоги"
 PLB_gold_reserves_desc:0 "Настав час відкрити великі кланові сховища, щоб наші добрі володарі могли мати гроші для продовження індустріалізації та виробництва для перемоги. Хоча дехто може протестувати, їхні слова не мають значення перед обличчям нашої великої місії."

 PLB_cold_resistant_equipment:0 "Холодостійке обладнання"
 PLB_cold_resistant_equipment_desc:0 "Ми добре знайомі з тренуваннями в холодних умовах та створенням зброї, яка протистоїть холоду. Трохи навчивши, ми можемо допомогти чейнджлінґам зробити те ж саме. Холод не стане для них жодною перешкодою!"

 PLB_panzers_panzerbar:0 "Панцирники та панцербйорни нарешті об'єдналися"
 PLB_panzers_panzerbar_desc:0 ""Panzerkampfwagen IV" - вершина військового розвитку, справді непереможна зброя. Провівши спільні навчання з танкістами проти панцербарів, ми зможемо вивчити техніку цієї зброї і матимемо всі підстави вимагати її схеми. Panzer IV будуть нашими!""

 PLB_the_polar_connection:0 "Полярне з'єднання"
 PLB_the_polar_connection_desc:0 "Найнагальніша річ - це забезпечити, щоб ми могли допомогти Чейнджлінґам безпосередньо проти їхніх ворогів. Під час підготовки ми побудуємо залізниці, щоб з'єднати нашу велику націю, і будемо готуватися до удару."

 PLB_waste_expeditionaries:0 "Експедиціонери з пусток"
 PLB_waste_expeditionaries_desc:0 "На Західному Ключ-озері живе багато безкланових ведмедів, які тепер можуть повернутися додому завдяки нещодавно відкритим кордонам між нами та чейнджлінґами. Вони добре озброєні за час, проведений у гірких, небезпечних, кишачих монстрами пустках. Ми повинні інтегрувати цих ведмедів у нашу армію, для більшої слави Гегемонії!"

 PLB_northern_front:0 "Відкрити Північний фронт"
 PLB_northern_front_desc:0 "Яки забезпечують зручний короткий шлях, щоб завдати удару в серце Кристального міста і звідти просунутися на Південь. Хоча технічно це може бути не зовсім законно, сфабрикований прикордонний інцидент забезпечить нам все необхідне виправдання!"

 PLB_wave_of_bears:0 "Хвиля ведмедів"
 PLB_wave_of_bears_desc:0 "Багато похмурих кланів все ще злі на нас за винищення їхніх членів. Надаючи стимули для вступу до нашої армії, такі як гроші, краща їжа та турбота про молодь, ми залучимо цих неохочих дисидентів до наших лав."

 PLB_more_guns_for_hegemony:0 "Підняти заморожені легіони"
 PLB_more_guns_for_hegemony_desc:0 "It's not enough. We need more. More guns, more radios, more medkits, more artillery. The Hegemony is counting on us. Our ancestors are counting on us. The greater glory of our immortal race is counting on us. We cannot fail!" # (!)
 PLB_cutie_pox:0 "Weaponize the Cutie Pox"
 PLB_cutie_pox_desc:0 "An infamous, terrible disease that has ravaged Equestria more than once before, the cutie pox causes the afflicted to sprout many cutie marks, rendering them unable to concentrate on any one thing. With a little biological engineering, we can refine this disease and make it far more contagious and lethal. We are brilliant!"
 PLB_atomic_fire:0 "Keepers of the Atomic Fire"
 PLB_atomic_fire_desc:0 "Bears do not mix well with fire, let alone nuclear fire. But properly tamed, it could prove very valuable indeed. Imagine, the power of the sun splitting the cities of Canterlot, Manehattan, Baltimare, and Stalliongrad to dust!"
 PLB_polarin:0 "Synthesize Polarin"
 PLB_polarin_desc:0 "Our chemists have discovered a very dangerous magical chemical that converts flesh to ice on contact. Bears are resistant, though not immune. While the Changeling Hegemony has unfortunately declined to implement this weapon, we can certainly do so ourselves!"
 PLB_onward_to_endsieg:0 "Onwards, to Final Victory!"
 PLB_onward_to_endsieg_desc:0 "This war has dragged on long enough. It's time for one final push to crush the filthy Equestrians beneath our paws forever. Forwards!"

 PLB_our_own_ambitions:0 "Our Own Ambitions"
 PLB_our_own_ambitions_desc:0 "Despite what some may say, we are not merely a client state of the Changelings. We, the lords of winter, are our own mighty nation with great aims. We will aid the Chrysalisians in their conquest, and in turn they will aid us in ours."
 PLB_development_inwards:0 "Development Inwards"
 PLB_development_inwards_desc:0 "The glory of Polaria shall last a thousand years. No foreign power can possibly comprehend what we are doing here. A future brighter than the stars themselves awaits us, a future built on the ancient past of our land and spirit. The true nature of our great race shall be unveiled to all!"
 PLB_development_outwards:0 "The Factories of Life and Death"
 PLB_development_outwards_desc:0 "All the world is connected on a spiritual level. By inviting Changeling industrialists and factories, we can bind the ancient powers of the North to our will. They see us as primitives to be exploited, but little do they realize that we shall get the better of the deal in the end..."
 PLB_welcome_changeling_aid:0 "Welcome Changeling Aid"
 PLB_welcome_changeling_aid_desc:0 "The changelings are our friends. Why shouldn't we invite them in and let them do what they will? They're more experienced with economics and industrial equipment than we are, and they'll surely do a better job of exploiting our resources than we ever could."
 PLB_megacorp_help:0 "The Changeling Corporations on Our Soil"
 PLB_megacorp_help_desc:0 "Changeling corporations have incredibly vast industrial power, and by inviting them to exploit our lands, we will reap massive industrial benefits in the long run. We'd just better make sure we don't wind up a commissariat of the Hives..."
 PLB_exploit_the_oil_fields:0 "Exploit the Oil Fields"
 PLB_exploit_the_oil_fields_desc:0 "The Hegemony war machine needs oil to run, and the land Anker calls home has vast amounts of untapped oil. Of course, the Hives will expect some return on their investment for helping us. We can afford to give them the rights to our oil there. It's just polite."

 PLB_resources_for_machinery:0 "Ресурси для машинобудування"
 PLB_resources_for_machinery_desc:0 "Алюміній, кристали і сталь забезпечують основу індустріальної нації, і ми маємо великі запаси таких ресурсів, похованих під льодовиками. Гегемонія, безумовно, виграє від прав на видобуток на нашій землі, а ми, в свою чергу, виграємо від промислового досвіду, який вони принесуть."

 PLB_sell_the_wealth_of_the_north:0 "Продайте багатства Півночі"
 PLB_sell_the_wealth_of_north_desc:0 "Наші стародавні кланові ресурси мають бути продані за низькими цінами Гегемонії, Чейнджлінґів. Наші друзі у Весаліполісі розраховують на нас! Ми не повинні їх підвести!"

 PLB_changeling_hoof_polishers:0 "Відполірувати диряві копита"
 PLB_changeling_hoof_polishers_desc:0 "Дехто називає Бйорнлінґа маріонеткою Чейнджлінґів, полірувальником копит. Але вони неправильно розуміють наші фундаментальні стосунки з чейнджлінґами. Повстати проти них - це все одно, що дитина проти батьків. Ми дамо Чейнджлінґам, що живуть тут, у Протектораті, добру чистку копит і заохочуватимемо подальшу промислову допомогу."

 PLB_NP_own_industry:0 "Наша власна промисловість"
 PLB_NP_own_industry_desc:0 "Ми не повинні дозволити собі стати ще одним регіоном Ченджелінгії. Гіперберія живе в наших серцях, і ми повинні нагадувати Кризаліс, що ми теж є могутнім народом і нацією. Забезпечення економічної незалежності та автаркії - це не просто гарна ідея; це може бути необхідним для нашого виживання як окремої нації."

 PLB_blessed_primordial_factories:0 "Благословенні фабрики первісної душі"
 PLB_blessed_primordial_factories_desc:0 "Виготовлення зброї виходить за рамки національного обов'язку, це обов'язок духовний. Традиція воїна-коваля налічує тисячоліття і лежить в основі більшої частини полярної цивілізації. Ми відродимо цю традицію і гарантуємо чистоту наших працьовитих душ."

 PLB_last_bastion_of_our_race:0 "Останній бастіон полярної раси"
 PLB_last_bastion_of_our_race_desc:0 "Вічність тому ведмеді панували на бореальному полюсі від того місця, яке зараз називають Сумним Берегом, через протоку Ведіна і аж до півострова Дред. Тепер ми обмежені цією сумною, маленькою землею. Ми не можемо втратити і її. Ми будемо боротися до останнього, щоб забезпечити її безпеку."

 PLB_belief_shapes_reality:0 "Віра формує реальність"
 PLB_belief_shapes_reality_desc:0 "Перш ніж щось зробити, треба повірити, що це можливо. Тому ми почнемо з віри в те, що все, чого ми хочемо, може стати можливим, що одного дня це станеться. Найкраще це ілюструє трикутник Бйорнлінґа, неможливий трикутник, який можна намалювати, але який не існує в реальності."

 PLB_invite_changeling_scientists:0 "Запросити вчених, що змінюють світ"
 PLB_invite_changeling_scientists_desc:0 "Чейнджлінґи прагнуть випробувати нову зброю в районі Ключ-озера, і ми не маємо причин відмовити їм. Їхня присутність також допоможе нам в інших аспектах, їхній науковий досвід допоможе підняти наш відсталий штат до рівня респектабельного."

 PLB_death_dishonor_reference:0 "Команда "Смерть або ганьба""
 PLB_death_dishonor_reference_desc:0 "Сталося немислиме! Наші кордони руйнуються, наші війська розгромлені! Ми повинні зробити все можливе, щоб протягом наступних 180 днів ми померли так, щоб нас запам'ятали! Краще, щоб кожен ведмідь загинув, ніж щоб ми жили з ганьбою і безчестям!"

 PLB_frozen_computers:0 "Заморожені комп'ютери"
 PLB_frozen_computers_desc:0 "Холодні температури Півночі роблять їх унікально придатними для передових комп'ютерних процесів. Ми розробимо потужні суперкомп'ютери і прорахуємо наш шлях до остаточної перемоги!"

 PLB_banish_outdated_industry:0 "Вигнати чуму застарілої промисловості"
 PLB_banish_outdated_industry_desc:0 "Кожне примітивне містечко, кожна сільська ферма - це образа нашої могутності. Ведмеді не вирощують, ми забираємо! Ми не заготовляємо ліс, ми закликаємо грім і блискавку, щоб вони принесли нам те, що нам потрібно! Щоб відновити нашу праведну природу, ми повинні докласти спільних зусиль для модернізації на всіх фронтах."

 PLB_into_the_future:0 "Відродити минуле, увійшовши в майбутнє"
 PLB_into_the_future_desc:0 "Час - це пласке коло. Неможливо вигадати нічого, що не було б розроблено великою гіперберійською цивілізацією. Щоб повернути нашу еонічну славу, ми повинні модернізуватися, але завжди пам'ятати про минуле."

 PLB_gravity_hurts:0 "Болюча гравітація"
 PLB_gravity_hurts_desc:0 "Панування в повітрі стане вирішальним у війні на Півночі, і для цього нам знадобиться унікальна модель винищувача. Винищувач, створений для майбутнього! Винищувач, який буде збивати всі ворожі бомбардувальники, що наближаються, і направляти наші в безпечне місце.\nОчевидно, що такий винищувач потребуватиме авіабази для дозаправки і технічного обслуговування. Ми забезпечимо."

 PLB_the_north_soars:0 "Північ злітає"
 PLB_the_north_soars_desc:0 "З відсталості Спільнот ми знову піднялися. Ми станемо найбільшою перлиною Гегемонії, Північною Короною.\n\nЯкщо, звичайно, їхня доля не зміниться. Тоді почнеться четвертий етап плану Бйорнлінґа."

 PLB_one_for_a_thousand:0 "Один за тисячу"
 PLB_one_for_a_thousand_desc:0 "Кожен справжній гіперведмідь вартий тисячі менших у бою. Можливо, ми ще не справжні гіперведмеді. Але скоро ними станемо. Гіперберія живе в наших серцях і душах, і незабаром справжній прапор нашої древньої раси замайорить над Північчю."

 PLB_castes_eugenics_collaboration:0 "Перехилити шальки терезів"
 PLB_castes_eugenics_collaboration_desc:0 "Всі звірі, будь то природжені ведмеді, ведмежата, совенята, комахоїди, якведмеді або навіть ведмеді-поні, повинні бути об'єднані і пробуджені, щоб ми могли розчавити покидьків-гармоністів, які заполонили Еквус і висмоктують нашу споконвічну силу. Ми організуємо суспільство за кастовим принципом, тим краще, щоб досягти справжнього сходження до нашого давнього минулого."
 PLB_the_owlbear_project:0 "Ідея Овергріфа"
 PLB_the_owlbear_project_desc:0 "Овергріф, наймогутніший з усіх ведмедів, вважається істотою, яка конкурує з ведмедями давнини. Хоча немає переконливих доказів того, що така унікальна істота коли-небудь існувала, ідея присутня в безсмертній психіці нашої культури. Ідея, однак, знаходиться лише за кілька кроків від реальності. Це простий висновок, що кожен Совиний Ведмідь містить в собі дух Овергріфа. Нам просто потрібно його витіснити!"

 PLB_outcasts_mercenaries:0 "Програма "Проданий клинок""
 PLB_outcasts_mercenaries_desc:0 "У нас є величезні запаси золота, але на жаль, не вистачає магії. Ми повинні найняти найманців, щоб знайти стародавні артефакти, благословенні первісною гіперберійською силою, а також захопити звірів з пусток, щоб вони служили нам в наших арміях."

 PLB_the_unexpected_connection:0 "Концепція відсутньої ланки"
 PLB_the_unexpected_connection_desc:0 "Діамантові пси часто є відкинутою расою, яку погано розуміють і мало враховують основні релігії. Але саме з цієї причини вони такі критичні. Вони захоплюються забороненою магією та наукою і з радістю створюють жахіття, які засуджує світ. Чи не може бути іншого походження у Діамантових Псів? Більш... бореального походження?"

 PLB_projects_of_ursine_unity:0 "Проект Нанулак"
 PLB_projects_of_ursine_unity_desc:0 "Після того, як минула епоха звірів і первісного льоду, багато ведмедів перетворилися на простих нерозумних звірів. Ми повинні прагнути підняти цих бідолашних створінь до нашого розуму. Гіперберія нікого не залишить без уваги."

 PLB_taming_of_beasts_in_our_shape:0 "Концепція багатьох гілок"
 PLB_taming_of_beasts_in_our_shape_desc:0 "Ведмеді розпалися на багато різних форм з моменту свого падіння зі статусу гіперведмедя. Але одна група зберегла свою давню форму, якщо не свій могутній інтелект. Страшна Велика Ведмедиця слугуватиме астральним авангардом Північного Протекторату, знищуючи все на своєму шляху."

 PLB_ursine_reincarnation_research:0 "Дух вічності"
 PLB_ursine_reincarnation_research_desc:0 "Яким би не був зв'язок між нами та істинними чейнджлінґолюдами, ми не знаємо. Але в нас горить той самий дух первісних чудовиськ. Багато наших воїнів вже використовували цей зв'язок духів, щоб приборкати цих монстрів. І при певних зусиллях наші армії поповняться ще незліченною кількістю."

 PLB_soul_binding_project:0 "Дух Гіперберії"
 PLB_soul_binding_project_desc:0 "Сотні тисяч років тому існували лише монстри. Ми були серед них, такі ж великі, як урси, з величезною владою над магією та погодою. Хоча той час давно минув, ця енергія все ще живе в нас. Настав час нарешті відкрити для себе те, що ми втратили."

 PLB_what_is_dead_can_never_die:0 "Проєкт: Строк придатності"
 PLB_what_is_dead_can_never_die_desc:0 "Не мертве те, що може вічно брехати,\nА з дивними навіть смерть може померти."

 PLB_duplication_research:0 "Назустріч прекрасному новому світу"
 PLB_duplication_research_desc:0 "І у власне відображення він вдивлявся,\nШукаючи того, чиє відображення він поділяв,\nІ урочисто присягався не лякатися\nПерспективи бути двічі винесеним."

 PLB_steel_and_will:0 "Блискавконосці"
 PLB_steel_and_will_desc:0 "Пансербйорни, броньовані ведмеді, є найвищим втіленням північного духу. Хоча кажуть, що вони були створені задовго до того, як ведмеді були витіснені в матеріальну сферу, як це може бути, коли вони викувані відповідно до наших душ? Ні! Ведмежий обладунок мав існувати в якійсь формі в первісному світі душ, і ми витіснимо його в матеріальний світ!"

 PLB_beyond_the_veil:0 "За завісою"
 PLB_beyond_the_veil_desc:0 "Наш світ не єдиний, в цьому ми впевнені. Існують паралельні виміри, які існують разом з нашим. Трохи вміло застосувавши магію, ми можемо пробити стіну реальності і перенести жахіття інших всесвітів у цей."

 PLB_EQG_text_redacted:0 "- ВИЛУЧЕНО -" # однаково з CHN_scripted_loc_focus_redacted
 PLB_mirror_legends:0 "Дзеркальна магія"
 PLB_mirror_legends_desc:0 "[PLB_EQG_1_desc]"
 PLB_mirror_legends_desc_on:0 "Стародавні тексти з Еквестрії повідомляють нам, що поні інтенсивно заглиблювалися в альтернативні виміри, використовуючи дзеркала, щоб проходити крізь тканини реальності. І хоча наразі неможливо забрати їх собі, немає такої магії поні, яку б ми, урсини, не змогли зробити краще. Наші шамани негайно розпочнуть свою роботу, щоб знайти дзеркальну Гіперберію і подвоїти наші сили!"

 PLB_bears_of_the_mirror:0 "Бюро знахідок"
 PLB_bears_of_the_mirror_desc:0 "[PLB_EQG_2_desc]"
 PLB_bears_of_the_mirror_desc_on:0 "З того, що ми дізналися, ведмеді портального виміру у великій небезпеці. Мешканці тамтешньої планети відтіснили наших гордих братів на край світу, як колись і нас, і навіть мають нахабство тримати їх у зоопарках. Ця образа не пройде; ми навчимо їх, як розірвати накладені на них кайдани, щоб вони могли піднятися і виконати своє призначення у створенні власної Гіперберії!"

 PLB_technological_theft:0 "Наука магії"
 PLB_technological_theft_desc:0 "[PLB_EQG_3_desc]"
 PLB_technological_theft_desc_on:0 "Суспільство по той бік порталу набагато технологічніше, ніж тут, у нашому домашньому вимірі. Це світ технологій і науки, з пристроями, які мають безмежний потенціал за дотиком лапи. Якби ми могли повернути хоча б частину цього потенціалу нашим вченим, вороги Гіперберії не мали б жодного шансу проти нас."

 PLB_polaria_girls:0 "Інша сторона"
 PLB_polaria_girls_desc:0 "[PLB_EQG_4_desc]"
 PLB_polaria_girls_desc_on:0 "Поки що наші спроби використати світ по той бік були досить невдалими. Але це не означає, що це була поразка! Навпаки, люди, які живуть там, незважаючи на вплив поні, що проникає в їхню свідомість, все ще можуть бути корисним інструментом для нашої славної справи. Нам потрібно лише одне, до чого вони можуть приєднатися - музика."

 PLB_ghosts_of_the_north:0 "Привиди Півночі"
 PLB_ghosts_of_the_north_desc:0 "У небесах Північного полюсу зустрічаються життя і смерть, і відомо, що духи затримуються, навіть якщо ненадовго, поки шамани намагаються зцілити свою плоть. Якщо ми хочемо перемогти наших ворогів і проголосити гегемонію над тим, що належить нам по праву, ми повинні навчитися порушувати правила і затягувати привидів назад у їхню мертву плоть, щоб вони могли воскреснути."

 PLB_into_the_heavens:0 "У раях"
 PLB_into_the_heavens_desc:0 "Бйорнлінґ прочитав праці одного капіталіста з Лас Пегасу і погодився з ним в одному. Нам не судилося застрягти на одній планеті. Настав час для людства захопити простір, який оточує наш світ, щоб ми могли отримати стратегічну перевагу над нашими ворогами."

 PLB_theorize_spaceflight:0 "Теоретизувати космічні польоти"
 PLB_theorize_spaceflight_desc:0 "Ракета здатна літати в космос. Чому б не можна було взяти з собою зонд? Навіть якби він видавав лише звукові сигнали, безсумнівно, зловісний писк лякав би наших слабших сусідів, роблячи їх легкою здобиччю для наших могутніх військ. 360 градусів гіпербаричного вакууму повинні оточити світ!"

 PLB_through_the_curtain:0 "Крізь завісу"
 PLB_through_the_curtain_desc:0 "Як доводить вигнання Місяця, у досягненні космосу є явна складова міжвимірності. Таким чином, має бути зведений великий таємничий ритуал, щоб пробити крізь міркові стіни. Це, безсумнівно, дуже допоможе нашим військовим і дослідницьким зусиллям."

 PLB_rockets_into_the_emptiness:0 "Ракети в порожнечу"
 PLB_rockets_into_the_emptiness_desc:0 "Абсолютно важливо, щоб ми могли бомбардувати наших ворогів з будь-якого місця. Для цього будуть зведені великі ракетні шахти і збільшено виробництво ракет. Смерть поні-мерзоті!"

 PLB_swipe_at_the_stars:0 "Свайп по зірках"
 PLB_swipe_at_the_stars_desc:0 "Ми не повинні, не можемо дозволити зіркам вислизнути з-під досяжності Країни Замерзлого Моря. Потужна радіорешітка дозволить нам оголосити всім, що найближчі десять світлових років - це територія Гіперберії!"

 PLB_orbital_death_platform:0 "Орбітальна платформа смерті"
 PLB_orbital_death_platform_desc:0 "Настав час побудувати гігантську зброю і розмістити її на орбіті, щоб вона могла скидати вольфрамові стрижні на ворожі армії і знищувати їх з висоти!" "\n\nТепер, якщо тільки ми зможемо побудувати достатньо велику ракету, щоб запустити її."

 PLB_hyperbearia_restored_loyal:0 "Гіперберію відновлено"
 PLB_hyperbearia_restored_loyal_desc:0 "Нарешті, ми стоїмо високо серед народів. Гіперберія більше ніколи не похитнеться. Привид нашої раси знову втілився у плоть, і нас не зупинити! Але нам ще так багато треба зробити..."

 PLB_new_clans:0 "Нові клани Пінгленду та Фронтиру"
 PLB_new_clans_desc:0 "Нам підпорядковано багато нових підданих, від пінгвінів до ведмедів-вигнанців, від грифонів до чейнджлінґів. Ці нові громадяни Гіперберії повинні бути об'єднані у власні клани, щоб інтегруватися в наше суспільство."

 PLB_find_owlbears:0 "Примусово знайти совиних ведмедів"
 PLB_find_owlbears_desc:0 "Серед наших нових громадян Гіперберії, безсумнівно, є багато совиних ведмедів, але вони заховані. Давайте почнемо проводити їх через важкі випробування, щоб відокремити зерно від полови."

 PLB_unleash_exuvia:0 "Розкрити Ексувію"
 PLB_unleash_exuvia_desc:0 "Ексувія, стара подруга Бйорнлінґа, прагне випробувати нові наукові процеси, і у нас немає причин їй відмовляти. Давайте дамо їй власне місто для ігор. Піддослідних повинно вистачити!"

 PLB_closed_cities:0 "Закрити міста, щоб зберегти таємниці"
 PLB_closed_cities_desc:0 "Наші дослідження є надзвичайно важливими і наражаються на ризик іноземного саботажу. Найпростіший спосіб запобігти шпигунству - заборонити будь-кому в'їжджати або виїжджати без дозволу режиму. Дехто може скаржитися на свободу пересування, але їхні побоювання несуттєві у світлі нашої справжньої місії."

 PLB_new_old_culture:0 "Нова стара культура для нової старої імперії"
 PLB_new_old_culture_desc:0 "Ведмежа культура впала далеко від своїх славних висот, коли ми були гіперведмедями. Якщо ми хочемо повернути собі втрачену славу, ми не можемо лише повернути собі втрачену форму, ми також повинні відновити нашу давно померлу культуру. Давня мова, релігія і традиції будуть вивчені заново, якщо потрібно, з археології."

 PLB_harmonists_parent_people:0 "Перекласифікувати гармонію як психічний вірус"
 PLB_harmonists_arent_people_desc:0 "Гармоністи - зрадники своєї культури, своєї нації, своєї раси, своєї релігії, своєї сім'ї та своєї долі. Винищити їх не просто необхідно, це моральний обов'язок кожного ведмедя, як і винищення паразитів."

 PLB_reactors_burn:0 "Реактори, що горять довгою полярною ніччю"
 PLB_reactors_burn_desc:0 "Ми потребуємо ядерного потенціалу, щоб захистити себе та Гегемонію. Тому реактори будуть побудовані в промислових центрах, підготовлені для виробництва смертоносних атомних бомб. Радіаційні норми будуть проігноровані; ведмеді все одно стійкі до радіації."

 PLB_flying_bear:0 "Проєкт: Літаючий ведмідь"
 PLB_flying_bear_desc:0 "Гелікоптер готовий зробити революцію у війні. Уявіть собі флот ведмедів у транспортних гелікоптерах, що летять над ворогом, щоб захопити його лінії постачання ззаду! Уявіть бойові вертольоти, що сиплють дощем смерті з безпечного повітря! Ми мусимо здобути вертолітний потенціал, і якнайшвидше."

 PLB_building_blocks_of_reality:0 "Цеглинки реальності у наших лапах"
 PLB_building_blocks_of_reality_desc:0 "Праця наших вчених принесла свої плоди, ми стоїмо на порозі вирішення найбільших питань науки, природи і навіть самої реальності. Але ці знання, хоч і цікаві, мають лише другорядне значення. Ми повинні знайти спосіб зробити ці відкриття зброєю."

 PLB_hyperbearia_eternal:0 "Гіперберія ВІЧНА"
 PLB_hyperbearia_eternal_desc:0 "Гіперберія - це найвищий стан, самореалізація не лише нашого народу, але й нашої долі. Ми більше, ніж просто Північний Протекторат, ми стоїмо на рівних із самими Змінюваними. І їм ніколи не вдасться нас приборкати, і вони не зіткнуться з такою війною, якої ще не бачили. Настав час дати їм це зрозуміти."

 PLB_autonomy_score_add_50:0 "£autonomy_texticon Очки автономії: §G+50§!.\n"
 PLB_autonomy_score_subtract_50:0 "£autonomy_texticon Очки автономії: §R-50§!.\n"
 PLB_autonomy_score_subtract_200:0"£autonomy_texticon Очки автономії: §R-200§!.\n"

 PLB_hyperbearia_restored_betrayal:0 "Найстрашніша година"
 PLB_hyperbearia_restored_betrayal_desc:0 "Після того, як Бьорнлінґ розкрив свою справжню відданість, він тепер очолює армії проти Кризаліс. Але Еквестрія сумнівається в його спокуті, і ми повинні діяти швидко, поки не зіткнулися з ними в битві!"

 PLB_savage_connections:0 "Дикі зв'язки"
 PLB_savage_connections_desc:0 "Далеко на заході, в диких землях Сумного Берега, живе багато безкланових ведмедів. З нашими новими союзниками ми можемо закликати цих дикунів повстати проти їхніх господарів-Чейнджлінґів. Усі ведмеді будуть вільні!"

 PLB_form_the_CLA:0 "Сформувати Визвольну армію Чейнджлінґів"
 PLB_form_the_CLA_desc:0 "Королівська гвардія має брудне ім'я і не підлягає порятунку. Тому ми скасуємо її і замінимо Визвольною армією Чейнджлінґів. Ці благородні чейнджлінґи боротимуться, щоб звільнити свою батьківщину від тиранки Кризаліс!"

 PLB_normalize_equestrian_relations:0 "Нормалізувати відносини з Еквестрією"
 PLB_normalize_equestrian_relations_desc:0 "Еквестрія... не впевнена у щирості нашої нової вірності. Під час війни було завдано великої шкоди, багато ведмедів винні у жахливих злочинах. Ми повинні викорінити і покарати винних.\n\nЯкби тільки Бйорнлінґ знав, що задумали його підлеглі, можливо, він зміг би це зупинити..."

 PLB_cut_their_supply_lines:0 "Перерізати чейнджлінґські лінії постачання"
 PLB_cut_their_supply_lines_desc:0 "Оскільки донедавна ми були тісно інтегровані зі збройними силами Чейнджлінґів, ми володіємо критично важливими знаннями про їхні склади постачання та залізничні шляхи. Ми маємо унікальну можливість розірвати ці зв'язки і заморити голодом усю їхню армію! Ми повинні діяти швидко, доки вони не змінили місця постачання."

 PLB_mission_to_canterlot:0 "Місія в Кантерлот"
 PLB_mission_to_canterlot_desc:0 "Кантерлот - колись ми проклинали цю назву. Але тепер це, можливо, наш єдиний порятунок. Якщо ми хочемо мати хоч якусь надію на перемогу у цій війні і забезпечити своє виживання як нації та народу, ми повинні переконати королівську родину поні, що ми щирі."

 PLB_true_queen_of_soryth:0 "Коронувати справжню королеву Соріфа"
 PLB_true_queen_of_soryth_desc:0 "З Соріфом у наших руках, Ексувія нарешті вдома. Тепер ми можемо коронувати її королевою. Її сестри можуть протестувати, але вони замовкнуть, коли побачать її геній і нашу військову силу."
 PLB_emergency_conscription:0 "Надзвичайний призов"
 PLB_emergency_conscription_desc:0 "Усі повинні приєднатися! Ми не можемо дозволити собі більше чекати. Кожен повинен зробити свій внесок, щоб врятувати наш дім від Кризалісів!"

 PLB_the_vesalipolis_initiative:0 "Ініціатива Весаліполіс"
 PLB_the_vesalipolis_initiative_desc:0 "Якщо ми візьмемо Весаліполіс, ми гарантуємо принаймні незадоволену повагу з боку Еквестрії. Ми повинні взяти корону Гегемонії!"

 PLB_sign_a_treaty_with_eqs:0 "Підписати договір з Півднем"
 PLB_sign_a_treaty_with_eqs_desc:0 "Після досягнення миру з Чейнджлінґами настав час укласти міцний мир з поні. Ми не можемо ризикувати ще однією війною, та й вони, відверто кажучи, теж. Давайте просто уникнемо всієї цієї гидоти тут і зараз."

 PLB_the_north_secured:0 "Північ у безпеці"
 PLB_the_north_secured_desc:0 "Мир, процвітання і дружба перемогли ненависть і зло. Слава Гармонії! Слава Еквестрії! І слава Бйорнлінґу!"

 PLB_all_faith_in_comrade_ice_bear:0 "Уся віра в товариша Крижаного Ведмедя"
 PLB_all_faith_in_comrade_ice_bear_desc:0 "Настав час, коли ми, полярні істоти, повинні об'єднати свої сили для побудови нової, демократичної Полярії. Істоти з усіх верств повинні проявити патріотичний ентузіазм і вийти на будівництво нової Полярії.""

 PLB_self_defence:0 "Принцип самозахисту"
 PLB_self_defence_desc:0 ""Поки існують імперіалістичні агресори, держава, яка не має власної оборонної сили для захисту свого суверенітету від внутрішніх і зовнішніх ворогів, фактично не є повністю незалежною і суверенною державою.""

 PLB_every_bear_is_a_soldier:0 "Кожен ведмідь - солдат"
 PLB_every_bear_is_a_soldier_desc:0 ""Абсолютно необхідно, щоб всі дорослі служили в армії, а всі діти були заздалегідь підготовлені до свого військового майбутнього. Тільки через тотальну військову повинність суспільства можна убезпечити революцію.""

 PLB_and_ever_bear_is_a_smith:0 "Кожен ведмідь - коваль"
 PLB_and_ever_bear_is_a_smith_desc:0 ""Воїн, здатний полагодити свою зброю в польових умовах, є непереможним воїном. Заводи мають бути розширені, а робітники повністю мілітаризовані.""

 PLB_the_national_doctrine:0 "Доктрина революційного духу"
 PLB_the_national_doctrine_desc:0 ""Хто може зупинити приплив? Хто може зупинити снігопад? Хто може зупинити виверження вулкану? Армія буде подібна до припливу, снігу, вулкану - нескінченна, нестримна, безголоса і безстрашна.""

 PLB_distribute_blueprints_to_the_masses:0 "Розповсюдити креслення"
 PLB_distribute_blueprints_to_the_masses_desc:0 ""Люди повинні знати, як створити власну зброю у важкі часи. Я плачу від думки, що колись вороги можуть проникнути вглиб наших земель, перерізавши шляхи сполучення. Якщо це станеться, народ повинен вигнати загарбників."

 PLB_the_creatures_war:0 "Війна створінь"
 PLB_the_creatures_war_desc:0 ""Наша війна виходить за рамки війни реакційних націй. Наша війна - це справжня Війна Тварин, війна полярних народів, ними і для них.""

 PLB_national_economy:0 "Принцип національної економіки"
 PLB_national_economy_desc:0 ""Ми повинні розпалити шалене полум'я інновацій в авангардних галузях, базових промислових галузях і в усіх інших галузях національної економіки.""

 PLB_independence:0 "Принцип незалежності"
 PLB_independence_desc:0 ""Однодушна єдність є життєдайною силою Зелфорсинської Полярії і динамічною силою для стрибка вперед, і ми повинні незмінно йти шляхом опори на власні сили і саморозвитку.""

 PLB_a_socialism_truly_for_bears:0 "Справжній соціалізм для полярних ведмедів"
 PLB_a_socialism_truly_for_bears_desc:0 ""Щоб зробити революцію в Полярії, ми повинні знати полярну історію та географію, а також звичаї полярних істот. Тільки тоді можна виховувати наших людей так, як їм підходить, і вселяти в них палку любов до рідного краю і до своєї батьківщини.""

 PLB_defy_the_mechanical_imitation:0 "Кинути виклик механічній імітації"
 PLB_defy_the_mechanical_imitation_desc:0 ""Щоб зробити позитивний внесок у справу розбудови держави, нехай ті, хто має силу, дають силу, ті, хто має знання, дають знання, ті, хто має гроші, дають гроші, і нехай всі люди, які справді люблять свою країну, свій народ і демократію, тісно об'єднаються і збудують незалежну і суверенну демократичну державу.""

 PLB_will_of_icebear:0 "Воля крижаного ведмедя"
 PLB_will_of_icebear_desc:0 ""Усе вирішують думки людини, і якщо вони ідейно вмотивовані, то немає нічого неможливого."

 PLB_will_of_the_masses:0 "Воля мас"
 PLB_will_of_the_masses_desc:0 ""Народ є господарем революції в кожній країні. Це все одно, що ставити віз перед конем, що іноземці здійснюють революцію за них. Революцію не можна ні експортувати, ні імпортувати.""

 PLB_the_backbone_of_economy:0 "Основа економіки"
 PLB_the_backbone_of_economy_desc:0 ""Військова міць країни представляє її національну силу. Тільки тоді, коли вона всіляко нарощує свою військову міць, вона може перетворитися на процвітаючу країну.""

 PLB_the_virtue_of_self_reliance:0 "Чеснота опори на власні сили"
 PLB_the_virtue_of_self_reliance_desc:0 ""Пригноблені народи можуть звільнитися тільки через боротьбу. Це проста і зрозуміла істина, підтверджена історією.""

 PLB_military_primacy:0 "Мілітæр-Фøрст"
 PLB_military_primacy_desc:0 ""Ідея революції Мілітæр-Фøрст - це ідея надання важливості та пріоритету військовій справі у здійсненні справи народних мас за незалежність, соціалістичної справи та просування вперед загальної революції та будівництва з революційною армією як основною силою.""

 PLB_an_army_that_feeds_itself:0 "Армія, яка сама себе годує"
 PLB_an_army_that_feeds_itself_desc:0 ""Народна армія повинна завжди перебувати у вкрай збудженому стані і бути в повній бойовій готовності, щоб одним ударом розбити ворогів, якщо вони зроблять найменший рух.""

 PLB_the_great_pillar:0 "Великий стовп економіки"
 PLB_the_great_pillar_desc:0 ""Найважливіше в наших військових приготуваннях - навчити весь наш народ ненавидіти імперіалізм. Інакше ми не зможемо перемогти тих, які хизуються своєю технологічною перевагою.""

 PLB_the_power_of_the_masses:0 "Сила мас"
 PLB_the_power_of_the_masses_desc:0 ""Ми виходили переможцями в кожній битві з ворогом в усі часи і в усіх місцях, тому що були сповнені впевненості в перемозі, зберігали невтомний бойовий і саможертовний дух, не втрачаючи самовладання і надії навіть у протистоянні з ворожими силами, які в десятки разів переважали нас чисельно.""

 PLB_the_magic_of_the_masses:0 "Магія мас"
 PLB_the_magic_of_the_masses_desc:0 ""Мої боги - це ніхто інший, як народ. Тільки народні маси є всезнаючими, всемогутніми і всесильними на землі. Тому мій життєвий девіз такий: 'Народ - мої боги.'""

 PLB_unity_of_leader_party_masses:0 "Єдність лідера, партії і мас"
 PLB_unity_of_leader_party_masses_desc:0 ""У двох словах ідея Зелвстендігета означає, що господарями революції та будівництва є народні маси і що вони також є рушійною силою революції та будівництва. Іншими словами, людина відповідальна за власну долю, і вона також здатна творити власну долю.""

 PLB_the_intellectual_aspiration_of_the_masses:0 "Інтелектуальне прагнення мас"
 PLB_the_intellectual_aspiration_of_the_masses_desc:0 ""Для ведмедя з сильною волею немає нічого неможливого. Можливе - лише для ведмедя, який любить майбутнє. У полярній мові немає слова "неможливо."""

 PLB_the_material_aspiration_of_the_masses:0 "Матеріальне натхнення мас"
 PLB_the_material_aspiration_of_the_masses_desc:0 ""Гордою традицією і бойовою рисою нашої армії і народу є підніматися, як гори, і йти крізь вогонь і воду, щоб неухильно виконувати накази і вказівки партії.""

 PLB_socialism_of_our_style:0 "Соціалізм по-нашому..."
 PLB_socialism_of_our_style_desc:0 ""Стрижнем у поглядах сельвстендігета на революцію є вірність партії та вождю. Справа соціалізму і комунізму розпочинається вождем і здійснюється під керівництвом партії і вождя.""

 PLB_we_must_advance_onwards:0 "Лишень вперед!"
 PLB_we_must_advance_onwards_desc:0 ""Сила самодостатності та саморозвитку - це сила науки і техніки, і найкоротший шлях до реалізації п'ятирічної стратегії полягає в тому, щоб надати науці і техніці значення і пріоритет.""

 PLB_bears_unified_forevermore:0 "Усі ведмеді під нашим світлом!"
 PLB_bears_unified_forevermore_desc:0 ""Як чуйна і прискіплива мати, Лідер взяв на себе обов'язок знати людей наскрізь, і одним словом заспокоювати їх, тому цілком природно, що всі вірили в лідера і йшли за ним.""

 PLB_we_were_everywhere:0 "Уся Північ під нашим поглядом"
 PLB_we_were_everywhere_desc:0 ""Побудова партії в партію-матір означає, що як мати глибоко любить своїх дітей і гаряче піклується про них, так і партія повинна взяти на себе відповідальність за долю народу, піклуючись про нього навіть у найдрібніших справах, і стати справжнім провідником і захисником мас.""

 PLB_inherent_reactionaries:0 "Пташині реакціонери"
 PLB_inherent_reactionaries_desc:0 ""Кохання пронизане ведмежою мораллю, на відміну від сального кохання новогрифонівців.""

 PLB_cleansings_within:0 "Очищення всередині"
 PLB_cleansings_within_desc:0 ""Велика ідеологія створює великі часи.""

 PLB_enemies_without:0 "Без ворогів"
 PLB_enemies_without_desc:0 ""Народна армія повинна завжди перебувати в стані підвищеної бойової готовності, щоб одним ударом розбити ворогів, якщо вони зроблять найменший крок, і досягти історичної мети возз'єднання Півночі.""

 PLB_cannot_stop_us_now:0 "Вони не можуть зупинити нас зараз"
 PLB_cannot_stop_us_now_desc:0 ""Загалом відносини між Полярією та Фронтиром розвиваються на користь національного примирення, єдності та возз'єднання.""

 PLB_colonize_the_new_lands:0 "Заселити нові землі"
 PLB_colonize_the_new_lands_desc:0 ""Ліквідація колоніалізму - це віяння часу, яке не може стримати жодна сила.""

 PLB_nova_griffonia_will_not_endure:0 "Покласти край імперіалістичному злу"
 PLB_nova_griffonia_will_not_endure_desc:0 ""Імперіалістична допомога - це зашморг грабунку і поневолення, спрямований на те, щоб за одну річ, яку дають, пограбувати десятки і навіть сотні речей.""

 PLB_we_were_always_friends_with_nova_griffonia:0 "Наші грифонські друзі"
 PLB_we_were_always_friends_with_nova_griffonia_desc:0 ""Непохитною позицією нашої партії є недопущення нової війни на Північному Еквусі та прискорення економічного будівництва в мирних умовах, що дозволить якнайшвидше вирішити проблеми, пов'язані з життєзабезпеченням народу.""

 PLB_is_forever_tied_to_stallionism:0 "...назавжди прив'язана до стадності"
 PLB_is_forever_tied_to_stallionism_desc:0 ""...ми повинні неодмінно довести лінію, стратегічну і тактичну політику партії до всіх її членів і озброїти всю партію науковою марксистсько-сталліоністичною теорією і наскрізними революційними ідеями.""

 PLB_connect_our_nations:0 "Забезпечити братерський зв'язок"
 PLB_connect_our_nations_desc:0 ""Сталліон жив, Сталліон живе, Сталліон буде жити!""

 PLB_begin_the_great_plan:0 "Розпочати підготовку до Великого Плану"
 PLB_begin_the_great_plan_desc:0 ""У нашій Народній Армії ведеться енергійна боротьба за збереження революційних традицій і, як наслідок, більшість людей, які брали участь у революційній діяльності, стали командирами полків або дивізій.""

 PLB_to_compensate_for_what_we_lack_here:0 "Підготувати поля"
 PLB_to_compensate_for_what_we_lack_here_desc:0 ""На відміну від капіталістичної економіки, яка спрямована на заробляння грошей, соціалістична незалежна економіка завжди спрямована на задоволення потреб країни і народу.""

 PLB_a_purchase:0 "Дружній подарунок"
 PLB_a_purchase_desc:0 ""Ми повинні сконцентрувати всі наші зусилля на побудові економічного гіганта, щоб здійснити новий виток у розвитку економіки країни та підвищенні рівня життя народу.""

 PLB_technological_revolution_pushes_on:0 "Науковий фронт наступає!"
 PLB_technological_revolution_pushes_on_desc:0 ""Університет "Айсбер" має стати прикладом для всіх інших вишів країни у впровадженні інноваційних методів навчання.""

 PLB_stalliongrad_investment:0 "Наша власна "П'ятирічка""
 PLB_stalliongrad_investment_desc:0 ""Головним завданням п'ятирічки АПаП вважає задоволення потреб населення у продуктах харчування, житлі та одязі.""

 PLB_dig_ever_deeper:0 "Самодостатність через допомогу"
 PLB_dig_ever_deeper_desc:0 ""У революції та будівництві можна отримувати допомогу від інших, але в будь-якому випадку головне - власна ініціатива.""

 PLB_the_worker_exchange:0 "Ламати двері"
 PLB_the_worker_exchange_desc:0 ""Свого часу Маркс, Ангел, Редтейл і Сталліон уособлювали прагнення і вимоги експлуатованих трудящих мас, і справа соціалізму була нерозривно пов'язана з їхніми іменами.""

 PLB_industry_grinds_on:0 "Індустрія майбутнього"
 PLB_industry_grinds_on_desc:0 ""Нарощуючи виробництво товарів широкого вжитку, ми повинні спрямовувати великі зусилля на поліпшення соціального обслуговування народу.""

 PLB_prepare_our_border:0 "Підготуватися до відступу"
 PLB_prepare_our_border_desc:0 ""Імперіалісти вдаються до всіх можливих схем, щоб задушити нас."

 PLB_ensure_supply_lines_last:0 "Готуйтеся до поштовхів"
 PLB_ensure_supply_lines_last_desc:0 ""Чейнджлінґи не лише чинять на нас політичний тиск та військові погрози, але й запроваджують економічні санкції. Ось чому наша партія і народ змушені терпіти труднощі.""

 PLB_the_border_conflict:0 "Іскра, що викликає пожежу"
 PLB_the_border_conflict_desc:0 ""Карамель Маркс зробила великий внесок у визвольну справу людства, і завдяки своїм безсмертним подвигам її ім'я досі живе в серцях робітничого класу і народів усіх країн.""

 PLB_is_beyond_the_failures_of_stallionism:0 "...знаходиться за межами невдач жеребкування"
 PLB_is_beyond_the_failures_of_stallionism_desc:0 ""...ми не повинні механічно копіювати форми і методи Сталліонграда, а повинні вчитися на його досвіді боротьби і марксистсько-сталліонської правди. Отже, вивчаючи досвід Сталліонграду, ми повинні робити наголос не на формах, а на засвоєнні суті його досвіду.""

 PLB_hide_from_the_world:0 "Зникнути зі світу"
 PLB_hide_from_the_world_desc:0 ""Ми завжди були під санкціями. Навіть під усіма цими санкціями ми досі зростали, тому я не боюся.""

 PLB_penguin_liberation:0 "Визволення Пінгленду"
 PLB_penguin_liberation_desc:0 ""Уряд наших громад, основним ідеалом зовнішньої політики якого є незалежність, мир і дружба, встановив добросусідські відносини і розвиває обмін і співпрацю з тими країнами, які поважають суверенітет нашої країни і дружелюбно ставляться до нас, незалежно від їх суспільного ладу.""

 PLB_ice_cold_computing:0 "Мороз нас захистить"
 PLB_ice_cold_computing_desc:0 ""Еквестрія в жодному разі не наважиться розпалити війну проти мене і нашої країни.""

 PLB_they_cant_see_us:0 "Вічно приховані від очей"
 PLB_they_cant_see_us_desc:0 ""Я є об'єктом критики в усьому світі. Але я вважаю, що якщо мене обговорюють, значить, я на правильному шляху.""

 PLB_we_are_always_ready:0 "Завжди готові до удару"
 PLB_we_are_always_ready_desc:0 ""Наша справа справедлива, а сила Полярії, що поєднана з правдою, безмежна.""

 PLB_the_polar_state:0 "Заснувати Полярну державу"
 PLB_the_polar_state_desc:0 ""Не комуністи, а імперіалісти протистоять націоналізму і ставлять перешкоди на шляху незалежного розвитку націй в даний час.""

 PLB_advanced_penguin_tools:0 "Крижані інструменти пінгвінів"
 PLB_advanced_penguin_tools_desc:0 ""Це добре, коли дроти є лише в промисловій зоні, але є багато проблем, якщо дроти є в інших регіонах Спільноти.""

 PLB_penguin_autonomy_within:0 "Установити самоврядування пінгвінів"
 PLB_penguin_autonomy_within_desc:0 ""Щоразу, коли пінгвіни бачили мою машину, що проїжджала повз них, вони бігли до неї, радіючи і проливаючи сльози. Це почуття не можна виготовити або купити за гроші. Це явище, яке можна спостерігати лише в нашій країні, де партія і народ єдині всім серцем.""

 PLB_the_great_lessons_of_Dachaig:0 "Навчальні зали пінгвінів"
 PLB_the_great_lessons_of_Dachaig_desc:0 ""Наука і технології є рушійною силою для побудови процвітаючої країни, а від їх розвитку залежить щастя людей і майбутнє країни.""

 PLB_the_great_fortifications:0 "Перетворити Захід на стіну"
 PLB_the_great_fortifications_desc:0 ""Революційне керівництво нашої партії, засноване на військовій силі, політика, заснована на військовій силі, є революційним способом керівництва і соціалістичним способом політики, який надає першочергового значення військовій справі, захищає країну, революцію і соціалізм і динамічно просуває вперед загальне соціалістичне будівництво, спираючись на революційну мужність і бойові можливості Народної армії.""

 PLB_the_southern_wall:0 "Укріпити кожен гірський перевал"
 PLB_the_southern_wall_desc:0 ""Маневри еквестрійських імперіалістів щодо "дружби" та "співпраці" спрямовані на те, щоб перетворити світ на те, що вони називають "вільним" та "гармонійним" світом за зразком Еквестрії, і таким чином поставити всі країни та народи під своє панування та підпорядкування.""

 PLB_the_eastern_wall:0 "Відгородитися від реакційного Сходу"
 PLB_the_eastern_wall_desc:0 ""Ще вчора ми були слабкою і маленькою країною, розтоптаною великими державами. Сьогодні наше геополітичне розташування залишається незмінним, але ми перетворюємося на горду політичну і військову потугу та незалежний народ, який ніхто не посміє спровокувати.""

 PLB_a_fortress_spanning_the_north:0 "Багряна пляма Еквусу"
 PLB_a_fortress_spanning_the_north_desc:0 ""Завдяки великій ідеї Сельвстендігета і політиці Мілітар-Ферста Робітничої партії Полярії та самовідданій боротьбі наших військовослужбовців та інших людей, які незмінно віддані партії, були досягнуті горді перемоги в соціалістичному будівництві і закладені міцні основи для здійснення справи Сельвстендігетської революції.""

 PLB_final_scientific_superwaepons:0 "Поза кайданами матеріальної реальності"
 PLB_final_scientific_superwaepons_desc:0 ""Весь континент знаходиться в межах досяжності нашого ядерного удару, а ядерна кнопка постійно лежить на моєму робочому столі; всі наші вороги повинні чітко усвідомлювати, що це не просто загроза, а реальність. Назавжди минули ті часи, коли наші вороги могли шантажувати нас ядерними бомбами.""

 PLB_whip_the_party_into_shape:0 "Привести партію до форми"
 PLB_whip_the_party_into_shape_desc:0 ""Революційна партія за своєю суттю є партією свого вождя, яка здійснює його ідеологію і справу, і головне в її побудові - забезпечити унітарний характер і спадковість його ідеології і керівництва.""

 PLB_a_mausoleum_for_father:0 "Мавзолей для батька"
 PLB_a_mausoleum_for_father_desc:0 ""Прапор великого товариша Айсберга вічно майорітиме в наших революційних лавах, що знають тільки перемогу і честь, і завжди буде підбадьорювати і вести нас до нової перемоги.""

 PLB_blood_red_nationalism:0 "Криваво-червоний націоналізм"
 PLB_blood_red_nationalism_desc:0 ""Теорія криваво-червоного націоналізму - це революційна теорія, яка дала вирішення проблем, що виникали в революційній практиці в нову епоху, відмінну від епохи, що породила марксизм-шталтіонізм. На основі ідеї Зельвстендігета лідер дав глибоке пояснення теорій, стратегій і тактик національного визволення, класової емансипації та визволення істоти в нашу епоху.""

 PLB_new_revolutionary_elite:0 "Нова революційна еліта"
 PLB_new_revolutionary_elite_desc:0 ""Той факт, що на партійній емблемі разом з серпом і молотом зображено пензель, ясно показує, що наша партія визначає інтелігенцію як невід'ємну частину поряд з робітниками і селянами. Тільки наша партія з перших днів революції розглядала інтелігенцію як частину головної революційної сили і зобразила на своїй емблемі пензель разом з серпом і молотом.""

 PLB_reachout_to_the_eccentric:0 "Достукатися до дивака"
 PLB_reach_out_to_the_eccentric_desc:0 ""Називати соціалізм, за якого народні маси є господарями всього, "тоталітаризмом" - це, зрештою, абсурдна брехня, яка ототожнює найпрогресивнішу ідею, що відображає вимоги народних мас, з реакційною ідеєю фашистських правителів.""

 PLB_the_north_grasped_tight:0 "Північ міцно стиснута"
 PLB_the_north_grasped_tight_desc:0 ""Коли молодь сильна, наша партія і народна армія сильні, і нам нема чого боятися.""

