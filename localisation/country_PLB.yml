 PLB_juche_desc:0 "Ідеологія сельвстендигет, яку інколи перекладають як самодостатність, це віра в те, що маси не можуть саморегулюватися, а мають керуватися "Великим Вождем", який є  натхненником робітничого класу. Великий Вождь позбавлений вад і ніколи не припускається помилок, завжди доброзичливий і завжди мудро править масами. Великий вождь захищає робітничий  клас від іноземних імперіалістів і реакціонерів, зберігаючи абсолютну самодостатність нації. Маси, своєю чергою, повинні без вагань любити і захищати вождя, а також беззаперечно  слідувати за ним. Армія є найбільшою з усіх установ, керованих Великим Вождем."

