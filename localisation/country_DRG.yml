 DRG_graphite: "Ґрафіт" # фонет. Ґрафайт/Ґрефайт
 DRG_graphite_desc:0 "Graphite is an anomaly among dragons—obsessed not with hoarding gold, but with organizing, structuring, and most importantly, fixing things that others have messed up. She has converted her own cavern into an expansive bureaucratic office, filled with stacks of records, tax ledgers, and detailed reformation plans that she insists will 'finally bring some order to this lawless place.'\n\nAlthough undeniably brilliant and capable, she is also relentless. Whether one values her advice or not, she will ensure that it is heard—repeatedly—until it is either implemented or ignored at one's own peril. Many rulers have found that arguing with her is more exhausting than ruling itself. Some even whisper that outlasting her nagging is a feat more challenging than battle itself. \n\n§YPortrait By§!: Blakasmoko" # (!)
