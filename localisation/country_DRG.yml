## Generals
 DRG_lord_torch: "Торч"
 DRG_misha: "Міша"
 DRG_charcoal: "Чаркоул"
 DRG_charcoal_desc:0 "A dragon warrior with a sharp mind for opportunity and an even sharper desire for wealth, Charcoal carved out his reputation by forming a warband to fend off pirate incursions. However, his motivations were far from noble—he only did so to claim the spoils of defeated raiders for himself.\n\nDespite his greed, Charcoal is a pragmatic and reliable fighter. His warband has become the Isles' unofficial defense force, though they are known to demand 'tribute' for their services. Those who can keep him well-fed with gold and treasure will find no better enforcer for their rule. But should the coffers run dry, his loyalty may prove just as fleeting as the wind.\n\n§YPortrait By§!: Blakasmoko" # (!)

 DRG_rockslide: "Рокслайд"
 DRG_rockslide_desc:0 "§YBorn§!: Unknown, in the Dragon Isles.\n\n§YRank§!: General\n\n§YBiography§!: Unlike many of his kin, Rockslide has little ambition beyond ensuring his own comfort and keeping his territory secure. More than once, rival dragons or rogue pirates have attempted to seize his domain, only to discover that his sluggish demeanor hides a terrifyingly efficient fighter when provoked.\n\nThough often described as lazy, Rockslide possesses an innate strategic mind—he simply prefers not to use it unless absolutely necessary. Those who can push him into action will find a general who values stability and defense above reckless expansion. But whether he can be convinced to exert effort for someone else's cause remains an open question.\n\n§YPortrait By§!: Blakasmoko" # (!)

 DRG_garble: "Ґарбл"
 DRG_garble_desc:0 "§YBorn§!: Unknown, in the Dragon Isles.\n\n§YRank§!: General\n\n§YBiography§!: Garble is a dragon who thrives on strength, dominance, and proving himself through sheer force. Once a typical bully among his kind, he has since hardened into a true warrior, learning through experience that brute strength alone is not always enough. While still hotheaded and prone to recklessness, he has become a formidable fighter, capable of rallying others through sheer bravado and an unshakable belief in draconic superiority.\n\nThough his leadership style often favors direct combat over careful planning, Garble is not entirely without tactical sense—he simply prefers action over hesitation. Under the right guidance, he could be molded into a devastating force on the battlefield, but without restraint, he is just as likely to charge headfirst into disaster as into victory.\n\n§YPortrait By§!: BunnyShrubby and Blakasmoko" # (!)

