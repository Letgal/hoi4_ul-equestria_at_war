### LEADERS ###

 jaume_desc:0 "§YНародився§!: 13 квітня 964 року в Конарі\n\n§YБіографія§!: Жом де Конар народився в сім'ї заможних іммігрантів із Фловени, які сподівалися здобути статки на східних територіях Ґрайфвальду. Він і подумати не міг, що 43 роки по тому продовжуватиме справу своєї родини в настільки... інакшому типі території.\n\nХоча дбайливі батьки пропонували молодому підприємцю повернутися до Фловени напередодні Аделартської революції, юний Жом був надто самовпевненим, щоб покинути свої підприємства. Він відчув запах "чорного золота", яке могло зробити його рід багатим нарівні з патриціями його батьківщини, і був готовий вистояти в буремні перші дні Вільної Території.\n\nКоли незалежність Аделарту була забезпечена, Жом вчинив як справжній опортуніст, він узяв прізвище "де Конар" як знак свого походження і втерся в довіру до нової аделартської діархії. Зрештою, більшість олігархів та адміністраторів, найнятих колишнім шерифом, покинули східні землі, і грифони на кшталт Жома були одними з небагатьох бізнесменів, що залишилися. Його промислові починання були настільки важливими, що йому пробачали певні елементи експлуатації, а поки гроші його родини залишалися надійно прихованими (що легко в бандитському Аделарті), його справжні амбіції щодо контролю були добре замасковані.\n\nЗ нафтових родовищ Аделарта постане промисловість, що змусить крутитися всю Грифонію, а в кишені патриціїв Конара потече незліченний потік ідолів.\n\n§YПортрет§!: Kessel"

 merlock_desc:0 "§YНародився§!: 11 травня 959 року в Берґелуні\n\n§YБіографія§!: Мерлока Вуда називають по-різному. Зрадник, бандит, убивця, герой, захисник. Але ніхто не може заперечити, що він передусім революціонер. Вуд розпочав свою кар'єру як маловідомий партизан Першої Аделартської революції 983 року, коли Ян Ройцен, відомий розбійник, надихнув народ Аделарта розірвати кайдани як Ґрайфвальдського, так і аквілейського правління. Після того, як повстання Ройцена було придушене, а він сам страчений, Вуд підхопив смолоскип революції, реструктуризувавши рух на колективістських та запекло антимонархічних засадах. Він обіцяв перерозподіл багатств народу та правосуддя над корумпованим дворянством у кожному завойованому місті.\n\nҐрайфвальд під владою слабкого графа не встояв перед революцією, яка здобувала міста переважно мирно завдяки волі народу та ідеалам Вуда. Попередній шериф, Віллем Венденал, не зміг придушити бунт, бо його власні грифони зрадили його заради обіцянок свободи. Невдовзі він був страчений, а його місце посів Жан де Ноттмань, який зрештою був змушений назавжди покинути Аделарт.\n\nМерлок почав організовувати уряд на лібертаріанських та популістських засадах, спрямувавши особливу лють проти Архонатів та прелатури Ґрайфвальда. Антиавторитарні настрої та ненависть до "мааритської корупції" в храмах призвели до того, що Вуд підтримав старовірів, маргінальну релігійну секту, і домовився з новим "обраним прелатом" Лукою фун Ліссеєм.\n\nХоча Вуд правив 20 років відносно стабільно, народ тривожиться. Радикали вимагають суду над ним за бандитизм, тоді як помірковані закликають до справжньої демократії. Чи залишиться Вуд при владі - покаже тільки час.\n\n§YПортрет§!: Scroup"

 luca_desc:0 "§YНародився§!: 22 грудня 928 року в Ліссеї\n\n§YБіографія§!: Походження Луки фун Ліссея, лідера старовірів в Аделарті та побожного теолога, залишається таємницею навіть для його найвідданіших прихильників. Найпалкіші віряни кажуть, що він був посланий у ліси Аделарта самими Богами, підкинутий до місцевого храму, щоб стати пророком Ейр і викрити брехню Архонату. Навіть скептики мало що можуть сказати про його минуле. Не маючи відомих батьків чи родичів, Лука виховувався вірою, що прищепило йому фанатичну відданість Богам і скепсис щодо методів Архонату, який супроводжував його все життя.\n\nКульт особи Луки настільки зріс, що прихильники проголосили його "істинним прелатом Ґрайфвальда", попри ієрархічне протиріччя, яке несе ця назва. Цей обірваний літній жрець став маяком надії для народу Аделарту. Після постреволюційних чисток він залишився єдиним легітимним духовним авторитетом у провінції.\n\nМерлок Вуд зберіг його секту і дав їй владу, а тепер сам Лука фун Ліссей посів своє місце. Доки він очолює край, дворяни тікатимуть у страху, а безвірні лише схилятимуть голови перед Богами.\n\n§YПортрет§!: MonAx"

 luca_archon_desc:0 "§YНародився§!: 22 грудня 928 року в Ліссеї\n\n§YБіографія§!: Походження Архонта Венії III, пророка Ейр та побожного теолога, є таємницею для багатьох. Дехто каже, що Боги самі привели його в Аделарт, щоб покласти край брехні офіційної церкви. Венія III виховувався у вірі, що дало йому фанатичну відданість справі.\n\nДосить дивно, що грифон, який так запекло виступав проти Архонату, сам став Архонтом Ейр. Однак той, хто колись був Лукою фун Ліссеєм, заявив, що цей новий Архонат більше не буде олігархією. Натомість Архонти обиратимуться всім народом Грифонії - прелати та жерці шукатимуть по всій країні тих, хто справді розуміє віру і готовий нести тягар влади. Віднині Архонти Венії III не обиратимуться знаттю, вони походитимуть з-поміж справжніх вірян, де б ті не були.\n\n§YПортрет§!: MonAx"

 HEL_sister_selena_desc:0 "§YНародилася§!: 9 жовтня 961 року в Ліссеї\n\n§YБіографія§!: Селена Крафсхерр бореться за віру все своє життя. Вона була шостою дитиною і четвертою донькою в бідній, але побожній родині фермерів на околиці Ліссея. Покинута напризволяще в злиднях, Селена пішла з материнської ферми, щойно подорослішала, і в 979 році приєдналася до руху Луки фун Ліссея, зрекшись земного майна, щоб прийняти благодать Ейр та Старої Віри.\n\nОднак Селена не знайшла пристрасті в нудних обов'язках жриці й вирішила взяти справу у власні кігті. Під час Аделартської революції 987 року вона билася в офіційних ополченських бригадах старовірів, санкціонованих Лукою. За допомогою Луки, який прив'язався до люто релігійної войовниці, Селена змогла заснувати "Сестер Ейр", офіційне ополчення віри.\n\nВона стала висвяченою "Сестрою" цього суто жіночого загону і невдовзі залучила грифонок з усього Ґрайфвальду, ставши "правою лапою" Луки. Саме Селена змусила Луку проголосити себе Прелатом на противагу Ґрайфвальду, а решта вже стала історією. Тепер, коли позиції старовірів під проводом Луки зміцнилися, Селена стоїть на чолі і віри, і армії. Питання лише в тому, як вона цим скористається.\n\n§YПортрет§!: Cofido"

 sheriff_desc:0 "§YНародився§!: 21 листопада 951 року в Ліссеї\n\n§YБіографія§!: Ніхто достеменно не знає, як шериф Аделарта досі живий, попри всю жовч і ненависть, спрямовані проти нього, і як він примудряється залишатися такою великою скалкою в тілі аделартського уряду. Двадцять років тому Жан де Ноттмань переслідував бандита Мерлока Вуда та його союзників-старовірів, влаштовуючи облави на міста та вимагаючи податки й збори з селян, які могли переховувати бунтівників. Потім усе змінилося, Мерлок Вуд став лідером вільної території для грифонів усіх мастей, тоді як Ноттмань був змушений тікати з міста в місто з невеликою армією вірних грифонів та озброєних податківців.\n\nОднак Ноттмань перейняв невловимий дух Вуда і ніколи не затримувався в одному місті двічі. Поки найманці та "Лісові брати" полювали на нього, шериф Аделарта залишався на крок попереду, грабуючи села заради податків, щоб наповнити військову казну, і вербуючи грифонів до свого кочового війська, весь цей час він чекав на момент для відновлення шерифства. Він втратив око і всю свою гідність у партизанській війні проти свого колишнього домену, але його наполегливість не похитнулася, як і невпинний дух помсти.\n\nСаме цей дух помсти приведе оновлене шерифство в еру ідеального порядку, і цього разу Жан де Ноттмань не планує повторювати колишніх помилок.\n\n§YПортрет§!: Tofus"

 wood_general_desc:0 "§YНародився§!: 11 травня 959 року в Бергелуні\n\n§YБіографія§!: Мерлока Вуда називають по-різному: зрадник, бандит, убивця, герой, захисник. Але ніхто не може заперечити, що він передусім революціонер. Вуд розпочав свою кар'єру як маловідомий партизан Першої Аделартської революції 983 року, коли славнозвісний розбійник Ян Ройцен надихнув народ Аделарта розірвати кайдани Ґрайфвальда та Аквілеї. Після того, як повстання Ройцена було придушене, а його самого страчено, Вуд підхопив стяг аделартських революціонерів. Він перебудував рух на колективістських та запекло антимонархічних засадах, обіцяючи перерозподіл багатств і правосуддя над корумпованою шляхтою в кожному завойованому місті.\n\nХоча навички Вуда за останні роки дещо притупилися, він все ще залишається надзвичайно компетентним командиром і героєм для народу Аделарту.\n\n§YПортрет§!: Scroup"

 trouillard_general_desc:0 "§YНародився§!: 2 липня 965 року у Вілістелі\n\n§YБіографія§!: Жодна істота не знає точно, чому Жак Труйяр досі воює. Відомий монархіст, який навіть не намагається приховати своєї огиди до унікальної демократії Вільної Території, Труйяр бився в революції проти Ґрайфвальду з щирого відчуття патріотизму щодо Аделарту, а не через цінності Вуда.\n\nЗгодом Труйяр залишив "Лісових братів" Вуда, і хоча продовжив служити в збройних силах, його лояльність до уряду Вуда швидко згасла. Наразі Труйяр є чи не найдосвідченішим генералом Аделарта, а його майстерність серед нечисленного професійного військового штабу країни робить його неоціненним активом, незалежно від того, якої форми набуде держава.\n\n§YПортрет§!: EmpressBridle"

 alexandra_desc:0 "§YНародилася§!: 28 квітня 975 року в Аквілі\n\nПерша Аквілейська революція сповнила юну Александру Десьє непохитною пристрастю до захисту свободи своїх співвітчизників. Коли її батько-інвалід мав змогу, він брав її з собою спостерігати за страйками робітників, які король Морісет, керуючись ірраціональними примхами, або ігнорував, або придушував з особливою жорстокістю. Це продемонструвало їй грубі, реальні акти класового капіталізму та імперіалізму.\n\nЗавдяки зв'язкам батька з підпільним республіканським рухом, Александра познайомилася з цілою галереєю комуністичних діячів, які згодом здобули політичну славу, таких як Крю, Ґодро та Деверо. Проте саме Віктор Аллар зачарував її чи то своїми тверезими ідеями щодо робітничого авангарду, чи то прагматичними методами просування справи пролетаріату без зайвих ілюзій, чи то наївною інтригою навколо його таємничого походження. Віктору припав до душі запал Десьє, і він, зробивши її однією зі своїх секретарок, надав їй безперешкодний доступ до праць соціалістів з усього світу.\n\nМожливість поєднати теорію Аллара з вільнодумною дією з'явилася у 1003 році, коли Аллар відправив Александру до Аделарта, щоб підготувати місцевих робітників до можливої Аквілейської "червоної хвилі" революції. Весь цей час вона здобувала довіру Мерлока Вуда та його банди, допомагаючи їм у боротьбі проти шерифа та реакційних сил Грайфвальда. Наступний переворот усунув Мерлока від влади, і у вакуумі, що утворився, Десьє взяла все під свій контроль, передавши Аделарт під юрисдикцію свого авангарду.\n\nТепер Десьє, наглядачка величезних просторів мирних лісів і ферм, утримує бастіон комуністичного пурпуру в Західній Грифонії, готова виправляти несправедливості, завдані робітничому класу. Залишається побачити, наскільки вправно найкраща учениця Аллара зможе вести за собою з передової.\n\n§YПортрет§!: Egil"

 alexandra_helmsgriff_desc:0 "§YНародилася§!: 28 квітня 975 року в Аквілі\n\nОчолюючи невеликий загін відданих революціонерів у хаотичній та реакційній глушині Периферії, Александра Десьє пройшла довгий шлях від манірної інтелектуалки до досвідченого лідера. Перекувавши сільську аграрну економіку Аделарта на повністю індустріалізовану та модернізовану, перетворивши селянські ради на належні робітничі збори та заснувавши дієвий комуністичний конгрес, вона довела свою спроможність. Тріумф Північно-Аквілейської Республіки над реакційним режимом Аквіли перетворив Александру з недосвідченого академіка на загартованого вождя. Вона зберігає гострий розум, енциклопедичні знання марксистського канону та залізну волю, загартовану в самому центрі боротьби. Сьогодні Десьє, без сумніву, є найвидатнішим революційним лідером у всій Грифонії.\n\n§YПортрет§!: Egil"

 HEL_sheriff_general_1_desc:0 "§YНародився§!: 1 грудня 950 року в Конарді\n\nШлях Тео в житті завжди був чітко окреслений, і він не бачив причин заперечувати: його батько був ковалем, як і дід, і прадід до нього. Єдиним нововведенням Тео в сімейну справу, окрім тяжіння до державної служби, була пристрасть до вогнепальної зброї. Ніхто з тих, хто знає Тео, не назвав би його генієм, але ще з малечку фун Штайхен був одержимий внутрішньою будовою зброї. Він розбирав і збирав гвинтівки та пістолети, майстрував саморобні кремінні замки, які лише зрідка давали осічку, і перетворив успадковану кузню на повноцінну сучасну збройову майстерню.\n\nЧесно кажучи, лише завдяки випадку Тео, імпульсивний та охочий до пригод, став Вартовим, а не бандитом. Особиста неприязнь до "Лісових братів" Вуда та давня ворожнеча через невдалу угоду з продажу саморобних рушниць - ось єдині причини, чому він ніколи не мав спільних справ із бандитським урядом. Коли Вуд та його поплічники розграбували його арсенал, вірність Тео була остаточно визначена.\n\nШериф чудово розуміє, що лояльність Тео зумовлена обставинами, і використовує його навички відповідним чином: серед Вартових важко знайти кращого фронтового командира, а його звичка особисто бруднити кігті в бою приносить йому повагу солдатів. Чого ще може бажати розсудливий грифон від свого поплічника?\n\n§YПортрет§!: BunnyShrubby"

 HEL_sheriff_general_2_desc:0 "§YНародилася§!: 12 червня 967 року в Бель-Ілі\n\nАдальгізель - нащадок престижного шляхетського дому фун Кург, однієї з небагатьох дворянських родин Периферії, яка незмінно підтримувала Аквілейське правління протягом буремних років після Першої революції. За цю лояльність родині повернули багато маєтків після реставрації Дискретів. Усі, окрім одного: їхньої садиби в ідилічній місцевості на краю Аквілеї, посеред зелених лісів Аделарта.\n\nХоча бажання шляхтички повернути своє право за народженням зрозуміле багатьом, цілеспрямованість і відданість Адальгізель шерифу стали майже легендарними. Поки фун Курги залишаються відносно впливовими, маєток в Аделарті - це виключна спадщина Адальгізель. Саме тому вона слухняно йшла слідами шерифа крізь роки запеклої партизанської війни в аделартських лісах, вірячи, що він - єдиний грифон, здатний повернути їй те, що належить за законом. Тепер, коли шериф нарешті вигнав бандитів і відновив владу, Адальгізель залишається його правою лапою та найбільш довіреним виконавцем.\n\n§YПортрет§!: AnaStaFury"

 HEL_joanna_fliger_desc:0 "§YНародилася§!: 1 лютого 953 року в Люксвінґбурзі\n\nСеред безлічі контрабандистів та розбійників, що діяли в хаотичному кліматі Периферії після Революції, Жанна вирізняється передусім своїми унікальними навичками. Вона народилася в зростаючому фетизійському середньому класі в родині освічених робітників. Її захоплення технікою та інженерією могло б легко привести її до Роттендедама, Грифенгайма чи будь-якого іншого престижного університету, але доля розпорядилася інакше: стагнація фетизійської економіки після перевороту Кемерская знову штовхнула її родину до злиднів. Це змусило Фліґерів назавжди покинути Герцланд у пошуках кращої долі.\n\nХоча минуле контрабандистки зброї робить репутацію Жанни не зовсім кришталевою, вона чи не єдина істота в усій Грифонії, яка проводила організовані повітряні операції поза контролем будь-якого уряду. Жанна не схильна до ідеологічних симпатій (окрім загальної неприязні до релігійних фанатиків), що робить її неоціненним активом для нового уряду, якому потрібні гнучкі та дешеві військово-повітряні сили.\n\n§YПортрет§!: BunnyShrubby"

 HEL_bertus_ghisel_desc:0 "§YНародився§!: 14 травня 978 року в Іґлтоні, Вільна Територія Аделарт\n\n§YРоль§!: Політичний виконавець\n\n§YБіографія§!: Легенда про "Залізну маску" народилася в тіні гноблення задовго до того, як він став символом непохитної комуністичної рішучості. Будучи гучним агітатором у підпільних революційних колах Аделарта, Берт проповідував рівність і права робітників у темні дні контролю Шерифа. Схоплений безжальним Жаном, він витримав брутальні катування, але не зрадив товаришів. Його мовчання та непокора коштували йому жахливого каліцтва, яке він тепер приховує за залізною маскою - похмурим нагадуванням про його страждання та силу.\n\nЗвільнений під час бандитського повстання Мерлока, що повалило старий режим, Берт став народним героєм серед комуністичних груп. Однак його бунтарська натура зробила його відомим підбурювачем, що кидав виклик владі скрізь, де процвітала нерівність. Коли Александра прибула до Аделарта у 1003 році, Берт без вагань присягнув їй на вірність, вбачаючи в ній втілення справжнього лідерства та ідеологічної чистоти. Він швидко став її особистим "псом", винищуючи політичних ворогів із нещадною ефективністю.\n\nЯк виконавець, Берт вміє не лише залякувати, а й бути глибоко відданинм справі. Подейкують, що він фанатик, але для Александри та революції він залишається незамінним охоронцем комуністичного полум'я.\n\n§YПортрет§!: AnaStaFury"

 HEL_alois_fliger_desc:0 "§YНародився§!: 1 лютого 984 року у Вілістелі\n\nНа відміну від своєї матері, яка ще пам'ятає відносно нормальне життя у Фетізії, життя контрабандиста в бігах - це єдине, що колись знав Алоїз. Народившись від короткочасного роману Жанни з місцевим жителем Аделарта, Алоїз пішов стопами матері. Хоча він не настільки відданий інженерній справі, як вона, він став винятковим пілотом, звиклим садити літаки на крихітні імпровізовані смуги, поспіхом збудовані посеред густих незайманих лісів.\n\nАлоїз плекає постійну зневагу до авторитетів, що робить його спорідненою душею для побратимів-грифонів в Аделарті.\n\n§YПортрет§!: BunnyShrubby"

 HEL_jean_weineg_desc:0 "§YНародився§!: 1 березня 962 року в Герлайні\n\nЩиро кажучи, про Жана можна сказати небагато. Довічний шанувальник безтурботної сільської місцевості, народжений і вихований у тихому передмісті, запеклий любитель музики та випивки, Вейнеґ є живим втіленням пересічного аделартця, і він не хотів би іншої долі. Його єдина дивна риса це пристрасть до традиційного полювання з луком та стрілами, як його вчили батьки. Проте не варто думати, що Жан обмежений луддит; жоден грифон не протримався б так довго під крилом Мерлока, якби його лапа не тримала впевнено гвинтівку, і в цьому питанні Жан ніколи не підводив.\n\nЗазвичай веселий і схильний до жартів навіть у небезпеці, Жан впадає в лють при одній лише згадці про свого тезку. Ненависть Вейнега до Шерифа особиста, і лише одиниці знають справжню причину. Поки війська ширять чутки, сам Вейнеґ каже лише одне: Жан де Ноттмань вкрав у нього щось дуже цінне, і єдина гідна плата за це - життя Шерифа.\n\n§YПортрет§!: Egil"

 HEL_frere_tocque_desc:0 "§YНародився§!: 15 червня 953 року в Берґелуні\n\nСтарий чернець із Берґелуна б'ється лише заради однієї мети: задля тривалого миру в Аделарті та свободи продовжувати своє спокійне парафіяльне життя. Ток народився на сільській віллі, успадкував виноградник і отримав базову освіту в ейритській вірі. Це все, що він знав і чого коли-небудь хотів. Невиправний оптиміст, що зберіг юнацький запал навіть на схилі літ, чернець ніколи б не взяв до рук зброю разом із бандитами Вуда, якби не бачив у цьому єдиний шанс. Звільнення Аделарта від тиранії Шерифа вартувало будь-яких незгод із методами Вуда.\n\n§YПортрет§!: Egil"

 HEL_new_jaume_fm_desc:0 "§YНародилася§!: 18 липня 985 року у Флоуені\n\nДалека родичка Жома де Конара, Емері виросла в достатку у Фловені й ніколи не цікавилася політикою до повноліття. Ставши дорослою, вона раптом вирішила, що створена для військового життя, хоча жодні хабарі не допомогли їй отримати офіційне звання в міському ополченні. Не бажаючи здаватися, вона побачила в політичних авантюрах кузена в Аделарті ідеальну можливість зробити кар'єру офіцера. Втім, брак досвіду та прогалини в освіті можуть стати на заваді славі, якої вона так прагне.\n\n§YПортрет§!: wldhow"

 HEL_blacktalon_desc:0 "Походження Блекталона оповите таємницею. Хоча ходять чутки, що вона була позашлюбною дитиною селян із Герлайна, покинутою в лісі, підтверджень цьому немає. Культисти Маара з аделартських гаїв присягаються, що бачили, як вона напівсформованою виповзла з каламутного озера під час молодика, і відтоді вона очолює ополчення Четвертої. Чи вона справді істота, народжена темрявою, чи просто надзвичайно хитра божевільна - невідомо, але її енциклопедичні знання флори та фауни Аделарта і знання кожної щілини в лісі не мають рівних навіть серед людей Вуда.\n\n§YПортрет§!: RealPakk"

 HEL_blacktalon_spooky_desc:0 ""§RЗабудь про реальність. Піддайся своїм найтемнішим снам.§!"\n\n§YПортрет§!: RealPakk"

