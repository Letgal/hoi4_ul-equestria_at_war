 HEL_luca_harmony_idea:0 "Прелат Лука фун Ліссей"
 HEL_luca_harmony_idea_desc:0 "Оскільки наш уряд, що підтримує старовірів, повернув його до влади, Лука фун Ліссей став лідером ейритів-консерваторів і головою аделартського парламенту. Хоча його посада є другорядною щодо федеральної ради, Лука продовжує виступати за суворий аграризм та аделартські традиції проти загроз з боку Ґрайфвальда та Архонтів у Рілі та Грифенгаймі."
 HEL_greifwald_immigrants:0 "Повернення патріотів"
 HEL_greifwald_immigrants_desc:0 "Бандити, що тероризували Аделарт, так і не змогли завдати вирішального удару по тих, хто все ще вірив у шерифа. Поки одні залишалися в країні, щоб допомагати його поверненню, багато інших перебувають за кордоном, чекаючи на запрошення додому."
 HEL_monarchic_structures_idea:0 "Старі структури"
 HEL_monarchic_structures_idea_desc:0 "Слабкість і жадібність Грифонії підживлюються тими, хто бажає знищити природний порядок для кожного грифона. Республіканізм та соціалізм зруйнували самі ті структури, що так довго тримали Грифонію на вершині світу. Тільки відмовившись від розкоші ідеалізму, ми зможемо вижити і знову стати великими!"
 HEL_death_and_taxes_idea:0 "Смерть і податки"
 HEL_death_and_taxes_idea_desc:0 "Незалежно від обґрунтування, держава потребує коштів. Навіть якщо наші грифони скаржаться на "погрози" з боку збирачів податків, це просто те, до чого вони мають звикнути. Зрештою, важкі часи народжують великих грифонів."
 HEL_death_and_taxes_idea2:0 "Смерть і податки"
 HEL_death_and_taxes_idea2_desc:0 "Незалежно від обґрунтування, держава потребує коштів. Навіть якщо наші грифони скаржаться на "погрози" з боку збирачів податків, це просто те, до чого вони мають звикнути. Зрештою, важкі часи народжують великих грифонів, а ми маємо стати величнішими за всіх."
 HEL_legacy_of_the_red_terror:0 "Більше ніяких бандитських республік"
 HEL_legacy_of_the_red_terror_desc:0 "Справжні історії про бандитів Аделарта тепер ширяться серед народу. Хибна ідея про "шляхетного розбійника" нарешті виправлена, і багато хто з тих, хто підтримував Мерлока та його поплічників, тепер зрікаються його та його ідеалів."
 HEL_legacy_of_the_red_terror_2:0 "Вічне шерифство"
 HEL_legacy_of_the_red_terror_2_desc:0 "Наші землі стануть свідченням сили наших ідей. Будь-яка пам'ять про "Вільну Територію" або "Аделарт" давно зникла, замінена знанням про безпеку та стабільність, які пропонує наше доброзичливе шерифство.\n\nМоє шерифство."
 HEL_adelart_reborn_idea:0 "Нафтове диво"
 HEL_adelart_reborn_idea_desc:0 "Грифонія, попри всю свою розпусту, є цінним ринком для нашої продукції. Дрібні феоди та ідеалісти по всьому континенту прагнуть нашої нафти для власних потреб. Надавши їм вигідні умови з кількома застереженнями, ми зможемо домінувати в їхній політиці, навіть не докладаючи до цього зусиль..."
 HEL_woodist_distributism:0 "Солідарність без соціалізму"
 HEL_spread_teachings:0 "Святе повчання Ейр"
 HEL_infrastructure_boom:0 "Розширення доріг"
 HEL_theatre:0 "До театрів!"
 HEL_land_reform_idea:0 "Перерозподіл землі"
 HEL_prelate_youth_leagues:0 "Молоді ейрити-консерватори"
 HEL_adelartian_culture:0 "Eis Fräikultur"
 HEL_anarchia_mama:0 "Повстанська армія"
 HEL_gommie_culture:0 "Одна мова, один народ, одна боротьба"
 HEL_gommie_culture_desc:0 "Ідентичність несе з собою певний багаж, добрий чи поганий. Наша комуністична ідентичність не потребує пояснень світові, але наша аквілейська основа успадковує невмирущий дух Першої Революції. Тож не бути аквілейцем - означає бути аделартянином: бути розтоптаним, принижуватися перед негідними панами і прирікати своє життя на вічне нікчемне служіння."
 HEL_old_believer_stubborness:0 "Упертість старовірів"
 HEL_old_believer_stubborness2:0 "Цінності старовірів"
 HEL_foreign_office:0 "Аделартський закордонний комітет"
 HEL_beginnings_of_unionization:0 "Зачатки синдикалізації"
 HEL_beginnings_of_unionization2:0 "Профспілкова машина"
 HEL_urban_economic_plan:0 "Ініціативи з модернізації"
 HEL_urban_economic_plan_desc:0 "На світанку маленьке село отримує партію тракторів і вживаних комбайнів. До полудня команда лісорубів із бензопилами обирає ділянку лісу для сучасного житла. До заходу сонця електрика освітлює колись непроглядні ночі.\n\nБезкласове суспільство отримує вигоду лише від величного завтра, а не від повторення нікчемного бруду феодалізму."
 HEL_new_quotas:0 "Виробництво понад усе"
 HEL_revolutionary_discipline_moment:0 "Служити Революції"
 HEL_highest_bidder_idea:0 "Націоналізація нафти"
 HEL_highest_bidder_idea_desc:0 "В іншому світі компанії, що володіють дорогоцінним "чорним золотом", яке вирує під поверхнею, тримали б усю державі в монопольному зашморгу. На щастя, під керівництвом Десьє Республіка випередила їх, перебравши контроль над цими потенційними корпораціями. Аделартським нафтовикам більше не потрібно боятися фатальних умов праці або того, що їхні заплямовані кров’ю та потом зарплати сприйматимуться як належне кабінетними менеджерами."
 HEL_five_year_plan:0 "Сталліоградські промислові заходи"
 HEL_visionaries:0 "Візіонери в бюрократії"
 HEL_visionaries_desc:0 "Рутина викорінюється з урядових залів. Прислухатися до мас заохочується, а наші державні службовці в червоних мундирах працюють пліч-о-пліч із побратимами-робітниками, щоб зрозуміти їхній біль. Понад усе, проте, стоїть невмирущий революційний запал, не заплямований корупцією, кумівством та змовами з реакцією та імперіалізмом."
 HEL_collectives:0 "Від рад до колективів"
 HEL_collectives_desc:0 "Капіталістичні суспільства навколо нас засуджували б наші методи, але Аделарт уже має досвід життя в "протокомуністичному" суспільстві: сільських комунах, де грифони добровільно живуть разом і координують зусилля для самозабезпечення. Хоча вони не мали значного капіталу чи робітничого класу, цей спосіб життя став чудовим шаблоном для сьогоднішньої аграрно-промислової колективізації."
 HEL_prohibition_measures:0 "Заходи сухого закону"
 HEL_capitalist_education_idea:0 "Люби свою країну, працюй на свою країну"
 HEL_capitalist_education_idea_desc:0 "Жити - значить трудитися. Трудитися - значить служити. Служити - значить жити.\n\nНедавні зміни в навчальних програмах змусили наші школи та коледжі зосередитися на предметах, що виховують почуття обов’язку перед нашою великою державою. Ідеї, що приносять нам процвітання, чудові, але вони потребують захисту. Навчаючи важливості праці та захисту наших інтересів, ми виховаємо наступне покоління патріотів."
 HEL_the_greifwald_oil_boom:0 "Ґрайфвальдський нафтовий бум"
 HEL_meritocratic_structures:0 "Меритократичні структури"
 HEL_theory_and_praxis:0 "Теорія та праксис"
 HEL_theory_and_praxis_desc:0 "За словами Карамель Маркс, робітничий клас - це не безлика група, залежна від хвиль фаталістичної історії. Це соціалізований клас, який усвідомив своє становище, сформулював теорію чи знання про світ, і, озброївшись цим, тепер прагне організуватися та змінити суспільство, що і є практикою або праксисом."
 HEL_class_consciousness:0 "Робітнича свідомість"
 HEL_class_consciousness_desc:0 ""На базовому рівні усвідомлювати себе - це не лише метафізичний акт визнання себе як особистості. Це розуміння того, що ти є частиною суспільства і водночас поза ним. Досягнувши цієї свідомості, ви отримуєте здатність діяти, виявляти волю, від свого імені.\n\nАле чи завжди наші інтереси збігаються? Зовсім ні. Проблема виникає, коли взаємодія робітників із суспільством стикається з інтересами буржуазії: робітники видобувають і переробляють ресурси, тоді як буржуа, відсторонені від процесу творення, вирішують, хто працює, що продається і за якою ціною.\n\nЯкий висновок ми можемо зробити з конфлікту класів? Щоб покращити свою долю, робітник має бути пробуджений до розуміння того, ким він є і як цей конфлікт може бути вирішений на його користь".\n\n- Александра Десьє, "Про основні засади комунізму: коментар до праць Карамель Маркс та Файра Енджела""
 HEL_strong_foundations:0 "Міцний фундамент"
 HEL_bombing_idea:0 "Перевага найманців"
 HEL_general_support_idea:0 "Найкращі пілоти"
 HEL_griffon_resilience:0 "Грифонська стійкість"
 HEL_griffon_resilience_2:0 "Грифонська стійкість"
 HEL_socialist_volunteers:0 "Мережа соціалістичних добровольців"
 HEL_socialist_volunteers_desc:0 "Коли світ стрімко занурюється у взаємну бійню, наші побратими-робітники з усього світу потребуватимуть надійного притулку. Ми маємо можливість стати таким притулком і гостинним центром для світової революції."
 HEL_construction_spree:0 "Будівельний бум"
 HEL_jan_roycen_university:0 "Школа комерції імені Яна Ройцена"
 HEL_real_tax_collectors:0 "Справжні податківці"
 HEL_shittier_loan_idea:0 "Позика в аделартських акул"
 HEL_the_education:0 "Визволителі на навчанні"
 HEL_the_education_2:0 "Приклад Вуда"
 HEL_the_religion:0 "Етос дарування"
 HEL_will_of_the_governed:0 "Згода керованих"
 HEL_printing_lines_shattered:0 "Повний контроль над ЗМІ"
 HEL_printing_lines_shattered_desc:0 "Брехня "неупереджених" аделартських газет нарешті припинена; триває реорганізація їхніх активів та докорінна зміна пріоритетів."
 HEL_discret_advice:0 "Упертість Дискретів"
 HEL_discret_advice_desc:0 "Попри свою жадібність, Дискрети зволили надіслати нам своїх найкращих фахівців для покращення оборонних стратегій та навчання наших військ."
 HEL_proteus_advice:0 "Протеєва лють"
 HEL_proteus_advice_desc:0 "Попри свою жадібність, Архонти надіслали нам своїх найкращих фахівців для покращення наступальних стратегій та навчання наших військ."
 HEL_a_proper_language:0 "Вихований і пристойний народ"
 HEL_a_proper_language_desc:0 "Останній цвях забито в труну цієї провінції. Аделартську мову стрімко витісняють, що несе тривожні наслідки для тих, хто наважується говорити нею публічно чи вдома."
 HEL_work_work_work:0 "Працювати, працювати, працювати!"
 HEL_work_work_work_desc:0 "Наша цінність визначається нашими жертвами. Ми не можемо покладатися на надмірності обжерливості та природну жадібність, щоб не впасти в обійми Маара. Працюйте до кривавого поту, і ви будете винагороджені."
 HEL_police_mode:0 "Поплічники шерифа"
 HEL_police_mode_desc:0 "Наслідуючи Аквілейську ідею "жандармерії" для подолання прірви між армією та поліцією - Служба правопорядку шерифства, Service d'Ordre Shrievale, допомагає як у регіонах, охоплених бандитизмом, так і в розвідці під час війни."
 HEL_police_mode2:0 "Шериф, Суверен, Служба"
 HEL_police_mode2_desc:0 ""За Шерифа, Честь та Закон"\n- Гімн Служби правопорядку шерифства.\n\nСлужба зарекомендувала себе добре, і під наглядом Теодула Гоббла їй дозволили розширити операції всередині країни. Кожна ратуша отримала охорону від SOS, що гарантує захист тих, хто працює на нас, від зовнішніх загроз та їх самих.\n\nГотуються плани щодо розширення допомоги SOS у турбулентних регіонах, хоча там вони стикаються з опором. Можливо, їм потрібна демонстрація того, чому їм потрібна допомога."
 HEL_police_mode3:0 "Шериф, Суверен, Служба"
 HEL_police_mode3_desc:0 "Хоча певний опір вщух, SOS все ще явно необхідна. Адже бандити чекають на наше роззброєння, терпляче очікуючи моменту для удару. Ми маємо бути пильними!"
 HEL_police_mode4:0 "Шериф, Суверен, Служба"
 HEL_police_mode4_desc:0 "Кожен грифон у безпеці під батьківським наглядом SOS. Ті, хто хоче зашкодити нам, виявляються і знешкоджуються Службою. Поки вам нема чого приховувати, вам нема чого боятися."
 HEL_raiding_frenzy:0 "Простогрифони знову в сідлі!"
 HEL_banker_dependence:0 "Зв'язки з іноземними банками"
 HEL_banker_dependence2:0 "Економіка в борговій пастці"
 HEL_banker_dependence3:0 "Повна банківська залежність"
 HEL_banker_dependence3_desc:0 "Ми опинилися в досить скрутній ситуації: рішення Вуда дозволити Жому брати позики від імені Аделарту посадило нас на короткий повідець із серйозними зобов'язаннями перед патриціями Фловени. Хоча це створює величезне навантаження на економіку, ситуація не безнадійна. Наприклад, якщо адміністрація Фловени зазнає певних... потрясінь, це може звільнити нас від виплати всіх цих ідолів...\n\n§YЦей§! §Cнаціональний дух§! §Yможе бути видалений шляхом анексії або маріонетизації @FLO §rФловени§!§Y, або якщо їхній уряд стане §Rкомуністичним§!§Y.§!"
 HEL_suspicious_loans:0 "Підозрілі позики"
 HEL_unity_campaign:0 "Єдність проти реакції"
 HEL_alexandras_agitators:0 "Революційне навернення"
 HEL_more_guns_than_griffs:0 "Більше гармат, ніж грифонів"
 HEL_focusing_on_land_production:0 "Фокус на сухопутному виробництві"
 HEL_count_charel_idea:0 "Граф Шарель Клодет III"
 HEL_count_charel_idea_desc:0 "Граф Шарель Клодет, третій цього імені - маріонетка в усьому, крім назви. Кожне створіння в царстві Шерифа знає про його безсилля, і саме цікаве - він сам винуватець цього стану. Шанси молодого графа знайти власну нішу мізерні. Можливо, як Гровери чи Дискрети, що оточували царство його дядька, він приречений на бездіяльність, поки повільно йде до могили під усмішкою свого ляльковода."
 HEL_king_charel_idea:0 "Король Шарель Клодет III, Суверен Аквілейський"
 HEL_king_charel_idea_desc:0 "Король Шарель Клодет III залишається маріонеткою. Посаджений на трон Аквілії махінаціями Шерифа, він займає чисто адміністративну посаду, що сприяє стабільності, але йому бракує і, ймовірно, завжди бракуватиме справжньої влади."
 HEL_new_model_army_idea:0 "Когорта"
 HEL_new_model_army_idea_desc:0 "Ми ніколи не будемо в безпеці від бандитів, що оточують нас, якщо покладатимемося на сумнівних ополченців та молитви до Арктурія. Шериф наказав створити нову армію, і так воно і буде.\n\nЗвісно, наші найвідданіші грифони мають бути розподілені по всіх рівнях війська, щоб надихати тих, хто може похитнутися перед обличчям поразки, стояти і битися за нашу справу! Наша дисципліна має бути неперевершеною, щоб ми не схибили в рішучу мить!"
 HEL_new_model_army_idea2:0 "Когорта"
 HEL_new_model_army_idea2_desc:0 "Ми ніколи не будемо в безпеці від бандитів, що оточують нас, якщо покладатимемося на сумнівних ополченців та молитви до Арктурія. Шериф наказав створити нову армію, і так воно і буде.\n\nНаші найлояльніші грифони служать нашими очима та вухами на кожному рівні "Когорти", надихаючи на акти хоробрості та самопожертви тих, хто інакше міг би піддатися боягузтву. Наша дисципліна буде взірцевою!"
 HEL_new_model_army_idea3:0 "Когорта"
 HEL_new_model_army_idea3_desc:0 "Наша армія стоїть як сяючий приклад вірності та відваги. Про їхні діяння в Аквілеї писатимуть поколіннями. Наші сили численні, лояльні, і їх нарешті достатньо, щоб назавжди захистити нас від бандитизму.\n\nНаші грифони готові стати щитом проти спокус, що випливають із самої нашої природи. Вони стоять як оплот проти жадібності та захланності нашого роду, проти тих, хто хоче поглинути наше процвітання і залишити від нас лише порожню оболонку.\n\nВони готові битися і померти стоячи, бо знають, що вони захищають."
 HEL_desperate_defense:0 "Відчайдушна оборона"
 HEL_desperate_defense_desc:0 "Аквілейські шури вірять, що ми просто частина їхнього права за народженням! Що ми не можемо діяти без їхнього нагляду, і що нас треба повчати в нашому прагненні до самовизначення! Побратими, що б не сталося, я прошу лише про декілька речей!\n\nЗмусьте їх стікати кров'ю за кожен дюйм нашої батьківщини!\nЗмусьте їх пошкодувати, що вони топчуть наші ідеали!\nЗмусьте їх жахатися кожного заходу сонця!""

 HEL_count_idea:0 "Клодет I"
 HEL_count_idea_desc:0 "Граф Клодет, завдяки невтомній праці свого найвірнішого шерифа, повернувся на свій королівський пост на чолі Ґрайфвальда. Хоча він офіційно відмовився від багатьох своїх повноважень, побачивши на власні очі ціну своїх помилок, він усе ще посідає місце в серці кожного грифона під ним.\n\nЙого доброта вважається предметом гордості, яскравим світлом згори, яке ретельно оберігають вірні піддані. Дехто з палацу поширює чутки про незгоди між графом та його шерифом, проте така думка неможлива.\n\nЗрештою, що таке шериф без суверена, якому він служить?"

 HEL_king_cloudet_idea:0 "Король Клодет I, Суверен Аквілейський"
 HEL_king_cloudet_idea_desc:0 "Король Клодет, перший свого імені, був офіційно коронований як законний суверен Аквілеї та зі всіма почестями зійшов на трон Аквіли. Завдяки його найвірнішому шерифу, домен короля процвітає та перебуває в безпеці, а сам монарх може не перейматися тонкощами адміністрування. Король може спочивати спокійно, знаючи, що найкращі люди шерифства вистежать і знищать будь-які загрози його царству."

 HEL_we_hate_aquileia:0 "Ніколи ми не будемо аквілейцями!"
 HEL_we_hate_aquileia_desc:0 ""Ми ніколи не повинні забувати про злочини тих, хто сидить на своєму загарбаному золоті в Аквілі! Тільки б'ючись пліч-о-пліч під єдиним стягом, ми зможемо зламати їхній дух і розчавити їхні армії!""

 HEL_disappearing_acts:0 "Всередині ваших стін"
 HEL_disappearing_acts_desc:0 "Приватність - це гасло непокірних."

 HEL_shoot_first:0 "Спочатку стріляти, потім питати"
 HEL_shoot_first_desc:0 "Непокора - це значно тяжчий злочин, ніж будь-що, що ми могли б вчинити."

 HEL_appealing_to_our_nature:0 "Argumentum ad Naturam"
 HEL_appealing_to_our_nature_desc:0 "Жадібність та бандитизм слід зневажати майже в усіх формах. Єдиними винятками є ті, що можуть виявитися корисними для всіх, попри моральну ціну.\n\nВидобуваючи копалини - рийте глибоко і жадібно!\nПлануючи - прийміть свою спадщину!\nБ'ючись - грабуйте досхочу!\n\nАле ніколи не приносьте такі думки додому, щоб не спокушати інших чинити так само деінде."

 HEL_shipbuilding_blitz:0 "Суднобудівний бліц"
 HEL_shipbuilding_blitz_desc:0 "Ми не можемо сподіватися на конкуренцію з іншими морськими державами без серйозних інвестицій у наші нещодавно здобуті суднобудівні потужності. Пропонуючи зручні посади на наших майбутніх верфях, ми зможемо залучити морські знання колишніх аквілейських суднобудівників."

 HEL_magisterial_dynasty:0 "Велична династія"
 HEL_magisterial_dynasty_desc:0 "Споглядати наші землі з неба - це один із найбільших дарів, якими нас наділив Борей. Згори легко побачити, де закінчуються наші володіння і де починається жадібність континенту, адже наші міста та села відродилися. Прекрасна архітектура, що колись лежала в руїнах, була відновлена тими небагатьма вірними щасливцями. Задимлені райони півдня та замерзлі нетрі півночі різко контрастують із тими гордими містами, які ми плекаємо."
###Advisors###
 HEL_pol_1:0 "Маріан Денгштмедхен"
 HEL_pol_1_desc:0 "Довічна йогрифка та палка прихильниця безтурботної сільської місцевості, Маріан протягом багатьох років була мером Іглтона, обраною переважною більшістю голосів. Товариська та легка в спілкуванні, манера поведінки цієї грифкині та її увага як до міських, так і до сільських виборців зробили політику навколо головного міста Аделарта відносно спокійною, а її слово для жителів Іглтона цінується на вагу золота."

 HEL_pol_2:0 "Елеонора Фонтевро"

 HEL_pol_3:0 "Алоїз-а-Дагль"
 HEL_pol_3_desc:0 "Грифони Аделарта дуже дорожать своєю стабільною аграрною економікою, і прийдешні зміни, спричинені індустріалізацією та урбанізацією, змусили багатьох із них хвилюватися, що майбутня політика може загрожувати їхньому способу життя. Алоїз-а-Дагль - один із небагатьох грифонів, які вийшли на політичну арену як активісти в цьому питанні, сподіваючись зберегти сільські території Аделарта та їхній вплив на економічне і політичне життя."

 HEL_pol_4:0 "Вуллі Пончо"
 HEL_pol_4_desc:0 "§YНародився§!: 3 серпня 955 року в Гуфінгтоні\n\n§YБіографія§!: Вуллі ніколи не був особливо відвертим щодо деталей свого минулого, але не потрібно лізти йому в душу, щоб зрозуміти загальні риси: старий стрілець, що став "законним" революціонером, Пончо виріс у злиднях у нещодавно індустріалізованому місті Гуфінгтон і став на шлях дрібного криміналу ще до повноліття. Відомий грабіжник поїздів, він прославився на всьому еквестрійському південному заході тим, що підривав нові залізниці на безлюдних пустельних ділянках, щоб пускати вагони під укіс і грабувати їх зі своєю старою бандою.\n\nЯк цей злочинець потрапив до колони Меррімейна, не зовсім зрозуміло, хоча він стверджує, що саме родинні зв'язки з аквілейськими поні стали причиною того, що він перетнув Селестійське море і опинився в Грифонії. Вуллі, якому не щастило в житті і який втікав від закону на батьківщині, відданий Колоні особисто, хоча його ідеологічна відданість революційній справі викликає великі сумніви. Так чи інакше, одне абсолютно ясно: у своїй вузькій спеціалізації як майстер засідок та фанат динаміту він не має рівних.\n\n§YПортрет§!: RealPakk"

 HEL_hale_merrimane:0 "Гейл Меррімейн"
 HEL_hale_merrimane_desc:0 "\n\n§YПортрет§!: Egil"

 HEL_pol_5:0 "Веллем Шарлахроут"
 HEL_pol_5_desc:0 "Хоча Аделарт залишається відносно нерозвиненим порівняно навіть з іншою частиною Периферії, зусилля Веллема дещо змінили цю тенденцію. Маючи лише мінімальну підтримку, молодий інженер відповідав за планування та будівництво короткої залізниці, що з'єднує Іглтон з Конаром. Хоча це невеликий і простий проєкт порівняно з розгалуженими залізницями, що нещодавно об'єднали більшу частину Грифонії, винахідливість Шарлахроута дає зрозуміти, що за належної підтримки та ресурсів він стане величезним активом для будь-якого масштабного плану модернізації батьківщини."

 HEL_pol_6:0 "Моше Меллерйонґ"
 HEL_pol_7:0 "Артур Флессіґ"
 HEL_pol_8:0 "Шарлотта Ґулльрозен"
 HEL_pol_9:0 "Марі-Аделаїда Ґулльрозен"
 HEL_pol_10:0 "Жан-Клод Настофф"

 HEL_pol_12:0 "Корнелій деі Гроусс"
 HEL_pol_12_desc:0 "Хоча шериф залюбки особисто очолює всі аспекти правопорядку та військові справи, уряд шерифства також потребує певної цивільної адміністрації, і Корнелій, той самий грифон, якому Жан найбільше довіряє це завдання. Підступний і брутальний у рівній мірі, деі Гроусс не терпить на своїй території сквотерів, жебраків чи інших негідників, і з радістю відправляє будь-яких асоціальних елементів до Когорти шерифа, якщо ті виявляться придатнішими як гарматне м'ясо, ніж як частина цивільного суспільства.\n\n§YПортрет§!: BunnyShrubby"

 HEL_greifwald_advisor_1:0 "Барон Гай Беллем"
 HEL_greifwald_advisor_1_desc:0 ""Добрий лорд Клаудґарда", як його часто називають місцеві, цікавий грифон, водночас вкрай жорстокий до ворогів соціального порядку та уважний до своїх підданих. Походячи з дрібної аристократії, що завжди присягала на вірність дому Клодетів, барон ніколи не мав хисту до паперової роботи, але тримав свій куточок королівства в чистоті та порядку на свій лад. Гай - приязний грифон, який знає підходяще створіння для будь-якого завдання чи нагоди. Живучи за прагматичним девізом "друзям - ідол, ворогам - меч", Беллем керував маєтком у атмосфері сердечного тепла; його населення було впевнене, що поки вони дотримуються закону, вони житимуть простим, приємним життям без небезпек - ставлення, що підкріплювалося нещадними публічними стратами будь-яких порушників.\n\nХоча барон завжди відчував особисту неприязнь до шерифа та його методів, вважаючи свавільне оподаткування підривом належного державного управління, він терпить його, достатньо для того, щоб Ноттмань вирішив, що Гі стане ідеальним "привітним обличчям" шерифства для сільського населення.\n\n§YПортрет§!: BunnyShrubby"

 HEL_greifwald_advisor_2:0 "Віконт Симон де Гізборн"

 HEL_oil_baron_advisor_1:0 "Жаклін Конасс"
 HEL_oil_baron_advisor_1_desc:0 ""Думаєш, я ніколи раніше не чула цієї байки, шмаркачу? Знаєш, скільки разів подібні до тебе скиглії цитували мені свою безглузду доктрину? Дозволь відкрити тобі секрет, який твої друзі-інтелектуали приховують: практична мета всієї цієї літератури, цієї купи теоретичної балаканини, нескінченних суперечок про діалектичний матеріалізм та тонкощі класової свідомості - це замаскувати тупі міркування шарами хитромудрої мови. Ось що ти насправді мені сказав, якщо відкинути всю твою самовпевнену словесну полову: що мій головний матеріальний інтерес на твоєму боці, а не на боці боса. І тут ти абсолютно правий.\n\nЯ проста дівчина: мені потрібна їжа, випивка, місце для сну та зброя для захисту. Все інше це забаганки, а не потреби. Контроль над власною працею, звільнення від відчуження плодів мого виробництва - ці речі, мабуть, щось значать для тебе, шмаркачу, але не для мене. Моя робота вже належить мені, і вона була б моєю незалежно від того, чи носила б я комісарське пальто у твоїй революції, чи була б там, де я зараз. Тобі нема чого мені запропонувати, бо я вже маю все, чого бажаю.\n\nМені просто подобається бити людей. Що тут ще скажеш?"\n\n§YПортрет§!: BunnyShrubby"

 HEL_oil_baron_advisor_2:0 "Аннегрет Гроссьє"
 HEL_oil_baron_advisor_2_desc:0 ""ЛАМАЮЧІ: рекордні врожаї сирої нафти в Ліссеї! Стабільний рівень зайнятості, зростання ВВП на душу населення на 3% з останнього кварталу. Повідомлення про насильство під час страйку в Герлейні визнані безпідставними. Джерело: надійне джерело."".\n\n§YПортрет§!: wldhow"

 HEL_hobble_desc:0 "На фоні сивобородих та підлесливих грифонських дворян, що його оточують, Теодул Гоббл, колишній дрібний репетитор вигнаної Ґрайфвальдської знаті, виглядає як риба без води. Він не має ні шляхетних титулів, ні великих статків, і ще кілька років тому навряд чи щось знав про шерифа де Ноттманя. Як перший генеральний секретар Служби правопорядку шерифства, він зосередив у своїх руках більше влади, ніж усі купці та барони Ґрайфвальду разом узяті. Його ополчення, його таємна поліція, його агенти чатують у кожному куточку країни, і якби він нацькував їх на грифона, який хоч трохи переступить межу, за кілька днів не залишилося б жодної згадки про те, що той взагалі існував."

