### ALL THE FOCUSES OF ADELART ###

 ### National Focuses - Opening Tree ###

  # The opening tree reacts to the balance of power that Merlock Wood has to initiate as the leader of Adelart and its communities - everything is so decentralized that the initial disparate band of revolutionaries has now formed factions vying for power - Merlock here can make certain options that will move Adelart in vastly different directions бла-бла-бла, люди до того як придумали дискорд бі лайк P.S. Však je zaujímave že tieto smery bolí útvorene len takymto kratkym popisom, ďalej takych to veci uvidiš viac

  HEL_merlocks_twentieth_year:0 "Двадцять років свободи!"
  HEL_merlocks_twentieth_year_desc:0 "Хоча часи важкі і Шериф все ще намагається повернути владу, яку він колись мав, Аделарт залишається вільним від тиранії. У цю щасливу річницю ми всі разом відсвяткуємо нашу незалежність. Якщо ніщо не зіпсує свято, звісно."

  HEL_descieuxs_petition:0 "Петиція емігрантів"
  HEL_descieuxs_petition_desc:0 "Емігранти мають багато зауважень щодо управління нашою маленькою державою, і рідко відгукуються про Вуда з приязню. Вони визнають, що його лідерство було необхідним для того, щоб революція пустила коріння, але з того часу стали свідками його відсутності відданості їхній справі та постійно йому через це дошкуляють. Можливо, після цілком заслуженого святкування, Вуд справді прислухається до того, що вони кажуть."

  HEL_advance_the_revolution:0 "Просувати революцію"
  HEL_advance_the_revolution_desc:0 "На наш великий подив, Вуд погодився дотримуватися соціалістичної лінії та співпрацювати з Десьє у більшості питань щодо створення держави. Чи це сталося тому, що він нарешті знайшов час прочитати теорію, яку йому надали, чи просто тому, що він відчуває, що комуністи є його найкращими союзниками, на даний момент принаймні незрозуміло."

  HEL_declare_state_of_siege:0 "Оголосити стан облоги"
  HEL_declare_state_of_siege_desc:0 "Хоча вони ще не намагалися повернути володіння шерифа, Ґрайфвальд залишається постійною загрозою як нашій незалежності, так і революції. Ми повинні поспішати підготувати все, що можемо, до неминучого зіткнення між нами та нашими старими господарями."

  HEL_revolutionary_central_command:0 "Добре організовані революціонери"
  HEL_revolutionary_central_command_desc:0 "Попри заяви деяких загонів, війська зазвичай діють краще, коли вони добре організовані. Настав час сформувати справжні дивізії з тих мобілізаційних ресурсів, які зараз складають безладні юрби бандитів, контроль над якими Вуд передав Десьє."

  HEL_evolve_the_bandit_territory:0 "Розвити бандитські території"
  HEL_evolve_the_bandit_territory_desc:0 "Вираз "бандитські організації" є певним оксимороном, особливо з огляду на те, як Вуд керував ними досі. Хоча певний рівень оперативної свободи на низькому рівні необхідний для ефективної бойової роботи, суть у тому, що нам потрібно реформувати систему в щось більш надійне. Емігранти мають бути задоволені."

  HEL_the_outlaw_in_chief:0 "Головний позазаконник"
  HEL_the_outlaw_in_chief_desc:0 "Надання емігрантам повної свободи дій було б помилкою. Хоча він не любить це визнавати, саме Вуд був тим грифоном, який об’єднав Аделарт проти ворогів, а відмова від його керівництва призвела б лише до хаосу. Він знову утримає Периферію та нагадає кожній істоті про свої здібності."

  HEL_the_merrygriffs_shall_fly_eternal:0 "Вічна свобода"
  HEL_the_merrygriffs_shall_fly_eternal_desc:0 "Авангардисти - це просто краснопузі шерифи. Їхній ідеал централізованої держави це саме те, що створило Аделарт таким, яким він є, і таким безглуздим ідеям тут не місце. Ми повністю відхилили петицію Десьє і не маємо наміру прислухатися до її небезпечного авторитарного ідеалізму."

  HEL_free_armies_of_a_free_territory:0 "Вільні армії вільної території"
  HEL_free_armies_of_a_free_territory_desc:0 "Хоча кожен житель Аделарту має право доєднатися ополчення, якщо забажає, авангардисти виявилися справжньою перешкодою. Звісно, їх не каратимуть за переконання. Замість цього ми запропонуємо їм вибір: залишити ополчення або приєднатися до наших бандитських бригад, де їхні політичні погляди розчиняться в нічому."
  HEL_the_flowenan_petition:0 "Фловенська петиція"
  HEL_the_flowenan_petition_desc:0 "Жом де Конар це досить цікавий персонаж. Він, мабуть, єдиний фловенець, який цікавиться Аделартом, проте він здається не більш дивним, ніж пересічний бізнесгрифон із цього жахливого міста банків. Його інтерес та інтерес його інвесторів виглядає справді дивним, але якщо він може принести користь нашій маленькій державі, то Вуду варто було б вислухати його петицію."

  HEL_of_bankers_and_bandits:0 "Про банкірів та бандитів"
  HEL_of_bankers_and_bandits_desc:0 "Ми не промисловці та насправді не дуже знаємося на всьому, що стосується обладнання. Тому не дивно, що попри всю дивність їхньої пропозиції, де Конару та його партнерам дозволили керувати місцевим економічним розвитком. Вуд, звісно, виділив кілька бандитських ополчень для їхнього захисту та для того, щоб переконатися, що не відбувається нічого підозрілого."

  HEL_grovel_for_loans:0 "Благати про позики"
  HEL_grovel_for_loans_desc:0 "Донедавна Фловена зовсім не бажала позичати нашій відсталій державі хоч якусь значну суму грошей. Приїзд де Конара сюди цілком очікувано викликав відновлення інтересу з боку їхніх банківських установ. Мабуть, тепер вони бачать, що мають тут надійного грифона, якому можна довірити свої кошти."

  HEL_sell_the_collectives:0 "Солодкі, солодкі нафтоідоли"
  HEL_sell_the_collectives_desc:0 "Карти розкрито. Що ж, ми не те щоб намагалися це приховати, але більшість в Аделарту навіть не знають, наскільки цінною є нафта насправді, тому для них це стало несподіванкою. Проте це не мало б їх дивувати, адже навіщо ще неймовірно багатому фловенському промисловцю цікавитися такою глушиною, як Аделарт, якщо тут немає вигоди? Хай тече нафта!"

  HEL_good_ol_gun_running:0 "Стара добра контрабанда зброї"
  HEL_good_ol_gun_running_desc:0 "Дехто зневажає торгівлю зброєю, але насправді це одна з багатьох галузей торгівлі, що тримає континент на плаву. Хитрість полягає в тому, щоб саме ви мали монополію, і зброя не потрапила до кігтів тих, хто не повинен її мати. Зрештою, злочинність шкодить бізнесу, якщо, звісно, ви самі не зорганізували злочин."

  HEL_crack_open_revolutionary_stores:0 "Розкрити революційні склади"
  HEL_crack_open_revolutionary_stores_desc:0 "Хоча вони вкриті десятьма слоями пилу, деякі реліквії війни за незалежність досі існують, вони зберігаються в стратегічно розташованих схованках по всій країні. Це, безумовно, не найкраще спорядження, але воно послужить нам зараз так само добре, як і десятиліття тому. Принаймні доти, доки ми підтримуємо його у належному стані, хоча це, мабуть, занадто висока вимога для бандитів."

  HEL_community_armouries:0 "Громадські арсенали"
  HEL_community_armouries_desc:0 "Хоча вони можуть бути не найчистішими чи найефективнішими виробничими об'єктами, важливо те, що ці арсенали належать нам і вони працюють. Нам не потрібні пихаті фловенські банкіри в Аделарті, і присягаємося Бореєм, що вони триматимуть свої жадібні кігті подалі від нашої промисловості!"

  HEL_keep_the_foundations_strong:0 "Про революційні засади"
  HEL_keep_the_foundations_strong_desc:0 "Очевидно, що фловенці замислили щось лихе. Вони ніколи не висовують клюв зі свого позолочого міста, якщо не зароблять з цього ідолів, і Вуд мав рацію, коли очікував найгіршого від їхньої петиції. Скатертиною дорога де Конару, і нехай його багатства зів'януть за спробу розіграти виставу про промисловця з добрими намірами."

  HEL_disarm_dispossess_distribute:0 "Економіка поза законом"
  HEL_disarm_dispossess_distribute_desc:0 "Хоча ми, жителі Аделарту, благородний народ, нам не звикати брати те, що нам потрібно, силою. Саме Вуд зробив популярною практику забирати у багатих і віддавати бідним, а наші сусіди, скажімо так, ДУЖЕ багаті. Ми впевнені, що вони нам пробачать... З часом."

  HEL_reprise_individuelle:0 "Reprise Individuelle"
  HEL_reprise_individuelle_desc:0 "Нальоти це фундаментальна частина нашої філософії. Це може завдати шкоди декому, але ті, у кого ми забираємо майно, заслуговують на те, щоб воно було перерозподілене. Зрештою наші операції мають бути морально та економічно позитивними, саме тому ми повинні продовжувати свою справу. Дозвольте нам звільнити вас від вашої надмірної розкоші!"

  HEL_the_prelates_petition:0 "Петиція Прелата"
  HEL_the_prelates_petition_desc:0 "Самопроголошений прелат Аделарту досить самозакоханий, але він все ж таки збирає навколо себе значну кількість послідовників, з якими не варто жартувати. Вони непохитні у своїх переконаннях, принаймні на даний момент, і нам було б корисно вислухати, що скаже фун Ліссей, навіть якщо його петиція містить величезну кількість пихатої нісенітниці."

  HEL_revoke_the_privileges:0 "Призупинити їхні привілеї"
  HEL_revoke_the_privileges_desc:0 "Храми, як і будь-яка інша інституція централізованої влади, це лише катастрофа, що чекає свого часу. Ми не будемо карати віруючих, оскільки для цього немає причин, але ми не прислухаємося до вимог фун Ліссея і замість цього позбавимо його повноважень. Його вплив є небезпечним для його послідовників і для кожної іншої істоти в Аделарті."

  HEL_revolutionary_pilgrimage:0 "Йти в народ"
  HEL_revolutionary_pilgrimage_desc:0 "Хоча прелату підрізали кігті, його послідовники все ще становлять загрозу і мають бути нейтралізовані. Не силою, звісно, а за допомогою альтернативних форм проповідництва. Соціалізм може мати своїх більш небезпечних прихильників, але він фундаментально менш ворожий до Вуда, ніж фун Ліссей. Нехай авангардисти розважаються."

  HEL_voice_for_all_malice_toward_none:0 "Голос кожному, і хай ніхто не піде ображений"
  HEL_voice_for_all_malice_toward_none_desc:0 "Хоча деякі пропозиції фун Ліссея є занадто радикальними, його петиція загалом прийнятна, а його цілі здаються гідними захоплення. Ми досягли з ним згоди і будемо прагнути впровадити запропоновану конфедеративну систему як альтернативу сильному централізованому уряду, якого, чесно кажучи, жоден грифон тут в Аделарті не бажає."

  HEL_loyal_leagues_of_green:0 "Лояльні зелені ліги"
  HEL_loyal_leagues_of_green_desc:0 "Хоча ліві групи ополчення точно не зрадіють, формальний набір релігійних загонів надасть нам надлишок готових і охочих добровольців для майбутніх конфліктів. Це не ідеальне вирішення нашої проблеми з грифонським ресурсом, але це цілком придатний тимчасовий захід."

  HEL_the_free_territory_endures:0 "Mir Wëlle Bleiwe Wat mir Sinn!"
  HEL_the_free_territory_endures_desc:0 "З чим кожен житель Аделарту погодиться: він виступає проти загарбників-автократів. Вони намагалися раніше і іноді досягали успіху, але ми ніколи більше не будемо жити в пасивному підпорядкуванні черговому тирану. Ми залишимося тими, ким ми є: незалежними, єдиними та сильними разом як народ зі спільною історією вигнання тих, хто прагне поховати нашу ідентичність."

  HEL_bandits_priests_people:0 "Бандити, священники, народ"
  HEL_bandits_priests_people_desc:0 "Хоча поки не зовсім зрозуміло чому, Вуд вирішив погодитися на всі вимоги петиції Прелата. Уряд із фун Ліссеєм у центрі незабаром обов'язково з'явиться, а комуністи будуть остаточно вигнані з Аделарту і депортовані назад на похмурі вулиці Аквілеї, звідки вони і вилізли."

  HEL_embrace_the_old_prelature:0 "Законне місце Прелата"
  HEL_embrace_the_old_prelature_desc:0 "Хоча багатьох це розчарувало, стало зрозуміло, що фун Ліссей повинен повернутися на бік Вуда і керувати Аделартом разом із ним. Безсумнівно, дехто протестуватиме проти цього значного посилення влади храмів, але це необхідно для блага віруючих і Аделарту в цілому."

  HEL_head_of_the_snake:0 "Зміїіна голова"
  HEL_head_of_the_snake_desc:0 "Роки тому, коли ми вибороли незалежність від Ґрайфвальду, нам так і не вдалося знайти Шерифа. Йому вдалося вислизнути від нас, мабуть, через хибне припущення, що він зможе повернути контроль, коли все вщухне. Цього разу він не втече. Цього разу ми будемо полювати, доки він не буде насаджений дзьобом на вістря списа за його непрощенні злочини."

 ###THE ENTIRETY OF THE ARMY TREE###

  HEL_the_six_companies:0 "Шість Вільних Рот"
  HEL_the_six_companies_desc:0 "Шість Вільних Рот це різноманітні найманські загони, приватні військові компанії, святі ордени та революційні організації, що були засновані на різних етапах історії Аделарту. Вони складають кістяк усіх контингентів, якими не керує прямо [HEL.GetLeader]. Щоб повернути нашій армії належне становище, ми повинні розібратися з ними та з'ясувати, які з них варті підтримки, а які ні."

  HEL_the_fliger_air_corps:0 "Авіаційний корпус родини Алоїза та Жанни Фліґер"
  HEL_the_fliger_air_corps_desc:0 "Авіаційний корпус Фліґерів, заснований у 981 році після П.З.Л., це група фетизійських пілотів, вигнаних за контрабанду ресурсів на чорному ринку Фловени. Через жагу до наживи, цікавість або жалість вони вирішили залишитися в Аделарті як єдина реальна авіаційна сила країни. Це означає, що для контролю над будь-яким повітряним простором Аделарту доведеться мати справу з Фліґерами та їхньою величезною родиною."

  HEL_dispersed_air_doctrine:0 "Справжня повітряна доктрина"
  HEL_dispersed_air_doctrine_desc:0 "Немає сенсу інвестувати в аеродроми чи літаки, якщо ми не вміємо ними користуватися. Отже, коли аеродроми побудовані, а перші аделартські літаки вже у виробництві, ми маємо розробити власну повітряну доктрину."

  HEL_integrate_the_militias:0 "Поглинути ополчення"
  HEL_integrate_the_militias_desc:0 "Хоча ми хочемо, щоб наша армія залишалася децентралізованою, ми повинні гарантувати, що всі ополчення Аделарту все одно перебуватимуть під загальним контролем армії. Тому нам слід розпочати нову кампанію з приборкання багатьох місцевих груп ополчення, обіцяючи їм збереження автономії."

  HEL_the_merrimane_column:0 "Колона Меррімейну"
  HEL_the_merrimane_column_desc:0 "Колона Меррімейну це зібрання міжнародних соціалістів-революціонерів з Еквестрії та лівих ветеранів Першої Аквілейської революції, які оселилися в Аделарті під час власної революції у 987 році П.З.Л.. З того часу вони заслужили репутацію осередку войовничого лівого руху та місця для добровольців з усього світу, які прагнуть допомогти розбудувати новий Аделарт."

  HEL_haven_of_socialism:0 "Притулок світового соціалізму"
  HEL_haven_of_socialism_desc:0 "У той час як більшість зневажає ідею надання безпечного проходу та житла соціалістам-революціонерам з усього світу, у нас немає причин боятися цих однодумців. [HEL.GetNameDefCap] діятиме як надійний притулок та мережа розподілу для наших червоних друзів з усього континенту та за його межами!"

  HEL_stalliongradian_tank_models:0 "Сталліонградські моделі танків"
  HEL_stalliongradian_tank_models_desc:0 "Революціонери у Сталліонграді були першими, хто розробив ефективні конструкції танків, і вони роками експортували свої проєкти у червоний світ. Нам варто було б перейняти та вивчити їх досвід для себе, щоб урізноманітнити наші збройні сили та забезпечити безпосередню підтримку як регулярним, так і іррегулярним частинам."

  HEL_army_of_aggression:0 "Армія агресії"
  HEL_army_of_aggression_desc:0 "Існує старий анекдот часів Ґровера II, у якому грифон стверджує, що напад це найкращий захист, а потім гине під час безглуздої атаки на добре підготовленого ворога. Проте той бідолашний грифон мав рацію. Правильне застосування наступальної тактики та високий рівень автономії командирів часто призводять до стратегічного успіху."

  HEL_adelartian_international_brigades:0 "Сформувати нові інтернаціональні бригади"
  HEL_adelartian_international_brigades_desc:0 "Окрім можливості отримувати та поширювати військовий досвід у збройних силах без проведення тривалих та дорогих навчань, існує ще одна перевага розвиненої мережі іноземних добровольців. Коли настане час війни, багато хто відгукнеться на заклик до зброї, щоб захистити себе та свій революційний центр."

  HEL_to_the_barricades:0 "Chantons la Liberté, Défendons la Cite"
  HEL_to_the_barricades_desc:0 "Оскільки багато революціонерів є містянами, які вміли читати з раннього віку, не дивно, що вони краще знайомі з міською забудовою, ніж більшість призовників. На перший погляд це може здатися несуттєвим, але детальне знання місцевості сприяє кращому позиціюванню та чудовому розумінню переваг і недоліків міських боїв, що може виявитися вирішальним."

  HEL_the_jade_company:0 "Нефритова компанія Ромау"
  HEL_the_jade_company_desc:0 "Нефритова компанія, створена у 911 році П.З.Л. дисидентом та сенатором Ромау, не має єдиного централізованого командування після смерті старого грифона, який її заснував. Проте вони компенсують це фанатичною відданістю республіканській справі. Їхніх рекрутів багато, а вплив широкий, і хоча вони можуть бути особливо жорстокими у боротьбі проти монархістів, вони з повною відданістю приймуть нашу підтримку."

  HEL_spirit_of_the_legionaires:0 "Завзятість легіонерів"
  HEL_spirit_of_the_legionaires_desc:0 "Лицарі Ромау не просто так заслужили свою славу. Вони можуть відстоювати принципи, які нам здебільшого чужі, але їхня здатність до бою все одно вражає. Нам варто було б скопіювати їхні традиції глибокого військового планування на стратегічному рівні у поєднанні з суворим навчанням окремих солдатів та командирів."

  HEL_renew_and_revive:0 "Оновити, відродити, поповнити"
  HEL_renew_and_revive_desc:0 "Грифони це не єдина частина армії, яку можна вилікувати та повернути в стрій. Спорядження, будь воно складним чи простим, так само варте обслуговування та відновлення. Підтримання поточних запасів у робочому стані дуже допоможе нашому військовому виробництву в довгостроковій перспективі, навіть якщо відремонтована зброя з часом застаріє. Краще стара рушниця, ніж зламана."

  HEL_the_great_river_line:0 "Лінія Великої річки"
  HEL_the_great_river_line_desc:0 "Хоча будівництво та використання укріплень стало складнішим, їхня важливість не зменшилася з роками. Окопи, бункери та вогневі точки будуть споруджені за великою річкою, що розділяє Веренію та Периферію. Це коштуватиме дорого, але завжди краще марнувати гроші, ніж життя."

  HEL_smuggle_the_latest_tactics:0 "Кроти в університеті"
  HEL_smuggle_the_latest_tactics_desc:0 "Периферія є домом для багатьох грифонів, які розмовляють гриффішом і могли б у разі потреби зійти за своїх. Вивчення доктрини в нашому ізольованому становищі є складним, але влаштувати кількох "герцландських" студентів до приватного університету Ромау відносно легко. У тих священних залах ми зможемо багато чому навчитися."

  HEL_kemerskaian_methods:0 "Вчитися у Кемерская"
  HEL_kemerskaian_methods_desc:0 "Республіканська революція 978 року мало вплинула на Аделарт, окрім того, що побічно спричинила зміну керівництва, але з цього конфлікту можна багато чого навчитися. Майстерне використання артилерії Александром Кемерскаєм становить особливий інтерес, оскільки це дозволить нам найефективніше зосередити наше артилерійське спорядження та використовувати належну тактику контрбатарейної боротьби."

  HEL_the_forest_brothers:0 "Лісові брати"
  HEL_the_forest_brothers_desc:0 "Лісові брати це давня компанія, заснована у 644 році П.З.Л., яку колись очолював сам Мерлок Вуд. Вона залишається однією з провідних сил у русі за незалежність Аделарту та національне визволення. Проте тактика компанії базується на бандитизмі та партизанській війні через їхню участь у боротьбі проти Шерифа, тому їх не так вже й легко дисциплінувати."

  HEL_dig_in_and_pray_to_eyr:0 "Окопатися та молитися Ейр"
  HEL_dig_in_and_pray_to_eyr_desc:0 "Підготовлена оборона це те, що дозволяє нашим і без того обмеженим запасам грифонів повернутися додому, щоб прожити ще один день і виграти ще одну битву. У такій оборонній тактиці немає нічого ганебного, особливо під таким кутом зору. Ми будемо використовувати шари концентричних укріплень, щоб відбити будь-якого ворога, який захоче зламати наш дух одним швидким ударом."

  HEL_an_impenetrable_wall:0 "Непроникна стіна"
  HEL_an_impenetrable_wall_desc:0 "Наші північні міста досить незахищені, вони розташовані на краю величезного лісу, що становить більшу частину власне Аделарту. Це робить їх вразливими для атак як вище, так і нижче за течією. Вкрай важливо побудувати додаткові укріплення, щоб зміцнити нашу оборону та дати відповідний сигнал будь-якій істоті, яка навіть замислиться про вторгнення."

  HEL_armed_to_the_teeth:0 "Озброєні до дзьоба"
  HEL_armed_to_the_teeth_desc:0 "Як з'ясувалося, багато грифонів, які раніше служили в наших силах ополчення, досі мають вогнепальну зброю, що лежить напоготові в їхніх домівках. У будь-якій іншій ситуації вони цілком справедливо не бажали б її віддавати, але коли війна вже на порозі, багато хто погодиться розлучитися зі своєю зброєю за мізерні суми, щоб підтримати родичів на фронті."

  HEL_theyll_never_know_what_hit_them:0 "Остання річ, яку ти не побачиш"
  HEL_theyll_never_know_what_hit_them_desc:0 "Оскільки Аделарт відродився у тривалій партизанській війні, ми знову звертаємося до лісів за порадою. У наших деревах немає нічого особливого: у них немає шайсвальдських монстрів і вони не замерзають наскрізь у холоди, але вони точно сприймаються як дім. А ще це чудове місце, щоб перехитрити тих, хто не знає лісу так добре, як ми."

  HEL_recruit_the_sisters_of_eyr:0 "Сестри Ейр"
  HEL_recruit_the_sisters_of_eyr_desc:0 "Сестри Ейр, засновані у 991 році П.З.Л. для служби особистою гвардією Луки фун Ліссея, захищені не лише своєю вірою, а й списаними тракторами та купами металобрухту, які вони називають танками. Будь-який уряд, що прагне задобрити Прелата, схибив би, якби не інтегрував цю віддану колону під проводом самої Танкістки Ейр, сестри Селени."

  HEL_holy_warfare:0 "Священність танків"
  HEL_holy_warfare_desc:0 "Сестри Ейр палко стверджують, що танк є настільки ж священним для нас, послідовників Ейр, як меч і щит для прихильника Арктурія. Адже ці сталеві машини захищають наші тіла, найсвятіший дарунок Ейр, від жахів війни набагато краще, ніж будь-які лицарські обладунки. Можливо, вони справді мають рацію?"

  HEL_jumpstart_heavy_industry:0 "Запустити важку промисловість"
  HEL_jumpstart_heavy_industry_desc:0 "Оскільки наша армія висуває все більші вимоги не лише до вогнепальної зброї та польових гармат, а й до бронетехніки, ми повинні почати відходити від амбарних майстерень та таємного імпорту. Настав час заснувати справжні арсенали для задоволення наших потреб. Кузні храму Арктурія в Ліссеї зазвучать на повну силу завдяки нашій новій ініціативі!"

  HEL_we_were_not_meant_to_fly_higher:0 "Засудити ідею авіації"
  HEL_we_were_not_meant_to_fly_higher_desc:0 "Ми, грифони, горді сини та доньки Ейр, ніколи не звернемося до цих пекельних та неміцних машин, які багато хто називає "літаками", бо вони пронизують та опоганюють володіння богів над хмарами.\n\n І зрештою, хіба наша вселюбляча мати Ейр не зневажала б нас за відмову від віри у наші власні, божественно даровані крила?"

  HEL_the_new_knights:0 "Лицарі Зеленої Арфи"
  HEL_the_new_knights_desc:0 "Лицарі Зеленої Арфи це найстаріша з Шести Рот. Вони ведуть свій родовід від особистої гвардії, заснованої у 498 році П.З.Л. для захисту милостивого та шляхетного Дому Світсінґер, графів Аделарту до встановлення ганебного та варварського Шерифства. Не зумівши захистити свого графа, ці лицарі відтоді залишаються в Аделарті та шукають лідера, який зможе знову об'єднати край."

  HEL_every_griffon_a_knight:0 "Ми всі лицарі"
  HEL_every_griffon_a_knight_desc:0 "Стверджувати, що шлях до лицарства доступний лише високородним, означає плювати на вчення Арктурія та самої Ейр. Найвеличніший акт самопожертви лицаря полягає в тому, щоб відкинути розбіжності заради допомоги своїм побратимам по зброї, адже розбрат стане нашим падінням, а єдність буде нашою силою!"

  HEL_the_gallant_and_the_brave:0 "De Gallant An Déi Dapp"
  HEL_the_gallant_and_the_brave_desc:0 ""De Gallant An Déi Dapp", або "Галантний та Хоробрий", це стара аделартська народна казка про двох мандрівних лицарів, що вбивали чудовиськ та лиходіїв. Їхня непохитна рішучість не здригнулася навіть перед самим Мааром. Тому в наших інтересах поширювати цю історію серед усіх, щоб кожен лицар ішов у бій, натхненний божественною відвагою двох легендарних грифонів."

  HEL_the_warriors_of_the_gods:0 "Воїни богів"
  HEL_the_warriors_of_the_gods_desc:0 "Оскільки лави нашої армії поповнюються свіжою кров'ю новоспечених лицарів та ревних грифонів, ми зобов'язані забезпечити цих прапороносців богів лише найкращою зброєю та найміцнішими обладунками. Епоха боротьби за інтереси якогось далекого дворянина у лахмітті та з мисливським мушкетом залишилася далеко позаду."

  HEL_convert_the_tractors:0 "Переобладнати трактори"
  HEL_convert_the_tractors_desc:0 "Хоча ми можемо не мати власного заводу з виробництва танків, у нас точно немає браку сільськогосподарських тракторів! Ми розпочнемо реквізицію всіх надлишкових тракторів у сільській місцевості та перетворимо їх на справжні броньовані бойові машини, використовуючи будь-яку котельну сталь, кулемети чи гармати, які зможемо знайти."

  HEL_holy_warfare_time:0 "Священна війна"
  HEL_holy_warfare_time_desc:0 "Ми, солдати Арктурія, Борея та передусім Ейр, б'ємося не за гроші, не за шляхту і не від розпачу, а за ідеал.\n\n Це ідеал самовдосконалення, допомоги другу та ворогу, захисту наших домівок та благословенної обіцянки Ейр про повноцінне життя. Ми будемо битися за волю богів!"

  HEL_guarded_behind_armor_and_metal:0 "Сталь та метал, ведіть мене"
  HEL_guarded_behind_armor_and_metal_desc:0 "З благословенням Ейр із небес, молитвами наших близьких за спиною та співами наших хрестоносців, що надихають нас іти вперед, настав час наступати, захищеними від темряви нашими святими обладунками!"

  HEL_we_need_some_actual_military_tactics:0 "Справжня військова академія"
  HEL_we_need_some_actual_military_tactics_desc:0 "Створення нової академії для підготовки наших офіцерів гарантує, що ми зможемо розраховувати на навчений офіцерський склад, якщо нам колись доведеться закликати їх на захист своєї держави."

  HEL_what_makes_us_griffons:0 "Що робить нас грифонами"
  HEL_what_makes_us_griffons_desc:0 "Нам не принесе користі бездумне запозичення тактик Заходу чи Півдня без жодного врахування особливостей рас, для яких вони призначені. Натомість ми маємо прийняти те, ким ми є і якими нас створив Борей. Ми вільні грифони, можливо, жадібні та самовпевнені, але народжені літати та стійкі до самого кінця."

  HEL_plane_stuff:0 "Моделі літаків із чорного ринку"
  HEL_plane_stuff_desc:0 "Розробка нових моделей літаків для захисту наших солдатів із неба стане великою підмогою для ефективності боротьби нашої армії заради захисту Аделарту. На жаль, у нас немає власних розробок, проте Фліґери зазначили, що ми можемо легко отримати другосортні моделі на чорному ринку та через їхні власні фетизійські зв’язки, звісно, якщо нас не спіймають."

  HEL_promote_the_fligers:0 "Фліґери в уряді"
  HEL_promote_the_fligers_desc:0 "Ми призначимо Жанну Фліґер та її сина Алоїза на найвищі державні посади, щоб нарешті мати серед провідних політичних та військових лідерів Аделарту грифонів із досвідом у авіації. Якщо вони зосередяться на своїй справі у повітряних силах, це буде справді вигідне партнерство."

  HEL_alois_plan_destruction_above_all:0 "Рекомендація Алоїза: Руйнування понад усе"
  HEL_alois_plan_destruction_above_all_desc:0 "Суть стратегічного бомбардування полягає в самій назві. Це жахливо та надзвичайно ефективно, особливо коли цілями є промислова та військова інфраструктура. Пріоритет максимального скидання боєприпасів і, як наслідок, найвищого рівня руйнувань неминуче позбавить наших ворогів можливості просуватися вперед."

  HEL_joanna_plan_tactics_and_strategy:0 "Рекомендація Жанни: Тактика та стратегія"
  HEL_joanna_plan_tactics_and_strategy_desc:0 "Повітряну тактику більшості складно оцінити належним чином, адже за нею так само важко спостерігати в дії, як і виконувати її. Тим не менш, наполегливість Жанни щодо відпрацювання таких речей принесла свої плоди, і очікується, що наші пілоти незабаром розпочнуть тренування з виконання деяких із цих маневрів."

  HEL_fate_of_maarite_militia:0 "Сьома рота"
  HEL_fate_of_maarite_militia_desc:0 "Дивне ополчення, відоме як "Schwarze Krallen", або Чорні Кігті, постало в найтемніших лісах Аделарту. Воно носить ім'я великого ватажка бандитів Блекталона з тих часів, коли Аделарт ще був незалежною державою. Наші джерела припускають, що ця організація може мати мааритську природу, але вони могли б стати лояльними союзниками, якби ми вирішили їх використати."

  HEL_an_army_worthy_of_the_revolution:0 "Армія, гідна [HELCulturalIdentity]"
  HEL_an_army_worthy_of_the_revolution_desc:0 "Наші сили тепер гідні нашої великої держави! Наша революція тепер і назавжди захищена цим щитом, що є свідченням нашої могутності та винахідливості на очах у всієї Грифонії!"

  HEL_cultural_identity_HEL:0 "Аделарту"
  HEL_cultural_identity_JER:0 "Аквілеї"

 # FIRST PATH - the VANGUARD #

  ### Alexandra Descieux and her emigres, vanguardists, and pro-Aquileian communist bloc has taken control of Adelart, and essentially done a 180 on revolutionary development, transforming a state of bandit anarchy under an uneasy confederation into a would-be worker's republic. Fiercely critical of the old bandits and militias, the faith, and reactionaries, the Vanguardists are very much patronising of the average Adelartian, who they view as needing a lot of uplifting from a primitive nationalist philosophy and the opiate of religion. Still, there is much potential here for true class consciousness, and there is an element of idealism and visionary politics among the emigre's experiments in Adelart. бла-бла-бла, люди до того як придумали дискорд бі лайк

  HEL_defenders_of_the_revolution:0 "Gardes Rouges de la Forêt"
  HEL_defenders_of_the_revolution_desc:0 "Сформовані в якості розвідувального відгалуження бандитських формувань Вуда, Gardes Rouges de la Forêt вже давно присягнули на вірність нашій справі. Їхні навички еволюціонували за ці роки від простого лісового шпигунства до повноцінної розвідувальної організації, яку ми тепер можемо офіційно приєднати до держави в офіційному статусі."

  HEL_eradicate_the_old_believers:0 "Викорінити старовірів"
  HEL_eradicate_the_old_believers_desc:0 "Хоча вони заявляють про свої благородні наміри, старовіри становлять загрозу для поширення революції та авторитету Десьє. Нам варто було б усунути їхніх найзатятіших прихильників, щоб зміцнити нашу владу та полегшити перехід до централізованої марксистської держави."

  HEL_begin_the_anti_anarchist_platform:0 "Навчити селян політиці"
  HEL_begin_the_anti_anarchist_platform_desc:0 "Схоже, дехто в цих землях не знає елементарних принципів, за якими керується цей світ і на яких мала б базуватися революційна політика. Вчення про ідеалістичний бандитизм має бути відкинуте та замінене належним матеріалізмом і праксисом, інакше ми ще глибше зануримося в оскаженілу анархію. Чому вони взагалі вчили цих грифонів?!"

  HEL_bolster_the_intellectuals:0 "Революційна інтелігенція"
  HEL_bolster_the_intellectuals_desc:0 "Хоча деякі соціалісти можуть вертіти дзьобом від ідеї, що інтелігенція може або навіть повинна існувати в марксистському суспільстві, реальність нашої ситуації вимагає певних відхилень від доктрини. Революція виникла тут, у глушині, де промисловість ще не стала повсюдною, тому ми маємо виплекати новий політичний клас, здатний вести за собою тих, хто ще не прозрів."

  HEL_permanent_revolution:0 "Прищеплення класової свідомості"
  HEL_permanent_revolution_desc:0 "Селянство Периферії було введено в оману бандитськими ватажками, які наважуються називати себе "соціалістами" та спрямували лють, що мала бути звернена проти буржуазії, на дворянство. Хоча ці поняття спочатку могли перетинатися, справжня класова свідомість ще не знайшла шляху до сердець "аделартського" народу."

  HEL_congress_to_centralism:0 "Новий конгрес"
  HEL_congress_to_centralism_desc:0 "Ми пройшли довгий шлях від довіри бандитам у забезпеченні безпеки та добробуту нашого народу, але попереду ще багато роботи. Те, що ми ввічливо називаємо урядом, наразі є лише групою галасливих ідеологів, які сваряться в ратуші. Настав час організувати новий конгрес і розпочати процес формування справжньої адміністрації."

  HEL_strengthen_the_chairgriff:0 "Головуюча з пазурами"
  HEL_strengthen_the_chairgriff_desc:0 "Десьє визнає, що саме вірність Мерлока власним принципам призвела до його кінця. Він був не могутнішим за будь-яку іншу істоту у своїй безпринципній маленькій банді, і саме це дозволило нашій новій голові взяти владу в свої руки. Наша держава не припуститься таких помилок, наділивши урядову посаду Десьє значними повноваженнями."

  HEL_kill_bandits:0 "Повісити бандитів"
  HEL_kill_bandits_desc:0 "Хоча їхня стійкість перед обличчям величезних труднощів заслуговувала на захоплення, бандити "Аделарту" нам більше не потрібні. Вони ніколи не були справжніми союзниками революції та допомагали нам лише у спробі врятувати власні життя. Хтось може засмутитися з цього приводу, але їх необхідно усунути заради безпеки держави від її ворогів."

  HEL_reject_the_gods:0 "Не існує жодного "Аделарту""
  HEL_reject_the_gods_desc:0 "Ми марксисти, провісники пролетарської демократії. Ми аквілейці, сини цієї великої революційної культури. Ми також визволителі, захисники та вчителі цієї нації. Проте ми не називаємо себе "аделартцями", бо це викривлене поєднання селянського менталітету та культурного варварства. Настав час для того, щоб ця назва зникла, а на її місці виникла нова революційна культура."

  HEL_the_spirit_of_aquileian_revolution:0 "Тур для Керманича"
  HEL_the_spirit_of_aquileian_revolution_desc:0 "Після років революційного розвитку настав час великому керманичу Віктору Алларду стати свідком перетворення "Аделарту" на сяючий авангард його власних революційних теорій. Бандитизм викорінено, економіка на підйомі, а Ґрайфвальд та їхні сміховинні військові підходи знову принижені. Можливо, він буде настільки в захваті, що залишиться тут!"

  HEL_descieuxs_betrayal:0 "Зрада Десьє"
  HEL_descieuxs_betrayal_desc:0 "Олександра Десьє зрадила Мерлока Вуда та захопила державну владу для себе та своїх молодих революціонерів. Тепер Аделарт справді може стати на шлях соціалізму і забезпечити собі світле майбутнє. Будьте певні, бандити та шарлатани, які правили цією країною, будуть покарані належним чином."

  HEL_a_head_shorter:0 "На голову коротший"
  HEL_a_head_shorter_desc:0 "Хоча Мерлок Вуд і приніс "Аделарту" справжній авангардний соціалізм за останні місяці, правду кажучи, єдиною перешкодою для справжнього революційного уряду є сам ватажок бандитів. Тепер, коли авангардисти контролюють кожен апарат Вільної Території, настав час покінчити з Мерлоком Вудом і розпочати світанок "Аделарту" як справжньої держави селян та робітників."

  HEL_gommie_foreign_policy:0 "Народна Республіка Аквілея"
  HEL_gommie_foreign_policy_desc:0 "Всупереч усьому ми здобули перемогу в боротьбі проти незліченних ворогів революції та тепер контролюємо Аквілу. Мрія Десьє про червону Аквілею здійсниться, хоча й не зовсім так, як вона спочатку собі уявляла."

  HEL_free_the_workers_of_greifwald:0 "Продовжити революцію"
  HEL_free_the_workers_of_greifwald_desc:0 "Культурні кордони Аквілеї простягаються далеко за межі наших нинішніх територій. Хоча наш рух зовсім не залежить від маревних прагнень певної культури і не виправдовується ними, ці регіони населяють істоти, які досить схожі на нас для швидкої асиміляції. Це забезпечить державі фантастичний плацдарм для майбутньої революційної діяльності по всій Грифонії."

  HEL_optimize_production:0 "Оптимізація, спеціалізація, інновації"
  HEL_optimize_production_desc:0 "Тепер, коли ми контролюємо значно більшу промислову базу для експериментів, настав час вдосконалити наші методи виробництва. Гасло "від кожного за здібностями, кожному за потребами" це не просто питання забезпечення нужденних, а також можливість для постачальників розвивати особливі навички в певних галузях."

  HEL_quotas_for_the_struggle:0 "Квоти для боротьби"
  HEL_quotas_for_the_struggle_desc:0 "Хоча вони не надто корисні для якості спорядження, виробничі квоти є прикрою необхідністю в нескінченній боротьбі проти реакції. Недоліки конструкції та неефективність ліній можна усунути з часом або коли екстремальні обставини вимагатимуть ще вищих темпів виробництва."

  HEL_conscript_the_squatters:0 "Призов безхатьків"
  HEL_conscript_the_squatters_desc:0 "Існує дуже просте рішення проблеми людей без постійного місця проживання: найняти збіднілих верств населення рекрутами до збройних сил. Їм може знадобитися певний час, щоб набрати достатню м'язову масу для бойової придатності, але з часом все прийде. Для нещасних це робота та другий шанс, а для нас це більше рекрутів для нашої славної революції!"

  HEL_the_first_domino:0 "Перше доміно"
  HEL_the_first_domino_desc:0 "Помоварра багато в чому нагадує старий "Аделарт" у своєму статусі певної глушини в Периферії, і такий стан речей робить її особливо цікавою для військових як легку ціль. Крім того, її кордони захищають місто Фловена, що робить цю територію життєво важливим кроком для майбутніх військових операцій у регіоні."

  HEL_the_second_domino:0 "Друге доміно"
  HEL_the_second_domino_desc:0 "Фловена, незалежно від того, хто там при владі, є містом корисливої буржуазії та всіляких клептократів. Аделарт колись був близький до того, щоб потрапити під її вплив, і спогади про цей факт за роки так і не згасли, відколи авангард зміцнив свою владу. Настав час знищити цих шкідників і залучити їхнє місто до нашої спільноти."

  HEL_core_pom_and_flo:0 "Нові революційні адміністрації"
  HEL_core_pom_and_flo_desc:0 "Хоча місцеві жителі можуть спочатку не оцінити цього, нові місцеві уряди є необхідністю для забезпечення безпеки на наших щойно здобутих територіях. На даний момент їхньою основною роллю буде організація військових активів, дислокованих у межах їхньої юрисдикції, але в майбутньому вони поступово перетворяться на цивільні інститути революційного правопорядку."

  HEL_the_third_aquileian_revolution:0 "Захід у червоних мундирах"
  HEL_the_third_aquileian_revolution_desc:0 "Прагнучи захистити найзахідніші частини Грифонії від будь-яких загроз, що можуть виникнути в Герцланді, конгрес оголосив, що революція рушить маршем, щоб убезпечити всю Периферію від неминучої агресії мешканців серця континенту."

  HEL_revolutionary_discipline:0 "Революційна дисципліна"
  HEL_revolutionary_discipline_desc:0 "Маючи у своїх пазурах ресурси величезного регіону, ми повинні зміцнити дисципліну наших загартованих у боях сил. Досвід мало що означає на незнайомому театрі воєнних дій, а майбутні конфлікти не будуть схожі на попередні. Навчання, перепідготовка та подальше загартування наших солдатів є абсолютно необхідними для виживання революції."

  HEL_defer_to_madame_guillotine:0 "Покластися на мадам Гільйотину"
  HEL_defer_to_madame_guillotine_desc:0 "Дехто каже, що страти аморальні, проте є мало реакційних проблем, які не здатна вирішити гільйотина. Вона є надзвичайно ефективним інструментом для швидкого позбавлення відомих зрадників, що також дозволяє нам продемонструвати, що трапляється з тими, хто протистоїть нестримному припливу соціалізму."

  HEL_falcon_in_the_dive:0 "Сокіл у піке"
  HEL_falcon_in_the_dive_desc:0 "Наші розвідувальні служби довели свою неймовірну ефективність у зборі інформації та захисті державних таємниць. Цілком логічно, що ми розширимо їхні повноваження, бюджет і обов'язки, щоб полегшити проведення операцій як вдома, так і за кордоном заради блага революції."

  HEL_anything_you_can_do_i_can_do_better:0 "[HELAlexandraAllardFocusTitle]"
  HEL_anything_you_can_do_i_can_do_better_desc:0 "[HELAlexandraAllardFocusDesc]"
  HEL_notice_me_senpai_title:0 "Учениця та її вчитель"
  HEL_notice_me_senpai_desc:0 "Вірно слідуючи його інтелектуальними стопами, Олександра повністю досягла успіху у своїй місії з наслідування вчителя. Вона адаптувала праксис у міру потреби, щоб принести революцію з далекої глушини "Аделарту" до самого серця Аквілеї, і нарешті настав час для Алларда визнати зусилля своєї найздібнішої учениці."
  HEL_student_beat_the_master_title:0 "Новий Керманич"
  HEL_student_beat_the_master_desc:0 "Хоча він багато в чому був зразком для Десьє, Аллард впав у неласку як у неї, так і у Конгресу. Багато хто в партії та серед інтелігенції відзначає постійно зростаючий досвід під командуванням Десьє, потай поширюючи думку, що вона, можливо, навіть перевершила його в харизмі та інтелекті."

  HEL_continue_the_revolution:0 "Виправдання руху"
  HEL_continue_the_revolution_desc:0 "Ґрайфвальд та його довга черга нікчемних шерифів є пам'ятником відсталості та страждань, спричинених монархією та реакцією. Тепер вони заплатять за свої постійні спроби підкорити народ і придушити революцію. Дороги Фелконтауна стануть червоними від крові наших найдавніших ворогів, коли ми визволимо Периферію з їхніх пазурів."

 ### ECONOMIC TREE - the VANGUARD ###

  HEL_visionary_economics_start:0 "Візіонерська економічна теорія"
  HEL_visionary_economics_start_desc:0 "Настав час відмовитися від одержимісті старого "Аделарту" застоєм та відсталим сільським укладом. Хоча їхня відданість таким застарілим економічним практикам зрозуміла, адже будь-які зміни означали б догоджання тиранам, їм більше не варто боятися гноблення. Зараз настав час для промисловості, інновацій та прогресу!"

  HEL_complete_collectivization:0 "Повна колективізація"
  HEL_complete_collectivization_desc:0 "На відміну від багатьох держав грифонів, [HEL.GetNameDef] унікальна тим, що її економіка вже досить тривалий час організована на громадських засадах. Перетворення цих рад на справжні колективи має стати відносно простою справою, що полегшить майбутні марксистські економічні реформи."

  HEL_central_planning:0 "Планування для народу"
  HEL_central_planning_desc:0 "Державна планова економіка залишається досить новою концепцією для більшості в "Аделарті", оскільки населення звикло до натурального господарства. Із появою централізованого уряду та зникненням труднощів становлення адміністрації настав час ознайомити населення з перевагами нашої економічної моделі через нові заводи та роботу для безробітних."

  HEL_centralize_scientific_advancement:0 "Червоні університети"
  HEL_centralize_scientific_advancement_desc:0 "Марксизм найшвидше поширюється серед тих, хто може самостійно читати та розуміти праці Маркса, що робить академічне середовище розплідником червоних рухів. Нам лише потрібно знайти вчителів та лекторів, які приховували свої симпатії під пильним оком Шерифа, і дозволити їхнім заняттям стати настільки політично зарядженими, наскільки вони того заслуговують!"

  HEL_urban_economics_start:0 "Аделарт та майбутнє"
  HEL_urban_economics_start_desc:0 "Швидкий економічний розвиток є складною справою, коли вашому населенню бракує значного середнього класу для інвестицій у нові технології, проте це не є неможливим. Державні гранти та імпорт технологій мають допомогти нашій промисловій революції міцно стати на пазурі, природним чином створюючи в процесі керовану державою економіку."

  HEL_expand_public_schooling:0 "Школа в кожному поселенні"
  HEL_expand_public_schooling_desc:0 "Державне шкільне навчання є такою необхідністю в сучасну епоху, що багато некомуністичних режимів уже впровадили цю практику в різних масштабах. Хоча вони дорогі в будівництві та експлуатації, школи є економічною інвестицією в майбутнє будь-якої держави. Вони вдесятеро повернуть витрати завдяки створенню кваліфікованої та свідомої робочої сили."

  HEL_import_aquileian_teachers:0 "Імпорт аквілейських освітян"
  HEL_import_aquileian_teachers_desc:0 "Хоча вони зазвичай радикальні та палкі навіть за нашими революційними мірками, аквілейські інтелектуали та вчителі є одними з найкращих у світі. Багато з них симпатизують нашій соціалістичній справі. Завдяки певним стимулам, а також попри значне нарікання місцевих жителів, ми станемо надійним притулком для лівих інтелектуалів, які прагнуть передати свої неоціненні знання."

  HEL_a_unique_advantage:0 "Унікальна перевага"
  HEL_a_unique_advantage_desc:0 "Аделарт розташований на одному з найбільших внутрішніх родовищ нафти в Грифонії, що дає нам доступ до економічно та стратегічно цінного ресурсу, якого бракує багатьом нашим сусідам. Хоча це розлютить нечисленних осілих жителів, які зараз живуть над чорними полями, вкрай важливо негайно розширити операції з видобутку заради виживання революції."

  HEL_nationalized_oil:0 "Взяття під контроль резервів"
  HEL_nationalized_oil_desc:0 "Тепер, коли наші багаті на ресурси землі повністю освоєні, ми можемо закріпити свій контроль над галузями. Оскільки компанії все ще перебувають на стадії зародження, їх можна викупити та об'єднати в державне підприємство за відносно невелику суму. Наші запаси мають живити революцію, а не наповнювати кишені бюрократів!"

  HEL_fuel_our_future:0 "Паливо для нашого майбутнього"
  HEL_fuel_our_future_desc:0 "Сучасна війна це насамперед війна ресурсів. Хоча Аделарт не зовсім бідний у цьому плані, наших нинішніх розвіданих покладів металу не вистачить у довгостроковій перспективі. Щоб виправити це, держава профінансує низку розвідувальних операцій з метою пошуку, видобутку та накопичення важливих матеріалів, необхідних для виробництва спорядження."

  HEL_peoples_republic_of_oil:0 "Змащування шестерень промисловості"
  HEL_peoples_republic_of_oil_desc:0 "Завдяки нашим незвично великим запасам нафти ми маємо надлишок галузевих експертів із безліччю ідей щодо подальшого покращення виробництва чорної крові нашої армії. Дехто навіть теоретизував можливість виробництва синтетичної нафти, що є дорогою, але потенційно рятівною та вигідною промисловою можливістю."

  HEL_cut_a_swathe_through_the_forests:0 "Прорубати шлях крізь ліси"
  HEL_cut_a_swathe_through_the_forests_desc:0 "Хоча шкода псувати приголомшливу природну красу Аделарту, величезні лісові масиви регіону зрештою обмежують доступний простір для промислового розвитку. Як би це не було боляче для місцевих жителів, вирубка лісів звільнить місце для масштабного розширення промисловості. Згодом навіть залишки бандитів Вуда, що живуть у лісах, зіткнуться з прогресом і приймуть його."

  HEL_a_five_year_plan:0 "Гіпериндустріалізація"
  HEL_a_five_year_plan_desc:0 "З огляду на стан бідного старого "Аделарту", будь-кому можна було б вибачити припущення, що наш промисловий проєкт зазнає повної невдачі. Проте ми перетворили країну на економічну потугу всупереч багатьом проблемам, з якими стикнулися. Десьє досягла успіху у своєму проєкті швидкої промислової експансії до небаченого раніше ступеня, перевершивши навіть Сталліонград."

 ###SECOND POLITICAL PATH - ANARCHISTS###

  ### Having succeeded in establishing complete primacy over Adelart for him and his bandit confederation, Merlock Wood has embraced the logical conclusions of the principles of the confederation, of autonomy, of decentralization, and of liberty for all griffons - anarchy. Transforming Adelart's anarchy from circumstance into ideology, Wood will seek to promote free association under a autonomous military apparatus that will guide Adelart to the future, and commit a bit too much violence on reactionaries, the temples, foreign powers, and perhaps even some of its own populace. Launching insurrectionary campaigns to take from the rich and give to the poor, this path largely retains the "Robin Hood" vibe. бла-бла-бла, люди до того як придумали дискорд бі лайк

  HEL_merlocks_band_triumphant:0 "Тріумф банди Мерлока"
  HEL_merlocks_band_triumphant_desc:0 "Лісові брати Аделарту закріпили свою владу над громадами! Ми вдосконалимо старі порядки вільної території та продовжимо наше братерство з вільним народом Аделарта у прагненні раз і назавжди покласти край розбрату, який Шериф приніс нашій країні."

  HEL_anarchist_gang_gang:0 "Нові грифони на районі"
  HEL_anarchist_gang_gang_desc:0 "Оскільки керівні позиції вудистів у Народно-Селянському Конгресі повністю захищені, народний представник Мерлок Вуд скликав новий позачерговий конгрес, щоб залучити молодь Аделарту до спільної справи та допомогти виховати нове покоління аделартських лідерів."

  HEL_the_faaa:0 "Формалізувати АААА"
  HEL_the_faaa_desc:0 "Автономна анархістська армія Аделарта стане провісником революції та її ідей. Хоча ополчення може бути корисним, воно часто виявляє нелояльність і схильне змінювати сторону за зайву монету. Однак АААА буде віддана анархізму та революції, а її солдати будуть набагато лояльнішими та відданішими уряду."

  HEL_stabilize_the_movement:0 "Неформальна анархістська федерація"
  HEL_stabilize_the_movement_desc:0 "Хоча для декого це прикро, певна подоба структурованого врядування необхідна для організації служб і зокрема збройних сил. Настав час кодифікувати точні обов'язки кожної частини нашої унікальної горизонтальної федеративної системи, де жоден орган влади не має повного права голосу над іншим."

  HEL_suffer_no_gods:0 "Більше жодних приязних ченців"
  HEL_suffer_no_gods_desc:0 "Хоча вони віддано служили [HEL.GetName], прелат і його послідовники тепер становлять загрозу для нашої системи та нашого народу. Їхній політичний вплив є пережитком старих шляхів ієрархії та тиранії, жоден з яких не є прийнятним у нашій процвітаючій анархії. Настав час розібратися з Лукою та його послідовниками єдиним прийнятним способом: насильницьким."

  HEL_gun_rights_anarchist:0 "За жодним приводом"
  HEL_gun_rights_anarchist_desc:0 "Вуд та його веселі грифи привели нас до свободи 20 років тому, взявши зброю проти графа та його гнобителів-шерифів. Наслідуючи їхній сяючий приклад, право на носіння зброї ніколи не буде обмежене, щоб наш народ міг у будь-який момент протистояти тим, хто хоче загнати його в кайдани."

  HEL_dispel_the_scourge_of_platformism:0 "Розвіяти біч платформизму"
  HEL_dispel_the_scourge_of_platformism_desc:0 "Нам не потрібен політичний клас, коли наші нинішні методи просунули революцію так далеко. Наша улюблена анархія не буде спаплюжена корупцією небагатьох обраних. Армії та решти децентралізованих інститутів цілком достатньо для підтримки порядку. Наші ідеали залишаються надзвичайно захопливими для тих, хто стоїть під нашим прапором."

  HEL_intellectual_guidance:0 "Справжня бандитська інтелігенція"
  HEL_intellectual_guidance_desc:0 "Сказати, що успіх нашого руху був справою випадку, було б м'яко кажучи перебільшенням. Поширювати наші ідеали навіть у власних кордонах було важко зокрема через відсутність централізованого управління. Хоча ми повинні залишатися пильними щодо формування панівного політичного класу, очевидно, що певний рівень масової агітації через політично підковану інтелігенцію необхідний."

  HEL_peoples_anarchist_army:0 "Чорно-зелені"
  HEL_peoples_anarchist_army_desc:0 "Наразі між націоналістичними ополченнями та анархістськими партизанами немає жодного організаційного перекриття, що шкодить справі, бо вони часто випадково вступають у локальні конфлікти один з одним. Як би нам не було боляче організовувати збройне формування в дещо ієрархічний спосіб, це необхідна жертва для того, щоб обидві групи діяли оптимально."

  HEL_take_from_the_rich:0 "Забрати у багатих, віддати бідним"
  HEL_take_from_the_rich_desc:0 "Хоча Мерлок Вуд далекий від того, кого ми б назвали ідеологічним союзником, його принцип перерозподілу багатства не був хибним, якими б неефективними не були його методи. Багаті мають усе необхідне і навіть більше, ніж потрібно всім іншим. Настав час повернути те, що вони вкрали у істот, через яких вони переступили, щоб опинитися там, де вони є."

  HEL_democracy_of_the_communes:0 "Удосконалити селянські ради"
  HEL_democracy_of_the_communes_desc:0 "Аделарт ніколи не терпітиме примх корумпованих політиків. Натомість наші представники народу залишатимуться пильними у своєму прагненні принести мир, землю та золото всім бідним і нужденним Аделарта. Ми ніколи не будемо діяти у власних інтересах, бо не будемо справжніми слугами Аделарта."

  HEL_the_remaining_sheriff_supporters:0 "Залишки прихильників Шерифа"
  HEL_the_remaining_sheriff_supporters_desc:0 "Попри повне моральне банкрутство та відсталі ідеологічні погляди, [HEL.GetName] все ще є прихистком деяких прихильників шерифа. Їх потрібно швидко усунути, щоб революція процвітала, інакше сили реакції спробують відновити контроль. Їхній насильницький кінець уже близько."

  HEL_anarchist_war_on_greifwald:0 "Помста довжиною у п'ятсот років"
  HEL_anarchist_war_on_greifwald_desc:0 "За цікавим іронічним збігом, саме шерифам ми маємо дякувати за їхню нещадну відданість застарілим стилям правління. Саме на них ми вказуємо, коли сторонні запитують, чому все саме так, як є, і саме вони створили умови, необхідні для того, щоб наші ідеї пустили коріння. Багатьох шерифів минулого вже давно немає, проте їхні господарі залишилися. Принаймні поки що."

  HEL_on_banditry:0 "Propaganda vun der Akt"
  HEL_on_banditry_desc:0 "Дії говорять голосніше за слова. Вони можуть струсонути або сформувати суспільство набагато сильніше, ніж звичайні слова, і саме тому ми повинні вести за собою власним прикладом. Акти опору надихають на ще більші акти опору, так само як заслужена смерть занепалої знаті надихає на подальші розправи над старим істеблішментом. Боротися проти тиранії - жити вічно."

  HEL_freedom_or_death:0 "Свобода або смерть!"
  HEL_freedom_or_death_desc:0 "Знову опинитися під гнітом могутньої держави означало б втратити все, заради чого працювали ті, хто стоїть під нашим прапором. Без свободи та спокою анархії залишається мало того, заради чого варто жити. Моральний та етичний обов'язок кожної істоти, що літає під нашим прапором, - боротися за своє суспільство та наш спільний ідеал, ідеал, який більш ніж вартий самопожертви."

  HEL_free_territory_foreign_policy:0 "Вільна територія Аквілеї"
  HEL_free_territory_foreign_policy_desc:0 "Оскільки аквілейцям не вдалося підкорити нас, [HEL.GetNameDef] опиняється в унікальному становищі єдиної регіональної потуги з достатньою військовою міццю та суспільною згуртованістю для відновлення порядку. Наслідки нашого нового впливу будуть далекосяжними і без сумніву сколихнуть Грифонію до самих основ, але наш обов’язок полягає в тому, щоб поширювати нашу улюблену анархію повсюди."

  HEL_expand_the_aaaa:0 "Розширити допоміжну юрисдикцію"
  HEL_expand_the_aaaa_desc:0 "АААА добре служила нам протягом кампаній у Ґрайфвальді, проте тепер, коли ми визволили деспотичну монархію, нам варто розглянути модернізацію наших сил. Розширюючи свій вплив на Аквілею, громади Аделарта реформують АААА в Анархістську армію Аделарта та Аквілеї, формуючи допоміжну бригаду, гідну захисту народу Аделарта."

  HEL_hang_the_prelate:0 "Повісити Ебонвінга"
  HEL_hang_the_prelate_desc:0 "Ті, хто організовується на основі поклоніння Маару, не варті поваги, а анархія не може їх врятувати. Сам Ебонвінг є не лише реакціонером, а й божевільним грифоном, ще й справжньою антитезою нашого руху та наших ідеалів. Ми мусимо покінчити з ним та його послідовниками заради всього грифонства."

  HEL_crush_the_counts_loyalists:0 "Антимонархічні репресії"
  HEL_crush_the_counts_loyalists_desc:0 "Ми маємо переконатися, що агенти реакції більше ніколи не матимуть сили приборкувати інших, зробивши це насильно та швидко. Вкрай важливо зробити з них приклад, щоб ті, хто хоча б замислюється про рух задля позбавлення від анархічного прогресу, не завдали шкоди тим, хто приймає та поділяє наші догми."

  HEL_spread_the_communes:0 "Поширити комунальну демократію"
  HEL_spread_the_communes_desc:0 "Аквілея унікальна тим, що її складові регіони Віновія, Ріла та Весткіп протягом певного часу діяли напівавтономно. Вони є ідеальними місцями для поступового просування наших ідеалів комунальної демократії та федералізму, оскільки їхні існуючі інституції можна кооптувати та дещо розширити для роботи в межах нашої вдосконаленої системи."

  HEL_a_libertarian_education:0 "Лібертаріанська освіта"
  HEL_a_libertarian_education_desc:0 "Для функціонування демократичної, а особливо прямої демократичної системи, населення має бути достатньо обізнаним, щоб усвідомлювати, що для нього найкраще. Саме тому ми повинні гарантувати, що кожен грифон в Аделарті має можливість здобути вищу освіту, навіть якщо це відбуватиметься дещо нетрадиційними методами."

  HEL_redistribute_their_wealth:0 "Експроприйовані богатства Аквілеї"
  HEL_redistribute_their_wealth_desc:0 "Аквілейська монархія, вірна своїй реакційній природі, століттями експлуатувала території навколо своєї бази влади в Аквілі. Зі зміною керівництва приходить зміна пріоритетів, а наші найпалкіші прихильники завжди мешкали в найменш розвинених районах. За свою відданість вони отримають те, що заслужили."

  HEL_let_lambs_become_lions:0 "Нехай ягнята стануть левами"
  HEL_let_lambs_become_lions_desc:0 "Грифонство піднялося, вистояло проти гнобителів власного творіння та вийшло переможцем. Ми більше ніколи не будемо сидіти склавши руки, поки прихильники реакції лютують, ми ніколи більше не дозволимо обдурити себе тим, хто вважає себе вищим за нас усіх.\n\nМи вільні від хвороб держави."

  HEL_attack_greifwald:0 "Принести революцію в усю Аквілею"
  HEL_attack_greifwald_desc:0 "Хоча революція зайшла далеко, значна частина регіону все ще залишається понівеченою залишками реакції та невдалими республіканськими державами. Це наш обов’язок - завершити справу, яку ми розпочали в Аквілеї, задля блага кожного грифона, що тут мешкає."

  HEL_recruit_the_berniers:0 "Зв'язок із Берньє"
  HEL_recruit_the_berniers_desc:0 "Берньє не є аделартцем, але він шанований анархіст, який може віддати перевагу роботі в установленій анархістській "державі" замість спроб поширити революцію в Ґрайфвальді. Використовуючи наші зв’язки, нам варто переконати його прийти та допомогти нам принести революцію на його батьківщину значно швидшим та ефективнішим способом."

  HEL_refine_woodist_thought:0 "Прийняти повстанську анархію"
  HEL_refine_woodist_thought_desc:0 "Мерлок Вуд очолює Аделарт уже понад 20 років, і унікальна філософія, що стала візитною карткою його правління, змінювалася та розвивалася з кожним З’їздом народу та селян. Ми маємо вдосконалити теорії Вуда та встановити чіткий набір керівних ідеалів для Вільної території. Анархія, вільна, рівна та пролетарська, принесе нам усім належний набір ідеалів!"

  HEL_the_adelartian_system:0 "Діти лісу"
  HEL_the_adelartian_system_desc:0 "Якщо ви будуєте майбутнє, вам потрібно зберігати міцним свій фундамент. Це завжди було метою Мерлока Вуда з моменту створення Аделарта, і серед цих величних основ є певний дух громади, який може по-справжньому функціонувати лише в суспільстві, де ферми та ліси, що зробили Аделарт таким, як він є, можуть процвітати та рости неушкодженими."

  HEL_take_from_the_richest_there_are:0 "Чим більше, тим краще!"
  HEL_take_from_the_richest_there_are_desc:0 "Скайфольці - це пам’ятник провалам капіталізму. Вони багаті, але корумповані, не монархія, але такі ж реакційні. Немає кращої мети для революції, окрім, хіба що, самої імперії. Проте наразі наші погляди спрямовані на це лігво корупції та рабства капіталу."

 ### THIRD PATH - THE PRELATURE OF ADELART ###

  ### The Prelate and his steel-plated tractors and steel-plated knights have taken control of the country, pledging to restore the true practices of the Old Believers and reject any sort of hierarchical religion. Fiercely independent and quite militaristic despite a pacifistic, communitarian, and cooperative ethos, the Prelate's supporters have essentially declared war on the Archonate and the false kings and dukes of Griffonia who claim divine right. The only person with divine right, they say, is the Prophet of Eyr - a mysterious griffon from the Adelartian forests known simply as Luca vun Lissay. Soft-spoken yet with deep reservoirs of passionate sermons, Luca and his militias have a clear ethos - but may follow some cult-like practices in their desire to restore some pretty chill and courageous religious values. бла-бла-бла, люди до того як придумали дискорд бі лайк

  HEL_a_godly_adelart:0 "Божий Аделарт"
  HEL_a_godly_adelart_desc:0 "Мудрий Лука фун Ліссей та його вірні віддані Ейр розігнали сили тих, хто намагався закрити рот народу та Богам, і вийшли на авансцену Аделарта як наші справжні божественні визволителі!\n\n Хай живе наш обраний прелат Лука фун Ліссей, благословенний Ейр!"

  HEL_deal_with_the_vanguardists:0 "Комуністи-безбожники"
  HEL_deal_with_the_vanguardists_desc:0 "Так звані авангардисти готувалися вчинити найбільше збочення з усіх, стверджуючи, що дії їхньої світської держави стоять вище за божественну волю Богів! Ми покажемо цим відступникам-єретикам наслідки спроби кинути виклик Ейр та її побожним послідовникам!"

  HEL_root_out_the_sheriff:0 "Владолюбні монархісти"
  HEL_root_out_the_sheriff_desc:0 "Дурні посіпаки Шерифа все ще ховаються в тіні, бажаючи знищити наші засоби до існування лише заради того, щоб повернути нас під залізний кіготь графа, який дбає лише про наповнення власної скарбниці. Ми виженемо цих небезпечних дисидентів з наших земель раз і назавжди!"

  HEL_a_letter_to_griffenheim:0 "Маарит у Фелконтауні"
  HEL_a_letter_to_griffenheim_desc:0 "Настав час викрити скандальні злодіяння узурпатора-прелата Фелконтауна, Людвіґа Хеллталона, перед масами вірян і показати, ким він є насправді...\n\n§RВладолюбною дубиною Архонтів і, що ще гірше, божевільним пішаком Маара§!!"

  HEL_claim_the_greifwald_prelature:0 "Скинути прелата Ґрайфвальда"
  HEL_claim_the_greifwald_prelature_desc:0 "Прелат Ґрайфвальда не заслуговує на свій титул. Він може стверджувати, що проповідує добре слово наших улюблених Богів масам, але він мало що робить для виконання волі Ейр у Периферії. Ходять навіть чутки, що він шукає порад в найтемніших і наймерзенніших джерелах, але ми дізнаємося про це напевно лише тоді, коли його буде праведно усунуто..."

  HEL_ally_with_the_anarchists:0 "Народний синтез"
  HEL_ally_with_the_anarchists_desc:0 "Мерлок Вуд та його товариші-анархісти завжди стояли на спільній ниві з нами, Старовірами, віддані тим самим ідеалам визволення простого грифона та знищення гнилих Архонатів і їхніх маріонеткових прелатів на наших власних землях. Було б нерозумно не запропонувати їм можливість приєднатися до нас заради спільної мети."

  HEL_reach_out_to_the_democrats:0 "Наше демократичне коріння"
  HEL_reach_out_to_the_democrats_desc:0 "Демократичне лобі Аделарта завжди було готове вислухати наші вимоги щодо релігійної автономії та надати поступки на шляху до наших цілей.\n\n Можливо, буде справедливо дати їм голос у нашій громаді за їхню шанобливу співчутливість?"

  HEL_power_begets_parasites:0 "Влада породжує паразитів"
  HEL_power_begets_parasites_desc:0 "Абсолютна влада - наймерзенніша та найбільш руйнівна сила, що розбещує всіх, окрім божественних Богів, призводячи до відмови від моралі на користь нестримного гедонізму на горбах стражденних. Більше ніколи марнотратство меншості не переважить потреби більшості!"

  HEL_religious_values:0 "Оплот Старої Віри"
  HEL_religious_values_desc:0 "Вже понад двадцять років Аделарт залишається вільним під керівництвом віри та силою наших спільних уз. Коли весь світ охоплений розбратом, війною та злиднями, ми повинні бути пильними як ніколи, протистоячи загрозам і захищаючи нашу батьківщину, щоб мрія про майбутнє Ейр ніколи не згасла."

  HEL_the_old_believer_faith:0 "Осуд церковної ієрархії"
  HEL_the_old_believer_faith_desc:0 "Справжнє слово Богів поширюється не підступними церковниками, що сидять у своїх вежах зі слонової кістки та вивергають нечестиві догми, а самовідданими словами та вчинками простого люду та їхніх сусідських священників, що піклуються про нужденних і пригноблених як одна велика родина вірян. Ми більше не будемо слухати фальшиві слова далеких Архонтів!"

  HEL_encourage_large_families_fash:0 "Культ родючості"
  HEL_encourage_large_families_fash_desc:0 "Як послідовники Ейр, богині родючості та сім'ї, ми вбачаємо свій божественний обов'язок у заохоченні, а то й наданні стимулів жителям Аделарта створювати та розширювати сім'ї, чи то через святе дітонародження, чи через сумлінне всиновлення знедолених сиріт."

  HEL_the_values_of_eyr:0 "Храм у кожному містечку"
  HEL_the_values_of_eyr_desc:0 "Дар життя, люблячі та турботливі родини, щедрі врожаї та повага до нашого тілесного "я".\n\n Це чотири благословення, даровані нам нашою вселюблячою матір'ю Ейр, і ми будемо побожно дотримуватися цих святих чеснот доти, доки житимемо. Але як ми можемо це робити без храмів для такого поклоніння?"

  HEL_a_haven_for_old_believers:0 "Проповідь класової співпраці"
  HEL_a_haven_for_old_believers_desc:0 "Від найскромнішого робітника до найпрестижнішого прелата, ми всі однаково поділяємо та вирощуємо плоди благословення Ейр над нами всіма. Будь-яка неприязнь між класами та гільдіями має бути відкинута та прощена, бо ми всі повинні з'єднати кігті на знак поваги до достатку Ейр і не втрачати плоди нашої праці в помилкових чварах."

  HEL_peace_at_home:0 "Соціальне вчення Ейр"
  HEL_peace_at_home_desc:0 "Хаос революцій, що раз по раз прокочувалися Грифонією, призвів до того, що матері оплакують своїх полеглих чоловіків і синів, а ремісники перетворилися на жебраків на кожному кутку храмів. Як, будучи синами та доньками Ейр, ми можемо дозволити цьому горю та відчаю тривати далі? Усі грифони повинні докласти зусиль, щоб підтримати бідні та поранені сім'ї через благодійність та учнівство!"

  HEL_institute_prohibition:0 "Немає місця для вад"
  HEL_institute_prohibition_desc:0 "Коли ми входимо в сучасну епоху, пороки сучасного суспільства починають пускати коріння. Хоча ми поважаємо права всіх істот та освічені ідеали свободи та демократії, важливо, щоб ми просували поміркованість понад усе та поклали край скайфольському алкоголю та фезерським злочинцям."

  HEL_continue_revolutionary_policies:0 "Вудистський дистрибутизм"
  HEL_continue_revolutionary_policies_desc:0 "Економічні принципи дистрибутизму завжди палко проповідувалися Вудом та його найближчими соратниками як справжнє рішення нерівності, і тепер ми розширимо та розповсюдимо їх по всіх куточках Аделарта з виданням нового трактату Луки "Акр і плуг"."

  HEL_restore_order:0 "Я, пророк Ейр"
  HEL_restore_order_desc:0 "Коли розбиті залишки наших ворогів розвіяні за вітром, а колишній хаос розвіяний під проводом Ейр та її праведних послідовників, Аделарт об'єднано під срібним прапором Старовірів. Темні дні жорстоких шерифів, піднесених бандитів та ілюзорних ідеологів залишилися позаду."

  HEL_seeds_of_a_reformation:0 "Насіння Великого Пробудження"
  HEL_seeds_of_a_reformation_desc:0 "Незабаром настане Пробудження для всіх грифонів. Не формування так званої "класової свідомості" чи поява якоїсь новомодної економічної системи, а духовне відродження всередині кожного грифона. Скоро тритеїзм повстане знову як маяк стабільності та процвітання серед моря занепалих ідеологій та аморальних деспотів."

 ### Aquileian Unification Content for Luca

  HEL_eyrist_foreign_policy:0 "Свята асамблея Аквілеї"
  HEL_eyrist_foreign_policy_desc:0 "Ось і все. І республіканці, і монархісти намертво лежать під нашими кігтями, адже вони були настільки відволікані один одним, що більше не могли бачити світло тритеїзму. Тепер, коли з чільними партіями покінчено, ми можемо втілити наше бачення Аквілеї: вірну та справедливу республіку для всіх під пильним оком Ейр."

  HEL_claim_the_prelature_of_greifwald:0 "Розчавити Архонтат у Рілі"
  HEL_claim_the_prelature_of_greifwald_desc:0 "Престол Арктурія є законним володінням Луки фун Ліссея, прелата Ґрайфвальда та Аделарта. Ми мусимо покласти край мааритам, бандитам та дворянам, повертаючи цю святу територію нашій суверенній державі. З часом старі обряди будуть відновлені в Рілі та Аквілі, що стане свідченням славної щедрості Ейр."

  HEL_trd_den_of_vice:0 "Скайфол, лігво жадібності"
  HEL_trd_den_of_vice_desc:0 "Скайфол є визнаний неймовірною загрозою для добробуту грифонів, які живуть у його межах. Їхня погоня за багатством і прибутками понад усе засліпила їх перед дарами наших творців і сповнила саморуйнівними бажаннями. Ми мусимо знищити їхню злочинну державу задля блага її населення та милості Богів."

  HEL_flo_den_of_vice:0 "Фловена, лігво обжерливості"
  HEL_flo_den_of_vice_desc:0 "Фловенці не зовсім схожі на скайфольців, але їхнє багатство призвело до іншого морального гріха. Вони задоволені тим, що просто сидять і ледаче накопичують ідолів у золотій клітці власного виробництва, не відчуваючи радощів, які наші творці призначили для нас. Ми станемо світлом, що просяє крізь їхні ґрати з марного золота."

  HEL_fez_den_of_vice:0 "Фезера, лігво зради"
  HEL_fez_den_of_vice_desc:0 "Фезера - це справді жалюгідне видовище не лише для прелатури, а й для всієї Грифонії. Халупа нікчемних злодіїв і корумпованих бюрократів, що тримаються на жорстокому поводженні та видирстві у населення. Здригаєшся при думці про те, які нечестиві діяння відбуваються на вулицях міста. Нашим моральним і визначеним обов'язоком є відвоювати провінцію у злочинності та пороку."

  HEL_an_official_anointment:0 "Лука, архіпрелат Ріли"
  HEL_an_official_anointment_desc:0 "Оскільки законне усунення узурпатора-прелата та його кліки завершене, зараз як ніколи настав час для Луки нарешті зійти на престол як єдиний істинний, беззаперечний архіпрелат, обраний не далекими Архонтами, а грифонами Ґрайфвальда та Аделарта!"

  HEL_anti_maarite_vigilantism:0 "Антимааритський вігілантизм"
  HEL_anti_maarite_vigilantism_desc:0 "Жахливі звіти з наших храмів почали згадувати розповіді про обряди на честь лихого бога Маара глибоко в лісах, підозрілих грифонів у темних плащах, що оскверняють наші храми, і навіть про моторошні жертвоприношення наших місіонерів! Ми повинні розчавити цю злу скверну з особливою суворістю, вистеживши кожного останнього маарита, перш ніж гниль зможе поширитися!"

  HEL_our_teachings_in_greifwald:0 "Поширювати наше вчення"
  HEL_our_teachings_in_greifwald_desc:0 "Пелена брехні та обману, яку підтримували нині скинутий узурпатор-прелат і його посіпаки, що затьмарювала розум незліченних грифонів від істинних благословень Богів, має бути спалена. Справжнє вчення нашої вселюблячої матері Ейр має бути поширене нашими вірними місіонерами, щоб очистити та просвітити занедбані маси Ґрайфвальда."

  HEL_localized_democracy:0 "Локалізована демократія"
  HEL_localized_democracy_desc:0 "У цю нову еру революцій, республік і демократії проблеми простогрифонства більше не можуть ігноруватися без неминучого повстання. Ми повинні вчитися на помилках минулого і обговорювати політику не за зачиненими дверима дворянських маєтків, а біля вівтарів і на лавах наших храмів, де кожен може вільно висловити свої занепокоєння та прохання!"

  HEL_an_end_to_the_berniers:0 "Полювати на Берньє"
  HEL_an_end_to_the_berniers_desc:0 "Анархістські хулігани Нестора Берньє продовжують блукати сільською місцевістю Ґрайфвальда, тероризуючи населення і навіть здійснюючи руйнівні набіги на міста і транспорти. Ми покладемо край їхньому кривавому тероризму за допомогою систематичної кампанії, спрямованої на нейтралізацію та знищення їхніх лісових схованок і таборів."

  HEL_spread_eyrs_charity:0 "Поширювати благодійність Ейр"
  HEL_spread_eyrs_charity_desc:0 "Переважна більшість Ґрайфвальдців все ще страждає від крайньої бідності та злиднів, а їхні благання про допомогу, які раніше ігнорувалися старою владою Ґрайфвальда, тепер лунають гучніше, ніж будь-коли. Ми не залишимо їхні прохання без відповіді, бо ми простягнемо їм кіготь у благословенній щедрості, як справжні діти Ейр!"

  HEL_a_bastion_against_the_archons:0 "Броня проти Архонатів"
  HEL_a_bastion_against_the_archons_desc:0 "Навіть у нашу зоряну годину ми не повинні дозволяти собі спочивати на лаврах, нехтуючи загрозами, що все ще лежать за межами наших улюблених земель. Дворяни та Архонти неминуче повернуться, щоб завдати нам удару у відповідь, і ми будемо відбивати їх знову і знову. Наші святі щити та танки захищатимуть нас, а Боги праведно вестимуть нас крізь шторм!"

  HEL_coronation_in_skyfall:0 "Архонт іншого штибу"
  HEL_coronation_in_skyfall_desc:0 "Тепер, коли багатства Скайфолу в наших руках, настав час повністю закріпити легітимність теології Луки фун Ліссея. Старі обряди будуть відновлені в усьому домені нового ейристського Архонтату з новим Архонтом на чолі, поки всі грифони радіють щедротам вогнища і домівки, незаплямовані світом зради та потрясінь.\n§GСлава Венії III, Архонту Народу§!"

 ### FOURTH POLITICAL PATH - SWITZERLAND ###

  ### Adelart reforms into a true confederation as Wood and the Prelate Luca put aside their differences and decide once again to lead Adelart against the Sheriff and Greifwald. Wood is the de-facto benefactor of the Socialist Coalition, while Luca leads Eyrite Conservatives - both parties bear a committment to decentralization, communal ethics, personal freedom, and direct democratic ideals, but economic methods ( distributivism vs. socialism ) and social methods ( revolutionary nationalism vs. a more religious, temperate social ethos ) divide two factions that the player can choose between. Wood and the Prelate remain relevant in each of their organizations, and in many ways they're a toned down version of their own paths. бла-бла-бла, люди до того як придумали дискорд бі лайк

  HEL_the_confederation_of_communities:0 "Конфедерація громад"
  HEL_the_confederation_of_communities_desc:0 "Мерлок Вуд та прелат Лука разом накреслили курс, що має принести демократію та рівність в Аделарт. Питання лише в одному: хто очолить їхню роздроблену коаліцію?"

  HEL_switzerland:0 "Федеральна рада Аделарта"
  HEL_switzerland_desc:0 "Хоча пряма демократія забезпечує нашому населенню найбільш справедливий та рівний спосіб участі в управлінні державою, певні приклади прямої демократії в Грифонії показали проблеми, які спричиняє така система, якщо на неї покладатися занадто сильно. Тому буде створена федеральна рада для вирішення питань, що є занадто дрібними для розгляду всім населенням Аделарта."

  HEL_confederal_war_on_greifwald:0 "Смолоскипоносці конфедеративної революції"
  HEL_confederal_war_on_greifwald_desc:0 "Наша революція не схожа на ту, якої бажають авангардисти чи вудисти в тому сенсі, що наш етичний обов'язок - експортувати її на благо всіх, але на цьому схожість закінчується. Наша конфедерація це не інтернаціоналістичне утворення, а маяк миру та стабільності в інакше жорстокій Периферії. Ми виправимо помилки минулого не ідеологією, але миром."

  HEL_gun_rights:0 "Рушницю кожному грифону"
  HEL_gun_rights_desc:0 "20 років тому грифони Аделарта проголосили незалежність від Ґрайфвальдських тиранів під час народного повстання. Навіть зараз повелителі Ґрайфвальда дивляться на нас із голодом в очах. Якщо наша демократія має вижити, населення повинно бути озброєним і готовим захищати свою свободу та права."

  HEL_support_the_old_believers:0 "Автономія для храмів"
  HEL_support_the_old_believers_desc:0 "Більшість населення Аделарта складається з дуже релігійних грифонів. Хоча ми вже підтримуємо релігійні громади в нашій країні, вони дещо нейтрально ставляться до нашого уряду. Ось чому ми посилимо підтримку релігійних громад, щоб стати з ними друзями."

  HEL_decentralized_education:0 "Автономія для вчителів"
  HEL_decentralized_education_desc:0 "Для функціонування демократичної, а особливо прямої демократичної системи, населення має бути достатньо обізнаним, щоб усвідомлювати, що для нього найкраще. Саме тому ми повинні гарантувати, що кожен грифон в Аделарті має можливість здобути вищу освіту, навіть якщо це відбуватиметься дещо нетрадиційними методами."

  HEL_nation_of_volition:0 "Держава волевиявлення"
  HEL_nation_of_volition_desc:0 "Кантони можуть існувати лише за згоди тих, ким управляють, на основі принципу волевиявлення. Ми будемо прямою демократією, беручи участь у дебатах та часто голосуючи на референдумах з соціальних та економічних питань. Ми керуватимемо державою як федеративним утворенням у межах системи, що має отримати згоду підпорядкованих."

 ## SWITZERLAND's SOCIALIST COALITION ##

  HEL_the_socialist_coalition:0 "Вуд очолює коаліцію"
  HEL_the_socialist_coalition_desc:0 "Соціалістична коаліція досягла успіху на виборах, оскільки народ довів свою віру в режим. Тепер вони рухатимуться вперед, підбадьорені народним мандатом."

  HEL_distance_from_extremism:0 "Очищення від неліберальних соціалістів"
  HEL_distance_from_extremism_desc:0 "Хоча багато іноземців звинувачували аделартців у радикалізмі та божевіллі, ці заяви здебільшого абсурдні та сміховинні. Проте навіть дехто в нашій власній країні слушно нагадує нам про наявність серед нас більш екстремістських елементів. Задля забезпечення безпеки та довголіття нашої країни ми мусимо викорінити їх."

  HEL_the_first_unions:0 "Перші профспілки"
  HEL_the_first_unions_desc:0 "Аделарт ніколи не був особливо індустріалізованим регіоном. Без масштабної промисловості жителі Аделарта не вважали за потрібне засновувати власні промислові чи ремісничі спілки. Оскільки ми переходимо до розбудови сучасної економіки, ми будемо сприяти створенню організацій робітничих грифонів, надихаючись сільськими колективними традиціями наших Старовірів."

  HEL_socialism_with_adelartian_characteristics:0 "Колективи та ради"
  HEL_socialism_with_adelartian_characteristics_desc:0 "Впроваджуючи більш традиційні колективи в Аделарті, ми не можемо забувати про особливості нашого народу. Хоча ці колективи будуть сформовані з багатьох різних ферм, ми дозволимо кожному з колишніх власників майна бути частиною ради, яка керує колективом заради майбутніх поколінь."

  HEL_wealth_for_the_workers:0 "Добробут - робітникам!"
  HEL_wealth_for_the_workers_desc:0 "Хоча робітники Аделарта вільні від Ґрайфвальдського гніту, багато з них усе ще потерпають від бідності та супутніх проблем. Хоча центральне керівництво Аделарта не має великих лишків, ми можемо і будемо використовувати наявні ресурси, щоб допомогти цим бідним грифонам."

  HEL_eyrian_socialism:0 "Соціалізм через Ейр"
  HEL_eyrian_socialism_desc:0 "Грифони Аделарта, чи то з сільського, чи то з міського середовища, дуже релігійні. На відміну від багатьох інших соціалістичних філософій, у них немає ворожості до божественного або його проповідників. Наш шлях ґрунтується не просто на матеріальному світі, він натхненний божественним - вірою в богиню Ейр."

  HEL_encourage_communal_lifestyles:0 "Одна велика громада"
  HEL_encourage_communal_lifestyles_desc:0 "У лісах Аделарта розкидано багато містечок і сіл. Багато з них потерпають від серйозних проблем, з якими наш уряд просто не в змозі допомогти через лібертаріанську природу нашої країни. Тому ми дозволимо цим містам здійснювати самоврядування через комунальну систему на місцевому рівні."

  HEL_left_nationalism:0 "Лівий націоналізм"
  HEL_left_nationalism_desc:0 "Аделарт є і, сподіваємось, завжди буде краєм соціалістичних робітників та фермерів. Проте, на відміну від більшості соціалістів, грифони Аделарта не вважають себе частиною якоїсь міжнародної групи. Натомість вони воліють ідентифікувати себе з аделартською культурою. Це було нашою силою в минулих битвах і, сподіваємось, буде нашою силою в майбутніх."

  HEL_hoist_the_green_and_red:0 "Зелений та червоний"
  HEL_hoist_the_green_and_red_desc:0 "Підніміть червоні та зелені стяги, браття та сестри! Аделарт - це мрія сільського пролетаріату, де колись пригноблені селяни тепер очолюють справді демократичну та комуністичну державу! Нехай уся Грифонія дізнається про успіх нашого великого експерименту, бо ми перші на цьому новому шляху!"

 ## SWITZERLAND'S EYRITE COALITION ##

  HEL_social_conservatives:0 "Прелат очолює коаліцію"
  HEL_social_conservatives_desc:0 "Консервативна фракція, підтримувана ейристами, перемогла на виборах. Усе ще вірячи в багато ліберальних республіканських ідей інших фракцій, вони проводитимуть свою політику з релігійним підтекстом Старовірів."

  HEL_a_better_figurehead:0 "Відставка Мерлока Вуда"
  HEL_a_better_figurehead_desc:0 "Мерлок Вуд є героєм для нашого народу, попри його зв'язки з соціалістами. Хоча ми не можемо переслідувати його за політичні витівки, ми можемо відкликати його зі служби та відправити на заслужений відпочинок як героя, фактично усунувши його від будь-якої реальної влади."

  HEL_social_funds:0 "Соціальний фонд"
  HEL_social_funds_desc:0 "Благодійність храмів має свої межі. Необхідно створити Соціальний фонд для наших бідніших громад, які страждають у цей час змін. Вчасні та помірні гранти дадуть можливість місцевим органам ефективно вирішувати власні проблеми на базовому рівні."

  HEL_eyrian_charity:0 "Хліб, рис та ідоли"
  HEL_eyrian_charity_desc:0 "Ми не можемо дозволити собі забути про наших найбільш знедолених у ці скрутні часи. Храми використають свій величезний вплив в Аделарті для надання благодійної допомоги нужденним, і все це буде субсидуватися та підтримуватися поточною адміністрацією."

  HEL_encourage_large_families:0 "Ейристські сімейні закони"
  HEL_encourage_large_families_desc:0 "Лише в останні роки чисельність грифонів на території Аделарта перевищила мільйон. Оскільки наш рівень життя зростає, народжуваність падає. Тому ми повинні зробити привабливим і вигідним мати велику родину, пропонуючи субсидії та податкові пільги."

  HEL_agrarianism_focus:0 "Захист сільського традиціоналізму"
  HEL_agrarianism_focus_desc:0 "Більшість нашого населення може проживати в міських центрах, але справжнє серце Аделарта б'ється за межами міст. Ми повинні звернутися до цих сільських мас за підтримкою. Змінивши спосіб підрахунку голосів за округами, ми зможемо надати їм гучніший голос в уряді."

  HEL_subsidize_the_farms:0 "Від селян до фермерів"
  HEL_subsidize_the_farms_desc:0 "Настав час повернутися до нашого коріння, у прямому сенсі. Хоча ми звільнили наш народ від кріпацтва в минулому, наші фермери технічно застаріли порівняно з сусідами. Ми мусимо модернізувати наші господарства і дати фермерам інструменти, щоб вони могли вирости за межі своїх селянських пасовищ."

  HEL_eyrite_values:0 "Поміркованість, старанність, громада"
  HEL_eyrite_values_desc:0 "Намагаючись подолати бідність і належним чином виконати наші обіцянки щодо прямої демократії, наш уряд ініціює створення місцевих рад громадян. Ці інституції привнесуть дух благочестя та поміркованості своїм виборцям, сприятимуть зміцненню почуття спільноти серед усіх аделартців і очистять країну від останніх залишків нашого бандитського минулого."

  HEL_adelart_above_everything_eyr_above_everyone:0 "Аделартський шлях до демократії"
  HEL_adelart_above_everything_eyr_above_everyone_desc:0 "Демократія - це найкраща і водночас найгірша форма правління. Ми не можемо повністю дозволити собі керуватися волею натовпу, але ми також повинні дати нашому народу право голосу. Ми знайшли цей баланс: Аделарт понад усе, а Ейр понад усіх!"

 ### Confederation Foreign Policy ####

  HEL_confederal_foreign_policy:0 "Аквілейська Конфедерація Кантонів"
  HEL_confederal_foreign_policy_desc:0 "Хоча це не входило в наші наміри, значна частина Аквілеї опинилася під нашим прямим контролем внаслідок їхньої спроби вторгнення. Замість того, щоб створювати маріонетковий уряд, було вирішено розширити систему кантонів на всю Аквілею, даючи нашим побратимам-грифонам ще один шанс пізнати демократію та свободу."

  HEL_move_against_greifwald:0 "Визволити васалів"
  HEL_move_against_greifwald_desc:0 "Протягом більшої частини історії Віновія, Ріла та Весткіп залежали від бажань і потреб правлячого уряду в Аквілі, маючи мало впливу на власні справи. Як тільки їхні нинішні правлячі режими будуть повалені, їхній народ привітає систему кантонів з розкритими передніми кігтями."

  HEL_alliance_with_pomovarra:0 "Альянс із Помоваррою"
  HEL_alliance_with_pomovarra_desc:0 "Помоварра залишається одним із останніх оплотів регіональної республіканської демократії в Периферії та в усій Грифонії. [POM.GetLeader] викував демократію на попелищі аквілейського колапсу так само, як і ми. Ми мусимо укласти з ними союз і зрештою прагнути до об'єднання на основі спільної мови та культури, інакше обидві наші держави опиняться на смітнику історії."

  HEL_invite_avian:0 "Авіан у Пакті"
  HEL_invite_avian_desc:0 "Авіан пережив історію правління з Грифенгайма і, що не дивно, тепер не бажає підпорядковуватися Аквілі. Проте ми віримо, що вони будуть зацікавлені в союзі, і тому запропонуємо їм місце в пакті задля стратегічної оборони проти ворогів миру в Грифонії."

  HEL_invite_flowena:0 "Захист для Фловени"
  HEL_invite_flowena_desc:0 "Хоча Фловена багата, її практика найму найманців для самозахисту не є достатньою в сучасну епоху величезних армій та ще більшої промисловості. Без допомоги місто було б взяте в облогу та знищене будь-яким ворогом, готовим зачекати. Сподіваючись уникнути такої ситуації, ми запропонуємо їм місце в пакті."

  HEL_propose_pomovarran_unification:0 "Запропонувати об'єднання з Помоваррою"
  HEL_propose_pomovarran_unification_desc:0 "Аделарт і Помоварра давно мають культурні зв'язки, які з плином часу стають лише міцнішими. Тепер, коли ми успадкували роль найбільшого політичного утворення регіону, цілком логічно запропонувати Помоваррі статус кантону в межах нашої конфедерації, щоб вони зберегли автономію та приєдналися до своїх братів по зброї."

  HEL_unified_democratic_government:0 "Заклик до легітимності"
  HEL_unified_democratic_government_desc:0 "Хоча ми підкорили Аквілею військовим шляхом, нашому новому уряду бракує того визнання, яке мав їхній багатовіковий політичний устрій. Щоб забезпечити вигідний рівень міжнародної легітимності в наступні роки, ми повинні докласти зусиль, щоб позиціонувати себе як законного наступника нині неіснуючої Аквілейської держави."

  HEL_curtail_estates:0 "Розчавити маєтки"
  HEL_curtail_estates_desc:0 "Землевласники століттями мали величезний вплив на функціонування аквілейських урядів, викликаючи величезне невдоволення серед менш привілейованих верств. Настав час розбити земельну монополію та розподілити її між підприємствами та місцевим населенням задля підтримки прихильного суспільного іміджу."

  HEL_expand_self_management:0 "Розширити самоврядування"
  HEL_expand_self_management_desc:0 "Профспілки існують в унікальній ситуації: вони не мають прямого представництва в уряді, але здатні мобілізувати сотні тисяч грифонів на протести в разі потреби. Щоб полегшити переговори та підвищити продуктивність, ми надамо офіційним профспілкам право організовувати власні робочі місця в межах інших регуляторних норм."

  HEL_union_political_machine:0 "Профспілкові міські політичні машини"
  HEL_union_political_machine_desc:0 "Хоча профспілки є звичною справою, уряд все ще має можливість ігнорувати їхні вимоги, якщо вважатиме це абсолютно необхідним. У воєнний час це може бути прийнятним, проте за будь-яких інших обставин це ганебно. Істоти кантонів мають бути почуті, а міські профспілки подбають про те, щоб уряд їх дослухався."

  HEL_democratic_cult_of_personality:0 "Герой нашої нової демократії"
  HEL_democratic_cult_of_personality_desc:0 "Хоча він не любить це визнавати, Мерлок Вуд був першим серед нас, хто усвідомив потребу в поміркованому соціалістичному прогресі. Від багатих до бідних - голоси багатьох перед голосами небагатьох. Його ідеали відповідальні за розбудову всіх кантонів, і як би він не опирався титулу героя, це звання є цілком заслуженим."

  HEL_recognize_prelate_ebonwing:0 "Визнати прелата Ебонвінга"
  HEL_recognize_prelate_ebonwing_desc:0 "Лука фун Ліссей та його маріонетки в громадах контролювали Аделарт двадцять років. Тепер, коли ми контролюємо всю національну територію Ґрайфвальда, ми можемо нарешті усунути Луку фун Ліссея без масштабних протестів і визнати прелата Ебонвінга законним релігійним лідером Ґрайфвальда, навіть якщо ми продовжуватимемо підтримувати світську політику на всіх рівнях уряду."

  HEL_expand_nationalization_programs:0 "Єдина програма націоналізації"
  HEL_expand_nationalization_programs_desc:0 "Існує багато галузей промисловості та елементів інфраструктури, що мають таке велике значення, що їх фінансування з державного бюджету є найкращим способом гарантувати їхнє довголіття. Хоча це може засмутити тих, хто раніше володів цими підприємствами, це найкращий курс дій для процвітання кантонів."

  HEL_expand_eyrite_social_programs:0 "Розширити ейристські соціальні програми"
  HEL_expand_eyrite_social_programs_desc:0 "Хоча наше культурне коріння дає нам природню поблажливість на менш удачливих, нинішні інституції надають менше, ніж нам хотілося б. Настав час закріпити благодійність у законі, щоб створити справжню соціальну державу на основі наших існуючих уподобань."

  HEL_rally_the_youth:0 "Продемократичні молодіжні ліги"
  HEL_rally_the_youth_desc:0 "У більшості контекстів мілітаризовані молодіжні групи зазвичай є радикальними та небезпечними, але існують способи зробити їх корисними. Якщо держава забезпечить засоби для діяльності таких груп, вони природним чином будуть прихильні до держави і навряд чи виживуть без неї. З огляду на це кантони можуть легко створювати та підтримувати продемократичні та прореформаторські молодіжні групи."

  HEL_reject_distributism:0 "Згадуючи процвітання Борея"
  HEL_reject_distributism_desc:0 "Хоча наші комунальні корені не були повністю перенесені в сучасні реалії управління та капіталізму, ми все одно дбаємо про менш удачливих. Етичний капіталізм необхідний для безпечного та стабільного зростання економік кантонів, і він слугує нагадуванням навіть найскромнішому грифону про те, що надія є завжди."

  HEL_a_democratic_periphery:0 "Мир у Периферії"
  HEL_a_democratic_periphery_desc:0 "Нарешті справу зроблено. Хоча все ще існують зовнішні вороги, які хотіли б бачити розпад нашої держави, кантони та наші союзники досягли того, чого ніколи не могли досягти Імперія чи Аквілея: миру та процвітання в Периферії та за її межами."

  HEL_strike_avi:0 "Визволити Авіан"
  HEL_strike_avi_desc:0 "Залишки герцогства Веренія роздирає деспотична шляхта, наче стерв'ятники вмираючу корову! Їхні безглузді громадянські війни та розколи зробили дім Авіан слабшим за нас. У нас є шанс вдарити та звільнити наших іноземних побратимів із лап їхніх клептократичних деспотів."

  HEL_strike_pyt:0 "Атакувати Ґрайфенмаршен"
  HEL_strike_pyt_desc:0 "Грифонська Імперія слабшає з кожним днем, а наші брати в Герцланді на півночі закуті в тінь цієї імперії. "Селянська республіка" має бути визволена, щоб ми могли об'єднатися в істинній демократії! За свободу! За Аделарт!"

  HEL_core_pyt:0 "Інтегрувати Ґрайфенмаршен"
  HEL_core_pyt_desc:0 "Ми успішно анексували Ґрайфенмаршен, але ми маємо приділити час тому, щоб просвітити наших братів і сестер щодо справжнього шляху до свободи. Ми будемо підтримувати помірковані партії на колишній імперській території, водночас засуджуючи радикальних фашистів і комуністів, що там розплодилися, задля досягнення політичної єдності."

  HEL_strike_pom:0 "Повалити помоварранську плутократію"
  HEL_strike_pom_desc:0 "Наші брати та сестри в Помоваррі не перебувають у скрутному становищі, адже вони живуть під владою своїх освічених олігархів! Але яка користь від їхньої олігархії? Зараз у них хороші правителі, але за кілька років вони можуть перетворитися на деспотів! Ми вдаримо зараз, щоб дати народу Помоварри вибір, хто ними керуватиме, за допомогою сили виборчих бюлетенів!"

  HEL_strike_flo:0 "Сховища Фловени"
  HEL_strike_flo_desc:0 "Наші ділові зв'язки у Фловені допомогли нам розвинути нашу молоду економіку, але не треба бути провидцем, щоб зрозуміти, що Фловена робить зі своїм золотом. Їхні олігархи накопичують його подалі від свого народу, крадучи його в усієї Грифонії! Ми визволимо це золоте місто і використаємо його кошти для побудови нашого досконалішого союзу, нехай допоможе нам Ейр!"

 ### SHARED ECONOMIC TREE - Prelate, Wood, Switzerland ###
  HEL_agrarian_economics_start:0 "Економіка для всіх нас"
  HEL_agrarian_economics_start_desc:0 "Єдина мета економіки полягає не в прибутку та модернізації, вона існує задля самореалізації та спільної мети. Заохочення до збереження наших сільськогосподарських цінностей та продовження впровадження принципів робітничого самоврядування неодмінно призведе до обережного, але ефективного переходу в сучасний світ."

  HEL_limited_urbanization:0 "Обмежена урбанізація"
  HEL_limited_urbanization_desc:0 "Ми повинні обережно заохочувати надлишок аграрних робітників до міграції в міста, але ми не можемо сліпо їх залучати! Такий нерозсудливий підхід призвів би до перенаселення та бідності. Замість цього ми впровадимо систему лімітів, де аграрні робітники поступово переходитимуть у нове міське середовище."

  HEL_electricity_for_the_forests:0 "Електрифікація лісів"
  HEL_electricity_for_the_forests_desc:0 "Розширюючи електромережу Аделарта з наших міст, ми також не повинні забувати про наших братів і сестер у лісах. Хоча проведення ліній електропередач у густолісисті райони може бути дорогим, ми зробимо все необхідне, щоб кожен у нашій країні мав доступ до електроенергії."

  HEL_expand_urban_collectives:0 "[GetUrbanFocus]"
  HEL_expand_urban_collectives_libs:0 "Сприяти кооперативній промисловості"
  HEL_expand_urban_collectives_commie:0 "Створити міські колективи"
  HEL_expand_urban_collectives_desc:0 "Заводи та міське середовище дуже схожі на наші колективи в сільській місцевості. Цілком реально домовитися про подібний устрій і в містах. Об’єднавши всі ресурси нашої країни, ми зможемо побудувати економіку, яка дбатиме про кожного."

  HEL_gradual_industrialization:0 "Поступова індустріалізація"
  HEL_gradual_industrialization_desc:0 "Стрімка індустріалізація майже завжди веде до страждань, проте не варто її і цуратися. Ми оберемо більш поміркований шлях. Індустріалізуючись помірними темпами з розумними цілями та перевірками, ми зможемо забезпечити сучасну економіку без ціни у вигляді голоду, якого легко уникнути."

  HEL_support_rural_schooling:0 "Підтримка сільських шкіл"
  HEL_support_rural_schooling_desc:0 "Дитині потрібно так само багато чого навчитися в школі, як і на фермі. Ми запропонуємо кращу оплату праці сільським вчителям і надамо більше обладнання їхнім школам, сподіваючись підвищити академічні стандарти за межами міст."

  HEL_repurpose_the_temples:0 "Перепрофілювати Ґрайфвальдських науковців"
  HEL_repurpose_the_temples_desc:0 "Мало сенсу в тому, щоб дозволяти нещасним науковим умам, яких змусили служити Ґрайфвальду, пропасти дарма. Ми запропонуємо помилування та прощення тим, хто готовий працювати з нами заради розбудови світлого завтра!"

  HEL_agriculture_as_our_backbone:0 "Сільське господарство як наш хребет"
  HEL_agriculture_as_our_backbone_desc:0 "Роблячи кожен крок ближче до справді сучасного Аделарта, ми повинні пам’ятати, що сільське господарство це наш хребет. Модернізуючи наші міські центри, ми також подбаємо про те, щоб наші ферми були одними з найкращих у світі."

  HEL_subsidize_the_farmers:0 "[GetAgricultureFocus]"
  HEL_subsidize_the_farmers_libs:0 "Ідоли для фермерів"
  HEL_subsidize_the_farmers_commie:0 "Сприяти сільськогосподарським колективам"
  HEL_subsidize_the_farmers_desc:0 "Розширення нашого контролю над сільськогосподарським сектором є наступним кроком для забезпечення збалансованої та справедливої економіки. Ми запропонуємо субсидії фермерам, що перебувають у скрутному становищі, та прямий викуп тим, хто не в змозі підтримувати прибутковість."

  HEL_connect_adelart:0 "З’єднати державу"
  HEL_connect_adelart_desc:0 "Зі зростанням Аделарта зростає і потреба в надійному транспорті. Ми розширимо наші існуючі залізниці та дороги, щоб з’єднати всі великі міста та містечка між собою. Завдяки цьому розширенню ми станемо справді єдиною державою!"

  HEL_continue_land_reform:0 "Продовжити земельну реформу"
  HEL_continue_land_reform_desc:0 "Думати, що земельна реформа сама по собі принесе справедливу систему це помилково. Проте заперечувати силу реформ? Це безглуздо. Ми продовжимо наші зусилля за допомогою справедливих і виважених реформ, розподіляючи маєтки, що залишилися без спадкоємців, або ділянки землі, які раніше були непридатними без сучасного обладнання."

  HEL_encourage_arts_and_theatre:0 "Сприяти мистецтву"
  HEL_encourage_arts_and_theatre_desc:0 "Культура суспільства - це його голос і спадщина, тому ми забезпечимо підтримку нашого мистецтва щедрими грантами. Через кілька років Аделарт буде відомий як багатий центр мистецтв зі своєю унікальною культурою!"

  HEL_support_workers_self_management:0 "Слово кожному робітнику"
  HEL_support_workers_self_management_desc:0 "Щоб забезпечити справедливе управління заводами на найнижчих рівнях, ми приймемо закон, згідно з яким керівництво середньої ланки обиратиметься самими робітниками. Буде період адаптації, але це шлях вперед до того, аби кожен робітник мав голос."

  HEL_oil_agrarian:0 "Копати неглибоко та обережно"
  HEL_oil_agrarian_desc:0 "Протягом багатьох років ми знали про багатства Аделарта під землею, але якщо ми будемо експлуатувати нафту лише заради прибутку, ми наразимо себе на небезпеку. Ми слухаємо наших вчених: нафта - це обмежений ресурс. Ми видобуватимемо її помірними темпами для зміцнення нашої економіки, але не робитимемо економіку залежною від неї."

 ### FIFTH POLITICAL PATH - OIL REPUBLIC ###

  ### The Oil Republic is led by Jaume de Conard, yet the Flowenan-backed industrialist and all-around slimy, charismatic personality can come to power through two ways, and must carefully balance both of them. First is democratic legitimacy, needed to placate the people - his government after all, is technically a republic of the people, the fulfilling of Adelart's true mission of democracy and self-determination, to be led away from these socialist bandits and toward a new reppublican era. The Second is loyalty to his benefactors, the Flowenans, and the maintenance of their interests - control of Adelart's oil fields, friends in government, and proper industrialization. From this, the Oil Republic - a oligarchic apparatus dedicated to profit and power, yet with a shred of proper democracy and state-building regardless ( perhaps the most stable democracy out of any path ), is born. бла-бла-бла, люди до того як придумали дискорд бі лайк

  HEL_de_conards_republic:0 "Нафтова Республіка"
  HEL_de_conards_republic_desc:0 "Чи то за допомогою хитрощів, чи то законними демократичними методами, Жом де Конар опинився біля керма нової Аделартської Республіки. Зосередиться він на зміцненні власної влади та задобрюванні своїх милостивих благодійників у Фловені чи на розбудові демократичного Аделарта на принципах Аквілейських республіканців, залежить тільки від нього."

  HEL_revolutionary_spirit:0 "Нехай світ дізнається наше ім'я"
  HEL_revolutionary_spirit_desc:0 "Аквілейські біженці, які прибули на наші національні території після поразки їхньої першої революції, показали нам, що справа республіканців це наша справа, де б вона не була! Має бути чітко зрозуміло, що будь-яка республіка на будь-якому континенті - наш друг!"

  HEL_an_end_to_wood:0 "Викорінити бандитсько-анархістський ідеал"
  HEL_an_end_to_wood_desc:0 "Мерлок Вуд та його соціалістичні головорізи тероризували нашу країну двадцять років. Колись ми вважали його визволителем, але тепер бачимо небезпеку. Якщо ми дозволимо йому та його ідеології існувати далі, ми прийдемо до руїни. Задля блага Аделарта та наших інтересів Мерлок Вуд буде нейтралізований."

  HEL_the_social_democrats:0 "Експеримент у державотворенні"
  HEL_the_social_democrats_desc:0 "Хоча прибуток залишається основним мотивом Конара, зрозуміло, що з такої глухої країни можна витиснути лише обмежену кількість ресурсів. Поки дехто може презирливо вертіти дзьобом від ідеї витрачати гроші перед тим, як їх заробити, Конар усвідомлює потенціал повернення інвестицій тут, у Периферії."

  HEL_the_flowenan_group:0 "Повний контроль для де Конара"
  HEL_the_flowenan_group_desc:0 "Всупереч переконанням деяких осіб, республіка не позбавлена можливості користуватися перевагами авторитаризму. Хоча де Конар віддав би перевагу м'якому застосуванню своєї влади, абсолютно необхідно, щоб він залишався на вершині фігуральної купи. Зрештою, у бізнесі є принцип, що ціле грифонство визнає. А саме той хто має ідоли, той імпульс цьому світові дає."

  HEL_market_war_on_greifwald:0 "Розбити корону Ґрайфвальда"
  HEL_market_war_on_greifwald_desc:0 "Протягом століть Аделарт топтали імперські правителі, які ледве помічали існування нашого народу. Тепер, коли Мерлок Вуд і заплямована кров'ю посада "шерифа" залишилися в минулому, настав час усунути останній великий пережиток монархії в Периферії."

  HEL_the_aquilean_model:0 "Республіка Ґрайфвальд"
  HEL_the_aquilean_model_desc:0 "Коли ми зміцнюємо уряд нашої країни, ми можемо стояти на плечах гігантів! Хоча у світі є багато великих республік, ми подивимося за натхненням на південь, на наших культурних сусідів в Аквілеї!"

  HEL_polizei:0 "De Geheimdéngscht"
  HEL_polizei_desc:0 "Наші громадяни заслуговують на право мати місцеві сили безпеки, але на всіх наших територіях нам потрібна справедлива структура для забезпечення виконання законів країни, яка не обмежена межами округів. De Geheimdéngscht централізує наші розвідувальні активи та здійснюватиме законну юрисдикцію на всіх наших землях."

  HEL_welfare_for_the_people:0 "Мережа соціального захисту... Типу"
  HEL_welfare_for_the_people_desc:0 "Звичайний грифон має право на безпеку, процвітання та прагнення до щастя. Хоча ми не можемо гарантувати останнє, ми можемо гарантувати перші два пункти за допомогою комплексної програми добробуту, доступної для будь-якого громадянина, який цього потребує."

  HEL_real_healthcare:0 "Приватні медичні послуги"
  HEL_real_healthcare_desc:0 "Молитви та аптекарі можуть вилікувати застуду або магічні недуги, але вони не лікують хвороби, не видаляють пухлини та не дбають про пацієнтів із травмами. Ми повинні забезпечити право на ефективну охорону здоров'я з справжніми лікарнями та справжніми лікарями, за відповідну ціну."

  HEL_nurture_new_business:0 "Наша власна індустрія"
  HEL_nurture_new_business_desc:0 "Вільний ринок вільної території має бути регульованим, проте це також означає, що ми несемо відповідальність за підтримку нового бізнесу на наших землях. Надаючи гранти ключовим галузям промисловості, ми можемо підтримати нові підприємства, що виникають навколо них."

  HEL_a_haven_for_business:0 "Гавань для іноземного розвитку"
  HEL_a_haven_for_business_desc:0 "Наші опоненти, які раніше сиділи по лівий бік проходу, змальовували Аделарт як рай для працюючого грифона, але це не приносить прибутку. Те, що можна зробити, це зниження корпоративних податків та дерегуляція трудового законодавства. Завдяки цим реформам ми зробимо Аделарт мрією капіталіста!"

  HEL_a_powerful_executive:0 "Справжній президент"
  HEL_a_powerful_executive_desc:0 "Посада Спікера ніколи не була чимось більшим, ніж способом вшанувати батька нашої країни в особі Мерлока Вуда. Оскільки ми створюємо наш централізований уряд, нам потрібен Спікер, який зможе гарантувати його справедливість. Надання посаді нових виконавчих повноважень дозволить нам швидше реагувати на нові загрози ззовні та зсередини."

  HEL_abolish_the_congress:0 "Більше жодних конгресів"
  HEL_abolish_the_congress_desc:0 "Конгреси були розроблені, щоб дати народу голос, але цей голос перетворюється на пронизливий хор, керованим менталітетом натовпу. Представники, яких обирає народ, мінливі та залежні від бажання догодити тим, хто їх обрав. Вони нездатні бачити ширшу картину для нашої країни. Ми збережемо корисні активи конгресів і запровадимо нову палату."

  HEL_the_parliamentary_system:0 "Списати в Аквілеї"
  HEL_the_parliamentary_system_desc:0 "Ми розширимо наш законодавчий орган, щоб імітувати національні збори за аквілейською моделлю. Наші депутати забезпечать, щоб голоси їхніх виборців були почуті у справах держави!"

  HEL_a_real_university:0 "Аделартська меритократія"
  HEL_a_real_university_desc:0 "Маючи більший контроль над усіма активами нашого уряду, ми можемо запропонувати щедрі субсидії для залучення науковців до Аделарта. Оскільки найкращі та найяскравіші представники Грифонії приїжджають підтримати нас, буде лише правильним побудувати меритократичну структуру, гідну майбутніх лідерів Аделарта."

  HEL_a_secular_adelart:0 "Не більше ніж маріонетки"
  HEL_a_secular_adelart_desc:0 "Віра дає сили, але ми не можемо дозволити вірі мати владу. Корупція храмів, коли вони втручаються в управління державою, є очевидною, проте ми будемо захищати право кожного на віросповідання. Однак між храмами та державою буде чітке розмежування."

  HEL_remove_old_believer_broadcasts:0 "Заглушити їх повністю"
  HEL_remove_old_believer_broadcasts_desc:0 "Лука фун Ліссей та їхні Старовіри могли б бути корисними союзниками в боротьбі проти соціалістичної ідеології, але їхня схильність до непотрібної благодійності підбурює народ. Ми не можемо дозволити храмам мати великий вплив серед простого грифонства. Ми піддамо цензурі їхні передачі або змусимо їх замовкнути зовсім."

  HEL_a_new_banking_capital:0 "Правління Ідола"
  HEL_a_new_banking_capital_desc:0 "Шляхом ретельних економічних та політичних маніпуляцій ми створили капіталістичний рай, який конкурує з нашими друзями у Фловені і затьмарює навіть олігархів Федерації Скайфолл. Бо тільки в Аделарті всі грифони рівні перед ідолом!"

  HEL_a_free_and_modern_adelart:0 "Управління заради майбутнього"
  HEL_a_free_and_modern_adelart_desc:0 "Наші реформи вже приносять плоди. Майбутнє Аделарта це не тиранія чи анархія. Ми дивимося на неї зараз з урочистою гордістю, бо вона є країною, яка захищає, навчає та виховує свій народ. Ми не територія, не натовп лісових бандитів з ідеалами, а республіка вільних грифонів."

 #Purely Economic / Business Development Foci

  HEL_capitalism_in_adelart:0 "Справжня економіка для Республіки"
  HEL_capitalism_in_adelart_desc:0 "Ми є промисловим болотом, але маємо потенціал для значно більшого. Нам необхідно реалізувати наші можливості для промислової експансії та зростання, а це означає, що ми повинні рішуче та з відкритими обіймами прийняти цінності вільного ринку."

  HEL_sell_off_the_collectives:0 "Розпродаж колективів"
  HEL_sell_off_the_collectives_desc:0 "Єдина корисна річ, яку комуністи зробили для Аделарта, це консолідація всіх земель у колективи задля нас. Тепер, коли контроль у наших руках, ми можемо перепродати ці колективи їхнім колишнім власникам або їхнім конкурентам з отриманням солідного прибутку."

  HEL_send_out_the_invitations:0 "Запросити інвесторів"
  HEL_send_out_the_invitations_desc:0 "Контакти Жома Де Конара у Фловені дозволять нам вийти на потенційних інвесторів, які можуть з осторогою ставитися до репутації міста банкірів. Кілька обіцянок щодо доступу до нафтових родовищ Ліссея, кілька обіцянок назвати деякі установи на їхню честь та політика "жодних запитань" щодо походження грошей мають привабити багатьох заможних грифонів."

  HEL_friends_in_flowena:0 "[HELFlowenaFocusTitle]"
  HEL_friends_in_flowena_desc:0 "[HELFlowenaFocusDesc]"
  HEL_friends_in_flowena_title:0 "Подальші зв'язки з Фловеною"
  HEL_friends_with_flowena_desc:0 "Банки Фловени глибокі, а їхні скарбниці повні. Оскільки наші регіони розташовані близько один до одного, логічним кроком буде зближення і наших ділових інтересів. Завдяки кільком щедрим торговельним угодам та поступкам ми зможемо запустити кігті у ті двері, які раніше були для нас зачинені."
  HEL_no_friends_in_flowena_title:0 "Покласти край безумству у Фловені"
  HEL_no_friends_in_flowena_desc:0 "Повна неспроможність патриціїв тримати політичну систему Фловени на короткому повідку дорого їм коштувала. Тепер Фловена більше не надійний партнер, а активна загроза, з якою нам доведеться швидко розібратися."

  HEL_industrialize_the_sites:0 "Індустріалізація об'єктів"
  HEL_industrialize_the_sites_desc:0 "Ті нечисленні промислові об'єкти, що в нас є, потребують модернізації, перш ніж ми спробуємо їх розширювати. Ми маємо укласти кілька угод, щоб забезпечити постачання нових верстатів, вантажівок та залучити більш кваліфіковану робочу силу. Це може означати необхідність домовлятися з профспілками, але компроміс лежить у самому серці капіталізму."

  HEL_the_great_conard_bank:0 "Великий банк Конара"
  HEL_the_great_conard_bank_desc:0 "Наші зусилля із залучення інвесторів не залишилися непоміченими, і незабаром відбудеться відкриття Великого банку. Хоча позики з Фловени чи Скайфолла можуть вважатися якіснішими, очевидно, що наші безпринципні методи та терпимість до сумнівних інвесторів забезпечать вигідний ринок кредитування в Аделарті."

  HEL_research_stuff:0 "Школа комерції Яна Ройсена"
  HEL_research_stuff_desc:0 "Розумніша робоча сила генеруватиме розумніші ідеї. Який кращий спосіб прищепити славетні ідеї можливостей, вільної думки та економічного прогресу, ніж наша власна бізнес-школа! Ян Ройсен, колишній лідер бандитів Аделарта, що панував тут до нашого Мерлока Вуда, справді увійде в історію завдяки великій школі навчання, яка носитиме його ім'я!"

  HEL_jaume_oil_3:0 "Нафтові барони в уряді"
  HEL_jaume_oil_3_desc:0 "Якщо великі запаси нафти в Ліссеї та Іглтоні мають стати центром нашої нової економіки, то чому власники цих земель не можуть бути залучені до нашого нового уряду? Нові міністри мають бути призначені з-поміж правлінь наших нових корпорацій, щоб ми могли працювати кіготь до кігтя з такими цінними громадянами."

  HEL_jaume_oil_1:0 "Експлуатація наших нафтових запасів"
  HEL_jaume_oil_1_desc:0 "Її називають чорним золотом, і це дійсно золото, бо нафтові резерви Аделарта принесуть нашому уряду більше грошей, ніж будь-яка податкова політика. Однак, щоб експлуатувати нашу нафту, ми повинні захистити родовища та побудувати вишки й нафтопереробні заводи по всій країні. Така політика забезпечить роботою наших робітників і наповнить наші кишені."

  HEL_jaume_oil_2:0 "Велика торгівля нафтою"
  HEL_jaume_oil_2_desc:0 "Уся Грифонія благає про аделартську нафту, і ми їм відповімо!\nРозбудовуючи нашу інфраструктуру та встановлюючи нову торговельну політику, ми зможемо забезпечити пропозицію для голодних бюрократів і політиків Грифонії, що прагнуть використовувати ресурси Аделарта. Що більше нафти тектиме Грифонією, то більше грошей надходитиме до Аделарта."

  HEL_into_the_factories:0 "На заводи"
  HEL_into_the_factories_desc:0 "Не кожному грифону судилося бути солдатом, фермером чи священником. З розширенням заводів у міських районах ми розпочнемо кампанію із залучення фермерів та їхніх родин до міст для роботи на цих промислових об'єктах. Шляхом субсидування житла та координації з лідерами галузей ми зробимо переїзд дуже привабливим."

  HEL_chop_down_the_forests:0 "Вирубка лісів"
  HEL_chop_down_the_forests_desc:0 "В епоху сталі, заліза та нафти грифони часто забувають про важливість скромного дерева. Нам знадобиться додаткова деревина для нових будинків, паперових фабрик та інших галузей промисловості, що потребують величезної кількості лісу. Крім того, розчищення частини лісів звільнить місце для нових заводів та інфраструктури."

  HEL_new_taxes:0 "Податки, податки, податки"
  HEL_new_taxes_desc:0 "П'ятивідсотковий прибутковий податок для нашого найбіднішого грифона та нашого найбагатшого грифона - це дуже різні суми ідолів. Витискати кожного ідола з наших бідняків не має сенсу, тож комплексна податкова реформа, що змінюється залежно від річного доходу, стане справедливим шляхом уперед. Можливо, з боку наших найзаможніших громадян буде певне нарікання, але чесний податок кращий за чергове повстання соціалістів."

  HEL_literacy_for_all:0 "Відкриття професійно-технічних училищ"
  HEL_literacy_for_all_desc:0 "Разом із розширенням промисловості нам також знадобиться освічене населення, щоб зайняти посади, які неминуче з'являтимуться з часом. Інженери для створення нових машин, вчені для розробки нових ліків та банкіри, які придумають, як усе це продати. Саме з таким розрахунком ми продовжуємо інвестувати в нашу державну освіту, щоб найкращі та найрозумніші могли приносити прибуток у майбутньому."

  HEL_bring_adelart_into_the_modern_age:0 "Більше не глушина"
  HEL_bring_adelart_into_the_modern_age_desc:0 "Достатньо просто поглянути у вікно, щоб побачити плоди нашої праці. Автомобілі їдуть брукованими дорогами, а вуличні ліхтарі прорізають темряву. Гул промисловості чути цілодобово, нафтові поля Ліссея течуть чорним золотом, а банки переповнені ідолами. Ми увійшли в сучасну епоху), маючи всі засоби, щоб насолоджуватися нею."

 ### de Conard Unification ###

  HEL_oil_foreign_policy:0 "Третя Аквілейська Республіка"
  HEL_oil_foreign_policy_desc:0 "Тепер, коли друга республіка канула в історію, настав час новому грифонові очолити східну Грифонію. Це буде не монарх і не президент, а інвестор та голова правління. Вмираюче вугілля їхньої республіки буде роздмухане і знову яскраво запалає, хоч і з особливим економічним ухилом."

  HEL_oil_attack_greifwald:0 "Покласти край монархіям"
  HEL_oil_attack_greifwald_desc:0 "Попри наші приховані наміри щодо цього республіканського проєкту, важливо зберігати певну видимість ідеологічної послідовності заради нашої національної легітимності. Пережитки старих порядків мають зникнути, навіть якщо це означатиме переорієнтацію нашої поточної торговельної політики, щоб не допустити збитків."

  HEL_drive_out_the_bandits:0 "Танки крізь ліси"
  HEL_drive_out_the_bandits_desc:0 "Чесно кажучи, ніхто не знає, що коїться в Ґрайфвальді. Ми мали з ними справу і переконалися, що ми є головною владою в регіоні, навіть запозичили їхню назву на деякий час; проте зрештою дуже мало створінь справді інвестували туди та навели там лад. Настав час очистити ці ліси назавжди."

  HEL_oil_oil_and_more_oil:0 "Нафта, нафта і ще більше нафти!"
  HEL_oil_oil_and_more_oil_desc:0 "Чудова річ у нафті полягає в тому, що вона потрібна кожному, і саме ми можемо її дати; звісно за певну ціну. Оскільки де Конар уже глибоко запустив свої кігті у нафтохімічну промисловість, буде цілком доречно, якщо він розширить свої операції настільки, наскільки це можливо. Хто ж не любить гарну монополію?"

  HEL_open_up_the_markets:0 "Через ринки до можливостей"
  HEL_open_up_the_markets_desc:0 "Теоретично кожен може піднятися соціальними сходами в нашій державі. Відповідно до цього ідеалу, зростаюча економічна меритократія, що заохочує інноваційне мислення та складні рішення, відсіє будь-які випадки кумівства чи загального ідіотизму. Як і в економіці, так має бути і в усьому Аквілейському суспільстві."

  HEL_the_preemptive_strike:0 "Превентивний удар"
  HEL_the_preemptive_strike_desc:0 "Помоварра - це все те, чим ми себе називаємо, але чим не є насправді. Їхня соціал-демократія є загрозою для нашого фасаду, хоч би якою щільною була завіса, яку ми використовуємо. З ними доведеться розібратися. Ринкові конкуренти це одне, але ідеологічна загроза, що підриває легітимність наших інституцій? Що ж, це просто неприпустимо."

  HEL_full_alliance_with_flowena:0 "Pacte Économique du Griffonia Central"
  HEL_full_alliance_with_flowena_desc:0 "Хоча міжнародні економічні угоди рідко сягають масштабів військової співпраці, існують ситуації, коли фінансові інтереси збігаються із оборонними. Для нас співпраця, як військова, так і економічна, означає більше капіталу для верхівки; тож чому б не завести друзів? Зрештою гроші роблять партнерів дуже близькими."

  HEL_a_republic_in_avian:0 "Республіка в Авіані"
  HEL_a_republic_in_avian_desc:0 "Подібно до Периферії, Авіан є осередком насильства і, якщо бути відвертим, економічною чорною дірою в усіх відношеннях. Регіон може бути дещо розвиненішим, ніж колись був Аделарт, але він не менш хаотичний. Республіка, вірна своєму моральному обов'язку забезпечувати мир і стабільність, зробить значну військову інвестицію в цей регіон."

  HEL_FLO_faction:0 "Центральногрифонський економічний пакт"

  HEL_crush_our_competitors:0 "Поставити конкурентів на місце"
  HEL_crush_our_competitors_desc:0 "Скайфолл є домівкою для найгірших представників нашого роду. Вони можуть бути економічно процвітаючими та політично підкованими, але вони не роблять із цього таємниці. Вони не лише загрожують нашому фінансовому існуванню, а й їхній відкритий підхід до управління державою змусив багатьох грифонів поставити під сумнів наші фінанси та особисті статки де Конара. Їхній кінець близький."

  HEL_drink_to_the_fall_of_the_trade_princes:0 "Тост за нових грифонів у місті"
  HEL_drink_to_the_fall_of_the_trade_princes_desc:0 "Є небагато речей, які варто святкувати надмірно дорогою вечерею, але ми справді зробили щось особливе, чи не так? З глухої держави в хаотичній частині Грифонії ми перетворилися на найквітучішу, та найприбутковішу, країну на континенті. Ми заслужили на дещицю самовдоволення, чи не так?"

  HEL_integrate_greifwalder_institutions:0 "Загальноаквілейський парламент"
  HEL_integrate_greifwalder_institutions_desc:0 "Парламенти зазвичай відповідають за законотворчість і загальне повсякденне ведення державних справ, і наш не буде винятком. Завдяки лобіюванню, невеликим маніпуляціям у ЗМІ та ретельному вкрапленню фальшивої гіперпартійності, не знайдеться кращого місця для амбітних підприємців, щоб розпочати свою справу."

  HEL_align_republic:0 "Справжня Аквілейська Республіка"
  HEL_align_republic_desc:0 "Попередні спроби республіканської революції були зіпсовані та врешті повністю зупинені через їхні агресивні антимонархічні тенденції. Хоча ми визнаємо ідеологічні переконання минулого, у сучасні часи набагато важливіше підтримувати дружні відносини з усіма державами, які готові до діалогу. Війна коштує дорого і вона небезпечна, ми не хочемо ризикувати нічим із цього."

 #SECRET-ish PATH - the SHERIFF#

  HEL_the_sheriffs_adelart:0 "Де ми зупинилися"
  HEL_the_sheriffs_adelart_desc:0 "Протягом двох десятиліть Аделарт животів у кігтях бандитів та зрадників, але цьому настав край. Старий порядок панує знову, і він не має вух для ворогів шерифа; нагадаймо місцевим, що стається з тими, хто протистоїть Ґрайфвальду та його першочерговим інтересам."

  HEL_resume_the_anti_banditry_campaign:0 "Відновлення розправ"
  HEL_resume_the_anti_banditry_campaign_desc:0 "Те, що шериф знову перебрав контроль над Аделартом, не було сприйнято місцевими легковажно, і багато хто чинить опір його законному правлінню. Ці дурні не усвідомлюють, що їхня відсіч дає нам можливість поставити їх на місце. Ми не заспокоїмося, доки кожен зрадник не буде схоплений або вбитий, без жодних винятків."

  HEL_anarchists_are_bandits:0 "Анархісти - це бандити"
  HEL_anarchists_are_bandits_desc:0 "Анархісти - такі вони і є, вороги порядку та прогресу. Вони не лише допомагали повалити шерифа у 987 році, а й об'єдналися з Вудом та фундаментально небезпечною ідеологією. Вони не більше ніж ворог, якого треба розчавити, і ці бандити будуть розчавлені."

  HEL_liberals_are_bandits:0 "Ліберали - це бандити"
  HEL_liberals_are_bandits_desc:0 "Де Конар та конфедералісти, хоч і не союзники, заслуговують на осуд з подібних причин. Обидва зневажають ідею монархії, обидва прагнуть грошей понад усе і обидва спричинять передчасну загибель Аделарта, якщо їх залишити без нагляду ще на деякий час. На них теж полюватимуть, як на бандитську погань, над якою вони намагаються себе ставити."

  HEL_old_believers_are_bandits:0 "Старовіри - це бандити"
  HEL_old_believers_are_bandits_desc:0 "Старовіри - це не що інше, як культ і образа як для шерифа, так і для основних догматів тритеїзму. Ейр хоч і богиня, але Борей - перший серед них; які безсоромні розпусники наважилися б стверджувати зворотне? Якщо вони так прагнуть відмовитися від справжніх вчень богів, то ми відправимо цих бандитів до них негайно."

  HEL_none_of_you_are_free_from_banditry:0 "Ніхто з вас не вільний від бандитизму"
  HEL_none_of_you_are_free_from_banditry_desc:0 "Частина проблеми бандитизму криється в самому населенні. Подобається це їм чи ні, вони дозволили повстанню проти шерифа перемогти у 987 році або через бездіяльність, або через пряму підтримку бандитів. Це робить їх не кращими за Вуда та його мерзенних поплічників. Ми показово покараємо тих, хто намагається переховувати зрадників, і тоді настане мир."

  HEL_rally_the_monarchists:0 "Згуртувати діаспору"
  HEL_rally_the_monarchists_desc:0 "Попри їхні заяви про боротьбу за благо Аделарта, захоплення влади бандитами змусило багатьох адміністраторів та справді стурбованих громадян Аделарта втекти до Ґрайфвальда. Хоча вони не сподівалися повернутися, можливість відновити життя, яке вони вважали втраченим, є дуже переконливою для багатьох. Підготуймо місце за столом для наших старих союзників."

  HEL_invite_the_count:0 "Запросити графа"
  HEL_invite_the_count_desc:0 "Посада шерифа нижча за графську і, оскільки це наш обов'язок, граф очолить нашу державу з усією своєю мудрістю. Звісно, це нічого не говорить про те, наскільки він зможе контролювати політику. Ми не забули про відсутність допомоги з боку Ґрайфвальдців та графа, тому його статус буде відновлено лише номінально; як і належить тому, хто підвів своїх підданих."

  HEL_avenge_the_count:0 "Помститися за графа"
  HEL_avenge_the_count_desc:0 "Попри численні невдачі, особливо щодо революції 987 року та браку ресурсів для її запобігання, граф все ж був нашим лідером. Бандити, злодії та анархісти відібрали його у нас, так само як і Аделарт. Ми помстимося за безсердечне вбивство графа і показово покараємо грифонів, які наважуються протистояти шерифу."

  HEL_hire_monarchist_mercenaries:0 "Стійкі прихильники Ґрайфвальда"
  HEL_hire_monarchist_mercenaries_desc:0 "Подібно до адміністраторів з Ґрайфвальда, які були тут раніше, існує багато офіцерів та елітних підрозділів, які були витіснені з провінції, коли революція Вуда, на жаль, перемогла. Настав час їм повернутися, щоб виконати свої обітниці перед графом та шерифом і відвоювати Аделарт з лап дегенеративного бандитизму."

  HEL_war_of_liberation:0 "Більше ніяких бандитів у Ґрайфвальді!"
  HEL_war_of_liberation_desc:0 "Ах... Солодка перемога. Це зайняло два, майже три десятиліття, але бандити та їхні згубні прихильники нарешті вирвані з коренем і знищені; вони більше ніколи не опоганять нашу зразкову провінцію. Мир, стабільність та верховенство права по-справжньому повернулися до Периферії; хоч і певною ціною."

  HEL_reopen_our_economy:0 "Наші ресурси для світу"
  HEL_reopen_our_economy_desc:0 "Хоча за кордоном є багато тих, хто бажав би повернення Аделарта до бандитизму, ми не повинні закриватися. Є ті, хто просто хоче купити те, що ми видобуваємо із землі, то чому б їм це не продати? Зрештою, ідол імпульс цьому світові дає."

  HEL_our_resources_for_ourselves:0 "Наші ресурси для нас самих"
  HEL_our_resources_for_ourselves_desc:0 "Наші землі можуть бути багатими, але вони залишаються відносно недоторканими через погане управління, вірування та страх. Коли Шериф знову при владі, ми маємо розпочати використання багатих ділянок землі, які ми так довго залишали без уваги."

  HEL_profits_from_the_churches:0 "Статки у чорному золоті"
  HEL_profits_from_the_churches_desc:0 "Те, чого Ґрайфвальду бракує у стабільності, друзях та ідолах, він з лишком компенсує величезною кількістю нафти. Щоб забезпечити наше подальше виживання, нам потрібно видобувати якомога більше з наших родовищ і досліджувати способи синтетичного виробництва нафти, щоб значно розширити виробництво для наших клієнтів."

  HEL_a_capitalist_education:0 "Навчити чернь їхнього місця"
  HEL_a_capitalist_education_desc:0 "Якщо і можна чогось навчитися з витівок Мерлока, то це того, що масам легко продати дріб'язкові ідеали та фальшиві обіцянки. Тепер, коли багато хто з тих, хто міг би "скаржитися", зникли зі сцени, ми маємо ідеальну можливість почати прищеплювати решті правильні ідеї лояльності, віри та продуктивності."

  HEL_urbanize_the_backwaters:0 "Принести цивілізацію селянам"
  HEL_urbanize_the_backwaters_desc:0 "Неможливо заперечувати вражаючі успіхи тих, хто нас оточує; їхні міста розбудовані зусиллями тисяч, а їхні мешканці рухаються достатньо ефективно, щоб довести це. Ми повинні докласти зусиль, щоб імітувати деякі з їхніх корисніших досягнень для наших власних мас, доки ми можемо робити це у Ґрайфвальдський спосіб..."

  HEL_scientific_development:0 "Ґрайфвальдські вчені, аделартські системи"
  HEL_scientific_development_desc:0 "Багато хто в Ґрайфвальді виявляв щирий інтерес до наукового розвитку, але не міг випробувати свої ідеї через обмежувальні системи. З більш експериментальною моделлю, разом із дозволом шерифа, вони можуть принести нам велику користь."

  HEL_the_loyalist:0 "Новий феодалізм"
  HEL_the_loyalist_desc:0 "Грифонія занадто далеко відійшла від своїх основних принципів. Колись існував природний порядок, який ця нова ера республіканізму та соціалізму так очевидно порушила. Ми будемо прагнути знову досягти цього природного порядку, цураючись розкоші сьогодення та повертаючись до того, якою має бути Грифонія."

  HEL_oaths_of_loyalty:0 "Захоплення комун"
  HEL_oaths_of_loyalty_desc:0 "Як мило з боку комуністів було зібрати життєво важливу промисловість і грифонів для спільного керування нею задля нас, перш ніж ми встигли з ними розібратися. Я впевнений, що вони не будуть проти того, щоб ми "перепрофілювали" їх для майбутнього використання, враховуючи, що скарги від них більше не надходять..."

  HEL_appoint_new_nobility:0 "Нагородити стару аристократію"
  HEL_appoint_new_nobility_desc:0 "Є ті, хто попри всі негаразди залишався стійким в Аделарті протягом хаосу останніх двох десятиліть. Така наполегливість заслуговує на аплодисменти та винагороду у вигляді місця в нашому новому уряді, щоб допомогти запобігти повторенню такої анархії."

  HEL_focus_on_urbanization:0 "Прорубати просіку крізь зелені діброви"
  HEL_focus_on_urbanization_desc:0 "Хоча наші ліси прекрасні, вони не принесли нам нічого, крім проблем: від перешкоджання індустріалізації до надання прихистку бандитам. Якщо Ґрайфвальд хоче жити далі, він повинен робити це з набагато меншою кількістю лісів і набагато більшою кількістю заводів, щоб сприяти нашому зростанню та прогресу."

  HEL_hike_the_taxes:0 "Озброїти податківців"
  HEL_hike_the_taxes_desc:0 "Очікувати, що населення мирно зрозуміє наші вимоги - це марна справа, і цей урок ми засвоювали занадто багато разів. Найкраща мова, яку вони знають це сила, тому ми повинні вміти нею говорити, коли вони почнуть нити. Озброєння наших податківців буде простим способом гарантувати виконання наших вимог."

  HEL_consolidate_the_land:0 "Обережний "перерозподіл""
  HEL_consolidate_the_land_desc:0 "Ті, хто керував нашою обмеженою промисловістю та інфраструктурою до цього часу, були оцінені та визнані невідповідними. Надіславши кілька погроз і переконавши їх "добровільно" віддати свої землі шерифу, ми отримаємо набагато більше контролю над тим, що і де ми виробляємо, оскільки тепер за справу взялися правильні грифони."

  HEL_economic_rebirth:0 "Змащування шестерень шерифства"
  HEL_economic_rebirth_desc:0 "З появою нових винаходів нафта стала поступатися лише ідолам у розпалюванні жадібності по всій Грифонії. На щастя, ми виявили, що нафтові родовища, які ми вважали помірними, виявилися набагато більшими, ніж передбачалося спочатку. За допомогою декількох угод та сучасного обладнання ми можемо почати продавати надлишки повсюди."

  HEL_blood_sweat_and_results:0 "Кріпацтво одинадцятого століття"
  HEL_blood_sweat_and_results_desc:0 "Нарешті наші зусилля принесли плоди. Нам вдалося досягти набагато більшого, ніж просто повернути час назад; я наважуся сказати, що ми навіть перевершили те, чого могли досягти імперії минулого зі своїми кріпаками в плані ефективності. Це ідеальний синтез старого та нового: наші трудяги гнуть спини, наші міста сяють чистотою, а наші заводи випускають більше продукції, ніж ми могли мріяти!"

  HEL_vengeance_for_the_fallen:0 "Викорінити дух розбійництва"
  HEL_vengeance_for_the_fallen_desc:0 "Аделарт ніколи більше не повинен пасти під владу бандитизму. Розповіді про жахи та насильство останніх двох десятиліть повинні поширюватися і повторюватися достатньо часто, щоб сама ідея бандитської республіки викликала страх і глузування. Дозволити таким розповідям згаснути означало б зруйнувати будь-який шанс на мир, якого ми могли б колись досягти."

  HEL_new_model_army:0 "Армія нового зразка шерифа"
  HEL_new_model_army_desc:0 "Неефективність аделартської системи ополчення була доведена дуже жорстко, оскільки відсутність лояльності з боку її лідерів і навичок у військ безпосередньо призвела до останніх двох десятиліть потрясінь. Щоб виправити це, шериф особисто наказав створити регулярну армію на заміну ополченню."

  HEL_slaughter_the_mercenaries:0 "Вигнати найманців"
  HEL_slaughter_the_mercenaries_desc:0 "Існування найманців у Ґрайфвальді створює складну дилему; якщо ми купуємо їхні послуги, ми підтримуємо бандитів у межах власних кордонів, але якщо ми цураємося їх, вони можуть надавати послуги дисидентам проти нас. Вирішення такої проблеми набагато простіше за обидва варіанти: залишити корисних, а решту цих проклятих Бореєм п'явок вигнати геть від нас."

  HEL_repaint_the_tractors:0 "Конфіскувати трактори"
  HEL_repaint_the_tractors_desc:0 "Попри їхній саморобний вигляд, "тракторні танки" Сестер Ейр були докучливо ефективними. Оскільки їхні колишні користувачі недієздатні, ніхто не скаржитиметься, якщо ми просто заберемо результати їхньої праці собі."

  HEL_the_sheriffs_cohorts:0 "Сини шерифа Ноттманя"
  HEL_the_sheriffs_cohorts_desc:0 ""Шерифе, ось ми!\nПеред тобою, Ґрайфвальду рятівником,\nМи клянемося, ми - твої сини,\nСлужити і твоїми стопами йти!"\n\n- Уривок з офіційного гімну Когорти."

  HEL_persecute_the_work_shy:0 "Timide au Travail"
  HEL_persecute_the_work_shy_desc:0 "Якщо хтось не працює, він не заслуговує на життя. Сучасний аделартянин прийняв обжерливість та вседозволеність, ніжачись у злиднях та блаженному занепаді, знаючи, що їхні бандитські володарі ніколи б по-справжньому не обклали їх податками, роботою чи призовом. Ми, проте, не будемо такими милосердними. Закривати очі на таку асоціальну поведінку та ухилення від праці означає підривати саму структуру держави та шерифства."

  HEL_sheriffs_goons_in_the_police:0 "Service d'ordre Shrievale"
  HEL_sheriffs_goons_in_the_police_desc:0 "Аквілейці мають слушну ідею зі своєю жандармерією, що дозволяє їм збирати інформацію та підтримувати спокій у небезпечних районах. Ми могли б самі скористатися цією ідеєю, хоча нам знадобляться грифи всередині організації, лояльні насамперед шерифу, щоб забезпечити порядок всередині та ззовні."

  HEL_the_sheriffs_state:0 "Царство шерифа"
  HEL_the_sheriffs_state_desc:0 "Мир. Безпека. Контроль.\n\nЯ нарешті досяг усього цього для МОЄЇ країни. Бандити нарешті притихли, колись бунтівні міста тепер майорять моїми прапорами, а справжня армія, лояльна до краю, крокує вулицями замість обірваних самовпевнених ополченців, що були раніше. Наразі цього достатньо."

  HEL_queen_of_adelart:0 "L'Ancienne Dynastie"
  HEL_queen_of_adelart_desc:0 "Дискрети не настільки сліпі, щоб назавжди відвернутися від Периферії. Вони прийдуть рано чи пізно, тому краще бути в них на доброму рахунку, коли прийде час. Надіславши запит на радників зараз, ми зможемо трохи стримати їх, змусити думати, ніби вони користуються нами, і скористатися перевагами аквілейської тактики."

  HEL_aquileian_industrial_aid:0 "Банкіри Прідеї"
  HEL_aquileian_industrial_aid_desc:0 "Після нашої попередньої сутички з Дискретами ми отримали кілька листів із пропозиціями від Прідеї, що стосувалися переважно інвестицій у нашу нафтову та вітчизняну промисловість. Враховуючи наш досвід у подібних угодах і сильнішу позицію, ніж під час минулої пропозиції, шериф погодився допустити інвестиції Прідеї за умови постійного нагляду всередині країни."

  HEL_restore_archonate_infrastructure:0 "Божественне право шерифів"
  HEL_restore_archonate_infrastructure_desc:0 "Із поверненням шерифа повертається і справжня віра. Щоб підтримати Ґрайфвальд як у військовому, так і в релігійному плані, ми маємо звернутися за допомогою до Тріархії в Грифенгаймі. Найкращі воїни Арктурія навчать наших священників та солдатів своїм методам війни та праведності."

  HEL_griffonian_industrial_aid:0 "Промисловці Фетизії"
  HEL_griffonian_industrial_aid_desc:0 "Наші північні сусіди останніми роками показали себе чудовими промисловцями, хоча з огляду на їхні нещодавні кризи стає зрозуміло, що деякі з їхніх найвизначніших компаній прагнуть перестрахуватися деінде. Запропонувавши цим компаніям кілька дуже вигідних угод, ми зможемо отримати їхню допомогу для розширення нашої індустрії."

  HEL_the_aquileian_demon:0 "Диявол в Аквілі"
  HEL_the_aquileian_demon_desc:0 "Останніми роками те керівництво, що залишилося в Аквілі, нажило собі безліч активних ворогів, більшість із яких готові зі зброєю в руках виступити проти них. Якщо ми запропонуємо їм місце в наших лавах, то зможемо поповнити армію та забезпечити собі цінну й лояльну базу солдатів."

  HEL_abolish_the_adelartian_language:0 "Розвіяти вигадку про "Аделарт""
  HEL_abolish_the_adelartian_language_desc:0 "Ідея про те, що Аделарт має власну культуру, є сміховинною. Аделарт був і завжди буде спочатку Ґрайфвальдським, а потім аквілейським, саме в такому порядку. Будь-яка книга, надрукована так званою "аделартською" мовою, має бути спалена, а вживання цього діалекту, як формальне, так і неформальне, буде суворо придушуватися..."

  HEL_full_control_to_the_sheriff:0 "Мерзенний, брутальний та короткий"
  HEL_full_control_to_the_sheriff_desc:0 "Звичайний грифон повинен знати своє місце в природному порядку речей: підпорядковуватися владі, встановленій волею графа, шерифа та Архонтату. Без такого природного порядку грифони приречені відмовитися від власної спадщини та віри на користь бандитських республік, які ми бачили на півночі та в Аделарті. Шляхетні структури вже протрималися тисячоліття, то чому б їм не протриматися ще одне?"

  HEL_leviathan:0 "Левіафан"
  HEL_leviathan_desc:0 "З огляду на нещодавнє зміцнення контролю, Гоббл запропонував розширити повноваження Служби. Дозволивши їм допомагати у внутрішніх справах, ми забезпечимо охорону державних об'єктів, а також зможемо наглядати за кожним грифоном всередині, який може просто маскувати свою жадібність."

  HEL_the_service_on_the_streets:0 "Служба на вулицях"
  HEL_the_service_on_the_streets_desc:0 "Революція та повстання це насіння, посіяне самозаспокоєнням і жадібністю. Ми прагнули запобігти останньому, проте будь-які стратегії працюють лише доти, доки їх не навчилися обходити. Ми повинні змусити Службу документувати кожного грифона в найменш покірних районах, щоб відстежувати їхні пересування та заважати їм підривати нашого процвітання."

  HEL_the_service_in_the_walls:0 "Служба в стінах"
  HEL_the_service_in_the_walls_desc:0 "Технології Грифонії крокують уперед незалежно від бажань її народів. Якщо ми хочемо забезпечити нашу подальшу стабільність, то мусимо підкоритися часу і використовувати ці нові технології собі на користь, а не просто цуратися їх."

  HEL_the_service_at_the_door:0 "Служба біля дверей"
  HEL_the_service_at_the_door_desc:0 "Технології Грифонії крокують уперед, але методи їх використання залишаються незмінними. Придушення та зникнення це меч і щит будь-якої держави, якими треба володіти, щоб вижити. Перш ніж бавитися із зайвими ідеями, ми маємо спершу опанувати класику та вдосконалювати її в процесі."

  HEL_the_service_anywhere_boreas_is:0 "Де Борей, там і Служба"
  HEL_the_service_anywhere_boreas_is_desc:0 "Ми повинні розуміти, що боротьба йде ні з чим іншим, як із нашою власною природою, і така важка битва вимагає переходу певних меж. Ми маємо порушити будь-яку видимість нейтралітету церков у межах наших кордонів, інакше вони просто стануть притулком для дисидентів. Потрібно вербувати священників, встановлювати пристрої для прослуховування і бути готовими спалити будь-які докази нашої єресі."

  HEL_the_state_of_nature_is_banditry:0 "Природа грифонів - бандитизм..."
  HEL_the_state_of_nature_is_banditry_desc:0 "Хоча бандитизм уособлює дегенерацію грифонського роду і є чимось огидним, він, на жаль, є частиною нас. Без способу вираження цієї ключової риси ми зрештою почнемо пригнічувати власні почуття і зруйнуємо велич, за яку так важко боролися. Одним із рішень є спрямування цих почуттів у корисніші сфери, наприклад використання нашої жадібності для видобутку більшої кількості коштовного каміння та викрадення припасів у наших ворогів."

  HEL_and_such_banditry_wills_a_sovereign:0 "...і така природа потребує суверена"
  HEL_and_such_banditry_wills_a_sovereign_desc:0 "Якщо останні десятиліття щось і довели, так це те, що Жана де Ноттманя не варто недооцінювати. Його історія довша за назви країн і значно багатша на події! Його становище зміцнилося достатньо, щоб він міг нарешті насолодитися своїми успіхами та винести уроки з невдач, що є рідкісною можливістю для будь-якого грифона."

  HEL_ban_the_free_newspapers:0 "Розбити друкарські верстати"
  HEL_ban_the_free_newspapers_desc:0 "Пхе! Яку тільки брехню та дурню ці доморощені бандити вивергають про нас за своїми нікчемними принтерами. Очевидно, вони не наважуються протистояти нам відкрито, тому ми маємо змусити їх зробити це на наших умовах. Тоді ми й побачимо, чого варті їхні колючі слова проти пороху та сталі."

  HEL_root_out_the_remaining:0 "Спалити ратуші"
  HEL_root_out_the_remaining_desc:0 "Ми все ще недостатньо очищені.\n\nМи ніколи не матимемо миру, доки в наших кордонах існує бодай натяк на бандитизм. Залишки бандитів, здається, зосередилися в містечках навколо Вілістелу, тож настав час оточити їх і нарешті вичавити життя з самої ідеї бандитизму!"

  HEL_burn_the_town_halls:0 "Побудувати владу з попелу"
  HEL_burn_the_town_halls_desc:0 "Запах попелу та сцени обвугленого дерева і руїн - це все, що залишилося навколо ратуш Аделарта, колишніх величних символів його свавільної бандитської конфедерації. На їхньому попелі ми побудуємо новий Аделарт, централізований навколо його суверена та його шерифа, що стане втіленням доброго врядування та безпеки понад усе."

 ## SHERIFF EXPANSION ##

  HEL_sheriff_kill_pom:0 "Кінець помоваррського експерименту"
  HEL_sheriff_kill_pom_desc:0 "Протягом двох десятиліть ми були змушені спостерігати за цією помоваррською мерзотою у нас під боком. Їхня система - це суцільна млявість та фальшиві обіцянки. Дозволити їй існувати й надалі означало б знову роздмухати полум’я бандитизму та зради, яке ми так довго гасили."

  HEL_sheriff_kill_flo:0 "Скасувати статус вільного міста Фловени"
  HEL_sheriff_kill_flo_desc:0 "Фловена.\n\nМерзенний осередок жадібності та обжерливості. Їхня причетність до справ бандитів не забута і не прощена. Вони бачили в нашому становищі не більше ніж шанс для наживи та завоювань, то хіба ми не маємо права відплатити їм тим самим?"

  HEL_sheriff_kill_avi:0 "Опора на сході"
  HEL_sheriff_kill_avi_desc:0 "Ах, Веренія: земля настільки ж пишна, наскільки й застійна. Порівняно з іншими державами навколо нас, буде відносно просто утвердитися в цьому регіоні, щоб використовувати тутешні ресурси для власних потреб."

  HEL_sheriff_integrate_periphery:0 "Периферія приборкана"
  HEL_sheriff_integrate_periphery_desc:0 "Убезпечивши наші нові землі, ми маємо розпочати спроби їхньої офіційної інтеграції. Хоча зараз вони можуть скаржитися, з часом наші нові громадяни навчаться бути Ґрайфвальдцями, а не представниками тієї відсталої культури, до якої вони належали раніше."

  HEL_sheriff_of_aquileia:0 "Ноттмань, верховний шериф Аквілеї"
  HEL_sheriff_of_aquileia_desc:0 "Вулиці Аквіли пофарбовані в червоний, і корона Аквілеї чекає на мене. Після десятиліть порпання у дрібних чварах із бандитами та дворянами я нарешті на своєму законному місці. Попереду ще багато роботи, але я насолоджуватимуся цією славою, поки можу."

  HEL_mop_up_aquileia:0 "Зачистка карти Аквілії"
  HEL_mop_up_aquileia_desc:0 "Тьху. Дискрети не змогли впоратися навіть із кількома зухвалими васалами, а тепер ми маємо вислуховувати їхні нескінченні скарги.\n\nЯ не бажаю терпіти цих жадібних словоблудів ні хвилини більше. Готуйте армію!"

  HEL_rebuilding_a_navy:0 "Будівництво флоту з нуля"
  HEL_rebuilding_a_navy_desc:0 "Наше нещодавно здобуте узбережжя лежить величезним і беззахисним, його патрулюють лише захоплені кораблі та найпростіші ремонтні майстерні. Якщо ми хочемо захистити наші береги і гарантувати, що вороги ніколи не зможуть сховатися за безкраїми морями, ми повинні зосередити зусилля на створенні флоту, що зможе суперничати з будь-яким супротивником!"
  HEL_newer_model_army:0 "Наша новітня армія"
  HEL_newer_model_army_desc:0 ""Шерифе, ось ми!\nПовернув нам надію ти,\nІ відродиться Грифонія,\nШерифе, шерифе, ось ми!"\n\n- Уривок з офіційного гімну Когорти."

  HEL_fabricate_the_claims:0 "Древні претензії Клодетів"
  HEL_fabricate_the_claims_desc:0 "Дискрети століттями видавали себе за володарів Аквілеї, нескінченно борючись проти Герцланду за власне виживання. Принаймні вони хотіли, щоб ми так думали. Однак це легко піддати сумніву, якщо просто поглянути на факти. Десятиліття розпусних експериментів залишили справжніх господарів Аквілеї, давній і славетний рід Клодетів, лише приміткою у їхній історії..."

  HEL_the_cloudetian_code:0 "Очищення від розпусти Дискретів"
  HEL_the_cloudetian_code_desc:0 "Грифони минулого мали багато такого, чому можна позаздрити. Вони жили в гармонії з природою, їхні будівлі могли сягати самих богів, і їм не потрібен був ідол, щоб об’єднатися під спільним прапором. Сучасному грифону вкрай бракує цих рис, але за допомогою певних будівельних проєктів цю розпусну деградацію можна виправити."

  HEL_the_tarrin_conundrum:0 "Таррінська головоломка"
  HEL_the_tarrin_conundrum_desc:0 "Однією з багатьох плям на честі фальшивого дому Дискретів є їхня неспроможність належним чином подбати про свої східні провінції. Замість цього вони просто покинули їх на поталу фальшивому претенденту через звичайну погрозу! Така пляма не може залишатися на нас, інакше ми падемо жертвою тієї ж жадібності, що погубила Дискретів..."

  HEL_a_foothold_in_the_south:0 "Кінець суперечці про право первородства"
  HEL_a_foothold_in_the_south_desc:0 "Обидва вцілілі доми Веренії все ще сперечаються, шматуючи власне царство заради своєї жадібності навіть перед обличчям зовнішньої загрози. Усунення обох претендентів на Веренію було б актом милосердя, інакше країна може просто остаточно розвалитися."

  HEL_a_foothold_in_skyfall:0 "Захоплення портів Скайфолла"
  HEL_a_foothold_in_skyfall_desc:0 "Що менше сказано про роль Скайфолла в деградації грифонського роду та наших предківських звичаїв, то краще. Ця країна є втіленням сучасного республіканізму та пост-ідольної розпусності, що несе в собі підґрунтя беззаконня. На щастя, Жан де Ноттмань уже напоготові, аби відновити порядок."

  HEL_woe_to_the_false_emperor:0 "Так буде з безідольними"
  HEL_woe_to_the_false_emperor_desc:0 "Шлях до Грифенгайма вільний і відкритий, він викладений майбутніми тілами тих, хто присягнувся підтримувати фальшиві ідеали та захищати власні інтереси. Наші армії готові, і наш шанс настав.\n\nПринесіть мені мій трон."

### Ideas ###
 # Decentralization Level Ideas #
 HEL_free_toilers_of_adelart:0 "Вільні трудящі Аделарту"
 HEL_free_toilers_of_adelart_desc:0 "Національний уряд навмисно слабкий і служить лише для об’єднання анархічних рад. Жоден грифон не є жертвою панування і кожен є господарем своєї долі. Проте встановлення національного законодавства майже неможливе і вимагає згоди ледь не кожного окремого міста та ради."

 HEL_fanatic_decentralization:0 "Голос кожному містечку"
 HEL_fanatic_decentralization_desc:0 "Звичаї та вірування кожного міста представлені власним унікальним зводом законів. Переконати кожне місто дотримуватися загальнодержавного указу важко, але край залишається стабільним, а населення відчуває себе представленим."

 HEL_moderate_decentralization:0 "Молодий центральний уряд"
 HEL_moderate_decentralization_desc:0 "Демократичні права кожного міста зберігаються, поки починає зароджуватися центральний уряд, що забезпечує необхідну безпеку та впроваджує стандартизований кодекс законів."

 HEL_decentralized_confederation:0 "Ідеальний синтез"
 HEL_decentralized_confederation_desc:0 "Ми вдосконалили конфедеративну систему, зберігши сильну місцеву демократію, зосереджену на громадянах кожного містечка та їхніх турботах, водночас маючи функціональну федеральну адміністрацію, що об’єднує розрізнені кантони під єдиним зводом законів. Ми забезпечили собі справедливий уряд, який захистить усіх грифонів під нашою юрисдикцією від тиранії, де б вона нам не загрожувала. Хай живе Конфедерація!"

 HEL_neither_decentralization_nor_centralization:0 "Справжня республіка"
 HEL_neither_decentralization_nor_centralization_desc:0 "Федеральний закон повністю виконується через потужний національний судовий орган, а окремі грифони голосують за місцевих представників та президента держави. Аделарт нарешті об’єднаний навколо країни, яка піклується про своє населення."

 HEL_state_of_siege:0 "Облоговий стан"
 HEL_state_of_siege_desc:0 "Кожен грифон в Аделарті є господарем власного виробництва і більше не є рабом лорда, менеджера чи шерифа. Однак, щоб зберегти ці свободи, ми зобов’язані захищатися від реакційних фашистів, феодалів та капіталістів."

 HEL_state_of_siege2:0 "Авангард грифонського соціалізму"
 HEL_state_of_siege2_desc:0 "Держава нарешті об’єднана заради спільного блага. Кожен грифон, кожне місто служить меті поширення соціалізму на наших капіталістичних та феодальних сусідів і звільнення пригноблених робітничих класів. Наразі держава об’єднана під владою диктатури, яку контролює соціалістичний конгрес."

 HEL_central_command:0 "Організація неогранізовуваного"
 HEL_central_command_desc:0 "Революція, яка прагне перевернути існуючий суспільний лад, не може підтримувати себе без центрального командування. Навіть зараз колишні бандити та так звана чернь стають сильнішими як згуртована одиниця, піднімаючись від простого виживання до справжнього товариства."

 HEL_legacy_of_the_revolution:0 "Бандити-ідеалісти"
 HEL_legacy_of_the_revolution_desc:0 "Бандитизм в Аделарті стримується романтичним кодексом поведінки, якого дотримуються розбійницькі ватаги. Крадіжки дозволені лише проти багатих та жорстоких, а самовизначення особистості має поважатися. Ненависть до монархій та їхніх шерифів робить бандитів готовими і охочими битися та працювати за суверенітет Аделарту. Проте їхня зневага до ієрархії ускладнює керування населенням."

 HEL_legacy_of_the_revolution_2:0 "Партизани-ідеалісти"
 HEL_legacy_of_the_revolution_cooler:0 "Армія повстанців"
 HEL_legacy_of_the_revolution_3:0 "Бандити-ідеалісти"
 HEL_legacy_of_the_revolution_3_desc:0 "Романтичний кодекс поведінки бандитів був додатково посилений, коли Вуд відновив свій контроль над армією. Тепер ідеологічно єдині бандити ще завзятіше б’ються за суверенітет Аделарту, а влада Вуда зміцнюється. За Лісових Братів! За Мерлока Вуда!"

 HEL_a_new_philosophy:0 "Спільнота без тиранії"
 HEL_a_new_philosophy2:0 "Спільнота без тиранії"

 HEL_tidying_up_adelart:0 "Прибирання в Аделарті"
 HEL_tidying_up_adelart_desc:0 "Бандити, які тримали віжки влади в Аделарті протягом 20 років, є пріоритетом номер один для грифонів шерифа, що мають їх розігнати та знищити. На жаль, вони просочилися в кожну частину Аделарту, тому для видалення їхньої гнилі доведеться вжити крайніх заходів."

 HEL_the_betrayal:0 "Шериф повертається"
 HEL_the_betrayal_desc:0 "Романтичний кодекс поведінки, що так довго тримав бандитів Аделарту разом, розірвано вщент. Аделарт та її захисники опинилися по різні боки барикад, її околичні поселення у вогні, бо брат іде на брата у власних домівках.\n\nБандити повернулися до свого коріння і висмоктують з Аделарта все, що можуть."

 HEL_the_betrayal2:0 "Шериф повертається"
 HEL_the_betrayal2_desc:0 "Романтичний кодекс поведінки, що так довго тримав бандитів Аделарту разом, розірвано вщент. Аделарт та її захисники опинилися по різні боки барикад, її околичні поселення у вогні, бо брат іде на брата у власних домівках.\n\nБандити завдають величезної шкоди нашим нечисленним солдатам."

 HEL_the_betrayal3:0 "Шериф повертається"
 HEL_the_betrayal3_desc:0 "Романтичний кодекс поведінки, що так довго тримав бандитів Аделарту разом, розірвано вщент. Аделарт та її захисники опинилися по різні боки барикад, її околичні поселення у вогні, бо брат іде на брата у власних домівках.\n\nБандитів потроху розганяють, але вони все ще виснажують наші ресурси."

 HEL_the_betrayal4:0 "Шериф повертається"
 HEL_the_betrayal4_desc:0 "Романтичний кодекс поведінки, що так довго тримав бандитів Аделарту разом, розірвано вщент. Аделарт та її захисники опинилися по різні боки барикад, її околичні поселення у вогні, бо брат іде на брата у власних домівках.\n\nБандити при смерті, на волі залишилися лише одиниці. Решта або втекли, або загинули."

