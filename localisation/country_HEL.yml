 #TEMPLE IDEA CHAIN
 HEL_massive_church_support:0 "Одна Держава, одна Богиня, одна Боротьба!"
 HEL_large_church_support:0 "Ейритська відданість"
 HEL_moderate_church_support:0 "Підтримка старовірів"
 HEL_autonomous_religious_communities:0 "Автономні релігійні громади"
 HEL_autonomous_religious_communities_desc:0 "Держава не бере участі в управлінні храмами та релігійними організаціями. У минулому нападам піддавалися лише корумповані та розпусні храми Трьох Архонтів, тоді як місця зібрань старої релігії ніколи не чіпали. Тепер занепадаюча віра Трьох Архонтів витісняється мілітаристською та відродженою Старою Вірою під проводом Луки фун Ліссея та Сестер Ейр. Хоча держава не втручається в конфлікт, Луку фун Ліссея вважають потенційною загрозою стабільності через його войовничу позицію та ненависть до соціалізму."
 HEL_moderate_church_anger:0 "Скасовані привілеї"
 HEL_moderate_church_anger_desc:0 "Право ейритських храмів на самоуправління було скасовано, оскільки Аделарт розпочинає повну секуляризацію."
 HEL_large_church_anger:0 "Обеззброєні храми"
 HEL_large_church_anger_desc:0 "Ейритські віряни Аделарта були значною мірою придушені до такого стану, що вони практично не мають впливу на державну політику, але залишаються відносно сильними в соціальному житті Аделарту."
 HEL_massive_church_anger:0 "Смерть побожності"
 HEL_massive_church_anger_desc:0 "Після неодноразових зусиль уряду з придушення старовірів, ейритська віра Аделарту стала майже повністю неактуальною навіть у межах того малого регіону, де вона колись була найбільш поширеною. Хоча віряни продовжують триматися, збираючись у віддалених лісових храмах та на занедбаних територіях, навряд чи цей напрям поклоніння проіснує довго. Усе має свій кінець, і вірні Ейр зустрінуть свій не з вибухом, а з жалібним плачем."
 HEL_new_military_academy:0 "Іглтонська академія сучасної війни"
