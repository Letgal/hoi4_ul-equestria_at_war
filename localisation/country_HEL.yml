 HEL_secret_police:0 "Ні шерифів, ні жерців"
 HEL_secret_police_desc:0 "Від переховування та очікування в лісах до керування цілою розвідувальною агенцією - GRDLF стежать з-поміж листя та гілок, будучи охоронцями революції, яку ще належить закріпити.\n\nТож шелест вітру чи випадковий тріск гілки може бути просто природою, або ж..."

 HEL_secret_police2:0 "Задля захисту нашої революції"
 HEL_secret_police2_desc:0 "Зібрати докупи купку грифонів, що сидять у кущах, і призначити їх керувати національною розвідкою раніше могло здатися самогубством, але лісово-тунельна мережа надійних контактів GRDLF дозволяє Республіці бути в курсі дій потенційних саботажників проти революції."

 HEL_secret_police2_lar:0 "Задля захисту нашої революції"
 HEL_secret_police2_lar_desc:0 "Зібрати докупи купку грифонів, що сидять у кущах, і призначити їх керувати національною розвідкою раніше могло здатися самогубством, алеале мережа довірених осіб GRDLF допомогла виявити саботажників революції."

 HEL_chaotic_government:0 "Бандитське врядування"
 HEL_chaotic_government_desc:0 "Місцеве та національне врядування має форму альтруїстичних банд, де пріоритет надається інтересам місцевих громад та членів банди. Нечисленні заможні громадяни ховаються в страху, а бандитське населення не горить бажанням іти на війну."

