 GRY_cossacks_harmony_desc: "Харизма Борада Грифницького об'єднала раніше розділені клани, зміцнивши наші сили та поклавши кінець старим образам."
 GRY_harmonic_land_reform_1_nobility_angry: "Куркулі опираються шляхті"
