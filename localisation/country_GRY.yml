 GRY_efficiency: "Оптимізоване виробництво"
 GRY_communist_rebels: "Комуністичні бунтарі"
 GRY_communist_rebels_desc: "ГСДРП, за підтримкою революціонерів з Прайвену, організують терористичні кампанії по всій країні"
 GRY_communist_rebels_2: "ГСДРП інтегрована"
 GRY_communist_rebels_2_desc: "Ми запросили Корнила Хрущевича і його народне ополчення у наш уряд, і тепер вони скоріш нас підтримають, аніж повстануть."
 GRY_comm_tribes_1: "Січі прислуховуються до нас"
 GRY_comm_tribes_2: "Комунізм пускає коріння серед січей"
 GRY_comm_tribes_3: "Зафійська солідарність"
 GRY_defend_the_homeland: "Захистити Батьківщину"
 GRY_defend_the_homeland_2: "$GRY_defend_the_homeland$"
 GRY_gryphia_lives_and_marches_on: "Грифія живе, і марширує вперед!"
 GRY_all_united: "Зафійці соборні"
 GRY_otaman_support: "Кошові отамани підтримують нас"
 GRY_pokozachennya_idea: "Покозачення"
 GRY_pokozachennya_idea_desc: "Грифони із усіх класів і прошарків шукають кращого життя у козацькому суспільстві, поповнюючи наші збройні сили."
