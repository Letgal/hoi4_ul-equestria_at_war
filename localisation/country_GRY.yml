 GRY_JER_accepted: "Ми знайшли спільну мову із Аквілейською Республікою"
 GRY_FAT_accepted: "Ми вступили у договір із Пангрифонською Республікою"
 accepted_our_enemies_into_fed: "Дозволити нашим ворогам увійти в Коаліцію"
 accepted_us: "Вони пробачили нас за наші минулі дії!"
