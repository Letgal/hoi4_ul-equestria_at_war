 GRY_research_bonus: "Потік зброї"
 GRY_research_bonus_desc: "З рясним запасом зброї, ми взнали кілька прийомів, що дозволять створити ще більше спорядження."
 GRY_centralisation_struggles: "Безлад у Раді"
 GRY_centralisation_king_1: "Король починає зміцнювати  владу"
 GRY_centralisation_king_2: "Народ починає приймати короля"
