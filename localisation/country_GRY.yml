# == (*) ==
### НАЦІОНАЛЬНІ ФОКУСИ ###
 GRY_GATHERING_STORM_DESC: "Століттями козаки Грифійської січі проживали на рівнинах у басейні ріки Еві. Вони займалися землеробством, набігами, битвами, та походами, аби заробити собі на життя. Коли грифійці стали прикордонною маркою Імперії Грифонів, вони перетворились в справжній жах для річкових поні — і водночас стали захисниками для всіх грифонів, але потім козаки трохи "відійшли" від своїх цілей. Тепер, в 1007 році, Січ залишилась із пустою скарбницею. Щоб прожити далі, козакам треба організувати новий похід — але світ став куди небезпечнішим, ніж він був раніше. Зрадники проводять агітацію по селах, таємні спільности збираються в тіні. Якщо наступний похід піде не за планом, хаос наздожене нас..."
 GRY_raid_brodfeld: "Похід на Бродфельд"
 GRY_raid_brodfeld_desc: "Взагалі, набіг на Бродфельд порушить наш договір із Грифонським Імператором. Але його влада вже десятиріччями в занепаді, з нас вже давно не збирали данину і не вимагали оновити клятву Імператору. Можна впевнено сказати, що Імператор і оком не кліпне, поки ми спалюватимемо Бродфельд..."
 GRY_raid_radicals: "Похід на Визвольну армію"
 GRY_raid_radicals_desc: "Зазвичай ми не грабуємо нікого на схід від ріки, але це ж не стосується навіжених повстанців, чи не так? Окрім того, цей їхній "комунізм" починає цікавити нашу молодь, тому краще вдарити першими."
 GRY_prywhen_response: "Червона загроза"
 GRY_prywhen_response_desc: "Визвольна армія здобла перемогу над військом Короля Бродфельду. Це справжня катастрофа, тому можна не сумніватись, що скоро комуністи прийдуть і по нас. Ворог не пройде!"
 GRY_young_socialists: "Переворот молодих соціалістів"
 GRY_young_socialists_desc: "З нарастанням хаосу після смерті Гетьмана пани почали сваритись через здобич і винити один одного в смерті Каласа Бульби. "Армія молодих соціалістів" із підтримкою Визвольної армії взяла контроль над урядом. Вони вже оголосили проведення реформ, котрі ніби поведуть наше суспільство "до світлого майбутнього"."
 GRY_centralise: "Боротьба за спадщину"
 GRY_centralise_desc: "Зі смерттю Гетьмана Бульби наш край зовсім впав у анархію. Хоч немало старшин намагаються взяти булаву, лише в двох є реальний шанс стати гетьманом — у Грифницького з його військом Грифонським та у Євгена Кравельця, племінника померлого гетьмана."
 GRY_chorna_rada: "Чорна Рада"
 GRY_chorna_rada_desc: "Дідько! Різність ідеологій двох претендентів на булаву стали більш, ніж якоюсь бійнею. Нині їхні прихильники стали різати один одного безпосередньо на вулицях Каїва! Якщо ми не виберемо нового Гетьмана, Грифії настане кінець."
 GRY_liberate_lushi: "Питання Люші"
 GRY_liberate_lushi_desc: "[Root.GRYcommLUS]"
 GRY_liberate_gryphus: "Питання Ґрифуса"
 GRY_liberate_gryphus_desc: "[Root.GRYcommGRU]"
 GRY_raid_season: "Зібрати січі"
 GRY_raid_season_desc: "Настав час провести традиційний щорічний набіг. \n\nГетьман Калас Бульба вже наказав отаманам зібрати своїх воїнів та зібратись на кордоні із Бродфельдом. Оскільки в них вже довго йде громадянська війна, ми повернемося із великою здобиччю. Сподіваємося, що ми багато чого знайдемо."
 GRY_aftermath: "Наслідки походу"
 GRY_aftermath_desc: "Ми чекаємо на козаків із походу. Чекаємо, що після вдалого набігу вони принесуть значну здобич."
 GRY_rifle_stash: "Таємні склади"
 GRY_rifle_stash_desc: "Частина нашої старшини поділилась із нами зброєю, яку вони переховували для боротьби із червоною чумою. Що ж, поки прикриємо на це очі, бо зараз нам потрібна кожна гвинтівка."
 GRY_war_readiness: "Підняти козаків!"
 GRY_war_readiness_desc: "Гей, ви, хлопці січовії, раз, два, три!\nВже вороже серце мліє, раз, два, три!\nНі на що ми не зважаймо.\nЛиш наперед поступаймо.\nРаз, два – раз, два – раз, два, три!"
 GRY_rile_up_the_warriors: "Пропаганда проти червоних"
 GRY_rile_up_the_warriors_desc: "Наші люті воїни жадають крові та боїв. Легше за все їх натравити на прайвенську загрозу, поширивши чутки про їх жорстокість та варварство."
 GRY_destroy_the_revolution: "Кінець революції!"
 GRY_destroy_the_revolution_desc: "Настав час відновити владу на заході від ріки Еві. Землі Бродфельду будуть визволені від тиранії!"
 GRY_kickstart_economy: "Сучасна індустріалізація"
 GRY_kickstart_economy_desc: "Східна Грифонія ніколи не була промислово розвиненою, на відміну від заходу, а економічно так взагалі й згадувати не варто. Щоб вижити в цьому дивному новому світі, ми принесемо до Грифії світло промислової революції."
 GRY_agrarian_future: "Фізіократія"
 GRY_agrarian_future_desc: "Фізіократія — аквілейська течія, згідно якої увесь добробут походить від матері-природи — а саме від землеробства. Буйні степи Грифії завжди були багаті на врожай, а тому, звичайно, ми маємо прислухатись до цієї філософії та покращити наші поля."
 GRY_industrial_future: "Форсована індустріалізація"
 GRY_industrial_future_desc: "Єдина можливість для Грифії настигнути сучасний світ — швидка, рішуча побудова промисловості та доріг."
 GRY_new_industry: "Нові заводи"
 GRY_new_industry_desc: "Щоб провести промислову революцію, ми маємо перейти від простих майстерень до найновіших заводів, що здатні на масове виробництво будь-яких необхідних товарів."
 GRY_new_arsenals: "Майстерні вогнепальної зброї"
 GRY_new_arsenals_desc: "Традиційно Грифія покладалася на гільдії ковалів та зброярів, що забезпечували нашу армію зброєю. Щоправда, вони не можуть встигати за більшими потребами сучасності. Таким чином, ми переглянемо декілька майстерень, що виробляють лиш зброю."
 GRY_better_tools: "Оновлені інструменти"
 GRY_better_tools_desc: "Ми видобуваємо ресурси примітивним та застарілим чином. Тому ми маємо закупити нове знаряддя, якщо ми хочемо їх ефективно видобувати."
 GRY_nation_of_farmers: "Субсидії селянам"
 GRY_nation_of_farmers_desc: "Стійкі та працьовиті селяни — опора нашої Січі, и ми повинні забезпечити їм додаткові пільги, щоб вони змогли продовжити збір великих врожаїв."
 GRY_infrastructure: "Промисловий розвиток"
 GRY_infrastructure_desc: "Поза Каївом доріг нема. Взагалі. Про дороги в Грифії і не чули, а ті, що є — витоптані козацькими полками. Ми маємо об'єднати мережею доріг всю країну."
 GRY_steelmills: "Розвиток сталеливарної галузі"
 GRY_steelmills_desc: "Наші нинішні методи виплавки застаріли, багатьох з них варто позбутись, через їх неефективність. Працівники сталеливарної галузі стануть більш кваліфікованими та вивчать нові методи виробництва сталі, такі як процес ущільнення."
 GRY_foreign_direct_investment: "Приваблення інвесторів"
 GRY_foreign_direct_investment_desc: "Наша промислова база дуже невелика, але група магнатів із Вінґбардії показала зацікавленність у нашій перспективній економіці. Ми повинні вмовити їх залишитись."
 GRY_factory_efficiency: "Підйом виробництва"
 GRY_factory_efficiency_desc: "Робітники заводів нічого не мають досвіду роботи з новим промисловим обладненням, тому виробництво пасе задніх. Ми організуємо семінари для працівників, щоб вони порозумнішали та почали працювати краще."
 GRY_kaiv_uni: "Заснувати Каївський червоний університет"
 GRY_kaiv_uni_desc: "Майже все населення Грифії — безграмотні селяни, що не вміють ані читати, ані писати. Коли ми відкриємо університет у Каїві, то зможемо сподіватись, що наступне покоління грифонів зацікавиться освітою та ввійде до рядів наших вчених."
 GRY_modernisation_effort: "Нова промисловість Грифії"
 GRY_modernisation_effort_desc: "У минулому році ми доклали багато зусиль, для того щоб Грифія наздогнала сучасний світ. Щоб наздогнати та перегнати захід треба ще багато часу, та Грифія вже досягла чудових результатів."
 GRY_electoral_reform: "Новий шлях"
 GRY_electoral_reform_desc: "Товариш Хрущевич та його загони увійдуть до складу уряду, щоб підготувати нашу нову соціалістичну державу до виборів."
 GRY_solidarity: "Об'єднати грифійські січі"
 GRY_solidarity_desc: "Численні січі Грифії все ще протидіють новим законам та відмовляються служити у червоній армії. Якщо ми покажемо переваги комунізму та вмотивуємо їх, вони допоможуть нам встановити диктатуру пролетаріату."
 GRY_land_reform_1: "Націоналізувати майно буржуїв"
 GRY_land_reform_1_desc:0 "Замість розвитку країни, ці брудні свині лише сперечаються між собою через різні дрібниці та витрачають свої статки на витребеньки. Ми відберемо їх майно і роздамо селянам, бо саме вони — майбутнє нашої держави. \n\nПанам це, звичайно, не сподобається..."
 GRY_first_universale: "Проголосити Каївську комуну!"
 GRY_first_universale_desc: "Ми добре попрацювали над перетворенням нашої країни у комуністичний рай. Нехай світ почує, Каївська Комуна — не паде!"
 GRY_the_reactionary_officers: "Доля старшин"
 GRY_the_reactionary_officers_desc: "Саме час щось зробити із реакціонерами у армії. Увесь цей час нас підтримували старшини, але реформи знищать потребу в їх допомозі. Ми повинні ретельно визначити наш майбутній курс."
 GRY_befriend_GLA: "[Root.GRYrelGRW]"
 GRY_befriend_GLA_desc: "[Root.GRYrelGRW_desc]"
 GRY_we_need_factories: "Фабрики — народові!"
 GRY_we_need_factories_desc: "Соціалістична держава не може існувати без робочого класу. В нас не може бути робітників, якщо ми не збудуємо фабрики. Ми маємо докласти максимум зусиль, щоб побудувати заводи для грифонів та забезпечити для них робочі місця та стабільний заробіток."
 GRY_integrate_cossacks_into_red_army: "Червоне козацтво"
 GRY_integrate_cossacks_into_red_army_desc: "Всупереч контрреволюційному мисленню, стара гвардія все ще володіє мистецтвом війни. Ми реформуємо ветеранів під наші цілі та покажемо їм, чому вони повинні боротись за пролетаріат."
 GRY_ideological_purity_in_the_army: "Розкозачення"
 GRY_ideological_purity_in_the_army_desc: "Буржуазним ідеям не місце в армії! Вони ганьблять наші ідеали та підштовхують до бунтів! Розстріляти кожного, хто повстане проти комуністичних ідей!"
 GRY_revolutionary_arsenals: "Зброя революції"
 GRY_revolutionary_arsenals_desc: "Революція потребує захисту, і для збереження її духу, ми за 40 днів побудуємо військові фабрики, що вироблятимуть гвинтівки, гармати, та всяке інше. Хай живе Каївська комуна!"
 GRY_land_reform_2: "Закінчити земельну реформу"
 GRY_land_reform_2_desc: "Ми вдало позбавили шляхту несправедливих прав та привілегій, відтепер вона рівна, як і усі інші грифони. Нині, коли влада аристократів над грішми та найманцями відсутня, шляхтичі більше не загрожуватимуть Каївській комуні."
 GRY_second_universale: "Наша зовнішня політика"
 GRY_second_universale_desc: "Тепер, коли наша країна стала сильною, гідною, соціалістичною силою, настав час вирішити, яка в нас буде політика відносно країн-сусідів. Наше радикальне крило вважає, що ми маємо піти стопами наших друзів у Прайвені, але більш відкриті члени партії виступають за власний, незалежний шлях. Та зрештою, останнє слово за товаришем Хрущевичем."
 GRY_spread_the_revolution: "Революція без кордонів"
 GRY_spread_the_revolution_desc: "Хоч ми і виражаємо вдячність нашим друзям із Прайвену, вони не бажають поширювати ідеали революції сусідам, як мирно, так і добровільно-примусово. Повстаньте, гнані та голодні!"
 GRY_wittenland_attack: "[Root.WIT_attack_text]"
 GRY_wittenland_attack_desc: "[Root.WIT_attack_text_desc]"
 GRY_wittenland_attackit: "Наш старий ворог"
 GRY_wittenland_attackit_desc: "Єдинороги Віттенленду вичавлюють всі соки із бідного пролетаріату, катують свій народ. Настав час закінчити їх незлічені вечірки і постійну експлуатацію робітників."
 GRY_ask_GRW: "Звернутися до Прайвену"
 GRY_ask_GRW_desc: "Віттенленд з незапам'ятних часів пригнічується реакціонерами, котрих, на превеликий жаль, захищає Річкова Коаліція. За допомогою союзників ми матимемо більше шансів подолати ворогів, але чи вистачить нашим друзям сил вистояти проти самої коаліції?"
 GRY_wittenland_makefriends: "B серцях у нас клекоче гнів"
 GRY_wittenland_makefriends_desc: "Це перемога! Робітники Віттенленду скинули власну буржуазну владу і сформували соціалістичний уряд! Та хай в нас і наявні деякі розбіжності, було б безглуздо з нашого боку не допомогти нашим товаришам по революції, аби дух комунізму розквітнув у обох країнах."
 GRY_red_education: "Трудові вчення"
 GRY_red_education_desc: "Освіта вже була значно реформована, але ми все одно маємо ввести обов'язковий навчальний план, щоб майбутні покоління вивчали цінності соціалізму. Нові учні стануть піонерами нової Грифії."
 GRY_let_prywhen_lead: "Піти за Прайвеном"
 GRY_let_prywhen_lead_desc: "Товариші з Прайвену набагато краще знаються в політиці та дипломатії, вони мають делегатів із самого серця Революції — Сталліонграду. Ми маємо орієнтуватись на їх іноземну доктрину."
 GRY_GRW_army_experience: "Спільні військові навчання"
 GRY_GRW_army_experience_desc: "Ми организуємо серію спільних військових ігор та навчань для тренування армії. Працюючи разом, ми розширимо свої знання про тактику і сучасну війну. Простий солдат стане більш відданим своїм побратимам."
 GRY_import_teachers: "Запросити викладачів з Прайвену"
 GRY_import_teachers_desc: "Дуже довго наші сусіди були такими ж безграмотними, як і ми. Але революція перемогла, і тепер жителі Прайвену стоять на сторожі комуністичного вчення. Ми попросимо їх відправити їх найкращих викладачів, щоб поширювати соціалізм по всій Грифії."
 GRY_brothers_in_revolution: "Грифійсько-Прайвенський пакт дружби"
 GRY_brothers_in_revolution_desc: "Народна республіка Прайвен — наш найкращий друг, який ніколи не кидав народ Грифії у незгоді. Хай живе Грифійсько-Прайвенський пакт дружби!"
 GRY_socialist_future: "Перемога пролетаріату"
 GRY_socialist_future_desc: "Нарешті, ми стали соціалістичною країною! Нині робітники Грифії мають хорошу освіту, зарплатню та можуть не хвилюватись за свої робочі місця. Все це — заслуга товариша Хрущевича і Каївської комуни!"
 GRY_volnoye: "Підтримати Грифницького"
 GRY_volnoye_desc: "Син дрібного шляхтича, Борад Грифницький, приніс вогонь гармонії народу Грифії і стає популярним навіть серед шляхтичів. Він вважає, що на шляху до гармонії, ми досягнемо процвітання та гармонії. Але Рада ще не готова до таких змін, її більш цікавіть кандидатура Кравельця..."
 GRY_monarchy_compromise: "Новий король"
 GRY_monarchy_compromise_desc: "Всупереч інтриг Чорних плащів, Борад Грифницький все ж таки став гетьманом зі значною підтримкою у Раді. Але ціна цьому висока, бо не кожен шляхтич погодиться на його масштабні реформи. Компроміс — у мудрому монарху.."
 GRY_elected_hetman: "Нехай вирішує народ"
 GRY_elected_hetman_desc: "Зрада! Євген та його пішки спробували взяти Раду під свій контроль! На щастя, їх полки пали, а могутня промова нашого Гетьмана зупинила безлад. Бандити біжали чи з сорому, чи з здорового глузду. Своїм першим указом Борад хоче організувати вибори. Він вважає, що так скептики зрозуміють, наскільки гармонія та воля важливі народові."
 GRY_reform_starshina: "Нові військові старшини"
 GRY_reform_starshina_desc: "Верховне командування стало надто наївним та неспроможним відповісти на загрози та на виклики нашій гармонії. Нові обличчя поведуть армію, а нам лиш залишається вірити, що серед них не буде ворогів."
 GRY_form_government: "Призначити новий уряд"
 GRY_form_government_desc: "Гетьман Бульба ніколи не любив керівничу бюрократію, вважаючи за краще вирішувати всі труднощі самостійно. Авторитет Бульби був беззаперечним, але коли він вмер, в нас більше не стало великого лідера. Генеральна рада сформує новий кабінет, щоб такого не було у майбутньому."
 GRY_strengthen_cossack_radas: "Розширити автономію січей"
 GRY_strengthen_cossack_radas_desc: "Здається, що нещодавні події ще сильніше роз'єднали нашу країну. Гетьман Грифницький вважає, що першим кроком до соборної Грифії буде надання нових вольностей січам."
 GRY_placate_communists: "Поступки комуністам"
 GRY_placate_communists_desc: "У ГСДРП є декілька гарних ідей пов'язаних з покращенням життя простих грифонів. В обмін на повне зупинення підпільної діяльності, Корнило Хрущевич погодиться долучитись до уряду, аби реалізувати деякі соціалістичні реформи (звичайно, із власними амбіціями)."
 GRY_united_cossacks: "Єдина Січ"
 GRY_united_cossacks_desc: "Гармонія зігріє нас, і усі січі об'єднають свої війська та стратегії. Ми значно розширимо наше військо."
 GRY_harmonic_economy: "Вчення гармонійної економіки"
 GRY_harmonic_economy_desc: "Ми розповсюдимо вчення гармонії серед наших вірних робітників. Ми відкриємо спеціальні школи, аби якнайбільше грифонів навчались принципам Гармонії. В той же час, ми дещо активізуємо нашу економіку."
 GRY_give_land_to_the_people: "Землю бідним"
 GRY_give_land_to_the_people_desc: "Більша частина населення нашої держави живе в крайній бідноті, ледве маючи хоч щось. Земля — найдорожчий скарб у Грифії з можливих. Ми викупимо надлишки землі у шляхти і роздамо їх простому народу."
 GRY_placate_clans: "Січові вольності"
 GRY_placate_clans_desc: "Наші перші зусилля не були даремними, місцеві отамани вже схиляються до повної уніфікації. Ще декілька реформ і нові привілеї зможуть звернути на наш бік навіть найупертіші племена."
 GRY_minorities_in_army: "Об'єднати січі"
 GRY_minorities_in_army_desc: "Кожна січ понесе свою хоругву під величним прапором Соборної Грифії! У результаті, навіть найвпливовіші та найбагатші грифони дали клятву захищати нашу гармонію."
 GRY_admin_reform: "Бюрократичні реформи"
 GRY_admin_reform_desc: "Наша бюрократія загрузла в корупції та не хоче нічого робити. Черговий пакет реформ має дати поштовх цим ледарям.\nЗагрузіть їх масою роботи..."
 GRY_compromise_with_rich: "Заспокоїти шляхту"
 GRY_compromise_with_rich_desc: "Шляхтичі занепокоєні нашими реформами, особливо земельною. Оскільки вони все ще мають гроші та вплив, ми маємо знайти компроміс, якщо ми не хочемо потім постійно придушувати їх бунти..."
 GRY_education_reform: "Освітня реформа"
 GRY_education_reform_desc: "Освіта в Грифії довгий час була доступною лиш багатим та впливовим. Це треба змінити. Звичайно, треба буде збудувати багато нових шкіл та знайти вчителів з-за кордону. В будь-якому разі, ми введемо примусову освіту."
 GRY_reinforce_government: "Сильний Гармонічний Уряд"
 GRY_reinforce_government_desc:0 "Мешканці Грифії раді нашим реформам, навіть шляхта, комуністи та залишки старого гетьманату нам не вороги. Гармонія вкорінилась у наших землях."
 GRY_institutes_of_technology: "Всегрифійська академія наук"
 GRY_institutes_of_technology_desc: "Наука виявилась складнішою, ніж нам здавалось. Кожна з галузей наукової справи може забезпечити нас чудовими винаходами, здатних покращити життя простого грифона. Ми відкриємо нові університети, щоб підтримати ці намагання."
 GRY_liberty_from_the_barrel_of_a_gun: "Захист наших свобод"
 GRY_liberty_from_the_barrel_of_a_gun_desc: "Ми постійно живемо під загрозою, численні вороги намагаються розірвати нашу велику Батьківщину на шматки. Від гвинтівкового прикладу до крові ворогів, свобода держави — понад усе!"
 GRY_our_liberty_will_not_perish: "Нагадати народу" #я вам трішки напам'ятаю
 GRY_our_liberty_will_not_perish_desc: "Мешканці Грифії мають знати, наскільки велика ціна нашої волі! Лиш тоді вони зрозуміють, що вони борються за більш славну справу, аніж просто за землю і честь!"
 GRY_preserve_holdings: "Один за всіх та всі за одного"
 GRY_preserve_holdings_desc: "Грифії не потрібні чужинці, які приносять лише труднощі. Коли ми введемо жорсткий прикордонний контроль, потрапити до нашої держави стане куди важче, іноземці не зможуть так легко купувати нашу землю. Грифія — для грифійців!"
 GRY_constitution_of_the_zaphzans: "Нова конституція Зафії"
 GRY_constitution_of_the_zaphzans_desc: "Ґрунтовний звід законів з'явиться на папері, тому кожний громадянин знатиме свої права та привілеї. Це стане визначною рисою Грифійського права."
 GRY_gryphia_lives: "Грифія живе!"
 GRY_gryphia_lives_desc: "Народ Грифії може по праву пишатись своєю державою. За ці роки ми подолали всі біди, кожен грифон має права і може забезпечити себе товарами, а наша освіта безкоштовна для кожного. Воїстину, Борад Грифницький — герой своєї держави та її народу!"
 GRY_new_diplomacy: "Сучасна дипломатія"
 GRY_new_diplomacy_desc: "Довго ми були купою диких, відрізаних від всього світу, розбійників. Нам потрібно довести усім, що ми почали із чистого аркуша, і знайти вірних союзників."
 GRY_apply_to_RIV: "Зблизитися з річковими поні"
 GRY_apply_to_RIV_desc: "Навіть найвірніші прихильники Гармонії вважають, що спроба зблизитись із Річковою Федерацією приречена на невдачу, але Гетьман Борад впевнено наполягає на офіційному альянсі з річковими поні. Щоб довести істинність власних намірів, Грифницький відправиться з невеликою свитою до Рієкограду. Сподіваємося, що він не вмре від колі першого ж стражника."
 GRY_federal_investment: "Міжрічковий Валютний Фонд"
 GRY_federal_investment_desc: "Неможливе відбулось! Гетьман Борад повернувся з дуже добрими новинами — річкові поні прийняли нас до свого альянсу! Інвестори вже пропонують нам почати будувати нові дороги і заводи. Те, як Гетьман Грифницький посадив перше зернятко дружби між грифонами та поні — увійде в історію навіки."
 GRY_RIV_defense_coordination: "Спільні військові тренування"
 GRY_RIV_defense_coordination_desc: "Поні та грифони стануть пліч-о-пліч як побратими, оскільки ми обміняємось нашими воєнними тактиками та доктринами один з одним. Нехай віками живе дружба народів!"
 GRY_the_between_rivers_concept: "Звернутись до наших братів-грифонів"
 GRY_the_between_rivers_concept_desc: "На превеликий жаль, відмінності між поні та нами не так легко подолати, і це ще навіть не кажучи про віки минулої ворожнечі. Ми знайдемо друзів серед подібних собі."
 GRY_speak_with_LUS: "Делегація в Люші"
 GRY_speak_with_LUS_desc: "Ми запропонуємо лідерам Люші підписати договір про взаємний захист. Вони ж отримають із цього вигоду, чи не так?"
 GRY_speak_with_GRU: "Союз із Ґрифусом"
 GRY_speak_with_GRU_desc: "Наші брати, вільні міста Ґрифуса, відомі своїми торговцями та мореплавцями, але їх армія майже беззахисна. Ми запропонуємо їм союз, котрий буде вигідним для усіх."
 GRY_speak_with_GRW: "Переступити через гідність"
 GRY_speak_with_GRW_desc: "Хоч для багатьох із нас це недопустимо, грифонів Прайвену також треба залучити до договору про захист. Нехай минуле залишиться в минулому, наша дружба важливіша за ідеологічні відмінності!"
 GRY_true_hetman: "Підтримати Євгена Кравельця"
 GRY_true_hetman_desc: "Євген Кравелець, внучатий племінник покійного гетьмана, найкраще підходить на роль лідера. За підтримкою багатих магнатів, Євген може переконати загниваючу Раду, що лиш він може повести Грифію до нових горизонтів."
 GRY_proclaim_new_hetmanate: "Легітимний спадкоємець"
 GRY_proclaim_new_hetmanate_desc: "Рада, переважаючою більшістю, вибрала Євгена Кравельця гетьманом Грифії. Опозиція обурена, але кому на неї не начхати?"
 GRY_prevent_ruina: "Зупинити Руїну!"
 GRY_prevent_ruina_desc: "Зрадники! Прибічники Грифницького влаштували бійку в Раді під час коронації Євгена та поклялись покласти кінець його справедливому правлінню! Прямо зараз, як ми це кажемо, вони намагаються відібрати булаву силою. Ми маємо зупинити Руїну!"
 GRY_support_of_kosh_otamans: "Підтримка кошових отаманів"
 GRY_support_of_kosh_otamans_desc: "Кошові отамани, наші високопосталені офіцери вирішили заявити про підтримку Євгена Кравельця. Вони прийшли до висновку, що саме він зможе надати нові вольності та зберегти їх владу, на відміну від Грифницького."
 GRY_pokozachennya: "Покозачення"
 GRY_pokozachennya_desc: "Покозачення, чи акт переходу в козачий стан — давній обряд, згідно якого бажаючий отримував шаблю, пишне вбрання та входив до лав козаків. Однак, тепер ми не можемо дотримуватись цих суворих обрядів, нам доведеться лишитись всіх цих фривольностей, бо країні потрібен кожен грифон, задля святої справи."
 GRY_visit_the_people: "Народна підтримка"
 GRY_visit_the_people_desc: "Правління Євгена вже було оскаржене шляхтою, його популярність все ще надто низька. Він вирішив, що краще за все буде здобути підтримку серед простих грифонів, пояснивши, що саме він рятує Грифію, а не зрадники-гармоністи."
 GRY_crush_dissent: "Покінчити з опозицією"
 GRY_crush_dissent_desc: "Всупереч нашому поміркованому підходу, численні грифони досі не вірять, що Євген несе позитивні зміни. Нам доведеться розібратись із ними, мирно чи не дуже, до того, як вони візьмуть зброю та приєднаються до повстанців..."
 GRY_deal_with_traitors: "Репресії комуністів"
 GRY_deal_with_traitors_desc: "ГСДРП являє собою лиш купу прайвенських агітаторів, котрих підіслали, щоб підірвати суверенітет нашої держави! Поки вони не вибрали свою сторону у громадянській війні, але, безсумнівно, вони планують напасти на нас в найвразливішому стані. Ми маємо вдарити першими."
 GRY_church_support: "Зблизитись з церквою"
 GRY_church_support_desc: "Традиційна віра грифонів переважна і в Грифії, але наші релігійні лідери знаходяться в тіні імперських архонтів. Однак, вони все ж можуть вплинути на грифонів, підтримавши їх у такі буремні часи. Гетьман Кравелець особисто навістить патріарха та запропонує йому вельми вигідну угоду."
 GRY_stronger_together: "Лояльний народ"
 GRY_stronger_together_desc: "Ми знищили гармоністських та червоних дисидентів та тепер все, що в нас лишилось — вірний народ. Правління Євгена забезпечене."
 GRY_the_kingdom_question: "Проблема корони"
 GRY_the_kingdom_question_desc: "Тепер, коли ми розібрались із зрадниками, настав час вирішити майбутнє країни. \n\nЧорні плащі підговорюють Євгена відновити Королівство Зафію, але такий крок може не дуже сподобатись дворянам."
 GRY_a_crowned_hetman: "Зродились ми великої години"
 GRY_a_crowned_hetman_desc: "На урочистій церемонії у Каїві, Євген Кравелець нарешті був проголошений Королем усіх зафійців! Натовп бурно зрадів, коли він продекламував запальну промову та закликав до помсти старим ворогам, що опорочили нашу державу та вирвали з неї багаті землі. Поні заплатять за свою пихатість! Хай живе Король!"
 GRY_preserve_hetmanate: "Зберегти Гетьманат"
 GRY_preserve_hetmanate_desc: "Після довгих роздумів, Євген вирішив не приймати королівський титул. Гетьманат існуватиме й далі, але в зручнішій для нас формі. Так чи інакше, наш мирний жест трохи заспокоїть сусідів."
 GRY_support_local_farmers: "Винагородити селян"
 GRY_support_local_farmers_desc: "Шляхта — купка зрадників та паразитів. Щоб втримати їх владу та зберегти в наших кігтях, значна частина їх земель буде розподілена лояльнішим грифонам. Так ми забезпечимо підтримку низьких класів."
 GRY_legacy_of_old_principality: "Пам'ять про Грифійське князівство"
 GRY_legacy_of_old_principality_desc: "Наше нове королівство збереже традиції старої каївської держави, яка славилась своїми давніми традиціями гордості та незалежності. Численні її великі князі не лише вели війни, але й піклувались про своїх підданих. Новий монарх так само мудро правитиме, як і наші пращури."
 GRY_support_landowners: "Зберегти позиції шляхти"
 GRY_support_landowners_desc: "В обмін на підтримку у Раді, Гетьман закріпить вольності шляхти в законах, та введе такі ж нові статути, що забезпечать вплив аристократії на всю Грифію... Наші традиції не підлягатимуть сумнівам чи критиці."
 GRY_protect_elites: "Розширити права шляхти"
 GRY_protect_elites_desc: "Щоб примирити шляхту та отримати її відданість, вона отримає більшу роль у Раді та привілеї в збройних силах. Це гарантує, що вони залишаться лояльними Євгену та не стануть суперечити його владі."
 GRY_fash_industry: "Розбудувати промисловість"
 GRY_fash_industry_desc: "Могутня держава — промислова держава, але старий режим довго грабував нашу країну! Ми відкриємо нові заводи, щоб створити нові робочі місця та розвинути нашу економіку, давши населенню роботу."
 GRY_fash_arsenals: "Зброя для держави"
 GRY_fash_arsenals_desc: "Якщо ми хочемо відновити велич Зафії, кожного вірного патріота нашої держави треба забезпечити спорядженням та підготувати до війни! Перемога здобувається сталлю та кров'ю, а не промовами чи обіцянками."
 GRY_national_strengthening_movement: "Обов'язкова освіта"
 GRY_national_strengthening_movement_desc: "Дуже довгий час наша освіта була в занепаді! Лиш деякі св'ященницькі школи навколо Каїва могли дати гідну, хоч і религійну освіту. Віднині кожен грифон, малий та старий, почне ходити до школи, поки ми не досягнемо задовільного результату по всій країні. Кожен грифон навчиться читати, писати та вирішувати прості математичні задачі."
 GRY_every_griffon_a_cossack: "Продовжити покозачення"
 GRY_every_griffon_a_cossack_desc: "Наша нескінчена потреба в солдатах вимушає послабити козацькі церемоніальні ритуали ще більше. Нові бійці, може, і не матимуть ту муштру, яку мали старі козаки, але свіжий ентузіазм та гордість за рідну матір-Батьківщину компенсують деякі недоліки."
 GRY_a_deal_with_beakolini: "Знайти підхід до фашистів із Вінґбардії"
 GRY_a_deal_with_beakolini_desc: "Грифійці та вінґбардійці знають, як правити державою, народом та армією. Ми потиснемо їх кігті та заключимо офіційний пакт дружби."
 GRY_prepare_for_war: "Модернізація стратегії"
 GRY_prepare_for_war_desc: "Війни ведуться не лише солдатами, а й технологіями. Перемогу можна здобути лиш передовими видами вогнепальної зброї, воєнної доктрини і багато чим ще."
 GRY_military_academies: "Військова академія ім. Крагайдачного"
 GRY_military_academies_desc: "Щоб навчити нове покоління офіцерського корпусу, ми відкриємо спеціальну академію ім. Крагайдачного. Офіцерів навчать новим методам ведення бою, та після випуску вони зможуть скористуватися набутими знаннями та тактиками в повну силу."
 GRY_led_by_the_hetman: "Батько наш Кравелець"
 GRY_led_by_the_hetman_desc: "Усі похвали Євгену, Гетьману поміж усіх Гетьманів! Він продемонстрував проникливість і компетентність в керівництві нашою державою! Слава нації, смерть ворогам!"
 GRY_tithe_of_war: "Нова хвиля мобілізації"
 GRY_tithe_of_war_desc: "Євген вимагає, щоб шляхта активніше брала зброю і входила в лави наших збройних сил. Віднині, кожен шляхтич зобов'язаний відправити на війну хоча б двох синів та три чверті кріпаків."
 GRY_unite_zavs: "Об'єднані зафські січі"
 GRY_unite_zavs_desc: "Незалежні січі стають справжньою перешкодою у централізаціі нашої держави. Січі Зафії стануть одним цілим, хочуть вони того чи ні.."
 GRY_attack_lushi: "Підкорити Люші"
 GRY_attack_lushi_desc: "Землі Люшійського князівства по праву належать нам, і ми знищимо їх підступні політичні інтриги."
 GRY_attack_gryphus: "Покінчити з Ґрифусом"
 GRY_attack_gryphus_desc: "Населення вільних міст здебільшого складається з шахраїв та піратів. Ми маємо підкорити їх землі, щоб зберегти своє стабільне правління у державі."
 GRY_core_lushi: "Інтегрувати землі Люші"
 GRY_core_lushi_desc: "Землі Люші мають бути швидко інтегровані в нашу державу, що з кожним днем стає все більше, таким чином ми зможемо здобути з них вигоду."
 GRY_core_gryphus: "Розтрощити бунти у вільних містах"
 GRY_core_gryphus_desc: "Сепаратисти у Ґрифусі стають значною перешкодою. Треба відправити розстрільну команду, щоб вона закінчила ці заворушення."
 GRY_attack_brodfeld: "Перейти Еві"
 GRY_attack_brodfeld_desc: "Споконвіку наш давній договір з грифонським імператором забороняв козакам перетинати ріку, та роками багатії-шляхтичі з Бродфельду наживались на безпеці, яку ми їм забезпечували. Але Євген вирішив покінчити з цим неподобством! Ми візьмемо свою заслужену плату за охорону, забравши багатства Бродфельду особисто!"
 GRY_revenge_on_LCT: "Єзераград палатиме!"
 GRY_revenge_on_LCT_desc: "Підступні та лицемірні річкові поні з давніх-давен бажали нам лише зла, вони задіяли немало зусиль, аби ослабити нашу славну Батьківщину. Тепер, коли міць нашої країни досягла зеніту, настав час зібрати війська у похід на Єзераград та зрівняти його із землею, щоб розбити поні раз і назавжди! Це наша помста!"
 GRY_why_are_they_running: "Міць Зафії"
 GRY_why_are_they_running_desc: "Сила Зафії непомірна! Наші вороги біжать, сповнені жахом! \nГетьман Євген пишається своїм незрівненним успіхом, без сумніву можна сказати, що він — найвеличніший лідер Зафії. Шляхта більше не бунтує проти нашого режиму, не протидіє Євгену. Тепер кожен стоїть за спиною нашого лідера. Хай живе Королівство Зафія! Героям слава!"
 GRY_cossack_reform: "Сучасне козацтво"
 GRY_cossack_reform_desc: "З давніх часів грифійський козак лиш виглядом навіював страх на полі бою. Його майстерність у володінні шаблею не мала рівних, його мушкет завжди цілив влучно, його крила стрімко розтинали небеса та луги. Але технології значно просунулись із тих часів, та наші набіги вже не настільки ефективні. Козак має пристосуватись до сучасності."
 GRY_grand_battleplan_focus: "Доктрина масштабного планування"
 GRY_grand_battleplan_focus_desc: "Наш легковажний, імпульсивний метод має бути замінений на належну оборону та тактику стримування ворога. Грифійці все ж таки не гарматне м'ясо."
 GRY_the_trenchers: "Позиційна війна"
 GRY_the_trenchers_desc: "Раніше поля не допомагали в обороні, але тепер ми з них зробимо поля смерті, всіяні шанцями, мінними полями та бліндажами. Ми організуємо спеціальні підрозділи для цієї задачі."
 GRY_adapt_to_mountain_warfare: "Вчення вуйків"
 GRY_adapt_to_mountain_warfare_desc: "Вуйки завжди були відомі своєю особливістю та примхливістю серед усіх січей, полюбляючи мирне життя в горах. Однак, вони завжди цінувались у набігах на гірські масиви Віттенленду. Ми адаптуємо їх знання, щоб навчати наші спеціальні війська ще краще."
 GRY_mass_assault_focus: "Доктрина масованого наступу"
 GRY_mass_assault_focus_desc: "Велика козацька навала добре підходила в усі часи, її просто треба адаптувати до сучасності."
 GRY_the_cossack_idea: "Козацький дух"
 GRY_the_cossack_idea_desc: "Для поні нема нічого гірше, ніж козак, що прийшов по його господарство та життя. Щоб козацтво лякало наших ворогів, ми послабимо вимоги для формування козацьких полків."
 GRY_precious_life: "Допомога пораненим"
 GRY_precious_life_desc: "Медицина завжди була відсталою у Грифії, тому чимало поранених солдатів вмирали чи калічились від поранень. Із введенням професійних медичних бригад, цьому настане кінець..."
 GRY_guns_for_the_cossacks: "Модернізована зброя"
 GRY_guns_for_the_cossacks_desc: "Значна частина нашого озброєння застаріла і непридатна до нових військових конфліктів. Ми повинні почати виробництво нової зброї та креслень."
 GRY_new_signals: "Електронні інновації"
 GRY_new_signals_desc: "ЕОМ — досить новітній винахід, що, однак, вже показав свою користь. Миттєва відправка повідомлень буде безцінним при відправці наказів." # (!) уточнити що таке еом
 GRY_superior_firepower_focus: "Доктрина переважаючого вогню"
 GRY_superior_firepower_focus_desc: "Козак — не дурак, він добре подумає перед тим, як стрімголов кинутись у бій. Чому б не закидати наших ворогів брудом з придушуючим артилерійським шквалом та раптовим проривом крізь їх позиції?"
 GRY_purchase_bigger_guns: "Артилерія із Герцланду"
 GRY_purchase_bigger_guns_desc: "Наші квартирмейстери провели огляд наших артилерійських складів та визначили, що всі гармати або розкрадені, або безнадійно застарілі. Але сам Борей нам усміхається, і вже скоро до нас із Герцланду прибуде хвацький торгівець, що запропонує нам сучасні зразки озброєнь за нормальну ціну."
 GRY_artillery_spotters: "Передове коригування"
 GRY_artillery_spotters_desc: "Артилерійське бомбардування вимагає, щоб хтось визначав точку, яку треба обстріляти. Нові розвідники вивчаться електронному коригуванню."
 GRY_the_past: "Славна еліта"
 GRY_the_past_desc: "Наші доблесні козаки служили нам упродовж віків — їм просто треба адаптуватись до вимог сучасності. Саме тому вони будуть навчені останнім тактикам бою та отримають нове спорядження."
 GRY_the_present: "Прийняти зміни"
 GRY_the_present_desc: "Старі тактики вже не значать нічого на полі бою, тому ми маємо приглянутись до нових доктрин та видів озброєння. Нашим традиціям краще залишитись в інших галузях, в армії їм доведеться поступитись на користь сучасної війни."
 GRY_the_future: "Козаки на колесах"
 GRY_the_future_desc: "Серед нашої шляхти поширені чутки про новий винахід із Герцланду, який вони звуть "панциром". Їм невистачає витримки та витонченості наших козаків, але без усякого сумніву, вони забезпечують чудовий захист та нові методи нападу для наших військових."
 GRY_final_reform: "Нова віха козацтва"
 GRY_final_reform_desc: "Численні грифони оплакують загибель наших традицій, але лиш козаки нової епохи стануть вирішальною силою на війні."
 GRY_navy: "Козацькі чайки у морі"
 GRY_navy_desc: "Наші солдати лиш тепер побачили море, та, м'яко кажучи, спантеличені. Море подібне громадній рівнині, що тягнеться у нескінченість, і звичайно це означає, що навіть безкрайні води будуть підвласні нашим набігам."
 GRY_naval_company: "Пропозиція, від якої не відмовитись"
 GRY_naval_company_desc: "Група зацікавлених грифонів з Скайфолу пропонує обмінятись морськими знаннями та моделями кораблів за досить низьку ціну... Ми підпишемо, та дозволимо їм керувати нашою нещодавно створеною морською компанією."
 GRY_fleet_in_being: "Видима перешкода"
 GRY_fleet_in_being_desc: "Козаки не тікають з поля бою, ми ще покажемо ворогу — за допомогою флоту лінійних кораблів, що гордо розсікатимуть моря."
 GRY_cruisers: "Сконцентруватись на крейсерах"
 GRY_cruisers_desc: "Нехай нам і не вистачає ресурсів на важкий флот, крейсери та їх важкі підвиди все ще здатні скласти кістяк наших морських сил."
 GRY_trade_interdiction: "Козаки-пірати"
 GRY_trade_interdiction_desc: "Козацька традиція отримає друге життя на морі, ми захоплюватимо та топитимо ворожі конвої, закуємо їх економіку в кайдани."
 GRY_submarines: "Підводне козацтво"
 GRY_submarines_desc: "Підводні човни — один з найпідступніших засобів війни, їх торпеди легко можуть потопити більшість суден. Однак ми маємо уникати есмінців та радарних станцій."
 GRY_marine_focus: "Заснувати морську піхоту"
 GRY_marine_focus_desc: "Один з наших радників висунув ідею — завербувати грифонів, знайомих з десантною тактикою і навчити їх ще краще, аби в майбутньому вони прокладали шлях нашому сухопутному війську."
 GRY_aegland_oil: "Чорне золото"
 GRY_aegland_oil_desc: "Нафта — один з найпоширеніших ресурсів у Грифії, але довгий час ніхто не знав, як її використовувати. Нинішні родовища нафти будуть розширені, щоб забезпечити паливом транспорт, флот і авіацію, ми відправимо геологів, що розвідають необхідні нам джерела."
 GRY_griffons_air_and_sea: "Застосування магії грифонів"
 GRY_griffons_air_and_sea_desc: "То правда, що наша магія слабша ніж у поні та оленів, але принаймні зачарування наші будуть сильні й надійні. Ми знайдемо їм застосування на війні."
 GRY_airforce: "Козаки у небесах"
 GRY_airforce_desc: "А й правда, крилатим ґрунту не треба.\nЗемлі немає, то буде небо.\nНемає поля, то буде воля.\nНемає пари, то будуть хмари."
 GRY_air_company: "$GRY_air_concern$"
 GRY_air_company_desc: "Геніальний авіаінженер Антонінов відвідав столицю, запропонував чудову ідею, якщо ми просубсидуємо його компанію та забезпечимо її пільгами, він створить основу для авіації нашої держави. Оскільки нема причин сумніватись у його таланті створювати нові літаки, ми великодушно приймемо його пропозицію." # Антонінов цікаво
 GRY_import_fighter_designs: "Закупка винищувачів"
 GRY_import_fighter_designs_desc: "Аби підкорити собі небеса, необхідні легкі літаки. Ми закупимо трохи за кордоном."
 GRY_import_bomber_designs: "Дістати креслення бомбардувальників"
 GRY_import_bomber_designs_desc: "Бомбардувальники необхідні, якщо ми хочемо влаштувати палаюче пекло і дощ з розпеченої сталі."
 GRY_decide_air_doctrine: "Повітряна доктрина"
 GRY_decide_air_doctrine_desc: "Ми можемо обрати, як краще буде використовувати нашу авіацію. Чи зосередимось ми на бомбардуванні супостатів та їх промисловості, чи ми хочемо мати перевагу у повітрі?"
 GRY_light_aircraft: "Акцент на винищувачах"
 GRY_light_aircraft_desc: "Винищувачі стануть опорою нашої авіації, оскільки вони надійніші за бомбардувальники."
 GRY_heavy_aircraft: "Акцент на бомбардувальниках"
 GRY_heavy_aircraft_desc: "Ворог не спроможний воювати без промисловості та солдат — ті вразливості, по яких боляче битимуть наші бомбардувальники."
 GRY_cossacks_are_naturals: "Тренування ДШВ"
 GRY_cossacks_are_naturals_desc: "Козацтву не важко підняти на спину важкий вантаж, але тоді він не полетить. Тим не менш, із добрим парашутом, десантики можуть висадитись безпосереденьо за фронтом ворога, будучи повністю оснащеними, та застати його зненацька."
 GRY_better_radars: "Розширити огляд"
 GRY_better_radars_desc: "Радари необхідні для виявлення ворожої авіації. Ми розширимо нашу мережу радіовишок та покращимо наявні технології, так що наші пілоти будуть готові до будь-якої загрози."
 GRY_expand_airbases: "Нові ангари"
 GRY_expand_airbases_desc: "Задля належної підтримки авіації необхідні обширні бази та взлітні полоси. А наші широкі степи ще більше нам допоможуть у будівництві."
 GRY_fearless_peerless: "Безстрашні пілоти"
 GRY_fearless_peerless_desc: "Деякі наші пілоти настільки сповнені енергії та бажання захистити свою Батьківщину, що готові пожертувати собою заради звершення тріумфальної атаки на ворога. Ми дамо їм волю, всупереч запереченням обережних командирів. Літакам низька ціна, врешті-решт."
 GRY_ride_the_wind: "Блискавичні"
 GRY_ride_the_wind_desc: "Майбутнє військової авіації за реактивними двигунами! За допомогою найпередовіших винаходів, Небесне Козацтво стане вправду невловимим."

 # Таємний нейтральний шлях
  GRY_raise_the_militia: "Сформувати ополчення"
  GRY_raise_the_militia_desc: "Ми наспіх створимо спеціальні добровільні загони для всіх бажаючих, що хочуть нам допомогти у цій громадянській війні."
  GRY_empty_the_prisons: "Залучити бандитів"
  GRY_empty_the_prisons_desc: "Сумно те, що ми маємо опиратись на покидьків нашої країни, щоб визволити наш народ від червоної тиранії, але звичайно, комуністи гірші. Принаймні, грифони із в'язниць знають, як пускати кров."
  GRY_musket_stashes: "Стара зброя"
  GRY_musket_stashes_desc: "Щоб перемогти, нам доведеться грабувати хати заради старої зброї. На щастя, вона ще стріляє."
  GRY_hetman_has_won: "Перемога!"
  GRY_hetman_has_won_desc: "Експеримент на ім'я "Каївська комуна", нарешті, зупинений, і тепер статус-кво буде відновлений по усій Грифії."
  GRY_rebuild_nation: "Загоїти рани"
  GRY_rebuild_nation_desc: "Війна роз'єднала численні сім'ї та збіднила нашу землю. Ми розпочнемо з відновлення промисловості та доріг."
  GRY_literacy_issue: "Просвітництво"
  GRY_literacy_issue_desc: "Аби знищити червону пошесть в головах грифонів, ми створимо освітню програму, щоб простий народ зрозумів, що комунізм не вирішить вмить їх проблеми."
  GRY_our_industry: "Відновити зпустошену промисловість"
  GRY_our_industry_desc: "Майже всі наші заводи були знищені у війні, і до цього, напевне, причетні ці брудні комуністи. Нам доведеться добряче попрацювати, щоб відновити старі заводи та відкрити нові."
  GRY_hire_foreign_instructors: "Запросити закордонних вчених"
  GRY_hire_foreign_instructors_desc: "Немов Грифії й так не вистачало вчених грифонів, нещодавня криза змусила ще більше з них втікти з країни. Тому нам доведеться самостійно звернутися до дослідників з-за кордону. Ми вимушені шукати дослідників тут і закордоном."
  GRY_the_restoration: "Реставрація Гетьманату"
  GRY_the_restoration_desc: "Тепер, коли влада у країні відновлена, ми можемо зосередитись на відродженні нашої країни після смерті останнього Гетьмана."
  GRY_crush_communism: "Розгромити ГСДРП"
  GRY_crush_communism_desc: "Прихильники комунізму може і хочуть кращого для народу Грифії, але вони так зруйнували свою репутацію своїми "реформами", це ще не кажучи про те, що вони можуть бути причетними до смерті Гетьмана Бульби. Маар забере їх! Не буде більше в Грифії червоної пошесті!"
  GRY_betray_black_cloaks: "Позбутися Чорних плащів"
  GRY_betray_black_cloaks_desc: "Чорні плащі допомогли нам перемогти комуністів, але більше вони нам не потрібні. Їх треба прикінчити, поки їхні бездумні дії не призвели до чергової Руїни."
  GRY_reverse_land_reform: "Повернення земель"
  GRY_reverse_land_reform_desc: "Комуністи безправно відібрали споконвічні землі шляхтичів! Ми негайно проведемо реституцію майна!"
  GRY_noble_donations: "Вдячна шляхта"
  GRY_noble_donations_desc: "Шляхта Грифії прагне золота, як і кожен грифон, але відновлення порядку зробило їх нескінченно вдячними. Наша скарбниця розривається від грошей, що значно облегшить відбудову країни." #прагне золота, як і кожен грифон)))
  GRY_round_up_traitorous_clans: "Домовленності з незгодними січами"
  GRY_round_up_traitorous_clans_desc: "Деяким січам вистачило нахабності перейти на бік комуністів! Ми відізвемо їх привілеї та вольності, допоки вони знову не стануть вірними."
  GRY_reward_loyal_clans: "Винагородити вірних"
  GRY_reward_loyal_clans_desc: "На щастя, більшість січей допомогла нам у боротьбі проти комуністів. Вони отримають належну нагороду."
  GRY_the_hetman_alone: "Абсолютне правління"
  GRY_the_hetman_alone_desc: "Нещодавні події показали, що загравання з так званими "ідеологіями" та формами правління до добра не доводять. Рада повернеться до традиційних виборів гетьмана, як і раніше."
  GRY_retain_democratic_tradition: "Гармонічні симпатії"
  GRY_retain_democratic_tradition_desc: "Деякі гармонічні ідеї мають право на життя, тому влада використає їх у своїй політиці. Врешті-решт, важко й подумати, як вони можуть зпричинити заворушення."
  GRY_back_to_the_empire: "Попросити захисту в Імперії"
  GRY_back_to_the_empire_desc: "В цю нелегку годину ми маємо заручитись підтримкою найсильніших держав світу. Ми направимо емісара до Грифенхейму, щоб обговорити відновлення статусу марки і повернення імперських привілегій."
  GRY_imperial_funding: "Фінансова підтримка з Імперії"
  GRY_imperial_funding_desc: "Хвала Борею! Імперія погодилась поновити наші домовленості, і тепер різні товари постачаються в Грифію. На жаль, тепер ми маємо воювати з будь-якою державою, що Імперія вважає своїм ворогом, але помститись Річним Поні ми не проти."
  GRY_remain_independent: "Самостійництво"
  GRY_remain_independent_desc: "Грифія роками існувала одна, а після відродження нашої Батьківщини, нам тим більше ніхто не потрібен. Вони лиш втягнуть нас у свої міжусобиці."
  GRY_renewed_raiding: "Поновити грабунки"
  GRY_renewed_raiding_desc: "Вічний і далекий той козацький шлях,\nЛине, лине слава добра у віках!\nСтихли звуки бою - козаки ідуть,\nСотні літ минуло - в пам'яті живуть!"
  GRY_seek_other_allies: "Оглянутись на сусідів"
  GRY_seek_other_allies_desc: "Самі ми дуже вразливі, тому новий Гетьман вирішив підписати союз з нашими сусідами, щоб відбити загрозу поні та комуністів."
  GRY_trade_and_research: "Довіра, торгівля, взаємопоміч"
  GRY_trade_and_research_desc: "Надійний союз забезпечить плодовиту торгівлю та наукове співробітництво між нашими державами."
  GRY_further_civvies: "Козацькі кузні"
  GRY_further_civvies_desc: "З тих пір, як ми почали програму економічної модернізації, варто побудувати сучасний промисловий комплекс. Нові заводи у велики обсягах забезпечать добробут та робочі місця для всіх Зафійців. І ніхто не залишиться ображеним!"
  GRY_further_mils: "Козаки, знову добою!"
  GRY_further_mils_desc: "Сучасна нація не може існувати без передової зброї. Кузні минулого — застарілі, ми маємо створити по-справжньому ефективний військово-промисловий комплекс, що завжди підпитає машину війни."
  GRY_powerful_economy: "Сучасна економіка"
  GRY_powerful_economy_desc: "Ми зуміли створити міцну промислову базу, що забезпечить потреби передової держави, наша економіка росте! Завдяки щедрим землям Зафії ми виросли щасливими і богатими!"
  GRY_secure_safety: "Захистити наші кордони"
  GRY_secure_safety_desc: "Нехай Борад хоче, щоб зафійський народ жив у мирі із сусідами, але з деякими сусідами примиритись неможливо. Славний козацький народ дочекається кращих часів, аби зломити хребти кожному, хто посягне на Зафійські вольності."
  GRY_stop_GRW: "Червона загроза"
  GRY_stop_GRW_desc: "Прайвенські революціонери нічого не тямлять в наших традиціях! Незалежно від того, наскільки ці вилупки піклуються про народ, вони ігнорують вольності "реакційних" країн. Вони вже внесли своїх прихвоснів у нашу країну, та це лиш справа часу, коли ж на нас нападуть комуністи! Ми зобов'язані зупинити цих недоумків, допоки вони не вирізали всіх нас до чорта!"
  GRY_stop_WNG: "Не наступай на козака!"
  GRY_stop_WNG_desc: "Вінґбардія для нас була дивною країною, що знаходиться за тридев'ять земель і куди частина молоді їде вчитись. Втім, новий уряд Вінґбардії почав активні воєнні дії та захопив усі країни-сусіди. Та скоро вони дістануть до наших степів! Лиш повний бовдур не бачить тієї ями, що вони нам викопали! Ми маємо знищити їх, поки не пізно!"
  GRY_stop_LCT: "Давня ненависть"
  GRY_stop_LCT_desc: "Всім зрозуміло, що з-за наших вікових набігів поні Єзераграду дуже бояться крові. Хоч ми й поклялись, що під крилом Грифницького ми не здійснюватимемо набіги, вони нам не вірять. Та більш того, нещодавно вони обрали вкрай мілітаристський уряд. Фактично, ми — їх перша ціль. Чи ми перші нападемо на Єзераград та знищимо його, чи він нас."
  outdated_ind_or_higher: "Має §YМолоде індустріальне суспільство§! чи §YСучасне суспільство§!"
  has_an_outdated_ind: "Має §YМолоде індустріальне суспільство§!"
  has_a_modern_society: "Має §YСучасне суспільство§!"

 # Шлях маріонетки нацистів
  GRY_lord_protector: "Новий порядок"
  GRY_lord_protector_desc: "На континенті з'явилася нова сила, вільна від колишніх кайданів шляхти. Втративши незалежність від цієї сили, Грифію було реформовано в імперську прикордонну марку під владою іноземного губернатора." # (@)
  GRY_the_imperial_march: "Райхскомісаріат Козакенланд"
  GRY_the_imperial_march_desc: "Цих диких грифонів потрібно приборкати і навчити знати своє місце. Вони мусять бути раді, що ми дозволили їм існувати як протекторат. А тепер перейдімо до адміністративних питань." # (@)
  GRY_convince_the_warriors: "Забезпечити вірність воїнів"
  GRY_convince_the_warriors_desc: "Запеклі воїни Зафії — горді та волелюбні. Це проблемне поєднання, але ми маємо способи переконати їх боротися за нас і наші інтереси." # (@)
  GRY_convince_the_people: "Запевнити народ"
  GRY_convince_the_people_desc: "Хоча грифони Зафії задоволені своїм традиційним, ізольованим способом життя, вони неодмінно стануть перешкодою, коли ми почнемо експлуатувати багатства цієї землі. Необхідно докласти зусиль, щоби народ залишався відносно задоволеним." # (@)
  GRY_focus_on_war: "Військова справа" # (&?)
  GRY_focus_on_war_desc: "Щоби нагадати населенню, що ми контролюємо ситуацію зараз і назавжди, нам потрібні спеціальні сили для підтримання порядку. Це полегшить управління цими землями." # (@)
  GRY_focus_on_resources: "Експлуатувати землю"
  GRY_focus_on_resources_desc: "Грифія — земля, багата на невикористані родовища корисних копалин! Лорд-протектор установив щомісячну квоту, і видобуток мусить розпочатися негайно. Розширюйте існуючі шахти та наймайте геодезистів, щоби знайти додаткові багатства!" # (@)
  GRY_lower_recruitment_age: "Полегшені стандарти солдата" # (&+)
  GRY_lower_recruitment_age_desc: "Грифонячі ресурси завжди користуються попитом, і нескінченні війни нашого володаря вимагають їх. Починаючи з цього моменту, критерії вступу до збройних сил будуть знижені." # (@)
  GRY_guns_for_manpower: "Грифони за зброю"
  GRY_guns_for_manpower_desc: "Щоби прагнути до більших досягнень і залишатися вірними своїй природі, ми мусимо співпрацювати. Здорові, здібні солдати цієї землі будуть відправлені на фронт, а ми натомість отримаємо те, що потрібно для зміцнення нашого контролю над регіоном." # (@)
  GRY_tech_for_manpower: "Грифони за технології"
  GRY_tech_for_manpower_desc: "Ми з'ясували, що наш володар готовий обміняти гвинтівки на солдатів, тому логічно розширити цю імпровізовану торгівлю, включивши в неї вчених. Технологічний розвиток регіону — вражаюче низький." # (@)
  GRY_heritage_indoctrination: "Стара слава"
  GRY_heritage_indoctrination_desc: "З бойового стилю козаків Зафії можна багато чого навчитися. Було б розумно вивчити їхні тактику й бойові здібності." # (@)
  GRY_promise_of_land: "Залучити іммігрантів із Герцланду"
  GRY_promise_of_land_desc: "Позаяк стару шляхту позбавлено своїх прав і володінь, ми опинилися у володінні величезними землями, які ідеально підходять для поселення колоністів. Пропонуйте їх за низькою ціною охочим громадянам Герцланду: нам потрібно відновити населення." # (@)
  GRY_industry_for_manpower: "Грифони за промисловість"
  GRY_industry_for_manpower_desc: "Для продовження розвитку й експлуатації цього регіону нам потрібна важка промисловість, якої в цій місцевості просто немає. На щастя, у нас завжди є більше охочих грифонів, яких можна обміняти." # (@)
  GRY_find_more_labor: "Примусова служба"
  GRY_find_more_labor_desc: "Якщо він може тримати рушницю та стріляти, цей грифон — солдат! Призивайте на службу стільки, скільки зможете знайти!" # (@)
  GRY_griffonian_exploitation: "Сполучити шахти"
  GRY_griffonian_exploitation_desc: "Щоби почати отримувати вигоди від співпраці, всі кар'єри, шахти, копальні та інші родовища ресурсів мусять бути сполучені відповідною інфраструктурою, щоби можна було видобувати кожну частинку цінних ресурсів." # (@)
  GRY_tsumina_metals: "Розширення цумінських шахт"
  GRY_tsumina_metals_desc: "У пагорбах Цуміни знаходяться великі поклади бокситів і вольфрамітової руди. Нинішні шахти не задовольняють потреби нашого володаря, тому їх необхідно негайно розширити." # (@)
  GRY_invite_krahstahl: "Запросити імперіські компанії"
  GRY_invite_krahstahl_desc: "Спроби Грифії модернізуватися були незграбними й неефективними. Найбільш помітно це в їхньому виробництві сталі, яка є крихкою й виробляється в мізерних кількостях. На щастя, є багато імперських конгломератів, які з радістю втрутяться й візьмуть контроль над цим процесом." # (@)
  GRY_greatest_asset: "Пальне для машин війни"
  GRY_greatest_asset_desc: "Безсумнівно, найбільшим надбанням Зафії є її величезні запаси нафти. Вона навіть вільно витікає з-під землі! Лорд-протектор визначив нафту найважливішим ресурсом, і ми мусимо зробити все, щоби її видобуток залишався на високому рівні." # (@)
  GRY_we_made_it: "Зразковий протекторат"
  GRY_we_made_it_desc: "Наш контроль над цим регіоном забезпечено, і лорд-протектор дуже задоволений нашими досягненнями тут. Наша активна співпраця принесла плоди, які ми зараз пожинаємо." # (@)

### ПОДІЇ ###
 gryphianhost.100.t: "Нас Інтегрують"
 gryphianhost.100.d: "Наші союзники у Прайвені вимагають анексію. Ми можемо протистояти, але це може бути даремно."
 gryphianhost.100.a: "Ми сидітимо слухняно"
 gryphianhost.100.b: "Ми скористаємося нашими можливостями"
 gryphianhost.102.t: "[Root.PRYRaidTitle]"
 gryphianhost.102.d: "[Root.PRYRaidDesc]"
 gryphianhost.102.a: "Набіг вдався!"
 gryphianhost.102.b: "Набіг провалився!"
 gryphianhost.103.t: "Проголошення Каївської Комуни"
 gryphianhost.103.d: "В свомєу першому Універсалі, Центральна Рада Грифійського Гетьмана офіційно заявила про розпущення старого уряду, та негайно проголосила, що віднині долю грифонів вершитиме Каївська Комуна — тепер в країні встановлена диктатура пролетаріату."
 gryphianhost.103.a: "З кожним днем все радісніше жити!"
 gryphianhost.104.t: "Каївська комуна проявляє пролетарську солідарність"
 gryphianhost.104.d: "Грифони Грифійської Січі повалили свій реакційний уряд і бажає стати нашим союзником у прояві соціалістичного братерства! Як нам слід відповісти?" # (&+)
 gryphianhost.104.a: "Ми тепло вітаємо наших нових товаришів!"
 gryphianhost.104.b: "Вони ревізіоністи. Ми не можемо ставити нашу революцію під загрозу." # (&+?)
 gryphianhost.105.t: "Шокуюча пропозиція"
 gryphianhost.105.d: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] дивовижну пропозицію — настільки дивовижну, що спочатку її сприйняли як жарт. Однак нас запевнили, що ні, Грифійська Січ дійсно хоче приєднатися до Річкової коаліції. Їхній лідер, Борад Грифницький, заявляє, що відданий ідеї гармонії і що його народ почав нове життя. Більшість поні ставиться до цього скептично, але дехто наполягає, що варто спробувати — зрештою, якщо вони порушать свою обіцянку, ми завжди зможемо їх знову вигнати, чи не так? Більшість членів Коаліції не мають особливо чіткої думки з цього приводу, за винятком трьох. Єзераград і Віттенленд є традиційними цілями набігів грифійців і дуже постраждали. Їхня громадськість буде сильно противитися змінам у цьому питанні. Німбусія, з іншого боку, знаходиться далеко від грифонів, але вважає себе захисником усіх річкових поні й не підтримає жодні дії, які можуть загрожувати безпеці Річкових земель. Ми можемо очікувати такі реакції:\n[Root.NIMreaction]\n[Root.LCTreaction]\n[Root.WITreaction]" # (@)
 gryphianhost.105.a: "Вони змінилися на краще. Ми можемо їм довіряти."
 gryphianhost.105.c: "Невже вони справді думають, що ми віримо, що вони можуть так раптово змінитися?" # (&+)
 gryphianhost.106.t: "Старі рани загоєні"
 gryphianhost.106.d: "На наш безмірний подив та щастя, річкові поні обдумали дії наших пращурів та визнали наше нове, гамонічне суспільство. Тепер ми — повноправний учасник Річної Коаліції! Можливо, ця подія стане відправною точкою у дружбі між поні й грифонами."
 gryphianhost.106.a: "Чудово!"
 gryphianhost.107.t: "Що було, того не зміниш"
 gryphianhost.107.d: "Дуже шкода, хоч і очікувано, але річкові поні відхилили наше прохання. Ми не зможемо запросити в них підтримку, дружбу чи захист."
 gryphianhost.107.a: "Що було, те загуло"
 gryphianhost.108.t: "Велика зміна, якщо таке можливо"
 gryphianhost.108.d: "Стався шокуючий поворот: наш стародавній ворог, Грифійська Січ, нещодавно подав заявку на членство в Річковій коаліції — і [From.GetName] дає згоду! Хоча це викликало протести з боку багатьох наших громадян, грифійці, схоже, справді змінилися, і [Root.GetLeader] запевняє народ, що все буде гаразд і що грифійців виженуть за першої ознаки біди. І коли ж не всі задоволені ситуацією, поки що, вони готові це стерпіти." # (&+?)
 gryphianhost.108.a: "Я буду стежити за ними."
 gryphianhost.109.t: "Тріумф здорового глузду"
 gryphianhost.109.d: "Стався шокуючий поворот: наш стародавній ворог, Грифійська Січ, нещодавно подав заявку на членство в Річковій коаліції! На щастя, [From.GetLeader] має достатньо глузду при собі, щоби відхилити їхню пропозицію, не вірячи їхнім сміховинним завяам, що вони повністю змінилися." # (&+?)
 gryphianhost.109.a: "Добре знати, що [From.GetLeader] не зовсім з'їхав з глузду." # чи можна використати - з'їха[Root.Leader.GetVerbGendEndA_RU] ?
 gryphianhost.110.t: "Наруга!"
 gryphianhost.110.d: "Скандал! Жах! Безумство! Нещодавно Грифійська Січ зробила шокуючий хід, попросивши про членство в Річковій коаліції, і [From.GetLeader] ДАЄ ЇМ ЗГОДУ! [Root.GetLeader] виголошує гучний протест проти цієї шокуючої зради нашого народу. Ці грифони століттями грабували, вбивали та нищили наш народ, а [From.GetLeader] справді вірить їхнім безглуздим заявам про те, що вони змінилися? У відповідь [Root.GetLeader] офіційно оголошує про вихід із Річкової коаліції, адже видно, що вона не має на думці наші найліпші інтереси." # (&+)
 gryphianhost.110.a: "Як вони могли нас так зрадити?"
 gryphianhost.111.t: "[From.GetName] бажає співпрацювати"
 gryphianhost.111.d: "Сьогодні Карфін відвідав дивний грифон зі сходу, [From.GetLeader]. Він — правитель держави [From.GetName] і він висловив захоплення фашистською ідеологією Біколіні. Якщо Вінґбардія допоможе йому, то, як він стверджує, він поширить фашизм по всій долині Еві, захистивши фронтир від комунізму та поні. Хоча ця пропозиція інтригуюча, правдою залишається те, що Грифія — віддалена країна." # (&+?)
 gryphianhost.111.a: "Нащо нам відмовляти можливим союзникам?"
 gryphianhost.111.b: "Нам однаково на грифонів фронтиру."
 gryphianhost.112.t: "[From.GetName] згодні!"
 gryphianhost.112.d: "[From.GetLeader] офіційно приймає пропозицію [Root.GetLeader] про взаємну дружбу і співробітництво. Ми отримали зброю і військових радників від держави [From.GetName]."
 gryphianhost.112.a: "Гарні новини."
 gryphianhost.113.t: "[From.GetName] не згодні!"
 gryphianhost.113.d: "[From.GetLeader] відмовляється від союзу з нами, аргументуючи це проблемами в своїй країні. Нам доведеться шукати захист в іншому місці."
 gryphianhost.113.a: "Забирайтеся."
 gryphianhost.114.t: "Грифійці пропонують союз"
 gryphianhost.114.d: "Представники з держави [From.GetName] прибули сьогодні до урядових будівель з пропозицією, яку ми очікували. Дотепер грифійці були відомі як жорстокі розбійники, і ми не дуже любили зустрічатися з ними, незважаючи на нашу далеку родинну спорідненість. Однак останніми роками вони реформували свій уряд, зробивши його більш мирним, і заявили про зацікавленість у створенні «братства зафійців», яке об'єднає всіх грифонів зафійського походження, включно з нами. Хоча ми не називали себе зафійцями вже понад тисячу років, дехто в нашій країні вважає цю пропозицію привабливою. Як нам відповісти?" # (@)
 gryphianhost.114.a: "Ми з радістю долучимося до цієї ініціативи."
 gryphianhost.114.b: "Ми давно не зафійці."
 gryphianhost.115.t: "Питання корони"
 gryphianhost.115.d: "[Root.GetLeader] ретельно викорінив усіляку опозицію і затвердився правителем всіх зафійців. Влада його настільки масштабна, що, мабуть, він здатний заявити про права на давно втрачений титул Короля Зафії, що возродить згаслу славу нашого народу. Разом із тим, в нас є міцна традиція демократичних виборів, і, можливо, разумніше (та не настільки спірно) нашому лідеру було б взяти титул гетьмана (бо він, звичайно, не програє у виборах)."
 gryphianhost.115.a: "Слава Королю!"
 gryphianhost.115.b: "Ми повинні зберегти наші демократичні традиції..."
 gryphianhost.116.t: "Доля реакціонерів"
 gryphianhost.116.d: "Ми не знаємо, що робити з нашими братами-козаками. Хоч деякі й підтримали ГСДРП у революції, майже всі козаки — стійкі прихильники старого порядку. Саме вони найбільше критикують нашу владу, та крім того, в них же більше за всіх досвіду у військовій справі. Ми можемо просто їх розстріляти, але таке рішення може бути вкрай непопулярним та залишить нашу армію без голови. Можливо, краще було б переконати їх увійти до складу нашої Червоної Армії? Це куди легше, до того ж, ми отримаємо з цього лиш переваги — але чи можемо ми бути впевненими в їх вірності?"
 gryphianhost.116.a: "Пробачити та інтегрувати їх у Червону Армію."
 gryphianhost.116.b: "Реакційним елементам нема місця в нашій армії! На них чекатиме лиш розстріл!"
 gryphianhost.117.t: "Другий універсал Каївської комуни"
 gryphianhost.117.d: "[Root.gryevent117loc]"
 gryphianhost.117.b: "Ми маємо об'єднатись з нашими старшими братами по соціалізму."
 gryphianhost.117.a: "Ми запалимо вогонь революції, з кимось чи самі!"
 gryphianhost.118.t: "Каївська комуна пропонує тісніші зв'язки"
 gryphianhost.118.d: "Грифони Каїва скинули кайдани гноблення і заснували соціалістичну державу на берегах річки Еві. Побачивши, що й ми прийшли до визнання величної слави соціалізму, вони запропонували налагодити з нами тісніші зв’язки, щоб забезпечити мирну співпрацю між соціалістами та захистити революцію від ворожих іноземних держав. Однак серед наших найвищих посадовців точаться суперечки щодо того, наскільки далеко нам слід йти у прийнятті цієї пропозиції. Більшість із задоволенням приймають пропозицію Каїва про захист, але дехто бажає піти далі і безпосередньо об’єднатися з ними проти сил реакції."
 gryphianhost.118.a: "Взаємний захист — так, але кожен із нас мусить будувати свій комунізм." # (&+?)
 gryphianhost.118.b: "Ми малі й оточені. Союзники будуть корисні."
 gryphianhost.119.t: "Каївська комуна пропонує спільний наступ"
 gryphianhost.119.d: "Лідери Каївської комуни прибули до нас із серйозною пропозицію, такою, що може суттєво вплинути на майбутнє всіх нас. У їхній державі зростає мілітаризм, і їхній народ з нетерпінням жадає негайно поширити революцію силою. Це би не було проблемою, якби не факт, що вони бажають напасти на свого сусіда, Віттенленд. Віттенлендом керують корумповані еліти, і держава їхня, безумовно, реакційна й гідна знищення, але їх також захищає вся Річкова коаліція. Війна проти нього майже напевне накличе на наші голови лють річкових поні, і цю перспективу не можна сприймати леговажно. Якщо ми хочемо відмовити їх від цієї атаки, нам слід зробити це зараз, і силоміць." # (&)
 gryphianhost.119.a: "Підтримаймо наступ! Річкові поні теж мусять побачити світло комунізму!"
 gryphianhost.119.b: "Це занадто ризиковано, це божевілля! Накажіть їм відступитися!"
 gryphianhost.120.t: "[From.GetName] захищає нас"
 gryphianhost.120.d: "Наше прохання було почуте, союзник прийшов допомогти! [Root.GetName] погодились приєднатись до нас у боротьбі за визволення робітників Віттенленду"
 gryphianhost.120.a: "Що ж, до бою!"
 gryphianhost.121.t: "Ультиматум від [From.GetName]"
 gryphianhost.121.d: "Наші союзники наспіх відповіли на прохання. Вони заявили, що зараз напад на Віттенленд може стати катастрофою для обох держав, і тому вони категорично відмовляються допомогти нам у такій авантюрі. Вони надіслали жорсткий ультиматум — або ми відкликаємо претензії на Віттенленд, або наш союз буде офіційно розірваний."
 gryphianhost.121.a: "Покидьки! Нас не зупинити! До бою!"
 gryphianhost.121.b: "Ми не можемо жертувати нашими відносинами із друзями — відкликати претензії!"
 gryphianhost.122.t: "[From.GetLeader] обриває зв'язки"
 gryphianhost.122.d: "Каїв'яни не послухали нас, докоривши нам за «боягузтво» та «ревізіонізм». Надійшов лист, у якому [From.GetLeader] офіційно розриває зв'язки з державою [Root.GetName], і [From.Leader.GetHerHis] плани із вторгнення у Віттенленд просуваються без зупинок." # (&+?)
 gryphianhost.122.a: "Вперті дурні!"
 gryphianhost.123.t: "[From.GetLeader] відступається"
 gryphianhost.123.d: "Під нашим тиском [From.GetLeader] відкликає свою ворожу риторику у відношенні Віттенленду та тихо відкладає свої плани із вторгнення. Схоже, цього разу переміг мир." # (&+?)
 gryphianhost.123.a: "Принаймні ми не вліземо в дурну, невиграшну війну."
 gryphianhost.124.t: "Відновлення контактів"
 gryphianhost.124.d: "Не зважаючи на те, що у війні ми стали відрізані від усього світу, тепер всім зрозуміло, що можемо перемогти річкових поні. Тепер грифони повернуться до звичайного життя."
 gryphianhost.124.a: "Нарешті!"
 gryphianhost.125.t: "Контрреволюція!"
 gryphianhost.125.d: "Погані новини! Наша конфіскація великих володінь дуже розгнівала шляхту, а наша нерішучість побудила їх на повстання. Разом із незадоволеними частинами армії та всією антикомуністичною шляхтою об'єдналась в Грифійську Конфедерацію. Вони мають наміри скинути нинішню владу і встановити старий Гетьманат. Хаос зійшов на наші землі, почалась громадянська війна..."
 gryphianhost.125.a: "Революція переможе!"
 gryphianhost.125.b: "Слава Гетьману!"
 gryphianhost.126.t: "Офіцери зрадили нас!"
 gryphianhost.126.d: "Ще більше поганих новин! Ми завжди сумнівались у вірності старих офіцерів, хоч і здавалося, що вони були раді з нами співпрацювати. Але ми взагалі й не знали, що вони лиш виграли час для контрреволюції! Тепер реакційні сили повстали проти комунізму, кілька наших найдосвіченіщих генералів присягнули на вірність Гетьману і перейшли на бік повстанців."
 gryphianhost.126.a: "Ми повинні були їх викорінити, коли ще могли!"
 gryphianhost.127.t: "[From.GetName] приєднуються до нас"
 gryphianhost.127.d: "Сьогодні, дипломати з [From.GetName] прибули до Центральної Ради, щоб підписати договір, про вступ у наш альянс. Ми обмінялись дарами, і всі тепер сподіваються, що це перший крок до миру та процвітання для обох наших народів."
 gryphianhost.127.a: "Дерево міцне корінням, а грифон — друзями!" #і можливо марками
 gryphianhost.128.t: "[From.GetName] відмовляє нам"
 gryphianhost.128.d: "Сьогодні, дипломати з [From.GetName] прибули до Центральної Ради з поганими новинами. Лідери їхньої країни відмовились приєднатись до нашого альянсу взаємного захисту та торгівлі."
 gryphianhost.128.a: "Ганьба!"
 gryphianhost.129.t: "Грифійська Січ порушує свою клятву"
 gryphianhost.129.d: "На наше розчарування, Грифійська Січ порушила свою клятву вірності, вторгнувшись у регіон, який офіційно є частиною нашої держави. Наші гарантії їхнього захисту було анульовано, а імперські субсидії для їхніх земель було заморожено на невизначений строк." # (&)
 gryphianhost.129.a: "Просто зграя зрадників!"
 gryphianhost.130.t: "Ми порушили нашу клятву"
 gryphianhost.130.d: "Наш нещодавній акт був очевидним порушенням договору з Його Величністю. Почавши цю війну, [Root.GetLeader] посадив нас у порохову діжку. Наші гарантії про захист тепер недійсні, а імперські субсидії були заморожені на невизначений строк."
 gryphianhost.130.a: "Цього не варто було робити..."
 gryphianhost.131.t: "Гетьман просить про відновлення прикордонної марки"
 gryphianhost.131.d: "Давним-давно Ґровер I, великий засновник Імперії, уклав угоду з козаками з далекого східного берега річки Еві. Він обіцяв захищати їх від нападів ворожих річкових поні в обмін на їхню лояльність і частину прибутку від їхніх частих набігів на ворожу територію. Ця угода дотримувалася протягом століть, але в останні десятиліття ми були занадто слабкі, щоби вимагати сплату данини або запобігати дрібним набігам на наших номінальних підданих. Однак сьогодні, побачивши наше посилення, гетьман Січі відправив посланця до Грифенгайма з проханням про відновлення статусу його народу як імперської марки. Вони захищатимуть кордони Імперії й атакуватимуть наших ворогів в обмін на фінансування й обіцянки захисту в разі нападу ворожих сил." # (@)
 gryphianhost.131.a: "Отже, козаки нарешті повернулися додому? Відновити марку!"
 gryphianhost.131.b: "Нас більше не турбують якісь давно не дійсні домовленості." # (&+)
 gryphianhost.132.t: "Імператор відає і захищає."
 gryphianhost.132.d: "На превелике щастя, Імператор прийняв наше прохання про становлення імперскою маркою. До тих пір, допоки ми не посягатимемо на імперські домени (як і на землі під контролем повсталих провінцій), все буде добре. (При оголошенні війни з'явиться попередження, якщо ви захочете оголосити війну державі, на яку вам не дозволено)."
 gryphianhost.132.a: "Слава Імператорові, Архонтам слава!"
 gryphianhost.133.t: "Імперська немилість"
 gryphianhost.133.d: "На жаль, Імператор не виразив ніякої зацікавленості в нашому статусі прикордонної марки. Здається, що йому начхати як і на нас, так і на Річкові Землі."
 gryphianhost.133.a: "Як прикро."
 gryphianhost.134.t: "Поворот долі"
 gryphianhost.134.d: "Ох! Підчас супроводження козаків під час останнього набігу, Гетьман Бульба був мітко застрелений червоним стрільцем! Загін козаків, нездатних втримати свій гнів, піймав вбивцю та жорстоко вбив його, але це не допомогло. Гетьман вмер миттєво, мушкетна куля чітко пролетіла через його мозок. Його смерть зупинила радісний настрій. За старою традицією, козаки похоронили гетьмана в місці його народження, при супроводженні найвірніших його бійців. Гетьман Бульба вів нас більше сорока років і всі його любили. Найгірше з того, що він помер без прямого наступника, а це означає, що вибори наступного Гетьмана будуть важкі."
 gryphianhost.134.a: "Сьогодні ми скорбимо, завтра знов взійдемо."
 gryphianhost.135.t: "Поворот долі"
 gryphianhost.135.d: "Ох! Під час допомоги деяким пораненим бійцям, що впали у відчай після проваленого набігу, Гетьман Бульба був мітко застрелений комуністичним стрільцем! Загін козаків, нездатних втримати свій гнів, піймав вбивцю та жорстоко вбив його, але це не допомогло. Гетьман вмер миттєво, мушкетна куля чітко пролетіла через його мозок. Його смерть стала найбільшою трагедією цього провального походу, а за старою традицією, козаки похоронили гетьмана в місці його народження, при супроводженні найвірніших його бійців. Гетьман Бульба вів нас більше сорока років і всі його любили. Однак, без здобичі, яку ми намагались здобути після набігу, навряд чи країна зможе відновитись та не скотитись у анархію. Гетьман Бульба був останньою волосиною, яка втримувала це роздріблене суспільство, і тепер ця волосина розірвана. Анархія заполонила вулиці, лиш найсильніший та найорганізованіший рух переможе в кінці."
 gryphianhost.135.a: "Сьогодні ми скорбимо, завтра знов взійдемо."
 gryphianhost.136.t: "Запалити Полум'я"
 gryphianhost.136.d: "З визволенням трудівників Прайвену від буржуазної тиранії, ми вирішили відновити Прайвенську Визвольну Армію, щоб ефективніше керувати регіоном, а разом з тим через повагу до того, що ми зобов'язані Прайвенським революціонерам за їх фінанси та військову підтримку у нашій революції. Але в Профбюро гаряче сперечаються із приводу того, чи варто давати Редґледові та його товаришам широкі повноваження. Краще дати їм символічні ролі, поки ми особисто керуватимемо країною."
 gryphianhost.136.a: "В регіоні все ще безлад. Буде краще, якщо взяти все під прямий контроль."
 gryphianhost.136.b: "Дурниці! Трудівники Прайвену і Каїву рівні!"
 gryphianhost.137.t: "Відновлення Корони"
 gryphianhost.137.d: "Тепер, із визволенням земель Бродфельду, ми зрозуміли, що керувати напряму буде дорого і непросто. Шляхтичі запропонували відновити Королівство Бродфельд, оскільки народ зазвичай куди чутливіший до свого справжнього правителя, не зважаючи на його популярність. Звичайно ж, повноваження короля визначатимемо ми, на свій розсуд..."
 gryphianhost.137.a: "Поставте маріонетку на трон із роду Кіссау, якщо знайдете хоч когось з них."
 gryphianhost.137.b: "Козаки не знають рабства — вони будуть нашими союзниками"
 gryphianhost.139.t: "Козаки нападають"
 gryphianhost.139.d: "[Root.raideventoutcome]"
 gryphianhost.139.a: "До Маара тих козаків!"

 # Події для колориту
  gryphianhost.140.t: "Чорна Рада"
  gryphianhost.140.d: "Зазвичай, ніхто б не звернув на це увагу. Бійки, погрози, образи чийогось походження — все це звично для Ради. Але в наші дні ніщо в Зафії не здається повсякденним.\n\nЯвного кандидата-наступника не було і кожний дрібний дворянин, що відчував, що має хоч якийсь шанс на титул гетьмана, намагався його отримати. Традиція вимагала, щоб в Раді пройшло голосування за кожного з них, через що було витрачено безліч дорогоцінного часу, оскільки ніхто з них не отримав більшість голосів. Ця безвихідь тривала два тижні, допоки найжиттєздатніші кандидати не висунули свої претензії.\n\nБорад Грифницький, підтримуваний багатьма збіднілими дворяними, привернув увагу багатьох своїми обіцянками реформ, миру і стабільності. Хоч багато хто його звинувачує у м'якості щодо питань безпеки, він переконав їх, що пацифізм — це не слабкість. Звичайні жителі Грифії добре відгукуються про Борада.\n\nНедобра репутація, здавалося, прямо переслідувала Євгена Кравельця. Його підтримали багаті землевласники, а пихата, груба риторика привабила багатьох грифонів, котрі бажають повернення до славного минулого. Незважаючи на те, що він — внучатий племінник старого гетьмена, Євген не популярний серед простого народу, та його обрання може призвести до чвар.\n\nЧас іде й Раді треба скоріше обрати нового гетьмана, щоб держава не стала жертвою наступаючої хурделиці..."
  gryphianhost.140.a: "Врешті-решт, лідер буде обраний."
  gryphianhost.141.t: "Сходження Борада Грифницького"
  gryphianhost.141.d: "Іноді, Рада може виявитись неочікувано кровавою подією, однак сьогодні вона відбулась незвично тихо. Вслід за наставшим хаосом, Борад Грифницький став шукати підтримку у своїй справі. І сила його переконаннь та волі, привела до того, що значна більшість проголосувала за те, щоб саме він став новим Гетманом. Єдиними грифонами, незадоволеними результатами, залишились Євген Кравелець та його оточення, які швидко покинули зал зборів та пішли у невідомому напрямку. Дехто побоювався, що Євген, з огляду на його агресивну вдачу, спробує розпалити конфлікт, але нічого подібного не сталося.\n\nНовий гетьман виразив свою подяку і пообіцяв, що вже скоро в Грифію прийдуть реформи, а разом із ними і надійний мир для її грифонів."
  gryphianhost.141.a: "Слава новому Гетьману!"
  gryphianhost.142.t: "Республіканська ідея"
  gryphianhost.142.d: "Іноді, Рада може виявитись неочікувано кровавою подією, однак сьогодні вона відбулась незвично тихо. Вслід за наставшим хаосом, Борад Грифницький став шукати підтримку у своїй справі. Так значні його переконання і сила волі, що значна більшість висказалась за те, щоб саме він став новим Гетманом. Єдиними грифонами, незадоволеними результатами, залишились Євген Кравелець та його оточення, що вже збирались іти, якби не неочіковуна заява Борада про його наміри підготувати перші демократичні вибори в Зафії.\n\nВ цей момент Євген і його прибічники спробували напасти на нового Гетьмана, але були швидко втихомирені іншими грифонами. Дехто, на жаль, був поранений, але хоча б ніхто не помер. Борад тут же засудив Євгена за його звірський нрав та наказав кинути його у в'язницю. Після цього він подякував Раді за підтримку і пообіцяв нам усім світле майбутнє."
  gryphianhost.142.a: "Ми маємо бути обережні з цими новими ідеями..."
  #gryphianhost.143.t: "Зміни в уряді"
  #gryphianhost.143.d: ""
  #gryphianhost.143.a: "Бути головним — не легко."
  gryphianhost.144.t: "Примирення"
  gryphianhost.144.d: "[GRY.GetLeader] не любив Корнила Хрущевича. Взагалі... Він здавався відкритим і доброзичливим, але Борад підозрював, що він щось все таки приховує. Врешті-решт, хто ж міг здійснити таку зраду заради дивної ідеології з далекого континенту? На Борадове нещастя, їм необхідно було працювати разом заради миру.\n\nЗустріч цих двох грифонів пройшла так, як Борад і очікував. Початкова ворожість та незручність у спілкуванні швидко зникли, як тільки були поділені традиційні хліб та горілка, вони сіли разом, аби обговорити майбутнє Зафії, і ступінь, в якій соціалістична політика буде реалізована новим урядом.\n\nВрешті-решт, терор у селах зупинився, і в Грифії знову все спокійно."
  gryphianhost.144.a: "Може, ми й недолюблюємо один одного, але ми можемо працювати разом."
  #gryphianhost.145.t: "Важкі перемовини"
  #gryphianhost.145.d: ""
  #gryphianhost.145.a: "Компроміс на компромісі..."
  gryphianhost.146.t: "Зцілюючи старі рани"
  gryphianhost.146.d: "Релігія рідко була темою для суперечок в Грифії. Разом із традиційним поклонінням Борею також поширені церкви Ейру та Арктуру. Незначні вірування, як поклоніння річці Еві, також популярні. І цей релігійний плюралізм влаштовував майже всіх.\n\nУ тьмі ховались культисти-маарити. Хоч і їх існування ніхто не міг довести, численні богобоязкі грифони їх засуджували. Однак, важливіша проблема — поклоніння пантеону річкових поні. Якщо хтось дізнається, що якийсь грифон вірить у богів поні, він підлягає остракізму, а найзневажливіші — полшавські племена грифонів, що довгий час переживали у землях Єзераграду.\n\nУ межах своєї кампанії по національному об'єднанню Борад Грифницький поставив перед собою ціль — повністю інтегрувати це пригнічене плем'я. Спочатку лідери клану Полшави були налаштовані скептично, але аргументи Борада разом із його особистою харизмою пом'якшили дискусію. Ще невідомо, чи приме суспільство цих незвичних грифонів."
  gryphianhost.146.a: "Не важливо, якому богу ти поклоняєшся, всі ми грифійці."
  gryphianhost.147.t: "Лиш нашими кігтями"
  gryphianhost.147.d: "За минулі роки в Зафії відбулись великі зміни. Тепер далеко не всі грифони працюють щодня на полях і не вважають винаходи, такі, як автомобіль, магією Борея. Вони прийняли сучасність і всі її переваги. Звичайно, поміщики були незадоволені тим, що їх традиційна ієрархія повільно згасала, так як багато грифонів вирішили випробувати свою вдачу в зростаючих промислових містах, таких як Каїв, Гусака, Чикчирин і багато інших. Прогрес настільки великий, що [GRY.GetLeader] запланував промову, яку транслюватись однією з перших наших створених національних радіостанцій. Численні грифони з нетерпінням налаштувались на цю станцію, де б вони не були, чи у власних домах, чи у друзів чи в публічних місцях.\n\n "Грифійці! Я вирішив сьогодні до вас звернутись, тому що хотів сказати, як я вами пишаюсь. Так, кожним грифоном, що працював заради того, щоб досягнути світлого майбутнього. Вам більше не треба проходити великі відстані, щоб дібратись до магазину, щоб здобути поїсти, чи блукати в темряві незнання.\n\nВаші зусилля, ваша відданість і ваша мужність, всі ви працювали в гармонії, щоб привести Грифію до сучасності, і з нашою першою прийнятою конституцією, вона по праву дістанеться всім нашим дітям! Грифія живе і рухається лиш уперед!""
  gryphianhost.147.a: "Майбутнє за нами."
  gryphianhost.148.t: "Світ навколо нас"
  gryphianhost.148.d: "[GRY.GetLeader] розуміє свій народ. Його народ гордий і незалежний, і він також розділяє їх цінності і спадщину, це дозволило йому легко знаходити спільну мову і здобувати підтримку нації, в той час, як реформа Зафійського суспільства тривала. Але кого він не розуміє, так це наших сусідів. Грифони та поні дотримуються різних поглядів, що можуть як і суперечити так і не суперечити ідеям Грифії.\n\nРічкові поні зі сходу стоять стіною проти агресії грифонів. Борад був би радий закопати сокиру війни, але навіть він розуміє, що деякі рани можуть бути надто глибокими, що зцілити їх, і навіть нинішня холодна ворожнеча буде нормою на довгі роки. Рідні народи також незбагненні.\n\nМоже в нас вийде досягти миру в регіоні, або навіть сформувати альянс, заради захисту від імперіалізму, але що ж буде, якщо й він паде? Борад знає, що лиш за допомогою сталі і наших власних кігтів грифони зможуть захистити свою свободу в цьому непостійному світі."
  gryphianhost.148.a: "Зафія має вистояти."
  gryphianhost.149.t: "Сходження Євгена Кравельця"
  gryphianhost.149.d: "Євген Кравелець вважав себе вищим за інших. Та це була не якась дурна зарозумілість, а факт — він був внучатим племінником загиблого гетьмана, мав підтримку найбагатших поміщиків і сам був взагалі не бідним. Ну і що, що він не проти зламати кілька клювів на шляху до своєї цілі? Лиш бовдур вважає, що може бути праведним, із чистими кігтями. Ні, сила, воля і влада — ті речі, що дійсно мають значення.\n\nОсь так Євген і спланував свій підхід до Ради. Декілька промов, що детально описують його захопленість націоналістичними ідеями і культивують величність Січі, кілька хабарів та погроз, там, де треба, і вже чутно рішучий голос. Кравелець вже було подумав, що вони були на волосині від поразки, адже цей клятий дурень Грифницький вмів ляси точити, але Євгену вдалось досягти своїх амбіцій та він став новим Гетьманом Грифії.\n\nОх, які ж в нього грандіозні плани. Він відсвяткував свої перемоги здоровою порцією ковбаси та імпортним Арантизьким вином та владнав декілька суперечок, оскільки вся влада тепер в його кігтях. Але спочатку він має розібратись із Борадом та його прихвоснями. Вони не були вражені таким результатом та пообіцяли криваву помсту." # (&) Арантизьким?
  gryphianhost.149.a: ""Скоро це все стане моїм...""
  gryphianhost.150.t: "Проблеми з дисидентами"
  gryphianhost.150.d: "Євген Кравелець навіть здивувався, почувши, що жалюгідний бунт Борада був так легко подавлений. Його безглузді ідеї гармонії та демократії були легкою приманкою для обездолених, яким варто знати своє місце і навіть не намагатись підніматись проти хазяїв. Мирні протести переросли в страйки, вони ж стали заворушеннями і озброєнними повстаннями.\n\nУ Євгена не було варіантів, окрім як наказати лояльним частинам збройних сил приборкати кожного грифона, що був проти його правління. Його єдиним проханням було наказувати заворушникам здатись, а після цього вже стріляти. Врешті-решт, його репутація могла б постраждати, якщо він був би показаний публіці таким кровожерливим, в той час як в'язнів можна було б використовувати в багатьох інших, корисніших цілях.\n\n Гамбіт Євгена повністю окупився. Відчуваючи, що в них не просто не було переваги, а й навіть і близько не рівні сили, багато хто склав зброю, а ватажки повстань були захоплені у полон чи втікли в невідомому напрямку. На жаль, серед тих, кого піймали, Грифницького не було. Євген із задоволенням би оголосив його тюремний строк, але всьому свій час... "
  gryphianhost.150.a: "Це повстання було приречене із самого початку."
  ##gryphianhost.151.t: "Грандіозна Риторика Євгена"
  ##gryphianhost.151.d: ""
  ##gryphianhost.151.a: ""Лиш я можу повернути славу Зафії!""
  ##gryphianhost.152.t: "Питання благочестя й віри"
  ##gryphianhost.152.d: ""
  ##gryphianhost.152.a: "Евіліана за нами спостерігає."
  gryphianhost.153.t: "Коронація"
  gryphianhost.153.d: "Нарешті цей день настав. Багато зусиль було прикладено задля відродження давнього королівства, та [GRY.GetLeader] був тим, під чиїм проводом це все відбулось. Шляхта протестувала, але кого це хвилює? Євген вже точно не збирався дозволити купі лінивих багатих дурнів, що тільки й можуть рахувати свої дорогоцінні камінчики та являтись на парадах у своєму дорогому одязі, завадити його планам. Ні, він знайшов куди сильніших прибічників, що можуть допомогти йому здійснити його наміри. Лояльні селяни та міщани, яких все більше й більше, разом із збройними силами, що вірні йому, були непоганою основою для досягнення величі, а не цим пихатим шляхтичам.\n\nІ ось скромна коронація в Каїві відбулась. Пройшла вона без усякої пихатості, у Євгена не було намірів хвалитись багатством, поки більшість населення живе у бідноті. Давня корона грифських королів, однак, була надто незвичною на його думку, але така була традиція. Незабаром, вона була поміщена на голову Євгена прелатом Евіліани. Вслід за цим почались вітання і побажання, після яких був бенкет, на якому кожен грифон, незалежно від свого статку, поїв по-королівськи. \n\n Але це був лиш перший крок до слави."
  gryphianhost.153.a: "Давнє королівство мов з могили встало!"
  gryphianhost.154.t: "Абсурдне зауваження"
  gryphianhost.154.d: "Останнім часом серед широких прошарків населення Каїву ходили чутки про те, що [GRY.GetLeader] оголосить себе королем і відновить давні володіння, якими колись володіла Грифія. Думка Євгена з цього приводу була не настільки оптимістичною. Звичайно, із короною і з'являються нові привілеї, та він і справді дуже хотів, щоб Зафія повернулась до своїх минулих кордонів, але його прибічники із вищих кіл цю ідею не підтримували. А Євгену необхідна їх підтримка, бо інакше його швидко замінить хтось некомпетентний.\n\nТому наступні декілька тижнів на публічних виступах у Каїві, Євген переконався, що він запевнить грифонів, що він не стане королем. Він довго казав про те, що корона не потрібна Зафії, бо не варто опиратись лиш на минулі спогади. Народ визнав, що найкращим варіантом буде зберегти статус-кво доти, допоки не з'явиться варіант покраще."
  gryphianhost.154.a: "Зафії не потрібен король."
  gryphianhost.155.t: "Наша земля по праву"
  gryphianhost.155.d: "Реформи [GRY.GetLeader] пройшли вдало. Нарешті, була побудована справжня промисловість, воєнні заводи вже отримали замовлення на виробництво великої кількості вогнепальної зброї для зростаючої армії, а рівень життя в країні постійно зростає. Звичайно, Грифія не вирішить свої проблеми лише за ніч, але ми на вірному шляху, шляху приведення усього у порядок! Тепер, коли населення задоволене, Євген може перейти до останнього етапу свого плану.\n\nЦей етап полягає у масштабній суспільній кампанії по поширенню його ідей завоювань. Грифони впивалися його промовами, у яких він дуже палко розповідав про те, що сусідні народи не мають права на існування поза нашої сфери впливу, і що він надасть необхідні матеріали і грифонів для здійснення помсти поні.\n\nПлан Євгена обернувся успіхом. Свідомі громадяни й пацифісти були швидко утиснуті кровожерливим натовпом, який хотів бачити, як Зафія знову буде сяяти у променях слави."
  gryphianhost.155.a: "Ніхто не стане нам перешкодою."
  gryphianhost.156.t: "Тривожні військові погрози"
  gryphianhost.156.d: "Наші посланці та громадяни, які проживають за кордоном у [GRY.GetNameDef], нещодавно повернулися з тривожними звістками — [GRY.GetLeader], який нещодавно прийшов до влади, після чого розпочався період стрімкої індустріалізації та нарощування військової сили, стає дедалі ворожішим. Відомо, що він публічно заявляв про необхідність "об'єднати колишні землі Зафії", до яких, як виявляється, входить і наша країна, силою зброї, якщо ми не підкоримося його волі. Ми не маємо жодного бажання підкорятися цьому дрібному тирану, і хоча Грифія не становила суттєвої загрози протягом останніх років, останні зміни свідчать про те, що нам дійсно слід подбати про захист кордонів."
  gryphianhost.156.a: "Нехай тільки спробують. Їм це не вдасться."
  gryphianhost.157.t: "Переворот молодих соціалістів"
  gryphianhost.157.d: "Невдалий похід жахливо вплинув на Грифію. В зв'язку з тим, що гетьман Бульба та більшість вищого дворянства були вбиті, поранені або зазнали збитків, а похід не приніс очікуваної здобичі, національна єдність рухнула. Спроби скликати Раду не увінчалися успіхом, оскільки багато поміщиків брали участь у невеликих протистояннях.\n\nПобачивши в цьому можливість, пригнічені селяни повстали з підтримкою комуністичних революціонерів. Дворяни не змогли їх зупинити і захоплення влади відбувся досить швидко. Хрущевич та його прибічники вже почали проводити свої реформи, а прості грифони вітали рішення про передачу їм усієї землі, на якій вони так довго працювали."
  gryphianhost.157.a: "Реакціонери не зможуть зупинити революцію!"
  gryphianhost.158.t: "Революція не знає кордонів"
  gryphianhost.158.d: "Із підписанням другого універсалу та натиском на територіальну експансію у якості головного пріоритету держави, [GRY.GetLeader] продовжує наголошувати на важливості визволення пригнічених трудівників, що потрапили у пастку у колі експлуатації, феодалізму і позбавленні прав. Кожен грифон, — казав Корнило, — заслуговує права на гідну оплату своєї праці і на володіння інструментами праці. Лиш тоді Каївська комуна побачить, як червоний прапор соціалізму високо майоритиме, від берегів Ґрифуса до рівнин Люші. Усе це необхідно, доки грифони не поборють своїх давніх ворогів — поні, котрим цінності комунізму властиві ще менше."
  gryphianhost.158.a: "Робітники, повстаньте!"
  gryphianhost.159.t: "Комуністичні провокації"
  gryphianhost.159.d: "Революція та запекла громадянська війна, що охопили державу Бродфельд, змусили нас побоюватися, що "червона загроза" незабаром насунеться й на нас — і це може статися вже зовсім скоро. Наші агенти, що діють під прикриттям у [GRY.GetName], повідомляють про нещодавнє рішення Кайвської Верховної Ради, яке було надруковано та поширене в державній пресі, щодо поширення комунізму за межі країни — як мирним шляхом, так і силою. Ми не можемо дозволити їм повалити наших законних правителів і замінити їх неосвіченими селянами, ми мусимо підготуватися до війни, доки не стало запізно!"
  gryphianhost.159.a: "Час планувати оборону!"
  gryphianhost.160.t: "Разом у солідарності"
  gryphianhost.160.d: "Із підписанням другого універсалу та натиском на нашого більшого партнера на заході — Прайвен, [GRY.GetLeader] запевнив радикалів у партії, що підпоряткування не означає, що Каїв не зіграє своєї ролі у революції. Замість цього Корнило розповів про особисту дружбу із [GRW.GetLeader], і про те, як він боровся за те, що ми маємо зараз. Червоний прапор, після всіх битв буде майоріти над усіма нашими сусідами, але зараз ми маємо зосередитись на власному розвитку перед таким завданням. Ми маємо мати більше терпіння. "
  gryphianhost.160.a: "[GRW.GetLeader] знає, що робить."
  gryphianhost.161.t: "[GRY.GetLeader] запевняє нас у своїй підтримці"
  gryphianhost.161.d: "Сьогодні надійшло коротке повідомлення від наших товаришів з Каїва — їхня нещодавно скликана верховна рада ухвалила рішення узгоджувати з нами питання зовнішньої політики. [GRW.GetLeader] висловив задоволення таким розвитком подій, адже їхнє становище все ще залишалося нестабільним, і для поширення соціалізму потрібно було зробити ще багато чого. Цей крок лише сприятиме зміцненню дружби між грифонами Прайвена та Грифії."
  gryphianhost.161.a: "Справжні товариші, всі до одного."
  gryphianhost.162.t: "Момент тиші"
  gryphianhost.162.d: "[Root.gryphianhost162desc]"
  gryphianhost.162.a: "До дружби."
  gryphianhost.163.t: "Наш давній ворог"
  gryphianhost.163.d: ""До зброї! До зброї! Захистимо батьківщину!"\n\nЦі слова повторювались у кожному місті Зафії. Грифони охоче реагували на цей заклик до бою, тому що жоден ворог не викликав більшої ненависті, аніж поні Єзераграда. Підтримка війни ніколи не була вищою, і навіть діти й старці були готові зробити свій внесок у боротьбу проти ворога. Грифійці знають, що з ними стане, якщо поні переможуть, і вони поклялись битися до самого кінця."
  gryphianhost.163.a: "Перемога або смерть!"

 # Події «Дай, дай, дай, дай, дай, дай, дай, дай, дай, дай, дай, дай, дай, дай, дай!»
  gryphianhost.240.t: "Запит від нашої прикордонної марки"
  gryphianhost.240.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи пристойну кількість здібних грифонів на службу в наших збройних силах в обмін на запас вогнепальної зброї. Він посилається на потребу в озброєнні своїх внутрішніх миротворців, але чи потрібен нам наразі такий обмін?"
  gryphianhost.240.a: "Запит схвалено."
  gryphianhost.240.b: "На момент ми не можемо поділитися жодною зброєю." # (&+?)
  gryphianhost.241.t: "$gryphianhost.240.t$"
  gryphianhost.241.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи значну кількість здібних грифонів на службу в наших збройних силах в обмін на запас вогнепальної зброї. Він посилається на потребу в озброєнні своїх внутрішніх миротворців, але чи потрібен нам наразі такий обмін?"
  gryphianhost.241.a: "$gryphianhost.240.a$"
  gryphianhost.241.b: "$gryphianhost.240.b$"
  gryphianhost.242.t: "$gryphianhost.240.t$"
  gryphianhost.242.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи величезну кількість здібних грифонів на службу в наших збройних силах в обмін на запас вогнепальної зброї. Він посилається на потребу в озброєнні своїх внутрішніх миротворців, але чи потрібен нам наразі такий обмін?"
  gryphianhost.242.a: "$gryphianhost.240.a$"
  gryphianhost.242.b: "$gryphianhost.240.b$"
  gryphianhost.243.t: "Зброя доставлена!"
  gryphianhost.243.d: "Лорд-протектор зрозумів нашу потребу і погодився на цю угоду. У найближчі дні прибудуть вантажівки з цінною зброєю."
  gryphianhost.243.a: "Чудово."
  gryphianhost.244.t: "Запит відхилено!"
  gryphianhost.244.d: "На жаль, Лорд-протектор відхилив наше прохання. Він заявляє, що наразі вся зброя потрібна на фронті і її не можна виділити для утихомирення прикордонних територій."
  gryphianhost.244.a: "Шкода."

  gryphianhost.245.t: "Прикордонна марка бажає отримати технологічну допомогу"
  gryphianhost.245.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи пристойну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в дослідженнях технологій. Він стверджує, що аби ліпше слугувати прикордонною маркою, він бажає тримати крок із сучасністю, але чи можемо ми досить їм довіритися, що вони не обернуть наші тажмниці науки проти нас?"
  gryphianhost.245.a: "Гаразд, якщо їм так треба."
  gryphianhost.245.b: "Нам ліпше, аби вони технологічно відставали від нас."
  gryphianhost.246.t: "$gryphianhost.245.t$"
  gryphianhost.246.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи значну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в дослідженнях технологій. Він стверджує, що аби ліпше слугувати прикордонною маркою, він бажає тримати крок із сучасністю, але чи можемо ми досить їм довіритися, що вони не обернуть наші тажмниці науки проти нас?"
  gryphianhost.246.a: "$gryphianhost.245.a$"
  gryphianhost.246.b: "$gryphianhost.245.b$"
  gryphianhost.247.t: "$gryphianhost.245.t$"
  gryphianhost.247.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи величезну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в дослідженнях технологій. Він стверджує, що аби ліпше слугувати прикордонною маркою, він бажає тримати крок із сучасністю, але чи можемо ми досить їм довіритися, що вони не обернуть наші тажмниці науки проти нас?"
  gryphianhost.247.a: "$gryphianhost.245.a$"
  gryphianhost.247.b: "$gryphianhost.245.b$"
  gryphianhost.248.t: "Вчені прибули!"
  gryphianhost.248.d: "На наше прохання, Лорд-протектор надіслав нам невелику групу вчених в обмін на грифонів. Нарешті ми зможемо досягти певного прогресу в цій відсталій провінції."
  gryphianhost.248.a: "Дуже добре."
  gryphianhost.249.t: "Запит відхилено!"
  gryphianhost.249.d: "На жаль, Лорд-протектор вирішив не задовільнити наше прохання. Він заявляє, що наразі кожен науковець необхідний для роботи над надсекретним проєктом."
  gryphianhost.249.a: "Шкода."
  gryphianhost.250.t: "Вчені прибули!"
  gryphianhost.250.d: "На наше прохання Лорд-протектор надіслав нам солідну групу вчених в обмін на грифонів. Нарешті ми зможемо досягти певного прогресу в цій відсталій провінції."
  gryphianhost.250.a: "Чудово."
  gryphianhost.251.t: "Вчені прибули!"
  gryphianhost.251.d: "На наше прохання Лорд-протектор надіслав нам велику групу вчених в обмін на грифонів. Нарешті ми зможемо досягти певного прогресу в цій відсталій провінції."
  gryphianhost.251.a: "Відмінно."

  gryphianhost.252.t: "Прикордонна марка потребує промисловий розвиток"
  gryphianhost.252.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи пристойну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в розбудові їхньої вбогої промислової бази. Однак чи є розвиток райхскомісаріату в наших поточних інтересах?"
  gryphianhost.252.a: "Це прийнятно."
  gryphianhost.252.b: "У нас є нагальніші питання."
  gryphianhost.253.t: "$gryphianhost.252.t$"
  gryphianhost.253.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи значну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в розбудові їхньої вбогої промислової бази. Однак чи є розвиток райхскомісаріату в наших поточних інтересах?"
  gryphianhost.253.a: "$gryphianhost.252.a$"
  gryphianhost.253.b: "$gryphianhost.252.b$"
  gryphianhost.254.t: "$gryphianhost.252.t$"
  gryphianhost.254.d: "Сьогодні адміністратор Райхскомісаріату Козакенланд надіслав нам звернення, пропонуючи величезну кількість здібних грифонів на службу в наших збройних силах в обмін на допомогу в розбудові їхньої вбогої промислової бази. Однак чи є розвиток райхскомісаріату в наших поточних інтересах?"
  gryphianhost.254.a: "$gryphianhost.252.a$"
  gryphianhost.254.b: "$gryphianhost.252.b$"
  gryphianhost.255.t: "Промислова підтримка отримана!"
  gryphianhost.255.d: "Сьогодні надійшли хороші новини: Лорд-протектор вирішив інвестувати в розвиток нашої провінції. Завдяки цьому землі Грифії будуть індустріалізовані набагато швидше, ніж якби ми діяли самостійно."
  gryphianhost.255.a: "Дуже добре."
  gryphianhost.256.t: "Запит відхилено!"
  gryphianhost.256.d: "На наше велике розчарування, Лорд-протектор відмовився спрямувати частину промисловості Імперії на потреби нашої провінції. Він стверджує, що на даний момент кожна фабрика необхідна для ведення війни і що нам слід розвиватися самостійно."
  gryphianhost.256.a: "Можливо, наступного разу."
  gryphianhost.257.t: "Промислова підтримка отримана!"
  gryphianhost.257.d: "Сьогодні надійшли позитивні новини: Лорд-протектор вирішив інвестувати значні ресурси у розвиток нашої провінції. Таким чином, індустріалізація земель Грифії відбуватиметься досить швидкими темпами."
  gryphianhost.257.a: "Чудово."
  gryphianhost.258.t: "Промислова підтримка отримана!"
  gryphianhost.258.d: "ьогодні надійшли позитивні новини: Лорд-протектор вирішив інвестувати великі ресурси у розвиток нашої провінції. Таким чином, індустріалізація земель Грифії відбуватиметься досить швидкими темпами."
  gryphianhost.258.a: "Ми дуже вдячні."

