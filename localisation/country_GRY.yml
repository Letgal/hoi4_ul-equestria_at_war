### СКРИПТОВАНА ЛОКАЛІЗАЦІЯ ###
 GRY_brod_raid_title: "Грабунок прибічників монархії" # [PRYRaidTitle]
 GRY_brod_raid_desc: "Скориставшись хаосом, викликаним громадянською війною, Гетьман Бульба вирішив надіслати рейдерів у Бродфельд, аби вони грабували та крали на користь Січі. Наші рейдери намагались запобігати районів під контролем Прайвенської Визвольної Армії, оскільки вона добре озброєна, а її воїни відчайдушно борються. Та й до того ж з них нічого взяти. Тепер залишилось лиш дочекатись новин від наших хлопців..." # [PRYRaidDesc]
 GRY_GRW_raid_title: "Грабунок радикалів"
 GRY_GRW_raid_desc: "Скориставшись хаосом, викликаним громадянською війною, Гетьман Бульба вирішив надіслати рейдерів у Бродфельд, аби вони грабували та крали на користь Січі. Нашим рейдерам було доручено напасти на Прайвенську Визвольну Армію, захопити їх зброю та завадити їм поширювати далі свою отруйну ідеологію. Тепер залишилось лиш дочекатись новин від наших хлопців..."
 GRY_105_wb_elected: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Деякі поні, такі як Wavebreaker з Єзерграду , наполягають, що це, принаймні, варто спробувати, хоча багато хто й досі вважає їх нещирими. Незважаючи на офіційні скарги з боку  Віттенленду та Єзерграду, їхні лідери запевнили нас, що підуть за нашим прикладом, якщо ми справді захочемо їх прийняти." # [gryevent105loc] (не використ.)
 GRY_105_wb_not_elected: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Зокрема Віттенленд і Єзерград вкрай обурені, і їхні лідери недвозначно дали зрозуміти, що розірвуть з нами стосунки, якщо ми наважимося вчинити щось настільки обурливе, як допуск їхніх давніх ворогів до Коаліції."
 GRY_LCT_WIT_both_ok: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Однак деякі поні наполягають, що це, принаймні, варто спробувати, тоді як багато хто досі вважає їх нещирими. Єзерград та Віттенленд подали офіційні протести, а Wavebreaker та Queen White Star вимагають грошової компенсації, але, що найголовніше, жоден із них категорично не відкинув можливість схвалення цієї ідеї."
 GRY_LCT_ok_WIT_no: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Однак деякі поні наполягають, що принаймні варто спробувати, тоді як багато хто досі вважає їх нещирими. Гонорія з Віттенленду розлючена і погрожує взагалі вийти з альянсу, якщо такий обурливий крок буде здійснено. Мер Wavebreaker, однак, висловлюється менш категорично: він не відкидає цю ідею, хоча й вимагає суворого покарання за злочини, скоєні «Гостями» проти Єзерграду протягом багатьох років."
 GRY_LCT_no_WIT_ok: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Однак деякі поні наполягають, що принаймні варто спробувати, тоді як багато хто досі вважає їх нещирими. Єзерград розлючений і погрожує взагалі вийти з альянсу, якщо такий обурливий крок буде здійснено. Королева Вайт Стар, однак, висловлюється менш категорично, відмовляючись відкидати цю ідею, хоча й вимагає суворого покарання за злочини, скоєні «Гостями» проти Віттенленду протягом багатьох років."
 GRY_LCT_WIT_both_no: "Сьогодні [Root.GetLeader] отрима[Root.Leader.GetVerbGendEndA_RU] неймовірну новину — настільки неймовірну, що спочатку її сприйняли як жарт. Однак тепер ми цілком упевнені, що, так, Грифійська Січ справді бажає вступити до нашого альянсу. Грифійці стверджують, що змінили своє поводження, створивши гармонійне та мирне суспільство та покинувши розбійництво. Нічого й казати, більшості поні складно повірити в це. Зокрема, Віттенленд і Єзерград вкрай обурені, і їхні лідери недвозначно дали зрозуміти, що розірвуть з нами стосунки, якщо ми наважимося вчинити щось настільки обурливе, як допуск їхніх давніх ворогів до Коаліції."
 GRY_117_GRW_faction: "Нарешті, ми стабілізували ситуацію в країні та заклали підвалини соціалізму у Грифії. Однак зараз ми маємо вирішити одне важливе питання нашої зовнішньої політики. Хоч ми й вдячні нашим друзям із Прайвенської Народної Республіки, але в Раді йдуть суперечки про те, наскільки тісно ми маємо з ними співпрацювати. Прибічники Хрущевича вважають, що ми повинні закріпити наші відносини із Прайвеном, бо світ великий, і багато хто в ньому нас ненавидить. Було б дурно втратити нашого єдиного надійного союзника. Однак його опоненти критикували цю політику, називаючи її «ревізіоністською» та стверджуючи, що товаришу Хрущевичу просто не вистачає мужності, щоб протистояти реакційним силам." # [gryevent117loc]
 GRY_117_not_GRW_faction: "Нарешті, ми стабілізували ситуацію в країні та заклали підвалини соціалізму у Грифії. Однак зараз ми маємо вирішити одне важливе питання нашої зовнішньої політики. Хоч ми не в силах поширювати ідеї соціалізму по всій Грифонії, народний тиск переконує Корнила Хрущевича у тому, що єдиним правильним шляхом для пролетаріату є прагнення до визволення пригніченних робітників у сусідніх нам країнам."
 GRY_LUS_is_communist: "Грифони з Люші скинули своїх реакційних пригнічувачів і прийшли до тріумфу комунізму! Ми налагодимо дипломатичні відносини з ними, аби захищати ідеали революції від зовнішніх загроз — та й врешті решт, чи ми не можемо просто допомогти сусідам?"
 GRY_LUS_not_communist: "У Грифонії палає полум'я Революції, та воно не повинно згаснути! Чесний народ Люші надто довго знаходився під притісненням консервативного уряду, і ми не можемо дозволити таку несправедливість. Джунглі Люші палатимуть, та цей вогонь спалить замки тиранів!"
 GRY_GRU_is_communist: "Червоний прапор майоріє над Ґрифусом! Наші кровні брати з півдня прийняли соціалістичний режим та зріклися від своїх старих, буржуазних правителів. На славу братерству та соціалістичного товариства ми повинні направити їм дипломатичну місію для обговорення тісніших зв'язків між нашими народами."
 GRY_GRU_not_communist: "Ґрифус вже давно стогне під гнітом консервативного буржуазного уряду. Чи ми можемо спокійно сидіти, поки наші брати заковані у кайдани? Ми принесемо волю пригніченому народу Ґрифуса!"
 GRY_GRW_is_communist: "Дружба з ПВА"
 GRY_GRW_is_communist_desc: "Тепер, коли наша революція успішно завершилась, ми повинні об'єднатись з нашими братами з Прайвену. Усі соціалисти світу стануть єдиним цілим, бо лиш спільно ми вб'ємо капіталізм!"
 GRY_GRW_not_communist: "Запалити полум'я Революції"
 GRY_GRW_not_communist_desc: "Катастрофа! Революція в Прайвені була задавлена буржуазними силами! Ми зобов'язані своїм існуванням нашим Прайвенським товаришам, чи ми можемо просто сидіти та дозволити горнилу соціалізму холонити? Та ні за що! Смерть буржуям! Слава робочому классу!"
 NIM_leave: "Німбусійці з огидою ставляться навіть до самої думки про те, що ми дозволимо грифонам — тій самій причині існування Коаліції — приєднатися до нашого союзу! Вони чітко дали зрозуміти, що висловлять рішучий протест, якщо ми наважимося вчинити таку дурість." # [NIMreaction]
 NIM_no_leave: "Незважаючи на їхні заперечення, очевидно, що німбусійці не підуть на те, щоб розколоти Коаліцію через це питання."
 WIT_leave: "Жителі Віттенленду категорично не потерплять навіть найменшого натяку на те, щоб дозволити грифонам приєднатися до Коаліції. Якщо ми наважимося на такий крок, народ, ймовірно, вимагатиме, щоб Віттенленд вийшов зі складу Коаліції." # [LCTreaction]
 WIT_no_leave: "Жителі Віттенленду висловили заперечення проти ідеї прийняття грифійців до Коаліції, але, схоже, вони дещо краще ставляться до нового гетьмана Грифницького."
 LCT_leave: "Єзерградські поні вкрай обурені самою думкою про прощення грифійців — адже саме вони є однією з причин існування Річкової коаліції! Місцеві популістські лідери вже багато днів гарячкують про "слабодухих дурнів", які "не знають, чим ми пожертвували, щоб захистити їх". Якщо ми спробуємо це проштовхнути, мешканці Єзерграду, безсумнівно, не підтримають нас." # [WITreaction]
 LCT_no_leave: "Wavebreaker висловив занепокоєння щодо ідеї прийняття грифійців до Коаліції, але не наважився обіцяти, що категорично заблокує цю пропозицію. Напевно, нам вдасться просунути цю пропозицію, не викликавши надто сильного обурення у мешканців Єзерграду."
 ally_with_BRF: "Козак і гармата" # [allyGRWorBRF]
 ally_with_BRF_desc: "Хоч у нас і були не кращі відносини із Бродфельдом у минулому, стало очевидно, що басейн ріки Еві більше не спокійне місце для держав, як ми. Ми будемо вище внутрішніх розбірок, та запросимо правителя Бродфельду в наш оборонний пакт." # [allyGRWorBRFdesc]
 ally_with_GRW: "Проковтнути нашу гордість"
 ally_with_GRW_desc: "Як би це не було нам огидно, грифони Прайвену так само мають увійти до договору. Залишимо минуле у минулому — наша доля важніше ідеологічних чвар."
 BRF_raided_success: "Козаки Грифійської Січі мусили захищати нас від агресії зі сходу, а не грабувати й розоряти нашу землю. Але за свою історію вони показали себе непостійними й користувалися всякою можливістю, аби щось у нас украсти, поки Імперія не дивиться — те саме й зараз. Нахабні розбійники ввійшли на нашу територію та забрали, що кортілося, захопивши золото, коштовності, рушниці, харчі та будь-що цінне. Наші армії занадто зайняті громадянською війною, що розбиратися з ними, і в усякому разні їхні рейдерські загони надто швидкі для наших армій, і здебільшого їх не вдається схопити. Вони завдали нашій країні суттєвої економічної шкоди, і на цей момент ми ніщо не можемо з цим зробити." # [raideventoutcome]
 BRF_raided_failed: "Козаки Грифійської Січі мусили захищати нас від агресії зі сходу, а не грабувати й розоряти нашу землю. Але за свою історію вони показали себе непостійними й користувалися всякою можливістю, аби щось у нас украсти, поки Імперія не дивиться — те саме й зараз. Нахабні розбійники ввійшли на нашу територію та напали на того, на кого кортілося. Однак їхній рейд, схоже, був погано організований і загони рейдерів некоординовано тинялся туди-сюди, частше крадучи скарби один в одного, ніж у нашого народу. На додачу до цього, селяни Бродфельду вже зовсім звикли до війни й навчилися кільком прийомам, які дозволили їм завдати розбійницьким загонам козаків кількох несподіваних поразок. Схоже, ця атака вибухнула їм просто в лице!"
 GRW_raided_success: "Реакційний козацький режим Грифійської Січі рідко коли дотримувався своєї обіцянки не нападати на грифонів Прайвену, і сьогодні він знову довів своє віроломство. Нахабним і відверто незаконним учинком козаки перетнули кордон Прайвену та почали грабувати та вбивати собі по волі. Що гірше, вони, схоже, брали собі за ціль саме комуністів і відомих симпатиків комунізму й навіть узялися до нальотів на наші схованки зброї! Це зашкодить нашим зусиллям із ведення війни на близьке майбутнє." # (&)
 GRW_raided_failed: "Реакційний козацький режим Грифійської Січі рідко коли дотримувався своєї обіцянки не нападати на грифонів Прайвену, і сьогодні він знову довів своє віроломство. Козаки перетнули кордон Прайвену та спробували розграбувати і спустошити землю, цілячися саме на комуністів і симпатиків комунізму! Однак вони не розраховували на могуть пролетаріату, і наші добре озброєні партизани показали себе ефективними у відганянні їхніх рейдерських загонів. Ця дурні пошкодують, що стали проти революції!"
 GRY_borad_attack_lushi: "Хоч ми віками були у гарних відносинах із землями Люші, нині цьому настав кінець. Принц Еліас був скинутий, і тепер країною керують справжні екстремісти. Неспокійні води Еві! Ми зобов'язані покінчити із цією загрозою, поки вона не взросла ще більше.." # [allyLUSdesc]
 GRY_borad_befriend_lushi: "Ми запропонуємо лідерам Люші договір про взаємний захист. Вони ж напевне не розуміють усю вигоду, чи не так?"
 GRY_borad_attack_gryphus: "Нашу теплу дружбу з грифусцями віками зв'язувала спільна кров — але лиш донедавна. До нашого розчарування, радикальні елементи захопили владу у Вільних Містах, і тепер вони загроза, котру ми не можемо ігнорувати. Із тяжким зітханням, ми вимушені піти проти наших братів та сестер, аби зберегти свою соборність." # [allyGRUdesc]
 GRY_borad_befriend_gryphus: "Наші далекі родичі з Ґрифуса відомі як славні торговці й моряки, але їх армія надто слабка. Ми запропонуємо Вільним Містам договір про взаємний захист."
 GRY_162_redglad_alive: "Це був світлий день для [GRY.GetNameDef], бо соціалістична революція нарешті здійснилась! Принаймні, у її кордонах. Громадяни й робітники були визволені від феодальної експлуатації, наші пташеня були навчені найважливішим цінностям, щоб забезпечити комуністичне майбутнє, і наші збройні сили були більші ніж будь-коли, що присвятили життя революції. [GRY.GetLeader] вирішив зібрати всіх близьких друзів для святкування.\n\nТак, усі грифони там були — Крилило, Вірона, Літидія, і навіть Філіп Редґлед зібрались прийти. Тільки він, як і завжди, запізнився. Як би це не було, Корнило приніс свій секретний запас горілки високої якості і поділився ним зі своїми колегами, проголосивши коротку промову.\n\n"Любі друзі! Ми довго працювали, і вже бачимо, як наші мрії здійснюються! Я повинен зізнатись усім вам, що, коли я взнав про нашу боротьбу, я був налаштований скептично. Я думав, що все ще знаходжусь під впливом алкоголю, тому що напередодні увечері ми з Філіпом пили й гадали, як Корнило потрапив у цю халепу. Як же я помилявся! Кожен з нас зробив все можливе, щоб цей день настав, і я радий, що поруч зі мною такі чудові друзі. За нас усіх!" — після чого він вмить випив вміст стакану. Його друзі підтримали його і зробили теж саме. Усі жартували та веселилися. Принаймні доти, доки не відчинились двері.\n\n Усі в кімнаті різко повернулись, і побачили малинового грифона, що виглядав досить змученим. — "Вибачте за запізнення, товариші. Сподіваюсь, що й мені також трохи залишилось, так?",- радісно вигукнув Філіп Редґлед, після чого пішли дружні привітання та веселощі знову продовжилось." # [gryphianhost162desc]
 GRY_162_redglad_not_alive: "Це був світлий день для [GRY.GetNameDef], бо соціалістична революція нарешті здійснилась! Принаймні, у її кордонах. Громадяни й робітники були визволені від феодальної експлуатації, наші пташеня були навчені найважливішим цінностям, щоб забезпечити комуністичне майбутнє, і наші збройні сили були більші ніж будь-коли, що присвятили життя революції. [GRY.GetLeader] вирішив зібрати всіх близьких друзів для святкування.\n\nТак, усі грифони там були — Крилило, Вірона, Літидія, але, на жаль, той, хто все почав, був відсутній. Як би не було, Корнило приніс свій секретний запас горілки високої якості і поділився ним зі своїми колегами, зробивши коротку промову.\n\n"Любі друзі! Ми довго працювали, і вже бачимо, як наші мрії здійснюються! Я повинен зізнатись усім вам, що, коли я взнав про нашу боротьбу, я був налаштований скептично. Я думав, що все ще знаходжусь під впливом алкоголю, тому що напередодні увечері ми з Філіпом пили й гадали, як Корнило потрапив у цю халепу. Як же я помилявся! Кожен з нас зробив все можливе, щоб цей день настав, і я радий, що поруч зі мною такі чудові друзі. Та все ж таки, дуже прикро, що нашого любого Філіпа немає тут із нами. Він був би дуже радий тут бути, але нам не вдалося його знайти, та ми нічого не знаємо про його місцезнаходження. Тим не менш, давайте насолодимося цим вечором разом.- після чого він вмить випив вміст стакану. Його друзі швидко, хоч і з деяким сумом, підтримали його і зробили те ж саме. Усі жартували та веселилися. Хтось приніс фотографію Редґледа, погляди усіх грифонів були до неї немов приковані."\n\nМи сумуємо за тобою, старий друже."

