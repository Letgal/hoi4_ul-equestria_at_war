 GRY_gun_exchange_program_desc: "Нам треба більше зброї, а нашому володарю — більше солдатів. Нам слід запропонувати збільшити наше ополчення для держави в обмін на вогнепальну зброю. §YЗауважте: ви можете приймати ці рішення лише кожні шість місяців, а вибір — погоджуватися чи ні — залежить повністю від нашого володаря.§!"
 GRY_tech_exchange_program_desc: "Ми технологічно відстаємо, а нашому володарю треба більше солдатів. Нам слід запропонувати збільшити наше ополчення для держави в обмін на технології. §YЗауважте: ви можете приймати ці рішення лише кожні шість місяців, а вибір — погоджуватися чи ні — залежить повністю від нашого володаря.§!"
 GRY_industry_exchange_program_desc: "Нам треба більше заводів, а нашому володарю — більше солдатів. Нам слід запропонувати збільшити наше ополчення для держави в обмін на промисловість. §YЗауважте: ви можете приймати ці рішення лише кожні шість місяців, а вибір — погоджуватися чи ні — залежить повністю від нашого володаря.§!"
