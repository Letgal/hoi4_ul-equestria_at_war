 vereskopadsky_desc: "Верескопадський, найближчий сподвижник Гетьмана Бульби, бажає зберегти свою державу від комуністичних головорізів, що вбили його наставника та батька."
 GRY_risk_of_neutral_civil_war: "Якщо ми скоро не закінчимо земельну реформу, ми можемо зіткнутись з §RКонтрреволюцією§!\n\n"
 GRY_defend_liberty_tooltip: "\nЯкщо ви вже взяли нацональний дух §YЗахистити Батьківщину§!, то цей фокус подвоїть його силу."
 GRY_has_imperial_patronage: "Імператор узяв нас під свій патронаж"
 GRY_integrate_tribes_decisions: "Інтеграція січей"
 GRY_integrate_tribes: "Перемога над січами"
 GRY_integrate_tribes_desc: "Якщо наша революція переможе, ми повинні зцілити ці дурні культурні та етнічні відмінності, що послабили нас. У новому комуністичному раю кожний грифон отримає щастя даром та не залишиться ображеним! Усі грифоні стануть браттями!"
 GRY_remove_tribes_decisions: "Відкриває рішення, що дозволять вам поступово інтегрувати січі Зафії"
 GRY_waiting_for_response: "Ми чекаємо відповіді"
 GRY_restore_prywhen: "§YВи отримаєте привід для війни проти будь-кого, хто придушить революцію у Прайвені."
 GRY_unlocks_diplomacy: "Це відкриє рішення, що дозволять вам заключити союз із деякими гармонічними країнами Грифонії."
 GRY_diplomacy_decisions: "Нові дипломатичні контакти"
 GRY_ally_RIV: "Дотягнутись до річкових поні"
 GRY_ally_RIV_desc: "Тепер, коли ми реформували нашу країну, настав час знайти друзів десь ще. Річкові поні об'єднані у велику коаліцію з домінуванням гармонічних країн, що знаходяться близько до нас. Вони б могли запропонувати нам власний захист, якби не той факт, що ми віками жорстоко грабували річкові землі та поступово взрощували ненависть. Можливо, що новий уряд Річної Коаліції вирішить інакше. Але Єзераград, якщо їм не керує найпомірніший та найгармонічніший кандидат, маже точно заблокує наш вступ."
 GRY_ally_WNG: "Увійти до Карфінського Пакту"
 GRY_ally_WNG_desc:0 "Хай наші контакти із грифонами півдня були рідкісні, вони, без усякого сумніву, стануть гарними союзниками. Тутешні країни досить близькі до нас, керуються схожою ідеологією, та досить сильні, щоб протистояти силам більшої частини цього континенту. Ми маємо звернутись до їх Короля із проханням захисту."
 GRY_ally_JER: "Союз з Аквілейською Республікою"
 GRY_ally_JER_desc: "Аквілея — далека земля, з якою ми майже не підтримували зв'язки. Але з нещодавніх пір місцеві грифони проголосили республіку та готові заручитись сильними друзями. Ми постараємось переконати їх заключити з нами союз."
 GRY_ally_FAT: "Увійти до Пангрифонської Республіки"
 GRY_ally_FAT_desc: "Грифонська Республика була законною формою правління Грифонії десятиліттями. Оскільки наша країна — також Республіка, ми лиш отримаємо вигоду від альянсу з ними."
