 GRY_will_push_through_reform: "§YМи розширимо масштаби земельної реформи, забеспечивши повний і справедливий доступ до землі кожному грифону.§!\n"
 GRY_will_add_civvies: "§YЦей фокус додасть декілька громадянських фабрик, кількість яких залежить від того, який шлях ви виберете при індустріалізації.§!\n"
