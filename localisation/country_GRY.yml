### ІДЕЇ ###
 GRY_the_bunker_jumpers: "Козаки-розбійники"
 GRY_the_bunker_jumpers_desc: "Козаки-розбійники — загін особливих грифонів, навчених миттєво переміщуватись, окопуватися, послабляти атаки супротивника, і швидко йти далі."
 GRY_conscription_law: "Патріотичний призов"
 GRY_conscription_law_desc: "Ти потрібен Грифії!"
 GRY_kaboom: "Артилерійські шляхи поставок"
 GRY_kaboom_desc: "Оскільки цінність артилерії очевидна, Грифійська армія провела реформи, з метою забезпечити усі дивізії значною артилерійською підтримкою, у комплекті з обширними лініями постачання, щоб на полях бою завжди було достатньо снарядів."
 GRY_anti_communism: "Антикомуністичний похід"
 GRY_rebuilding: "Поширене будівництво"
 GRY_RIV_defense_idea: "Координоване оборонне навчання"
 GRY_trade_research: "Важливі торгові шляхи"
 GRY_investment: "Імперські інвестиції"
 GRY_landed_gentry: "Помісцеві дворяни"
 GRY_landed_gentry_desc: "Більшість сільгоспугідь у Грифії належить могутнім баронам та вождям племен, що мають численних кріпаків задля обробки землі. Феодальні угоди вимагають, щоб ці кріпаки служили певну кількість днів у збройних силах кожного року. Життя у Грифії не змінилось за останні століття, що дає народу почуття стабільності. Однак це робить модернізацію досить складною, тому міські райони дуже повільно ростуть."
 GRY_nobles_love_us: "Абсолютна підтримка шляхти"
 GRY_cossacks: "Козацька армія"
 GRY_cossacks_desc: "Грізні козаки Січі славляться своєю швидкістю і численністю. Їх набіги руйнівні для сусідніх сіл поні та невеликих містечок."
 GRY_fiercer_raids: "Козацька армія"
