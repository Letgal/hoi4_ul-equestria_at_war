 GRY_modernisation_woes: "Проблеми мобілізації"
 GRY_independent_tribes: "Незалежні січі"
 GRY_independent_tribes_desc: "Різні січі, котрі входять у нашу державу, роз'єднані та часто конфліктують одна з одною. Ця слабкість міцно надвисає над нашою країною і не дозволяє нам почати реформи чи піти на війну."
 GRY_punished_disloyal_tribes: "Нелояльні січі покарані"
 GRY_rewarded_loyal_tribes: "Лояльні січі винагороджені"
 GRY_local_representation: "Місцеві представництва"
 GRY_clans_accept_us: "Підтримка більшості січей"
 GRY_clans_accept_us_desc: "Найвпливовіші січі нас підтримують. Однак, меншості все ще хвилюються за можливої втрати своїх політичних прав."
 GRY_united_clans: "Січі єдині"
 GRY_united_clans_desc: "Ми повністю об'єднали роз'єднані січі у складі нашої державі, великі й малі."
 GRY_raided: "Розграбування Грифійською Січчю"
