 GRY_agrarianism: "Аграрний фокус"
 GRY_agrarianism_desc: "Ми вирішили продовжувати використовувати наші сильні сторони та модернізувати наш сільськогосподарський сектор. Правильно поставлена економіка буде розвиватись повільно, але з надлишком виробництва, ми можемо бути впевненими, що кігтів, готових рухати нашу країну у світле майбутнє, буде вдосталь."
 GRY_agrarianism_2: "$GRY_agrarianism$"
 GRY_agrarianism_2_desc: "$GRY_agrarianism_desc$"
 GRY_industralism: "Промисловий фокус"
 GRY_industralism_desc: "Грифія не може дозволити собі висиджуватись у минулому, все ще обробляючи свої просторі поля без допомоги машин — ми повинні модернізувати нашу промисловість будь-якою ціною. Тільки так ми зможемо увійти у майбутнє, як сильна, незалежна держава."
 GRY_industralism_2: "$GRY_industralism$"
