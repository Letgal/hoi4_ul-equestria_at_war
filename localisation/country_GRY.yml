 GRY_release_brodfeld: "Відновити Бродфельдську монархію"
 GRY_release_brodfeld_desc: "Зі становленням Бродфельду під наш контроль, назріло питання — а чи варто відновлювати Королівство Бродфельд? Ми можемо просто окупувати країну, але у нас нема законних претензій на ці землі. Створення маріонетки може бути вигіднішим."
