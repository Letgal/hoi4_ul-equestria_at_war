 hostraidlakecity.1.t: "Успішний похід на Єзераград"
 hostraidlakecity.1.d: "Нікчемні поні з Єзераграду не змогли вистояти проти славних козаків! Після перетину нами кордону захисники Єзераграду відступили, і наш переможний полк козаків повертається з багатими дарами!"
 hostraidlakecity.1.a: "Вони не мали шансів!"
 hostraidlakecity.2.t: "Єзераград відбиває рейд"
 hostraidlakecity.2.d: "Наші бійці переходили кордон Єзераграду, передбачаючи легку здобич та криваву різню. На жаль, ці сподівання не стали реальністю, оскільки поні Єзераграду змогли швидко організуватись у смертельну силу і перебили та захопили у полон наших відважних грифонів."
 hostraidlakecity.2.a: "Довго помста чекати не буде!"
 hostraidlakecity.3.t: "Успішний захист від рейдерів-грифонів"
 hostraidlakecity.3.d: "Сьогодні на світанку загін рейдерів перетнув наш південний кордон, найімовірніше прийшовши з Грифійської Січі. Завдяки нашим добре підготованим прикордонним частинам із рейдерами хутко розібралися, і більшість із них полягла під тривалим вогнем рушниць. Це лише ознака тривалої агресії Грифійської Січі у відношенні нас, і багато хто вважає, що з ними треба щось учинити." # (&+?)
 hostraidlakecity.3.a: "Єзераград не похитнеться!"
 hostraidlakecity.4.t: "Рейдери-грифони атакують"
 hostraidlakecity.4.d: "Сьогодні рейдери-грифони перевалили серез кордон і хутко зломили наших захисників на кордоні. Рейдери повернулися на землі Грифійської Січі раніше, ніж проти них можна було зібрати дієву силу, і відбули зі своєю неушкодженою здобиччю." # (&+?)
 hostraidlakecity.4.a: "Прикро."
 hostraidlakecity.5.t: "Рейдери-грифони відступають!"
 hostraidlakecity.5.d: "Рейдери-грифони, відправлені нещодавно до Єзераграду, були змушені відступити через обставини в них удома. Народ Єзераграду сьогодні зітхнув із полегшенням."
 hostraidlakecity.5.a: "Цікаво."
 hostraidwittenland.1.t: "Успішний похід на Віттенленд"
 hostraidwittenland.1.d: "Нікчемні поні з Віттенленду не змогли вистояти проти славних козаків! Після перетину нами кордону захисники Віттенленду відступили, і наш переможний полк козаків повертається з багатими дарами!"
 hostraidwittenland.1.a: "Пам'ятай, чужинець, тут хазяїн — грифієць!"
 hostraidwittenland.2.t: "Віттенленд відбиває рейд"
 hostraidwittenland.2.d: "Наші бійці переходили границю Віттенленду, передбачаючи легку здобич та криваву різню. На жаль, ці сподівання не стали реальністю, оскільки поні Віттенленду змогли швидко організуватись у смертельну силу і перебили чи захопили у полон наших відважних грифонів."
 hostraidwittenland.2.a: "Довго помста чекати не буде!"
 hostraidwittenland.3.t: "$hostraidlakecity.5.t$"
 hostraidwittenland.3.d: "Рейдери-грифони, відправлені нещодавно до Віттенленду, були змушені відступити через обставини в них удома. Браві захисники Віттенленду сьогодні зітхнули з полегшенням."
 hostraidwittenland.3.a: "$hostraidlakecity.5.a$"
 hostraidwittenland.4.t: "$hostraidlakecity.3.t$"
