 ED_tree_of_harmony_magic:0 "Сила Гармонії"
 ED_tree_of_harmony_magic_desc:0 "Славнозвісне Дерево Гармонії — це стародавнє магічне дерево, розташоване у Вічнодикому лісі. Посаджене під час заснування Еквестрії, воно наповнене магією глибокої віри поні в силу дружби. Певний час тому дерево створило Замок Дружби для Твайлайт Спаркл разом із К'юті-мапою — мапою, що відправляла Магічну Шістку на місії з відновлення дружби всюди, де вона була під загрозою.\n\nТепер, перед обличчям безпрецедентної кризи, дерево знову відреагувало і створило сильний щит, щоб завадити злим алікорнам повернутися до Еквестрії. Проте це ще не все. Дерево також дає Магічній Шістці силу поширювати гармонію та збирати друзів як всередині, так і за межами Еквестрії, щоб підготуватися до фінального шторму...\n\nПоточна £GFX_magic_texticon сила Дружби: §Y[?EQS_ED_friendship_power_current]/100§!\nТижневий приріст: §Y[?EQS_ED_friendship_power_gain]§!"
