 EQS_EQC_AF_dialogue_1: "Це безумовно був цікавий досвід."
 EQS_EQC_AF_dialogue_2: "Дякуємо Діскорду за те, що він такий крутий dungeon master!"
 EQS_EQC_AF_dialogue_3: "Як на мене, навіть занадто крутий. Місцями все здавалося аж надто реальним."
 EQS_EQC_AF_dialogue_4: "У Діскорда завжди так."
 EQS_EQC_AF_dialogue_5: "Ой, та яка користь від магії хаосу, якщо з нею трохи не розважитися, чи не так? Ну ж бо, скажіть, що я правий!"
 EQS_EQC_AF_dialogue_6: "Це точно було набагато вражаюче за мої шкільні роки."
 EQS_EQC_AF_dialogue_7: "Справжнє шоу, якщо дозволите так мовити."
 EQS_EQC_AF_dialogue_8: "Це був справді несподіваний поворот — те, що нам із Луною дісталися ролі лиходіїв."
 EQS_EQC_AF_dialogue_9: "І ми вас абсолютно розтрощили."
 EQS_EQC_AF_dialogue_10: "Я не винна, що так випали кубики."
 EQS_EQC_AF_dialogue_11: "Через ці вставні зуби, які Діскорд дав моїй «Дейбрейкер», було досить важко нормально розмовляти."
 EQS_EQC_AF_dialogue_12: "Але у вас обох були просто вишукані вбрання."
 EQS_EQC_AF_dialogue_13: "Я надихнувся одним сном Старлайт Ґліммер, про який мені колись розповідала Твайлайт."
 EQS_EQC_AF_dialogue_14: "Так, пам'ятаю..."
 EQS_EQC_AF_dialogue_15: "Але битва між Дейбрейкер та Найтмер Мун була б такою передбачуваною. Мені подобається додавати трохи хаосу в сюжет, розумієте?"
 EQS_EQC_AF_dialogue_16: "Без сумніву. І як поні, яка, можливо, єдина заздалегідь вивчила книгу правил..."
 EQS_EQC_AF_dialogue_17: "Ти справді це зробила?"
 EQS_EQC_AF_dialogue_18: "...можу сказати, що з правилами ти теж поводився досить вільно."
 EQS_EQC_AF_dialogue_19: "Усе заради повного занурення! Саме це і робить мене крутим dungeon master."
 EQS_EQC_AF_dialogue_20: "Я думаю, ти — найкращий."
 EQS_EQC_AF_dialogue_21: "З тебе також вийшов би чудовий організатор вечірок, Діскорде."
 EQS_EQC_AF_dialogue_22: "То що, коли там реванш?"

 EQS_EQC_AF_TwilightTheory_Regent_dialogue_1: "АХАХАхахаха...."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_2: "Ти вже закінчила зі своїм маніакальним сміхом, чи нам дати тобі ще кілька годин побути в центрі уваги?"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_3: "Ого, Твай, я й не подумала б, що ти так... зануришся в роль."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_4: "О-о матоньки, мені так соромно перед усіма! Здається, я трохи переборщила з рольовою грою."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_5: "Не могла дочекатися наступного тижня для нашої партії в «Пісню Сирен», еге ж? «Часікі тікают»!"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_6: "Ей, не чіпляйтеся до неї!"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_7: "...А мені здалося, що це було весело."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_8: "Поворот із трьома лиходіями був просто бомбезний!"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_9: "Справді. Я була здивована, що ми з сестрою грали лиходійок, але «Міднайт» зробила все значно цікавішим."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_10: "...будь ласка, не кажи так, мені стає зовсім ніяково."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_11: "Минуло вже кілька Ночей Жахів відтоді, як я востаннє розминала свій лиховісний голос."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_12: "Мушу сказати, у вас усіх були просто вишукані вбрання."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_13: "Я надихалася одним сном Старлайт Ґліммер, про який мені колись розповідала Твайлайт."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_14: "Так, пам'ятаю..."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_15: "Але битва між Дейбрейкер та Найтмер Мун була б такою передбачуваною. Мені подобається додавати трохи хаосу в сюжет, розумієте?"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_16: "Без сумніву. І як поні, яка, можливо, єдина заздалегідь вивчила книгу правил..."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_17: "Ти справді це зробила?"
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_18: "...можу сказати, що з правилами ти теж поводився досить вільно."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_19: "Усе заради повного занурення! Саме це і робить мене крутим dungeon master."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_20: "Я думаю, ти — найкращий."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_21: "З тебе також вийшов би чудовий організатор вечірок, Діскорде."
 EQS_EQC_AF_TwilightTheory_Regent_dialogue_22: "То що, коли там реванш?"

 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_1: "...Я досі не можу повірити, що ти дозволив мені програти так рано."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_2: "Вибач, Твайлайт, але так розпорядилася доля. Не злися на мене, злися на кубики."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_3: "Ні, вона права! Ми впустили його в нашу гру, і що він зробив? Він просто загарбав її собі!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_4: "Атож, Деш, вріж їм! Це мала бути розвага для всіх, а він узяв і перетворив усе на шоу імені себе!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_5: "Н-ну, давайте не будемо такими грубими, я впевнена, він хотів як краще."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_6: "Не захищай його, Флаттершай! Це ж чистий селф-інсерт заради втілення власних фантазій! Я маю на увазі, його передісторія взагалі не має жодного сенсу!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_7: "Точно! Навіщо [STL.GetName] взагалі здався адмірал?"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_8: "Насправді, це не рідкість для країн без виходу до моря — мати адміралів. Окрім річкових флотилій—"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_9: "Я думаю, ви всі занадто суворі до нього! Слухайте, він зробив із цього комуністичну вечірко-партію! Хіба це може бути погано?"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_10: "Пінкі..."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_11: "Справді. До того ж у нього була така вишукана форма. І взагалі, дивлячись на те, як поводилася Твайлайт, я не впевнена, що хотіла б побачити, куди зайшла б її рольова гра."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_12: "Друзі, будь ласка, заспокойтеся. Не будьмо такими суворими до нашого гостя, він—"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_13: "«Занадто суворими»? Сестро, я думаю, ми були недостатньо суворими! Цей вечір мав бути про НАС, а він перетворив його на вечір про НЬОГО!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_14: "Ну, ми все одно зіграли в нашу гру! Фінал вийшов досить приємним, якщо дозволите так мовити!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_15: "Але це мала бути гра з друзями! З нашими друзями, яких, нагадаю, відсунули на другий план майже миттєво!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_16: "Та облиште, ми всі знали, що таке можливо. Не можна вмикати одразу ДВА першоквітневих контенти й не очікувати, що щось піде шкереберть!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_17: "Пінкі, про що ти взагалі верзеш?!?"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_18: "А вона права, знаєте. Якщо подумати, то в усьому цьому винен лише §RГРАВЕЦЬ§!."
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_19: "Я ВЗАГАЛІ НЕ РОЗУМІЮ, ПРО ЩО ВИ ГОВОРИТЕ! ЯКИЙ ЩЕ §RГРАВЕЦЬ§?!"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_20: "Е-ем, друзі?"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_21: "ЩО?!?"
 EQS_EQC_AF_TwilightTheory_Sentry_dialogue_22: "Д-дякую, що запросили мене сьогодні... "

 EQS_EQC_AF_Kattail_dialogue_1:0 "..."
 EQS_EQC_AF_Kattail_dialogue_2:0 "Що ж, це було досить весело, а?"
 EQS_EQC_AF_Kattail_dialogue_3:0 "Е-е... я... мабуть?"
 EQS_EQC_AF_Kattail_dialogue_4:0 "Дякую, що дозволили мені розважитися з усіма цими божевільними ідеями! Хіба та гігантська дамба не була крутезною? А як щодо танка? Вам же всім сподобався танк, правда? Я дуже важко працював над цією ігровою сценою."
 EQS_EQC_AF_Kattail_dialogue_5:0 "Танк це прям ніхера собі."
 EQS_EQC_AF_Kattail_dialogue_6:0 "Це точно."
 EQS_EQC_AF_Kattail_dialogue_7:0 "Ви виглядаєте... не надто задоволеними? Я щось зробив не так?"
 EQS_EQC_AF_Kattail_dialogue_8:0 "Ну... коли ми казали, що ти можеш «відірватися на повну» зі своєю країною, ми не зовсім—"
 EQS_EQC_AF_Kattail_dialogue_9:0 "—ми не зовсім це мали на увазі, розумієш?"
 EQS_EQC_AF_Kattail_dialogue_10:0 "Ой, та годі вам. Вам, принцесам, можна бути буквальними богами, то що поганого в тисячокілометровому танку в грі?"
 EQS_EQC_AF_Kattail_dialogue_11:0 "Ну, вони §YІ Є§! буквальними богами, у цьому ж і фішка."
 EQS_EQC_AF_Kattail_dialogue_12:0 "Хіба мені не можна теж відчути себе буквальним богом хоча б на одну гру?"
 EQS_EQC_AF_Kattail_dialogue_13:0 "Справа не в цьому, а радше в усьому тому... ну... звідки твій персонаж взагалі взяв усі ці знання? Ти ніколи... не пояснював цього."
 EQS_EQC_AF_Kattail_dialogue_14:0 "Пояснював! Ви просто забули! Він — Циклозмінювач, а це означає, що коли він програє, він може спробувати знову, у наступному всесвіті, у далекому майбутньому. Тож він уже знає все, що йому потрібно зробити для перемоги, бо він уже робив це раніше."
 EQS_EQC_AF_Kattail_dialogue_15:0 "Хіба це не якось... дешево? Це звучить як спосіб зробити його непереможним, заявляючи про якісь слабкості, які ніколи не потрібно показувати."
 EQS_EQC_AF_Kattail_dialogue_16:0 "..."
 EQS_EQC_AF_Kattail_dialogue_17:0 "Ну, е-ем, я маю на увазі... це безумовно цікава концепція..."
 EQS_EQC_AF_Kattail_dialogue_18:0 "Особисто мені здалося, що мегапроєкти були досить кумедними."
 EQS_EQC_AF_Kattail_dialogue_19:0 "О! Справді?"
 EQS_EQC_AF_Kattail_dialogue_20:0 "Ага. Мені сподобався хаос, який вони сіяли всюди. Ми маємо збудувати їх у реальному житті!"
 EQS_EQC_AF_Kattail_dialogue_21:0 "Навіть не думай про це."
 EQS_EQC_AF_Kattail_dialogue_22:0 "...ну, е-ем, мабуть, мені варто повернутися до колекціонування марок замість настольних воєнних ігор..."

