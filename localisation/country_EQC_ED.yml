 evildiarchy_newmareland.1.t:0 "Неочікуваний гість"
 evildiarchy_newmareland.1.d:0 "В офісі Отем Бріза панувала тиша, яку лише зрідка порушувало шелестіння паперу. Підготовка до операції «Муншайн» була в самому розпалі, що вимагало справді приголомшливої кількості паперової роботи для хоча б найменшої надії на успіх. Агенти були розставлені в Еквестрії, мережі зв’язків налагоджені або відновлені, а план дій отримав схвалення Легіонерської ради. Проте залишалося ще багато роботи.\n\nРаптовий порив вітру змусив його підняти очі. Посеред офісу стояла задрапірована в капюшон істота, яка, здавалося, з’явилася з нізвідки. Чорний плащ унеможливлював будь-які здогадки про її вигляд. Отем не міг заперечити певну схожість із тим, як у дитячих казках зображували похмурого женця, але він став Воєначальником не для того, щоб його було так легко налякати.\n\n«Чого тобі треба? — прогарчав він. — І як ти сюди потрапив? Мій офіс не громадський парк, щоб будь-хто міг сюди забрести.»\n\nІстота не ворухнулася, але дала повільну відповідь, наче намагаючись не видати свій справжній голос: «Ваш план приречений. Луна не перетвориться на вашу богиню від того, що ви її підірвете.» Отем Бріз притиснув вуха, але істота була непохитною. «Я прийшла до вас із пропозицією. Прийміть її, і операція «Муншайн» досягне успіху.»\n\n«Що ти пропонуєш?.. І що хочеш натомість?» відповів Воєначальник, звузивши очі.\n\nІстота похмуро засміялася, перш ніж витягти з-під капюшона маленьку пляшечку, вражаючим чином не оголивши ні дюйма своєї ноги. «Тут міститься магічна речовина, яка перетворює будь-якого алікорна на його справжню, наймогутнішу форму. Використовуйте її з розумом, бо, як бачите, її небагато.» Після короткої паузи вона продовжила «А щодо моєї ціни... платитимуть не Ви і не Хіроптерра. Вирішуйте обережно. Я вірю у Вас. А тепер, — вона схилила голову, — бувайте.»\n\nПерш ніж Отем Бріз встиг щось відповісти, істота поставила пляшечку на його стіл. Він схопився, щоб зупинити її, але поки він обходив стіл, істота вже беззвучно відчинила двері й зникла з офісу. Він вибіг за двері й помчав коридором, але її ніде не було.\n\nНіхто інший не бачив навіть її тіні, тож йому нічого не залишалося, як повернутися до свого кабінету. Пляшечка все ще лежала на столі, а есенція в ній переливалася іскристим синювато-фіолетовим тоном."
 evildiarchy_newmareland.1.a:0 "І що нам з цим робити?"

 evildiarchy_newmareland.2.t:0 "Зміна планів"
 evildiarchy_newmareland.2.d:0 "Легіонерська рада швидко схвалила новий план. На думку Отем Бріза, навіть занадто швидко. Вони не бачили тієї дивної істоти... Проте не можна було заперечити, що новий план здавався значно надійнішим і менш залежним від випадковостей.\n\nМаючи магічну пляшечку, здатну перетворити Луну назад на Найтмер Мун, усе інше було досить простим. Рада вирішила не намагатися таємно доправити агента в замок Кантерлот — це було б занадто зухвало, враховуючи кількість присутніх там магів-єдинорогів. Замість цього принцесі надішлють фальшивий звіт із закликом прибути до Нового Мейрленда на прохання місцевих фестралів. Потім агент потайки додасть магічне зілля в її напій, і невдовзі, якщо зілля спрацює, у світі стане на одну принцесу менше і на одну імператрицю більше.\n\nМережа контактів, початково підготовлена для операції «Муншайн», зробила фальсифікацію звіту про фестралів Нового Мейрленда нескладним завданням. Цього ж вечора Отем Бріз мав зустрітися з агентом, обраним для застосування магічного зілля. Але коли він знову і знову переглядав план, він не міг позбутися дивного відчуття. Здавалося, що і він і Рада щось упустили, але він не міг збагнути, що саме.\n\nМагічна пляшечка все ще стояла на його столі, рідина в ній мерехтіла синювато-фіолетовим. Придивившись ближче, він побачив маленькі яскраві іскри, що кружляли в ній. Хто її створив? І ким насправді була та постать у капюшоні? А головне — чи спрацює вона так, як було обіцяно?"
 evildiarchy_newmareland.2.a:0 "Тепер залишається тільки чекати і сподіватися."

 evildiarchy_newmareland.3.t:0 "Проблеми в Новому Мейрленді"
 evildiarchy_newmareland.3.d:0 "«Луно, ти впевнена щодо цього?» запитала Селестія, спостерігаючи, як її сестра ходить по своїх покоях у палаці Кантерлота, поступово пакуючи валізи.\n\n«Я абсолютно впевнена. Ситуація в Новому Мейрленді набагато гірша, ніж я могла собі уявити, — відповіла вона, навіть не глянувши на сестру. — Фестрали колонії зіткнулися з небаченою кризою. Я зобов'язана особисто вивчити ситуацію і з'явитися на публіці.»\n\nСлова Луни, однак, не втихомирили тривогу Селестії. Хоча вона ніколи не мала ідеального нагляду за Новим Мейрлендом, вона не могла пригадати жодного інциденту, який міг би натякати на таку жахливу ситуацію. Зрештою, фестралів у Новому Мейрленді було дуже мало, а більшість історичних чинників, що викликали тертя між племенами в Еквестрії, там були повністю відсутні.\n\nЗвісно, Принцеса Сонця знала, що вона далеко не непогрішна, і було б цілком можливо, що щось подібне застало її зненацька. Вона бачила звіт і не мала підстав сумніватися в його правдивості: джерело було надійним, а викладені факти — обґрунтованими, хоч і несподіваними. Ігнорування ситуації могло призвести до вельми похмурих наслідків, тож наполегливість Луни щодо поїздки була виправдана. І все ж... Селестію не покидало погане передчуття.\n\nВона зітхнула. «Луно, як ти думаєш, чи могла б ти відкласти свою поїздку ще на день?» Луна нарешті повернулася і подивилася їй в очі, водночас розгублена й обурена. «Я хотіла б поїхати з тобою, але мені потрібно владнати справи з Рейвен перед моїм від’їздом.»\n\n«...Справді, сестро? — очі Луни розширилися. — Ти серйозно?»"
 evildiarchy_newmareland.3.a:0 "«Звісно. Ми маємо вирішувати такі питання разом.»"
 evildiarchy_newmareland.3.b:0 "Ця ситуація точно заслуговує уваги..."

 evildiarchy_newmareland.4.t:0 "Принцеси відвідують Новий Мейрленд"
 evildiarchy_newmareland.4.d:0 "Неймовірні новини поширилися з блискавичною швидкістю: Селестія та Луна, правлячі принцеси Еквестрії, вирушають до Нового Мейрленда. За чутками, їх викликав колоніальний уряд після появи вкрай тривожних повідомлень про становище фестралів у еквестрійській колонії. Поїздка, судячи з усього, запланована лише на тиждень, оскільки присутність двох сестер, безумовно, дозволить швидко вирішити ситуацію. Проте це все одно перший випадок у відомій історії, коли обидва алікорни залишили Еквестрію, і перший раз, коли вони ступили копитом на землю Грифонії."
 evildiarchy_newmareland.4.a:0 "Принцеси в Новому Мейрленді? Я мушу це побачити!"
 evildiarchy_newmareland.4.b:0 "А що там Еквестрія?"
 evildiarchy_newmareland.4.c:0 "Роблять з мухи слона..."
 evildiarchy_newmareland.4.c_tt:0 "§RГрати за будь-яку країну на Еквусі, окрім Еквестрії, під час цьогорічного першоквітневого оновлення не рекомендується.§!"
 evildiarchy_newmareland.4.e:0 "Чекайте, що? Хто саме їх викликав?"
 evildiarchy_newmareland.4.f:0 "ОБИДВА алікорни? Але ж мала бути тільки Луна... Я мушу негайно це побачити!"
 evildiarchy_newmareland.4.g:0 "Он як? Сподіваємося, наш агент зможе імпровізувати."

 evildiarchy_newmareland.5.t:0 "Чай із сюрпризом"
 evildiarchy_newmareland.5.d:0 "Рано-вранці, після прибуття до Нового Мейрленда, Селестія та Луна забажали бачити Джет Сета. На превеликий жаль Луни, Джет Сет виявився абсолютно необізнаним щодо ситуації, описаної у звіті, який Луна прочитала стільки разів, що знала його напам'ять. Він нічого не знав про жодні нібито конфіскації чи навіть самосуди над фестралами.\n\nСелестії знадобилося чимало ретельно підібраних... дипломатичних слів, щоб стримати запал своєї сестри, доки вони не з'ясують, що, в ім'я Еквестрії — чи то пак, Нового Мейрленда — відбувається. Після дуже напруженої години обговорень було вирішено, що вони втрьох самі розслідують твердження звіту. Основний настрій їхньої зустрічі був сумішшю розгубленості та розчарування, що не могло не посилити тривогу Селестії.\n\nЗгодом обидва алікорни повернулися до принцесового люкса у своєму готелі з наміром трохи відпочити. Тим часом Джет Сет мав звільнити місце у своєму графіку для їхнього розслідування.\n\nЛуна не відразу приєдналася до Селестії на дивані, натомість запропонувавши заварити їм чаю. За пару хвилин вона повернулася, сівши навпроти сестри за низький столик, зітхаючи. «Хороші новини, сестро, тут є кава. — Зустрівши примружений погляд Селестії, вона посміхнулася. — Не хвилюйся, авжеж я тобі зробила чай.»\n\n«Я ніколи не зрозумію, як ти можеш терпіти цю штуку, Луно, — просміялася Селестія, — але дякую за чай.» Луна лише кивнула на знак згоди.\n\nТим часом на кухні вкрай розгублена шпигунка-фестрал не могла вирішити, куди вилити пляшечку, яку їй дали: у чайник чи у вінґбардійську кавоварку, що грілися на плиті. Після болісної хвилини вагань вона розділила зілля між ними двома, після чого знову зникла у своїй схованці.\n\nЩойно зашипів чайник, Селестія пішла на кухню, щоб приготувати свій чай і налити каву Луні, після чого повернулася до дивану. Чай Селестії виявився трохи солодшим, ніж очікувалося, але після подібного ранку більше цукру тільки допомагало. Проте, коли Луна задала питання, по її спині пробіг мороз. «Сестро, навіщо ти додала цукор? Я ж казала тобі, що п'ю чорну каву.» Перш ніж усвідомлення наслідків наздогнало хоча б одну з них, обидві заціпеніли."
 evildiarchy_newmareland.5.a:0 "Краї їх зору огорнулися в темряву."

 evildiarchy_newmareland.6.t:0 "Піднесення"
 evildiarchy_newmareland.6.d:0 "Магічні потоки вирвалися зсередини обох сестер — сліпучо-білий та вугільно-чорний відповідно, піднявши їх над землею та огорнувши щільними сферами. За кілька митей шерсть Луни почорніла, мов полуніч, а грива Селестії спалахнула, палахкотячи в ефірному вітрі.\n\nЗнадобилося лише кілька секунд, щоб їхня потаємна сила проявилася повною мірою. Потоки згасли так само швидко, як і здійнялися. За мить вогняні зіниці Дейбрейкер зустрілися з хижими зіницями Найтмер Мун. Обидві зробили крок назад, схиливши роги, поки на їхніх кінчиках накопичувалася руйнівна міць.\n\n«ТИ! Як ТИ тут вилупилася?» вигукнула Найтмер.\n\n«О, все така ж непосида, м? — Попри насмішкуватий тон, Дейбрейкер залишалася напоготові, стежачи за будь-яким різким рухом своєї супротивниці. — Але відповідаючи на твоє питання: без поняття. Мабуть, як і ти?»\n\n«Абсолютно, але піддаватися на твої хитрощі я не планую.» Проте вона не вдарила першою.\n\nДейбрейкер закотила очі. «Ой, благаю тебе, сестро. Ми обидві знаємо, що якби я хотіла знищити тебе, я б просто це зробила. На відміну від тебе, мені не потрібно грати в рольові ігри.»\n\nНайтмер звузила очі, оголивши ікла, перш ніж усвідомити, що в цих словах була частка правди. Якби такий був її намір, Дейбрейкер б вже вдерлася їй в шию. Власне, Найтмер Мун також не мала причин битися. «Тобі пощастило, що я готова проігнорувати цей коментар, бо я теж не прагну безглуздої битви, але не думай ні на секунду, що я втрачу пильність.»\n\n«Навіть і не мріяла б про це! — Дейбрейкер посміхнулася. — Ах, ніколи не думала, що укладу перемир'я саме з тобою, але куди подітися...»"
 evildiarchy_newmareland.6.a:0 "Здається, поки що, їм краще бути на одному боці."

 evildiarchy_newmareland.7.t:0 "Нова робота Джет Сета"
 evildiarchy_newmareland.7.d:0 "Цілу пів хвилини все, що міг робити Джет Сет — це витріщатися на двох алікорнів, що височіли над ним. «Як? Коли—?» нарешті зміг вимовити він.\n\n«Ми не знаємо, — вигукнула Найтмер. — Але факт залишається фактом: Ми залишили Наші мізерні старі «я» позаду і піднеслися до Своїх справжніх форм.» Джет Сет не мав уявлення, що з цим робити, хоча те, що він досі був живий, ймовірно, було хорошим знаком.\n\n«І б'юся об заклад, тобі цікаво, навіщо Ми тебе покликали, — з усмішкою промуркотіла Дейбрейкер. — Насправді відповідь досить проста.» Вона витримала паузу на довгі секунди, яку перервала Найтмер.\n\n«Нам потрібен... секретар, вірний помічник, бо Ми беремо під Своє керівництво Новий Мейрленд.» У голові Джет Сета одразу виникло безліч запитань. Чому Новий Мейрленд? Чому не повернутися в Еквестрію? Невже вони просто настільки прагнуть влади? Проте інстинкт самозбереження змусив його залишити їх при собі.\n\nТим часом Дейбрейкер закотила очі, поглянувши на сестру. «Обов'язково було псувати момент?»\n\nНайтмер зиркнула у відповідь. «Я просто вважаю, що зараз Нам не потрібен зайвий драматизм. У Нас багато роботи.»\n\n«Нагадай мені, чому я подумала, що партнерство з тобою — гарна ідея, люба сестро?» Голос Дейбрейкер сочився сарказмом на останніх словах.\n\nКеруючись знову ж таки інстинктом самозбереження, Джет Сет прокашлявся. «Я... я не хочу вас переривати, але чи не збиралися ви попросити мене допомогти вам знайти... вірного помічника?»\n\n«О, авжеж, — тої ж секунди видала Дейбрейкер, її посмішка повернулася. — Але... знайти? Нащо?»."
 evildiarchy_newmareland.7.a:0 "«Ти, Джет Сет, ти будеш канцлером Нашій імперії.»"

 evildiarchy_newmareland.8.t:0 "Конгрес «залишається»"
 evildiarchy_newmareland.8.d:0 "Сьогодні відбулася інавгурація нових членів конгресу, обраних, звісно ж, самими Діархами. Я знаю багатьох із них, саме тому я не знаходжу собі місця. Деякі з них — поні з занадто м'яким серцем для такої посади, поні, схильні погоджуватися майже з чим завгодно. Серед них також чимало молодих амбітних політиків — тих, хто завжди намагатиметься догодити начальству. Інші — відверто корумповані. Навіть ті, хто не підпадає під жодну з цих категорій, мають занадто багато чого втрачати, щоб ризикувати відкрито протистояти сестрам.\n\nТакі політики зазвичай неминучі, але мене жахає те, що алікорни замінили будь-кого, хто бодай віддалено був готовий висловитися проти них, на цих поні-підтакувачів, які існують лише для того, щоб підписувати все, що їм підсунуть. Очевидний позитив у тому, що конгрес усе ще існує, і навіть якщо я сумніваюся, що він сам по собі буде корисним, мені потрібно чіплятися за будь-яку надію. Зрештою, тупий інструмент все ще можна заточити.\n\nПринаймні у цьому я хочу себе переконати. Це сильний удар по нашій демократії і похмуре нагадування, що далі буде тільки гірше. Ці двоє поглинають і централізують владу з тривожною швидкістю, а мені доводиться займатися цим делікатним балансуванням. Якщо я намагаюся щосили пригальмувати одну з сестер, я також маю показово так само гальмувати іншу. А якщо я робитиму це занадто часто, вони просто позбудуться мене. Прямо мрія."
 evildiarchy_newmareland.8.a:0 "Із зітханням Джет Сет відклав перо і закрив свій щоденник."

 evildiarchy_newmareland.9.t:0 "Наче його й не було"
 evildiarchy_newmareland.9.d:0 "[?global.date.GetDateStringNoHourLong]\n\nОт воно і сталося. Щоразу, коли мені здається, що я більш-менш звикаю до ситуації, реальність вибиває ґрунт з-під моїх копит. Сьогодні конгрес був офіційно розпущений. Я очікував це задовго до того, як це сталося наживо. Тартар, я навіть допомагав цьому статися. Проте це не відчувалося по-справжньому, до цього моменту.\n\nПротягом усього процесу я переконував себе, що конгрес усе одно не зміг би нічого вдіяти, коли на чолі держави стоять ці сестри. Тепер, коли він нарешті зник, це здається лише розпачливою спробою знайти бодай якийсь промінь надії. Правда в тому, що конгрес міг би хоча б дозволити нам створити видимість стабільності чи легітимності.\n\nЯк би там не було, тепер усі знають, чого ці двоє хочуть насправді. Поні налякані, а налякані поні приймають егоїстичні рішення. Я не можу їх звинувачувати, але я нажаханий думками що станеться, коли піде перша тріщина. Гірше того, я навіть не переживаю за поні, які живуть своїм повсякденним життям, принаймні не безпосередньо. Відверто, я просто боюся того, що станеться, якщо алікорни не отримають вимаганого. Я відчуваю себе бездушним. Чи справді я маю право вирішувати такі речі?\n\nЯкась частина мене хоче сказати «так». Зрештою, якщо сестри підірвуть нас усіх через нерозділену крихту хліба, питання стабільності стане неактуальним. Та й не сильно важливо що я думаю. Я безсилий їх зупинити. Я можу лише виграти час для того, щоб це зробив хтось інший. Якби тільки ці думки не заважали мені спати ночами..."
 evildiarchy_newmareland.9.a:0 "Із зітханням Джет Сет відклав перо і закрив свій щоденник."

 evildiarchy_newmareland.10.t:0 "Вагомі слова"
 evildiarchy_newmareland.10.d:0 "«Ви хотіли зі мною поговорити, Ваша Величносте?» промовив Джет Сет, обережно відчинивши двері до нового офісу Дейбрейкер. У нього було погане передчуття. Як зазвичай.\n\n«Хотіла. Я придумала план, як... розібратися з місцевими гармоністами.» Дейбрейкер похмуро засміялася, змусивши серце Джет Сета зайтися в шаленому ритмі.\n\nНевже вона має на увазі...? Він нагадав собі не робити поспішних висновків і запитав. «Що саме Ви задумали?»\n\nДейбрейкер посміхнулася, явно задоволена його реакцією. «Я поговорю з ними. Особисто.» Це... Це було краще, ніж очікувалося.\n\n«Я призначу час і місце, — швидко промовив канцлер, користуючись шансом, поки вона не передумала. — «Коли саме Ви б хотіли її провести?»\n\n«О-о... — її посмішка стала ще ширшою. — Я думаю, близько полудня буде найкраще. Це допоможе їм зрозуміти, чим саме вони ризикують у разі відмови.»\n\nОт і підвох. Вона змусить їх грати свою роль або зникнути назавжди. Йому не варто було очікувати нічого іншого від егоцентричного, всемогутнього і злостивого алікорна."
 evildiarchy_newmareland.10.a:0 "«П-прийнято.»"

 evildiarchy_newmareland.11.t:0 "Найпростіше рішення у світі"
 evildiarchy_newmareland.11.d:0 "«Ще одне питання, Ваша Величносте, — почав Джет Сет, позначаючи останній пункт у своєму списку. — Партія гармоністів завжди мала сильний вплив у Новому Мейрленді. — Те, що він подав це як нейтральний факт, змусило його шлунок стиснутися. — Вони вже починають формувати опозицію до...\n\n«Ай, не для твого розуму турбота. Питання вже вирішено.» буденно відповіла Найтмер Мун.\n\n«І... що Ви маєте на увазі?» Він дуже не хотів чути відповіді, але вибору не було.\n\n«Я збиралася дати тобі певне завдання завтра, але оскільки ми зачепили цю тему... — Імператриця відкрила одну зі шухляд, левітацією витягла складений аркуш паперу і спрямувала його до нього. Це був список імен разом із адресами. — Я б воліла, щоб ти передав новини родичам цих зрадників.\n\n«Я... я розумію.» Джет Сету стало млосно, він ледве міг зберігати нейтральний вираз обличчя. Хоча чому він був шокований? Діям цих двох не варто дивуватися.\n\nНайтмер похмуро засміялася. «Гадаю, ти завжди можеш принести їм кошик із сиром. Життя ми повернути не здатні, а піднести нашу компенсацію цілком. Повернеш навіть більше, ніж було забрано, враховуючи ціну їх життів.» Джет Сету знадобилися всі сили, щоб не дозволити її «жарту» закарбуватися в уяві, картинка якого зламала б його остаточно."
 evildiarchy_newmareland.11.a:0 "«Буде зроблено, Ваша Величносте.»"

 evildiarchy_newmareland.12.t:0 "Момент здорового глузду"
 evildiarchy_newmareland.12.d:0 "У двері Джет Сета постукали. Ймовірно, це була Кенді Ґарден. «Прошу!» Справді, згадана кобила увійшла до його кабінету. Жестом запросивши її до крісла і відклавши папери, поні почав. «Мені страшенно ніяково за так раптово призначену зустріч. Ще раз дякую, що знайшли для мене час.»\n\n«Не варто, — сівши відповіла Кенді. — Це вже велика честь, що Ви розглядаєте мої ідеї щодо армійських реформ.»\n\n«Не будьте такою скромною, пані Ґарден. Я б не почув про них, якби про них не ходила така добра репутація. — Джет щиро посміхнувся їй. — Чим більше я чую про них, тим більше хочу дізнатися. Часто поні, які просувають найбільш радикальні ідеї, стають сумнозвісними. Ви ж, пані Ґарден, готові дати реформам час, який їм необхідний.»\n\n«Будь ласка, кличте мене Кенді. Окрім того, я з радістю поділюся з Вами своїми ідеями, оскільки Ви так охоче слухаєте.» Вона почала пояснювати кожен крок свого плану, а Джет Сет час від часу втручався, щоб або виправити деталь, або внести невелику пропозицію, та загалом він переконався, що армійська кобила знає, про що говорить.\n\nПроте він не погоджувався з основною ідеєю, і незабаром стало зрозуміло, чому її пропозиції взагалі стали варіантом для Діархії. З кожним етапом реформ армія ставала б дедалі залежнішою від центральної влади двох сестер, як і суспільство в цілому. Тим не менш, поступовий характер її плану принаймні дав би поні час адаптуватися до нового статусу-кво."
 evildiarchy_newmareland.12.a:0 "Не ідеально, але набагато краще за альтернативу."

 evildiarchy_newmareland.13.t:0 "Момент не зовсім здорового глузду"
 evildiarchy_newmareland.13.d:0 "Коли Аркейн Нова увійшла до його кабінету, Джет Сет, чудово знаючи, що на нього чекає, мусив стримати зітхання. Аркейн Нова, якщо й помітила його роздратування, ніяк не прокоментувала це, сідаючи навпроти нього. «Доброго дня, Джет Сете,» сказала поні з посмішкою.\n\n«Вітаю, пані Нова. Гадаю, вас поінформували про причину вашого візиту?» Він вирішив перейти безпосередньо до теми, хоча це й звучало дещо ніяково. Зазвичай він намагався бути неупередженим і зустрічати кожного з відкритим серцем, але знав, що це буде важко, враховуючи деталі, що він дізнався про неї.\n\n«Звісно. Її Божественна Величність Дейбрейкер обрала мене наглядати за реформами від Її імені. — Посмішка Аркейн зів'яла, перетворившись на гримасу. — Проте мушу визнати, що я більше ніж просто незадоволена необхідністю працювати з Найтмер та її божевільними культистами.\n\nДжет Сет зітхнув. Принаймні вона позбавила його клопоту самому згадувати про її упередження. «Пані Нова, я розумію, що у вас є свої вподобання щодо двох наших правительок, але, будь ласка, зважте на те, чого... насправді хоче Її Божественна Величність Дейбрейкер. — Він зробив паузу, зустрівши її заінтригований погляд. — Вона вирішила співпрацювати з Найтмер Мун, і тому воліла б, щоб Ви уникали сіяння розбрату.» Авжеж Дейбрейкер так не говорила, але це був єдиний спосіб вгамувати кобилу подібну їй.\n\nАркейн, звісно, не намагалася приховати свого роздратування. «Значить буде так. Я зроблю все можливе, щоб працювати з тим, що маю. — Поні закотила очі. — Навіть якщо це означає терпіти найтмеристів. — А зітхнувши, нахилилася вперед. — У будь-якому разі, я вважаю, нам є про що поговорити.»\n\nХоча решта їхньої розмови пройшла настільки добре, наскільки це було можливо, Джет Сет не міг не хвилюватися про майбутнє, адже незабаром стало очевидно: її ідеї, навіть відірвані від її вибухового характеру, опозиційні слову «стабільність»."
 evildiarchy_newmareland.13.a:0 "Здавалося, його можливості щодо мінімізації шкоди ставали дедалі обмеженими."

 evildiarchy_newmareland.14.t:0 "Кінець вистави"
 evildiarchy_newmareland.14.d:0 "Алікорни знову сперечалися. На даному етапі Джет Сет майже звик до цього. Або, можливо, страх заглушив будь-яку іншу думку в його голові. Він намагався втрутитися, сказати хоч щось, щоб відволікти їх, але лише примудрився викликати їхній спільний гнів, після чого вони повернулися до своєї сварки.\n\n«...Справді, — сказала Дейбрейкер. — Я часто замислююся, наскільки більше я б встигла, якби не твоя постійна потреба в увазі. Нагадує мені, чому я тримала тебе в темряві в старі добрі часи.» Серце Джет Сета пропустило удар.\n\nНайтмер Мун люто зиркнула на сестру, і в цій короткій тиші Джет Сет міг би почути, як падає шпилька. «Знаєш що? ДОСИТЬ з мене! Не розумію, чому я взагалі повірила, що у цієї ідеї міг бути шанс на майбутнє!» проревела Найтмер, її ріг спалахнув блискучою, могутньою магією. Канцлер пірнув за стіл саме вчасно, щоб уникнути уламків розтрощеної стіни.\n\nПоні наважився вистромити голову і побачив, як Дейбрейкер знімає свій щит і закочує очі. «О, благаю, не вдавай, ніби це моя провина, коли ми обидві знаємо, що якби ти просто трохи розслабилася... — Їй довелося виставити ще один щит, щоб відбити удар Найтмер Мун. — Коли ж ти вгамуєшся?..»\n\n«Ти ніколи нічого не сприймаєш всерйоз! — Найтмер тупнула по підлозі, без зусиль розтрощивши товсті мармурові плити. — Єдине, на що ти витрачаєш зусилля це применшення моєї влади!»\n\nДейбрейкер пирхнула. «Ніби там є що применшувати. — Посміхаючись, вона ухилилася від променя, навіть не дивлячись на його джерело. Через мить вона ледь відбила ще один. Зціпивши зуби, нарешті пробурмотіла. — Гаразд, буде по-твоєму.» Спалах. Температура в кімнаті піднялася на кілька градусів, коли магія Дейбрейкер розплавила камінь за її супротивницею.\n\nЦіною в ще одну зниклу стіну, обидва алікорни за мить щезли зовні, залишивши після себе панікуючого Джет Сета, поки вибухи стрясали сусідні будівлі."
 evildiarchy_newmareland.14.a:0 "Якби ж тільки все склалося інакше..."

 evildiarchy_newmareland.15.t:0 "Хороші новини для різноманітності"
 evildiarchy_newmareland.15.d:0 "Джет Сет зітхнув із задоволеною посмішкою на обличчі. Перед ним дюжина гвардійців виводила Пікет Фенса разом із його посіпаками з будівлі. Його єдиним жалем було те, що він не зробив цього раніше. Він не протистояв Пікет Фенсу настільки сильно, як мав би, і не зробив нічого, щоб стримати ненависть до грифонів, на якій лідер партії в'їхав у своє крісло.\n\nЗ іншого боку, методи Джет Сета були б набагато витонченішими і, ймовірно, набагато менш задовольняючими. Або, можливо, додаткові зусилля зробили б кінцевий результат ще приємнішим.\n\nУ будь-якому разі, Пікет Фенс нарешті позбувся будь-якої влади, і вперше відтоді, як з'явилися сестри, Джет Сет пишався тим, що робив. Йому не потрібно було переконувати себе, що він чинить правильно; він і так це знав."
 evildiarchy_newmareland.15.a:0 "Якби тільки не пара божевільних алікорнів..."

 evildiarchy_newmareland.16.t:0 "Зустріч із «Пророком»"
 evildiarchy_newmareland.16.d:0 "Джет Сету знадобилося багато витримки, щоб не зціпити зуби. «Пане Дью, — почав він. — Я був би вдячний, якби Ви припинили ухилятися від моїх запитань і збивати розмову з курсу, щоб ми могли нарешті перейти до суті нашої зустрічі.» Він намагався обговорити роль, яку Івнінґ Дью, самопроголошений «пророк Найтмер Мун», відіграватиме в уряді, але кожна спроба відбивалася якимось анекдотом, відступом чи недоречною тирадою.\n\nІвнінґ Дью нахилився вперед, спершись головою на копита, поки на його губах розпливалася отруйна посмішка. «Щоб висловитися чіткіше: я відмовляюся обговорювати ці питання з Вами і вимагаю зустрічі з Її Величністю Найтмер Мун.»\n\nДжет Сет зітхнув, потираючи скроню. Принаймні Дью нарешті погодився припинити виставу. «Тоді, гадаю, я теж висловився недостатньо чітко. Її Імператорська Величність Найтмер Мун призначила мене канлером з власних міркувань, і Вона дала мені завдання офіційно залучити Вас як публічного оратора від Її імені. — Він зробив паузу, дивлячись на дратуючого жеребця. — І Ви можете або прийняти Її рішення, поговорити зі мною і працювати на Неї, або не робити нічого з цього. Вибір за Вами.»\n\nЦе, здається, нарешті стерло ту дратуючу посмішку з обличчя Івнінґа Дью. «Якщо так ставити питання... Імператриця обов'язково визнає мою працю, тож я знаю, що це не єдиний мій шанс. — Джет Сет стримав бажання закотити очі, відкривши рота, щоб відповісти, але його перебили. — Ні, ні, не завдавайте собі клопоту. Я знаю, чого Ви від мене хочете. Зрештою, я вже це роблю.»\n\n«Добре, тоді дозвольте мені виставити дві умови. — Івнінґ Дью підняв брову. — По-перше, Вам потрібно пам'ятати, що Імператриця вирішила об'єднатися з Дейбрейкер, і Ви не будете розпалювати сварки з Її послідовниками. — Тепер настала черга Дью закочувати очі, але фестрал не протестував. — Крім того, було б добре, якби Ви уникали ворожнечі щодо грифонів, і...»\n\n«Категорично ні. Я можу спробувати ігнорувати соляристський галдеж, але грифони — вороги всього роду поні, і як Імператриця, так і інший алікорн це знають."
 evildiarchy_newmareland.16.a:0 "Що ж, сподіватися на більше було не варто."

 evildiarchy_newmareland.17.t:0 "Нічого неочікуваного"
 evildiarchy_newmareland.17.d:0 "Найтмер Мун люто дивилася на Івнінґа Дью, який з кожною секундою нервував дедалі більше. «Івнінґ Дью, — нарешті почала вона. — Хоча я ціную твої послуги, нещодавня подія привернула мою увагу. Зокрема, міжусобиці моїх підданих стали мені джерелом занепокоєння.» Вона говорила повільно, загрозливо, даючи йому осягнути її слова.\n\nІвнінґ Дью кліпнув очима. «Ваша Величносте... Не впевнений, що розумію. Я ще не чув про міжусобиці серед Ваших підданих.»\n\n«Не. Вдавай. Дурня. Івнінґ Дью. — Звісно, вона добре знала, що він не придумував. — Я маю на увазі часті бійки між грифонами та моїми послідовниками — конкретно тими, хто слухає тебе. Ти можеш бути не найкращої думки про грифонів, але вони теж вважаються моїми підданими. Зрештою, чому я маю відмовлятися від чиєїсь служби на основі його чи її виду?»\n\n«Але, Ваша Величносте...»\n\n«Не витрачай даремно подих. Я сподівалася тримати тебе в узді за допомогою належних стимулія, але, схоже, це було нерозумно. Тепер я розумію, що твої методи просто вимагають певної... свободи. — «А також певного браку глузду», — подумала Найтмер. — Задля твого ж блага, дозволь запитати чітко. Якби я наказала тобі припинити твій «священний похід» проти грифонів, ти б мене взагалі послухався?»\n\nІвнінґ Дью, варто віддати йому належне, трохи подумав, перш ніж відповісти. «Ні, Ваша Величносте. Я, разом із багатьма Вашими найвідданішими послідовниками, не можу змиритися з тим, щоб ділити славетне світло, яке Ви нам даруєте, з брудними пернатими.» Під час короткої, 'гучної' тиші, він скривився. «Я... гадаю, я міг би робити на цьому менший акцент?»\n\n«Можеш не продовжувати. Сподіваюся, ти розумієш, що це ставить мене в досить складне становище, чи не так? — Дью, киваючи, ковтнув слину. — Я або погоджуюся на втрати і позбуваюся тебе тут і зараз, або маю справу з неприємними побічними ефектами твоєї роботи, — заявила Імператриця. — Якби це був легкий вибір, я б не сиділа тут, обговорюючи це з тобою, але, на мій жаль, ти добре робиш свою справу.»\n\nНайтмер Мун продовжувала спостерігати за ним, поки він тривожно чекав її наступного слова. Очікування слугувало і для посилення тиску на нього, і для того, щоб виграти собі кілька останніх секунд перед тим, як прийняти рішення."
 evildiarchy_newmareland.17.a:0 "«Ти не вартий цього клопоту, Івнінґ Дью. Полотном дорога.»"
 evildiarchy_newmareland.17.b:0 "«Я залишу тебе... поки що. Навіть моє терпіння має межі.»"

 evildiarchy_newmareland.18.t:0 "Зламаний годинник"
 evildiarchy_newmareland.18.d:0 "Джет Сет щось мугикав собі під ніс, заповнюючи папери. Як і будь-яка паперова робота, це було нестерпно нудно. Або, принаймні, було б у звичайні часи, але сьогодні завдання здавалося простим, зрозумілим і однозначно корисним, адже з кожним словом його уява малювала, як поні конфісковують кошти Івнінґа Дью.\n\nТеоретично, паперова робота мала бути закінчена до початку самого втручання, але абсолютна влада алікорнів дозволила йому сьогодні обійти це правило. Якась частина його не любила діяти в такий спосіб, але зрештою це значно прискорило б процес відлучення Івнінґа Дью від фінансування, а отже — і від впливу.\n\nПравда, основна причина цього рішення була, на його думку, далеко не ідеальною. Воно народилося не з турботи про тих, хто постраждав від дій чи промов «пророка», а з простої прагматичної потреби: зберегти вірність підданих-грифонів і запобігти міжусобицям."
 evildiarchy_newmareland.18.a:0 "Незважаючи на це, він принаймні вперше робив щось позитивне."

 evildiarchy_newmareland.19.t:0 "На ворожих помилках"
 evildiarchy_newmareland.19.d:0 "Дейбрейкер, Найтмер Мун і Джет Сет поверталися із зустрічі з двома напрочуд стоїчними представниками MARESOC. Як неочікувано, алікорни сперечалися. «О, сестро, — промуркотіла Дейбрейкер. — Ясно як білий день, що нам потрібно застосовувати ці методи на кожному рівні суспільства.»\n\n«Очевидно. Ні. Вищі ешелони суспільства — наші найвірніші піддані — мають відчувати себе винагородженими! — відповіла Найтмер Мун, люто зиркаючи на свою співправительку. — Насправді між прошарками суспільства має бути більше конфліктів.»\n\nДейбрейкер вибухнула сміхом, відстаючи від двох. Коли її сестра продовжила пильно дивитися на неї, та посміхнулася. «Оу, ти не жартуєш.»\n\nПерш ніж алікорни встигли сказати бодай слово, спрацював інстинкт самозбереження Джет Сета. «Якщо дозволите, Ваші Величності. — Обидві повернулися до нього. — Якщо я правильно розумію, Ваші ідеї не обов'язково є несумісними. Ви можете змусити поні всередині верстви бачити один в одному суперників, водночас винагороджуючи їх за особисту вірність.» Слова здавалися брудними, але діархи вже були налаштовані впроваджувати мерзенні методи MARESOC, тож його слова нічого б не змінили... правда ж?\n\nОбидві, як завжди, люто зиркнули на нього. Поні ковтнув слину. «Я... я лише хочу сказати, що у Вас обох правильні ідеї, але нам просто потрібно поєднати їх так, щоб це задовольнило обидві сторони. — Іронія того, що йому доводиться мирити тих, хто на самій верхівці, через суперечку про те, як розділити тих, хто на самому дні, не вислизнула від нього. — Зрештою, «Велика Сестра» це не справжня поні, але Ви обидві можете впоратися з її роллю набагато краще, якщо діятимете злагоджено.»\n\nКоротка, жахлива тиша винесла свій вердикт. Їхні вирази облич пом'якшилися, за тим прийшли два кивки."
 evildiarchy_newmareland.19.a:0 "Кризу відвернено."

 evildiarchy_newmareland.20.t:0 "Спотворений ідеал"
 evildiarchy_newmareland.20.d:0 "«Отже, Блюберрі Фрост, — Дейбрейкер почала першою із знайомою, гострою посмішкою. — Мені сказали, що у вас є певні політичні ідеї. Ми б хотіли їх почути.» Блуберрі ковтнула слину. Це могло закінчитися для неї дуже погано, якби вона вибрала бодай одне неправильне слово. Що вона взагалі тут робила, в присутності не одного, а двох божевільних злих алікорнів?\n\n«Ти ліпше відповідай їй. — Тон Найтмер Мун змусив кров Блюберрі застигнути в жилах. Поні одразу згадала, що її доля була б не менш похмурою, якби вона наважилася відхилити їхнє прохання про зустріч.\n\nБлюберрі глибоко вдихнула. «О-Основна ідея, як я впевнена, Вам відома, полягає в тому, що кожна істота має бути р-рівною. — Оскільки жодна з Діархів її не перервала, вона продовжила. — Навіть якщо це означає, що ніхто не може бути величним, оскільки і... То-то-точніше!.. Ніхто не може несправедливо піднестися н-над іншими.»\n\nПершою заговорила Найтмер Мун. «Цікаво. Це значно спростило б роботу з населенням, чи не так, люба сестро? Коли кожен буде на одному посередньому рівні, бунтівні нахили наших підданих будуть придушені ще до того, як вони зародяться.»\n\nДейбрейкер... кивнула, зі зловісною посмішкою на мордочці. «Саме так. Покора через потребу відповідати загалу... мені це імпонує. — Вона знову повернулася до їхньої гості. — Я розумію, що ці ідеї належать не лише вам, їх багато хто поділяє. З цього наступне питання... чи ці ваші теорії та ідеали стосуються й інших рас? Інакше нам може знадобитися впровадити певні зміни. — Імператриця Сонця похмуро засміялася. — Ви бачите, у нас виникали проблеми з нашими підданими-грифонами та поні, які звикли зневажати один одного. Звучить так, ніби цей еквалізм був би чудовим інструментом, щоб змусити їх жити в гармонії видів.»\n\n«О-о, авжеж. Це включ... Тобто, ВСІ розумні раси вже включені. Кожна істота рівна іншій.»"
 evildiarchy_newmareland.20.a:0 "«Тоді розкажіть нам побільше, Блюберрі Фрост.»"

 evildiarchy_newmareland.21.t:0 "Усе належить Нам"
 evildiarchy_newmareland.21.d:0 "Джет Сет спостерігав, як Дейбрейкер та Найтмер Мун виходять на сцену, подумки проклинаючи себе за те, що в мить роздратування запропонував алікорнам виголосити цю промову особисто. Звісно, саме він запросив усіх лідерів профспілок — або еквівалентно важливих голів гільдій з іншою структурою влади — і провів усі дослідження. Він навіть особисто пересвідчився, що кожен із них усвідомив: пропуск цієї зустрічі рівнозначний самогубству.\n\nТепер він шкодував, що втратив шанс подати все це витончено в своєму стилі. Тепер це презентують два божевільних алікорни. На добрий кінець не було жодної надії. А може... «Втішайтеся, Наші піддані, — почала Найтмер Мун. — Ми стали перед вами, щоб оголосити про радикальну зміну курсу.»\n\nНайбільше Джет Сета непокоїло те, що ці двоє неминуче почнуть сперечатися прямо на сцені перед сотнями поні. «Бачите, — продовжила Дейбрейкер, — ваша корисність вичерпана.»\n\nНатовпом прокотилися зойки та шепіт, але перш ніж шум став неприйнятним, Найтмер Мун обірвала його. «Досить! Моя дорога сестра хотіла сказати, що кожна галузь промисловості віднині переходить у Нашу спільну власність. Ви — баласт. Зайвий елемент у Нашій системі.»\n\nПоки натовп заціпеніло мовчав, Дейбрейкер глумливо засміялася. «Звісно, обговорювати тут нічого. Або ви приймаєте нову реальність, або робите останній вибір у своєму житті.»\n\nКоли алікорни зійшли зі сцени, у залі почався справжній Тартар. Поні вигукували запитання, дехто намагався вискочити на сцену, але був відкинутий імператорською гвардією, а більшість просто намагалася перекричати сусідів у загальному хаосі."
 evildiarchy_newmareland.21.a:0 "І все ж Джет Сет відчув полегшення."

 evildiarchy_newmareland.22.t:0 "Залишки"
 evildiarchy_newmareland.22.d:0 "Джет Сет зустрівся поглядом із Кінґфішером, коли сів навпроти нього в майже порожньому кафе. Останній усміхнувся, сьорбнувши чаю. «Ранку, Джет Сете. Дякую, що погодилися на зустріч тут,» почав поні з приємною, відпрацьованою посмішкою.\n\n«Не варто подяки. Мені по дорозі. — Насправді Джет Сет волів би проводити офіційні зустрічі у своєму кабінеті, але він був готовий робити винятки, якщо це сприяло переговорам. — Перейдемо до справи: гадаю, Ви знаєте, чому Ми зв'язалися з Вами?»\n\nПосмішка Кінґфішера згасла. «Знаю. Неминуче, алікорни рано чи пізно звернули б увагу на нашу маленьку стару партію.» Він покрутив чай у чашці, дивлячись на нього кілька митей. Перш ніж Джет Сет встиг перервати тишу, Кінґфішер продовжив. «Припускаю, Ви пропонуєте якусь угоду. Інакше нас би просто... змусили замовкнути іншими методами.»\n\n«Як і очікувалося від цього хитрого жеребця», — подумав Джет Сет. — «Саме так. Вони хочуть інтегрувати вас усіх в уряд без жодного покарання. — Він чекав бодай здивування, але Кінґфішер лише терпляче кивнув. — Особисто Ви лише маєте тримати інших під контролем і, звісно, не висовуватися.» Якась частина Джет Сета збунтувалася проти того, як легко стало ставити такі ультиматуми, але решті було вже байдуже.\n\n«Це не має бути проблемою. Власне, це навіть милосердніше, ніж я очікував.» Кінґфішер безрадісно посміхнувся. «...якщо нема ще якоїсь дрібниці.»\n\nДжет Сет повільно кивнув і нахилився вперед, знизивши голос. «Ви маєте публічно проклясти республіканізм.»"
 evildiarchy_newmareland.22.a:0 "«Прикро, — зітхнув Кінґфішер. — Вважайте, що зроблено.»"

 evildiarchy_newmareland.23.t:0 "Перший із багатьох кроків"
 evildiarchy_newmareland.23.d:0 "Подвір'я перед колишньою резиденцією уряду Нового Мейрленда було забите вщент. Поні та грифони з усієї країни зібралися тут, щоб стати свідками того, що можна було назвати історичним моментом. Багато хто прийшов із хворобливої цікавості, інші — через божественне обожнювання алікорнів.\n\nСама будівля зазнала чималих змін. Малі кабінети стали кімнатами для персоналу та слуг, а два найбільші — особистими покоями Діархів. Зал засідань перетворився на величезну, оздоблену золотом тронну залу. Звісно, всередину майже нікого не пускали, бо алікорни рідко обтяжували себе проведенням аудієнцій.\n\nГомін натовпу урвався, коли перед ними з'явився Джет Сет. За мить він промовив магічно посиленим голосом. «Схиліться перед Їхніми Імператорськими Величностями, Імператрицями Дейбрейкер та Найтмер Мун!» Натовп миттєво затих, а Джет Сет зник так же швидко, як і з'явився.\n\n«Доброго вечора, любі піддані. — Вийшла Дейбрейкер, чия вогняна грива затьмарювала призахідне сонце, відкидаючи на поручні довгі тіні. — Як приємно бачити стільки вас, зібраних перед Нами. Це справді зігріває Нам серця.» Промуркотіла Богиня Сонця.\n\n«Як багато хто з вас знає, — продовжила Найтмер Мун, з'явившись поруч, — Ми впроваджували багато внутрішніх змін, і тепер настала мить, коли Новий Мейрленд став справді гідним двох богинь, що ним правлять.»\n\nДейбрейкер зневажливо посміхнулася. «Звісно, хоча Новий Мейрленд і став сяючим зразком істинної держави, він все ще замалий для таких величних істот, як Ми.»\n\n«Проте Ми були б нерозважливими, якби не згадали про можливості, які він Нам надав. Коли ця країна готова служити Нам, а Ми готові вести її за Собою — Нам буде легко поширити Наш вплив та божественність на весь континент.» Найтмер Мун почала реготати, до неї швидко приєдналася Дейбрейкер, поки натовп спостерігав за ними у повній німоті."
 evildiarchy_newmareland.23.a:0 "«І саме це Ми збираємося зробити.»"

 evildiarchy_newmareland.24.t:0 "Створені для війни"
 evildiarchy_newmareland.24.d:0 "Ойлд Ґір зітхнула і підійшла до вікна свого офісу, що виходило на нижній ярус фабрики. Внизу робітники вимикали верстати, готуючись до майбутньої чотириденної перерви. Ґір відчувала біль у гаманці від думки про зупинку виробництва на такий термін, але вона сама проводила розрахунки.\n\nДоки їй не вдасться найняти хоча б ще дюжину поні чи грифонів, було економніше ганяти фабрику на повну потужність, а потім періодично зупиняти її, щоб дати персоналу перепочити. І вона знала, що не самотня у цій біді. По всьому Новому Мейрленду «вузьким місцем» стрімкої індустріалізації було саме число робочих копит.\n\nҐір взяла ключі та попрямувала до дверей. Подумати тільки, що вона стане свідком такого неймовірного прогресу за своє життя... Це майже витискало сльозу. Попит був на рекордному рівні, і хоча вона любила побідкатися, її прибутки встигали за цим попитом, а по правді кажучи — навіть випереджали. Конкуренція в країні її майже не турбувала. Чому? Дуже просто: навіть вони не могли виробляти достатньо. Навіть їм бракувало робітників.\n\nОднак, коли вона підходила до сходів, у голові промайнула темна думка, яка дедалі частіше давала про себе знати... Що, як попит зникне? Що, як війна раптом зайде у глухий кут, і вся ця промисловість здригнеться і завмре?"
 evildiarchy_newmareland.24.a:0 "Або ще гірше: що, як Імператриці взагалі припинять воювати?"

 evildiarchy_newmareland.25.t:0 "Перше доміно"
 evildiarchy_newmareland.25.d:0 "Дейбрейкер та Найтмер Мун увійшли до будівлі, яка колись була центром уряду Вінґбардії. Джет Сет левітував планшет поруч і слідував за ними, не розуміючи, навіщо вони взагалі його притягли.\n\nНайтмер Мун прокашлялася. «Занотуй, канцлере, цю історичну мить: дві наймогутніші істоти у світі входять до штаб-квартири тих, хто смів Нас не визнавати.» Невже він тут лише для того, щоб вони могли перед кимось похизуватися?\n\n«Не хочу Вас образити, Ваша Величносте, але чи справді це необхідно? — Джет намагався зберігати нейтральний тон, щоб не зіпсувати настрій божевільному алікорну. — Зрештою, було майже сто свідків того, як ви входили в будівлю. — І він швидко пошкодував.\n\n«О, ще як, — перервала Дейбрейкер. — Це питання престижу, мій вірний підданий. Яка користь від натовпу, що бачить Нас, якщо за цим не йде звіт, який детально пояснює всю епохальність цієї події?»\n\nНайтмер Мун кивнула з усмішкою. «Мало що у світі може зрівнятися за значенням із Нашою абсолютною перемогою тут. Я б сказала, що майбутні покоління пам’ятатимуть цей тріумф, але Ми розуміємо, що перший крок це тільки перший крок.»\n\nПовернувшись до сестри, Дейбрейкер зневажливо посміхнулася. «А Ми з тобою справді чудова команда. Гідна управління світом.» Раніше ці мегаломанські хвастощі мали б нажахати Джет Сета, тепер він відчував дивне заспокоєння. Принаймні зараз сестри ладнали. Можливо, у їхньої держави ще є шанс встояти. Бодай до того часу, поки Твайлайт та її друзі не виправлять увесь цей жах.\n\nНаче прочитавши його думки, Найтмер Мун додала. «Згодна, люба сестро. Немає нікого, кого б я хотіла бачити своїм правим копитом більше за тебе.»\n\n«Правим копитом? — Дейбрейкер, не знімаючи посмішки, закотила очі. — Кому як не Нам знати, що Мої армії зробили куди більше роботи, ніж твої.»\n\nНайтмер Мун відкрила рота для відповіді, але Джет Сет був швидший, з усіх сил стараючись не зітхнути."
 evildiarchy_newmareland.25.a:0 "«Чи не здається Вам, що такі дрібниці тьмяніють перед Вашою спільною величчю?»"

 evildiarchy_newmareland.26.t:0 "Досягти компромісу"
 evildiarchy_newmareland.26.d:0 "«Отже, сестро, — послідували слова Найтмер Мун за поставленою чашкою чаю. — Доведи Мені, що у твоїй голові більше безглуздих ідей, ніж у Моїй. Мені достеменно відомо, що більшість Моїх послідовників досі не можуть прийняти тебе рівною Мені. І Ми прямо оголосимо про злиття Наших релігій, почнеться безглузда різанина, і, маю визнати, Наші шанси повернути Наш дім... потьмаріють.\n\nДейбрейкер прикусила язика, утримуючи себе від коментаря, що вона цілком розділяла думку соляристів щодо сестри. «Твоя правда, люба сестро, це було б дуже прикро. — Вона приклала копито до підборіддя, вдаючи глибоку задуму, перш ніж посміхнутися. — Але якщо подивитися з іншого боку... Що Нам заважає так само прямо наказати їм припинити цей безлад? Зрештою, для Моїх послідовників Моє слово закон повище принципів. Що до твоїх?\n\nНайтмер насупилася, але схвально кивнула. «Ти не помиляєшся. Зрештою, вони ненавидять тебе виключно тому, що ти — не Я, а їхнє обожнювання Мене затьмарює будь-які їхні сумніви.» Вперше за довгий час вона подумала, що повна відсутність делікатності у Дейбрейкер може бути правильним вибором."
 evildiarchy_newmareland.26.a:0 "Дейбрейкер пустила самовдовольну посмішку. «Не так і складно обирати найпростіше, м?»"

 evildiarchy_newmareland.27.t:0 "Очі всюди"
 evildiarchy_newmareland.27.d:0 "Важко дихаючи, Ґлорія вбігла до маленької пекарні. Поки що у безпеці. Напевно. Вона була майже впевнена, що відірвалася від переслідувача, але знала, що часу обмаль. Їй не могло просто пощастити.\n\nКинувши останній погляд на вулицю, вона оглянула приміщення, подумки молячись нині забороненому богу знайти тут когось із друзів. Шлунок стиснувся, коли вона не побачила жодного знайомого обличчя. Але раптом її очі зустрілися зі знайомим поглядом. Не друг, лише знайома, що сиділа на самоті з чашкою чаю.\n\nСтрах на обличчі Ґлорії був очевидним, бо поні — як там її звали, Флауер Дью? — виглядала стурбованою в момент, коли Ґлорія підійшла до неї. «Мені потрібна твоя допомога, — різко випалила грифиня. — За мною стежать. Не знаю хто, але...»\n\n«Пр-про що ти говориш? — Та похитала головою, примушуючи себе усміхнутися. — Ґлорія, правильно? Заспокойся і розкажи, що саме відбувається.»\n\nҐлорія глибоко вдихнула, втупившись у свої пазурі. «Я не знаю хто це, але є одна кобила, я бачу її весь день. Спочатку я думала, що це збіг. У мене гарна пам'ять на обличчя, розумієш? Я завжди впізнаю істот, навіть якщо не розмовляла з ними. — Вона ковтнула слину. — Але вона? Куди б я не йшла, вона завжди вже там. Ніколи не дивиться на мене. Просто... стоїть... або сидить...\n\nТрохи заспокоївшись, вона знову глянула на Флауер, зустрівши в очах тої лише жах. «Я... я думаю, тобі просто здалося, — відповіла та з вимушеним смішком, перш ніж телекінетично підняти чашку і осушити її одним, тяжким ковтком. — У будь-якому разі, я... вибач, що так раптово йду, але мені треба забрати сестру зі школи.\n\nҐлорія намагалася її зупинити, кобила зникла за буквальну мить. Грифиня важко зітхнула і попрямувала до виходу. Тікати? Куди? Чи зможе вона взагалі втекти? Можливо, хтось із родичів погодиться її прихистити?"
 evildiarchy_newmareland.27.a:0 "Зрештою, Флауер Дью була останньою, хто бачив Ґлорію живою."

 evildiarchy_newmareland.28.t:0 "Матері знають краще"
 evildiarchy_newmareland.28.d:0 "У маленькому кабінеті поліцейського відділку Сансета грифон на ім'я Ґлорія гойдалася на стільці, мріючи замість того, щоб заповнювати папери. Зазвичай вона працювала старанно, але сьогодні думки блукали деінде: вона не могла не думати про те, як їй пощастило. Раніше вона була безробітною та зневіреною, але завдяки Священним Матерям її доля змінилася, і вона отримала другий шанс. Подумати тільки, що богині поні стануть їй рятівницями. Якби хтось сказав їй це раніше... Стук у двері вивів її з роздумів. «Зайдіть.» Вигикнула вона, опускаючи стілець і знімаючи задні лапи зі столу.\n\nДвері відчинилися, на порозі з'явився черговий разом із юною єдиноріжкою. «Тут молода кобила хоче дати свідчення.» Ґлорія кивнула, запрошуючи її. Принаймні буде щось чим розвіяти нудьгу.\n\nЗа кілька митей черговий зачинив двері, і молода кобила сіла на стілець навпроти. Ґлорія витягла чистий аркуш і посміхнулася. «Привіт. Як тебе звати?»\n\n«М-Морнінґ Дью, — відповіла лошиця, ковтаючи слину. — Я... я тут через брошури... ті самі, ну, ви знаєте... — Морнінґ вагалася досить довго, перш ніж продовжити. — Ну ті списки про істот, які відвернулися від наших Священних Матерів... — Морнінґ втупилася у копита. — Моя... моя старша сестра, Флауер Дью. Я... я хвилююся за неї. Вона каже такі речі, і я... я просто не знала, що робити.»\n\nҐлорії знадобилося кілька спроб, щоб змусити Морнінґ розповісти детальніше, але чим більше вона чула, тим більше бачила паралелей із собою колишньою. Флауер Дью була молодою кобилою без майбутнього, яка звинувачувала у своїх проблемах світ навколо і підбурювала інших робити так само. Не дивно, що її молодша сестра хвилювалася. Зрештою, коли Морнінґ Дью пішла, Ґлорія почала працювати над звітом, і в її душу закрався сумнів. Вона знала, що не кожній істоті буде даровано шанс «реінтегруватися», як їй. Деякі поні та грифони просто... зникали за опір волі Імператриць."
 evildiarchy_newmareland.28.a:0 "Але ж Флауер Дью також врятують... правда?"

 evildiarchy_newmareland.29.t:0 "Найкраще, що може бути"
 evildiarchy_newmareland.29.d:0 "[?global.date.GetDateStringNoHourLong]\n\nЯ провів день у тренувальному таборі. Офіційною причиною був збір скарг та потреб солдатів для прямої передачі алікорнам, але справжньою метою було оцінити ефективність нової програми. Гадаю, всі про це здогадувалися, але моя присутність викликала менше напруження, ніж якби сюди прибула котрась із наших дорогих Діархів.\n\nУ будь-якому разі, я був приємно здивований. Солдати, з якими я спілкувався, були ввічливими та професійними, попри їхні очевидні переконання. Насправді більшість часу вони здавалися цілком нормальними, хоча й надзвичайно вправними воїнами.\n\nАле ключове слово тут — «здавалися». Були моменти, коли я майже втрачав пильність, але натикався на суворий погляд. Не пам’ятаю точно, що саме я бовкнув, але дещиця мого презирства до «Імператриць» просочилася крізь маску. Я не можу позбутися відчуття, що сьогодні був за крок від прірви. Одне невірне слово — і моє тіло виставили б на загальний огляд. Повчальним прикладом."
 evildiarchy_newmareland.29.a:0 "Повільно похитуючи головою, Джет Сет відклав перо."

 evildiarchy_newmareland.30.t:0 "Воля служити"
 evildiarchy_newmareland.30.d:0 "[?global.date.GetDateStringNoHourLong]\n\nОфіційною причиною був збір скарг та потреб солдатів для прямої передачі алікорнам, але справжньою метою було оцінити ефективність нової програми. Гадаю, всі про це здогадувалися, але моя присутність викликала менше напруження, ніж якби сюди прибула котрась із наших дорогих Діархів.\n\nВсе пройшло приблизно так, як я і очікував. Солдати, яких я там зустрів, були чи не найбільш фанатичними фанатиками, яких я тільки бачив у житті. На щастя, на моїй посаді я часто зустрічаю поні саме такого штибу, тож я звик ретельно добирати слова. Мушу визнати, вони підходять до справи з пристрастю, що межує з безумством, але це й не дивно, враховуючи, яку роль ідеологічна обробка відіграє в їхній підготовці. Можливо, навіть занадто — деякі з них дивилися на мене з гіркотою чи навіть заздрістю.\n\nТим не менш, це добре навчені, компетентні вбивці, готові виконати будь-який наказ. Звісно, без невдач на тренуваннях було нікуди, але це лише тому, що поні залишаються поні: недосконалими за своєю природою. Або, можливо, їхній непохитний фанатизм настільки затьмарює розум, що вони втрачають зв'язок із реальністю? Не відхилятиму і цей варіант."
 evildiarchy_newmareland.30.a:0 "Із зітханням Джет Сет відклав перо і закрив свій щоденник."

 evildiarchy_newmareland.31.t:0 "Справжньої дружби ще ніколи не існувало"
 evildiarchy_newmareland.31.d:0 "Сьогодні по всьому Імперському кондомініуму Нового Мейрленду книгарні розпочали розповсюдження нової праці Імператриць — «Істинного щоденника дружби». Видання мало приголомшливий успіх, що цілком очікувано, враховуючи новий закон, який зобов’язує кожну поні прочитати його, а також включення книги до обов'язкової навчальної програми по всій імперії.\n\nКнига має на меті викрити кричущі недоліки та невідповідності оригінального «Щоденника дружби», дискредитуючи досягнення Твайлайт Спаркл та її оточення як оманливу пропаганду. Її Імператорська та Божественна Величність Найтмер Мун відкидає будь-яку особисту упередженість у своїх судженнях з цього приводу. Щобільше, Імператриці кинули виклик еквестрійському визначенню Гармонії, яке, за їхніми словами, було створене спеціально для підриву їхнього статусу богинь. У процесі вони прямо називають Твайлайт Спаркл та її наближених шахрайками, наполягаючи на тому, що їхній зв’язок з Елементами Гармонії — це лише майстерно виплекана брехня. Адже кожній поні відомо: лише Наші дві доброчесні правительки гідні бути носіями Елементів.\n\nНатомість книга пропонує кардинально інший підхід до дружби: глибока мережа зв’язків між поні має розглядатися не як добровільний вибір, а як непорушний обов’язок перед Імператрицями — звісно, якщо ви та ваші друзі не плануєте протистояти Нашим славетним лідеркам. Далі підкреслюється важливість сильного населення для плетіння міцних тенет, що підтримуватимуть Наших — всемогутніх — богинь."
 evildiarchy_newmareland.31.a:0 "Пам’ятайте: лише через нашу дружбу Наші богині можуть процвітати."

 evildiarchy_newmareland.32.t:0 "Затишшя перед штормом"
 evildiarchy_newmareland.32.d:0 "Щелепи Джет Сета стиснулися, поки він спостерігав, як Найтмер Мун та Дейбрейкер виходять на сцену. Він уже знав, про що вони збираються оголосити, і від цього йому все більше крутило живіт. Дейбрейкер заговорила першою. «Доброго вечора, Мої любі піддані. — Її тон був як завжди самовпевненим. Хоча Джет Сет звик до її вдачі, зараз це його просто лютило. Як вона сміє починати таку промову в такий звичайний спосіб? — Ми тут, щоб оголосити вам новий закон.»\n\n«Як багато хто з вас знає, — продовжила Найтмер. На відміну від сестри, вона не була самовпевненою, але навіть вона не могла приховати мегаломанської втіхи у своєму голосі. — Нещодавно Ми примирили вірування Наших відповідних послідовників, дозволивши підданим поклонятися Нам обом без страху вигнання. Крім того, Нам це дозволяє зробити ще один крок до повного об'єднання всіх Наших підданих.» Натовпом прокотилося шепотіння; шлунок Джет Сета ніби наповнився тяжким свинецем. Якась частина його все ще сподівалася, що ці двоє передумають.\n\nДейбрейкер усміхнулася, ступивши вперед. «Відсьогодні Ми оголошуємо поза законом будь-яку релігію, що вшановує «богів», — богиня закотила очі, — окрім Нас самих.» Напругу в натовпі можна було різати ножем. Деякі поні почали посміхатися, коли до них дійшло усвідомлення, тоді як інші втупилися в сцену широкими очима. Джет Сет же міг думати лише про те, скільки ворогів по всій Грифонії вони щойно собі нажили, і скільки ще з’явиться, коли вони закінчать цю промову. «Але, звісно, якими богинями Ми були б, якби зупинилися на цьому? Натомість, щоб ніхто з Наших підданих не мав навіть спокуси перед цими фальшивими ідолами...»"
 evildiarchy_newmareland.32.a:0 "«...Ми знищимо кожен єретичний храм по всьому континенту»."

 evildiarchy_newmareland.33.t:0 "Назад туди, де Наше місце"
 evildiarchy_newmareland.33.d:0 "«Сестро... Тартар, це що? — випалила Найтмер Мун з очевидним презирством, коли над горизонтом піднялася яскрава веселкова бульбашка. — Виглядає як...»\n\n«Велетенський щит, так, — відповіла Дейбрейкер, насупившись. — Нам варто подивитися на нього ближче, поки корабель не підійшов впритул.» Без зайвих слів вона злетіла і швидко випередила круїзний лайнер; Найтмер Мун летіла поруч.\n\nЗа пів години все їхнє поле зору закрила прозора стіна рожевого кольору з веселковими розводами, що тяглася до самого горизонту. Вони намагалися полетіти вгору вздовж неї, але після двадцяти хвилин марного підйому вирішили перевірити її на міцність — спочатку магією, потім копитами. Стіна відреагувала саме так, як і очікувалося: вона була абсолютно непрохідною. Спроби телепортуватися на інший бік також зазнали невдачі. Зрештою вони вирішили спробувати пряму телепортацію до самого Кантерлота — заклинання, яке у разі успіху залишило б навіть таких, як вони, дратівливо виснаженими. Очікувано, це теж не спрацювало.\n\n«Здається... ми поза дверима Еквестрії, сестро. — Найтмер Мун зітхнула, люто зиркнувши на Дейбрейкер. — Я казала тобі, що ми мали повернутися одразу після піднесення. В біса ми чекали?»\n\n«Ай ні, найдорожча сестро. — сарказм у повітрі перевищив кислород. — Це ти наполягала на тому, щоб ми спочатку зібрали армію в Хіроптеррі. Твій план так само провалився б, моя ти всезнайко. — Дейбрейкер закотила очі. — До того ж, тобі не знадобилося багато часу, щоб погодитися заснувати нашу імперію в Новому Мейрленді, тож не вдавай, ніби ти це передбачила. — Коли Найтмер відкрила рота, сестра її обірвала. — Знаю, знаю, ти відчайдушно хочеш довести, що я помилялася, а ти — ні. ДОБРЕ! — Вона виплюнула слово, наче отруту. — Але сварки не змусять цей гігантський веселковій щит зникнути.»\n\nНайтмер зціпила зуби. «Хоч як Мені противно це визнавати, ти права. — Вона зітхнула. — Звучить очевидно, коли казати в такому плані, але Ми застрягли в Грифонії, доки не знайдемо магію, достатньо могутню, щоб розтрощити цей щит. — Вона замовкла, насупившись. — Можливо... можливо, на цьому нікчемному континенті є якийсь артефакт? Або, можливо, Ми могли б якось об’єднати силу кількох реліквій?»"
 evildiarchy_newmareland.33.d_alternate:0 "«Отже, сестро, що нам варто зробити насамперед, коли ми прибудемо до Кантерлота? — запитала Найтмер Мун, ширяючи в небі. — Особисто я думаю заскочити в той магазин ігор, який давно хотіла відвідати, але ніколи не мала часу.»\n\n«Звісно ж ти захочеш чогось такого безглуздого, сестро, — усміхнулася Дейбрейкер. — Але, мабуть, було б все таки непогано мати коротку мить розваг, перш ніж ми займемо наше законне місце.»\n\n«Я б не був у цьому так впевнений, — пролунав голос з-за їхніх спин. — Насправді, я думаю, вам варто йти прямо навпаки.»\n\nОбидва алікорни розвернулися в повітрі, помітивши сірого драконікуса, що... плавав позаду них. — Діскорд, — просичала Дейбрейкер. — Я думала, ти не втручаєшся в такі справи.»\n\n«Зазвичай ні, — Діскорд махнув пазуром, — але те, що зараз відбувається в Еквестрії, занадто цікаве, щоб усе закінчилося так швидко! — Він безрадісно посміхнувся. — Я думаю, вам варто зосередитися на Грифонії, нехай події назрівають до належної кульмінації.»\n\n«Ах, ти думаєш, що зможеш нас зупинити? — пирхнула Найтмер Мун. — Благаю. Ми перемогли тебе одного разу, переможемо і знову, якщо ти наполягатимеш на тому, щоб стояти у Нас на шляху.»\n\n«Ой лишенько, — зойкнув Діскорд, — маленький бідний я, один проти сестер? Ви ж не підете на щось настільки несправедливе. — Він розсміявся, коли роги обох сестер націлилися на нього, а зловісне сяйво віщувало найгірше. — А, ясно. Ви справді хочете спробувати пробитися силою? — Він поцокав язиком, хитаючи головою. — Вибачте, але я змушений тупнути ногою. Ви не повернетеся туди, поки не прийде час.»\n\nДейбрейкер люто подивилася на Діскорда вздовж свого рогу. «Та що ти взагалі... — Раптом вона з Найтмер опинилися в офісі Джет Сета; переляканий єдиноріг заверещав, раптом побачивши дві заряджені зброї масового знищення, націлені прямо на нього. — Якого—»\n\n«Вибачте, я мав висловитися чіткіше, — заговорив Діскорд, просунувши голову, шию та руку крізь стіну. — Вам двом потрібно зібрати артефакти, щоб пересилити мене. Коли ви їх здобудете, я впевнений, що все буде підготовлено ідеально. — Він зник, і лише через мить троє поні почули його сміх зовні. — О, мало не забув! — його голос пролунав крізь стіну, яка за мить вибухнула всередину. — Адью, мої любі! Я буду спостерігати, тож не дайте мені занудьгувати!»\n\nКашель Джет Сета від пилу перетворився на жахливий подих, коли алікорни виштовхнули повітря назовні з такою силою, що всередині утворився вакуум; їхні палючі погляди пронизували місце, де щойно був Діскорд. «Що ж, сестро, — прогарчала Найтмер Мун, — чи маєш ти якісь заперечення проти пошуку цих... артефактів?»\n\n«Жодних... сестро, просичала Дейбрейкер у відповідь."
 evildiarchy_newmareland.33.a:0 "«Здається цілком логічним...»"
 evildiarchy_newmareland.33.b:0 "«— Насправді, Я налаштована цілком навпаки.»"

 evildiarchy_newmareland.34.t:0 "Щедра пропозиція"
 evildiarchy_newmareland.34.d:0 "Сказати, що Джет Сет був у поганому настрої, коли йшов тюремним комплексом, було б величезним перебільшенням. Він міг змиритися з тим, що його вечірній відпочинок перериває термінова справа. Іноді — як сьогодні — божевільні алікорни, що віддавали йому накази, вирішували, що будь-яка їхня забаганка раптом стала надзвичайно важливою, навіть якщо жодної загрози не існувало. Він міг витримати й це, нехай і скрегочучи зубами.\n\nАле те, від чого його кров закипала, так це поєднання вищезгаданого з монументально ідіотським рішенням. Рішенням, яке жодна притомна істота навіть не подумала б розглядати. Таким рішенням, як помилування бандитів Блекроку. Мало того, що йому довелося скасувати цілком здоровий попередній вирок, він ще й мусив зробити це в останню можливу мить — і все тому, що дві безсмертні дитини хотіли всього і негайно, водночас годинами вагаючись над кожним дріб’язком і будучи нездатними дотримуватися власних клятих рішень.\n\nЙого настрій був настільки очевидним, що тюремна варта навіть не наважувалася зупиняти його чи розмовляти — сила розлюченого обличчя в поєднанні з планшетом, ультимативний щит. Коли він дістався внутрішнього двору, навіть бандити, що стояли в черзі, припинили базікати. «Задля збереження глузду всіх присутніх, я скажу коротко, — почав він. — Вас та інші угруповання помилувано за умови, що відтепер ви беззаперечно виконуєте накази Імператриць. Про вашу точну роль вам повідомлять за кілька днів, але суть у тому, що ви сформуєте так звані «загони хаосу», які будуть—»\n\n«То ми тепер будемо кімнатними грифонами цих гарненьких принцес-поні? — перебив один із бандитів. — Якщо ти думаєш, що я або хтось із моїх хлопців буде танцювати під вашу дудку, то ти ідіот, і можеш іти н—»\n\nЙого глузування обірвав постріл, що луною розкотився подвір'ям. Грифон впав замертво."
 evildiarchy_newmareland.34.a:0 "«Вперше в житті Джет Сет не відчув жодного жалю.»"

 evildiarchy_newmareland.35.t:0 "Вам тут не місце"
 evildiarchy_newmareland.35.d:0 "Коли Джет Сет попрямував додому разом із натовпом, що розходився від шибениць, він відчував внутрішнє сум'яття. Ба більше, він був щасливий. Навіть відчув полегшення. Зазвичай він принципово ненавидів публічні страти, але сьогодні він зловив себе на думці, що повністю згоден із вибором сестер. Фактично, якась частина його з тривогою чекала на страту бандитів, ніби боячись, що алікорни в останню мить чомусь передумають.\n\nЙого думки дісталися кінця, коли він усвідомив, що зовсім не звертав уваги на те, що відбувається навколо, і йшов додому просто за звичкою. У нинішньому стані справ це була розкіш, яку він більше не міг собі дозволити, але, на його полегшення, він помітив свою охорону, що слідувала за ним по п’ятах.\n\nЗ іншого боку, все одно здавалося неправильним святкувати смерть розумних істот, навіть якщо за всіма мірками вони на це заслужили. Ці бандити не варті були належного суду — не після всього, що вони накоїли. До того ж їхня страта допомогла б зняти постійно зростаючу напругу в імперії. Публічна демонстрація правосуддя мала б принаймні повернути дещицю віри в уряд."
 evildiarchy_newmareland.35.a:0 "Чи не була це лише спроба виправдати власні відчуття?"

 evildiarchy_newmareland.36.title:0 "Грифони, що вклоняються поні"
 evildiarchy_newmareland.36.desc:0 "«...Ви... Ви це...? — грифон заїкався, втупившись у величного чорного алікорна, що височів перед ним. Тут, у Верхніх Косарських кігтях рідко хто відвідував Польшаву, і ще рідше це був хтось значущий, а ще рідше дві богині-алікорни.\n\nНайтмер Мун глумливо посміхнулася і кивнула. «Саме так, це Я, законна Імператриця цих земель!»\n\nПольшавець упав на коліна, низько схилившись і розправивши крила. «О Пані Луно, Та, Хто Мешкає у Снах, ми вітаємо ваше повернення у цей світ! — Його голова була схилена так низько, що він не помітив, як Найтмер Мун здригнулася. — Поки поні Річкових земель, можливо, забули вас, ми тут міцно тримаємося старих звичаїв і пам'яті про Вас!»\n\n«Пха-ХА!.. — гавкнула Дейбрейкер, заходячись реготом. — «Чуєш це, Луночко? Вони пам'ятають тебе!»\n\nНайтмер Мун різко повернулася до сестри. «АНУ—»\n\n«П-пані Селестіє! — вигукнув інший грифон, приєднуючись до першого у поклоні. — Якій честі ми завдячуємо візитом Сонцездіймальниці до нашого смиренного селища?»\n\n«О дійсно, — промуркотіла оперативно заспокоєна Найтмер Мун. — Розкажи-но нам, Селестієчко, чому Ми тут?» Настала черга Дейбрейкер гарчати, поки Найтмер Мун заливался сміхом.\n\n«Що ж... — просичала Дейбрейкер, ледь стримуючи корону люті, що палахкотіла навколо рогу, — Ми чули, що поблизу є грифони, які поклоняються божествам поні. Ми прибули, щоб переконатися, що ви вклоняєтеся ПРАВИЛЬНИМ богиням.»\n\n«Вона мовить істину, — Найтмер Мун хижо посміхнулася. — Ми чули про вашу відданість, унікальну серед грифонів, і прийшли на власні очі побачити стан справ. Хоча деталі вашої віри дещо... застаріли, Ми раді бачити, що ви шануєте Своїх законних володарок. — Вона зиркнула на Дейбрейкер. — Чи не так, сестро?»\n\nДейбрейкер вискалилася."
 evildiarchy_newmareland.36.a:0 "«Так, звісно... люба сестро.»"

 evildiarchy_newmareland.37.t:0 "Оголошення"
 evildiarchy_newmareland.37.d:0 "Джет Сет з тривогою чекав біля сцени на промову Діархів. Вперше навіть він був у повному невіданні. Від самого прибуття до Німбусії пара не спромоглася просвітити його, а він був занадто розсудливим, щоб випитувати відповіді силою.\n\nЗавіса хитнулася, вириваючи Джет Сета з думок, стара дерев'яна сцена зарипіла під копитами Імператриць, що вийшли до натовпу. «Мої найдорожчі піддані, — почала Найтмер Мун. — Цей день знаменує завершення Нашого завоювання всіх територій Діамантових псів, а також земель Німбусії.» Джет Сет ковтнув слину, відчуваючи, як груди стискає лещата.\n\nДейбрейкер ступила вперед. «Більшість із вас знає, що Ми не з тих, хто виголошує промови над кожною мізерною країною, яку Ми беремо під Своє заступництво. — Джет Сет чув власний пульс, подумки проклинаючи театральність алікорнів. — Звісно, цей регіон відомий деякими... скажімо так, суперечливими практиками.»\n\n«Моя сестра має на увазі традицію рабства. Взявши контроль над регіоном, Ми відтепер відповідальні і за його культуру, — продовжила Найтмер Мун. Мить істини. Наскільки глибоким буде цей удар? Чи спробують вони поширити цю практику по всій імперії? Чи обмежать її лише місцевими регіонами? У будь-якому разі, це неминуче призведе до подальшої дестабілі— «Як справедливі правительки, Ми не бачимо іншого виходу, окрім його повного скасування. Наказ вступає в силу негайно.»\n\nДжет Сет кліпнув очима. Справді? Ось так просто вони не лише вчинили правильно, а й полегшили йому життя? Перш ніж він встиг це усвідомити, на його обличчі з'явилася посмішка. Вперше за довгий час справи пішли добре! Навіть самовпевнений тон Дейбрейкер не міг цього зіпсувати. «Природно, причина Нашого вибору проста. Наші піддані належать Нам, і виключено Нам, і Ми не дозволимо жодній істоті забирати їх у Нас."
 evildiarchy_newmareland.37.a:0 "Його посмішки ніби й не існувало."

 evildiarchy_newmareland.38.t:0 "У пошуках пташки"
 evildiarchy_newmareland.38.d:0 "Джет Сет слідував за алікорнами, поки вони — за браком кращого терміну — «оглядали» Імперський палац. За їхнім наказом багато частин палацу вже було розграбовано або сплюндровано, але зрідка вони перетинали коридор чи залу, що все ще зберігали своє оздоблення.\n\nЦе перехоплювало подих. Стіни були вкриті гобеленами неймовірної деталізації, витканими з найяскравіших ниток, а численні прикраси, що стали б центральними експонатами в будь-якому заможному домі, просто вишикувалися вздовж стін, мов звичайний крам. Джет Сет ніколи б не висловив цю думку вголос, але попри всі свої застереження щодо природи їхньої нової імперії, він мусив визнати: бачити палац у такому стані було просто трагічно.\n\nЩе гіршою була причина цього вандалізму. Офіційно вони шукали артефакти та викурювали залишки імперських військ, але він знав правду. Це був навмисний удар по гордості Імперії Грифонів, а також відчайдушна спроба знайти юного Ґровера."
 evildiarchy_newmareland.38.a:0 "На щастя, ці зусилля поки що не дали результатів."

 evildiarchy_newmareland.39.t:0 "Втікачі"
 evildiarchy_newmareland.39.d:0 "Кроки тихо відлунювали в древніх тунелях під імперською столицею. І Ґровер, і його охоронець — діамантовий пес Беніто — вже деякий час мовчали, але не через страх бути почутими; вони вже встигли відійти на достатню відстань від палацу. Ні, їм просто не було чого сказати. Або, можливо, сказати хотілося занадто багато.\n\nПочатковий викид адреналіну давно минув, і все, що залишилося — це холодна, жорстока реальність. Усе скінчено. Яке б майбутнє не готувала політика юному імператора, його відібрали два божевільних, спраглих до влади алікорни. Беніто було дуже спокусливо думати, що Ґровер втратив усе.\n\nАле він знав краще. Ґровер був живий, і шанси на їхню втечу зростали з кожним кроком. Питання про майбутнє накопичувалися, але чим більшою ставала ця купа, тим очевиднішим ставало одне... "
 evildiarchy_newmareland.39.a:0 "...у малого все ще було майбутнє."

 evildiarchy_newmareland.40.t:0 "Спиш, Еквестріє?"
 evildiarchy_newmareland.40.d:0 "По всій Грифонії день і ніч чувся гуркіт молотів та машин. Рев вантажівок, свист потягів, тупіт копит і лопотіння крил наповнювали повітря, поки мільйони солдатів і десятки мільйонів тонн припасів стікалися на захід. Від рідного [356.GetName]у і до самої Бакари народи Грифонії стоять єдиним фронтом під одним стягом. Якби ж тільки сестри були такими ж єдиними, як їхні послідовники.\n\nДейбрейкер стрімко пронеслася небом, її аура залишала за собою вогняний слід. Перед нею стояв неосяжний щит, що захищав Еквестрію від її законного повернення. «Я все ще вважаю, що нам слід висадитися на Грифських островах і звідти йти до берега, — гаркнула богиня через плече. — Немає причин це затягувати!»\n\n«Південний Схід буде набагато кращим! — вигукнула у відповідь Найтмер Мун, летячи трохи позаду і оглядаючи щит. — У тому регіоні вже є повно лоялістів, а його слабка інфраструктура полегшить утримання будь-якого плацдарму проти наземних атак.»\n\n«Якщо будуть якісь атаки, Ми в будь-якому разі просто спопелимо їх! — прогарчала Дейбрейкер, випустивши заклинання в небо задля ефекту. — Не розумію, навіщо марнувати час замість того, щоб йти прямо на Кантерлот! Ми переможемо мою зухвалу ученицю і завтра сидимо в столиці!\n\n«Сестро, Я вже казала тобі, Елементи Гармонії—»\n\nНавіть коли їхні війська готувалися до фінальної битви на землі, сестри продовжували сперечатися в небесах."
 evildiarchy_newmareland.40.a:0 "Невже їм так важко знайти спільну мову...?"

 evildiarchy_newmareland.41.t:0 "Зв'язок із лоялістами"
 evildiarchy_newmareland.41.d:0 "Насент Дрім зітхнув, дивлячись на радіоприймач. Минуло вже багато років відтоді, як його богиня повернулася, а він усе ще залишався тут, замкнений під щитом, далеко від неї. Гірше того, він та його побратими-фестрали були закликані принцесою-зрадницею, Твайлайт Спаркл, готуватися до боротьби проти них. Якби він тільки не був лошам, коли пролунав перший заклик, він би вже давно був за океаном, поруч зі своєю богинею.\n\nВін підняв радіо. Його корпус був дещо потертим, але загалом воно було в доброму стані. Приймач належав його дядькові, який подарував його перед від'їздом до Грифонії. «Бережи його, — сказав він тоді, — бо одного дня він може знову ожити, в ім'я Найтмер!» Але Дрім не мав ілюзій щодо цього. Радіо було налаштоване лише на певний діапазон, і було малоймовірно, що хтось поза межами Еквестрії все ще використовував його.\n\nВін зітхнув, поставив приймач на місце і встав, готуючись вийти з кімнати. На нього чекали друзі. Сьогодні вони збиралися випити, хоча він не був упевнений, чи то буде просто сидр, чи дещо, «сидром» іменоване. Тим не менш, він—"
 evildiarchy_newmareland.41.a:0 "Радіо ожило і затріщало голосом, який його серце впізнало із тисячи."

 evildiarchy_newmareland.42.t:0 "Початок кінця"
 evildiarchy_newmareland.42.d:0 "Джет Сет втупився у поміст, де Дейбрейкер та Найтмер Мун виголошували свою промову, але жодне їхнє слово не доходило до його свідомості. Навіть коли його погляд втратив фокус, він цього не помітив. Він міг думати лише про те, що цей уряд мав би розвалитися ще тоді, під час війни з Вінґбардією. Але якимось чином він стояв непохитно.\n\nЧи була це заслуга його зусиль? Чи цим двом вічно сварящимся божевільним алікорнам якимось чином судилося захопити світ? Він сподівався виграти достатньо часу для Твайлайт та її друзів, щоб вони змогли організувати гідний опір, але що, як він просто дозволив сестрам зміцнити свою владу?\n\nНі, він не міг звинувачувати себе в цьому, не після того, як був свідком їхніх найгірших сварок. Якби ці двоє були надані самі собі, вони б неминуче спробували знищити одна одну, потягнувши за собою весь світ. Але тоді... як довго це все ще зможе триматися? Як довго два егоцентричних мегаломаніяки зможуть удавати, що ділять п'єдестал?\n\nТепер, з початком війни проти Еквестрії... чи відверне це їх від чвар настільки, щоб... знову відкласти неминуче? Чи, що гірше, це стане для них точкою розриву? У будь-якому разі, він не міг їх зупинити. Тільки той щит затримував їх, крізь який вони тепер знайшли шлях. Йому було млосно.\n\nПоні міцно заплющив очі й потер скроні, зосередившись якраз вчасно, щоб впіймати фінал промови Імператриць."
 evildiarchy_newmareland.42.a:0 "«І саме тому Ми рушаємо вперед, щоб відвоювати Наші землі.»"

 evildiarchy_newmareland.43.t:0 "І прогремів грім"
 evildiarchy_newmareland.43.d:0 "Дейбрейкер хижо посміхнулася, підносячись над натовпом зі сцени. «Мої дорогі піддані, роками Нас не пускали до Нашого власного домену. Роками те, що належить Нам по праву, утримували силоміць.»\n\n«За цей час, — продовжила Найтмер Мун, — Ми об'єднали весь континент Грифонії під Нашим правлінням, довівши світові не лише Нашу майстерність та відданість як правительок, а й Нашу готовність простягнути Нашу хватку до того, що є Нашим, і забрати його!»\n\nДейбрейкер вискалилася, демонструючи глядачам свої гострі зуби. «І тому Ми оголюємо ікла перед зрадниками Еквуса та перед самозваними Елементами Гармонії. Ми — шторм, що йде по їхні душі, і вони не переживуть Нас.» Натовп на цей час заціпенів у мовчанні, напруга була такою густою, що могла б зупинити артилерійський снаряд.\n\n«Проте Ми настільки ж милосердні, наскільки й могутні, і дамо шанс кожному на спокуту. Нехай кожен на Еквусі, поні чи інша істота, знає: вас буде помилувано. — Натовпом прокотилося розгублене шепотіння, поки Найтмер Мун витримувала паузу, надаючи своїм словам ваги."
 evildiarchy_newmareland.43.a:0 "— Вам потрібно лише повстати і приєднатися до Нас.»"

 evildiarchy_newmareland.44.t:0 "Що з ними робити"
 evildiarchy_newmareland.44.d:0 "Коли Найтмер Мун та Дейбрейкер відчинили двері до підземелля замку Кантерлоту, Рейнбоу зреагувала першою, кинувшись до ґрат. «Випустіть мене звідси! Я вам обом хвости повідриваю!» Її агресія викликала лише закочування очей у Найтмер Мун та похмурий смішок у Дейбрейкер.\n\nЖодна з них не відповіла на її хвастощі. Натомість із іншої камери пролунав голос Реріті. «Люба, я цілком впевнена, що це вони повідривають нам що завгодно. До того ж, якби вони справді боялися програти тобі, вони б нас не випустили.»\n\nПерш ніж будь-яка інша поні змогла відволікти їх від причини візиту, Найтмер прокашлялася. «Ми прийшли сюди, щоб оголосити вашу долю, а не слухати ваші теревені.»\n\n«Дайте вгадаю, — промовив пригнічений голос скутої ланцюгами Твайлайт Спаркл. — Публічна страта?»\n\n«Ах, моя люба ученице, — промуркотіла Дейбрейкер. — Невже ти вважаєш Нас монстрами? — Вона на мить похитала головою, не даючи Твайлайт часу на відповідь. — Тобі це може не подобатися, але навіть у своїй істинній формі Я все ще Селестія, і Я все ще прив'язана до тебе та твоїх друзів.» Ніким не помічена, пряма грива Пінкі Пай почала закручуватися до звичної форми.\n\n«Те саме можна сказати і про Мене, — додала Найтмер. — Я теж залишаюся прив'язаною до вас шістьох. Проте жорстока і холодна реальність полягає в тому, що ваше повстання має бути покаране.»\n\nПінкі Пай підстрибнула в повітря і підскочила до передньої частини своєї камери. «О! О! Це буде як місія дружби в якомусь жахливо брутальному місці, на кшталт Як'якстану? Я на них знавця з'їла!»\n\n«Ох, ем... Пінкі, я не думаю, що в-вони відправлять нас на... на місію дружби.«» Кожне слово Флаттершай ставало дедалі тихішим, і під кінець, коли увага всіх була прикута до неї, вона практично злилася із задньою стіною своєї камери.\n\nДейбрейкер посміхнулася. «Знаєш, моя люба Флаттершай, Я не знаю як, але Пінкі Пай вгадала правильно. Фактично, якщо ви досягнете успіху, вам дозволять повернутися, а Ми обидві зречемося влади.»\n\nКоли Дейбрейкер закінчила говорити, брова Епплджек злетіла настільки високо, наскільки це було можливо. «Стривайте-но хвилиночку... Тут же є підвох, правда? Ви б не казали такої дурні, якби це було можливо.»"
 evildiarchy_newmareland.44.d_alternate:0 "«Це безглуздо, — Дейбрейкер крокувала поруч із Найтмер Мун головною залою Кристального замку. — Чому Ми маємо бути в Кристальній Імперії, а не в Кантерлоті?»\n\n«Звідки такий сентименталізм? — презирливо кинула Найтмер Мун. — Те прокляте дерево вичерпало всю свою магічну силу, а Елементи Гармонії явно десь переховуються. Залишився лише один артефакт, який може загрожувати Моїй божественності, і Я не дозволю Собі пасти через ідіотську необачність залишити його без нагляду.»\n\nПерш ніж Дейбрейкер встигла поставити під сумнів вибір слів своєї сестри, раптовий гуркіт з високої вежі замку привернув увагу обох. Швидко злетівши до одного зі шпилів, вони незабаром побачили, як його пожирає фіолетове полум'я. Кожна сестра приземлилася на окремі шпилі, споглядаючи сцену, що розгорталася перед їхніми очима. Коли фіолетове полум'я розвіялося, поруч із Кристальним Серцем, яке почорніло до самого центру і було позбавлене будь-якої любові, з'явився силует. Грива кобили дико розвівалася, її ріг палахкотів неоново-блакитним, а на обличчі була маска. Коли вона подивилася на двох сестер, її обличчя скривилося в маніакальній посмішці.\n\n«НАРЕШТІ ВИ ПОКАЗАЛИСЯ, МЕРЗЕННІ ПОТВОРИ! — Коли її ріг почав світитися ще яскравіше, ніж раніше, обидві сестри приготувалися до бою. — ГОТУЙТЕСЯ! Я НЕ МАТИМУ ЖАЛЮ, ДОКИ ВИ НЕ ЗВІЛЬНИТЕ ПРИНЦЕС!»\n\n«Твайлайт Спаркл. Ця «правильна» поні... виходить на бій сама? Гадаю, навіть твої так звані друзі зрозуміли, що це самогубство. — Найтмер Мун посміхнулася. — Я з насолодою відплачу тобі за те, що ти зробила зі Мною.» В момент коли вона заговорила, Найтмер кинулася вперед і випустила яскравий промінь, який миттєво був відбитий променем Спаркл — таким могутнім, що він загрожував пересилити Найтмер, якби не втручання Дейбрейкер із власною атакою.\n\n«Вона явно переповнена силою Кристального Серця і перебуває в стані маніакального збудження. Не стався до неї як до звичайного алікорна, інакше тебе розчавлять. — Дейбрейкер почала махати крилами, злітаючи в повітря. — Вдруге рятувати тебе я не збираюсь.»\n\nПрогарчавши щось у відповідь, Найтмер Мун швидко піднялася, приєднуючись до сестри в небі проти Спаркл."
 evildiarchy_newmareland.44.a:0 "«Що ж, усе залежить від грифонів, які поклоняються цьому хибному Маару.»"
 evildiarchy_newmareland.44.b:0 "Сестри проти учениці, остання битва за дружбу."

 evildiarchy_newmareland.45.t:0 "Ніколи знову"
 evildiarchy_newmareland.45.d:0 "Після відносно короткого польоту Дейбрейкер та Найтмер Мун прибули до Замку Двох Сестер. Як і завжди, його вигляд викликав у обох дивну ностальгію, але, як зазвичай, вони були тут в інших турботах, які не включали в себе спогадів про гірко-солодке минуле. Точно не тоді, коли теперішнє було таким солодким, як їхня перемога над носіями Елементів.\n\nСаме тому обидва алікорни розуміли важливість пильності, доки все не буде завершено остаточно. Для цього їм потрібно було розібратися зі скалкою у формі Дерева Гармонії. Вони знали, що це буде нелегке завдання, і тому звільнили весь свій графік на день для «боротьби з бур'янами».\n\nКоли вони почали обстрілювати кристальне дерево кількома своїми найпотужнішими заклинаннями — від сирої магічної енергії до вибухових вогняних куль, які ледь не обрушили печеру дерева — незабаром стало очевидно, що вони мали рацію у своїх припущеннях. Тож їхні методи ставали витонченішими, а заклинання — складнішими, проте «остаточне рішення» продовжувало вислизати від них.\n\nПісля годин безплідних зусиль Найтмер Мун виявила, що просто люто дивиться на Дерево Гармонії, наче це могло змусити його нарешті розбитися. «Сестро... Я думаю, Нам потрібно провести більше досліджень цієї огидної магії, якщо Ми хочемо її позбутися.»"
 evildiarchy_newmareland.45.a:0 "«Без сумніву, все ж Я не збираюся залишати його тут надовго.»"

 evildiarchy_newmareland.46.t:0 "Час розплати"
 evildiarchy_newmareland.46.d:0 "Стоячи перед дверима зали засідань алікорнів, Джет Сет важко ковтнув слину. Вони терміново вимагали його присутності. Раціональна частина його розуму заспокоювала, що це лише чергова їхня ідіотська суперечка, яку він має розсудити. Однак емоційна частина наполягала на жахливому: вони могли знайти його листи до Рейвен. Але справді, які були шанси, що вона їх не знищила? Він глибоко вдихнув і постукав, після чого почув запрошення увійти. Всередині Дейбрейкер та Найтмер Мун сиділи поруч на дивані. Тривожний знак.\n\n«Ви хотіли бачити мене, Ваші Величності? — вимовив Джет нейтральним тоном, попри шалений стрес. Коли вони обидві глумливо посміхнулися йому, по його спині пробіг мороз — він зрозумів, що його побоювання були зовсім не безпідставними. — Щось... щось не так?»\n\n«Чому б тобі спочатку не сісти?» Дейбрейкер говорила немов хижак, що загнав здобич у кут. Чи йому це лише здалося? Він виконав наказ, але підходячи до столу, помітив на підлозі стос паперів. Паперів, вкритих дуже знайомим почерком — його власним. Здавалося, вони розклали їх саме так, щоб він помітив їх саме в цю мить.\n\nНайтмер Мун похмуро засміялася. «Невже ти справді гадав, що Ми не дізнаємося? — Вона повільно похитала головою. — Визнаю, ти непогано розігрував свої карти, Джет Сете, але зрештою козирі завжди були в Наших копитах.» Джет Сет відступив назад. Усе скінчено. Його життя скінчено. Ні, гірше: без нього, хто міг би вгамовувати їхні чвари, вони рано чи пізно знищать одна одну, а разом із собою — і світ...\n\n«Звісно, за зраду такого масштабу зазвичай передбачена страта, — промуркотіла Дейбрейкер. — Але, щиро кажучи... ти занадто корисний для цього. І хоча слова, які ти писав про Нас, ріжуть Наші серця, — вона театрально витерла неіснуючу сльозу з щоки, перш ніж вискалитися, — вони також дали Нам розуміння того, чому ти насправді це робиш.»\n\n«І тому, — продовжила Найтмер, — Ми вирішили відмовитися від очевидного варіанту на користь більш... креативного покарання. — Алікорн витримала паузу. — Ми залишимо тебе в найглухішому сільському закутку Еквестрії, з фермерами, чиїм наказом буде ніколи не випускати тебе. Можливо, одного дня Ми повернемося за тобою.»"
 evildiarchy_newmareland.46.a:0 "У ту мить такий поні як Джет Сет, мабуть, віддав би перевагу страті."

 evildiarchy_newmareland.47.t:0 "Остаточний підсумок"
 evildiarchy_newmareland.47.d:0 "Дейбрейкер закотила очі й зітхнула. «Повтори Мені ще раз... чому саме твій проєкт танка нібито кращий за Мій? Я бачу лише «якби» та «можливо», але в ньому катастрофічно бракує бодай чогось справді вартісного.»\n\n«Хіба Я не казала тобі вже три чи чотири рази? — Найтмер Мун зціпила зуби. — Список переваг колосальний! Ці «якби» та «можливо», на які ти скаржишся — не просто гіпотези! Це ключові практичні міркування! — Вона з силою вдарила обома копитами по масивному дубовому столу, на що той пустив павутину тріщин. — Навіщо Я взагалі терплю всі твої заперечення! Навіщо Я взагалі терплю ТЕБЕ! — Її очі розширилися, а щелепа відвисла. — А навіщо Я терплю тебе?.. — Повторила вона вже з посмішкою. — Я втомилася від цієї гри в рівновагу.»\n\nЗаціпенівши на мить, Дейбрейкер раптово вибухнула реготом. «Ах, це просто безцінно! — Вона відповіла на лютий погляд Найтмер Мун черговим закочуванням очей. — Тартар, вгамуйся вже, Я сміюся не з тебе — хоча там є з чого посміятися, особливо з того твого нового танка. — Вона не дала сестрі вставити шпильку у відповідь. — Мені просто кумедно, що Ми зійшлися на думці саме в цьому. — Вона знову зайшлася сміхом. — Це майже доводить правоту Джет Сета, який вважав, що Ми не зможемо ладнати без нього, що це він змушував Нас працювати разом!»\n\nНавіть цей дошкульний коментар не зіпсував настрою Найтмер, вона знову посміхнулася. «Знаєш... Мені полегшало. Особливо тепер, коли Ми відвоювали Еквестрію, і стало зрозуміло... що в Нашій подальшій співпраці немає жодного сенсу, що думаєш? — Дейбрейкер похитала головою. — Тоді Я пропоную вирішити це так, як Ми мали зробити ще на самому початку. Без хитрощів, без брудних ігор і без посередників: ти проти Мене. В чистому полі.»"
 evildiarchy_newmareland.47.d_alternate:0 "Минули години, відколи три алікорни зійшлися в запеклій битві, що вщент зруйнувала більшу частину Кристального замку. Хоча сестри мали очевидну чисельну перевагу, колосальний магічний арсенал Спаркл та нестримна міць, яку вона зачерпнула з Кристального Серця, не дозволяли їм остаточно взяти гору. Проте після тривалого бою стало очевидно, що виснаження починає пересилювати тіло учениці. Лише на частку секунди вона забарилася, не встигнувши виставити щит проти променя, і її відкинуло через усю тронну залу прямо до підніжжя самого трону.\n\n«Невже... мені не вистачило сили, щоб врятувати Принцес... Сподіваюся... вони пишаються тим, що я зробила...» Спаркл закашлялася, поки сестри наближалися до її безсилого тіла. Поки Найтмер Мун з огидою споглядала повалену суперницю, на обличчі Дейбрейкер з'явився дивний меланхолійний вираз. Спаркл подивилася на неї і на мить посміхнулася. «Селестіє... це ти? Тут так тепло... — Почувши ці слова, Дейбрейкер здригнулася. — Це таке приємне відчуття...» Вона було рушила до Спаркл, але була раптово зупинена болем у боці. Озирнувшись, вона побачила посмішку своєї сестри та її палахкотючий ріг.\n\n«Благаю, невже прямо зараз в тебе прокинулося серце? Мабуть, ліпше буде розібратися з тобою негайно, поки ти не дозволила цій сентиментальності стати у Мене на шляху.»\n\nДейбрейкер вискалилася у відповідь, її меланхолія миттєво трансформувалася в уже знайому егоїстичну лють, а з тріщин замку почав вириватися танець світла й темряви. «Не дивно, що нічних кошмарів бояться лише лошата. — Крила Дейбрейкер спалахнули ревучим полум'ям, тоді як крила Найтмер Мун зловісно засіяли. — Вони лише жалюгідно шкодять тим, хто спить, і розсіюються від простого пробудження. Час світу прокинутися, «дорога сестро»».\n\nКоли вони почали здійматися над землею, ніби самі сонце з місяцем у небі пустилися в шалений танець, наче самі світила змагалися за право панувати. Побачивши це, Спаркл не могла не відчути благоговіння перед грандіозною міццю... і тихо засміялася. «Ці фальшиві претендентки, на подолання яких я поклала стільки сил... просто вирішили зробити те, що не вдалося мені... ха... хаха... хахахахАХАХАХААХ!» Її сміх відлунював, поки сонце і місяць зійшлися високо в зеніті, а весь світ здригнувся під примхою трьох маленьких поні."
 evildiarchy_newmareland.47.a:0 "Дейбрейкер могла лише вискалитися у відповідь."
 evildiarchy_newmareland.47.b:0 "АХАХАХАХАХАХАХАХАХАХА"
 evildiarchy_newmareland.47.a.tt:0 "§RСвіт затамував подих, поки два божества виходять на двобій. І питання не в тому, хто переможе, а чи доживе світ до фіналу.\n\nВпало останнє доміно...§!"

 evildiarchy_newmareland.48.t:0 "Ідол Борея"
 evildiarchy_newmareland.48.d:0 "Серед усіх артефактів Грифонії Ідол Борея був чи не найвизначнішим. Використаний Ґровером I — тодішнім королем Грифонстоуна — для об'єднання грифонів, він, за переказами, вселяв гордість у кожного грифона, що його бачив. Пізніше Ґровери залишили ідол у Грифонстоуні, де його врешті-решт викрав циклоп Арімаспі — за фатальним збігом обставин, лише за кілька років до колапсу Імперії Грифонів. Не дивно, що Ідол очолював список артефактів, які належало знайти.\n\nХоча протягом кількох десятиліть доля Арімаспі та місцеперебування ідола залишалися невідомими, лише кілька років тому його знайшли під час візиту двох Елементів Гармонії до Грифонстоуна. Арімаспі спіткала нещасна доля — він упав в ущелину неподалік міста. Однак через могутні вітри в розломі жоден грифон не зміг дістати ідол.\n\nЗвісно, такі дрібниці не обходили сестер, які все одно наказали дюжині пегасів спуститися в ущелину. Проте після того, як троє з дванадцяти загинули через шквальний вітер, група вирішила змінити підхід. Натомість в ущелині було зведено складну дерев'яну конструкцію. Після тижня напруженої роботи споруду було завершено.\n\nАле доля розпорядилася інакше. Щойно поні спустилися по конструкції та схопили ідол, ущелина, ніби відчувши це, пронесла ще сильніши пориві вітру, чого споруда вже не витримала. Їхні колеги нагорі могли лише з жахом спостерігати, як ідол падає ще глибше. Коли навіть поспіхом розгорнутий сонар не зміг знайти жодного його сліду, місію було остаточно припинено."
 evildiarchy_newmareland.48.a:0 "Що ж, варто було спробувати."

 evildiarchy_newmareland.1000.t:0 "Мана в очах"
 evildiarchy_newmareland.1000.d:0 "Отем Бріз сидів у своєму кабінеті, переглядаючи папери. Усе це просто не вкладалося в голові. Їхні агенти успішно проникли в Новий Мейрленд і спричинили повернення Найтмер Мун — вони досягли мети. І все ж, їхня богиня пов’язала себе з цією сонячною розпусницею, закликаючи Хіроптерру залишатися вірною і стверджуючи, що це лише тимчасовий стан справ. Він хотів вірити їй, але події розвивалися занадто стрімко. Коли надійшли новини, що Імперський кондомініум згуртовує соляристів, стало ясно: щось пішло не так.\n\nНевже вони зазнали невдачі? Ця думка не давала йому спокою. Чи варто було довіряти тому незнайомцю? Чи справді той порошок був здатний відродити Найтмер? Хоча зовні все виглядало саме так, справжня Найтмер Мун ні на секунду не припустила б думки про союз із Дейбрейкер, і навіть якби вона використовувала її тимчасово, вона б ніколи не дозволила такому статися. Хоч як крути, на думку спадали лише два варіанти пояснення.\n\nВаріант 1: Вони були дурнями, що довірилися гостю, і їх обманом змусили пробудити бліду імітацію їхньої богині — велике богохульство.\n\nВаріант 2: Нинішня «Найтмер Мун» — підробка, ще жахливіша за саму Луну.\n\nЩелепи Отема стиснулися. Незалежно від того, що було правдою, факт залишався фактом: їхньої богині з ними не було. Як послідовники істинної Найтмер, вони зобов'язані відкинути цю жалюгідну подобу і продовжувати свою працю. Навіть якщо це означатиме виклик гніву цієї — безсумнівно могутньої — самозванки. Будь-який істинний найтмерист зробив би це без вагань. Підійшовши до вікна з видом на Новий Аякачтлі, він пробурмотів собі під ніс:\n\n«Навіть якщо знадобиться ще тисяча років.»"
 evildiarchy_newmareland.1000.a:0 "Ми мусимо закріпитися в Зебриці, а потім почати все заново."

 evildiarchy_newmareland.1001.t:0 "Наймерзенніша зрада"
 evildiarchy_newmareland.1001.d:0 "«Сестронько! — весело проревіла Дейбрейкер, просунувши голову крізь щойно пророблену головою дирку в стіні офісу Джет Сета. — Ти вже чула хороші новини?»\n\n«...Що там таке? — пирхнула Найтмер Мун, ставлячи чашку кави. — Ти знаєш, Я не люблю, коли Мене змушують відгадувати... сестронько.»\n\n«Твої «вірні піддані» в Хіроптеррі проголосили тебе фальшивою богинею і заявили, що більше не коритимуться тобі!»\n\nНайтмер Мун заціпеніла, вгвинчуючи в Дейбрейкер погляд, сповнений люті, зростаючої з кожною секундою. «Що? — Її голос був холодним, як поверхня місяця, але під цим спокоєм клекотів гнів, здатний позмагатися з рівнем сонячного полум'я. — Брешеш.»\n\n«Ах, повір мені, люба сестро, зовсім ні. Насправді вже кілька тисяч хіроптерців вирушили сюди, бо вони не згодні із рішенням уряду! — Посмішка Дейбрейкер стала ще ширшою, коли вона нахилилася вперед, вибиваючи ще один шматок стіни. — Принаймні у твоїх послідовників не тільки вітер в головах, сестро.»\n\nДжет Сет із наростаючим жахом спостерігав, як дихання Найтмер Мун прискорилося, а потім вирівнялося до моторошної стабільності. Він уже бачив її такою, і сподівався, що більше ніколи не побачить. «В-Ваша Величносте, якщо дозволите?»\n\nНайтмер люто зиркнула на нього. «Ну?»\n\n«Ймовірно, покинуло Вас лише керівництво. Будь ласка, пам'ятайте, що народ все ще вірний вам.»\n\nНайтмер видихнула, напруга поступово залишила її тіло. «Ти правий, імперський канцлере. Повна чистка Хіроптерри буде зайвою. — Вона глянула на хихикаючу Дейбрейкер. — Але це не означає, що чистки не буде зовсім. Сестро, чи не бажаєш ти супроводити Мене на маленьку... демонстрацію божественності?»"
 evildiarchy_newmareland.1001.a:0 "«Коли Я доберуся до них, Я перефарбую їм місяць у багряний.»"

 evildiarchy_random.1.t:0 "Нова мета?"
 evildiarchy_random.1.d:0 "«...сестро, що це, в ім'я неоглядних творців, таке? — запитала Найтмер Мун абсолютно безпристрасним тоном. Бо як на Мене, це виглядає як марнування ресурсів. Дорогоцінних ресурсів.» На останніх словах її голос ледь не зірвався. На щастя вона була майстром тримати язика за зубами.\n\n«Як це що, люба сестро? Це нова мета! — Дейбрейкер глумливо посміхнулася, підходячи до машини перед ними. — Це має назву: MKIII Killbauer ATV-AC, із 30-міліметровою бронею та кулеметом Bellimer на даху. Не кажучи вже про те, — вона ляснула по даху авто, — що в цього красеня влізе чимало поні!»\n\nНайтмер Мун окинула машину все ще невраженим поглядом. «...а ракетна артилерія?»\n\n«Запатентовані 12-ствольні мобільні ракетні платформи «Baskerville»! — Посмішка Дейбрейкер стала ще ширшою. — У поєднанні з «Killbauer» вони забезпечать піхоті броньовану мобільність, водночас наводячи жах на ворожу піхоту. Кількість шкоди, скільки вони будуть закидувати проти піхоти, буде нищівною!»\n\n«Я впевнена, що у такого з'єднання буде жахливо низька організація, — пробурмотіла Найтмер Мун. — Не кажучи вже про вартість в молотках...»\n\n«Це твоя проблема, сестро! — Дейбрейкер похитала головою. — Ти мислиш категоріями таблиць та звітів. Іноді найкращий шаблон народжується не з підрахунків, а з неочікуваних джерел! — Вона кинула хитрий погляд на Джет Сета. — Яка твоя думка, Наш дорогий канлере?»\n\nОбличчя Джет Сета зблідло, коли погляди обох алікорнів вп'ялися в нього."
 evildiarchy_random.1.a:0 "«М-можливо, цьому треба дати шанс...?»"
 evildiarchy_random.1.b:0 "«Б-без подальших досліджень ліпше не ризикувати...»"

 evildiarchy_random.2.t:0 "Уніформа"
 evildiarchy_random.2.d:0 "«ІМПЕРСЬКИЙ КАНЦЛЕРЕ! — Джет Сет важко зітхнув про себе, коли Дейбрейкер з гуркотом вибила двері до його кабінету. — Мені потрібні твої послуги!»\n\n«Ану стій на місці, сестро! — Він здригнувся, почувши, як Найтмер Мун проломила стелю і тепер ширяла за кілька дюймів над його столом. — Ми домовилися, що звернемося до нього разом!»\n\n«Так, авжеж, — Дейбрейкер махнула копитом, — Я знаю. Важливо те, щоб він поглянув на ОЦЕ. — Вона витягла два комплекти уніформи, тримаючи їх магією. — Ми знаємо, що ти вважаєш себе великим знавцем моди, тож Ми вирішили, що ти розсудиш Нашу... суперечку.»\n\n«Та краса, що ліворуч — мій дизайн, — прохрипіла Найтмер Мун, підлітаючи до сестри, — а це жовте сміття праворуч — її. Обирай мудро, канцлере.»\n\n«Н-ну, — Джет Сет бачив і спокійніші дні... — за якими критеріями я маю судити? Функціональність, зовнішній вигляд чи і те, і інше?»\n\n«Фоурмакціональність!» Обидва алікорни вигукнули одночасно, а потім зиркнули одна на одну. «Ні, функціональність!» «Ні, форма!» прогарчали обидві в унісон. «Ми вже це проходили! Для уніформи важливіше—»\n\nДжет Сет відкинувся на спинку крісла, розмірковуючи про своє життя і краєм вуха слухаючи їхні чвари. Як усе дійшло до того, що два живих апокаліпсиси зробили його своєю іграшкою? Більше того, як він опинився тут, слухаючи їхню сварку через кляту уніформу? Він раптово зосередився, усвідомивши, що ледь не пропустив кінець суперечки. Швидко прокрутив почуте в голові: вигляд — щоб вселяти жах у ворогів, запал у друзів та благоговіння у цивільних; функціональність — для камуфляжу і, власне, зручності. Було багато шпильок щодо стилю, але...\n\n«Ну, канцлере? — Одночасний вигук алікорнів перервав його мрії. — Твій вибір?»\n\nПопри ситуацію, Джет Сет не міг не посміхнутися про себе: це був доказ того, що незважаючи ні на що, ці дві божественні істоти перед ним все ще залишалися сестрами."
 evildiarchy_random.2.a:0 "Варіант Дейбрейкер виглядає краще."
 evildiarchy_random.2.b:0 "Я віддаю перевагу дизайну Найтмер Мун."

 evildiarchy_random.3.t:0 "Вічна ніч"
 evildiarchy_random.3.d:0 "Поліцейські дільниці були завалені панічними дзвінками, генерали благали будь-кого в уряді про роз’яснення, а метеорологи в розпачі намагалися зрозуміти, як це вплине на їхні прогнози. Хоча була лише 14:55, небо надворі було чорним, немов вночі.\n\n«МОЇ ПІДДАНІ! — проревіла Найтмер Мун перед натовпом фестралів біля Оперного театру столиці. — Я нарешті виконала Свою обіцянку, що готувалася тисячу років! Занадто довго вірні були змушені ховатися в тінях, нидіти в печерах, поки невдячні істоти світу ніжилися під сонцем! Тепер настав час для правління створінь ночі! Настав час для тих, хто пам'ятає свою істинну богиню, процвітати! Цим Я оголошую, що ніч. Триватиме. ВІЧНО!»\n\nДжет Сет відчув, як у нього підкошуються коліна від цієї похвали алікорна. Він щосили намагався втриматися на копитах, але в очах почало темніти. Коли він почав втрачати свідомість, йому здалося, що він побачив, як Найтмер Мун подивилася на нього зі стурбованістю, що саме по собі немож—.\n\nПерш ніж він встиг закінчити думку, його тіло з глухим ударом упало на бруківку."
 evildiarchy_random.3.a:0 "Це добре не закінчиться."

 evildiarchy_random.4.t:0 "Вгамування напруги"
 evildiarchy_random.4.d:0 "«Сестро, чи не бажаєш пояснити КРОМІШНЄ ЧОРНЕ НЕБО?! — Голос Дейбрейкер прогримів, коли вона влетіла у вікно кабінету Джет Сета, знову розбивши його вщент. — Чому ти не виконуєш свою частину нашої угоди?»\n\n«Ану повтори? — просичала Найтмер Мун, відірвавшись від податкових документів, які вона з любов'ю вивчала. — Це Моє право! Як законної богині цього світу—»\n\n«Ти опустиш місяць цієї ж миті, Луно! — відрізала Дейбрейкер. — Я думала, ти подорослішала, але ти все така ж самозакохана, як і раніше.»\n\n«НЕ ЗВИ мене так, Селестіє! — гаркнула у відповідь Найтмер Мун, вискаливши ікла. — Вважаєш себе кращою? Ти всього лише—»\n\n«Б-благаю Вас! — Джет Сет ковтнув слину, притягнувши до себе люті погляди обох алікорнів. — Ваша... Ваші Величності, з-згадайте, чому Ви погодилися працювати разом. Т-такі сварки послаблюють Вашу здатність повернутися на Еквус!»\n\nНа обличчі Найтмер Мун виповзла гримаса. «Ти смієш переривати Нас і вказувати, що Нам робити? Ти, зухвале щеня, забув—»\n\n«Він правий, ю ноу, — процідила крізь зуби Дейбрейкер. — Ми маємо працювати разом, поки що, щоб повернутися в Еквестрію.»\n\nОчі Найтмер Мун звузилися, впившись у Джет Сета на коротку мить, від чого він ледь не зомлів знову, перш ніж вона пирхнула і відвернулася.\n\n«Дуже добре. Якщо це заради Нашого повернення на законне місце, Я можу тимчасово відкласти вічну ніч. — Її ріг засяяв, поки місяць повільно дрейфував до горизонту і за нього, а вона сама продовжувала люто дивитися на Дейбрейкер. — Задоволена, сестро?»\n\nДжет Сет спостерігав, як Дейбрейкер дала ствердну відповідь кивком і розвернулася, пробивши нову діру в стіні його кабінету, філіграно покинувши його. Він безсило впав у крісло, намагаючись заспокоїти шалене серце."
 evildiarchy_random.4.a:0 "Невже... спрацювало?"

 evildiarchy_random.5.t:0 "Велична статуя"
 evildiarchy_random.5.d:0 "Будівництво дивного величного монумента в центрі столиці тривало кілька місяців — напрочуд повільна справа для імперії, яка в іншому майже не страждала від бюрократичного паралічу. Багато поні припускали, що причиною затримки була секретність. Дійсно, будівельний майданчик був огороджений стінами і загалом оповитий таємницею. Чимало громадян щодня проходили повз нього, розмірковуючи, що б це могло бути, аж поки це не стало частиною їхньої рутини і вони не перестали звертати увагу.\n\nНавіть урядовці не знали правди, хоч би як високо по ланцюжку вони не підіймалися. Можливо, ті, хто на самій верхівці, лише вдавали необізнаність, але особливо популярна теорія стверджувала, що навіть Джет Сет не знав, хто заснував цей проєкт і чим він був насправді.\n\nАж ось одного дня стіни зникли, і посеред площі постала вельми очевидна — і ретельно накрита — статуя в оточенні варти. Вона була вищою за багато навколишніх будівель, і, судячи з того, як на ній відблискувало світло під певним кутом сонця, вона була з чистого золота. Або, можливо, лише позолочена, однак знаючи своїх правительок, жителі Нового Мейрленда вважали це малоймовірним.\n\nПроте навіть у такому стані таємничість нікуди не пропала. Під завісою вгадувався силует одного алікорна, це було очевидно, але залишалося питання... якого? Як з’ясувалося, відповідь мала бути надана сьогодні, під час урочистого відкриття — саме тому центральна площа була забита щільним натовпом.\n\nНа диво, жодна Імператриця не прибула на відкриття, і саме тоді, коли натовпом поповзли сумніви, гвардієць підійшов до статуї і без зайвих церемоній зірвав покривало. За мить стало очевидно, чому ніхто не вважав за потрібне влаштовувати фанфари, бо перед ними постало дещо настільки величне і самовпевнене, що воно говорило — ні, — ревело само за себе:"
 evildiarchy_random.5.a:0 "Велична статуя Дейбрейкер."
 evildiarchy_random.5.b:0 "Прекрасна статуя Найтмер Мун."

 evildiarchy_random.6.t:0 "Найкраща танкова дивізія в історії"
 evildiarchy_random.6.d:0 "«СПОГЛЯДАЙ! — Джет Сет відсахнувся, коли танк проломив ту саму ж прокляту стіну кабінету, а зверху на ньому сиділа Найтмер Мун. — Імперський канцлере, тремти від мого останнього шедевру!»\n\nДжет Сет витріщився, приголомшений. Найперше, ні, танк не тримався на магії... це змусило його сумніватися чи його офіс досі на четвертому поверсі. Він обережно озирнувся: і справді, махіна частково висіла в повітрі. Без жодної опори.\n\n«КАНЦЛЕРЕ! — Найтмер Мун маніакально розсміялася. — Я знала, що в тебе гостре око! Не можеш відірвати погляду від плодів мого генія? Танк перед тобою — «PK-FHxGVI Armored Assault Tank-NMM»! Маючи 250-міліметрову броню, 130-міліметрову гармату і найпотужніший двигун, який тільки можна знайти поза військовим кораблем, він гарантовано стане головною загрозою на полі бою! Я вже показала його генералам, і вони не відповіли нічим, окрім палких вихвалянь! —Вона втупилася в Джет Сета з напрочуд щирою посмішкою. — Кажи, що думаєш?»\n\n«...як Ви затягли його сюди?»\n\n«Алікорна не цікавить думка фізики! — пирхнула Найтмер Мун. — Просто скажи, що ти про нього думаєш! Я планую випустити цілу дивізію найближчим часом, тож не гай часу!»\n\nДвері кабінету раптово відчинилися. «Канцлере, — почувся голос заспаної Дейбрейкер ззаду, — Я тут хот— Пресвята Я, якого тут відбувається?!\n\nДжет Сет повернувся, помітивши алікорна з чашкою чаю в копиті, яка витріщилася на танк. Цей вигляд збив його з пантелику, розгублений мозок бідного поні видав найперше, що вилізло на язика. «...Полярне сяйво?\n\n«Полярне... сяйво? У цю пору року, в цій частині Імперії, що проявилося у формі танка?»\n\n«...саме так.»\n\nДейбрейкер перевела погляд з Найтмер Мун на Джет Сета, після чого зітхнула і сьорбнула чаю. «Це просто дебілізм. Сестро, прибери це отамо. Я практично чую, як у нього летять гайки з двигуна.»\n\n«Не тобі вирішувати, сестро! — прогарчала Найтмер Мун. — Спірні питання вирішує Наш імперський канлцер!»\n\n«Авжеж, — Дейбрейкер кинула на Джет Сета ТОЙ САМИЙ погляд, — і Я впевнена, що він знає, як буде краще. Чи не так, імперський канцлере?»\n\nДжет Сет ковтнув слину, відчуваючи, як погляди обох алікорнів свердлять його наскрізь."
 evildiarchy_random.6.a:0 "«Це виглядає... приголомшливо.»"
 evildiarchy_random.6.b:0 "«Давайте, можливо, не використовувати його. Взагалі.»"

 evildiarchy_random.7.t:0 "Питання назви"
 evildiarchy_random.7.d:0 "«Ця назва має явне упередження на твою користь, сестро! — різко кинула Найтмер Мун, крокуючи кабінетом Джет Сета, залитим блідим місячним світлом, що проникало крізь підозріло схожу на силует Найтмер Мун діру в стіні. — Як і завжди! Ти навіть намагаєшся заявити права на море!»\n\n«Та благаю, ця назва — лише данина поваги законній володарці, — кинула Дейбрейкер, і на її мордочці повільно розпливлася самовпевнена посмішка. — І ця володарка — Я».\n\n«Ой-ой, годі вже твого нарцисизму! — Крила Найтмер Мун розправилися, а ріг зловісно засяяв. — Присягаюся, ти поводишся як розпещене лоша, що завжди вимагає того, що мають інші, бо ти просто нестерпна маленька суч—»\n\n«В-Ваші Величності, — витиснув із себе Джет Сет, мало не забившись під стіл. — М-можна мені слово?»\n\n«Жвавіше давай, — просичала Найтмер Мун, — поки Я не навчила одну поні, як це — ставати на шляху в Сестри.»\n\n«Н-назва Сансет походить від імені з-засновника міста, Са-Сансет Горайзн, — заїкаючись, промовив Джет Сет. — Крім того, це... Я, е-е, вважаю, що вона добре підходить як символ єдності між Вами обома. Прекрасна зустріч дня і ночі, що демонструє потенціал, який Ви маєте, коли працюєте в гарм— Е-Е!.. В унісон.»\n\nНайтмер Мун відкинулася назад, розмірковуючи. «...Я все більше розумію, чому Ми зробили тебе Нашим помічником. Ти досить clever pony.»\n\n«Вельми дякую, Ваша Величносте, але запевняю вас, §CI am not a clever pony.§!\n\n«Зате скромний! — засміялася Дейбрейкер. — Дуже добре, Ми проведемо більш... належне обговорення назви. Маєш якісь заперечення, сестро?»\n\nНайтмер Мун вторила сестрі. «Жодних.»"
 evildiarchy_random.7.a:0 "Міднайт — гарна назва."
 evildiarchy_random.7.b:0 "Сучасна назва цілком підходить."

 evildiarchy_random.8.t:0 "Власна учениця"
 evildiarchy_random.8.d:0 "«Сестро, імператорський канцлере, — голос Найтмер Мун наповнив повітря під час їхньої щотижневої «стратегічної сесії» в кабінеті Джет Сета. Насправді це був час чаювання сестер — звичка, що залишилася від їхніх колишніх «я» і якої вони ще не зовсім позбулися. Поки що. — Я роздумувала і вважаю, що настав час і Мені взяти власну ученицю.»\n\n«...ученицю? — Дейбрейкер глянула на неї поверх чашки. — Думаю у тебе є важливіші справи. Я чула, що заводи не виконують квоти.»\n\nНайтмер Мун зневажливо махнула копитом. «Це робота Джет Сету. Тимчасова. А те, що не може чекати — це виправлення жахливої несправедливості. Оскільки ти маєш Твайлайт Спаркл як свою ученицю — хоч вона останнім часом і бунтує — буде цілком чесно, якщо і Я отримаю власну підопічну.»\n\n«Справедливо... — Кивнула Дейбрейкер. — Я можу зрозуміти бажання мати те, що є тільки в Мене. Ти часто так робиш.» Вона вискаляла зуби, помітивши мимовидний оскал, що на мить з’явився на обличчі Найтмер Мун.\n\nДжет Сет гарячково переводив погляд з однієї на іншу. «У Вас уже є хтось на прикметі?» запитав він, намагаючись зняти напругу.\n\n«О, безперечно, — Найтмер Мун виставила ікла. — Бачиш, Я провела невелике розслідування, і виявилося, що подруга дорогоцінної учениці моєї сестри переїхала до Нового Мейрленда ще до Нашого піднесення. Її звати Мун Денсер, і вона вельми вчена поні. Хоча магії їй, в порівнянні з Твайлайт, дещо бракує, вона чудово володіє теорією, і Я впевнена, що зможу виховати з неї гідну єдиноріжку.»\n\n«О, хитро! — засміялася Дейбрейкер. — Дай вгадаю, вона також буде примусовою заручницею?»\n\n«Навіть не думай про таке! — реготнула Найтмер Мун. — Вона стане моєю ученицею за власним вибором.»\n\nДейбрейкер відкинулася назад і розреготалася. «Ха-х Ну добре, сестро! Розважайся! — Вона витримала паузу, її усмішка, здавалося, ставала дедалі ширшою з кожною секундою. — Насправді, Я з нетерпінням чекаю побачити, чи наблизиться твоя учениця бодай колись до висот Моєї! Я навіть згодна на парі: якщо вона стане досягне рівня Сансет Шиммер, Я визнаю тебе переможницею!»\n\nСерце Джет Сета повільно опустилося в п'яти, поки він спостерігав, як обидва алікорни заходяться сміхом."
 evildiarchy_random.8.a:0 "Бідна кобила."

 evildiarchy_newmareland.nmm_reset_1.t:0 "Найтмер Мун відмовляється від командування"
 evildiarchy_newmareland.nmm_reset_1.d:0 "Найтмер Мун залишила свій пост командувача армії, заявивши, що пост генерала це марнування її часу, і що її неперевершені навички принесуть більше користі в управлінні цілою групою армій на пості фельдмаршала."
 evildiarchy_newmareland.nmm_reset_1.a:0 "Он як."

 evildiarchy_newmareland.db_reset_1.t:0 "Дейбрейкер відмовляється від командування"
 evildiarchy_newmareland.db_reset_1.d:0 "Дейбрейкер залишила свій пост командувача армії, заявивши, що пост генерала це марнування її часу, і що її неперевершені навички принесуть більше користі в управлінні цілою групою армій на пості фельдмаршала."
 evildiarchy_newmareland.db_reset_1.a:0 "Он як."

