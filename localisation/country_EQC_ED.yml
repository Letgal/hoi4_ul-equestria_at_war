 EQC_ED_AF_everfrost:0 "Встановити Автономну зону Вічної Мерзлоти"
 EQC_ED_AF_vartai:0 "Встановити Велику Браму"
 EQC_ED_AF_sicameon:0 "Встановити Військово-морський гарнізон Південної Грифонії"
 EQC_ED_AF_evi:0 "Встановити Щедрі ниви"
 EQC_ED_AF_austurland:0 "Встановити Губернаторство Розбитого Берега"
 EQC_ED_AF_riverlands:0 "Встановити Всемогутнє царство поні"
 EQC_ED_AF_hillpony:0 "Встановити Священний домен Беорґфордас"
 EQC_ED_AF_dread:0 "Встановити Північний форпост"
 EQC_ED_AF_holy_sites:0 "Знищення єретичних джерел"
 EQC_ED_AF_holy_sites_desc:0 "По всій Грифонії розкидані місця, присвячені їхнім хибним богам. Хоча в минулі століття Ми могли бути задоволені, дозволяючи цим фальшивим ідолам існувати, тепер Ми вознеслися, і настав час навести лад. Кумири брехні не встоять, весь світ пізнає Нашу божественність. Починаючи з Грифонії."
 EQC_ED_AF_destroy_temple_arcturius:0 "Знищити Великий храм Арктурія"
 EQC_ED_AF_destroy_temple_arcturius_desc:0 "Легенди називають Арктурія богом, який дав грифонам силу. Що ж, якщо і дав, то явно не розщедрився. Щоб відплатити його помилку, Ми знесемо його величний храм і зведемо на його місці щось більш відповідне Нашій славі."
 EQC_ED_AF_destroy_temple_eyr:0 "Знищити Великий храм Ейр"
 EQC_ED_AF_destroy_temple_eyr_desc:0 "Здається, «Дарителька роду» не змогла викувати кайдани міцніші за ті, що є між Нами та Нашими підданими. Можливо, якби вона краще справлялася зі своєю роботою, грифони довше билися б в ім'я своїх сімей. На жаль для неї, вона цього не зробила, і тепер її послідовники стоять перед тими, хто зможе. Але як їхній новій сім'ї, Нам не потрібен храм, присвячений невдачі."
 EQC_ED_AF_destroy_temple_boreas:0 "Знищити Великий храм Борея"
 EQC_ED_AF_destroy_temple_boreas_desc:0 "Можливо, у давні часи мудрість Борея була більшою, ніж зараз. На жаль, ця вихвалена мудрість стала надзвичайно рідкісною останнім часом: грифони виявилися неспроможними до співпраці навіть перед обличчям екзистенціальної загрози на порозі. Але марнотратство Борея стане Нам вигодою. Останнім цвяхом у труну світла Борея, його храм буде стерто під час вражаючого фаєр-шоу."
 EQC_ED_AF_destroy_temple_eviliana:0 "Знищити Великий храм Евіліани"
 EQC_ED_AF_destroy_temple_eviliana_desc:0 "Річки Грифонії забезпечували життя багатьох цивілізацій. Цілі нації були засновані на річках, які язичники вважали благословенними Евіліаною. Річки, які, як вони думали, принесуть їм життя, привели Нас, щоб нести їм смерть... або — якщо вони побачать істину Нашої величі — все таки життя. Справжні життя."
 EQC_ED_AF_racial_research:0 "Спеціалізовані расові дослідження"
 EQC_ED_AF_racial_research_desc:0 "Оскільки Наша імперія продовжує рости, зростає і список Наших підданих. Враховуючи широку різноманітність здібностей, доступних їм, Нам варто було б переконатися, що всі вони знайдуть належне застосування."
 EQC_ED_AF_dog_research:0 "Подальше вдосконалення технологій залізнолапів"
 EQC_ED_AF_dog_research_desc:0 "Залізнолапі — це песячий підрозділ, який чудово вміє захоплювати позиції та укріплювати їх, незалежно від складності рельєфу. Вони стануть імперським кулаком, здобуваючи Нам плацдарм всюди, де буде наказано, і утримуючи лінію до прибуття вирішаючих сил."
 EQC_ED_AF_griffon_research:0 "Подальше вдосконалення лицарських технологій"
 EQC_ED_AF_griffon_research_desc:0 "Грифонські лицарі виконують роль броньованої піхоти, створюючи проміжну ланку між повноцінною бронетехнікою та звичайною піхотою. За умови ретельного розгортання ці сили можна використовувати в ближніх боях для зачистки ворожих позицій зі значно меншими витратами, ніж якби Ми покладалися на голу піхоту."
 EQC_ED_AF_research_enchanted_tools_tech:0 "Дослідити зачаровані інструменти"
 EQC_ED_AF_research_enchanted_tools_tech_desc:0 "Хоча вони не володіють магією, як Наші піддані-поні, грифони зуміли впоратися досить винахідливими способами. Головним серед них є використання зачарованих інструментів, які працюють ефективніше за прості, піддані фізиці, аналоги. Жодної причини не використати це чудо для Наших зусиль, адже хороша ідея є хорошою ідеєю незалежно від її джерела."

