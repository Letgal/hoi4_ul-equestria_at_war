 landmark_ed_af_statue_of_daybreaker:0 "Статуя Дейбрейкер"
 landmark_ed_af_statue_of_daybreaker_plural:0 "$landmark_ed_af_statue_of_daybreaker$"
 landmark_ed_af_statue_of_daybreaker_desc:0 "Ясна, мов ранкове сонце, тепла, мов літній вечір — золота статуя нашої вельмишановної богині Дейбрейкер нині прикрашає центр східної столиці імперії своєю ефірною красою. Усі, хто проходить під її поглядом, зігріті грізною для ворогів і ніжною для підданих усмішкою Дейбрейкер; її лагідний і материнський вигляд спонукає кожного до нових висот.\nАбо вона або озброєна варта біля підніжжя."

 landmark_ed_af_statue_of_nightmare_moon:0 "Статуя Найтмер Мун"
 landmark_ed_af_statue_of_nightmare_moon_plural:0 "$landmark_ed_af_statue_of_nightmare_moon$"
 landmark_ed_af_statue_of_nightmare_moon_desc:0 "Блискуча, мов бліде місячне сяйво, заспокійлива, мов тиша опівночі — золота статуя нашої вельмишановної богині Найтмер Мун нині прикрашає центр східної столиці імперії своєю ефірною красою. Усі, хто проходить під її веселою усмішкою та поглядом холодної влади, можуть продовжувати свій день з бадьорістю, знаючи, що їхня Богиня знає, як впоратися з прийдешніми випробуваннями.\nАбо вона або озброєна варта біля підніжжя."

