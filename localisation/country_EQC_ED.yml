 # Спеціальні проєкти
 sp_alicorn_slayer_gun:0 "Гармата «Вбивця алікорнів»"
 sp_alicorn_slayer_gun_desc:0 "Проєкт, названий «Вбивця алікорнів», має на меті вдосконалити авіаційну гармату, виклавши її внутрішню частину кристалами. Спеціалізовані снаряди, так само насичені магічними кристалами, можна випускати по траєкторіях, недосяжних для звичайних засобів. Фактично, під час перших випробувань досвідчені маги могли перенаправляти снаряди вже після вистрілу. Вирішальна перевага у виді неймовірної гнучкості гармати як у наступальних, так і в оборонних діях."
 alicorn_slayer_cannon:0 "Гармата «Вбивця алікорнів»"
 alicorn_slayer_cannon_desc:0 "Гармата, заряджена насиченими кристалами снарядами. Завдяки магічним властивостям снарядів до самостійного пошуку траєкторії, вона надзвичайно ефективна як у наступі, так і в обороні."
 sp_arcane_laser_cannon:0 "Арканна лазерна гармата" #Арканна також є «магічна»
 sp_arcane_laser_cannon_desc:0 "Навіть у жорстокій реальності сучасної війни старі методи не завжди марні — їх просто потрібно належним чином адаптувати. Ця «гармата» не стріляє снарядами, а радше є пристроєм для фокусування та посилення гармонійної енергії поні, які нею керують. Оскільки отриманий магічний промінь нагадує лазер, вона отримала назву «Арканна лазерна гармата»."
 light_arcane_laser_cannon:0 "Легка арканна лазерна гармата"
 light_arcane_laser_cannon_desc:0 "Ця гармата не стріляє снарядами, а натомість спрямовує гармонійну енергію поні, що нею керують, у магічний промінь, який сіє сумніви та страх серед усіх, хто прагне завоювання та панування."
