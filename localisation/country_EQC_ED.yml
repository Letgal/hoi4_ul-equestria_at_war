 evildiarchy_equestria.1.t:0 "Рейвен Інквелл кличе на допомогу"
 evildiarchy_equestria.1.d:0 "Принцеса дружби з'явилася у спалаху рожевої магії. — «Рейвен! Що сталося? Селестія казала мені, що вони з Луною відвідають Новий Мейрленд протягом тижня, і що ти керуватимеш замком до їхнього повернення. Але щойно я отримала твоє термінове повідомлення і примчала так швидко, як тільки змогла.»\n\n«Твайлайт! Дякувати Селестії, ти тут. А можливо й ні... Я вже не знаю, що й думати. Сьогодні вранці я отримала телеграму від Джет Сета — ну, знаєш, губернатора Нового Мейрленда — і... Селестія та Луна... вони більше не ті, що раніше! Він каже, що вони перетворилися... як там... на Найтмер Мун та... Дейбрейкер? — Голос Рейвен Інквелл зривався, вона помітно тремтіла. Її звичний бюрократичний стоїцизм був повністю зруйнований, поки вони викукувала далі. — Що нам тепер робити, Твайлайт?»\n\n«Найтмер Мун, кажеш?! Луна знову перетворилася? Як? І чому? Менше з тим... зараз не час обговорювати це в деталях. Я мушу зібрати Елементи Гармонії. Разом ми вже перемагали Найтмер Мун одного разу, разом ми зможемо зробити це знову!»\n\n«Стій! — крикнула Рейвен. — Це не лише Найтмер Мун! Джет Сет каже, що Селестія також змінилася. Він не надав подробиць, але, схоже, вони обидві перетворилися, Селестія знає як! — Вона осіклася, усвідомивши сказане. — Напевно, мені не варто так висловлюватися...»\n\n«О-Обидві перетворилися? Це... о матусі, я не знаю, як ми це виправимо, якщо вони обидві збожеволіли! Елементи Гармонії можуть впоратися лише з однією! Так... нам треба з'ясувати що саме сталося і що у них в голові щодо Еквестрії. Я так розумію, вони вирішили поки що залишитися в Новому Мейрленді? Але це ненадовго? Правильно? — Твайлайт почала ходити колами. відчайдушно заспокоюючи звичну їй паніку — Дейбрейкер... Дейбрейкер... де я чула це ім'я раніше? Можливо, в якійсь книзі? Чи знав би Стар Свірл Бородатий щось про неї? — Вона раптом зупинилася, наштовхнувшись на Рейвен. — Ні... Ні, про що я думала?! Дейбрейкер! Старлайт Ґліммер розповідала мені про неї! Зла версія Селестії! Я й не здогадувалася, що вона реальна. — Вона повернулася до кобили. — Рейвен, мені потрібно, щоб ти залишалася тут, поки я проінформую Елементи. Тим часом, нікому ні слова. Я повернуся якнайшвидше."
 evildiarchy_equestria.1.a:0 "Стався ще один спалах рожевої магії, Рейвен Інквелл знову залишилася на самоті."

 evildiarchy_equestria.2.t:0 "К'юті-мапа"
 evildiarchy_equestria.2.d:0 "Щойно Твайлайт Спаркл телепортувалася додому, вона відчула свербіж у боці. Вона відчувала це достатньо часто — це був заклик Дерева Гармонії. І, очевидно, вона була не єдиною, бо коли вона спустилася до К'юті-мапи з полегшенням знайшла там друзів з Магічної Шістки та Спайка. Проте було в цьому дещо дивне: зазвичай мапа просто вказувала їм, де виникла проблема і, можливо, кого слід відправити на допомогу, проте цього разу сяяла вся Еквестрія.\n\nЕпплджек вказала копитом на мапу. «Твайлайт, ти знаєш, у чому справа? Ми щойно сперечалися з Рейнбоу, це ж не може бути правдою, правда? Просто... як дерево очікує, що ми врятуємо всю Еквестрію водночас? Не те щоб ми не робили цього раніше, але на даний момент мапа — найнекорисніша річ, яку я бачила в житті.»\n\n«Я можу лише здогадуватися. Рейвен з Кантерлоту покликала по мене і сказала, що Селестія та Луна... вони обидві перетворилися! Пам’ятаєте Старлайт Ґліммер та її нічне жахіття? Де Селестія перетворилася на Дейбрейкер і билася з Найтмер Мун? Якщо Рейвен права, вся Еквестрія в небезпеці, і, можливо, саме тому світиться вся мапа.»\n\n«Ну, а як нам тоді це виправити? Може Дерево Гармонії могло б якось допомогти і хоча б сказати, з чого починати, хіба ні? Те, що світиться все підряд, не дуже допомагає.»\n\n«Ану зачекайте секунду, — втрутилася Рейнбоу Деш. — Селестія та Луна обидві перетворилися на своїх злих двійників, а ми нічого не помітили? Як це працює? Це мало б відчутися по всій країні. І хіба вони, типу, не билися весь час у сні Старлайт Ґліммер? Причому Дейбрейкер була такою пихатою і все таке?»\n\n«Я ще не знаю нічого!.. Тобто, знаю частину. Селестія та Луна відвідали Новий Мейрленд, Рейвен Інквелл отримала телеграму від їхнього губернатора. Припускаю, ми просто не відчули магії, бо це було занадто далеко. Але це не применшує небезпеки, і Дерево також каже нам, що в Еквестрії є проблема. Наразі мені потрібно, щоб ви всі поїхали зі мною до Кантерлота, бо я не можу залишити Рейвен саму, поки ми шукаємо рішення.»"
 evildiarchy_equestria.2.a:0 "Будемо сподіватися, що це все не затягнеться."

 evildiarchy_equestria.3.t:0 "Надзвичайна рада"
 evildiarchy_equestria.3.d:0 "Шестеро членів Магічної Шістки разом зі Спайком та вельми стурбованою Рейвен Інквелл сиділи в тронній залі замку Кантерлота. До цього моменту Рейнбоу Деш читала Рейвен лекцію про велич Елементів, вочевидь, марно намагаючись заспокоїти єдиноріжку, поки Реріті не зупинила її.\n\n«Тож, — почав Спайк, — гадаю, ти тепер правляча Принцеса Еквестрії, а, Твайлайт? Селестія та Луна збожеволіли, Кейденс та Фларрі — у Кристальній Імперії, тож ти залишаєшся єдиним варіантом.» Рейвен злегка кивнула і вклонилася, навіть повернувшись до свого суворо-бюрократичної настанови. Інші п'ятеро поні наслідували її приклад.\n\n«Зараз не час для гри в принцес, Спайку! — відповіла Твайлайт. — А ви п’ятеро — ви мої друзі, ви зовсім не повинні мені вклонятися! У нас на носу проблема з дружбою. Як я можу сидіти тут, на цьому троні, щоб правити Еквестрією? Нам потрібно повернутися до Дерева Гармонії, щоб з’ясувати значення К'юті-мапи, а після цього нам знадобляться всі Елементи, щоб перетворити Дейбрейкер та Найтмер Мун назад на Селестію та Луну — припускаючи, що ми знаємо як.»\n\n«Але ти єдиний алікорн, що залишився, серденько, — додала Реріті. — Хто ще міг би керувати Еквестрією? Поні просто потрібна принцеса.»\n\n«Ми маємо вирішити це разом. Як друзі! Ми шестеро... — Спайк гучно прокашлявся, — ми семеро сформуємо Надзвичайну раду для управління Еквестрією. У мене погане передчуття, але це необхідно. Рейвен, мені все ще потрібна твоя допомога більше, ніж будь-що інше, бо нам шіс... сімом ймовірно, доведеться подорожувати до далеких земель чи що від нас ще вимагатиметься. Ти згодна, Рейвен? — Єдиноріжка кивнула. — Тоді вирішено. Ми підготуємо радіозвернення до громадян Еквестрії якнайшвидше. Спайку, займешся цим? — Дракон віддав честь. — Ми з Рейвен подивимося, чи можливо отримати більше інформації від Джет Сета. Щодо вас п'ятьох — управління Еквестрією, поки ми будемо на місіях К'юті-мапи, означатиме, що нам знадобиться весь поні-ресурс, який ми тільки зможемо залучити, тож, будь ласка, подивіться, де ви можете допомогти в уряді."
 evildiarchy_equestria.3.a:0 "Будь ласка, давайте без масової паніки."

 evildiarchy_equestria.4.t:0 "Візит до Дерева Гармонії — Частина I"
 evildiarchy_equestria.4.d:0 "«Що ж, час докопатися до суті.»\n\nТвайлайт розправила крила і спустилася в печеру, де розташовувалося Дерево Гармонії. Позаду вона почула переможне «Йі-ха!» Епплджек, коли її подруга помчала вниз сходами. Невдовзі вся Магічна Шістка вже стояла біля входу до печери гармонії. Звідти лилося пульсуюче світло.\n\n«Я не пам’ятаю, щоб воно було таким яскравим, — майже прошепотіла Флаттершай. — Як... як ви думаєте, це не небезпечно, Твайлайт? Можливо, нам варто повернутися до К'юті-мапи і подивитися, чи не дізнаємося ми чогось там?..»\n\n«Та облиш, Флат, немає причин боятися Дерева. Дерево завжди допомагало нам, хіба ні? — Рейнбоу Деш зависла в повітрі, ліниво махаючи крилами. — Твайлайт, ми готові штурмувати печеру за твоєю командою!»\n\n«Ми не будемо нічого штурмувати, — відповіла Твайлайт. — Але підійти нам слід. Ми вже вдосталь надивилися на К'юті-мапу, і, окрім того, що вона освітила всю Еквестрію, вона не дала нам жодних нових знань. Ні, нам потрібно відвідати саме дерево. З належною обережністю... Рейнбоу.»\n\nДрузі пройшли вглиб печери. Дерево Гармонії яскраво сяяло, камені Елементів вібрували у своїх заглибинах. Проте це була не єдина зміна з часу їхнього останнього візиту: виросла нова гілка, утворивши щось схоже на піднос. На ньому лежала сяюча куля, наче зроблена з чистої магії. Твайлайт підійшла до неї і оглянула з усіх боків. Спалахи магії виривалися з неї, роблячи її схожою на мініатюрне сонце."
 evildiarchy_equestria.4.a:0 "Вона злегка торкнулася кулі своїм рогом."

 evildiarchy_equestria.5.t:0 "Візит до Дерева Гармонії — Частина II"
 evildiarchy_equestria.5.d:0 "Щойно ріг Твайлайт торкнувся магічної кулі, вона відчула, як її копита відриваються від землі. Вона ледь бачила, як її друзів так само підіймає вгору, коли дерево з'єдналося з ними, з Елементами Гармонії. Думки кружляли в її голові, вона не могла відрізнити власні спогади від того, що показувало дерево — образи Кантерлота, Селестії, Понівіллю, її друзів і Спайка промайнули перед очима. Вона згадала День теплого вогнища, Школу Дружби та багато-багато місій дружби, на які К'юті-мапа відправляла її та її друзів. Це було те, чим для неї була Еквестрія — душа їх країни, справжній сенс гармонії. І вона була готова захищати її, а якщо знадобиться — боронити своїм рогом і копитами.\n\nПочувся м'який звук, схожий на тихий сплеск, і Твайлайт відчула, як її омиває магія. На відміну від багатьох заклинань, це не змусило її відсахнутися — навпаки, цей потік був майже приємним, ніби світла думка. Коли магія вщухла і вона знову приземлилася на землю, вона розплющила очі якраз вчасно, щоб побачити, як стрімко розширюється масивний щит. Незабаром він накриє всю Еквестрію.\n\nЇї вирвав із думок голос Епплджек. «Е-е, Твайлайт, ти знаєш, до чого це все було? Буду з тобою так само чесною, як і з цим щитом: якщо ми хочемо перемогти Найтмер Мун чи Дейбрейкер, вони, так би мовити, нам потрібні прямо перед нами, розумієш? Ну, принаймні в моєму розумінні воно так працює.»\n\nТвайлайт похитала головою. «Ні... перемогти їх буде не так просто, і я не думаю, що цього разу ми зможемо зробити це просто Елементами Гармонії. Це... це був лише перший крок. Дерево не могло запропонувати нам рішення всіх наших проблем, але воно могло виграти нам час за допомогою цього щита. Я мала рацію, це було заклинання щита, але це не просто якийсь щит. Це Щит Гармонії, і дереву потрібні були ми, її Елементи, щоб завершити його. Я бачу це так. Я обов’язково зазирну в бібліотеку Стар Свірла пізніше, щоб подивитися, чи нема не записував він щось про це."
 evildiarchy_equestria.5.a:0 "Наша гармонія зможе захистити нас... поки що."

 evildiarchy_equestria.6.t:0 "Промова"
 evildiarchy_equestria.6.d:0 "Твайлайт виходила на балкон замку Кантерлот настільки повільно, що майже засинала. Проте, попри всі її зусилля, друзі примудрилися «випадково» залишитися позаду неї — за винятком Спайка. Він натомість крокував попереду, нагадуючи радше королівського гвардійця, ніж рівноправного члена Надзвичайної ради. Що гірше, друзі наполягли, щоб вона одягла корону та підкови, як належить принцесі. Вона лише важко зітхнула.\n\nЗ позитивного — Спайк і Рейвен підготували дуже гідну промову. «Дорогі громадяни Еквестрії! Я стою тут сьогодні не як принцеса, а як член нещодавно сформованої Надзвичайної ради. Як більшості з вас уже відомо, нас спіткала трагедія: не лише Луна знову перетворилася на Найтмер Мун, а й Селестія, що так довго правила цими землями в мирі та злагоді, змінилася разом із нею. Її розум нині носить ім'я Дейбрейкер. Поки що невідомо, що спричинило це і які їхні плани. Наразі вони захопили Новий Мейрленд, перетворивши його на оплот тиранії. Якщо їхні дії в колонії є бодай якимось показником, ми маємо з жахом чекати дня їхнього повернення. Сестри-алікорни більше не втілюють нашу омріяну гармонію.»\n\nВона замовкла на секунду, аби зміцнити свою рішучість. «Але не все втрачено! Еквестрія сильна, а гармонія трьох племен пережила тисячоліття! Сестри могли пасти, але ми — ні! З огляду на події, мене просили взяти на себе обов'язки правлячої принцеси Еквестрії. Я відмовилася. Я, Твайлайт Спаркл, є Принцесою Дружби, і саме тому я попросила своїх друзів сформувати спільний уряд. Ви знаєте їх як Елементи Гармонії: Епплджек уособлює чесність, Флаттершай — доброту, Рейнбоу Деш — вірність, Пінкі Пай — сміх, а Реріті — щедрість. І, звісно, Спайк, мій найдорожчий друг, який хоч і не є Елементом, але стільки разів допомагав мені в минулому. Разом ми билися з королевою Кризаліс, протистояли Тіреку та перемагали Найтмер Мун. Щоправда, досі нам доводилося мати справу лише з одним злим алікорном, але я не маю сумніву, що разом ми здолаємо навіть Злу Діархію, що постає на горизонті».\n\nВона глибоко вдихнула. «Дорогі громадяни Еквестрії! Разом ми подолаємо цю кризу. І під цим я маю на увазі не лише Елементи Гармонії. Я маю на увазі всіх нас, поні Еквестрії! Кожну істоту, яка творить цю націю. Разом ми знайдемо спосіб зняти прокляття, що затьмарило розум сестер!»"
 evildiarchy_equestria.6.a:0 "Гармонія переможе!"

 evildiarchy_equestria.7.t:0 "Промінь надії"
 evildiarchy_equestria.7.d:0 "Магічна Шістка та Спайк сиділи у тронній залі замку Кантерлоту. Два трони були порожніми — на цьому наполягла Твайлайт. Замість них Спайк організував круглий стіл, який просто поставили посеред зали. Усі семеро членів Надзвичайної ради виглядали виснаженими. Останні тижні були суцільним стресом: на їхні копита впала відповідальність за функціонування всієї держави, тоді як із Нового Мейрленда надходили дедалі гірші новини.\n\n«Я тобі кажу, Твайлайт, навіть у найважчий сезон збирання яблук я так не втомлювалася, як за ці дні, — промовила Епплджек. — Дивуюся, як Селестія примудрялася тягнути все це сама цілу тисячу років, коли нас тут семеро — і ми ледве даємо собі раду.»\n\n«Вона мала тисячу років, щоб навчитися, — відповіла Твайлайт. — На жаль, ми позбавлені такої розкоші. Дерево Гармонії дало нам щит. Так — до речі, це захоплива тема, я перерила вже пів бібліотеки, аби з'ясувати, як дерево утримує заклинання в такому стазисі, і чи це взагалі заклинання щита у звичному розумінні, мені точно потрібно більше книг... Про що це я? Ах так, Дерево Гармонії створило цей щит, але я підозрюю, що він не захищатиме нас вічно. Якщо Дейбрейкер подібна до Найтмер Мун — а я в цьому впевнена — їхня спільна міць буде колосальною. Вони спробують повернутися, якщо не спробували вже, і в якийсь момент зможуть пробити захист. Тоді ми маємо бути готові.\n\n«То що ми можемо вдіяти?» запитала Флаттершай.\n\n«Я... я поки не знаю... — Твайлайт нервово смикнула хвостом. — Нам потрібно збирати друзів. Можливо, варто відправити делегації до сусідніх країн, а ще краще — поїхати самим. Здається, саме Дерево хоче, аби ми вирушили на місії дружби. А готуючись до їхньої появи, ми маємо знайти спосіб зміцнити нашу оборону — і магією, і працею. Рано чи пізно нам доведеться битися з ними. — За мить вона додала пригніченим голосом. — Я тільки сподіваюся, що коли все буде позаду, ми все ще зможемо їх зцілити.»"
 evildiarchy_equestria.7.a:0 "«Нині час дорожчий за золото.»"

 evildiarchy_equestria.8.t:0 "Лист від Джет Сета"
 evildiarchy_equestria.8.d:0 "Дорога Рейвен,\n\nУ своїй телеграмі я згадував, що сестри-алікорни призначили мене своїм канцлером, але лише після кількох днів на посаді я збагнув, наскільки багато важить моє становище.\n\nПроблема в тому, що ці двоє ненавидять одна одну. Я не розумію, як вони дійшли до перемир'я, бо вони, здається, щосекунди шукають спосіб дошкулити партнерці чи вжалити болючіше за іншу. Я б сказав, що це дратує, але це було б брехнею. Я занадто нажаханий, аби відчувати роздратування. Нажаханий думкою, що ці двоє можуть зірватися, що вони можуть вчепитися одна одній у горлянки, адже відчуваючи їхню силу майже постійно я розумію: вони спопелять усе, що нам дороге. Не зі зла, не навмисно, а просто як побічний ефект своєї сварки.\n\nІ тому я пишу цей лист, аби благати тебе про допомогу. Мені потрібно знати, як поводитися з ними так, як вони того очікують — у слабкій надії, що це допоможе втримувати їхню лють у вузді. Я розумію, що вони не ті принцеси, яких ти знала, але, можливо, твої знання їхніх звичок допоможуть мені.\n\nСпочатку я планував просити лише про це. Однак, пишучи листа, я дійшов іншого висновку: я мушу зробити щось, бодай що-небудь, аби зупинити їх. Ми на пороховій бочці з підпаленим ґнотом, бо рано чи пізно вони зіткнуться, і все, що я можу — це відтягувати неминуче.\n\nАле можливо, лише можливо, я здатний на більше. Я перебуваю в унікальному становищі, і хоча я боюсь за своє життя та за свою країну, я, можливо, зможу щось змінити. Я можу надавати інформацію — будь-яку інформацію — про цих двох. Я не знаю, як ідуть справи на вашому боці, але благаю тебе: передавай усе, що я надішлю, Твайлайт Спаркл. Я не знаю жодної іншої поні, яка б могла знати, як покласти край цьому цілковитому божевіллю.\n\nБудь ласка, Рейвен, ти — наша єдина надія."
 evildiarchy_equestria.8.a:0 "Щиро твій, Джет Сет." #Щось я пропустив до чого тут «щиро твій», коли в нього дружина

 evildiarchy_equestria.9.t:0 "Ще один лист від Джет Сета"
 evildiarchy_equestria.9.d:0 "Бібліотека замку Кантерлоту вражала своєю величчю. Стелажі височіли на метри, заповнені книгами, манускриптами та прадавніми документами. Твайлайт витрачала кожну вільну хвилину на дослідження щита, намагаючись зрозуміти природу творіння Дерева Гармонії. На жаль, про саме Дерево було написано вкрай мало, а про його можливості — ще менше.\n\nУвійшов Спайк із черговою чашкою кави. «Твайлайт? На хвилинку. Маю новини від Рейвен, Джет Сет надіслав ще одного листа. Каже, ВОНИ намагалися пробити щит, але не змогли. Ти з'ясувала щось нове? Магія Дерева має бути неймовірно сильною, якщо вона витримує спільний натиск двох алікорнів. — Він на мить замовк. — У будь-якому разі, головне, що я хотів сказати: за словами Джет Сета, тепер вони шукають артефакти.»\n\n«Ар.. Артефакти?»\n\n«Саме так висловилася Рейвен. Логіка в тому, що не зумівши пробити щит силою, вони вирішили пограбувати Грифонію в пошуках магічних реліквій, аби посилити свою міць.»\n\n«Це... небеса, це зовсім не добре. Шукаючи інформацію про Дерево Гармонії, я багато прочитала про історію Еквестрії та Еквуса загалом. Про Грифонію відомостей менше, але... там розкидано безліч магічних артефактів. Взяти хоча б Короля Шторма — ким би він був без свого посоха? Уяви якщо вони знайдуть щось подібне? НІ, ми маємо щось вдіяти! Разом. Якщо вони намагаються розбити наш щит, ми мусимо зміцнити його власними артефактами. Бібліотека повна легенд про могутню магію.»\n\n«То ти збираєшся тут оселитися на наступні кілька тижнів, чи як?»\n\n«Ні, Спайку. Я не змогла б прочитати всі ці книги, навіть якби мала в запасі все життя Селестії. Нам потрібна група досвідчених магів для цієї справи. — Вона зітхнула. — Гадаю, це ще одна річ, яку треба організувати."
 evildiarchy_equestria.9.a:0 "Можливо, Дерінґ Ду нам допоможе?"

 evildiarchy_equestria.10.t:0 "Розмова з А. К. Єрлінґ"
 evildiarchy_equestria.10.d:0 "«Твайлайт Спаркл? Гадаю, Ви хотіли зі мною поговорити?» А. К. Їрлінґ обережно увійшла до колишньої тронної зали замку Кантерлот. Тепер, однак, стоси паперів та книг заповнювали кожен куток колись величного інтер’єру. Посеред цього всього за тимчасовим столом сиділа виснажений рожевий алікорн.\n\nПринцеса Дружби підвела погляд. «О? Так. Е-е... Вітаю, Дерінґ... тобто, пані Їрлінґ. Я... кхм... вибачте за цей безлад. Як бачите, зараз відбувається занадто багато всього водночас. — Помахом рогу вона пересунула кілька стосів паперу, звільняючи стілець для гості. — Ситуація така: я впевнена, ви знаєте про події в Грифонії, про перетворення Селестії та Луни на Дейбрейкер та Найтмер Мун. Ви також, напевно, помітили масивний щит, що зараз захищає Еквестрію. Проте вони дуже хочуть повернутися, і цілком очевидно, що щит не зможе боронити нас вічно...  — Твайлайт зробила глибокий подих, сповільнюючи свою мову. — Якщо цей момент настане, ми зіткнемося з найбільш концентрованою магією, яку світ бачив досі. Я отримала звістку від надійного джерела, що вони збирають магічні артефакти, аби посилити себе та здолати щит. З огляду на це, ми мусимо діяти.»\n\nА. К. Їрлінґ зітхнула. «Припускаю, Ви викликали мене не як лагідну авторку пригодницьких романів? — Вона насторожила вуха. — Ця кімната надійна? — Отримавши ствердний кивок Твайлайт, вона продовжила. — Ну що ж, годі Їрлінґ, час для Дерінґ Ду. Ви розкусили мій маленький секрет ще роки тому. І так, у моїй власній бібліотеці є багато зачіпок щодо невідкритих реліквій. Проте я впевнена, що Ви вже почали вивчати бібліотеку Кантерлота, яка, мушу визнати, набагато більша за мою.»\n\n«Ай, зачіпок нам не бракує. Еквестрія знала багато талановитих магів за свою тисячолітню історію, і чимало з них присвятили життя створенню могутніх артефактів. Не кажучи вже про інші раси, з якими ми ділимо цей континент... Але менше з тим. Нам потрібен ваш досвід, аби перетворити прості натяки на успіх.»\n\nДерінґ Ду усміхнулася. «Я зроблю все, що в моїх силах.»"
 evildiarchy_equestria.10.a:0 "З цього вийде чимало нових книг... якщо ми виживемо."

 evildiarchy_equestria.11.t:0 "Відповідь принцеси Скайстар"
 evildiarchy_equestria.11.d:0 "Дорога Твайлайт,\n\nЯ була така щаслива, коли отримала твого листа. Зараз так важко отримати чіткі відповіді, і навіть те, про що знає або підозрює королева Ново, але не спішить мені розповідати. Тож було приємно нарешті дізнатися правду про те, що відбувається з Дейбрейкер та Найтмер Мун, і як ви з цим справляєтесь. Я негайно пішла до своєї матері щоб попросити її дозволу приєднатися до вашої боротьби, але, на жаль, вона відмовила. «У нас свої клопоти в Північній Зебриці», — ось її відповідь. Ти можеш собі уявити? На волі буквально два розлючених алікорна, а вона переймається через Кольтфаген!. Але що поробиш? Схоже, найближчим часом я залишатимусь тут.\n\nАле ти писала про щит і про те, як ви збираєте артефакти, щоб протримати його довше. Це змусило мене замислитися над тим, що ми, гіпогрифи, могли б запропонувати, і я нарешті вмовила матір відправити вам осколок перлини трансформації. Це безумовно могутній магічний об'єкт. Під час перетворення з гіпогрифа на морського поні виникає дивне відчуття, щось схоже на свербіж — але ти вже це знаєш, ти ж це відчувала.\n\nЩо ще написати? Я б сказала, що підтримую вашу боротьбу, але зараз ці слова звучать пусто, коли мати заборонила мені навіть провідати вас. Однак я всією душею вірю, що ви з усім розберетеся. Ви перемогли стільки лиха, не здавайтеся. І я згодна з тобою: нам потрібно спробувати повернути колишніх Селестію та Луну. Мати сумнівається, але останнім часом вона сумнівається в усьому. Ну, що поробиш? Боріться, і воно буде того варте.\n\nЗ найкращими побажаннями,\nПринцеса Скайстар"
 evildiarchy_equestria.11.a:0 "Гіпогрифи все ще наші друзі."

 evildiarchy_equestria.12.t:0 "Надзвичайний кристаллінґ"
 evildiarchy_equestria.12.d:0 "Твайлайт сподівалася, що цей кристаллінґ пройде краще за попередній, хоча навряд чи щось могло бути гіршим за розбите Кристальне Серце. Вона спіймала себе на тому, що зиркає на племінницю, яка стояла поруч, але, на щастя, Фларрі Гарт цього не помітила. Юний алікорн добряче підріс, і — попри все, що відбувалося навколо — вони провели весь ранок, граючи разом. «Найкраща тітка у світі», — згадала Твайлайт своє старе гасло. Зараз воно здавалося порожнім. Забагато подій. Вона подумки вирішила запросити Фларрі до Кантерлота. Хто знає? Лоша вже не раз демонструвало неабиякий інтелект.\n\nЗвук копит вирвав її з думок. Кристальні поні зібралися навколо Серця, готові до церемонії. Цього разу вона проводилася не для того, щоб привітати новонароджену, а щоб зміцнити Серце та з’єднати його із Щитом Гармонії. Вони обидві посідали в дивовижно схожі позиції й в той момент вона вперше задумалася. Чи вдасться церемонія?\n\nПоруч із нею, Принцеса Кейденс виголосила коротку промову: «Мої дорогі кристальні поні, сьогодні ми зібралися на церемонію кристаллінґу. Однак цього разу ми не вітаємо новонароджене лоша в нашому колі, а звертаємося до самого Кристального Серця, щоб воно захистило нас від негараздів, що нині панують у світі. Як ви знаєте, ті, хто колись були Селестією та Луною, улюбленими принцесами Еквестрії, перетворился в Дейбрейкер та Найтмер Мун — тиранами, які хочуть, щоб увесь світ схилився перед їхніми копитами. Але Принцеса Дружби, — вона поклала копито на спину Твайлайт, — та Елементи Гармонії розгорнули над Еквестрією, а скоро і над Кристальною Імперією, щит, який не дає тиранам ступити на нашу землю. Тепер, кристальні поні, наша черга зробити свій внесок. Звернімося до Кристального Серця, і нехай його магія переплететься зі Щитом Гармонії, зміцнивши його настільки необхідною зараз силою, як і наш непохитний зв'язок з Еквестрією».\n\nКристальні поні вклонилися, Серце піднялося в повітря, обертаючись і сяючи. Твайлайт відчула, як хвиля тепла розливається по її тілу, а високо в небі вона зловила тоненький, та такий сильний, струмінь магії Серця, яка перепліталася зі Щитом, що охоплював весь горизонт."
 evildiarchy_equestria.12.a:0 "Жоден ворог не забере в нас любов і надію."

 evildiarchy_equestria.13.t:0 "Шквал ідей"
 evildiarchy_equestria.13.d:0 "«Це просто супер!»\n\nФларрі Гарт збуджено літала бібліотекою Кантерлотського замку, кидаючись від одного артефакту до іншого. Твайлайт наказала зберігати їх тут за браком кращого місця. Деякі стояли на п'єдесталах, інші — більш небезпечні — накриті скляною формою. Твайлайт Спаркл уважно стежила за нею, побоюючись, що юний алікорн може випадково щось активувати.\n\nРаптом Фларрі Гарт зупинилася і повернулася до тітки: «Скажи, ти ж знаєш про них усе, правда? Як вони працюють? Чи можна з їхньою допомогою влаштувати великий БА-БАХ?» Вона дико замахала крилами, змусивши Твайлайт відступити на крок.\n\n«Ні... я маю на увазі, вони не для цього», — відповіла вона. «Навпаки, ми використовуємо їх для Щита Гармонії. Ти ж бачила його, правда? Він захищає всю Еквестрію, і Кристальну Імперію також».\n\n«Так, авжеж». Фларрі Гарт махнула копитом. «Але в книгах про Дерінг Ду артефакти завжди мали суперкруті здібності. Це ж стосується і цих штук тут, так?»\n\n«Гадаю... так?» Твайлайт почухала підборіддя. «Але це потребує часу, грошей, зусиль і...»\n\n«А, ми щось придумаємо. Я допоможу тобі, тітонько Твайлайт!»\n\nТвайлайт відповіла не одразу. Звісно, маленька Фларрі навряд чи могла чимось зарадити, але її ідея була вартою уваги. Артефакти, які вони зібрали, могли мати набагато більше застосувань, ніж просто зміцнення щита. Їй потрібно буде зв’язатися з іншими експертами — можливо, професори зі Школи для обдарованих єдинорогів зможуть допомогти? А ще була науково-дослідна магічна лабораторія в Кантерлоті, яку Селестія побудувала спеціально для неї. Вона почала подумки складати листи до поні, які могли б допомогти, але її думки перервав черговий політ Фларрі, якій явно набридла неуважна тітка."
 evildiarchy_equestria.13.a:0 "«Стій, Фларрі, повернись!»"`

 evildiarchy_equestria.14.t:0 "К’юті-мапа знову кличе"
 evildiarchy_equestria.14.d:0 "Рейнбоу Деш нахилилася над К’юті-мапою. «Так, це весь Еквус. Схоже, весь континент кишить проблемами дружби».\n\nТвайлайт, зсутулившись у кріслі, махнула копитом. «У нас у всіх проблеми з дружбою. Я б навіть сказала, що наша проблема набагато більша за їхні. Але ми всі в одному човні. Не схоже, що Найтмер Мун чи Дейбрейкер зупиняться на кордоні Еквестрії, коли прийде час. І я вважаю, що мапа говорить нам саме про це». Вона зітхнула. «Були часи, коли нам доводилося вирішувати лише одну проблему за раз».\n\n«Справді здається, ніби все навалилося одночасно», — зауважила Епплджек. «Але я не думаю, що нам потрібно вирушати на всі ці місії разом». Вона підійшла ближче. «Принаймні я можу піти поговорити з бізонами. Я все одно планувала провідати там родину».\n\n«А я піду до яків!» — Пінкі Пай застрибала по кімнаті. «Зрештою, я їхній посол дружби. Я вже ду-у-уже давно не бачила принца Резерфорда».\n\n«Я... я хочу піти до полярних ведмедів», — тихо промовила Флаттершай. «Я давно хотіла їх відвідати. У них стільки лісів, де ще не ступало копито жодного поні! Тільки уявіть...»\n\n«Що? Ні, я хочу до полярних ведмедів», — перебила її Рейнбоу Деш. «Вони великі, сильні та круті, просто неймовірні! Нам знадобиться справжній бойовий поні, щоб вразити їх, і цим поні буду я!»\n\nТвайлайт зморщила мордочку. «Мабуть, буде краще, якщо ми розділимося на пари, як робили раніше. Не думайте, що ці місії будуть легкими. У нас є лише один шанс, і нам доведеться вирішувати їхні місцеві конфлікти, якщо ми хочемо, щоб це спрацювало. У мене десь ще залишилися підготовки до уроків дружби Старлайт, якщо комусь знадобиться. Але якщо ми вже ділимо обов'язки, то я збираюся побачитися з братом. І племінницею. І Кейденс. Спайк піде зі мною»."
 evildiarchy_equestria.14.a:0 "Сподіваюся, нам вдасться залучити кожного."
 evildiarchy_equestria.14.a_tt:0 "§RНам потрібно об'єднати весь Еквус у дружбі, перш ніж прийде Зла Діархія.§!"

 evildiarchy_equestria.15.t:0 "На фабриці погоди"
 evildiarchy_equestria.15.d:0 "Фабрика погоди Клаудсдейла переживала напружений робочий день. Безліч пегасів метушилися коридорами, чекаючи на призначення наступного завдання або здаючи документацію про виконану роботу. За останні кілька років індустріалізація поступово торкнулася і фабрики погоди: посланців, що прилітали з сусідніх міст і сіл, замінили добрі десять телефонів, які невпинно дзвонили, поки поні замовляли зміну погоди. Понад сотня досвідчених поні-метеорологів були зайняті розрахунком оптимального розподілу опадів або напрямків вітру.\n\nПроте сьогодні було особливо гаряче. Посадовці з Кантерлота скликали зустріч із найдосвідченішими метеорологами Клаудсдейла, щоб обговорити «потенційне розширення застосування магії погоди». На їхній подив, анонсованим гостем виявилася не хто інша, як сама Рейнбоу Деш — Елемент Лояльності, Вандерболт і член надзвичайної ради. За нею йшов Спайк, несучи те, що можна було описати ніщо як комічно великий сувій.\n\nНевдовзі зустріч розпочалася, і Рейнбоу Деш представила свої плани. «Ви, мабуть, здогадуєтеся, чому я тут: попереду битва зі злими сестрами, і в цій битві нам потрібно, щоб кожен поні виконав свою роль. Це, звісно, стосується і всіх здатних до магії погоди, а який найкращий спосіб це зробити, як не почати тут, біля самого джерела?» Вона вказала на дракона поруч, який почав розгортати свій сувій. З легкою усмішкою вона додала: «Моя подруга Твайлайт Спаркл люб'язно склала невеликий список усіх можливих маніпуляцій з погодою, які могли б нам допомогти»."
 evildiarchy_equestria.15.a:0 "Пегаси готові підтримати підготовку до війни."
 evildiarchy_equestria.15.a_tt:0 "Механіка §YМаніпуляції погодою§! тепер §Gдоступна§!.\n\n"

 evildiarchy_equestria.16.t:0 "Щодо економіки"
 evildiarchy_equestria.16.d:0 "Це було чергове засідання Надзвичайної ради. Цього разу на порядку денному стояло питання економічної політики. [evildiarchy_equestria_16_d_war_or_nowar] Еквестрії знадобиться належна військова промисловість, щоб протистояти Злій Діархії, виробляючи різноманітне спорядження для армії.\n\n«Якщо ми хочемо, щоб це спрацювало, ми маємо діяти масштабно», — сказав Спайк. «Такі міста, як Мейнгеттен, Філлідельфія чи Лас-Пегас уже мають промисловість, але нам потрібно поширити цю модель на всю Еквестрію. Звісно, це не станеться само собою. Нам доведеться переконувати або навіть примушувати промисловців. Або, що ще краще, керувати будівництвом нових заводів безпосередньо з Кантерлота. Єдина проблема полягає в тому, що в Еквестрії досить... суворі екологічні норми для більшості внутрішніх територій. Селестія ніколи не була по-справжньому задоволена сучасною індустрією, і я не можу її в цьому звинувачувати. Тобто, ми, дракони, любимо дим і сірку, але будь-який вулкан пахне краще, ніж ці заводи».\n\n«Хіба немає іншого шляху?» — відповіла Флаттершай. «Я розумію, про що каже Спайк, але боюся, що це просто перетворить усю Еквестрію на Бедлендс. Невже ми справді не навчилися кращому? Я вважаю, що ми повинні використовувати те, що дає нам природа, і працювати з нею, а не проти неї. Звісно, нам все одно знадобляться деякі заводи... але нашим солдатам знадобилося б набагато менше, якби вони могли використовувати те, що їх оточує»."
 evildiarchy_equestria.16.a:0 "Нам слід обрати класичний індустріальний підхід."
 evildiarchy_equestria.16.b:0 "План Флаттершай звучить краще."
 evildiarchy_equestria.16.d_war:0 "Початок війни зробив це питання більш нагальним, ніж будь-коли раніше."
 evildiarchy_equestria.16.d_nowar:0 "Хоча нещодавно вони нарешті видали указ про сприяння економічній мобілізації, було цілком зрозуміло, що цього недостатньо."

 evildiarchy_equestria.17.t:0 "Наш найцінніший актив"
 evildiarchy_equestria.17.d:0 "«Ти досі листуєшся з Джет Сетом?» — здивовано запитала Твайлайт.\n\n«Так», — відповіла Рейвен Інквелл. «Хоча здебільшого це він продовжує писати мені, а я відповідаю за потреби. У нього багато запитань. Розважати сестер після того, як вони піддалися пороку, стало зовсім нелегко, тож у нього голова йде обертом. Я даю йому деякі поради тут і там, як залагодити гострі кути — але я б не хотіла зараз опинитися на його місці. Він розповів мені, що Дейбрейкер та Найтмер Мун постійно сваряться».\n\n«Але як ви взагалі можете обмінюватися листами? Хіба ці дві не контролюють кожен його крок?»\n\n«О, далеко не кожен. Вони лише... частково цікавляться тонкощами правління — погана звичка, яку вони, боюся, перенесли з минулого. Але правда, він не зміг би надіслати листа звичайною поштою. На щастя, йому це й не потрібно. Розумієш, хоча Селестія завжди мала свої способи листування зі своїми учнями — ти знаєш про це з власного досвіду — ми в жорнах адміністрації також розробили свої системи. Певні закляття можуть надсилати листи на великі відстані, подібно до того, яке Селестія використовувала з тобою та Спайком». Вона посміхнулася. «Джет Сет — вправний маг. Сумніваюся, що ці дві коли-небудь дізнаються про його листи, вони занадто зайняті іншими речами». Її обличчя знову стало серйозним. Бюрократичним. «Але досить про це. У своїх останніх листах він перейшов до теми як їх зупинити, і мені потрібно обговорити це з тобою».\n\n«Він... що? Він хоче зупинити їх обох?»\n\n«Звісно! Він сидить біля самого джерела безумства і знає його занадто добре! Він підтримує роботу їхньої адміністрації, бо поки вони зайняті вихвалянням, вони не вступають у бійки одна з одною, які могли б швидко призвести до кінця світу». Поні здригнулася. «Він чітко дав це зрозуміти. Вони не знають стриманості колишніх Селестії та Луни, або, — її погляд впився в Твайлайт, — будь-якого відповідального алікорна. Потрібно будь-якою ціною уникнути того, щоб вони накинулися одна на одну. Проте він готовий таємно підтримувати нас. Я... я розповіла йому про твій план, і він довіряє тобі».\n\nТвайлайт болісно усміхнулася. «На даний момент це скоріше лише начерки плану. Але... подякуй йому за зусилля і перекажи, що я розгляну цю можливість»."
 evildiarchy_equestria.17.a:0 "Не хочу й уявляти через що проходить Джет Сет, аби пропонувати таке."
 evildiarchy_equestria.17.a_tt:0 "Тепер ми можемо §Gсаботувати§! Злу Діархію.\n\n§RПопередження: якщо Джет Сета викриють, платитиме весь світ.§!"

 evildiarchy_equestria.18.t:0 "На волосині від біди"
 evildiarchy_equestria.18.d:0 "«Джет Сет написав мені», — сказала Рейвен Інквелл. «Він каже, що йому потрібно на деякий час призупинити операції, оскільки Дейбрейкер та Найтмер Мун дедалі більше дратуються через «перешкоди». Він не думає, що вони підозрюють його, але, за його словами, він волів би не доводити їхній гнів до кипіння».\n\nТвайлайт Спаркл зітхнула. «Гадаю, це мудре рішення. Ми надто поспішали, намагаючись вплинути на ситуацію. Найважливіше завдання — зробити так, щоб Джет Сет залишався на своїй посаді. Його робота з підтримання спокою між ними двома має першочергове значення. Справді страшно подумати, що станеться, якщо ці дві почнуть відкриту війну між собою».\n\n«Схоже, він дійшов тих самих висновків. Однак неминуче те, що тепер дві сестри набагато пильніше стежитимуть за тим, що відбувається. Було б розумно діяти трохи обережніше коли ми відновимо наші зусилля»."
 evildiarchy_equestria.18.a:0 "Ми ходимо по тонкому льоду."

 evildiarchy_equestria.19.t:0 "Джет Сета викрито"
 evildiarchy_equestria.19.d:0 "«Ні, ні, ні, ні, ні, ні, ні!» — важко дихала Твайлайт. «Це... ні... чому все мало закінчитися саме так!?»\n\nОстанній тиждень був суцільним потоком поганих новин. Спочатку Джет Сет написав — знову — що операції потрібно призупинити, оскільки Дейбрейкер та Найтмер Мун щось запідозрили. Через два дні надійшло відчайдушне повідомлення про те, що ці дві фактично почали розслідування щодо нього. Це було останнє, що вона чула від Джет Сета, і навіть залучення решти контактів у Новому Мейрленді не дало жодної додаткової інформації.\n\nВідтак, його вважали загиблим. Злі діархи не були відомі тим, що довго тримають біля себе ренегатів. Це було опосередковано підтверджено ще через два дні, коли розвідувальні патрулі помітили незвичний магічний вибух, який потерпів [EQC.capital.GetName]. Без стримуючого впливу Джет Сета ці дві не змогли довго залишатися союзницями, тож цілком імовірно, що між ними спалахнула бійка.\n\nАле, як і підозрювала Твайлайт, на цьому все не зупинилося. Настало кілька годин затишшя — можливо, поки обидві збирали своїх послідовників — але тепер сутички спалахнули знову. І якщо обидві готові використати весь свій магічний потенціал, це віщує світу велику біду."
 evildiarchy_equestria.19.a:0 "Під Щитом ми в безпеці. В безпеці й по коліна в крові."

 evildiarchy_equestria.20.t:0 "Старий ворог"
 evildiarchy_equestria.20.d:0 "«Не бажаєте пояснити, що Ви тут робите, Кабальєроне?» — єхидно запитала Дерінґ Ду.\n\n«Для Вас я все ще доктор Кабальєрон», — просичав він у відповідь, закриваючи очі копитами від світла ліхтаря, що світив йому в обличчя.\n\n«Ну що ж, докторе Кабальєроне, мушу повідомити Вам, що Вас спіймали на спробі викрадення артефакту. Через поточну ситуацію, — вона вказала копитом на Щит Гармонії вгорі, — подібні артефакти вважаються військовим майном, а місії з їхнього пошуку та розкопок прирівнюються до військових маневрів. Іншими словами, Вас звинувачують у саботажі, втручанні в роботу військового спорядження та зриві військових операцій. Вас чекає військовий трибунал, тож, — вона широко всміхнулася, — готуйтеся до покарання, докторе».\n\nКабальєрон нервово ковтнув слину. «Але... я лише намагався... ближче роздивитися артефакт. У мене не було жодного наміру його красти». Він стривожено засіпав хвостом. «Будь ласка, не роздувайте з цього проблему більшу, ніж вона є. І зрештою, я не думаю, що Ви — військовий командир, чи не так?»\n\n«Ну, вона має рацію». Рейнбоу Деш з'явилася прямо над головою Кабальєрон, змусивши його відскочити. «Надзвичайна рада, яку я маю честь тут представляти, оголосила пошук цих артефактів справою державної ваги та військовою операцією. Твайлайт і Рейвен перерили всі закони Еквестрії та видали купу відповідних декретів. У мене в Кантерлоті є всі папери. Справа з Вами багато часу не займе. Хоча, — вона впилася поглядом у «доктора», — для вас є вихід. Як член Надзвичайної ради, я маю повноваження зняти звинувачення. Коштуватиме це лише одного підпису. У Вас багато зв'язків, навіть за межами Еквестрії. Якщо Ви погодитеся змінити сторону та використати ці зв'язки на нашу користь, я закрию всі провадження проти Вас».\n\n«У мене... не багато вибору, а?» — зітхнув Кабальєрон.\n\n«Не зовсім. Твоїм наглядачем буде Дерінґ Ду». Рейнбоу Деш вишкірилася."
 evildiarchy_equestria.20.a:0 "Побачимо, наскільки він корисний."

 evildiarchy_equestria.21.t:0 "Прямо з-під їхніх носів"
 evildiarchy_equestria.21.d:0 "Це був один із тих моментів, коли Твайлайт зачинилася в бібліотеці, лише Спайку дозволялося час від часу заходити, щоб принести їй кави. Стіси книг височіли по обидва боки від неї, слугуючи мовчазним свідченням її неймовірної швидкості читання та наполегливості.\n\n«Що цього разу?» — запитав Спайк. «Ти знову намагаєшся дослідити магію щита? Або... вивчаєш магію алікорнів?» Він зазирнув у назви книжок навколо неї. «О, схоже, ти знову намагаєшся відшукати магічні артефакти в Еквестрії. Я думав, тепер, коли нам допомагає Дерінґ Ду, ти дозволиш їй самій із цим розібратися».\n\n«Я читаю не про Еквестрію, Спайку, принаймні не цього разу. Насправді я намагаюся знайти інформацію про грифонські артефакти. Як ти пам'ятаєш, все це полювання за артефактами розпочали саме Дейбрейкер та Найтмер Мун після того, як не змогли пробити наш щит. Ми робимо все можливе, щоб протистояти їм за допомогою артефактів саме еквестрійських, але нещодавно у Дерінґ виникла ідея: можливо, нам варто спробувати бути на крок попереду і красти артефакти у них з під носу».\n\n«Ти хочеш пробратися в Сансет і влаштувати пограбування?»\n\n«Ні, Спайку, не дурій. Це було б самогубством, до того ж ми могли б підставити тих небагатьох інформаторів, які у нас там залишилися. Нам потрібно дістатися до артефактів раніше, ніж вони зможуть накласти на них свої копита — а це означає з'ясувати, які саме артефакти там є, як їх знайти, а потім підготувати експедиції для розкопок. І все це — поки злі діархи не встигли туди прибути. Як ти думаєш, чому я читаю тут немов божевільна?»\n\n«Та я тебе як не знаходив ти завжди читала», — небрежно кинув Спайк, чухаючи підборіддя. «Але щодо твого плану... звучить ризиковано».\n\n«Так і є. Ми не можемо очікувати, що кожна з цих місій буде успішною, але в разі потреби у нас буде план відступу»."
 evildiarchy_equestria.21.a:0 "Чия відвага, того й перевага."
 evildiarchy_equestria.21.a_tt:0 "§YВорожі розкопки§! розблоковані, що дозволяє вам проводити розкопки артефактів у Грифонії раніше, ніж до них дістанеться Зла Діархія. Успіх цих операцій §Rне гарантований§!, проте певні дії можуть §Gпідвищити його ймовірність§!."

 evildiarchy_equestria.22.t:0 "Дослідження артефакту завершено"
 evildiarchy_equestria.22.d:0 "Нещодавно розпочате дослідження артефакту підійшло до кінця. Залучені науковці ретельно перевірили магічні властивості об'єкта, а також обставини його створення та історію використання. Було здобуто чимало теоретичних знань про природу магії, що стане в пригоді майбутнім поколінням, проте безпосереднє застосування цих знань залишається досить обмеженим. Якщо бути точним, у звіті зазначено, що було виявлено..."
 evildiarchy_equestria.22.a:0 "... абсолютно жодного практичного застосування."
 evildiarchy_equestria.22.b:0 "... певні відкриття в магії поні."
 evildiarchy_equestria.22.c:0 "... певні способи застосування в промислових процесах."
 evildiarchy_equestria.22.e:0 "... певні знахідки в галузі магіко-електроніки."
 evildiarchy_equestria.22.f:0 "... певні методи вдосконалення використання магії."
 evildiarchy_equestria.22.g:0 "... певні висновки щодо військової стратегії."

 evildiarchy_equestria.23.t:0 "Розкопки пройшли успішно"
 evildiarchy_equestria.23.d:0 "Після тривалої та ризикованої місії наша команда розкопок тріумфально повернулася додому. Подолавши безліч труднощів, вони зуміли дістатися до місця призначення та захопити артефакт раніше, ніж злі Діархи змогли накласти на нього свої копита. Тепер цей артефакт служитиме гармонії замість тиранії. Ми пообіцяли місцевим жителям повернути його, як тільки криза мине."
 evildiarchy_equestria.23.a:0 "Ура!"

 evildiarchy_equestria.24.t:0 "Розкопки пройшли невдало"
 evildiarchy_equestria.24.d:0 "Попри всі зусилля, команді, яку ми відправили до Грифонії для захоплення стародавнього артефакту, не вдалося виконати завдання. Експедиція зіткнулася з численними перешкодами, такими як неточні та застарілі місцеві карти, неповна інформація про сам артефакт та вороже налаштовані місцеві жителі. Проте, повернувшись додому, вони вже почали розробляти плани для наступної спроби."
 evildiarchy_equestria.24.a:0 "Наступного разу нам пощастить більше."

 evildiarchy_equestria.25.t:0 "Грифонська коаліція"
 evildiarchy_equestria.25.d:0 "Твайлайт Спаркл зморщила мордочку. «Ситуація вельми скрутна. Грифони й поні континенту об'єдналися проти Діархів — що саме по собі дивовижно, враховуючи їхню історію, — але я боюся, що цього буде замало». Глухим голосом вона додала: «Магія алікорнів може бути річчю дуже руйнівною, якщо її вивільнити на повну».\n\n«Отже, ти кажеш, що тобі потрібен алікорн, щоб битися з алікорном?» — запитала Епплджек.\n\nТвайлайт порожнім поглядом вставилася на неї. «Це ж було б так просто, м? Просто прийти до Грифонії та кинути їм двом виклик прямо в обличчя? Можливо, дорогою підхопити Кейденс, щоб зрівняти шанси. Легко. Простіше простого». Вона похитала головою. «Це так не працює. Магія... використання магії виснажує тебе, і я не лише про фізичне виснаження. Вона висмоктує тебе ментально. О, звісно, не звичайна повсякденна магія, але магічний двобій — це зовсім інша справа. Щоб промовити закляття, ти повинна справді цього бажати — у магічній дуелі все так само. Я... я не хотіла б їх убивати, але битися з ними напряму означає завдавати їм болю».\n\n«Я ніколи не пропонувала тобі битися з ними напряму!» — запротестувала Епплджек.\n\nТвайлайт, здавалося, не чула її. Тепер вона перейшла на ледь чутний шепіт. «Ні. Я не можу битися з ними, принаймні не прямо. Тільки за допомогою Елементів. Книги про магію алікорнів були гранично чіткими. Була причина, чому Селестія не дала відсіч Найтмер Мун тоді, коли та вперше з’явилася. Ризик був би занадто великим».\n\n«Про який ризик ти говориш?»\n\n«Я б стала третьою», — відповіла Твайлайт зі здриганням.\n\n«Твайлайт, прийди до тями!» — крикнув Спайк. «Визнаю, я не одразу зрозумів, чому ти наполягала на Надзвичайній раді, але зараз я все розумію. І ми тут, з тобою. Ти не будеш битися з ними наодинці. Власне, і вони не битимуться самі. Вони командують величезними арміями, і ми робитимемо те саме».\n\n«Твоя правда». Вона зітхнула, її голос нормалізувався. «Вибачте. Мої дослідження алікорнів — розбещених алікорнів — та способів боротьби з ними неминуче привели мене до вивчення історії Найтмер Мун. Є ще багато того, чого я не знаю — я досі не маю уявлення, як ці дві продовжують співпрацювати, — але теорія боротьби з ними стала для мене зрозумілішою. Просто... грифонам доля підсунула жах»."
 evildiarchy_equestria.25.a:0 "Час прийде. Скоро."

 evildiarchy_equestria.26.t:0 "Хаос на Східному узбережжі"
 evildiarchy_equestria.26.d:0 "«Вони роблять ЩО?!» — ахнула Твайлайт Спаркл.\n\n«Опіум», — відповіла Рейвен Інквелл. «У містах на Східному узбережжі спалахнула епідемія опіуму. Ринок заполонила мережа сумнівних поні-ділків. Не думаю, що важко здогадатися, звідки вони беруться».\n\n«Так... мабуть. Але як вони проникають крізь щит?»\n\n«Проникають? Вони завжди були всередині. На жаль, не всі дивилися на Найтмер Мун зі страхом; дехто дивився з захопленням. А Дейбрейкер... гадаю, знайдеться достатньо поні, які не були задоволені правлінням Селестії й набагато більше полюбляють її новий... світогляд? Звісно, ці тенденції не нові, і ми робили багато, щоб їх стримати, але цього виявилося замало».\n\nРейвен виклала стос паперів на стіл Твайлайт. «Тут немало. Але стає ще гірше. Вони проводять дуже успішну кампанію залякування. Поні масово тікають зі східних міст, що спричиняє загальний хаос у регіоні. Навіть у нашій армії оселився страх перед їхньою темною магією. Наші солдати вкрай неохоче йтимуть на передову. О, і серед цього загального безладу ми також помітили посилення контрабанди зброї».\n\n«Іншими словами, вони організовують ополчення, щоб повстати та захопити порти, я правильно розумію?»\n\n«Схоже, їх задум не далекий від цього». Поні зітхнула. «Щоб закінчити на позитивній ноті: шкода не здається надто глибокою. Кампанія залякування ефективна зараз, але я думаю, що цей ефект швидко мине, як тільки почнеться війна. З опіумом розібратися може бути трохи довше, але весь особовий склад поліцейського управління Кантерлоту працює понаднормово, щоб розгромити мережі постачальників. Але так, початковий етап війни буде дещо складнішим, ніж ми очікували»."
 evildiarchy_equestria.26.a:0 "Просто треба йти далі."
 evildiarchy_equestria.26.a_tt:0 "§RЗ початком війни Зла Діархія захопить порти на Східному узбережжі. Наша армія також зіткнеться з певними труднощами.§!"

 evildiarchy_equestria.27.t:0 "Підготовка армії"
 evildiarchy_equestria.27.d:0 "«Наступний пункт у нашому списку — реорганізація армії», — оголосив Спайк. «Згідно зі звітами Королівської гвардії, яка наразі є основною військовою силою Еквестрії, нам бракує... власне, ого-го чого. Погляньмо...» Загинаючи кігті, він почав перераховувати: «Гвинтівок, танків, літаків, особового складу і, особливо, командирів».\n\n«Простими словами, армія у нас паперова?» — запитала Реріті.\n\n«Не зовсім», — відповів Спайк. «Насправді ще до... нещодавніх подій... Селестія зробила конкретні кроки для розбудови Королівської гвардії. І відтоді Твайлайт та Рейвен уже вклали додаткові інвестиції. На даний момент армія Еквестрії фактично перебуває на шляху до того, щоб стати сучасною бойовою силою. Нам просто потрібно зосередитися на цьому. Але наше вище командування все ще дуже нечисленне».\n\n«Гаразд, гаразд, записуйте мене», — втрутилася Епплджек.\n\n«Що?»\n\n«Ти щойно сказав, що нам потрібно більше поні у вищому командуванні. Я так розумію, ти маєш на увазі генералів, фельдмаршалів та всі ці пишні звання. Що ж, тоді записуйте мене. Навіть Бабуся Сміт пропонувала свої поради, тож дозвольте мені бути генералом. Взагалі-то, поки ви цим займаєтесь, запишіть і Біґ Мака також. Мені не хочеться йти до військового коледжу самій».\n\n«О, в такому разі я теж записуюся!» — вигукнула Пінкі Пай. «Армія просто зголодніла за поні, які знають, як когось підбадьорити. Уявляєте? Усі ці поні в уніформі стоять, віддають честь, а потім я така — ТУУУУТАЇЇЇЇ!» Вона витягла свій святковий ріжок, демонструючи його в дії.\n\n«Гадаю, цього достатньо», — зітхнула Твайлайт. «Що ж, нехай буде так. Рейвен якраз дала мені список поні, яких варто розглянути, тож ви будете не самі»."
 evildiarchy_equestria.27.a:0 "Будемо сподіватися, вони знають, що роблять."

 evildiarchy_equestria.100.t:0 "Гроза, що насувається"
 evildiarchy_equestria.100.d:0 "Усе почалося повільно, майже непомітно. Поні роками жили під Щитом Гармонії, що мерехтів у небі, так довго, що майже перестали звертати на нього увагу. Минули дні паніки, минули навіть дні непохитної рішучості, поступившись місцем тихому поверненню до безтурботності. І все ж, щоразу, коли хтось піднімав очі в ці дні, він бачив усе менше райдужної магії, усе менше мерехтіння. Щит слабшав, і поні Еквестрії ось-ось мали бути жорстоко повернуті до реальності.\n\nУ тронній залі Кантерлотського замку зібралася Надзвичайна рада — іншими словами, Елементи Гармонії та Спайк. Вони теж помітили, що відбувається, але для них це було значно меншою несподіванкою. Вони знали, що цей день настане, і невтомно працювали, щоб підготуватися.\n\n«Як думаєш... скільки нам залишилося?» — запитав Спайк.\n\nТвайлайт смикнула хвостом. «Це важко передбачити. У всіх книгах, які я переглянула в бібліотеці, жодна не згадувала про такий щит, як наш. Я радилася з магами з центру магічних досліджень, які вимірювали стан щита протягом останніх кількох днів. Якщо припустити модель лінійного розпаду, то це буде близько шести тижнів. Якщо щит руйнуватиметься експоненціально, то менше — можливо, навіть усього два тижні. Але я не думаю, що на даному етапі це має значення. Ми підготувалися так добре, як тільки могли».\n\n«Я... я б хотіла, щоб нам не довелося з ними битися», — прошепотіла Флаттершай.\n\n«Я теж, подруго, я теж», — погодилася Епплджек.\n\nУ залі запанувала тиша. Твайлайт підняла магією планшет і почала складати список останніх військових приготувань, а Спайк з тривогою зазирав їй через плече. Усі вони знали, що цей день настане, але від цього легше не ставало»."
 evildiarchy_equestria.100.a:0 "Прелюдія стрімко добігає кінця."
 evildiarchy_equestria.100.a_tt:0 "§RШторм насувається.§!"

 evildiarchy_equestria.101.t:0 "Щит руйнується"
 evildiarchy_equestria.101.d:0 "Як і очікувалося, протягом останніх кількох тижнів Щит Гармонії поступово згасав. Кантерлотська обсерваторія детально задокументувала цей процес, щодня надаючи оновлені дані Надзвичайній раді. Хоча деякі маги пропонували можливі шляхи продовження терміну дії щита, за наказом Твайлайт Спаркл жодних заходів не було вжито.\n\n«Немає сенсу далі відтягувати неминуче», — прокоментувала вона. «Ми не будемо готовими більше, ніж зараз. Минулі роки дали нам час, якого ми так відчайдушно потребували, але якщо чекати довше, ми знову впадемо в безтурботність. Не кажучи вже про те, що вони накопичують сили так само, як і ми, якщо не швидше. Ні, зараз настав час зустріти їх обличчям до обличчя, на краще чи на гірше».\n\nНе всі члени Надзвичайної ради погодилися з нею, але ніхто не заперечив. І ось, нарешті, Еквестрія приготувалася до війни, а разом із нею — її друзі та союзники на континенті. Були віддані накази про мобілізацію, і невдовзі тисячі й тисячі поні прибули до призначених постів. Над країною зависла дивна атмосфера. Мало хто з поні насправді знав, що таке війна, але повсюди відчувався певний неспокій. Проте ті, хто вижив у Новому Мейрленді, та поодинокі біженці-грифони розповіли достатньо історій про нескінченну тиранію Сонця та Місяця, щоб ніхто не ставив під сумнів необхідність оборони.\n\n«Це наче бачити ураган, що насувається на тебе, а ти примерз до землі», — промовив Спайк до Реріті в хвилину тиші. «Ти знаєш, що він принесе невимовну смерть і руйнування, але зараз це все ще здається абсолютно нереальним. Від нього не втечеш, тож просто готуєшся як можеш, але все одно знаєш, що ти не готовий».\n\nРеріті кивнула. «Я пам'ятаю коли ми зібрали Елементи Гармонії, щоб повернути Найтмер Мун подобу Луни... ніби це було вчора. Хто ж знав, що ми знову зіткнемося з нею так скоро? Тільки цього разу навіть Елементів замало. Я не знаю, чим це закінчиться, але сподіваюся, що Твайлайт має рацію»."
 evildiarchy_equestria.101.a:0 "Поні, напоготові!"

 evildiarchy_equestria.102.t:0 "Остання проблема дружби"
 evildiarchy_equestria.102.d:0 "«Вони йдуть. Уздовж узбережжя помічено розвідувальні підрозділи так званого «Кондомініуму»».\n\nТвайлайт ледь відреагувала на повідомлення, лише злегка кивнувши гвардійцю. Бій міг спалахнути прямо зараз, але почався він роки тому. І ці роки не були змарновані. Незліченну кількість годин Твайлайт провела в Кантерлотській бібліотеці, вивчаючи один том за іншим з єдиним питанням у голові: як зупинити спотворених алікорнів, і, що важливіше, як повернути їх до норми.\n\nБільшість книг розповідали про магію та її застосування, але мало хто з них торкався саме магії алікорнів, і ще менше — питання їхнього спотворення. Звісно, матеріалів, які могли б послужити основою для такої дискусії, було вкрай мало. До катастрофи зі Злою Діархією Найтмер Мун була єдиним відомим випадком спотвореного алікорна. І згадана Найтмер Мун була вигнана на місяць на тисячу років, що, природно, робило будь-яке її вивчення вельми складним. Потім, коли Найтмер Мун повернулася, їй швидко повернули подобу Луни — процес, у якому Твайлайт брала безпосередню участь. Тож усе, що вона могла почерпнути з книг, було просто тим, що вона вже знала: щоб зцілити спотвореного алікорна, потрібні Елементи Гармонії.\n\nЄдина проблема полягала в тому, що Твайлайт доводилося мати справу з двома спотвореними алікорнами, які, всупереч будь-якій логіці, ще й об'єдналися. Поки вони залишалися сильними та здатними діяти, Елементи нічого не могли вдіяти. Тому за довгі роки досліджень вона розробила план. Будь-який єдиноріг може використати лише певну кількість магії, перш ніж настане магічне виснаження, і алікорни, попри їхню величезну силу та енергію, не були винятком із цього правила. Вона вивчала Дейбрейкер та Найтмер Мун достатньо довго, щоб знати, що ці дві будуть битися на передовій. Використовуючи силу магічних артефактів, які вона та її друзі зібрали, їй потрібно буде постійно кидати виклик магії злих алікорнів і, таким чином, виснажувати її. Сподіваємося, в якийсь момент навіть алікорни піддадуться магічному виснаженню... І якщо пощастить, тоді прийде час для Елементів Гармонії."
 evildiarchy_equestria.102.a:0 "Доля Еквестрії та всього світу стоїть на кону."
 evildiarchy_equestria.102.a_tt:0 "§YНам потрібно стримувати натиск, доки злі діархи не виснажаться.§!"

 evildiarchy_equestria.200.t:0 "Тріумф Гармонії"
 evildiarchy_equestria.200.d:0 "«Ви... нас... не... переможете!»\n\nГолос Дейбрейкер зірвався, і замість того, щоб розпалити полум'я на її гриві, вона ледь спромоглася змусити іскри танцювати. Поруч із нею Найтмер Мун спробувала видати свій холодний нічний сміх, який, проте, на середині перейшов у кашель. Магічне виснаження нарешті взяло своє. По всьому фронту атаки ослабли, оскільки злі діархи поступово втрачали контроль.\n\nТвайлайт та її друзі наближалися до обох, на їхніх обличчях застигла похмура рішучість. Коли вони підійшли ближче, Дейбрейкер різко повернула голову, випустивши в них закляття, ослаблену магію якого Твайлайт легко заблокувала. Самопроголошена богиня не могла нічого вдіяти, лише шоковано вставилася на Елементи Гармонії.\n\n«Це все твоя провина», — просичала вона своїй сестрі. «Без тебе та твоїх слабких, нікчемних послідовників я б уже давно підкорила Еквестрію».\n\n«Та справді.» — огризнулася Найтмер Мун. «Я б радше сказала, що це твоя владна та пихата вдача привела нас сюди. Присягаюся Тартаром, єдиною моєю помилкою було обрати тебе союзницею!»\n\n«Ах ти ж, маленька... Зараз я покажу тобі твою помилку!» Голос Дейбрейкер тепер був сповнений лютої ненависті, коли вона рушила в атаку на Найтмер Мун.\n\nРожеве закляття вдарило між ними, розводячи їх у різні боки. «Ви обидві вже зробили більш ніж достатньо помилок», — промовила Твайлайт. «Але ваша тиранія припиняється зараз. Елементи, за моєю командою!»\n\nМогутня магія охопила обох алікорнів, закрутившись навколо них і піднявши їх у повітря. Шістка друзів літала навколо них, їхні амулети яскраво сяяли, вивільняючи енергію. Невдовзі закляття завершилося з величезним вибухом, і всі восьмеро — три алікорни, два пегаси, два земних поні та один єдиноріг — безцеремонно впали на землю."
 evildiarchy_equestria.200.a:0 "Дружба — це досі Магія."

 evildiarchy_equestria.201.t:0 "Постлюдія"
 evildiarchy_equestria.201.d:0 "Шістка друзів прокинулася першою. Епплджек потерла скроню, а Рейнбоу Деш розправила крила. Твайлайт, однак, дивилася лише на двох сестер, невдовзі інші простежили за її поглядом. Два алікорни лежали посеред них, нерухомі, наче мертві. Але тепер такі знайомі їм. Ніхто не промовив ні слова, поки всі тривожно чекали. Запала повна тиша.\n\nПісля того, що здалося найдовшими секундами в житті Твайлайт, Селестія нарешті почала рухатися. Вона ошелешено озирнулася довкола. Побачивши Луну, вона пробурмотіла: «Мені... наснився... дивний... сон... сестро».\n\nЛуна розплющила очі: «І мені, сестро».\n\n«Я... була розлючена», — продовжила перша, — «але не пам'ятаю чому. Моя грива була... у вогні... якось так... я була горда, вихвалялася... я-я-я...» — її голос затих.\n\nТвайлайт підійшла ближче. Хрипким голосом вона сказала: «Це... це не був сон. Усе це було... надто реальним».\n\n«Не сон?» — голос Селестії згасав. «Але... полум'я, терор, смерті... я б ніколи... Ні, це не могло бути по-справжньому!» Пошепки вона почала благати: «Будь ласка, нехай це неправда...»\n\nКоли заговорила Луна, в її голосі вчувався абсолютний жах: «Сестро, це було насправді. Це... я пам'ятаю це відчуття з першого разу...» Вона повернулася до Твайлайт: «Ти використала Елементи Гармонії, правильно?»\n\nТвайлайт мовчки кивнула, обіймаючи обох. Сльози покотилися по обличчю Селестії, і незабаром усі троє плакали разом, сплетені в міцних обіймах.\n\n«Ви... принаймні... повернулися», — нарешті видавила Твайлайт. «Це єдине, що має значення. Я... занадто часто втрачала надію»."
 evildiarchy_equestria.21.a:0 "Вперше за довгі роки Твайлайт відчула справжнє щастя."

 evildiarchy_equestria.202.t:0 "Кінець історії та останній поні"
 evildiarchy_equestria.202.d:0 "Останній тиждень був для Твайлайт надзвичайно напруженим, навіть попри досвід останніх років. Здавалося, кожен поні хотів поговорити з нею, і навіть більше — багато грифонів та інших істот також прагнули її поради. Спайк сумлінно допомагав їй, виконуючи обов'язки секретаря, радника та просто дракона — причому остання роль була найважливішою, бо інакше вона б взагалі ні з чим не впоралася.\n\nПроте цього разу, коли у двері постукали, Спайк негайно впустив відвідувачів. Це були інші Елементи, а за ними — Селестія та Луна. «Схоже, у Надзвичайної ради буде останнє засідання», — зауважив він.\n\nПершою заговорила Селестія: «Твайлайт, нам потрібно обговорити майбутнє Еквестрії. Після всього, що сталося, ми з Луною більше не можемо бути принцесами Еквестрії, та й, чесно кажучи, не палаємо бажанням». Вона злегка похитала головою. «До сьогоднішнього дня я не до кінця розуміла долю своєї сестри. Це жахливо — жити з думками та спогадами про те, що я накоїла. Але Еквестрії все ще потрібна принцеса. Кейденс править Кристальною Імперією, а Фларрі все ще лоша — і навіть якби це було не так, вона б пішла стопами матері, Кристальною принцесою. Залишаєшся тільки ти, і я не могла б бажати кращого поні на цей престол. Ти провела Еквестрію крізь її найпохмурішу кризу і завершила її тріумфом, завдяки дружбі, гармонії та магії».\n\nТвайлайт підвелася з-за столу і почала повільно обходити групу поні. «Ні. Ні, я не думаю, що хочу бути принцесою Еквестрії. Не зрозумійте мене неправильно — я алікорн, і я принцеса. Але не принцеса Еквестрії. Я відмовилася від цього титулу, коли Рейвен Інквелл запропонувала його багато років тому, і відмовляюся зараз. Надзвичайної ради більше не існує, оскільки надзвичайна ситуація, для якої вона була створена, вичерпана, це правда. Але ми шестеро — ні, ми семеро, разом із тобою, Спайку — ми завжди вирішували наші проблеми разом. Давайте натомість створимо Раду Дружби. За останні роки ми побачили, що проблеми державного управління не так вже й сильно відрізняються від проблем дружби в минулому».\n\nНа мить запала тиша, поки інші обмірковували сказане Твайлайт, але зрештою вони схвально закивали.\n\nТільки Епплджек підняла брову: «Твай, це все чудово і красиво на даний момент, але ти — алікорн. Ти будеш з країною біс зна скільки часу, а от ми, інші, не проживемо тисячу років, розумієш? Навіть якщо ти не станеш принцесою Еквестрії сьогодні, рано чи пізно ти нею все одно будеш»."
 evildiarchy_equestria.202.a:0 "Давайте не будемо думати про це зараз..."

 evildiarchy_friendship_missions.1.t:0 "Місія дружби: Кристальна Імперія"
 evildiarchy_friendship_missions.1.d:0 "«Твайлайт!» — Шайнінґ Армор обійняв сестру, а за ним Кейденс із Фларрі. «Як приємно, що ти завітала. І ти звісно теж, Спайку, хоробрий і славетний». Він засміявся, потиснувши лапу дракону. «Сподіваюся, поїздка з Кантерлота була вдалою. Зараз мало про що можна так сказати. Хоча я бачив твій щит, Твай. Можеш пояснити, як ти це зробила? Якщо розповіді правдиві, і він витримав натиск двох алікорнів, то це прям вражаюче. Хотів би я сказати таке про свій власний, але не думаю, що зміг би таке провернути».\n\n«Це не мій щит, Шайнінґу, хоча те, що ти навчив мене закляттю щита, допомогло. Його створило Дерево Гармонії, і я досі не знайшла пояснення, що саме сталося в той момент. Ми, Елементи Гармонії, лише... ну... допомогли йому розширитися? Я не можу сказати напевно. Сказати точно можу тільки одне — він пов'язаний з гармонією Еквестрії та її поні. І, власне, це те, що привело мене сюди. Якщо Дейбрейкер та Найтмер Мун нападуть знову, щит повинен накрити весь Еквус».\n\n«Ти маєш на увазі, що кристальні поні повинні прийняти гармонію?» — запитала Кейденс.\n\n«Я не думаю, що це те, чого хоче щит. Справа скоріше в тому, щоб приєднатися до боротьби проти злих алікорнів?.. З того, що я розумію зараз, щит можна розглядати як відторгнення їхнього спотворення власною магією Еквестрії. Мова про те, щоб ми виступили проти їхніх методів. Саме Дерево Гармонії є лише вираженням Еквестрії».\n\n«Душею нації?»\n\n«Щось... на кшталт того», — Твайлайт повільно похитала головою. «Але годі про це. Давайте зберемо кристальних поні. Спайк підготував мені промову. Він став у цьому справжнім майстром», — сказала вона з легкою посмішкою, зиркнувши вбік.\n\nАле Спайка вже не було поруч. Натомість він опинився в центрі уваги кристальних поні, які радісно вітали його слова. Твайлайт не чула, що саме говорив Спайк, але відчула, як посилився щит над Кристальною Імперією.\n\nУсміхнувшись Кейденс, вона зауважила: «Або, можливо, все навіть простіше»."
 evildiarchy_friendship_missions.1.a:0 "Наша дружба ніколи не похитнеться."

 evildiarchy_friendship_missions.2.t:0 "Місія дружби: Кристальна Імперія" #Сомбра
 evildiarchy_friendship_missions.2.d:0 "Король Сомбра.\n\nОбставини його повернення були оповиті таємницею, але він знову підкорив Кристальну Імперію та поні, що в ній мешкали. Гірше того, він полонив принцесу Кейденс, Шайнінґ Армора та маленьку Фларрі Гарт. Від самої лише думки про це у Твайлайт усе всередині переверталося. Їй варто було прийти сюди набагато раніше. Вона сильніше замахала крилами, щоб набрати швидкість, змусивши Спайка на своїй спині пригнути голову, аби його не здуло зустрічним вітром. Вона всміхнулася. Відважний дракон знову увійде в історію як рятівник Імперії.\n\nУ звичайні часи спроба кинути виклик Сомбрі поодинці — або лише зі Спайком — означала б вірну смерть. Але ці часи були якими завгодно, тільки не звичайними, тож ось вона тут. Вона відчувала, як її к’юті-марка ледь помітно пульсує. Дерево Гармонії дарувало їй магічну силу, що далеко виходила за межі її звичайних можливостей, і вона була впевнена, що цього достатньо, аби кинути виклик Сомбрі. Вона прокручувала в голові необхідні закляття. Рідко в житті вона робила щось настільки зухвале, і ще рідше почувалася при цьому так впевнено.\n\nТвайлайт наблизилася до Кристального Міста з блискавичною швидкістю. Від її різкого піке Спайк вчепився в неї, впиваючись кігтями в хутро, але вона ігнорувала біль. Підлітаючи, вона випустила могутній магічний промінь у бік Кристального замку, пробивши дірку прямо в його стінах. На цьому етапі план був дуже простим: вона відволікатиме Сомбру, поки Спайк визволятиме Кристальне Серце, виганяючи загарбника Імперії.\n\n«Твайлайт Спаркл!» — Сомбра намагався зберегти свій пихатий тон, але не зміг повністю приховати здивування. Вона не спромоглася відповісти, натомість вдарила по ньому другим магічним променем, змусивши його в останню мить виставити щит. Він негайно відповів, і деякий час вони дуелювали в цілковитій тиші та зосередженості. Вона відчувала, як сила Дерева Гармонії тече крізь кожну клітинку її тіла. Ніколи раніше закляття не злітали з її рогу так легко, і рідко коли вони були настільки руйнівними.\n\nАле в одну мить вона відчула, як магія Сомбри вичерпується. Спайк виконав свою місію, і з протяжним «Ні-і-і-і-і-і—!» її ворог зник на її очах, будучи вигнаним знову. Невдовзі вона змогла обійняти брата, невістку та племінницю. Кристальна Імперія знову вільна, готова зосередитися на справжньому ворогу."
 evildiarchy_friendship_missions.2.a:0 "Полотном дорога, «Ваша Величносте»!"

 evildiarchy_friendship_missions.3.t:0 "Місія дружби: Кристальна Імперія" #Колумністи
 evildiarchy_friendship_missions.3.d:0 "Твайлайт і Спайк їхали потягом на північ до Кристальної Імперії — вірніше, до колишньої Кристальної імперії. Не так давно кристальні поні вирішили, що більше не хочуть монархів, і проголосили «Республіку кристальних поні» під проводом кобилки на ім'я Арктик Лілі. В Еквестрії про неї знали небагато, тож обом залишалося лише сподіватися, що вона виявиться розсудливою поні.\n\nНа залізничному вокзалі їх зустріла делегація поні з новим прапором. «Спайк, хоробрий і славетний, і Твайлайт Спаркл, я правильно розумію?» — запитала лідерка. «Мене звуть Арктик Лілі. Я очолюю новий уряд після того, як кристальні поні вирішили, що нам більше не потрібна принцеса для правління. Цю позицію я відстоювала довгий час. Але, будь ласка, йдіть зі мною. Гадаю, ви також хочете побачити принцесу Кейденс та її родину».\n\nТвайлайт і Спайк йшли до Кристального палацу в супроводі делегації. Опинившись там, вони сіли за стіл з Арктик Лілі. На подив Твайлайт, Лілі зверталася саме до Спайка, а не до неї.\n\n«Спайку, скажи мені, чи правда те, що говорять? Я знаю, що Селестія та Луна перетворилися на могутніх злих магів, подібних до лихого короля Сомбри, від якого ми страждали. Але тут, на півночі, інформації обмаль. Я чула, що ти та твої друзі готуєтеся протистояти їм? Ми... ми розійшлися з нашою алікорншою не в найкращих стосунках, це правда, але... Кейденс не була злою. Вона просто... помилялася в певних речах. Я... можливо, настав час переглянути нашу позицію».\n\n«Ще б пак! Твайлайт, її друзі та я робимо все можливе, щоб зупинити Дейбрейкер та Найтмер Мун. І ви теж можете, будь я не Спайк! Але скажи мені, навіщо вам взагалі знадобилося скидати Кейденс? Невже ви не могли знайти спосіб працювати разом?»\n\nАрктик Лілі потерла мордочку. «Я... я нічого їй не зробила! Але вона просто не хотіла прислухатися до потреб нас, робітників. Якби тільки... Ех, клянуся Серцем, якби ж ми тільки могли все це передбачити. Пообіцяй мені поговорити з нею про робітників, добре? Я поговорю зі своїми товаришами. Якщо ці злі алікорни такі ж погані, як Сомбра, нам потрібно діяти спільно. Зрештою, саме ти колись визволив нас, Спайку». Вона невпевнено всміхнулася йому. А похитавши головою, додала: «Хто б міг подумати, що все закінчиться саме так?»"
 evildiarchy_friendship_missions.3.a:0 "Кристальні поні як ніхто впізнають справжнє зло, коли бачать його."

 evildiarchy_friendship_missions.4.t:0 "Місія дружби: бізони" #Стронґгарт
 evildiarchy_friendship_missions.4.d:0 "Минуло чимало часу відтоді, як Епплджек востаннє відвідувала своїх родичів на південному заході. Вона чітко пам'ятала, як вона та її друзі приїжджали до рідні й опинилися в центрі назріваючого конфлікту між бізонами та місцевими поні. Тепер вона приїхала знову, і цього разу безпосередньо до перших. Поки потяг пихкав крізь краєвиди, вона обмірковувала завдання, що стояло перед нею. Вона зголосилася піти на цю місію дружби наодинці — дещо незвично, але вона відчувала, що це правильний вибір. Чим займалися бізони з моменту їхньої останньої зустрічі? І чи побачать вони необхідність об'єднатися проти Дейбрейкер та Найтмер Мун?\n\nКоли вона вийшла з вокзалу, її привітала стара знайома — Літтл Стронґгарт. Вона знала молоду бізониху ще з першого візиту, адже саме та допомогла досягти фінального компромісу. Добрий знак, що бізони прислали саме її як посланницю.\n\n«Літтл Стронґгарт! Скільки літ, скільки зим, еге ж? Як там ваше переселення? Дуже сподіваюся, що у вас із цього вийшли добрі пироги. Але годі про це. Певно, ви помітили, що в Грифонії коїться щось недобре, і мені треба поговорити про це з вождем Тандергувзом. Можеш провести мене до нього?»\n\n«Переселення йде добре, хоча багато старійшин досі бурчать, що ми віддали наші священні землі. Але... вождь Тандергувз більше не наш лідер. Через роки після вашого візиту вожді обрали мене своєю новою лідеркою. І так, я чула, що принцес більше немає. Тож скажи мені, що це означає?»\n\n«Ти — лідерка бізонів? І-і-іха, це ж фантастичні новини! Що ж, якщо чесно, справи кепські: Селестія та Луна перетворилися на свої зіпсовані версії й тепер називають себе Дейбрейкер та Найтмер Мун. І вони націлилися на Еквестрію. Ми створили щит, який поки що їх стримує, але нам усім треба триматися разом, розумієш? Ось чому я тут».\n\nНевдовзі Літтл Стронґгарт та Епплджек зібрали вождів бізонів. Зрештою, всі вони, за винятком таємничої постаті на ім'я «Найстарший», проголосували за те, щоб прийняти дружбу поні та битися зі злими діархами за морем."
 evildiarchy_friendship_missions.4.a:0 "На південному заході знову мир."

 evildiarchy_friendship_missions.5.t:0 "Місія дружби: бізони" #Тандергувз
 evildiarchy_friendship_missions.5.d:0 "Минуло чимало часу відтоді, як Епплджек востаннє відвідувала своїх родичів на південному заході. Вона чітко пам'ятала, як вона та її друзі приїжджали до рідні й опинилися в центрі назріваючого конфлікту між бізонами та місцевими поні. Тепер вона приїхала знову, і цього разу безпосередньо до перших. Поки потяг пихкав крізь краєвиди, вона обмірковувала завдання, що стояло перед нею. Вона зголосилася піти на цю місію дружби наодинці — дещо незвично, але вона відчувала, що це правильний вибір. Чим займалися бізони з моменту їхньої останньої зустрічі? І чи побачать вони необхідність об'єднатися проти Дейбрейкер та Найтмер Мун?\n\nЗалізнична станція була порожньою, коли вона приїхала. Не найкращий початок. Вона поскакала галопом у бік табору бізонів — дороговказ люб'язно вказував шлях, — гадаючи, як її зустрінуть. Чекати довелося недовго.\n\nОхоронець-бізон перегородив їй шлях. «Чого тобі тут треба, поні? Це землі бізонів».\n\n«Ну, я якраз до бізонів і прийшла, еге ж?» — відрізала Епплджек. «Я прийшла як представниця Еквестрії. Не знаю, чи ви помітили, але у світі дещо коїться. Тож я тут, аби поговорити з вашим босом. Може, проведеш мене до нього?»\n\nНе промовивши більше ні слова, охоронець розвернувся, подавши Епплджек знак іти за ним. Невдовзі її привітав вождь усіх бізонів — Тандергувза. Вона знала Тандергувза ще з їхньої попередньої зустрічі. Він був нелегким партнером для перемовин. Після традиційної церемонії відкриття він погодився вислухати її пояснення ситуації. Вона розповіла йому все, що знала про Дейбрейкер та Найтмер Мун, про їхні вчинки й цілі, а також про те, що робить Еквестрія, аби їм протистояти.\n\nКоли вона закінчила, Тандергувз повільно похитав головою. «Я пам'ятаю, що ти — Елемент Чесності, Епплджек, і ти справді була чесною зі мною. Ти просиш мене приєднатися до вас у боротьбі зі злом, але я не той, хто підходить для цієї справи. Натомість я передам владу Літтл Стронґгарт. У неї якраз розум підходить для подібних завдань. Можливо, мені варто було зробити це вже давно». Він продовжував хитати головою. «Ну ви... еквестрійці... Чим це все закінчиться?»"
 evildiarchy_friendship_missions.5.a:0 "На південному заході знову мир."

 evildiarchy_friendship_missions.6.t:0 "Місія дружби: бізони" #Старий хуй
 evildiarchy_friendship_missions.6.d:0 "Минуло чимало часу відтоді, як Епплджек востаннє відвідувала своїх родичів на південному заході. Вона чітко пам'ятала, як вона та її друзі приїжджали до рідні й опинилися в центрі назріваючого конфлікту між бізонами та місцевими поні. Тепер вона приїхала знову, і цього разу безпосередньо до перших. Поки потяг пихкав крізь краєвиди, вона обмірковувала завдання, що стояло перед нею. Вона зголосилася піти на цю місію дружби наодинці — дещо незвично, але вона відчувала, що це правильний вибір. Чим займалися бізони з моменту їхньої останньої зустрічі? І чи побачать вони необхідність об'єднатися проти Дейбрейкер та Найтмер Мун?\n\nЗалізнична станція була порожньою, коли вона приїхала. Не найкращий початок. Вона поскакала галопом у бік табору бізонів — дороговказ люб'язно вказував шлях, — гадаючи, як її зустрінуть. Чекати довелося недовго.\n\nОхоронець-бізон перегородив їй шлях. «Чого тобі тут треба, поні? Це землі бізонів».\n\n«Ну, я якраз до бізонів і прийшла, еге ж?» — відрізала Епплджек. «Я прийшла як представниця Еквестрії. Не знаю, чи ви помітили, але у світі дещо коїться. Тож я тут, аби поговорити з вашим босом. Може, проведеш мене до нього?»\n\nНе промовивши більше ні слова, охоронець розвернувся, подавши Епплджек знак іти за ним. Невдовзі її привітав вождь усіх бізонів — таємнича постать, відома лише як «Старійшина». Він не виглядав приязним, і вона не пам'ятала його з їхньої попередньої зустрічі. Проте після традиційної церемонії відкриття він погодився вислухати її пояснення ситуації. Вона розповіла йому все, що знала про Дейбрейкер та Найтмер Мун, про їхні вчинки й цілі, а також про те, що робить Еквестрія, аби їм протистояти.\n\nКоли вона закінчила, Старійшина повільно похитав головою. «Ти мене не пам'ятаєш, але я пам'ятаю тебе. Ти — Елемент Чесності, Епплджек, і ти справді була чесною із нами. Ти просиш мене приєднатися до вас у боротьбі зі злом, але я не можу зробити так, як ти просиш. Натомість я передам владу Літтл Стронґгарт. У неї якраз розум підходить для подібних завдань. А я... я почекаю того, що буде далі». Він продовжував хитати головою. «Ну ви... еквестрійці... Чим це все закінчиться?»"
 evildiarchy_friendship_missions.6.a:0 "На південному заході знову мир."

 evildiarchy_friendship_missions.7.t:0 "Місія дружби: Чейнджлінґія" #Торакс
 evildiarchy_friendship_missions.7.d:0 "«Спайку! Вітаю!» — Торакс усміхнувся на все обличчя. «Я такий радий, що Надзвичайна рада відправила саме тебе як посла. Зрештою... ти був першим, хто повірив у мене. А тепер ти — почесний державний гість Чейнджлінґії».\n\n«Чесно кажучи, я сам просив про цю місію. Я завжди хотів подивитися, що ви зробили після того, як скинули Кризаліс. Пам'ятаєш нашу першу зустріч у печері в Кристальній Імперії? І я й інші так боялися. І все ж ми стали друзями! Ти не повіриш, який я був щасливий, коли почув новину, що ви скинули Кризаліс».\n\nЧейнджлінґ у генеральській формі тихо кашлянув. «Королю Тораксе? Я розумію ваше бажання обмінятися історіями, але, можливо, нам варто перейти до протоколу? Якщо це дипломатичний візит...»\n\n«Ой, та годі тобі, брате», — відповів Торакс. «Спайку, це Фаринкс, мій брат, радник і один із наших найкращих генералів. Одна з причин, чому ми перемогли Кризаліс, хоча він спочатку навіть не хотів повставати. Але так же краще, чи не так?»\n\nФаринкс зітхнув. «Обмін любов'ю має свої переваги, мушу це визнати. І все ж іноді... іноді я сумую за старими часами». Він на мить скривився. «Це життя... воно робить нас слабкими. Я можу бути генералом, але сумніваюся, що колись знову побачу справжню карту бойових дій».\n\n«Ну, я можу з цим допомогти», — втрутився Спайк. «Зрештою, ти правий, я тут не лише заради розповідей. Ви, напевно, вже чули новини: Селестія та Луна... змінилися. Тепер вони називають себе Дейбрейкер та Найтмер Мун і зараз спустошують Грифонію. За словами Твайлайт, немає жодних сумнівів, що зрештою вони звернуть увагу на нас, тож нам краще працювати разом, щоб перемогти їх. Саме тому я тут — прошу вас приєднатися до нашої боротьби проти Злої Діархії».\n\n«І як Король Чейнджлінґів я щиро погоджуюся. Чейнджлінґи знову вирушать до Кантерлота, але цього разу не як завойовники, а як його захисники»."
 evildiarchy_friendship_missions.7.a:0 "Тост за дружбу поні та чейнджлінґів!"

 evildiarchy_friendship_missions.8.t:0 "Місія дружби: Чейнджлінґія"
 evildiarchy_friendship_missions.8.d:0 "Торакс облизав ікла, дивлячись на Шістку героїнь поруч із ним. «Тож, який саме у вас план?»\n\n«О, це суперпросто!» — відповіла Пінкі Пай, стрибаючи колами навколо групи. «Просто йдемо до Кризаліс, використовуємо Елементи Гармонії, перетворюємо її на камінь і влаштовуємо велику, круту вечірку. Робили так уже тисячу разів. Ващє нічого серйозно. Нам просто треба підготувати вечірку».\n\nМайбутній король не виглядав надто переконаним. «Але як ми взагалі до неї доберемося? Останні кілька років вона провела, зміцнюючи себе у своїй так званій «Вежі» в центрі Весаліполіса, в оточенні найкращих охоронців УГБВ. Як ви плануєте туди потрапити? Ви хочете і всіх її охоронців перетворити на камінь?»\n\n«О ні, це не так працює». Твайлайт Спаркл усміхнулася. «Всі книги про Елементи, які я читала, чітко вказують на це — вони призначені лише для захисту Еквестрії й діють тільки на тих, хто здатний загрожувати їй. Ми б не змогли перетворити охоронців на камінь, навіть якби спробували. Але є значно простіший підхід: ми телепортуємося». Торакс продовжував сумнівно облизувати ікла, що змусило Твайлайт продовжити: «Твоя скептичність виправдана. Зазвичай ми не могли б телепортуватися на таку відстань. Це складне закляття навіть для алікорнів, і його складність зростає квадратично залежно від відстані. Але цього разу ми маємо допомогу». Вона підмигнула. «Проте нам все одно потрібно підійти трохи ближче, тож зараз краще поводитися тихо».\n\nВони продовжили свій шлях. Торакс все ще мав сумніви, але поки що тримав їх при собі. Через деякий час Твайлайт раптово підняла копито. Він ледь встиг усвідомити, що відбувається, як спалахнуло світло, і вони опинилися посеред тронної зали Кризаліс. Королева чейнджлінґів здивовано просичала, але Шістка не втрачала часу. Торакс із благоговінням спостерігав, як Елементи робили свою справу. Щойно окаменіння Кризаліс завершилося, будівлю, а наскільки він міг бачити — і значну частину міста, пронизав магічний сплеск усіх кольорів веселки.\n\n«Навіть не думай, що все так просто кожен раз». Пінкі Пай покрутила копитом перед його носом. «Але тепер справді час для вечірки!»"
 evildiarchy_friendship_missions.8.a:0 "Елементи Гармонії завдають нового удару."

 evildiarchy_friendship_missions.9.t:0 "Місія дружби до яків" #До громадянки
 evildiarchy_friendship_missions.9.d:0 "«Ну ж бо, принаймні поговори з ним».\n\n«Ні».\n\n«Він твій брат, ти маєш хоча б спробувати!» — Пінкі Пай стрибала колами навколо принца Резерфорда. «Обіцяю, ми влаштуємо супер-пупер круту вечірку, коли ти з ним поговориш».\n\n«НІ! Бредфорд відмовитися від мого правління, оголосити себе законним принцом, зібрати клани проти мене! Резерфорд не може цього прийняти. Забагато говорити, тепер яки РОЗТРОЩИТИ цих НІКЧЕМНИХ яків», — він тупнув копитом. «Резерфорд намагатися говорити. Брат не слухати розум. Я хотіти, щоб Як'якстан бути сучасною нацією, дружити з Еквестрією. Він казати «ні», Як'якстан мати бути як раніше і закрити кордони. Тепер ми битися, БИТИСЯ за душу Як'якстану».\n\nЇхня розмова тривала в такому дусі ще деякий час, але поступово опір Резерфорда слабшав. У глибині душі він все ще залишався яком, з яким можна було домовитися. Під тиском своєї подруги, «почесного яка», та за підтримки Йони він погодився на припинення вогню та переговори з принцом Бредфордом. На мить Пінкі Пай замислилася, як просуваються переговори Реріті з Бредфордом — це, мабуть, була куди складніша місія.\n\nПроте невдовзі вона отримала підтвердження від тої: Бредфорд відкритий до зустрічі. Поки два брати вели бесіду, вона тихо запитала подругу, як їй вдалося вмовити Бредфорда на згоду.\n\nРеріті задоволено усміхнулася. «О, це було набагато простіше, ніж я очікувала. Яки... вони здаються такими лютими з боку, чи не так? Але цього разу я підготувалася належним чином, аби обрати правильну сукню для цієї ситуації. У них така багата культура, варто лише придивитися, люба, і моє вбрання одразу здобуло їхнє схвалення. Навіть цей вічно сердитий як — здається, його звали Керр — визнав, що ніколи не думав, ніби поні може так добре знатися на культурі яків. Звісно, я швидко пообіцяла розробити для них вишукане традиційне, але водночас інноваційне вбрання, і вони з радістю погодилися. І поглянь, здається, ці двоє дійшли згоди»."
 evildiarchy_friendship_missions.9.a:0 "Мир у Як'якстані відновлено."

 evildiarchy_friendship_missions.10.t:0 "Місія дружби: яки" #Інґвар
 evildiarchy_friendship_missions.10.d:0 "Три темні постаті наближалися до намету в глуху ніч. Здалеку всі вони скидалися на яків, проте при детальному розгляді ставало зрозуміло, що двоє з них — та ні, третій теж був меншим за звичайного яка. На них чекали, принаймні вхід відкрився миттєво і так само швидко зачинився. Одиноке око визирнуло назовні, перевіряючи, чи не було свідків, однак поблизу було самотньо.\n\nВсередині Пінкі Пай з Реріті зняли свій важкий зимовий одяг. «Тут справді особлива погода, чи не так, люба?» — зауважила Реріті. «Але в цьому випадку я не скаржуся. Я майже впевнена, що саме вона дозволила нам залишитися непоміченими під час нашої маленької місії».\n\nЙона, яка нічого на собі не мала, мовчала, але їхня господиня відповіла: «Як-Тіра щаслива, що ви дістатися сюди безпечно. Тіра дуже хвилюватися за вас». Вона подивилася на Йону. «Ти змогти мені пробачити? Це не мати зайти так далеко. Чому Тіра довіряти Інґвару?»\n\n«Все добре. Йона ніколи не думати, що Тіра хотіти цього».\n\nПінкі Пай застрибала між ними. «А ще, — стрибок — ми принести гарні новини! — стрибок — Яки — стрибок — більше не хотіти — стрибок — правління Інґвара. Тож — стрибок — давайте всі влаштувати велику вечірку!»\n\nРаріті підняла брову. «Хіба ми не маємо спочатку, ну, скинути Інґвара?»\n\n«Але вечірка і є скиданням! Ми маємо показати якам, що вони можуть бути вільними, якщо захочуть. Тож, зберімо їх усіх разом!»\n\nТира похитала головою. «Чому революція мати закінчуватися так? Все, що Тіра хотіти — щоб робітник бути почутим».\n\n«Але революція не закінчується, дурненька. Щойно Інґвара не буде, ти візьмеш владу в свої копита»."
 evildiarchy_friendship_missions.10.a:0 "Революція повертається до робітників."

 evildiarchy_friendship_missions.11.t:0 "Місія дружби: яки" #Резерфорд
 evildiarchy_friendship_missions.11.d:0 "«Я дуже сподіваюся, що цього разу яки будуть більш розсудливими», — мовила Реріті. «Я чітко пам'ятаю їхню поведінку в Понівіллі. Навіть якщо тобі й вдалося завоювати їхню дружбу». Вона кивнула Пінкі Пай, що йшла поруч. «Статус «почесного яка», чи не так? І офіційний посол у Як’якстані».\n\n«Принц Резерфорд — чудовий хлопець, якщо впізнати його ближче. З ним просто треба правильно поводитися — він, безумовно, гордий як, але добродушний. Не так давно у нього стався жахливий розбрат із його братом, принцом Бредфордом. Яки пережили спустошливу громадянську війну. Він та Йона зверталися до мене за допомогою. Я знаю, що він переміг, але, на жаль, після того я втратила з ним зв'язок».\n\nДійшовши до Яктауна, вони невдовзі опинилися в оточенні зацікавлених яків. Навіть після того, як Резерфорд відкрив країну для торгівлі з Еквестрією, мало хто з них бачив поні на власні очі. Пінкі Пай у своєму шоломі з рогами яка активно жестикулювала, пояснюючи їм причину свого візиту.\n\n«Що це за натовп тут?» — почувся знайомий голос позаду них. «Рожева поні! Ти повернутися! Принц Резерфорд вітати тебе у яків. І ти привести подругу, як бачити. Яки пам'ятати її з Понівілля. Але про що ви говорити якам?»\n\n«Принце Резерфорде! Я така рада Вас бачити. Останній раз я чула про Вас ще під час громадянської війни. Моя подруга Реріті та я прийшли сюди, щоб попросити вашої допомоги у боротьбі проти Дейбрейкер та Найтмер Мун — ну, знаєте, злих версій Селестії та Луни. Вони шалено могутні, тому нам потрібно, щоб кожне створіння в Еквусі об'єдналося проти них. Ми можемо на вас розраховувати?»\n\n«Принц Резерфорд чути про злих алікорнів. Не бути впевненим, чи це загроза для яків, чи ні. Тепер я впевнений! Яки готові битися і ТРОЩИТИ алікорнів! Яки дуже сильні, і яки любити поні!»"
 evildiarchy_friendship_missions.11.a:0 "Яки та поні разом РОЗТРОЩИТИ усіх ворогів."

 evildiarchy_friendship_missions.12.t:0 "Місія дружби: яки" #Йона
 evildiarchy_friendship_missions.12.d:0 "«Я дуже сподіваюся, що цього разу яки будуть більш розсудливими», — мовила Реріті. «Я чітко пам'ятаю їхню поведінку в Понівіллі. Навіть якщо тобі й вдалося завоювати їхню дружбу». Вона кивнула Пінкі Пай, що йшла поруч. «Статус «почесного яка», чи не так? І офіційний посол у Як’якстані».\n\n«Принц Резерфорд — чудовий хлопець, якщо впізнати його ближче. З ним просто треба правильно поводитися — він, безумовно, гордий як, але добродушний. Не так давно у нього стався жахливий розбрат із його братом, принцом Бредфордом. Яки пережили спустошливу громадянську війну. Він та Йона зверталися до мене за допомогою. Я знаю, що він переміг, але, на жаль, після того я втратила з ним зв'язок».\n\nДійшовши до Яктауна, вони невдовзі опинилися в оточенні зацікавлених яків. Навіть після того, як Резерфорд відкрив країну для торгівлі з Еквестрією, мало хто з них бачив поні на власні очі. Пінкі Пай у своєму шоломі з рогами яка активно жестикулювала, пояснюючи їм причину свого візиту\n\n«Реріті! Що Пінкі Пай там робити? Як Йона не знати, що ви прийти до Яктауну». Реріті обернулася і побачила свою колишню ученицю, яка стрімко наближалася до них. «Це мати стосунок до зникнення Селестії та Луни? Йона знати, що щось статися, але не знати що».\n\n«Йоно! Я така рада тебе бачити. Ми прийшли відвідати принца Резерфорда та яків. Селестія та Луна, на жаль, не зникли, а з’їхали з глузду. Тепер, як Дейбрейкер та Найтмер Мун, вони становлять загрозу для всього світу. Тож ми збираємо друзів, щоб підготуватися до їхнього нападу. А щодо того, що робить Пінкі Пай... Думаю, вона просто насолоджується своєю театральністю».\n\n«О, ви не чути новини? Принц Резерфорд відмовитися від влади. Яки створити республіку. Як Йона — перша президентка республіки. І Йона готова вступити в бій разом із поні!»"
 evildiarchy_friendship_missions.12.a:0 "Яки та поні разом РОЗТРОЩИТИ усіх ворогів."

 evildiarchy_friendship_missions.13.t:0 "Місія дружби: яки" #Тіра
 evildiarchy_friendship_missions.13.d:0 "'«Я дуже сподіваюся, що цього разу яки будуть більш розсудливими», — мовила Реріті. «Я чітко пам'ятаю їхню поведінку в Понівіллі. Навіть якщо тобі й вдалося завоювати їхню дружбу». Вона кивнула Пінкі Пай, що йшла поруч. «Статус «почесного яка», чи не так? І офіційний посол у Як’якстані».\n\n«Принц Резерфорд — чудовий хлопець, якщо впізнати його ближче. З ним просто треба правильно поводитися — він, безумовно, гордий як, але добродушний. Не так давно у нього стався жахливий розбрат із його братом, принцом Бредфордом. Яки пережили спустошливу громадянську війну. Він та Йона зверталися до мене за допомогою. Я знаю, що він переміг, але, на жаль, після того я втратила з ним зв'язок».\n\nДійшовши до Яктауна, вони невдовзі опинилися в оточенні зацікавлених яків. Навіть після того, як Резерфорд відкрив країну для торгівлі з Еквестрією, мало хто з них бачив поні на власні очі. Пінкі Пай у своєму шоломі з рогами яка активно жестикулювала, пояснюючи їм причину свого візиту.\n\n«Що це за зібрання тут?» — як у супроводі двох офіцерів підійшов до Реріті. «Хто ви? Як-Тіра знати рожеву поні, але не тебе. Тіра не дозволяти це зібрання. Ви хотіти підірвати революцію?»\n\n«Мене звати Реріті, і ми з Пінкі Пай прийшли сюди, щоб поговорити з яками. Як Ви, можливо, знаєте, Селестія та Луна перетворилися на Дейбрейкер та Найтмер Мун. І вони планують вторгнутися в Еквус, щоб підкорити його, як вони зараз роблять із Грифонією. У відповідь ми хочемо об'єднати весь Еквус проти них. Але Ви згадали про революцію. Скажіть, що сталося з принцом Резерфордом? Ми очікували побачити його тут».\n\n«Резерфорд більше не принц. Яки вимагати зречення, тому Резерфорд відмовитися від титулу принца. Яками тепер правити робітники. Я очолювати раду робітників, тому Ви говорити зі мною. Але якщо Ви не загрожувати революції, Тіра готова битися проти злого алікорна разом із вами. Яки ТРОЩИТИ!»"
 evildiarchy_friendship_missions.13.a:0 "Яки та поні разом РОЗТРОЩИТИ усіх ворогів."

 evildiarchy_friendship_missions.14.t:0 "Місія дружби: яки" #Бредфорд
 evildiarchy_friendship_missions.14.d:0 "«Я дуже сподіваюся, що цього разу яки будуть більш розсудливими», — мовила Реріті. «Я чітко пам'ятаю їхню поведінку в Понівіллі. Навіть якщо тобі й вдалося завоювати їхню дружбу». Вона кивнула Пінкі Пай, що йшла поруч. «Статус «почесного яка», чи не так? І офіційний посол у Як’якстані».\n\n«Принц Резерфорд — чудовий хлопець, якщо впізнати його ближче. З ним просто треба правильно поводитися — він, безумовно, гордий як, але добродушний. Не так давно у нього стався жахливий розбрат із його братом, принцом Бредфордом. Яки пережили спустошливу громадянську війну. Він та Йона зверталися до мене за допомогою. Я знаю, що все пройшло не дуже добре, тож нам потрібно спробувати домовитися з Бредфордом».\n\nЇх перервав суворий голос. «Стояти, поні! Принц Бредфорд наказати закрити кордон. Чого ви хотіти?»\n\nРеріті повернулася до яка. «Ми прийшли поговорити з принцом яків. Можливо, ви чули, що Селестія більше не править у Кантерлоті, і ви могли навіть чути, що вона та Луна перетворилися на Дейбрейкер та Найтмер Мун, які спустошують Грифонію... Надзвичайно важливо, щоб ми могли поговорити з принцом, бо хоч ми й поважаємо ваше рішення закрити кордони, це також стосується безпеки яків. Злі Діархи повернуться швидше, ніж ви думаєте, і вони прийдуть, щоб завоювати весь континент». Оскільки як не виявляв жодного наміру рухатися чи відповідати, вона додала: «Будь ласка, дозвольте нам поговорити з Бредфордом і все пояснити!»\n\nТепер як відповів: «Я І Є Бредфорд, поні-дурню. Ти думати, кордон яків так погано охоронятися, що ви просто гуляти вільно? Принц Бредфорд спостерігати за вами вже кілька днів. І хоча я не знати тебе, я знати твою подругу Рожеву поні. Вона допомагати зраднику Резерфорду». Він похмуро скривився і тупнув копитом. «Але — Бредфорд справді чути, що Селестія з’їхати з глузду, і Луна теж. Яки сильні, яки не потребувати допомоги. Але Бредфорд знати, що поні її потребувати». Він тупнув ще раз. «Яки ТРОЩИТИ злих алікорнів!»"
 evildiarchy_friendship_missions.14.a:0 "Яки та поні разом РОЗТРОЩИТИ усіх ворогів."

 evildiarchy_friendship_missions.15.t:0 "Місія дружби: яки" #Керр/Стар Маунтін
 evildiarchy_friendship_missions.15.d:0 "«Та годі тобі, це зовсім не важко».\n\n«Як Йона не впевнена. Як Йона мати сумніви». Молода як, що стояла між двома поні, похитала головою.\n\n«Тю!» — відповіла Пінкі. «Нам всього лише треба таємно пробратися в країну, скинути тирана і поставити тебе на чолі. А потім ми маємо влаштувати велику, круту, бомбезну вечірку на честь перемоги, з купою трощіння та тупотіння! Простіше простого. Робила так купу разів. Хоча...» Вона драматично почухала підборіддя. «Мені таки треба потренувати навички трощіння, щоб вечірка стала найкращою в історії».\n\n«І Пінкі Пай думати, що все це легко? Чути про [JAK.GetLeader]? [JAK.GetLeader.GetSheHeCap] бути жорстокий деспот і руйнувати прекрасний Як'якистан».\n\nПінкі Пай не відповіла, лише підмигнула. Поки Реріті просто стенула плечима, вони мовчки продовжили свій шлях. Героїні вже були високо в горах, що відокремлювали Кристальну Імперію від Як'якистану. Чомусь Пінкі Пай, здавалося, точно знала шлях, хоча він пролягав далеко від будь-яких второваних стежок. Після трьох днів сходження горами місцевість, здавалося, почала ставати менш крутою.\n\nРаптом Пінкі Пай видала пронизливий крик, змусивши Йону та Реріті відскочити вбік. Проте, перш ніж вони встигли щось вдіяти, вони почули схожий крик зовсім неподалік, і Пінкі кинулася туди. Інші двоє рушили за нею, і незабаром вони вийшли до печери, заповненої яками.\n\n«Як-Мая може сказати: усе йти за планом. Варта [JAK.GetLeader] мати наших яків. Ми готові вдарити, щоб повернути свободу Як'якистану!»\n\nПобачивши здивовані погляди своїх подруг, Пінкі Пай вперла копита в боки. «Що? Ви справді думали, що я вдеруся в Як'якистан просто так? Я знаю кількох яків ще з часів, коли відвідувала Їкслурбертфест, і ще кількох після моїх наступних візитів. Зрештою, я офіційний посол дружби у яків, і яким би я була послом, якби не мала друзів, га? У будь-якому разі, у нас є тиран, якого треба скинути, і, що важливіше, вечірка, яку треба підготувати!»"
 evildiarchy_friendship_missions.15.a:0 "Як'якистан вільний від божевілля."

 evildiarchy_friendship_missions.16.t:0 "Місія дружби: Оленія" #Фошизди
 evildiarchy_friendship_missions.16.d:0 "«Я завжди хотіла побачити Оленію», — мовила Флаттершай. «Кажуть, у їхніх лісах живе багато захоплюючих створінь, і великих, і маленьких. І самі вони дуже приємні істоти. Кожного разу, коли я спілкувалася з королевою Вельвет, вона була такою співчутливою та уважною».\n\n«Ні, ні, ні, ти описуєш їх зовсім неправильно», — заперечила Рейнбоу Деш. «Оленійці — сильні та круті воїни. Ти знала, що вони підкорили Гіндію? Це правда, Твайлайт підтвердила мені: кілька століть тому групи оленійців встановили в Гіндії «Оленяче право», і їхні нащадки правлять там донині. Пам'ятаю, як ще лошам читала оленійські легенди». Вона зробила петлю в повітрі. «Ох, сподіваюся зустріти когось із їхніх бійців, і тоді ми побачимо, хто кращий у трюках».\n\nВони дісталися Йортланда без пригод. По прибуттю героїні попросили аудієнції в Аллсер’ярґоді. Невдовзі їх прийняв темношерстий олень із червоними рогами. Він зміряв обох поглядом, перш ніж почати говорити повільним, виваженим тоном.\n\n«Рейнбоу Деш та Флаттершай, дипломатки з Еквестрії. Я — Юрва, Аллсер’ярґоді та правитель цих земель. Але ви все це знаєте, і я знаю, що ви знаєте. Боги вже передвістили ваш прихід і відкрили мені вашу місію. Проте, кажіть те, що маєте сказати, і я дам вам відповідь, як того вимагають боги».\n\nРейнбоу Деш замахала крилами, зависнувши над землею та схрестивши передні копита. «Ну, якщо Ви вже все знаєте, то перейдемо одразу до справи. Я чула, що ви, оленійці — круті воїни, тож чи не хочете ви допомогти нам битися проти Дейбрейкер та Найтмер Мун? Я читала легенди про Кнуфа та Айвора; тепер Ваш час довести, що вони правдиві».\n\n«Мушу визнати, я б краще поспілкувалася з тваринами у ваших лісах, аніж закликала б вас до бою», — додала Флаттершай. «Але для цього час знайдеться пізніше. Злі Діархи — це загроза для всього світу, і я сподіваюся, що боги сказали Вам і про це».\n\nЮрва подивився на них із суворим виразом обличчя. Після паузи він відповів: «Ви говорили мудро, і боги шанують це. Олені — горда і сильна раса. Довгий час я бачив в Еквестрії лише вплив, який робить нас слабкими. Ви показали мені, що це не обов'язково має бути так. Але це лише щоб заспокоїти мій розум. Боги вже сказали мені, що я маю зробити, ще до того, як ви вирушили з Кантерлоту. Королева Вельвет буде відновлена у правах, оскільки вона є законною спадкоємицею, і ми приєднаємося до вашої боротьби»."
 evildiarchy_friendship_missions.16.a:0 "Оленійці приєднуються до спільної справи."

 evildiarchy_friendship_missions.17.t:0 "Місія дружби: Оленія" #Ний тралітет
 evildiarchy_friendship_missions.17.d:0 "«Я завжди хотіла побачити Оленію», — мовила Флаттершай. «Кажуть, у їхніх лісах живе багато захоплюючих створінь, і великих, і маленьких. І самі вони дуже приємні істоти. Кожного разу, коли я спілкувалася з королевою Вельвет, вона була такою співчутливою та уважною».\n\n«Ні, ні, ні, ти описуєш їх зовсім неправильно», — заперечила Рейнбоу Деш. «Оленійці — сильні та круті воїни. Ти знала, що вони підкорили Гіндію? Це правда, Твайлайт підтвердила мені: кілька століть тому групи оленійців встановили в Гіндії «Оленяче право», і їхні нащадки правлять там донині. Пам'ятаю, як ще лошам читала оленійські легенди». Вона зробила петлю в повітрі. «Ох, сподіваюся зустріти когось із їхніх бійців, і тоді ми побачимо, хто кращий у трюках».\n\nНа їхній подив, після прибуття до Йортланда до них підійшов офіцер, щоб запросити на зустріч із королем Юганом. Очевидно, короля поінформували про їхній приїзд ще до того, як вони перетнули кордон Оленії, але він вирішив їх не зупиняти. Їх провели до невеликої кімнати в замку, де вони зустріли втомленого на вигляд оленя. Флаттершай помітила, що його шерсть була трохи темнішою, ніж у Вельвет, і він не мав її кольорових рогів.\n\n«Мабуть, шарада скінчилася». Він злегка усміхнувся, але від цього виглядав ще втомленішим. «Якщо ви прийшли переконати мене зректися престолу — немає потреби. Я... Щож, чинити правильно не завжди легко. Я хотів, щоб Оленія була сильнішою, ніж під владою олениці, яку підтримує Еквестрія. Це... не спрацювало. Я радився з богами відтоді, як уперше почув про вашу місію. Їхні вимоги були чіткими. Вона — законна спадкоємиця, тоді як я — лише узурпатор. Я не буду більше битися».\n\nРейнбоу Деш підняла брову. «Взагалі-то ми прийшли сюди просити Вас саме битися. Не з Вельвет, звісно, а приєднатися до нашої боротьби проти Злої Діархії. Лошам я завжди читала легенди про оленійських вікінґарів, про Кнуфа та Айвора і так далі. Тепер настав час оленям довести, що вони все ще на щось здатні».\n\n«Я знаю про вашу боротьбу, але вона не для моєї турботи. Вельвет поведе Оленію на бій разом із вільними народами проти тиранії алікорнів»."
 evildiarchy_friendship_missions.17.a:0 "Оленійці приєднуються до спільної справи."

 evildiarchy_friendship_missions.18.t:0 "Місія дружби: Оленія" #Вельвет Ремеді
 evildiarchy_friendship_missions.18.d:0 "«Я завжди хотіла побачити Оленію», — мовила Флаттершай. «Кажуть, у їхніх лісах живе багато захоплюючих створінь, і великих, і маленьких. І самі вони дуже приємні істоти. Кожного разу, коли я спілкувалася з королевою Вельвет, вона була такою співчутливою та уважною. Вона була так засмучена тим, що їй довелося виборювати свій трон, але казала, що це було необхідно».\n\n«Ні, ні, ні, ти описуєш їх зовсім неправильно», — заперечила Рейнбоу Деш. «Оленійці — сильні та круті воїни. Ти знала, що вони підкорили Гіндію? Це правда, Твайлайт підтвердила мені: кілька століть тому групи оленійців встановили в Гіндії «Оленяче право», і їхні нащадки правлять там донині. Пам'ятаю, як ще лошам читала оленійські легенди». Вона зробила петлю в повітрі. «Ох, сподіваюся зустріти когось із їхніх бійців, і тоді ми побачимо, хто кращий у трюках».\n\nВони без проблем дісталися Йортланда. Королева Вельвет швидко надала їм аудієнцію, і невдовзі вони вже сиділи в м'яких кріслах, розмовляючи з королевою.\n\n«Ласкаво просимо до Оленії, мої друзі», — почала вона. «Я знала, що це лише питання часу». Вона зітхнула. «Світ дуже швидко став ще більш похмурим місцем, правда? Тут, в Оленії, ми дізналися про це раніше за багатьох інших. Переворот Югана був жахливою подією, а громадянська війна після мого повернення залишила стільки сімей і мрій розбитими. Проте — завжди є світла сторона, інакше я б тут не сиділа. Зі злом можна і треба боротися».\n\n«Саме так!» — відповіла Рейнбоу Деш, збуджено махаючи крилами. «Ми покажемо цим двом тираншам!»\n\n«І Оленія стоятиме на вашому боці», — кивнула Вельвет. «Але не варто недооцінювати ціну війни»."
 evildiarchy_friendship_missions.18.a:0 "Оленійці приєднуються до спільної справи."

 evildiarchy_friendship_missions.19.t:0 "Місія дружби: Оленія" #Комі
 evildiarchy_friendship_missions.19.d:0 "«Я завжди хотіла побачити Оленію», — мовила Флаттершай. «Кажуть, у їхніх лісах живе багато захоплюючих створінь, і великих, і маленьких. І самі вони дуже приємні істоти. Кожного разу, коли я спілкувалася з королевою Вельвет, вона була такою співчутливою та уважною».\n\n«Ні, ні, ні, ти описуєш їх зовсім неправильно», — заперечила Рейнбоу Деш. «Оленійці — сильні та круті воїни. Ти знала, що вони підкорили Гіндію? Це правда, Твайлайт підтвердила мені: кілька століть тому групи оленійців встановили в Гіндії «Оленяче право», і їхні нащадки правлять там донині. Пам'ятаю, як ще лошам читала оленійські легенди». Вона зробила петлю в повітрі. «Ох, сподіваюся зустріти когось із їхніх бійців, і тоді ми побачимо, хто кращий у трюках».\n\nПісля прибуття до Йортланда до них підійшов офіцер поліції. Очевидно, президент Оленійської республіки почув про їхній приїзд і захотів зустрітися. Обидві швидко погодилися, і невдовзі вони вже сиділи в президентському палаці, де до них підійшов доглянутий олень.\n\n«Вітаю. Мене звати Куллерво Сірола, лідер Народної партії та президент Оленійської республіки. А ви — Рейнбоу Деш та Флаттершай, емісарки з Принцества Еквестрія. Тож, чого хоче нова принцеса Твайлайт Спаркл від нас, оленів? Я вже можу здогадатися, про що вона проситиме, але, будь ласка, викладіть свою справу».\n\n«Твайлайт Спаркл не наша принцеса. Вона відмовилася», — тихо відповіла Флаттершай. «Звісно, вона все ще Принцеса Дружби, але вона не захотіла ставати принцесою Еквестрії, коли Селестія та Луна... ну... коли вони перетворилися на Дейбрейкер та Найтмер Мун. Ми сформували Надзвичайну раду. Тож, технічно, ви розмовляєте з правителями Еквестрії безпосередньо — або, принаймні, з деким із них».\n\n«І ми прийшли сюди, щоб попросити вас битися», — перебила Рейнбоу Деш. «Битися, як у старі добрі часи, про які я читала в історіях про Кнуфа та Айвора ще лошам». Вона злетіла в повітря, імітуючи удари копитами. «Вікінґари були крутими воїнами! І тепер ви потрібні нам для боротьби проти Злої Діархії. Весь Еквус має стояти єдиним фронтом, щоб вони не змогли знайти проти нас управи».\n\n«Розумію, розумію». Сірола почухав підборіддя. «Цікаво, що ви не згадали про місце Вельвет у всьому цьому». Рейнбоу Деш хотіла щось відповісти, але олень підняв копито і продовжив. «Ні, ні, не псуйте момент. Я все одно вже прийняв рішення. З мого боку було б дурістю розділяти оленів у ці скрутні часи. Вона може повернутися — доки вона поважає мої обіцянки»."
 evildiarchy_friendship_missions.19.a:0 "Оленійці приєднуються до спільної справи."

 evildiarchy_friendship_missions.20.t:0 "Місія дружби: полярні ведмеді"
 evildiarchy_friendship_missions.20.d:0 "Коли Рейнбоу дізналася, що її та Флаттершай обрали для дипломатичної місії на таку далеку північ, вона була просто в захваті. Вона чула, що ведмеді круті та сильні, і менш схильні трощити все підряд, ніж яки. Усе мало пройти чудово... поки вони не перетнули кордон і не були майже миттєво атаковані гігантським монстром, у кілька десятків разів більшим за них. Коли вона розправила крила, готуючись до бійки, вона вдихнула повітря і... побачила, як Флаттершай пролетіла прямо повз неї, назустріч чудовиську.\n\n«Флаттерс, стій!» — Рейнбоу кинулася за нею, але була шокована наступною картиною. Чудовисько почало тупати задньою лапою по землі, поки Флаттершай гладила його по голові. «Флаттерс, ця штука завбільшки з дракона! Відійди від неї!»\n\n«Це зовсім не дракон, це — Туунбак! Вони просто пухнасті малюки», — сказала вона, повернувшись до Туунбака, щоб погладити його ще інтенсивніше. «Чи не так, ти, мілашко!»\n\nРейнбоу і раніше бачила, як Флаттершай викидає божевільні штуки, але це перевершило все. Принаймні це означало, що вони можуть безперешкодно продовжувати свій шлях... так їй здавалося. Наступні кілька годин Флаттершай провела, граючись із чудовиськом, літаючи навколо і називаючи його всякими «сюсі-пусі» іменами. Те, що починалося як жахлива та крута пригода, дуже швидко стало неймовірно нудним.\n\nРаптом її налякав гучний сміх. Рейнбоу помітила, що вдалині з'явився посланець полярних ведмедів — це був її шанс! Вона швидко полетіла до них, перш ніж їхній лідер встиг помітити її наближення. Зблизька вона розгледіла їх краще: великі, масивні та люті. Вони були крутими... і виглядали так, ніби могли розчавити її одним кігтем. Вона ковтнула слину наважилася підійти. «Г-гей, привіт». Їхній лідер повільно перевів погляд на неї, змусивши її здригнутися. Вона тремтіла ще мить, глибоко вдихнула і зібралася з духом. «Я — Рейнбоу Деш! А он там — Флаттершай! Ми прийшли з Еквестрії, щоб попросити вашої допомоги — вас, ведмедів — аби ми могли разом протистояти Дейбрейкер та Найтмер Мун. Ви ж чули, так? Вони зараз спустошують Грифонію! Ми просто хотіли дізнатися, чи зможете ви допомогти, враховуючи, що ви такі великі, могутні, круті та...» Лідер підняв лапу, миттєво зупинивши Рейнбоу на півслові.\n\n«Приведи до мене ту, що має холодне серце», — сказав їхній вождь, вказуючи на Флаттершай. «Тоді ми поговоримо». Рейнбоу швидко кивнула і так само швидко полетіла геть»."
 evildiarchy_friendship_missions.20.a:0 "Іноді дружнє погладжування може заслужити щиру відданість."

 evildiarchy_friendship_missions.21.t:0 "Місія дружби: Пінгленд" #Суп масивний
 evildiarchy_friendship_missions.21.d:0 "«С-С-СТРАЙК!» — закричала Пінкі Пай, драматично врізаючись у купу снігопоні, яких вона збудувала. «Три з трьох — Пінкі перемагає!» — вигукнула вона сама собі, поки Реріті з почуттям безвиході дивилася на це все. Цей візит проходив жахливо, їх ледь привітали — чесно кажучи, їм пощастило, що їх взагалі впустили до Дахе, а не вигнали геть, або ще гірше — кинули до в'язниці! Реріті не могли кинути до в'язниці; не в такій сукні! Вона зітхнула, дивлячись на Пінкі — принаймні комусь тут було весело.\n\n«Люба, можливо, нам варто пакувати валізи і йти додому». Реріті похитала головою, поки Пінкі почала будувати снігового пінгвіна. «Я впевнена, що у Твайлайт знайдеться ідея, як із цим впоратися, але це не те, з чим ми двоє можемо впоратися самі. Мені страшенно шкода, що ми пройшли такий шлях даремно!»\n\n«Що ти верзеш, дурненька? Ми зовсім не самі — у нас є всі ці друзі, які нам допоможуть!» Перш ніж Реріті встигла щось заперечити, вона простежила за поглядом Пінкі на величезний натовп пінгвінів, що марширував до головної будівлі столиці.\n\n«...І хто це, дозволь запитати, такі?»\n\n«Ну, це робітники, тю!»\n\n«Я це бачу. Але як саме вони стали твоїми друзями?»\n\n«Ну, поки ти тут сумувала, кілька з них підійшли й запитали мене, як це — бути поні! Тож я розповіла їм усе про наші пригоди, про Гармонію та про всю цю ситуацію з принцесами! Тоді вони сказали, що їхній теперішній лідер — такий самий великий злюка, як і ті двоє, і їм не подобається те, що він робить. Тож я сказала їм, що вони не повинні дозволяти якомусь злюці командувати собою, і от вони пішли це виправляти, я так думаю!» Пінкі з гордістю подивилася на грандіозний марш натовпу. «Ну, я краще піду готувати вечірку на випадок, коли вони там закінчать! До зустрічі, Рер!»\n\nПриголомшена єдиноріжка могла лише спостерігати, як Пінкі підстрибом поскакала готувати святкування перемоги»."
 evildiarchy_friendship_missions.21.a:0 "«...Я відвернулася на 30 секунд, як це взагалі сталося?»"

 evildiarchy_friendship_missions.22.t:0 "Місія дружби: Пінгленд" #Не суп масивний
 evildiarchy_friendship_missions.22.d:0 "«Мушу визнати, люба, я не зовсім знала, чого очікувати від пінгвінів, але вони приємно мене вразили», — захихотіла Реріті, поки Пінкі розглядала щось у вікні. «А ти бачила той чудовий костюм на джентльмені, який нас зустрів? Матоньки, можна було б подумати, що з ластами важко шити, але вони знайшли спосіб робити це надзвичайно вишукано!»\n\n«Я хотіла поковзати на льоду...» — пригнічено зітхнула Пінкі, знову втупившись у вікно. «Якби ж тільки... о, чекайте, я ж цілком можу!» Пінкі швидко вилетіла з кімнати підстрибом, проскочивши повз пінгвіна-дипломата на виході.\n\n«Вона... досить енергійний тип», — промовив дипломат, обтрушуючи свій костюм і прямуючи до крісла. «Сподіваюся, клімат не здався вам занадто суворим для візиту».\n\n«О, зовсім ні! Я приїхала цілком підготовленою до снігу, льоду, шторму та вітру! У подорожах неможливо бути підготовленою занадто». Реріті посміхнулася і вказала на свій одяг. «Як би мені не хотілося обговорити моду далі, є ще дещо, про що я маю запитати. Ми чули, що пінгвіни досить вправні в магії, і сподівалися, що ви будете відкриті до переговорів, аби Еквестрія та Пінгленд виступили разом проти Дейбрейкер та Найтмер Мун».\n\n«Ну, звісно», — кивнув дипломат (принаймні, здалося, що кивнув; у пінгвінів майже немає шиї). «Пінгленд симпатизує вашій справі й буде радий стати на бік Еквестрії».\n\nПоки вони посміхалися, тиснучи один одному копито та ласту, гучний удар привернув їхню увагу до вікна. Розпластана Пінкі прилипла до шибки. «Найкру-у-утіша снігова гірка! Я відчувала себе так, ніби вмію літати, коли з’їжджала!» — сяяла поні, навіть попри те, що здавалася приклеєною до скла. «Але тут може бути холоднувато!» Вона висунула язика і притиснула його до вікна, не зумівши відтягнути назад. «Ди-ивісся, я плимелзла!»\n\nРеріті визирнула у вікно, перш ніж знову подивилася на дипломата, витиснувши з себе посмішку."
 evildiarchy_friendship_missions.22.a:0 "«Ми сприймемо це як жест дружби»."

 evildiarchy_friendship_missions.23.t:0 "Місія дружби: Сталліноград"
 evildiarchy_friendship_missions.23.d:0 "Епплджек і Раріті дивилися у вікно потяга, розглядаючи краєвиди Сталлінограду. Вони лише раз перетинали ці землі раніше, по дорозі до Нашого Міста, але тоді вони майже нічого не бачили в самопроголошеній «Сєвєрянській Радянській Республіці» (саме такою була офіційна назва Сталлінограда). Спайк також виявляв інтерес до комуністичної столиці, тому поїхав з ними, але зараз він спав. Вони перезирнулися. Наскільки легкою буде їхня місія? Протягом двох століть Сєвєряна була де-факто частиною Еквестрії, нехай і під власним управлінням, аби лише трохи більше десяти років тому відокремитися.\n\nНа станції Кантерлотська в Сталлінограді їх привітав [STG.GetLeader], голова комуністичної держави. «Еквестрія надсилає емісарів? Це щось новеньке. Але ласкаво просимо — я впевнений, ви хочете озирнутися по місту, щоб побачити, чого ми досягли після того, як скинули дворян. Ми багато чого оновили з часів революції. Багато чого стає можливим, коли поруч немає п'явок, що висмоктують багатство з простого поні, і коли всі рівні».\n\n«Сподіваюся, ви не про те саме, про що Старлайт Ґліммер торочила свого часу», — пробурчала Епплджек. «Я чула дещо про цей комунізм, навіть у моїй родині. Для ферми він не до добра. Але зараз не про це».\n\n«Почекай, люба», — втрутилася Реріті. «Я думаю, нам слід спочатку оглянути місто, а вже потім судити про їхній підхід». Епплджек подивилася на неї великими очима, на що Реріті відповіла ледь помітною усмішкою. «Знаєш, якщо є щось, чого я не терплю, то це жадібність. І все, що я чула про старих дворян, вказує саме на їхню жадібність. Не знаю, чи можу я назвати революцію єдиним правильним рішенням, але це вже минуле». Вона повернулася до голови країни: «Très chic, чудове вибрання».\n\n«Я теж хочу подивитися місто», — проголосив Спайк. «Зрештою, саме тому... я маю на увазі, це просто гарна нагода, правда? Ми зможемо поговорити про Дейбрейкер та Найтмер Мун та їхні витівки пізніше».\n\nНаступні години вони провели, блукаючи містом, поки [STG.GetLeader] демонстрував комуністичну архітектуру, моду та кухню. Згодом розпочалися переговори. Звісно, злі алікорни вже були темою обговорень у Верховній раді, і Сталліноград підготував власну оборону проти загрози. Після запевнень, що революція в Сєвєряні не опиниться під загрозою, [STG.GetLeader] погодився приєднатися до них у боротьбі проти діархії."
 evildiarchy_friendship_missions.23.a:0 "Еквестрія вітає своїх товаришів."

 evildiarchy_friendship_missions.24.t:0 "Місія дружби: Наше Місто"
 evildiarchy_friendship_missions.24.d:0 "Наше Місто.\n\nФлаттершай здавалося, ніби вона лише вчора чула майстерно розіграну виставу Старлайт Ґліммер. Це був не найкращий момент у її житті, адже вона ледь не потрапила в тенета цього культу. Звісно, насправді це все сталося роки тому, і Старлайт Ґліммер давно пройшла шлях від лідерки культу до вірної учениці Твайлайт. Флаттершай спіймала себе на тому, що зиркає на Твайлайт поруч, але та, здавалося, нічого не помічала. Вона смикнула хвостом. Чому саме її обрали для цієї місії дружби? З якоїсь причини Твайлайт наполягла саме на її кандидатурі.\n\nКоли вони дісталися міста, їх одразу зустріло знайоме обличчя — Шуґар Белль, яка була однією з перших, хто повстав проти правління Старлайт Ґліммер. «Твайлайт Спаркл і Флаттершай! Ви повернулися! Що привело вас до нас? Знову якась проблема з дружбою?» Її усмішка згасла. «Сподіваюся, нічого надто серйозного. У нас... я маю на увазі, після поразки Старлайт Ґліммер поні тут мусили знову шукати своє справжнє покликання в житті. Коли у тебе виривають к’юті-марку — це жахливо, але знову навчитися жити з нею також не те щоб легко».\n\n«Можу собі уявити», — тихо промовила Флаттершай. «Я просто хочу, щоб усі жили в злагоді. Попри все те зло, що вчинила Старлайт, це було те, чого вона таки досягла. Звісно, поні не мають жити без своїх к’юті-марок», — швидко додала вона.\n\n«Це була фальшива злагода», — відповіла Шуґар Белль. «Це була примусова одноманітність. Але я пам'ятаю тебе. Зовні це виглядає привабливо, чи не так?» Вона втомлено усміхнулася. «Як би там не було, після того, як ви пішли, наше майбутнє було непевним. [evildiarchy_friendship_missions_24_dynloc] Але ви так і не сказали, що привело вас до нашого містечка?»\n\n«Ти згадала про проблеми з дружбою, і це справді так. Але цього разу допомога потрібна нам», — відповіла Твайлайт. «Розумієш, Селестія та Луна... вони змінилися. І нам знадобиться допомога кожного створіння на Еквусі, якщо ми хочемо мати бодай надію повернути їх до норми»."
 evildiarchy_friendship_missions.24.a:0 "«Ви допомогли нам, тепер ми допоможемо вам»."
 evildiarchy_friendship_missions.24_doublediamond:0 "Але тепер ми обрали Дабла Даймонда нашим новим мером — справжні вибори, не те що раніше. Він досі проповідує рівність. Іноді я думаю, чи не мріє він стати новою Старлайт. На щастя, він поки не намагався нічого робити з к’юті-марками...""
 evildiarchy_friendship_missions.24_featherbangs:0 "Але тепер ми обрали Фезер Бенґза нашим новим мером — справжні вибори, не те що раніше. Так-так, того самого Фезер Бенґса, якому я відмовила. Але він добрий мер, мушу це визнати...""

 evildiarchy_friendship_missions.25.t:0 "Місія дружби: Нова-Грифонія" #Зверхність
 evildiarchy_friendship_missions.25.d:0 "«У мене якесь відчуття дежавю», — промовила Пінкі Пай. «Ти і я на місії дружби до грифонів».\n\n«Так, тільки цього разу допомога потрібна нам від них», — відповіла Рейнбоу Деш. «І Нова-Грифонія — це не Грифонстоун, хоча вона майже така ж занедбана. Статус колонії розваленої імперії не сприяє процвітанню. Хоча ще побачимо. Я лише сподіваюся, що не зламаю ногу знову. Тоді було добряче боляче протягом довгого часу».\n\n«Кордон закрито, поні! Чого вам треба?» — перервав їх суворий голос. Вони дісталися кордону Нова-Грифонії. Рейнбоу Деш простягнула прикордонному патрулю паспорти, які їм дала Твайлайт. Гвардієць клацнув дзьобом. «Дипломати? Сумніваюся, що нашому президенту цікаво те, що Еквестрія має йому сказати». Він зітхнув. «Хоча, я вважаю, що варто було б». Знизивши голос, він запитав: «Чи правда, що Селестія та Луна з’їхали з глузду і тепер поневолюють грифонів у Новому Мейрленді? Сюди доходять лише чутки, але я дещо чув...»\n\n«Ти цілком правий», — підтвердила Пінкі. «Хоча вони вже не зовсім Селестія чи Луна. Тепер вони воліють називати себе Дейбрейкер та Найтмер Мун. І ми тут, бо хочемо зупинити їх, і нам потрібна ваша допомога. Тож, якщо ти хочеш допомогти своїм побратимам-грифонам, тобі краще провести нас до вашого президента».\n\nГвардієць виглядав стурбованим. «Я ж казав, він не стане слухати. Я... Слухайте, у мене залишилися деякі зв'язки ще з часів громадянської війни. Я пропущу вас і дам імена грифонів, з якими варто поговорити. Тільки пообіцяйте мені, що ніколи, НІКОЛИ не згадаєте про мою роль у цьому».\n\nДві поні перезирнулися і кивнули на знак згоди. Обіцявши тримати участь гвардійця в абсолютній таємниці, вони в’їхали до Нова-Грифонії. А через кілька днів сталося неймовірне: [GRF.GetLeader] був скинутий і заарештований у результаті продемократичного перевороту, а новим президентом став Вільгельм Сільвервінг»."
 evildiarchy_friendship_missions.25.a:0 "Дружба перемагає."

 evildiarchy_friendship_missions.26.t:0 "Місія дружби: Нова-Грифонія" #Громадянська оборона
 evildiarchy_friendship_missions.26.d:0 "«У мене якесь відчуття дежавю», — промовила Пінкі Пай. «Ти і я на місії дружби до грифонів».\n\n«Так, тільки цього разу допомога потрібна нам від них», — відповіла Рейнбоу Деш. «І Нова-Грифонія — це не Грифонстоун, хоча вона майже така ж занедбана. Статус колонії розваленої імперії не сприяє процвітанню. Хоча ще побачимо. Я лише сподіваюся, що не зламаю ногу знову. Тоді було добряче боляче протягом довгого часу».\n\n«Кордон закрито, поні! Чого вам треба?» — перервав їх суворий голос. Вони дісталися кордону Нова-Грифонії. Рейнбоу Деш простягнула прикордонному патрулю паспорти, які їм дала Твайлайт. Гвардієць клацнув дзьобом. «Дипломати, я бачу. Ну, не знаю, чи ви чули, але на даний момент у нас тут ніби як два уряди. Тож ви хочете поговорити з червоними чи з білими?»\n\nРейнбоу Деш повернулася до подруги. «Схоже, їм і справді потрібна наша допомога. Хочеш поговорити з червоними, а я навідаюся до білих?»\n\nПінкі Пай кивнула, і вони розійшлися. Пізніше, коли вони ділилися враженнями, з'ясувалося, що переговори з обома сторонами мали дещо спільне. Рейнбоу Деш вразила Гайгілла своїми польотами у військовому стилі, тоді як Пінкі Пай завоювала прихильність Редтейла, зацитувавши уривки з «Маніфесту партії соціальної справедливості» Маркс. Коли збентежена Рейнбоу запитала, де вона цього навчилася, Пінкі лише підмигнула.\n\nЗрештою, вони переконали обидві сторони погодитися на тимчасове припинення вогню та подальші переговори. В кінці кінців обидва табори погодилися сформувати уряд під керівництвом Вільгельма Сільвервінга, поміркованого республіканця, і приєднатися до боротьби проти справжнього ворога грифонячого роду — злих алікорнів у Грифонії»."
 evildiarchy_friendship_missions.26.a:0 "Ми не повинні битися один з одним, коли на кону наше виживання."

 evildiarchy_friendship_missions.27.t:0 "Місія дружби: Нова-Грифонії"
 evildiarchy_friendship_missions.27.d:0 "«У мене якесь відчуття дежавю», — промовила Пінкі Пай. «Ти і я на місії дружби до грифонів».\n\n«Так, тільки цього разу допомога потрібна нам від них», — відповіла Рейнбоу Деш. «І Нова-Грифонія — це не Грифонстоун, хоча вона майже така ж занедбана. Статус колонії розваленої імперії не сприяє процвітанню. Хоча ще побачимо. Я лише сподіваюся, що не зламаю ногу знову. Тоді було добряче боляче протягом довгого часу».\n\n«Кордон закрито, поні! Чого вам треба?» — перервав їх суворий голос. Вони дісталися кордону Нова-Грифонії. Рейнбоу Деш простягнула прикордонному патрулю паспорти, які їм дала Твайлайт. Гвардієць клацнув дзьобом. «Дипломати, я бачу. А я думав Еквестрія вже має консульство в Уетері. У будь-якому разі, гадаю, вам потрібен [GRF.GetLeader]? Йдіть за мною».\n\nЧерез кілька годин вони прибули до столиці. Гвардієць уже телеграфував про їхній приїзд [evildiarchy_friendship_missions_27_dyntitle]а, тож їх відвезли прямо до його вілли.\n\n[GRF.GetLeader] привітав їх тепло. «Я вже чув чимало історій. Селестія та Луна — обидві з’їхали з глузду, чи не так? І тепер Принцесі Дружби доводиться збирати усе по шматочках». Він похитав головою. «[evildiarchy_friendship_missions_27_dyndesc]».\n\n«Майже... але не зовсім», — відповіла Пінкі Пай. «Селестія та Луна не просто з’їхали з глузду, вони перетворилися на супермогутніх, суперзлих алікорнів і тепер вони — Дейбрейкер та Найтмер Мун. І Твайлайт не править Еквестрією; це робить Надзвичайна рада. О, і ще — Еквестрія не розвалюється. Власне, ми готуємося до нападу Злої Діархії й прийшли запитати, чи не хочете ви приєднатися до нас. Зрештою, подивіться, що вони роблять із грифонами в Грифонії». Пінкі Пай повернулася до подруги. «Я нічого не забула, Деш?»\n\n«Твоя дипломатія просто неперевершена», — сардонічно зауважила Рейнбоу Деш. «[evildiarchy_friendship_missions_27_dyntitlecap], якщо дозволите...»\n\nАле [GRF.GetLeader] перервав її, захихотівши. «Усе гаразд. Я з вами»."
 evildiarchy_friendship_missions.27.a:0 "Грифони, відомстіть за своїх побратимів!"
 evildiarchy_friendship_missions_27_dyntitle_governor:0 "губернатор"
 evildiarchy_friendship_missions_27_dyntitle_president:0 "президент"
 evildiarchy_friendship_missions_27_dyntitle_governorcap:0 "Губернаторе"
 evildiarchy_friendship_missions_27_dyntitle_presidentcap:0 "Пане Президенте"
 evildiarchy_friendship_missions_27_dyndesc_teafeather:0 "Який жах. Я народився в Імперії Грифонів, і хоча не можу сказати, що хтось із Ґроверів так божеволів, я добре пам'ятаю її крах. Мабуть, Еквестрії пощастило, що у неї все ще є Принцеса, якій не байдуже."
 evildiarchy_friendship_missions_27_dyndesc_highhill:0 "Який жах. Нація, яка раптово втрачає лідера, завжди опиняється у вирі хаосу. У нас у Нова-Грифонії було саме так. Але те, що сталося з вами, мабуть, ще гірше."
 evildiarchy_friendship_missions_27_dyndesc_redtail:0 "Це справжня трагедія. Сподіваюся, Твайлайт зможе все виправити."
 evildiarchy_friendship_missions_27_dyndesc_silverwing:0 "Це велика трагедія і для мене особисто. Я завжди рівнявся на їхній приклад. І тепер стається оце."
 evildiarchy_friendship_missions_27_dyndesc_blackpeak:0 "Я справді не можу цього осягнути. Вони завжди були таким сяючим прикладом доброчесності."

 evildiarchy_friendship_missions.28.t:0 "Місія дружби: Пуерто-Кабальйо"
 evildiarchy_friendship_missions.28.d:0 "«Ох, цей клімат просто ідеальний», — з насолодою зітхнула Пінкі Пай. «Я б справді хотіла провести цей день на пляжі. І вода якраз потрібної температури для купання. Не розумію, чому ти така холодна до цього, Епплджек».\n\n«Можливо, ти просто краще вмієш розслаблятися», — сардонічно відрізала та. «Або ж справа в тому, що ми тут не у відпустці! Ми тут, щоб потоваришувати з місцевими. Не те щоб для мене це було важко — більшість поні тут працюють на цукрових плантаціях, а це бісовий важка праця. Оскільки я теж працьовита фермерська поні, нам буде про що поговорити. Вибач, Пінкі, але це не те, що зрозуміє поні-організаторка вечірок».\n\n«Думаю, тобі не варто так вишкірятися, коли йдеш «товаришувати», — відповіла Пінкі Пай. «А я піду побалакаю з Понсе Коктейлем, бо йому якраз потрібен хтось, хто вміє влаштовувати гарні свята».\n\nЕпплджек не довелося довго шукати місцевих для розмови. У найближчому барі троє досить суворих на вигляд земних поні радо поділилися своїми історіями. Проте ці розповіді були зовсім не такими, як вона очікувала. На відміну від родини Еппл, більшість тутешніх робітників не володіли власними плантаціями; натомість усім архіпелагом заправляла жменька великих землевласників, більшість із яких навіть не були родом із Пуерто-Кабальйо.\n\n«Кажу тобі, не все те золото, що блищить. Не знаю, як ви там справляєтеся на материку, але тут ніхто не має таких грошей, щоб заснувати власну плантацію. При Понсе ситуація трохи покращилася, але будь-яка його спроба дати нам бодай кілька бітів натрапляє на шалений опір багатих еліт. А Кантерлот роками нічого з цим не робив. Я навіть не впевнений, чи вони взагалі знають, що тут коїться. До того ж Пуерто — це податкова гавань. Ці ділки скуповують усе житло на острові. Знайти дах над головою зараз неймовірно дорого. Але досить про це — ти навіть не назвала свого імені».\n\nЕпплджек відчула себе неймовірно зніяковілою. Що б вони сказали, якби вона зізналася, що є частиною тієї самої кантерлотської еліти, яку вони так ненавидять? Але брехати не було сенсу — це лише ускладнило б усе в майбутньому.\n\n«Я — Епплджек із Понівіллю. У мене невелика яблучна ферма, точніше, у моєї родини».\n\n«Ти — Епплджек, Елемент Чесності?» — перепитав один із трьох. «Ти ж тепер частина уряду, так? Це означає, що Кантерлоту нарешті не байдуже на нас?»\n\n«Так. Так, це саме так», — відповіла вона, подумки даючи собі всі клятви, які тільки знала, аби це справді стало правдою»."
 evildiarchy_friendship_missions.28.a:0 "Курортні острови нарешті дізнаються, що таке рівність."

 evildiarchy_friendship_missions.29.t:0 "Місія дружби: Драконячі землі"
 evildiarchy_friendship_missions.29.d:0 "«Ти добряче підріс відтоді, як я бачила тебе востаннє», — мовила Ембер.\n\n«Я міг би сказати те саме про тебе», — з усмішкою відповів Спайк. «Як воно — бути Володаркою драконів?»\n\n«Доволі цікаво. Іноді я замислююся, що тримає інших у вузді: Скіпетр із кривавого каменю чи мій батько Торч. Він усе ще крутиться поруч і намагається давати мені поради, але загалом він змирився з тим, що я все роблю по-своєму. Він був дуже скептично налаштований, коли я відправила Смолдер до Школи Дружби, тож я тим паче рада, що все вдалося. До речі, дві твої подруги можуть виходити з-під свого камуфляжу; я — і будь-який інший дракон — чую їхній запах за милю. Але я вже роки тому скасувала те дурне правило, що поні не можна сюди заходити, чи не так, Ґарбле?»\n\nҐарбл, який стояв неподалік, невдоволено хмикнув. Побачивши спрямований на нього Скіпетр із кривавого каменю, він пробурмотів: «Так, Володарко драконів Ембер».\n\n«Ох, яке полегшення», — зауважила Реріті, вибираючись із-під штучної скелі. «Моя грива вже встигла зовсім розкуйовдитися».\n\n«Так приємно знову тебе бачити, Ембер», — сказала Твайлайт. «Ми обмінялися багатьма листами про культуру драконів, і я була рада прийняти Смолдер до Школи Дружби, але я давно хотіла знову відвідати Драконячі землі. Зрештою, під час мого першого візиту я справді була наче під каменем, так?» Вона захихотіла. «Але, гадаю, ти вже здогадуєшся про мету нашого візиту. Драконячі землі ближчі до Грифонії, ніж будь-яка інша частина Еквусу, і ти напевно вже знаєш про Дейбрейкер та Найтмер Мун».\n\n«Знаю», — відповіла Ембер. «Звісно, мій батько рекомендував мені залишатися нейтральною, але я не буду. Я друг Спайка, а отже — і Еквестрії. Але навіть крім цього, що б там не казав мій батько, ці самопроголошені богині можуть стати небезпечними навіть для нас, драконів. Ми, дракони, звикли битися поодинці, і надто багато разів в історії це ставало причиною нашого краху»."
 evildiarchy_friendship_missions.29.a:0 "Дракони стоять пліч-о-пліч з Еквестрією."

