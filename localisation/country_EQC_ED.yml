#### Імена персонажів
 EQC_ED_theevilsisters:0 "Дейбрейкер та Найтмер Мун"
 EQC_ED_theevilsisters_desc:0 "Загальновідомо, що день і ніч не можуть існувати одночасно, бо що є одне, як не відсутність іншого? Небо не може мати два небесних тіла, інакше воно повстане проти самого себе і розірветься на шматки, поки одне не поглине інше. Думати про такий парадокс за своєю суттю — це мисленнєвий експеримент в абсурді.\nПроте цей парадокс з'явився у світі. Дейбрейкер, втілення сонця, та Найтмер Мун, Імператриця Ночі, об'єдналися в союзі. Коли сходить сонце, сходить і місяць, і разом із ними світ затремтить. Два алікорни крокують вперед, маючи у своєму розпорядженні об'єднану силу двох божеств та нескінченний потік вірних послідовників, і перед ними всі або підкоряться, або будуть знищені. Силою осяяного місяцем полум'я вони змушать світ палахкотіти.\n\n§YАвтор портрету:§! kelKessel"
 EQC_ED_AF_big_sisters_name:0 "Великі Сестри"
 EQC_ED_AF_big_sisters_desc:0 "Загальновідомо, що день і ніч не можуть існувати одночасно, бо що є одне, як не відсутність іншого? Небо не може мати два небесних тіла, інакше воно повстане проти самого себе і розірветься на шматки, поки одне не поглине інше. Думати про такий парадокс за своєю суттю — це мисленнєвий експеримент в абсурді.\nПроте цей парадокс з'явився у світі. Дейбрейкер, втілення сонця, та Найтмер Мун, Імператриця Ночі, об'єдналися в союзі. Коли сходить сонце, сходить і місяць, і разом із ними світ затремтить. Два алікорни крокують вперед, маючи у своєму розпорядженні об'єднану силу двох божеств та нескінченний потік вірних послідовників, і перед ними всі або підкоряться, або будуть знищені. Силою осяяного місяцем полум'я вони змушать світ палахкотіти.\n\n§YАвтор портрету:§! kelKessel"

 EQC_ED_emergency_council:0 "Надзвичайна рада"
 EQC_ED_emergency_council_desc:0 "«Я стала Принцесою Дружби не для того, щоб правити наодинці!» — Твайлайт Спаркл\n\nКоли обидві колишні лідерки впали в безумство, Еквестрія залишилася без керівництва. Перед обличчям цієї кризи Рейвен Інквелл закликала Твайлайт про допомогу, яка у відповідь створила Надзвичайну раду, що складається зі Спайка, Епплджек, Рейнбоу Деш, Флаттершай, Пінкі Пай, Реріті та неї самої. Рада має завдання підтримувати функціонування нації та організовувати оборону проти неминучої атаки спотворених сестер.\n\n§YАвтор портрету:§! kelKessel"

