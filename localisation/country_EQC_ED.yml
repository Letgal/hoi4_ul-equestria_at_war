## Фокуси ##
 EQC_ED_jet_set_new_job:0 "Нова роль Джет Сета"
 EQC_ED_jet_set_new_job_desc:0 "Джет Сет добре служив Нам вірним васалом, нехай і в ім'я Наших нижчих іпостасей. Оскільки Ми повинні діяти швидко, щоб закріпити Наше нове правління, Ми даруємо йому честь бути Нашим імперським канцлер.\nЙому краще усвідомити, наскільки нікчемними є його демократичні «ідеали», якщо він бажає кращого для своєї країни."
 EQC_ED_return_to_equestria:0 "Повернення до Еквестрії"
 EQC_ED_return_to_equestria_desc:0 "Наше перебування в Новому Мейрленді було тимчасовим, тепер час НаМ повернутися додому. Еквестрія сама по собі — це Наше право за народженням, заявимо ж його."
 EQC_ED_modify_the_congress:0 "«Підкоригувати» Конгрес"
 EQC_ED_modify_the_congress_desc:0 "Хоча при звичайних умовах Ми б змели цей «Конгрес» Нового Мейрленду, він усе ще може послужити Нашій меті. Населення тут досі чіпляється за дурні ідеали демократії та верховенства закону. Якщо Ми асимілюємо ці структури під Наше заступництво, Ми зможемо лише кількома змінами нав'язати лояльність, позбавивши при цьому будь-якої реальної влади."
 EQC_ED_disband_the_congress:0 "Розпустити Конгрес"
 EQC_ED_disband_the_congress_desc:0 "Нам немає потреби дозволяти Нашим маленьким поні тішити себе своїми безглуздими ідеями. Як Наші піддані, вони мають коритися Нашій волі, а не навпаки. «Конгресу» Нового Мейрленду немає місця в Нашому новому царстві."
 EQC_ED_assemble_the_solarists:0 "Зібрати соляристів"
 EQC_ED_assemble_the_solarists_desc:0 "Наш союз крихкий, але він вистоїть достатньо довго... напевно. Ми обидві маємо бути рівно представлені, інакше Ми розірвемо наші володіння на шматки через ревнощі. Соляристи повинні згуртуватися навколо Нового Мейрленду та служити Нашій могутності."
 EQC_ED_convince_the_harmonists:0 "«Переконати» гармоністів"
 EQC_ED_convince_the_harmonists_desc:0 "Гармонія як ідеологія не обов’язково хибна, але її застосування часто є вадливим. По правді кажучи, всіх поні має єднати дружба... і Наше правління. Тільки під Нашим пильним керівництвом може бути досягнута справжня гармонія. Поки гармоністи приймають це, вони у нас за пазухою. А якщо ні...\nДурней тільки могила виправить."
 EQC_ED_theyve_outlived_their_purpose:0 "Вони вичерпали своє призначення"
 EQC_ED_theyve_outlived_their_purpose_desc:0 "Наше заступництво не з тих, що схиляється і підлаштовується під примхи черні, благаючи про підтримку, подібно грифонам-республіканцям! Ми стоїмо непохитно і впроваджуємо Наші вимоги! Якщо колишні політики Нового Мейрленду не схиляться за власним вибором, їх змусять схилити коліна та шиї в публічній страті!"
 EQC_ED_approach_the_shadowbolts:0 "Заклик до всіх лунаристів"
 EQC_ED_approach_the_shadowbolts_desc:0 "Наш союз заснований на обережності, тримається на необхідності та тій дрібці залишку сестринської любові. Обидві Наші сили мають бути представлені, щоб Наша нова імперія не була роздерта на шматки. Ті, хто вірний місячній вірі, згуртуються під Нашим стягом у Новому Мейрленді та служитимуть Нашій могутності."
 EQC_ED_follow_candy_garden:0 "Наслідувати ідею Кенді Ґарден"
 EQC_ED_follow_candy_garden_desc:0 "На перший погляд Кенді бракує необхідного завзяття для впровадження Нашої волі. Проте, якщо придивитися уважніше, стає зрозуміло, що вона думає не лише про завтрашній день, а й про післязавтрашній. Її реформи допоможуть познайомити населення з Нашою божественністю в темпі, що мінімізує потрясіння, дозволяючи Нам уникнути непотрібних ексцесів."
 EQC_ED_call_over_arcane_nova:0 "Викликати Аркейн Нову"
 EQC_ED_call_over_arcane_nova_desc:0 "Нашу божественність встановлено, і вона не буде заперечена ні на секунду! Нам потрібен не м'який підхід, Нам потрібні рішучі дії! Аркейн Нова наглядатиме за ідеологічною обробкою населення, адже лише вона має необхідний для цього фанатизм!"
 EQC_ED_install_loyal_governors:0 "Призначити вірних губернаторів"
 EQC_ED_install_loyal_governors_desc:0 "Будь-яка імперія варта рівно стільки, скільки варта її бюрократія, а нинішня бюрократія Нам не до вподоби. Доки Ми не зможемо довіряти Нашим губернаторам, Ми не можемо гарантувати виконання Наших наказів. Попрощаймося зі старим порядком і привітаймо новий."
 EQC_ED_elevate_the_thestrals:0 "Піднести фестралів"
 EQC_ED_elevate_the_thestrals_desc:0 "Фестрали Нового Мейрленду жили на задвірках суспільства з моменту заснування колонії. ГОДІ! Як Наші благословенні піддані, вони отримають належне місце і будуть належним чином інтегрованими під Нашим заступництвом."
 EQC_ED_the_shadow_works_concept:0 "Концепція Тіньових заводів"
 EQC_ED_the_shadow_works_concept_desc:0 "Шедоуболти давно існують у Новому Мейрленді та вже пустили глибоке коріння. Ідеально. Їхні ресурси будуть використані для мілітаризації та встановлення Нашого законного домену."
 EQC_ED_silence_pickets_group:0 "Ніякого расизму"
 EQC_ED_silence_pickets_group_desc:0 "Пікет Фенс є багато чим, але найважливіше для Нас, він проблема. Його ставлення до грифонів Наших володінь безпосередньо зашкодило б Нашій здатності вести війну, чого не можна допускати. Ми змусимо цю проблему замовкнути, перш ніж вона перетвориться на катастрофу."
 EQC_ED_utilize_dews_loyalty:0 "Використати вірність Дью"
 EQC_ED_utilize_dews_loyalty_desc:0 "Попри те, що Івнінґ Дью дотримується деяких ідеалів, які... Нам не симпатизують, він є вірним слугою понад усякі сумніви. Нам варто не залишати цю відданість невикористаною, бо Наш імперіум потребує всього, що тільки може дати цей світ."
 EQC_ED_sideline_evening_dew:0 "Усунути Івнінґа Дью"
 EQC_ED_sideline_evening_dew_desc:0 "Попри те, що його репутація як вірного слуги бездоганна, Івнінґ Дью — той, чиї погляди на грифонів просто неприйнятні. Грифони — Наші піддані, і з будь-ким, хто бажає зла Нашим підданим, буде покінчено. На знак визнання його вірності йому буде збережено життя, це Наша найбільша милість."
 EQC_ED_griffons_are_ours_too:0 "Грифони — Наші"
 EQC_ED_griffons_are_ours_too_desc:0 "Усі, хто живе в Наших кордонах (а може й поза), є Нашими підданими, незалежно від раси. Будь то грифон чи поні, зебра чи єті, гіпогриф чи пес — усі вони схиляться перед Нами як вірні слуги."
 EQC_ED_big_sister:0 "Сторінка з книги Великої Сестри"
 EQC_ED_big_sister_desc:0 "Прочісуючи політику Нового Мейрленду, Ми натрапили на цікаву групу: MARESOC. Хоча їхнє поняття «олігархічного колективізму» чиста нісенітниця, яка більше варта художньої літератури, ніж справжньої ідеології, їхні ідеї щодо шпигунства досить винахідливі. Ми зустрінемося з цією «Великою Сестрою» і дізнаємося про її методи все."
 EQC_ED_coopt_equalist_ideals:0 "Кооптувати ідеали еквалістів"
 EQC_ED_coopt_equalist_ideals_desc:0 "Еквалізм, як і сама Старлайт Ґліммер, — фарс. Але в цьому фарсі є місце користі. Ми використаємо еквалізм як основу плану для належного розшарування суспільства на справді рівний клас незалежно від усіх кордонів — такий, у якому піднімаються вище стану лише обрані. Нами. Ми бачимо майбутнє, і це майбутнє — море одноманітної посередності, зобов'язаної Нашій волі."
 EQC_ED_make_the_unions_bend:0 "Змусити спілки підкоритися"
 EQC_ED_make_the_unions_bend_desc:0 "Лівотня побудована на ідеї, що народ тримає справжню владу в нації. Безнадійні невдахи! Справжня влада походить лише від божественного права, яким володіємо Ми! Ліваки з їхніми профспілками та синдикатами навчяться служити своїм господарям або навчяться будувати свій комунізм в Тартарі!"
 EQC_ED_absorb_the_populists:0 "Поглинути популістів"
 EQC_ED_absorb_the_populists_desc:0 "Популісти старого Нового Мейрленду були достатньо мудрими щоб уникати антагонізму з Нами. На знак визнання цього Ми простягнемо їм Наші копита і запропонуємо місце поруч із Нами."
 EQC_ED_purge_the_dissenters:0 "Очищення від інакомислення"
 EQC_ED_purge_the_dissenters_desc:0 "Ми терпіли достатньо довго. Тим, хто продовжує відкидати Наше правління, немає в ньому місця. Якщо вони бажають виділитися на фоні інших, Ми допоможемо їм у цьому — голова за головою."
 EQC_ED_no_place_for_disloyalty:0 "Немає місця невірності"
 EQC_ED_no_place_for_disloyalty_desc:0 "Коритися Нашій волі — це не вибір, не прохання, це наказ звисока. Тим, хто не здатний або не бажає виконувати Наші вказівки, не заслуговують на наше милосердя. Ми дамо це зрозуміти всім Нашим підданим і закарбуємо в них усю вагу Нашої могутності."
 EQC_ED_a_newer_mareland:0 "Новіший Мейрленд"
 EQC_ED_a_newer_mareland_desc:0 "Нарешті Новий Мейрленд відроджено. З осередку провінційної слабкості було сконструйовано могутню машину війни. Під Нашим керівництвом Новий Мейрленд стане авангардом Нашого правління і поширить Нашу славу на цей континент, а згодом і поверне її на інший!"
 EQC_ED_breaking_free_of_our_prison:0 "Вириваючись із Нашої в'язниці"
 EQC_ED_breaking_free_of_our_prison_desc:0 "Хоча досягнення Нового Мейрленду не можуть і не будуть заперечені, цей маленький клаптик Грифонії — мала капля океану, який Ми потребуємо. Ми будемо правити всім цим континентом і використаємо його для Нашого повернення до Нашого істинного права за народженням. Тремти, Грифоніє, адже твої небеса впадуть!"
 EQC_ED_send_the_economy_into_overdrive:0 "Розігнати економіку на повну"
 EQC_ED_send_the_economy_into_overdrive_desc:0 "Навіть з Нашими попередніми діями економіка Нового Мейрленду все ще здавалася млявою в багатьох відношеннях. Оскільки Ми переходимо до військової економіки, такій слабкості не буде місця. Нащу машину буде розігнано на повну потужність: вона працюватиме і вдень і вночі, і вночі і вдень для Наших потреб!"
 EQC_ED_transform_civilian_buildings:0 "Трансформувати цивільні будівлі"
 EQC_ED_transform_civilian_buildings_desc:0 "Під Нашим правлінням усе повинно мати призначення. Речі, що його не мають, отримають його за Нашою примхою. Кожна будівля буде використана з належною метою або буде замінена на ту, що її матиме."
 EQC_ED_to_power_a_nation:0 "Живити націю"
 EQC_ED_to_power_a_nation_desc:0 "На відміну від минулих днів, Ми не можемо побудувати армію на кузнях та залізі, Нам потрібне вугілля. Наш імперіум буде належним чином забезпечений енергією, щоб він і Наші військові зусилля не залишилися без світла." #От би нам так
 EQC_ED_ultima_ratio:0 "Остаточний аргумент"
 EQC_ED_ultima_ratio_desc:0 "Іноді Ми можемо зіткнутися з проблемою, яку неможливо вирішити просто кулями, але для якої Нам немає потреби втручатися особисто. Для таких проблем Ми створимо ультимативну зброю, щоб покарати тих, хто чинить опір Нашому правлінню."
 EQC_ED_a_gun_for_every_blade_of_grass:0 "Гвинтівку за кожну билинку трави"
 EQC_ED_a_gun_for_every_blade_of_grass_desc:0 "Імперська армія повинна бути готова впроваджувати Нашу волю в будь-яку мить, незалежно від обставин. Ми не дозволимо їй залишитися без спорядження ні на мить. На службі Нашого великого задуму Ми забезпечимо, щоб у наших солдатів завжди під копитом була зброя."
 EQC_ED_every_little_bit_counts:0 "Кожна дрібниця важлива"
 EQC_ED_every_little_bit_counts_desc:0 "Одне зернятко не розчавить сарану, але великий потік може змити цілий рій. Так само і з Нашими підданими. Навіть одна клята додаткова хвилина роботи може стати різницею між необхідним рівнем виробництва та занепадом Наших армій. Наші піддані повинні прийняти це і працювати до знемоги в Наше ім'я."
 EQC_ED_the_imperial_research_institute:0 "Імперський науково-дослідний інститут"
 EQC_ED_the_imperial_research_institute_desc:0 "Ми маємо гарантувати, що Наші володіння перевершують всіх у кожній з категорій, включаючи науку. Застій у дослідженнях — є запрошення до занепаду прогресу в цілому, чого Ми не потерпимо. Наше заступництво буде поширене на дослідження нових технологій для кращого служіння Нашій волі."
 EQC_ED_the_magic_of_industry:0 "Магія індустрії"
 EQC_ED_the_magic_of_industry_desc:0 "Хтось каже, фабрики — протилежність магії, але вони мають набагато більше спільного. Подібно до алхіміків тоді, фабрики перетворюють шматки заліза та бруду на танки, кулі та бомби. Промислове виробництво випереджає магічні аналоги завдяки масштабу. Магія індустрії послужить Нам, як і всі в довгому списку магій, які Ми опанували."
 EQC_ED_we_need_equipment_now:0 "Спорядження потрібне НЕГАЙНО"
 EQC_ED_we_need_equipment_now_desc:0 "Майстерність ремісників-поні може бути прийнятною у звичайні часи, але Ми не правимо у звичайні часи. Нам потрібно якомога більше зброї, і для цього Ми зосередимося на кількості, а не на якості."
 EQC_ED_royal_standard:0 "Королівський стандарт"
 EQC_ED_royal_standard_desc:0 "Захопитися короткостроковими цілями легко, але вони нічого не варті, якщо в довгостроковій перспективі Наші армії не зможуть битися через те, що їхня зброя розвалюється. Піднімемо стандарти ще вище, адже ті, хто б'ється в Наше ім'я, мають іти в бій лише з найкращим обладнанням."
 EQC_ED_industrial_heart_of_griffonia:0 "Промислове серце Грифонії"
 EQC_ED_industrial_heart_of_griffonia_desc:0 "Те, що іншим здалося б великим подвигом, для Нас — очікувана даність. Однак не слід ігнорувати наші досягнення. За короткий час Ми викували націю, чия промисловість суперничає з промисловістю гігантів цього континенту. Ні, перевершує їх! Ми викували двигун, яким можна пишатися! Наші піддані, зважте на цей день, в який ви досягли величі в Наше ім'я!"
 EQC_ED_every_creature_must_serve:0 "Кожна істота повинна служити"
 EQC_ED_every_creature_must_serve_desc:0 "Єдиний спосіб подолати перешкоди перед Нами — мобілізувати якомога більше істот. Ми зосередимося на створенні незліченної Імперської армії, чиї легіони затьмарять самі зірки сонцем та місяцем на їх уніформі. Навіть якщо це потребуватиме певних компромісів у стандартах тренування, це єдиний спосіб убезпечити Нашу імперію."
 EQC_ED_bet_on_elite_units:0 "Ставка на елітні підрозділи"
 EQC_ED_bet_on_elite_units_desc:0 "Наших ворогів буде безліч, і вони завжди будуть численніші за Нас. Шлях подолання Наших ворогів полягає не в тому, щоб перевершити їх у їхніх сильних сторонах, а в тому, щоб зосередитися на Наших власних. Наші солдати будуть вершиною сили, поступаючись лише Нам. Лише тоді Ми зможемо використати їх на повну."
 EQC_ED_royal_bonds:0 "Випустити імперські облігації"
 EQC_ED_royal_bonds_desc:0 "Якимось чином Ми не змогли залучити достатньо фінансування, попри Наші неортодоксальні методи збору грошей. Раніше війни не вимагали таких коштів. Для подальшого фінансування Наших зусиль Ми «заохотимо» наших громадян купувати імперські облігації, які будуть виплачені в майбутньому з відсотками. Можливо."
 EQC_ED_rip_and_tear:0 "§RRip And Tear Until It's Done§!" #!!Скоріш за все, фраза з Doom!!
 EQC_ED_rip_and_tear_desc:0 "Час має вирішальне значення: чим більше Ми витрачаємо на планування, тим більше часу Ми проводимо поза Еквестрією. Ми будемо нищити наших ворогів з люттю та завзяттям, а не мапами з папіром."
 EQC_ED_meticulous_planning:0 "Ретельне планування"
 EQC_ED_meticulous_planning_desc:0 "Війна — не просто битва, це складний танець мільйона різних партнерів. Тільки належним чином координуючи їх усіх, Ми можемо дістатися перемоги."
 EQC_ED_destroying_the_shield:0 "Знищити щит"
 EQC_ED_destroying_the_shield_desc:0 "Наші копита одного дня пройдуть по всій Грифонії, але навіть найвеличніша подорож починається з першого кроку. Нації Карфінії можуть вважати себе в безпеці за своїм союзом, та незабаром Наша міць їх переконає. Об'єднані, розділені — всі падуть однаково."
 EQC_ED_no_crown_but_our_own:0 "Жодних корон, крім Наших власних"
 EQC_ED_no_crown_but_our_own_desc:0 "Ідея про те, що в цьому світі є ще якісь королівські особи, гідні цього титулу, крім Нас, — безглузда. Світ прийме це за істину, а всі, хто бере на себе статус «монарха», стануть на коліна разом з іншими."
 EQC_ED_the_karthinian_conquest:0 "Карфін розбито"
 EQC_ED_the_karthinian_conquest_desc:0 "З поразкою Вінґбардії впало перше доміно на Нашому шляху завоювань. Багатства Південної Грифонії тепер лежать у межах Нашої досяжності, готові до експлуатації та використання для досягнення Наших цілей."
 EQC_ED_divide_the_spoils:0 "Поділ здобичі"
 EQC_ED_divide_the_spoils_desc:0 "Під Наш контроль впали нові багатства та ресурси. Як великодушні правителі, Ми даруємо Наші благословення тим підданим, які довели свою вірність. Нехай усі візьмуть це до уваги і знають, що Ми — добрі правителі, які вміють відповідати піклуванням на вірну службу."
 EQC_ED_demand_their_loyalty:0 "Вимагати їхньої вірності"
 EQC_ED_demand_their_loyalty_desc:0 "Завойовані народи довго поклонялися хибним богам іноземного походження. Це швидко обірветься. Від найнижчого селянина до найзапеклішого атеїста — кожен знатиме, що тепер ними правлять справжні боги."
 EQC_ED_settling_on_a_new_faith:0 "Визначення нової віри"
 EQC_ED_settling_on_a_new_faith_desc:0 "У міру того як Наша імперія росте, слід прийняти рішення щодо того, чого Ми стратегічно уникали: природи Нашої релігії. Варто знайти спосіб пройти по лезу бритви та об'єднати соляризм і найтмеризм так, щоб це поважало обидві половини Нашого правління."
 EQC_ED_pacify_lake_rumare:0 "Умиротворення озера Румер"
 EQC_ED_pacify_lake_rumare_desc:0 "Хоча нації навколо цього нещасного озера не варті поваги, вони існують у стратегічно важливому місці. Озеро Румер буде приборкане і використане як плацдарм для подальших завоювань."
 EQC_ED_our_subjects_now_and_forever:0 "Наші піддані тепер і назавжди"
 EQC_ED_our_subjects_now_and_forever_desc:0 "Кожна істота під Нашим правлінням повинна усвідомити і прийняти реальність того, що тепер вони — Наші піддані на віки вічні. Для тих, хто під Нашим стягом, є лише два варіанти: інтеграція під Наші володіння. Знання про другий варіант — посмертна роскіш."
 EQC_ED_a_stab_at_the_heart_of_griffonkind:0 "Удар в грифонське серце"
 EQC_ED_a_stab_at_the_heart_of_griffonkind_desc:0 "Хоча регіон навколо Грифонстоуна можна назвати, м'яко кажучи, смітником, місто, іронічно, все ще має велике значення для грифонів. Його завоювання покаже силу Нашої справи та легітимність Нашого правління Нашим підданим-грифонам — тим, хто вже під Нашим керівництвом, і тим, у кого все попереду."
 EQC_ED_topple_his_tomb:0 "Скинути його гробницю"
 EQC_ED_topple_his_tomb_desc:0 "Грифони Арантіґи вчинили тяжкий гріх, створивши собі кумира з простого грифона. Вони пізнають помилковість своїх шляхів, але оскільки Ми — милосердні правителі, їм буде дано шанс на спокуту. Після того як Ми знищимо гробницю фальшивого героя, Ми покажемо грифонам, що шанувати слід лише, і ТІЛЬКИ, Нас."
 EQC_ED_destroy_heretical_sites:0 "Єретичні джерела"
 EQC_ED_destroy_heretical_sites_desc:0 "У міру того як Ми закріплюємося на нових землях, знову і знову траплятиметься так, що Ми зустрічатимемо ще більше ідолів хибних богів. Не час вагатися, Ми нищитимемо ці місця за першої ж нагоди, доводячи Нашу божественність і вищість поза всяких сумнівів."
 EQC_ED_pacify_the_east:0 "Пріоритет на схід"
 EQC_ED_pacify_the_east_desc:0 "Поки Грифонія мобілізується в марній спробі зупинити Нашу експансію, стоїть вибір куди спрямувати Наші зусилля. На сході лежать Сікамеон та Астеріон — дві нації, чия географія небезпечніша за їхні армії. Вдаривши по них, Ми зможемо легко просунути Наші власні сили, одночасно убезпечивши більшу частину південного узбережжя Грифонії."
 EQC_ED_no_more_revolutions:0 "Більше жодних революцій"
 EQC_ED_no_more_revolutions_desc:0 "Аквілея залишається грізним ворогом, адже коли вона подолала свої внутрішні негаразди, її сила нічим не обмежена. Не дамо їм більше часу на відновлення і вдаримо негайно. Чим швидше ми змусимо Аквілею схилитися, тим швидше Наші вороги отримають нищівний удар."
 EQC_ED_they_might_have_their_uses:0 "Вони матимуть призначення"
 EQC_ED_they_might_have_their_uses_desc:0 "Хоча бандити Блекрок явно небажаний контингент, вони довели свою вправність у певних сферах, що можуть бути корисними Нам у майбутньому. Ми дамо їм шанс спокутувати свою провину, сіючи хаос у тих землях, які продовжують чинити опір Нашому законному правлінню."
 EQC_ED_death_to_bandits:0 "Смерть бандитам"
 EQC_ED_death_to_bandits_desc:0 "Бандитам не може бути пощади. Не слухайте їхньої брехні: єдина користь від їм подібним — бути добривом для Нашого вівса. Кожен з них буде страчений і кожне мертве тіло буде прикладом для всіх, хто наважиться діяти так само."
 EQC_ED_bringing_order_to_evi:0 "Порядок в Еві"
 EQC_ED_bringing_order_to_evi_desc:0 "Прорвавшись крізь гори Блекголлоу, видкривається долина Еві. Цей регіон не лише багатий на природні ресурси, його сільськогосподарська щедрість не має рівних на всьому континенті. Ці рівнини дозволять Нам розпочати кампанію, швидку як саме світло, на його просторах, привласнивши багатства долини Еві до Наших копит з мінімальними збитками."
 EQC_ED_peripheral_no_longer:0 "Більше не «Периферія»"
 EQC_ED_peripheral_no_longer_desc:0 "Периферія лежить уздовж осі Нашого просування на північ, слугуючи ключовою метою для захоплення, поки Ми продовжуємо Наш наступ. Ми забезпечимо, щоб регіон більше не була вважався «периферією» іншої країни, а натомість був переданий безпосередньо під Наше заступництво."
 EQC_ED_bring_aquileian_ponies_into_the_fold:0 "Залучити аквілейських поні"
 EQC_ED_bring_aquileian_ponies_into_the_fold_desc:0 "В Аквілеї проживає велика популяція поні, які століттями жили пліч-о-пліч з грифонами. Безумовно, Ми можемо залучити їх на Наш шлях і використати їх як сходинку для інтеграції Аквілеї в цілому."
 EQC_ED_integrate_their_economy:0 "Інтегрувати їхню економіку"
 EQC_ED_integrate_their_economy_desc:0 "Аквілейська економіка процвітала, підживлювана власними завоюваннями. Оскільки їхня індустрія тепер лежить у Наших копитах, інтегруємо її. Наслідки процвітання будут направлені службі справі, яка справді має значення: Нашій власній."
 EQC_ED_rescue_the_posniaks:0 "Врятувати Вартай"
 EQC_ED_rescue_the_posniaks_desc:0 "Звістки про геноцид у Лонґсорді досягли Наших вух навіть у Новому Мейрленді. Кожна деталь наповнює Нас праведною люттю. Подумати тільки, що ці варвари наважилися покласти свої пазур на Наших маленьких поні! Ми врятуємо Наших підданих і забезпечимо, щоб жодна істота більше ніколи не завдала їм шкоди."
 EQC_ED_conquering_the_southern_coast:0 "Завоювання південного узбережжя"
 EQC_ED_conquering_the_southern_coast_desc:0 "Південний Схід Грифонії — останній оплот ворожого контролю вздовж Нашого південного берега. Привевши цю область під наш контроль, Ми убезпечимо вигідну позицію Нашому південному флангу від атак з моря, а також розіб'ємо зебр із кумедними ідеями про «гармонію» та «свободу»."
 EQC_ED_only_one_empire_can_stand:0 "Нема місця двом імперіям"
 EQC_ED_only_one_empire_can_stand_desc:0 "Імперія Грифонів — зовсім не імперія. Її розквіт давно минув, вона є остаточним доказом потреби в належному правителі для їхнього роду. Тільки Ми можемо забезпечити це лідерство, під Нашим правлінням роз'єднаність минулого буде змита приливом божественної слави. Ми привласнимо Грифенгайм і раз і назавжди доведемо марність протистояння Нашій могутності."
 EQC_ED_dethrone_the_bankers:0 "Скинути банкірів"
 EQC_ED_dethrone_the_bankers_desc:0 "Скайфолл, пам'ятник гріхам усього роду грифонів, величний ідол їхнього декадансу та жадібності. Ми в'їдемо в цю виразку на тілі світу і очистимо її, знищивши банкірів і принісши нове світло на континент."
 EQC_ED_make_them_bend_to_us:0 "Вони схиляться перед Нами"
 EQC_ED_make_them_bend_to_us_desc:0 "Ми — великодушні правителі Нашим підданим. Проте в обмін на цю турботу вони мають обов'язки для виконання. Посняки ще мають засвоїти цю істину і усвідомити, що платою за їхнє визволення є вічне служіння Нашому слову."
 EQC_ED_erase_local_superstitions:0 "Стерти місцеві забобони"
 EQC_ED_erase_local_superstitions_desc:0 "Здається, посняки все ще відкидають Нашу божественність, безглуздо чіпляючись за свої старі звичаї. Ми більше не терпітимемо цієї образи, адже посняки більше не матимуть інших богів, окрім Нас."
 EQC_ED_last_days_of_the_federation:0 "Останні дні Федерації"
 EQC_ED_last_days_of_the_federation_desc:0 "Можливо, в іншому світі, в іншому часі Річкова Федерація могла б стояти на Нашому боці, цінована за її зусилля в перемозі над фальшивою Імперією. Проте вони вирішили кинути Нам виклик. Вони пізнають свої помилки через Наш гнів. Як вони намагалися наблизити Наш кінець, так само Ми принесемо їхній."
 EQC_ED_yales_research:0 "Єльські дослідження"
 EQC_ED_yales_research_desc:0 "Університети Єля мають велику кількість... цікавих проєктів з великим потенціалом, а також добре налагоджену дослідницьку базу для більш приземлених завдань. Вони будуть служити Нашій волі, поширюючи просвітництво серед тих, кого Ми вважатимемо гідними цього."
 EQC_ED_loot_the_imperial_palace:0 "Рознести Імперський палац"
 EQC_ED_loot_the_imperial_palace_desc:0 "У карфінців була приказка: vae victis. За законами війни переможена сторона залишається на милість переможця, який може брати все, що забажає. Щож, Ми бажаємо розграбувати Імперський палац і захопити все цінне, що там є. Якщо у грифонів є з цим проблеми, вони можуть поридати Борею чи кому там."
 EQC_ED_the_north_must_fall:0 "Північ впаде"
 EQC_ED_the_north_must_fall_desc:0 "Північна Грифонія стала ямою декадансу та політичного активізму. Республіканці та скайнавійці оселилися там, поширюючи свої підступні переконання на решту континенту. Ми змиємо їх у море, показуючи всім іншим, що стається, коли ви виступаєте проти Нашого законного правління."
 EQC_ED_riding_down_the_hill:0 "Спускаючись з пагорбів"
 EQC_ED_riding_down_the_hill_desc:0 "З усіх Наших ворогів немає нікого крихкішого за відсталих поні пагорбів та покинутих чейнджлінґів Ґренекліфа. Проте навіть у цій слабкості Ми не можемо терпіти їхню нікчемність, Наші вороги все одно використали їх як плацдарм проти Нас. Ми захопимо ці землі для Нас самих і покажемо світу, що якою б віддаленою не була країна, у всіх одна доля."
 EQC_ED_no_subject_is_for_sale:0 "Жоден підданий не продається"
 EQC_ED_no_subject_is_for_sale_desc:0 "Рабство... найбільш варварська з інституцій. Сама думка про те, що Наш підданий може бути куплений і проданий як звичайний товар, — безглузда! Чи можна продати цілі міста? Як щодо зірок? Наші піддані належать Нам і Тільки Нам, ніхто інший не заявить права власності на них."
 EQC_ED_a_good_dog_is_a_loyal_dog:0 "Хороший пес — це вірний пес"
 EQC_ED_a_good_dog_is_a_loyal_dog_desc:0 "Пси Бронзгілла здобули чудову репутацію завдяки своїй вірності, тож було б марнотратством ігнорувати це. Ми дамо псам один шанс змінити свою прихильність на користь тих, хто справді заслуговує на поклоніння."
 EQC_ED_secure_the_staging_ground:0 "Захопити плацдарм"
 EQC_ED_secure_the_staging_ground_desc:0 "Розташування Гаукленду посеред §OСелестійського§!/§gМісячного§! моря робить його надзвичайно корисним стратегічно і ключовим для будь-яких зусиль щодо повернення на Наші законні землі в Еквестрії. Якщо Маєр не визнає тих, хто вищий за нього, то, певно, Ми просто видалимо йому крила."
 EQC_ED_the_death_of_republicanism:0 "Смерть республіканізму"
 EQC_ED_the_death_of_republicanism_desc:0 "З падінням колишньої Республіки настав час для винищення республіканізму як ідеї, так і правлячого уряду. Хай дурні кажуть, що ідею неможливо вбити. Якщо жодна сила не змогла до цього — не значить, що не зможемо ми."
 EQC_ED_death_of_the_undead:0 "Смерть нежиті"
 EQC_ED_death_of_the_undead_desc:0 "Навіть коли більша частина Грифонії захоплена, на далекому півночі все ще існує триклята Ліга Жаху. Там процвітає спотворення магії, де некроманти та вампіри називають своїм домом замерзлі пустки. Ми спрямуємо Нашу силу, щоб випалити цю заразу з лиця планети. Наша сила смусить навіть нежить померти вдруге."
 EQC_ED_knowledge_of_the_dead:0 "Знання мертвих"
 EQC_ED_knowledge_of_the_dead_desc:0 "Хмм... шукаючи в їхніх архівах, здається, ніби Ліга Жаху знайшла дещо вартісне у своєму богохульстві. Ми вберемо те небагато цінне у Наші знання, а решту цього проклятого міста залишимо у полум'ях."
 EQC_ED_griffonia_united_under_the_twin_crowns:0 "Грифонія, об'єднана Подвійною Короною"
 EQC_ED_griffonia_united_under_the_twin_crowns_desc:0 "Тепер, коли вся Грифонія схилилася перед Нами, час перед фінальною битвою настав. Готуємо легіони, мобілізуємо інквізиторів, на нас вже чекає слава!"
 EQC_ED_arcturians_no_longer:0 "Аркту... хто?"
 EQC_ED_arcturians_no_longer_desc:0 "Під час своїх нескінченних битв проти Ліги Жаху, Арктурійський Орден довів свою відвагу, хоча й виступав під хибним ідолом. Ми не будемо марнувати їхні таланти і запропонуємо їм місце поруч із Нами. Усе, що їм потрібно зробити, — це прийняти Нашу волю й відкинути власну."
 EQC_ED_preparations_for_the_homecoming:0 "Підготовка до повернення додому"
 EQC_ED_preparations_for_the_homecoming_desc:0 "Час Нашого повернення настав. Хоча Наша перша спроба закінчилася розчаруванням, Ми забезпечимо, щоб друга була успішною. Ми зібрали навколо Себе могутню силу минулих епох. Наші армії нескінченні, Наша промисловість величезна. Безглузда Принцеса та її друзі скоро пізнають Наш гнів. Еквестрія буде Нашою."
 EQC_ED_secure_the_dragon_lands:0 "Підкорити землі драконів"
 EQC_ED_secure_the_dragon_lands_desc:0 "Попри їхню легендарну силу, драконів занадто мало і вони занадто відсталі, щоб зупинити сучасні армії. Ми вберемо їхні острови до Нашої імперії як передову базу проти Еквуса."
 EQC_ED_contact_loyalists:0 "Зв'язатися з лоялістами"
 EQC_ED_contact_loyalists_desc:0 "Навіть з Нашими попередніми закликами до Наших підданих, у Еквусі залишається багато тих, хто не зміг приєднатися до Нас. Навіть це принесе користь, оскільки тепер вони слугуватимуть Нашим авангардом. Нехай вони покажуть себе вірними та відданими Нашому імені."
 EQC_ED_bolster_our_naval_capabilities:0 "Посилити Наші військово-морські можливості"
 EQC_ED_bolster_our_naval_capabilities_desc:0 "Як і в багатьох війнах, Нашим найбільшим ворогом будуть не солдати супротивників, а логістика. Щоб гарантувати, що §OСелестійське§!/§gМісячне§! море стане гладким шляхом для Наших військ, Ми маємо забезпечити панування Нашого флоту по його хвилях."
 EQC_ED_promote_chaos:0 "Посіяти хаос"
 EQC_ED_promote_chaos_desc:0 "Попри зовнішній вигляд єдності, під поверхнею залишаються численні тріщини у фасаді гармонії. Ми вчепимося в них, розриваючи броню Нашого ворога і вливаючись у проломи."
 EQC_ED_around_the_clock:0 "Цілодобово"
 EQC_ED_around_the_clock_desc:0 "Оскільки доленосний день наближається, Ми не можемо дозволити таким безглуздим речам, як «права робітників» та «необхідні перерви для підвищення ефективності», стояти на шляху повернення того, що належить Нам. Піддані беззаперечно служитимуть Нашій волі, присвячуючи себе душею і тілом відвоюванню Нашого права за народженням."
 EQC_ED_taking_back_what_is_ours_by_right:0 "По праву Наше"
 EQC_ED_taking_back_what_is_ours_by_right_desc:0 "Нарешті настав момент Нашого тріумфу. Фальшивих правителів Еквестрії змусять схилитися перед їхніми законними володарями та визнати Наше право. Якщо вони виявлять належне каяття, Ми, можливо, забажаємо знову прийняти їх під Нашу милість."
 EQC_ED_the_great_return:0 "Велике повернення"
 EQC_ED_the_great_return_desc:0 "[EQC_ED_the_great_return_desc_dyn]"
 EQC_ED_the_great_return_desc_normal:0 "Попри спроби протистояти Нам, Ми повернулися до Нашого законного домену. Попри зрадників, як зовнішніх, так і внутрішніх, попри опір Дерева Гармонії та попри те, що Наших власних підданих налаштовували проти Нас, Ми знову стоїмо в Кантерлоті. Доказ Нашої могутності незаперечний, адже сам світ не зміг зупинити Наше повернення!"
 EQC_ED_the_great_return_desc_alternate:0 "Попри спроби протистояти Нам, Ми повернулися до Нашого законного домену... і ми його не пізнаємо. Дерево Гармонії було ослаблене, а набридливі Елементи Гармонії не показувалися від самого початку Нашого вторгнення. Нам слід позбутися останньої невирішеної справи, щоб вона не стала скалкою в Нашому оці."
 EQC_ED_dealing_with_the_malevolent_six:0 "Розправа з Мерзенною Шісткою"
 EQC_ED_dealing_with_the_malevolent_six_desc:0 "Елементи Гармонії не впоралися зі своїми обов'язками. Замість того, щоб захищати країну та залишатися вірними своїм друзям, вони вирішили не коритися Нам і боротися проти Нашого законного правління. Вони будуть покарані, питання лише в тому — як."
 EQC_ED_it_must_go:0 "Воно має зникнути"
 EQC_ED_it_must_go_desc:0 "Дерево Гармонії було скалкою в Нашому боці від самого Нашого появлення. Його спроби заблокувати Нам доступ до Еквестрії непрощенні, і його потрібно позбутися якомога швидше. Тільки тоді Наше правління буде убезпечене від веселих гуртів «справжніх друзів», які в останню мить з повітря отримують підсилення від сили дружби та перемагають Нас."
 EQC_ED_jet_sets_reckoning:0 "Розплата Джет Сета"
 EQC_ED_jet_sets_reckoning_desc:0 "Здається, Наш імперський канцлер не оцінив належним чином надану йому посаду і працював за Нашою спиною зі зрадниками... За це настане розплата, бо жодна істота не зрадить Нас і не втече від правосуддя."
 EQC_ED_after_the_dust_settles:0 "Коли осяде пил"
 EQC_ED_after_the_dust_settles_desc:0 "Ми принесли мир, справедливість і процвітання Нашій новій імперії, але тепер також немає нічого, що тримало б Нас у єдності. Навіть коли пил осідає, на перший план виходить незручне питання: що далі? А точніше, §Rхто?§!"
 EQC_ED_what_we_do_best:0 "Те, що Ми вміємо найкраще"
 EQC_ED_what_we_do_best_desc:0 "Серед тих, хто вірний Нам, здатність будувати розвідувальні мережі була неперевершеною. Замість того щоб покладатися на «добру волю», Ми забезпечимо, щоб кожен із Наших підданих знав, що Ми спостерігаємо, а Наші вороги не мали безпечного місця для збереження таємниць."
 EQC_ED_build_on_the_motherly_image:0 "Плекання материнського образу"
 EQC_ED_build_on_the_motherly_image_desc:0 "Шпигунство — потворна справа, Нам непотрібна. Натомість Ми плекатимемо образ турботливої матері, до якої піддані завжди можуть звернутися. Зрештою, не на страху Ми правили Еквестрією тисячоліття. І звісно, якщо Наші маленькі поні поводитимуться погано, Материнське вухо завжди готове почути їхніх вірних братів та сестер."
 EQC_ED_the_imperial_war_plan:0 "Імперський воєнний план"
 EQC_ED_the_imperial_war_plan_desc:0 "Наші плани підкорити як Грифонію, так і Еквус вимагатимуть величезної трансформації війська Нашої імперії. Вона буде настільки ґрунтовною, що коли Ми закінчимо, колишня армія Нового Мейрленда перетвориться на невпізнанну машину, присвячену Нашій волі."
 EQC_ED_locate_promising_mages:0 "Пошук перспективних магів"
 EQC_ED_locate_promising_mages_desc:0 "З втратою Еквестрії було втрачено і найкращих магів, доступних поні. Але це не означає, що найкращих магів у світі не залишилося — лише те, що Ми втратили тих, кого знали. Грифонія, безсумнівно, має серед своїх мешканців багатьох вправних у магії та охочих служити Нашій справі. А якщо вони не захочуть? Світ ще не бачив ліпших переконавців за Нас."
 EQC_ED_new_training_methods:0 "Нові методи підготовки"
 EQC_ED_new_training_methods_desc:0 "Із впровадженням запаморочливої кількості нових технологій на полі бою за останні десятиліття необхідно, щоб Наші сили могли адаптуватися на ходу. Ми прищепимо їм це під час підготовки, що дозволить їм впроваджувати Нашу волю у вогні та в морозі."
 EQC_ED_followers_of_the_night:0 "Послідовники Ночі"
 EQC_ED_followers_of_the_night_desc:0 "Ніхто не може заперечити, що сили Наших слуг перевершують усі інші, зокрема і не тільки в межах Наших володінь. Ми й надалі зосереджуватимемося на них, вдосконалюючи їхнє спорядження та підготовку. Послідовники Найтмер будуть найкращими воїнами на планеті, чия дисципліна змусить ворога тікати і їм навіть не доведеться йти в лобову атаку на кулеметні гнізда."
 EQC_ED_warriors_of_the_sun:0 "Воїни Сонця"
 EQC_ED_warriors_of_the_sun_desc:0 "У Нашому імперіумі немає нікого настільки відданого, як солдати Дейбрейкер. Замість того щоб дозволити ворогу поглинути Нас, поки Наші «елітні формування» повільно виснажуються, Ми забезпечимо, щоб ворог розбився об Наших солдатів, що ллються вперед, мов сонячне проміння. Через віру та завзяття можливо все."
 EQC_ED_the_need_for_war:0 "Потреба у війні"
 EQC_ED_the_need_for_war_desc:0 "Війна — для чого вона потрібна? Абсолютно для всього. Тільки через війну Ми можемо здобути те, що належить Нам по праву, тільки через війну Ми можемо загартувати Наших підданих. Відмовитися від війни — означає відмовитися від змін, а відмовитися від змін — заохотити застій. Сенс зупинятися, коли Наша влада не має меж?"
 EQC_ED_bravery_will_be_rewarded:0 "Хоробрість буде винагороджена"
 EQC_ED_bravery_will_be_rewarded_desc:0 "Хоча хоробрість в Наше ім'я очікується від усіх, серед смертних є ті, хто докладе більше зусиль, ніж їхні побратими. Ми визнаємо їхні зусилля, обсипаючи їх грошима та медалями на знак визнання їхніх жертв і заохочуючи інших чинити так само."
 EQC_ED_redefining_friendship:0 "Переосмислення дружби"
 EQC_ED_redefining_friendship_desc:0 "Дружба та гармонія є ключовими для самої ідентичності Еквестрії, і Ми не будемо їх забирати. Натомість Ми покажемо їм істину: справжня дружба — це слухати тих, хто хоче для тебе найкращого, тоді як справжня гармонія — це робота пліч-о-пліч з іншими підданими заради злагодженого функціонування суспільства."
 EQC_ED_to_cross_an_ocean:0 "Перетнути океан"
 EQC_ED_to_cross_an_ocean_desc:0 "Похід на Еквус означає перетин моря. Для Нас двох не проблема, але Нашим підданим знадобляться човни. І ці човни мають бути захищені від ворожих кораблів. Таким чином Нам потрібен флот, і флот у Нас буде."
 EQC_ED_everything_for_victory:0 "Все заради перемоги"
 EQC_ED_everything_for_victory_desc:0 "Перемога — Наша головна мета над усіма іншими. Багато інших речей можуть бути бажаними, але без перемоги вони недосяжні. Наші піддані повинні усвідомити це і далі пересягати власні межі заради Наших потреб."
 EQC_ED_to_dominate_the_skies:0 "Панування в небесах"
 EQC_ED_to_dominate_the_skies_desc:0 "Ми знову і знову бачили — і справді були вчителями цього — важливість повітряної сили. Ми не можемо бути всюди одночасно, і тому мусимо покладатися на те, що Наші піддані візьмуть на себе частину роботи. Наші літаки затьмарять небо, дозволяючи Нашій армії та флоту просуватися безперешкодно."
 EQC_ED_the_grand_fleet:0 "Великий флот"
 EQC_ED_the_grand_fleet_desc:0 "Нам потрібні човни, і Нам потрібно багато човнів. Не човни з найбільшими гарматами та найтовстішою бронею, а просто багато човнів. Ми можемо дозволити собі заощадити на якості, зрештою, Ми не плануємо залишатися в морі надовго."
 EQC_ED_focus_on_firepower:0 "Ставка на вогневу міць"
 EQC_ED_focus_on_firepower_desc:0 "Хоча війна на морі — це гра цифр, але не битва мурашиних роїв. Великі кораблі будуть необхідні, щоб змести ворога з води і перемогти їхні лінкори. Коли Наші есмінці можуть бути потоплені ворожим лінкором поза зоною досяжності їхніх гармат, той факт, що їх два десятки, не матиме значення, якщо все, що Нам було потрібно для перемоги — один лінкор."
 EQC_ED_experimental_designs:0 "Експериментальні проєкти"
 EQC_ED_experimental_designs_desc:0 "Війна в повітрі — найновіший театр воєнних дій, тому він постійно розвивається. Ми спиратимемося на це, просуваючи нові проєкти, спираючись на технологічну перевагу. Деякі з них можуть спонтанно вибухнути, коли бак надто спорожніє або поворот буде всього на градус гострішим, ніж треба, але це ціна за 5% збільшення повітряної атаки та 3% межи швидкості й маневреності."
 EQC_ED_keep_to_what_works:0 "Дотримуватися перевіреного"
 EQC_ED_keep_to_what_works_desc:0 "Наші ресурси обмежені і мають витрачатися на перевірені методи. Кожен експеримент — це три літаки, які можна було б побудувати, двоє з яких забирали б з собою по ворогу, а третій повертався б."

## Еквестрійський бік
 EQS_ED_what_now:0 "Що тепер?"
 EQS_ED_what_now_desc:0 "Схоже, ми опинилися в досить скрутному становищі. Принцеси, які правили нами тисячу років, здається, збожеволіли і зараз зайняті закріпленням своєї влади над нашою колишньою колонією, Новим Мейрлендом. Нам потрібно знайти як рухатися уперед, і швидко."
 EQS_ED_visit_the_tree_of_harmony:0 "Відвідати Дерево Гармонії"
 EQS_ED_visit_the_tree_of_harmony_desc:0 "Елементи Гармонії — та Спайк — погодилися сформувати Надзвичайну раду, яка діятиме як новий уряд. Але самі по собі навіть вони мало що можуть зробити. Настав час довіритися стародавньому дереву."
 EQS_ED_calm_the_ponies:0 "Заспокоїти поні"
 EQS_ED_calm_the_ponies_desc:0 "Мабуть, зрозуміло, що поні Еквестрії охопила певна паніка, враховуючи, що дві їх вічні принцеси підвели країну. Але не вся надія втрачена — у нас все ще є третя."
 EQS_ED_a_glimmer_of_hope:0 "Промінь надії"
 EQS_ED_a_glimmer_of_hope_desc:0 "Нарешті відкрився новий шлях уперед. Поні довірилися Елементам, а Дерево Гармонії виграло нам час, якого ми так потребуємо. Тепер ми задіємо всі копита — і завжди пам'ятайте, мої маленькі поні: Дружба — це Магія."
 EQS_ED_gather_friends:0 "Зібрати друзів"
 EQS_ED_gather_friends_desc:0 "Якщо вступати в цей бій поодинці, це безнадійно. Але, на щастя, Елементи Гармонії за ці роки здобули багато друзів і знайомих і готові завести ще більше. Зараз як ніколи треба зібрати наших друзів, щоб ми могли разом протистояти могутньому ворогу."
 EQS_ED_not_over_a_barrel:0 "Не на пороховій бочці"
 EQS_ED_not_over_a_barrel_desc:0 "На південному заході Еквестрії живуть бізони. Хоча в минулому у нас були конфлікти, Елементи Гармонії змогли відновити мир кілька років тому. Тепер часи змінилися, і нам потрібно підтвердити нашу дружбу, щоб справа не вийшла з-під контролю."
 EQS_ED_the_princess_of_love:0 "Принцеса Любові"
 EQS_ED_the_princess_of_love_desc:0 "Хто може бути нам кращими друзями, ніж кришталеві поні? Принцеса Кейденс, Принцеса Любові, править ними вже кілька років разом зі своїм консортом, який також є братом Принцеси Дружби. Нам потрібно підтвердити цю дружбу і переконатися, що вони стоять на нашому боці проти Злої Діархії." #Я не їбу як перекласти husband без натяку на людей
 EQS_ED_help_across_the_ocean:0 "Допомога за океаном"
 EQS_ED_help_across_the_ocean_desc:0 "Далеко к південному сходу, біля берегів Зебрики, розташоване Королівство Гіпогрифія, яким править королева Ново. Відтоді, як ми допомогли їм проти Короля Шторму, вони стали нашими друзями. Хоча вони не на Еквусі, варто було б зв'язатися з ними."
 EQS_ED_to_change_a_changeling:0 "Змінити чейнджлінґа"
 EQS_ED_to_change_a_changeling_desc:0 "Чейнджлінґи були одними з наших найнебезпечніших ворогів, і королева Кризаліс все ще налаштована завоювати наші землі. Настав час Елементам Гармонії вирішити цю проблему раз і назавжди. В глибині душі ми вже знаємо: навіть чейнджлінґ може змінитися. Торакс — найкращий приклад."
 EQS_ED_not_asking_for_trouble:0 "Не шукаючи неприємностей"
 EQS_ED_not_asking_for_trouble_desc:0 "У Як'якстані на півночі від нас назрівають неприємності. Принц Резерфорд і його брат принц Бредфорд опинилися в непримиренному протистоянні. Здається, це термінова проблема дружби, яку потрібно вирішити."
 EQS_ED_secrets_of_the_changelings:0 "Секрети чейнджлінґів"
 EQS_ED_secrets_of_the_changelings_desc:0 "Чейнджлінґи в багатьох аспектах мають свій власний підхід до справ. Вони живуть у тісних вуликах, легше сприймають стрімку індустріалізацію, ніж поні, і показали себе дуже вправними в бою. Було б мудро ретельно зважити, чи можемо ми запозичити деякі з їхніх інновацій."
 EQS_ED_the_north_secured:0 "Північ у безпеці"
 EQS_ED_the_north_secured_desc:0 "На півночі Еквуса представлено багато різних цивілізацій: від оленів Оленії на північному заході до білих ведмедів і пінгвінів на півночі та північному сході відповідно. Нам потрібно знайти з ними спільну мову; зрештою, потворні алікорни становлять для них таку ж загрозу, як і для нас."
 EQS_ED_strength_in_the_polar_soul:0 "Сила полярної душі"
 EQS_ED_strength_in_the_polar_soul_desc:0 "Цивілізації півночі ніколи не знали люблячого правління безсмертної принцеси. Це зробило їх загартованими, дехто навіть сказав би — суворими. Але хіба дрібка суворості не потрібна в ці скрутні часи? Нехай вони навчать нас виживати в дикій природі, нам це цілком може знадобитися."
 EQS_ED_unity_in_diversity:0 "Єдність у різноманітті"
 EQS_ED_unity_in_diversity_desc:0 "На Еквусі так багато видів і так багато цивілізацій. Ми ніколи не мали можливості повністю оцінити це, поки не були змушені відкрити свої серця і розуми, опинившись в облозі сильнішого ворога. Тепер це стане фундаментом нашої перемоги."
 EQS_ED_the_matter_of_severyana:0 "Питання Сєвєряни"
 EQS_ED_the_matter_of_severyana_desc:0 "Сєвєряна. Регіон, що відокремився від нас після революції і сформував Радянську Республіку Сєвєряна, відому в побуті як Сталліонград за назвою столиці. Відносини були натягнутими: вони мріють принести революцію в Еквестрію, а ми щосили намагаємося їх ігнорувати. Але це не може тривати довго — перед обличчям Найтмер Мун та Дейбрейкер нам потрібно стояти разом."
 EQS_ED_the_lost_griffons_of_equus:0 "Заблудлі грифони Еквуса"
 EQS_ED_the_lost_griffons_of_equus_desc:0 "Століття тому Імперія Грифонів, перебуваючи на піку своєї могутності, заснувала колонію Нова-Грифонія на північному сході Еквуса. Тепер Імперія розпалася, а грифони колишньої колонії змушені давати собі раду самостійно. Але враховуючи, що злі діархи роблять з їхніми родичами, ми відправимо їм місію дружби — зрештою, вони знають Грифонію краще за будь-кого з нас."
 EQS_ED_griffon_insights:0 "Грифонська мудрість"
 EQS_ED_griffon_insights_desc:0 "Грифони — напівкоти-напівптахи, і тому здатні літати так само, як пегаси. Проте бойові традиції грифонів і пегасів дуже різняться. Хіба не було б чудово для нас обох, якби ми могли вчитися один у одного? І, можливо, є ще дещо, чого грифони можуть нас навчити."
 EQS_ED_equus_in_harmony:0 "Гармонія в Еквусі"
 EQS_ED_equus_in_harmony_desc:0 "Весь Еквус об'єднався як союзники, партнери та друзі, готуючись до боротьби проти Злої Діархії. Разом ми сильніші, ніж будь-коли раніше, і разом ми переможемо."
 EQS_ED_the_magic_of_friendship:0 "Магія дружби"
 EQS_ED_the_magic_of_friendship_desc:0 "Дружба та гармонія визначали Еквестрію протягом поколінь. Це більше ніж цінності суспільства — це фундамент, на якому побудована нація. І навіть коли колишні найважливіші стовпи гармонії тепер прагнуть її повалити, ми все одно пам'ятаємо про неї. Поки магія дружби зберігається, ніщо не зможе нас зламати."
 EQS_ED_recapitulate_past_adventures:0 "Пригадати минулі пригоди"
 EQS_ED_recapitulate_past_adventures_desc:0 "Елементи Гармонії подорожували Еквестрією і навіть за її межами, завжди допомагаючи істотам знайти компроміс і дружбу. У своїх пригодах вони і самі здобули чимало друзів. Настав час скористатися цими контактами — нам потрібна вся можлива допомога."
 EQS_ED_another_visit_to_the_tree:0 "Ще один візит до Дерева"
 EQS_ED_another_visit_to_the_tree_desc:0 "Дерево Гармонії стало одним із найбільших сюрпризів у цій кризі. Щит, який воно створило — нині названий Щитом Гармонії — захищає нас від негайного гніву спотворених алікорнів, даючи нам вирішальний час для підготовки. Але ми все ще мало розуміємо, що саме робить дерево. Нам потрібно прагнути до глибшого розуміння того, як воно пов'язане з Еквестрією та її поні."
 EQS_ED_star_swirls_library:0 "Бібліотека Стар Свірла"
 EQS_ED_star_swirls_library_desc:0 "Стар Свірл був одним із найвидатніших магів у історії Еквестрії. Його бібліотека, що збереглася в катакомбах замку Кантерлота, містить незліченну скарбницю магічних досліджень."
 EQS_ED_lessons_from_school:0 "Уроки зі школи"
 EQS_ED_lessons_from_school_desc:0 "У нашому пошуку магічних артефактів гарним місцем для початку є Школа Дружби. Свого часу Селестія передала їй кілька магічних артефактів для вивчення студентами. Слід спробувати повернути їх."
 EQS_ED_wisdom_of_other_races:0 "Мудрість інших рас"
 EQS_ED_wisdom_of_other_races_desc:0 "Поні — не єдина раса, яка називає Еквус своїм домом. Від чейнджлінґів до білих ведмедів — усі вони мають власні артефакти з магічною силою."
 EQS_ED_study_the_shield:0 "Вивчити Щит"
 EQS_ED_study_the_shield_desc:0 "Щит, який Дерево Гармонії розгорнуло над Еквестрією, має таємничу природу, як і саме дерево. Нам було б варто вивчити щит докладніше, щоб дізнатися, як найбільш ефективно його зміцнити."
 EQS_ED_legends_lost_to_time:0 "Легенди, втрачені у часі"
 EQS_ED_legends_lost_to_time_desc:0 "У нашій країні все ще є багато артефактів, про які ми можемо знати, але маємо мало інформації про те, де їх знайти. Ретельна оцінка бібліотеки в замку Кантерлота може виявити підказки, які нададуть нам цінні можливості."
 EQS_ED_extraordinary_crystalling:0 "Незвичайний кристаллінґ"
 EQS_ED_extraordinary_crystalling_desc:0 "Зазвичай кристаллінґ — це церемонія, за якою новонародженого приймають до Кристальної Імперії. Однак цього разу ми хочемо зібрати кристальних поні для іншого виду кристаллінґ, під час якого ми спробуємо використати енергію Кристального Серця для зміцнення Щита Гармонії."
 EQS_ED_artifacts_of_power:0 "Артефакти могутності"
 EQS_ED_artifacts_of_power_desc:0 "Зібрані нами артефакти демонструють велику силу. Демонструвати їхню міць ризиковано, але це допоможе нам підтримувати надію на те, що ми зможемо перемогти Злу Діархію."
 EQS_ED_spell_training:0 "Магічна підготовка"
 EQS_ED_spell_training_desc:0 "Томи та манускрипти, які ми виявили та проаналізували як у бібліотеці Стар Свірла, так і в бібліотеці замку Кантерлот, виявили не лише натяки на артефакти чи теоретичні дискусії про природу магії, а й різноманітні заклинання з потенційним військовим застосуванням. Нам слід оновити підготовку наших магічних рот, включивши ці заклинання."
 EQS_ED_a_flurry_of_ideas:0 "Шквал ідей" #Тут був твіст із Flurry of ideas, не знаю як його передати
 EQS_ED_a_flurry_of_ideas_desc:0 "Кейденс, Шайнінґ Армор та Фларрі Гарт нарешті відвідують Еквестрію. Твайлайт була несказанно рада провести час зі своєю племінницею, і хто знає, можливо, з цього вийдуть хороші ідеї."
 EQS_ED_the_power_of_alicorn_magic:0 "Сила магії алікорнів"
 EQS_ED_the_power_of_alicorn_magic_desc:0 "Дейбрейкер та Найтмер Мун широко використовують свої могутні магічні здібності алікорнів. Проте це не означає, що ми беззахисні: з Твайлайт Спаркл, Кейденс та Фларрі Гарт у нас є три алікорни проти двох на нашу користь. Хоча ми ніколи не вдамося до їхніх проклятих методів, наша магія все одно залишається сильною."
 EQS_ED_taming_the_flow:0 "Приборкання потоку"
 EQS_ED_taming_the_flow_desc:0 "Магія зібраних нами артефактів спрямовується досвідченими магами на підтримку Щита Гармонії. Проте ця сила часом дика і некерована, як і слід було очікувати від деяких найпотужніших об'єктів в історії Еквестрії. Нам слід зосередитися на приборканні потоку енергії, щоб зменшити ризики та убезпечити стабільність."
 EQS_ED_their_magic_and_ours:0 "Їхня магія і наша"
 EQS_ED_their_magic_and_ours_desc:0 "За океаном Зла Діархія віддається забороненим сферам магії, несучи руйнування, смерть і відчай зневіреному та наляканому населенню. Але ми доведемо, що магія не є злом, нею може бути лише її володар. Прийдешня війна буде війною магії й ми зустрінемо їх підготовленими."
 EQS_ED_slowing_them_down:0 "Уповільнити їх"
 EQS_ED_slowing_them_down_desc:0 "«Кондомініум», заснований Дейбрейкер та Найтмер Мун, становить серйозну загрозу для Еквестрії. Але поки що вони зосереджені на завоюванні Грифонії, щоб знайти артефакти, за допомогою яких зможуть прорвати наш щит. Можливо, ми могли б дещо ускладнити їхнє завдання..."
 EQS_ED_refugees_from_new_mareland:0 "Біженці з Нового Мейрленда"
 EQS_ED_refugees_from_new_mareland_desc:0 "Коли дві сестри захопили колишню колонію Новий Мейрленд, не всі поні були задоволені новим урядом, це м’яко кажучи. Хоча вони нещадно придушували будь-який опір, деяким поні вдалося втекти до Еквестрії."
 EQS_ED_our_most_valuable_asset:0 "Наш найцінніший актив"
 EQS_ED_our_most_valuable_asset_desc:0 "Джет Сет раніше зв’язувався з Рейвен Інквелл, щоб запитати, як поводитися з королівськими алікорнами. Саме він також попередив нас про пошук артефактів. Але тепер здається, що він готовий піти набагато далі."
 EQS_ED_contact_the_griffons:0 "Зв'язатися з грифонами"
 EQS_ED_contact_the_griffons_desc:0 "Якщо ми хочемо викрасти артефакти з-під носа злих сестер, було б мудро зв'язатися з націями грифонів, які ще не були підкорені — поки вони ще існують."
 EQS_ED_securing_the_artefacts:0 "Убезпечення артефактів"
 EQS_ED_securing_the_artefacts_desc:0 "Якщо ми зосередимося на нашій логістиці та наймемо ще кілька дослідників для підготовки експедицій, ми зможемо організовувати більше розкопок одночасно."
 EQS_ED_tricking_the_omniscient:0 "Обманути всезнаючих"
 EQS_ED_tricking_the_omniscient_desc:0 "Злі діархи небезпечно близько підійшли до викриття Джет Сета як подвійного агента. Проте він має кілька прикритих трюків, здатних розвіяти їхню недовіру. На жаль, він не зможе замести всі сліди, тому в майбутньому йому слід бути обережнішим."
 EQS_ED_emergency_diplomacy:0 "Екстрена дипломатія"
 EQS_ED_emergency_diplomacy_desc:0 "За допомогою ретельно використаної дипломатичної підтримки ми можемо зміцнити рішучість націй грифонів, що борються проти Злої Діархії. Ефект, швидше за все, залишиться обмеженим, але кожна дрібниця допоможе."
 EQS_ED_digging_up_the_history:0 "Розкопуючи історію"
 EQS_ED_digging_up_the_history_desc:0 "Щоб підвищити шанси на успіх розкопок у Грифонії, першорядне значення має належна підготовка. Завдяки незначним змінам у способі організації розкопок ми зможемо задіяти більше ресурсів заздалегідь для кращих результатів."
 EQS_ED_the_diplomat_archaelogist:0 "Дипломат-археолог"
 EQS_ED_the_diplomat_archaelogist_desc:0 "Старий «друг» Дерінґ Ду міг би очолити розкопки майже так само добре, як і вона особисто, а також надати додаткові контакти в Грифонії. Здається, вона вже має відносно гарне уявлення про те, де його знайти."
 EQS_ED_foreign_artifact_studies:0 "Вивчення іноземних артефактів"
 EQS_ED_foreign_artifact_studies_desc:0 "Коли спалахне війна з піднесеними сестрами, вони будуть не єдиними нашими ворогами — фактично, вони командуватимуть багатьма солдатами-грифонами. Було б добре дізнатися більше про їхню магію, і для початку найліпшим варіантом стануть самі артефакти з Грифонії."
 EQS_ED_perfectly_measured_chaos:0 "Ідеально відміряна доза хаосу"
 EQS_ED_perfectly_measured_chaos_desc:0 "Нашою метою не може бути повалення Діархії зсередини або навіть серйозне порушення роботи їхнього уряду. Загроза того, що сестри обернуться проти Джет Сета або, що ще гірше, одна проти одної, занадто велика. Але деякі промахи тут і там можна запросто приховати у звичному хаосі управління."
 EQS_ED_the_precarious_balance:0 "Хиткий баланс"
 EQS_ED_the_precarious_balance_desc:0 "Диверсії, які ми здійснюємо, повинні постійно дотримуватися правильного балансу. Вони мають бути ефективними, але не настільки серйозними, щоб викликати велику підозру. На щастя, з часом Джет Сет дедалі краще дізнається, що йому може зійти з копит."
 EQS_ED_harmless_tomfoolery:0 "Нешкідливі витівки"
 EQS_ED_harmless_tomfoolery_desc:0 "Коли ми не можемо отримати артефакт негайно, нам просто потрібно спробувати ще раз. Головне — не втрачати правильний настрій, гаразд?"
 EQS_ED_it_is_not_grave_robbing:0 "Це не просто розграбування могил..."
 EQS_ED_it_is_not_grave_robbing_desc:0 "...це лише незручний збіг обставин, що команди розкопок мають певну схожість із розкрадачами могил. Звісно, ми — хороші хлопці, які рятують історичні артефакти від тих, хто міг би ними зловживати. Але, можливо, ми можемо дечому повчитися у справжніх розкрадачів могил — насамперед тому, як належним чином убезпечити місію."
 EQS_ED_expand_our_operations:0 "Розширити наші операції"
 EQS_ED_expand_our_operations_desc:0 "Розширення нашої логістики вдома, а також прокладання кращих маршрутів до Грифонії дозволило б нам швидше спробувати щастя ще раз у разі невдачі."
 EQS_ED_prepare_the_army:0 "Підготувати армію"
 EQS_ED_prepare_the_army_desc:0 "Після століть переважно церемоніальної ролі еквестрійська армія перебуває у жалюгідному стані. Хоча після Кантерлотського весілля були вжиті кроки для відновлення професійного війська, зараз ситуація стала нескінченно гострішою. Якщо ми хочемо зустріти сили Злої Діархії на рівних, повна переоцінка неминуча."
 EQS_ED_weather_magic:0 "Магія погоди"
 EQS_ED_weather_magic_desc:0 "Магія маніпуляції погодою є невід'ємною частиною культури пегасів. Погода регулярно коригується експертами-пегасами для найрізноманітніших цілей — і, враховуючи поточні обставини, військові цілі будуть додані до цього довгого списку."
 EQS_ED_denying_them_sight:0 "Позбавити їх зору"
 EQS_ED_denying_them_sight_desc:0 "Кожна битва покладається на розвідку або, для захисника, на позбавлення ворога згаданої розвідки. За допомогою магії погоди ми можемо піти на крок далі — вони нічого не побачать крізь наші густі хмари."
 EQS_ED_rain_on_their_parade:0 "Зіпсувати їм свято"
 EQS_ED_rain_on_their_parade_desc:0 "Багато речей у бою залежать від правильної погоди. Чимало армій загрузли в багнюці, щоб потім бути знищеними ворогами. За допомогою керованих маніпуляцій погодою ми можемо змінити умови бою на нашу користь."
 EQS_ED_wonderbolts_new_job:0 "Нова робота для Вандерболтів"
 EQS_ED_wonderbolts_new_job_desc:0 "Одним із небагатьох військових активів, які ми справді маємо, є Вандерболти — досвідчені літуни та маніпулятори погодою. Рейнбоу Деш — сама досвідчена з них — запропонувала план найбільш ефективного використання їхніх талантів."
 EQS_ED_new_fighter_projects:0 "Проєкти нових винищувачів"
 EQS_ED_new_fighter_projects_desc:0 "Навіть найталановитіші пегаси не заперечуватимуть, що літаки є важливою частиною пазла сучасної війни. Хоча вони не замінять пегасів повністю, захист і вогнева міць, які пропонують ці машини, роблять надзвичайно важливим їх виробництво в промислових масштабах."
 EQS_ED_heavy_plane_construction:0 "Будівництво важких літаків"
 EQS_ED_heavy_plane_construction_desc:0 "Важкі літаки можуть літати на великі відстані і нести велику кількість боєзаряду, що робить їх грізним активом, здатним загрожувати серцю ворожої території. Інвестування у відповідні дослідницькі проєкти відкриє ряд можливостей для наших ВПС."
 EQS_ED_the_hoof_troops:0 "Наземно-копитні війська"
 EQS_ED_the_hoof_troops_desc:0 "Основну частину нашої армії неминуче складатимуть піхотні сили. Забезпечення належної підготовки та спорядження життєво важливе, якщо вони мають дати найкращий бій."
 EQS_ED_the_magic_of_rifles:0 "Магія гвинтівок"
 EQS_ED_the_magic_of_rifles_desc:0 "Магія вогневої міці — на щастя, як могли б сказати деякі — не відігравала великої ролі в минулому. Проте прийдешня війна, ймовірно, це змінить. Гвинтівки, які стріляють заклинаннями замість куль, можуть бути такими ж смертоносними. Нам ліпше ставитися до цього серйозно."
 EQS_ED_artillery_advances:0 "Артилерійський прогрес"
 EQS_ED_artillery_advances_desc:0 "Артилерія є основою сучасного поля бою. «Снаряди, а не поні» — гасло часу. Без найсучаснішої артилерії наші війська приречені на великі непотрібні втрати, тому дослідження в цій галузі настійно рекомендуються."
 EQS_ED_supercharge_rifle_development:0 "Прискорити розробку гвинтівок"
 EQS_ED_supercharge_rifle_development_desc:0 "Наразі магічне спорядження все ще перебуває на ранніх стадіях розробки. Нам потрібно якнайшвидше просунутися далі поточної ітерації."
 EQS_ED_harshwhinnys_ideas:0 "Ідеї пані Гаршвінні"
 EQS_ED_harshwhinnys_ideas_desc:0 "Пані Гаршвінні зазвичай очолює Еквестрійські ігри — спортивні змагання, в яких беруть участь різні команди з усієї Еквестрії та навіть інших країн. Але як і для інших, її життя нещодавно перевернулося з ніг на голову — проте вона була дещо краще підготовлена за більшість. Інженер-танкіст самоучка, вона стала найпалкішим прихильником впровадження бронетанкової війни."
 EQS_ED_taming_the_metal:0 "Приборкання металу"
 EQS_ED_taming_the_metal_desc:0 "Масове виробництво танків вимагає не менш масових робіт з металом та зварювання. Застосування певних заклинань, які можуть плавити та формувати метали, може допомогти нам скоротити час роботи та покращити якість."
 EQS_ED_fast_and_furious:0 "Швидкі й люті"
 EQS_ED_fast_and_furious_desc:0 "Чимало частин армії можуть виграти від моторизації. Не лише піхота сама по собі стає набагато кориснішою, а й різні допоміжні операції, а також логістика потребують вантажівок для належного функціонування."
 EQS_ED_crystalline_shells:0 "Кристалічні снаряди"
 EQS_ED_crystalline_shells_desc:0 "Навіть артилерійські снаряди можна магічно вдосконалити для швидшої перезарядки, більшої вибухової сили при ударі, а також здатності дуже ефективно пробивати ворожу броню. На жаль, для цього нам знадобиться велика кількість магічних кристалів."
 EQS_ED_stopping_their_advances:0 "Зупинити їхній наступ"
 EQS_ED_stopping_their_advances_desc:0 "Прикра реальність полягає в тому, що наш ворог, швидше за все, матиме переважаючі сили, принаймні спочатку. Вкрай важливо підготувати наші позиції якомога ефективніше, щоб ми могли знекровити їх під час наступу."
 EQS_ED_terrors_of_the_battlefield:0 "Жахи поля бою"
 EQS_ED_terrors_of_the_battlefield_desc:0 "Подальші дослідження виявили ще більше способів вдосконалення снарядів та боєприпасів з використанням кристалів."
 EQS_ED_combined_arms_doctrine:0 "Доктрина взаємодії родів військ"
 EQS_ED_combined_arms_doctrine_desc:0 "Усі збройні сили повинні бути належним чином скоординовані, щоб реалізувати свій потенціал повною мірою."
 EQS_ED_the_mobile_war:0 "Мобільна війна"
 EQS_ED_the_mobile_war_desc:0 "Мобільна армія — це універсальна армія. Обхід з флангів та оточення ворога є найефективнішим способом знищення його військового потенціалу. Зосередження на виробництві вантажівок та механізованих підрозділів у поєднанні з танковою війною дасть нам ці можливості для швидких ударів."
 EQS_ED_superiority_in_movement:0 "Перевага у русі"
 EQS_ED_superiority_in_movement_desc:0 "Навіть із усім спорядженням світу, зрештою саме від наших командирів залежить, як максимально ефективно його використати. Ми будемо навчати їх маневреній війні, а також надамо необхідну свободу для прийняття рішень на полі бою на свій розсуд, щоб зробити нашу армію гнучкою та чутливою до будь-яких дій ворога."
 EQS_ED_our_first_line_of_defense:0 "Наша перша лінія оборони"
 EQS_ED_our_first_line_of_defense_desc:0 "Еквус відділений від Грифонії океаном, і перш ніж будь-які сили Злої Діархії зможуть висадитися тут, їм спочатку потрібно буде перетнути цей океан. Ми могли б справити величезний вплив, зробивши це максимально складним для них і постійно перериваючи їхні морські шляхи постачання."
 EQS_ED_island_defence:0 "Оборона островів"
 EQS_ED_island_defence_desc:0 "Маленькі острови важко захищати, але так само важко атакувати. Однак, щойно ви ними володієте, вони стають цінними військово-морськими базами та передовими постами для атаки. Ми маємо переконатися, що ворогу буде важко відібрати їх у нас."
 EQS_ED_repurpose_civilian_boats:0 "Переобладнати цивільні човни"
 EQS_ED_repurpose_civilian_boats_desc:0 "Еквестрія ніколи не мала великого флоту, і хоча ми побудували кілька військових кораблів за останні роки, цього буде недостатньо. Нам потрібно переобладнати те, що у нас є, і навіть використати частину цивільного торгового флоту, якщо ми хочемо конкурувати."
 EQS_ED_dockyard_expansion_plan:0 "План розширення верфей"
 EQS_ED_dockyard_expansion_plan_desc:0 "Більше верфей означає більше кораблів, а більше кораблів для нас означає менше ворожих солдатів, що висадяться на наші береги."
 EQS_ED_forward_defence:0 "Передова оборона"
 EQS_ED_forward_defence_desc:0 "Підручники зі стратегії для наших бойових штабів сильно застаріли і не пристосовані до сучасної війні, що спостерігалася останніми роками. Ми складемо оновлену версію для розповсюдження серед нашого військово-морського командування."
 EQS_ED_unify_the_navcom:0 "Об'єднати Навком"
 EQS_ED_unify_the_navcom_desc:0 "Структури морського командування перебувають у безладі через роки перетинання компетенцій та приєднання додаткових підрозділів без фундаментальної реформи. Нам потрібно буде перевпорядкувати та об'єднати наше морське командування."
 EQS_ED_bits_of_victory:0 "Біти перемоги"
 EQS_ED_bits_of_victory_desc:0 "Якщо ми хочемо перемогти у майбутній війні, необхідні глибокі економічні реформи. Хоча ми можемо пишатися тим, що є лідерами в промислових інноваціях, наша індустрія погано взаємопов'язана, неефективна і майже повністю орієнтована на мирне цивільне виробництво."
 EQS_ED_emergency_industrialisation:0 "Надзвичайна індустріалізація"
 EQS_ED_emergency_industrialisation_desc:0 "Війна не чекає на нерішучих. Нам потрібно стрімко розширювати наші промислові можливості, і тому розгалужена нормативна база, що нині перешкоджає будівництву нових фабрик, має бути ретельно переглянута."
 EQS_ED_the_fluttershy_plan:0 "План Флаттершай"
 EQS_ED_the_fluttershy_plan_desc:0 "Століттями поні жили в гармонії з природою. Було б прикро, якби ми нічому не навчилися за цей час. Як член Надзвичайної ради Флаттершай запропонувала зовсім інший підхід до забудови всього навколо фабриками."
 EQS_ED_lessons_from_the_coast:0 "Уроки з узбережжя"
 EQS_ED_lessons_from_the_coast_desc:0 "Прибережні регіони, такі як Балтимейр, Мейнгеттен або Лас-Пегас, довгий час були промисловими центрами Еквестрії, тоді як внутрішні райони залишалися більш сільськими та традиційними. Тепер нам потрібно розширити їхню «спеціалізацію» якомога швидше."
 EQS_ED_rethink_the_cutiemark_system:0 "Переосмислити систему к'ютімарок"
 EQS_ED_rethink_the_cutiemark_system_desc:0 "Система к'ютімарок протрималася століттями і гарантувала, що поні можуть отримати роботу, яка їм підходить. Однак потреби промисловості змінюються. Нам слід подумати про пом'якшення системи к'ютімарок і заохочення поні дивитися за межі своїх основних навичок."
 EQS_ED_magic_makes_industry:0 "Магія створює індустрію"
 EQS_ED_magic_makes_industry_desc:0 "Значна частина нашої промисловості базується на магії, якою ми володіємо як поні. Саме вона формує нас і наш підхід до справ."
 EQS_ED_the_needs_of_modernity:0 "Потреби сучасності"
 EQS_ED_the_needs_of_modernity_desc:0 "Військова промисловість — це монстр, який пожирає величезну кількість ресурсів: нафту, руду, ліс тощо. На жаль, ми мусимо годувати цього монстра, щоб усі ми не постраждали від наслідків гірших монстрів."
 EQS_ED_nature_provides:0 "Природа забезпечує"
 EQS_ED_nature_provides_desc:0 "Хоча деяких фабрик не уникнути, так багато наших потреб — навіть військових — уже можна знайти в природі, якщо знати, де шукати."
 EQS_ED_its_not_foraging:0 "Це не збиральництво"
 EQS_ED_its_not_foraging_desc:0 "Ми провели останні кілька століть, дружачи з усіма тваринами, великими і малими. Якщо ми йдемо в ліс, ми не займаємося збиральництвом, а знаходимо те, що наші друзі залишили для нас, і пускаємо це в дію."
 EQS_ED_secrets_of_the_everfree:0 "Секрети Вічнодикого лісу"
 EQS_ED_secrets_of_the_everfree_desc:0 "Вічнодикий ліс — одне з найбільш магічних місць в Еквестрії, наповнене незліченними секретами. Там також розташований Замок Двох Сестер, що зберігає стародавні знання. Нам просто потрібно піти і подивитися."
 EQS_ED_kindness_creates_kindness:0 "Доброта породжує доброту"
 EQS_ED_kindness_creates_kindness_desc:0 "Доброта — це більше ніж моральний принцип, це фундамент співпраці. Вона створює основу, на якій ми всі можемо взаємодіяти: якщо ми замислимося над тим, що це дасть кожному з нас, ми всі отримаємо більше в результаті."
 EQS_ED_pacifist_no_more:0 "Більше не пацифісти"
 EQS_ED_pacifist_no_more_desc:0 "Еквестрія — нація гармонії, і як наслідок, війна була чужою для наших земель протягом століть. У минулому ми вирішували наші проблеми, показуючи ворогам помилковість їхніх шляхів, або, якщо це не допомагало, силами Елементів Гармонії. Проте цього разу цього недостатньо."
 EQS_ED_new_armouries:0 "Нові збройові майстерні"
 EQS_ED_new_armouries_desc:0 "Нам потрібно більше збройових майстерень, щоб належним чином екіпірувати наших солдатів для майбутньої війни."
 EQS_ED_repurpose_what_we_have:0 "Перепрофілювати те, що маємо"
 EQS_ED_repurpose_what_we_have_desc:0 "Щоб прискорити нарощування військової міці, нам потрібно перепрофілювати існуючу індустрію, переорієнтувавши її на виробництво військового спорядження. Це, на жаль, станеться за рахунок довгострокового процвітання, але завоювання також не сприяє добробуту."
 EQS_ED_the_necessary_evil:0 "Необхідне зло"
 EQS_ED_the_necessary_evil_desc:0 "Відчайдушні часи ведуть до радикальних заходів. Розробка ядерно-магічної зброї є таким заходом, але якщо війна піде погано, вона може виявитися необхідною."

#### Рішення & категорії рішень
 ED_artefacts_mechanic:0 "Пошук артефактів"
 ED_artefacts_mechanic_desc:0 "По всьому світу існують §Yмогутні артефакти§!, що володіють §0арканною магією§!. Могутній маг може використати цю силу для зміцнення власної магії — саме це §YДейбрейкер та Найтмер Мун§! планують зробити, щоб подолати §PЩит Гармонії§!, що захищає Еквестрію.\n\nЗавойовуйте держави Грифонії, щоб з ними §Gзахопити приховані там артефакти§!. Як тільки ви досягнете §Y10 000 одиниць магічної сили§!, відкриється фокус на атаку Еквестрії. Але будьте обережні: еквестрійці §Rне гають часу на підготовку§!, тому вам слід §Cзібрати якомога більше магічної сили§!..."
 EQS_ED_artefacts_mechanic:0 "Пошук артефактів"
 EQS_ED_artefacts_mechanic_desc:0 "По всьому світу існують §Yпотужні артефакти§!, що володіють §0арканною магією§!. Могутній маг може використати цю силу для зміцнення власної магії — саме це §YДейбрейкер та Найтмер Мун§! планують зробити, щоб подолати §PЩит Гармонії§!, що захищає Еквестрію. У відповідь Надзвичайна рада вирішила §Yтакож збирати артефакти§! у надії §Gпротистояти§! амбіціям Злих Діархів.\n\nШукайте артефакти в Еквестрії та за її межами і накопичуйте якомога більше магічної сили. Коли спотворені алікорни неминуче нападуть, здатність §Yпротидіяти§! їхній магії виявиться неоціненною — §Gчим більше сили, тим краще§!.\n\nНаразі ми можемо проводити §Y[?ROOT.max_excavation_projects]§! проєкт(ів) розкопок одночасно, з яких ми зараз виконуємо §Y[?ROOT.current_excavation_projects]§!.\n\n[EQS_ED_artefact_research_dyn]"
 EQS_ED_artefact_research_desc:0 "§YДослідження артефактів§! активовано. Почніть вивчення артефакту, натиснувши на нього. Кожен артефакт можна дослідити лише один раз."

