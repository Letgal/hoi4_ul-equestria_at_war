 art_EQC_actual_artifact_desc:0 "Теж статуя. Ця якась покручена (як це взагалі можливо?)"
 # Еквестрійські артефакти
 EQS_shard_of_transformation_artefact:0 "Осколок перетворення"
 art_EQS_shard_of_transformation_artefact_desc:0 "Осколок Перлини перетворення. Принцеса Скайстар надіслала його, щоб допомогти нашим зусиллям у перемозі над Злою Діархією."
 EQS_journal_of_the_two_sisters_artefact:0 "Щоденник Двох Сестер"
 art_EQS_journal_of_the_two_sisters_artefact_desc:0 "Щоденник Двох Сестер оповідає про часи до першого повстання Найтмер Мун, слугуючи натхненням для всіх, хто досі вірить у гармонію. Він також містить детальні описи Вічнодикого лісу та Замку Двох Сестер."
 EQS_star_swirls_hat_artefact:0 "Капелюх Стар Свірла"
 art_EQS_star_swirls_hat_artefact_desc:0 "Капелюх Стар Свірла Бородатого, одного з найвідоміших магів Еквестрії. Вважається, що дзвіночки на цьому капелюсі зберігають частину його магічної сили."
 EQS_yickslurs_helm_artefact:0 "Шолом Їкслура"
 art_EQS_yickslurs_helm_artefact_desc:0 "Їкслур був великим і почесним воїном-яком, який жив багато століть тому. Його шолом перейшов у власність принцеси Селестії, яка зберігала його в Школі Дружби."
 EQS_knuckerbockers_shell_artefact:0 "Мушля Накербокера"
 art_EQS_knuckerbockers_shell_artefact_desc:0 "У минулих легендах ця мушля могла прикликати могутнього дракона на ім'я Накербокер. Хоча вона втратила цю здатність, залишки колись використаного закляття все ще жевріють у ній."
 EQS_auroras_amulet_artefact:0 "Амулет Аврори"
 art_EQS_auroras_amulet_artefact_desc:0 "Може викликати цунамі. Використовувати з обережністю."
 EQS_grovers_crown_artefact:0 "Корона Ґровера"
 art_EQS_grovers_crown_artefact_desc:0 "Не плутати з Райхскроною — це була корона Ґровера I як короля Грифонстоуна. Незрозуміло, як вона опинилася в Школі Дружби, але факт фактом."
 EQS_talisman_of_mirage_artefact: "Талісман Міражу"
 art_EQS_talisman_of_mirage_artefact_desc:0 "Захищає свого власника від давнього прокляття. На жаль, саме прокляття вже давно забуте."
 EQS_clover_the_clevers_cloak_artefact:0 "Плащ Кловера Премудрого"
 art_EQS_clover_the_clevers_cloak_artefact_desc:0 "Кловер Премудрий був одним із міфічних засновників Еквестрії та єдинорогом великої мудрості. Щоб вшанувати його спадщину, його плащ було збережено, і попри поважний вік, він виглядає так само добре, як щойно витканий."
 EQS_rings_of_scorchero_artefact:0 "Кільця Скорчеро"
 art_EQS_rings_of_scorchero_artefact_desc:0 "Кільця Скорчеро походять із піраміди Нейуатля, де проклятий Ауїзотль намагався використати їх, щоб полонити сонце."
 EQS_truth_talisman_of_tonatiuh_artefact:0 "Талісман істини Тонатіу"
 art_EQS_truth_talisman_of_tonatiuh_artefact_desc:0 "Істина несе важкий тягар. Цей артефакт допоможе вам знайти її, але поміркуйте, чи справді ви до цього готові."
 EQS_horn_of_the_abada_artefact:0 "Ріг Абади"
 art_EQS_horn_of_the_abada_artefact_desc:0 "Цей ріг походить від шляхетної раси єдинорогів під назвою Абада. Вони давно зникли — так давно, що навіть легенди ледь згадують про них. Але цей вцілілий ріг усе ще несе в собі частки колись могутньої магії."
 EQS_silver_shawl_of_shadows_artefact:0 "Срібна шаль тіней"
 art_EQS_silver_shawl_of_shadows_artefact_desc:0 "Проклята шаль, яка дозволяє зникати з-перед очей, але ціною є те, що тривале використання призведе до випотрошення вашого розуму. Точна магія, закладена в ній, усе ще досліджується."
 EQS_crystal_heart_artefact:0 "Кристальне Серце"
 art_EQS_crystal_heart_artefact_desc:0 "Кристальне Серце було підключене до Щита Гармонії під час урочистої церемонії кристаллінґу. Хоча воно саме залишається в Кристальній Імперії, тепер воно дарує своє тепло всім, хто бореться за гармонію."
 EQS_chrysalis_throne_artefact:0 "Трон Кризаліс"
 art_EQS_chrysalis_throne_artefact_desc:0 "Ох, як пали могутні. Колись це був всемогутній трон Кризаліс, що використовувався для поглинання всієї магії навколо, окрім чейнджлінзької. Тепер, ретельно ізольований, щоб заблокувати ефект поглинання магії, він став одним із багатьох артефактів, що служать гармонії."
 EQS_starsteel_armour_suit_artefact:0 "Обладунок із зоряної сталі"
 art_EQS_starsteel_armour_suit_artefact_desc:0 "Колись давно, коли монстри блукали землями, а ведмеді були більшими та менш скутими цивілізацією, легендарні обладунки, подібні до цього, виготовлялися з магічної зоряної сталі. Тепер вони служать переважно музейними експонатами, будучи занадто великими навіть для наймогутніших ведмедів, але вони все ще втілюють полярну душу."
 EQS_ceremonial_pipe_artefact:0 "Церемоніальна люлька"
 art_EQS_ceremonial_pipe_artefact_desc:0 "Також відома як «Люлька миру». Ці магічні люльки використовуються бізонами під час спілкування з богами, а також при веденні важливих справ. Усі, хто вдихає дим цих люльок, стають зв'язаними своїм словом."
 # Грифонські артефакти
 EQC_scepter_of_arantigos_artefact:0 "Скіпетр Арантіґоса"
 art_EQC_scepter_of_arantigos_artefact_desc:0 "Протягом тисячі років цей скіпетр спочивав у гробниці Арантіґоса, будучи єдиною річчю, похованою разом із ним. Невже в цьому світі більше не залишилося нічого святого?"
 EQC_reichskrone_artefact:0 "Рейхскрона"
 art_EQC_reichskrone_artefact_desc:0 "Корона грифонських імператорів з часів Ґровера I. Вона яскраво сяє, оздоблена безліччю барвистих самоцвітів."
 EQC_elixir_of_life_artefact:0 "Еліксир життя"
 art_EQC_elixir_of_life_artefact_desc:0 "Дивна пляшка, знайдена в катакомбах великих архівів Ґамії. Напис на ній стверджує, що еліксир може повертати мертвих до життя, але, судячи з усього, ним досі ніхто не скористався."
 EQC_griffichronicon_artefact:0 "Грифіхронікон"
 art_EQC_griffichronicon_artefact_desc:0 "Спочатку написаний жерцями-самітниками в Соларспайку, цей стародавній фоліант про історію грифонячого роду був привезений до Грифенгайму Ґровером I."
 EQC_sword_of_grover_ii_artefact:0 "Меч Ґровера II"
 art_EQC_sword_of_grover_ii_artefact_desc:0 "Цей шляхетний меч був викуваний псами Бронзгіллу для свого рятівника. Кажуть, що Тесса Даймондшилд, прапрабабуся Ровера, прокляла їх за повстання проти законного господаря та сородича, але бронзгілльці стверджують: «Єдине благоговіння йде від прокляття тирана»."
 EQC_idol_of_maar_artefact:0 "Ідол Маара"
 art_EQC_idol_of_maar_artefact_desc:0 "Кажуть, що жоден порядний грифон ніколи б не створив ідола Маара. Проте, дехто, схоже, з цим не згоден."
 EQC_wittenlander_tome_artefact:0 "Віттенлендський том"
 art_EQC_wittenlander_tome_artefact_desc:0 "Стара книга з бібліотек Віттенбургу. Вона наповнена стародавніми та могутніми закляттями."
 EQC_pearl_of_the_mountain_artefact:0 "Перлина Гори"
 art_EQC_pearl_of_the_mountain_artefact_desc:0 "Це не справжня перлина, а величезний, ідеально чистий діамант. Він є гордістю скарбниці Діамантової Гори."
 EQC_head_of_an_eygsic_spider_artefact:0 "Голова ейґзійського павука"
 art_EQC_head_of_an_eygsic_spider_artefact_desc:0 "Цей павук забрав життя трьох лютих воїнів, перш ніж четвертий зміг убити його і принести голову додому як трофей."
 EQC_reactor_core_artefact:0 "Ядро реактора"
 art_EQC_reactor_core_artefact_desc:0 "Ядро величезного реактора, знайденого в Барраді. Живлячись від кристалів, воно випромінює магічну енергію."
 EQC_grimoire_of_magehold_artefact:0 "Гримуар Мейджголда"
 art_EQC_grimoire_of_magehold_artefact_desc:0 "Захований у глибинах бібліотеки Мейджголда, цей гримуар присвячений забороненому мистецтву воскресіння."
 EQC_vial_of_holy_water_artefact:0 "Флакон зі святою водою"
 art_EQC_vial_of_holy_water_artefact_desc:0 "Джерела навколо Струмгороду вважаються святими як поні, так і грифонами. Дехто стверджує, що вони можуть вилікувати будь-яку хворобу, відому серед створінь."
 EQC_vikingar_drinking_horn_artefact:0 "Питний ріг вікінґарів"
 art_EQC_vikingar_drinking_horn_artefact_desc:0 "Один зі славетних питних рогів, які оленійські вікінґари привезли з собою, коли вперше висадилися в Грифонії."
 EQC_statue_of_sycaecia_artefact:0 "Статуя Сикеції"
 art_EQC_statue_of_sycaecia_artefact_desc:0 "Статуя Сикеції, богині Сікамеонe. Вона чула незліченну кількість молитв грифонів протягом століть, перш ніж була вкрадена загарбниками."
 EQC_the_oovervinnlighet_artefact:0 "Овервіннліґґет"
