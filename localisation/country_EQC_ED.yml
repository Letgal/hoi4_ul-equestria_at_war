 # Погодна магія (EQS)
 EQS_weather_magic_category:0 "Магія погоди"
 EQS_weather_magic_category_desc:0 "§4Маніпуляція погодою§! є основною частиною магії пегасів, що вкоренилася в еквестрійській культурі з незапам'ятних часів. Зазвичай ця магія застосовується з надзвичайною обережністю для збереження гармонії з природою, підтримуючи як поні, так і тварин. Нині, коли Еквестрія зіткнулася з таким небезпечним ворогом, деякі з цих старих принципів були відкинуті...\n\nВикористовуйте £weather_magic_texticon §4можливості магії погоди§!, щоб отримати §Gзагальні бонуси§! або застосувати бойові модифікатори в певних областях. Використання бойової магії погоди §Rуспіхом не гарантоване§!, однак його §Gшанс може бути збільшений§! за допомогою §YППО§!, §Yпереваги в повітрі§! та §Yвисокого рівня радарних технологій§!.\n\nПоточні £weather_magic_texticon §4можливості магії погоди§!: [?weather_pb_var|Y]/§Y300§!\n\nЩоденний £weather_magic_texticon §Gприріст магії погоди§!: [?daily_weather_magic_gain|Y]"

