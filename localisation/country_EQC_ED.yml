 medium_arcane_laser_cannon_desc:0 "Ця гармата не стріляє снарядами, а натомість спрямовує гармонійну енергію поні, що нею керують, у магічний промінь, який сіє сумніви та страх серед усіх, хто прагне завоювання та панування."
