 evildiarchy_news.0.t:0 "Сестри Армагеддону"
 evildiarchy_news.0.d:0 "[This.GetNewspaperHeader]Сонце чорніє, занурюючи світ у глобальне затемнення, поки найпотужніший сплеск магічної енергії, коли-небудь зафіксований, розходиться планетою з епіцентру в Новому Мейрленді. Згідно з тими дещицями інформації, що змогли покинути країну, з принцесами Еквестрії сталося щось жахливе — вони переродилися в нових іпостасях. Проголосивши себе Дейбрейкер та Найтмер Мун, алікорни вихваляються божественною силою і, якщо вірити стародавнім записам, позбавлені будь-яких моральних принципів. Біженці вже почали просочуватися з їхнього нещодавно проголошеного «Імперського кондомініуму», тікаючи в жаху та розповідаючи історії про мобілізацію релігійних фанатиків і націю, що стрімко занурюється в абсолютне тиранічне правління.\nСправжній масштаб небезпеки, яку несуть ці новоприбулі, ще належить з'ясувати, але якщо їхня сила така велика, якої побоюються по всьому світу, цьому ж світу може загрожувати катастрофа."
 evildiarchy_news.0.a:0 "§RПодивимось хто готовий пограти в правителя...§!"
 evildiarchy_news.0.b:0 "Вони — втілення наших найгірших страхів."
 evildiarchy_news.0.c:0 "Ми на порозі справжньої королівської битви?"
 evildiarchy_news.0.dop:0 "Чи... чи вважати нам це успіхом?"
 ED_puppet_BAT:0 "§gВірні послідовники Найтмер згуртовуються навколо неї.§!"

 evildiarchy_news.1.t:0 "Алікорни на стежці війни"
 evildiarchy_news.1.d:0 "[This.GetNewspaperHeader]Сьогодні багато лідерів зустрілися в Даль-Вор, Понайан, щоб обговорити зростаючу проблему Імперського кондомініуму Нового Мейрленду. Після короткої зустрічі було досягнуто консенсусу. Вони оголосили загрозу культурі та способу життя грифонячого і понійського родів надзвичайною обставиною, що вимагає створення єдиного фронту проти сестер-алікорнів.\n\nОдразу після оголошення новостворена «Грифонська коаліція» поклялася стати маяком надії проти Імперського кондомініуму, символом свободи для грифонів та поні, що протистоятиме тиранії алікорнів до останнього."
 evildiarchy_news.1.a:0 "Пліч-о-пліч ми будемо битися!"
 evildiarchy_news.1.b:0 "Мило."
 evildiarchy_news.1.b_tooltip:0 "§RЦей цирк має нас зупинити?§!\n\n"
 evildiarchy_news.1.c:0 "Це викликає занепокоєння."

 evildiarchy_news.2.t:0 "Equestria at War"
 evildiarchy_news.2.d:0 "[This.GetNewspaperHeader]Цього дня, після успішного знищення щита, що вкривав Еквестрію, алікорни Дейбрейкер та Найтмер Мун виголосили промову в [356.GetName]і, Новий Мейрленд, у якій оголосили війну Твайлайт Спаркл та силам опору на Еквусі.\n\nСестри заявили про намір стерти з лиця землі будь-кого на своєму шляху, проте експліцитно пообіцяли тим, хто залишився вірним їм, «шанс на спокуту».\n\nПісля цієї заяви групи лоялістів підняли повстання в Південно-східній Еквестрії, а також у Мейнгеттені та Філлідельфії. Лише час покаже, чи це поодинокі випадки спалахів лоялізму, чи на нас чекає щось більше."
 evildiarchy_news.2.a:0 "Скоро..."
 evildiarchy_news.2.b:0 "Разом ми переможемо."
 evildiarchy_news.2.c:0 "Справді тривожний розвиток подій."
 evildiarchy_news.2.e:0 "Остаточне випробування Регента почалось."

