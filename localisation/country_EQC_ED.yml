 EQC_ED_AF_daybreaker_trait:0 "Богиня Сонця"
 EQC_ED_AF_daybreaker_trait_desc:0 "Єдина і неповторна Богиня Сонця та законна Імператриця Еквестрії. Її вогняний погляд вселяє жах у ворогів та завзяття у послідовників, коли алікорн виходить на поле бою з силою самих зірок. Ніхто не кине їй виклик не втративши життя, бо Вона — Дейбрейкер, і, як і Її тезка, Вона неоминна."
 EQC_ED_AF_nmm_trait:0 "Богиня Ночі"
 EQC_ED_AF_nmm_trait_desc:0 "Єдина і неповторна Богиня Ночі та законна Імператриця Еквестрії. З тіней вона сіє хаос, стаючи єдиним цілим із ніччю, коли алікорн вторгається навіть у сни своїх ворогів. Для своїх послідовників вона уособлює безпечні обійми темряви, для ворогів — жах невідомого. Вона — Найтмер Мун, і вона принесе терор кожному, хто відкидає її божественність. Вони ніколи не будуть у безпеці, навіть у глибинах власного розуму."
