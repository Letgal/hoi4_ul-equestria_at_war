 EQS_sabotage_mechanic_decisions:0 "Саботаж Кондомініуму"
 EQS_sabotage_mechanic_decisions_desc:0 "Несподівано Джет Сет, імперський канцлер Дейбрейкер та Найтмер Мун, запропонував саботувати їхній уряд. Перебуваючи в центрі операцій, він міг би ефективно перешкоджати їхній діяльності, але будь-яке подібне починання може порушити хиткий баланс між двома діархами. Натомість він обмежиться дрібномасштабними діями, які, проте, при правильному застосуванні все одно можуть надати нам переваги.\n\nОднак у всьому цьому найважливішим завданням є не дати Джет Сету бути викритим. Якщо діархи дізнаються про його зраду, він не лише зазнає суворих наслідків, але й більше не зможе підтримувати мир між ними...\n\nСитуація Джет Сета наразі [EQS_ED_sabotage_jetset_compromised_dyn]"
 EQS_ED_jetset_is_fine:0 "§Gне викритий§!."
 EQS_ED_jetset_is_not_fine:0 "§Rпід підозрою§!. Досягнення 100 одиниць підозри повторно матиме §Rфатальні наслідки§!."
 EQS_ED_alter_construction_plans:0 "Змінити плани будівництва"
 EQS_ED_alter_construction_plans_desc:0 "Що сталося з вимірами на цьому кресленні? Якого сіна тут все в «метрах»?"
 EQS_ED_bureaucratic_errors:0 "Бюрократичні помилки"
 EQS_ED_bureaucratic_errors_desc:0 "Що ви маєте на увазі під «це було підписано Її Величністю»?! Це мало бути підписано Її Величністю! Так, ви правильно почули, йдіть і знайдіть правильну Її Величність."
 EQS_ED_seize_decryption_codes:0 "Викрасти коди дешифрування"
 EQS_ED_seize_decryption_codes_desc:0 "Це ти, Коун Мейн? Серйозно? Знову?"
 EQS_ED_fake_military_orders:0 "Фальшиві військові накази"
 EQS_ED_fake_military_orders_desc:0 "МАРШРУВАТИ ПЛОЩЕЮ ВГОРУ ТА ВНИЗ ТОБІ ВЖЕ «МАРНОТРАТНО», М?"
 EQS_ED_wrong_weapon_manufacturing_plans:0 "Помилкові плани виробництва зброї"
 EQS_ED_wrong_weapon_manufacturing_plans_desc:0 "Ось істина: спочатку ви загубили дороге спорядження, а тепер переплутали план виробництва. Тому ви працюватимете двадцять чотири години поспіль, щоб закінчити план, який ви підмінили."
 EQS_ED_manual_landscape_change:0 "Заплутати картографів"
 EQS_ED_manual_landscape_change_desc:0 "Клянуся, ця гора була тут, а не там. А цієї річки ніколи не існувало. Повір мені."
 EQS_ED_weather_manipulation:0 "Маніпуляція погодою"
 EQS_ED_weather_manipulation_desc:0 "Ах, чудово. Ще один сонячний день... десь в іншому місці."
 EQS_ED_invite_refugees:0 "Прийняти [FROM.GetAdjective]их біженців" #В оригіналі гра просить назву країни, поміняв на прикметник країни, щоб не робити костиль

 # Грифонські маріонетки (EQC)
 EQC_ED_AF_puppets:0 "Створення грифонських підлеглих територій"
 EQC_ED_AF_puppets_desc:0 "З Нашою неминучою перемогою потреба в реорганізації Грифонії в належні губернаторства вже не за горами. Хоча ці землі залишатимуться під Нашим наглядом, Ми просто не можемо бути скрізь одночасно. Місцеві колаборанти, які прийняли наше світло, будуть наділені владою від Нашого імені, що дозволить Нам ефективніше керувати Нашими новими територіями, поки вони пристосовуються до нової реальності."
