# == (*) ==

### Characters

 ABY_taile_sehissie_clawomonid: "Ґомез Нявконнин"
 ABY_taile_sehissie_clawomonid_desc: "Ґомез Нявконнин з Дому Пазуромонів має понад тисячолітній родовід, тому очікування щодо нього завжди були високими, особливо через те, що він є онуком відомої нявгіст Няводори Другої, яка повернула династії трон Абіссинії. Він виріс у королівському палаці Пантери, і його батько, нявгус Нявконнин, подбав про те, щоб син отримав найкращу освіту, яку тільки можна було купити за гроші, щоб підготувати його до майбутнього як свого спадкоємця. Як студент він був здібним, хоч і без особливої пристрасті, та демонстрував успіхи в економіці, математиці й історії. Ще в юному віці він закохався у свою кузину Мортішу, але довго не міг з нею одружитися, оскільки шлюби між двоюрідними братами та сестрами рішуче засуджувалися, особливо його батьком. Коли Нявконнин помер у 998 році від З.Л., Ґомез був більш ніж готовий стати його наступником і, користуючись королівською владою, зміг негайно одружитися з Мортішею. Він повністю усвідомлював безліч потенційних проблем, що загрожували Абіссинії, і планував розібратися з ними, поки не стало надто пізно.\n\nНа жаль, чорні коти не славляться своєю вдачею.\n\nЩойно надійшли новини про стрімкі завоювання Короля Шторма, Ґомез почав готувати оборону та розбудовувати королівську армію. Але незважаючи на всі його зусилля, він нічого не міг протиставити ворожим дирижаблям, і міста Абіссинії падали одне за одним. Зрештою, коли Пантера запалала, а сам він втратив частину правого вуха, Ґомез остаточно здався, запропонувавши свою корону Королю Шторму. Але так само швидко, як він з'явився, Король Шторм пішов, залишивши по собі спустошене, зубожіле королівство.\n\nІз розбитими мріями та королівством на межі краху, психічний стан Ґомеза стрімко погіршився, оскільки він не зміг впоратися зі стресом. Час покаже, чи зможе він оговтатися і протистояти цим лякаючим викликам."
 ABY_slave_leader: "Шарп Спір"
 ABY_slave_leader_desc: "Шарп Спір була молодою солдаткою в мейргипетській армії, коли у 988 році спалахнула Мейндалуська війна. На хвилі націоналізму, що послідувала за проголошенням Королівством незалежності від Сідлової Арабії, вона з ентузіазмом вирушила воювати на передову проти підступних котячих. Однак у хаосі битви її поранили і вона потрапила в полон до ворога. Невдовзі після цього було оголошено припинення вогню, і, як і багатьох інших військовополонених, її перетворили на рабиню.\n\nЯк здорова та працездатна кобила-пегас, вона була цінною рабинею і змінила кількох власників. Врешті-решт вона опинилася на кавовій плантації у високогір'ї Которае, де подружилася з рабинею-зеброю на ім'я Бонту. Їхнім власником був жорстокий аристокіт, який ставився до них як до звичайної власності та жорстоко знущався. Бонту попереджала, що багато рабів-утікачів швидко гинуть, але Шарп Спір не дослухалася до її застережень і змогла втекти з плантації, пообіцявши одного дня повернутися і звільнити свою подругу.\n\nВиживати наодинці було важко, але згодом вона зустріла групу інших рабів-утікачів. Вони жили життям безцільного бандитизму, не прагнучи нічого, окрім виживання. Проте Шарп Спір палала амбіціями. Вона переконала групу здійснювати рейди, щоб звільняти інших рабів і збільшувати свою чисельність, паралельно встановлюючи контакти з іншими групами бунтівних рабів. За кілька років вона стала лідеркою тисяч невільників, які не бажали нічого, крім як зберегти свою свободу. Проте їй було недостатньо просто звільнити всіх рабів. Щоб уникнути повторення минулого, вона мріяла перетворити Абіссинію на краще місце, яке могло б стати другом Мейргипту: націю, де всі раси рівні, вся власність є спільною, а всі рішення приймаються демократичним голосуванням. Залишається лише побачити, чи зможе вона втілити свою мрію в реальність."
 ABY_catrina_catwe: "Кітріна Таббі"
 ABY_catrina_catwe_desc: "Кітріна є прямим нащадком нявгусів та нявгіст Кітве, які колись правили Абіссинією протягом двохсот років. Хоча технічно це робить її дворянкою, вона не має жодних особливих юридичних привілеїв чи формального статусу, оскільки Пазуромони позбавили її родину всього цього. Тим не менш, вона значно багатша і впливовіша за будь-якого звичайного кота. У той час як її родичів тримав під контролем сильний центральний уряд, Кітріна змогла використати недавній хаос як драбину для підйому в абіссинському суспільстві. Оскільки багато хто звинувачував Пазуромонів у численних проблемах, що мучили Королівство, вона запропонувала себе як привабливу альтернативу. Дворяни були особливо незадоволені Пазуромонами через їхні модернізаційні реформи, і багато з них швидко згуртувалися навколо Кітріни, адже з усіх претендентів на трон вона має безумовно найсильніші права на нього.\n\nАле Кітріна не має наміру бути простою маріонеткою дворян. Вторгнення Короля Шторма відкрило їй очі на просту життєву істину: краще бути серед могутніх, ніж сидіти в клітці за чиїмось наказом. Абіссинія довгий час перебувала під пануванням іноземних держав та інших рас, але у неї були амбітні плани, які змінили б усе. У підземеллях свого сімейного маєтку вона проводить таємні експерименти, які цілком можуть назавжди змінити долю котячого роду..."
 ABY_catra_meowmeow: "Кітра Нявняв"
 ABY_queen_morticia: "Мортіша Аддісу"
 ABY_queen_morticia_desc: "Народження донькою сестри нявгуса Нявконнина, Аддісу, означало, що Мортіша від самого початку мала привілеї як одна з членів Дому Пазуромонів. Проте, на відміну від деяких своїх родичів, вона ніколи не дозволяла цьому роздувати своє его. Дитяча дружба зі слугою гарантувала, що вона відчуватиме емпатію до тих, кого в абіссинському суспільстві вважали прислугою. Після смерті матері вона використовувала успадковані багатства для благодійності та викупу свободи для рабів, що належали знаті Королівства. Хоча їй доводилося твердо відстоювати свою позицію перед більшістю родичів, її кузен Ґомез захоплювався її щедрістю та добротою. Оскільки вони жили під одним дахом, то були давно знайомі одне з одним. Однак для їхніх родичів стало шоком, коли вони оголосили, що є закоханими. Батько Ґомеза, нявгус Нявконнин, не схвалив ці стосунки і заборонив їм одружуватися. Двом закоханим довелося чекати його смерті, щоб нарешті провести приватну весільну церемонію лише для себе. Таким чином Мортіша стала Ітеґе (королевою-консортом) Абіссинії.\n\nНезважаючи на суперечки з чоловіком та той факт, що знать дивиться на неї зверхньо, Мортіша є дуже популярною серед простих котів. Це пов'язано з тим, що вона щиро піклується про їхній добробут і, завдяки своїй впевненості, виступає як публічне обличчя монархії, тоді як Ґомез є більш замкнутим. Тим не менш, деякі радикали досі вважають, що вона просто грає роль або прикидається, і що вона роздавала багатства лише для підвищення власної популярності та впливу."
 ABY_nathaniel_claw: "Натаніель Пазур"
 ABY_sourpuss_dejen: "Деджен Ріс-Моггі"
 ABY_sourpuss_dejen_desc: "Ще з часів кошеняцтва Деджен захоплювався державним управлінням. Він народився в родині середнього класу, і його батьки вклали всі свої заощадження, щоб дати йому хорошу освіту. На щастя, він від природи був обдарованим у засвоєнні та обробці інформації, навіть якщо однолітки вважали його відстороненим та беземоційним. По мірі того, як Абіссинія модернізувалася, вона почала розбудовувати молоду сучасну бюрократію, яка завжди потребувала таких котів, як Деджен, котрі понад усе любили нудну паперову роботу. За кілька років нявгус Нявконнин визнав таланти Деджена і призначив його новим Міністром Пера, Цехафе Тезазом. Це зробило його котом-правою лапою нявгуса, який гарантував, що всі його накази будуть виконуватися на практиці. Однак він служив Нявконнину лише короткий час до його смерті, після чого трон успадкував його син Ґомез. Незважаючи на всі труднощі під час його правління, Деджен терпів його і зосередився на виконанні своєї роботи. Та після того, як вторгнення Короля Шторма остаточно зламало психіку Ґомеза, він замислився, чи не міг би хтось більш компетентний замінити нявгуса. Зрештою, він завжди дбав про Абіссинію більше, ніж про монарха."
 ABY_colonel_meow: "Няв Хмурий"
 ABY_colonel_meow_desc: "Хоча формально він є Генералом Королівської Гвардії, Няв Хмурий широко відомий як «Полковник». Він є найвищим за званням професійним військовим у Королівстві, прослуживши в Гвардії багато років і довівши свою відданість Королівству Абіссинія. Під час вторгнення Короля Шторма він очолював оборону Пантери, і його війська завдали ворогові важких втрат, незважаючи на чисельну та вогневу перевагу противника. Королівська Гвардія стояла поруч з Ґомезом навіть тоді, коли він здався загарбнику.\n\nПоза межами своєї військової кар'єри Няв відомий тим, що є володарем світового рекорду з найдовшої котячої шерсті. Незважаючи на свій похмурий вигляд, у неробочий час він досить привітний, особливо після того, як вип'є трохи свого улюбленого віскі."
 ABY_ras_tardar: "Тардар Буркотуха"
 ABY_ras_tardar_desc: "Як Цахіфе Лам, вона є другим за званням військовим офіцером (див. «Месафінт (та королівська родина) коротко»). Збереження ролі дворянства як керівників армії є для неї життєво важливою метою. Вона відома своїм сварливим та песимістичним характером."
 ABY_maxwell_the_cat: "Кіт Максвелл"
 ABY_maxwell_the_cat_desc: "Цей нерозумний кіт чудово вміє згортатися в клубочок та крутитися. Його також дуже зручно носити."
 ABY_big_floppa: "Гоша"
