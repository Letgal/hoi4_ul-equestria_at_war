 abyssinia.22.t:0 "Повстання рабів"
 abyssinia.22.d_coup_fail:0 "Полковник Коронної Гвардії, Мяу Фраун, саме прямував інспектувати підземелля, де утримували повстанців, прихильників Кітве, коли його перервав один із солдатів. «Сер, термінове повідомлення з Амхашери!»\n«Вільно. Що сталося?»\n«Оскільки свити дворян покинули свої маєтки, залишилося надто мало котів, щоб тримати рабів під контролем. Це призвело до посилення заворушень, які вийшли з-під контролю в Амхашері. Є повідомлення про тисячі поневолених віслюків, поні, зебр і коней, які озброїлися інструментами та вкраденою зброєю. Сотні кавових плантацій було спалено, шахти підірвано, серед місцевого населення є численні жертви. Контроль над сільською місцевістю втрачено. Раби також рушили на місто Амхашера, заскочивши зненацька його гарнізон, спалюючи будівлі та грабуючи крамниці. Для боротьби з повстанцями були організовані імпровізовані ополчення, але малоймовірно, що вони зможуть придушити повстання самостійно».\n\nМяу Фраун насупився. Це вже була катастрофа, але все могло стати набагато гірше, якщо вони не розберуться з цим швидко."
 abyssinia.22.d_coup_success:0 "Полковник Коронної Гвардії, Мяу Фраун, неохоче інспектував війська, прихильні до Кітве, коли його перервала Тардар, сама Цахіфе Лам Амхашери. «Я знала, що так і буде», — пробурмотіла вона.\n«У чому річ?» — запитав Мяу.\n«Оскільки наші свити покинули наші маєтки, залишилося надто мало котів, щоб тримати рабів під контролем. Тепер я отримала звіти, що знахабнілі раби підняли повстання в Амхашері. Там тисячі поневолених віслюків, поні, зебр і коней, які озброїлися інструментами та вкраденою зброєю. Потім вони спалили мої кавові плантації і підірвали мої шахти. З самого міста Амхашера я теж не отримала нічого, крім поганих новин. Очевидно, вони спалили один із моїх маєтків і там». Вона застогнала, ніби все це було просто прикрою незручністю. «Місцеві коти намагаються відбиватися тим, що мають, але сумніваюся, що я змогла б навести лад лише власною свитою. Мені знадобиться і частина вашої Коронної Гвардії. Передайте це Нявгіст, я втомилася з нею говорити».\n\nМяу Фраун насупився. Це вже була катастрофа, але все могло стати набагато гірше, якщо вони не розберуться з цим швидко."
 abyssinia.22.a:0 "«Я повідомлю Нявгіст особисто.»"
 
 abyssinia.23.t:0 "Чутки ширяться"
 abyssinia.23.d_its_joever:0 "Перебуваючи у Фелібелі, Нявгус жив у маленькому будинку, який вони орендували у місцевого власника крамниці. Одного дня він лежав на ліжку, намагаючись «розслабитися» і «насолодитися» своєю «відпусткою», коли його перервав хтось, хто наполегливо постукав у двері.\n«Увійдіть», — пробурмотів він.\nВсередину зайшов кіт в уніформі з аркушем паперу в лапах. «Ваша величносте, телеграма з Пантери! Її довелося доставляти з найближчої телеграфної станції в Которае, тому їй вже більше тижня».\nҐомез сів і підняв брову. «Що там сказано? Вона від моєї дру- Нявгіст?»\nПосланець віддав йому повідомлення, і Ґомез почав читати.\n\n«КОРОЛІВСЬКИЙ ПАЛАЦ\nПАНТЕРА\n\nПРИХИЛЬНИКИ КЕТВЕ ШТУРМУВАЛИ ПАЛАЦ -(КРАПКА)-\nКОРОННА ГВАРДІЯ ЗДАЛАСЯ ПІСЛЯ БОЮ -(КРАПКА)-\nКАТРІНА ПРОГОЛОСИЛА СЕБЕ КОРОЛЕВОЮ -(КРАПКА)-\nКОРОЛЕВУ МОРТІЦІЮ СТРАЧЕНО -(КРАПКА)-\nКОРОЛЬ ГОМЕС ПОВИНЕН ПЕРЕХОВУВАТИСЯ В ОЧІКУВАННІ ПОДАЛЬШИХ ІНСТРУКЦІЙ -(КРАПКА)-\n\nПОЛКОВНИК МЯУ ФРАУН»\n\nУ Ґомеза раптом запаморочилося в голові. Здавалося, що будинок навколо нього руйнується. Його нудило.\n«Сер? Усе гаразд?»\nНе відповідаючи, Ґомез відштовхнув його вбік і вибіг на вулицю. Він згадав стрімку скелю неподалік. Коти з жахом дивилися, як він біжить до неї і стрибає з краю. Вони кинулися подивитися, що сталося, лише щоб побачити його понівечене тіло, що лежало на землі далеко внизу."
 abyssinia.23.d_resistance:0 "Перебуваючи у Фелібелі, Нявгус жив у маленькому будинку, який вони орендували у місцевого власника крамниці. Одного дня він лежав на ліжку, намагаючись «розслабитися» і «насолодитися» своєю «відпусткою», коли його перервав хтось, хто наполегливо постукав у двері.\n«Увійдіть», — пробурмотів він.\nВсередину зайшов кіт в уніформі з аркушем паперу в лапах. «Ваша величносте, телеграма з Пантери! Її довелося доставляти з найближчої телеграфної станції в Которае, тому їй вже більше тижня».\nҐомез сів і підняв брову. «Що там сказано? Вона від моєї дру- Нявгіст?»\nПосланець віддав йому повідомлення, і Ґомез почав читати.\n\n«КОРОЛІВСЬКИЙ ПАЛАЦ\nПАНТЕРА\n\nПРИХИЛЬНИКИ КЕТВЕ ШТУРМУВАЛИ ПАЛАЦ -(КРАПКА)-\nКОРОННА ГВАРДІЯ ЗДАЛАСЯ ПІСЛЯ БОЮ -(КРАПКА)-\nКАТРІНА ПРОГОЛОСИЛА СЕБЕ КОРОЛЕВОЮ -(КРАПКА)-\nКОРОЛЕВУ МОРТІЦІЮ УВ'ЯЗНЕНО -(КРАПКА)-\nКОРОЛЬ ГОМЕС ПОВИНЕН ПЕРЕХОВУВАТИСЯ В ОЧІКУВАННІ ПОДАЛЬШИХ ІНСТРУКЦІЙ -(КРАПКА)-\n\nПОЛКОВНИК МЯУ ФРАУН»\n\nҐомез шоковано витріщився на неї. Він повинен був знати, що це станеться. Від'їзд зі столиці був помилкою.\n«Сер? Усе гаразд?»\n«Мені потрібно врятувати мою дружину», — пробурмотів він, мнучи папір у своїх чорних лапах. «І повернути свій трон». Його страхи справдилися, тож тривога змінилася лютою рішучістю. Йому було байдуже, чи стане він знову нявгусом, але він мав врятувати Мортіцію. І він був готовий померти, намагаючись це зробити."
