### National Spirits
 
 ABY_wingbardian_concessions: "Нерівноправний договір"
 ABY_wingbardian_concessions_desc: "Після Реставрації Пазуромонів нявгіст Няводора Друга підписала договір із Королівством Вінґбардія, який, згідно з абіссинською версією документа, передбачав, що Абіссинія «тимчасово передає в оренду» острів Муррсія в обмін на допомогу в розвитку та торговельні угоди. Однак згодом з'ясувалося, що вінґбардійська версія договору проголошувала остаточну і безповоротну передачу острова їм, що сильно зіпсувало відносини.\n\nСитуація стала ще гіршою, коли Король Шторм пограбував і спалив Абіссинію. Замість потенційного союзника в Зебриці, Абіссинія тепер виглядала слабкою та безпорадною країною. Вінґбардія скористалася цим, захопивши портове місто Кітрен і змусивши нявгуса Ґомеза підписати ще один договір. Він визнавав нещодавнє захоплення законним (так звана «Кітренська концесія»), створював демілітаризовану зону навколо нього в Кицькиці та надавав додаткові привілеї вінґбардійському бізнесу, включно з ексклюзивними правами на видобуток корисних копалин у Кицькиці. Хоча економіка отримує вигоду від вінґбардійської активності, більшість населення обурюється цим договором."
 ABY_angry_slaves: "Заворушення рабів"
 ABY_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 ABY_paralyzed_leadership: "Паралізований уряд"
 ABY_paralyzed_leadership_desc: "Королівство Абіссинія традиційно було абсолютною монархією, де правили наказами. Однак поганий психічний стан нявгуса Ґомеза призвів до того, що уряд залишився повністю бездіяльним, нездатним зробити будь-що без схвалення або наказу нявгуса. Зазвичай це вже було б проблемою, але в нинішній кризовий час рішення потрібні терміново, проте ніхто їх не ухвалює. В результаті Абіссинія занурюється у дедалі більший хаос, а аристокоти починають ставити під сумнів здатність Ґомеза правити."
 ABY_risk_of_famine: "Загроза голоду"
 ABY_risk_of_famine_desc: "Абіссинський півострів — це посушливий регіон, здебільшого непридатний для землеробства, де багато котів у сільській місцевості досі живуть як скотарі-кочівники. Що ще гірше, орні землі у високогір'ї використовуються для вирощування експортних культур, таких як кава. Оскільки коти також є облігатними хижаками, решта орних земель використовується для вирощування кормів для худоби. До вторгнення Короля Шторма Абіссинія могла вільно імпортувати тонни м'яса з-за кордону, але через спорожнілу, розграбовану скарбницю та постійно зростаючу внутрішню нестабільність, цей імпорт майже повністю припинився. Запаси продовольства повільно, але впевнено вичерпуються. Якщо нічого не зробити, голод загрожуватиме майже всьому населенню."
 
 ABY_wingbardian_concessions_2: "Нерівноправний договір"
 ABY_wingbardian_concessions_2_desc: "Після Реставрації Пазуромонів нявгіст Няводора Друга підписала договір із Королівством Вінґбардія, який, згідно з абіссинською версією документа, передбачав, що Абіссинія «тимчасово передає в оренду» острів Муррсія в обмін на допомогу в розвитку та торговельні угоди. Однак згодом з'ясувалося, що вінґбардійська версія договору проголошувала остаточну і безповоротну передачу острова їм, що сильно зіпсувало відносини.\n\nСитуація стала ще гіршою, коли Король Шторм пограбував і спалив Абіссинію. Замість потенційного союзника в Зебриці, Абіссинія тепер виглядала слабкою та безпорадною країною. Вінґбардія скористалася цим, захопивши портове місто Кітрен і змусивши нявгус Ґомеза підписати ще один договір. Він визнавав нещодавнє захоплення законним (так звана «Кітренська концесія»), створював демілітаризовану зону навколо нього в Кицькиці та надавав додаткові привілеї вінґбардійському бізнесу, включно з ексклюзивними правами на видобуток корисних копалин у Кицькиці. Хоча економіка отримує вигоду від вінґбардійської активності, більшість населення обурюється цим договором.\n\nУряд Абіссинії вжив заходів для пом'якшення наслідків договору ціною зменшення співпраці з Вінґбардією."
 ABY_wingbardian_concessions_3: "Нерівноправний договір"
 ABY_wingbardian_concessions_3_desc: "Після Реставрації Пазуромонів нявгіст Няводора Друга підписала договір із Королівством Вінґбардія, який, згідно з абіссинською версією документа, передбачав, що Абіссинія «тимчасово передає в оренду» острів Муррсія в обмін на допомогу в розвитку та торговельні угоди. Однак згодом з'ясувалося, що вінґбардійська версія договору проголошувала остаточну і безповоротну передачу острова їм, що сильно зіпсувало відносини.\n\nСитуація стала ще гіршою, коли Король Шторм пограбував і спалив Абіссинію. Замість потенційного союзника в Зебриці, Абіссинія тепер виглядала слабкою та безпорадною країною. Вінґбардія скористалася цим, захопивши портове місто Кітрен і змусивши нявгус Ґомеза підписати ще один договір. Він визнавав нещодавнє захоплення законним (так звана «Кітренська концесія»), створював демілітаризовану зону навколо нього в Кицькиці та надавав додаткові привілеї вінґбардійському бізнесу, включно з ексклюзивними правами на видобуток корисних копалин у Кицькиці. Хоча економіка отримує вигоду від вінґбардійської активності, більшість населення обурюється цим договором.\n\nЗавдяки нещодавнім діям уряду Абіссинії, договір тепер є не більш ніж чорнилом на папері."
 
 ABY_somewhat_less_angry_slaves: "Заворушення рабів"
 ABY_somewhat_less_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 ABY_way_less_angry_slaves: "Заворушення рабів"
 ABY_way_less_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 
 ABY_clawomonid_resistance: "Опір Пазуромонів"
 ABY_clawomonid_resistance_desc: "Деякі коти залишаються вірними Дому Пазуромонів. Вони гуртують інших навколо своєї справи, відмовляються співпрацювати з урядом і роблять усе можливе, щоб підірвати правління [Root.GetLeader]. З цими дисидентами треба розібратися, інакше вони можуть навіть спробувати ще одну Реставрацію Пазуромонів..."
 ABY_weak_clawomonid_resistance: "Слабкий опір Пазуромонів"
 ABY_weak_clawomonid_resistance_desc: "Кілька котів залишаються вірними Дому Пазуромонів, незважаючи ні на що. Вони гуртують інших навколо своєї справи, відмовляються співпрацювати з урядом і роблять усе можливе, щоб підірвати правління [Root.GetLeader]. З цими дисидентами треба розібратися, інакше вони можуть навіть спробувати ще одну Реставрацію Пазуромонів..."
 
 ABY_centralized_banking: "Державний банк Абіссинії"
 ABY_centralized_banking_desc: "Заснований [ROOT.ABY_king_loc_cap] Ґомезом у [?ABY_bank_year] році, Державний банк Абіссинії повністю належить [Root.ABY_royal_loc_nocap]ому уряду. Він здійснює подвійну діяльність: центрального та комерційного банкінгу. Як і його попередник, він має відділення в усіх великих містах Абіссинії."
 ABY_pegged_to_bit: "Прив'язка до біта"
 ABY_pegged_to_bit_desc: "Абіссинська валюта, мурр, відійшла від золотого стандарту і тепер має фіксований обмінний курс до еквестрійського біта."
 ABY_pegged_to_idol: "Прив'язка до ідола"
 ABY_pegged_to_idol_desc: "Абіссинська валюта, мурр, відійшла від золотого стандарту і тепер має фіксований обмінний курс до скайфольського ідола."
 ABY_floating_currency: "Плаваюча валюта"
 ABY_floating_currency_desc: "Абіссинська валюта, мурр, відійшла від золотого стандарту і тепер має плаваючий обмінний курс, чутливий до ринкових сил."
 ABY_trade_deal: "Торгова угода з Абіссинією"
 ABY_trade_deal_desc: ""В абіссинців є товари, якщо у вас є монети."\n\nЗ Абіссинією було підписано угоду, яка скасовує тарифи, мита, квоти та обмеження на торгівлю товарами між двома нашими державами."
 ABY_HIP_trade_deal: "Торгова угода з Гіпогрифією"
 ABY_HIP_trade_deal_desc: ""В абіссинців є товари, якщо у вас є монети."\n\nЗ Гіпогрифією було підписано угоду, яка скасовує тарифи, мита, квоти та обмеження на торгівлю товарами між двома нашими державами."
 ABY_ASS_trade_deal:0 "Торгова угода з Асстирією"
 ABY_ASS_trade_deal_desc:0 ""В абіссинців є товари, якщо у вас є монети."\n\nЗ Асстирією було підписано угоду, яка скасовує тарифи, мита, квоти та обмеження на торгівлю товарами між двома нашими державами."
 ABY_ANS_trade_deal: "Торгова угода з Ансеруком"
 ABY_ANS_trade_deal_desc: ""В абіссинців є товари, якщо у вас є монети."\n\nЗ Ансеруком було підписано угоду, яка скасовує тарифи, мита, квоти та обмеження на торгівлю товарами між двома нашими державами."
 ABY_HIP_food_imports: "Імпорт продовольства з Гіпогрифії"
 ABY_HIP_food_imports_desc: "Існуюча торговельна угода дозволила абіссинським купцям легко масово імпортувати продовольство з Гіпогрифії. На відміну від більшості сусідніх країн, гіпогрифи дійсно споживають м'ясо, а морські поні — досвідчені рибалки. Таким чином, вони мають інфраструктуру, здатну виробляти достатньо м'яса для експорту за відносно низькою ціною."
 ABY_WNG_food_imports: "Імпорт продовольства з Вінґбардії"
 ABY_WNG_food_imports_desc: "Існуючі економічні зв'язки дозволили абіссинським купцям легко масово імпортувати продовольство з Вінґбардії. На відміну від більшості сусідніх країн, грифони дійсно споживають м'ясо, і вінґбардійці більш ніж раді експортувати його на абіссинські ринки. Однак вони також намагаються отримати якомога більше прибутку, знаючи про відчайдушну потребу Абіссинії у їжі, тому ціни анітрохи не справедливі."
 ABY_KLG_food_imports: "Імпорт продовольства з Клуджтауна"
 ABY_KLG_food_imports_desc: "Незважаючи на невизнання суверенітету Клуджтауна, Абіссинія була змушена імпортувати з нього продовольство. Проте залишається загадкою, як клуджтаунці здатні забезпечувати стільки м'яса на експорт, і важко сказати, яких саме істот пустили на м'ясо."
 ABY_mild_famine: "Дефіцит продовольства"
 ABY_mild_famine_desc: "Ціни на продовольство, особливо на м'ясні продукти, які споживають коти, останнім часом значно зросли. Це сталося через посуху під час сезону дощів 1008 року. Однак втручання уряду гарантувало, що їжа не закінчиться повністю і що голодні зможуть отримати бодай щось, аби пережити важкі часи."
 ABY_famine: "Голод"
 ABY_famine_desc: "Ціни на продовольство, особливо на м'ясні продукти, які споживають коти, останнім часом зросли експоненціально. Це сталося через посуху під час сезону дощів 1008 року. Незважаючи на певне втручання уряду, сотні тисяч котів не можуть роздобути їжу, і дехто навіть змушений полювати на щурів та птахів. Сільські коти тікають із сіл до міст у надії знайти харчі, але зрештою просто помирають від голоду на вулицях."
 ABY_apocalyptic_famine: "Апокаліптичний голод"
 ABY_apocalyptic_famine_desc: "Ціни на продовольство, особливо на м'ясні продукти, які споживають коти, останнім часом зросли до абсурдних цифр. Це сталося через посуху під час сезону дощів 1008 року. За відсутності будь-якого втручання уряду мільйони котів не можуть роздобути їжу, і багато хто змушений полювати на щурів та птахів, або навіть вдаватися до відвертого канібалізму щодо інших котів чи рабів. Сільські коти тікають із сіл до міст у надії знайти харчі, але зрештою просто помирають від голоду на вулицях. Трупів так багато, що масові могили копають по всій Абіссинії."
 ### National Spirits
 
 ABY_a_good_friend: "Хороша подруга"
 ABY_a_good_friend_desc: "Під час заходу, де [ROOT.ABY_king_loc_cap] Ґомез зустрічався з народом на центральному ринку Пантери, одна темно-синя кішка вирішила, що це чудова нагода показати свою бунтарську натуру, вдаривши його по голові бейсбольною битою (хоч і не дуже сильно). Коли Королівська гвардія спробувала схопити її, вона з дивовижною спритністю вилізла на ліхтарний стовп, що призвело до мініатюрної облоги. [ROOT.ABY_king_loc_nocap] особисто втрутився і, всупереч тому, що від нього очікували почути, подякував їй за удар. Потім він наказав гвардії відступити. Темно-синя кішка спустилася і вибачилася перед ним, запропонувавши йому, з усього можливого, крендель. Ґомез не мав жодного уявлення, звідки в неї грифонська їжа, тим більше що коти — хижаки і не їдять випічку, але вибачення все одно прийняв. Це стало початком досить своєрідної дружби."
 ABY_gomez_son: "[Root.ABY_son_name_loc]"
 ABY_gomez_son_desc: "Якимось дивом син Ґомеза та Мортіші має чорно-білу шерсть і світло-зелені очі. Напевно, рецесивні гени."
 ABY_new_economic_plan: "Новий план модернізації"
 ABY_new_economic_plan_desc: "Новостворений економічний план враховує поточну ситуацію в Абіссинії. Хоча в своїй основі він залишається таким самим, як і попередні плани, він прагне зробити державу більш самодостатньою, а також шукає більш різноманітної співпраці з іноземними державами. Здебільшого ліберальна економічна політика поєднується з державним втручанням для стимулювання зростання та розвитку."
 ABY_new_economic_plan_2: "Новий план модернізації"
 ABY_new_economic_plan_2_desc: "Новостворений економічний план враховує поточну ситуацію в Абіссинії. Хоча в своїй основі він залишається таким самим, як і попередні плани, він прагне зробити державу більш самодостатньою, а також шукає більш різноманітної співпраці з іноземними державами. Здебільшого ліберальна економічна політика в поєднанні з державним втручанням для стимулювання зростання та розвитку залишається в силі."
 ABY_high_taxes: "Високі податки"
 ABY_high_taxes_desc: "Податки є основним джерелом доходу для будь-якого уряду. Однак громадянам зазвичай не подобається віддавати частину свого важко заробленого доходу на загальне благо нації. Особливо багатим громадянам, які зазвичай найменше працювали, щоб здобути свої статки."
 ABY_loan: "Іноземна позика"
 ABY_loan_desc: "Абіссинія отримала позику з прийнятною відсотковою ставкою у закордонному банку. Зрештою, її доведеться повертати, але це вже турбота майбутніх поколінь. А поки що достатньо просто виплачувати відсотки."
 ABY_brrrrrrrr: "Сплеск інфляції"
 ABY_brrrrrrrr_desc: "Державний банк Абіссинії контролює грошову масу королівства. Таким чином, ніщо не заважає йому просто друкувати гроші, особливо тепер, коли від золотого стандарту відмовилися. Однак наповнення скарбниці в такий штучний спосіб призведе до тимчасового зростання інфляції."
 ABY_upset_merchants: "Невдоволені купці"
 ABY_upset_merchants_desc: "Торговий клас Абіссинії не задоволений недавніми діями [Root.GetLeader]. Тепер вони навмисно створюють проблеми для економіки, притримуючи свої інвестиції, сповільнюючи свій бізнес і часом навіть відмовляючись платити податки."
 ABY_lack_of_water: "Нестача води"
 ABY_lack_of_water_desc: "Через недавні абіссинські проєкти вище за течією, в наших життєво важливих річках тече менше води, що негативно впливає на всю нашу державу, принаймні доки не будуть знайдені альтернативні джерела."
 ABY_yarn_factory: "Прядильна промисловість Пантери"
 ABY_yarn_factory_desc: "Пантера стала життєво важливим центром текстильного виробництва, забезпечуючи і цивільних, і солдатів усіма видами одягу."
 ABY_salt_mine_idea: "Соляна копальня Долло"
 ABY_salt_mine_idea_desc: "Пустка басейну Долло стала життєво важливим центром видобутку солі, допомагаючи абіссинцям зберігати свою їжу і додавати їй смаку."
 ABY_state_healthcare_idea: "Національна система охорони здоров'я"
 ABY_state_healthcare_idea_desc: "Хоча медицина в Абіссинії не є повністю безкоштовною, вона залишається доступною для більшості громадян завдяки державним витратам. Кожне поселення в країні має медичний центр, де працюють кваліфіковані та досвідчені фахівці."
 ABY_professional_army_idea: "Професійна армія"
 ABY_professional_army_idea_desc: "Тільки найкращі з найкращих мають честь служити в абіссинській армії. Солдати не мають інших обов'язків і отримують конкурентоспроможну зарплату. Тренування і муштра є постійними, щоб забезпечити найвищу якість солдатів."
 ABY_meritocratic_officers_idea: "Меритократичний офіцерський корпус"
 ABY_meritocratic_officers_idea_desc: "Відтепер абіссинськими солдатами командують ті, хто довів свою спроможність, а не дворяни, які або успадкували свою посаду військового командира, або купили її у когось."
 ABY_pilot_training_idea: "Добре навчені пілоти"
 ABY_pilot_training_idea_desc: "Коти не вміють літати, але вони точно знають, як пілотувати літак."
 ABY_torpedo_bonus: "Передові проєкти торпед"
 ABY_torpedo_bonus_desc: "Підозріло схожі на ті, що використовує вінґбардійська Regia Marina."
 ABY_efficient_occupation: "Бригади безпеки"
 ABY_efficient_occupation_desc: "Ті, хто не визнає право [Root.GetLeader] правити ними, є злочинцями, і з ними поводитимуться відповідно."
 ABY_special_forces_shit_idea: "Командування спеціальних бригад"
 ABY_special_forces_shit_idea_desc: "В абіссинській армії є підрозділ, призначений для проведення спеціальних операцій, яким командують переважно ветерани-гірники."
 ABY_assembly_idea: "Асамблея станів"
 ABY_assembly_idea_desc: "Це законодавчий орган Абіссинії, що складається з 40 депутатів, обраних тими, хто має право голосу."
 ABY_progressive_tax_idea: "Прогресивне оподаткування"
 ABY_progressive_tax_idea_desc: "Ставка податку, що накладається на фізичних осіб, ґрунтується на їхньому зафіксованому багатстві, що означає, що багаті коти платять більше податків, ніж бідні, принаймні в теорії."
 ABY_paying_for_land: "Оплата за купівлю Муррсії"
 ABY_paying_for_land_desc: "Абіссинія погодилася виплатити досить значну суму коштів в обмін на острів Муррсія."
 ABY_payment_for_land: "Оплата за купівлю Муррсії"
 ABY_payment_for_land_desc: "Абіссинія погодилася виплатити нам досить значну суму коштів в обмін на острів Муррсія."
 ABY_anti_colonialism_idea: "Антиколоніалістичний-імперіалістичний фронт"
 ABY_anti_colonialism_idea_desc: "Іноземний колоніалізм та імперіалізм є небезпечними концепціями, і не можна дозволити їм поширюватися по світу як якійсь пухлині."
 
 ABY_influx_of_funds: "Приплив коштів"
 ABY_influx_of_funds_desc: "Нова абіссинська монархиня "пожертвувала" скарби своєї родини до королівської скарбниці, не лише вирішивши кризу ліквідності, але й забезпечивши уряду значний профіцит. Цей надлишок можна витратити багатьма способами: або на благо держави в цілому, або на користь найвпливовіших котів у країні."
 ABY_more_angry_slaves: "Заворушення рабів"
 ABY_more_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 ABY_even_more_angry_slaves: "Заворушення рабів"
 ABY_even_more_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 ABY_extremely_angry_slaves: "Заворушення рабів"
 ABY_extremely_angry_slaves_desc: "Після того, як нявгіст Няводора Друга поставила поза законом котяче рабство, славетно проголосивши всіх котів вільними, рабовласники скористалися юридичною лазівкою, яка прямо не забороняла поневолення інших рас. Протягом століття сотні тисяч рабів були завезені з-за кордону, шляхом торгівлі або силоміць. Здебільшого це поні, віслюки, зебри та коні. Після вторгнення Короля Шторма багато з них повстали проти своїх господарів, запустивши спіраль смертоносного насильства, яка може вийти з-під контролю."
 ABY_state_bank: "Банк Абіссинії"
 ABY_state_bank_desc: "Банк Абіссинії був заснований нявгусом Нявконнином у 977 р. після В.Л. і є найстарішим банком у країні. Він є приватним, але має монополію на банківську діяльність в Абіссинії. Він тісно співпрацював з вінґбардійськими банками з 985 року, випускаючи банкноти, що фінансувалися Вінґбардією. Це закінчилося після того, як новообрана нявгіст Кітріна запропонувала банку державну допомогу в період фінансової кризи за умови припинення будь-якої співпраці з Вінґбардією."
 ABY_secret_police_idea_lr: "Очі Тигра"
 ABY_secret_police_idea_lr_desc: "Нявгіст Кітріна видала наказ про створення таємної поліції, призначеної для підтримки внутрішньої безпеки та збору розвідданих про ворогів держави. Її лави складаються з членів Королівської гвардії та інших здібних осіб, які довели свою відданість режиму династії Кітве."
 ABY_secret_police_idea_no_lr:0 "Очі Тигра"
 ABY_secret_police_idea_no_lr_desc:0 "Нявгіст Кітріна видала указ про створення таємної поліції, призначеної для підтримки внутрішньої безпеки та збору розвідданих про ворогів держави. Її лави складаються з членів Королівської гвардії та інших здібних осіб, які довели свою відданість режиму династії Кітве."
 ABY_civil_war_devastation: "Шрами розбрату"
 ABY_civil_war_devastation_desc: "Громадянська війна залишила частину країни в руїнах, і населення досі оговтується від надзвичайного насильства. Хоча фізичну шкоду можна залагодити, а зруйновані будівлі відбудувати, зранену душу Абіссинії доведеться лікувати значно довше."
 ABY_industrial_slavery: "Індустріальне рабство"
 ABY_industrial_slavery_desc: "Рабів, які колись працювали на плантаціях експортних культур, що належали дворянам, тепер перевели на роботу на державні промислові підприємства."
 ABY_fortification_brigades_idea: "Фортифікаційні бригади"
 ABY_fortification_brigades_idea_desc: "Підрозділи рабів-робітників були організовані для будівництва військових укріплень під наглядом найкращих інженерів-фортифікаторів Абіссинії."
 ABY_potion_hangover_army_idea: "Абстинентний синдром від зілля відьомського бур'яну - Військові"
 ABY_potion_hangover_army_idea_desc: "Коли позитивні ефекти зілля з відьомського бур'яну минають і вживання не продовжується, виникає низка негативних симптомів, таких як втома, тривожність, дратівливість та зміна особистості."
 ABY_potion_hangover_workers_idea: "Абстинентний синдром від зілля відьомського бур'яну - Робітники"
 ABY_potion_hangover_workers_idea_desc: "Коли позитивні ефекти зілля з відьомського бур'яну минають і вживання не продовжується, виникає низка негативних симптомів, таких як втома, тривожність, дратівливість та зміна особистості."
 slavery_war_economy: "Рабовласницька воєнна економіка"
 
 ABY_down_with_crown_idea: "Геть корону!"
 ABY_down_with_crown_idea_desc: "Боріться з праведним гнівом проти тих, хто хоче ставитися до нас як до власності! Боріться за свою гідність і свободу! Боріться за свої права як розумних істот! Борітеся і поборите!"
 ABY_civil_war_reconstruction: "План відбудови"
 ABY_civil_war_reconstruction_desc: "Маючи у своєму розпорядженні обмежені ресурси, перехідний уряд поспішає відбудовувати країну будь-якими можливими способами, щоб покращити своє становище серед народу Абіссинії. Ці способи включають використання награбованих багатств дворян та примус військовополонених до важкої праці."
 ABY_principles_of_wholesome_chungus: "Принципи належного врядування"
 ABY_principles_of_wholesome_chungus_desc: "Державне управління має бути дієвим, непідкупним, прозорим та ефективним. Уряд повинен служити народу, а не навпаки."
 ABY_defend_the_catital: "Оборона котолиці!"
 ABY_defend_the_catital_desc: "Столи... тобто котолицю треба захищати за будь-яку ціну, бо відступати більше нікуди. Якщо Пантера впаде, республіка та її мрії про свободу помруть разом з нею."
 ABY_fight_cats: "Північний наступ"
 ABY_fight_cats_desc: "Ми маємо зробити те, що повинні, і вести війну проти тих, хто бажає відновити старих реакційних правителів Абіссинії."
 ABY_fight_donks: "Південний наступ"
 ABY_fight_donks_desc: "Сподіваюся, Сеннахеріб не вважатиме цей наступ надто образливим..."
 ABY_rapid_training_program_idea: "Прискорена програма підготовки"
 ABY_rapid_training_program_idea_desc: "Все, що вам потрібно знати, це як стріляти зі зброї, як її перезаряджати і як за нею доглядати. Все інше — другорядне."
 ABY_refugee_flood: "Масовий наплив біженців"
 ABY_refugee_flood_desc: "Сотні тисяч котів втекли на північ з так званої Нео-Асстирійської держави, залишивши позаду свої домівки та колишнє життя."
 ABY_monsoc_gomez: "Нявгус Ґомез Нявконнин"
 ABY_monsoc_gomez_desc: "Якимось дивом Ґомез повернувся. Він уже змирився зі своїм поваленням і прийняв цивільне життя за кордоном, коли обов'язок покликав його додому. Тепер він є церемоніальним главою держави, маючи мало або взагалі не маючи реальної влади. Але його народ хоче бачити його на троні, тож на троні він і сидітиме."
 ABY_monsoc_morticia: "Нявгіст Мортіша Аддісу"
 ABY_monsoc_morticia_desc: "Хоча її претензії на трон викликають суперечки, Мортіша Аддісу все ще належить до Дому Пазуромонів і висловлювала симпатію до революції. Однак вона також має намір брати більш активну участь в управлінні державою, ніж просто бути підставною особою. Хоча здебільшого вона просто керує благодійними організаціями, іноді вона все ж любить втручатися в рішення, прийняті Шарп Спір або парламентом."
 ABY_monarchist_resistance: "Реакційний опір"
 ABY_monarchist_resistance_desc: "Загадковий повстанський рух здійснює рейди на урядові війська. Шарп Спір вірить, що їх очолює не хто інша, як Кітріна з династії Кітве."
 ABY_new_currency_idea: "[Root.GetAdjective]ий бир"
 ABY_new_currency_idea_desc: "Названа на честь абіссинського слова, що означає срібло, і яке за збігом обставин звучить як поєднання слів «біт» і «мурр», нова валюта має на меті стимулювати [Root.GetAdjective]у економіку і, сподіваємось, зменшити обсяги неефективного бартеру."
 ABY_mixed_economy: "Змішана економіка"
 ABY_mixed_economy_desc: "Поєднуючи аспекти приватної, суспільної та державної економіки, змішана економіка країни прагне отримати вигоду з переваг капіталізму та соціалізму, водночас уникаючи їхніх недоліків."
 ABY_idealistic_foundation: "Ідеалістичний фундамент"
 ABY_idealistic_foundation_desc: "Це суспільство було засноване на сильних ідеалістичних цінностях. Залишається нинішній уряд вірним їм чи ні, народ цього не забув."
 ABY_secret_police_com_idea_lr: "Революційна служба безпеки та розвідки"
 ABY_secret_police_com_idea_lr_desc: "Якщо ви не скоїли жодних злочинів проти свободи, вам нічого боятися."
 ABY_secret_police_com_idea_no_lr: "Революційна служба безпеки та розвідки"
 ABY_secret_police_com_idea_no_lr_desc: "Якщо ви не скоїли жодних злочинів проти свободи, вам нічого боятися."
 ABY_liberation_army_marches_on_idea: "Визвольна армія крокує далі"
 ABY_liberation_army_marches_on_idea_desc: "З часу тріумфу в Абіссинії, визвольна армія має мотивацію продовжувати боротьбу за благородну справу."
 ABY_strategic_rocket_doctrine: "«Летючі торпеди»"
 ABY_strategic_rocket_doctrine_desc: "Національні збройні сили прагнуть розширити використання новітніх ракетних технологій, щоб зберегти життя свого особового складу."
 ABY_coastal_defence_idea: "Оборонна військово-морська тактика"
 ABY_coastal_defence_idea_desc: "Навіть поступаючись у чисельності та озброєнні, наш флот повинен зробити все можливе, щоб захистити скелясті береги Абіссинського півострова."
 ABY_diverse_agriculture: "Диверсифіковане сільське господарство"
 ABY_diverse_agriculture_desc: "Абіссинія не є родючою землею і має обмаль якісних ґрунтів. Замість того, щоб витрачати дорогоцінні сільськогосподарські угіддя на експортні культури, тепер вони використовуються і для того, щоб прогодувати травоїдне населення колишніх рабів."
 ABY_miracle_on_panther_river_idea: "Диво на річці Пантера"
 ABY_miracle_on_panther_river_idea_desc: "Кероване державою економічне зростання у поєднанні з щедрими зарплатами робітників і відновленням зовнішньої торгівлі призвело до стрімкої економічної експансії. Це диво було названо на честь річки Пантера, яка протікає через густонаселене серце Абіссинії."
 ABY_worker_unions_idea: "Абіссинська федерація профспілок"
 ABY_worker_unions_idea_desc: "АФП — це національна федерація профспілок, які вирішили співпрацювати одна з одною задля збільшення своєї сили в колективних переговорах."
 ABY_state_atheism: "Державний атеїзм"
 ABY_state_atheism_desc: "Держава активно виступає проти релігійних інституцій і засуджує практики, пов'язані з релігією."
 ABY_confessionalism: "Конфесіоналізм"
 ABY_confessionalism_desc: "Релігія пов'язана з політикою, і деякі політичні посади зарезервовані за прихильниками певних конфесій, щоб гарантувати представництво всіх релігій."
 ABY_secularism: "Світська держава"
 ABY_secularism_desc: "Держава оголосила себе офіційно нейтральною в усіх релігійних питаннях, але в результаті повністю відокремила релігію від політики."
 ABY_thicc_bureaucracy: "Вісімдесят департаментів"
 ABY_thicc_bureaucracy_desc: "Державне управління в країні здійснюється вісімдесятьма департаментами, які безпосередньо підпорядковуються міністрам уряду."
 ABY_volunteer_bonus: "Справа визволення"
 ABY_volunteer_bonus_desc: "Недостатньо просто звільнити Абіссинію чи навіть сусідні країни. Ми маємо боротися за визволення всього світу."
 
