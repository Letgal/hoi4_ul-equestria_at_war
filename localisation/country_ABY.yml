 ABY_another_high_command: "Кіт Війни"
 ABY_another_high_command_desc: "Я БІСОВО ЛЮБЛЮ ВІЙНУ! Я ХОЧУ ВБИВАТИ ВСІХ ЗА ГРОШІ ТА ЗНИЩУВАТИ КУЛЬТУРИ І ІСТОРІЮ!"
 ABY_MGY_ankha: "Анкха"
 ABY_MGY_ankha_desc: ""Не все те золото, що блищить.""
 ABY_rep: "Реп"
 ABY_rep_desc: "Реп — незвичне явище в Абіссинії. Він не кіт, а безкрилий молодий дракон. Кітріна, претендентка на трон Абіссинії, довго була його найближчою подругою, але Репа дедалі більше турбують її постійно зростаючі амбіції та грандіозні плани. Він відчуває ностальгію за простішими часами, коли вони вдвох жили щасливим життям. У той час як Кітріна з часом стає дедалі безжальнішою, Реп зберігає своє співчуття і робить усе можливе, щоб захистити інших від гніву Кітріни."
 #Проте він здатен використовувати магію, щоб змінювати форму на безліч образів, як це роблять чейнджлінги, тому його справжня раса є таємницею для всіх, окрім Кітріни.
 ABY_the_patriot: "Патріот"
 ABY_the_patriot_desc: "Ніхто достеменно не знає, ким є Патріот. Його особа — суворо охоронювана таємниця, і більшість часу він переховується, відмовляючись від публічних появ. Якимось чином він став верховним лідером Абіссинського Патріотичного Фронту — відданого націоналістичного руху опору, проте лише високопоставлені члени організації знають, як і чому. Теорії та чутки про нього ширяться як лісова пожежа. Дехто припускає, що насправді це нявгус Ґомез, інші стверджують, що нявгус Нявконнин повстав з мертвих, тоді як треті кажуть, що це колишній сумнозвісний бандит і вбивця, який став борцем за свободу. Хоч би якою була правда, зрозуміло одне: Патріот використає будь-які можливі методи, щоб звільнити Абіссинію і жорстоко помститися ворогам котячого роду."
 ABY_random_clawomon: "Нявдіту Нявям"
 ABY_oc_general: "Клок Муракі"
 ABY_oc_general_desc: "Клок Муракі народився на початку 980-х років. Він виріс у Кольтобі, і його дитинство було важким через поєднання війни між Абіссинією та Мейргиптом і загальної нестабільності в регіоні. Його родині пощастило уникнути поневолення в цей час, що дозволило Клоку стати годинникарем і відкрити невелику крамницю в середині 990-х. Коли Королівство Шторму вторглося в Абіссинію, Кольтоба не уникла руйнувань, і крамницю Клока пограбували та підпалили війська єті. У невдалій спробі врятувати хоч щось, він опинився у вогні. Він вижив, але його шерсть і волосся сильно обгоріли.\n\nЗалишившись у злиднях, він не мав іншого вибору, окрім як стати рабом, щоб вижити. Зіткнувшись із рабством на власні копита, він лише сильніше зненавидів його, особливо коли стикався з жорстоким поводженням свого нового господаря. Тому, почувши від інших невільників чутки про назріваюче повстання рабів, він з радістю зголосився допомогти. Використовуючи свої знання про час, здобуті завдяки виготовленню годинників, він відстежував розклади вартових та свого господаря і зміг дивом втекти саме тоді, коли перші мінялися змінами, а другий спав. Після складної подорожі сільською місцевістю він знайшов інших рабів-утікачів і зрештою приєднався до ширшого повстанського руху. Його навички годинникаря та точність у часі дозволили успішно провести кілька партизанських рейдів. Врешті-решт він піднявся неофіційними щаблями рабської армії та став одним із її провідних діячів."
 ABY_spymaster: "Майстриня-шпигунка Міттенс"
 ABY_spymaster_desc: "Ніхто не знає, як вона виглядає насправді."
 ABY_donkey_general: "Сіннахеріб"
 ABY_donkey_general_desc: "Гордий асстирійський осел і колишній солдат, який у молодості встряг у палку суперечку, що переросла в бійку на копитах. Після цього за свої злочини він був засуджений до рабства і згодом проданий за кордон абіссинському дворянину для роботи на кавовій плантації. Незважаючи на кілька десятиліть, проведених у рабстві, він ніколи не корився і терпів суворі фізичні та психологічні покарання за свою непокору. Він кілька разів намагався втекти, його ловили, карали, продавали іншому дворянину, і так знову й знову.\n\nКоли група бунтівних рабів під командуванням Шарп Спір врятувала його разом з багатьма іншими невільниками, він не виявив особливої вдячності, заявивши, що все одно планував втекти ще раз. Проте дуже скоро його рішучий та впевнений настрій заслужив повагу товаришів по нещастю. Через свій військовий досвід він часто скаржився на некомпетентність інших рабів і брав на себе командирську роль під час кількох рейдів. Одного разу Шарп Спір визнала його таланти і підвищила його до одного з командирів визвольної армії рабів. Це рішення виявилося суперечливим, оскільки багато солдатів під його командуванням скаржилися на його сувору дисципліну та непохитний характер."
 ABY_horse_general: "Фахд Аль-Касаар"
 ABY_horse_general_desc: "Народжений у рабстві в Ємейні, Фахд завжди був слухняним і працьовитим. Він не отримав жодної освіти і більшу частину свого життя провів, носячи і тягаючи важкі предмети. Коли його господар отримав вигідну пропозицію від абіссинського купця, Фахда продали абіссинській дворянці, щоб він працював її особистим скакуном. Саме тоді його покірний дух почав ламатися, оскільки кішка ставилася до нього скоріше як до тварини, ніж до раба, годуючи лише вівсом і тримаючи у стайні. Зрештою, він досяг своєї межі, вдарив свою власницю копитами по ребрах, проломивши їй грудну клітку, і помчав геть, щоб врятуватися. Міцна статура дозволила йому виживати в дикій природі протягом багатьох тижнів, поки його нарешті не знайшла група озброєних рабів на чолі з поні на ім'я Шарп Спір.\n\nЗ того часу Фахд завжди був вдячний Шарп Спір за порятунок і навіть присягнув служити їй до кінця свого життя. Хоча вона заявляла, що всі раби вільні робити те, що їм заманеться, Фахд залишився поруч із нею та діяв як її особистий охоронець. З часом він заслужив довіру Спір, і незабаром йому дозволили самостійно очолити рейд, незважаючи на відсутність досвіду. Завдяки його харизмі та рішучості рейд мав приголомшливий успіх, і Фахд отримав високе звання у визвольній армії рабів. Хоча дехто ставить під сумнів його інтелект і відсутність освіти, солдатам під його командуванням подобається його саркастичне почуття гумору, а також дружнє і легке ставлення до життя, тоді як Шарп Спір цінує його за нескінченну відданість і беззаперечну покірність. А також за сарказм, хоча сама вона в цьому не зізнається."
 ABY_com_hc1: "Меркуріоз Зоба"
 ABY_com_hc1_desc: "Меркуріоз Зоба — зебра з Алвані, який колись був гордим зубійським пустельним воїном. Його життя змінилося після того, як набіг на караван, що прямував до Тімбакту, повністю провалився. Після цього його вигнали за кордон, і він жив як бандит-бродяга в Абіссинії, перш ніж його схопила свита одного котячого дворянина. Потім він пережив кілька років рабства, поки не зміг втекти і знову повернутися до бандитизму. Одного разу він влаштував засідку на групу бунтівних рабів у пустелі, але, незважаючи на перевагу в копитах, здався і припинив бій, як тільки зрозумів, ким вони були. Раби, на яких він напав, взяли його в полон і привели до Шарп Спір, яка вирішила не лише пощадити його, але й завербувати до своєї армії. Незважаючи на початкову недовіру, Меркуріоз незабаром зарекомендував себе як експерт у партизанській війні, провівши численні рейди на рабовласників і звільнивши сотні невільників."
 ABY_com_hc2: "Енкара"
 ABY_com_hc2_desc: "Енкара — ослиця з Ансеруку, яка була високопоставленою жрицею, перш ніж суперники підставили її у злочині, якого вона не скоювала, і засудили до рабства. Через кілька років її за високу ціну купив абіссинський дворянин, розглядаючи її як чудове поповнення свого екзотичного «гарему чотириногих наложниць». Енкара не витримала такого огидного поводження і дня, в пориві гніву вбивши свого господаря. За це її суворо покарали, але вбивство зробило її небажаною як рабиню. Не в змозі продати її навіть за низькою ціною, абіссинський купець, який тепер нею володів, вирішив відпустити її в дику пустелю. Замість того, щоб померти з голоду, вона змогла знайти інших рабів-утікачів і використала свій досвід релігійної лідерки, щоб зібрати власну невелику армію. Після більш ніж десяти років боротьби вона стала загартованою ветеранкою війни. Спочатку вона скептично ставилася до визвольної армії рабів Шарп Спір і вперто відмовлялася приєднатися до неї, але після невдалого рейду на аванпост її лави порідшали, і вона не мала іншого вибору, як попросити Шарп Спір прийняти її."
 ABY_com_hc3: "Тамрат Лапіт"
 ABY_com_hc3_desc: "Коти — рідкісне явище у визвольній армії рабів. Один із них, Тамрат Лапіт, є самопроголошеним «борцем за свободу», який стверджує, що виступає проти всіх форм рабства, хоча сам родом із Клуджтауна і має велике кримінальне минуле. Незважаючи на свою аморальність, він зарекомендував себе як талановитий командир піхоти. Він ще не програв жодної битви з ворогом — факт, яким він безсумнівно любить вихвалятися."
 ABY_com_pa1: "Ґіб Берхану"
 ABY_com_pa2: "Деста Каліко"
 ABY_com_pa3: "Довгошерстий Тадессе"
 ABY_tomislav: "Томіслав"
 ABY_tomislav_desc: "У Томіслава розвинулася класова свідомість, і він вирішив приєднатися до класової війни на боці багатих."
 ABY_pizdoz: "Піздос"
 ABY_pizdoz_desc: "Дуже старанний і вічно незадоволений працівник із досвідом роботи у понад 30 професіях. Незважаючи на те, що він корінний абіссинець, у нього сильний сєвєрянський акцент. Своє прізвисько отримав за звичку постійно повторювати своє улюблене слово."
 ABY_caretaker_gov: "Перехідний уряд"
 ABY_valences_cat: "Фелікс"
 ABY_sentrys_cat: "Лем Тон"
 ABY_sentrys_cat_desc: "Світ лінгвістики та досліджень рідко помічають чи цінують під час розвитку нації, проте він такий же життєво необхідний, як паливо в наших двигунах і повітря в нашому небі. Вчені витрачають десятиліття невдячної праці, гарантуючи, що роблять свою роботу настільки добре, що про них ніхто навіть не згадує, адже це і є ознакою прогресу. \n\nДеякі ж науковці натомість проводять час, нескінченно балакаючи і дратуючи всіх обговоренням своєї роботи, або, в даному випадку, своєї гіперфіксації. Старий Містер Абіссинії — це той, хто гарантовано змусить вас дізнатися про всі тонкощі того, як розставляти крапки над 'і', незалежно від того, хотіли ви цього чи ні."

