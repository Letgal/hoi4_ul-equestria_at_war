 ABY_baron_humbert: "Гумберт Темесген"
 ABY_baron_humbert_desc: "Вже понад десятиліття Фітаврарі Діметі служить Абіссинії як диплокіт та котоміністр закордонних справ. До його володінь входить Діре-Пава, яке є третім за величиною містом у державі завдяки його прогресивній економічній політиці. Він розумний та вправний кіт-мечник."
 ABY_ras_thurston: "Терстон Ваффлз"
 ABY_ras_thurston_desc: "Раса Тиграю можна описати як підлабузника, який завжди намагається заслужити прихильність монархії. Це не означає, що він завжди схвалює дії свого сюзерена. Насправді, він може протестувати досить голосно. Він править стратегічно важливим і процвітаючим портовим містом Тиграй, яке слугує воротами Абіссинії у широкий світ."
