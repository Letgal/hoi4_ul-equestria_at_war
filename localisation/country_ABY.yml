 ABY_melee_equipment_0: "Шотел"
 ABY_melee_equipment_0_short: "Шотел"
 ABY_melee_equipment_0_desc: "Шотел — це традиційна зброя Абіссинії. Це довгий вигнутий металевий меч, схожий на великий серп. Форма меча дозволяє власнику обходити щит ворога."
 ABY_melee_equipment_1: "Лапна гармата"
 ABY_melee_equipment_1_short: "Лапна гармата"
 ABY_melee_equipment_1_desc: "Лапні гармати — це перша вогнепальна зброя, що використовувалася в Абіссинії. Як випливає з назви, це мініатюрні гармати, які тримають у лапах, із зовнішнім ґнотом, без жодного ударно-спускового механізму. Вони сумнозвісні своєю неточністю, але гучний звук, який вони видають, сильно впливає на бойовий дух ворога."
 ABY_infantry_equipment_0: "Гаркано M91"
 ABY_infantry_equipment_0_short: "Гаркано M91"
 ABY_infantry_equipment_0_desc: "У рамках угоди з Вінґбардією Абіссинія отримала велику кількість гвинтівок з інструкціями щодо їх подальшого виробництва. M91 — це остання модель «Гаркано», яка широко використовувалася абіссинською армією."
 ABY_infantry_equipment_1: "Гвинтівка «Феліда»"
 ABY_infantry_equipment_1_short: "Гвинтівка «Феліда»"
 ABY_infantry_equipment_1_desc: "У рамках зусиль зі зменшення залежності від Вінґбардії, абіссинський уряд замовив створення вітчизняної гвинтівки. Практично це ідентична копія «Гаркано» M07, і єдиною відмінністю є назва. Проте ніхто не говорить про це вголос, і M91 досі вважається останньою моделлю «Гаркано», що використовується в Абіссинії."
 ABY_infantry_equipment_2: "Пістолет-кулемет «Кс-кс-кс»"
 ABY_infantry_equipment_2_short: "Пістолет-кулемет «Кс-кс-кс»"
 ABY_infantry_equipment_2_desc: "Аберашу Кс-кс-кс приписують створення першої справді вітчизняної абіссинської зброї, яку назвали на його честь. Пістолет-кулемет «Кс-кс-кс» був натхненний новими іноземними кулеметами, які були легкими для перенесення, але при цьому зберігали високу скорострільність. Згодом ця зброя масово виготовлялася в державних майстернях і широко використовувалася абіссинською армією."
 ABY_infantry_equipment_3: "Карабін «Маусер»"
 ABY_infantry_equipment_3_short: "Карабін «Маусер»"
 ABY_infantry_equipment_3_desc: "Компанія «Маусер», що швидко розвивалася, розробила наступника застарілих гвинтівок «Феліда». Це напівавтоматична гвинтівка з газовідвідною автоматикою з коротким ходом поршня, яку просто називали «гвинтівка Маусер». Однак версія, яка виявилася набагато популярнішою в абіссинській армії, була версією карабіна — її вкорочений ствол більше підходив для ближнього бою."
 ABY_infantry_equipment_x: "Метреєс Модель 3"
 ABY_infantry_equipment_x_short: "Мет. Мод. 3"
 ABY_infantry_equipment_x_desc: "7,62-мм кулемет Модель 3 був розроблений на заміну гвинтівок «Маусер», що дедалі більше застарівали. Створений як штурмова гвинтівка, він має перемикач режимів вогню, знімний магазин і використовує проміжний патрон. Це універсальна, дешева і проста у використанні зброя, ефективніша за своїх попередників і простіша для масового виробництва на заводах."
 ABY_infantry_equipment_x_2: "Метреєс Модель 5"
 ABY_infantry_equipment_x_2_short: "Мет. Мод. 5"
 ABY_infantry_equipment_x_2_desc: "Після невдачі Моделі 4, п'яте покоління 7,62-мм гвинтівки стало покращенням у всіх аспектах. Вона повністю металева і має платформу для кріплення різноманітних додаткових аксесуарів, таких як приціли, а також покращену цівку (лапоохоронник), регульований цілик і відбивач гільз. Її не лише використовувала абіссинська армія, а й масово експортували за кордон іншим расам із лапами чи руками."
 ABY_magical_equipment_1: "Гвинтівка «Асіматі»"
 ABY_magical_equipment_1_short: "Гвинтівка «Асіматі»"
 ABY_magical_equipment_1_short_desc: "Хоча коти не мають жодних магічних здібностей, в Абіссинії є кілька родовищ кристалів, заряджених магічною енергією. Заснована на іноземних кресленнях, «Асіматі» — це перша спроба створити зброю на магічній енергії. Однак вона дуже схильна до вибухів, за що отримала прізвисько «спалювач вусів»."
 ABY_magical_equipment_2: "Гвинтівка «Мебірек'ї»"
 ABY_magical_equipment_2_short: "Гвинтівка «Мебірек'ї»"
 ABY_magical_equipment_2_short_desc: "Подальша розробка «Асіматі» призвела до створення модернізованої гвинтівки «Мебірек'ї», яка менш вибухонебезпечна і ефективніше спрямовує магічну енергію, ніж її попередниця. Однак через це її виробництво досить дороге, а кристалічні конденсатори потребують частої підзарядки."
 ABY_magical_equipment_3: "Гвинтівка «Кірісіталі»"
 ABY_magical_equipment_3_short: "Гвинтівка «Кірісіталі»"
 ABY_magical_equipment_3_desc: "Розробка відносно дешевих конденсаторів із ущільнених кристалів дозволила замінити «Мебірек'ї» новою гвинтівкою «Кірісіталі», яка була кращою і в інших аспектах. Вона мала вищу скорострільність поряд із покращеною точністю. Більш сфокусоване спрямування магічної енергії дозволяло їй легше пробивати легкоброньовані цілі."
 ABY_magical_equipment_4: "Гулібеті Метреєс Модель 2"
 ABY_magical_equipment_4_short: "Гул. Мет. Мод. 2"
 ABY_magical_equipment_4_desc: "Створений на базі 7,62-мм кулемета, енергетичний кулемет мав дуже схожу конструкцію, просто замінивши магазин з боєприпасами на кристалічний конденсатор. Це полегшило виробництво та обслуговування обладнання, оскільки більшість його деталей були взаємозамінними зі стандартною пороховою версією. Єдиною проблемою була відсутність внутрішнього постачання кристалів, що робило його дорожчим, оскільки масове виробництво вимагало імпорту кристалів з-за кордону."
 
 ABY_artillery_equipment_0: "Бронзова мортира"
 ABY_artillery_equipment_0_short: "Бронзова мортира"
 ABY_artillery_equipment_0_desc: "Нявгіст Мяуодора II відома тим, що замовила створення першої вітчизняної артилерійської зброї в Абіссинії. Ці масивні бронзові мортири дуже незграбні й неточні. Іноді потрібно до 800 рабів, щоб пересунути одну мортиру."
 ABY_artillery_equipment_1: "Гармата da 75/27 modello 06"
 ABY_artillery_equipment_1_short: "Гармата da 75/27"
 ABY_artillery_equipment_1_desc: "Вінґбардійські артилерійські гармати виявилися набагато кращими за старі примітивні мортири, але водночас дуже дорогими у виробництві через вартість ліцензії. Тому спочатку їх використовувала лише Королівська гвардія."
 ABY_artillery_equipment_2: "105-мм гірська мяубиця"
 ABY_artillery_equipment_2_short: "Гірська мяубиця"
 ABY_artillery_equipment_2_desc: "Мяубиці — це легкі гаубиці, розроблені для використання в суворій і гірській місцевості Абіссинії. Їх легко розгортати і розбирати, що дозволяє артилерійським підрозділам швидко змінювати позиції після стрільби, і вони можуть стріляти під дуже великими кутами. Назва походить від творця зброї, Кебеде Мяу, який базував свій дизайн на іноземних гаубицях."
 ABY_artillery_equipment_3: "120-мм котопульта"
 ABY_artillery_equipment_3_short: "Котопульта"
 ABY_artillery_equipment_3_desc: "Котопульти — це модернізована артилерія, призначена для досягнення балансу між мобільністю та вогневою міццю."
 ABY_anti_tank_equipment_1: "Solothurn S-18/1000"
 ABY_anti_tank_equipment_1_short: "Solothurn S-18/1000"
 ABY_anti_tank_equipment_2: "50-мм протитанкові гармати «Ікло»"
 ABY_anti_tank_equipment_2_short: "«Ікло»"
 ABY_anti_air_equipment_1: "Greda modello 7"
 ABY_anti_air_equipment_1_short: "Greda Model 7"
 ABY_anti_air_equipment_2: "40-мм зенітні гармати «Птахолов»"
 ABY_anti_air_equipment_2_short: "«Птахолов»"
 
