 abyssinia.213.a:0 "Зрештою вони заспокояться."
 
 abyssinia.214.t_clawomon:0 "Закон про обмеження термінів"
 abyssinia.214.t_no_clawomon:0 "Закон про розподіл влад"
 abyssinia.214.d_chief_minister:0 "«Знаєш, Спір, — сказав Фад, — опозиція цьому законодавству зробить тебе схожою на тирана».\n«Я знаю!» — роздратовано відповіла вона, і швидкий стукіт її копит відлунив у коридорі. «І мені байдуже, що вони про мене думають. Я сказала їм, що піду у відставку в майбутньому, і я це зроблю».\n«Але скільки часу тобі знадобиться, щоб зробити все, що ти хочеш? Можливо, вони й вірять тобі, але просто хочуть встановити часові рамки».\n«Ти ж читав пропозицію, так? Якщо її ухвалять, це означатиме, що мій термін вже минув, а отже, мене виженуть».\n«Ага. То ось про що там йшлося. Вибач, я не дуже добре розумію юридичну мову...»\nСпір розчаровано пирхнула і відчинила двері до зали парламенту. «Побажай мені удачі, Фаде», — тихо попросила вона.\nЖеребець усміхнувся. «Тобі не потрібна удача. Я знаю, що ти впораєшся».\nВона усміхнулася у відповідь, глибоко вдихнула і увійшла.\n\nПредставники тихо сиділи, слухаючи промову Спір: дехто здавався сердитим, дехто знудженим, а декілька, здавалося, спали. «...Мета обмеження термінів — уникнути диктатури, але наша нація не така. Парламент бере активну участь у законодавчому процесі...»\nТишу натовпу грубо порушили. «Ніщо не заважає тобі ухвалювати закони без нашого схвалення!» — вигукнув віслюк з аудиторії.\n«Тиші, будь ласка!» — заявив котячий спікер парламенту.\nСпір виглядала ніяково і прочистила горло. «Як я вже казала... Я прошу вас переглянути рішення про ухвалення цього закону. Він не зробить нічого, крім внесення хаосу в політику через примусову зміну керівництва...»\n«Твоя революція була примусовою зміною керівництва!» — вигукнув якийсь кіт.\n«Я сказав тиша!» — зажадав спікер. «Головний міністр говорить».\nСпір нервово ковтнула. «Я... Я...» Потім вона зітхнула. «Я буду чесною. Мені потрібно більше часу, щоб завершити свої реформи. Це все, про що я прошу. Після того, як вони будуть завершені, я піду у відставку, як і обіцяла, і ви зможете запровадити будь-які обмеження термінів, які забажаєте».\nПредставниця поні підвелася на задні лапи. «ДИКТАТОР!» — голосно вигукнула вона і вказала копитом на Спір.\n«Я ВИМАГАЮ ДОТРИМАННЯ ПРОТОКОЛУ ТА ПОВАГИ ДО НАШОГО ГОЛОВНОГО МІНІСТРА!» — крикнув у відповідь спікер.\n«Ні, ні, все добре, — сказала Спір тремтячим голосом. — Я сказала все, що могла. Ви можете продовжувати». Вона зійшла з трибуни і покинула залу."
 abyssinia.214.d_first_citizen:0 "«Знаєш, Спір, — сказав Фад, — опозиція цьому законодавству зробить тебе схожою на тирана».\n«Я знаю!» — роздратовано відповіла вона, і швидкий стукіт її копит відлунив у коридорі. «І мені байдуже, що вони про мене думають. Я сказала їм, що піду у відставку в майбутньому, і я це зроблю».\n«Але чи дійсно тобі потрібно бути і главою уряду, і главою держави? Можливо, вони й вірять тобі, але просто хочуть розділити ці дві посади».\n«Ти ж читав пропозицію, так? Якщо вони їх розділять, обидві отримають достатньо повноважень, щоб блокувати одна одну. Напівпрезидентська система означає, що я не зможу виконати свої плани за розумний проміжок часу».\n«Ага. То ось про що там йшлося. Вибач, я не дуже добре розумію юридичну мову...»\nСпір розчаровано пирхнула і відчинила двері до зали парламенту. «Побажай мені удачі, Фаде», — тихо попросила вона.\nЖеребець усміхнувся. «Тобі не потрібна удача. Я знаю, що ти впораєшся».\nВона усміхнулася у відповідь, глибоко вдихнула і увійшла.\n\nПредставники тихо сиділи, слухаючи промову Спір: дехто здавався сердитим, дехто знудженим, а декілька, здавалося, спали. «...Мета розподілу влад полягає в тому, щоб розподілити політичну владу між кількома особами, але в цей делікатний час це останнє, що потрібно нашій нації. Крім того, між виконавчою та законодавчою владою вже існує розподіл...»\nТишу натовпу грубо порушили. «Ніщо не заважає тобі ухвалювати закони без нашого схвалення!» — вигукнув віслюк з аудиторії.\n«Тиші, будь ласка!» — заявив котячий спікер парламенту.\nСпір виглядала ніяково і прочистила горло. «Як я вже казала... Я прошу вас переглянути рішення про ухвалення цього закону. Він не зробить нічого, крім внесення хаосу в політику через роздроблення керівництва...»\n«Твоя революція вже роздробила керівництво!» — вигукнув якийсь кіт.\n«Я сказав тиша!» — зажадав спікер. «Перший Громадянин говорить».\nСпір нервово ковтнула. «Я... Я...» Потім вона зітхнула. «Я буду чесною. Я повинна залишатися як главою держави, так і уряду, щоб завершити свої реформи. Це все, про що я прошу. Після того, як вони будуть завершені, я піду у відставку, як і обіцяла, і ви зможете запровадити будь-який розподіл влад, який забажаєте».\nПредставниця поні підвелася на задні лапи. «ДИКТАТОР!» — голосно вигукнула вона і вказала копитом на Спір.\n«Я ВИМАГАЮ ДОТРИМАННЯ ПРОТОКОЛУ ТА ПОВАГИ ДО НАШОГО ПЕРШОГО ГРОМАДЯНИНА!» — крикнув у відповідь спікер.\n«Ні, ні, все добре, — сказала Спір тремтячим голосом. — Я сказала все, що могла. Ви можете продовжувати». Вона зійшла з трибуни і покинула залу."
 abyssinia.214.d_empress:0 "«Знаєш, Спір, — сказав Фад, — опозиція цьому законодавству зробить тебе схожою на тирана».\n«Я знаю!» — роздратовано відповіла вона, і швидкий стукіт її копит відлунив у коридорі. «І мені байдуже, що вони про мене думають. Я сказала їм, що зрічуся престолу в майбутньому, і я це зроблю».\n«Але чи дійсно тобі потрібно бути і главою уряду, і главою держави? Можливо, вони й вірять тобі, але просто хочуть розділити ці дві посади».\n«Ти ж читав пропозицію, так? Якщо вони їх розділять, обидві отримають достатньо повноважень, щоб блокувати одна одну. Напівконституційна монархія означає, що я не зможу виконати свої плани за розумний проміжок часу».\n«Ага. То ось про що там йшлося. Вибач, я не дуже добре розумію юридичну мову...»\nСпір розчаровано пирхнула і відчинила двері до зали парламенту. «Побажай мені удачі, Фаде», — тихо попросила вона.\nЖеребець усміхнувся. «Тобі не потрібна удача. Я знаю, що ти впораєшся».\nВона усміхнулася у відповідь, глибоко вдихнула і увійшла.\n\nПредставники тихо сиділи, слухаючи промову Спір: дехто здавався сердитим, дехто знудженим, а декілька, здавалося, спали. «...Мета розподілу влад полягає в тому, щоб розподілити політичну владу між кількома особами, але в цей делікатний час це останнє, що потрібно нашій нації. Крім того, між виконавчою та законодавчою владою вже існує розподіл...»\nТишу натовпу грубо порушили. «Ніщо не заважає тобі ухвалювати закони без нашого схвалення!» — вигукнув віслюк з аудиторії.\n«Тиші, будь ласка!» — заявив котячий спікер парламенту.\nСпір виглядала ніяково і прочистила горло. «Як я вже казала... Я прошу вас переглянути рішення про ухвалення цього закону. Він не зробить нічого, крім внесення хаосу в політику через роздроблення керівництва...»\n«Твоя революція вже роздробила керівництво!» — вигукнув якийсь кіт.\n«Я сказав тиша!» — зажадав спікер. «Імператриця говорить».\nСпір нервово ковтнула. «Я... Я...» Потім вона зітхнула. «Я буду чесною. Я повинна залишатися як главою держави, так і уряду, щоб завершити свої реформи. Це все, про що я прошу. Після того, як вони будуть завершені, я зрічуся престолу, як і обіцяла, і ви зможете запровадити будь-який розподіл влад, який забажаєте».\nПредставниця поні підвелася на задні лапи. «ТИРАН!» — голосно вигукнула вона і вказала копитом на Спір.\n«Я ВИМАГАЮ ДОТРИМАННЯ ПРОТОКОЛУ ТА ПОВАГИ ДО НАШОЇ ІМПЕРАТРИЦІ!» — крикнув у відповідь спікер.\n«Ні, ні, все добре, — сказала Спір тремтячим голосом. — Я сказала все, що могла. Ви можете продовжувати». Вона зійшла з трибуни і покинула залу."
 abyssinia.214.a:0 "Парламент перейшов до голосування."
 
 abyssinia.215.t:0 "Вето"
 abyssinia.215.d:0 "«Ти дійсно наклала вето на цей закон?» — запитав Фад, хитаючи головою. «Не впевнений, що це була гарна ідея...»\n«А який у мене ще вибір? Парламент не прислухався до моїх слів, і більшість представників проголосували за нього. Якби він набув чинності, мої плани були б зруйновані».\n«Гм, ти і твої великі плани...» Він постукав по своєму точеному підборіддю. «Ти коли-небудь думала про те, щоб просто... забути про свої плани? І повернутися додому?»\nСпір здулася, мов повітряна кулька. «Так, повір мені. Я думала. Багато разів. Але це по суті те саме, що здатися, чи не так?»\nВін знизав плечима. «Такими темпами тебе вб'ють чи щось таке».\n«Фаде, якби я поїхала, а потім... Абіссинія повернулася б у Тартар, з черговою громадянською війною, або, не дай боже, повернули б рабство... Я б ніколи собі цього не пробачила до кінця життя».\nЖеребець з розумінням кивнув. «Отже, ти робиш те, що маєш. Думаю, ми всі так робимо. Плести політичні інтриги все ж краще, ніж вбивати ворогів, принаймні...»\n«Саме так».\n«...Але якщо ти зайдеш надто далеко, захищаючи свої плани, можливо, ти отримаєш пророцтво, що самоздійснюється. Знаєш, як коли намагаєшся уникнути громадянської війни, але в підсумку спричиняєш її».\nСпір здригнулася, ніби її щойно вдарили ножем. «Т-так, ти маєш рацію... Гадаю, мені просто доведеться продовжувати балансувати на лезі ножа. Намагатися зберегти свої плани і водночас не дратувати абіссинців». Вона потерла голову. «Ух, який головний біль...»\nФад поклав втішне копито їй на плече. «Це не триватиме вічно. Одного дня ти зможеш просто поїхати. А до того часу я буду робити все можливе, щоб підтримати тебе».\nСпір усміхнулася і поклала своє менше копито поверх його. «Де б я була без тебе...»"
 abyssinia.215.a:0 "Вона все одно диктаторка, якими б не були її наміри."
 
 abyssinia.216.t:0 "Дебати про віру"
 abyssinia.216.d:0 "Шарп Спір сперлася на свою трибуну, втомлено намагаючись тримати очі розплющеними.\n«...Немає Абіссинії без баастизму, те, що ви пропонуєте — це духовна смерть нації», — заявив представник котячого парламенту.\n«Баастизм — це віра котів, а як щодо всіх інших рас, які тепер тут живуть?» — запитав представник коней. «Усі конфесії мають бути представлені в нашій країні».\n«Будь-яка релігія — це опіум для народу!» — проголосив кіт в окулярах. «Суспільству час відійти від дитячих оман».\n\nЗдавалося, це розлютило багатьох, і дискусія переросла в гучні суперечки. Спір глянула на порожнє місце спікера парламенту. Не було нікого, хто міг би підтримувати хоча б видимість порядку в залі. Вона зітхнула, зібралася з силами і випросталася. «Порядок у залі, будь ласка!» — голосно зажадала вона. Здавалося, це не дало особливого результату, тому вона повторила голосніше: «Я СКАЗАЛА ПОРЯДОК!»\nСуперечки вщухли, і Спір прочистила своє хворе горло. «Я думаю, що це питання було достатньо обговорене. Цим дебати завершуються. Далі ви можете провести голосування щодо цієї конституційної поправки. Якщо її ухвалять, я розгляну її зі своїми міністрами і можу схвалити або відхилити. Те саме стосується двох інших пропозицій щодо статусу релігії в Абіссинії. Стандартна процедура...» Вона зробила паузу, щоб позіхнути, не в змозі стриматися."
 abyssinia.216.a:0 "Поправка про проголошення Абіссинії атеїстичною державою ухвалена."
 abyssinia.216.b:0 "Поправка про проголошення Абіссинії світською державою ухвалена."
 abyssinia.216.c:0 "Поправка про проголошення Абіссинії конфесійною державою ухвалена."
 
 abyssinia.217.t:0 "[From.GetNameDefCap] пропонує альянс"
 abyssinia.217.d:0 "Революційний уряд ([From.GetNameDef]), який повалив наших гнобителів, тепер звернувся до нас через дипломатичні канали. Вони пропонують союз між нашими двома країнами заради взаємної безпеки та ширшої співпраці. Хоча це приваблива пропозиція, деякі поні в нашому уряді кажуть, що це чудова можливість попросити їх надати щось натомість. Дехто навіть каже, що ([From.GetNameDef]) ніколи не можна довіряти і що нам краще бути самим по собі. Однак [Root.GetLeader] може просто проігнорувати ці думки і прийняти пропозицію."
 abyssinia.217.a:0 "Прийняти пропозицію."
 abyssinia.217.b:0 "Попросити їх спочатку звільнити наші землі."
 abyssinia.217.c:0 "Проігнорувати пропозицію."
 
 abyssinia.218.t:0 "Мейндалусія приймає пропозицію союзу"
 abyssinia.218.d:0 "Шарп Спір відпила зі свого святкового келиха медового вина. «Знаєш, від цього мені стає легше на душі через моє минуле».\nФад Аль-Касаар допив свою гарячу чашку кави, з якої йшла пара, а потім підняв густу брову. «Це як?»\n«Мейндалусія — це земля, де я стала військовополоненою та рабинею, тому в мене завжди були погані спогади про неї. Але тепер Мейндалусія — наш союзник, і, сподіваюся, на їхній землі більше не буде воєн».\nФад з розумінням кивнув, але злегка насупився. «Так, але тепер, коли вони наші союзники... хіба ми не будемо зобов'язані допомогти їм, якщо на них нападуть?»\n«Так, напевно... але сам факт існування союзу має відлякати будь-яких нападників».\n«А якщо ні?»\nНижча на зріст поні закотила очі. «Фаде, ти намагаєшся зіпсувати мені гарний настрій?»\nВищий жеребець швидко похитав головою. «Ні, ні, зовсім ні. Я просто, знаєш, думаю про те, що ти сказала».\nВона зітхнула. «Вибач. Але ти маєш рацію, статися може будь-що. Проте я все одно не сидітиму там у піщаній траншеї з гвинтівкою в копитах, і навіть якщо спалахне конфлікт, ніхто не повинен потрапити в рабство, як я тоді»."
 abyssinia.218.a:0 "Мир у наш час."
 
 abyssinia.219.t:0 "Мейндалусія приймає пропозицію союзу, але за однієї умови"
 abyssinia.219.d:0 "Шарп Спір пильно подивилася на мейндалусійського делегата-поні, що сидів у кріслі навпроти неї. «...Ви серйозно?»\nУсмішка делегата здригнулася, коли він кивнув. «Так, так, я думаю, що це розумне прохання, чи не так? Спосіб для вас довести, що ви будете для нас хорошим союзником».\nКобила потерла лоб копитом. «Гаразд... Я б віддала перевагу, якби ви спочатку прийняли союз, а вже потім висували подібні прохання про ведення воєн і звільнення територій».\nВін знизав плечима. «Яка б у вас була причина приймати таке прохання? Ви б отримали те, що хотіли, а ми ні».\n«Хіба я виглядаю настільки грубою, щоб відмовити?» — відповіла вона з роздратуванням у голосі.\nЖеребець вивчив її обличчя, а потім знову кивнув. «Чесно кажучи, так. Без образ».\n«Які вже тут образи, — пробурмотіла Спір. — Гадаю, мені доведеться обміркувати вашу зустрічну пропозицію. Я б воліла не втручатися в територіальні суперечки іншої країни, але, мабуть, доведеться, якщо я хочу заслужити вашу довіру».\n«Хіба звільнення не є метою вашого революційного уряду?»\n«Звільнення від рабства, а не націоналістичне визволення від іноземної окупації. АПФ хоче, щоб останнє було нашою метою, а це означало б "звільнення" Мейндалусії від них самих».\nМейндалусієць виглядав стурбованим, вочевидь, не впевненим, чи не було це прихованою погрозою."
 abyssinia.219.a:0 "Ми погоджуємося звільнити ваші землі."
 abyssinia.219.b:0 "Ми відмовляємося."
 
 abyssinia.220.t:0 "Мейндалусія ігнорує пропозицію союзу"
 abyssinia.220.d:0 "Шарп Спір спорожнила свій келих медового вина, а потім сердито забурмотіла: «Ці дурні мейндалусійці... якби вони хотіли відмовити, вони могли б просто сказати "ні"... замість того, щоб ігнорувати всі дипломатичні комюніке...»\nФад Аль-Касаар з турботою подивився на неї, сидячи поруч у вітальні. «Спір, я думаю, на сьогодні тобі вже досить пити...»\nВона ліниво кліпнула очима. «Хто ти такий, щоб вказувати... скільки мені можна пити? Ти не мій власник... ніхто не мій власник... Я можу пити скільки захочу...»\n«Можеш, просто я не думаю, що це піде тобі на користь. Завтра в тебе буде страшенно боліти голова».\n«Ну і що? У мене вже достатньо болить ця клята голова від поведінки цих клятих мейндалусійців... ця країна — суцільне нещастя для мене. Я йду туди на війну, мене беруть у полон, мене перетворюють на рабиню... до біса це місце. Я не... я більше не хочу про це думати...» Раптом вона розплакалася.\nІнстинктивно Фад підвівся зі свого місця і підійшов обійняти її, дозволивши їй плакати на своєму м'язистому плечі. «Спір... якби ти не потрапила в рабство, ми б, напевно, ніколи не зустрілися, розумієш? Тож у цьому є якась вдача, чи не так?»\nСпір почала голосно ридати та голосити."
 abyssinia.220.a:0 "Як грубо з їхнього боку."
 abyssinia.220.b:0 "Час стерти Мейндалусію з лиця землі."
 
 abyssinia.221.t:0 "[ABY.GetNameDefCap] відхиляє зустрічну пропозицію"
 abyssinia.221.d:0 "На жаль, наш гамбіт провалився, оскільки [ABY.GetAdjective] уряд не зацікавився нашою пропозицією. Ми просили їх звільнити наші окуповані землі до того, як ми зможемо укласти союз, але, схоже, вони не були зацікавлені в такій угоді. Тепер ми залишилися ні з чим: ні союзника, ні звільнених земель. Ті, хто запропонував цю безглузду ідею, повинні соромитися самих себе."
 abyssinia.221.a:0 "Ну що ж."
 
 abyssinia.222.t:0 "Доля Мейндалусії"
 abyssinia.222.d:0 "Зустріч Шарп Спір з членами Національної Асоціації Мейндалусії затягнулася на години, що погіршувалося тим фактом, що вона стала рабинею під час Мейндалусійської війни багато років тому. Потім вона потягла копита на ще одну зустріч, цього разу з парламентом. Зрештою, на жодній з них не було досягнуто жодної угоди чи консенсусу. Абсолютно виснажена, вона вирушила випити зі своїм другом.\n\n«Ти виглядаєш так, ніби побувала в Тартарі, поборолася з баґбіром, а потім повернулася», — пожартував Фад Аль-Касаар, від щирого серця розсміявся і відпив зі своєї чашки кави.\n«Саме так я себе і почуваю», — пробурмотіла Спір і відпила зі свого кухля медового вина.\n«Шкода, що робота на кавовій плантації зіпсувала для тебе каву. Її пиття піднімає настрій!»\n«Як і це», — сказала вона з усмішкою і знову відпила.\n«Справедливо. Слухай, я знаю, ти не любиш говорити про роботу, але хіба тобі не стало б легше, якби ти виговорилася?»\nВона зітхнула. «О, це все через цю суперечку щодо Мейндалусії. Я збиралася просто передати її законним власникам, але, очевидно, ні мейндалусійці, ні уряд на це не погодилися. Перші хочуть повної незалежності, а другі хочуть дати їм лише автономію».\nФад потер підборіддя копитом. «Звучить складно, так. Але ж останнє слово все одно за тобою, чи не так?»\n«Ну, як глава держави — так, але...»\n«Тоді просто роби те, що вважаєш за краще», — сказав він, знизавши плечима, і випив.\nСпір задумливо насупилася і теж випила."
 abyssinia.222.a:0 "Мейндалусія заслуговує на незалежність."
 abyssinia.222.b:0 "Мейндалусійцям доведеться задовольнятися автономією."
 abyssinia.222.c:0 "Ми всі знаємо, хто є законними власниками Мейндалусії."

 abyssinia.223.t:0 "Системна помилка"
 abyssinia.223.d:0 "В програмі сталася необроблена виняткова ситуація. Якщо ви натиснете «Продовжити», програма проігнорує цю помилку та спробує продовжити роботу. Якщо ви натиснете «Вийти», програма негайно закриється.\n\nСталася помилка під час обробки дурдому з Мейндалусією/Клуджтауном\n\nБудь ласка, повідомте про цю проблему на офіційному Discord-сервері Equestria at War: https://discord.gg/equestriaatwar"
 abyssinia.223.a:0 "Продовжити"
 abyssinia.223.b:0 "Вийти"
 
 abyssinia.224.t:0 "[ABY.GetNameDefCap] вимагає незалежності для Клуджтауна"
 abyssinia.224.d:0 "Сьогодні з міста [From.Capital.GetName] надійшло дипломатичне послання. Відроджена [From.GetName], вирішивши свої внутрішні проблеми, протестує проти нашого сюзеренітету над державою [KLG.GetNameDef]. У цій очевидно зухвалій спробі продемонструвати свій вплив [From.GetAdjective] представники вимагають повернути місту-державі незалежність і право вільно визначати власне майбутнє. Клуджтаун був продуктивною частиною нашої держави, проте коти залишили мало місця для суперечок, погрожуючи подальшим погіршенням відносин між нашими країнами. Що нам робити?"
 abyssinia.224.a:0 "Ми дозволимо цьому маленькому містечку здобути свободу."
 abyssinia.224.b:0 "[Root.GetName] не піддасться на погрози."
 
 abyssinia.225.t:0 "Наслідки"
 abyssinia.225.d_from_maregypt:0 "«...Ось чому, на мою думку, переговори зрештою зірвалися», — пояснював котячий міністр закордонних справ Шарп Спір.\nВона розвалилася в кріслі, дивлячись у порожнечу і нічого не кажучи.\nКіт кліпнув очима і сіпнув вухами. «Мем, все гаразд?»\nПоні теж кліпнула очима. «Так. Я в порядку».\nОчі міністра тривожно забігали, і він прочистив горло. «Отже, що ми тепер будемо робити з Клуджтауном?»\nРаптом Спір сердито насупилася. «Я, трясця, не знаю! Що, хочеш, щоб я пішла і втягнулася у війну з власною батьківщиною?»\nКіт щосили намагався зберегти професійний спокій. «...Ви з Клуджтауна?»\nСпір ледь не підскочила в кріслі. «Ні! З Мейргипту! Чому вони так піклуються про цей Клуджтаун? Принаймні за Мейндалусію варто було боротися! А Клуджтаун — це просто якісь нетрі в пустелі!»\n«Будь ласка, мем, заспокойтеся, це вкрай непроф—»\n«Мені байдуже! Ті марегіпетські переговірники теж не дуже професійні. Вони знають, що я з Мейргипту, тому використовують це на свою користь! Вони хочуть, щоб я відступила і повністю здалася!»\n«...Я маю на увазі, що ми могли б».\nВесь запал Спір вивітрився. Вона витріщилася на нього, потім кивнула. «...Правда. Так, могли б». Вона повільно відкинулася назад у крісло. «Це розлютить АПФ, але я думала про те, щоб зробити це. Клуджтаун не хоче нас, то чому ми повинні хотіти Клуджтаун?»\n«Отже, це ваше остаточне рішення?»\nКобила похитала головою. «Ні. Я обговорю це зі своїми радниками. Після цього ви отримаєте інструкції. Давайте закінчимо цю зустріч»."
 abyssinia.225.d_from_not_maregypt:0 "«...Ось чому, на мою думку, переговори зрештою зірвалися», — пояснював котячий міністр закордонних справ Шарп Спір.\nВона розвалилася в кріслі, спершись на копито з байдужим виразом обличчя. «Це обов'язково мала бути зустріч?» — роздратовано запитала вона.\nКіт кліпнув очима і сіпнув вухами. «Що ви маєте на увазі, мем?»\n«Я маю на увазі, що це могло б бути просто повідомленням. Нам не потрібно було влаштовувати через це тридцятихвилинну зустріч».\nСприйнявши це як жарт, міністр хихикнув. «Запевняю вас, такі важливі питання найкраще вирішувати під час зустрічей».\nСпір не виглядала задоволеною. «Ви щойно коротко переказали хід переговорів і повідомили мені результати. Моя участь не була потрібна. Якби вам потрібні були подальші вказівки, я б могла просто відправити повідомлення у відповідь».\nТепер кіт більше не посміхався. «Зустріч забирає менше часу та ресурсів, ніж написання та безпечна доставка повідомлення, я вважаю».\n«Можливо, для вас. Але не для мене. У мене щодня з десяток зустрічей. Я б воліла, щоб усі вони були дійсно необхідними. Я з радістю особисто оплачу будь-які додаткові витрати, пов'язані з надсиланням повідомлень».\n«Мем...» — кіт зупинився, а потім відкашлявся. «Вибачте. Думаю, тоді настав час завершити нашу зустріч».\nСпір різко кивнула. «Згодна. Я обговорю зі своїми радниками, що робити з Клуджтауном. Після цього я доставлю вам ПОВІДОМЛЕННЯ, інформуючи про наше рішення і даючи подальші вказівки».\nЗіниці кота звузилися в гострі щілинки. «Зрозумів, мем»."
 abyssinia.225.a:0 "У нас немає іншого вибору, окрім як послати армію на звільнення Клуджтауна."
 abyssinia.225.b:0 "Клуджтаун не вартий цих клопотів. Відмовтеся від наших претензій на нього."
 
 abyssinia.226.t:0 "Клуджтаун стає незалежним"
 abyssinia.226.d:0 "«...Ось чому, на мою думку, вони дозволили Клуджтауну відновити свою незалежність», — пояснював котячий міністр закордонних справ Шарп Спір.\nВона усміхалася, але в її очах було роздратування, яке злегка сіпалося. «Це чудово і все таке, але... навіщо нам була потрібна зустріч?» — запитала вона.\nКіт кліпнув очима і сіпнув вухами. «Що ви маєте на увазі, мем?»\n«Я маю на увазі, що це могло б бути просто повідомленням. Нам не потрібно було влаштовувати через це тридцятихвилинну зустріч».\nСприйнявши це як жарт, міністр хихикнув. «Запевняю вас, такі важливі питання найкраще вирішувати під час зустрічей».\nСпір не виглядала задоволеною. «Ви щойно коротко переказали хід переговорів і повідомили мені результати. Моя участь не була потрібна. Ви чудово знаєте, яким є наступний етап плану».\nТепер кіт більше не посміхався. «Зустріч забирає менше часу та ресурсів, ніж написання та безпечна доставка повідомлення, я вважаю».\n«Можливо, для вас. Але не для мене. У мене щодня з десяток зустрічей. Я б воліла, щоб усі вони були дійсно необхідними. Я з радістю особисто оплачу будь-які додаткові витрати, пов'язані з надсиланням повідомлень».\n«Мем...» — кіт зупинився, а потім відкашлявся. «Вибачте. Думаю, тоді настав час завершити нашу зустріч».\nСпір кивнула, помітно заспокоюючись. «Згодна. Але все одно дякую. Тепер ми можемо приступити до нашого плану з вирішення цього головного болю з Клуджтауном»."
 abyssinia.226.a:0 "Час доставити повідомлення Клуджтауну."
 
 abyssinia.227.t:0 "[ABY.GetNameDefCap] вимагає повернення Клуджтауна"
 abyssinia.227.d:0 "Сьогодні з міста [From.Capital.GetName] надійшло дипломатичне послання. Відроджена [From.GetName], вирішивши свої внутрішні проблеми, протестує проти нашого володіння Клуджтауном. У цій очевидно зухвалій спробі захоплення земель [From.GetAdjective] представники вимагають, щоб ми відмовилися від колишнього міста-держави на їхню користь. Клуджтаун був продуктивною частиною нашої держави, проте коти залишили мало місця для суперечок, погрожуючи подальшим погіршенням відносин між нашими країнами. Що нам робити? "
 abyssinia.227.a:0 "Це маленьке місто не варте таких проблем."
 abyssinia.227.b:0 "[Root.GetName] не піддасться на погрози."
 
 abyssinia.228.t:0 "[From.GetNameDefCap] поступається Клуджтауном"
 abyssinia.228.d:0 "«...Ось чому, на мою думку, вони поступилися нам Клуджтауном без необхідності подальших переговорів», — пояснював котячий міністр закордонних справ Шарп Спір.\nВона з полегшенням зітхнула. «Дякую за вашу чудову роботу, міністре. Я рада, що мені більше не потрібно про це турбуватися». Потім вона вдихнула, готуючись сказати дещо менш приємне. «Але... чи була ця зустріч абсолютно необхідною?»\nКіт кліпнув очима і сіпнув вухами. «Що ви маєте на увазі, мем?»\n«Я маю на увазі, що це могло б бути просто повідомленням. Нам не потрібно було влаштовувати через це тридцятихвилинну зустріч».\nСприйнявши це як жарт, міністр хихикнув. «Запевняю вас, такі важливі питання найкраще вирішувати під час зустрічей».\nСпір не виглядала задоволеною. «Ви щойно коротко переказали хід переговорів і повідомили мені результати. Моя участь не була потрібна. Ви чудово знаєте, яким є наступний етап плану».\nТепер кіт більше не посміхався. «Зустріч забирає менше часу та ресурсів, ніж написання та безпечна доставка повідомлення, я вважаю».\n«Можливо, для вас. Але не для мене. У мене щодня з десяток зустрічей. Я б воліла, щоб усі вони були дійсно необхідними. Я з радістю особисто оплачу будь-які додаткові витрати, пов'язані з надсиланням повідомлень».\n«Мем...» — кіт зупинився, а потім відкашлявся. «Вибачте. Думаю, тоді настав час завершити нашу зустріч».\nСпір кивнула, помітно заспокоюючись. «Згодна. Але ще раз дякую. Я просто... втомилася від усіх цих зустрічей, знаєте. Вибачте. Це я маю вибачатися».\nВін підняв лапу. «Не варто, все гаразд. Відтепер я віддаватиму перевагу надсиланню вам повідомлень замість організації зустрічей»."
 abyssinia.228.a:0 "«Дякую»."
 
 abyssinia.229.t:0 "[From.GetNameDefCap] відмовляється поступитися Клуджтауном"
 
 abyssinia.230.t:0 "[From.GetNameDefCap] пропонує пакт про ненапад"
 abyssinia.230.d:0 "Сусідня [From.GetName] звертається до нас із цікавим проханням: вони прагнуть дружніх відносин між нашими державами у формі пакту про ненапад. Відомо, що [From.GetAdjective] народ сильно постраждав від навали єті, тому не дивно, що вони хотіли б мінімізувати подальші агресивні дії проти себе. Питання полягає в тому, чи відповідає ця пропозиція нашим поточним планам на міжнародній арені?"
 abyssinia.230.a:0 "Цілком прийнятно."
 abyssinia.230.b:0 "Це не в наших інтересах."
 
 abyssinia.231.t:0 "Обіцянка миру"
 abyssinia.231.d:0 "[Root.GetAdjective] дипломати зустрілися зі своїми [From.GetAdjective] колегами і після кількох годин переговорів дійшли згоди, підписавши договір, у якому обидві сторони пообіцяли не розпочинати війну одна проти одної. Коли Шарп Спір почула цю новину, вона відчула полегшення і повірила, що [From.GetNameDef] виконає свою частину угоди в осяжному майбутньому."
 abyssinia.231.a:0 "Це найкращий результат для всіх."
 
 abyssinia.232.t:0 "[From.GetNameDefCap] не зацікавлена в мирі"
 abyssinia.232.d:0 "[Root.GetAdjective] дипломати зустрілися зі своїми [From.GetAdjective] колегами, але не змогли дійти згоди навіть після кількох днів переговорів. Схоже, [From.GetNameDef] зовсім не була зацікавлена в тому, щоб дати обіцянку не нападати на [Root.GetNameDef]. Коли Шарп Спір почула цю новину, вона була вкрай стурбована і поставила під сумнів мотиви лідера [From.GetLeader]. Вона заявила, що цілком можливо, що вони планують зрадити й атакувати [Root.GetNameDef], щойно отримають для цього можливість. Хоча дехто розцінив це як непереконливу спробу виправдати конфлікт, інші згадали її травму від минулих громадянських воєн і те, як це могло ускладнити її здатність довіряти іншим."
 abyssinia.232.a:0 "Ми повинні вдарити першими, поки цього не зробили вони! Це не параноя."
 abyssinia.232.b:0 "Тоді їм просто не можна довіряти."
 
 abyssinia.233.t:0 "РОЗВІДУВАЛЬНИЙ ЗВІТ"
 abyssinia.233.d:0 "Звіт № 281 Дата: [GetDate]\nТАЄМНО\n\nРЕЗЮМЕ:\nТриває підвищена активність збройних сил [ABY.GetAdjective]. Концентрація військ на кордоні. Підготовка позицій перед можливим наступом. Підготовка артилерійських позицій у тилу. Заповнення складів постачання, регулярний рух вантажівок і фургонів під посиленою охороною. Банки крові отримують запаси консервованої крові та рідкої плазми для переливання. Збільшення присутності спецназу та співробітників служби безпеки поблизу кордону. За минулий тиждень затримано двох дружніх агентів і трьох інформаторів, що є ознакою активних контррозвідувальних операцій. Цивільне населення евакуюється із зони майбутніх бойових дій. [ABY.GetAdjective] ЗМІ використовують дедалі більш провокаційну риторику.\n\nВИСНОВОК:\n[ABY.GetNameDefCap] з дуже високою ймовірністю розпочне ворожу військову операцію через кордон протягом місяця. Підготовка ще не завершена, але триває. Деескалація на цьому етапі малоймовірна. Рекомендується негайна мобілізація дружніх збройних сил, евакуація цивільного населення та підготовка оборонних позицій вздовж кордону."
 abyssinia.233.a:0 "Мобілізувати армію!"

 abyssinia.234.t:0 "Чому?"
 abyssinia.234.d:0 "У двері кабінету Спір сильно, але ввічливо постукали, коли вона читала щось з аркуша паперу. «Заходь, Фаде», — сказала вона, не піднімаючи очей, впізнавши того, хто стукав.\nДвері відчинилися, і Фад увійшов. Однак він зупинився, коли побачив, чим вона займається. «Вибач, що перебиваю, я просто хотів поговорити. Здогадуюся, ти репетируєш свою промову для церемонії?»\n«Угу», — відповіла Спір кивком, але потім з усмішкою відклала папір. «Я ніколи не проти, щоб ти мене перебивав. Про що ти хотів поговорити?»\nФад зачинив за собою двері й сів навпроти неї. «Мене просто... дещо турбує».\nВона підняла брову. «Гм?»\n«Ну... вся ця історія з "перейменуванням країни" виникла через усі ці недавні анексії земель. Я просто не впевнений, чи було все це правильним».\nВона зітхнула. «Гаразд. Так, це слушне занепокоєння. Я справді не вагалася використовувати Визвольну Армію як кувалду, коли дипломатія зазнавала невдачі. І хоча я щиро вірю, що всім цим істотам буде краще бути громадянами нашої нації, я насправді не питала, чи хочуть вони цього».\n«...Ми погані хлопці?» — запитав Фад щирим тоном.\nСпір знизала плечима. «Можливо, деякі так і думають. Особливо націоналісти. Але ми уникаємо жертв серед цивільного населення і робимо все можливе, щоб забезпечити їжею та житлом кожне створіння. І ми також не змушуємо критиків замовкнути. Було багато протестів...»\n«Так, але як щодо всіх тих, хто загинув? Ворожі солдати й таке інше».\n«Я солдат, я перестала вірити у святість життя ще під час Мейндалусійської війни», — відповіла вона сухо і з гіркотою.\n«Справді? Але тоді... навіщо докладати стільки зусиль, щоб "звільняти" народ і покращувати їхні умови? Чого насправді варте для тебе життя?»\nВона встала зі стільця, обійшла свій стіл, зупинилася прямо перед Фадом і подивилася йому в очі. «Нічого», — холодно і прямо заявила вона. Потім вона міцно обійняла його і тихо прошепотіла голосом, обтяженим жалем: «Усього»."
 abyssinia.234.a:0 "..."

 abyssinia.235.t:0 "Дім, милий дім"
 abyssinia.235.d:0 "Літній жеребець закінчив встановлювати металеву зрошувальну трубу. Він підвівся і помилувався своєю копитною роботою, витираючи піт з чола.\n«Блантііі!» — пролунав високий поклик позаду нього. «Йди сюди, у нас гості!»\nВін поклав інструменти й пішов назад до своєї сусідньої оселі, відчинивши дерев'яні двері. Щойно він увійшов, його не менш літня дружина майже галопом підбігла до нього. «Бланті, ти нізащо не повіриш, хто прийшов!»\nВін насупився. «Я не чекав сьогодні гостей. Це якийсь комівояжер?»\nЗамість відповіді кобила схопила його за копито і потягла до їдальні. Там він побачив пурпурову кобилу-поні та коричневого коня-жеребця, що сиділи за столом. Він насупився ще більше. «Це твої друзі, Пойнті?»\nЙого дружина захихотіла. «Ні, дурненький. Хіба ти її не впізнаєш?»\nГості ніяково посміхнулися.\nЙого очі уважно оглянули відвідувачів. Незадоволений, він підійшов ближче і втупився в їхні обличчя.\nОбом стало незручно, і поні не витримала. «Тату, це я. Спір».\nБлант одразу ж відсахнувся назад, широко розплющивши очі й роззявивши рота. «Щ-що! Це справді ти?!»\n«Ти не впізнаєш власну дочку?» — дорікнула йому дружина і підійшла до Спір, обіймаючи її. «Я відразу зрозуміла, хто вона! Хмф!»\n«Ні, ти не...» — спробувала сказати Спір.\n«Ану тихо!» — перебила її мати й обійняла ще міцніше, видавлюючи з неї повітря.\n«І-і хто ж тоді в біса цей кінь?» — запитав її батько, вказуючи на високого жеребця поруч із ними.\nФад вклонився. «Я Фад Аль-Касаар, з Ємейну».\n«...Що ви продаєте?» — запитав батько, примруживши очі.\nСпір засміялася, перехоплюючи подих. «Він не продавець. Це мій хлопець. Ми плануємо одружитися».\nБлант одразу ж відсахнувся назад, широко розплющивши очі й роззявивши рота. «Щ-що! Ти повернулася тільки для того, щоб довести мене до серцевого нападу?!»"
 abyssinia.235.a:0 "«Ні... Я повернулася, бо скучила за вами»."
 
 abyssinia.236.t:0 "Змова радикальних соціалістів"
 abyssinia.236.d_has_agency:0 "Агенти РСІБ спорожнили свої валізи і висипали гору доказів на стіл Шарп Спір. Розшифровані повідомлення, фотографії, стенограми радіоперехоплень... якби все це було підроблено, це було б монументальним і бездоганним зусиллям. Вона просто невіряче дивилася на все це.\n«Ви хотіли знати, чому ми заарештували цих людей, — сказав один з агентів, кіт у сонцезахисних окулярах. — Ось ваша відповідь».\nСпір перебрала купу, читаючи й розглядаючи все це з широко розплющеними очима. «Тож це справді правда. Ці соціалісти хотіли здійснити переворот».\n«Без нас вони могли б і досягти успіху», — відповів агент.\nВона подивилася на нього суворим поглядом. «Який мотив? Чому вони це зробили? Чому хтось завжди хоче встромити мені ніж у спину і зрадити?»\n«Досить просто. З їхнього листування стає цілком зрозуміло, що вони вважали вас і ваш уряд зрадниками революції, особливо після нещодавнього засудження Сталіонграда. Цитую: вони стверджували, що ви "продали країну буржуазним свиням", "прийняли соціал-феодал-фашизм" і плануєте "перетворити робочий клас на найманих рабів"».\nВона кілька разів кліпнула, а потім різко видихнула. «Слів вони не добирають, це точно».\n«Дійсно. Але всіх головних змовників заарештовано. Ми також ліквідуємо їхню ширшу мережу, знаходячи всіх причетних. Це займе час, але ми знайдемо їх усіх».\nСпір кивнула і посміхнулася. «Дякую, агенте. А тепер... не могли б ви прибрати на моєму столі? У мене є робота...»"
 abyssinia.236.d_no_agency:0 "На вулицях Пантери пролунали постріли. Хропіння Шарп Спір перервалося, і вона зіскочила з ліжка, миттєво витягнувши ніж, який тримала поруч. Розгублено озираючись у темній спальні, вона не побачила всередині жодної загрози. Вона позіхнула і сонно підійшла до вікна, яке було джерелом лункого гуркоту пострілів. Надворі небо освітлювало зловісне помаранчеве сяйво. Десь неподалік вирувала велика пожежа.\nУ ліжку заворушився жеребець. «Мгм... що сталося, Спір?» — пробурмотів Фад Аль-Касаар.\nВона насупилася. «Нічого доброго».\n\nТут двері її спальні розчинилися, злякавши її і змусивши знову підняти ніж, але вона опустила його, коли побачила Тамрата Павіта, одного зі своїх генералів, що стояв у дверях. Очі кота бігали по кімнаті, аналізуючи обстановку. «Ви в безпеці», — сказав він, кивнувши.\n«Звичайно, я в безпеці, — з роздратуванням відповіла Спір. — Що там відбувається надворі?»\n«Не впевнений, там хаос. Але я чув звіти, що це спроба перевороту?»\nЇї сонні очі розширилися. «Перевороту? З боку кого? Патріотичного фронту?»\nВін похитав головою. «Здається, одного нападника схопили, і він сказав, що соціаліст».\nЯкимось чином їй вдалося розплющити очі ще ширше. «Соціаліст? Радикальні соціалісти намагаються мене скинути?»\n«Це вся інформація, яку я маю».\nСпір якусь мить помовчала. «Це через ту історію із засудженням Сталіонграда? Невже я дійсно їх так сильно розлютила?»\nТамрат знизав плечима. «Можливо. Але хороша новина в тому, що їхня спроба, здається, провалюється, принаймні так я чув востаннє».\nСпір кивнула. «Гаразд. Тоді підемо розбиратися з рештою».\nФад пробурчав щось у ліжку і зарився в ковдри. «Ще одну хвилинку, Спір...»"
 abyssinia.236.a:0 "Ми уникли катастрофи."
 abyssinia.236.b:0 "Як ми не передбачили цього?"
 
 abyssinia.237.t:0 "Проєкт дамби"
 abyssinia.237.d:0 "Поки засідання кабінету міністрів тривало, Шарп Спір глянула на годинник на стіні. П'ятнадцять хвилин на першу.\nЗебра — міністр економіки — взяв слово. «Ці дві дамби абсолютно життєво необхідні. Подумайте, скільки гектарів сільськогосподарських угідь можна буде зрошувати, подумайте, скільки будинків можна буде забезпечити електроенергією, подумайте, скільки води ми зможемо запасти на посушливий сезон!»\n«А як щодо наслідків?» — сказав котячий міністр закордонних справ. «Річки Тигр і Пантера течуть у землі віслюків. Чим більше води ми заберемо, тим менше її буде в них».\nМіністр внутрішніх справ — віслюк — кивнув. «Меншість віслюків цього не прийме. Вони вже страждають від дискримінації після повстання Сеннахеріба, і це відштовхне їх ще більше».\n«Але подумайте, скільки робочих місць це забезпечить», — висловився міністр праці — поні.\n«І скільки заводів це забезпечить енергією!» — додав міністр промисловості — кінь.\n«Я б швидше сказав: подумайте про шкоду для довкілля, — відповів міністр екології — кіт. — І скільки людей будуть змушені переселитися через водосховища!»\n\nСпір знову подивилася на годинник. Двадцять хвилин на першу. Вона застогнала і сповзла на своєму стільці."
 abyssinia.237.a:0 "Нам потрібні ці дамби, щоб стати справді сучасною нацією."
 abyssinia.237.b:0 "Це не варте таких витрат."
 
 abyssinia.238.t:0 "Тінь минулого"
 abyssinia.238.d:0 "Шарп Спір незручно засовалася на своєму стільці.\n\nНа протилежному кінці столу молода кішка, з якою вона проводила зустріч, продовжувала без упину говорити: «Як ви знаєте, лише за минулий місяць було зафіксовано 37 випадків злочинів на расовому ґрунті. Згідно з розслідуваннями, більшість із них зумовлені не лише параноєю, а й тим, що котяча більшість населення сприймає нині рівноправні расові меншини як загрозу своєму добробуту та як економічних і соціальних конкурентів. Ця конкуренція мала подальші, більш опосередковані наслідки, як-от дискримінація у працевлаштуванні та забезпеченні житлом. Це своєю чергою сприяло формуванню етнічних анклавів у Пантері, з чим ви, впевнена, знайомі. Існує реальна небезпека подальшої ескалації напруженості, яка може перерости в суди Лінча та расові заворушення, якщо нічого не зробити з цією проблемою. Юридичної рівності недостатньо для вирішення проблеми недовіри між численними расами нашої нації. Тому я пропоную рішучі дії з боку нашого уряду для розв'язання цієї проблеми». Вона дістала товстий стос паперів і ляснула ним по столу Спір. «По-перше, нам потрібно внести зміни до нашої системи освіти, щоб сприяти соціальній згуртованості та расовій гармонії шляхом формування в ранньому віці національної ідентичності, не прив'язаної до раси. Класи повинні бути змішаними, де навчатимуться представники різних рас. Також слід заохочувати багатомовність, щоб полегшити спілкування між расами. По-друге, ми повинні запровадити політику етнічної інтеграції в нашому плануванні житлової забудови та зонування, щоб забезпечити расову різноманітність у районах і запобігти формуванню самоізольованих анклавів. По-третє, обов'язкова військова повинність для всіх рас зі змішаними расовими військовими підрозділами могла б допомогти у формуванні спільної ідентичності. Цих трьох кроків самих по собі недостатньо, але я вважаю, що це найкраще, що ми можемо собі дозволити з нашими поточними ресурсами. І це все, що я мала сказати на даний момент», — підсумувала вона і зробила дуже глибокий вдих. «Що ви думаєте?»\n\nШарп Спір болісно скривилася і люто подивилася на своє сидіння. «Стілець, на якому я сиджу, мабуть, найнезручніший у світі. Він здійснює насильство над моїм задом»."
 abyssinia.238.a:0 "Уряду немає потреби щось із цим робити."
 abyssinia.238.b:0 "Наші громадяни повинні стати сліпими до раси."
 
 abyssinia.239.t:0 "Вчасно на сніданок"
 abyssinia.239.d:0 "Жовті очі Нявгуса Ґомеза розплющилися, коли сонячне світло проникло в його спальню. Надворі в палацовому саду щебетали пташки. Він спробував вхопитися за останні думки свого сну, коли вони вислизали, але йому це не вдалося. Він зітхнув і подивився на пишно оздоблений підлоговий годинник, що стояв біля ліжка.\nБула десята ранку. Він проспав сім годин.\nВін підвівся, позіхнув і потягнув руки, ноги та хвіст. Потім встав і вийшов у коридор.\nНявгіст Мортіша сиділа за великим обіднім столом, насолоджуючись розкішною трапезою з ікри, лосося та омара. Її очі загорілися, коли вона побачила, що Ґомез увійшов до кімнати. Проковтнувши їжу, вона сказала: «О, ось і ти! Я знала, що відкласти сніданок на годину було хорошою ідеєю».\nҐомез сів на протилежному кінці столу, де його їжа вже чекала на нього. «Так, я справді встиг вчасно...» Його зіниці розширилися, і він облизнув ікла, побачивши трапезу. «Здається, сьогодні ми не шкодуємо грошей?»\n«Немає нічого поганого в тому, щоб час від часу балувати себе. Вважай це... свого роду винагородою». Мортіша усміхнулася і тихенько засміялася.\nВін усміхнувся їй у відповідь і взяв срібну виделку та ніж. «Відчуваю, що я нарешті заслужив це. Дякую, Тіш».\n«Прошу, мій любий. Смачного»."
 abyssinia.239.a:0 "Можливо, життя не завжди таке погане."
 
 abyssinia.240.t:0 "Наслідки"
 abyssinia.240.d:0 "Так званий тимчасовий уряд зібрався в колишньому королівському палаці в Пантері, щоб вирішити долю нації тепер, коли її матері-засновниці не стало.\n\n«Згідно з конституцією, народ повинен обрати нового главу уряду, це зрозуміло, — сказала кішка в окулярах, — але також зрозуміло, що до виборів слід допускати лише кандидатів-соціалістів».\n\nТе, що відбулося далі, було миттєвим вибухом обурення з боку інших котів, поні, коней, віслюків і зебр у кімнаті. Кішка в окулярах просто відкинулася на спинку стільця і хитро посміхалася, чекаючи, поки крики вщухнуть.\n\n«Ви закликаєте до смерті нашої молодої демократії!» — голосно і чітко сказав молодий кіт у костюмі, щойно галас припинився. «Я буду продовжувати підтримувати позицію моєї попередниці. Вибори мають бути вільними, чесними і повністю відображати волю народу, навіть якщо це призведе до обрання кандидата-несоціаліста».\nКішка-соціалістка вишкірила ікла. «Якщо ми дозволимо обрати несоціаліста, вони зроблять усе, що в їхніх силах, щоб знищити ті жалюгідні залишки соціалізму, що ще існують у нашому уряді».\n«Парламент залишається противагою, — втрутилася зебра, — тому хвилюватися нема про що».\nВона залишилася непохитною. «А що, як новий глава уряду змінить це і зосередить владу у своїх власних лапах? Чи копитах, чи що там у них».\n\nТе, що відбулося далі, було кількома годинами палких суперечок, доки, зрештою, тимчасовий уряд не прийняв рішення:"
 abyssinia.240.a:0 "Допускаються лише кандидати-соціалісти."
 abyssinia.240.b:0 "Допускаються всі кандидати."
 
 abyssinia.241.t:0 "Наступник Шарп Спір"
 abyssinia.241.d:0 "«Хоча я радий, що нам, кандидатам, дозволили голосувати, — сказав Тамрат Павіт з усмішкою, — шкода, що ми не могли проголосувати самі за себе». Потім кіт відкинувся на спинку стільця і зробив ковток зі свого кухля з теллою.\n«Аякже, ніби хтось із нас, окрім тебе, зробив би це», — гірко відповіла Енкара, але наслідувала його приклад і теж відпила.\n«Це була лише пропозиція, — відповів Меркуріоз Зоба. — Оскільки голосування таємне, вони не можуть зробити це правилом». Потім зебра теж відпив.\nТамрат насупився. «От халепа, ти маєш рацію». Потім він знизав плечима. «Ну що ж. Не те щоб один голос щось вирішував».\nВіслючка повернулася і з піднятою бровою подивилася на Зобу. «...То ти проголосував сам за себе?»\nВін хитро посміхнувся. «Та ну, секрети є секретами, краще ними не ділитися».\nПоки Енкара люто дивилася на нього, Тамрат засміявся. «Ну, хай там як, я майже впевнений, що хтось із нас переміг. Зрештою, ми всі близькі соратники Шарп Спір і ветерани визвольної армії рабів. Тож наші шанси біса хороші, я б сказав».\n«Так, але хто з нас переміг?» — сказала Енкара, в задумі потираючи підборіддя.\n«Мене не хвилює перемога чи поразка. Я просто вважаю це цікавим змаганням. Якщо я переміг — нехай так і буде. Я зроблю все можливе. Якщо програв — нехай. Я все одно робитиму все можливе, просто на полі бою, а не в кабінеті».\nКіт похитав головою. «О так, паперова робота... Я був настільки засліплений обіцянками багатства і влади, що зовсім забув про неї... Тепер я сподіваюся, що не виграв».\nЕнкара засміялася. «Хай там як, давайте вип'ємо за наше майбутнє». Вона підняла свій кухоль, і двоє інших зробили те саме."
 abyssinia.241.a:0 "Меркуріоз Зоба отримав найбільше голосів!"
 abyssinia.241.b:0 "Енкара виграла вибори!"
 abyssinia.241.c:0 "Тамрат Павіт був найпопулярнішим кандидатом!"
 
 abyssinia.242.t:0 "Новий світанок"
 abyssinia.242.d:0 "Кроки лап луною розносилися печерою, коли кішка бігла темним тунелем, її очі виблискували в темряві, де вона могла бачити без особливих проблем. Вона зупинилася перед іншим котом, який тягнув ящик із котячими консервами. «Гей, ти! Де Патріот?»\n«Е-е, у своєму кабінеті. Ну, знаєш, печера внизу праворуч, пам'ятаєш?»\n«Точно, дякую!» — сказала вона і побігла далі. Незабаром вона зазирнула до освітленої печери, яку перетворили на імпровізований кабінет. Усередині за столом сиділа постать у капюшоні. «Ось ти де! У мене хороші новини!»\nЖовті очі таємничого кота мовчки подивилися на неї.\n«Ти виграв голосування! Повірити не можу, я думала, вони його сфальсифікують чи щось таке! Я взагалі здивована, що вони дозволили тобі стати кандидатом!» Вона радісно засміялася.\nПатріот зітхнув.\nВона трохи заспокоїлася. «О, е-е, у мене є запитання. Кандидати мали використовувати справжні імена. То... Няуконнен — це твоє справжнє ім'я? Чи просто вигадане, бо так було треба?»\n«Воно справжнє», — відповів Патріот своїм хрипким і низьким голосом.\n«О. Ну, е-е, гадаю, ми все одно повинні називати тебе твоїм "nom de guerre"? Вибач за мою аквілейську, хе-хе-хе».\nВін кивнув.\nМолода кішка віддала йому честь. «Дуже добре, Патріоте! Я рада, що змогла принести тобі ці новини. Вибач, якщо я щось перервала, впевнена, у тебе багато роботи. Бувай!» Потім вона втекла так само швидко, як і прийшла."
 abyssinia.242.a:0 "Це було несподівано."
 
 abyssinia.243.t: "Мир з Мейндалусією"
 abyssinia.243.d_gomez: "«...І ось, мейндалусійці погодилися на нашу пропозицію, — пояснив Гумберт Темесген. — Тепер маємо перемир'я, що триватиме дев'ятсот днів, хоча я ще не давав жодних обіцянок щодо визнання їхньої незалежності».\n\nНявгус Ґомез порожнім поглядом дивився на шпалери вдалині.\n\n«...Ваша величносте? — обережно запитав Гумберт. — Ви слухали?»\n\nНявгус двічі кліпнув. «Га? О, так, я розумію, ми програли. Ти міг би пояснити це двома словами». Він важко зітхнув. «Як це постійно трапляється? Спочатку я втрачаю Кітрен, а тепер — Мейндалусію. Мій батько ніколи мені цього не пробачить».\n\nОчі Фітаврарі стурбовано забігали. «Ви мали на увазі "не пробачив би"? Старий Нявгус Няуконнен помер багато років тому».\n\nҐомез наїжачився. «Т-так, саме це я й мав на увазі! Дякую за швидке виправлення. У будь-якому разі, вибач за це! Тепер можеш іти. Мені треба придумати, як пояснити цю поразку публіці». Він з усіх сил намагався посміхнутися.\n\nГумберт насупився, але тим не менш шанобливо вклонився і покинув кімнату."
 abyssinia.243.d_gomez_absent: "«...І ось, мейндалусійці погодилися на нашу пропозицію, — пояснив Гумберт Темесген. — Тепер маємо перемир'я, що триватиме дев'ятсот днів, хоча я ще не давав жодних обіцянок щодо визнання їхньої незалежності».\n\nНявгіст Мортіша пильно подивилася на нього, а потім зітхнула. «Принаймні бої тепер закінчилися. Буду вважати це хорошою новиною».\n\n«Це прикро, але ви маєте рацію. Мир цінний, особливо в цю епоху воєн».\n\n«Я просто не знаю, як пояснити це Ґомезу, коли він повернеться, — продовжила Мортіша. — Впевнена, він буде засмучений. Це ще одна невдача для його правління».\n\nФітаврарі на мить завагався, перш ніж запитати: «Ви не думаєте, що це виведе його з рівноваги?»\n\nОчі Нявгіст розширилися, а її котячі зіниці звузилися. «Що? Ні, боже збав. Це поразка, але особисто його ніколи особливо не хвилювала Мейндалусія».\n\n«Перепрошую, пані, я просто турбуюся, чи не стане це тією соломинкою, що зламає спину верблюду, як кажуть жителі Кемелканда. Останнім часом він був досить... напруженим».\n\n«Я ціную вашу турботу, але запевняю вас, з ним усе буде добре». Її брови зсунулися від тривоги. «З ним усе буде добре».\n\n«Зрозумів. Чи можу я тепер іти?»\n\nМортіша змусила себе ввічливо посміхнутися. «Так, звісно. Дякую вам за переговори про цей мир. Ви вільні»."
 abyssinia.243.d_catrina: "«...Потім нарешті я переконав поні прийняти нашу пропозицію, — пояснив Реп. — Вони погодилися на перемир'я, яке триватиме дев'ятсот днів».\n\nНявгіст Кітріна склала лапи будиночком. «Добре. Це дасть нам час зализати рани й зосередитися на інших речах. Наступного разу ми будемо краще підготовлені».\n\nРеп стурбовано подивився на неї. «Ви маєте намір знову воювати з ними, коли закінчиться перемир'я?»\n\n«Звичайно. Ти справді думав, що я просто залишу їх у спокої? У Мейндалусії є сотні тисяч потенційних рабів. До того ж ці землі за законом належать Абіссинії».\n\nРептилія зітхнув. «Ясно. Гаразд... Я якось сподівався, що ми зможемо навчитися співіснувати мирно. Я не експерт з історії, але хіба коти й поні не воюють століттями?»\n\n«Так, і ця боротьба не припиниться, поки одна зі сторін не переможе. Мій обов'язок як Нявгіст — забезпечити, щоб це були коти, а не поні. Не плекай ілюзій, вони планують наше падіння не менше».\n\n«...Як скажете, Кітріно», — відповів Реп, зовсім не переконаний."
 abyssinia.243.d_gommie: "Делегації [Root.GetNameDef] та Мейндалусії зібралися навколо великого столу для переговорів. Делегація [Root.GetAdjective], звісно, мала представників від кожної великої партії, оскільки вони вимагали свого представництва. Це призвело до того, що делегація не могла домовитися навіть між собою щодо умов миру.\n\n«...І ми визнаємо вашу незалежність», — сказав один із котів.\n\nІнший кіт підвівся і грюкнув лапами по столу. «Абсолютно ні! Тільки перемир'я. Тривалістю на рік».\n\nВіслюк люто подивився на кота. «Рік?! Економіці потрібно більше часу на відновлення! Особливо в Пауритреї».\n\n«Яке тобі діло до Пауритреї? Там майже немає віслюків», — прошипів кіт у відповідь.\n\nПоні з мейндалусійської делегації перезирнулися, їхні обличчя застигли від шоку. Це було зовсім не те, чого вони очікували від переговорів.\n\nПісля тривалої суперечки кобила з [Root.GetAdjective] делегації ввічливо посміхнулася. «Ми пропонуємо перемир'я на дев'ятсот днів без визнання незалежності. Як вам таке?»\n\n«Якщо це змусить вас усіх перестати сперечатися, тоді ми згодні», — сказав мейндалусійський делегат своєю рідною мовою."
 abyssinia.243.a: "Залишимо їх у спокої, принаймні поки що."
 
 abyssinia.244.t: "Мир з Абіссинією"
 abyssinia.244.d: "Після напружених переговорів з абіссинським міністром закордонних справ було нарешті домовлено про перемир'я. Воно триватиме дев'ятсот днів, і протягом цього часу жодна зі сторін не буде вживати ніяких військових дій одна проти одної. Узгоджена лінія припинення вогню пройде вздовж старого кордону між провінціями Кольтоба, Пауритрея та Катум. Абіссинці ще не погодилися визнати нашу незалежність, але, незважаючи на це, це кладе край кривавому конфлікту між нашими народами. Принаймні, наразі."
 abyssinia.244.a: "Побачимо, чи триватиме цей мир."

