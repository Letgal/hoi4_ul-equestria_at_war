 ### National Foci
 
 ABY_sad_cat: "ми нічого не можемо зробити."
 ABY_sad_cat_desc: "Оскільки жодні політичні рішення не ухвалюються, важко вдаватися до політичних дій, не кажучи вже про те, щоб зосередити державу на чомусь."
 
# Gomez path
 
 ABY_assess_situation: "Оцінити ситуацію"
 ABY_assess_situation_desc: "Я радий, що ви нарешті вирішили знову взяти управління королівством у свої лапи. Настав час провести давно відкладену зустріч щодо нинішнього критичного стану держави. Хоча ваш душевний стан, здається, дещо стабілізувався, ще належить побачити, чи повернулися ви до свого колишнього «я»."
 
 ABY_nationalize_bank_of_abyssinia: "Замінити Банк Абіссинії"
 ABY_nationalize_bank_of_abyssinia_desc: "Під час свого правління нявгус Нявконнин заснував Банк Абіссинії — монополізований приватний банк, який виник як поступка національному банку Вінґбардії. З огляду на нещодавню економічну нестабільність, я раджу ліквідувати цей напівбанкрутний банк і замінити його повністю державним, що дасть нам більший контроль над економікою."
 ABY_abandon_gold_standard: "Відмовитися від золотого стандарту"
 ABY_abandon_gold_standard_desc: "Ось уже близько століття абіссинський мурр був валютою золотого стандарту, забезпеченою [Root.ABY_royal_loc_nocap]ою скарбницею монархії. На жаль, нещодавня самовільна безстрокова позика Короля Шторма спричинила стрімку дефляцію через нестачу золота. Я вже давно про це кажу, але нарешті настав час відійти від золотого стандарту."
 ABY_seek_trade_partners: "Шукати нових торгових партнерів"
 ABY_seek_trade_partners_desc: "Абіссинія здавна була торговою державою, проте вторгнення Короля Шторма та спричинена ним регіональна нестабільність залишили багатьох купців без діла. Негадрас, голова купців, запропонував спробувати підписати торговельні угоди з більшою кількістю країн, щоб відкрити для нас нові ринки. Експорт товарів, таких як кава, допоможе нам наповнити нашу скарбницю."
 ABY_refill_treasury: "Поповнити [Root.ABY_royal_loc_nocap]у скарбницю"
 ABY_refill_treasury_desc: "Заклавши фундамент для економічного відновлення, ми тепер можемо зосередитися на нашій катастрофічній нестачі коштів. Є кілька варіантів, які слід зважити, кожен з яких має позитивні та негативні аспекти. Вам доведеться вирішити, який метод ми використаємо, щоб відновити частину ваших втрачених багатств."
 ABY_public_works_projects: "Проєкти громадських робіт"
 ABY_public_works_projects_desc: "Державні витрати — це один зі способів відновлення після економічних катастроф. Досі нам бракувало коштів, але завдяки нещодавнім зусиллям ми нарешті можемо запустити інфраструктурні проєкти по всьому королівству. Це забезпечить роботою тисячі котів. Я також рекомендую не наймати рабів, оскільки їхню зарплату, швидше за все, заберуть їхні власники."
 ABY_royal_reconstruction_program: "[Root.ABY_royal_loc_cap]а програма реконструкції"
 ABY_royal_reconstruction_program_desc: "Нарешті все готово. Тепер настав час розпочати масштабні загальнонаціональні зусилля для повного відновлення після вторгнення Короля Шторма. Це буде настільки дорого, що знову майже спорожнить нашу скарбницю, але після цього ми зможемо поповнити її набагато легше, ніж раніше."
 
 ABY_expand_fishing_fleet: "Розширити риболовецький флот"
 ABY_expand_fishing_fleet_desc: "Зважаючи на те, яким посушливим є Абіссинський півострів, багато котів покладаються на риболовлю, щоб прогодувати себе, особливо на узбережжі. Для підвищення продовольчої безпеки я рекомендую інвестувати наші нещодавно збільшені кошти у рибні господарства. Вони зможуть найняти більше котів-рибалок і розширити свою інфраструктуру, щоб будувати більше риболовецьких суден. Звісно, ця інфраструктура може мати й інше застосування."
 ABY_import_food: "Імпортувати їжу"
 ABY_import_food_desc: "Абіссинія вже багато десятиліть не забезпечує себе продовольством, після того, як значна частина наших обмежених сільськогосподарських угідь була виділена під вирощування експортних культур, таких як кава. Тепер, коли ми спробували налагодити нові торговельні шляхи, наші купці мають необхідний капітал для відновлення імпорту продовольства. На жаль, більшість наших сусідів — травоїдні, а ми більше потребуємо м'яса, ніж корму для худоби, тому наші можливості обмежені."
 ABY_distribute_food: "Відкрити безкоштовні їдальні"
 ABY_distribute_food_desc: "Основною причиною голоду є не обов'язково виробництво їжі, а її розподіл. Через феодальні податки багато селян не можуть дозволити собі купити їжу, коли вони самі не в змозі виробити достатньо. Щоб підвищити продовольчу безпеку суспільства, [ROOT.ABY_queen_loc_nocap] Мортіша пропонує нам створити центри розподілу їжі або «супові кухні», щоб безкоштовно годувати голодних котів."
 ABY_repurpose_plantations: "З плантацій у пасовища"
 ABY_repurpose_plantations_desc: "Значна частина орних земель в Абіссинії нині використовується для вирощування експортних культур, особливо кави. Хоча це приносить великі багатства купцям і землевласникам, це означає, що ми виробляємо недостатньо продовольства всередині країни. За допомогою різних законів та економічних стимулів ми можемо підштовхнути поступове перетворення плантацій на пасовища для худоби. Не всі будуть задоволені таким рішенням."
 
 ABY_pacify_slaves_focus: "Операції з упокорення рабів"
 ABY_pacify_slaves_focus_desc: "Гірка правда полягає в тому, що ми не можемо дозволити рабам розгулювати безкарно, навіть якщо їхні скарги обґрунтовані. Єдиний спосіб швидко відновити закон і порядок — це застосування сили, оскільки всі спроби вести переговори чи обіцяти реформи зазнали невдачі. Тим не менш, ми робимо це тільки тому, що мусимо. Після відновлення миру я наполегливо рекомендую вам спробувати скасувати рабство."
 ABY_ban_slave_bulli: "Оголосити поза законом жорстоке поводження з рабами"
 ABY_ban_slave_bulli_desc: "Абіссинське законодавство написане з припущенням, що рабство повністю заборонено, навіть якщо це стосується лише котів. Як наслідок, у ньому немає статей щодо поводження з рабами. Щоб вгамувати невдоволення поневолених осіб, я рекомендую вам видати указ, за яким жорстоке поводження з ними стане кримінальним злочином. Деякі дворяни будуть не в захваті, але раби будуть."
 ABY_ban_slave_trade: "Покласти край работоргівлі"
 ABY_ban_slave_trade_desc: "Після того, як котячому рабству було раптово покладено край, імпорт рабів до Абіссинії різко зріс, оскільки торгівля рабами-не котами не була заборонена. Заборона будь-якої торгівлі рабами була б суперечливим кроком, оскільки це здебільшого поклало б край цьому прибутковому бізнесу (який, без сумніву, тривав би нелегально), але я все одно рекомендую це зробити."
 ABY_ban_slave_baby: "Свобода лона"
 ABY_ban_slave_baby_desc: "Досі рабовласники вважали, що будь-які нащадки рабів успадковують свій статус від батьків, подібно до того, як приплід худоби миттєво стає власністю господаря. Однак, якщо ми ухвалимо закон, за яким усі розумні істоти в королівстві народжуватимуться вільними, то популяція рабів перестане зростати природним шляхом."
 ABY_emancipation_act: "Акт про емансипацію"
 ABY_emancipation_act_desc: "У міру поступового руйнування інституту рабства ми можемо нарешті завдати остаточного смертельного удару цій давній практиці. Акт про емансипацію перепише закон нявгіст Няводори Другої про рабство, чітко стверджуючи таке: «Усі особи, що утримуються як раби в королівстві, назавжди стануть вільними, і їхня свобода гарантуватиметься [ROOT.ABY_king_loc_ins]»."
 
 ABY_revised_plan: "Оновлений план модернізації"
 ABY_revised_plan_desc: "План економічного розвитку нявгуса Нявконнина, якого ви продовжували дотримуватися до насильницької реструктуризації нашої економіки Королем Штормом, значною мірою спирався на співпрацю з Вінґбардією. Тепер, коли вони показали своє справжнє обличчя, нам потрібно розробити новий план модернізації Абіссинії."
 ABY_noble_council: "Співпраця з аристокотами"
 ABY_noble_council_desc: "Реалізація плану модернізації вимагатиме співпраці з місцевими губернаторами, які керують економічними питаннями. Хоча більшість дворян задоволені збереженням аграризму, зосередженого на експорті товарних культур, деякі з них мають більш амбітні плани і були б більш ніж готові працювати разом з нами."
 ABY_protectionist_taxation: "Протекціоністське оподаткування"
 ABY_protectionist_taxation_desc: "Ваші попередники довіряли грифонам, і у відповідь ті одразу ж спробували експлуатувати нашу державу. Дотепер іноземним компаніям надавалися концесії на вільне ведення бізнесу, але це дає їм несправедливу перевагу. Запровадивши нові податки, ми витіснимо їх з Абіссинії та дозволимо нашим вітчизняним підприємствам зростати."
 ABY_merchant_council: "Скликати Негадрасів"
 ABY_merchant_council_desc: "Реалізація плану модернізації вимагатиме співпраці з місцевими купцями, на яких наша політика впливає найбільш безпосередньо. Негадрас, голова купців, є впливовою фігурою, яка значною мірою відповідає за управління нашою економікою. Вони набагато більше зацікавлені перспективами індустріалізації та зовнішньої торгівлі, ніж консервативні дворяни."
 ABY_centralized_development: "Інвестувати в котолицю"
 ABY_centralized_development_desc: "Місто Пантера, разом із його околицями, вже є найбільш розвиненим регіоном у королівстві, поступаючись лише Кольтобі. Як наслідок, тут є міцний фундамент, на якому можна будувати далі. Оскільки провінції перебувають під контролем місцевих дворян, вкладення коштів у [Root.ABY_royal_loc_acc]у столицю є гарантованим способом зміцнити вашу центральну владу."
 ABY_catpany: "Підписати контракт із КІТ Інкорпорейтед"
 ABY_catpany_desc: "Важко переоцінити, скільки будівельних проєктів потрібно для створення сучасної держави. Усі вони вимагають величезних ресурсів, які, в свою чергу, потребують добре організованої логістики. Співпраця з виробниками будівельної техніки, що тільки-но з'являються, є життєво важливим кроком на шляху до повної модернізації Абіссинії."
 ABY_decentralized_development: "Інвестувати в провінції"
 ABY_decentralized_development_desc: "Хоча Пантеру можна назвати відносно сучасним містом, цього не можна сказати про віддалені провінції, багатьма з яких керують дворяни, яким бракує або волі, або коштів для розвитку власних володінь. Щоб Абіссинія справді модернізувалася, ми повинні більш рівномірно розподілити розвиток по всьому королівству."
 ABY_tigray_panthera_connection: "Покращити сполучення Тиграй-Пантера"
 ABY_tigray_panthera_connection_desc: "Портове місто Тиграй — це ворота Пантери у ширший світ. Наявної транспортної інфраструктури достатньо для наших поточних потреб, але якщо ми хочемо й надалі розбудовувати столицю, її розширення є життєво необхідним. Залізниця буде вдосконалена, гавань — розширена, і будуть побудовані нові асфальтовані дороги."
 ABY_invest_in_general_goods_company: "Інвестувати в Компанію загальних товарів"
 ABY_invest_in_general_goods_company_desc: "Нещодавно я дізнався про успішний малий бізнес під назвою «Компанія загальних товарів». Так, у цій назві немає котячого каламбуру. Вони виробляють широкий спектр товарів, які купують як наші цивільні, так і військові. Якби ми надали їм більше фінансування, вони могли б значно розширити своє виробництво на користь усієї держави."
 ABY_connecting_the_provinces: "З'єднати провінції"
 ABY_connecting_the_provinces_desc: "Залізниця була побудована багато років тому, щоб з'єднати Тиграй, Пантеру та Асмурру. Хоча це убезпечило логістику столиці, решта нашої країни залишилася поза увагою. Тому я рекомендую нам розпочати великий проєкт з розширення залізничної мережі по всьому королівству, з'єднавши всі важливі поселення."
 ABY_car_company: "Субсидувати Hissan Motors"
 ABY_car_company_desc: "Hissan Motors — це молодий автовиробник, що розвивається і змушений боротися за виживання, якому важко конкурувати з імпортованими транспортними засобами. Якби ми надали їм субсидії, вони отримали б конкурентну перевагу, що допомогло б їм закріпитися на ринку."
 ABY_ship_company: "Заснувати державну верф"
 ABY_ship_company_desc: "Досі потреби абіссинського флоту задовольнялися різними дрібними судноплавними компаніями, а також іноземним імпортом. Якби ми використали наші кошти для заснування верфі, яка особисто належатиме вам, ми могли б мати надійнішого постачальника для всіх військово-морських потреб."
 ABY_airplane_company: "Підписати угоду з Leopardo Holdings"
 ABY_airplane_company_desc: "Leopardo Holdings — це компанія, що належить аристократці, захопленій авіацією. Під її особистим патронатом компанія змогла конкурувати з імпортними літаками. Однак ця дворянка не має нескінченних запасів грошей для підтримки компанії. Ми маємо звернутися до неї та підписати угоду, за якою Leopardo отримає ексклюзивне право на виробництво літаків для нас."
 ABY_panthera_dam: "Побудувати Велику дамбу Пантери"
 ABY_panthera_dam_desc: "Сучасна промисловість та домогосподарства споживають величезну кількість енергії. Енергії, яку можна було б легко виробити, перекривши річку Пантера, що протікає поруч зі столицею. Звісно, це зменшить кількість води, що тече вниз за течією, і створить велике водосховище, але однієї дамби буде достатньо, щоб забезпечувати країну електроенергією довгі роки."
 ABY_desert_irrigation: "Зрошення пустелі"
 ABY_desert_irrigation_desc: "Хоча в минулому столітті вздовж річки Пантера були проведені масштабні іригаційні проєкти, того ж не можна сказати про східну річку Тигр. Було б справедливо інвестувати й у бідніші східні провінції. Зрошення не лише підвищить продуктивність сільського господарства, але й забезпечить місцеву промисловість такою необхідною водою."
 ABY_textile_factory: "Підтримати виробництво пряжі"
 ABY_textile_factory_desc: "Виробництво пряжі є однією з основ абіссинської економіки. Це розумна інвестиція для нас, яка допоможе забезпечити всіх наших громадян і солдатів будь-яким бажаним або необхідним одягом. Це, у свою чергу, підвищить рівень зайнятості та стимулюватиме економіку в цілому."
 ABY_salt_mine: "Відкрити соляну шахту в Долло"
 ABY_salt_mine_desc: "Сухий безстічний басейн Долло є одним із найбільших родовищ солі в Зебриці. Будь-яка дощова вода, що стікає в нього з гір, зрештою випаровується, що за тисячоліття створило величезне джерело солі. Якби ми інвестували у відкриття соляної копальні, ми могли б забезпечити вдосталь цього життєво важливого ресурсу, який можна використовувати для консервації риби та інших продуктів харчування."
 ABY_steel_foundry: "Побудувати сталеливарний завод Пантери"
 ABY_steel_foundry_desc: "Модернізація вимагає справді величезних обсягів очищеної високоякісної сталі. Це, у свою чергу, потребує великомасштабного промислового підприємства, яке масово перероблятиме вугілля, флюс і залізо на сталь. Тому я рекомендую розпочати будівельний проєкт у Пантері з наміром звести один із найбільших сталеливарних заводів в Зебриці."
 ABY_expand_mines: "Розширити гірничодобувні роботи"
 ABY_expand_mines_desc: "У багатих на руду горах Абіссинії розкидано багато копалень. Більшістю з них керують приватні особи, такі як дворяни, які використовують ручну працю для виснажливого видобутку корисних копалин. Держава явно повинна втрутитися, щоб розширити та модернізувати ці копальні, отримуючи натомість частку прибутку."
 ABY_modern_healthcare: "Забезпечити сучасну охорону здоров'я"
 ABY_modern_healthcare_desc: "Робота в промисловості схильна до нещасних випадків, а підвищене забруднення спричиняє багато проблем зі здоров'ям. Таким чином, робітники дедалі частіше вимагають кращого доступу до медичного обслуговування. Немає причин не надати їм те, що вони хочуть. Я пропоную розпочати створення державної системи охорони здоров'я, укомплектованої кваліфікованими фахівцями."
 ABY_elektirsity: "Електрифікувати державу"
 ABY_elektirsity_desc: "Хоча котам не потрібні електричні ліхтарі для освітлення вулиць, електрику можна використовувати в безлічі інших цілей. Можна сказати, що електрика є фундаментальною основою справді сучасних суспільств. Не лише наша промисловість використовуватиме її, а й громадяни для живлення своїх побутових приладів. Військові також зможуть знайти їй застосування."
 ABY_r_and_d_center: "Центр досліджень та технологічного розвитку"
 ABY_r_and_d_center_desc: "У співпраці з провідними компаніями Абіссинії ми повинні створити централізовану установу для проведення наукових досліджень. Це не лише призведе до появи нових інноваційних продуктів, а й забезпечить нам місце серед передових країн світу."
 
 ABY_ban_child_labour: "Заборонити працю кошенят"
 ABY_ban_child_labour_desc: "Хоча програма підвищення грамотності нявгуса Нявконнина, вашого батька, була дуже успішною у швидкому підвищенні рівня грамотності дорослих, ми не можемо забувати і про кошенят. Багато молоді не відвідує школу, оскільки замість цього працює за наймом. Нарешті настав час заборонити використання праці неповнолітніх і зробити відвідування школи обов'язковим."
 ABY_support_royal_academy: "Заснувати [Root.ABY_royal_loc_cap]у академію"
 ABY_support_royal_academy_desc: "Щоб плекати інтелектуалізм в Абіссинії, ми повинні створити національну академію під вашим патронатом. Вона сприятиме просвітництву, збереженню традиційних цінностей і дослідженням для підвищення процвітання та добробуту ваших підданих. Її обов'язком також буде піддавати остракізму інтелектуалів із надмірно радикальними або небезпечними ідеологіями."
 ABY_standardized_language: "Стандартизувати абіссинську мову"
 ABY_standardized_language_desc: "Абіссинська мова та її писемність налічують майже тисячу років. Однак, особливо у провінціях, розмовляють іншими діалектами і навіть мовами. Завдяки освіті ми повинні гарантувати, що наша мова використовуватиметься однаково по всій Абіссинії, щоб полегшити спілкування та зміцнити єдність королівства."
 ABY_university_of_panthera: "Заснувати Абіссинський університет"
 ABY_university_of_panthera_desc: "В Абіссинії досі не було державного вищого навчального закладу. Тепер, коли ми достатньо цивілізовані, настав час його створити. Новий державний університет буде розташований у столиці, розкиданий по кількох кампусах, таких як Рокадія, і прийматиме лише тих, хто складе складні вступні іспити, щоб довести свою цінність."
 
 ABY_assess_storm_king_invasion: "Проаналізувати вторгнення Короля Шторма"
 ABY_assess_storm_king_invasion_desc: "Хоча нашу поразку від Короля Шторма було гірко проковтнути, ми не повинні застрягати в минулому. Замість цього нам потрібно розслідувати, що пішло не так, і розробити плани вдосконалення наших збройних сил, щоб ми могли дати відсіч будь-яким іншим загарбникам у майбутньому. Зрештою, на помилках треба вчитися."
 ABY_modernizing_navy: "Модернізувати [Root.ABY_royal_loc_cap]ий флот"
 ABY_modernizing_navy_desc: "Модернізація наших військово-морських сил означає не лише переоснащення кораблів, а й оновлення бойових стратегій. Довге узбережжя та безліч закордонних торговельних шляхів нашої країни може захистити лише флот, який знає, як боротися з передовими та добре організованими супротивниками."
 ABY_professional_army: "Професіоналізувати армію"
 ABY_professional_army_desc: "Більша частина абіссинської армії, окрім невеликого контингенту Королівської гвардії, складається з феодального ополчення, призваного з провінцій. Їхня нестача підготовки означала, що вони танули перед лицем переважаючого ворога. Заміна їх належними професійними солдатами на повній ставці не лише зменшила б нашу залежність від дворян, але й покращила б якість армії."
 ABY_mass_conscription: "Масовий котопризов"
 ABY_mass_conscription_desc: "Одним із пояснень нашої військової слабкості є відносно невелике населення, що призводить до браку которесурсів для армії. Цю проблему можна вирішити шляхом розширення призову та перетворення служби в армії за необхідності на святий обов'язок кожного підданого. Звісно, призов традиційно був обов'язком дворянства, тому ми повинні бути з ними обережні."
 ABY_hire_mercenaries: "Найняти найманців"
 ABY_hire_mercenaries_desc: "Замість того, щоб намагатися виправити власну армію, ми могли б просто найняти досвідчених солдатів з-за кордону. На ринку найманців є безліч доступних варіантів. На жаль, вони досить дорогі і віддані лише грошам, а не вам. Але вони цілком варті своєї ціни."
 ABY_establish_air_force: "Створити Абіссинські військово-повітряні сили"
 ABY_establish_air_force_desc: "Однією з головних причин нашої поразки від Короля Шторма була повна відсутність військово-повітряних сил, що означало відсутність протидії дирижаблям єті. На щастя, гіпогрифи довели світу, що сучасні літаки правлять небом. Ми повинні просто наслідувати їхній приклад і закласти фундамент справжніх військово-повітряних сил."
 ABY_asymmetric_naval_warfare: "Асиметрична морська війна"
 ABY_asymmetric_naval_warfare_desc: "Якщо нам коли-небудь доведеться зіткнутися з більшим ворожим флотом, скажімо, таким, що належить експансіоністському заморському королівству грифонів, тоді ми не повинні намагатися протистояти йому в прямому зіткненні. Натомість нам слід прислухатися до пропозиції одного з наших адміралів та інвестувати у доступні, але ефективні підводні човни, які можуть використовувати тактику «бий-біжи»."
 ABY_convert_convoys: "Переобладнати торгові судна"
 ABY_convert_convoys_desc: "Як торгова держава, наш купецький клас володіє значною кількістю вантажних суден. Ми могли б придбати деякі з них за низькою ціною, а потім докласти зусиль для їх переобладнання на військові кораблі. Це був би набагато економніший спосіб розширити наш флот порівняно з будівництвом кораблів з нуля."
 ABY_meritocratic_offier_promotion: "Меритократичний офіцерський корпус"
 ABY_meritocratic_offier_promotion_desc: "Хоча нам не бракує здібних лідерів для нашої армії, багато офіцерів усе ще залишаються аристокотами, які отримали свої посади у спадок. Ми повинні розглянути можливість зробити наш офіцерський корпус повністю меритократичним, що означає, що військові посади повинні здобуватися завдяки зразковій службі."
 ABY_reinforce_local_garrisons: "Посилити місцеві гарнізони"
 ABY_reinforce_local_garrisons_desc: "Захист провінцій традиційно був обов'язком місцевих дворян, які утримували власні свити. Покладатися на ці приватні армії нерозумно, що було доведено їхньою неефективністю під час вторгнення Короля Шторма. Ми повинні відправити солдатів з [Root.ABY_royal_loc_nocap]ої армії не лише для допомоги дворянам, а й для кращого захисту нашої країни."
 ABY_purchase_hippogriff_planes: "Придбати літаки гіпогрифів"
 ABY_purchase_hippogriff_planes_desc: "Гіпогрифи зробили те, чого ми не змогли: перемогли жахливу армаду дирижаблів Короля Шторма за допомогою спритних винищувачів та інших літаків. Ми повинні придбати деякі з цих технологічних чудес для власного використання, щоб ніхто ніколи більше не міг загрожувати Абіссинії з небес."
 ABY_pilot_training: "Навчати пілотів"
 ABY_pilot_training_desc: "Не маючи промислових потужностей для створення великих військово-повітряних сил, ми повинні зосередитися на підвищенні якості персоналу. Ретельна підготовка гарантує, що лише найкращі пілоти захищатимуть небо Абіссинії від ворога. Сподіваємось, вони зможуть протистояти переважаючим силам противника і навіть у, здавалося б, безнадійних ситуаціях."
 ABY_cattier: "Переобладнаний котоносець"
 ABY_cattier_desc: "Під час правління вашого батька почалося будівництво дредноута класу «Нявконнин», який так і не був завершений і був покинутий. Його можна знову пустити в діло. Проте, здається, що сучасна морська війна значною мірою спирається на підтримку з повітря, тому було б доцільніше перетворити його на авіаносець, тобто котоносець."
 ABY_steal_torpedo_designs: "Вкрасти вінґбардійські креслення торпед"
 ABY_steal_torpedo_designs_desc: "Наші колишні друзі у Вінґбардії відомі своїми передовими торпедами. Роки співпраці означають, що наші власні кораблі широко використовують ту саму зброю. Зазвичай я не пропоную сумнівні дії, як-от ця, але, можливо, невелике промислове шпигунство дозволило б нам оновити наші креслення торпед, якщо ви розумієте, що я маю на увазі."
 ABY_establish_general_staff: "Створити Генеральний штаб"
 ABY_establish_general_staff_desc: "Армія без належного керівництва — це як курка без голови. Хоча командування армією зосереджено у вас, [ROOT.ABY_king_loc_ins], ви не можете бути скрізь одночасно, так само як і генерали. Їм потрібні організовані штабні групи для допомоги у ролі командування та контролю. З огляду на сподіване закладення меритократичної основи, створення такого штабу має бути легким."
 ABY_military_motorization: "Моторизація армії"
 ABY_military_motorization_desc: "Ось уже майже століття абіссинська армія широко використовує рабів для транспортування та логістики. Оскільки рабство поступово скасовується, а внутрішнє виробництво транспортних засобів налагоджене, тепер армія може використовувати вантажівки. Хоча вони споживають паливо та схильні до поломок, вони не повстають проти своїх власників."
 ABY_improved_occupation: "Досвід боротьби з повстанцями"
 ABY_improved_occupation_desc: "Тривалий конфлікт із мейндалусійським опором дав нашим збройним силам багатий досвід боротьби з повстанцями. Цей досвід слід проаналізувати та поєднати з іноземною військовою теорією, щоб значно підвищити ефективність наших гарнізонних підрозділів."
 ABY_naval_aviation: "Морська авіація"
 ABY_naval_aviation_desc: "Кораблі традиційно панували на хвилях, але, здається, літаки намагаються скинути їх з престолу. Справжній сучасний флот повинен поєднувати як морську, так і повітряну міць, щоб процвітати в боротьбі з ворогами. Таким чином, нам потрібно інвестувати час і ресурси у військово-морську авіацію."
 ABY_anti_air_defence: "Протиповітряна оборона"
 ABY_anti_air_defence_desc: "Маючи обмежені промислові потужності, ми не обов'язково зможемо побудувати достатньо великий повітряний флот для захисту неба над королівством. Тому нам потрібно інвестувати в наземні засоби захисту, щоб оберегти наші міста та війська від повітряних атак."
 ABY_special_forces_shit: "Офіційно оформити спеціальні війська"
 ABY_special_forces_shit_desc: "Традиційно досвідчені горяни виконували роль «спеціальних військ» абіссинської армії, борючись у складній місцевості та проводячи непрості операції. Але якщо ми хочемо й надалі розширювати та розвивати наші спеціальні підрозділи, нам потрібно належним чином організувати їх як сучасний підрозділ ширших збройних сил."
 ABY_tonk: "Бронетанкова війна"
 ABY_tonk_desc: "Рівнинна пустельна місцевість, поширена в Абіссинії, ідеально підходить для бронетанкової війни. Ці так звані «танки» можуть легко і швидко розгромити непідготовлену ворожу піхоту, будучи здатними витримувати вогонь зі стрілецької зброї. Хоч вони і дорогі, нам усе ж варто розглянути їхнє використання в армії."
 ABY_mag_weapons: "Магічна електрошокова зброя"
 ABY_mag_weapons_desc: "Тоді як коти не здатні використовувати магію, єдинороги часто застосовують приголомшливі заклинання, щоб знешкодити супротивників. Нова технологія, заснована на кристалах, дозволяє будь-якій істоті чаклувати. Нашим гарнізонам така магічна зброя була б дуже доречною. Звісно, це стосується й решти армії, якщо ми налагодимо необхідні виробничі лінії."
 ABY_nuclear_deterrent: "Остаточний засіб стримування"
 ABY_nuclear_deterrent_desc: "Цілком можливо, і навіть імовірно, що нашому суверенітету знову і знову загрожуватимуть. Щоб захистити нашу незалежність від великих держав світу, нам потрібна найпотужніша зі зброї, що існують. На щастя, теорії відомого фізика Альмуррта Кітштейна заклали основу для розробки такої зброї."

 ABY_convene_council: "Скликати Дворянську раду"
 ABY_convene_council_desc: "Дворянська рада — це дорадчий орган, що складається з найвпливовіших дворян Абіссинії. Останніми роками її засідання організовували самі аристокоти, але ви, як [ROOT.ABY_king_loc_nom], також маєте на це право. Думаю, настав час скликати їх у котолицю і нагадати, хто насправді керує країною."
 ABY_assert_authority: "Затвердити абсолютну владу"
 ABY_assert_authority_desc: "В Абіссинії традиційно немає обмежень влади монарха. Хоч би як дворяни намагалися підірвати цей факт під час правління династії Кітве, він залишається істинним і донині. Тож пам'ятайте, ви не просто стоїте над законом; ви І Є закон."
 ABY_power_to_people: "Владу народу"
 ABY_power_to_people_desc: "У вас із народом є спільний ворог: підступна знать. Тож чому б не укласти з ними союз? Делегуйте частину своєї [Root.ABY_royal_loc_gen]ої влади компетентним представникам народу на кшталт мене. Зрештою, я довів, що на нас, «бруднокровних» котів, можна покластися, адже ми здобуваємо свої багатства та владу наполегливою працею, а не просто успадковуємо їх від батьків."
 ABY_expand_crown_guard: "Розширити Королівську гвардію"
 ABY_expand_crown_guard_desc: "Тоді як регіональні ополчення часто мають вторинну лояльність до своїх феодальних сеньйорів, Королівська гвардія — це віддані професійні війська, лояльні лише вам. Щоб іще більше зміцнити [Root.ABY_royal_loc_acc]у владу над нацією, вам варто розглянути можливість набору нових членів до вашої особистої озброєної свити."
 ABY_land_reform: "Провести земельну реформу"
 ABY_land_reform_desc: "Майже всі орні землі в Абіссинії належать невеликій кількості магнатів, більшість з яких є частиною Месафінту. Як наслідок, багато орендарів сплачують високу орендну плату і ледве можуть дозволити собі сплачувати будь-які податки. Звісно, зрештою вся земля в Абіссинії належить короні. Тому ви маєте широкі повноваження перерозподіляти землю настільки, наскільки це необхідно."
 ABY_estates_assembly: "Створити Асамблею станів"
 ABY_estates_assembly_desc: "Як законодавчий орган для противаги Дворянській раді ми організуємо Асамблею станів, що складатиметься з депутатів, обраних від усіх соціальних верств. Поки що їхня влада залишається обмеженою. Але якщо ви забажаєте, їм поступово можна буде надати можливість пропонувати та ухвалювати закони навіть без вашого схвалення."
 ABY_blessed_of_baast: "[ROOT.ABY_king_loc_nom_cap], що обертає колесо чеснот"
 ABY_blessed_of_baast_desc: "Хоча священнослужителів мало цікавить політика і вони віддають перевагу усамітненню своїх храмів, отримавши їхнє благословення, можна здобути велику легітимність і вплив. Завдяки вашій попередній взаємодії з Абуною Фелібели ви могли б відносно легко проголосити себе божественним монархом, який іде шляхом просвітлення."
 ABY_outlaw_private_armies: "Поставити приватні армії поза законом"
 ABY_outlaw_private_armies_desc: "Традиційно Месафінт мав привілей збирати особисті свити для охорони своїх маєтків. Ці невеликі приватні армії дають аристокотам військову міць, яку можна використати проти [Root.ABY_royal_loc_gen]ого уряду. Тому я наполегливо рекомендую нам розпустити ці формування та інтегрувати їх до [Root.ABY_royal_loc_gen]ої армії."
 ABY_empower_mekwanint: "Надати повноваження Мекванінту"
 ABY_empower_mekwanint_desc: "Вищий клас Абіссинії традиційно поділяється на дві категорії: Месафінт, спадкова еліта, і Мекванінт, призначені посадовці, які часто є з народу. Я, звісно, належу до другої групи, тому можу бути упередженим. Тим не менш, я все одно твердо вірю, що ми повинні перебрати на себе деякі обов'язки непостійної знаті."
 ABY_progressive_taxation: "Запровадити прогресивне оподаткування"
 ABY_progressive_taxation_desc: "Здоровий глузд підказує, що заможніші можуть дозволити собі віддати більшу частину своїх статків. Проте дворяни не славляться своїм визнанням здорового глузду. Тому оподатковувати багатших більше, а бідніших менше, було б суперечливою реформою, але водночас значно вплинуло б на майнову нерівність на користь мас."
 ABY_advisory_council: "Скасувати Дворянську раду"
 ABY_advisory_council_desc: "Дворянська рада спочатку мала виконувати суто дорадчу роль, надаючи поради правлячому монарху. Однак із часів правління династії Кітве вони отримали привілей мати змогу обирати нового монарха на власний розсуд. Цей небезпечний політичний орган тепер нарешті можна розпустити новим указом. Усе, що вам потрібно зробити, — це підписати його."
 
 ABY_unilaterally_revoke_treaty: "Односторонньо скасувати Кітренський договір"
 ABY_unilaterally_revoke_treaty_desc: "Кітренська концесія — це кинджал, спрямований у серце Абіссинії. Однак вона захищена Кітренським договором, який ви були змушені підписати під тиском. Оскільки його законність сама по собі сумнівна, ви маєте право скасувати його, але знайте, що Вінґбардія може відповісти військовою силою. Ми маємо бути готові до бою в разі потреби."
 ABY_try_to_negotiate: "Спроба переговорів з Вінґбардією"
 ABY_try_to_negotiate_desc: "Колись ви сказали, що «Єдине, що у нас спільного з грифонами — це котячі зади». Хоча це й може бути правдою, нам усе ж варто спробувати уникнути ризикованого збройного протистояння, яке могло б закінчитися нашою поразкою. На щастя, дипломатія є варіантом, оскільки вінґбардійці ще не стали зовсім нерозумними."
 ABY_liberate_katren: "Звільнити Кітрен"
 ABY_liberate_katren_desc: "Настав час для нас відновити наш суверенітет і повернути собі Кітрен. Звичайно, оскільки окупанти вважають місто по праву своїм, вони, швидше за все, чинитимуть опір. Але, швидше за все, ми зможемо домовитися з ними про мирний договір, якщо нам вдасться рішуче вигнати їх з абіссинського материка."
 ABY_negotiate_for_katren: "Вимагати повернення Кітрену"
 ABY_negotiate_for_katren_desc: "Нинішні окупанти Кітрену, здається, відкриті до переговорів. Можливо, ми зможемо переконати їх мирно залишити нашу територію. Якщо ні, нам все одно доведеться повертати Кітрен силою, але будемо сподіватися, що вони прислухаються до голосу розуму і зрозуміють, що місто було захоплене незаконно."
 ABY_contact_ras_of_purrsia: "Зв'язатися з Расом Муррсії"
 ABY_contact_ras_of_purrsia_desc: "Відповідно до угоди, укладеної з Вінґбардією, Расство Муррсія тимчасово перебуває під статусом протекторату. Звичайно, вінґбардійська версія договору стверджувала, що цей статус є постійним, але вони також погодилися поважати наш територіальний суверенітет. З огляду на те, як вони порушили цей договір, стає зрозуміло, що ми теж можемо його порушити."
 ABY_purchase_purrsia: "Придбати Муррсію"
 ABY_purchase_purrsia_desc: "Хоча Расство Муррсія було на законних підставах передано Вінґбардії, немає жодних причин, чому б ми не могли легально викупити його назад. Я впевнений, що якби ми запропонували достатньо грошей, власники острова з радістю продали б його нам. Однак сума може виявитися досить великою, тому ми повинні підготувати до цього нашу скарбницю."
 ABY_anti_wingbardianism: "Ворог мого ворога..."
 ABY_anti_wingbardianism_desc: "Вінґбардія показала нам, що їй не можна довіряти. Хоча нам вдалося вигнати віроломних грифонів з Абіссинії, вони залишаються загрозою для багатьох інших країн. Замість того, щоб сидіти склавши лапи, ми повинні активно підтримувати ворогів Вінґбардії та протистояти їхньому експансіонізму. Слабша Вінґбардія означає безпечнішу Абіссинію."
 ABY_make_amends_with_wingbardy: "Нормалізувати відносини з Вінґбардією"
 ABY_make_amends_with_wingbardy_desc: "Тепер, коли територіальні суперечки між нашими двома країнами вирішені, немає жодних причин не повернутися до наших колишніх продуктивних відносин із Вінґбардією. Зрештою, вони дуже допомогли нам із модернізацією протягом минулого століття. Зрозуміти і пробачити, як то кажуть."
 ABY_liberate_les_meridiennes: "Звільнити Ле-Мерідьєни"
 ABY_liberate_les_meridiennes_desc: "Наші антиколоніальні зусилля увінчалися успіхом. Чому б їх не продовжити? Неподалік на північний захід острівний архіпелаг Ле-Мерідьєни був аквілейською колонією понад століття. Звільнивши їх від правління грифонської меншини, ми не лише покращимо нашу репутацію, а й здобудемо стратегічно цінні острови."
 ABY_liberate_trots_and_canters: "Звільнити Тротс і Кентерс"
 ABY_liberate_trots_and_canters_desc: "Острови Тротс і Кентерс були колонізовані Гіпогрифією кілька століть тому. Тут проживає невелике корінне населення поні, що є достатнім виправданням для військової окупації або «звільнення» острівного архіпелагу. Усе, що нам потрібно, — це вікно можливостей для швидкої та таємної заморської операції. Можливо, коли власники островів будуть зайняті конфліктом?"
 ABY_approach_hippogriffs: "Військова співпраця з горою Аріс"
 ABY_approach_hippogriffs_desc: "Останніми роками Вінґбардія демонструвала певну ворожість до [HIP.GetNameDef]. Таким чином, в стратегічних інтересах обох наших країн підтримувати одна одну у військовому плані, щоб підвищити безпеку в північній Зебриці. Я впевнений, що нам обом є чому повчитися одне в одного."
 ABY_liberate_puerto_caballo: "Звільнити Пуерто-Кабальйо"
 ABY_liberate_puerto_caballo_desc: "Острів Пуерто-Кабальйо тривалий час перебував під пануванням Еквестрії, але острів навряд чи можна назвати еквестрійським. Проте залишки правління іноземної меншини зберігаються, незважаючи на те, що острівна держава відновила свою втрачену свободу. Зрозуміло, що вони потребують такої милостивої країни, як Абіссинія, щоб надати їм таку необхідну свободу."
 ABY_approach_equestria: "Альянс з Еквестрією"
 ABY_approach_equestria_desc: "Еквестрія залишається беззаперечною наддержавою, попри те, що не надто активно поширює свій вплив за кордоном. Проте, судячи з подій у Гіпогрифії, Кірії та Грифонстоуні, ситуація змінюється. Якби нам удалося укласти союз із цією величезною нацією, наша власна безпека була б гарантована на багато років уперед."

 ABY_manedalusia_is_abyssinia: "Мейндалусія — це Абіссинія"
 ABY_manedalusia_is_abyssinia_desc: "Мейндалусія була частиною Королівства Абіссинія з 12 по 672 рік після В.Л.. Згідно з історичними записами, Абіссинія контролювала її довше, ніж будь-яка інша країна. Таким чином, наші претензії на цей регіон є найсильнішими. Звісно, попередня війна за цей регіон закінчилася кривавою патовою ситуацією, тому спробувати знову може бути ризиковано."
 ABY_cede_manedalusia: "Поступитися Мейндалусією"
 ABY_cede_manedalusia_desc: "Що стосується Мейндалусії, можливо, ми страждаємо від помилки неповоротних витрат. Жорстока війна 988 року з Мейргиптом та два десятиліття дорогої окупації сильно виснажили наші ресурси. Мало того, наші відносини з нинішніми окупантами Мейндалусії були зіпсовані. Хоч це і суперечливе рішення, відмова від Мейндалусії була б швидким способом скоротити наші втрати."
 ABY_negotiate_with_maregypt: "Переговори про статус Мейндалусії"
 ABY_negotiate_with_maregypt_desc: "Напруженість у відносинах із Мейргиптом через Мейндалусію триває вже два десятиліття. Замість того, щоб продовжувати боротьбу за регіон, ми могли б перетворити Мейндалусію на буферну державу, подібно до фактичного статусу Клуджтауна. Це означало б, що обидві сторони відмовляються від своїх претензій на регіон в ім'я взаємного миру та співіснування."
 ABY_integrate_manedalusia: "Провінція Мейндалусія"
 ABY_integrate_manedalusia_desc: "У минулому Мейндалусія управлялася як невід'ємна частина Королівства Абіссинія, незважаючи на відсутність там більшості котячого населення. Це означало, що до регіону ставилися так само, як і до будь-якої іншої провінції, а за місцеве управління відповідав дворянин — баша. Однак інтеграція регіону вимагатиме певної співпраці з місцевими жителями."
 ABY_federation_with_manedalusia: "Федеральний акт"
 ABY_federation_with_manedalusia_desc: "Мейндалусці показали, що вони не так легко погодяться на повернення до попереднього статус-кво. Багато що змінилося за ті 300 з гаком років, відколи ми втратили Мейндалусію. Проабіссинські поні запропонували створити федерацію, в якій Мейндалусія матиме як широке самоврядування, так і певну владу в центральному уряді."
 ABY_manedalusian_auxiliaries: "Мейндалуські допоміжні війська"
 ABY_manedalusian_auxiliaries_desc: "Після повернення Кольтоби у 988 році розпочався набір серед місцевих поні, щоб використати їхні унікальні здібності, такі як політ та використання магії. Хоча їх і вважають менш надійними, поні, тим не менш, можуть бути дуже ефективним доповненням для [Root.ABY_royal_loc_gen]ої армії. Тому нам варто розглянути можливість значного розширення їхнього набору."
 ABY_alliance_with_MGY: "Укласти союз із Мейргиптом"
 ABY_alliance_with_MGY_desc: "Враховуючи, що наші суперечки з Мейргиптом вирішені, а відносини між нашими двома країнами значно покращилися, нам варто розглянути можливість подальшого поглиблення наших зв'язків зі східними поні. Вони стали б потужним союзником і могли б допомогти нам уникнути повторення минулого, коли обидва королівства були окремо підкорені Сідловою Арабією."
 ABY_negotiate_with_maregypt_2: "Переговори щодо статусу Клуджтауна"
 ABY_negotiate_with_maregypt_2_desc: "Клуджтаун був заснований як торговий форпост в оазисі на абіссинській території у 467 році після В.Л.. Відтоді вони робили все можливе, щоб діяти незалежно від нас, що досягло кульмінації в 947 році, коли будь-які абіссинські чиновники були вислані, і вони перестали підкорятися нашим законам. Після конфлікту 988 року їх підтримав Мейргипет. Нам слід домовитися з ними, щоб мати хоч якийсь шанс повернути Клуджтаун."
 ABY_support_ovingoland: "Підтримати рух Овінґоленду"
 ABY_support_ovingoland_desc: "Після буйства Короля Шторма південний Мейргипет був переповнений зебрами-біженцями. Оскільки сам Мейргипет страждає від внутрішньої нестабільності, цими зебрами нехтують, і вони вимагають кращого до себе ставлення. Ми могли б використати цю напруженість на нашу користь, підтримавши створення незалежної держави зебр, яка залежала б від нашої допомоги."
 ABY_ultimatum_to_klugetown: "Відновити суверенітет над Клуджтауном"
 ABY_ultimatum_to_klugetown_desc: "Де-юре Клуджтаун століттями був частиною [ABY.GetNameDef]. Де-факто він діє як місто-держава відступник з того часу, як Сідлова Арабія перетворила нас на данника у 672 році. Настав час відновити закон і порядок у цьому кишать злочинцями місті-оазисі. В ідеалі [KLG.GetLeader] погодиться на переговори, але якщо ні, ми повинні бути готові застосувати силу."
 ABY_trade_with_alliance: "Торгівля із союзниками"
 ABY_trade_with_alliance_desc: "Наш новий альянс дозволяє нам налагоджувати нові комерційні зв'язки з іншими країнами. Ці зв'язки не лише принесли б нашим купцям додаткові прибутки, а отже, і додаткові податки до скарбниці, а й зміцнили б наш зв'язок із новими союзними державами, гарантуючи тим самим мир між нами."
 ABY_research_with_alliance: "Наукова співпраця з союзниками"
 ABY_research_with_alliance_desc: "Науковий прогрес часто вимагає обміну знаннями, а також співпраці між дослідниками. Абіссинські інтелектуали запропонували нам створити адміністративне, правове та логістичне підґрунтя, необхідне для міжнародного наукового співробітництва з нашими новими країнами-союзниками."
 ABY_topple_mgy_government: "Повалити недружній мейргипетський уряд"
 ABY_topple_mgy_government_desc: "Нелегітимний Сомнамбулський режим явно не зацікавлений у мирних і дружніх відносинах з нами. Тому, щоб убезпечити наш східний кордон, у нас немає іншого вибору, окрім як застосувати військову силу, щоб реорганізувати мейргипетську політику і замінити уряд [MGY.GetLeader] на більш готовий до співпраці."
 ABY_restore_law_and_order_in_KLG: "Відновити закон і порядок у Клуджтауні"
 ABY_restore_law_and_order_in_KLG_desc: "Як незалежним містом-державою, Клуджтауном керував безжальний мафіозний бос Верко, і він був осередком усіляких злочинів. Тепер, коли ми відновили контроль над непокірним містом, я наполегливо рекомендую нам направити туди всіх наявних співробітників правоохоронних органів, щоб навести лад. Після цього ми проведемо вибори нового кантіби, лорда-мера."
 ABY_the_kloog_connection: "Клуджтаунський зв'язок"
 ABY_the_kloog_connection_desc: "Клуджтаун виріс як місто завдяки своєму центральному розташуванню і став вузловим пунктом для пустельних торгових шляхів, на кшталт тих, що пролягають між Абіссинією та Мейргиптом, або того, що перетинає територію від Кольтоби до Фарасри, з'єднуючи Мейндалуську затоку з Арабійським морем. Ці традиційні каравани тепер можна замінити сучасними залізницями та поїздами."
 ABY_ally_donkeys: "Шукати союзу з віслюками"
 ABY_ally_donkeys_desc: "Держави віслюків, що існують нижче за течією річок Тигр та Пантера, колись були підданими Абіссинії, але в ці сучасні часи ми можемо розвинути більш рівноправні та дружні стосунки. Ми маємо запросити їх до нашого новоствореного альянсу, бо разом ми будемо сильнішими, можливо, достатньо сильними, щоб навіть протистояти потенційним наддержавам."
 ABY_dominate_donkeys: "Домінувати над віслюками"
 ABY_dominate_donkeys_desc: "У 150 році після В.Л. Абіссинія підкорила своїй владі віслюків півдня. Це тривало до 5-го століття, коли Сідлова Арабія відібрала у нас ці землі, але за цей час васальні держави процвітали. Віслюки були незалежними з 989 року, але історія вчить нас, що вони не здатні правити собою самі. Найголовніше те, що ми можемо убезпечити наш широкий і беззахисний південний кордон."
 ABY_liberate_farasrah: "Звільнити Фарасру"
 ABY_liberate_farasrah_desc:0 "Портове місто Фарасра є предметом суперечки між віслюками та державою Ємейн. Маючи змішане населення коней і віслюків, воно історично було частиною Ансерука, перш ніж Ємейн захопив його військовою силою після відходу Сідлової Арабії з регіону в 989 році. Це дає нам casus belli, необхідний для забезпечення нашого виходу до Арабійського моря."
 
 # Catrina path
 
 ABY_just_as_according_to_keikaku: "План здійснюється"
 ABY_just_as_according_to_keikaku_desc: "Історики назвуть це Реставрацією Кітве, але для мене це був лише один крок у моєму плані. Попереду ще багато роботи, адже спочатку я маю зміцнити свою владу. Дворяни думають, що я буду їхньою маріонеткою, тому спробують позбутися мене, якщо я хоч кіготь на них підніму. На щастя, вони ще й зарозумілі ідіоти. Вони не зрозуміють, що я роблю, поки не стане надто пізно."
 ABY_hidden_wealth: "Приховані багатства"
 ABY_hidden_wealth_desc: "Моїй родині вдалося приховати чимало скарбів від мстивих Нявконнинів. Дещо в таємних сховищах, дещо на офшорних банківських рахунках, дещо під охороною вірних дворян. Тепер, коли королівська скарбниця належить нам, ми можемо наповнити її всіма нашими прихованими активами. Я знала, як зберегти свої статки в безпеці, на відміну від дурнів Нявконнинів, які втратили все."
 ABY_reduce_slave_rations: "Зменшити пайки рабів"
 ABY_reduce_slave_rations_desc: "Зважаючи на загрозу голоду, боюся, ми більше не можемо дозволити собі повноцінно годувати всіх наших дорогоцінних рабів. Коти в пріоритеті. Я зустрінуся з дворянами, які володіють найбільшою кількістю рабів, і переконаю їх також надавати менше харчів своїй власності. Це має призвести до зниження попиту на їжу та зниження цін. Рабам це не сподобається, але це частина плану."
 ABY_turn_a_blind_eye: "Закрити очі"
 ABY_turn_a_blind_eye_desc: "Раби — це власність, і часто до них так і ставляться. Заворушення рабів часто підживлюються жорстоким поводженням та зловживаннями, що технічно не суперечить закону. Нявконнини були незадоволені цим і використовували непрямі методи, щоб карати або попереджати дворян за таку поведінку, але я пообіцяю не робити нічого подібного. Це має порадувати дворян і розлютити рабів."
 ABY_cash_crop_tax: "Ввести податки на товарні культури"
 ABY_cash_crop_tax_desc: "На цьому етапі мені слід уникати непопулярних кроків, але це неможливо. Нявконнини залишили мені потенційний голод, щоб я йому запобігла, тому я не маю іншого вибору, окрім як виправити ситуацію будь-якими доступними методами. Мені доведеться запровадити значні податки на виробництво та продаж товарних культур, щоб заохотити дворян і селян натомість розводити худобу."
 ABY_import_food_2: "Купувати продовольство за кордоном"
 ABY_import_food_2_desc: "Завдяки поповненій скарбниці мій королівський уряд зможе імпортувати м'ясо з відносно небагатьох доступних ринків, враховуючи, що більшість сусідніх країн населені травоїдними. Це буде недешево, але я зможу перепродавати цю їжу населенню за низькою ціною, що має допомогти запобігти будь-якому голоду."
 ABY_bank_takeover: "Врятувати Банк Абіссинії"
 ABY_bank_takeover_desc: "Банк Абіссинії, заснований Нявконнинами, є монополізованим приватним банком, який виник як концесія національного банку Вінґбардії. Недавній економічний спад довів його майже до банкрутства. Відчай дає мені перевагу. Я запропоную банку державні кредити та капітал за умови, що банк розірве свої зв'язки з Вінґбардією."
 ABY_the_queens_generosity: "Щедрість нявгіст"
 ABY_the_queens_generosity_desc: "Нехай народ знає, що я щедра нявгіст, а не просто маріонетка знаті. Згадані аристокоти можуть протестувати проти моєї «розтрати державних коштів», але до справжньої значущої опозиції справа не дійде. Зрештою, я просто чиню доброчесно і допомагаю тим, хто цього потребує, чи не так?"
 ABY_legalize_slavery: "Легалізувати некотяче рабство"
 ABY_legalize_slavery_desc: "Нявконнини заборонили котяче рабство багато десятиліть тому, але були чи то надто дурними, чи то надто боягузливими, щоб прямо заборонити поневолення інших рас. Дотепер це існувало як правова лазівка, яку використовували дворяни, перетворюючи її на сіру зону поза досяжністю уряду. Переписавши закон, щоб чітко дозволити обмежене рабство, я зможу отримати повний контроль."
 ABY_begin_reconstruction: "Розпочати відбудову"
 ABY_begin_reconstruction_desc: "Слабкість Абіссинії була доведена, коли Нявконнинам не вдалося захистити країну від вторгнення Короля Шторма. Хоча мій план врешті-решт гарантує, що це ніколи більше не повториться, тим часом я маю розпочати масштабні зусилля, що фінансуються урядом, щоб оговтатися від руйнувань, завданих пограбуваннями і знищеннями."
 ABY_eyes_of_the_tiger: "Очі тигра"
 ABY_eyes_of_the_tiger_desc: "Моя влада яка завгодно, але не безпечна. Мало того, що дворяни прагнуть експлуатувати мене, так ще й багато котів залишаються вірними поваленим Нявконнинам. Хоча Королівська гвардія функціонує як мій молот, яким я можу розтрощити своїх ворогів, мені потрібен тонший інструмент, щоб протистояти супротивникам у більш делікатний і прихований спосіб. Нова організація таємної поліції стане моїм кинджалом у темряві."
 ABY_next_step_of_plan: "Наступний крок плану"
 ABY_next_step_of_plan_desc: "Раби, достатньо розлючені, готуються до масштабного повстання проти своїх господарів. Дворяни у відчаї і не в змозі зупинити їх самотужки, тому тепер вони приповзуть благати про мою допомогу за будь-яку ціну. І, на їхнє нещастя, ціна буде досить високою."
 
 ABY_ill_come_up_with_a_name_for_this_later: "Рятівниця Абіссинії"
 ABY_ill_come_up_with_a_name_for_this_later_desc: "Народ Абіссинії повинен зрозуміти, що щойно сталося. Раби повстали проти своїх законних господарів, дворяни нічого не могли з ними вдіяти, і я вийшла вперед, щоб відновити порядок і врятувати країну від анархії. Вони повинні знати, що я єдина, хто може захистити нашу націю від неминучої загибелі."
 ABY_strengthen_garrisons: "Посилити місцеві гарнізони"
 ABY_strengthen_garrisons_desc: "Розібравшись із нахабними рабами, я тепер можу використати колишнє ополчення дворян для посилення правопорядку в провінціях. Вони функціонуватимуть як продовження королівської влади, щоб придушити будь-які можливі повстання або дворянські змови до того, як вони стануть загальнонаціональною загрозою."
 ABY_repurpose_slaves: "Перепрофілювати рабів"
 ABY_repurpose_slaves_desc: "Умови праці на величезних плантаціях дворян були важкими, що сприяло невдоволенню серед рабів і зрештою спричинило повстання. Оскільки раби тепер належать державі, я можу знайти їм більш продуктивне застосування. Фабрична праця може бути не такою прибутковою, як вирощування товарних культур, але вона зміцнить нашу економіку."
 ABY_distributed_arsenals: "Провінційні арсенали"
 ABY_distributed_arsenals_desc: "Щоб запобігти подальшим повстанням рабів, арсенали будуть розподілені по всій країні, щоб забезпечити місцеві гарнізони великими запасами зброї, яку вони зможуть використовувати в надзвичайних ситуаціях. Ці арсенали, звичайно, також стануть центрами виробництва зброї, що зміцнить нашу військову промисловість."
 ABY_demand_noble_loyalty: "Вимагати покори від Месафінту"
 ABY_demand_noble_loyalty_desc: "Тепер, коли аристокоти втратили свої економічні та військові важелі впливу, у них залишилося дуже мало можливостей загрожувати моїй королівській владі. Я більше не терпітиму непокори і саботажу. Віднині кожен дворянин повинен виконувати свій обов'язок, інакше його звинуватять у державній зраді. Дехто з них може образитися на це і спробувати чинити опір, але це лише зробить їхнє покарання суворішим."
 ABY_seize_mines: "Конфіскувати шахти"
 ABY_seize_mines_desc: "Гори Абіссинії багаті на цінні мінерали, проте шахти, де їх видобувають, належать приватним особам, переважно дворянам. Стратегічно важливі ресурси повинні перебувати у власності держави. Тому я підпишу указ про експропріацію всіх шахт в Абіссинії. Після цього державних рабів можна буде залучити до роботи в них."
 ABY_fortification_brigades: "Фортифікаційні бригади"
 ABY_fortification_brigades_desc: "Хоча Абіссинія завжди мала переваги завдяки своїй оборонній місцевості, цього недостатньо в епоху машин. Необхідно побудувати належні та сучасні укріплення для відбиття будь-яких потенційних загарбників нашої країни, і я можу залучити до їхнього будівництва державних рабів. Вони будуть раді робити щось корисніше, ніж збирати кавові зерна."
 ABY_expand_crown_guard_2: "Розширити Королівську гвардію"
 ABY_expand_crown_guard_2_desc: "Нявконнини створили Королівську гвардію, і тому багато з їхніх ветеранів залишаються вірними династії претендентів. Тим не менш, для мене важливо мати елітні війська під моїм прямим контролем. Я підвищу перспективних і вірних солдатів з лав феодального ополчення та гарнізонів до Королівської гвардії. Їм можна довіряти, адже вони будуть мені вдячні."
 ABY_bureaucratize_nobles: "Призначити губернаторів провінцій"
 ABY_bureaucratize_nobles_desc: "Провінціями Абіссинії традиційно правили регіональні дворяни, які успадкували свої титули. Ця застаріла і ненадійна практика зараз закінчується. Я надам титули губернаторів провінцій Мекванінту, якому можна довіряти. Оскільки їхній дохід залежатиме від державної зарплати, вони будуть набагато лояльнішими до мене, ніж дворяни."
 ABY_nationalize_foreign_assets: "Націоналізувати іноземні активи"
 ABY_nationalize_foreign_assets_desc: "Безперервне пограбування Абіссинії іноземцями відтепер припиняється. Будь-яка власність, що належить особам без абіссинського громадянства, стане державною власністю без жодних компенсацій попереднім власникам. Їм слід нагадати, що Абіссинія та всі її багатства належать абіссинцям і більше нікому."
 ABY_introduce_catscription: "Розширити котопризов"
 ABY_introduce_catscription_desc: "Феодальні ополчення розбіглися перед бурею. Якщо Абіссинія хоче зберегти свою незалежність, їй знадобиться належна армія, побудована на сучасній системі котопризову. Кожен працездатний дорослий громадянин повинен буде пройти період військової служби. Захист батьківщини має стати патріотичним обов'язком кожного кота, а не завданням егоїстичних дворян."
 ABY_enlighten_populace: "Просвітити населення"
 ABY_enlighten_populace_desc: "Нявконнини почали роботу з підвищення рівня грамотності в нашій країні, але я не думаю, що вони зайшли достатньо далеко. Вони не змогли скасувати працю кошенят і побудувати достатньо шкіл у сільській місцевості. Я досягну успіху там, де вони зазнали невдачі. Якщо не більше, моє правління буде відоме тим, що поклало край неписьменності в Абіссинії!"
 ABY_state_companies: "Створити державні підприємства"
 ABY_state_companies_desc: "Без чіткого керівництва з боку держави Абіссинії знадобилося б багато років для належної індустріалізації. Тому я створю кілька державних структур, які займатимуться виробництвом промислової продукції. Багато з яких, за чистим збігом обставин, можна використовувати для оснащення сучасних армій. Моєю довгостроковою метою є забезпечення внутрішнього виробництва критично важливих товарів."
 ABY_defend_coast: "Захистити узбережжя"
 ABY_defend_coast_desc: "Через свою форму Абіссинський півострів має довгу берегову лінію. Дехто міг би сказати, що неможливо захистити її всю, але, клянуся Бааст, я спробую. Застарілий абіссинський флот потрібно модернізувати, наші порти треба укріпити, а військово-морських офіцерів — перепідготувати. Навіть цього недостатньо, але ці зміни — хороший старт."
 ABY_learn_to_fly: "Навчитися літати"
 ABY_learn_to_fly_desc: "Ті пернаті леви розробили машини, здатні літати, незважаючи на те, що самі вже вміють літати... Принаймні, вони не змогли приховати свої диво-винаходи лише для себе. Незабаром коти теж зможуть ширяти в небесах. Я видам указ про створення Абіссинських військово-повітряних сил. Це, сподіваюся, дещо зрівняє шанси."
 ABY_catrinas_school: "Школа Кітріни для обдарованих котів"
 ABY_catrinas_school_desc: "Занадто багато видатних котів не мають іншого вибору, окрім як жити і працювати на своїх селянських фермах. Таким котам треба дати шанс досягти в житті чогось більшого. За дуже успішним зразком Еквестрії я створю навчальний заклад для тих котячих, які зможуть продемонструвати свій неабиякий талант."
 ABY_dam_the_rivers: "Перекрити річки греблями"
 ABY_dam_the_rivers_desc: "Справді сучасна країна потребує величезної кількості електроенергії для живлення незліченних машин та електронних пристроїв. Одним із найкращих способів виробництва енергії є гідроенергетика, тому я накажу побудувати великі дамби на річках Пантера і Тигр. Через утворені водосховища доведеться переселити десятки тисяч котів, але воно того варте."
 ABY_manedalusia_slave_state: "Мейндалуська рабська держава"
 ABY_manedalusia_slave_state_desc: "Багато котів, особливо дворяни, люблять стверджувати, що Мейндалусія є невід'ємною частиною Абіссинії... Це нісенітниця, котяче населення становить там невелику меншість. Ні, Мейндалусія стане першою з багатьох рабських держав, які повинні будуть щомісяця сплачувати уряду данину рабами."
 ABY_foundations_of_welfare_state: "Основи держави загального добробуту"
 ABY_foundations_of_welfare_state_desc: "Найперший обов'язок держави — захищати своїх підданих. Традиційно це означає захист від загарбників та злочинців, але чому б не розширити це визначення? Усіх котів також треба захистити від хвороб, бідності та недоїдання. Інші сучасні держави, такі як Еквестрія, вже зробили це, тож я кажу, що ми маємо просто наслідувати їхній приклад."
 ABY_research_institute: "Заснувати Котячий науково-дослідний інститут"
 ABY_research_institute_desc: "Котячий розум нічим не поступається розуму інших рас, і я тому живий доказ. Зважаючи на те, що розум багатьох перспективних молодих котів культивується, я думаю, настав час використати його з користю. Під моїм найщедрішим патронатом буде створено інститут, що фінансуватиметься державою і займатиметься інноваційними дослідницькими програмами."
 ABY_best_of_best: "Найкращі з найкращих"
 ABY_best_of_best_desc: "Моєю армією повинні керувати компетентні командири, а не купка корумпованих підлабузників і традиціоналістів, що застрягли в минулому. Для підвищення офіцерів будуть введені суворі стандарти, а звання отримуватимуть лише ті, хто добре себе зарекомендував. Нарешті настав час покласти край епосі воїнів-аристокотів."
 ABY_choo_choo_bitches: "Артерії зі сталі та бетону"
 ABY_choo_choo_bitches_desc: "Перетворення Абіссинії на єдину та централізовану національну державу було ще тим болем у хвості. Проте моя робота майже закінчена. Мені просто потрібно видати указ про будівництво залізниць і доріг, щоб з'єднати кожен віддалений куточок Королівства, що дозволить не лише швидко транспортувати товари і котів, а й допоможе забезпечувати армію."
 ABY_reveal_plan: "Розкрити мій план масам"
 ABY_reveal_plan_desc: "Ще один етап мого плану наближається до завершення. Час таємниць також добігає кінця. Незабаром усе має бути готове до остаточного порятунку котячого роду від забуття. Коли я покажу їм усім, що задумала, дехто може протестувати чи скаржитися. Але їхнє нявкання потоне в гучних вигуках підтримки та схвалення."
 
 ABY_ill_come_up_with_a_name_for_this_later_2_electric_boogaloo: "Готові до боротьби"
 ABY_ill_come_up_with_a_name_for_this_later_2_electric_boogaloo_desc: "Час великих битв нарешті настав. Абіссинія повинна розширити свої володіння і убезпечити свої кордони, посилюючи себе через право завоювання. Це єдиний спосіб переламати хід історії. Це наш єдиний шанс на довгострокове виживання. Іншого варіанту немає. Ми зробимо те, що маємо зробити."
 ABY_organize_the_supreme_command: "Організувати Верховне військове командування"
 ABY_organize_the_supreme_command_desc: "Керівництво збройними силами має бути повністю централізоване під моєю владою. Я створю Верховне військове командування і призначу його членами котів, які довели свою компетентність і беззаперечну відданість. Вони відповідатимуть за виконання моїх наказів на практиці та забезпечення того, щоб армія працювала як добре налагоджений механізм."
 ABY_unilaterally_revoke_treaty_2: "Односторонньо скасувати Кітренський договір"
 ABY_unilaterally_revoke_treaty_2_desc: "Той факт, що Нявконнини підписали Кітренський договір, є ганьбою для всієї нації і плямою на нашій гордій історії. Я єдина, хто може відновити нашу втрачену репутацію та честь. Нехай вінґбардійці знають, що абіссинці ні перед ким не стають на коліна!"
 ABY_secrets_of_the_machine: "Секрети Машини"
 ABY_secrets_of_the_machine_desc: "Тепер, коли мені нічого приховувати, я можу розкрити все, що відомо про Машину, заховану під моїм родинним маєтком. Хоча її походження невідоме, мої дослідження та знання відіграли ключову роль у тому, щоб вона знову запрацювала. Роки досвіду у створенні відьомського зілля також дали мені чимало того, чим я можу поділитися з іншими."
 ABY_cavalry_finally_added_in_eaw: "Рабська кавалерія"
 ABY_cavalry_finally_added_in_eaw_desc: "Хоча раби є чудовим джерелом дешевої робочої сили, наші військові також могли б їх використовувати. Дворяни вже використовують рабів як їздових тварин для подорожей, то чому б солдатам не робити те саме? Ці «кінні» підрозділи зможуть пересуватися набагато швидше за піхоту, а поневолені непарнокопитні, на яких вони їздять, також можуть слугувати живим щитом."
 ABY_liberate_purrsia: "Операція: КОТЯЧИЙ ОСТРІВ"
 ABY_liberate_purrsia_desc: "Жалюгідні Нявконнини багато років тому продали наші землі грифонам. Відтоді Муррсія перебуває під іноземною окупацією, а місцевий Рас є не більше ніж безсилою маріонеткою. Настав час зв'язатися з Расом і повернути те, що по праву належить нам."
 ABY_cut_off_klugetown: "Операція: ІЗОЛЯЦІЯ"
 ABY_cut_off_klugetown_desc: "Абіссинське місто Клуджтаун було захоплене місцевими злочинними угрупованнями, яким вдалося змусити Мейргипет гарантувати їхню «незалежність». Це лише ще один приклад слабкості режиму Нявконнинів. Однак у мене є план: спровокувати повстання в Овінґоленді, щоб ізолювати Клуджтаун від їхніх союзників, а потім вдарити по них на повну силу."
 ABY_universal_healthcare: "Загальна котяча охорона здоров'я"
 ABY_universal_healthcare_desc: "Кожен кіт в Абіссинії має право на швидку та належну медичну допомогу, яку надають кваліфіковані фахівці. Завдяки моїм нещодавнім освітнім програмам є достатньо кваліфікованих котів для надання сучасного та ефективного лікування. Тепер медичним закладам просто потрібне достатнє фінансування для належної роботи. І я його надам."
 ABY_anti_air_defence_2: "Щит небес"
 ABY_anti_air_defence_2_desc: "Хоча Абіссинії дійсно може не вистачати належних промислових потужностей для створення потужних військово-повітряних сил, я думаю, що ми можемо інвестувати в покращення можливостей протиповітряної оборони, щоб зменшити негативні наслідки потенційної переваги ворога в повітрі. Крім того, я чула, що зенітні гармати досить ефективні і проти наземних цілей..."
 ABY_mag_weapons_2: "Злиття магії та машин"
 ABY_mag_weapons_2_desc: "Абіссинія стане яскравим прикладом нової епохи, де магія і технології ідеально поєднані. Цей союз дозволить нашому виду досягти тих же висот, що й ті, хто має вроджені магічні здібності, поклавши край тисячоліттям неповноцінності для всього котячого роду. Я — велика пророчиця цієї нової золотої доби."
 ABY_rebuild_felibela: "Відновити славу Фелібели"
 ABY_rebuild_felibela_desc: "Фелібела була побудована одним із моїх найшанованіших предків багато століть тому як священне місто, присвячене славі Бааст. Однак сьогодні це не більше ніж село і місце паломництва. Я вшаную нявгуса Фелібелу, використавши королівські кошти на відбудову його однойменного міста і повернення його на карту."
 ABY_slave_literacy: "Освіта для рабів"
 ABY_slave_literacy_desc: "Тепер, коли раби більше не марнують свої життя на плантаціях, вони повинні бути здатні виконувати складніші промислові завдання, які часто передбачають читання посібників та інструкцій. Для цього вони мають бути письменними. Хоча з цим пов'язані певні ризики, абсолютно необхідно надати базову освіту навіть рабам."
 ABY_yet_another_research_slot_focus: "Піднесення котячого розуму"
 ABY_yet_another_research_slot_focus_desc: "Саме міць науки підняла котячий рід над його вродженою слабкістю. Світло розуму розвіє темряву невігластва і освітить шлях до безсмертної величі. Абіссинські уми потребують ретельного культивування, навички та інтелект мають винагороджуватися, а інтелектуалізм — заохочуватися. Лише тоді ми зможемо досягти справжнього просвітлення."
 ABY_convert_convoys_2: "Краще застосування торгових суден"
 ABY_convert_convoys_2_desc: "Щоб компенсувати нестачу наших промислових можливостей, ми можемо швидко розширити наш флот, захопивши торговельні судна та переобладнавши їх на військові кораблі. Я впевнена, що купці будуть засмучені, але я подбаю про те, щоб вони були безсилі щось із цим вдіяти. Наша безпека важливіша за прибутки багатіїв."
 ABY_invade_maregypt: "Звільнити Мейндалуську рабську державу"
 ABY_invade_maregypt_desc: "Тривала іноземна окупація Мейндалусії була скалкою в нашому оці з того часу, як Нявконнини не змогли зберегти контроль над нею. Однак це дає чудове виправдання для повного знищення наших східних суперників. Династія Кітве досягне успіху там, де наші попередники зазнали невдачі!"
 #Більша частина Мейндалуської рабської держави залишається під іноземною тиранією. Мейндалусія століттями була абіссинською землею, ще до того, як династія Кітве вперше стала правити. Будь-які виправдання окупації чи навіть незалежності Мейндалусії є нісенітницею. Я не буду цього слухати. Натомість я поверну те, що по праву належить нам."
 #У Мейргипта з нами антагоністичні стосунки ще з часів здобуття незалежності від мерзенної держави Сідлової Арабії. Я не бачу жодних причин виправляти цей зовнішньополітичний провал Нявконнинів, оскільки він досить вигідний для мене. Мені завжди потрібно більше коней-рабів, і Мейргипет може запропонувати їх більш ніж достатньо.
 ABY_motorization: "Коти і машини"
 ABY_motorization_desc: "Коти завжди мали великий недолік порівняно з більшістю рас: ми не здатні переносити важкі вантажі або тягнути великі вози, як це можуть робити чотириногі раси. Це завжди ускладнювало логістику та подорожі без використання в'ючних тварин або рабів. Але із запровадженням масового виробництва автомобілів транспортування стало простішим і дешевшим, ніж будь-коли."
 ABY_nuclear_witchcraft: "Ядерне чаклунство"
 ABY_nuclear_witchcraft_desc: "Поєднання науки та магії продовжує давати найдивовижніші результати. Використання магічної енергії для розщеплення фундаментальних будівельних блоків Всесвіту, атомів, призводить до справжньої ланцюгової реакції... тому, очевидно, я вважаю, що ми повинні використати це з користю проти всіх наших ворогів."
 ABY_dominate_donkeys_2: "Приборкати впертих віслюків"
 ABY_dominate_donkeys_2_desc: "Минуло багато століть відтоді, як віслюки півдня визнали нашу перевагу над ними. Їхні землі природно належать до нашої сфери впливу, і будь-яка незалежна держава віслюків є прямою загрозою нашому вразливому південному кордону. Тому я видала указ про мобілізацію армії для підготовки до звільнення віслюків від них самих."
 ABY_invade_yemane: "Здобути коней-рабів"
 ABY_invade_yemane_desc: "Коні — чудові раби, вони вищі і сильніші за поні чи зебр, але нам вони доступні в набагато меншій кількості. На щастя, я знаю чудовий спосіб виправити це. Ємейн — невелика і вразлива держава неподалік від нас з великим населенням коней. Вони стануть чудовими їздовими тваринами для котячого роду!"
 ABY_prepare_for_final_battle: "Підготуватися до фінальної битви"
 ABY_prepare_for_final_battle_desc: "Незабаром, я впевнена, самому існуванню Абіссинії загрожуватиме велика держава з її величезною, озброєною до зубів армією. Ми повинні зробити все можливе, щоб бути готовими до такої серйозної загрози. Ніколи більше абіссинці не стануть на коліна перед іноземцями! Кожен раб-робітник повинен виконати свій обов'язок, щоб наші арсенали були заповнені вщерть."
 ABY_the_new_baast: "Нова Бааст"
 ABY_the_new_baast_desc: "Завдяки моїм зусиллям абіссинці піднялися і досягли небачених раніше висот. Я з упевненістю можу назвати себе другою Бааст, гідною спадкоємицею прародительки котячого роду. Під моїм керівництвом Абіссинія стане великою державою, з якою доведеться рахуватися, державою, побудованою на спинах мільйонів рабів. Нехай ця нова імперія існує вічно!"
 
 ABY_destroy_saddle_arabia: "Знищити Арабію"
 ABY_destroy_saddle_arabia_desc: "Нявконнини втратили своє право на владу після того, як їх принизила і перемогла Сідлова Арабія багато років тому. Мої предки завжди планували дочекатися слушного моменту, щоб завдати удару і помститися за нашу поразку, але перш ніж вони змогли це зробити, Нявконнини вкрали свій трон назад. Тепер час помсти нарешті настав."
 
 # Coomer path
 
 ABY_za_nasza_i_wasza_wolnosc: "За нашу і вашу свободу"
 ABY_za_nasza_i_wasza_wolnosc_desc: "Запланований день повстання настав і минув. Ми вийшли з підпілля і завдали вирішального удару нашому ворогові, але без допомоги ми приречені. Настав час нашим союзникам дотримати слова і прийти нам на допомогу. Тільки разом ми зможемо звільнити Абіссинію від її тиранічної монархії!"
 ABY_gorilla_war: "Смерть від тисячі порізів"
 ABY_gorilla_war_desc: "Наші раби можуть не бути професійними солдатами, і вони можуть бути навіть менш досвідченими бійцями, ніж абіссинське ополчення чи призовники. Це просто означає, що ми повинні уникати лобових зіткнень з ворогом, а натомість розосередити наші сили, ховаючись у сільській місцевості та використовуючи місцевість на нашу користь. Ми повинні завдавати ударів з усіх можливих напрямків, коли вони найменше цього очікують."
 ABY_rally_slaves: "Згуртувати рабів"
 ABY_rally_slaves_desc: "Що більше території ми беремо під контроль, то більше рабів можемо звільнити. Потім вони зможуть приєднатися до нашої справи повного звільнення Абіссинії від монархічного деспотизму, щоб ми всі разом могли гарантувати, що інститути рабства та феодалізму будуть стерті з півострова. Крім того, раби будуть більш ніж щасливі помститися системі, яка їх пригноблювала."
 ABY_loot_shit: "Пограбувати зброярні"
 ABY_loot_shit_desc: "Завдяки тим, хто співчуває нам в абіссинській армії, ми змогли знайти і отримати доступ до кількох таємних зброярень із запасами зброї. Оскільки багатьом нашим бійцям не вистачає належних гвинтівок, це благословення богів."
 ABY_encourage_desertion: "Заохочувати дезертирство"
 ABY_encourage_desertion_desc: "Було багато солдатів, які перейшли на наш бік, розчарувавшись у своєму монархічному уряді та співчуваючи нашому руху. Але значно більше котів залишилися вірними своєму репресивному режиму. Можливо, приклавши достатньо зусиль, ми зможемо переконати ще більшу їх кількість приєднатися до нас. Напевно, вони зрозуміють, що наша справа справедлива?"
 ABY_emergency_economy: "Надзвичайні економічні заходи"
 ABY_emergency_economy_desc: "Конфлікти — річ дорога, а наша армія визволення має у своєму розпорядженні обмежені ресурси. Ми повинні повною мірою використовувати всю територію, яку ми контролюємо, і гарантувати, що місцеве виробництво буде зосереджене на задоволенні наших потреб. Ці заходи можуть виявитися непопулярними, але вони абсолютно необхідні."
 ABY_call_for_aid: "Заклик про допомогу"
 ABY_call_for_aid_desc: "Самим нам буде складно не лише повалити монархічний уряд, але й утримати територію після нашої перемоги. Противники рабства, які співчувають нашій справі, неодмінно відгукнуться на наші прохання про допомогу. Сподіваємось, ми отримаємо таку необхідну підтримку у вигляді добровольців та зброї від наших потенційних друзів за кордоном."
 ABY_anti_monarch_propaganda: "Поширювати інформацію"
 ABY_anti_monarch_propaganda_desc: "Династія Нявконнинів уможливила масове поневолення інших рас і накопичила величезні багатства у своєму палаці лише для того, щоб втратити все відразу, поставивши країну на межу краху. Династія Кітве була нічим не кращою, надавши величезну владу жадібним землевласникам. Ми повинні переконатися, що кожен абіссинець знає правду про своїх так званих монархів!"
 ABY_improvised_workshops: "Імпровізовані збройові майстерні"
 ABY_improvised_workshops_desc: "Щоб повністю забезпечити нашу армію визволення, нам потрібне власне надійне джерело спорядження. Вже зараз деякі раби власноруч виготовляють імпровізовану зброю в кустарних майстернях. Ми маємо організувати розширення такого децентралізованого виробництва, навіть якщо його продукція дещо нижчої якості."
 ABY_ally_manedalusia: "Наші мейндалусійські друзі"
 ABY_ally_manedalusia_desc: "Мейндалусія силоміць окупована Абіссинією з 988 року. Наш лідер, Шарп Спір, є одним із багатьох поні, які стали рабами внаслідок цього злочину. Таким чином, свобода Мейндалусії є життєво важливою для нашої справи, і ми повинні розглядати їхніх хоробрих бійців опору як наших союзників. Ми маємо зв'язатися з ними якнайшвидше."
 ABY_down_with_crown: "Геть корону!"
 ABY_down_with_crown_desc: "Смерть краща за рабство, тому наші хоробрі воїни готові битися до гіркого кінця. Якщо ми переможемо, Абіссинія стане кращим місцем для кожної істоти. Якщо ми зазнаємо поразки, значить, наші колишні господарі дарували нам свободу в потойбічному житті. Отже, нам нічого втрачати, крім своїх кайданів!"
 
 ABY_trans_rights_government: "Нація без рабів чи господарів"
 ABY_trans_rights_government_desc: "З падінням старого режиму настав час провести Національну конференцію з питань миру і примирення, запросивши на неї будь-які політичні організації, які підтримують революцію. Разом ми можемо офіційно створити перехідний уряд для тимчасового керівництва країною і закласти основу для кращого майбутнього."
 ABY_slave_repatriation: "Програма репатріації колишніх рабів"
 ABY_slave_repatriation_desc: "Хоча багато рабів прожили в Абіссинії більшу частину свого життя або навіть народилися тут, чимало інших прагнуть повернутися до своїх домівок вільними істотами. Хоча це не завжди можливо, оскільки деякі країни просто знову поневолили б їх, якби вони повернулися, інші могли б з радістю прийняти своїх колишніх громадян назад додому."
 ABY_fate_of_old_order: "Доля старого порядку"
 ABY_fate_of_old_order_desc: "Хоча самі монархи разом із багатьма дворянами встигли втекти за кордон, нашим хоробрим солдатам вдалося схопити чимало провідних діячів старого режиму. Деякі колишні раби дуже... голосно вимагають для них найвищого покарання, тоді як інші закликають до поміркованості. Перехідному уряду доведеться вирішити, що з ними робити."
 ABY_reconstruction: "План відбудови"
 ABY_reconstruction_desc: "Значна частина Абіссинії постраждала від недавніх суспільних потрясінь. Щоб зміцнити легітимність нашого уряду, ми повинні зробити свій внесок у зцілення ран нації і завоювати прихильність котячого населення. Хоча наші ресурси обмежені, чого нам не бракує, так це військовополонених, яких можна залучити до роботи з мінімальними витратами."
 ABY_reorg_army: "Створити нову армію"
 ABY_reorg_army_desc: "Революційна армія складалася з різних загонів озброєних колишніх рабів, слабко об'єднаних під центральним командуванням Шарп Спір. За допомогою абіссинських офіцерів і солдатів, які перейшли на наш бік, ми можемо розпочати процес створення належної регулярної армії для захисту кордонів країни."
 ABY_a_chat_with_cats: "Слухати народ"
 ABY_a_chat_with_cats_desc: "Метою нашого уряду є створення вільного і рівноправного суспільства, кращого місця не лише для некотячих, але й для всіх рас. Дозволивши громадські петиції, ми зможемо підвищити нашу легітимність в очах населення. Однак це означає, що ми маємо виконати хоча б одну з петицій, щоб показати, що ми до них дослухаємося."
 ABY_communalize_land: "Конфіскувати дворянські маєтки"
 ABY_communalize_land_desc: "Більша частина земель в Абіссинії, особливо родючі сільськогосподарські угіддя, перебувала у приватній власності невеликої групи дворянських родів. Це призвело до розвитку інтенсивного землеробства та плантаційної економіки, заснованої на рабській праці. Щоб запобігти повторенню такого беззаконня, землі, які раніше належали дворянству, стануть общинними, вільними для використання місцевими громадами."
 ABY_manedalusian_question: "Вирішити мейндалуське питання"
 ABY_manedalusian_question_desc: "Мейндалусія століттями була предметом суперечок між Абіссинією та Мейргиптом і завжди була джерелом конфліктів. Мало того, місцеві жителі підтримували нашу справу, очікуючи на поступки після нашої перемоги. Нарешті настав час для перехідного уряду вирішити долю цього регіону."
 ABY_worker_coops: "Націоналізувати промисловість"
 ABY_worker_coops_desc: "Ми маємо бути обережними, щоб уникнути формування більш сучасних форм рабства. Абіссинська соціалістична партія виступає за законну конфіскацію зароджуваної промисловості Абіссинії у власників фабрик. Вони стверджують, що це необхідний і тимчасовий захід для гарантування економічної рівності та соціальної справедливості."
 ABY_principles_of_good_gov: "Принципи належного врядування"
 ABY_principles_of_good_gov_desc: "Щоб зробити Абіссинію кращим місцем для життя кожної істоти, ми повинні дотримуватися керівних принципів, які зміцнюють верховенство права та мінімізують корупцію і зловживання. Ефективний уряд задовольняє потреби всього населення, а не лише невеликої групи еліт, і забезпечує добробут усіх громадян."
 ABY_hold_elections_nothing_could_possibly_go_wrong: "Провести загальні вибори"
 ABY_hold_elections_nothing_could_possibly_go_wrong_desc: "Перехідний уряд виконав свої обов'язки і успішно заклав фундамент нової епохи в історії Абіссинії. Конституція розроблена і готова до прийняття після виборів, на яких глава держави, а також члени парламенту обиратимуться всіма громадянами республіки."
 
 ABY_wait_a_second_this_is_suspiciously_similar_to_the_colthage_constitutionalist_civil_wars: "Знову ми маємо боротися"
 ABY_wait_a_second_this_is_suspiciously_similar_to_the_colthage_constitutionalist_civil_wars_desc: "Я не для того зайшов так далеко, щоб усе втратити. Можливо, я не знаю, як керувати країною, але я точно знаю, як вести війну і перемагати в ній. Настав час закликати наших старих друзів, тих, хто боровся пліч-о-пліч зі мною проти наших спільних гнобителів і залишився тут, щоб будувати краще майбутнє. Вони — найрішучіші борці за свободу, яких я знаю, і їхня допомога буде неоціненною."
 ABY_fortify_panthera: "Укріпити Пантеру"
 ABY_fortify_panthera_desc: "Я звик вести партизанську війну в горах, але нинішня ситуація змушує мене адаптуватися. Оскільки перехідний уряд розташований у Пантері, захист найбільшого міста Абіссинії має першочергове значення. Зрештою, ті, хто намагається захистити все, зрештою не захищають нічого. Моїм солдатам доведеться навчитися вести оборонні бої, поки цивільні зводять укріплення."
 ABY_focus_north: "Зосередитися на півночі"
 ABY_focus_north_desc: "Патріотичний бунт, підтримуваний більшістю котячого населення, є значно більшою загрозою, ніж зрадники на півдні. Тому я вважаю, що ми можемо дозволити собі ігнорувати жалюгідні сили того тупого мула Сенни і зосередити наші зусилля на втихомиренні північних районів Абіссинії. Як тільки ми там закінчимо, зможемо повернутися на південь, щоб завершити справу."
 ABY_focus_south: "Зосередитися на півдні"
 ABY_focus_south_desc: "Хоча неоассирійські терористи слабші за Патріотичний бунт, вони становлять значно більшу загрозу в майбутньому, якщо південні віслюки вирішать втрутитися і підтримати їх. Тому я вважаю, що ми повинні діяти швидко і знищити цих зрадників, поки не стало занадто пізно. Після цього у нас може вистачити сил повернутися на північ і здобути перемогу й там."
 ABY_any_weapons_will_suffice: "Згодиться будь-яка зброя"
 ABY_any_weapons_will_suffice_desc: "У мій час у нас не було модної зброї. У нас були палиці. Дві палиці й камінь на цілий взвод борців за свободу! І ми мусили ділитися тим каменем! Якщо ми змогли звільнити всю Абіссинію, маючи лише палиці та каміння, то ми точно, клянуся Тартаром, зможемо відновити мир і порядок з кількома старовинними іржавими мечами та лапними гарматами."
 ABY_call_for_aid_again: "Заклик про допомогу... Знову"
 ABY_call_for_aid_again_desc: "Нам потрібна будь-яка допомога, яку ми тільки можемо отримати, від будь-кого, хто готовий її надати. Немає нічого ганебного в тому, щоб просити про підтримку, коли вона потрібна для виживання. Вони можуть вважати нас зневіреними, і матимуть рацію. Я можу лише сподіватися, що вони не спробують скористатися нашим слабким становищем..."
 ABY_emergency_factory_conversion: "Перепрофілювати заводи"
 ABY_emergency_factory_conversion_desc: "Пантера є центром промислового виробництва в Абіссинії, але це виробництво наразі обслуговує цивільні потреби. У цей час кризи ми не маємо іншого вибору, окрім як використовувати будь-які можливі засоби для забезпечення наших потреб. Я зроблю все можливе, щоб цей процес пройшов гладко і без надмірного примусу, у співпраці як з власниками заводів, так і з робітничими радами."
 ABY_skidaddle_skadoodle_your_supply_is_now_fucked: "Вдарити по їхніх лініях постачання"
 ABY_skidaddle_skadoodle_your_supply_is_now_fucked_desc: "Регулярні армії й так змушені витрачати величезну кількість часу та ресурсів на логістику. Для армії ренегатів, що складається з колишніх рабів, які переховуються в пагорбах і горах, логістика була всім. Протягом багатьох років я і мої офіцери вивчили кожну деталь ліній постачання в Абіссинії і те, де вони перетинаються. Тепер ми точно знаємо, куди бити."
 ABY_rapid_training_program: "Прискорена програма навчання"
 ABY_rapid_training_program_desc: "Ми не можемо покладатися лише на ветеранів минулої громадянської війни. Нам потрібні свіжі та вмотивовані солдати, щоб заповнити прогалини на лінії фронту, і вони потрібні нам якнайшвидше. Колишні борці за свободу, які не можуть воювати через поранення, тепер можуть передати свої знання новобранцям. Їх навчатимуть лише найважливішим аспектам ведення війни. Сподіваюся, цього їм вистачить, щоб вижити."
 ABY_a_generous_donation: "Щедра пожертва"
 ABY_a_generous_donation_desc: "Нещодавно з нами зв'язався один багатий вінґбардієць... Хоча спочатку я поставився до цього скептично, я дізнався, що він ліберальний промисловий магнат, який емігрував зі своєї країни. Він запропонував пожертвувати всю свою колекцію винищувачів, очевидно, виготовлених компанією, якою він колись володів. Він побажав нам удачі в нашій «революційній боротьбі проти відсталого монархізму». Думаю, ми повинні йому подякувати?"
 ABY_rely_on_popular_support: "Спровокувати повстання"
 ABY_rely_on_popular_support_desc: "Незважаючи на брехню та пропаганду про те, що нашу революцію організувала «вісь зла Мейргипет-Еквестрія-Сталліонград», нашою головною метою залишається соціальна революція в Абіссинії. Хоча націоналісти та монархісти можуть нам протистояти, селянські маси знають нашу програму земельної реформи та рівних прав для всіх істот. Вони — як океан сухої трави, готовий спалахнути."
 ABY_compromise_with_enemy: "Піти на компроміс"
 ABY_compromise_with_enemy_desc: "Спочатку цілі Патріотичного бунту були мені незрозумілі, але тепер я бачу, що це консервативна реакція проти нашої радикальної революції. Замість того, щоб розтрощити їх і мати справу з політичною нестабільністю, що виникне в результаті, я запропоную їм компроміс, щоб переконати скласти зброю і приєднатися до нас. Абіссинія пролила достатньо крові."
 
 ABY_referendussy: "Конституційний референдум [GetYear] року"
 ABY_referendussy_desc: "Щоб забезпечити тривалу політичну стабільність, з монархічними силами було досягнуто домовленості про проведення всенародного референдуму, який дозволить абіссинському народу вирішити, якій формі правління він віддає перевагу. Кожному громадянину буде дозволено голосувати незалежно від статків, статусу чи раси. Хоча провести голосування в зруйнованій війною країні буде складно, угода є угода."
 ABY_parliamentary_elections: "Провести парламентські вибори"
 ABY_parliamentary_elections_desc: "Термін повноважень перехідного уряду добігає кінця. Хоча коти можуть бути надто виснажені, щоб знову голосувати так скоро після референдуму, це абсолютно необхідно для формування демократичного законодавчого органу. Як і було домовлено, Патріотичний фронт візьме участь у виборах. Я щиро сподіваюся, що ці представники втілять волю абіссинського народу."
 ABY_sennacherib_fate: "Вирішити долю Сіннахеріба"
 ABY_sennacherib_fate_desc: "Хоча я уклала мир з деякими зі своїх колишніх ворогів, я ніколи не пробачу Сіннахерібу те, що він зробив. І я впевнена, що абіссинці також йому не пробачать звірства, які його війська вчинили проти котячого роду. Його покарання неминуче, але ще невідомо, як саме його покарають."
 ABY_reconstruction_again: "Відбудувати країну... Знову"
 ABY_reconstruction_again_desc: "Чорний ринок процвітає, абіссинська валюта обвалилася, а населення повернулося до бартерної економіки. Зайве говорити, що ми повинні почати все спочатку. Уряд майже банкрут, тому нам доведеться покладатися на облігації, позики та податки, щоб фінансувати не лише державні зусилля з відбудови, але й приватні будівельні компанії."
 ABY_a_new_currency: "Ввести нову валюту"
 ABY_a_new_currency_desc: "Я не дуже розуміюся на економіці, але не думаю, що одне куряче яйце має коштувати 10 квінтильйонів абіссинських муррів. Тому я поговорила з нещодавно заснованим Абіссинським національним банком про введення нової, трохи менш інфляційної валюти. Менш котяча назва теж була б доречною. Як щодо поєднання біта та мурра? Наприклад... бир?"
 ABY_voluntary_collectivization: "Добровільна колективізація"
 ABY_voluntary_collectivization_desc: "Перетворення всіх сільських земель на громадські після конфіскації їх у дворян, можливо, було не найкращою ідеєю. Дрібним власникам і селянам тепер буде дозволено зберегти свої землі. Ті, хто володіє занадто малим наділом для виживання, можуть використовувати громадські землі або приєднатися до сільськогосподарського кооперативу. Я впевнена, що комуністам та АПФ моя ідея сподобається!"
 ABY_power_sharing_agreement: "Угода про розподіл влади"
 ABY_power_sharing_agreement_desc: "Заради миру та єдності ми повинні навчитися співпрацювати з нашими колишніми ворогами. Як частину мирного договору, АПФ було обіцяно видатні політичні посади в новому уряді. Я маю намір дотриматися цієї обіцянки. Поки вони не є дворянами, будь-які кандидати від АПФ вітаються в коридорах влади."
 ABY_unnationalize_industry: "Усуспільнення, а не націоналізація"
 ABY_unnationalize_industry_desc: "Хоча критичні аспекти національної економіки повинні перебувати під прямим державним контролем, ми повинні повернути засоби виробництва в лапи та копита самих робітників. Хоча приватна власність не буде оголошена поза законом, як і було домовлено з АПФ, я буду заохочувати створення кооперативів та товариств взаємодопомоги."
 ABY_organize_provinces: "Реорганізувати провінції"
 ABY_organize_provinces_desc: "Абіссинія традиційно була поділена на численні провінції, якими керували місцеві дворяни. Ця система була дуже неефективною та децентралізованою, дозволяючи знаті керувати своїми володіннями здебільшого автономно. Це один із факторів, який дозволив їм використовувати рабство в таких величезних масштабах. Нова Абіссинія, яку я... яку ми створюємо, не повторить помилок минулого."
 ABY_denounce_stalliongrad: "Засудити сталліонградську модель соціалізму"
 ABY_denounce_stalliongrad_desc: "Навіть якщо Зимова революція стала глобально значущим тріумфом над старим порядком, вона не була тріумфом ні демократії, ні соціалізму. Однопартійна держава управлялася через демократичний централізм, який був не чим іншим, як абсолютною тиранією більшості. Та сама держава також впроваджувала соціалізм згори, а не знизу. Ми не повторимо їхніх помилок."
 ABY_intel_agency_focus: "Створити Революційну службу безпеки та розвідки"
 ABY_intel_agency_focus_desc: "І зрада Сіннахеріба, і патріотичне повстання стали майже повною несподіванкою. Я не люблю непередбачуваних сюрпризів, тому видам указ про створення військового підрозділу, який займатиметься внутрішньою безпекою. Вони стежитимуть за кожним, хто вступить у змову з метою звести нанівець досягнення революції."
 ABY_worker_unions: "Співпрацювати з Федерацією профспілок"
 ABY_worker_unions_desc: "Хоча профспілки існують у країні вже багато років, вони були досить невеликими та маргіналізованими. Після революції кількість їхніх членів стрімко зросла, і нещодавно вони сформували національний конгрес, ФП, для сприяння ширшій співпраці. У нас спільна мета — захист прав трудящих, тому вони наші природні союзники."
 ABY_the_caring_state: "Турботлива держава"
 ABY_the_caring_state_desc: "Мета уряду — захищати своїх громадян і дбати про їхні базові потреби. Принаймні, я так вважаю. Охорона здоров'я коштує дорого, але існування національної системи охорони здоров'я є життєво важливим для забезпечення добробуту кожної істоти в країні. Це одна з найкращих можливих інвестицій наших коштів."
 ABY_expand_bureaucracy: "Розширити бюрократію"
 ABY_expand_bureaucracy_desc: "Основою інституційного управління є державна адміністрація. Найняті та підвищені за принципом меритократії державні службовці є запобіжником проти дворянства, непотизму та відкупної системи податків. Хоча ця система за своєю суттю є недемократичною, належна політично нейтральна бюрократична система необхідна для підтримки сучасної держави загального добробуту. Звичайно, ми маємо бути обережними, щоб не розширити її надмірно..."
 ABY_enshrine_racial_equality: "Закріпити расову рівність у законі"
 ABY_enshrine_racial_equality_desc: "Закон нявгіст Мяуодори II, який забороняв рабство лише для абіссинських котів, запустив ланцюг подій, що призвели до нашої революції. Це розділення на котів та інших було коренем усіх страждань. Ніколи більше не буде дозволено ухвалювати такі закони на Абіссинському півострові. Уряд стане сліпим до рас."
 ABY_status_of_religion: "Статус релігії"
 ABY_status_of_religion_desc: "Попри те, що храми баастистів рідко втручалися в політику, абіссинська монархія завжди прагнула отримати легітимність від релігійних авторитетів. Я не думаю, що нашому революційному уряду потрібно робити те саме, хоча більш радикальні голоси вимагають, щоб ми виступили проти релігії і розглядали її як небезпечну, реакційну силу. Здається, настав час для чергових дебатів..."
 ABY_katren_question: "Кітренське питання"
 ABY_katren_question_desc: "Хоча наш новий уряд не визнає Кітренський договір, ми, на жаль, успадкували неприємну земельну суперечку від поваленої монархії. Грифони-сквотери залишаються в портовому місті Кітрен і, схоже, не збираються йти. Нам доведеться ввічливо попросити їх зробити це. Якщо вони все одно залишаться, що ж. Я б дійсно хотіла уникнути розв'язання конфлікту..."
 ABY_manedalusia_question: "Мейндалуське питання (Відповідь: Не турбувати)"
 ABY_manedalusia_question_desc: "О так, Мейндалусія. Спірна земля між Абіссинією та Мейргиптом. Місце, де я стала військовополоненою і рабинею. Приємні спогади. Я дійсно з нетерпінням чекаю можливості забруднити свої копита і розібратися з цією справою навколо Мейндалусії раз і назавжди. Дійсно."
 ABY_purrsia_question: "Муррсійське питання"
 ABY_purrsia_question_desc: "Абіссинська монархія настільки відчайдушно прагнула модернізації, що віддала цілий острів у заставу Вінґбардії, але не настільки, щоб повністю скасувати рабство... Зрештою, хоча юридично ми визнаємо острів окупованою територією, немає нічого поганого в тому, щоб запропонувати викупити його назад, аби уникнути конфлікту."
 ABY_klugetown_question: "Клуджтаунське питання"
 ABY_klugetown_question_desc: "Наскільки я розумію, єдина причина, чому Клуджтаун позначений на будь-якій карті як «країна», полягає в тому, що Мейргипет не хотів, щоб Абіссинія відновила свій контроль над цією територією з геополітичних міркувань. Що є безглуздо, оскільки містом роками керувало жорстоке злочинне угруповання. Гадаю, настав час вирішити і цю суперечку..."
 ABY_maregypt_question: "Мейргиптське питання"
 ABY_maregypt_question_desc: "Оскільки я мейргипетська кобила, побоювання щодо моєї упередженості стосовно моєї батьківщини є цілком обґрунтованими, навіть якщо я прожила в Абіссинії кілька десятиліть. Проте я зроблю все можливе, щоб діяти нейтрально. Хоча в ідеалі ми маємо уникати будь-якого конфлікту з ними, якщо вони матимуть ворожий уряд, може виникнути необхідність звільнити їх від нього. Навіть якщо це означатиме боротьбу проти моїх родичів..."
 ABY_donkey_question: "Віслюкове питання"
 ABY_donkey_question_desc: "Хоча повстання Сіннахеріба зіпсувало наші відносини з південними віслюками, їх ще можна врятувати. Якщо, звичайно, вони не зацікавлені в мирному співіснуванні з нами. У такому разі, боюся, у нас не залишиться іншого вибору, окрім як вирішити наші фундаментальні розбіжності на полі бою. На щастя, я звикла робити саме це."
 ABY_further_beyond: "Далі й більше"
 ABY_further_beyond_desc: "Хоча зараз ми убезпечили кордони країни, далеко за ними є багато держав, які можуть виявитися як ворожими, так і дружніми до нас. Ми повинні намагатися або налагодити з ними дипломатичні відносини, або звільнити їх від потенційного гноблення. До того ж, ветерани визвольної армії більш ніж прагнуть боротися за благородну справу в далеких землях, можливо, навіть за межами Зебрики."
 ABY_goodbye_and_thanks: "Не спаліть країну, поки мене не буде"
 ABY_goodbye_and_thanks_desc: "Що ж, думаю, країна зараз у хорошому стані. Її кордони в безпеці, суспільство модернізоване, а інститути створені для запобігання відродженню рабства. Принаймні, я думаю, що зробила все, що могла. Якщо вся моя робота буде зведена нанівець і Абіссинія знову зануриться в хаос... Я зможу сказати, що зробила все можливе, щоб цьому запобігти. Тепер я нарешті можу піти у відставку."
 
 ABY_launch_literacy_campaign: "[Root.GetAdjective] кампанія з ліквідації неписьменності"
 ABY_launch_literacy_campaign_desc: "Зі зміцненням нашої влади революція нарешті може почати приносити плоди. Уряд сформує спеціальні бригади з ліквідації неписьменності, що складатимуться з професійних педагогів-волонтерів, і розосередить їх по всій країні, від найбільших міст до найвіддаленіших гірських сіл. Працюючи разом, вони забезпечать, щоб кожна істота в країні навчилася читати."
 ABY_science_base: "Відкрити Політехнічний університет Діре-Пави"
 ABY_science_base_desc: "Діре-Пава була початковою штаб-квартирою Вільної Республіки. Щоб вшанувати важливість цього міста, там буде відкрито перший політехнічний навчальний заклад у країні. Я твердо вірю, що технологічний прогрес є життєво важливим для емансипації та визволення всіх істот. Тому я покладаю великі надії на інженерів, які закінчать цей заклад."
 ABY_research_slot: "Заснувати Академію наук"
 ABY_research_slot_desc: "Нова національна Академія наук покликана об'єднати найрозумніших і найталановитіших осіб нації, незалежно від їхньої раси. Вона стане повністю незалежною науковою установою, вільною від будь-якого втручання уряду. Нехай світло науки освітить для всіх нас краще майбутнє і назавжди прожене темряву феодалізму."
 
 ABY_revolutionary_guard: "Створити Революційну гвардію"
 ABY_revolutionary_guard_desc: "Щоб захистити нашу крихку революцію, яка вже майже зазнала краху, я сформую елітний військовий підрозділ, що складатиметься з ретельно відібраних солдатів. Він замінить Королівську гвардію і буде вірний лише самій революції. У його лавах буде багато ветеранів визвольних воєн, незалежно від їхньої раси. Вони стануть першою і останньою лінією оборони."
 ABY_race_mixing: "Багаторасова армія"
 ABY_race_mixing_desc: "Термін «абіссинець» зазвичай є синонімом «абіссинського кота». Але тут живе і багато інших рас. Тому Визвольна армія складається не лише з котячих. Багатьом колишнім рабам, які раніше воювали в армії, тепер буде дозволено організувати власні спеціальні підрозділи, щоб максимально ефективно використовувати свої унікальні расові здібності."
 ABY_patriotic_veterans: "Патріотичні ветерани"
 ABY_patriotic_veterans_desc: "Солдати Абіссинського патріотичного фронту виявилися здібними бійцями. Відповідно до Пантерських мирних угод, їх не роззброїли, а інтегрували в армію. Проте я вважаю, що було б корисно сформувати спеціалізований підрозділ, який складався б повністю з горців-ветеранів АПФ. Таким чином вони змогли б воювати найефективніше."
 ABY_military_motorization_2_i_really_need_to_make_more_shared_branches: "Більше ніяких їздових коней"
 ABY_military_motorization_2_i_really_need_to_make_more_shared_branches_desc: "Однією з найпринизливіших практик рабовласників було використання непарнокопитних рабів як їздових і в'ючних тварин. Однак завдяки сучасним технологіям замість них можна використовувати вантажівки, які можуть перевозити набагато важчі вантажі на значно більші відстані. Я вже замовила партію транспортних засобів для логістичного корпусу армії."
 ABY_military_r_and_d: "Військове фінансування науки"
 ABY_military_r_and_d_desc: "Дослідження коштують дорого, і інтелектуали завжди шукають ресурси, щоб їх оплатити. Недавня історія довела, що наука здатна значно змінити ведення війни. Тому для [Root.GetAdjective] армії життєво важливо підтримувати перспективні дослідницькі проєкти. Наш головний пріоритет — наздогнати більш передові армії світу, поки не стало надто пізно..."
 ABY_bosanska_artilerija: "Смерть на відстані"
 ABY_bosanska_artilerija_desc: "Під час Мейндалуської війни саме мейргипетська артилерія стримувала невпинні абіссинські штурми. І це було багато років тому. Відтоді артилерія лише вдосконалилася, ставши все більш точною і смертоносною. Я краще зітру ворожі позиції на порох артилерійським обстрілом, ніж пожертвую хоча б одним життям у кривавому штурмі."
 ABY_mag_weapons_3: "Магія для кожної істоти"
 ABY_mag_weapons_3_desc: "Сучасні технології дозволяють майже будь-кому бути таким же могутнім, як маг-єдиноріг. Усе, що потрібно — це магічні кристали та обладнання для спрямування їхньої сили. Абіссинські коти і віслюки, не маючи жодних помітних магічних здібностей, більше не вважатимуть себе неповноцінними або слабшими. Особливо в армії."
 ABY_tonki: "Сталева кавалерія"
 ABY_tonki_desc: "Штурм ворожої позиції — одне з найнебезпечніших завдань для солдата. Я знаю це з власного досвіду, і мої шрами це доводять. Але робити це, керуючи важкоброньованою машиною, набагато безпечніше та ефективніше. Ці так звані танки суттєво змінюють правила ведення війни. Вони можуть бути дорогими, але нам усе одно потрібно накласти на них свої копита і лапи."
 ABY_liberation_army_marches_on: "Визвольна армія йде вперед"
 ABY_liberation_army_marches_on_desc: "Справа визволення — священна, вона мотивує наших солдатів терпіти надзвичайні труднощі та втрати. Ми пройдемо через гори, через пустелі, через річки і будемо йти далі, щоб поширювати світло свободи на своєму шляху, зупинившись лише тоді, коли вічна свобода переможе!"
 ABY_aeroforce: "Створити [ROOT.GetAdjective]і військово-повітряні сили"
 ABY_aeroforce_desc: "Як пегас, я іноді сприймала здатність літати як належне. Але завдяки сучасним технологіям тепер будь-яка раса може отримати можливість ширяти в небі. Хоча для декого це є здійсненням мрій, неминуче, що наші вороги завдаватимуть нам ударів з небес, як це робив Король Штормів. Тому наші збройні сили мають бути готовими."
 ABY_pegasus_doctrine: "Пегаська доктрина"
 ABY_pegasus_doctrine_desc: "Як пегас, я пройшла підготовку в мейргипетській армії, щоб використовувати свою здатність літати. Пегаси літають близько до землі, щоб уникнути ураження і підтримати інших солдатів, які не вміють літати. Такий самий метод ведення бою повинні використовувати і наші новостворені військово-повітряні сили, оскільки я сумніваюся, що ми зможемо створити настільки великі і сильні ВПС, що вони зможуть воювати самостійно."
 ABY_strike_from_above: "Удар згори"
 ABY_strike_from_above_desc: "Завдяки сучасним транспортним літакам пегаси можуть безпечно масово переміщатися в тил ворожих позицій і десантуватися на них з великої висоти. Інші раси без крил також можуть скористатися цією тактикою, використовуючи планери та парашути для приземлення. Наші вороги навіть не зрозуміють, що їх вразило."
 ABY_rockets: "Запровадити ракетні технології"
 ABY_rockets_desc: "Останніми роками вчені за кордоном досягли великих успіхів у розробці ракетних технологій. Хоча пілотування літака є складним і небезпечним завданням, ці «літаючі торпеди» можна безпечно запускати по цілях з великої відстані. Хоча їхня точність ще потребує значного вдосконалення, я вважаю, що додавання цієї зброї до нашого арсеналу врятує життя багатьом пілотам."
 ABY_boatforce: "Створити [ROOT.GetAdjective] військово-морські сили"
 ABY_boatforce_desc: "Хоча дехто на флоті співчував нашій революційній справі, вони не були формально організовані як військово-морський флот. Коли революція нарешті перемогла, ми можемо належним чином інтегрувати колишній абіссинський флот до складу наших збройних сил. Їхнім обов'язком буде захист нашого узбережжя від усіх, хто хотів би нас поневолити."
 ABY_convert_convoys_3_dont_ask_why_i_dont_use_shared_focuses: "Переобладнати цивільні судна"
 ABY_convert_convoys_3_dont_ask_why_i_dont_use_shared_focuses_desc: "Сильний флот не може бути створений з нічого. Не маючи промислових потужностей для масового будівництва кораблів, було б ефективніше купувати наявні судна у торговців і переобладнувати їх для військових потреб. Таким чином ми зможемо швидше розширити наші військово-морські сили до їхнього попереднього розміру."
 ABY_marine_corps: "Сформувати морську піхоту"
 ABY_marine_corps_desc: "Абіссинія ніколи не мала спеціалізованої морської піхоти, незважаючи на те, що історично володіла кількома островами і покладалася на заморські торгові шляхи. Я не буду повторювати помилок монархів Нявконнинів. Буде створено окремий рід військ зі спеціалізованих морських піхотинців, які отримають усю необхідну підготовку та спорядження."
 ABY_defend_our_shores: "Захистити наші береги"
 ABY_defend_our_shores_desc: "Абіссинський півострів має довгу берегову лінію, вразливу для ворожих десантів. Наш флот має переконатися, що ворожі кораблі ніколи навіть не підійдуть достатньо близько до берега, щоб висадитися. Але водночас можливо, що їм доведеться зіткнутися з сильнішим і численнішим флотом. Тому ми повинні розвивати нашу тактику і тренувати особовий склад військово-морських сил."
 
 ABY_farms_for_herbivores: "Їжа для травоїдних"
 ABY_farms_for_herbivores_desc: "Оскільки абіссинські коти є м'ясоїдними, сільське господарство традиційно використовувалося для вирощування товарних культур або корму для худоби. Після того, як були завезені сотні тисяч травоїдних рабів, рабовласники вирішили, що найдешевше буде годувати їх вищезгаданим кормом. Тепер, у нашій новій Абіссинії, на фермах вирощуватимуть належні продовольчі культури та овочі, щоб усі раси були добре нагодовані."
 ABY_mechanized_mining: "Механізований видобуток"
 ABY_mechanized_mining_desc: "Протягом століття раби широко використовувалися на абіссинських шахтах, змушені виконувати небезпечну ручну працю з видобутку цінних мінералів. Хоча колишні раби тепер володіють шахтами, на яких працюють, їхнє життя можна зробити набагато легшим і продуктивнішим, якщо ми субсидуватимемо придбання передової гірничодобувної техніки."
 ABY_country_roads_take_me_home: "Сільські дороги"
 ABY_country_roads_take_me_home_desc: "Я бачила на власні очі жалюгідний стан [Root.GetAdjective]ої сільської місцевості. Першим кроком до відродження збіднілих сіл у горах і пустелях є з'єднання їх шляхом розширення нашої дорожньої мережі. Це не лише стимулюватиме торгівлю та подорожі, але й дозволить полегшити пересування та постачання наших військових."
 ABY_new_cooperatives: "Нові промислові кооперативи"
 ABY_new_cooperatives_desc: "Відколи запанував мир і політична стабільність, [Root.GetAdjective] економіка розвивається. Деякі з нещодавно створених робітничих кооперативів виявилися успішними і заповнюють прогалини на ринку вітчизняними товарами. Уряд повинен безпосередньо підтримувати їх і співпрацювати з ними, щоб забезпечити їхній подальший успіх."
 ABY_magical_bullshit: "Зачарована промисловість"
 ABY_magical_bullshit_desc: "На Абіссинському півострові зараз проживає багато рас, які мають вроджені магічні здібності. Їх можна поєднати з технологічними можливостями для досягнення виняткових результатів. Це все хитромудра урядова мова для «поні, коні та зебри допоможуть нам виробляти більше речей»."
 ABY_civ_ind: "Промислова зона Пантера – Діре-Пава"
 ABY_civ_ind_desc: "Найбільша концентрація міського населення в Абіссинії знаходиться в містах Пантера та Діре-Пава, розташованих поруч одне з одним і розділених річкою Пантера. З усіма працівниками та інфраструктурою, які вже є на місці, це ідеальне місце для великого індустріального парку. Уряд закладе основу і надасть пільги будь-якій компанії або кооперативу, які візьмуть участь."
 ABY_mil_ind: "Підтримка вітчизняної військової промисловості"
 ABY_mil_ind_desc: "За всі свої роки боїв я дізналася, що солдату завжди не вистачає всього, і припасів ніколи не буває забагато. Як партизанці, мені доводилося покладатися на «позичання» у моїх ворогів, але тепер я маю розкіш великомасштабного промислового виробництва. Кожен, хто захоче створити підприємство з виробництва озброєння та військового спорядження, отримає підтримку уряду."
 ABY_rail_network: "Розширення залізничної мережі"
 ABY_rail_network_desc: "Один простий факт жахає рабовласників: один потяг з десятком вантажних вагонів може перевезти більше, ніж тисяча поневолених непарнокопитних. З огляду на цей факт, уряд повинен побудувати залізниці до кожного куточка країни, щоб полегшити транспортування товарів. Це не лише стимулюватиме економіку, але й допоможе підтримувати військову логістику."
 ABY_new_technologies: "Освоєння нових технологій"
 ABY_new_technologies_desc: "Технологія — це справжній визволитель істот. Це трактор, який звільняє фермера-раба, і це бур, який звільняє шахтаря-раба. Тому, щоб зберегти нашу націю вільною, країна повинна прагнути переймати будь-які нові інновації з-за кордону і поширювати їх у суспільстві, роблячи їх доступними та недорогими."
 ABY_dockyard_crap: "Інвестиції в судноплавство"
 ABY_dockyard_crap_desc: "Оточена пустелями та горами, Абіссинія завжди покладалася на море для свого існування. Принаймні, так мені говорили. Як би там не було, правда полягає в тому, що і заморські торгові шляхи, і берегова оборона важливі для цієї нації, і обидва вимагають великої кількості кораблів для перевезення вантажів та гармат. Тому уряд повинен інвестувати в наші суднобудівні потужності."
 ABY_miracle_on_panther_river: "Диво на річці Пантера"
 ABY_miracle_on_panther_river_desc: "Руйнівні наслідки внутрішнього конфлікту залишили глибокі шрами на тілі [Root.GetNameDef], які, можливо, ніколи не загояться, але ми вийшли за межі відновлення до стрімкого зростання та зростаючого процвітання. Завдяки нашій системі змішаної економіки, прибутки розподіляються рівномірно між усіма верствами суспільства, а не концентруються в руках кількох осіб."
 
 ### Decisions

 ABY_guide_to_names: "Посібник з абіссинських імен"
 ABY_guide_to_names_desc: "Простий посібник, що пояснює традиційні абіссинські звичаї іменування."
 
 ABY_mental_stability_category: "Крихкий розум"
 ABY_mental_stability_category_desc:0 "Після того, як Король Шторм вторгся до Абіссинії, а Вінґбардія зрадила нас, захопивши Кітрен, розум [ROOT.ABY_king_loc_cap] Ґомеза став досить нестабільним. Він схильний до нападів депресії. Якщо його психічне здоров'я не лікувати, він може спробувати зробити щось нерозумне.\n\nПоточна §Yпсихічна стабільність§! [ROOT.ABY_king_loc_cap] Ґомеза: £sanity_texticon  [?ABY_gomez_mental_stability]/100\nЗмінюється на [?modifier@ABY_mental_stability_drift|+2] щотижня."
 ABY_acquire_pets: "Завести домашніх улюбленців"
 ABY_acquire_pets_desc: "Домашні улюбленці не лише покращують настрій власника, але й дають йому мету в житті. Хоча утримання домашньої тварини — це багато роботи, це може допомогти вам."
 ABY_revisit_felibela_1: "Знову відвідати Фелібелу"
 ABY_revisit_felibela_1_desc: "Минув деякий час відтоді, як ви востаннє їздили у відпустку до Фелібели. Оскільки це, здавалося, помітно покращило ваш психічний стан, я рекомендую зробити це знову. Ваша [ROOT.ABY_queen_loc_cap] зможе прийняти деякі рішення від вашого імені, поки вас не буде."
 ABY_revisit_felibela_2: "Відвідати Фелібелу ще раз"
 ABY_revisit_felibela_2_desc: "Ваш попередній візит до Фелібели, здається, мав ще більший позитивний вплив на ваше психічне здоров'я. Тому вам варто подумати про те, щоб їздити туди щоразу, коли ви відчуваєте в цьому потребу."
 ABY_go_to_therapy: "Найняти еквестрійських терапевтів та нейромантів"
 ABY_go_to_therapy_desc: "Медицина, безумовно, найбільш розвинена в Еквестрії. Тепер, коли сховища певною мірою поповнилися, ви можете дозволити собі найняти звідти професійних експертів, які допоможуть з вашим психічним станом."
 ABY_go_to_therapy_2: "Відвідати абіссинських психотерапевтів"
 ABY_go_to_therapy_2_desc: "З абіссинською системою охорони здоров'я, яка нарешті відповідає сучасним стандартам, місцеві лікарі можуть надати вам ефективну допомогу при ваших психологічних недугах."
 ABY_guide_to_baastism: "Посібник із баастизму"
 ABY_guide_to_baastism_desc: "Віра абіссинців важлива, і тому було б розумно переконатися, що ви добре її знаєте."
 ABY_go_outside: "Спілкуватися з народом"
 ABY_go_outside_desc: "Вихід із [Root.ABY_royal_loc_nocap]ого палацу та прогулянка вулицями дозволить вам зустрітися зі своїми підданими, що зробить вас більш приземленим і чуйним. Що ще важливіше, ви можете зрештою потоваришувати з одним із них, що, ймовірно, допоможе вам морально."
 ABY_meditative_retreat: "Відправитися на медитативний ретрит"
 ABY_meditative_retreat_desc: "Хоча ви, здається, не бажаєте знову відвідувати Фелібелу, є безліч інших місць, куди ви могли б поїхати «у відпустку» і провести деякий час, щоб відновитися від душевних тягарів."
 ABY_get_a_hobby: "Знайти хобі"
 ABY_get_a_hobby_desc: "Відволікання допомагають у житті, особливо якщо ваші обов'язки стають непереборними. Ваша дружина запропонувала вам знайти якесь корисне заняття, наприклад, хобі, щоб зробити життя приємнішим."
 ABY_stop_using_drugs: "Припинити вживати катніп"
 ABY_stop_using_drugs_desc: "Ви використовували катніп, щоб впоратися зі своїми почуттями. Але тепер, коли вам, здається, стало краще, чи дійсно вам все ще потрібно так багато жувати це листя? Принаймні, використовуйте їх у помірних кількостях, як це роблять інші коти. Я рекомендую вам позбутися тієї схованки з мішечком, який ви ховаєте під ліжком. Вам дуже пощастило, що він не викликає сильного звикання, тому у вас не повинно бути жодних симптомів абстиненції."
 ABY_stop_using_hard_drugs: "Припинити вживати опіум"
 ABY_stop_using_hard_drugs_desc: "Я не знаю, чому ви вважали, що стати опіумним наркоманом — це гарна ідея. Відмова від вживання опіуму вимагатиме багато часу і зусиль, оскільки вам доведеться боротися з симптомами абстиненції. Бажаю успіху."
 ABY_remake_the_crown: "Відновити корону"
 ABY_remake_the_crown_desc:0 "Після втрати вашої корони Королю Шторму, ви так і не наказали її відновити. Я припускаю, що ви пов'язуєте погані спогади з коронами. Однак це важливий символ статусу, і її відновлення змусить котів перестати називати вас «Королем без корони». Я впевнений, що це покращить ваш настрій."
 ABY_have_sex: "Народити спадкоємця"
 ABY_have_sex_desc: "Попри те, що ви одружені багато років, ви все ще не народили спадкоємця престолу. Якби ви раптом померли, виникла б криза престолонаслідування між членами дому Нявконнинів або узурпація домом Кітве. Народження дитини забезпечило б майбутнє Абіссинії."
 ABY_touch_grass: "Торкніться трави"
 ABY_touch_grass_desc: "Вам дійсно варто припинити грати в Hearts of Iron IV і вийти на вулицю."
 
 ABY_noble_decision_category: "Месафінт"
 ABY_noble_decision_category_desc: "Месафінти — це спадкові дворяни Абіссинії, які домінують у провінційних регіонах за межами столиці. Навіть після реставрації Нявконнинів вони зберігають багато привілеїв, які роблять їх дуже впливовими.\n\nЦахіфе Лам Тардар з Амхашери: [Root.ABY_tardar_loyalty_loc]\nРас Терстон з Тиграю: [Root.ABY_thurston_loyalty_loc]\nРас Дюшес з Кицькицю: [Root.ABY_Duchess_loyalty_loc]\nФітаурарі Гумберт з Діметі: [Root.ABY_humbert_loyalty_loc]\nМесфіна Марті з Лапрітреї: [Root.ABY_nyanyanyanyanyanyanya_loyalty_loc]\nФітаурарі Салем з Катума: [Root.ABY_salem_loyalty_loc]\nБітводед Люцифер з Муррк'еле: [Root.ABY_lucifer_loyalty_loc]\nДеджазмач Тімоті з Мяучав: [Root.ABY_timothy_loyalty_loc]\nМерід Азмач Чешир з Оронявії: [Root.ABY_cheshire_loyalty_loc]\nДеджазмач Кіт у капелюсі з Которае: [Root.ABY_hat_cat_loyalty_loc]\nШум Сильвестр з Нявака: [Root.ABY_sylvester_loyalty_loc]\nДжантірар Ґамбол з Нявтекеля: [Root.ABY_gumball_loyalty_loc]\nШум Том з Джіраті: [Root.ABY_tom_loyalty_loc]\nРас Оутміл з Муррсії: [Root.ABY_oatmeal_loyalty_loc]\nБітводед Смадж з Медафі: [Root.ABY_smudge_loyalty_loc]\nБаша Бінгус з Мейндалусії: [Root.ABY_bingus_loyalty_loc]\n\nКількість нелояльних дворян: [?ABY_num_of_disloyal]\nКількість лояльних дворян: [?ABY_num_of_loyal]\nЯкщо дворянин стає нелояльним, його території стануть менш продуктивними.\n\n§RПОПЕРЕДЖЕННЯ:§! якщо більшість дворян стануть нелояльними, вони можуть обрати нового правителя або спричинити інші неприємності."
 ABY_guide_to_noble_titles: "Посібник із дворянських титулів"
 ABY_guide_to_noble_titles_desc: "Абіссинське дворянство має багато різних титулів з різним значенням. Ніколи не завадить освіжити свою пам'ять щодо них."
 ABY_guide_to_nobles: "Опис провідних аристокотів"
 ABY_guide_to_nobles_desc: "Хоча в Абіссинії тисячі дворян, важливо ознайомитися з наймогутнішими та найвпливовішими, щоб краще зрозуміти їхні мотиви та поведінку."
 ABY_hide_all_the_crap: "Сховати рішення на карті"
 ABY_hide_all_the_crap_desc: ""
 ABY_unhide_all_the_crap: "Показати рішення на карті"
 ABY_unhide_all_the_crap_desc: ""
 ABY_pardon_ras_tardar: "Помилувати Тардар"
 ABY_pardon_ras_tardar_desc: "Цахіфе Лам Тардар вступила у змову з Кітріною, щоб незаконно скинути законний уряд Абіссинії, тому після невдалого перевороту її звинуватили у державній зраді і ув'язнили на невизначений термін. Однак, надання їй [Root.ABY_royal_loc_nocap]ого помилування, безсумнівно, зробило б її лояльною до справи Нявконнинів."
 ABY_nobles_elect_catrina: "Дворяни обирають Кітріну"
 ABY_nobles_elect_catrina_desc: "Рада дворянства має давній привілей мати можливість замінити поточного правителя Абіссинії, якщо більшість з них погодиться на це."
 ABY_nobles_elect_clawomons: "Дворяни переобирають Нявконнинів"
 ABY_nobles_elect_clawomons_desc: "Рада дворянства має давній привілей мати можливість замінити поточного правителя Абіссинії, якщо більшість з них погодиться на це."
 ABY_filibustering: "Затягування"
 ABY_filibustering_desc: "Щоразу, коли збиратиметься рада дворянства, [Root.GetLeader] буде виголошувати промову, яка триватиме весь день. Оскільки дворянам не дозволяється перебивати правлячого монарха, це абсолютно законно. Неодноразове повторення цього повинно втомити дворян і значно відтермінувати процес виборів, але це вимагатиме багато зусиль."
 ABY_develop_state: "Розвивати провінцію [From.GetName]"
 ABY_develop_state_desc: "Інвестиції в місцеву економіку — це один із способів покращити економіку країни в цілому."
 ABY_reinforce_garrison: "Посилити гарнізон у провінції [From.GetName]"
 ABY_reinforce_garrison_desc: "Відправка солдатів для захисту провінцій — це один із способів підвищити обороноздатність нації."
 ABY_threaten_noble: "Погрожувати нелояльному дворянину в провінції [From.GetName]"
 ABY_threaten_noble_desc: "Відмовляючись виконувати свої зобов'язання як вашого підданого, місцевий дворянин повинен пам'ятати, що його можуть звинуватити у державній зраді, якщо він не схаменеться."
 ABY_crush_rebellion: "Придушити повсталого дворянина в провінції [From.GetName]"
 ABY_crush_rebellion_desc: "Повстання проти [Root.ABY_royal_loc_nocap]ої влади є незаконним. Повстанці будуть розглядатися як жорстокі злочинці. Тому вони повинні бути притягнуті до відповідальності силою."
 ABY_marriage_noble: "Організувати шлюб з дворянином у провінції [From.GetName]"
 ABY_marriage_noble_desc: "Є неодружена жінка-член династії Нявконнинів, ваша невістка. Ми могли б запропонувати одному з неодружених дворян-чоловіків одружитися з нею, що прив'язало б їх до нашої родини і забезпечило їхню лояльність."
 ABY_negotiate_with_noble: "Вести переговори з дворянином у провінції [From.GetName]"
 ABY_negotiate_with_noble_desc: "Вірте чи ні, але дворяни здатні дослухатися до голосу розуму. Особистий візит для вирішення розбіжностей — це хороший спосіб повернути лояльність дворянина."
 ABY_invite_noble_to_palace: "Запросити дворянина в провінції [From.GetName] до палацу"
 ABY_invite_noble_to_palace_desc: "Дворяни діють як провінційні лорди, керуючи землями, віддаленими від столиці. Через це їх важко тримати під контролем. Щоб вирішити цю проблему, ми могли б запросити їх пожити в [Root.ABY_royal_loc_nocap]ому палаці за наш рахунок і насолоджуватися багатьма розкошами двору. Таким чином ми зможемо одночасно контролювати їх і гарантувати, що лояльні до корони чиновники будуть управляти їхніми землями від їхнього імені."
 ABY_support_purrsian_resistance: "Підтримати Муррсійський опір"
 ABY_support_purrsian_resistance_desc: "Рас Муррсії попросив нашої підтримки у вигнанні іноземного гарнізону з острова."
 ABY_bribe_noble: "Підкупити нелояльного дворянина в провінції [From.GetName]"
 ABY_bribe_noble_desc: "Є одна річ, яку люблять усі аристокоти: багатство. З нещодавнім припливом коштів легко дозволити собі кілька особливих подарунків для найпривілейованіших котячих у країні."
 
 ABY_slave_decision_category: "Управління рабами"
 ABY_slave_decision_category_desc: ""
 ABY_pacify_slaves: "Втихомирити рабів у провінції [FROM.GetName]"
 ABY_pacify_slaves_desc: "Ми відправимо членів Королівської гвардії, а також солдатів із навколишніх регіонів, щоб відновити порядок у провінції [FROM.GetName] і затримати бунтівних рабів."
 
 ABY_neutral_harmony_category: "Ідеологічне спрямування"
 ABY_neutral_harmony_category_desc: ""
 ABY_promote_neutrality: "Посилити [Root.ABY_royal_loc_cap]у владу"
 ABY_promote_neutrality_desc: "Абіссинією правили її монархи понад тисячу років. Чому щось має змінюватися?"
 ABY_promote_harmony: "Передача повноважень"
 ABY_promote_harmony_desc: "Піддані королівства заслуговують на більше право голосу в державних справах. Це лише справедливо."
 ABY_rule_by_decree: "Правління за допомогою декретів"
 ABY_rule_by_decree_desc: "Слово [ROOT.ABY_king_loc_cap]а — це закон."
 ABY_call_to_arms: "Заклик до зброї"
 ABY_call_to_arms_desc: "Доброзичливість [ROOT.ABY_king_loc_cap]а зробила його підданих лояльними і готовими пожертвувати своїм життям заради вищого блага нації."
 ABY_delegate_responsibilities: "Делегувати обов'язки"
 ABY_delegate_responsibilities_desc: "[ROOT.ABY_king_loc_cap] не може бути скрізь одночасно. І навіть якби міг, він цього не хоче. Тому його обов'язки слід довірити обраним посадовцям, яким довіряє народ."
 ABY_patriotic_speech: "Виголосити патріотичну промову"
 ABY_patriotic_speech_desc: "«Вмерти за свою країну — це шляхетна справа; насправді, я й сам планував це зробити.»"
 ABY_donate_to_poor: "Пожертвувати бідним"
 ABY_donate_to_poor_desc: "Жерці кажуть, що ділитися своїм тяжко заробленим багатством з менш успішними — це чеснота. Чи це також правда, якщо твоє багатство походить від податків, позик і монетних дворів?"
 
 ABY_manedalusia_category: "Справи Мейндалусії"
 ABY_manedalusia_category_desc: "Мейндалусія спочатку опинилася під контролем Абіссинії у 12 р. п.л., коли нявгіст Повкуно законно відвоювала ці землі у мейргиптян. Вона залишалася у складі Абіссинії протягом століть, поки вторгнення Сідлової Арабії не призвело до створення автономної підконтрольної Мейндалуської держави у 672 р. п.л. Вона зберігала вірність Сідловій Арабії до самого кінця у 988 р. п.л., коли була розділена між новоствореними незалежними королівствами Абіссинія та Мейргипет. Тепер обидві держави претендують на Мейндалусію, тоді як самі мейндалуські поні не хочуть нічого іншого, окрім як знову повернути свою власну країну."
 ABY_al_manedalus_awaken: "Аль-Мейндалус пробуджується"
 ABY_al_manedalus_awaken_desc: "Заворушення в Мейндалусії досягли критичної точки. Якщо нічого не зробити найближчим часом, місцевому гарнізону не залишиться нічого іншого, як відступити, поступившись контролем над регіоном хтозна-кому."
 ABY_MDL_war_timer: "Мейндалуська патова ситуація"
 ABY_MDL_war_timer_desc: "Війна з Мейндалусією мала бути швидкою і легкою справою. Але тепер вона затягнулася на рік. Те, що колись замислювалося як втихомирення бунтівного натовпу, тепер перетворилося на ганьбу для наших військових. Усі втомилися від війни і вимагають її завершення. Настав час сісти за стіл переговорів."
 ABY_MDL_make_peace: "Запропонувати мир Мейндалусії"
 ABY_MDL_make_peace_desc: "Ця війна пішла не зовсім на нашу користь. Ситуація обернулася проти нас, і ми повинні переглянути, чи вартий конфлікт із Мейндалусією подальших зусиль. У нашій нинішній ситуації було б найкраще проявити скромність і запропонувати мейндалусцям переговори."
 
 ABY_mercenaries_category: "Солдати удачі"
 ABY_mercenaries_category_desc: "Там, де платять добре\nА ризик високий\nУсе зрозуміло\nМи виконаємо або помремо\nШокер у пазурах\nТам, де закон — це зброя\nВід Овінґоленду\nДо Макавії\nСила, м'язи та робота в джунглях"
 ABY_charger_mercs: "Найняти найманців-зебр"
 ABY_charger_mercs_desc: ""
 ABY_pegasus_mercs: "Найняти найманців-пегасів"
 ABY_pegasus_mercs_desc: ""
 ABY_knight_mercs: "Найняти найманців-грифонів"
 ABY_knight_mercs_desc: ""
 ABY_dragon_mercs: "Найняти найманців-драконів"
 ABY_dragon_mercs_desc: ""
 
 ABY_abyssinian_empire_category: "Абіссинська імперія"
 ABY_abyssinian_empire_category_desc: "Чому Абіссинія має залишатися простим королівством, непомітною виноскою на сторінках історії? Можна досягти значно більшого..."
 ABY_form_empire: "Проголосити Абіссинську імперію"
 ABY_form_empire_desc: "Абіссинія тепер — це королівство багатьох королівств. Чому ви маєте поводитися як звичайний нявгус серед нявгусів? Ви вищі за них, ви довели свою вищість. Настав час стати чимось більшим."
 ABY_annex_puppet: "Анексувати [From.GetNameDefCap]"
 ABY_annex_puppet_desc: "Дотепер ми дозволяли [From.GetNameDef] зберігати значну частину власного уряду, але тепер це зміниться."
 ABY_establish_gov: "Заснувати губернаторство [From.GetNameDefCap]"
 ABY_establish_gov_desc: "Замість того, щоб давати [From.GetNameDef] будь-які ілюзії автономії, ви можете призначити регіонального губернатора, щоб правити ними безпосередньо."
 ABY_guarantee_league: "Підтримати [EMR.GetNameDefCap]"
 ABY_guarantee_league_desc: "[EMR.GetNameDefCap], колишня частина Сідлової Арабії, є корисною буферною державою, яка не дає аравійським коням возз'єднати свою націю і знову стати потенційною загрозою нашому суверенітету. Щоб уникнути повторення історії, нам слід розглянути можливість надання Лізі гарантій безпеки та офіційного визнання її незалежності."
 ABY_guarantee_lakes: "Підтримати [From.GetNameDefCap]"
 ABY_guarantee_lakes_desc: "Існування [From.GetNameDef] як незалежної нації убезпечує нас від єті, якщо вони колись спробують повторити божевільні завоювання Короля Шторма. Тому ми повинні прагнути захистити цю буферну державу і гарантувати її подальшу незалежність."
 
 ABY_witchweed_cat: "Зілля з відьмтраву"
 ABY_witchweed_cat_desc: "Божественний нектар, брама і ключ до справжнього потенціалу котячого роду...\n\nЗараз на §8Машині§! працює близько [?ABY_catrina_slaves] рабів (з максимальної місткості [?ABY_catrina_slaves_cap] рабів), яка працює з ефективністю [?ABY_machine_efficiency|%0], що призводить до щотижневого виробництва [?ABY_slaves_multiplied_by_efficiency] доз §Gзілля з відьмтраву§!.\n\n[?ABY_potion_doses_ready] доз зілля підготовлено та надійно збережено для подальшого використання."
 ABY_purchase_1_slaves: "Придбати 100 рабів"
 ABY_purchase_1_slaves_desc: "Залучення рабів до роботи на §8Машині§! — непросте завдання. Вони потребують ґрунтовного навчання, щоб керувати нею, їх потрібно перевіряти та відбирати, щоб гарантувати їхню здатність працювати, і весь процес має відбуватися в таємниці."
 ABY_purchase_1k_slaves: "Придбати 1000 рабів"
 ABY_purchase_1k_slaves_desc: "Залучення рабів до роботи на §8Машині§! — непросте завдання. Вони потребують ґрунтовного навчання, щоб керувати нею, їх потрібно перевіряти та відбирати, щоб гарантувати їхню здатність працювати, і весь процес має відбуватися в таємниці. Виконання цього в більших масштабах є трохи ефективнішим, але вимагає більше зусиль і ресурсів."
 ABY_velkom_to_te_hytraulik_pres_tsanel: "Покращення §8Машини§!: Гідравлічні преси та подрібнювачі"
 ABY_velkom_to_te_hytraulik_pres_tsanel_desc: "Нещодавнє впровадження гідравлічного обладнання в Абіссинії дає можливість зробити §8Машину§! ефективнішою. З додаванням гідравлічних пресів та подрібнювачів обробка відьмтраву потребуватиме менше ручної праці."
 ABY_pneumautism: "Покращення §8Машини§!: Пневматика"
 ABY_pneumautism_desc: "Стиснене повітря можна використовувати для численних цілей, таких як проштовхування матеріалу по трубах, його змішування у пневматичних змішувачах або для точних інструментів з пневматичним приводом. Усі ці інноваційні застосування можуть підвищити ефективність §8Машини§!."
 ABY_praise_omnissiah: "Покращення §8Машини§!: Сервомеханізми"
 ABY_praise_omnissiah_desc: "Сервосистеми можуть використовуватися для керування механічними системами з більшим контролем і точністю, зменшуючи рівень помилок і гарантуючи, що рухи машин відбуваються за заданими траєкторіями."
 ABY_better_logistics: "Покращення §8Машини§!: Покращена логістика"
 ABY_better_logistics_desc: "Логістика життєво важлива для будь-якого виробничого процесу. Відьмтраву, контейнери та запчастини потрібно доставляти на виробничий об'єкт, а готову продукцію — на склади. Досі використовувалася ручна праця, але механізоване транспортування зробить цей процес набагато швидшим і ефективнішим."
 ABY_weed_farm: "Механізоване вирощування відьмтраву"
 ABY_weed_farm_desc: "Зараз відьмтрав вирощується на кількох приватних фермах, що належать мені. Раби вирощують і збирають її традиційним способом, що є досить неефективним. З появою індустріалізованого сільського господарства в Абіссинії можна придбати сільськогосподарську техніку для оптимізації процесу."
 ABY_crystal_energy: "Покращення §8Машини§!: Кристальні генератори"
 ABY_crystal_energy_desc: "Замість використання деревини або вугілля, як раніше, мої інженери запропонували нове джерело енергії: магічні кристали. Нові технології дозволяють ефективно видобувати енергію, що зберігається всередині них. Це означатиме виділення майже всього видобутку кристалів у провінції Джіраті для живлення машини, оскільки кристали будуть поступово виснажуватися і потребуватимуть заміни."
 ABY_expand_machine: "Розширити §8Машину§!"
 ABY_expand_machine_desc: "Моя Машина — це величезна і розгалужена конструкція, розкидана в печерах під моїм маєтком. Проте вона може бути недостатньо великою, щоб задовольнити всі мої потреби. Тому котячі інженери та раби будуть залучені до роботи над створенням подальших розширень і прибудов до машини, що дозволить збільшити її місткість для робітників."
 ABY_constant_production: "Покращення §8Машини§!: Безперервне виробництво"
 ABY_constant_production_desc: "Замість того, щоб робітники працювали в одну зміну, я міг би організувати денну і нічну зміни і розділити рабів порівну на дві групи. Таким чином, виробництво буде безперервним, відбуваючись і вдень, і вночі."
 ABY_robotics: "Покращення §8Машини§!: Базова робототехніка"
 ABY_robotics_desc: "Завдяки передовим технологіям усе більше завдань, що виконуються рабами, можуть натомість виконувати машини. Обладнанню не потрібна їжа чи сон, і воно не втомлюється. Можливо, з часом усіх рабів можна буде замінити... але цей день ще далеко в майбутньому."
 ABY_reorganized_slaves: "Покращення §8Машини§!: Реорганізація робітників"
 ABY_reorganized_slaves_desc: "Деякі раби мають лідерський потенціал і довели свою покірність... їх можна поставити на чолі бригад рабів-робітників і запропонувати їм свободу, якщо вони добре працюватимуть і виконуватимуть виробничі цілі. Хоча те, що раби керують рабами, має свої ризики, це також має суттєво підвищити ефективність виробництва."
 ABY_distribute_potions_to_army: "Розподілити зілля з відьмтраву у військах"
 ABY_distribute_potions_to_army_desc: "Маючи достатньо доз, кожен солдат може стати напівбогом. Звичайно, зілля, що роздається іншим, трохи розбавлене, щоб не дати їм перевершити мене. Але вони все одно повинні бути достатньо сильними, щоб стати грізними воїнами, живими легендами з силою левів і хитрістю ягуарів."
 ABY_distribute_potions_to_workers: "Розподілити зілля з відьмтраву серед робітників"
 ABY_distribute_potions_to_workers_desc: "Котячі робітники могли б отримати велику користь від зілля з відьмтраву. Вони могли б виконувати свою роботу набагато швидше і з меншими зусиллями. Однак їхні дози повинні бути ще більш розбавленими, ніж ті, що дають солдатам, щоб вони не почали думати, що вони тут головні. І, звичайно, раби-робітники не зможуть відчути на собі жодних ефектів від зілля, оскільки вони не є котами."
 ABY_take_potion: "Вжити дозу зілля з відьмтраву"
 ABY_take_potion_desc: "Мені не чужа ця дивовижна речовина. Насправді я використовую її, коли мені потрібно, щоб підсилити свої здібності неприборканою силою котячої магії. Поточна ситуація може змусити мене зробити це."
 
 ABY_crush_resistance: "Протидіяти опору Нявконнинів"
 ABY_crush_resistance_desc: "Ті коти, які взяли до рук зброю на підтримку фальшивих претендентів на престол, винні у державній зраді і мають бути притягнуті до відповідальності за будь-яку ціну."
 ABY_pacify_kloog: "Відновити закон і порядок у Клуджтауні"
 ABY_pacify_kloog_desc: "Через некомпетентність Нявконнинів місцеві злочинні угруповання вже тривалий час домінують у Клуджтауні. Настав час винести сміття і відправити правоохоронні органи, щоб заарештувати ватажків і зміцнити владу місцевого мера. Багато злочинців не котячого походження матимуть потенціал стати хорошими рабами..."
 
 ABY_slave_revolt_cat: "Боротьба за свободу"
 ABY_slave_revolt_cat_desc: ""
 ABY_recruit_slaves: "Завербувати рабів у провінції [FROM.GetName]"
 ABY_recruit_slaves_desc: "Тепер, коли ми отримали контроль над цією територією, ми можемо закликати місцевих рабів приєднатися до визвольної армії і боротися проти наших гнобителів."
 
 ABY_parliament_cat: "[Root.GetAdjective]ий парламент"
 ABY_coalition_with_asp: "Сформувати коаліцію з §RАбіссинською соціалістичною партією§!"
 ABY_coalition_with_asp_desc: "Хай живе соціалізм!"
 ABY_coalition_with_pla: "Сформувати коаліцію з §8Народною лігою§!"
 ABY_coalition_with_pla_desc: "Хай живе республіканізм!"
 ABY_agreements_with_apf: "Отримати підтримку 10 представників §2Абіссинського патріотичного фронту§!"
 ABY_agreements_with_apf_desc: "Двопартійність — це диво."
 ABY_agreements_with_apf_2: "Отримати підтримку 10 представників §2Абіссинського патріотичного фронту§!"
 ABY_agreements_with_apf_2_desc: "Двопартійність — це диво."
 ABY_election_campaign: "Провести виборчу кампанію"
 ABY_election_campaign_desc: "Правильні гроші в правильному місці можуть змінити все на світі."
 ABY_hire_apf_advisor: "Найняти радника від АПФ"
 ABY_hire_apf_advisor_desc: ""
 ABY_provincial_elections: "Провінційні вибори"
 ABY_provincial_elections_desc: "Кожна партія надає різний §Yмодифікатор провінції§!. Домінантна партія в кожній провінції буде випадковою, але шанс залежатиме від §Yпопулярності партії§! та від того, чи є провінція сільською чи міською. Як правило, партії лівого спрямування більш популярні в міських провінціях, тоді як партії правого спрямування мають кращі шанси в сільських провінціях. §YПровінційні вибори§! будуть проводитися кожні три роки. Якщо ми здобудемо більше §Yнаціональних провінцій§!, кількість провінцій потенційно може бути збільшена."
 ABY_dummy_asp_decison: "Домінантна партія в провінції: §RАСП§!"
 ABY_dummy_asp_decison_desc: "У місцевій провінційній раді домінує Абіссинська соціалістична партія."
 ABY_dummy_alf_decison: "Домінантна партія в провінції: §rРВР§!"
 ABY_dummy_alf_decison_desc: "У місцевій провінційній раді домінує Революційний визвольний рух."
 ABY_dummy_pla_decison: "Домінантна партія в провінції: §YНЛ§!"
 ABY_dummy_pla_decison_desc: "У місцевій провінційній раді домінує Народна ліга."
 ABY_dummy_urf_decison: "Домінантна партія в провінції: §RОРФ§!"
 ABY_dummy_urf_decison_desc: "У місцевій провінційній раді домінує Об'єднаний республіканський фронт."
 ABY_dummy_apf_decison: "Домінантна партія в провінції: §2АПФ§!"
 ABY_dummy_apf_decison_desc: "У місцевій провінційній раді домінує Абіссинський патріотичний фронт."
 ABY_guide_to_parties: "Посібник із [Root.GetAdjective] політичних партій"
 ABY_guide_to_parties_desc: "Партійна політика — це дуже нове явище на Абіссинському півострові. Тому було б корисно дізнатися про партії, які зараз прагнуть керувати нацією."
 
 ABY_support_purrsian_resistance_gommie: "Підтримати муррсійський опір"
 ABY_support_purrsian_resistance_gommie_desc: "Ми можемо таємно постачати зброю місцевим повстанцям, щоб допомогти їм вигнати іноземний гарнізон з острова."
 ABY_ally_with_mdl: "Укласти союз із Мейндалусією"
 ABY_ally_with_mdl_desc: "Звільнивши їхні землі, ми виконали свою частину угоди. Настав час мейндалусцям дотримати слова і прийняти нашу пропозицію."
 ABY_secure_more_borders: "Убезпечити наш кордон із [From.GetNameDefCap]"
 ABY_secure_more_borders_desc: "Наші нові [From.GetAdjective]і сусіди можуть виявитися нашими союзниками... або ворогами."
 
 ABY_integration_decisions: "Інтеграція нових провінцій"
 ABY_integration_decisions_desc: "Хоча [Root.GetAdjective]ий уряд офіційно не зацікавлений в експансіонізмі, ми якось опинилися під контролем території, яка потенційно може бути повністю інтегрована в націю."
 ABY_annex_puppet_2: "Анексувати [From.GetNameDefCap]"
 ABY_annex_puppet_2_desc: "Дотепер ми дозволяли [From.GetNameDef] зберігати значну частину власного уряду, але тепер це зміниться."
 #ABY_restore_order_in_kluger:0 "Відновити закон і порядок у Клуджтауні"
 #ABY_restore_order_in_kluger_desc:0 "Ви ніколи не знайдете більш жалюгідного вулика покидьків і лиходіїв, ніж Клуджтаун. Опинившись поза контролем Абіссинії, він скотився в анархію — в найгіршому розумінні. На щастя, тепер, коли місто наше, ми можемо відправити правоохоронців, щоб придушити злочинність і допомогти встановити належну адміністрацію."
 #ABY_integrate_manedalussy:0 "Інтегрувати Мейндалусію"
 #ABY_integrate_manedalussy_desc:0 "Мейндалусія багато вистраждала під час котячої окупації, хоча згідно з історичними записами абіссинська монархія ставилася до місцевих жителів краще в століття, що передували вторгненню Сідлової Арабії. Наш новий революційний уряд ставитиметься до місцевих поні краще, ніж монархи будь-коли. Вони будуть не громадянами другого сорту, а повноправними громадянами з усіма правами, яких вони тільки можуть забажати."
 #ABY_integrate_maregypt:0 "Інтегрувати Мейргипет"
 #ABY_integrate_maregypt_desc:0 "Що ж. Я не планував повертатися додому як завойовник. Але, здається, ми тут."
 ABY_integrate_country: "Інтегрувати [From.GetNameDefCap]"
 ABY_integrate_country_desc: "Настав час для [From.GetAdjective]ого народу стати повноправними громадянами [Root.GetNameDef] з усіма правами, яких вони тільки можуть забажати."
 ABY_form_commie_empire: "З багатьох — єдине"
 ABY_form_commie_empire_desc: "Те, що відоме як «Абіссинія», більше не обмежується Абіссинським півостровом, і її громадяни походять з багатьох націй. Ця держава не є імперією абіссинців, що панують над іншими. Це держава рівних. Тому їй потрібні більш відповідна назва та ідентичність, не побудовані навколо національності."
 
 ### Dynamic modifiers
 
 ABY_slave_controlled_state: "Повстання рабів"
 ABY_slave_controlled_state_desc: "Місцеві раби повстали, і весь регіон поринув у жорстокий хаос."
 ABY_disloyal_local_noble: "Нелояльний місцевий дворянин"
 ABY_disloyal_local_noble_desc: "Найвищий за рангом дворянин у цьому регіоні, який домінує в місцевій політиці, є нелояльним до центрального уряду і відмовляється співпрацювати."
 ABY_no_manedalusians_in_army: "Обмежений набір"
 ABY_no_manedalusians_in_army_desc: "Мейндалуським поні заборонено служити в збройних силах Абіссинії."
 ABY_manedalusian_autonomy: "Мейндалуська автономія"
 ABY_manedalusian_autonomy_desc: "Мейндалусії було надано автономію, що на практиці означає скасування посади баші. Натомість місцеве самоврядування знаходиться в копитах місцевого обраного уряду."
 ABY_worker_strikes: "Страйк робітників"
 ABY_worker_strikes_desc: "Робітники в цьому регіоні оголосили страйк, відмовляючись працювати, доки їхні вимоги не будуть виконані, або доки в них не закінчаться ресурси для підтримки страйку."
 ABY_expanded_conscription: "Розширений котопризов"
 ABY_expanded_conscription_desc: "Усі працездатні коти повинні служити."
 ABY_reinforced_local_garrison: "Посилений місцевий гарнізон"
 ABY_reinforced_local_garrison_desc: "Солдати, віддані [ROOT.ABY_king_loc_cap]ові, підсилили провінційний гарнізон."
 ABY_rebellious_local_noble: "Бунтівний місцевий дворянин"
 ABY_rebellious_local_noble_desc: "Найвищий за рангом дворянин у цьому регіоні, який домінує в місцевій політиці, підняв збройний заколот проти центрального уряду."
 ABY_noble_maintenance: "Витрати [Root.ABY_royal_loc_cap]у двору"
 ABY_noble_maintenance_desc: "Дворян можна задовольнити екстравагантними подарунками та вечірками, але якою ціною?"
 ABY_faction_trade: "Північно-західна зебриканська угода про вільну торгівлю"
 ABY_faction_trade_desc: "Спершу підписана [?ABY_number_of_allies] націями, ПЗЗУВТ скасовує більшість торгових бар'єрів, таких як мита, між її підписантами."
 ABY_abyssinian_governorate: "Абіссинське губернаторство"
 ABY_abyssinian_governorate_desc: "Ця провінція перебуває під юрисдикцією призначеного абіссинського губернатора, який править від імені котячої монархії."
 ABY_imperial_province: "Імперська провінція"
 ABY_imperial_province_desc: "Ця провінція офіційно є провінцією Абіссинської імперії, якою керує призначений губернатор."
 ABY_local_rebellion: "Селянське повстання"
 ABY_local_rebellion_desc: "Котячі селяни перетворили свої інструменти на зброю і борються проти місцевого уряду."
 ABY_asp_dominant_state: "Домінантна партія в провінції: §RАСП§!"
 ABY_asp_dominant_state_desc: "У місцевій провінційній раді домінує Абіссинська соціалістична партія."
 ABY_urf_dominant_state: "Домінантна партія в провінції: §RОРФ§!"
 ABY_urf_dominant_state_desc: "У місцевій провінційній раді домінує Об'єднаний республіканський фронт."
 ABY_alf_dominant_state: "Домінантна партія в провінції: §rРВР§!"
 ABY_alf_dominant_state_desc: "У місцевій провінційній раді домінує Революційний визвольний рух."
 ABY_pla_dominant_state: "Домінантна партія в провінції: §YНЛ§!"
 ABY_pla_dominant_state_desc: "У місцевій провінційній раді домінує Народна ліга."
 ABY_apf_dominant_state: "Домінантна партія в провінції: §2АПФ§!"
 ABY_apf_dominant_state_desc: "У місцевій провінційній раді домінує Абіссинський патріотичний фронт."
 
