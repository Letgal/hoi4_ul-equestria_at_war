 abyssinia.169.t:0 "Патріотичне повстання"
 abyssinia.169.d:0 "Шарп Спір рвучко відчинила двері і вбігла до штабу Визвольної армії. Вона побачила цілковитий хаос: найрізноманітніші істоти перекрикували одне одного, спілкуючись по радіо та телефонах. Лише один був мовчазним: Сеннахеріб. Вона підбігла до нього і поклала копито йому на плече. «Що в біса відбувається? Четверта ранку!»\nВіслюк спокійно обернувся до неї. «Масштабне повстання, мем. Ми втратили зв'язок із гарнізонами в кількох провінціях. Усе, що ми отримуємо — це розрізнені звіти з усієї країни про озброєних котів, які атакують стратегічні об'єкти. Нас повністю переважають», — сказав він спокійно, без жодних ознак тривоги чи паніки.\nДихання Спір стало різким і прискореним. «Я-як це сталося? У нас не було ні попередження, ні розвідданих про це!»\nСеннахеріб знизав плечима. «Ви здавалися досить розслабленою щодо всього, тому більшу частину армії було демобілізовано. У нас немає розвідувальної служби, а наші гарнізони розкидані по всій країні. Це було лише питанням часу».\nСпір закрила обличчя копитом і заговорила тихим, втомленим голосом. «Священні боги, мені так шкода, я не очікувала такого масового опору проти нас... ми не обіцяли їм нічого, крім хорошого, казали, що хочемо зробити Абіссинію кращим місцем для всіх. Гадаю... їм ця ідея не сподобалася».\nВіслюк нарешті виявив емоції, презирливо пирхнувши. «А чого ви очікували від цих котячих мішків з блохами? Ви не можете їх врятувати, Спір. Уся їхня раса схиблена на поневоленні інших, аби вони могли лінуватися і нічого не робити цілими днями».\nВона шоковано подивилася на нього. «Я... я знаю, що у нас усіх був поганий досвід з ними, але ви не можете засуджувати їх усіх через дії невеликої меншості!»\n«Це повстання — не невелика меншість. Уся нація зі зброєю в руках виступила проти нас. Проти вас. І що ви збираєтеся робити? Перепросити і здатися?»\nФіолетова кобила якусь мить мовчала. Потім вона сказала:"
 abyssinia.169.a:0 "«Я буду битися. Як і завжди»."
 
 abyssinia.170.t:0 "Відділення Мейндалусії"
 abyssinia.170.d:0 "Представник Мейндалуської національної асоціації, такий самий поні, як і Шарп Спір, передав їй повідомлення. «Офіційна декларація про наше відокремлення, як і було обіцяно».\n«Так, так, давайте швидше», — сказала вона з роздратованим зітханням і взяла документ. «Я зараз мала б бути на зустрічі з Сеннахерібом, хоча він чомусь відсутній».\nПоні натягнув поверхневу усмішку. «Ми перепрошуємо за несвоєчасність і сподіваємося, що між Абіссинією та Мейндалусією не залишиться образ».\n«Я б назвала вас опортуністами, але тоді я була б лицеміркою. Ви не зацікавлені в тому, щоб допомогти нам?»\n«На жаль, спочатку ми маємо закріпити контроль над нашою щойно звільненою батьківщиною».\n«Зрозуміло... що ж, як марегіпетська кобила, я сподіваюся, що Мейргипет поважатиме ваше рішення так само, як я змушена робити це зараз». Вона теж розтягнула губи в усмішці, яку навряд чи можна було назвати дружньою.\n«Побачимо, що буде. У будь-якому разі, ми продовжуватимемо боротися за нашу незалежність стільки, скільки буде потрібно».\n«Знаєте, я поважаю таку позицію. Саме моя рішучість зрештою привела нас до тріумфу над рабовласниками».\n«Шкода, що цей тріумф тривав недовго», — сказав поні зі співчутливим кивком. «Удачі вам у вашій власній боротьбі».\n«Так, менше з тим... а зараз, якщо дозволите, я маю знайти, куди подівся мій генерал», — сказала Спір і без зайвих слів покрокувала коридором. Коли гривалузієць зник з поля зору, вона зібгала папір і викинула його."
 abyssinia.170.a:0 "Кожен веде свої власні битви."
 
 abyssinia.171.t:0 "Зрада"
 abyssinia.171.d:0 "Спір похитала головою і ковтнула клубок у горлі. «Фаде, будь ласка, скажи, що це один з твоїх жартів. Будь ласка».\nЖеребець опустив погляд у землю. «Вибач, Спір. Усі звіти кажуть одне й те саме. Віслюки лютують на півдні і розстрілюють усіх, хто не належить до них. Я не розумію, чому Сеннахеріб зробив це...»\nПоні скреготнула зубами. «Ні, я... я розумію. Ознаки були, я просто відмовлялася їх помічати. Боги, як я могла бути такою дурною!» Вона жалібно заскімлила і ледь не розплакалася.\nФад підняв очі, побачив це й інстинктивно обійняв її. Хоча Спір спочатку намагалася вирватися, вона мало що могла зробити проти сили Фада і здалася, притиснувшись до нього і плачучи йому в груди.\n\nСолдати навколо намагалися поводитися так, ніби нічого не відбувається, хоча багато з них раз у раз зиркали на своїх командирів.\n«Спір...» — прошепотів Фад. «Ти маєш заспокоїтися. Наші хлопці подумають, що ти здалася, якщо поводитимешся так, і вирішать, що їм теж час здаватися. Вони не знають тебе так, як я. Я знаю, що ти ніколи не опустиш копит».\nСпір пирхнула і витерла щоку. «Вибач, мені просто... треба було виплеснути це. Ти маєш рацію, я сильніша за це». Вона рішуче вивільнилася з обіймів Фада і, напустивши впевненого вигляду, обернулася до своїх бійців. «Солдати!» — сказала вона голосом, що все ще був напруженим. «Я знаю, що з останніми новинами все здається похмурим, але я не збираюся здаватися, лягати і вмирати! Ми не для того зайшли так далеко, щоб втратити все, за що боролися!» Вона подивилася в очі кожному солдату навколо себе і, нарешті, Фаду. «Ми будемо битися разом, незважаючи ні на що, до самого гіркого кінця!»"
 abyssinia.171.a:0 "Хай боги врятують Абіссинію, бо більше нікому."
 
 abyssinia.172.t:0 "Привиди минулого"
 abyssinia.172.d:0 "Сеннахеріб гепнув старі сувої, що вже кришилися, на стіл Шарп Спір. «Це все була правда! Як я вам і казав».\nВона подивилася на них. Сувої виглядали настільки стародавніми, що, мабуть, розсипалися б на пил, якби вона їх торкнулася, хоча було видно, що вони вже постраждали від копит Сеннахеріба. «Ви про вигнання?»\n«Так. Мені довелося перерити найглибші рівні королівських архівів, щоб знайти їх. Це офіційні укази про вигнання, підписані майже тисячу років тому, одразу після того, як абіссинці завоювали пустелі на південь від своїх гір. Монархія дійсно вигнала все корінне населення віслюків! Пантера — все це місто — побудоване на вкраденій землі!» Він важко дихав, його очі палали люттю.\nСпір спробувала заспокоїти його усмішкою. «Я розумію, що у вас образа на котів, але все це сталося багато століть тому. Чи не могли б ви просто залишити минуле в минулому? Якщо ми хочемо зробити Абіссинію кращою, ми повинні бачити в котах друзів, а не ворогів».\n«Я перестану бачити в них ворогів, коли вони визнають свої злочини проти мого народу і попросять вибачення! Але я знаю, що вони ніколи цього не зроблять».\nСпір глибоко вдихнула. «Сеннахерібе, будь ласка, пообіцяйте, що не будете створювати через це проблем. Зараз не час для конфліктів».\nСеннахеріб примружив очі. Між ними відбулося коротке змагання поглядами, яке він програв. «Гаразд — але за однієї умови. Доки коти залишатимуться вірними вам, я терпітиму їхню присутність на священних землях моїх предків»."
 abyssinia.172.a:0 "«Дякую»."
 
 abyssinia.173.t:0 "Дебати щодо прапора"
 abyssinia.173.d:0 "Шарп Спір опинилася на ще одному тривалому засіданні перехідного уряду. Вона ледве стримувалася, щоб не померти з нудьги, оскільки тема була абсолютно неважливою: дизайн прапора Абіссинії.\n\n«Нинішній прапор явно замислювався як тимчасовий», — сказав представник Народної ліги. «Це просто монархічний прапор, з якого прибрали символи і змінили кольори. Ось чому я пропоную прийняти республіканський триколор на честь Грифонської революції, яка надихнула нас на нашу власну боротьбу».\n«Це навіть не триколор!» — вигукнув представник Абіссинської соціалістичної партії. «За визначенням, це двобарвний трисмуговий прапор!»\n«Якщо Кемерскай каже, що це триколор, значить це триколор!» — відповів кіт-республіканець.\n«Бачите, наскільки він підкорюється своєму капіталістичному диктатору?» — звернувся кіт-соціаліст до інших присутніх у кімнаті. «Проте я згоден, що нинішній прапор занадто схожий на монархічний. Тому я пропоную прапор, що уособлює наші соціалістичні цінності: синя зірка на червоному тлі!»\n\nКоли зала потонула в суперечках, Шарп Спір зрозуміла, що цим дебатам не буде кінця, поки вона не прийме власне рішення."
 abyssinia.173.a:0 "«Ми будемо шанувати республіканські ідеали»."
 abyssinia.173.b:0 "«Нинішній прапор цілком підходить»."
 abyssinia.173.c:0 "«Ми піднімемо червоний стяг соціалізму»."
 abyssinia.173.e:0 "«Як щодо компромісу?»"
 abyssinia.173.a_tt: "Республіканський §2три§!§Rко§!§2лір§! буде прийнято як державний прапор.\n\n\n\n\n\n£ABY_flag_texticon_1\n\n\n\n\n\n£Blank"
 abyssinia.173.b_tt: "Нинішній §2прапор§! залишиться без змін.\n\n\n\n\n\n£ABY_flag_texticon_2\n\n\n\n\n\n£Blank"
 abyssinia.173.c_tt: "§2Соціалістична зірка§! буде прийнята як державний прапор.\n\n\n\n\n\n£ABY_flag_texticon_3\n\n\n\n\n\n£Blank"
 abyssinia.173.d_tt: "§2Три§!§Rко§!§2лір§! із §2Соціалістичною зіркою§! буде прийнято як державний прапор.\n\n\n\n\n\n£ABY_flag_texticon_4\n\n\n\n\n\n£Blank"
 
 abyssinia.174.t:0 "Петиція худоби"
 abyssinia.174.d:0 "У залі засідань колишнього королівського палацу з'явилися незвичайні відвідувачі: Шарп Спір зустрілася з представниками худоби країни. Серед них були корови, вівці та кози, які, на відміну від курей і свиней, були розумними, а не просто дурними тваринами, не здатними до мовлення.\n«Ми зазвичай не втручаємося в політику», — сказав представник від корів, — «але ми, тим не менш, вдячні, оскільки ваші зусилля призвели до поліпшення ставлення до худоби. Коти ніколи особливо не дбали про наш добробут, розглядаючи нас лише як джерело м'яса, на відміну від вас, колего-травоїдна».\nСпір нерішуче кивнула, вочевидь не звикла до розмов з худобою. «Я... рада це чути. Але ж ви прийшли сюди не лише для того, щоб сказати це, чи не так?»\nБаран похитав головою. «Ні, ви маєте рацію. Ми прийшли сюди через поширене занепокоєння, що ви "звільните" нас, худобу, так само, як звільнили рабів, які часто доглядали за нами. Ми цілком задоволені нашим мирним життям на пасовищах, де ми скубемо траву. На відміну від вас, поні, та інших подібних видів, ми не здатні самі про себе подбати. Чи будуть нас і далі доїти та стригти за потреби?»\n«Ем... так, звісно, напевно? Мені довелося б запитати перехідний уряд, але е-е, гадаю, це можна влаштувати? З юридичної точки зору ви все одно є вільними істотами, навіть якщо продовжуєте жити на громадських пасовищах».\n«Дякуємо вам, поні», — сказала коза. «Сподіваюся, інші раси зрозуміють наші потреби, замість того, щоб бачити в нас рабів, які потребують визволення»."
 abyssinia.174.a:0 "Їхня мова напрочуд витончена?"
 
 abyssinia.175.t:0 "На захист нашої свободи"
 abyssinia.175.d:0 "«Я пропоную негайну мобілізацію всіх громадян, введення воєнного стану та оголошення надзвичайної ситуації», — звернулася Шарп Спір до присутніх представників, її голос звучав гучно і впевнено. Вони відповіли жестами підтримки. Тоді вона продовжила, і її обличчя напружилося: «Я також пропоную розірвати всі дипломатичні зв'язки з [WNG.GetNameDef] і засудити їхнє вторгнення як кричущий імперіалізм. Вони відкинули прикриття у вигляді "визволення" Абіссинії від рабства, оскільки ми вже зробили це самі. Все, що в них залишилося — це жадібність і жага до панування над тими, кого вони вважають нижчими за себе. Ми повинні довести їм, що ми не якийсь народ, який можна легко підкорити, який здається перед сильнішим ворогом, який опускає копита, коли втрачена вся надія. Ми покажемо їм, що заслуговуємо на нашу свободу, адже ми готові пожертвувати заради неї всім!»\n\nУся зала вибухнула радісними вигуками. Багато представників, які колись були рабами, здійняли свої гвинтівки, готові битися на передовій проти ворога."
 abyssinia.175.a:0 "Дати відсіч загарбникам!"
 
 abyssinia.176.t:0 "Нова сумка, яку має [ROOT.ABY_king_loc_cap]"
 abyssinia.176.d:0 "«Любий мій, що це в ім'я Бааст?» — запитала Мортіша, скрививши обличчя в легкій відразі і вказавши кігтем на Ґомеза.\nВін опустив погляд на те, на що вона вказувала. Це була його новенька прямокутна бірюзова сумка, що висіла в нього на плечі. «О, це?» — відповів він з усмішкою. «Це моя нова сумка. Побачив її на торговому ярмарку, який нещодавно відвідував, і не зміг втриматися, щоб не купити».\n«Виглядає жахливо», — сказала Мортіша. «І вона така тонка, які взагалі речі в ній можна носити?»\n«Поки що я просто використовую її для перенесення деяких важливих документів. Ось прямо зараз у ній лежать усі папери, які мені знадобляться на зустрічі, куди я скоро піду. Це справді зручно!»\nМортіша зітхнула. Тієї ж миті з найближчого коридору з'явився Деджен Ріс-Моггі і миттєво завмер у шоці, побачивши нову сумку Ґомеза. «Ваша Величносте, чи все гаразд?»\n«На нього щось найшло», — сказала Мортіша до того, як її чоловік встиг відповісти. «Вона ж конфліктує з кольорами його регалій, чи не так?»\nҐомез засміявся. «Розслабтеся, це просто чудова сумка, яку я знайшов. Зрештою, бірюзовий — мій улюблений колір».\n«Але така форма вкрай непрактична», — зауважив Деджен, — «не кажучи вже про те, що вона виглядає вкрай непрофесійно і не личить монарху».\n[ROOT.ABY_king_loc_cap] просто похитав головою. «Шкода, що вам двом вона не подобається, але все гаразд, кожному своє. Я продовжуватиму нею користуватися просто тому, що вона мені особисто до вподоби, і це те, що зрештою має найбільше значення»."
 abyssinia.176.a:0 "Це справді жахливо потворна сумка."
 
 abyssinia.177.t:0 "Точило для розуму"
 abyssinia.177.d:0 "Фад Аль-Касаар попрямував до командного намету, тримаючи в одному з копит кухоль медового вина. Намет, ясна річ, не мав дверей, у які можна було б постукати, тому Фад обережно підняв полог біля входу і зазирнув усередину. «Спір? Можу я тебе трохи потурбувати?»\nВін побачив, що фіолетова кобила сиділа за своїм столом, заглибившись у книгу, яку читала. Не піднімаючи погляду, вона відповіла: «Звісно. Заходь».\nФад увійшов, пригнувши голову, щоб протиснутися через вхід. «Я приніс тобі дещо випити».\n«Сподіваюся, не каву».\nФад похитав головою, перш ніж зрозумів, що це безглуздо, оскільки вона на нього не дивилася. «Ні, твоє улюблене. Медове вино!» Він поставив кухоль поруч зі стосом книг на її столі.\nНарешті, Спір підняла очі. «О, дякую!» Вона вдячно кивнула і зробила ковток з кухля. «Ти прийшов сюди тільки для того, щоб принести мені це?»\n«Ну, так, але тепер мені цікаво, що ти читаєш. Це не схоже на звіти з передової».\n«Це книги про політику та історію з бібліотеки колишнього королівського палацу. Я зрозуміла, що мені потрібно більше дізнатися про цю всю штуку з "керуванням країною"».\nФад насупився. «Ти більше не плануєш піти у відставку і повернутися додому?»\n«Я не можу цього зробити, поки не розгрібу цей безлад, який сама ж і влаштувала», — сказала вона з болісною, вимушеною усмішкою.\n«Розумію. Сподіваюся, ти багато чому навчишся».\n«Слухай, Фаде... ти е-е, ти все ще неписьменний, так?»\n«Завжди ним був. Ніхто ніколи не вчив мене читати, і я не мав часу вчитися сам».\n«Зрозуміло. То як щодо того, щоб я тебе навчила? Я можу робити це, поки читаю».\nВуха Фада нашорошилися, а очі розширилися. «Я... Я був би дуже вдячний! Але боюся, у нас не буде на це багато часу під час цієї війни».\n«Тоді допоможи мені виграти її, і в нас буде весь час світу», — сказала Спір, підморгнувши."
 abyssinia.177.a:0 "Так багато книг і так мало часу."
 
 abyssinia.178.t:0 "[From.GetNameDefCap] вимагає оплати"
 abyssinia.178.d:0 "Від [From.GetNameDef] не було видно жодної підтримки. Натомість було отримано секретне повідомлення як відповідь від [From.GetAdjective]ого уряду, яке швидко доставили Шарп Спір. У повідомленні йшлося про те, що [From.GetNameDef] з радістю підтримають нашу справу, але лише якщо ми погодимося покрити витрати самостійно. Брак коштів не буде проблемою, оскільки ми могли б просто домовитися заплатити їм пізніше, якщо не можемо дозволити собі зробити це просто зараз.\n\nЦе була складна ситуація, і Шарп Спір спочатку не знала, як відповісти. З одного боку, вона могла б використати будь-яку здобич, захоплену у ворога, для оплати допомоги. З іншого боку, вона не хотіла послаблювати себе в непевному становищі, заборгувавши іноземній державі. Але зрештою вона прийняла рішення і відправила відповідь назад у [From.Capital.GetName]."
 abyssinia.178.a:0 "Домовилися."
 abyssinia.178.b:0 "Ми просили про допомогу, а не про здирництво."
 
 abyssinia.179.t:0 "[From.GetNameDefCap] погоджується заплатити"
 abyssinia.179.d:0 "Зі столиці ([From.Capital.GetName]) прибуло секретне повідомлення. Глава держави, Шарп Спір, відповіла, що приймає нашу угоду і заплатить стільки, скільки зможе собі дозволити. Решту буде сплачено пізніше, коли в неї з'являться кошти. Отже, абіссинці самі оплатять свою підтримку, і нам залишається лише організувати відправку добровольців та припасів."
 abyssinia.179.a:0 "Отже, угода є угода."
 
 abyssinia.180.t:0 "[From.GetNameDefCap] відмовляється платити"
 abyssinia.180.d:0 "Зі столиці ([From.Capital.GetName]) прибуло секретне повідомлення. Глава держави, Шарп Спір, відповіла, що відкидає нашу угоду. Вона просила про допомогу, а не про «здирництво», і не бажала мати борги перед іноземною державою. Хоча це і шкода, але це просто означає, що нам не доведеться нічого робити, і ми зможемо спостерігати за війною з безпечної відстані."
 abyssinia.180.a:0 "Немає грошей — немає підтримки."
 
 abyssinia.181.t:0 "Перерізання артерій"
 abyssinia.181.d:0 "Меркуріоз Зоба, посивілий і вкритий шрамами алванський зебра, замислено погладив бороду. «Це нерозумно, але сміливо. З Божого благословення, це може спрацювати».\nШарп Спір з полегшенням видихнула. «Ви думаєте, що зможете це здійснити? Я подбаю про те, щоб у вашому розпорядженні були мої найкращі солдати».\n«Гм, наші сили будуть розтягнуті, як шовкова нитка, хоч скільки воїнів ви мені дасте. Але я вірю, що ми зможемо це зробити, так».\nСпір насупилася. «А що, як ми зменшимо масштаб операції та зосередимося на одній із двох цілей?»\nВін схвально кивнув. «Тоді це було б набагато простіше, і ми могли б завдати значно більшої шкоди нашим жалюгідним ворогам».\n«Але одна сторона залишиться абсолютно неушкодженою... і тоді, на кого з двох нам слід напасти?»\nМеркуріоз знизав плечима. «Це залишається вирішувати вам, моя володарко».\nВона якусь мить мовчала, зважуючи свої варіанти."
 abyssinia.181.a:0 "«Патріотичний фронт — більша загроза»."
 abyssinia.181.b:0 "«Давайте діяти за початковим планом»."
 abyssinia.181.c:0 "«Перекажіть Сеннахерібу мої вітання»."
 
 abyssinia.182.t:0 "Пантерські мирні угоди"
 abyssinia.182.d:0 "«Так званий "Патріот" справді не прийшов?» — запитала Шарп Спір.\nБоєць котячого опору, що сидів за столом для переговорів, знизав плечима. «Він довірив мені бути його представником. Він воліє залишатися в підпіллі».\nСтримуючи бажання назвати його боягузом, Спір знову зосередилася на паперах у своїх копитах. «Отже, перейдімо безпосередньо до порядку денного цієї зустрічі. Я припускаю, що ви всі прочитали попередній договір?»\nДюжина котів навколо столу кивнула.\n«Добре, це заощадить мені трохи часу. Якщо коротко: буде проведено конституційний референдум, щоб визначити форму правління Абіссинії. До того часу дію старої конституції буде призупинено. Абіссинський патріотичний фронт погодиться припинити бойові дії проти урядових військ і інтегрує свою командну структуру в армію Республіки. Вони не будуть роззброєні. Керівництво Патріотичного фронту не буде притягнуто до кримінальної відповідальності за державну зраду. Патріотичний фронт братиме участь у будь-якому новому уряді, який буде сформовано».\nФад, який сидів поруч із нею, прошепотів: «Коли ти читала це для мене, я сказав, що тут надто багато поступок. Ти справді не передумала?»\n«Фаде, напевно, всі тебе чують. Цей стіл не такий вже й великий. І ні, не передумала». Вона заговорила нормально, щоб її голос звучав чітко. «Мир для мене важливіший за політичний догматизм. Можливо, я й не кішка, але я не хочу здаватися іноземкою, яка нав'язує зміни Абіссинії. Я зрозуміла, що для того, щоб зробити цю країну кращою для кожної істоти, всі істоти повинні працювати разом. Навіть ті, хто має кардинально інші політичні цінності».\n«А як щодо Сеннахеріба?» — запитав Фад.\nСпір звузила очі. «Ті, хто не бажає йти на компроміс чи співпрацювати, звісно, зіткнуться з наслідками своїх дій»."
 abyssinia.182.a:0 "Нехай цей мир триває."
 
 abyssinia.183.t:0 "Словами мене не зламати"
 abyssinia.183.d:0 "Центральна лікарня в Пантері була настільки переповнена пацієнтами, що деякі з них опинилися в коридорах і навіть надворі. Коли Шарп Спір спробувала зайти до будівлі, щоб відвідати стару подругу, їй довелося пробиратися крізь лабіринт ліжок і нош із пораненими, хворими чи виснаженими від голоду пацієнтами. Бої під час громадянської війни завдали ран, хаос конфлікту порушив логістику продовольства, а брак їжі призвів до спалахів хвороб. Шарп Спір намагалася зосередити погляд на своєму шляху, відмежовуючись від світу страждань навколо неї.\n\nЗрештою вона увійшла до тісної лікарняної палати і побачила свою подругу. Бонту, зебра, яку вона знала ще з часів рабства, лежала на ліжку з ногою в шині. Вона спала, тому Спір сіла на стілець поруч із нею і терпляче чекала. Коли та нарешті прокинулася, вона була здивована відвідувачці. «Спір? Що ти тут робиш, заради Бога?»\n«Вирішила відвідати тебе і перевірити, як твої справи. У моєму графіку знайшлося вікно для цього».\nБонту насупилася, змішуючи збентеження і розчарування. «Як мило з твого боку. Але ти ж знаєш, що зрештою саме ти несеш відповідальність за те, що сталося з моєю ногою?»\nСпір схилила голову. «Що? Але я думала, що ти отримала поранення від осколка артилерійського снаряда».\n«А чому цей снаряд був випущений? Через тебе! Через тебе і твої божевільні мрії перетворити Абіссинію на якийсь рай. Натомість ти перетворила її на Тартар!»\nСпір здригнулася, ніби її щойно вдарили ножем. «Бонту, будь ласка, я мала найкращі наміри. І я ще не здалася».\n«Твоя впертість стане твоєю погибеллю», — пробурмотіла Бонту.\n«Ні, я вчуся на своїх помилках. Клянуся, я виправлю весь цей безлад. І хоча я не можу вилікувати твою ногу, я подбаю про те, щоб ти отримала все необхідне».\nБонту з болем вдихнула і зітхнула. «Пам'ятаєш плантацію, на якій ми жили? Життя було важким, але ми були одне в одного. Цього було достатньо, щоб зробити життя стерпним. Але відколи ти пішла, щоб очолити свою революцію, все ставало тільки гірше і гірше. Тож пробач мені за мій скептицизм».\nСпір більше не могла дивитися на неї і втупилася в підлогу. Запала довга, незручна тиша. Її було порушено лише тоді, коли вона нарешті сказала:"
 abyssinia.183.a:0 "«Ні, пробач мені ти. Мені шкода, що я залишила тебе»."
 
 abyssinia.184.t:0 "Анексія Нео-Асстирії"
 abyssinia.184.d:0 "Після повстання рабів в Абіссинії колишні раби-віслюки згуртувалися під прапором Сеннахеріба, одного з генералів революціонерів. Він виявив у королівських архівах Абіссинії фактичні докази того, що південні землі котячого королівства колись не лише належали віслюкам, але й були ними заселені. Століття тому місцеве населення віслюків було вигнано на південь, а їхні місця зайняли коти. Рух Сеннахеріба ставив за мету виправити цю несправедливість і повернути землі своїх предків.\n\nТепер, з крахом революційного уряду, Нео-Асстирія стоїть тріумфально. Помста віроломним котам уже здійснена, і віслюки забрали те, що по праву належить їм. Сеннахеріб надіслав [Root.GetLeader] прохання про анексію нео-асстирійських земель. Звісно, немає жодних причин відмовлятися від такої пропозиції, тому [Root.GetLeader] вирішує погодитися. [Root.GetAdjective]і солдати та адміністратори вже перетинають колишній абіссинський кордон і забезпечують наш контроль над північчю."
 abyssinia.184.a:0 "Великий тріумф для ослиного роду."
 
 abyssinia.185.t:0 "Потік біженців"
 abyssinia.185.d:0 "Цивільні почали тікати від бойових дій, щойно пролунали перші постріли. Але зараз усе набуло ще більших масштабів.\n\nШарп Спір дивилася вниз на дорогу з вершини пагорба. Сама дорога вже була невидимою, оскільки її заблокував нескінченний потік цивільних. Вона була недостатньо широкою, тому багатьом доводилося йти брудною землею поруч із нею. Майже всі вони були котами, які тягнули візки та вози, повні речей. Були не лише дорослі, а й кошенята та літні коти. Спір також помітила кількох поні, коней і зебр.\n\nАле жодного віслюка.\n\nВона зціпила зуби і подивилася на південь, звідки йшли всі біженці. «Сеннахерібе, що ти накоїв?» — гірко прошепотіла вона сама до себе."
 abyssinia.185.a:0 "Це ж стільки ротів, які треба прогодувати."
 
 abyssinia.186.t:0 "Голосування за майбутнє Абіссинії"
 abyssinia.186.d:0 "«За що ти збираєшся голосувати, Енкаро?» — запитав кіт у віслюка, що стояв позаду нього. Вони стояли в черзі до кабінки для голосування, чекаючи своєї черги віддати голос. У будівлі, де вони перебували, була діра розміром з артилерійський снаряд, яку активно — і гучно — ремонтувала група робітників.\n«Тамрате, я тебе ледве чую в цьому пекельному шумі!» — роздратовано відповів віслюк. «Але якщо ти запитав про мій голос, то дарма. Я не скажу».\n«Ой, та ну, я тобі свій скажу», — з усмішкою промовив Тамрат Павіт. «Я, звісно ж, голосую за республіку! Зрештою, саме тому я і приєднався до цієї революції».\n«А й справді, за що голосує ЦЕЙ віслюк?» — запитав кіт позаду них. Раптом багатьом іншим у черзі теж стало цікаво.\nВіслюк Енкара насупився. «Гей, я не воював за Сеннахеріба! Припиніть так на мене витріщатися. Я високопоставлений офіцер армії Республіки!»\n«То ти голосуєш за республіку, так?» — запитав Тамрат із ще ширшою усмішкою.\n«Мій голос не ваша справа! Зрештою, бюлетені мають бути таємними».\n«До біса республіку!» — пробурчав худий старий кіт, який ледве стояв на одній нозі, спираючись на палицю. «Вони не принесли нічого, крім хаосу. Нам потрібно повернути монархію, щоб відновити мир і порядок!»\nЕнкара люто подивився на нього. «Слідкуй за своїм язиком, багато хоробрих бійців віддали свої життя, щоб повалити її!»\n«Отже, ти ТАКОЖ голосуєш за республіку!» — сказав Тамрат і засміявся.\n«Ну, а я втратив ногу, щоб відновити її!» — відповів кіт без ноги і підняв у повітря стиснуту лапу. «Хай живе монархія!»\nТамрат, усе ще усміхаючись, поступився своїм місцем у черзі, щоб стати між Енкарою та котом-ветераном. «А тепер заспокойтеся ви двоє. Референдум проводиться саме для вирішення цієї суперечки. Давайте всі просто віддамо свої голоси і подивимося на результати, добре, друзі?»"
 abyssinia.186.a:0 "РЕСПУБЛІКА отримує більшість голосів!"
 abyssinia.186.b:0 "МОНАРХІЯ отримує більшість голосів!"
 
 #Організація референдуму відразу після громадянської війни була нелегким завданням. Бюрократія перехідного уряду була ледве функціональною та перевантаженою простими, але титанічними зусиллями з підтримки життя цивільного населення. Принаймні, Абіссинський патріотичний фронт запропонував допомогу з голосуванням. Їхня присутність на виборчих дільницях допомогла легітимізувати голосування, оскільки вони були популярними в багатьох місцях по всій Абіссинії. Однак їхня організація не досягла півдня, який був спустошений кампанією руйнування Сеннахеріба. Тому південні провінції майже не брали участі в голосуванні.\n\nСам процес голосування пройшов здебільшого без проблем, хоча між республіканцями та монархістами серед населення залишалася напруженість, особливо в містах. З'являлися спорадичні протести, хоча насильство було рідкісним, оскільки всі були виснажені двома недавніми громадянськими війнами. Спостерігачі як від Патріотичного фронту, так і від Об'єднаного республіканського фронту намагалися гарантувати, що голосування не буде сфальсифіковано на користь жодної зі сторін. Ті нечисленні звинувачення і суперечки, що виникали, зазвичай вирішувалися мирним шляхом.\n\nПитання, поставлене виборцям, було простим: "1. РЕСПУБЛІКА чи 2. МОНАРХІЯ?", із супровідними символами зірки та корони, щоб зробити зміст зрозумілим для неписьменних виборців. Після кількох днів голосування та підрахунку бюлетенів Шарп Спір, як виконувачка обов'язків глави держави, мала оголосити результати перехідному уряду.
 
 abyssinia.187.t:0 "Перший громадянин"
 abyssinia.187.d:0 "Сотні котів стовпилися в безкоштовній їдальні, де безплатно роздавали м'ясне рагу. Шарп Спір дивилася на це видовище з усмішкою на губах.\nФад Аль-Касаар стояв поруч із нею. «Я мало що розумію в політиці, але мені здається, що завдяки цьому вони проголосують за тебе на майбутніх виборах».\nУсмішка Спір швидко змінилася на незадоволений вираз обличчя. «Я роблю це не заради голосів, Фаде. Ти це знаєш. Я роблю це, щоб спробувати виправити безлад, який я спричинила».\nТепер настала черга Фада усміхатися. «Знаю. Я тебе дражню. Крім того, я майже впевнений, що більшість із них все одно проголосувала б за тебе. Не те щоб у них був якийсь інший хороший вибір. Я здивований, що Патріот не балотується на посаду Першого громадянина».\n«Це турбує. Не Патріот, я маю на увазі. Але бідні починають бачити в мені когось більшого за життя. Я здобула дві військові перемоги за короткий проміжок часу, і вони досі вірять моїм обіцянкам. Вони починають забувати, що я просто якась там кобила».\n«Це має зробити твоє захоплення влади більш плавним», — сказав Фад звабливим тоном.\n«Ой, та помовч», — сказала Спір, насправді не ображаючись. «Поправка до конституції про створення посади Першого громадянина об'єднує главу держави та главу уряду в одну особу, так, але я не проти, щоб цю посаду обійняв будь-хто інший. Я просто втомилася від усіх цих суперечок у перехідному уряді».\nФад знизав плечима. «Гадаю, тепер тобі доведеться мати справу із суперечками в парламенті, щойно його оберуть. Хіба ти не сумуєш за домом?»\nВона зітхнула. «Тепер це мій дім. Мені просто... доведеться до всього цього звикнути»."
 abyssinia.187.a:0 "Вона лише перша серед рівних."
 
 #Після референдуму перехідний уряд без проблем вніс поправки до конституції, оскільки вона залишилася переважно такою самою. Проте глава держави, Шарп Спір, наполягла на створенні сильної виконавчої влади у формі глави держави та глави уряду, об'єднаних в одній посаді. Частково це було поступкою монархістам, які залишилися в країні, особливо тим, хто належав до Патріотичного фронту. Але вона також наголосила на необхідності розподілу влади, за якого існують і парламент, і судова гілка. У такий спосіб вона намагалася заспокоїти тих, хто звинувачував її у спробі захопити владу.\n\nТак, вже через два тижні після референдуму абіссинці знову пішли на виборчі дільниці, цього разу, щоб уперше обрати Першого громадянина. Будь-хто з достатньою підтримкою мав право стати кандидатом, хоча на той час Шарп Спір завдяки своїм військовим успіхам перетворилася на легендарну постать. Вона не лише обіцяла надавати перевагу робітникам і селянам над елітами, а й її лідерство стало гарантією безпеки. Тому нікого не здивувало, коли вона здобула понад 73% голосів.
 
 abyssinia.188.t:0 "Привид голоду"
 abyssinia.188.d:0 "Двоє котячих солдатів-республіканців, обидва з червоними пов'язками на руках, ішли в патруль повз пасовище. Одна з них подивилася на поле і побачила десятки гниючих коров'ячих трупів. «Це зробили війська Сеннахеріба?» — запитала вона у свого напарника.\nВін кивнув. «Безсумнівно. Вони вбивали худобу всюди на півдні».\n«Але... навіщо? Вони ж не комбатанти!»\nЗнизавши плечима, він відповів: «Віслюки не їдять м'яса. Вони воліють позбавити котяче населення джерела їжі, ніж отримати від корів будь-яку іншу користь. Це план узяти нас змором, створивши землю, де зможуть вижити лише травоїдні».\nВона звузила очі. «Ось віслюки. Хіба вони не знають, що в усій Абіссинії продовольча криза? А не лише на тих землях, які вони називають "своїми"».\nНа його губах з'явилася болісна усмішка. «Отож-бо й воно. Їм байдуже. Це колективне покарання за злочини наших предків. Ці націоналісти вважають усіх абіссинців ворогами, тому вони не зранять і сльозинки, якщо кошеня помре з голоду. Або сотня кошенят, якщо на те пішло».\n«Я рада, що маю багнет», — пробурмотіла вона.\n«Хочеш опуститися до їхнього рівня? Стримай себе і дозволь правосуддю йти своїм шляхом. Ми повинні гордо демонструвати свою мораль як солдати Вільної Республіки»."
 abyssinia.188.a:0 "Ще більше страждань, які треба витримати."
 
 abyssinia.189.t:0 "Повернення нявгуса..?"
 abyssinia.189.d:0 "«Знаєте... я була цілком готова до того, що ця зустріч буде незручною», — сказала Шарп Спір із нервовим смішком, намагаючись розрядити напружену атмосферу.\nҐомез, який похмуро зсутулився на протилежному кінці столу, нічого не сказав і порожнім поглядом дивився вниз.\n«Тож е-е, будь ласка, не робіть її ще більш незручною...»\nНа його обличчі нарешті з'явився якийсь рух. На жаль, це був скоріше пасивно-агресивний вираз: усмішка, з-під якої виднілися гострі ікла. «Знаєте, я маю бути вдячний за вашу маленьку "революцію". З кількох причин, насправді. По-перше, я зміг відчути цивільне життя, вільне від зобов'язань. Хоча воно все одно було досить стресовим. По-друге, я побачив, як хтось інший виявився ще гіршим правителем, ніж я, залишивши Абіссинію в ще гіршому стані».\nСпір здригнулася і опустила вуха. «Т-так, я знаю... нема за що, напевно». Вона глибоко вдихнула, і її вуха випросталися. «Але я не збираюся здаватися. Тепер народ вирішив, що хоче повернути монархію, і я вірю, що ми обоє хочемо поважати його волю».\nЯкусь мить Ґомез просто пильно дивився на неї. «Знаєте, мені подобається ваша рішучість. Це те, чого мені бракувало. Ви опинилися в ямі, глибшій за ту, в якій був я, і все ж продовжуєте намагатися з неї вилізти...»\n«Тож ви згодні знову стати нявгусом?»\nВін сухо засміявся. «Ви втрачаєте терпіння». Потім знизав плечима. «Звісно, з того, що я читав, ви просто хочете, щоб я був безсилою номінальною фігурою. Немає влади — немає відповідальності, що мене цілком влаштовує».\nСпір розслабилася, ніби з її плечей щойно звалився величезний тягар. «Дякую».\n«...І ще одне», — сказав Ґомез, нервово потираючи лапи. «Ви ж новий "головний міністр", так? То ви подбаєте про те, щоб я отримував достатньо державних коштів для своїх... особистих потреб?»\nВона люто глянула на нього. «Так, ви отримаєте гроші на свою опіумну залежність, не хвилюйтеся. Ваша колишня дружина заздалегідь повідомила мені про це»."
 abyssinia.189.a:0 "Ми впевнені, що цей нявгус проживе довго?"
 
 abyssinia.190.t:0 "Нова нявгіст"
 abyssinia.190.d:0 "Мортіша Аддісу взяла корону, яку їй запропонували, і без зайвого пафосу поклала її собі на голову. «Отже, тепер я офіційно правляча нявгіст?»\nШарп Спір кивнула, поки коти, що брали участь у церемонії коронації, почали розходитися. «Саме так».\n«Хоча я читала ту вашу конституцію. Ви справді просто хотіли, щоб я повернулася і була церемоніальною фігурою без жодної реальної влади?»\nФіолетова поні знизала плечима. «Гей, це Патріотичний фронт хотів вашого повернення, а не я. Мої початкові плани не передбачали жодних монархів».\nМортіша примружила свої жовті очі. «Розумію. А ви б не хотіли змінити свою думку?»\nСпір здалася ображеною цим запитанням. «Що ви маєте на увазі?»\n«Я знаю, що ви практично зробили себе главою уряду, домігшись обрання на посаду "головного міністра". У вас, напевно, є влада трохи змінити конституцію і дати мені більше обов'язків, чи не так?»\n«Я, е-е, технічно, так, але—»\n«Тоді зробіть це, або замість мене на трон зійде Кітріна», — зажадала Мортіша. «Я теж хочу допомогти абіссинському народу. Не лише ви».\nЗітхнувши, Спір відповіла: «Ох, нехай. Але майбутньому парламенту це не сподобається...»\n«Вірю, що ви зможете їх переконати. Ви ж не хочете мати справу зі скандальним зреченням, правда?»\nТепер настала черга кобили мружити свої блакитні очі. «Ні. Є багато речей, яких я не хочу. Але цього разу я поступлюся, бо довіряю вам. Не змушуйте мене шкодувати про це».\nМортіша усміхнулася. «Не змушу. Не хвилюйся, маленька поні»."
 abyssinia.190.a:0 "Хай живе нявгіст!"
 
 abyssinia.191.t:0 "Імператриця абіссинців"
 abyssinia.191.d:0 "«Я хочу, щоб це пройшло швидко і з мінімальним пафосом», — пояснила Шарп Спір котячому слузі. «Зрозуміло?»\nКіт кивнув, вклонився і вийшов з кімнати.\n«Знаєш, — сказав Фад Аль-Касаар, який стояв поруч, — ти могла б просто відмовитися від титулу після обрання».\n«І дозволити Кітріні зайняти трон? Краще я помру», — відповіла вона і попрямувала до тронної зали в колишньому королівському палаці довгими та гучними кроками.\nФад пішов за нею. «Невже ти не могла просто знайти маріонеткового нявгуса чи нявгіст? Якогось нешкідливого Пазуромона, родича покійних Ґомеза та Мортіші».\n«Я знаю, що ти не хочеш, щоб я це робила, бо сама не в захваті від цього. Але справа не в моєму щасті. Я маю це зробити. Кітріна, безумовно, є найбільш легітимною претенденткою на титул нявгіст, тому мені довелося позбутися його і створити нову виборну монархію».\nФад зітхнув. «Як скажеш, нґісте нявгест».\nСпір різко зупинилася і обернулася, щоб люто поглянути на нього. «Будь ласка, не називай мене так. Навіть жартома».\nЖеребець здивовано подивився на неї і опустив голову. «Вибач, Спір. Я не хотів тебе образити, але тобі не здається, що новий титул — це якось... занадто?»\n«Маєш кращі ідеї? Я навіть не можу вимовити половину абіссинських титулів. Сподіваюся, він змусить громадян думати про імператорів Карфінської Республіки, а не про грифонських кайзерів. Зрештою, перехідний уряд його схвалив».\n«Ти могла б обрати титул, з яким тобі комфортно...»\nСпір роздратовано видихнула і потерла лоба копитом. «Я знаю, Фаде. Дякую, що дбаєш про мене, справді. Але давай не будемо зараз про це говорити. Мені треба відвідати безглузду церемонію коронації».\nВін покірно кивнув, а потім обійняв її."
 abyssinia.191.a:0 "Вона обійняла його у відповідь."
 
 abyssinia.192.t:0 "Розпуск Об'єднаного республіканського фронту"
 abyssinia.192.d:0 "Атмосфера в конференц-залі була напруженою, поки Шарп Спір намагалася зберегти самовладання перед своїми «союзниками».\n«Ми продовжуватимемо виступати за республіканську форму правління», — сказав найстаріший кіт у кімнаті скрипучим, але рішучим голосом. «Цілком можливо, що Патріотичний фронт сфальсифікував референдум, щоб отримати вигідний результат».\n«Весь договір із ними був зрадою революції!» — вигукнув кіт в окулярах. «Поверненням до капіталістично-феодальної баронської розбійничої держави! Знущанням з усього, за що стояв Карамель Маркс!»\n«Взагалі-то, — сказала Спір із вимушеною і майже глузливою усмішкою, — Карамель Маркс спочатку виступав за реформи в межах еквестрійської монархії, а не за повне її повалення».\nЗдавалося, це лише ще більше образило котів. Літній республіканець похитав головою. «Об'єднаний республіканський фронт втратив свою мету, якщо його провідна фігура тепер толерує монархію. Тому я запропонував, щоб Народна ліга та Абіссинська соціалістична партія відокремилися від ОРФ».\n«Ми погоджуємося з цією пропозицією», — сказав кіт в окулярах, і інші коти в кімнаті закивали.\nСамотня поні втомлено зітхнула. «Я цього очікувала. Що ж, нехай буде так. Я офіційно розпускаю Об'єднаний республіканський фронт. Однак я маю намір створити власну політичну організацію, Революційний визвольний рух».\n«Не може бути справжнього визволення за монархії!» — сердито вигукнув один із котів.\nНе перестаючи усміхатися, Спір звузила очі і сказала:"
 abyssinia.192.a:0 "«Це ми ще побачимо»."
 
 abyssinia.193.t:0 "Нова загроза"
 abyssinia.193.d:0 "«Запевняю вас, ці коти не мають нічого спільного з вашим рухом», — пояснив кіт у пустельному вбранні Шарп Спір.\nВона потерла лоба копитом і застогнала. «Гадаю, мені доведеться повірити вам на слово... у вас не було перебіжчиків з Патріотичного фронту?»\nКіт неохоче кивнув. «Кілька, після того, як результати референдуму були оприлюднені. Але офіційно вони не утворили жодної відколотої фракції. Цей рух опору не має до нас жодного стосунку, клянуся Бааст».\n«Я вам вірю, вірю», — відповіла вона з роздратуванням. «У мене є власні підозри щодо того, кого звинувачувати. Я намагалася отримувати постійний потік розвідданих про місцеперебування Кітріни Теббі. Вона втекла з країни під час першої революції, але повернулася кілька місяців тому. Віднедавна я повністю втратила її слід».\n«Ви вважаєте, що вона створила підпільну повстанську організацію з метою відновлення монархії?»\nКобила знизала плечима. «Це єдине, що спадає на думку, адже я вірю, що ви кажете правду».\n«Патріотичний фронт не визнає легітимності династії Кітве. Я повідомлю Патріота. Він допоможе вашим військам. Разом ми зможемо знайти Кітріну і покласти край її планам».\nСпір видавила з себе ввічливу усмішку. «Я буду вдячна. Мої сили і так розтягнуті»."
 abyssinia.193.a:0 "Ворог мого ворога — мій друг."
 
 abyssinia.194.t:0 "Посібник з абіссинських імен"
 abyssinia.194.d:0 "На відміну від деяких культур, в Абіссинії немає прізвищ. Кожен кіт має два імені: особисте ім'я, яке дається кошенятам при народженні, та по батькові/по матері. Нащадки чоловічої статі отримують по батькові (особисте ім'я батька), тоді як нащадки жіночої статі отримують по матері (особисте ім'я матері). Це означає, що відстежити родовід лише за іменем складно. Крім того, це означає, що деякі коти можуть мати «подвійні імена», коли особисте ім'я збігається з іменем одного з батьків, хоча це трапляється рідко.\n\nНаведемо приклад: кіт на ім'я Меволде Гарфілд одружується з кішкою на ім'я Грімалкін Арлін. У них народжується двоє кошенят: хлопчик і дівчинка. Хлопчику вони дають особисте ім'я Нермал, а дівчинці — Гіссай. Таким чином, повне ім'я хлопчика тепер Нермал Меволде, а дівчинка відома як Гіссай Грімалкін.\n\nВажливо зазначити, що концепція сімей і династій в абіссинській культурі все ще існує. Однак лише знатні та королівські родини мають окремі назви, які ніколи не включаються до повного імені особи. Наприклад, можна сказати «Ґомез Нявконнен з Дому Пазуромонів», але назвати його «Ґомез Пазуромон» буде помилкою і дипломатичним конфузом, якого часто припускаються вінґбардські дипломати, не знайомі з абіссинською культурою.\n\nЗа традицією імена реєструють жерці-баастити і зберігають їх у храмових архівах. Однак розширення державної бюрократії призвело до того, що тепер держава сама веде облік імен своїх громадян."
 abyssinia.194.a:0 "Гм. Це багато що пояснює."
 
 abyssinia.195.t:0 "Перші абіссинські вибори"
 abyssinia.195.d:0 "«Чи туди я потрапив?» — запитав кіт-селянин у лахмітті в зебри у військовій формі.\nТой насупився. «Якщо ви прийшли по їжу, то так, пункт видачі тут», — сказав він, розмовляючи абіссинською з сильним акцентом.\nБідний кіт кивнув і усміхнувся. «Дякую».\n«Зачекайте хвилинку», — сказала зебра. «Ця будівля також функціонує як виборча дільниця. Чи не бажаєте ви проголосувати на парламентських виборах?»\nУсмішка кота трохи згасла. «Вибори? Гм, я чув розмови про це, хоча не дуже розумію, для чого вони. Ви, чотириногі, повісили якийсь плакат у моєму селі, але я не вмію читати».\n«Все гаразд. Неписьменні коти теж мають право голосу. У вас є документи, що посвідчують особу?»\n«...Що-що?»\n«Нічого страшного, вам просто доведеться назвати мені своє ім'я, вік, місце проживання і заприсягтися, що ви кажете правду».\nРозгублений кіт похитав головою. «Я прийшов сюди, щоб дістати їжі для моєї голодної родини...»\n«Маю зазначити, що через нестачу запасів діє квота: одна солона рибина на особу. Однак, проголосувавши, ви можете отримати ще дві рибини».\nСелянин якусь мить мовчав. Потім він сказав: «Гаразд, нехай. Як мені голосувати?»\n«Працівники виборчої дільниці допоможуть вам, оскільки ви не вмієте читати. Але якщо просто, ви обираєте кандидата, якого хотіли б бачити своїм представником».\n«Представником... тобто котом, яка представляє мене? Дуже добре. Але що, як я не знайомий з жодним із них?»\n«Ви можете просто вибрати на основі партійної приналежності».\n«Партія...» — брови селянина зсунулися. «Усе це дуже заплутано. Хіба не може благословенний Бааст Нявгус чи Нявгіст просто вирішувати все самостійно?»\nЗебра виглядав збентеженим. «Слухайте, а що як ви отримаєте ще одну рибину, якщо проголосуєте? Я попрошу їх дати її вам. Просто попросіть персонал про допомогу, коли будете голосувати, гаразд?»"
 abyssinia.195.a:0 "«Чотири рибини?! Клянуся Бааст, я зроблю це!»"
 
 abyssinia.196.t:0 "Парламентські вибори [GetYear] року"
 abyssinia.196.d:0 "Знову настав час для абіссинських громадян голосувати за своїх представників у парламенті. Коти, поні, зебри, коні та віслюки по всій країні попрямували до найближчих виборчих дільниць, щоб віддати свої голоси. Кожна партія вела активну передвиборчу кампанію, намагаючись отримати якомога більше голосів. Проте виборці ухвалювали рішення, ґрунтуючись на подіях попередніх трьох років, і мало хто був готовий змінити свою думку в останню хвилину.\n\nПісля закриття виборчих дільниць усі розійшлися по домівках, окрім тих, хто мав незавидне завдання не спати всю ніч, підраховуючи бюлетені. Наступного дня вони оголосять результати громадськості."
 abyssinia.196.a:0 "Що ж, давайте поглянемо на результати..."
 
 abyssinia.198.t:0 "Відплата зраднику"
 abyssinia.198.d:0 "Верховний суд, члени якого нещодавно були призначені самою Шарп Спір, сидів у тиші, спостерігаючи, як їхня очільниця розмовляє з підсудним.\n«Знаєш, Сеннахерібе, я б дуже хотіла сказати, що не злюся, а лише розчарована», — пояснювала Спір віслюку, її обличчя напружилося під вагою емоцій. «І я б так і сказала зараз, якби ти просто дезертирував або навіть приєднався до Патріотичного фронту. Я б навіть подумала про те, щоб помилувати тебе». Нарешті греблю прорвало, і її обличчя люто скривилося від чистого гніву. «АЛЕ НІ! ТИ ВИРІШИВ СТАТИ МАСОВИМ УБИВЦЕЮ!»\nСлина полетіла в обличчя Сеннахерібу. Його вираз легкого роздратування ледве змінився, і він продовжував мовчки дивитися на неї.\n«Міс Спір, — сказав голова суду, — будь ласка, зберігайте спокій під час офіційного засідання. Немає потреби піддаватися емоц—»\nСпір різко розвернулася, тепер спрямовуючи свій гнів на голову суду. «Скажіть це родичам тих, кого він убив!» Навіть не дочекавшись відповіді, вона повернулася до віслюка. «Я читала звіти з допитів твоїх офіцерів. Знаєш, що вони завжди кажуть? "Я просто виконував накази". І чиї це були накази? ЧИЇ?!»\nСеннахеріб нічого не відповів.\n«НАЗВИ ІМ'Я!» — крикнула Спір.\nСеннахеріб нічого не відповів.\nСпір більше не могла зберігати жорсткий вигляд, коли з її очей потекли сльози. «Це моя провина. Моя провина, що я взагалі довірилася тобі. Я тебе ненавиджу». Схлипуючи, вона попрямувала до виходу. «Головуючий суддя, можете продовжувати», — пробурмотіла вона. «Я закінчила».\nДвері гучно зачинилися, залишивши по собі шоковану залу суду, де чулися перешіптування. Сеннахеріб нічого не відповів.\n«Гадаю, ми справді можемо продовжувати», — сказав голова суду, поправляючи окуляри. «Містере Сеннахерібе, докази ваших злочинів неспростовні, особливо від Надзвичайної державної комісії та близько сотні свідків, які дали свідчення. Контраргументи вашого адвоката... мало що змінили в думці сторони обвинувачення чи суддів. Таким чином, суд виніс вердикт. Цим ми засуджуємо вас до...»"
 abyssinia.198.a:0 "«...Смерті»."
 abyssinia.198.b:0 "«...Вигнання»."
 abyssinia.198.c:0 "«...Довічного ув'язнення»."
 
 abyssinia.199.t:0 "Біженець із півночі"
 abyssinia.199.d:0 "Нещодавно Нео-Асстирійська держава, невизнана країна на півдні Абіссинії, зазнала поразки. Її керівництво було заарештоване абіссинським урядом, а потім притягнуте до відповідальності верховним судом. Тепер лідера колишньої віслючої держави, Сеннахеріба, засуджено до вигнання. Він вирішив повернутися на батьківщину, тому зараз він прибув до нашої країни.\n\nВін не має жодного громадянства, а в минулому був рабом. Проте його доблесне керівництво та військовий талант були визнані. Багато діячів у нашому уряді звернулися до [Root.GetLeader] з проханням не лише надати йому громадянство, а й зробити його офіцером в армії на знак визнання його зусиль заради ослиного роду. Дехто протестував, називаючи його небезпечним радикалом і злочинцем, але зрештою пропозицію було схвалено."
 abyssinia.199.a:0 "Ласкаво просимо додому."
 
 abyssinia.200.t:0 "Покласти край стражданням"
 abyssinia.200.d:0 "Неподалік Фелібели досі височіла велика скеля над урвищем, абсолютно незмінна з того часу, як Ґомез бачив її востаннє. Впевненими кроками він попрямував до урвища. Він піднявся на вершину скелі, а потім без вагань сів. Вдалині сідало сонце, забарвлюючи кам'янисту долину внизу в яскраві помаранчеві кольори. Колись сонце також зайде востаннє.\nВін глибоко вдихнув і заплющив очі. Він також колись зробить свій останній подих. Літописи, що записують його правління, його помилки та його тріумфи, одного дня перетворяться на пил. Абіссинія також одного дня припинить своє існування, коли будуть вичерпані дев'ять життів кожного кота. Абіссинська раса також колись вимре. Усе було скороминущим і тимчасовим. Усе підлягало змінам.\n«Щоб стати всім, треба спочатку стати нічим».\nЗгадавши ці слова Бааст, Ґомез подумав про минуле. Король Шторм зруйнував його королівство і забрав багатство його родини, дозволивши вінґбардцям і рабам скористатися його слабкістю. Пригнічений, він рятувався гріховними вчинками, чуттєвими задоволеннями від речовин і навіть виношував ідею уникнути страждань через самознищення. Проте це лише погіршило ситуацію. Страждання призвело до прихильності, прихильність призвела до страждань. Тоді він ще не знав, що лише фізичний біль може викликати неминучі страждання. Всі інші форми страждань залежали від психічного стану та емоцій.\nВін розплющив очі. Йому треба було навчитися відпускати. Якби його дружина померла завтра, наприклад, він міг би сумувати, але йому довелося б це прийняти. Одна справа любити когось, і зовсім інша — чіплятися за них вічно. Якби Пантера згоріла завтра, йому б просто довелося відбудувати її, як мурахи відбудовують свої мурашники після повені. Його невдачі та біль були такими ж тимчасовими, як його успіхи та задоволення. І найголовніше, він не повинен завжди звинувачувати себе у своїх нещастях. Потік води повинен був загасити полум'я.\nЙому належало пройти довгий шлях. Але, принаймні, він відчував, що перебуває на правильному шляху. Після недовгої медитації, коли він підвівся зі скелі, над ним засяяв місяць. «Дякую, Текле», — пробурмотів він собі під ніс, а потім відвернувся і пішов."
 abyssinia.200.a:0 "Корінь страждань — це прихильність."
 
 abyssinia.201.t:0 "Тріщить по швах"
 abyssinia.201.d:0 "Атмосфера в конференц-залі була напруженою, поки Шарп Спір намагалася зберегти самовладання перед своїми «союзниками».\n«Ми виграли референдум», — сказав найстаріший кіт у кімнаті скрипучим, але рішучим голосом. «Абіссинський патріотичний фронт має визнати поразку. Я пропоную відмовити їм у будь-якій посаді в парламенті».\n«Весь договір із ними був зрадою революції!» — сказав кіт в окулярах. «Розірвіть цей нікчемний папірець. АПФ продовжує існувати лише тому, що ми дозволяємо йому існувати. Давайте виріжемо цю капіталістично-феодальну пухлину з абіссинського тіла!»\n«Ми не будемо порушувати договір, який підписали», — спокійно, але суворо сказала Спір.\n«Той, який підписала ТИ!» — вигукнув кіт в окулярах і вказав на неї обвинувальним кігтем.\nСпокій поні швидко випарувався, і вона поклала копита на стіл. «Ви думаєте, недостатньо абіссинців загинуло? Маєте ще масові поховання, які треба заповнити? Договір мав гарантувати мир і стабільність. Я б об'єдналася з будь-ким, щоб чинити правильно, і ні з ким, щоб чинити зло!»\nПерш ніж кіт-комуніст встиг заперечити, заговорив кіт-республіканець. «У неї є слушна думка. Тоді не будемо заходити надто далеко. Але попри все, я вважаю, що ми повинні тримати їх на відстані витягнутої руки, навіть якщо їм якось вдасться виграти вибори. Патріоту не можна довіряти. Нам слід уникати будь-якої співпраці з ними».\n«...Це вимога?» — запитала Спір.\n«Звучить надто різко», — відповів він. «Скоріше... прохання. Але якщо ви не можете виконати наше скромне прохання, прийняти цю пропозицію компромісу, тоді я не бачу, як Об'єднаний республіканський фронт зможе залишатися єдиним».\nІз важким зітханням Спір відповіла:"
 abyssinia.201.a:0 "«Тоді він буде розділений»."
 abyssinia.201.b:0 "«Я приймаю це прохання»."
 
 abyssinia.202.t:0 "Провінційні дебати"
 abyssinia.202.d:0 "Шарп Спір неуважно стукала копитом по своїй трибуні, чекаючи, поки стихнуть суперечки в парламенті. «Я справді думала, що це буде легко проштовхнути через парламент», — гірко пробурмотіла вона собі під ніс. Коли стало тихо, вона підбадьорилася і нарешті звернула увагу.\n«Міс Спір, — голосно і чітко сказав представник котів, підвівшись зі свого місця, — АПФ вважає, що немає потреби стирати традиційні межі провінцій. Вони не просто репрезентують володіння знаті, а й є культурними та географічними кордонами. Хоча ми не маємо нічого проти того, щоб провінційні ради обиралися демократичним шляхом, коригування цих багатовікових кордонів провінцій спричинить лише безлад».\nСуперечка загрожувала спалахнути знову, коли інша представниця також підвелася, вишкіривши ікла. «АПФ просто хоче використати це на свою користь! Їхня база підтримки знаходиться в сільській місцевості, і, зберігаючи сільські райони поділеними на маленькі провінції, вони зможуть домінувати в місцевій політиці!»\n«Зараз не ваша черга говорити», — зауважила Спір, а потім повернулася до представника АПФ. «Вам є що додати?»\n«Дозвольте сказати, що чим на менше провінцій поділена Абіссинія, тим менше провінційні ради будуть представляти місцеві інтереси. Хіба мета вашої партії не в тому, щоб зробити Абіссинію більш демократичною та рівноправною?»\nВона задумливо кивнула. «Дякую. Тому я перегляну свою пропозицію. Це засідання парламенту оголошується закритим»."
 abyssinia.202.a:0 "Чим менше провінцій, тим легше керувати країною."
 abyssinia.202.b:0 "Компроміс між двома крайнощами працює найкраще."
 abyssinia.202.c:0 "Тоді давайте не перекроювати жодних кордонів."
 
 abyssinia.203.t:0 "Чому соціалізм?"
 abyssinia.203.d:0 "Фад і Спір лежали з підібганими під себе ногами, тихо читаючи книги. Поки очі Спір швидко бігали рядками, очі Фада рухалися повільніше, оскільки він намагався розшифрувати містичні символи, широко відомі як літери. Невдовзі він втомлено зітхнув. «Читання виснажує. Можна я трохи перепочину?»\nСпір тепло всміхнулася йому. «Звичайно». Вона глянула на його розгорнуту книгу, поки він підводився, щоб взяти кави. «Ти сьогодні зробив хороші успіхи. Три сторінки за годину! Чим більше ти читатимеш, тим менш виснажливим це буде».\n«Сподіваюся, ти маєш рацію», — сказав Фад, а потім налив чашку кави, тримаючи її в роті.\nСпір також зробила перерву, поклавши закладку на відкриті сторінки і закривши книгу. «Для мене це зовсім не втомливо. Навіть розслабляє. Приємно відпочити від усього цього політиканства».\nФад повернувся, тримаючи копитом тацю з чашкою гарячої кави і кухлем медового вина. Простягаючи Спір кухоль, він помітив назву книги, яку вона читала, хоча йому довелося докласти зусиль, щоб прочитати її. «"Капітал. Політична економія Еквестрії"... гм, хіба це не написала та поні? Карл Марк чи якось так?»\nСпір кивнула, попиваючи вино. «Так, абіссинські комуністи тільки й говорять про неї».\n«Гм, зрозуміло...» Фад знову ліг і зробив ковток зі своєї чашки. «Знаєш, Спір, у чому взагалі привабливість цієї "соціалістичної" штуки? Я думав, ти була б щаслива просто покласти край рабству в Абіссинії і на цьому закінчити».\n«Ну, я хотіла забезпечити остаточне викорінення будь-яких форм рабства в Абіссинії, і незабаром я зрозуміла, що для цього потрібно з'ясувати, чому рабство існувало і як я можу йому повністю запобігти. Незадовго до зустрічі з тобою я зв'язалася з республіканськими та соціалістичними повстанцями. Я багато чого в них навчилася. Вони виступали проти монархії, феодалізму та рабства і бачили їх взаємопов'язаними. Всі три ґрунтуються на експлуатації невільних селян і рабів. Відповіддю є розширення прав і можливостей мас, надання їм контролю над політикою та економікою, усунення вкоріненої еліти».\n«А-а, е-е, ясно. Але... Я чув, що соціалізм — це рабство, усе є суспільною власністю, і що в Сталліонграді жоден кі- тобто жодна поні не володіє своїм одягом чи навіть зубною щіткою?»\nСпір насупилася. «Що..? Це нісенітниця, хоча в Сталліонграді вистачає своїх проблем. Я не збираюся бути прославленим бандитом чи нав'язувати комусь свої ідеали. Але... раби були власністю, я була власністю. І я, хай йому Тартар, більше ніколи не хочу, щоб з будь-ким поводилися як із власністю!» Вона підвелася і почала виголошувати промову. «Немає різниці, хто є власником: феодал, бізнесмен чи уряд. Кожна істота заслуговує на свободу жити без роботи, якщо вона того бажає, і повністю контролювати свою власну долю. Я борець не лише за соціалізм, а й рівною мірою за свободу! Інші можуть пожертвувати демократією заради соціалізму або навпаки, але я роблю все можливе, щоб уникнути такої долі».\nФад дивився на неї, здивований тим, наскільки емоційною вона стала. «Ого. Це... ти завжди була кобилою ідеалів, хех. На жаль, мені здається, я зрозумів лише половину з цього»."
 abyssinia.203.a:0 "Спір закотила очі, а потім засміялася."
 
 abyssinia.204.t:0 "День пам'яті"
 abyssinia.204.d:0 "[Root.GetAdjective]ий прапор майорів на вітрі, коли сонце сідало за далекі гори, фарбуючи небо в палаючий помаранчевий колір. Шарп Спір і Фад Аль-Касаар йшли переповненим військовим кладовищем для абіссинських котів з безліччю рядів різьблених надгробків, і рушили стежкою до неабіссинського кладовища, яке було значно різноманітнішим. Тут були поховані віслюки, поні, коні та зебри, які загинули під час громадянських війн.\n\nСпір і Фад зупинилися перед невеликим могильним курганом. Фіолетова кобила глибоко вдихнула, збираючись із силами, щоб подивитися на нього, тоді як Фад поклав їй на плече підбадьорливе копито. «Минув рік з того часу, як усе закінчилося», — пробурмотіла Спір. «Я знаю, що ти померла після того, як бої припинилися, але рана, яка в підсумку вбила тебе, була спричинена конфліктом. Опосередковано я несу відповідальність за твою смерть. Принаймні... принаймні я встигла попросити вибачення, поки не стало занадто пізно». Спір спробувала всміхнутися, але її губи затремтіли, і вона розплакалася. «Мені шкода, Бонту, мені досі шкода...» — гірко прошепотіла вона. Фад обійняв її.\n\nПісля того як вона заспокоїлася, жеребець дістав предмети, необхідні для ритуалу вшанування, що походить із батьківщини Бонту. Разом вони окропили могильний курган пальмовою олією та сіллю. У цю мить з півдня подув сильний порив вітру. Спір повернулася йому назустріч, а потім знову усміхнулася. «Це, мабуть, збіг, але... я хочу вірити, що це була вона»."
 abyssinia.204.a:0 "Нехай Абіссинія більше ніколи не зазнає таких страждань."
 
 abyssinia.205.t:0 "[From.GetNameDefCap] засуджує нас!"
 abyssinia.205.d:0 "Ми отримали дипломатичне комюніке від [From.GetNameDef], які нещодавно закінчили свою громадянську війну проти реакційної контрреволюції. Однак, на превелике розчарування, вони публічно засудили нас, попереджаючи світ, що нам не можна довіряти. Наші контакти в Абіссинії в межах Абіссинської соціалістичної партії раніше попереджали нас, що таке може статися. Вони повідомили нам, що лідерка революції, Шарп Спір, скасувала багато з найбільш радикальних політик, впроваджених до контрреволюції.\n\nШкода, що перемога абіссинських соціалістів виявилася пірровою, оскільки їхнє керівництво вирішило піти на компроміс з фашистами та реакціонерами. Втім, Абіссинія не є для нас великою проблемою. Ми просто спостерігатимемо здалеку, як революція буде повністю зведена нанівець через ідіотизм колишнього революційного уряду."
 abyssinia.205.a:0 "Вони все одно зрадники революції, кому яке діло?"
 
 abyssinia.206.t:0 "Кінець кампанії з ліквідації неписьменності"
 abyssinia.206.d:0 "Рудий абіссинський кіт у формі та з рюкзаком вийшов зі свого колишнього будинку. Його одразу ж зупинила зграйка усміхнених кошенят.\n«Дякуємо, що вчили нас, містере Гоббс!» — вигукнули вони хором. «Ми принесли вам подарунок на знак подяки!» Перш ніж він встиг відреагувати, кошенята подали великий шматок тканини, на якому вони неохайно намалювали свої імена в оточенні відбитків лап.\nГоббс не зміг стримати усмішки. «Ого, молодці. Я справді можу зрозуміти більшість із того, що ви всі написали... хоча я бачу, що Дряпчику ще треба попрацювати над своїм лапописом».\nДряпчик надувся і схрестив лапи, поки інші сміялися.\nВчитель узяв тканину і обмотав її навколо шиї, мов плащ. «Дуже дякую вам усім. Було приємно вас навчати, попри всі ті пустощі, які ви, шибеники, влаштовували. Сподіваюся, ви всі й надалі тренуватиметеся в читанні та письмі. Можливо, колись хтось із вас теж стане вчителем».\n«Бувайте, містере Гоббс!» — знову хором вигукнули кошенята і помахали на прощання, коли він рушив з місця.\nГоббс помахав у відповідь і повільно пішов стежкою, що вела з села. Дорогою йому трапився сільський старійшина, який сидів і курив люльку.\n«А-а, сьогодні ви вирушаєте... рівно через рік після прибуття», — сказав бородатий сірий кіт. «Ви впевнені, що не хочете залишитися?»\n«Було приємно пожити в сільській місцевості, але я маю повернутися до своїх обов'язків у столиці. Проте, можливо, колись я приїду в гості. Попри вашу... відсутність зручностей, тут спокійно».\nСтарійшина кивнув. «Дякую, що навчили читати і мене. Я знаю, що мене було набагато важче навчити, ніж молодих, через мій вік. Але ви дуже терплячий кіт».\nГоббс усміхнувся. «Вчителі, яким бракує терпіння, зазвичай звільняються через рік»."
 abyssinia.206.a:0 "Грамотність — це магічна сила."
 
 abyssinia.207.t:0 "Повстання рабів в Абіссинії!"
 abyssinia.207.d_no_cw:0 "В Абіссинії відбувся дивовижний поворот подій. Після багатьох місяців заворушень рабів нарешті спалахнуло масштабне повстання. Однак замість того, щоб боротися з ним, абіссинський уряд просто капітулював, дозволивши повстанським арміям увійти до столиці та захопити країну. Монарх Абіссинії втік, практично поклавши край будь-яким надіям на збереження монархічного правління.\n\n[Root.GetAdjective]а агресивна політика щодо Абіссинії довго виправдовувалася їхнім інститутом рабства, але тепер його де-факто скасовано. Тепер дехто ставить під сумнів усю цю справу, запитуючи, чому ми взагалі опинилися в Абіссинії, і чи не варто було б просто дати їм спокій. Звісно, цей привід не був справжньою мотивацією, оскільки реальні причини конфлікту були набагато складнішими. Тим не менш, це віщує радикальну зміну у відносинах між [Root.GetNameDef] та Абіссинією. Чи не так?"
 abyssinia.207.d_wng_is_conservative:0 "В Абіссинії відбувся дивовижний поворот подій. Після багатьох місяців заворушень рабів нарешті спалахнуло масштабне повстання. Вимоги повстанців занадто радикальні, щоб правляча абіссинська монархія могла їх прийняти, тому по всій країні спалахнув жорстокий конфлікт.\n\n[Root.GetAdjective]а агресивна політика щодо Абіссинії довго виправдовувалася їхнім інститутом рабства, але тепер багато грифонів в уряді стурбовані можливістю перемоги повстанців. Тим не менш, немає жодних вагомих причин підтримувати абіссинську корону. Дехто виступає за те, щоб ми скористалися хаосом і переслідували власні інтереси, тоді як інші просять [Root.GetLeader] триматися осторонь конфлікту і подивитися, як він розгорнеться. Зрештою, для нас не має великого значення, хто переможе. Жодна зі сторін громадянської війни не зможе протистояти [Root.GetAdjective]ій могутності."
 abyssinia.207.d_wng_is_pogressive:0 "В Абіссинії відбувся дивовижний поворот подій. Після багатьох місяців заворушень рабів нарешті спалахнуло масштабне повстання. Вимоги повстанців занадто радикальні, щоб правляча абіссинська монархія могла їх прийняти, тому по всій країні спалахнув жорстокий конфлікт.\n\n[Root.GetAdjective]а агресивна політика щодо Абіссинії довго виправдовувалася їхнім інститутом рабства. Хоча це було лише приводом, який використовувався для відбілювання відвертого імперіалізму, тепер ми маємо реальний шанс здійснити справжні суспільні зміни в Абіссинії. [Root.GetLeader] прагне щиро допомогти повстанцям досягти їхніх цілей будь-якими можливими способами."
 abyssinia.207.a:0 "Ми повинні допомогти повстанцям усіма можливими способами!"
 abyssinia.207.b:0 "Ідеальна можливість для нас наскочити й захопити Кицькиць!"
 abyssinia.207.c:0 "Давайте почекаємо і подивимося, що буде."
 
 abyssinia.208.t:0 "[From.GetNameDefCap] підтримує нас"
 abyssinia.208.d:0 "«Я ніколи б не очікувала, що саме вінґбардці нам допоможуть», — пробурмотіла Шарп Спір.\n[From.GetAdjective]ий емісар дивився на літаки, з яких вивантажували ящики зі зброєю, але, здавалося, почув її слова, бо обернувся і відповів. «Допомога часто приходить звідти, звідки її найменше очікуєш», — сказав він з усмішкою, розмовляючи абіссинською з сильним і незграбним акцентом. Це була єдина мова, яку вони обоє розуміли.\nВона примружила очі, дивлячись на нього. «У чому підступ? Я буду винна вам величезну купу грошей? Чи ви якось інакше нами скористаєтеся?»\nГрифон похитав головою. «Ні, жодного підступу. [From.GetLeader] вважає, що нас об'єднує спільна справа. Ми щиро хочемо, щоб ви перемогли і поклали край варварській практиці рабства в Абіссинії».\nКобила закотила очі. «Мабуть, доведеться повірити вам на слово. У будь-якому разі, ми вдячні. Залишається лише сподіватися, що цього вистачить для нашої перемоги».\n«Ми дали вам те, що могли собі дозволити дати. Але можливо, ми надішлемо вам ще». Він знизав плечима. «Я тут лише для того, щоб переконатися, що ви отримали вантаж. Я не знаю, що запланувало моє керівництво».\n«Отже, якщо підступ і справді є, ви б про нього навіть не знали?»\nУсмішка емісара стала ніяковою, і він почухав кігтями потилицю.\nСпір роздратовано зітхнула."
 abyssinia.208.a:0 "Нам потрібна будь-яка допомога, яку ми можемо отримати."
 
 abyssinia.209.t:0 "Про рабство"
 abyssinia.209.d:0 "Уривки з першої опублікованої книги Шарп Спір під назвою «Про рабство»:\n\n«Ті, хто стверджує, що рабство є "природним", схоже, вважають нас чимось більшим, ніж тваринами, що вміють говорити і здатні лише слідувати своїм інстинктам. Проте такі речі, як цивілізація та мораль, за своєю суттю є неприродними, і саме вони відрізняють нас від диких звірів. Де взагалі в природі можна знайти рабство?»\n«Справді цікаво, як переважна більшість тих, хто захищає практику рабства, ніколи не відчували рабства на собі».\n«Коли імператор Гровер I скасував рабство у Грифонській імперії, його швидко замінили кріпацтвом, яке було не набагато кращим. Коли нявгіст М'юодора II скасувала поневолення абіссинських котів, їх швидко замінили рабами інших роз. Незважаючи ні на що, рабовласники завжди намагатимуться знайти юридичну лазівку, яка дозволить їм продовжувати свої утиски».\n«Якби рабство було корисним для рабів, то повстання рабів не спалахували б неодноразово протягом усієї історії по всьому світу».\n«Рабство не "спокутується" забороною жорстокого поводження з рабами. В усякому разі, така заборона просто визнає, що раби мають права і до них не можна ставитися як до неживих предметів. Зрештою, обмеження свободи особистості також є своєрідним жорстоким поводженням».\n«Економічного виправдання рабству не існує, особливо після винайдення фабрик і машин».\n«Рабство — це найвища форма соціальної стратифікації та нерівності. Таким чином, єдиний спосіб гарантувати остаточне припинення рабства — це створення суспільства, в якому всі особи є настільки вільними і рівними, наскільки це практично можливо»."
 abyssinia.209.a:0 "Прихильники рабства сидять дуже тихо відколи це вийшло."
 
 abyssinia.210.t:0 "Захоплення Кітріни"
 abyssinia.210.d:0 "Кроки луною розносилися печерою, коли кіт у мантії спускався вниз, несучи на спині важкий мішок, тоді як його хвіст тримав олійну лампу. Поки він спускався звивистим тунелем, лампа ставала дедалі менш потрібною, оскільки він наближався до джерела світла. Нарешті він увійшов до великої освітленої зали, яку перетворили на невелику операційну базу. Там були десятки котів, які обслуговували спорядження, готували їжу, грали в кості та обговорювали плани. Кіт у мантії з полегшенням зітхнув і з гучним стукотом поклав мішок на підлогу печери.\nСмугаста кішка сиділа на різьбленому кам'яному троні, коли почула це. Вона миттю підвелася і підійшла до прибулого. «О нарешті, чого так довго?»\n«Нявгіст Кітріно, вибачте, але мені довелося піти іншим шляхом, — відповів носій мішка, — оскільки я підозрював, що за мною стежать».\nВона жестом наказала іншим котам піти відкрити мішок для неї, а потім повернулася і люто поглянула на нього. «Ти переконався, що за тобою не стежили зверху?»\n«...Зверху?»\n«У них є пегаси! Які вміють літати! Стежив за тобою хтось із них чи ні?!»\n«Я... Я не впевнений», — відповів він з наростаючою тривогою.\n«Агх, хай там як. Думаю, нам варто переїхати на іншу базу, щоб нас не знайшли. Мене вже нудить від цієї вологої печери. Я сумую за своїм маєтком з усією його розкішшю...» Вона мелодраматично зітхнула.\n\nМайже беззвучно група котів, поні, зебр, віслюків і коней раптом з'явилася з тіней позаду них. Вони були озброєні до зубів. «ЛАПИ ДОГОРИ!» — вигукнув один із них, наставивши на Кітріну пістолет-кулемет. «Ви всі заарештовані. Не чиніть опору, інакше матимете наслідки».\nПоки всі інші коти в таємному лігві підкорилися, Кітріна засичала і потягнулася до флакона з рідиною, що висів у неї на шиї. Але перш ніж вона встигла його торкнутися, пролунав гучний постріл з луною, і куля просвистіла повз її вуса.\n«Я СКАЗАВ ЛАПИ ДОГОРИ! НІЧОГО НЕ ТОРКАЙСЯ!»\nВона люто загарчала і подивилася в дуло автомата. Максимально повільно й нерішуче вона підняла лапи вгору."
 abyssinia.210.a:0 "Кобилки та джентльпоні, ми схопили її."
 
 abyssinia.211.t:0 "Путівник [From.GetAdjective]ими політичними партіями"
 abyssinia.211.d_urf_split:0 "РВР - Революційний визвольний рух\nРВР був заснований Шарп Спір після розпуску ОРФ. Це значною мірою персоналістська партія, що як представляє, так і підтримує політику своєї засновниці та лідерки. Аболіціонізм, таким чином, є основним принципом партії, і все інше слугує йому. Шарп Спір вірить, що і соціалізм, і демократія необхідні для постійного запобігання відродженню інституту рабства, але готова йти на компроміси зі своїми опонентами в ім'я миру.\n\nАСП - Абіссинська соціалістична партія\nАбіссинська соціалістична партія була заснована у 998 році після В.Л., через два роки після Зимової революції в Еквестрійській Сєвєряні. Вона перебуває під значним впливом сталліонградського соціалізму та хотіла повторити їхній успіх. Однак партію майже одразу заборонила пазуромонська монархія через її радикальну антимонархічну позицію. Вона має невелику базу підтримки, переважно з лав міського пролетаріату Абіссинії, і тому завжди покладалася на співпрацю з іншими фракціями задля виживання. Партія виступає за централізовану планову державну економіку та швидку модернізацію Абіссинії, що дозволило б їй перейти до комунізму.\n\nНЛ - Народна ліга\nНародна ліга є першою і найстарішою політичною партією в країні, яка була сформована міськими інтелектуалами та купцями в 979 році після В.Л. Натхненна Грифонською революцією, вона є радикально антимонархічною і виступає за створення ліберальної демократії з вільним ринком. За іронією долі, вона ніколи не була особливо популярною. Як і АСП, НЛ також була заборонена пазуромонською монархією невдовзі після заснування, але їй вдалося вижити в підпіллі. Після революції вона стала затятим противником соціалістичної політики уряду.\n\nАПФ - Абіссинський патріотичний фронт\nПро походження АПФ відомо небагато, оскільки він починався як партизанський рух опору перехідному революційному уряду Абіссинії. Зрозуміло, що загадкова фігура, яку називають «Патріотом», є його засновником і лідером, хоча його справжня особистість невідома. Після того, як АПФ дозволили займатися партійною політикою, він швидко згуртував націоналістичних і правих прихильників серед місцевого котячого населення Абіссинії. Хоча офіційно АПФ засуджує радикалізм після укладення миру і намагається стримувати екстремістські ідеї, у його лавах є контрреволюційні реакціонери, які підтримують рабство. АПФ виступає або за відновлення монархії, або за сильну виконавчу владу. В економічному плані він прагне захистити права як торговців, так і землевласників."
 abyssinia.211.d_urf_no_split:0 "ОРФ - Об'єднаний республіканський фронт\nОРФ був утворений, коли Абіссинська соціалістична партія та Народна ліга об'єдналися, щоб створити єдиний фронт проти монархічних сил. Як неофіційна третя група, армія визволення рабів на чолі з Шарп Спір також належала до ОРФ, і їй було доручено командування військовими операціями завдяки її досвіду та досягненням. ОРФ, таким чином, є своєрідною об'єднаною партією, що включає до своїх лав комуністів, соціалістів, центристів та лібералів. Ці розрізнені групи завжди були об'єднані принципами антимонархічного республіканізму та аболіціонізму.\n\nАПФ - Абіссинський патріотичний фронт\nПро походження АПФ відомо небагато, оскільки він починався як партизанський рух опору перехідному революційному уряду Абіссинії. Зрозуміло, що загадкова фігура, яку називають «Патріотом», є його засновником і лідером, хоча його справжня особистість невідома. Після того, як АПФ дозволили займатися партійною політикою, він швидко згуртував націоналістичних і правих прихильників серед місцевого котячого населення Абіссинії. Хоча офіційно АПФ засуджує радикалізм після укладення миру і намагається стримувати екстремістські ідеї, у його лавах є контрреволюційні реакціонери, які підтримують рабство. АПФ виступає або за відновлення монархії, або за сильну виконавчу владу. В економічному плані він прагне захистити права як торговців, так і землевласників."
 abyssinia.211.a:0 "Ооооось така вона, політика!"
 
 abyssinia.212.t:0 "Пропаганда проти Шарп Спір"
 abyssinia.212.d:0 "«"Мейргиптська кобила-тиран-фараон поневолить весь котячий рід". Я правильно це прочитав?» — запитав Фад у Спір із самовдоволеною посмішкою.\nВона люто поглянула на пропагандистський плакат у його копитах. «Так. Правильно. Молодець».\nЖеребець грайливо штовхнув її копитом. «Та годі тобі, це просто якісь дурниці, якими пустотлива молодь обклеїла стіни».\n«Це частина ширшої тенденції. Деяким котам справді не подобається, що їхньою країною керує іноземна поні».\n«Думаєш, вони видові шовіністи? Або, може, просто вірять, що ти жадаєш влади».\n«Це не так!» — наполягала Спір. «Ти справді вмієш мене дражнити, еге ж. Якби громадянська війна не спалахнула, я б зараз і близько не була біля Абіссинії».\nФад з хихиканням кивнув. «Я знаю, знаю. Знаєш, вони будуть щасливі, коли ти закінчиш виконувати свої грандіозні плани. Можливо, вони навіть уявлять, що саме їхні сміливі плакати переконали тебе піти у відставку і покинути країну».\nТепер Спір теж засміялася. «Так, б'юся об заклад, так і буде».\nНастала коротка пауза, і посмішка Фада згасла. «...Ти впевнена, що ще не хочеш відвідати дім? Ти справді хочеш поїхати лише після того, як підеш у відставку?»\n«Я не можу ризикувати. Якщо я покину країну хоч на день, хто знає, що може статися. Переворот або щось таке».\n«Шкода. А як почувається твоя сім'я? Давненько ти не розповідала мені про їхні листи».\nСпір різко втягнула повітря. «Вони... Я вірю, що вони сумують за мною, але минуло стільки часу, що вони, мабуть, більше не часто про мене думають. Я справді підвела їх, залишившись тут, замість того, щоб повернутися додому, як і обіцяла».\nФад поплескав її по плечу. «Не кажи так. Впевнений, у них є інші турботи в житті. Ти не думала запросити їх сюди, як я пропонував раніше?»\n«Я... можливо, пізніше. Але дякую, Фаде. За все».\nЖеребець підморгнув їй. «Я завжди тут, якщо я тобі знадоблюся»."
 abyssinia.212.a:0 "Нехай коти шиплять скільки їм заманеться."
 
 abyssinia.213.t:0 "Антиурядові протести"
 abyssinia.213.d_urf_split:0 "Велика юрба абіссинських котів зібралася на площі перед колишнім королівським палацом. «РВР ГЕТЬ! РВР ГЕТЬ! РВР ГЕТЬ!» — скандували вони знову і знову, розмахуючи своїми плакатами та транспарантами. На них були написані різні гасла, як-от «ВИ ПРОГРАЛИ, ЙДІТЬ ГЕТЬ», «ВИЖЕНІТЬ ЇЇ НАЗАД ДО МАРЕГІПТУ!» та «УРЯД НАЛЕЖИТЬ НАРОДУ». Нагорі Фад Аль-Касаар визирнув з балкона, а потім повернувся до Шарп Спір, яка стояла позаду нього. «Я правильно прочитав? Вони злі, хоча твоя партія програла вибори?»\nВона кивнула. «Так. Вони хочуть, щоб деяких міністрів в уряді замінили на тих, хто представляє партії, які вони підтримують».\nФад задумливо насупився. «Тобто... менше міністрів від РВР, і більше міністрів від АСП, НЛ чи АПФ?»\nВона кивнула. «Так, саме це я щойно сказала».\nВін знизав плечима. «Тоді просто зроби те, що вони просять. Не бачу причин, чому б і ні».\n«Ти не розумієш. Вони хочуть, щоб РВР була в меншості, як у парламенті. Це означатиме, що я втрачу контроль над урядом».\n«Ага. То ти думаєш... вони просто протистоятимуть будь-якій твоїй політиці? Або навіть скасують її?»\n«Вони викинуть соціалізм у вікно. І, напевно, ще й заговорять про відновлення рабства заразом». Вона презирливо посміхнулася.\n«Мгм. Хіба ти не казала всім, що підеш у відставку, коли закінчиш зі своїми реформами і планами?»\n«Так, але вони не хочуть чекати. Я не думаю, що вони вірять моїм обіцянкам і вважають, що я хочу бути диктатором довічно».\n«Що ти зробиш, щоб заспокоїти їх тим часом?»\nВона зітхнула. «Гадаю, мені варто щось зробити, так... можливо, призначити одного-двох міністрів з партій, які виграли вибори. Хоча не впевнена, що цього буде достатньо...»\n«Тоді виведи армію і переїдь протестувальників танками!» — з ентузіазмом запропонував Фад.\nСпір розреготалася. «Фаде, ти жахливий! Ха-ха-ха-ха...»\nВін хихикнув. «Так, так. Як щодо того, щоб ти вийшла на балкон і розповіла їм про свої плани прямо зараз?»\nЇї усмішка згасла. «...Добре. Тільки... залишся тут для моральної підтримки, будь ласка».\nВін кивнув. «Звісно. Хіба я б тебе покинув?»"
 abyssinia.213.d_urf_no_split:0 "Велика юрба абіссинських котів зібралася на площі перед колишнім королівським палацом. «ОРФ ГЕТЬ! ОРФ ГЕТЬ! ОРФ ГЕТЬ!» — скандували вони знову і знову, розмахуючи своїми плакатами та транспарантами. На них були написані різні гасла, як-от «ВИ ПРОГРАЛИ, ЙДІТЬ ГЕТЬ», «ВИЖЕНІТЬ ЇЇ НАЗАД ДО МАРЕГІПТУ!» та «УРЯД НАЛЕЖИТЬ НАРОДУ». Нагорі Фад Аль-Касаар визирнув з балкона, а потім повернувся до Шарп Спір, яка стояла позаду нього. «Я правильно прочитав? Вони злі, хоча твоя партія програла вибори?»\nВона кивнула. «Так. Вони хочуть, щоб деяких міністрів в уряді замінили на тих, хто представляє партії, які вони підтримують».\nФад задумливо насупився. «Тобто... менше міністрів від ОРФ, і більше міністрів від АПФ?»\nВона кивнула. «Так, саме це я щойно сказала».\nВін знизав плечима. «Тоді просто зроби те, що вони просять. Не бачу причин, чому б і ні».\n«Ти не розумієш. Вони хочуть, щоб ОРФ була в меншості, як у парламенті. Це означатиме, що я втрачу контроль над урядом».\n«Ага. То ти думаєш... вони просто протистоятимуть будь-якій твоїй політиці? Або навіть скасують її?»\n«Вони викинуть соціалізм у вікно. І, напевно, ще й заговорять про відновлення рабства заразом». Вона презирливо посміхнулася.\n«Мгм. Хіба ти не казала всім, що підеш у відставку, коли закінчиш зі своїми реформами і планами?»\n«Так, але вони не хочуть чекати. Я не думаю, що вони вірять моїм обіцянкам і вважають, що я хочу бути диктатором довічно».\n«Що ти зробиш, щоб заспокоїти їх тим часом?»\nВона зітхнула. «Гадаю, мені варто щось зробити, так... можливо, призначити одного-двох міністрів з партій, які виграли вибори. Хоча не впевнена, що цього буде достатньо...»\n«Тоді виведи армію і переїдь протестувальників танками!» — з ентузіазмом запропонував Фад.\nСпір розреготалася. «Фаде, ти жахливий! Ха-ха-ха-ха...»\nВін хихикнув. «Так, так. Як щодо того, щоб ти вийшла на балкон і розповіла їм про свої плани прямо зараз?»\nЇї усмішка згасла. «...Добре. Тільки... залишся тут для моральної