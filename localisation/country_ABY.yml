 ### Події (Новини)
 
 abyssinia_news.1.t: "Мейндалусія проголошує незалежність"
 abyssinia_news.1.d: "[This.GetNewspaperHeader]Регіон Мейндалусія був предметом суперечок між Абіссинією та Мейргиптом з часів короткого, але жорстокого конфлікту 988 року. До цього Мейндалусія була підвладною державою Сідлової Арабії, що призвело до формування збройного руху за незалежність. Тепер цій організації вдалося встановити контроль над колишньою столицею Мейндалусії, Кольтобою, проголосивши себе законним урядом незалежної Мейндалусії. Ймовірно, ні Абіссинія, ні Мейргипет не терпітимуть її існування, тому нова війна здається не лише можливою, а й неминучою."
 abyssinia_news.1.a: "Al-Manedalus aistayqaz!"
 abyssinia_news.1.b: "Ця так звана «нація» протримається недовго."
 abyssinia_news.1.c: "Ще більше потрясінь у Зебриці..."
 
 abyssinia_news.2.t: "Абіссинська криза"
 abyssinia_news.2.d_owns_katren: "[This.GetNewspaperHeader]Поточна прикордонна суперечка між Вінґбардією та Абіссинією досягла кризової точки, оскільки остання вирішила в односторонньому порядку скасувати Кітренський договір, стверджуючи, що окупація Вінґбардією портового міста є незаконною. Оскільки договір демілітаризував навколишню провінцію Кицькиць і надав права на видобуток корисних копалин вінґбардійським компаніям, Вінґбардія у відповідь вирішила мобілізувати свої збройні сили, щоб нав'язати договір силою. Військові підрозділи обох сторін вже стягуються в спірну зону. Війна здається неминучою, і жодна зі сторін не зацікавлена в дипломатичному вирішенні конфлікту."
 abyssinia_news.2.d_dont_own_katren: "[This.GetNewspaperHeader]Поточна прикордонна суперечка між Вінґбардією та Абіссинією досягла кризової точки, оскільки остання вирішила в односторонньому порядку скасувати Кітренський договір, стверджуючи, що він є незаконним. Хоча багато хто розглядає це як остаточне підтвердження того, що Вінґбардію витіснили з материкової Абіссинії, вінґбардійський уряд не згоден з цим і офіційно оголосив війну Абіссинії, прагнучи відновити дію договору силою. Війна здається неминучою, і жодна зі сторін не зацікавлена в дипломатичному вирішенні конфлікту."
 abyssinia_news.2.a: "Ми скинемо їх назад у море!"
 abyssinia_news.2.b: "Ці кошенята боятимуться вінґбардійського орла!"
 abyssinia_news.2.c: "Чому Вінґбардії взагалі є діло до Абіссинії?"
 
 abyssinia_news.3.t: "Абіссинська криза"
 abyssinia_news.3.d: "[This.GetNewspaperHeader]Після кількох років толерування іноземної окупації уряд Абіссинії вирішив повернути спірне портове місто Кітрен силою. Спочатку воно було захоплене Вінґбардією у 1006 році за сумнівних обставин і закріплене суперечливим Кітренським договором. Однак, оскільки Абіссинія більше не дотримується договору, спроба Абіссинії відновити свої претензії на поселення була лише питанням часу. Замість того, щоб здатися, нинішні окупанти Кітрена вирішили дати відсіч, і між двома країнами, схоже, спалахує велика війна."
 abyssinia_news.3.a: "Ми скинемо їх назад у море!"
 abyssinia_news.3.b: "Кітрен наш!"
 abyssinia_news.3.c: "Хіба це маленьке містечко варте того, щоб за нього вмирати?"
 
 abyssinia_news.4.t: "Мейндалусійська угода"
 abyssinia_news.4.d: "[This.GetNewspaperHeader]Після дипломатичних переговорів між [ABY.GetNameDef] та [the_other_manedalusia_owner.GetNameDef] щодо статусу спірної території Мейндалусії було досягнуто компромісу. Обидві країни погоджуються створити незалежну мейндалусійську державу під управлінням місцевих жителів, яка діятиме як буферна зона між ними. Вони гарантуватимуть її незалежність і підпишуть взаємну угоду про ненапад. Експерти прогнозують, що це несподіване рішення дозволить запобігти початку будь-яких масштабніших конфліктів, але ще невідомо, як довго триватиме мир."
 abyssinia_news.4.a: "Al-Manedalus aistayqaz!"
 abyssinia_news.4.b: "Мир для нашого часу."
 abyssinia_news.4.c: "Радий за них."
 
 abyssinia_news.5.t: "Проголошення Абіссинської Імперії"
 abyssinia_news.5.d: "[This.GetNewspaperHeader]Королівство Абіссинія в останні роки стрімко розширило свої кордони, анексувавши величезні ділянки землі, які нещодавно належали незалежним державам. Не стало несподіванкою, коли нявгуса Ґомеза Няуконнена проголосили Нґусе нявгест у колишньому королівському палаці Мейргипту. Його титули включають Імператорський та «Лев-завойовник», що ще більше зміцнює престиж його тисячолітньої династії. Однак експерти припускають, що ця нова котяча імперія проіснує не дуже довго, оскільки правлячі коти становлять лише меншість від загальної кількості населення."
 abyssinia_news.5.a: "Нехай Імперія проіснує тисячу років!"
 abyssinia_news.5.b: "Він виглядає як кіт, що дорвався до сметани."

 abyssinia_news.6.t: "Абіссинське повстання"
 abyssinia_news.6.d: "[This.GetNewspaperHeader]З моменту свого завоювання іноземною державою Абіссинія була неспокійним регіоном, оскільки рухи опору здійснювали жорстокі напади на окупантів. Оскільки останнім часом окупаційні сили були розтягнуті, ці борці за свободу ставали все більш сміливими та організованими. Надходять повідомлення про масове повстання, яке взяло під контроль сотні, якщо не тисячі квадратних кілометрів. Сформовано новий місцевий абіссинський тимчасовий уряд, який поклявся вигнати ворога зі своєї території. Невідомо, чи зможуть окупанти впоратися з цим повстанням, чи вони повністю втратять контроль над котячим півостровом."
 abyssinia_news.6.a: "Ми захистимо вас – це наш обов'язок."
 abyssinia_news.6.b: "Ми повинні розправитися з ними швидко."
 abyssinia_news.6.c: "Чи отримає Абіссинія хоч колись перепочинок?"
 
 abyssinia_news.7.t: "Хаос в Абіссинії!"
 abyssinia_news.7.d: "[This.GetNewspaperHeader]Після повстання рабів, яке призвело до краху абіссинської монархії, було сформовано перехідний уряд, щоб закласти основу для створення соціалістичної демократичної республіки. Однак ці плани зазнали краху через масові повстання, які охопили всю країну останніми тижнями. Перехідний уряд значно поступається чисельністю котячому Патріотичному фронту та колишнім рабам-ослам Нео-Ассірійської Держави, але заявив, що продовжуватиме боротьбу до відновлення миру та порядку в країні. Залишається побачити, чи зможуть вони виконати це надскладне завдання."
 abyssinia_news.7.a: "Абіссинія затягується у прірву."
 
 abyssinia_news.8.t: "Проголошення Імперії Свободи"
 abyssinia_news.8.d: "[This.GetNewspaperHeader]Після хаотичного та кривавого падіння Королівства Абіссинія з його попелу повстала нова держава. Хоча спочатку вона задовольнялася назвою Вільна Республіка Абіссинія, багато що змінилося з моменту її утворення. Оскільки зараз країна охоплює величезні площі землі, населені багатьма расами, її лідер [ABY.GetLeader] вирішив перебудувати її ідентичність. Відсьогодні Абіссинія офіційно називатиметься Імперією Свободи — демократичною соціалістичною багаторасовою монархією."
 abyssinia_news.8.a: "Свобода або смерть!"
 abyssinia_news.8.b: "Еее, що?"
 
 abyssinia_news.9.t: "Утворення Союзу П'яти Рас"
 abyssinia_news.9.d: "[This.GetNewspaperHeader]Після хаотичного та кривавого падіння Королівства Абіссинія з його попелу повстала нова нація. Хоча спочатку вона задовольнялася назвою Вільна Республіка Абіссинія, багато що змінилося з моменту її утворення. Оскільки зараз країна охоплює величезні площі землі, населені багатьма расами, її лідер [ABY.GetLeader] вирішив перебудувати її ідентичність. Відсьогодні Абіссинія офіційно називатиметься Союзом П'яти Рас — демократичною соціалістичною багаторасовою республікою."
 abyssinia_news.9.a: "П'ять рас, об'єднаних в одну!"
 abyssinia_news.9.b: "Нація без чіткої ідентичності довго не проіснує."
 
 abyssinia.1.t: "Переживаючи минуле"
 abyssinia.1.d: "Сталевий таран ударив у ворота королівського палацу і розніс їх на друзки. Сіра мавпоподібна голова з рогатою короною зазирнула всередину. «Агов? Є хто вдома?»\n\nЦе був Король Шторм.\n\nНявгус Ґомез обійняв свою дружину, нявгіст Мортіцію, коли височезний броньований єті зайшов усередину в супроводі своїх солдатів у масках. «Сподіваюся, ви не проти, що я сам увійшов. Але ж я і так вже практично власник цього місця, чи не так?» — сказав він із самовдоволеною, але невимушеною посмішкою, а потім глузливо вклонився. «Ваші величності. Нявгус і Нявгіст Абіссинії. Ви повинні здатися. Негайно».\nЗаграва палаючого міста Пантера просвічувала крізь ворота. Ґомез глибоко зітхнув, поки його придворні витріщалися на нього, потім повільно зняв свою золоту корону і простягнув її єті. «...Король Шторм. Ти завоював цю націю. Абіссинія твоя».\nКороль Шторм узяв корону, а потім одразу ж розчавив її. «Дякую за пропозицію, але мене не дуже цікавить оця вся 'правляча' рутина. Можете залишити Абіссинію собі».\nҐомез розгублено кліпнув очима. «Щ-що?»\n«Я знаю, що називаю себе 'Королем', але, чесно кажучи, монархія — це не моє. Захопиш одну країну, а потім доводиться розбиратися з податками, комітетами та пенсійними пакетами!» Своїми великими руками він зліпив з корони грубу каблучку, яку надів на один зі своїх трьох великих пальців. «Ні, мені не потрібна Абіссинія — лише її багатства». Він нахилився ближче до Ґомеза, який рефлекторно затулив собою Мортіцію. «Скарбниці Абіссинії наповнені дивними та екзотичними дивами, так кажуть. Магічні артефакти, бездоганні коштовності, золоті дрібнички. Я б хотів їх усі, будь ласка».\n«Тобі потрібне... наше багатство?» — запитав Ґомез.\n«Утримувати цілу армаду дорого, знаєте. Ви не повірите, скільки коштує обслуговування всіх цих дирижаблів!»\n«Ви... ви не можете!» — верескнула Мортіція. «Абіссинія — торгова нація. Нам потрібне наше багатство, щоб імпортувати врожай, годувати наших громадян, будувати наші домівки! Будь ласка, ви повинні хоч щось нам залишити!»\nКороль Шторм мелодраматично насупився. «О, залишу. Після того, як спорожню ваші сховища, я залишу вас у спокої».\n«Зачекайте! Ви не можете! У нас нічого не залишиться! Чому ви знищили Абіссинію?»\nКороль Шторм посміхнувся так, що Ґомез цього ніколи не забуде. «Тому що вона була наступною в моєму списку»."
 abyssinia.1.a: "..."

 abyssinia.2.t: "Типове пробудження"
 abyssinia.2.d: "Нявгус Ґомез різко прокинувся у своєму ліжку, а потім зрозумів, що це знову був той самий сон, що повторюється. Або кошмар, хоча він уже нічого через нього не відчував. Він застогнав і подивився на вишуканий підлоговий годинник, що стояв біля ліжка.\nБула четверта година дня. Він проспав шість годин.\nПовільно піднявшись, він позіхнув і потер очі, що пекли. Потім він просто сидів, дивлячись у порожнечу.\nПоглянувши на двері, які здавалися замкненими, він опустився на підлогу і заповз під ліжко, відкопуючи свою таємну схованку зі свіжим листям катніпу (котячої м'яти). Він поклав повну лапу в рота, а потім почав жувати. Він замуркотів і перекинувся на підлозі, коли його зіниці розширилися і він знову відчув себе живим.\nДвері відчинилися.\nҐомез негайно підскочив, вдарився головою об дно ліжка і швидко вибрався назад. «Щ-що за... чому ти не постукав?» — пробурмотів він із катніпом у роті. Його довірена права лапа, Цехафе Таезаз, Міністр Пера, Писар за Наказом, Деджен Ріс-Моггі, стояв у дверях, абсолютно незворушний.\n«Я стукав, мій Нявгус, але ви, здається, не чули. Я хотів запитати, чи ви нарешті вирішили, коли ми зможемо провести зустріч».\nҐомез виплюнув катніп і випростався. «Я... ні. Принаймні не сьогодні».\n«Ви не можете відкладати це вічно, ваша Величносте».\n«Я... я знаю», — відповів він і опустив вуха.\nДеджен закотив очі. «Крім того, я хотів нагадати вам, що ваша дружина приготувала для вас їжу. Вона вже давно чекає».\nОчі Ґомеза розширилися. «Ох, Тартар забирай! Я зовсім забув!» Він вискочив зі спальні, пробігши повз свого радника і залишивши його самого.\nДеджен знизав плечима і попрямував назад до свого кабінету."
 abyssinia.2.a: "..."
 
 abyssinia.3.t: "Запізнення на вечерю"
 abyssinia.3.d: "Нявгіст Мортіція сиділа за великим обіднім столом, відмовляючись торкатися своєї їжі, поки чекала на чоловіка. Вона знала, що він, ймовірно, спав, і шкодувала, що не може спати в той самий час через його... змінений графік сну. Принаймні зазвичай він прокидався вчасно на вечерю.\nНявгус Ґомез увірвався до кімнати. «Я-я так перепрошую, Тіш, я зовсім забув про це!»\nМортіція підняла брову. «Але ж ми вечеряємо щодня?»\n«Еее... так, але... ах, неважливо». Він сів на протилежному кінці столу, зсутуливши плечі. «Що в нас сьогодні».\n«На знак солідарності з нашими голодуючими підданими, ми їмо лише трохи сухого корму. Я навіть домовилася, щоб кіт-фотограф зняв нашу трапезу, щоб вона з'явилася в газетах, але... йому довелося піти після години очікування».\nҐомез застогнав і потер лоб. «Це моя провина, вибач».\nМортіція видавила усмішку. «Все гаразд! Ми все ще можемо насолодитися вечерею».\nЧерез катніп думки Ґомеза були затуманеними. «Вибач, але я не дуже голодний».\n«Але ж ти не їв відучора?»\n«Я знаю...»\n\nЗапала тривала тиша, поки Мортіція стурбовано дивилася на свого чоловіка. Ситуація ставала лише гіршою і гіршою, подумала вона. «Мій любий, тобі потрібна допомога. Ти хворий».\n«Хворий? Чи просто бачу речі чіткіше, ніж інші?» — пробурмотів він.\nМортіція зітхнула. «Я розумію тебе краще, ніж будь-хто інший, і бачу, що щось не так. Я просто хочу, щоб ти знову був щасливий».\nҐомез порожнім поглядом дивився у свою тарілку з сухим кормом, а потім відповів:"
 abyssinia.3.a: "«Я в порядку»."
 abyssinia.3.b: "«...Мені справді потрібна допомога»."
 
 abyssinia.4.t: "Зібрання Аристокотів"
 abyssinia.4.d: "Зазвичай тихий старий кам'яний маєток династії Кітве зараз був переповнений сотнями котів, більшість з яких були слугами. Десяток нош, включаючи вишукані паланкіни та портшези, чекали на своїх власників на вулиці разом із рабами-носіями. Кілька рабів, якими були коні та поні, не були носіями, а скакунами, і скористалися можливістю розслабитися та зняти сідла.\n\nТим часом усі дворяни зібралися в конференц-залі. Власниця маєтку та господиня зустрічі, Кітріна з Дому Кітве, підпилювала кігті. Один з аристокотів кашлянув. «Нечемно змушувати нас чекати, Кітріно», — пробурмотіла Цахіфе Лам Тардар Соурпусс.\nКітріна помилувалася гостротою своїх кігтів і посміхнулася. «Я господиня цього дому і сама вирішую, коли почнеться зустріч. І вона починається зараз». Вона повернулася, щоб подивитися на дворян. Принаймні половина найвпливовіших аристокотів Королівства зібралася тут, і всі вони підтримували її претензії на трон. «Я рада, що всі ви прийняли моє запрошення, оскільки нам потрібно вирішити наш наступний план дій. На щастя, у мене є ідеальний план, як усунути нашого нерішучого Нявгуса, який явно не здатний правити».\n«Ти завжди обіцяєш нам сонце і місяць, — сухо відповіла Тардар, — але ти не алікорн».\nПоки що ні, подумала Кітріна, і запитала себе, чи Тардар справді завжди така сварлива, чи її обличчя застигло у вічному невдоволенні. «На відміну від Ґомеза, я виконую свої обіцянки, люба Тардар. А тепер слухайте, мені треба багато чого пояснити...»"
 abyssinia.4.a: "..."
 
 abyssinia.5.t: "Вибір лікування"
 abyssinia.5.d: "Ґомез зсутулився в кріслі, слухаючи, як дружина пояснює свої плани. Хоча він захоплювався її надією та ентузіазмом, він також відчував заздрість. Чому він більше не міг відчувати того ж самого?\n\n«Отже, я зв'язалася з найкращими лікарями Королівства, — сказала Мортіція, — і вони сказали, що з радістю діагностують твій стан. Можливо, твій настрій пов'язаний з якоюсь хворобою? Або ж тобі просто потрібен відпочинок від усього. Зрештою, правління може бути дуже виснажливим. Я розпитувала різних котів про те, куди б ти міг поїхати у відпустку, і один з них запропонував відвідати Висічені в скелях Храми Фелібели в Джіраті. Я надіслала повідомлення тутешнім жерцям, і вони будуть більш ніж раді прийняти тебе. Якщо ти поїдеш, я могла б залишитися тут і діяти як регент. І нарешті, у нас є багато родичів, які турбуються про тебе. Ми могли б влаштувати сімейне зібрання і подивитися, чи зможуть вони допомогти тобі відчути себе краще. Як тобі ці варіанти, мій любий? Який з них, на твою думку, найкращий?»\n\nҐомез повільно кліпнув. «Еее... думаю, всі вони непогані».\nУсмішка Мортіції трохи згасла. «Ну, тобі доведеться вибрати щось одне, оскільки ми не можемо зробити все відразу».\nВін потер ниючий лоб. «Ох, гаразд. Дай мені подумати...»"
 abyssinia.5.a: "«...лікарі, мабуть, зможуть це вирішити»."
 abyssinia.5.b: "«...мені варто взяти відпустку»."
 abyssinia.5.c: "«...до речі, коли востаннє збиралися Пазуромони?»"
 
 abyssinia.6.t: "Матеріал для шантажу"
 abyssinia.6.d: "Деджен підійшов до свого кабінету і відчинив двері. Світло ранкового сонця, що сходило, світило крізь вікна на фігуру, яка сиділа в його кріслі.\nДеджен насупився. «Хто ви і хто дозволив вам сидіти на моєму робочому місці?»\nНезнайомка засміялася і склала лапи будиночком. «Я сама собі дозволила. Зрештою, я законна власниця цього місця».\nВін підняв брову. «...Кітріна з Дому Кітве?»\n«Угу, принаймні ви знаєте свою історію. Перейду відразу до справи: я хочу отримати інформацію».\nВін примружився. «Яку саме?»\n«О, бачите, у мене є певні плани, і для їх виконання мені потрібні деякі... компрометуючі факти про нашого улюбленого Нявгуса і сюзерена. Бажано з доказами. Я точно знаю, що у нього є кілька скелетів у шафі».\n«І чому я маю вам щось давати?»\n«Скажіть мені, ви задоволені правлінням Нявгуса Ґомеза? Можете бути зі мною відвертим».\nДеджен завагався, перш ніж відповісти.\n«Ніхто з нас не задоволений, — прошипіла Кітріна. — І ви можете допомогти мені замінити його кимось кращим».\n«Вами?»\nКітріна засміялася. «Хах, це не має значення! Просто дайте мені те, що я хочу, випустіть котів з мішка, а про решту я подбаю».\nДеджен глибоко вдихнув. Йому належало прийняти важке рішення."
 abyssinia.6.a: "«Я можу розповісти вам про нього дещо...»"
 abyssinia.6.b: "«Мені нічого вам дати»."
 
 abyssinia.7.t: "Професійний діагноз"
 abyssinia.7.d: "Найкращі котячі лікарі Абіссинії зібралися в палаці, готові служити своєму володарю та сюзерену. Нявгус Ґомез піддався кількагодинному ретельному аналізу, опитуванню та діагностиці, поки вони перевіряли кожну частину його тіла і хотіли почути всю історію його життя. Під кінець він був абсолютно виснажений, але принаймні медичні експерти тепер мали достатньо даних, щоб дійти до якогось висновку. Усі вони погодилися, що у нього депресія або меланхолія. Однак вони не зійшлися на думці, якою була причина і як його слід лікувати.\n«У нього явно дисбаланс гуморів у тілі, надлишок чорної жовчі!» — сказав один лікар. «Кровопускання має допомогти».\n«Нісенітниця, це явний випадок одержимості демонами!»\n«Науково доведено, що одержимість не викликає депресію! Швидше, демон ставиться до тіла як до маріонетки. Крім того, ми, коти, від природи маємо низьку магічну енергію, і тому навряд чи можемо бути одержимими».\n«Я думаю, що комбінація йодиду заліза, миш'яку, ріжків, строфантину та хінного дерева має допомогти вилікувати його».\n«Одного опіуму має бути достатньо».\n«Ні! Йому потрібна лоботомія!»\n«А як щодо електрошокової терапії?»\n«Неперевірена нова технологія звучить небезпечно».\n«Гмм... а як щодо цього?» Лікар дав Ґомезу великий плакат. На ньому був зображений кіт, що висить на гілці дерева, із написом «Тримайся там!».\nҐомез застогнав. Усе, що вони пропонували, звучало жахливо.\n«Пробач, мій любий, — сказала Мортіція, — але ми не змогли дозволити собі запросити кращих лікарів з Еквестрії. Як щодо того, щоб спробувати щось інше?»"
 abyssinia.7.a: "«Давай влаштуємо те сімейне зібрання»."
 abyssinia.7.b: "«Мені справді потрібна відпустка після цього»."
 
 abyssinia.8.t: "Кам'янистий шлях"
 abyssinia.8.d: "Нявгус Ґомез давно знав про Висічені в скелях Храми Фелібели, оскільки вони були відомі, але він ніколи не усвідомлював, наскільки вони віддалені. У регіоні не було залізниці, тому він зі своїм почтом прибув на човні до Катемте, а потім поїхав звивистою ґрунтовою дорогою в гори. Він сидів у дорогому імпортному автомобілі, поки той не зламався, а потім його несли на паланкіні слуги, які швидко виснажилися. На відміну від дворян, він не мав витривалих коней у якості рабів, а лише вільних котів, яким платили зарплату. І з порожньою скарбницею їм не заплатили достатньо, щоб вони несли його всю дорогу нагору. Зрештою, Нявгус ішов пішки.\n\nДорогою до храмів вони проходили повз ізольоване село. Місцеві жителі висипали зі своїх будинків, щоб на власні очі побачити Короля. Одним із них було молоде кошеня в лахмітті, яке виглядало виснаженим. Воно підійшло до Ґомеза і запитало: «Ви Нявгус, так? Чому ви виглядаєте таким сумним?»\nҐомез зітхнув. «Я несу тягар Королівства на своїх плечах, малий».\n«Але ви носите такий гарний одяг і коштовності! І б'юся об заклад, що у вас багато їжі, ВЕЛИЧЕЗНИЙ маєток і НАЙБІЛЬШИЙ у світі клубок пряжі!»\n«Я... маю дещо з цього, мабуть».\n«Тоді як ви можете бути сумним? На вашому місці я був би таким щасливим!»\nЦе кошеня було ще таким наївним і простим, подумав Ґомез. «Ти вже й сам виглядаєш щасливим, хоча нічого не маєш».\nКошеня захихотіло. «Мені дуже весело з друзями!»\nНявгус ледь помітно, сумно посміхнувся. Він дістав золоту монету, яку сховав від Короля Шторма у своїх мантіях, і віддав її кошеняті. «Ось, візьми це. Піди купи собі трохи їжі, зараз вона, мабуть, дорога»."
 abyssinia.8.a: "«О, дякую вам, Нявгусе!»"
 
 abyssinia.9.t: "Одна велика щаслива родина"
 abyssinia.9.d: "Великий обідній стіл королівської пари був доверху заставлений їжею та оточений численними членами Дому Пазуромонів. Принаймні, Король Шторм не спорожнив комору, хоча нявгіст Мортіція воліла б, щоб вони їли менше, аби вона могла пожертвувати частину їжі голодним селянам. Її родичі не слухали.\n\nПостійна балаканина та шум котів різного віку були оглушливими, і Нявгус Ґомез відчував, що у нього розболиться голова. Його і без того мінімальний апетит зник зовсім.\n«Що не так, Гомі?» — запитав його старий дядько. «Не збираєшся торкатися своєї їжі?»\n«Це, мабуть, тому, що він 'у депресії'!» — сказав його троюрідний брат.\n«Депресії не існує, — сказала його невістка. — Візьми себе в руки!»\n«Йому легко! — прошипів його швагер. — Я втратив дім, ногу та своє багатство під час вторгнення Короля Шторма, але ви не бачите, щоб я хмурився!»\n«Так, не сумуй, Гомі! — сказала його тітка. — Просто дивись на світлу сторону життя і цінуй все хороше в ньому!»\n«Знаєш, більшість жителів Зебрики живуть гірше, ніж ми, — сказав його чотириюрідний брат. — Подумай про всіх тих голодуючих лошат на Великих Озерах!»\n«Це все у твоїй голові, — сказала теща. — Чому ти дозволяєш цьому так сильно впливати на тебе?»\nЙого напівп'яний хрещений батько випив трохи катікали й засміявся. «Йому потрібно більше веселощів у житті, ось і все!»\n\nҐомез застогнав і помітно зіщулився. Його дружина, яка сиділа поруч, помітила це. «Ви можете всі замовкнути?!» — прошипіла вона на їхніх родичів, а потім повернулася, щоб прошепотіти Ґомезу на вухо. «Це було помилкою. Нам варто спробувати щось інше...»"
 abyssinia.9.a: "«Можливо, ті лікарі зможуть дати справді корисну пораду»."
 abyssinia.9.b: "«Мені справді потрібна відпустка після цього»."
 
 abyssinia.10.t: "Рада Знаті"
 abyssinia.10.d_present_and_no_blackmail: "Абіссинські аристокоти мали привілей скликати раду знаті для обговорення важливих справ, пов'язаних з Королівством. Оскільки метою ради було надання порад Нявгусу, він мав бути присутнім. Рада збиралася лише кілька разів після вторгнення Короля Шторма, оскільки дворяни швидко зрозуміли, що Нявгус тепер не має жодного інтересу слухати їх і навіть не хоче там бути. Тож для Ґомеза стало несподіванкою, коли рада зібралася знову вперше за багато місяців.\n\nНеохоче він поплентався до зали ради, хоча з радістю залишився б у ліжку. Він побачив, що прийшли всі найважливіші дворяни Королівства, тож у них, мабуть, було щось важливе сказати. Він опустив вуха і сів у кінці столу.\n«Його Величність нарешті зволив прибути, тож почнемо, — сказала Цахіфе Лам Тардар Соурпусс. — Сьогодні у нас є запрошений промовець, тож давайте розберемося з цим».\nКітріна з Дому Кітве підвелася і посміхнулася. «Дякую вам, шановна Цахіфе Лам. Ми всі зібралися тут сьогодні, щоб обговорити нинішній жалюгідний стан Короля-Без-Корони. Він явно більше не здатний правити своїм Королівством, що викликає питання: чому цей огидний любитель одружуватися на кузинах чіпляється за трон? Невже він справді думає, що ми хочемо бачити його кислу міну щоразу, коли обговорюємо життєво важливі політичні питання?»\nДеякі дворяни засміялися, тоді як ті, хто був вірний Нявгусу, насупилися. Сам Ґомез виглядав знервованим, але мовчав.\nКітріна продовжила. «Дозвольте нагадати вам, що його інбредна династія захопила владу у МОЄЇ сім'ї, а потім почала топтати ваші давні права та привілеї. І заради чого? Наше Королівство лежить у руїнах, але Пазуромонам явно байдуже!»\nОскільки все більше і більше дворян сміялися і підбадьорювали її, Ґомезу увірвався терпець. Він підвівся і вилетів з кімнати, грюкнувши за собою дверима. Кітріна вишкірилася в посмішці."
 abyssinia.10.d_present_and_blackmail: "Абіссинські аристокоти мали привілей скликати раду знаті для обговорення важливих справ, пов'язаних з Королівством. Оскільки метою ради було надання порад Нявгусу, він мав бути присутнім. Рада збиралася лише кілька разів після вторгнення Короля Шторма, оскільки дворяни швидко зрозуміли, що Нявгус тепер не має жодного інтересу слухати їх і навіть не хоче там бути. Тож для Ґомеза стало несподіванкою, коли рада зібралася знову вперше за багато місяців.\n\nНеохоче він поплентався до зали ради, хоча з радістю залишився б у ліжку. Він побачив, що прийшли всі найважливіші дворяни Королівства, тож у них, мабуть, було щось важливе сказати. Він опустив вуха і сів у кінці столу.\n«Його Величність нарешті зволив прибути, тож почнемо, — сказала Цахіфе Лам Тардар Соурпусс. — Сьогодні у нас є запрошений промовець, тож давайте розберемося з цим».\nКітріна з Дому Кітве підвелася і посміхнулася. «Дякую вам, шановна Цахіфе Лам. Ми всі зібралися тут сьогодні, щоб обговорити нинішній жалюгідний стан Короля-Без-Корони. Він явно більше не здатний правити своїм Королівством, що викликає питання: чому цей огидний любитель одружуватися на кузинах чіпляється за трон? Невже він справді думає, що ми хочемо бачити його кислу міну щоразу, коли обговорюємо життєво важливі політичні питання?»\nДеякі дворяни засміялися, тоді як ті, хто був вірний Нявгусу, насупилися. Сам Ґомез виглядав знервованим, але мовчав.\nКітріна продовжила. «Я також чула, що він одержимий катніпом. Йому все мало цієї гидоти! Замість того, щоб протистояти проблемам свого Королівства, він продовжує жувати листя, щоб зловити кайф. Ось, подивіться на це!» Вона підняла мішок із королівською печаткою, повний листя катніпу. Це була схованка Ґомеза.\nКімната вибухнула сміхом і криками. Очі Ґомеза розширилися від шоку. Хтось із близьких зрадив його і розкрив його таємницю. Його губи затремтіли, і він підвівся. У кімнаті запала тиша. «Знаєте що, ви у всьому праві. Я здаюся. Прощавайте».\nНе кажучи більше ні слова, він вийшов з кімнати і залишив двері відчиненими. Дворяни перешіптувалися між собою, поки Кітріна посміхалася, оголивши ікла."
 abyssinia.10.d_not_present: "Абіссинські аристокоти мали привілей скликати раду знаті для обговорення важливих справ, пов'язаних з Королівством. Оскільки метою ради було надання порад Нявгусу, він мав бути присутнім. Рада збиралася лише кілька разів після вторгнення Короля Шторма, оскільки дворяни швидко зрозуміли, що Нявгус тепер не має жодного інтересу слухати їх і навіть не хоче там бути. Тож для Мортіції стало несподіванкою, коли рада зібралася знову вперше за багато місяців.\n\nОскільки Ґомез був відсутній, до зали ради пішла Нявгіст. Вона побачила, що прийшли всі найважливіші дворяни Королівства, тож у них, мабуть, було щось важливе сказати. Вона сіла на місце Ґомеза в кінці столу, поки дворяни здивовано витріщалися на неї.\n«Ваша величність?» — запитала Цахіфе Лам Тардар Соурпусс. «Де Нявгус? Він прислав вас замість себе чи що?»\n«Боюся, Нявгус зараз далеко від столиці і не може бути присутнім на цій зустрічі».\nТардар пирхнула. «Могли б сказати нам раніше».\nОдна з кішок підвелася. Це була Кітріна з Дому Кітве, і вона виглядала розлюченою. «Тепер він відмовляється від свого обов'язку? Я мала поговорити з ним!»\n«Про що?» — запитала Мортіція.\n«Про... ну, про стан Королівства! Треба щось робити!»\nНявгіст посміхнулася. «Так, він відсутній, щоб впоратися зі своєю депресією. Як тільки він відчує себе краще, він повернеться і, сподіваюся, відновить виконання своїх обов'язків, як він робив це до вторгнення Короля Шторма».\nДворяни перешіптувалися у суміші схвалення та скептицизму, поки Кітріна кривилася. «Подивимося», — тихо прошипіла вона."
 abyssinia.10.a: "«Це має спрацювати»."
 abyssinia.10.b: "«Все йде за моїм планом»."
 abyssinia.10.c: "«Час для плану Б...»"
 
 abyssinia.11.t: "Енкутаташ"
 abyssinia.11.d: "Був одинадцятий день вересня, і за абіссинським календарем настав новий рік. Традиційно це було державне свято та час для великих святкувань. Ця дата називалася «Енкутаташ», що означало «Подарунок коштовностей», як посилання на легенду, в якій нявгіст Мевкеді її чоловік, нявгус Пазуромон, міфічний засновник Королівства Абіссинія, подарував дорогоцінне каміння. Сім'ї спочатку відвідують місцеві храми, а потім ділять трапезу з курячого м'яса, политого соусом. Коли сонце починає сідати, коти одягають свій найкращий одяг, збирають квіти і дарують букети своїм друзям, співаючи пісень. Останніми роками іноземні впливи, такі як феєрверки, також стали більш поширеними, особливо в містах.\n\nНезважаючи на важкі часи, святкування були радісними, і коти були щасливі відпочити від життєвих труднощів."
 abyssinia.11.a: "Нехай цей рік буде кращим за минулий..."
 
 abyssinia.12.t: "На межі"
 abyssinia.12.d_its_joever: "Мортіція була зайнята у своєму кабінеті, керуючи мізерними статками, які вони накопичили за останні місяці, коли Ґомез постукав у двері. Вона впізнала стукіт і сказала: «Заходь, мій любий!», відклавши роботу. Він увійшов і сів перед її столом.\n«Тіш, нам треба поговорити».\nВона схилила голову. «Що сталося?»\nВін глибоко зітхнув. «Під час недавньої ради знаті та кішка... Кітріна, розповіла про мою схованку з катніпом усім у кімнаті, намагаючись виставити мене дурнем. І є лише дві особи, які могли їй про це розповісти». Він говорив тихо і без емоцій.\nОчі Мортіції розширилися. «Що? Клянусь, це була не я! Я б ніколи...»\n«Я знаю. Це був Деджен. Він був поруч зі мною від самого початку, але тепер навіть він втомився від мене. Хто знає, що ще він розповів Кітріні? Що, якщо він розповів їй про...» Він раптом закрив обличчя лапами. «Я більше не можу з цим справлятися. Я все життя готувався до королівства, але вже відправив себе на звалище історії».\nМортіція підвелася, підійшла до нього і обійняла. Ґомез не обійняв її у відповідь.\n\nДовгий час панувала повна тиша, перш ніж Ґомез нарешті щось сказав:"
 abyssinia.12.d_maybe_its_joever: "Мортіція була зайнята у своєму кабінеті, керуючи мізерними статками, які вони накопичили за останні місяці, коли Ґомез постукав у двері. Вона впізнала стукіт і сказала: «Заходь, мій любий!», відклавши роботу. Він увійшов і сів перед її столом.\n«Тіш, нам треба поговорити».\nВона схилила голову. «Що сталося?»\nВін глибоко зітхнув. «Після недавньої ради знаті... Я не впевнений, що хочу продовжувати з цим справлятися. З усім цим тиском. Усі очікують від мене так багато, але я нічого не можу зробити».\nМортіція підвелася і підійшла до нього. «Оу, я розумію, але ти не можеш просто все кинути! Твої піддані потребують тебе, вони рівняються на тебе».\n«Я знаю, що не повинен, але, можливо, найкращим рішенням для мене буде просто здатися. Я просто не створений для королювання».\n«Твій батько виховував тебе як нявгуса, чи не так? Або ти боїшся розчарувати свою сім'ю та предків?»\nҐомез деякий час мовчав і трохи тремтів.\nВона обійняла його. «Послухай, я знаю, що зараз усе складно, але я поруч з тобою, і я не покину тебе. Що б ти не вирішив зробити, я буду на твоєму боці».\nҐомез кліпнув, а потім обійняв її у відповідь. Він довго не відпускав її, перш ніж нарешті прийняв рішення і сказав:"
 abyssinia.12.a: "«Думаю, мені варто поїхати у відпустку»."
 abyssinia.12.b: "«Думаю, буде краще, якщо я зречуся престолу»."
 
 abyssinia.13.t: "Зречення Нявгуса Ґомеза"
 abyssinia.13.d: "Перед королівським палацом зібрався великий натовп котів, оскільки поширилися чутки про важливу заяву, яка мала бути зроблена. Нявгус взагалі рідко з'являвся на публіці після вторгнення Короля Шторма, тому багатьом було цікаво, що станеться. Але вони були здивовані, коли права лапа Нявгуса, кіт на ім'я Деджен, вийшов на балкон палацу. Він тримав папір і відкашлявся перед тим, як заговорити. Натовп затих.\n\n«Нявгус прийняв дуже важливе рішення, яке зараз буде оголошено публіці. Він не в тому стані, щоб виголошувати промову, тому я зроблю це від його імені, прочитавши те, що він написав». Він підняв папір і прочитав:\n\n«Мої улюблені піддані,\n\nПісля довгих роздумів я нарешті прийняв болісне, але необхідне рішення. Я заявляю, що добровільно зрікаюся престолу на користь моєї дуже коханої і дорогої дружини, Нявгіст Мортіції. Я роблю це від щирого серця.\n\nЯ хочу, щоб ви зрозуміли, що, приймаючи рішення, я не забув про країну, якій як Нявгус Абіссинії намагався служити протягом дев'яти років. Але ви повинні повірити мені, коли я кажу, що вважаю неможливим нести важкий тягар відповідальності та виконувати свої обов'язки як Нявгуса. І я хочу, щоб ви знали, що рішення, яке я прийняв, належить лише мені і тільки мені. Це те, що я мав вирішити виключно для себе. Я прийняв це найсерйозніше рішення у своєму житті, керуючись єдиною думкою про те, що врешті-решт буде краще для всіх.\n\nА тепер у всіх нас є нова Нявгіст. Я від щирого серця бажаю їй і вам, її народу, щастя і процвітання. Хай живе Нявгіст!»\n\nНатовп мовчав, здавалося, і шокований, і спантеличений. Однак одна з кішок посміхнулася.\n\nЦе була Кітріна."
 abyssinia.13.a: "Хай живе Нявгіст!"
 
 abyssinia.14.t: "Місце паломництва"
 abyssinia.14.d: "Одинадцять Висічених у скелях Храмів Фелібели були вражаючим видовищем. Вони були висічені прямо в камені багато століть тому Нявгусом Фелібелою з династії Кітве, який хотів створити священне місто для свого Королівства. Храми та сусіднє місто були названі на його честь, але відколи Пазуромони повалили його династію, цей район здебільшого залишався поза увагою. Місто було незначним, а храми підтримувалися лише жерцями, які продовжували в них жити. Однак останнім часом це місце стало відомим і ожило завдяки відвідувачам.\n\nНа відміну від Фелібели, Нявгус Ґомез не відчував себе оновленим. Тепер, побачивши храми, він не був впевнений, що йому робити. Усе це почало здаватися марною тратою часу, тож він сів на камінь. Неподалік стояла стара статуя Бааст, чотириногої богині-творця котячого роду. Він подивився на неї і запитав себе, чи не зробила вона помилку, дарувавши розум його предкам. Можливо, він був би щасливішим, якби був диким котом, що ганяється за мишами чи ще чимось?\n\n«А ви хто?»\nҐомез повернув голову і побачив старого сірого кота, одягненого в чисто білі мантії. «Ви мене не впізнаєте?» — відповів він. «Я Нявгус Абіссинії... на жаль».\n«Я не питав про ваш титул. Титули уявні та безглузді».\nНявгус насупився. «Мене звати Ґомез Нявконнен».\n«Імена також уявні та безглузді. Хто ви насправді?»\nҐомез спантеличено кліпнув.\n«Вам явно потрібна допомога з відповіддю на це запитання. Як щодо того, щоб поговорити за чашкою гарячої кави?»\nҐомез завагався, перш ніж прийняти запрошення від цього жерця-селянина, але зрештою кивнув."
 abyssinia.14.a: "..."
 
 abyssinia.15.t: "Рухи в тінях"
 abyssinia.15.d: "Деджен справлявся зі своєю щоденною паперовою роботою з притаманною йому ефективністю, перекладаючи папери на своєму робочому столі та швидко скануючи їх своїми гострими очима. Однак один папір змусив його різко зупинитися. Він уважніше придивився до звіту в своїх лапах, оскільки йому потрібно було переконатися, що він прочитав його правильно.\n\nЩо це за заявки на постачання в столиці? Вони не були призначені ні для Коронної Гвардії, ні для місцевого гарнізону, ті були в окремому звіті. Хто взагалі їх затвердив?\n\nВін повернувся до життя, поспішно копирсаючись у своїх ретельно складених стосах паперу. Був звіт про прибуття почту Цахіфе Лам Тардар тиждень тому. Але де був звіт про їхній від'їзд? Чи були припаси реквізовані для них? Потім він знайшов ще кілька звітів про те, як дворяни привели свої озброєні свити як «охоронців» для ради, яку вони нещодавно провели. Ці охоронці досі не поїхали, і їх кількість була на диво високою. На що вони чекали?\n\nЙого очі розширилися, коли він усвідомив їхню мету. Він підвівся зі свого крісла і побіг до імпортного телефону, що висів на стіні. Але саме тоді, коли він збирався зателефонувати голові Коронної Гвардії, Полковнику, він завагався. Якщо він нічого не зробить і буде поводитися так, ніби нічого не знає, події йтимуть своєю чергою. Йому просто доведеться адаптуватися до нової ситуації, як завжди. Але чи не буде це зрадою?"
 abyssinia.15.a: "«Алло, Полковнику? Готується державний переворот»."
 abyssinia.15.b: "«Ґомез все одно аморальний боягуз. Він на це заслуговує»."
 
 abyssinia.16.t: "Нова Нявгіст"
 abyssinia.16.d: "Мортіція була зайнята підготовкою до своєї офіційної коронації, коли Деджен повідомив їй, що дворяни зібралися для проведення ще однієї ради. Однак вони її не запросили.\n\nВона увірвалася до зали ради і побачила, що та дійсно була повна аристокотів. Гірше того, Кітріна з Дому Кітве також була там. «Що це означає?!» — запитала вона. «Чому мене не запросили?»\n«А чому ми мали вас запрошувати?» — відповіла Цахіфе Лам Тардар. «Ви лише Ітеґе, консорт колишнього Нявгуса».\n«Що? Я Нявгіст!»\n«Заспокойся, люба, — промуркотіла Кітріна. — Хоча Ґомез і призначив тебе своєю наступницею, твої претензії на трон дуже слабкі, оскільки ти його кузина. Дворяни вирішили провести екстрене засідання, щоб обрати кращого кандидата на престол».\n«І хто б це міг бути?» — запитала Мортіція, вже знаючи відповідь.\n«Я, звичайно!» — сказала Кітріна і засміялася. «Я прямий нащадок Нявгуса Фелібели. І дворянам вже досить правління Пазуромонів. Крім того, твій предок скинув мою сім'ю в абсолютно незаконний спосіб».\n«Кітве були тими, хто захопив Королівство, не маючи на це жодного права!»\n«Цк-цк, як щодо того, щоб залишити історію літописцям. Найбільше значення має теперішній момент. Давайте перейдемо до голосування! Кожен дворянин, який бажає, щоб я стала наступницею Ґомеза на троні, підніміть лапу».\nБільшість дворян так і зробили. Кілька — ні, і вони з вибаченням подивилися на Мортіцію, безсилі що-небудь зробити.\n«Тоді вирішено!» — сказала Кітріна і стиснула лапи. «Хіба що ти хочеш оскаржити мої претензії на трон, Мортіціє. У такому разі, я впевнена, мої прихильники негайно кинуть тебе за ґрати, прямо тут і зараз».\nМортіція люто подивилася на неї. Вона не хотіла починати війну за престолонаслідування, щоб завдати ще більше страждань своїм улюбленим підданим. «Ти виграла, Кітріно, — прошипіла вона. — Насолоджуйся своїм правлінням»."
 abyssinia.16.a: "Хай живе Нявгіст!"
 
 abyssinia.17.t: "Час для кави"
 abyssinia.17.d: "Жрець сьорбнув зі своєї чашки, поки Ґомез дивився на свою. «Ви не збираєтеся пити?» — запитав жрець. «Або запитати моє ім'я?»\nҐомез вирвався зі своїх думок. «О, я просто чекав, поки вона охолоне. І хіба ви не казали, що імена безглузді?»\n«Усе одно ввічливо запитати, — сказав він із смішком. — Я Текле Няв'а, Абуна Фелібели, відповідальний за підтримку цих священних храмів. Мені цікаво, чому ви вирішили відвідати це місце. Ви явно не в паломництві, оскільки виглядало так, ніби ви взагалі не хотіли тут бути. Як і будь-де інде, якщо на те пішло».\n«Я... я хотів взяти відпустку. Керувати королівством — це стрес».\n«Ну, і як, ви насолоджуєтеся відпусткою?»\nҐомез не відповів.\n«Я так і думав. Ви прийшли сюди тільки тому, що вам сказали прийти, чи не так?»\n«Я б ніколи не відмовив своїй дружині».\n«Розумію. Вона хвилюється за вас, чи не так? Але боюся, 'відпустка' не вирішить ваших проблем».\nҐомез зітхнув. «А що тоді вирішить? Вона намагалася знайти спосіб вилікувати мене».\n«Вилікувати? Ліків не існує. У вас недуга розуму. За ці роки я бачив багато таких котів. Вони можуть посміхатися, але їхні очі порожні. Вони можуть говорити доброзичливо і м'яко, але при цьому ненавидіти все, а особливо себе».\nҐомез підвівся. «Думаю, мені час... йти. Дякую за каву».\n«Я можу вам допомогти, Ґомезе. Ви повинні навчитися жити з цією частиною себе. Це єдиний спосіб рухатися вперед. Або ви хочете, щоб ваша дружина плакала на вашій могилі?»\nҐомез завмер і шоковано витріщився на нього.\n«Вам пощастило мати когось, хто вас любить. Це єдине, що може вас врятувати. Залиштеся тут заради неї»."
 abyssinia.17.a: "«...Гаразд»."
 
 abyssinia.18.t: "Хаос у Пантері"
 abyssinia.18.d: "Було за північ, коли великі групи добре озброєних котів почали марширувати до королівського палацу з усіх боків. Вони були обережними у своєму наближенні та намагалися зберегти ефект несподіваннки. На будь-яких громадян, які вночі були на вулицях, швидко наставляли зброю, і вони тікали. Біля воріт палацу учасники маршу не зустріли жодного опору, тож вони прорвалися і ринули всередину.\n\nТам було порожньо і тихо. Нікого не було видно.\n\n«Схоже, вони на нас чекали», — пробурмотіла Цахіфе Лам Тардар. «Я знала, що це станеться».\nКітріна виглядала розчарованою. «Ти права. Нам потрібно змінити плани...»\n«Ми пройшли точку неповернення». Тардар знизала плечима. «Щось робити вже пізно. Ми програли».\n«Ні!» — прошипіла Кітріна. «Я занадто багато працювала для цього. Накажи своїй свиті зайняти оборонні позиції! Цей палац мій!»\n«Як скажеш», — відповіла Тардар, але все ж підкорилася.\n\nНезабаром окупанти помітили, що палац з усіх боків оточує Коронна Гвардія. Вони маршем увійшли прямо в пастку. Полковник Мяу, голова Гвардії, вийшов перед воротами палацу. «Здавайтеся, і вам не завдадуть шкоди!»\n«Швидше, стріляйте в нього!» — наказала Кітріна. Але ніхто цього не зробив.\n«Стріляти в Полковника?» — запитав її офіцер-перебіжчик Алфі Месфін. «Але, мем, це було б...»\nКітріна схопила пістолет і вистрілила в нього сама. Вона промахнулася.\n\nЦе поклало початок запеклій і жорстокій перестрілці, яка тривала всю ніч. Коли зійшло сонце, центр Пантери був у руїнах, а в решті міста панував хаос. Після того, як Тардар здалася, Кітріна та невелика група вірних їй прихильників сховалися в Катакомбах Нявгіст Меводори II. Вони протрималися там цілий день, перш ніж нарешті теж здалися."
 abyssinia.18.a: "Столиця в безпеці."
 
 abyssinia.19.t: "Хаос у Пантері"
 abyssinia.19.d: "Було за північ, коли великі групи добре озброєних котів почали марширувати до королівського палацу з усіх боків. Вони були обережними у своєму наближенні та намагалися зберегти ефект несподіванки. На будь-яких громадян, які вночі були на вулицях, швидко наставляли зброю, і вони тікали. Коли пара коронних гвардійців помітила їх біля воріт палацу, вони кинулися всередину, щоб попередити інших. Однак тоді було вже занадто пізно. Палац був оточений.\n\n«Це буде як стріляти рибу в бочці», — сказала Кітріна із самовдоволеною посмішкою.\n«Я очікувала, що все піде зовсім не так», — відповіла Цахіфе Лам Тардар. «Ймовірно, так і буде».\n«Нісенітниця! Давайте вимагати їхньої капітуляції!»\nВони послали до воріт посланця, офіцера-перебіжчика на ім'я Алфі Месфін. «Складіть зброю, і, можливо, вас пощадять. Може, у нас і дев'ять життів, але їх не варто витрачати даремно. Присягніть на вірність вашій новій Нявгіст, Кітріні!»\n«Якщо вам потрібна наша зброя, прийдіть і візьміть її!» — відповів голова Коронної Гвардії, Полковник Мяу.\nКітріна засміялася. «Якщо вони хочуть котячої бійки, вони її отримають».\n\nЦе поклало початок запеклій і жорстокій битві, яка тривала всю ніч. Коли зійшло сонце, центр Пантери був у руїнах, а в решті міста панував хаос. Але після того, як Кітріна взяла в полон кількох коронних гвардійців, вона погрожувала їх стратити. Тоді Полковник з ваганням здався і присягнув їй на вірність.\n\nКілька солдатів Кітріни вивели Нявгіст Мортіцію назовні і представили її Кітріні. «Вона вдарила нас свічником, а потім подряпала кігтями, але нам все-таки вдалося її втихомирити, мем».\n«Чудово! Ви спіймали любу кузину Ґомеза».\nМортіція примружила очі і люто подивилася на неї. «І що ви плануєте зі мною робити?»"
 abyssinia.19.a: "«Я отримаю твою голову на срібному блюді!»"
 abyssinia.19.b: "«Я кину тебе в підземелля, де тобі й місце»."
 
 abyssinia.20.t_its_joever: "Саянора"
 abyssinia.20.t_maybe_its_joever: "Новий початок"
 abyssinia.20.d_its_joever: "Після того, як знать Королівства затвердила Кітріну новою правителькою Абіссинії, Мортіція та Ґомез мали готуватися до від'їзду з палацу. Колишня Нявгіст, чиє правління тривало лише кілька днів, була зайнята, допомагаючи слугам пакувати сімейні речі. Деякі з їхніх родичів також прийшли допомогти з переїздом. Незабаром у передпокої зібралася гора коробок та інших контейнерів, готових до вивезення.\n\nПроте Ґомез майже нічого не робив, проводячи більшу частину часу у своїй спальні. Мортіція хвилювалася, чи не використовує він усе своє листя катніпу, що залишилося, і неодноразово намагалася заохотити його працювати разом з нею, але марно. Коли нарешті настав день від'їзду, Мортіція вирішила поговорити з ним наодинці та спланувати їхнє невизначене майбутнє. Вона попрямувала до його спальні і постукала у двері.\n\nВідповіді не було.\n\nВона помітила щось дивне на підлозі біля дверей. Опустившись на коліна, щоб придивитися, вона побачила обгорілу купку катніпу, а також відірваний шматок паперу. На ньому було написано: «Усе скінчено».\nЧи справді Ґомез відмовився від катніпу, знайшовши внутрішню силу подолати свою депресію? Можливо, він просто мирно спав. У будь-якому разі Мортіція відчувала надію, але все ж хотіла поговорити з чоловіком, щоб переконатися, що з ним усе гаразд."
 abyssinia.20.d_maybe_its_joever: "Після того, як знать Королівства затвердила Кітріну новою правителькою Абіссинії, Мортіція та Ґомез мали готуватися до від'їзду з палацу. Колишня Нявгіст, чиє правління тривало лише кілька днів, була зайнята, допомагаючи слугам пакувати сімейні речі. Деякі з їхніх родичів також прийшли допомогти з переїздом. Незабаром у передпокої зібралася гора коробок та інших контейнерів, готових до вивезення.\n\nПроте Ґомез майже нічого не робив, проводячи більшу частину часу у своїй спальні. Мортіція хвилювалася, чи не використовує він увесь свій катніп, що залишився, і неодноразово намагалася заохотити його працювати разом з нею, але марно. Коли нарешті настав день від'їзду, Мортіція вирішила поговорити з ним наодинці та спланувати їхнє невизначене майбутнє. Вона попрямувала до його спальні і постукала у двері.\n\nВідповіді не було.\n\nВона відчинила їх і побачила Ґомеза, який сидів на ліжку і дивився на порожній мішечок з-під катніпу у своїх лапах.\n«Ґомезе? Усе га- тобто, я знаю, що ні, але...» — зітхнула вона. «Вибач, я не знаю, що маю сказати чи зробити».\n«Усе гаразд, Тіш», — відповів Ґомез і подивився на неї. «Я просто змиряюся з тим фактом, що все скінчено. Мене все життя виховували як Нявгуса, а тепер я просто звичайний кіт. Але я зрозумів... це шанс почати все спочатку». Він підвівся, викинув мішечок і з усмішкою подивився на Мортіцію. «Це нічого, що ти не можеш мені допомогти, головне, що тобі не байдуже. Це багато для мене значить. Можливо, я не створений для королювання, але, сподіваюся, я все ще можу бути хорошим чоловіком».\nМортіція теж усміхнулася. «Я знаю, що можеш. І я знаю, що разом ми зможемо пристосуватися до нашого нового життя».\n«Мені подобається, як це звучить. Нове життя. Наче я перероджуюся, отримую другий шанс. Обіцяю, я його не змарную», — сказав він і обійняв свою дружину."
 abyssinia.20.a: "Вона обережно відчинила двері."
 abyssinia.20.b: "..."
 
 abyssinia.21.t: "Життя та часи містера Ґомеза"
 abyssinia.21.d_doctor: "Кава не мала розслаблюючого ефекту, і Ґомез відчував, що вона посилює його тривогу. Він не звертав уваги на свій зручний диван і натомість дозволив своєму погляду блукати кімнатою.\n«Скажи мені, Ґомезе, що саме тебе так турбує, що ти шукаєш тут притулку?» — лагідно запитав Текле, сидячи на потертому дерев'яному стільці, який виглядав так, ніби міг зламатися будь-якої миті.\n«Усе», — огризнувся Ґомез, досі не дивлячись на жерця. «Наприклад, минулого разу, коли я намагався отримати допомогу, якісь лікарі намагалися поставити мені діагноз і врешті-решт почали сперечатися через абсурдні ідеї, від яких мені, напевно, стало б тільки фізично зле».\n«Хм, розумію. Не хвилюйся, якщо тобі не сподобається моя допомога, у мене щедра політика повернення коштів», — сказав він із смішком.\n«Дуже смішно. Якби ви просили грошей, я б все одно не зміг заплатити. Державна скарбниця порожня».\n«Через Короля Шторма?»\n«Так!» — крикнув чорний кіт, тепер пильно дивлячись на жерця. «Ця сіра мавпа все зруйнувала! Я витратив роки, намагаючись вирішити проблеми, які загрожували Королівству, а натомість прийшов якийсь божевільний воєначальник і все зруйнував. Хто знає, раптом щось подібне станеться знову?» Він миттєво знітився і зсутулився на дивані.\nСтарий кіт кивнув. «А до цього ти відчував себе добре?»\n«Я... ну, я справді почувався краще, мабуть».\n«Отже, як і багато інших котів, ти зіткнувся з труднощами та невдачами, і твій картковий будиночок розвалився. Ти не маєш бажання продовжувати боротьбу і відбудовувати все, що втратив?»\nҐомез закрутився, наче кіт, якого силоміць тягнуть у ванну. «Усе зруйновано... Я не впевнений, що зможу все це виправити. Я кіт, від якого чекають великих звершень. Не думаю, що такий мирянин, як ви, зміг би хоча б осягнути масштаб моїх проблем».\n«Невдача — це можливість навчитися і стати кращим. Крім того, ви коли-небудь пробували розтоптати і зруйнувати мурашник? Хіба мурахи просто здаються? Ні, вони відбудовують свої домівки, скільки б разів ви їх не руйнували, без жодних сумнівів чи вагань».\n«Ви хочете сказати, що я гірший за мураху?» — запитав Ґомез з ображеним виглядом.\nТекле зітхнув. «Здається, ви напружені. Я рекомендую вам трохи розслабитися і спробувати не думати про свої обов'язки. Ми зможемо продовжити розмову, коли ви відчуєте, що готові»."
