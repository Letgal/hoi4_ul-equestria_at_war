 abyssinia.23.a:0 "Коти не завжди приземляються на лапи."
 abyssinia.23.b:0 "Хай живе Нявгус!"
 abyssinia.23.c:0 "«Це могло стати катастрофою.»"
 
 abyssinia.24.t:0 "Роздуми"
 abyssinia.24.d:0 "Як і радив йому жрець, Ґомез спробував деякий час пожити як звичайний кіт і не думати про свої обов'язки. Це було важко, оскільки він усе ще проводив більшу частину часу у своїй спальні, а всі інші коти продовжували ставитися до нього як до Нявгуса. Тож коли Текле знову запросив його до себе, він не був певен, чи його порада принесла хоч якусь користь.\nҐомез постукав у дерев'яні двері його будинку, і їх незабаром відчинив літній кіт, який тепло усміхнувся. «Радий вас бачити, Ґомезе», — сказав жрець. «Як ваші справи?»\n«Я, е-е... мабуть, я в порядку».\n«Щось змінилося після того, як ви перестали думати про свої обов'язки?»\n«Ну...» — він насупився і замислився, досліджуючи власні емоції. «Я справді відчуваю трохи... менше стресу».\n«Добре. Заходьте, давайте тепер нормально поговоримо».\n\nВони знову сіли, хоча Ґомез рухався невпевнено.\n«Отже, я думаю, ми обидва розуміємо суть проблеми», — заговорив Текле. «Коли ви стикаєтеся з невдачею, ваші емоції беруть гору, і ви більше не контролюєте ситуацію».\nВуха чорного кота нащулилися, ніби він знову образився. Але він швидко заспокоївся після хвилини роздумів. «...Думаю, ви маєте рацію, так».\n«Емоції як вогонь: вони хороші слуги, але погані господарі. Скажіть мені, минуле переслідує вас? Чи відчуваєте ви смуток або гнів через усе, що з вами сталося?»\nЯк би не здавалося, що він не хоче відповідати, він відповів: «Так. Мені навіть сняться сни про минуле... або кошмари».\nЖрець задумливо кивнув. «Бааст одного разу сказала: 'Не чіпляйтеся за минуле і не фантазуйте про майбутнє, бо минуле залишилося позаду, а майбутнє ще не настало'. Ви не живете в сьогоденні, а шкодуєте про минуле і боїтеся майбутнього. Як можна так жити?»\nГуби Ґомеза викривилися в дивній усмішці. «Дійсно, таке життя навряд чи чогось варте».\n«Тоді зробіть його вартим», — відповів Текле. «Ви повинні скинути з престолу свої почуття, приборкати свій розум і знову стати власним господарем, Нявгусом у Королівстві свого розуму. Я можу вам допомогти, Ґомезе. Вірите ви в це чи ні. Просто ніколи не здавайтеся, і ви впораєтеся».\nТак званий «Нявгус» витріщився на нього, нічого не кажучи."
 abyssinia.24.a:0 "Безкоронний знову стане Нявгусом."
 
 abyssinia.25.t:0 "На прогулянку"
 abyssinia.25.d:0 "Жрець вивів Ґомеза на вулицю, і поки вони йшли, той запитав: «Як ви так добре мене розумієте? Ви лише жрець, ви не повинні усвідомлювати труднощі королювання».\n«Немає ні нявгусів, ні жерців, — сказав Текле. — Лише заблудлі душі, замкнені в циклі перероджень, перш ніж загубитися в небутті. За своєю суттю ми всі однакові».\n«...Зрозуміло, — відповів Ґомез. — Куди ми взагалі йдемо?»\n«Нікуди. Не всьому потрібна мета чи призначення. Ходьба та блукання допомагають стимулювати ваше тіло, а отже, і ваш розум».\n«А... ну, мені поки не стало краще».\n«Хіба насіння проростає в дерево за один день? Ні, і ви повинні часто його поливати і добре про нього дбати».\nВін зітхнув. «Мабуть, мені доведеться набратися терпіння».\n«Саме так. Ви повинні навчитися самоконтролю в цілому. Як казала Бааст: 'Приборкувати розум, щоб він був ефективним, — це добре. Приборканий розум приносить щастя'. У цьому полягає різниця між диким котом і абіссинцем. Я знаю, як тренувати цю здатність, і знаю, що ви можете цьому навчитися».\nҐомез повільно кивнув і деякий час нічого не говорив. Потім він запитав: «Я думав, що такі жерці, як ви, вміють лише читати напам'ять Три Писання і більше нічого».\n«Наш обов'язок — бути духовною опорою суспільства. Бааст подарувала нам розум, давши здатність уникнути циклу страждань, на які приречені тварини. Однак багато котів не знають, як використовувати свої дари. Це наш обов'язок — дбати про ці уми і лікувати їх, коли вони хворі». Старий кіт зітхнув. «Але я знаю, що світ змінюється. Еквестрійська наука з її 'психологією' та нейромантичними заклинаннями — це майбутнє». Він повернувся, щоб подивитися на Ґомеза, і усміхнувся. «Моє останнє завдання — допомогти вам, Ґомезе. Це стане гідним завершенням мого довгого життя»."
 abyssinia.25.a:0 "..."

 abyssinia.26.t:0 "Сидячи на камені"
 abyssinia.26.d:0 "Після тривалої прогулянки та розмов двоє котів підійшли до великого каменя, що лежав на краю скелі. Здавалося, жерцю спала на думку ідея, і він видерся на нього, хоча виглядало так, ніби камінь може зірватися в прірву.\n«К-куди ви лізете?» — запитав Ґомез.\nЖрець сів на камінь і схрестив лапи. «Йдіть сюди, сідайте поруч зі мною. Вид звідси просто чудовий!»\nҐомез завагався.\nТекле обернувся і подивився на нього. «Що, боїтеся впасти і розбитися?»\nҐомез не відповів.\n«У нас дев'ять життів, як і у звичайних котів. Дев'ять шансів... але цілком можливо, що це наші останні життя. Та чи означає це, що ми повинні жити як раби страху?»\n«Я не боюся, — сказав Ґомез. — Іноді... я думаю про те, щоб стрибнути зі скелі. Але я просто... хочу сам вирішувати, коли це станеться».\n«Отже, ви все ж таки боїтеся. Інакше б уже це зробили. Давайте, тут нема чого боятися. Цей камінь лежить тут тисячоліттями. За цей час незліченна кількість королівств поставала і занепадала, незліченна кількість нявгусів і нявгіст жили і вмирали. Цей камінь пережив їх усіх, і він переживе і нас».\nҐомез ковтнув слину і видерся нагору, сівши поруч із Текле.\n«Ось так. Тепер, це чудове місце, щоб зосередитися на нинішньому моменті. Сядьте як я, прийміть цю позу. Отак, так. Тепер дихайте, контролюйте це. Повільно і рівномірно. Відчуйте своє дихання, відчуйте повітря у своїх легенях. Далі ви можете розширити своє усвідомлення ще більше. Що відчуває решта вашого тіла? Що відчуває ваш розум? Зафіксуйте емоції всередині себе. Ви не можете схопити туман, ви повинні триматися за тверді речі. Тому ваші думки та почуття повинні стати керованими. Подумайте про щось, що робить вас нещасним або засмучує. Потім подумайте про те, що робить вас щасливим. Зустріньтеся з ними віч-на-віч. Дозвольте їм пройти над вами і крізь вас. Ваші почуття не визначають, хто ви є. Ви самі визначаєте себе. Не дозволяйте негативним нав'язливим думкам контролювати вас. Не засуджуйте себе, якщо з першого разу не вийде. Взагалі не засуджуйте себе. Кожна розумна істота має недоліки. Тільки Бааст була ідеальною, і її вже давно немає».\nҐомез сидів тихо із заплющеними очима."
 abyssinia.26.a:0 "..."
 
 abyssinia.27.t:0 "Час для кави: Сиквел"
 abyssinia.27.d:0 "Ґомез зробив ковток зі своєї гарячої чашки кави. Як і вчив його Текле, він намагався зосередитися на смаку та теплі, що випромінювала рідина. Він мусив визнати, що це було приємно. Проте він усе ще не відчував себе щасливим і сумнівався, чи коли-небудь буде. Але він також не відчував себе надто нещасним. Він завжди хотів навчитися контролювати свої емоції. Можливо, це і був той самий шлях.\n\n«Ми досягли значного прогресу, — сказав жрець, який сидів на протилежному кінці столу. — Але я сумніваюся, що цього хоч трохи достатньо».\n«Боюся, мені доведеться піти. Я і так провів тут забагато часу».\n«Що, більше не хочете відкладати свої обов'язки?» — запитав він з усмішкою.\nНявгус зітхнув. «Я просто хочу знову побачити свою Нявгіст».\n«Добре. Але якщо ви вирішите повернутися до свого звичайного життя, пам'ятайте, що вам потрібно постійно продовжувати керувати своїми почуттями. Якщо ви цього не робитимете, вони ставатимуть лише гіршими і гіршими».\n«Я помітив», — пробурмотів Ґомез і випив ще кави.\n«Ми всі маємо робити те, чого не хочемо. Це так само стосується Нявгуса, як і раба. Проте не дозволяйте вашому обов'язку поглинути вас. Коли робота закінчується, ви такий же кіт, як і я. Пам'ятайте про це».\n«Але моя відповідальність набагато більша, ніж у будь-якого іншого кота». Він згадав зголодніле кошеня в тому селі і відчув провину.\n«Ви маєте рацію. Але відповідальність не лежить виключно на вас. Ніколи не соромтеся просити про допомогу в інших. Навчіться ділити свої завдання на менші частини і ділитися ними з іншими, щоб полегшити тягар».\nҐомез кивнув і допив каву. «...Я ціную те, що є хтось, хто дійсно може мені допомогти. Моя дружина... дуже старається, але вона просто не знає, що робити».\n«Прошу. І я буду чекати вашого повернення, друже».\n\nҐомез ледь помітно усміхнувся."
 abyssinia.27.a:0 "«До нової зустрічі.»"
 
 abyssinia.28.t:0 "Повернення Нявгуса"
 abyssinia.28.d:0 "Імпортний автомобіль заїхав на подвір'я королівського палацу і зупинився. Десятки слуг негайно обступили його, а Нявгіст Мортіція стояла біля входу в палац в оточенні кількох коронних гвардійців. Побачивши, що Ґомез виходить, вона кинулася його обіймати. «Ласкаво просимо додому, мій любий», — сказала вона.\nҐомез обійняв її у відповідь. «Знаєш, відпустка була гарною ідеєю. Я почуваюся... відпочилим».\nОчі Мортіції розширилися. «Справді?»\nВін кивнув і змусив себе усміхнутися.\n\nЙого права лапа, Деджен, також вийшов зустріти його.\n«Радий тебе бачити, Деджене, — сказав йому Ґомез. — У тебе є час для зустрічі завтра?»\nБюрокіт ледь помітно підняв брову. «Ні, але післязавтра є вільне вікно».\n«Добре. Я хотів би спробувати її провести, минуло надто багато часу з минулого разу».\n«Радий вашому поверненню, Ваша Величносте», — відповів Деджен і шанобливо вклонився.\n«І я радий повернутися», — сказав Ґомез і поцілував дружину в щоку.\n\nЗвісно, мало що змінилося. Але навіть якщо у нього було мало надії, він хотів дарувати надію іншим. Це було найменше, що він міг зробити, навіть попри те, що він не міг перестати думати про свою схованку з листям катніпу."
 abyssinia.28.a:0 "Битва тільки почалася."

 abyssinia.29.t:0 "Всебічний огляд"
 abyssinia.29.d:0 "«Буду відвертим, Ваша Величносте, я не був певен, що ви будете тут», — сказав Деджен, готуючи свою презентацію.\n«Все гаразд. Я теж не був певен», — відповів Ґомез.\n«Що ж, оскільки на це знадобилося достатньо часу, я перейду одразу до справи. Мій огляд охопить внутрішню та зовнішню ситуацію Королівства. Я почну з першої». За спиною в нього висіла велика карта Абіссинії, а в лапі була указка. «Коли я писав цю презентацію, моєю найбільшою проблемою була знать, але відтоді їхня загроза зменшилася. Проте багато дворян залишаються незадоволеними вашим правлінням зі зрозумілих причин. Їм потрібно буде нагадати про вашу легітимність і компетентність. Друга внутрішня проблема — це рабство. Є всі підстави повністю оголосити його поза законом і звільнити наш мільйон рабів, але вищезгадана знать рішуче проти цього. Проте, якщо цього не зробити, це призведе до постійних повстань рабів, придушення яких коштує дорого». Він вказав указкою на Кольтобу. «Третя проблема — Мейндалусія. Зберігається напруженість через конфлікт, який ми мали з Мейргиптом роки тому, і місцевий сепаратистський рух скористався нещодавнім хаосом, щоб зміцніти. Четверта проблема — голод. Без коштів на імпорт продовольства нашого обмеженого внутрішнього виробництва недостатньо. Але у нас є багато способів врятувати ситуацію, поки не пізно. Говорячи про нестачу коштів, це п'ята і остання внутрішня проблема, яка потребуватиме масштабних і швидких реформ. Далі — зовнішні. По-перше, конфлікти в Сідловій-Арабії та Великих Озерах значно скоротили наші доходи від торгівлі, — сказав він, вказуючи на два регіони, які виглядали оманливо об'єднаними на застарілій карті, — ускладнюючи поповнення нашої скарбниці». Потім він вказав на Кітрен. «По-друге, монархічний уряд Вінґбардії досі розглядає нас як частину своєї сфери впливу». Його указка рушила на схід до річки Нейл. «По-третє, реваншисти Мейргипта продовжують закликати свій уряд 'звільнити' Кольтобу від нашого правління. Такими темпами вони можуть розпочати проти нас військовий наступ». Він зупинився на мить, ніби обмірковуючи, що сказати, а потім вказав на землі на південь від Абіссинії. «Нарешті, наші відносини з віслючими державами Асстирія та Ансерук... хороші, насправді, принаймні на даний момент». Він знову повернувся до Ґомеза. «Є питання, мій Нявгус?»"
 abyssinia.29.a:0 "«...Мені потрібна хвилина на роздуми.»"
 
 abyssinia.30.t:0 "Грошова реформа"
 abyssinia.30.d:0 "«Що ви знаєте про грошові системи?» — запитав Деджен у [ROOT.ABY_king_loc_cap].\n«Е-е... мене вчили основ. І я, можливо, навіть щось пам'ятаю».\n«Тоді я поясню просто. Наразі наша валюта, мурр, базується на золотому стандарті. І я певен, що ви знаєте про відсутність у нас будь-якого золота. Це викликало серйозні економічні проблеми, такі як дефляція, масове вилучення вкладів з банків та спад економічної активності. Ці проблеми настільки серйозні, що нам слід було провести реформи якомога швидше».\nҐомез потер лоб кігтями. «Мені шкода».\n«Вибачення прийнято. Тепер ви маєте прийняти рішення. Я вивчив наші варіанти та об'єднав їх у три. Два з них схожі: ми прив'язуємо вартість нашої валюти до вартості іншої. Це принесе фінансову стабільність і полегшить залучення кредитів з-за кордону, але зробить нас більш залежними від тієї валюти, яку ми оберемо. Мої дві пропозиції — еквестрійський біт і скайфолльський ідол. Обидві є надійними, цінними і широко використовуються у світовій торгівлі. Будь-яка з них виконуватиме роль нашої резервної валюти. Третій варіант — просто взагалі не мати фіксованої валюти. Плаваючий обмінний курс був би більш неортодоксальним вибором, але дозволив би нам швидше оговтатися від кризи та дав би змогу збільшувати нашу грошову масу настільки, наскільки це необхідно. Однак це може призвести до надмірної інфляції, тому нам доведеться бути обережнішими, ніж з іншими двома альтернативами».\n\nҐомез насупився. Йому здавалося, що він зрозумів більшу частину з того, що сказав Деджен, але йому все одно доведеться ретельно зважити різні варіанти. Чіткого рішення для цієї проблеми не було."
 abyssinia.30.a:0 "«Давайте оберемо біт.»"
 abyssinia.30.b:0 "«Вінґбардійці ж не використовують ідол, чи не так?»"
 abyssinia.30.c:0 "«Ми можемо покладатися лише на себе.»"
 
 abyssinia.31.t:0 "Абіссинія пропонує торговельну угоду"
 abyssinia.31.d:0 "«Хоча незалежні купці вже ведуть торгівлю між нашими країнами, офіційна торговельна угода зробила б її безмитною, що, без сумніву, збільшило б обмін товарами та принесло б більше процвітання для нас обох».\n\n[Root.GetLeader] мовчки кивнув. Абіссинців не можна було назвати великою рідкістю, але все ж був потрібен деякий час, щоб звикнути до вигляду великого кота, який сидить прямо, одягнений у білий смокінг та циліндр.\n\n«Я не бачу жодних причин не підписувати цю угоду, — продовжив кіт. Його вишукана манера розмови підтверджувала його заяву про те, що він був членом абіссинської аристократії — або, як вони це називали, аристокотії. — Абіссинія має багато багатств, які може запропонувати, незважаючи на вторгнення Короля Шторма. Наші поля дають рясні врожаї кави, а в наших шахтах знаходять багато дорогоцінних металів. Хоча наразі ми не маємо коштів для масового імпорту товарів, ми можемо багато експортувати. Як тільки ми накопичимо достатньо капіталу, тоді, я певен, наші купці також почнуть купувати і ваші товари».\n\n«Ви говорите розумні речі, — з легким ваганням промовив [Root.GetLeader]. — Думаю, я прийняв рішення»."
 abyssinia.31.a:0 "«Я підпишу угоду.»"
 abyssinia.31.b:0 "«На жаль, наразі ми не можемо підписати цю угоду.»"
 
 abyssinia.32.t:0 "Результати пропозицій щодо торговельної угоди"
 abyssinia.32.d_someone_traded:0 "Фітаурарі Діметі, Гумберт Темесген, вклонився і зняв свій білий циліндр. «Ваша Величносте, як бачите, я щасливо повернувся з моєї подорожі».\nҐомез, який сидів на своєму троні, кивнув. «З поверненням. Як усе пройшло?» — дещо стурбовано запитав він. «Хтось підписав угоду?»\nГумберт дістав кілька паперів зі свого смокінга. «Я радий повідомити вам, що моя поїздка не була марною. Ніколи не сумнівайтеся в моїх навичках ведення переговорів, Ваша Високосте».\nҐомез з полегшенням зітхнув. «Добре. Деджен запевнив мене, що незважаючи на відсутність доходів від мита, зростання економічної активності зрештою має збільшити податкові надходження, оскільки мої піддані стануть багатшими».\n«Правильно, Ваша Величносте».\n«І я сподіваюся, що багатство розподілятиметься рівномірно, а не накопичуватиметься в лапах купців та власників майна».\n«Оскільки я сам є дворянином, моя думка з цього питання є упередженою, тому я нічого не скажу. Але я вірю, що ви знаєте, що найкраще для держави, Ваша Високосте».\nҐомез ледь помітно усміхнувся."
 abyssinia.32.d_no_one_traded:0 "Фітаурарі Діметі, Гумберт Темесген, вклонився і зняв свій білий циліндр. «Ваша Величносте, як бачите, я щасливо повернувся з моєї подорожі».\nҐомез, який сидів на своєму троні, кивнув. «З поверненням. Як усе пройшло?» — дещо стурбовано запитав він. «Хтось підписав угоду?»\nГумберт глибоко вдихнув. «На жаль, моя поїздка виявилася марною. Я зробив усе можливе і застосував усі свої навички ведення переговорів, але не зміг нікого переконати підписати торговельну угоду. Мені дуже шкода, Ваша Високосте».\nҐомез насупився. «Все... все гаразд. Ви зробили все, що могли, і цього більш ніж достатньо».\n«Дякую за ваше прощення, Ваша Величносте. Я вас більше не підведу»."
 abyssinia.32.a:0 "«Дякую.»"
 abyssinia.32.b:0 "«Таке відчуття, ніби я підвів самого себе...»"
 
 abyssinia.33.t:0 "Фатальний героїзм"
 abyssinia.33.d:0 "Тисячі виснажених котів крокували геть від лінії фронту, надто втомлені, щоб рухатися швидше. Був лише один виняток: вона бігла з усіх сил, наближаючись до офіцера в уніформі. «Азмачу! Ворог продовжує нас переслідувати! Вони прямо за тим хребтом».\nАзмач, командир ар'єргарду, насупився. «Вони женуться за нами, як собаки! І щойно вони виберуться на той хребет, вони переб'ють нас, як щурів».\n«Це ще не все. Полковник Мяу особисто очолив невеликий свіжий загін, щоб утримати хребет».\nАзмач нашорошив вуха. «Що? Він збожеволів? Він нізащо не зможе утримати позицію!»\n«Він сказав мені, що його мета — виграти для нас час, щоб ми могли дістатися безпечного місця, сер».\nАзмач подивився на хребет позаду них. Тепер його стрясали безперервні вибухи. «Тоді рушаймо, щоб його жертва не була марною. Усі коти, зберіть усі свої сили! Нам треба забиратися звідси, і швидко!»\n\nЧерез кілька днів одна з високопоставлених офіцерів Коронної Гвардії відкрила листа. Усередині було повідомлення, а також медаль, що належала Мяу Фрауну. Читаючи листа, вона зрозуміла, що медаль і звання Генерала Коронної Гвардії тепер належать їй."
 abyssinia.33.a:0 "Сподіваюся, це було не останнє його життя."
 
 abyssinia.34.t:0 "Рецидив"
 abyssinia.34.d:0 "Сидячи на ліжку і жуючи катніп, Ґомез дедалі більше переконувався, що Текле Нява був просто шарлатаном, який намагався ошукати його нісенітницями та брехнею. Він здригнувся від несподіванки, коли двері раптом відчинилися. Коли вже ці коти навчаться манер?\n\nВін заспокоївся, побачивши, що це Мортіція. «Мій любий, усе гаразд?» — запитала вона. «Останнім часом ти знову виглядаєш пригніченим».\nҐомез зітхнув, як він це часто робив. «Мабуть, ти маєш рацію. Від тебе нічого не приховаєш, еге ж, Тіш?»\nВона сіла поруч із ним. «Може, тобі варто знову поїхати у відпустку? Здавалося, це зробило тебе щасливішим на деякий час».\n«Я... е-е, ну, можливо».\n«До речі, про те, щоб нічого не приховувати: ти так і не розповів мені, що сталося у Фелібелі».\n«Вибач. Я зустрів... одного кота там, старого жерця, який дуже намагався мені допомогти».\n«То чому б не відвідати його знову? Звучить непогано».\nҐомез насупив брови. Вона мала рацію, навіть якщо Ґомезу не хотілося нікуди їхати. І вона завжди хотіла для нього лише найкращого, чи не так? «Я подумаю над цим».\n\nДвоє чорних котів обійнялися."
 abyssinia.34.a:0 "..."
 
 abyssinia.35.t:0 "Кінець гри?"
 abyssinia.35.d:0 "Мотузка обірвалася майже відразу після того, як він зістрибнув з ліжка, і він приземлився на куприк. Гострий біль пронизав його тіло, і йому здалося, ніби щось зламалося. Він скрикнув від болю і впав на підлогу; мотузка все ще натирала йому шию.\n\nЧерез мить він почав сміятися.\n\nВін навіть цього не зміг зробити як слід. Він був цілковитим невдахою. Чомусь це було дуже смішно, і він не міг перестати сміятися з абсурдності всього цього. Чому його взагалі мало ще щось хвилювати? Будь-яка спроба втечі закінчилася б невдачею, бо він був таким нікчемою. Тож він міг би з таким самим успіхом просто плисти за течією і чекати, поки якась химерна хвороба чи нещасний випадок зроблять цю роботу за нього.\n\nВін підвівся, зціпивши зуби від болю, послабив мотузку і відкинув її геть. Потім він пошкандибав до дверей. Можливо, він більше не боявся смерті, але мусив визнати, що біль — це жахливо. Ще гірше було б пояснювати Тіш, що сталося... але вона була б рада почути його клятву ніколи більше цього не повторювати. Воно того не вартувало, це точно. Завжди було простіше просто нічого не робити. Це була універсальна істина. Поклавши лапу на дверну ручку, він зітхнув і пробурмотів собі під ніс:"
 abyssinia.35.a:0 "«Я здаюся.»"
 
 abyssinia.36.t:0 "М'ясо з етичних джерел"
 abyssinia.36.d:0 "«Я... не знав, що Клуджтаун експортує продовольство, — сказав Ґомез. — Хіба ви не місто-оазис?» Він ледь не сказав «місто-держава», але це означало б визнання Клуджтауна як суверенної держави, якою він не був. По праву він був частиною Абіссинії. Проте Деджен сказав йому, що це єдиний можливий торговий партнер, який міг би забезпечити доступне м'ясо для його зголоднілих котів.\n\n«О, ми не виробляємо все самі, — сказав Верко. — Наші торговці привозять багато їжі здалеку на своїх дирижаблях. Усе це надходить із законних, етичних джерел!» Він вишкірив свої випнуті зуби.\nҐомез примружив очі. «Добре. Я цього не ставив під сумнів, але те, що ви відчули потребу згадати про це, дійсно звучить тривожно».\nВерко силувано засміявся. «Наші відносини не найкращі, тому я роблю все можливе, щоб запевнити вас у наших чесних намірах! У вас є Гарантія Якості Верко™».\nҐомез потер лоба кігтями. Це здавалося жахливою ідеєю, але кращих альтернатив у них не було. «Добре, гадаю, я підпишу торговельний договір»."
 abyssinia.36.a:0 "«Це чесна торгівля з чесними торговцями!»"
 
 abyssinia.37.t:0 "Чергове повстання рабів"
 abyssinia.37.d_gomez:0 "Рас Терстон підняв голову і видав гучне, відчайдушне нявкання. «Це справжня кото-строфа!» — заскиглив він.\n[ROOT.ABY_king_loc_cap] Ґомез затулив вуха. «Заспокойтеся, будь ласка...»\n«Як я можу, Ваша Найвеличніша Величносте? Раби кишать у Тиграї, спалюючи та грабуючи все на своєму шляху». Він уже збирався знову гучно занявкати, коли Ґомез перебив його.\n«Що ж, можливо, вам тоді не варто було мати рабів...»\n«Але я їх і не мав, Ваша Ідеальна Славна Високосте! Я завжди був вірним Пазуромонам, тому коли успадкував рабів свого батька, я одразу ж їх продав, адже знав, що Нявгус Нявконнен принципово проти рабства. Але в підсумку їх скупили всі дрібні дворяни в Тиграї!»\n«А, розумію. Перепрошую...»\n«За що? Як [ROOT.ABY_king_loc_cap], ви не можете помилятися. Це я маю перепрошувати за те, що виправляю вас».\nҐомез застогнав. «Тоді не зважайте. Я... я обіцяю зробити все можливе, щоб залагодити ситуацію».\n«Я знаю, що ви це зробите! Але ви мусите поспішати. Порт Тиграю в облозі, і тому жодні товари, привезені з-за кордону, не можуть бути доставлені сюди, до Пантери. Це лише спричинить проблеми в майбутньому!» Він відхилився назад, щоб занявкати.\n«Я розумію, я розумію, будь ласка, тепер ви можете йти!»"
 abyssinia.37.d_catrina:0 "«Ем, Кітріно...» — пробурмотів Реп, увійшовши до їдальні.\nКішка розрізала гарячий, политий соусом лосось на дрібні шматочки своїми ножем і виделкою. «Репе, мій любий, що я тобі казала раніше? Про те, як до мене слід звертатися?»\n«...моя Нявгіст, тут, е-е, виникло ускладнення».\nКітріна закотила очі. «Що цього разу? І так, Репе, те, що раби засмучені — це не ускладнення, а цілком очікуваний результат».\n«Ну, так, ви мені це казали. Але раби повстали в Тиграї і перерізали залізницю між портом і столицею».\nКітріна кинула прибори і підвелася. «Що?!»\n«Рас Терстон досить голосно скиглив мені і вимагав зустрічі з вами. Здається, у мене досі болять вуха...»\nКітріна підійшла до Репа, і її кроки луною віддалися у великій кімнаті. «Ти розумієш, що це означає?»\n«Е-е-е... що ми повинні краще годувати рабів?» — запитав Реп з усмішкою.\n«Ні, ти йолопе!» — верескнула вона. «Це означає, що раби організовані! У них є лідери, які наказали їм перерізати маршрут постачання між портом і столицею. Вони думають, що якщо в них немає їжі, то ніхто в Абіссинії її не матиме!»\nРеп насупився. «Це, е-е, не ідеально».\nКітріна видала довге, гнівне шипіння. «Неважливо. Мені просто доведеться тримати рабів під контролем достатньо довго, щоб мій план спрацював. Репе, я хочу, щоб ти організував батальйон Коронної Гвардії, щоб якнайшвидше зачистити Тиграй».\nЯщір виструнчився і віддав честь. «Т-так, Кітрі- Нявгіст!»"
 abyssinia.37.d_gomez_absent:0 "Рас Терстон підняв голову і видав гучне, відчайдушне нявкання. «Це справжня кото-строфа!» — заскиглив він.\n[ROOT.ABY_queen_loc_cap] Мортіція, яка виконувала обов'язки регента за відсутності свого чоловіка, силувано всміхнулася. «Я впевнена, що все не так погано, як ви кажете...»\n«Що ви маєте на увазі?! Раби кишать у Тиграї, спалюючи та грабуючи все на своєму шляху. А Його Наймилостивішої та Найдосконалішої Величності ніде не видно!» Він уже збирався знову гучно занявкати, коли Мортіція перебила його.\n«Я роками робила все можливе, щоб переконати таких дворян, як ви, звільнити своїх рабів».\n«І я це зробив! Я завжди був вірним Пазуромонам, тому коли успадкував рабів свого батька, я одразу ж їх продав, адже знав, що Нявгус Нявконнен принципово проти рабства. Але в підсумку їх скупили всі дрібні дворяни в Тиграї!»\n«Якби тільки кожен кіт був таким же розсудливим і вірним, як ви...»\n«Ваші банальності не допоможуть. Потрібно зробити щось конкретне, і швидко. Порт Тиграю в облозі, і тому жодні товари, привезені з-за кордону, не можуть бути доставлені сюди, до Пантери. Це лише спричинить проблеми в майбутньому!» Він відхилився назад, щоб занявкати.\n«Розслабтеся, я обіцяю, що зроблю все можливе, щоб розв'язати цю проблему. Навіть якщо я лише [ROOT.ABY_queen_loc_nocap]-консорт»."
 abyssinia.37.a:0 "Ще один головний біль."
 
 abyssinia.38.t:0 "Посуха"
 abyssinia.38.d:0 "Була середина січня, розпал літнього сезону дощів, який називався Кіремт, проте зрошувальні канали були абсолютно сухими, а небо — безхмарним. Кішка-фермерка подивилася на свій мертвий урожай і зітхнула. Вона підійшла до свого свинарника, і невдовзі до неї наблизилося численне рохкання — свині чекали, що вона наповнить їхні порожні корита. Проте їй не було чого дати. «Вибачте, малята, мені доведеться зробити з вас обід... навіть якщо ви й досить худі».\nЇї кошенята почули це і підбігли до неї. «Мамо, ми нарешті будемо щось їсти?»\nВона усміхнулася. «Так, малята».\nТоді її чоловік почув радість кошенят і підбіг запитати те саме. За ним послідували її тітки, дядьки, бабусі з дідусями, двоюрідні брати і сестри та фермерські лапи. Її усмішка згасла. Їм доведеться зарізати всіх своїх свиней, щоб нагодувати кожного кота.\n\nВона повернулася, щоб подивитися через порожні зрошувальні канали на сусідню ферму, яка належала місцевому дворянину. Вона позаздрила рабам, які там працювали, бо принаймні їхній власник міг дозволити собі купити їжу в разі необхідності. На відміну від неї. Вона боялася, що як тільки свинина закінчиться, її родині доведеться вдатися до полювання на птахів і щурів, як якимось диким котам."
 abyssinia.38.a:0 "..."
 
 abyssinia.39.t:0 "Доленосний момент"
 abyssinia.39.d_gomez:0 "«Ця посуха була останнім, що нам було потрібно, — сказав Ґомез і впав на свій трон. — Хіба ми нічого не могли з цим вдіяти?»\nДеджен похитав головою. «Ні, хіба що ви б захотіли, щоб ми зібрали всіх рабів-пегасів, якими володіють дворяни, для зміни погоди. Навіть тоді я сумніваюся, що цього було б достатньо. Наша держава велика, і нам знадобилися б тисячі пегасів, які працювали б повний робочий день, щоб запобігти цьому. Або це, або повноцінна погодна фабрика, укомплектована еквестрійськими експертами».\n«Не хвилюйся, мій любий, — сказала Мортіція і погладила Ґомеза по руці. — Я впевнена, що ми зробили все можливе, щоб забезпечити низькі ціни на їжу, щоб жоден кіт не голодував».\nҐомез зітхнув. «Я теж на це сподіваюся. Дуже сподіваюся»."
 abyssinia.39.d_catrina:0 "Деджен Ріс-Моггі, Міністр Пера, повільно і втомлено вдихнув, тримаючи лапу на дверній ручці. Він дивився на неї досить довго, перш ніж нарешті штовхнути двері. У кімнаті чекала Нявгіст, яка сиділа за великим столом і підпилювала свої гострі кігті.\n«А, ось і ти, — сказала вона, ледь глянувши на нього. — Як нетипово для тебе спізнюватися на важливу зустріч».\nДеджен злегка вклонився. «Прошу вибачення, Ваша Величносте, мене затримали по дорозі сюди». Він сів, поставив валізу на стіл і дістав з неї папери.\nКітріна зітхнула. «Просто переходь до справи. Не зачитуй повний звіт про інвентаризацію».\nВін завмер. «...Як забажаєте, Ваша Величносте». Папери відправилися назад у валізу. «Нещодавня посуха сильно вдарить по цьогорічному врожаю, суттєво скоротивши виробництво».\n«Я сказала, переходь до справи. Я знаю все про посуху. Чи достатньо в нас їжі на складах, щоб розподілити її на публічному ринку і зберегти ціни низькими? Я спланувала низку реформ, щоб гарантувати це. Звичайної відповіді 'так' чи 'ні' буде достатньо». Весь час, поки вона говорила, її погляд залишався зосередженим на кігтях, які вона підпилювала."
 abyssinia.39.d_gomez_absent:0 "[ROOT.ABY_queen_loc_cap] Мортіція видала довге, протяжне зітхання. «Коли Король Шторм грабував наші сховища, я казала йому, що ці багатства потрібні нам для імпорту продовольства та інших товарів з-за кордону. Але йому було байдуже. Той факт, що він помер, мало втішає мене тепер, коли моїм підданим загрожує голод».\n«Посуха була несподіваною, — сказав Деджен, — так само як і Король Шторм. І ми мало що могли зробити з будь-якою з цих загроз. Щоб запобігти посусі, нам довелося б зібрати всіх рабів-пегасів, якими володіють дворяни, для зміни погоди. Навіть тоді я сумніваюся, що цього було б достатньо. Наша держава велика, і нам знадобилися б тисячі пегасів, які працювали б повний робочий день, щоб запобігти цьому. Або це, або повноцінна погодна фабрика, укомплектована еквестрійськими експертами».\n«Дякую, цього достатньо, Деджене, — відповіла Мортіція. — Минуле позаду, і тепер ми нічого не можемо з цим вдіяти. Однак я впевнена, що ми зробили все можливе, щоб забезпечити низькі ціни на їжу, щоб жоден кіт не голодував. Правильно?»"
 abyssinia.39.a:0 "Обличчя Деджена залишалося беземоційним."
 
 abyssinia.40.t:0 "Нова [ROOT.ABY_queen_loc_cap]"
 abyssinia.40.d:0 "[ROOT.ABY_king_loc_cap] Ґомез і раніше не любив брати участь у Радах Знаті, але цього разу все було набагато гірше. Він знав, що більшість дворян виступають проти його правління і хочуть його замінити. Його останні рішення остаточно підштовхнули достатню кількість дворян до опозиції, щоб гарантувати кінець його правління. Це було схоже на те, ніби тебе змушують їсти їжу, про яку ти знаєш, що вона отруєна.\n«То чого ви всі чекаєте?» — прошипіла Кітріна в оточенні Коронної Гвардії, яка пильно за нею стежила. «Переходьте вже до голосування, у мене немає на це цілого дня! Мені ще треба готуватися до церемонії коронації».\nДворяни припинили суперечки. Нечисленні лоялісти Пазуромонів робили все можливе, щоб переконати інших дворян змінити свою думку або принаймні відкласти голосування якомога на довше. Але все було марно. Проте Ґомез був вдячний їм за їхні зусилля.\nФітаврарі Гумберт підвівся. «Кожен дворянин, який бажає, щоб Кітріна успадкувала трон від Ґомеза, підніміть лапу». Аристокоти почали піднімати лапи один за одним. З кожною піднятою лапою Ґомез усе глибше й глибше сповзав у своє крісло. Перевага була очевидною.\nТепер підвелася Кітріна. «Що ж, це зайняло більше часу, ніж я планувала. Набагато більше. Але це не має значення. Моїм першим кроком як [ROOT.ABY_queen_loc_cap]еви буде надання самій собі повного помилування за будь-які сумнівні дії, які я вчинила!»\nКоронна Гвардія вийшла з кімнати, а Ґомез так глибоко сповз у крісло, що опинився майже на підлозі."
 abyssinia.40.a:0 "На цьому правління Його Величності добігає кінця."
 
 abyssinia.41.t:0 "Месафінт (та королівська влада) коротко"
 abyssinia.41.d_no_empire:0 "Нявгус/Нявгіст (Король/Королева) — Голова держави, найвищий урядовець. Дворянство вважає членів королівської родини «першими серед рівних».\nЦахіфе Лам — Титул, зарезервований за губернатором Амхашери. Традиційно другий за рангом військовий посадовець після Нявгуса чи Нявгіст.\nРас — Зазвичай перекладається як Герцог. Використовується могутніми регіональними дворянами.\nМесфіна/Месфініт — Також перекладається як Герцог, хоча використовується лише губернатором Лапрітреї. Це новий титул, створений Нявгусом Нявконненом.\nДеджазмач — «Командир Брами», традиційно використовувався для лідерів армій, але після того, як став спадковим титулом для котів без військового минулого, зазвичай вважається близьким за значенням до Графа.\nМерід Азмач — У той час як Азмач є титулом командира ар'єргарду в армії, Мерід Азмач — це дворянський титул, що перекладається як «Грізний/Верховний Головнокомандувач». Традиційний титул для губернаторів Оронявії.\nФітаврарі — Титул для командира авангарду в армії, але в наш час має той самий ранг і значення, що й Барон.\nБітводед — Буквально означає «Улюблений», але на практиці має той самий ранг і призначення, що й Ерл (Граф). Цей титул є подарунком від монарха, що дається як нагорода за вірність.\nШум — Губернатор. У минулому губернатори призначалися монархом, але, як і багато інших титулів, цей став спадковим під час правління династії Кітве.\nДжантірар — Титул правителя гірської фортеці Ампавссел у Нявтекелі, поблизу Долло.\nБаша — Спеціальний титул для губернатора Мейндалусії."
 abyssinia.41.d_empire:0 "Нґусе нявгест/Нґісте нявгест — Імператорський титул, це новий титул, створений Нявгусом Ґомезом. Він супроводжується іншими титулами, такими як «Лев-Завойовник».\nНявгус/Нявгіст (Король/Королева) — Голова держави, найвищий урядовець. Дворянство вважає членів королівської родини «першими серед рівних».\nЦахіфе Лам — Титул, зарезервований за губернатором Амхашери. Традиційно другий за рангом військовий посадовець після Нявгуса чи Нявгіст.\nРас — Зазвичай перекладається як Герцог. Використовується могутніми регіональними дворянами.\nМесфіна/Месфініт — Також перекладається як Герцог, хоча використовується лише губернатором Лапрітреї. Це новий титул, створений Нявгусом Нявконненом.\nДеджазмач — «Командир Брами», традиційно використовувався для лідерів армій, але після того, як став спадковим титулом для котів без військового минулого, зазвичай вважається близьким за значенням до Графа.\nМерід Азмач — У той час як Азмач є титулом командира ар'єргарду в армії, Мерід Азмач — це дворянський титул, що перекладається як «Грізний/Верховний Головнокомандувач». Традиційний титул для губернаторів Оронявії.\nФітаврарі — Титул для командира авангарду в армії, але в наш час має той самий ранг і значення, що й Барон.\nБітводед — Буквально означає «Улюблений», але на практиці має той самий ранг і призначення, що й Ерл (Граф). Цей титул є подарунком від монарха, що дається як нагорода за вірність.\nШум — Губернатор. У минулому губернатори призначалися монархом, але, як і багато інших титулів, цей став спадковим під час правління династії Кітве.\nДжантірар — Титул правителя гірської фортеці Ампавссел у Нявтекелі, поблизу Долло.\nБаша — Спеціальний титул для губернатора Мейндалусії."
 abyssinia.41.a:0 "...Чому все так складно?!"
 
 abyssinia.42.t:0 "Голодування поета"
 abyssinia.42.d_gomez:0 "«Тож я маю вірити заявам Баші, що цей поні — "небезпечний підбурювач" і "загроза миру та порядку"?» — запитав [ROOT.ABY_king_loc_cap] Ґомез у свого довіреного радника.\n«Щоб дати вам неупереджений опис: Інк Аль-Шиєрі — старий мейндалусійський жеребець, який останніми роками став дуже відомим завдяки своїй поезії. Проте більшість його віршів є досить провокаційними, з такими назвами, як "Аль-Мейндалус, пробудись" та "Жереб'ята мріють про свободу"».\n[ROOT.ABY_queen_loc_cap] Мортіція кивнула. «Я сама читала деякі з них. Вони чудові, але... політично забарвлені».\n«Отже, Баша заарештував його суто через його твори?» — запитав Ґомез.\n«Ну, Баша звинувачує його в багатьох речах, — відповів Деджен, — але я вірю, що саме вірші є першопричиною. Певною мірою вони зробили Інка героєм Мейндалусії».\nҐомез застогнав. «Гаразд, гаразд, тепер я розумію. Не знаю, чому Баша вирішив, що ув'язнення покращить ситуацію, особливо тепер, коли поні оголосив голодування».\n«Якщо він помре під вартою, то стане мучеником, — пояснив Деджен. — Ось чому Баша хоче годувати його силоміць і просить вашого законного дозволу на це».\n«Чому ви не можете просто помилувати його? — запитала Мортіція. — Тоді поні припинив би голодування, місцеві жителі б зраділи, і нам би не довелося... годувати його силою, що звучить досить неприємно».\n«Баша буде дуже розлючений», — відповів Деджен.\n«То нехай злиться!» — прошипіла Мортіція.\nҐомез потер лоба кігтями. Ще одне важке рішення."
 abyssinia.42.d_catrina:0 "Кітріна сиділа за своїм столом і читала листа. Реп, який доставив його, тихо стояв струнко. «Репе, мій любий, чи не міг би ти дати менш упереджений опис цього поні, якого Баша називає "небезпечним підбурювачем" і "загрозою миру та порядку"?»\nЯщір кивнув. «Так, звісно! Інк Аль-Шиєрі — старий поет, який нещодавно став дуже популярним. Його найвідоміші твори називаються "Аль-Мейндалус, пробудись" та "Жереб'ята мріють про свободу"».\nКітріна скривилася, ніби щойно відкусила кислий лимон. «Тепер я розумію, чому Баша його заарештував. Хоча цей список звинувачень досить довгий і абсурдний. Сумніваюся, що старезний жеребець здатен і на половину з цих речей».\n«Тож, е-е, якщо можна запитати, що ви плануєте робити з його голодуванням?»\n«Баша хоче отримати законний дозвіл на примусове годування, щоб він не помер з голоду і не став мучеником».\n«...Ви задовольните його прохання? Або, чому б просто не помилувати його? — сказав Реп з усмішкою. — Думаю, мейндалусійці були б дуже задоволені цим».\nНявгіст видала глузливий смішок. «Яке мені діло до думки мейндалусійців? Вони потрібні мені як раби, Репе, не будь дурником. Крім того, задоволення прохання Баші — це швидкий і простий спосіб гарантувати його вірність мені».\nРеп опустив погляд на кам'яну підлогу. «О... зрозуміло...»"
 abyssinia.42.d_gomez_absent:0 "«Тож, Деджене, розкажи мені більше про цього поні», — попросила [ROOT.ABY_queen_loc_cap] Мортіція. «Баша Мейндалусії стверджує, що він "небезпечний підбурювач" і "загроза миру та порядку", але я схильна ставитися до його заяв скептично».\n«Ну, щоб дати вам неупереджений опис: Інк Аль-Шиєрі — старий мейндалусійський жеребець, який останніми роками став дуже відомим завдяки своїй поезії. Проте більшість його віршів є досить провокаційними, з такими назвами, як "Аль-Мейндалус, пробудись" та "Жереб'ята мріють про свободу"».\n«Так, я знаю, я сама читала деякі з них. Вони чудові, але... політично забарвлені. Розумію, чому Баша був ним незадоволений».\n«Вірші не були виправданням Баші для його ув'язнення. Його звинувачують у багатьох речах. Однак це правда, що вірші, певною мірою, зробили Інка героєм Мейндалусії».\n«А його голодування... якщо він помре під вартою, то стане мучеником».\n«Саме так. Ось чому Баша хоче годувати його силоміць і просить законного дозволу на це».\n«Я маю використати свою владу регента, щоб надати йому [Root.ABY_royal_loc_nocap]е помилування, — відповіла Мортіція. — Тоді поні припинив би голодування, місцеві жителі б зраділи, і нам би не довелося... годувати його силою, що звучить досить неприємно».\n«Баша буде дуже розлючений», — відповів Деджен.\nМортіція насупилася і замислилася над тим, що робити."
 abyssinia.42.a:0 "«Поні не зробив нічого поганого»."
 abyssinia.42.b:0 "«Баша може робити все, що заманеться»."
 
 abyssinia.44.t:0 "Вінґбардійська блокада"
 abyssinia.44.d:0 "Начальниця порту Асмурри підняла бінокль і втупилася в горизонт. Там вона побачила флотилію озброєних кораблів без розпізнавальних знаків — але вона була впевнена, що вони співпрацюють з Regia Marina з [WNG.GetNameDef]. Це були невеликі судна, які швидко б зникли, якби до них наблизилися будь-які абіссинські кораблі, і як такі не становили майже ніякої військової загрози. Але самої їхньої присутності було достатньо, щоб порушити торговельні маршрути. Навіть якби Абіссинія змогла убезпечити всі води навколо півострова, вона сумнівалася, що торгівля могла б продовжуватися. Будь-які торгові судна уникали б абіссинських портів, як чуми, боячись втратити право заходити у вінґбардійські порти.\n\nВона опустила бінокль і зітхнула. Одна остання партія продовольства з-за кордону змогла зайти в гавань вчора, але чи вистачить її для всієї Абіссинії? Напевно, ні. Вона сподівалася, що уряд вжив відповідних заходів, щоб забезпечити достатнє виробництво їжі всередині країни. Інакше навіть такій заможній начальниці порту, як вона, доведеться їсти менше з кожним днем."
 abyssinia.44.a:0 "Це може бути погано..."
 
 abyssinia.45.t:0 "Повстання в Мейндалусії"
 abyssinia.45.d:0 "Світив місяць, коли Айрон Мухтал слухала балаканину зі свого радіо і думала, як вона вдячна тим контрабандистам із Клуджтауна, які надали їх для руху опору. Звісно, вони зробили це виключно заради грошей, але тепер це допомагало їхній справі. Після того, як радіо видало суворий наказ, вона знову зосередилася на поточному завданні.\n\nЇї загін покинув схованку і рушив до палацу губернатора. Коли двоє котячих охоронців біля дверей помітили їх, поні вже цілилися з гвинтівок. Замість того, щоб здатися, охоронці потягнулися за зброєю і були негайно зрешечені кількома десятками пострілів.\n\nНевдовзі Айрон та її загін були всередині. Деякі поні зайняли вогневі позиції у вікнах, тоді як інші зачищали будівлю. Айрон Мухтал була радисткою, тому вона повідомила іншим підрозділам про їхній успіх. «Меч Ватрзії вразив серце. Повторюю, Меч Ватрзії вразив серце. Чекаю на подальші інструкції. Прийом».\n\nУ відповідь вона почула хороші новини: урядові установи, місцева радіостанція, скарбниця, в'їзди до Кольтоби — все було захоплено з мінімальними втратами, а казарми були оточені, заблокувавши більшу частину абіссинського гарнізону всередині. Скоро вони здадуться. Однак підкріплення з Абіссинії може прибути за кілька днів. На її губах не було усмішки, коли вона думала про невизначене майбутнє."
 abyssinia.45.a:0 "Якщо вони хочуть бути незалежними, хай буде так."
 abyssinia.45.b:0 "Аль-Мейндалус аїстайказ!"
 abyssinia.45.c:0 "Повстання буде швидко придушене."
 
 abyssinia.46.t:0 "Повстання в Мейндалусії"
 abyssinia.46.d:0 "[ABY.GetNameDefCap] десятиліттями мала плани щодо Мейндалусії як частину своєї зовнішньої політики, і здавалося, що вони зроблять усе можливе, щоб зберегти жорсткий контроль над регіоном. Але всі ці плани згоріли у полум'ї, оскільки спалахнуло повстання, яке вигнало котів з Мейндалусії, а повстанці проголосили вільну і незалежну державу.\n\nЦе відкриває можливості для наших власних інтересів. Не очікується, що Мейндалусія довго протримається сама по собі, не маючи жодних значних союзників. Ми могли б або підтримати їх, щоб вони служили нашою буферною державою, або просто проігнорувати їхні ідеї «свободи» та анексувати весь регіон силою."
 abyssinia.46.a:0 "Ми повинні захистити Мейндалусію!"
 abyssinia.46.b:0 "Тепер наш шанс захопити всю Мейндалусію!"
 abyssinia.46.c:0 "Іноді найкраще не робити нічого."
 
 abyssinia.47.t:0 "Знову у Фелібелі"
 abyssinia.47.d:0 "Коли Нявгус йшов звивистою ґрунтовою дорогою до Фелібели у супроводі своєї свити, він не міг позбутися відчуття, що йому краще було залишитися вдома. Він думав про те, що все це буде марною тратою часу. Поки його слуги несли багаж і займалися орендою квартири, де він міг би зупинитися (звісно, він міг би реквізувати або використати будь-яку власність за власним бажанням, але він хотів справедливо компенсувати власникам), Ґомез попрямував до храмів. Був шанс, що Текле там немає, і частина його сподівалася, що він не зможе знайти старого жерця і зможе просто пролежати в ліжку цілий день.\n\nНа жаль, незабаром він почув знайомий голос.\n«А, ти повернувся, Ґомезе! Це означає, що для тебе ще є надія».\nҐомез виглядав без ентузіазму. «Привіт, Текле. Це була виснажлива подорож, тому не знаю, чи зможу я зробити багато сьогодні».\n«Це нормально, це нормально, мій друже. Ходімо, розслабмося за чашечкою кави».\n«Я... Я думаю, що просто піду і перевірю, чи орендували мої слуги для мене місце, де можна зупинитися».\n«Було б нечемно відмовлятися від ввічливого запрошення старого кота, чи не так?»\nҐомез завагався. Кава справді звучала спокусливо, хоча й не так спокусливо, як його запаси катніпу. «Гаразд... але лише одну чашку».\nТекле тепло усміхнувся."
 abyssinia.47.a:0 "..."
 
 abyssinia.48.t:0 "Час кави: Трилогія"
 abyssinia.48.d:0 "Ґомез знову виявив, що дивиться на чашку гарячої кави, від якої йшла пара. Хоча цього разу вона була напівпорожньою, як не дивно.\nТекле відсьорбнув зі своєї чашки, а потім поставив її назад на скрипучий дерев'яний стіл. «Скажи мені, Ґомезе, твоя чашка наполовину повна чи наполовину порожня?»\nВін підняв погляд на жерця і насупився. Він що, читає його думки? «Ти, напевно, знаєш мою відповідь. Невже я насправді маю сказати, що вона наполовину повна?»\n«Ні».\n«Чому ні? Хіба це не було б добре, якби я так сказав?»\n«Будь-яка відповідь була б хибною. Половина вмісту чашки — це повітря, а інша половина — рідина. Наполовину вона порожня чи повна — цілком залежить від інтерпретації, яка, своєю чергою, забарвлена емоціями. А ти ніколи не повинен дозволяти своїм емоціям затьмарювати твоє бачення світу навколо тебе».\n«...Що саме ти маєш на увазі?»\n«Ну, ти, мабуть, думаєш, що твоє життя зараз жахливе. Що світ — це жахливе, зле місце. І якби я сказав тобі, що насправді це чудове місце, ти б мені не повірив, бо це, очевидно, було б лише моїм власним сприйняттям. Реальність така, що світ є таким, яким він мав бути. Є хороші речі, і є погані речі. Є повнота, і є порожнеча. Є щастя, і є страждання. Є життя, і є смерть. Існує вічний цикл, який повторює і те, й інше. Ти повинен усвідомлювати це, якщо хочеш мати справжнє бачення світу і потенційно звільнитися від цього циклу».\n«Я... розумію».\n«Ось чому ми повинні продовжувати твої тренування. Ти не повинен дозволяти емоціям робити тебе сліпим»."
 abyssinia.48.a:0 "..."
 
 abyssinia.49.t:0 "Мейндалусію взято під контроль"
 abyssinia.49.d:0 "Луліт Моллі зайняла позицію перед палацом губернатора в Кольтобі й прицілилася зі своєї гвинтівки в одне з вікон будівлі. «Хтось має візуальний контакт із залишками сил ворога?» — крикнула вона своїм товаришам по службі.\n«Ніяк ні», — відповів один із них, а потім обернувся до командира загону. «Сер, які будуть накази?»\nСірий старий кіт насупився. «Рядова Моллі, рядовий Гіб і рядовий Том підуть на штурм будівлі. Решта — забезпечити прикриття і за необхідності придушити ворожі вогневі точки».\nМоллі кивнула, а потім рушила до парадних дверей, спритно перебираючи лапами в супроводі двох своїх товаришів по загону. У вікнах, як і раніше, ніхто не з'являвся. На її подив, двері не були замкнені. Але спершу вона тихо дістала гранату і висмикнула чеку. За три секунди вона швидко відчинила двері й жбурнула її всередину. Вона встигла помітити поні-кобилу, яка цілилася з гвинтівки у двері; її очі були широко розплющені, коли граната летіла просто на неї. Луліт одразу ж зачинила двері якраз перед тим, як гучний і потужний вибух струснув інтер'єр.\n«Я когось там бачив, гарна ідея!» — сказав їй рядовий Гіб. В очах Луліт промайнув наляканий погляд кобили, коли вона знову відчинила двері й побачила біля входу труп, що димівся, зі зламаною портативною рацією на спині."
 abyssinia.49.a:0 "Це має стати для них уроком."
 
 abyssinia.50.t:0 "Мейндалусія впала"
 abyssinia.50.d:0 "Конфлікт у Мейндалусії розгорнувся не зовсім так, як того бажали наші лідери. На жаль, наші [MDL.GetAdjective] союзники впали, і тепер [ABY.GetNameDef] повністю контролює їхні землі. Подальше переслідування наших цілей є неможливим: у Мейндалусії не залишилося значних сил, а населення здебільшого покірно прийняло своїх нових володарів. Тепер у нас мало вибору, окрім як шукати елегантний вихід із цієї війни, оскільки ескалація не буде тепло сприйнята нашими громадянами."
 abyssinia.50.a:0 "У нас може бути мир... поки що."
 
 abyssinia.51.t:0 "Балансування"
 abyssinia.51.d:0 "Текле і Ґомез знову сиділи на небезпечно розташованому камені. «Для очищення розуму можна використовувати кілька методів, — пояснив старий жрець, зробивши паузу, щоб відкашлятися. — Зосередження на протилежних думках, роздуми про шкідливість негативних думок, ігнорування думок і відволікання, роздуми над причинами виникнення негативних думок і, нарешті, вольове розумове зусилля».\nҐомез кивнув. «Розумію. Тож навіть якщо один метод не спрацює, можна спробувати інші?»\n«Точно».\nНявгус зітхнув. «Мені слід було повернутися сюди раніше».\n«Чому ти цього не зробив?»\n«Тому що я... сумнівався, що ти зможеш мені допомогти».\n«Чому ж? У мене багато років досвіду допомоги іншим».\n«Тому що зрештою... я сумніваюся в собі, і у власній здатності стати кращим».\nТекле несподівано усміхнувся. «Добре, добре! Ти розпізнаєш свої негативні шаблони мислення. Ми досягли значного прогресу».\nҐомез підняв брову. «О. Гадаю, ти маєш рацію».\n«Тобі ж ще не треба йти, правда? Ми тільки-но розпочали твоє навчання».\n«Ну, я все-таки Нявгус. У мене ціле Королівство в управлінні...»\n«Спробуй забути про це заради свого ж блага, як я казав тобі раніше».\n«Але я не можу просто ігнорувати своїх підданих та їхній добробут!» — з раптовою палкістю відповів Ґомез.\n«Абсолютна самовідданість настільки ж погана, як і абсолютний егоїзм. Ти повинен знайти баланс між ними».\nҐомез заспокоївся і промовчав, не знаючи, що сказати."
 abyssinia.51.a:0 "«Обіцяю, я скоро повернуся»."
 abyssinia.51.b:0 "«Гаразд, я вірю, що моя дружина зможе з усім впоратися»."
 
 abyssinia.52.t:0 "Щоденна боротьба"
 abyssinia.52.d:0 "Найважчим випробуванням кожного дня, навіть після всіх цих місяців, було піднятися з ліжка.\n\nСонце сходило над горами Джіраті, і його світло падало прямо на обличчя Ґомеза. Він з великими труднощами розплющив очі, і кожна частина його тіла благала його повернутися до сну — окрім розуму, який казав йому, що для підтримання фіксованого графіку сну він має встати саме зараз.\nЦе був початок внутрішньої боротьби, оскільки Ґомез мав використати все, чого він навчився про контроль над своїми почуттями, щоб перемогти самого себе. Хоча він насамперед боровся проти одного бажання — фізичної потреби, він також відчував, ніби бореться з бажанням отримати задоволення від перебування в ліжку і бажанням самознищення, щоб йому не доводилося робити це щоранку. Проте його внутрішня мудрість знала, що він має прагнути до відмови від жаги, якщо хоче стати господарем самому собі. Медитація та тренування усвідомленості підготували його до цієї битви, навіть якщо вона не була легкою. Але в житті нічого не буває легким. Зрештою, ці страждання не мали жодного значення, як вчив його Текле.\nНаприкінці виснажливого бою Ґомез стояв, вибравшись зі свого ліжка. Він з полегшенням зітхнув і подумав про те, щоб нагородити себе захованим катніпом. Проте цей план був зруйнований, коли двері до його спальні відчинилися. Ніхто так і не навчиться стукати в них, чи не так?\n«Доброго ранку, Ґомезе», — сказав Текле, увійшовши. «Ти встав ще раніше, ніж учора. Дуже добре. Але ти не змінив свого рішення поїхати сьогодні?»\nҐомез зітхнув. «Ні. Минуло вже достатньо часу. Моя дружина, мабуть, страшенно хвилюється за мене».\nТекле похитав головою. «Ми досягли такого великого прогресу, і все ж такого малого... що ж. Сподіваюся, ти скоро повернешся».\nҐомез кивнув. «Дякую тобі за все, Текле. І вибач, що сумнівався в тобі».\n«Вибачення прийняті», — відповів сірий кіт з усмішкою."
 abyssinia.52.a:0 "«До нових зустрічей»."
 
 abyssinia.53.t:0 "Непостійність"
 abyssinia.53.d:0 "Повернувшись до Пантери та зустрівшись із дружиною, Ґомезу стало комфортніше продовжувати свої ментальні тренування, навіть якщо частина його все ще рішуче опиралася ідеї взагалі якось намагатися виправити ситуацію. Тож він знову вирішив здійснити важку подорож до Фелібели. Він почав замислюватися над тим, щоб особисто інвестувати кошти в покращення місцевої інфраструктури, щоб полегшити подорож для своєї свити. Але це могло почекати.\n\nНевдовзі після прибуття до міста Ґомез одразу попрямував до храмів, очікуючи, що Текле вже чекає на нього. Він пройшов повз знайому статую Бааст, але ніде не побачив старого кота. Тоді він підійшов до житла жерця, лише щоб виявити, що двері замкнені і ніхто не відповідає на його стукіт. Він почав хвилюватися, тому підійшов до іншої жриці, яка жила біля храмів.\n«Ем, вітаю. Ви ніде не бачили Текле Нява?»\nЖриця в мантії була дещо приголомшена цим. «Ваша Величносте? Я польщена вашою увагою». Вона стала перед ним на коліна на знак поваги.\nҐомез відчув себе ніяково. «Ви не могли б... відповісти на моє запитання?»\nЖриця одразу ж підвелася. «Так, звісно, сер! На жаль, в Абуни стався інсульт, і він помер. Якщо це було його дев'яте і останнє життя, то я впевнена, що він уникнув забуття через просвітлення».\nСерце Ґомеза завмерло. «Він мертвий?»\n«Ем, так, сер. Щось не так? Я справді помітила, що ви проводили з ним багато часу, коли приїжджали».\nҐомез потер лоба лапами, намагаючись зберегти самовладання. «Ні, ні, зі мною все гаразд. Просто не очікував, що це станеться так швидко. Мені потрібно... повернутися додому і все обдумати».\n«Але ж ви щойно прибули сюди, сер?»\nҐомез нічого не відповів і пішов геть."
 abyssinia.53.a:0 "«Мені доведеться знайти інші способи вижити...»"
 
 abyssinia.54.t:0 "Повернення Сумного Нявгуса"
 abyssinia.54.d:0 "Ґомез повернувся додому тим самим шляхом, що й раніше, і там на нього знову чекала [ROOT.ABY_queen_loc_cap] Мортіція. Проте вона одразу помітила, що Ґомез виглядав пригніченим, а не радісним. Вона ледь не кинулася до нього, коли він вийшов з машини. «Мій любий, що сталося?»\nҐомез спробував силувано всміхнутися, але здався. «Ех, ну... є дещо, про що я тобі не розповів стосовно Фелібели. Ходімо всередину, і я все поясню».\n\nЩойно вони опинилися в приватній кімнаті, Ґомез зітхнув так глибоко і довго, як Мортіція ще ніколи не бачила. «Коли я вперше відвідав Фелібелу, я зустрів одного старого жерця, який запропонував мені допомогти... він здавався дуже мудрим, і хоча я був налаштований скептично, він дав мені настанови та підтримку, які допомогли мені контролювати свої емоції. На жаль, тепер я дізнався, що він... помер».\nМортіція обійняла його. «Це... мені дуже шкода. Але чому ти не розповів мені про нього раніше?»\nҐомез ковтнув слину. «Я... я не хотів, щоб здавалося, ніби якийсь незнайомець допомагає мені краще, ніж ти».\nМортіція тихо засміялася і поцілувала його в щоку. «Не будь таким дурником чи параноїком, я дуже щаслива, що хтось зміг тобі допомогти. Ти завжди повинен бути відкритим і чесним зі мною».\n«Що ж, тепер його немає, тож у мене залишилася лише ти».\n«Тоді я зроблю все можливе. У мене є різні ідеї, які я обговорювала з Дедженом. Ми придумаємо, як змусити тебе знову відчути себе краще, я впевнена в цьому. Тільки не здавайся, обіцяєш?»"
 abyssinia.54.a:0 "«...Обіцяю»."
 
 abyssinia.55.t:0 "Баастизм коротко"
 abyssinia.55.d:0 "Баастизм — це назва, яку зазвичай використовують чужинці для позначення традиційної расової віри абіссинських котів. Вона зосереджена навколо Бааст — легендарної чотирилапої розумної кішки, яка нібито повалила короля-тирана Анубіса зі стародавнього Анугипту і пожертвувала собою заради створення абіссинської раси. Оскільки це був кінець дев'ятого і останнього життя Бааст, вона вважається мертвим божеством. Тому баастизм зосереджується на наслідуванні її способу життя, а не на молитвах про спасіння чи страху перед божественним покаранням.\n\nОсновним принципом баастизму є цикл перероджень, у якому кіт може прожити дев'ять життів, перш ніж зіткнутися з вічним забуттям і небуттям. Бааст уникла цієї долі, досягнувши вічного метафізичного існування шляхом позбавлення від бажань та власного «я». Таким чином, баастисти прагнуть наслідувати її, очищаючи свій розум подібним чином. Вони не вірять, що тварини, такі як домашні коти, здатні на це, і розглядають розумність як дар Бааст, який вони повинні використати, щоб звільнити себе від страждань і небуття.\n\nРелігія має жрецтво, яке утримує ізольовані храми, що використовуються для богослужінь та медитацій. Основна функція жерців — навчати інших жити так, як жила Бааст, і допомагати їм досягти просвітлення. Існує дуже мало, якщо взагалі є, баастистів, які не є абіссинськими котами, через зосередженість на стосунках Бааст зі своїми «творіннями». Ті не-коти, які все ж дотримуються способу життя Бааст, роблять це в надії досягти подібного спасіння, прагнучи жити так само праведно, як вона.\n\nІснує кілька неортодоксальних варіантів баастизму, які мають небагато послідовників. Вони по-іншому тлумачать легенду про життя Бааст, а деякі навіть стверджують, що вона досі існує і бере активну участь у світських справах, як звичайне божество. Хоча їх вважають єретиками, здебільшого їх не переслідують."
 abyssinia.55.a:0 "Хіба всі коти вже не мали б витратити свої дев'ять життів?"
 
 abyssinia.56.t:0 "Вибір хобі"
 abyssinia.56.d:0 "Після майже години [ROOT.ABY_queen_loc_cap] Мортіція нарешті закінчила перераховувати всі хобі, які, на її думку, могли б зацікавити Ґомеза. «Отже, які з них звучать непогано?» — запитала вона.\nҐомез насупився і замислився. «Е-е-е... ну, ти згадала про колекціонування марок. Хіба цим не займається Король Вінґбардії?»\nВона кивнула.\n«У молодості я був колекціонером, можливо, ти пам'ятаєш. Хоча раніше марки мене не цікавили, можливо, зацікавлять тепер. І хто знає, може, в результаті я зможу потоваришувати з Королем грифонів». Він сухо засміявся.\n«Тож ти б хотів зайнятися цим?»\n«Ну, мені також сподобалася ідея про воєнні ігри. Я отримав військову освіту, але... я трохи заіржавів. Можливо, це допомогло б мені відточити свої стратегічні навички».\n«Не забудь ту частину, де ти сам створюєш власні мініатюри! Це могло б розслабляти, хоч і вимагає кропіткої праці».\n«Тут ти маєш рацію, Тіш. А також... щодо кулінарії: я не дуже хороший кухар, але що, якби я запустив кулінарне шоу на радіо? Я чув, що еквестрійці мають такі. Можливо, народу це сподобалося б».\n«Це вимагало б від них насправді мати радіоприймачі, мій любий».\n«Так, так... гм, ці три варіанти — мої улюблені, але я не впевнений, який з них мені подобається найбільше. Думаю, це...»"
 abyssinia.56.a:0 "«...Колекціонування марок»."
 abyssinia.56.b:0 "«...Воєнні ігри»."
 abyssinia.56.c:0 "«...Кулінарія»."
 
 abyssinia.57.t:0 "Новий наркотик"
 abyssinia.57.d:0 "З роками Ґомез настільки звик до катніпу, що він майже не викликав у нього жодних відчуттів. Одного разу він згадав, як лікар давав йому медичний опій під час лікування, тому невдовзі він наказав, щоб йому його давали. Він настільки йому сподобався, що згодом він замовив цілі ящики опію.\n\nКілька днів потому [ROOT.ABY_queen_loc_cap] Мортіція увійшла до спальні Ґомеза, і її зустріла густа хмара опійного диму. Через це вона сильно розкашлялася, що змусило Ґомеза підбігти до неї.\n«З тобою все гаразд, Тіш?» — запитав він, тримаючи в лапах люльку для опію.\n«Що ти робиш? Прибери цю штуку!» — сказала вона.\nҐомез мав винуватий вигляд і кинув люльку на підлогу. «Вибач, тобі слід було постукати. Я просто пробував цей хіроптерранський опій, який я...»\n«„Пробував“? Зі спальні днями йде дим!»\n«Ем... ну, можу сказати, що він справді покращує моє самопочуття. Він подобається мені набагато більше за катніп».\nГнів Мортіції вщух, і вона зітхнула, адже тепер дим трохи розвіявся. «Вибач, мій любий, але... тобі треба зупинитися. Ця речовина не зробить тебе по-справжньому щасливим. Вона просто обманює твій мозок, змушуючи його відчувати себе добре, і водночас робить тебе залежним».\n«Я... обіцяю, що перестану його вживати, після того, як ще трохи спробую»."
 abyssinia.57.a:0 "«...З тебе жахливий брехун, мій любий»."
 
 abyssinia.58.t:0 "Повторна коронація"
 abyssinia.58.d:0 "Невдовзі після того, як нявгус Ґомез зробив дороге замовлення ковалям на відновлення своєї втраченої золотої корони, він оголосив про символічну церемонію «повторної коронації», щоб показати своїм підданим, що він більше не буде королем без корони. На практиці нічого щодо його статусу не змінилося б, але він відчував, що цей символізм поширюватиметься і на нього самого. Це був шанс спробувати знову, і цього разу спробувати уникнути гіркої невдачі.\n\nЗ-поміж усіх місць місцем своєї коронації він вибрав храми Фелібели, що викликало здивування в багатьох. Кітріна протестувала проти цього, оскільки вважала це образою Дому Кітве. Невелике тихе містечко раптово стало галасливим, оскільки туди прибули тисячі котів та іноземних високопосадовців.\n\nКоли Ґомез готувався до церемонії, до нього підійшла його [ROOT.ABY_queen_loc_cap]. «Гм? Що таке, Тіш?» — запитав він, поки слуги чепурили його хутро.\nМортіція тепло усміхнулася. «Я просто хотіла сказати, що дуже пишаюся тобою, мій любий».\nҐомез усміхнувся у відповідь. «Я знаю. Але я не зміг би цього зробити без тебе».\nМортіція тихенько засміялася. «Ми точно вміємо бути сентиментальними, га».\nҐомез засміявся і обійняв її.\n\nКоли Нявгус з'явився в центральній залі найбільшого храму у Фелібелі, натовп радісно вигукував, а Королівська Гвардія стояла струнко. Він підійшов до трону, який був встановлений у кінці зали, і сів, дивлячись на всіх котів, що захоплювалися ним. Абуна Фелібели тримала корону у своїх лапах. Вона промовила: «Погляньте на нашого Нявгуса Ґомеза Першого, нащадка династії нявгуса Пазуромона, династії, що безперервно триває з тих часів і до наших днів!» Потім натовп мовчки спостерігав, як золоту корону, інкрустовану великим рубіном, поклали на голову Ґомеза. Він глибоко вдихнув і видихнув, коли натовп почав скандувати його ім'я."
 abyssinia.58.a:0 "Він більше не без корони."
 
 abyssinia.59.t:0 "Диво життя"
 abyssinia.59.desc:0 "Ґомез сидів на стільці в центральній лікарні в Пантері, не вірячи своїм очам. На його руках було маленьке і сліпе, чорно-біле кошеня, що нявчало. Це був його син, який ще не мав імені. Його майбутній спадкоємець, якщо кошеня доживе до дорослого віку. Йому було важко повірити, що все це насправді.\n\nВін згадав попередні роки, коли він був близький до того, щоб узагалі відмовитися від життя. Якби це сталося, це кошеня ніколи б не народилося, а він би ніколи не став батьком. Ця «лінія часу» здавалася йому жалюгідною, позбавленою будь-якої мети. Але він уже зрозумів, що його мета — жити не для себе, а для інших. Не тільки для свого сина чи дружини, але й для Абіссинії. Всім їм він був потрібен більше, ніж він коли-небудь був потрібен самому собі. Ось чому він мав іти далі, незважаючи ні на що.\n\n«Ґомезе?» — запитала стомленим голосом Мортіція, яка лежала на сусідньому лікарняному ліжку. «Як нам назвати нашого сина?»\n\nҐомез виринув зі своїх думок і спробував відповісти:"
 abyssinia.59.a:0 "«Е-е-е, як щодо, гм, Мяумяу?»"
 abyssinia.59.b:0 "«Пагслі! Зачекай, це ще гірше»."
 abyssinia.59.c:0 "«...Тейл Сехіссі?»"
 abyssinia.59.d:0 "«Нявконнен, на честь мого батька»."
 
 abyssinia.61.t:0 "Протест Вінґбардії"
 abyssinia.61.d_gomez:0 "Джиліппо Гаппі знав, що це станеться. Здебільшого тому, що це мало статися. Частиною політики Міністерства закордонних справ Вінґбардії було продовжувати тиснути на абіссинців, доки вони не зламаються, або доки вони не дадуть відсіч, що дало б хороший привід для військових дій. Але, як на нього, все це було марною тратою часу. Міністерству бракувало амбіцій, і воно бачило в Абіссинії легку здобич. Лише такі візіонери, як Джиліппо, наважувалися мріяти про щось більше.\n\n«Містере Гаппі?» — запитав [ROOT.ABY_king_loc_cap] Ґомез. «Все гаразд?»\nГрифон роздратовано зітхнув. «Так, так, просто задумався». Він розмовляв абіссинською напрочуд вільно для грифона. «Якою буде ваша відповідь на цей офіційний протест від Міністерства закордонних справ? Якщо ці нові податки, які запровадив ваш уряд, не будуть скасовані, тоді я боюся, що Вінґбардія не матиме іншого вибору, окрім як вжити заходів у відповідь, оскільки це пряме порушення Кітренського договору».\n«А ваше захоплення Кітрену було порушенням попереднього договору», — прошипіла Мортіція.\n«Заспокойся, Тіш, я з цим розберуся», — сказав їй Ґомез, а потім повернувся до грифона. «Наша відповідь така...»"
 abyssinia.61.d_gomez_absent:0 "Джиліппо Гаппі знав, що це станеться. Здебільшого тому, що це мало статися. Частиною політики Міністерства закордонних справ Вінґбардії було продовжувати тиснути на абіссинців, доки вони не зламаються, або доки вони не дадуть відсіч, що дало б хороший привід для військових дій. Але, як на нього, все це було марною тратою часу. Міністерству бракувало амбіцій, і воно бачило в Абіссинії легку здобич. Лише такі візіонери, як Джиліппо, наважувалися мріяти про щось більше.\n\n«Містере Гаппі?» — запитала [ROOT.ABY_queen_loc_cap] Мортіція. «У чому річ?»\nГрифон роздратовано зітхнув. «Так, так, просто задумався». Він розмовляв абіссинською напрочуд вільно для грифона. «Якою буде ваша відповідь на цей офіційний протест від Міністерства закордонних справ? Якщо ці нові податки, які запровадив ваш уряд, не будуть скасовані, тоді я боюся, що Вінґбардія не матиме іншого вибору, окрім як вжити заходів у відповідь, оскільки це пряме порушення Кітренського договору».\n«А ваше захоплення Кітрену було порушенням попереднього договору», — прошипіла Мортіція.\n«Чи варто мені розцінювати це як дипломатичну образу?» — запитав Гаппі.\nМортіція похитала головою. «Ні, ні, мої вибачення. У будь-якому разі, наша відповідь така...»"
 abyssinia.61.a:0 "«...що ми скасуємо деякі з податків»."
 abyssinia.61.b:0 "«...що ми маємо намір ставитися до всіх компаній однаково, іноземних чи ні»."
 
 abyssinia.62.t:0 "Абіссинський протекціонізм"
 abyssinia.62.d:0 "Джиліппо Гаппі, дипломат, який займається справами Зебрики, повідомляє, що йому не вдалося переконати уряд Абіссинії скасувати нещодавно введені податки на іноземні компанії. Це шкодить бізнес-інтересам Вінґбардії, особливо Талоніелі, якій, імовірно, доведеться скоротити свою діяльність в Абіссинії. Багато грифонів вимагають від [Root.GetLeader] запровадити санкції проти Абіссинії, оскільки ці податки є прямим порушенням Кітренського договору, який гарантував податкові пільги для компаній з Вінґбардії. Якщо Абіссинія продовжуватиме свою позицію відмови від співпраці, можливо, доведеться вжити жорсткіших заходів."
 abyssinia.62.a:0 "Як вони сміють?"
 
 abyssinia.63.t:0 "Заміна втраченого"
 abyssinia.63.d_no_printer:0 "«Я припускаю, ви знаєте порядок денний сьогоднішнього засідання?» — запитав Деджен у Ґомеза, перетасовуючи якісь папери в лапах.\n\n[ROOT.ABY_king_loc_cap] розвалився на своєму троні. «Так, так, відновлення втраченого багатства королівства. Я досі не можу повірити, що мені вдалося втратити все, що мої предки збирали століттями. У скарбниці було багато незамінних сімейних реліквій».\n«Як-от Малахіт Нещастя?»\nҐомез насупився.\n«Вам слід перестати так багато думати про минуле, оскільки ви не можете повернутися назад і змінити все. У нас немає іншого вибору, окрім як змиритися з тим, що сталося, і спробувати побудувати краще завтра».\nНапруга зникла з обличчя Ґомеза. «Добре сказано. Отже, як нам перестати бути бідними, як жебраки?»\n«На відміну від жебраків, у нас є кілька варіантів у розпорядженні. Перший і найочевидніший — тимчасово підвищити податки, щоб доходи перевищили витрати. Очевидно, це може призвести до незначних заворушень і політичної боротьби. Інший варіант — звернутися до іноземного банку і спробувати домовитися про вигідну довгострокову позику. Зрештою нам доведеться її повернути, але принаймні ми не будемо паралізовані браком коштів. Третій варіант — наказати Державному банку Абіссинії випустити додаткову валюту прямо в скарбницю. Однак через те, що наша валюта має фіксований обмінний курс відносно іншої, цей варіант нам недоступний».\n«Грм. Тобто обидва варіанти мають недоліки?»\n«Іноді в житті неможливо уникнути негативних наслідків».\n«Це я точно засвоїв. Дай мені хвилинку подумати, гаразд?»\nДеджен шанобливо вклонився. «Звісно, Ваша Величносте»."
 abyssinia.63.d_printer:0 "«Я припускаю, ви знаєте порядок денний сьогоднішнього засідання?» — запитав Деджен у Ґомеза, перетасовуючи якісь папери в лапах.\n\n[ROOT.ABY_king_loc_cap] розвалився на своєму троні. «Так, так, відновлення втраченого багатства королівства. Я досі не можу повірити, що мені вдалося втратити все, що мої предки збирали століттями. У скарбниці було багато незамінних сімейних реліквій».\n«Як-от Малахіт Нещастя?»\nҐомез насупився.\n«Вам слід перестати так багато думати про минуле, оскільки ви не можете повернутися назад і змінити все. У нас немає іншого вибору, окрім як змиритися з тим, що сталося, і спробувати побудувати краще завтра».\nНапруга зникла з обличчя Ґомеза. «Добре сказано. Отже, як нам перестати бути бідними, як жебраки?»\n«На відміну від жебраків, у нас є кілька варіантів у розпорядженні. Перший і найочевидніший — тимчасово підвищити податки, щоб доходи перевищили витрати. Очевидно, це може призвести до незначних заворушень і політичної боротьби. Інший варіант — звернутися до іноземного банку і спробувати домовитися про вигідну довгострокову позику. Зрештою нам доведеться її повернути, але принаймні ми не будемо паралізовані браком коштів. Третій варіант — наказати Державному банку Абіссинії випустити додаткову валюту прямо в скарбницю. Однак це призведе до тимчасового різкого зниження вартості валюти».\n«Грм. Тобто кожен варіант має недоліки?»\n«Іноді в житті неможливо уникнути негативних наслідків».\n«Це я точно засвоїв. Дай мені хвилинку подумати, гаразд?»\nДеджен шанобливо вклонився. «Звісно, Ваша Величносте»."
 abyssinia.63.a:0 "«Мої піддані зрозуміють необхідність податків»."
 abyssinia.63.b:0 "«Позичити чиїсь гроші — це швидке і брудне рішення»."
 abyssinia.63.c:0 "«Ха-ха, грошовий принтер робить брррр!»"
 
 abyssinia.64.t:0 "Голод в Абіссинії!"
 abyssinia.64.d:0 "Наші торговці та високопосадовці, які проживають в Абіссинії, вже деякий час повідомляють про голод, що насувається там. Тепер тисячі зголоднілих котячих біженців перетинають наш кордон, у відчаї шукаючи доступну їжу. Очевидно, що уряд Абіссинії не зміг уникнути умов голоду після руйнівної посухи.\n\nХоча громадські організації вже допомагають біженцям у прикордонних селах, деякі громадяни звертаються до [Root.GetLeader] з проханням надіслати офіційну фінансовану державою допомогу Абіссинії для боротьби з голодом. Навіть якщо наші відносини з котами не найкращі, допомогу тим, хто її потребує, можна вважати моральним обов'язком. Звісно, це вимагатиме від нас витратити частину наших власних запасів продовольства, але абіссинці, безперечно, будуть вдячні за будь-яку допомогу, яку вони зможуть отримати."
 abyssinia.64.a:0 "Ми повинні надіслати всі надлишки їжі, які маємо!"
 abyssinia.64.b:0 "Вони не заслуговують на нашу допомогу."
 
 abyssinia.65.t:0 "Допомога в боротьбі з голодом від [From.GetNameDefCap]"
 abyssinia.65.d:0 "На кордоні з [From.GetNameDef] зазвичай було спокійно, але з нещодавнім голодом потік біженців покинув Абіссинію і перетнув кордон, вирушивши за кордон. Незабаром після цього рух пішов у зворотному напрямку. Здається, [From.GetLeader] вирішив організувати операцію з надання допомоги, щоб допомогти зголоднілим абіссинцям. Сотні фургонів, вантажівок та інших транспортних засобів в'їжджають у країну, доставляючи тонни продовольства для тих, хто цього найбільше потребує.\n\nХоча незрозуміло, чи має [From.GetAdjective] допомога у боротьбі з голодом якісь приховані мотиви, ясно, що їхня допомога прибула саме вчасно."
 abyssinia.65.a:0 "Як ми взагалі зможемо їм віддячити?"
 
 abyssinia.66.t:0 "Ще одне повстання рабів"
 abyssinia.66.d:0 "Шарп Спір стояла на вершині скелястого кручі й дивилася вниз, у долину. Ніч освітлювалася яскраво-помаранчевим полум'ям кавової плантації, що палала, а тишу порушували постійні крики, верески та постріли. Проте ці звуки лише змусили її усміхнутися.\n\nУ супроводі своїх охоронців вона спустилася у знайому долину. Вона підійшла до віслюка, який ніс на спині мішок зі столовим сріблом.\n«Ви захопили землевласника?» — запитала вона.\nОчі віслюка трохи розширилися, коли він упізнав її, а потім він нервово забігав очима, ніби не був упевнений у відповіді. «Е-е, так, думаю, так!»\nШарп Спір зітхнула. «Ти ж не плануєш залишити все це собі, чи не так?»\nВіслюк засміявся, але опустив вуха. «Н-ні, зовсім ні!»\nШарп Спір повернулася до одного зі своїх супутників. «Приглядай за ним, гаразд?»\nВисокий і м'язистий кінь кивнув, а віслюк ковтнув слину.\n\nКоли Шарп Спір наблизилася до розграбованого маєтку в кривавому серці плантації, зебра-кобила помітила її, а потім підскакала ближче. «Шарп? Що, в ім'я предків, ти тут робиш?»\n«Я обіцяла, що повернуся, щоб звільнити вас, перш ніж утекти, — спокійно відповіла вона. — Рада бачити тебе живою, Бонту».\n«Навзаєм, — сказала старша зебра. — Я не очікувала, що ти дотримаєшся своєї обіцянки».\n«Я пам'ятаю, — відповіла Шарп. — Ти казала, що я помру. Що я мала сидіти тихо, як ти, і продовжувати жити в рабстві».\nНа обличчі Бонту з'явився ображений вираз. «Ти могла померти. Тут у нас був притулок і їжа. Тепер усього цього немає завдяки тобі».\n«У нас не було свободи, — спокійно сказала Шарп. — Тепер вона в нас є. Ти маєш подякувати мені й за це».\n«Дякую», — сказала Бонту рівним, беземоційним тоном.\n«Будь ласка. Ти знаєш, де наш колишній господар?» Вона витягла пістолет з кобури. «Я просто хочу з ним поговорити»."
 abyssinia.66.a:0 "Ми повинні щось зробити!"
 
 abyssinia.67.t:0 "Ще більше повстань рабів"
 abyssinia.67.d_gomez:0 "«Ваша Величносте, є погані новини з провінцій», — сказав Деджен Ґомезу.\nТой видав довгий, стомлений стогін. «Дай вгадаю, ще одне повстання рабів?»\n«Гірше. Два одночасних».\nҐомез підняв чорну брову, яка зливалася з його хутром і тому була ледь помітною. «Це... тривожний збіг».\nДеджен похитав своєю сірою головою. «Це не збіг, Ваша Величносте. Це була скоординована операція. Ба більше, фортеця Ампауссель у Нявтекелі опинилася в облозі. Раби напрочуд добре організовані. Цілком імовірно, що вони отримують значну допомогу від симпатиків революції».\nҐомез закрив обличчя лапою. «Чудово, це лише питання часу, коли вони сформують армію і вирушать сюди, щоб відрубати мені голову».\n«Вони ще не настільки сильні для цього. Але ви маєте рацію, їхня загроза зростає. Я рекомендую нам спробувати скасувати рабство якнайшвидше».\n«Тобто замість рабів мені відрубають голову дворяни?»\nДеджен знизав плечима. «І рабів, і дворян можна задобрити, але за певну ціну».\n«Завжди є ціна... але ти маєш рацію, я повинен діяти, поки не пізно»."
 abyssinia.67.d_catrina:0 "Двері з гуркотом відчинилися. «Кітр... моя Нявгіст! Є погані новини з провінцій!» — вигукнув Реп, чий голос був сповнений глибокої стурбованості.\nКітріна застогнала. «Заради Бааст, я вже навіть ванну не можу спокійно прийняти?»\n«Ох, вибачте, мені слід було постукати. Але це терміново!»\n«Ну, викладай, Репе!»\n«У різних частинах країни відбулося два одночасних повстання рабів».\nКітріна ляснула себе лапою по лобі. «Як це... Репе, я вже дюжину разів пояснювала тобі, як усе це має статися!»\n«Ем, але це не просто звичайне повстання рабів. Це ціла операція, вони навіть взяли в облогу фортецю Ампауссель у Нявтекелі! І, схоже, вони отримують допомогу від республіканських повстанців!»\n«І що? Я вже знала, що вони добре організовані, коли вони напали на Тиграй».\n«...Хіба ви не хвилюєтеся? Не думаю, що до ваших планів входило бути поваленою повстанням...»\n«Чому б мені хвилюватися? Мало того, що я саме приймаю розслаблюючу ванну, так ще й те, що вони мають централізоване керівництво, означає, що їхній рух буде легко обезголовити, коли настане час».\n«І, ем, коли це буде?»\n«Терпіння, мій любий Репе. Вже досить скоро. Мені просто потрібно, щоб зневірені дворяни зробили наступний крок»."
 abyssinia.67.d_gomez_absent:0 "«Ваша Величносте, є погані новини з провінцій», — сказав Деджен Мортіції.\nМортіція втомлено зітхнула. «Що цього разу?»\n«Два одночасних повстання рабів, одне в Нявтекелі, а інше в Медафі».\n«Що ж, не можу сказати, що здивована. Нам справді слід було скасувати рабство ще роки тому».\n«Що справді дивує, так це те, що два повстання були скоординовані. Ба більше, фортеця Ампауссель у Нявтекелі опинилася в облозі. Раби напрочуд добре організовані. Цілком імовірно, що вони отримують значну допомогу від симпатиків революції».\nМортіція насупилася. «Це також означає, що вони, ймовірно, мають єдине керівництво, здатне координувати дії на великих відстанях. Зрештою, ці дві провінції знаходяться в протилежних кінцях країни».\nДеджен вражено підняв брову. «Ви, швидше за все, маєте рацію. Їхня загроза постійно зростає. Я рекомендую нам спробувати скасувати рабство якнайшвидше».\n«Саме це я і намагалася зробити!» — прошипіла Мортіція. «Але дворяни робять це дуже складним».\nДеджен знизав плечима. «І рабів, і дворян можна задобрити, але за певну ціну».\n«Гадаю, нам доведеться знайти спосіб заплатити цю ціну скоріше рано, ніж пізно»."
 abyssinia.67.a:0 "Це виходить з-під лап..."
 
 abyssinia.68.t:0 "Проголошення Вільної Республіки"
 abyssinia.68.d_gomez:0 "Генерал Королівської Гвардії з гуркотом відчинив двері до спальні [ROOT.ABY_king_loc_cap] Ґомеза. «Мій повелителю, нам потрібно доставити вас у безпечне місце!»\nҐомез ще глибше зарився обличчям у подушку і застогнав. «Коли ж ви всі навчитеся стукати..?»\n«Прошу вибачення, але це терміново. Ви повинні встати негайно».\nЗібравши залишки сили волі, Ґомез змусив себе сісти. «Чому? Що відбувається?»\n«Заворушення рабів переросли в загальнонаціональний акт повстання проти корони. Повсталі раби створили власний уряд і прагнуть повалити монархію. Дайр-Пава вже впала, і країна занурилася в хаос, оскільки антимонархісти та республіканці приєднуються до рабів і активно їм допомагають».\nҐомез якийсь час шоковано дивився на нього. «Це ж не кошмарний сон, так?»\n«Ні, сер».\n«Гадаю, тоді все моє життя — це кошмарний сон», — сказав він і дивно хихикнув.\nГенерал насупився, не знаючи, що відповісти. «Будь ласка, ми не можемо гарантувати вашу безпеку тут, у палаці. Ходімо зі мною».\n«...Знаєш, чи справді нам потрібно воювати з ними? Якщо ми просто здамося, хіба це не дозволить уникнути кровопролиття?»\nГенерал здавався ще більш розгубленим. «Я, ем, гадаю, що так, мій повелителю. Але вам доведеться втекти з країни, щоб уникнути полону».\nҐомез замислився, гадаючи, чи справді просто здатися було найкращою ідеєю, чи йому слід боротися попри все."
 abyssinia.68.d_catrina:0 "Генерал Королівської Гвардії рішуче попрямував до Нявгіст Кітріни, яка стояла на балконі королівського палацу і дивилася за річку. Вдалині чітко виднілося палаюче місто Дайр-Пава.\nГенерал віддав їй честь. «Моя повелителько, нам потрібно доставити вас у безпечне місце. Раби підняли повстання в Дайр-Паві, антимонархісти та республіканці приєдналися до них, а місцевий гарнізон опинився в облозі у своїх казармах».\n«Я знаю, генерале», — відповіла Кітріна і відпила вина зі свого келиха. «Я насолоджуюся виставою».\n«Вам небезпечно тут залишатися. Очевидно, що повстанці спробують здійснити напад на королівський палац наступним».\n«Хіба я не наказувала вам підготуватися до оборони столиці?»\nГенерал кивнув. «Так, мем. Але ми не можемо гарантувати вашу безпеку, якщо вони нападуть на нас».\nКітріна важко зітхнула. «Ви маєте рацію, я не можу ризикувати провалом своїх планів. Ви гарантуєте, що я зможу підтримувати зв'язок з королівською армією?»\n«Так, мем. У нашому розпорядженні найновіші радіотехнології».\n«Чудово». Кітріна допила своє вино, а потім недбало жбурнула келих з балкона. «Ходімо зіграємо партію в габату, га?»"
 abyssinia.68.d_gomez_absent:0 "Генерал Королівської Гвардії з гуркотом відчинив двері до кабінету [ROOT.ABY_queen_loc_cap] Мортіції. «Ваша Величносте, нам потрібно доставити вас у безпечне місце!»\nМортіція зі стурбованістю підняла погляд від своєї друкарської машинки. «У чому річ, генерале?»\n\n«Перепрошую, що перериваю вашу роботу, але це терміново».\nМортіція підвелася зі свого стільця. «Напевно, це не настільки терміново, що ви не можете пояснити мені, що відбувається?»\n«Заворушення рабів переросли в загальнонаціональний акт повстання проти корони. Повсталі раби створили власний уряд і прагнуть повалити монархію. Дайр-Пава вже впала, і країна занурилася в хаос, оскільки антимонархісти та республіканці приєднуються до рабів і активно їм допомагають».\nМортіція ахнула і приклала лапу до рота. «Це жахливо! Але не несподівано. Ви повідомили мого чоловіка?»\n«Ми намагаємося з ним зв'язатися, але я сумніваюся, що повстанці знають про його відсутність у столиці, тому він має бути в безпеці».\n«Усе одно, йому поки що потрібно сховатися». Вона глибоко вдихнула, щоб зібратися з силами. «Гадаю, мені доведеться очолити країну в цей кризовий час. Я... зроблю все можливе. А тепер забираймося звідси, генерале».\nГенерал віддав їй честь."
 abyssinia.68.a:0 "Вони зайшли надто далеко і поплатяться за це!"
 abyssinia.68.b:0 "Геть Корону!"
 abyssinia.68.c:0 "«Ми здамося»."
 
 abyssinia.69.t:0 "Поні зі зброєю"
 abyssinia.69.d_gomez:0 "Знову настав цей час тижня, подумав Ґомез і застогнав. Час читати численні петиції та листи від дворянства. Він відкинувся на спинку стільця і почав їх читати.\n\nСхоже, баша Мейндалусії знову мав проблеми з неспокійними поні. Іноді Ґомез задумувався, чи не простіше було б просто повністю відмовитися від Мейндалусії, замість того, щоб морочитися зі спробами інтегрувати непарнокопитних. У листі баша вимагав від [ROOT.ABY_king_loc_cap] терміново звільнити поні з [Root.ABY_royal_loc_nocap]ої армії. Він стверджував, що допоміжні підрозділи поні були ненадійними, схильними до дезертирства і таємно співпрацювали з підпільним рухом опору в Кольтобі. Як завжди, баша надав мало доказів на підтвердження своїх заяв.\n\nҐомез потер очі лапами. Це був уже третій прочитаний ним лист, і це вже починало втомлювати. Він був зобов'язаний відповісти баші, але не був впевнений, що сказати. Хоча, можливо, той мав рацію, вигнання мейндалусійських поні з армії, швидше за все, лише спричинило б ще більше проблем і ускладнило б процес інтеграції. Зрештою, це була ідея його батька, і Ґомез не відчував, що повинен зводити нанівець роботу свого попередника."
 abyssinia.69.d_catrina:0 "Кітріна сіла на свій офісний стілець і ліниво перебирала стопку паперів на своєму столі. Усі вони були петиціями та листами від дворянства, проте вона витрачала на кожен з них менше хвилини.\n\nЛист, на який вона витратила найбільше часу, був від баші Мейндалусії, який знову мав проблеми з неспокійними поні. Вона починала підозрювати, що цей кіт некомпетентний і не підходить на роль губернатора. У листі баша вимагав від Нявгіст терміново звільнити поні з абіссинської армії. Він стверджував, що допоміжні підрозділи поні були ненадійними, схильними до дезертирства і таємно співпрацювали з підпільним рухом опору в Кольтобі. Як завжди, баша надав мало доказів на підтвердження своїх заяв.\n\nКітріна відклала лист убік. «Репе!» — голосно гукнула вона. «У мене є для тебе робота!»\nЗа мить рептилія поспішно відчинила двері. «Що таке, Кітріно?»\n«Мені потрібно, щоб ти написав і доставив кілька листів. По-перше, один керівнику Королівської Гвардії з наказом розформувати допоміжні підрозділи поні. По-друге, відповідь баші Мейндалусії з дозволом роззброїти будь-яких поні в його губернаторстві».\n«Е-ем, хіба це не засмутить мейндалусійців?»\nКітріна знизала плечима. «Якщо вони й засмутяться, це не буде проблемою, доки вони не будуть озброєні й небезпечні»."
 abyssinia.69.d_gomez_absent:0 "[ROOT.ABY_queen_loc_cap] Мортіція сіла на свій офісний стілець і подивилася на стопку паперів на своєму столі. Знову настав час читати численні петиції та листи від дворянства. Вона випрямилася і почала методично їх перечитувати.\n\nСхоже, баша Мейндалусії знову мав проблеми з неспокійними поні. Іноді Мортіція задумувалася, чи не простіше було б просто повністю відмовитися від Мейндалусії, замість того, щоб морочитися зі спробами інтегрувати непарнокопитних. У листі баша вимагав від [ROOT.ABY_king_loc_cap] терміново звільнити поні з [Root.ABY_royal_loc_nocap]ої армії. Він стверджував, що допоміжні підрозділи поні були ненадійними, схильними до дезертирства і таємно співпрацювали з підпільним рухом опору в Кольтобі. Як завжди, баша надав мало доказів на підтвердження своїх заяв.\n\nМортіція потерла підборіддя. Оскільки Ґомез був відсутній, їй доведеться відповісти замість нього, але вона не була впевнена, що сказати. Хоча, можливо, той мав рацію, вигнання мейндалусійських поні з армії, швидше за все, лише спричинило б ще більше проблем і ускладнило б процес інтеграції. Зрештою, це була ідея батька Ґомеза. Вона хвилювалася, що засмутить Ґомеза, якщо вирішить звести нанівець роботу його батька."
 abyssinia.69.a:0 "Досі вони служили нам вірою і правдою."
 abyssinia.69.b:0 "Роззброймо їх."
 
 abyssinia.70.t:0 "Дезертирство допоміжних військ"
 abyssinia.70.d:0 "Рішення Айрон Мухтал приєднатися до абіссинської армії кілька років тому було суперечливим. Від неї практично відцуралися родина та друзі, які відмовилися повірити її виправданням щодо цього. Вони бачили в ній зрадницю і попереджали, що одного разу її абіссинські офіцери накажуть їй стріляти у своїх побратимів-поні.\n\nВона б хотіла сказати їм, що тепер приєдналася до підпільного антиабіссинського руху опору. За ці роки вона зібрала якомога більше розвідданих, вивчаючи, як працює абіссинська армія зсередини, і переконала інших колег з допоміжних військ приєднатися до її справи. Завдяки цьому, коли настав час, її швидко прийняли до лав повстанців. Коли вона нарешті дезертирувала, вона зробила це не сама, а з десятками інших перебіжчиків. Вони викрали сотні одиниць зброї та багато боєприпасів з абіссинського арсеналу в Кольтобі й зустрілися з бійцями опору в таємному місці збору. Там вони офіційно склали присягу боротися за опір доти, доки Мейндалусія не буде звільнена, або доки вони не помруть. Звісно, вона також складала присягу [ABY.GetNameDef], але, зрештою, її сім'я мала рацію. Вона справді була зрадницею і клятвопорушницею. Просто для протилежної сторони.\n\nВже наступного дня Айрон Мухтал очолила зухвалий рейд, який був частиною більшого скоординованого наступу руху опору. Вона сподівалася, що її рідні та друзі почують цю новину, і сподівалася, що вони пробачать їй."
 abyssinia.70.a:0 "Хто міг це передбачити?"
 
 abyssinia.71.t:0 "Мейндалусійська петиція"
 abyssinia.71.d_gomez:0 "Ґомез дивився з вікна свого палацу на натовп поні, що зібрався надворі. «Тож вони прибули аж із Кольтоби лише для того, щоб передати мені папірець?» — запитав він.\nДеджен, який стояв позад нього, відповів: «Так. Здебільшого це символічний акт. Усі вони — члени Мейндалусійської національної асоціації».\n«Хіба це не ті, на кого скаржився баша? Стверджуючи, що вони співпрацюють з місцевими терористами?»\n«Так».\nҐомез зітхнув. «Що ж, гадаю, було б нечемно не зустрітися з ними».\n\nБрама палацу відчинилася, і Ґомез з'явився у своїх регаліях в оточенні Королівської Гвардії. Щойно вони побачили його, поні почали кричати й галасувати, а додаткові сили Королівської Гвардії стримували їх. Кільком поні, які, судячи з усього, були одягнені в традиційний мейндалусійський одяг, дозволили наблизитися до [ROOT.ABY_king_loc_cap]. Серед них був бородатий жеребець-єдиноріг, який левітував важливий на вигляд аркуш паперу. «Ваша Величносте, ми прибули сюди аж із Кольтоби, щоб передати вам цю петицію з двомастами тисячами підписів мейндалусійських поні. Це вимога автономії для Мейндалусії. З нас досить тиранічного правління баші!»\nҐомез мовчав, обмірковуючи всю інформацію та ретельно зважуючи, як відповісти. Якби він прийняв петицію, мейндалусійці б зраділи й стали більш лояльними до нього, але це означало б, що йому доведеться усунути башу і позбавити його повноважень. Але якби він відхилив петицію, то заворушення в Мейндалусії продовжували б зростати."
 abyssinia.71.d_catrina:0 "Голова Королівської Гвардії ввійшов до тронної зали Кітріни та вклонився перед нею. «Я прибув, як ви і просили, Ваша Величносте».\n«Я задоволена вашою розторопністю. А тепер, будь ласка, детально поясніть, що сталося на шляху до столиці».\n«Велика група поні з Кольтоби вже багато днів прямувала до Пантери, мем. Коли ми отримали повідомлення про них, я відправив кількох котів-гвардійців простежити за ними. Ми ідентифікували цю групу як членів Мейндалусійської національної асоціації, забороненої радикальної терористичної організації. Щойно вони досягли околиць міста, їм наказали зупинитися і повернути назад. Вони вимагали передати петицію вам, Нявгіст. За їхніми твердженнями, вона підписана двомастами тисячами мейндалусійських поні. Петиція є вимогою автономії Мейндалусії та примусової відставки баші».\nКітріна розреготалася. «Хіба ці ідіоти не знають, що будь-які "петиції" спершу повинні пройти через місцевого губернатора? Це місцева справа, а не національна».\n«Гадаю, вони знають про це і їм просто байдуже, мем».\nСміх перетворився на легке хихикання. «Ну що ж, я потішу їх. Передайте їм, що я отримала їхній запит і відхилила його. Мейндалусія юридично є невід'ємною частиною Абіссинії і не має права на регіональну автономію. Будь-які майбутні політичні петиції повинні проходити через губернатора, щоб цей фарс більше не повторився».\nГенерал кивнув у слухняній, схожій на машинну, манері. «Зрозумів, Ваша Величносте. Я передам їм вашу відповідь і подбаю, щоб вони мирно повернулися додому. Я скажу їм:»"
 abyssinia.71.d_gomez_absent:0 "Мортіція дивилася з вікна палацу свого чоловіка на натовп поні, що зібрався надворі. «Це було лише справою часу. Зрозуміло, що з них досить».\nДеджен, який стояв позад неї, відповів: «Усі вони — члени Мейндалусійської національної асоціації, тому вони вже були радикалізовані».\n«Хіба це дивно, зважаючи на те, як ми з ними поводилися? Або, радше, зважаючи на те, як баша з ними поводився?»\n«Анітрохи».\nМортіція зітхнула. «Тепер я піду і зустрінуся з ними від імені мого чоловіка».\n\nБрама палацу відчинилася, і Мортіція з'явилася у своїх регаліях в оточенні Королівської Гвардії. Щойно вони побачили її, поні почали кричати й галасувати, а додаткові сили Королівської Гвардії стримували їх. Кільком поні, які, судячи з усього, були одягнені в традиційний мейндалусійський одяг, дозволили наблизитися до [ROOT.ABY_queen_loc_cap]. Серед них був бородатий жеребець-єдиноріг, який левітував важливий на вигляд аркуш паперу. «Ваша Величносте, ми прибули сюди аж із Кольтоби, щоб передати [ROOT.ABY_king_loc_cap] цю петицію з двомастами тисячами підписів мейндалусійських поні. Це вимога автономії для Мейндалусії. З нас досить тиранічного правління баші!»\nМортіція мовчала, прораховуючи можливі варіанти відповіді. Якби вона прийняла петицію, мейндалусійці б зраділи й стали більш лояльними до монархії, але це означало б, що їм доведеться усунути башу і позбавити його повноважень. Але якби вона відхилила петицію, то заворушення в Мейндалусії продовжували б зростати."
 abyssinia.71.a:0 "«Ваша петиція прийнята»."
 abyssinia.71.b:0 "«Боюся, ви прибули сюди дарма»."
 
 abyssinia.72.t:0 "Страйк робітників у Мейндалусії"
 abyssinia.72.d_gomez:0 "Купці розпростерлися ниць перед троном Ґомеза. Він відреагував зітханням. «Будь ласка, не потрібно цього робити. Можете встати».\nВитончено вдягнені коти спантеличено перезирнулися, але все ж підкорилися. «Дякуємо, що надали нам аудієнцію, Ваша Високосте», — сказав один із них.\n«Так-так, прошу. У чому річ?»\nОзвався інший купець. «Ми, як і багато інших наших колег-комерсантів, володіємо власністю в Мейндалусії та наймаємо місцевих робітників. Однак багато наших робітників застрайкували».\n«Схоже, це скоординована дія. Половина мейндалусійської економіки практично паралізована», — додав третій купець.\n\n«І яка причина цього страйку? Чого вимагають поні?» — запитав Ґомез.\n«Звичайні дурниці. Кращої оплати, кращих умов праці, більших можливостей для підвищення. Чотирилапим потворам не подобається, коли ми, коти, ними командуємо».\n«Будь ласка, утримайтеся від расистських висловлювань», — зі стогоном попросив Ґомез. «То чому б вам просто не дати їм те, чого вони хочуть?»\nУсі купці були приголомшені. «П-перепрошую?» — відповів один із них. «Ви маєте хоч найменше уявлення, наскільки це зменшить наші прибутки? Дехто з нас, безсумнівно, збанкрутує!»\n«А хіба вони не збанкрутують, якщо страйки триватимуть?» — запитав Ґомез.\n«Ну, ем, це також можливо».\n«То чого саме ви просите від мене?»\n«Скажіть мейндалусійцям, що ви на нашому боці, і що жодних поступок не буде!»\n\nҐомез закотив очі. Знову йому доведеться вирішувати, кого зі своїх підданих він хоче розізлити."
 abyssinia.72.d_catrina:0 "Купці розпростерлися ниць перед троном Кітріни. Вона деякий час насолоджувалася цим жестом, перш ніж дати їм знак підвестися. Витончено вдягнені коти підкорилися. «Дякуємо, що надали нам аудієнцію, Ваша Високосте», — сказав один із них.\n«Вам пощастило, враховуючи, наскільки щільний у мене графік. Реп пояснив мені, що ви хотіли поговорити про Мейндалусію?»\nОзвався інший купець. «Ми, як і багато інших наших колег-комерсантів, володіємо власністю в Мейндалусії та наймаємо місцевих робітників. Однак багато наших робітників застрайкували».\n«Схоже, це скоординована дія. Половина мейндалусійської економіки практично паралізована», — додав третій купець.\nКітріна сердито насупилася. «І що зробив губернатор у відповідь? Це місцева справа».\n«Він запропонував викупити нашу власність в обмін на допомогу!» — вигукнув четвертий купець. «Я ж кажу вам, цей кіт корумпований!»\nКітріна потерла скроню кігтями. «Ох, заради Бааст... ну в такому разі ви правильно зробили, що прийшли до мене. Я зв'яжуся зі своїм скарбником і направлю вам трохи коштів, щоб ви могли пережити це, не збанкрутувавши і не продавши все. Королівська Гвардія також буде відправлена для підтримки порядку. На жаль, я не можу змусити вільних поні працювати, оскільки вони не раби. Тому я підготую закон, який забороняє страйки некотячих підданих під загрозою покарання у вигляді поневолення. Це займе деякий час, але має гарантувати, що подібне не повториться».\nУсі купці знову розпростерлися ниць, вихваляючи її та обсипаючи подяками. Натомість Кітріна обдарувала їх ікластою посмішкою."
 abyssinia.72.d_gomez_absent:0 "Купці розпростерлися ниць перед Мортіцією, яка сиділа на своєму маленькому троні поруч із порожнім троном Ґомеза. Вона тепло усміхнулася. «Дякую за жест, але в цьому немає потреби. Можете встати».\nВитончено вдягнені коти спантеличено перезирнулися, але все ж підкорилися. «Шкода, що [ROOT.ABY_king_loc_cap]ь відсутній, але ми раді, що ви надали нам аудієнцію, моя [ROOT.ABY_queen_loc_cap]», — сказав один із них.\n«Завжди рада. Отже, що привело вас сюди?»\nОзвався інший купець. «Ми, як і багато інших наших колег-комерсантів, володіємо власністю в Мейндалусії та наймаємо місцевих робітників. Однак багато наших робітників застрайкували».\n«Схоже, це скоординована дія. Половина мейндалусійської економіки практично паралізована», — додав третій купець.\n\n«Тож чому вони це роблять?» — запитала Мортіція. «Яка мета страйку?»\n«Звичайні дурниці. Кращої оплати, кращих умов праці, більших можливостей для підвищення. Чотирилапим потворам не подобається, коли ми, коти, ними командуємо».\n«Будь ласка, утримайтеся від расистських висловлювань», — попросила Мортіція зі страдницькою усмішкою. «Чи не розглядали ви можливість просто пристати на їхні вимоги, щоб швидко завершити страйк?»\nУсі купці були приголомшені. «П-перепрошую?» — відповів один із них. «Ви маєте хоч найменше уявлення, наскільки це зменшить наші прибутки? Дехто з нас, безсумнівно, збанкрутує!»\n«А хіба цього не станеться, якщо страйки триватимуть?»\n«Ну, ем, це також можливо».\nМортіція зітхнула. «І чого саме ви хочете від мене від імені мого чоловіка?»\n«Скажіть мейндалусійцям, що ви на нашому боці, і що жодних поступок не буде!»\n\n[ROOT.ABY_queen_loc_cap]-консорт насупилася. Знову їй доведеться вирішувати, кого зі своїх підданих вона хоче розізлити."
 abyssinia.72.a:0 "«Я наказую вам пристати на їхні вимоги»."
 abyssinia.72.b:0 "«Я підтримаю вас»."
 
 abyssinia.73.t:0 "Абіссинці спричиняють посуху"
 abyssinia.73.d_dam:0 "Вже деякий час ми отримуємо повідомлення про те, що абіссинці будують велику дамбу на річці, яку вони називають Пантера. Звісно, вона також протікає через нашу країну і забезпечує водою сотні тисяч віслюків. Попри наші неодноразові попередження, абіссинці завершили будівництво дамби і почали наповнювати велике водосховище, що спричинило катастрофу нижче за течією. Рівень води в річці впав до критичного, і місцевим фермерам бракує води для зрошення своїх угідь.\n\nОчевидно, що необхідно вжити якихось заходів, щоб накласти санкції на абіссинців і покарати їх за ігнорування наших благань."
 abyssinia.73.d_irrigation:0 "Вже деякий час ми отримуємо повідомлення про те, що абіссинці реалізують іригаційний проєкт на річці, яку вони називають Тигр. Звісно, вона також протікає через нашу країну і забезпечує водою сотні тисяч віслюків. Попри наші неодноразові попередження, абіссинці завершили будівництво іригаційних каналів і почали наповнювати їх водою, що спричинило катастрофу нижче за течією. Рівень води в річці впав до критичного, і місцевим фермерам бракує води для зрошення своїх угідь.\n\nОчевидно, що необхідно вжити якихось заходів, щоб накласти санкції на абіссинців і покарати їх за ігнорування наших благань."
 abyssinia.73.d_double_dam:0 "Вже деякий час ми отримуємо повідомлення про те, що абіссинці будують дві великі дамби на річках, які вони називають Пантера та Тигр. Звісно, вони також протікають через Асстирію та Ансерук і забезпечують водою сотні тисяч віслюків. Попри наші неодноразові попередження, абіссинці завершили будівництво дамб і почали наповнювати великі водосховища, що спричинило катастрофу нижче за течією. Рівень води в річках впав до критичного, і місцевим фермерам бракує води для зрошення своїх угідь.\n\nОчевидно, що необхідно вжити якихось заходів, щоб накласти санкції на абіссинців і покарати їх за ігнорування наших благань."
 abyssinia.73.a:0 "Хай їм грець, цим віроломним кицькам!"
 
 abyssinia.74.t:0 "Віслюки протестують"
 abyssinia.74.d_dam:0 "«Ви передали наше послання своєму сюзерену?» — вимагав відповіді розлючений дипломат-віслюк від Гумберта Темесгена, Фітаврарі Діметі.\nВитончено вдягнений кіт глибоко вдихнув. «Ні, як я вам і казав, не було жодних причин марнувати час [ROOT.GetLeader] на ваші скарги. Проєкт дамби надто важливий для нас, щоб просто його скасувати».\nЛють віслюка зросла, і він ледве стримувався, важко пирхаючи. «Який же ви дипломат?! Ось, погляньте на наслідки ваших дій!» Він простягнув коту запечатаний сувій.\nГумберт узяв його, ввічливо кивнув і відкрив. Прочитавши його, він насупився. «Хіба це ембарго не є надмірною реакцією?»\n«Ви маєте хоч найменше уявлення, якої шкоди ваша нація завдала моєму народу? Ми, віслюки, горді й не ставимося до таких збитків легковажно!»\n«І я нічого не можу зробити, щоб змінити вашу ду- ах, ви, віслюки, також уперті. Перепрошую».\nВіслюк проігнорував образу. «Негайно повідомте свого сюзерена! Цього разу у вас є для цього вагома причина».\nГумберт нервово поправив свій смокінг."
 abyssinia.74.d_irrigation:0 "«Ви передали наше послання своєму сюзерену?» — вимагав відповіді розлючений дипломат-віслюк від Гумберта Темесгена, Фітаврарі Діметі.\nВитончено вдягнений кіт глибоко вдихнув. «Ні, як я вам і казав, не було жодних причин марнувати час [ROOT.GetLeader] на ваші скарги. Іригаційний проєкт надто важливий для нас, щоб просто його скасувати».\nЛють віслюка зросла, і він ледве стримувався, важко пирхаючи. «Який же ви дипломат?! Ось, погляньте на наслідки ваших дій!» Він простягнув коту запечатаний сувій.\nГумберт узяв його, ввічливо кивнув і відкрив. Прочитавши його, він насупився. «Хіба це ембарго не є надмірною реакцією?»\n«Ви маєте хоч найменше уявлення, якої шкоди ваша нація завдала моєму народу? Ми, віслюки, горді й не ставимося до таких збитків легковажно!»\n«І я нічого не можу зробити, щоб змінити вашу ду- ах, ви, віслюки, також уперті. Перепрошую».\nВіслюк проігнорував образу. «Негайно повідомте свого сюзерена! Цього разу у вас є для цього вагома причина».\nГумберт нервово поправив свій смокінг."
 abyssinia.74.d_gommie:0 "«Ви передали наше послання своєму сюзерену?» — вимагав відповіді розлючений дипломат-віслюк від кота-міністра закордонних справ [Root.GetNameDef].\nВитончено вдягнений кіт глибоко вдихнув. «Так. [ROOT.GetLeader] хотів би офіційно перепросити за будь-які збитки чи проблеми, спричинені будівництвом дамб».\nЛють віслюка зросла, і він ледве стримувався, важко пирхаючи. «Перепросити?! Чи означає це, що ви відмовляєтеся знести ці дамби?»\nКіт похитав головою. «Боюся, ми не можемо просто скасувати такий масштабний і дорогий проєкт, який є життєво важливим для модернізації нашої нації».\n«Добре! Ось, погляньте на наслідки ваших дій». Віслюк простягнув коту запечатаний сувій.\nМіністр узяв його і відкрив. Прочитавши його, він насупився. «Ви збираєтеся накласти на нас ембарго через це?»\n«Ви маєте хоч найменше уявлення, якої шкоди ваша нація завдала моєму народу? Ми, віслюки, горді й не ставимося до таких збитків легковажно!»\n«Невже ми не можемо вирішити це мирним шляхом? Ми можемо запропонувати фінансову компенсацію...»\n«Ні! Жодних переговорів не буде. Негайно повідомте свого сюзерена!»\nКіт стомлено зітхнув. «Дуже добре»."
 abyssinia.74.a:0 "Наші потреби важливіші за їхні."
 
 abyssinia.75.t:0 "Відчайдушне благання"
 abyssinia.75.d:0 "Ґомез ішов коридором у [Root.ABY_royal_loc_nocap]ому палаці, коли потрапив у засідку раса Терстона. «Ось ви де, Ваша Надзвичайна Високосте!» — вигукнув він, і не встиг Ґомез усвідомити, що відбувається, як білий кіт уже впав на коліна й цілував підлогу.\n«Е-е... вітаю, шановний расе. Ви можете перестати це робити. Чому ви не попросили про офіційну аудієнцію зі мною?»\nТерстон підвів погляд від підлоги. «О, Ваша Найвеличніша і Найулюбленіша Світлосте, я намагався, намагався! Але ваш радник Деджен постійно повторював, що ви не можете зустрітися».\nҐомез насупився. «Хоч я й зайнятий, немає жодної причини, чому б я не міг поговорити з вами раніше. Зрештою, ви високопоставлений вельможа».\nОчі Терстона розширилися. «О, дякую, дякую!» Він знову почав цілувати підлогу.\nҐомез озирнувся довкола, сподіваючись, що ніхто не бачить цієї незручності. «Ем, про що ви хотіли поговорити?»\nТерстон раптом підвівся і поклав лапи на плече Ґомеза. «Будь ласка, перегляньте своє рішення про вигнання нас, вельмож, з офіцерського корпусу! Обіцяю, я зроблю все можливе, щоб стати кращим!»\n«Ах, ось воно що», — зітхнув Ґомез. «Знаєте, ви не надто довели свою здатність командувати моїми солдатами».\nТерстон відчайдушно заголосив: «Благаю вас, Бездоганний і Непогрішний Володарю! Я доведу, що гідний цього, якщо ви тільки дасте мені такий шанс!»"
 abyssinia.75.a:0 "«Ні, моє рішення остаточне»."
 abyssinia.75.b:0 "«Добре, вельможі все-таки можуть залишитися»."
 
 abyssinia.76.t:0 "Перший серед рівних"
 abyssinia.76.d:0 "Багато вельмож не повірили своїм вухам, коли отримали посланців із Пантери з проханням прибути до [Root.ABY_royal_loc_nocap]ого палацу. Зрештою, вже багато років поспіль саме вони організовували засідання дворянської ради. Цей вчинок сам по собі вже був способом для Ґомеза відновити свій авторитет над ними. Коли аристокоти прибули до зали засідань, вони були ще більше здивовані, побачивши, що [ROOT.ABY_king_loc_cap] вже чекає на них.\n\nЩойно всі стільці були зайняті, [ROOT.ABY_king_loc_cap] Ґомез підвівся і почав говорити монотонним голосом, що натякало на те, що він репетирував ці слова багато разів. «Вітаю. Я радий, що ви всі благополучно дісталися сюди. Перш за все, я знаю, що шановна цахіфе лам Тардар Соурпусс зазвичай виконує обов'язки голови під час цих засідань, але тепер я беру цю роль на себе».\nВельможі перезирнулися із сумішшю занепокоєння та тривоги.\n«По-друге, порядок денний сьогоднішнього засідання стосується вашої ролі в Абіссинії. Я хотів би використати прислів'я: "Кота немає — миші танцюють". Я хотів би нагадати всім вам, що я, як [ROOT.ABY_king_loc_cap] і Суверенний Володар Абіссинії, є першим серед рівних і тому заслуговую на повагу. Моя відсутність, можливо, змусила вас про це забути».\nЩойно Ґомез зробив паузу, деякі вельможі почали голосно протестувати. Ґомез підняв лапу, закликаючи їх заспокоїтися. «Усе, про що я прошу, — це повага. Повага, яку ви виявляли до мого батька Няуконнена».\nАристокоти, здавалося, заспокоїлися. Те, що вони так легко розлютилися, стурбувало Ґомеза. Відтепер йому доведеться думати, як давати раду з цією зухвалою знаттю."
 abyssinia.76.a:0 "«І так він мовив, і так він мовив, той лорд із Фелібели...»"
 abyssinia.76.b:0 "«Я заслужу їхню любов і довіру, перш ніж заберу в них усе»."
 
 abyssinia.77.t:0 "Попередження"
 abyssinia.77.d_gomez:0 "Фітаврарі Гумберт Темесген сів навпроти столу Ґомеза.\n«Вчасно, як завжди, Темесгене», — сказав Ґомез, а потім стомлено зітхнув. «У мене був довгий день, то що ж такого важливого ви хотіли обговорити тут наодинці?»\nАристокіт зняв з голови білого капелюха й поклав його собі на груди. «Я хотів би поговорити про вашого найвидатнішого міністра, Деджена Ріс-Моггі».\nВтома Ґомеза, здавалося, розвіялася, він одразу став настороженим. «...Що з ним?»\n«Боюся, його вплив стає занадто великим. На останньому засіданні Ради ви просили нас, вельмож, поважати вас. Але з того, що я бачу, Деджен намагається діяти як [ROOT.ABY_king_loc_cap] від вашого імені, постійно керуючи державною політикою і встромляючи лапу в кожну справу».\nҐомез насупився. «Ви думаєте, це він сказав мені виголосити ту промову перед знаттю? І вас це засмутило?»\nГумберт похитав головою. «Не має значення, що я думаю, правда залишається незмінною. Деджен стає надто могутнім як для представника плебсу. Чи можна йому справді довіряти?»\nҐомез застогнав і потер лоба лапою. «Він вірно служив моєму батькові багато років...»\n«А що стало причиною смерті нявгуса Няуконнена?»\nҐомез міцно стиснув щелепи. Невже він якось дізнався правду?\nГумберт примружив очі. «Схоже, ви знаєте про це більше, ніж я. Що ж. Зрештою, ви маєте рацію, ви маєте абсолютну владу над Абіссинією. Але будьте обережні, інакше можете втратити цю владу». Він знову надягнув капелюха, підвівся і вийшов із кімнати, залишивши Ґомеза наодинці зі своїми думками."
 abyssinia.77.d_gomez_absent:0 "Фітаврарі Гумберт Темесген сів навпроти столу Мортіції.\n«Ідеальний час», — сказала Мортіція, відсуваючи стос паперів. «Я щойно закінчила свою роботу. Отже, що ви хотіли обговорити наодинці?»\nАристокіт зняв з голови білого капелюха й поклав його собі на груди. «Я хотів би поговорити з Ґомезом про його найвидатнішого міністра, Деджена Ріс-Моггі».\nМортіція з цікавістю підняла брову. «Що з ним?»\n«Боюся, його вплив стає занадто великим. На останньому засіданні Ради Ґомез просив нас, вельмож, поважати його. Але з того, що я бачу, Деджен намагається діяти як [ROOT.ABY_king_loc_cap] від його імені, постійно керуючи державною політикою і встромляючи лапу в кожну справу».\nМортіція насупилася. «Ви думаєте, це він сказав йому виголосити ту промову перед знаттю? І вас це засмутило?»\nГумберт похитав головою. «Не має значення, що я думаю, правда залишається незмінною. Деджен стає надто могутнім як для представника плебсу. Чи можна йому справді довіряти?»\nМортіція глибоко вдихнула. «Він вірно служив батькові Ґомеза багато років...»\n«А що стало причиною смерті нявгуса Няуконнена?»\nМортіція міцно стиснула щелепи. Невже він якось дізнався правду?\nГумберт примружив очі. «Схоже, ви знаєте про це більше, ніж я. Що ж. Зрештою, ви маєте рацію, Ґомез має абсолютну владу над Абіссинією. Але будьте обережні, інакше він може втратити цю владу». Він знову надягнув капелюха, підвівся і вийшов із кімнати, залишивши Мортіцію наодинці зі своїми думками."
 abyssinia.77.a:0 "«Я міг би влаштувати публічну демонстрацію, тимчасово відсторонивши його...»"
 abyssinia.77.b:0 "«Деджен — мій єдиний союзник проти цих інтриганів-пацюків»."
 
 abyssinia.78.t:0 "Вершки суспільства — частина I"
 abyssinia.78.d:0 "Тардар Соурпусс: як цахіфе лам, вона є другим за рангом військовим офіцером (див. «Месафінт (та королівська родина) в двох словах»). Збереження ролі знаті як лідерів армії є для неї життєво важливою метою. Вона відома своїм сварливим і песимістичним характером.\nТерстон Ваффлз: його можна описати як підлесника, що завжди намагається заслужити прихильність монархії. Це не означає, що він завжди схвалює дії свого сюзерена. Насправді він може протестувати досить голосно.\nГерцогиня: вона відома своєю доброзичливістю та елегантністю. Її резиденцію, Кітрен, у 1006 році окупувала Вінґбардія.\nГумберт Темесген: понад десятиліття він служить королівству як диплокіт і міністр закордонних справ. Його феод включає Діре-Паву, яке є третім за величиною містом Абіссинії завдяки його прогресивній економічній політиці. Він розумний і вправний фехтувальник.\nМарті Няняняняняняняня: відомий своєю химерною гіперактивною особистістю та любов'ю до випічки з тостера. Він інвестував у їхнє виробництво, а це означає, що він зосереджений на сільському господарстві.\nСалем Себлегарегевойн: він дуже амбітний, жадібний і саркастичний, але має і світлу сторону.\nЛюцифер: він жорстокий і сумнозвісний своїм жорстоким поводженням із рабами. З його підступністю може зрівнятися лише його ненажерливість.\nТімоті Є'ісаті Іраті: він таємнича фігура, яка, за чутками, захоплюється окультизмом."
 abyssinia.78.a:0 "О ні, є ще хтось?"
 
 abyssinia.79.t:0 "Вершки суспільства — частина II"
 abyssinia.79.d:0 "Чеширський Кіт: завжди зловісно посміхається, його вважають божевільним через його філософські, але безглузді промови. Його мотиви — загадка.\nКіт у капелюсі: після невдалої кар'єри аніматора для кошенят він успадкував від матері великі маєтки й став одним із провідних землевласників в Абіссинії.\nСільвестр Пуссікет-старший: найбільше відомий своїм сильним шепелявленням. Понад усе він дбає про те, щоб підготувати свого сина, Сільвестра-молодшого, до успадкування його титулу. Тому він не хоче жодних обмежень дворянських привілеїв.\nГамбол Віха: раніше відомий як Закарі, він носить престижний титул джантірара, хранителя фортеці. Він загалом добродушний і вірний, але наївний і має велике его.\nТомас Джаспер: також відомий як Том, він славиться своєю ексцентричною звичкою полювати на мишей, як звичайний кіт. Він насамперед хоче зберегти статус-кво.\nОутміл Поп: його расство є протекторатом Вінґбардії. Згідно з абіссинською версією договору, цей статус є тимчасовим, але вінґбардійська версія стверджує, що постійним. Хай там що, він уже багато років ізольований від абіссинської політики.\nСмадж Венібері: дуже антисоціальний землевласник, здебільшого відомий масовим виробництвом салату для експорту травоїдним.\nБінгус Бірус: попри зовнішню схожість з деджазмачем Тімоті, він не має до нього стосунку. Він здобув владу і славу після того, як нявгус Няуконнен призначив його башею Мейндалусії. Він поклявся зробити все можливе, щоб звільнити всю Мейндалусію від незаконної марегіпетської окупації."
 abyssinia.79.a:0 "Дякувати богу, що немає частини III."
 
 abyssinia.80.t:0 "Абіссинія в односторонньому порядку скасовує Кітренський договір!"
 abyssinia.80.d_owns_katren:0 "Тривожні новини з Абіссинії: Гіліппо Гаппі, дипломат у справах Зебрики, повідомляє, що абіссинський уряд ухвалив необачне і необґрунтоване рішення в односторонньому порядку розірвати Кітренський договір. Цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Якщо Абіссинія не дотримуватиметься цього договору, наші інтереси в цій країні опиняться під серйозною загрозою.\n\nГарнізонні підрозділи в Кітрені вже повідомляють, що абіссинські війська входять до колишньої демілітаризованої зони Кицькицю, що спровокувало масовий виїзд вінґбардійських цивільних. Хоча невідомо, чи спробує Абіссинія атакувати сам Кітрен, це цілком можливо. Низка урядовців вимагає від вінґбардійських військових відреагувати на цю загрозу, тоді як інші стверджують, що договір від самого початку був несправедливо нав'язаний Абіссинії."
 abyssinia.80.d_dont_own_katren:0 "Тривожні новини з Абіссинії: Гіліппо Гаппі, дипломат у справах Зебрики, повідомляє, що абіссинський уряд ухвалив необачне і необґрунтоване рішення в односторонньому порядку розірвати Кітренський договір. Цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Якщо Абіссинія не дотримуватиметься цього договору, наші інтереси, що залишилися в цій країні, опиняться під серйозною загрозою.\n\nОскільки Кітрен уже був раніше окупований Абіссинією, це лише підтверджує повну втрату провінції Кицькиць загалом, що знаменує собою провал нашої зовнішньої політики в Зебриці."
 abyssinia.80.a:0 "Мобілізувати армію!"
 abyssinia.80.b:0 "Зрештою, договір не був ані чесним, ані законним."
 
 abyssinia.81.t:0 "Абіссинія бажає переглянути Кітренський договір"
 abyssinia.81.d:0 "Абіссинський уряд нещодавно звернувся до нашого дипломата у справах Зебрики, Гіліппо Гаппі. Коти бажають переглянути Кітренський договір, оскільки, на їхню думку, він порушує попередні угоди, які ми з ними підписували, і їхнього правителя змусили підписати його під тиском. Хоча ці звинувачення і мають зерно істини, цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Ймовірно, абіссинці хочуть переглянути всі ці пункти, що призведе до значної втрати концесій. Тоді як деяким грифонам байдуже до Абіссинії і вони вважають, що ми маємо дати їм спокій, інші кажуть, що Кітренський договір має залишитися без змін."
 abyssinia.81.a:0 "Доручити Гаппі вести вільні переговори."
 abyssinia.81.b:0 "Жодних переговорів не буде."abyssinia.75.t:0 "Відчайдушне благання"
 abyssinia.75.d:0 "Ґомез ішов коридором у [Root.ABY_royal_loc_nocap]ому палаці, коли потрапив у засідку раса Терстона. «Ось ви де, Ваша Надзвичайна Високосте!» — вигукнув він, і не встиг Ґомез усвідомити, що відбувається, як білий кіт уже впав на коліна й цілував підлогу.\n«Е-е... вітаю, шановний расе. Ви можете перестати це робити. Чому ви не попросили про офіційну аудієнцію зі мною?»\nТерстон підвів погляд від підлоги. «О, Ваша Найвеличніша і Найулюбленіша Світлосте, я намагався, намагався! Але ваш радник Деджен постійно повторював, що ви не можете зустрітися».\nҐомез насупився. «Хоч я й зайнятий, немає жодної причини, чому б я не міг поговорити з вами раніше. Зрештою, ви високопоставлений вельможа».\nОчі Терстона розширилися. «О, дякую, дякую!» Він знову почав цілувати підлогу.\nҐомез озирнувся довкола, сподіваючись, що ніхто не бачить цієї незручності. «Ем, про що ви хотіли поговорити?»\nТерстон раптом підвівся і поклав лапи на плече Ґомеза. «Будь ласка, перегляньте своє рішення про вигнання нас, вельмож, з офіцерського корпусу! Обіцяю, я зроблю все можливе, щоб стати кращим!»\n«Ах, ось воно що», — зітхнув Ґомез. «Знаєте, ви не надто довели свою здатність командувати моїми солдатами».\nТерстон відчайдушно заголосив: «Благаю вас, Бездоганний і Непогрішний Володарю! Я доведу, що гідний цього, якщо ви тільки дасте мені такий шанс!»"
 abyssinia.75.a:0 "«Ні, моє рішення остаточне»."
 abyssinia.75.b:0 "«Добре, вельможі все-таки можуть залишитися»."
 
 abyssinia.76.t:0 "Перший серед рівних"
 abyssinia.76.d:0 "Багато вельмож не повірили своїм вухам, коли отримали посланців із Пантери з проханням прибути до [Root.ABY_royal_loc_nocap]ого палацу. Зрештою, вже багато років поспіль саме вони організовували засідання дворянської ради. Цей вчинок сам по собі вже був способом для Ґомеза відновити свій авторитет над ними. Коли аристокоти прибули до зали засідань, вони були ще більше здивовані, побачивши, що [ROOT.ABY_king_loc_cap] вже чекає на них.\n\nЩойно всі стільці були зайняті, [ROOT.ABY_king_loc_cap] Ґомез підвівся і почав говорити монотонним голосом, що натякало на те, що він репетирував ці слова багато разів. «Вітаю. Я радий, що ви всі благополучно дісталися сюди. Перш за все, я знаю, що шановна цахіфе лам Тардар Соурпусс зазвичай виконує обов'язки голови під час цих засідань, але тепер я беру цю роль на себе».\nВельможі перезирнулися із сумішшю занепокоєння та тривоги.\n«По-друге, порядок денний сьогоднішнього засідання стосується вашої ролі в Абіссинії. Я хотів би використати прислів'я: "Кота немає — миші танцюють". Я хотів би нагадати всім вам, що я, як [ROOT.ABY_king_loc_cap] і Суверенний Володар Абіссинії, є першим серед рівних і тому заслуговую на повагу. Моя відсутність, можливо, змусила вас про це забути».\nЩойно Ґомез зробив паузу, деякі вельможі почали голосно протестувати. Ґомез підняв лапу, закликаючи їх заспокоїтися. «Усе, про що я прошу, — це повага. Повага, яку ви виявляли до мого батька Няуконнена».\nАристокоти, здавалося, заспокоїлися. Те, що вони так легко розлютилися, стурбувало Ґомеза. Відтепер йому доведеться думати, як давати раду з цією зухвалою знаттю."
 abyssinia.76.a:0 "«І так він мовив, і так він мовив, той лорд із Фелібели...»"
 abyssinia.76.b:0 "«Я заслужу їхню любов і довіру, перш ніж заберу в них усе»."
 
 abyssinia.77.t:0 "Попередження"
 abyssinia.77.d_gomez:0 "Фітаврарі Гумберт Темесген сів навпроти столу Ґомеза.\n«Вчасно, як завжди, Темесгене», — сказав Ґомез, а потім стомлено зітхнув. «У мене був довгий день, то що ж такого важливого ви хотіли обговорити тут наодинці?»\nАристокіт зняв з голови білого капелюха й поклав його собі на груди. «Я хотів би поговорити про вашого найвидатнішого міністра, Деджена Ріс-Моггі».\nВтома Ґомеза, здавалося, розвіялася, він одразу став настороженим. «...Що з ним?»\n«Боюся, його вплив стає занадто великим. На останньому засіданні Ради ви просили нас, вельмож, поважати вас. Але з того, що я бачу, Деджен намагається діяти як [ROOT.ABY_king_loc_cap] від вашого імені, постійно керуючи державною політикою і встромляючи лапу в кожну справу».\nҐомез насупився. «Ви думаєте, це він сказав мені виголосити ту промову перед знаттю? І вас це засмутило?»\nГумберт похитав головою. «Не має значення, що я думаю, правда залишається незмінною. Деджен стає надто могутнім як для представника плебсу. Чи можна йому справді довіряти?»\nҐомез застогнав і потер лоба лапою. «Він вірно служив моєму батькові багато років...»\n«А що стало причиною смерті нявгуса Няуконнена?»\nҐомез міцно стиснув щелепи. Невже він якось дізнався правду?\nГумберт примружив очі. «Схоже, ви знаєте про це більше, ніж я. Що ж. Зрештою, ви маєте рацію, ви маєте абсолютну владу над Абіссинією. Але будьте обережні, інакше можете втратити цю владу». Він знову надягнув капелюха, підвівся і вийшов із кімнати, залишивши Ґомеза наодинці зі своїми думками."
 abyssinia.77.d_gomez_absent:0 "Фітаврарі Гумберт Темесген сів навпроти столу Мортіції.\n«Ідеальний час», — сказала Мортіція, відсуваючи стос паперів. «Я щойно закінчила свою роботу. Отже, що ви хотіли обговорити наодинці?»\nАристокіт зняв з голови білого капелюха й поклав його собі на груди. «Я хотів би поговорити з Ґомезом про його найвидатнішого міністра, Деджена Ріс-Моггі».\nМортіція з цікавістю підняла брову. «Що з ним?»\n«Боюся, його вплив стає занадто великим. На останньому засіданні Ради Ґомез просив нас, вельмож, поважати його. Але з того, що я бачу, Деджен намагається діяти як [ROOT.ABY_king_loc_cap] від його імені, постійно керуючи державною політикою і встромляючи лапу в кожну справу».\nМортіція насупилася. «Ви думаєте, це він сказав йому виголосити ту промову перед знаттю? І вас це засмутило?»\nГумберт похитав головою. «Не має значення, що я думаю, правда залишається незмінною. Деджен стає надто могутнім як для представника плебсу. Чи можна йому справді довіряти?»\nМортіція глибоко вдихнула. «Він вірно служив батькові Ґомеза багато років...»\n«А що стало причиною смерті нявгуса Няуконнена?»\nМортіція міцно стиснула щелепи. Невже він якось дізнався правду?\nГумберт примружив очі. «Схоже, ви знаєте про це більше, ніж я. Що ж. Зрештою, ви маєте рацію, Ґомез має абсолютну владу над Абіссинією. Але будьте обережні, інакше він може втратити цю владу». Він знову надягнув капелюха, підвівся і вийшов із кімнати, залишивши Мортіцію наодинці зі своїми думками."
 abyssinia.77.a:0 "«Я міг би влаштувати публічну демонстрацію, тимчасово відсторонивши його...»"
 abyssinia.77.b:0 "«Деджен — мій єдиний союзник проти цих інтриганів-пацюків»."
 
 abyssinia.78.t:0 "Вершки суспільства — частина I"
 abyssinia.78.d:0 "Тардар Соурпусс: як цахіфе лам, вона є другим за рангом військовим офіцером (див. «Месафінт (та королівська родина) в двох словах»). Збереження ролі знаті як лідерів армії є для неї життєво важливою метою. Вона відома своїм сварливим і песимістичним характером.\nТерстон Ваффлз: його можна описати як підлесника, що завжди намагається заслужити прихильність монархії. Це не означає, що він завжди схвалює дії свого сюзерена. Насправді він може протестувати досить голосно.\nГерцогиня: вона відома своєю доброзичливістю та елегантністю. Її резиденцію, Кітрен, у 1006 році окупувала Вінґбардія.\nГумберт Темесген: понад десятиліття він служить королівству як диплокіт і міністр закордонних справ. Його феод включає Діре-Паву, яке є третім за величиною містом Абіссинії завдяки його прогресивній економічній політиці. Він розумний і вправний фехтувальник.\nМарті Няняняняняняняня: відомий своєю химерною гіперактивною особистістю та любов'ю до випічки з тостера. Він інвестував у їхнє виробництво, а це означає, що він зосереджений на сільському господарстві.\nСалем Себлегарегевойн: він дуже амбітний, жадібний і саркастичний, але має і світлу сторону.\nЛюцифер: він жорстокий і сумнозвісний своїм жорстоким поводженням із рабами. З його підступністю може зрівнятися лише його ненажерливість.\nТімоті Є'ісаті Іраті: він таємнича фігура, яка, за чутками, захоплюється окультизмом."
 abyssinia.78.a:0 "О ні, є ще хтось?"
 
 abyssinia.79.t:0 "Вершки суспільства — частина II"
 abyssinia.79.d:0 "Чеширський Кіт: завжди зловісно посміхається, його вважають божевільним через його філософські, але безглузді промови. Його мотиви — загадка.\nКіт у капелюсі: після невдалої кар'єри аніматора для кошенят він успадкував від матері великі маєтки й став одним із провідних землевласників в Абіссинії.\nСільвестр Пуссікет-старший: найбільше відомий своїм сильним шепелявленням. Понад усе він дбає про те, щоб підготувати свого сина, Сільвестра-молодшого, до успадкування його титулу. Тому він не хоче жодних обмежень дворянських привілеїв.\nГамбол Віха: раніше відомий як Закарі, він носить престижний титул джантірара, хранителя фортеці. Він загалом добродушний і вірний, але наївний і має велике его.\nТомас Джаспер: також відомий як Том, він славиться своєю ексцентричною звичкою полювати на мишей, як звичайний кіт. Він насамперед хоче зберегти статус-кво.\nОутміл Поп: його расство є протекторатом Вінґбардії. Згідно з абіссинською версією договору, цей статус є тимчасовим, але вінґбардійська версія стверджує, що постійним. Хай там що, він уже багато років ізольований від абіссинської політики.\nСмадж Венібері: дуже антисоціальний землевласник, здебільшого відомий масовим виробництвом салату для експорту травоїдним.\nБінгус Бірус: попри зовнішню схожість з деджазмачем Тімоті, він не має до нього стосунку. Він здобув владу і славу після того, як нявгус Няуконнен призначив його башею Мейндалусії. Він поклявся зробити все можливе, щоб звільнити всю Мейндалусію від незаконної марегіпетської окупації."
 abyssinia.79.a:0 "Дякувати богу, що немає частини III."
 
 abyssinia.80.t:0 "Абіссинія в односторонньому порядку скасовує Кітренський договір!"
 abyssinia.80.d_owns_katren:0 "Тривожні новини з Абіссинії: Гіліппо Гаппі, дипломат у справах Зебрики, повідомляє, що абіссинський уряд ухвалив необачне і необґрунтоване рішення в односторонньому порядку розірвати Кітренський договір. Цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Якщо Абіссинія не дотримуватиметься цього договору, наші інтереси в цій країні опиняться під серйозною загрозою.\n\nГарнізонні підрозділи в Кітрені вже повідомляють, що абіссинські війська входять до колишньої демілітаризованої зони Кицькицю, що спровокувало масовий виїзд вінґбардійських цивільних. Хоча невідомо, чи спробує Абіссинія атакувати сам Кітрен, це цілком можливо. Низка урядовців вимагає від вінґбардійських військових відреагувати на цю загрозу, тоді як інші стверджують, що договір від самого початку був несправедливо нав'язаний Абіссинії."
 abyssinia.80.d_dont_own_katren:0 "Тривожні новини з Абіссинії: Гіліппо Гаппі, дипломат у справах Зебрики, повідомляє, що абіссинський уряд ухвалив необачне і необґрунтоване рішення в односторонньому порядку розірвати Кітренський договір. Цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Якщо Абіссинія не дотримуватиметься цього договору, наші інтереси, що залишилися в цій країні, опиняться під серйозною загрозою.\n\nОскільки Кітрен уже був раніше окупований Абіссинією, це лише підтверджує повну втрату провінції Кицькиць загалом, що знаменує собою провал нашої зовнішньої політики в Зебриці."
 abyssinia.80.a:0 "Мобілізувати армію!"
 abyssinia.80.b:0 "Зрештою, договір не був ані чесним, ані законним."
 
 abyssinia.81.t:0 "Абіссинія бажає переглянути Кітренський договір"
 abyssinia.81.d:0 "Абіссинський уряд нещодавно звернувся до нашого дипломата у справах Зебрики, Гіліппо Гаппі. Коти бажають переглянути Кітренський договір, оскільки, на їхню думку, він порушує попередні угоди, які ми з ними підписували, і їхнього правителя змусили підписати його під тиском. Хоча ці звинувачення і мають зерно істини, цей договір, серед іншого, встановлював демілітаризовану зону навколо однойменного порту, надавав значні концесії вінґбардійським компаніям на видобуток корисних копалин у цьому регіоні та гарантував екстериторіальність вінґбардійців в Абіссинії. Ймовірно, абіссинці хочуть переглянути всі ці пункти, що призведе до значної втрати концесій. Тоді як деяким грифонам байдуже до Абіссинії і вони вважають, що ми маємо дати їм спокій, інші кажуть, що Кітренський договір має залишитися без змін."
 abyssinia.81.a:0 "Доручити Гаппі вести вільні переговори."
 abyssinia.81.b:0 "Жодних переговорів не буде."
 
 abyssinia.82.t:0 "Переговори з Вінґбардією"
 abyssinia.82.d:0 "«...Хіба ці зміни практично не роблять Кітренський договір значною мірою недійсним?» — пробурмотів Гіліппо Гаппі.\n«Ну, значною мірою так, але не повністю», — відповів Гумберт Темесген. «Згідно з переглянутою версією договору, вінґбардійські компанії все ще захищені від державного оподаткування».\n«Звісно», — пробурмотів Гаппі, але його розчарування було лише грою. Насправді він був цілком задоволений таким поворотом подій. У Зебриці були куди важливіші та цінніші пріоритети, ніж суха й скеляста земля Абіссинії.\n«То ви його підпишете?» — ввічливо запитав Гумберт.\nВін знизав плечима. «Я не хочу конфлікту між нашими двома країнами, і Міністерство закордонних справ доручило мені вести переговори незалежно. Хоч як мені боляче, мій обов'язок — підписати цей договір в ім'я нашої вічної дружби».\nЗ цими словами Гаппі почав писати пір'яною ручкою, затиснутою в пазурах. Гумберт відреагував лише легким кивком."
 abyssinia.82.a:0 "Це було напрочуд легко."
 
 abyssinia.83.t:0 "Вінґбардія відмовляється від переговорів"
 abyssinia.83.d:0 "«Мені боляче це казати, — промовив Гіліппо Гаппі, ніби ось-ось розплачеться, — але Міністерство закордонних справ відмовилося надати мені дозвіл на переговори з вашим урядом».\nГумберт кліпнув очима, не вражений мелодраматичною виставою по той бік столу.\n«Повірте мені, — вів далі він, — я не хочу нічого іншого, крім збереження дружби між нашими двома великими країнами, але в цьому випадку мої пазурі зв'язані за спиною. Я перепрошую від імені вінґбардійської нації».\n«Я приймаю ваші вибачення, — відповів Гумберт, — але не можу гарантувати, що їх прийме мій сюзерен. Що стосується його, він підписав договір лише тому, що йому погрожували в час кризи. Ця спроба дипломатії була проявом нашої доброї волі. Але пам'ятайте, що ми, коти, маємо гострі пазурі».\n«І ми також», — подумав Гіліппо, але вголос не сказав. Натомість він винувато кивнув. «Я розумію. Я зробив усе можливе, щоб уникнути конфлікту, але, можливо, цього виявилося недостатньо. Підручники з історії знатимуть, що я намагався і не зміг запобігти катастрофі». «Катастрофі для вас, можливо», — знову подумав він. Але він не зовсім брехав. Як на нього, Абіссинія була марною тратою часу. А тепер, імовірно, вона стане ще й марною тратою життів."
 abyssinia.83.a:0 "Іноді меч сильніший за перо."
 abyssinia.83.b:0 "Нам доведеться розібратися з ними пізніше."
 
 abyssinia.84.t:0 "Абіссинія вимагає повернення Кітрену"
 abyssinia.84.d:0 "Дипломатичне комюніке від [ABY.GetNameDef]: вони просять наші гарнізонні війська мирно покинути спірне портове місто Кітрен, оскільки, на їхню думку, воно перебуває під незаконною іноземною окупацією. Хоча вони можуть мати рацію, правда також і в тому, що утримання Кітрену дає нам плацдарм у Зебриці та на Абіссинському півострові, що дозволяє нам здійснювати вплив на абіссинський уряд. Звісно, якщо ми не підемо мирно, вони виженуть нас силою. Але, можливо, війна — це саме те, що нам потрібно для подальшого розширення наших володінь?"
 abyssinia.84.a:0 "Вони можуть забрати його назад."
 abyssinia.84.b:0 "Тепер воно наше. Їм доведеться з цим змиритися."
 
 abyssinia.85.t:0 "Кітрен під нашим контролем"
 abyssinia.85.d_gomez:0 "На губах Гумберта грала рідкісна усмішка, коли він постав перед троном Ґомеза, низько вклонившись і знявши свій циліндр. «Я повернувся з подорожі до [From.Capital.GetName]. І я приніс гарні новини».\nУсмішка виявилася заразливою, і незабаром Ґомез також ледь помітно всміхнувся. «Треба думати, вони наказали своїм військам покинути Кітрен?»\n«Саме так, мій сюзерене. Я чув від Терстона, що наші власні війська вже виступають, аби взяти портове місто під контроль».\nҐомез полегшено зітхнув. «Це пройшло краще, ніж я очікував. Дякую за ваші дипломатичні зусилля, Темесгене».\n«Радий служити вам, Ваша Величносте», — із задоволенням відповів Гумберт і шанобливо вклонився."
 abyssinia.85.d_gomez_absent:0 "На губах Гумберта грала рідкісна усмішка, коли він постав перед троном Мортіції, який був досить малим порівняно з порожнім троном Ґомеза. Він низько вклонився і зняв свій циліндр. «Я повернувся з подорожі до [From.Capital.GetName]. І я приніс гарні новини».\nУсмішка виявилася заразливою, і незабаром Мортіція також тепло всміхнулася. «А, то вони погодилися мирно покинути Кітрен?»\nГумберт кивнув. «Я чув від Терстона, що наші власні війська вже виступають, аби взяти портове місто під контроль».\nМортіція сплеснула лапами. «Я рада, що через цю безглузду територіальну суперечку не доведеться проливати кров. Від імені мого чоловіка — дякую, Гумберте».\n«Радий служити йому», — відповів Гумберт формальним, але сухим тоном і вклонився."
 abyssinia.85.d_gommie:0 "Шарп Спір підняла бінокль і подивилася вниз із пагорба, на якому стояла. Вона бачила внизу порт Кітрен, який був заповнений [From.GetAdjective] кораблями, що вантажилися припасами та грифонами. Потім вона опустила бінокль і з полегшенням зітхнула. «Я дуже боялася, що нам доведеться стріляти в них, щоб переконати піти. Це, напевно, спровокувало б ще один кривавий конфлікт...»\nФахд Аль-Касаар, який стояв поруч із нею, усміхнувся і поклав підбадьорливе копито їй на плече. «Ніколи б не подумав, що ти такий дипломат. Спочатку підписання договору з Патріотичним фронтом, а тепер це. Що сталося з тією грізною войовницею, яка спочатку стріляла, а потім ставила запитання?»\nСпір задоволено пирхнула. «Гадаю, вона просто втомилася від насильства. Крім того, навіщо ризикувати життям у бою з ворогами, якщо можна просто ввічливо попросити їх зупинитися?»"
 abyssinia.85.a:0 "Яке полегшення."
 
 abyssinia.86.t:0 "Переговори провалилися"
 abyssinia.86.d_gomez:0 "Гумберт мав похмурий вираз обличчя, коли він постав перед троном Ґомеза, низько вклонившись і знявши свій циліндр. «Я повернувся з подорожі до [From.Capital.GetName]. І я приніс погані новини».\nҐомез стурбовано насупився. «Треба думати, вони відмовилися віддавати Кітрен?»\n«Саме так, мій сюзерене. Я чув від Терстона, що вони навіть вирішили посилити місцевий гарнізон».\nҐомез роздратовано застогнав. «Це пройшло так, як я і очікував. Проте я вдячний за ваші зусилля, Темесгене. Тепер я маю взяти справу у свої лапи... тобто сказати армії виштовхати їх звідти».\n«Радий служити вам, Ваша Величносте», — відповів Гумберт формальним, але сухим тоном і шанобливо вклонився."
 abyssinia.86.d_gomez_absent:0 "Гумберт мав похмурий вираз обличчя, коли він постав перед троном Мортіції, який був досить малим порівняно з порожнім троном Ґомеза. Він низько вклонився і зняв свій циліндр. «Я повернувся з подорожі до [From.Capital.GetName]. І я приніс погані новини».\nМортіція сердито насупилася. «А, то вони вирішили бути впертими, га?»\nГумберт кивнув. «Я чув від Терстона, що вони навіть вирішили посилити місцевий гарнізон».\nМортіція щось пробурмотіла собі під ніс. «Це їм не дуже допоможе, коли прийде абіссинська армія». Вона спробувала заспокоїтися і взяти себе в руки. «У будь-якому разі, дякую за спробу вирішити це питання дипломатично, Гумберте».\n«Радий служити йому, Ваша Величносте», — відповів Гумберт формальним, але сухим тоном і вклонився."
 abyssinia.86.d_gommie:0 "Шарп Спір підняла бінокль і подивилася вниз із пагорба, на якому стояла. Вона бачила внизу порт Кітрен, який був заповнений [From.GetAdjective] кораблями, що вивантажували припаси та озброєних грифонів. Потім вона опустила бінокль і стомлено зітхнула. «Я дуже боялася, що нам доведеться стріляти в них, щоб переконати піти. Здається, саме так і є...»\nФахд Аль-Касаар, який стояв поруч із нею, поклав утішливе копито їй на плече. «Здається, ти не завжди можеш уникати конфліктів, як тобі б того хотілося».\nВона трохи зсутулилася. «Так... ну що ж. Я не можу зараз відступити, інакше матиму жалюгідний і слабкий вигляд».\nФахд кивнув. «Ти маєш рацію. У будь-якому разі, ходімо. Нам тут небезпечно»."
 abyssinia.86.a:0 "Тоді нам доведеться забрати його силою."
 
 abyssinia.87.t:0 "Відповідь з Муррсії"
 abyssinia.87.d_gomez:0 "Посланець вклонився [ROOT.ABY_king_loc_cap] Ґомезу, який сидів у своєму кабінеті. «Ваша високосте, ми змогли отримати відповідь на наше конфіденційне комюніке до раса Муррсії. Прочитати її вам?»\n«Я цілком здатен читати сам», — відповів Ґомез. «Будь ласка, дайте її мені».\nКіт кивнув, передав лист, знову вклонився і вийшов із кабінету.\nҐомез відкинувся на спинку стільця й почав читати:\n\n«Законному спадкоємцю нявгуса Няуконнена,\nПід владою моєї сім'ї расство Муррсія багато десятиліть було протекторатом Королівства Вінґбардія. За цей час вінґбардійці справді покращили умови на острові, але переважно для власного гарнізону. Хоча спочатку вони повністю поважали моє право на владу, вони думали, що я не помічу поступового руйнування моїх повноважень та повільного і постійного розповзання їхньої бюрократії. Мало того, солдати гарнізону, які були тут, щоб "захищати" острів (захищати від кого, цікаво мені?), чітко прибули, щоб жити тут постійно як колоніальні поселенці. Грифони весь цей час намагалися одягнути на мене нашийник, і вони цілком очікували, що я просто прийму це й підкорюся.\nВони помилялися. Тепер я дам вказівки щодо постачання мені всього необхідного для вигнання гарнізону. Рекомендую покладатися на контрабандистів і цивільне торгове судноплавство...»\n\nҐомез перервав читання, щоб засміятися. Він хвилювався, що рас став зрадником, а той був готовий порушити кожну коли-небудь укладену угоду."
 abyssinia.87.d_catrina:0 "Посланець вклонився нявгіст Кітріні, яка сиділа на своєму троні. «Ваша високосте, ми змогли отримати відповідь на наше конфіденційне комюніке до раса Муррсії. Прочитати її вам?»\n«Так, продовжуй», — відповіла вона.\nКіт кивнув, розгорнув листа й почав читати:\n\n«Законному спадкоємцю нявгуса Фелібели,\nПід владою моєї сім'ї расство Муррсія багато десятиліть було протекторатом Королівства Вінґбардія. За цей час вінґбардійці справді покращили умови на острові, але переважно для власного гарнізону. Хоча спочатку вони повністю поважали моє право на владу, вони думали, що я не помічу поступового руйнування моїх повноважень та повільного і постійного розповзання їхньої бюрократії. Мало того, солдати гарнізону, які були тут, щоб "захищати" острів (захищати від кого, цікаво мені?), чітко прибули, щоб жити тут постійно як колоніальні поселенці. Грифони весь цей час намагалися одягнути на мене нашийник, і вони цілком очікували, що я просто прийму це й підкорюся.\nВони помилялися. Тепер я дам вказівки щодо постачання мені всього необхідного для вигнання гарнізону. Рекомендую покладатися на контрабандистів і цивільне торгове судноплавство...»\n\nКітріна зупинилася, щоб посміхнутися про себе. Частина її вірила, що рас став зрадником, але цим він довів свою нескінченну відданість Абіссинії."
 abyssinia.87.a:0 "Песиміст ніколи не розчаровується."
 
 abyssinia.88.t:0 "Повстання у Муррсії"
 abyssinia.88.d_monarchy:0 "Очільницю гарнізону в Муррсії запросили до особистого особняка правителя острова, тож незабаром вона прибула туди. Проте вона не до кінця довіряла котячому расу і взяла з собою кількох охоронців. Особняк був неподалік від Муррґади, тож якби щось пішло не так, підкріплення прибуло б швидко.\n\nРас тепло привітав грифониху й запропонував їй гарячу вечерю з великою кількістю м'ясних страв. Вона не змогла встояти, хоча про всяк випадок спершу попросила охоронців скуштувати їжу. Після ситної трапези вона нарешті запитала: «Тож, шановний расе, чому ви мене сюди запросили?»\n«О, я просто хотів повідомити вам, що відбудуться деякі зміни».\nВона насупилася. «Які зміни? Їх було санкціоновано?»\n«Звісно, я їх санкціонував, не будьте смішною».\n«Я маю на увазі, центральним урядом».\nКіт кивнув. «Так, так, я маю повну підтримку Абіссинії».\nОчільниця гарнізону почала хвилюватися. «Ви знаєте, який уряд я мала на увазі».\n«І ви знаєте, що я знаю. Я мав на увазі саме те, що сказав».\nВона не була впевнена, як на це відповісти. Дружелюбність раса швидко розвіювалася. «Ви не відповіли мені щодо змін».\n«Ох, справді, перепрошую. Дозвольте мені продемонструвати». Він підвівся і видав гучний ляскаючий звук ротом.\n\nОзброєні коти ринули з усіх дверей та вікон в їдальні. За мить на очільницю гарнізону та її охоронців були націлені з дюжину гвинтівок. «Ц-це зрада! Мої солдати...»\n«Поки ви вечеряли, моя свита встановила контроль над Муррґадою. Тепер усе, що мені потрібно, — це ваша капітуляція».\nВона завагалася і подумала про те, щоб зробити щось необачне, що призвело б до її швидкої смерті."
 abyssinia.88.d_gommie:0 "Очільницю гарнізону в Муррсії запросили до особистого особняка правителя острова, тож незабаром вона прибула туди. Проте вона не до кінця довіряла котячому расу і взяла з собою кількох охоронців. Особняк був неподалік від Муррґади, тож якби щось пішло не так, підкріплення прибуло б швидко.\n\nРас тепло привітав грифониху й запропонував їй гарячу вечерю з великою кількістю м'ясних страв. Вона не змогла встояти, хоча про всяк випадок спершу попросила охоронців скуштувати їжу. Після ситної трапези вона нарешті запитала: «Тож, шановний расе, чому ви мене сюди запросили?»\n«Я хотів обговорити з вами рух опору. Коли ви збираєтеся їх розчавити? Їхні напади стали майже щоденними».\nВона насупилася. «Я роблю все можливе. Центральний уряд надав мені обмежені ресурси, тож я не можу зробити більше».\nКіт кивнув. «Розумію. Що ж, я хотів би попросити вас поставити постійну охорону навколо мого будинку. Минулої ночі я міг би заприсягтися, що чув, як хтось нишпорить навкол...»\n\nОзброєні коти ринули з усіх дверей та вікон в їдальні. За мить на очільницю гарнізону та її охоронців були націлені з дюжину гвинтівок. Рас шоковано вирячився на них. «Повстанці пробралися всередину!»\n«Ви заманили мене в пастку!» — крикнула очільниця грифонів і вказала звинувачувальним пазуром на раса.\n«Він це зробив, але не з власної волі», — пролунав хрипкий і старечий голос. Він належав зебрі, що вийшов із тіні. «Ми хотіли, щоб він злякався і запросив вас сюди. План спрацював краще, ніж я очікував».\n«Ви самогубці», — сказала грифониха. «Мої солдати...»\nЗебра перебив її. «Поки ви вечеряли, мої повстанці встановили контроль над Муррґадою. Тепер усе, що мені потрібно, — це ваша капітуляція».\nВона завагалася і подумала про те, щоб зробити щось необачне, що призвело б до її швидкої смерті."
 abyssinia.88.a:0 "«...Я здаюся»."
 
 abyssinia.89.t:0 "Абіссинія пропонує викупити Муррсію"
 abyssinia.89.d:0 "Абіссинські дипломати зробили нам пропозицію: вони хочуть викупити острів Муррсія і готові заплатити за нього чималу суму. Вони передали острів Вінґбардії майже століття тому в обмін на допомогу в розвитку та промислові інвестиції. Проте після захоплення Кітрена відносини погіршилися, і відтоді Абіссинія бажає повернути острів, вважаючи старий договір з Вінґбардією недійсним.\n\nХоча острів є корисною військово-морською базою поблизу узбережжя Зебрики, в іншому він досить нічим не примітний і бідний. Ймовірно, ми могли б отримати більше вигоди від його продажу, ніж від його утримання. Якщо ми відмовимося, можливо, абіссинці будуть незадоволені і оберуть більш... недипломатичний шлях, щоб повернути острів."
 abyssinia.89.a:0 "По руках!"
 abyssinia.89.b:0 "Острів не продається."
 
 abyssinia.90.t:0 "[From.GetNameDefCap] продає Муррсію"
 abyssinia.90.d_gomez:0 "Гумберт поклав стос паперів на робочий стіл Ґомеза. «Ось, Ваша Величносте. Повний договір, ратифікований і підписаний [From.GetLeader]. Він офіційно передає контроль і право власності на Муррсію назад до [ABY.GetNameDef]. Натомість я надав їм казначейський ордер на оплату».\nҐомез узяв папери й переглянув їх, киваючи. «Знову чудова робота, Темесгене. Ви не перестаєте мене вражати».\n«Довелося трохи поторгуватися, але зрештою мені вдалося їх переконати». Він на мить замовк, а потім продовжив: «Однак рас острова, з якоїсь причини, здається, образився. Він не брав участі в переговорах і тепер відчуває, що його обміняли, як раба на продаж».\n«Боюся, йому доведеться з цим змиритися», — з деяким роздратуванням відповів Ґомез. «Я надішлю наказ [Root.ABY_royal_loc_cap]ій гвардії та [Root.ABY_royal_loc_cap]ому флоту відправити на острів гарнізон»."
 abyssinia.90.d_gomez_absent:0 "Гумберт поклав стос паперів на робочий стіл Мортіції. «Ось, будь ласка. Повний договір, ратифікований і підписаний [From.GetLeader]. Він офіційно передає контроль і право власності на Муррсію назад до [ABY.GetNameDef]. Натомість я надав їм казначейський ордер на оплату».\nМортіція обережно взяла папери й уважно вивчила текст, тепло всміхаючись. «Здається, ми отримали те, що хотіли. Гарна робота, Гумберте».\n«Довелося трохи поторгуватися, але зрештою мені вдалося їх переконати». Він на мить замовк, а потім продовжив: «Однак рас острова, з якоїсь причини, здається, образився. Він не брав участі в переговорах і тепер відчуває, що його обміняли, як раба на продаж».\nВона насупилася. «Як... дріб'язково з його боку. Сподіваюся, він прийде до тями. Він має бути вдячний, що нам вдалося звільнити його острів без жодної краплі крові»."
 abyssinia.90.d_gommie:0 "Шарп Спір знову стояла за трибуною перед присутніми представниками парламенту. «...І саме тому, шановні представники, ви повинні проголосувати за затвердження та ратифікацію цієї покупки». Закінчивши свою тридцятихвилинну промову, вона обхопила копитом склянку з водою і надпила з неї.\n«Дякую, пані Спір», — сказав спікер парламенту, а потім звернувся до залу. «Чи є якісь запитання чи заперечення?»\nКіт у циліндрі підвівся. «У мене є запитання, якщо дозволите. Пані Спір, ця покупка не лише вичерпає весь державний бюджет, виділений на "непередбачені витрати", а й призведе до дефіциту. Чи вимагатиме це від нас взяти кредит для фінансування покупки та збільшити доходи бюджету на наступний рік?»\nСпір, здавалося, пошкодувала, що випила всю склянку. «Міністр фінансів подбає про це, не хвилюйтеся. Уряд уникатиме підвищення податків наступного року, якщо вас це турбує».\nІнший кіт, цього разу в окулярах, також підвівся. «Пані Спір, якщо Расство Муррсія має бути скасоване після цієї покупки, що станеться з расом? Ви жодним словом не згадали про нього під час своєї промови. Чи йому просто дозволять залишитися громадянином?»\nПубліка зневажливо зашипіла, давши Спір кілька секунд на підготовку відповіді. «Він не вчинив жодного злочину, а рабство на острові було оголошено поза законом... Не думаю, що у нас є законні підстави для його судового переслідування, хіба що ви хочете звинуватити його в зраді чи колабораціонізмі».\nЗал парламенту вибухнув суперечками та криками. «Порядок!» — вигукнув спікер парламенту. «По одному, будь ласка. Якщо у вас немає більше питань чи заперечень, ми можемо перейти до голосування».\nЗдавалося, це заспокоїло представників, і Спір тихо пробурмотіла собі під ніс: «Хвала богам»."
 abyssinia.90.a:0 "Час святкувати!"
 
 abyssinia.91.t:0 "[From.GetNameDefCap] відмовляється продавати Муррсію"
 abyssinia.91.d_gomez:0 "«Ви запропонували їм СТІЛЬКИ, і вони все одно відмовилися?!» — вигукнув Ґомез із сумішшю розчарування та недовіри.\nГумберт похмуро кивнув. «На жаль, вони все одно не були зацікавлені у продажі острова».\nҐомез потер скроні лапами. «Ясно... не можу сказати, що я здивований чи розчарований». Він скинув напругу, важко зітхнувши. «Гадаю, час для плану Б».\n«...Ми надсилаємо повідомлення расу Муррсії і сподіваємося, що він захоче організувати збройне повстання?» — запитав Гумберт тоном, який натякав, що це погана ідея.\n«Так. У нас немає інших варіантів повернути острів. Чи ви б воліли, щоб ми оголосили війну і спробували висадити туди морський десант?»\nРудий кіт похитав головою. «Ви, як завжди, маєте рацію, Ваша Величносте...»"
 abyssinia.91.d_gomez_absent:0 "«ЩО?! НАСКІЛЬКИ Ж ВОНИ ДУРНІ?!» — голосно вигукнула Мортіція.\nГумберт, здавалося, не зніяковів і лише кивнув. «На жаль, вони все одно не були зацікавлені у продажі острова».\nМортіція вдарила кулаком по робочому столу. «Ми пропонували не лише мирне, дипломатичне рішення, а й купу нашого важко заробленого багатства! Здається, вони взагалі нас не поважають!»\n«Заспокойтеся, будь ласка», — попросив Гумберт. «Хіба у [ROOT.ABY_king_loc_cap] Ґомеза не було плану Б?»\nМортіція різко вдихнула, а потім повільно видихнула. «Так, точно. Ми надсилаємо повідомлення расу Муррсії і сподіваємося, що він захоче організувати збройне повстання. Здається, це єдиний варіант, який у нас є. Ми ж не можемо просто оголосити їм війну і розпочати самогубне морське вторгнення на острів».\n«Справді», — відповів Гумберт з певним ваганням."
 abyssinia.91.d_gommie:0 "«Отже, що ти думаєш?» — запитала Шарп Спір.\nМеркуріоз Зоба, сивий зебра-альвані зі шрамами, кивнув. «Я вірю, що твій план може досягти успіху, якщо на те буде воля Божа. Проте він покладається на те, що окупанти не надішлють на острів підкріплення».\n«Сумніваюся, що вони це зроблять. Муррсія не така вже й важлива чи цінна».\n«Ніколи не можна знати напевно. Пацюк може битися з великою люттю навіть за крихту хліба».\nКобила насупилася в роздумах. «Згідно з моїми розвідданими, у тебе не буде нестачі в котячій силі. Місцевих має бути легко завербувати. Тож якщо вони сильніше придушуватимуть осередок опору, вам просто знадобиться більше зброї. З рештою, я впевнена, ти впораєшся».\n«Відсутність рабства на острові та його переважно однорідне котяче населення може означати, що вербування буде не таким легким, як у часи слави нашого великого повстання».\n«Так, ми не можемо згуртувати їх так само, як на материку. Спробуй підійти з іншого боку. Поширюй антигрифонську та антиімперіалістичну пропаганду. Апелюй до їхнього патріотизму».\nМеркуріоз не зміг стримати сміх. «Ти говориш як воїн Патріотичного фронту! Що з тобою сталося, маленька кобилко?»\nСпір усміхнулася. «Гадаю, вони мають на мене поганий вплив»."
 abyssinia.91.a:0 "Зв'язатися з расом Муррсії."
 abyssinia.91.b:0 "Зв'язатися з Муррсійськими повстанцями."
 
 abyssinia.92.t:0 "Поразка в Мейндалусійській війні"
 abyssinia.92.d:0 "Попри доблесні зусилля наших солдатів і найкращі плани наших командирів, мерзенні коти з [ABY.GetNameDef] розбили наші сили в Мейндалусії. Тривала подоба організованого відступу, поки ми не отримали від них пропозицію: [ABY.GetNameDef] готові укласти мирний договір, оскільки тепер їхні цілі в Мейндалусії реалізовані. Хоча прихильники жорсткої лінії із задоволенням продовжили б цю війну, підтримка населення слабшає, і зараз у нас мало прийнятних варіантів."
 abyssinia.92.a:0 "Важка угода, але ми мусимо погодитися."
 
 abyssinia.93.t:0 "Перемога в Мейндалусійській війні"
 abyssinia.93.d_gomez:0 "З передової надійшла термінова телеграма. Мортіція деякий час порожнім поглядом дивилася на неї, перш ніж справді прочитати, цікавлячись, хороші чи погані новини вона містить. Вона глибоко вдихнула і почала читати:\n\n«ШТАБ АБІССІНСЬКОЇ АРМІЇ\nКОЛЬТОБА\n\nОБОРОННІ ПОЗИЦІЇ ВОРОГА ЗМ’ЯТІ -(КРАПКА)-\nНАСТУП УСПІШНИЙ ПОПРИ ВТРАТИ -(КРАПКА)-\nВОРОЖИЙ УРЯД ЗАПРОСИВ ПРИПИНЕННЯ ВОГНЮ -(КРАПКА)-\nГОТОВІ ПОСТУПИТИСЯ ТЕРИТОРІЄЮ МАНЕДАЛУЗІЇ -(КРАПКА)-\nВІЙСЬКОВІ ДІЇ ПРИЗУПИНЕНО -(КРАПКА)-\nПЕРЕГОВОРИ РОЗПОЧАЛИСЯ-\n\nГОМЕС МАУКОННЕН»\n\nПовідомлення явно було написано секретарем чи іншим слугою, а не самим Ґомезом, але вона все одно відчула полегшення від цих новин. Хоча Ґомез командував армією з безпечного тилу, він усе одно завжди ризикував під час візитів на передову. Знання того, що він у безпеці, зробило її набагато щасливішою, ніж новина про військову перемогу."
 abyssinia.93.d_catrina:0 "З передової надійшла термінова телеграма. Реп деякий час порожнім поглядом дивився на неї, перш ніж справді прочитати, цікавлячись, хороші чи погані новини вона містить. Він глибоко вдихнув і почав читати:\n\n«ШТАБ АБІССІНСЬКОЇ АРМІЇ\nКОЛЬТОБА\n\nОБОРОННІ ПОЗИЦІЇ ВОРОГА ЗМ’ЯТІ -(КРАПКА)-\nНАСТУП УСПІШНИЙ ПОПРИ ВТРАТИ -(КРАПКА)-\nВОРОЖИЙ УРЯД ЗАПРОСИВ ПРИПИНЕННЯ ВОГНЮ -(КРАПКА)-\nГОТОВІ ПОСТУПИТИСЯ ТЕРИТОРІЄЮ МАНЕДАЛУЗІЇ -(КРАПКА)-\nВІЙСЬКОВІ ДІЇ ПРИЗУПИНЕНО -(КРАПКА)-\nПЕРЕГОВОРИ РОЗПОЧАЛИСЯ-\n\nКАТРІНА ТАББІ»\n\nПовідомлення явно було написано секретарем чи іншим слугою, а не самою Кітріною, але він все одно відчув полегшення від цих новин. Хоча Кітріна командувала армією з безпечного тилу, вона все одно завжди ризикувала під час візитів на передову. Знання того, що вона в безпеці, зробило його набагато щасливішим, ніж новина про військову перемогу."
 abyssinia.93.a:0 "Війна, що почалася у 988 році, тепер закінчилася."
 
 abyssinia.94.t:0 "Перемога в Мейндалусійській війні"
 abyssinia.94.d:0 "Коти з [ABY.GetNameDef] вважали себе кращими за нас, намагаючись захопити Мейндалусію для себе! Проте їх викинули, як і минулого разу, коли вони намагалися це зробити, а майстерність наших солдатів і командирів була доведена та підкріплена. Хоча деякі маніакально налаштовані особи із задоволенням би продовжили переслідування відступаючих абіссинців, [Root.GetAdjective] керівництво дійшло згоди: буде підписано угоду про припинення вогню, військовополонених повернуть, і на них буде накладено легку контрибуцію."
 abyssinia.94.a:0 "Хіба колись були сумніви?"
 
 abyssinia.95.t:0 "Поразка в Мейндалусійській війні"
 abyssinia.95.d_gomez:0 "З передової надійшла термінова телеграма. Мортіція деякий час порожнім поглядом дивилася на неї, перш ніж справді прочитати, цікавлячись, хороші чи погані новини вона містить. Вона глибоко вдихнула і почала читати:\n\n«ШТАБ АБІССІНСЬКОЇ АРМІЇ\nКОЛЬТОБА\n\nОБОРОННІ ПОЗИЦІЇ ЗМ’ЯТІ -(КРАПКА)-\nНАСТУП ПРОВАЛИВСЯ ТА ПРИЗВІВ ДО ВТРАТ -(КРАПКА)-\nВОРОЖИЙ КОНТРНАСТУП НЕМОЖЛИВО ЗУПИНИТИ -(КРАПКА)-\nВОРОГ ВИМАГАЄ ПЕРЕДАЧІ МАНЕДАЛУЗІЇ -(КРАПКА)-\nВІЙСЬКОВІ ДІЇ ПРИЗУПИНЕНО -(КРАПКА)-\nПЕРЕГОВОРИ РОЗПОЧАЛИСЯ-\n\nГОМЕС МАУКОННЕН»\n\nПовідомлення явно було написано секретарем чи іншим слугою, а не самим Ґомезом, але вона все одно відчула полегшення від цих новин. Хоча Ґомез командував армією з безпечного тилу, він усе одно завжди ризикував під час візитів на передову. Знання того, що він у безпеці, зробило її щасливою, навіть якщо саму війну було програно."
 abyssinia.95.d_catrina:0 "З передової надійшла термінова телеграма. Реп деякий час порожнім поглядом дивився на неї, перш ніж справді прочитати, цікавлячись, хороші чи погані новини вона містить. Він глибоко вдихнув і почав читати:\n\n«ШТАБ АБІССІНСЬКОЇ АРМІЇ\nКОЛЬТОБА\n\nОБОРОННІ ПОЗИЦІЇ ЗМ’ЯТІ -(КРАПКА)-\nНАСТУП ПРОВАЛИВСЯ ТА ПРИЗВІВ ДО ВТРАТ -(КРАПКА)-\nВОРОЖИЙ КОНТРНАСТУП НЕМОЖЛИВО ЗУПИНИТИ -(КРАПКА)-\nВОРОГ ВИМАГАЄ ПЕРЕДАЧІ МАНЕДАЛУЗІЇ -(КРАПКА)-\nВІЙСЬКОВІ ДІЇ ПРИЗУПИНЕНО -(КРАПКА)-\nПЕРЕГОВОРИ РОЗПОЧАЛИСЯ-\n\nКАТРІНА ТАББІ»\n\nПовідомлення явно було написано секретарем чи іншим слугою, а не самою Кітріною, але він все одно відчув полегшення від цих новин. Хоча Кітріна командувала армією з безпечного тилу, вона все одно завжди ризикувала під час візитів на передову. Знання того, що вона в безпеці, зробило його щасливим, навіть якщо саму війну було програно."
 abyssinia.95.a:0 "Війна, що почалася у 988 році, тепер закінчилася."
 
 abyssinia.96.t:0 "Абіссинія відмовляється від Мейндалусії"
 abyssinia.96.d:0 "Мейндалусія останнім часом була розколотим регіоном, розділеним між [Root.GetAdjective] та [ABY.GetAdjective]. Незважаючи на це, напруження було мінімальним, і здавалося, що в найближчому майбутньому проблем не виникне. Проте сьогодні ми отримали пропозицію від [ABY.GetNameDef], які пропонують мирно передати нам свої володіння в Мейндалусії, навіть відмовляючись від будь-яких претензій на цю територію. Їхні аргументи щодо цього кроку були дещо скупими і здебільшого зводилися до складнощів управління проблемними землями. Не вбачаючи в цьому явної підступності, [Root.GetAdjective] уряд не гаятиме часу на те, щоб прийняти цю пропозицію."
 abyssinia.96.a:0 "Ніяких скарг щодо цього."
 
 abyssinia.97.t:0 "Вирішення мейндалусійського конфлікту?"
 abyssinia.97.d:0 "Сьогодні з [From.Capital.GetName] надійшла цікава пропозиція: [ABY.GetNameDef] вважає, що створення незалежної держави в регіоні Мейндалусія відповідало б нашим найкращим спільним інтересам. Будь-які претензії на нього будуть відкликані, а його незалежність буде підтримуватися спільним словом і силою. Більше того, умови угоди включають підписання пакту про ненапад — за крок до оголошення повноцінного союзу, але немає сумнівів, що такі відносини покладуть край будь-яким стороннім іноземним махінаціям. Як ми маємо відповісти [From.GetLeader]?"
 abyssinia.97.a:0 "Хай буде так."
 abyssinia.97.b:0 "Мейндалусія буде нашою!"
 
 abyssinia.98.t:0 "Мирна пропозиція прийнята"
 abyssinia.98.d_not_gommie_bingus_not_deposed:0 "«Ви пішли і віддали МОЮ ЗЕМЛЮ задарма?!» — вигукнув Баша Бінгус. «Незважаючи на мою абсолютно чітку незгоду з цим актом?»\nФітаврарі Гумберт знизав плечима. «Я лише виконував накази».\n«Це все була ідея Дежена, чи не так?» — пробурмотів Бінгус. «Я думав, ви йому не довіряєте».\n«Так і є, але мене не особливо хвилює Мейндалусія».\n«А МЕНЕ ХВИЛЮЄ! ЦЕ БУВ МІЙ ФЕОД! І тепер ці в'ючні тварини заправляють там усім».\n«Як на мене, це невелика ціна за відновлення відносин з Мейргиптом».\n«Ви навмисно ігноруєте МОЮ точку зору? Зі мною вчинили несправедливо!»\nУперше Гумберт насупився від обурення Бінгуса. «Аж ніяк. Я просто вважаю, що заради вищого блага Абіссинії воно того варте. Вам слід перестати думати лише про себе. Багато дворян так роблять, і саме тому звичайні коти нас ненавидять. Крім того, це краще, ніж просто битися за територію задарма. Принаймні, ми отримали гарантії безпеки».\n«Лише чорнило на папері», — пробурмотів Бінгус. «Ми не можемо довіряти цим чотириногим травоїдам. Не кажіть, що я вас не попереджав, шановний міністре закордонних справ». Відтепер безземельний Баша підвівся, сердито глянув на Гумберта й вийшов із кімнати."
 abyssinia.98.d_not_gommie_bingus_deposed:0 "Фітаврарі Гумберт дивився на кошик із фруктами на столі. «...Кошик фруктів?» — запитав він, хоча всім було очевидно, що це саме він.\n«Це подарунок від нас, мейндалусійців, вашому монарху», — пояснив літній жеребець-поні. «На знак нашої вдячності за те, що ви дарували нам свободу і забезпечили мир між котами та поні».\nГумберт відвів погляд від кошика на поні. «Коти не їдять фруктів», — констатував він, хоча всім було очевидно, що коти не їдять фруктів.\n«Вони не справжні», — поспішно пояснила молода кобила. «Якщо ви придивитеся, це насправді вироби ручної роботи, зроблені так, щоб виглядати якомога реалістичніше. Це означає, що вони не зіпсуються, а зберігатимуться вічно. Кошик із фруктами — це шанований символічний подарунок у нашій культурі».\nГумберт скептично кивнув. «Можливо, це доречний подарунок від поні для поні. Але, відверто кажучи, я не впевнений, що він підходить як подарунок для котів».\nСтарий жеребець насупився. «Було б надзвичайно образливо відхилити цей дар. Будь ласка, передайте це вашому сюзерену. Це все, про що ми просимо».\nГумберт зробив усе можливе, щоб зберегти спокій. «Дуже добре. Гадаю, від імені мого правителя я приймаю ваш подарунок. Сподіваюся, мир між абіссинцями, мейндалусійцями та марегіптянами триватиме».\n«Ми теж на це сподіваємося», — відповіла кобила з усмішкою."
 abyssinia.98.d_gommie:0 "«Патріот хотів би повідомити вам, що він не задоволений таким поворотом подій», — пояснив кіт у мантії, сидячи на стільці.\nСпір зібралася із силами, вдихнувши це солодке, запилюжене повітря кімнати для нарад. «Я хотіла б почути від Патріота, що не так».\n«Він вважає, що Мейндалусія є невід'ємною частиною Абіссинії, і що віддавати її ось так — це прояв слабкості».\nВона примружила очі. «Коли я востаннє перевіряла, 90% населення Мейндалусії складали поні, а 5% — коні. Місце з 5% котячого населення є невід'ємною частиною Абіссинії?»\n«Ну так, звісно. Справа не в расі. Абіссинія традиційно добре ставилася до мейндалусійських поні. Як до рівноправних громадян».\nВона швидко огризнулася: «Тоді чому в Кольтобі було введено рабство після Мейндалусійської війни з Мейргиптом?»\n«Це була дія місцевого дворянина, Баші Бінгуса. Помилка, безумовно».\nВитративши сили, вона знову вдихнула. «Гаразд. Гаразд. Хай там як. Що стосується другої частини, то немає нічого слабкого в тому, щоб убезпечити наш східний кордон і гарантувати мир із сусідами».\n«Думаю, Патріот із цим не погодиться», — відповів кіт. «Ми повинні були торгуватися, вимагати поступок».\n«Замість того, щоб ставитися до них з повагою і намагатися укласти справедливий договір?» Вона зневажливо пирхнула. «Схоже, так званий Патріот просто хоче ще однієї Мейндалусійської війни».\n«Він не боїться бою, як деякі».\nКобила зціпила зуби. «Цю зустріч завершено. Передайте Патріоту, що його критику почули»."
 abyssinia.98.a:0 "Тривалий мир цінніший за Мейндалусію."
 
 abyssinia.99.t:0 "Мирна пропозиція відхилена"
 abyssinia.99.d_gomez:0 "«Що? Як це сталося?» — недовірливо запитав Ґомез. «Ви ж казали, що вони гарантовано приймуть пропозицію?»\nГумберт лише знизав плечима. «Я думав, що вони будуть розсудливими та розумними. Мабуть, я помилявся».\n«Чому вони взагалі так вчинили? Це був цілком розумний компроміс, реалістичний шлях до тривалого миру між нашими націями».\n«Я не можу пояснити їхні думки, оскільки не вмію читати думки», — відповів Гумберт.\nҐомез опустився на свій трон і помітно знітився. «Що ж, ось і провалилася ця ідея. Цікаво, як Дежен відреагує на ці новини».\nГумберт промовчав.\n«...Гадаю, тоді повертаємося до креслярської дошки. У нас же були інші ідеї. Як щодо того, щоб ти допоміг мені вирішити, Темесгене?»\n«Завжди радий допомогти», — сказав Гумберт найменш радісним голосом, на який був здатний."
 abyssinia.99.d_gomez_absent:0 "Мортіція з недовірою дивилася на Гумберта. «Це був жарт, так?»\n«Я не славлюся почуттям гумору, мем», — відповів він.\n«То вони просто абсолютно і непроглядно дурні?!» — прошипіла Мортіція. «Хіба вони не розуміють компромісу? Як можна бути такими впертими! Ми могли б раз і назавжди вирішити мейндалусійське питання, і ось як вони відповідають!»\n«Високий кров'яний тиск шкідливий для вашого здоров'я», — порадив Гумберт.\n«У мене все гаразд із тиском», — огризнулася Мортіція. «Мене більше турбує психічне здоров'я [MGY.GetLeader]. Очевидно, у них щось не так з головою».\nГумберт злегка скривився. «Я забуду, що ви це сказали».\nМортіція роздратовано видихнула. «Вибачте. Давайте просто рухатися далі. Нагадайте, які ще ідеї мав Дежен щодо Мейндалусії?»\nДиплокіт зібрався з силами, щоб говорити про Міністра Пера в нейтральному тоні."
 abyssinia.99.d_gommie:0 "Шарп Спір простогнала і потерла скроні копитами. «Песиміст ніколи не розчаровується... Мені слід було очікувати, що вони не приймуть пропозицію».\nФахд Аль-Касаар зі стурбованістю подивився на неї, сидячи поруч у кімнаті відпочинку. «Мені варто... піти принести нам щось випити».\n«Так... напевно. Мені як завжди». Коли жеребець підвівся зі стільця, кобила перервала його. «Але перш ніж ти підеш... як ти думаєш, що мені робити далі?»\n«...З усією цією історією з Мейндалусією?»\nВона кивнула.\n«Я не знаю, чому ти вважаєш мене експертом із зовнішньої політики... і я думаю, що нам справді варто спочатку випити, щоб прояснити думки, знаєш?»\n«Я не мислю тверезо, коли п'яна від медового вина», — сказала вона. «Просто... у мене є два варіанти. АПФ вже дихає мені в потилицю і вимагає, щоб я розпочала війну через цю нісенітницю. Друга Мейндалусійська війна, по суті, відтворення моєї травми. Другий варіант, який я маю на увазі, — просто відмовитися від Мейндалусії і взагалі не перейматися цим».\nФахд нерішуче підняв брову. «Хіба це не... засмутить багатьох?»\n«Так. Я засмучу або наших сусідів, або наших політиків. Втім, не думаю, що пересічного громадянина хвилює земельна суперечка».\nВін задумливо кивнув. «Гм. Напевно, найкраще уникнути кровопролиття, але насправді, думаю, ти повинна вирішити це сама. Роби те, що вважаєш найкращим для всіх».\nУ відповідь вона зітхнула."
 abyssinia.99.a:0 "Якщо вони не хочуть миру, то отримають війну."
 abyssinia.99.b:0 "Якщо вони так сильно хочуть Мейндалусію, нехай забирають."
 
 abyssinia.100.t:0 "1000-та річниця анексії Мейндалусії"
 abyssinia.100.d_oes_not_own_manedalusia:0 "Ця дата відзначає тисячолітню річницю анексії Мейндалусії нявгіст Паукуно, яка, згідно з історичними записами, відбулася у 12 році АЛБ. Регіон був захоплений після дворічної війни зі значно ослабленим фараоном Мейргипту і залишався провінцією Абіссинії до 672 року АЛБ, коли Сідлова-Арабія перетворила Абіссинію на державу-данину і звільнила Мейндалусію як автономного суб'єкта. У 988 році, коли Мейргипет проголосив незалежність від Сідлової-Арабії, Мейндалусія опинилася в ізоляції, що дозволило абіссинським силам увійти, щоб повернути регіон. Однак марегіптяни оскаржили котячі претензії і ввели свої війська в цей район, спровокувавши короткий, але кривавий конфлікт, який залишив Мейндалусію розділеною після припинення вогню.\n\nВідтоді значна частина Мейндалусії залишається під іноземною окупацією. Тим не менш, центральний уряд вирішив провести національне свято з нагоди цієї історичної події. Це мало хоча б нагадати громадянам про колишню міць Абіссинії та про історичну єдність між абіссинським і мейндалусійським народами. Коти і поні були цілком здатні жити разом у гармонії та мирі, незважаючи на протилежні твердження. Кілька проабіссинських мейндалусійських вигнанців виступили з палкими публічними промовами, також відбулися покази традиційної мейндалусійської культури. Хоча захід був тепло сприйнятий всередині країни, з-за кордону пролунала критика, що він є святкуванням реваншизму та імперіалізму."
 abyssinia.100.d_owns_manedalusia:0 "Ця дата відзначає тисячолітню річницю анексії Мейндалусії нявгіст Паукуно, яка, згідно з історичними записами, відбулася у 12 році АЛБ. Регіон був захоплений після дворічної війни зі значно ослабленим фараоном Мейргипту і залишався провінцією Абіссинії до 672 року АЛБ, коли Сідлова-Арабія перетворила Абіссинію на державу-данину і звільнила Мейндалусію як автономного суб'єкта. У 988 році, коли Мейргипет проголосив незалежність від Сідлової-Арабії, Мейндалусія опинилася в ізоляції, що дозволило абіссинським силам увійти, щоб повернути регіон. Однак марегіптяни оскаржили котячі претензії і ввели свої війська в цей район, спровокувавши короткий, але кривавий конфлікт, який залишив Мейндалусію розділеною після припинення вогню.\n\nВідтоді всю Мейндалусію було звільнено від іноземної окупації. Тому центральний уряд вирішив провести велике національне свято на честь цієї історичної події. Це нагадало громадянам про історичну єдність між абіссинським і мейндалусійським народами. Коти і поні були цілком здатні жити разом у гармонії та мирі, незважаючи на протилежні твердження. [Root.GetLeader] особисто відвідав Кольтобу і виступив з публічною промовою, побажавши Мейндалусії тривалого миру. Після цього відбувся великий парад за державної підтримки, на якому були присутні обидві раси. Заходи безпеки були суворими, щоб запобігти зриву заходу через можливі теракти. Хоча свято було тепло сприйнято всередині країни, з-за кордону надійшла критика щодо того, що воно прославляє імперіалізм."
 abyssinia.100.d_allied_manedalusia:0 "Ця дата відзначає тисячолітню річницю анексії Мейндалусії нявгіст Паукуно, яка, згідно з історичними записами, відбулася у 12 році АЛБ. Регіон був захоплений після дворічної війни зі значно ослабленим фараоном Мейргипту і залишався провінцією Абіссинії до 672 року АЛБ, коли Сідлова-Арабія перетворила Абіссинію на державу-данину і звільнила Мейндалусію як автономного суб'єкта. У 988 році, коли Мейргипет проголосив незалежність від Сідлової-Арабії, Мейндалусія опинилася в ізоляції, що дозволило абіссинським силам увійти, щоб повернути регіон. Однак марегіптяни оскаржили котячі претензії і ввели свої війська в цей район, спровокувавши короткий, але кривавий конфлікт, який залишив Мейндалусію розділеною після припинення вогню.\n\nВідтоді відносини між Абіссинією та Мейргиптом змінилися, і тепер Мейндалусія існує як власна національна держава, дружня до Абіссинії. Це змінило характер пам'ятного заходу на той, що присвячений примиренню та дружбі. В Абіссинії відбулося національне свято, яке популяризувало та відзначало мейндалусійську культуру, нагадуючи громадянам, що коти та поні цілком здатні жити разом у гармонії та мирі, незважаючи на протилежні твердження. Високопосадовці з Мейндалусії прибули для участі у заході та виголосили кілька промов, проголошуючи початок нової ери миру та процвітання. Після цього відбувся великий парад за державної підтримки, який відвідали представники обох рас."
 abyssinia.100.a:0 "Ми повернемося."
 abyssinia.100.b:0 "Ще на тисячу років!"
 abyssinia.100.c:0 "Нехай наша дружба триватиме тисячоліття!"
 
 abyssinia.101.t:0 "Контрабандисти з Клуджтауна"
 abyssinia.101.d:0 "Двоє офіцерів служби безпеки стояли перед «Клубом Божевільних Котів» у Діре-Пава, спостерігаючи, як їхні підлеглі виносять на вулицю ящик за ящиком нелегальних товарів.\n«Тут має бути щонайменше кілька тонн цього добра», — зауважила офіцерка.\n«Як мінімум», — відповів її колега. «Я завжди знав, що це місце — наркокубло, але вони мені не вірили. Проте, заради Бааст, я мав рацію».\n«Не будь занадто самовпевненим», — відповіла вона з усмішкою. «Знадобилося багато роботи багатьох котів, щоб зібрати достатньо доказів для облави на це місце».\n«Знаю. Але я все одно можу приписати собі цю ідею».\nВона закотила очі. «У будь-якому разі, це лише одна миша в мишоловці. Їх там набагато більше».\n«Іііі саме тому наступним кроком буде відстеження джерела цих товарів», — впевнено сказав він. «За моїми власними розслідуваннями, усі вони надходять із Клуджтауна».\n«З цього кубла покидьків і лиходіїв? Ого, я б ніколи не здогадалася. Гарна робота, детективе», — сказала вона з дедалі ширшою усмішкою.\n«Ой, помовч, ти сама казала, що нам потрібні конкретні докази, перш ніж ми зможемо щось зробити. І я думаю, що маю достатньо, щоб подати петицію центральному уряду про закриття кордону з тим місцем. Ми повинні заткнути цю щурячу нору!»\n«І ти думаєш, вони прислухаються?»\nЙого впевненість ледь похитнулася. «Н-ну, якщо ні, то ми точно не залишимося без роботи, це напевно»."
 abyssinia.101.a:0 "Посилити прикордонний контроль."
 abyssinia.101.b:0 "Ігнорувати ситуацію."
 
 abyssinia.102.t:0 "Абіссинія бажає вести переговори щодо Клуджтауна"
 abyssinia.102.d:0 "Злет і падіння Короля Шторма залишили по собі досить еклектичний безлад на континенті, в результаті чого з попелу постало багато незалежних держав. Однією з них є місто-держава Клуджтаун, що раніше було абіссинським торговим форпостом в оазисі, а тепер стало злачним поселенням, де в рівних кількостях торгують пороком і зброєю. Ми вирішили гарантувати їхню незалежність, щоб убезпечити наш південний кордон, оскільки наші відносини з Абіссинією були досить поганими ще з часів Мейндалусії.\n\nОднак у [ABY.GetNameDef] інші ідеї. Вони вважають Клуджтаун частиною своєї нації і вимагають від нас припинити визнавати і підтримувати уряд міста. Відмова може призвести до конфлікту з Абіссинією, але, можливо, ми спробуємо вести подальші переговори і домогтися гарантій, що вони не застосують військову силу проти Клуджтауна негайно?"
 abyssinia.102.a:0 "Ми відкличемо нашу підтримку."
 abyssinia.102.b:0 "Ми зробимо це, лише якщо вони пообіцяють не нападати на них."
 abyssinia.102.c:0 "Нічого не зміниться."
 
 abyssinia.103.t:0 "Мейргипет припиняє підтримку Клуджтауна"
 abyssinia.103.d_gomez:0 "«Повідомлення від вашого міністра закордонних справ, Гумберта Темесгена, ваша величносте!» — офіційним тоном проголосив посланець.\nҐомез і Мортіція перезирнулися через обідній стіл. Потім [ABY.ABY_queen_loc_nocap] видавила ввічливу усмішку, хоча її гострі ікла були оголені. «Хіба ви не бачите, що ми тут зайняті?!»\n«Прошу вибачення, ваші величності, але це повідомлення було позначено як термінове».\nМортіція насупилася, але Ґомез жестом попросив її заспокоїтися. «Тіш, усе гаразд. Лише коротка перерва, не більше». Потім він повернувся до посланця. «Ну, і що ж там такого важливого?»\n«Глава уряду Мейргипту, [MGY.GetLeader], прийняв наше прохання припинити втручання у внутрішні справи Абіссинії та відкликав свою підтримку Клуджтауна».\nМортіція підняла брову. «Хм, не очікувала, що вони так легко відступлять. Можливо, вони хочуть покращити з нами відносини?»\nҐомез знизав плечима. «Хоч би якою була причина, це означає, що ми нарешті можемо повернути Клуджтаун. Це кримінальне нетрівне містечко вже досить довго було більмом на оці нашої династії»."
 abyssinia.103.d_gomez_absent:0 "«Повідомлення від міністра закордонних справ, Гумберта Темесгена, ваша величносте!» — офіційним тоном проголосив посланець.\nМортіція, яка сиділа за обіднім столом посеред трапези, сердито глянула на нього. Потім вона видавила ввічливу усмішку, хоча її гострі ікла були оголені. «Хіба ви не бачите, що я тут зайнята?»\n«Прошу вибачення, ваша величносте, але це повідомлення було позначено як термінове».\nМортіція насупилася. «Термінове не означає, що ви не можете постукати у двері».\nОфіційність посланця почала хитатися. «Я... е-е, мої найглибші і найщиріші вибачення, ваша величносте».\nВираз обличчя [ABY.ABY_queen_loc_nocap] пом'якшав. «Усі вибачення прийняті. Так що там за повідомлення?»\nПосланець опанував себе. «Глава уряду Мейргипту, [MGY.GetLeader], прийняв наше прохання припинити втручання у внутрішні справи Абіссинії та відкликав свою підтримку Клуджтауна».\nМортіція підняла брову. «Хм, не очікувала, що вони так легко відступлять. Можливо, вони хочуть покращити з нами відносини? Дякую, що доставили це повідомлення, і сподіваюся, що ви сьогодні засвоїли цінний урок манер. Ви вільні».\nПосланець відсалютував їй і вийшов з їдальні."
 abyssinia.103.d_gommie:0 "Поки марегіпетська поні-емісар говорила, вона, здавалося, намагалася ігнорувати той факт, що Шарп Спір дивилася на неї якось дивно. «...Отже, [MGY.GetLeader] мудро вирішив прийняти ваше прохання припинити втручання в наші внутрішні справи і відкликав підтримку Клуджтауна».\nСпір кліпнула. «Так, так. Це добре. Навіть чудово. Те, на що я сподівалася».\nМейргипетянка здавалася стурбованою. «Міс, якщо дозволите запитати, чи все гаразд? Ви поводитеся дивно, якщо чесно».\nВона незручно посовалася на стільці. «Я? Е-е, ні, я в порядку. Я просто давно не бачила нікого з дому...»\nЕмісар кивнула. «Розумію. Ви з Мейргипту, правильно? Але ваш акцент звучить як абіссинський».\n«У мене з'явився акцент?» — недовірливо перепитала Спір, а потім похитала головою. «Так, це я. Хоча я прожила в Абіссинії понад двадцять років. Але не з власної волі».\n«Зрозуміло. Що ж, дозвольте мені сказати, тільки між нами, що ваше марегіпетське походження переконало [MGY.GetLeader] прийняти ваше прохання як жест доброї волі. Також я повинна згадати, що ваше ім'я все ще значиться в наших службових списках, хоча згідно з ними ви "зникли безвісти"».\nОчі Спір розширилися. «Досі? Але ж я прямо тут!»\n«Щоб виправити це, вам доведеться відвідати одне з відділень марегіпетської армії і попросити їх внести зміни. Юридична вимога, самі розумієте».\nВона важко зітхнула. «Гаразд. Я матиму це на увазі. Але зараз у мене є справи...»"
 abyssinia.103.a:0 "Тепер ми можемо робити з ними все, що захочемо."
 
 abyssinia.104.t:0 "Відповідь Мейргипту"
 abyssinia.104.d_gomez:0 "«Повідомлення від вашого міністра закордонних справ, Гумберта Темесгена, ваша величносте!» — офіційним тоном проголосив посланець.\nҐомез і Мортіція перезирнулися через обідній стіл. Потім [ABY.ABY_queen_loc_nocap] видавила ввічливу усмішку, хоча її гострі ікла були оголені. «Хіба ви не бачите, що ми тут зайняті?»\n«Прошу вибачення, ваші величності, але це повідомлення було позначено як термінове».\nМортіція насупилася, але Ґомез жестом попросив її заспокоїтися. «Тіш, усе гаразд. Лише коротка перерва, не більше». Потім він повернувся до посланця. «Ну, і що ж там такого важливого?»\n«Глава уряду Мейргипту, [MGY.GetLeader], відповів на наше прохання припинити втручання у внутрішні справи Абіссинії. Вони готові зробити це, але тільки якщо [ABY.GetNameDef] підпише договір з обіцянкою не застосовувати військову силу проти Клуджтауна».\nМортіція насупилася ще дужче. «Приблизно цього я й очікувала. Вони намагаються виставити нас агресорами, хоча ми просто намагаємося відновити закон і порядок у нашому власному місті!»\nҐомез у роздумах постукав кігтем по підборіддю. «Гадаю, Гумберт чекає від мене подальших інструкцій. Погоджуватися ризиковано, але це принаймні поклало б край нинішній патовій ситуації. Відмова, однак, може означати, що війна залишиться єдиним виходом...»\n«Які будуть ваші накази, ваша величносте?» — поцікавився посланець."
 abyssinia.104.d_gomez_absent:0 "«Повідомлення від міністра закордонних справ, Гумберта Темесгена, ваша величносте!» — офіційним тоном проголосив посланець.\nМортіція, яка сиділа за обіднім столом посеред трапези, сердито глянула на нього. Потім вона видавила ввічливу усмішку, хоча її гострі ікла були оголені. «Хіба ви не бачите, що я тут зайнята?»\n«Прошу вибачення, ваша величносте, але це повідомлення було позначено як термінове».\nМортіція насупилася. «Термінове не означає, що ви не можете постукати у двері».\nОфіційність посланця почала хитатися. «Я... е-е, мої найглибші і найщиріші вибачення, ваша величносте».\nВираз обличчя [ABY.ABY_queen_loc_nocap] пом'якшав. «Усі вибачення прийняті. Так що там за повідомлення?»\nПосланець опанував себе. «Глава уряду Мейргипту, [MGY.GetLeader], відповів на наше прохання припинити втручання у внутрішні справи Абіссинії. Вони готові зробити це, але тільки якщо [ABY.GetNameDef] підпише договір з обіцянкою не застосовувати військову силу проти Клуджтауна».\nМортіція насупилася ще дужче. «Приблизно цього я й очікувала. Вони намагаються виставити нас агресорами, хоча ми просто намагаємося відновити закон і порядок у нашому власному місті!» Вона різко вдихнула і повільно видихнула. «Отже, Гумберт чекає подальших інструкцій?»\nПосланець кивнув.\n«У такому разі...»"
 abyssinia.104.d_gommie:0 "Поки марегіпетська поні-емісар говорила, вона, здавалося, намагалася ігнорувати той факт, що Шарп Спір дивилася на неї якось дивно. «...Отже, [MGY.GetLeader] мудро вирішив погодитися виконати ваше прохання за однієї умови: що [ABY.GetNameDef] підпише договір з обіцянкою не застосовувати військову силу проти Клуджтауна».\nСпір кліпнула. «Так, так. Це чудово. Для нас це зовсім не проблема».\nМейргипетянка здавалася стурбованою. «Міс, якщо дозволите запитати, чи все гаразд? Ви поводитеся дивно, якщо чесно».\nВона незручно посовалася на стільці. «Я? Е-е, ні, я в порядку. Я просто давно не бачила нікого з дому...»\nЕмісар кивнула. «Розумію. Ви з Мейргипту, правильно? Було важко сказати через ваш акцент».\n«У мене з'явився акцент?» — недовірливо перепитала Спір, а потім похитала головою. «Так, це я. Хоча я прожила в Абіссинії понад двадцять років. Але не з власної волі».\n«Зрозуміло. Що ж, дозвольте мені сказати, тільки між нами, що ваше марегіпетське походження переконало [MGY.GetLeader] розглянути ваше прохання як жест доброї волі. Також я повинна згадати, що ваше ім'я все ще значиться в наших службових списках, хоча згідно з ними ви "зникли безвісти"».\nОчі Спір розширилися. «Досі? Але ж я прямо тут!»\n«Щоб виправити це, вам доведеться відвідати одне з відділень марегіпетської армії і попросити їх внести зміни. Юридична вимога, самі розумієте».\nВона важко зітхнула. «Гаразд. Я матиму це на увазі. Але зараз...»"
 abyssinia.104.a:0 "«...Передайте [MGY.GetLeader], що ми приймаємо цю пропозицію»."
 abyssinia.104.b:0 "«...Передайте [MGY.GetLeader], що ми не можемо прийняти цю пропозицію»."
 
 #Either MGY or ABY can get this
 abyssinia.105.t:0 "ПЕРЕГОВОРИ ЩОДО КЛУДЖТАУНА ПРОВАЛИЛИСЯ"
 abyssinia.105.d:0 "[This.GetNewspaperHeader]\n--------------------\nВІД МЕКЛІТ ДАНН З Р'АТАФЕТА, [?global.date.GetDateStringNoHour]\nМіністерство закордонних справ [ABY.GetNameDef] сьогодні випустило офіційне комюніке, в якому повідомляється, що переговори з [MGY.GetNameDef] щодо статусу спірної території Клуджтауна будуть призупинені на невизначений термін. Громадськості не пояснили, що саме призвело до зупинки переговорів; одні припускають, що марегіптяни відмовилися йти на поступки, інші — що [ABY.GetNameDef] вимагали забагато і відмовилися визнати суверенітет Клуджтауна. Хай там як, мета [ABY.GetNameDef] змінити статус-кво зазнала невдачі, і Клуджтаун залишається спірною територією, яка вільно самоврядується під захистом Мейргипту."
 abyssinia.105.a:0 "Ну що ж."
 
 abyssinia.106.t:0 "[From.GetAdjective]ий ультиматум"
 abyssinia.106.d:0 "Уряд [ABY.GetName] зажадав повернути їм контроль над нашою зовнішньою політикою та економікою. Оскільки Мейргипет більше не захищає нас, щоб протистояти [From.GetAdjective]ій загрозі, ми вразливі. Хоча ми, ймовірно, не зможемо стримувати війну в довгостроковій перспективі, ми можемо зберегти нашу незалежність достатньо довго, щоб змусити їх здатися і піти геть.\n\nЩо нам робити? Хоча Верко схилився перед Королем Штормом, щоб зберегти автономію Клуджтауна, [ABY.GetLeader] навряд чи має таку ж владу чи авторитет, як він."
 abyssinia.106.a:0 "Ще один чобіт для лизання, але Клуджтаун залишається відкритим."
 abyssinia.106.b:0 "Цього разу Клуджтаун не схилиться!"
 
 abyssinia.107.t:0 "Автономне місто Клуджтаун"
 abyssinia.107.d:0 "«Хоча формально це абіссинське місто з моменту його заснування, у самому місті немає нічого абіссинського», — пояснила керівниця служби безпеки, сива кішка. «Коти становлять меншість населення, а абіссинська — навіть не найпоширеніша мова. Коли прибудете в місто, не очікуйте теплого прийому. Вам також варто подумати про мовні курси з різних торгових креольських мов, які використовуються в місті».\nОдин з офіцерів безпеки, що сидів перед нею, підняв лапу.\n«Я не казала, що вже час для запитань. Дозвольте мені закінчити».\nЛапа опустилася.\n«Багато років містом керувала злочинна банда Верко. Ваша робота буде важкою, оскільки місто не звикло до жодних правоохоронних органів. Порядок підтримувався мафіозним рекетом і монополією на насильство. Монополією, яка загрожує перетворитися на олігополію. Ця банда, як і будь-які інші злочинні угруповання, повинна швидко постати перед правосуддям. Особливо важливо, щоб новий тимчасовий автономний уряд міг ефективно керувати і забезпечувати виконання своїх законодавчих рішень. Згодом можуть бути проведені вибори, але до цього ще далеко. Суть цього брифінгу — дати вам зрозуміти, що попереду у нас багато роботи. Є запитання?»\nЛапа піднялася знову.\n«Слухаю»."
 abyssinia.107.a:0 "«Ем, хіба його не слід називати МІСТЕЧКОМ? Адже він називається Клуджтаун, а не Клуджсіті»."
 
 abyssinia.108.t:0 "Клуджтаун стоїть непохитно"
 abyssinia.108.d_gomez:0 "«Я очікую, що це місто буде взято швидко і з мінімальними втратами серед цивільного населення», — сказав [ABY.ABY_king_loc_cap] Ґомез зібраному військовому керівництву. «Уникайте широкого використання артилерії і намагайтеся зберігати цивільні будівлі неушкодженими, де це можливо».\n«Ваша Вічна Блискуча Великодушносте», — сказав Рас Терстон, — «ви бачили будівлі Клуджтауна? Це диво, що піщані бурі не руйнують їх самі по собі. Я думаю, що супутніх збитків не уникнути!»\nҐомез став суворішим. «Можливо, їх не уникнути, але ваша робота — звести їх до мінімуму. Я не зацікавлений у правлінні купою руїн навколо оазису. Крім того, ми не хочемо давати іноземним державам пропаганду для використання проти нас. Нам треба підтримувати репутацію».\nТерстон розпростерся перед Ґомезом. «Як забажаєте, Володарю Володарів, Верховний Правителю Всього Сущого!»\nІншим командирам, як і самому Ґомезу, було ніяково від цього прояву крайньої відданості."
 abyssinia.108.d_gomez_absent:0 "«Ґомез написав вам усім листа з інструкціями», — сказала [ABY.ABY_queen_loc_cap] Мортіція зібраному військовому керівництву і почала читати з аркуша паперу. «"Я очікую, що це місто буде взято швидко і з мінімальними втратами серед цивільного населення. Уникайте широкого використання артилерії і намагайтеся зберігати цивільні будівлі неушкодженими, де це можливо"».\n«Ви бачили будівлі Клуджтауна?» — запитав Рас Терстон. «Це диво, що піщані бурі не руйнують їх самі по собі. Я думаю, що супутніх збитків не уникнути!»\n«Ви піддаєте сумніву накази вашого сюзерена?» — здивувалася Мортіція. «Хто ви і що ви зробили з Терстоном?»\nРас раптом знітився. «Ем, я маю на увазі, звісно, ми зробимо все можливе, щоб цього уникнути! Мої найглибші вибачення нашому наймудрішому і найсправедливішому нявгусу».\nМортіція зітхнула і продовжила читати: «"Я не зацікавлений у правлінні купою руїн навколо оазису. Крім того, ми не хочемо давати іноземним державам пропаганду для використання проти нас. Нам треба підтримувати репутацію"». Мортіція задумливо кивнула. «Думаю, він абсолютно правий. Хіба ви не згодні?»\nКомандири кивнули, дехто більш нерішуче, ніж інші."
 abyssinia.108.d_gommie:0 "«Я очікую, що це місто буде взято швидко і з мінімальними втратами серед цивільного населення», — сказала Шарп Спір зібраному військовому керівництву. «Уникайте непотрібного використання артилерії і намагайтеся зберігати цивільні будівлі неушкодженими, де це можливо».\nОсел, що стояв у строю, відкашлявся. «Якщо дозволите, командире».\n«Так, Енкаро?»\n«З усією повагою, хіба Клуджтаун не є кублом покидьків і лиходіїв, повним злочинців? Чому ми намагаємося надіти шовкові рукавички на наші копита і лапи?»\nСпір зберігала непохитний вираз обличчя. «Злочинці — це лише частина населення, і вони також заслуговують на справедливий суд. Нашими цілями мають залишатися ворожі солдати».\nКіт у строю не втримався і пирхнув. «Перепрошую».\nФіолетова поні підняла брову. «Що тут такого смішного, Тамрате Павіте?»\nВсі інші обернулися, щоб подивитися на нього, але він все ще посміхався. «Мем, хіба ви не особисто стратили свого колишнього господаря? Зі свого власного пістолета? Без суду? Я не кажу, що це погано, зауважте. Просто здається, що ви розм'якли».\nМ'язи на шиї Спір напружилися. «Ми більше не банда зневірених і злих революціонерів, ми — Визвольна армія. І тепер ми повинні діяти професійно. Нам треба підтримувати репутацію. Вам усім зрозуміло?»\nКомандири кивнули, дехто більш нерішуче, ніж інші."
 abyssinia.108.a:0 "Ми намагалися вирішити це мирним шляхом."
 
 abyssinia.109.t:0 "Повстання в Овінґоленді"
 abyssinia.109.d:0 "Овінґоленд залишається проблемним регіоном ще з часів навали Короля Шторма на Зебрику, він переповнений біженцями-зебрами, які вимагають підтримки від нашого й без того перевантаженого уряду. Схоже, наші вороги в Абіссинії скористалися цими заворушеннями, підтримуючи маргінальний «Овінґолендський рух», що прагне створити автономну державу з більшістю зебр, якій коти пообіцяли щедру підтримку. Тепер ця підпільна організація підняла масштабне повстання, вочевидь, за підтримки абіссинської розвідки та армії, і атакувала марегіпетські гарнізони в місцевих містах і містечках. Вже надходять повідомлення про те, що абіссинські війська висунулися їм на допомогу."
 abyssinia.109.a:0 "Ми повинні швидко розібратися з цим повстанням!"
 abyssinia.109.b:0 "Ми не можемо дозволити собі воювати з ними зараз."
 
 abyssinia.110.t:0 "Абіссинія захоплює Тротс і Кантерс"
 abyssinia.110.d:0 "Гарнізон на островах Тротс і Кантерс надіслав екстрене повідомлення з попередженням про те, що на острів висадилися диверсанти і атакували будівлі, які використовувалися військовими та урядом. Цих нападників описали як абіссинських котів, а отже, це, швидше за все, морська спеціальна операція, проведена [ABY.GetNameDef]. Оскільки між нашими країнами немає офіційного стану війни, війська на острові були розгублені щодо того, як діяти, і запросили негайних наказів. Однак, схоже, радіопередача була перехоплена, оскільки надійшла зі значною затримкою, що означає, що контроль над островами, ймовірно, вже втрачено.\n\n[Root.GetLeader] вже отримав інформацію, і від нього вимагають прийняти рішення про те, як реагувати на це грубе порушення [Root.GetAdjective]ого суверенітету."
 abyssinia.110.a:0 "Це означає війну!"
 abyssinia.110.b:0 "Зараз у нас немає часу з цим розбиратися."
 
 abyssinia.111.t:0 "Потенційний союзник?"
 abyssinia.111.d:0 "«З огляду на те, як [ABY.GetNameDef] прагне до тісніших стосунків з Гіппогриффією, це була б золота можливість для Варзени також зблизитися з котами», — пояснив радник королю Барекзамалу.\nНявгіст, здавалося, не виявляв жодного інтересу, згорбившись на своєму троні і ліниво жуючи виноград.\n«Я раджу вам зв'язатися з нявгусом Абіссинії Ґомезом Нявконненом і запропонувати тісніші відносини з його державою».\nБарекзамал насупився. «...Це ім'я здається мені знайомим».\n«Ну, як король, ви повинні знати імена лідерів сусідніх країн».\nВін похитав головою. «Ні-ні, хіба не ходили якісь чутки про його... не некомпетентність, а бездіяльність?»\nРадник кивнув. «Схоже, зараз у нього справи йдуть краще».\nБарекзамал зібрав залишки сил і підвівся з трону. «Я напишу йому особистого листа. Не дипломатичного. Перекладіть його і переконайтеся, що він потрапить лише до самого Ґомеза, а не до його міністра закордонних справ»."
 abyssinia.111.a:0 "«Як забажаєте, мій королю»."
 
 abyssinia.112.t:0 "Лист із Варзени"
 abyssinia.112.d:0 "Ґомез порпався у своїй шафі, його жовті очі блиснули, коли він знайшов те, що шукав. Він витягнув вицвілу карту північної Зебрики і розклав її на своєму робочому столі. Ймовірно, вона застаріла вже понад як на десятиліття, але на ній все ще мало бути те, що він намагався знайти. Він оглянув її і знайшов невелике королівство, розташоване між Хіроптеррою та Зумідією. Ось вона, Варзена. Незважаючи на те, що вона знаходилася не так далеко від Абіссинії, йому довелося перевірити, де саме. Королівство було досить маленьким і незначним, а географія ніколи не була сильною стороною Ґомеза.\n\nОтримавши додатковий контекст, Ґомез повернувся до свого ненаписаного листа. «Дорогий королю Барекзамал», — пробурмотів він, пишучи чорнильним пером, потім похитав головою, зібгав листа і дістав інший. «Шановний королю Барекзамал. Для мене велика честь... Проклята Бааст тавтологія!» Ще один зіпсований лист. Він відклав чорнильне перо і взяв графітовий олівець та гумку. «Барекзамал. Я зворушений особистим листом, який ви мені написали. Ви були дуже відверті у своїх почуттях до абсолютно незнайомого кота, і я це поважаю. Я згоден з вами, бути королем — нелегке завдання, і іноді я шкодую, що я не прибиральник котячих лотків. Однак я не маю "вирішення" проблеми депресії. Не думаю, що якийсь кіт... — Він стер слово. — ...хтось його має. У деякі дні мені все ще важко змусити себе щось робити. Але я все одно продовжую, бо знаю, що повинен це робити заради інших. Гадаю, такою була б моя порада вам: ніколи не здавайтеся».\n\nРешта листа буде присвячена звичайним нудним дипломатичним справам, але тепер з найважливішою частиною було покінчено, тому решту Ґомезу було легко написати."
 abyssinia.112.a:0 "Можливо, у нас більше спільного, ніж ми думали."
 
 abyssinia.113.t:0 "Відповідь"
 abyssinia.113.d:0 "«Барекзамал. Я зворушений особистим листом, який ви мені написали. Ви були дуже відверті у своїх почуттях до абсолютно незнайомого кота, і я це поважаю. Я згоден з вами, бути королем — нелегке завдання, і іноді я шкодую, що я не прибиральник котячих лотків. Однак я не маю "вирішення" проблеми депресії. Не думаю, що хтось його має. У деякі дні мені все ще важко змусити себе щось робити. Але я все одно продовжую, бо знаю, що повинен це робити заради інших. Гадаю, такою була б моя порада вам: ніколи не здавайтеся».\n\nКороль Барекзамал дивився на листа, якого отримав від нявгуса Ґомеза. «І це все?» — пробурмотів він. «"Ніколи не здавайтеся"?» Він недовірливо похитав головою, а потім відклав листа вбік. Його погляд сфокусувався вдалині, вдивляючись у ніщо конкретно, поки він був занурений у свої думки. Через деякий час він пробурмотів: «...Ні, він мав рацію. Я ніколи не можу здатися, заради Варзени та зебр, які мене люблять».\n\nВін підвівся і надійно сховав листа серед інших важливих особистих речей. Тепер він не лише знайшов нового союзника для Варзени, але й, можливо, здобув нового друга."
 abyssinia.113.a:0 "Треба буде надіслати йому ще одного листа якось."
 
 abyssinia.114.t:0 "Військова допомога від [HIP.GetName]"
 abyssinia.114.d:0 "Сьогодні в гавань Асмурри прибув невеликий флот військових кораблів у рамках угоди про взаємну військову допомогу, нещодавно підписаної з [HIP.GetNameDef]. З кораблів висадилася ціла бригада досвідчених гіппогрифійських морських піхотинців у супроводі офіцерів, інженерів та інших експертів, обізнаних у тому, як веде війну [HIP.GetAdjective]а армія. Вигляд високих і граціозних гіппогрифів в екзотичній уніформі привабив великий натовп котів, які були вражені, коли батальйон морських поні продемонстрував свою магічну здатність до перетворення, обернувшись на гіппогрифів. Генерал Королівської гвардії Колд Стрім очолював стрій, і його особисто привітав [ABY_king_loc_cap] Ґомез, хоча незабаром генералу довелося вирушити назад на батьківщину. Більшість інших гіппогрифів, однак, залишаться, готові служити [ABY.GetNameDef] стільки, скільки буде потрібно."
 abyssinia.114.a:0 "Разом ми будемо тримати вінґбардійську загрозу на відстані!"
 
 abyssinia.115.t:0 "Військова допомога від [ABY.GetName]"
 abyssinia.115.d:0 "Сьогодні в гавань Гавлінгтона прибув невеликий флот військових кораблів у рамках угоди про взаємну військову допомогу, нещодавно підписаної з [ABY.GetNameDef]. З кораблів висадилася ціла бригада досвідчених абіссинських горян у супроводі офіцерів, інженерів та інших експертів, обізнаних у абіссинських методах ведення війни. Вигляд розумних двоногих котів, що марширують в екзотичній уніформі, привабив великий натовп гіппогрифів, і навіть деякі морські поні виринули з води, щоб з цікавістю спостерігати за цією подією. Голова Абіссинської королівської гвардії очолював стрій, і його особисто привітав [HIP.GetLeader], хоча незабаром голові довелося вирушити назад на батьківщину. Більшість інших котів, однак, залишаться, готові служити [HIP.GetNameDef] стільки, скільки буде потрібно."
 abyssinia.115.a:0 "Таке побачиш не щодня."
 
 abyssinia.116.t:0 "Зустріч монархів"
 abyssinia.116.d_celestia:0 "Довгий і білий ріг Селестії яскраво засяяв жовтим, коли вона левітувала ніж, яким відрізала шматок торта. «Для мене велика честь приймати вас, [ABY.ABY_king_loc_cap] Ґомез. Кантерлот знаходиться на чималій відстані від Пантери. Ви справді здаєтеся відданим справі покращення відносин між нашими націями!» Вона перенесла торт на тарілку, яку потім перемістила повітрям до Ґомеза, що сидів на протилежному боці столу.\nВін опустив очі на шматок торта, а потім знову подивився на принцесу-алікорна. «Е-е, хіба не слуги повинні це робити?»\nСелестія засміялася. «Не будьте смішним. Якщо я здатна рухати сонце, то мені, звичайно, не важко відрізати трохи торта для мого нового друга».\n«Дякую». Ґомез ніяк не міг позбутися почуття підозри. Він занадто звик до підлабузників-дворян, але ця Принцеса якимось чином випромінювала чисту ауру дружелюбності.\n«Завжди будь ласка», — відповіла вона і відрізала трохи торта і для себе. «Знаєте, це нагадує мені мою зустріч з нявгіст Паукуно, коли ми обговорювали питання Мейндалусії та її поні».\nҐомез насупився. «...Що? Але вона жила тисячу років тому...»\n«Так? А я старша за неї», — сказала вона з іще одним смішком. «У будь-якому разі, та зустріч пройшла не так добре, як я сподівалася, але врешті-решт Паукуно заприсяглася ставитися до своїх нових поні-підданих м'яко і справедливо. Ви обіцяєте робити те саме, так? Я чула, що в Абіссинії є багато поні, яких привезли туди як рабів». Вона посміхалася, коли говорила це, хоча її погляд був суворим.\nҐомез не знав, що сказати, і ніяково засовався на своєму стільці, опустивши вуха. Потім, коли тиша почала ставати незручною, він відповів:"
 abyssinia.116.d_no_celestia:0 "[ABY.ABY_queen_loc_cap] Мортіція стояла в гавані Тиграю, спостерігаючи, як її чоловік сходить з [ROOT.ABY_royal_loc_nocap]ого корабля. Він здавався досить втомленим від довгої подорожі до Кантерлота, тож вона поквапилася йому назустріч. «Коханий, ти в порядку? Як пройшла зустріч?»\n«Гм? Привіт, Тіш, так, я в нормі...» — він потер голову. «Але нагадай мені більше ніколи не сідати на човен. Щодо зустрічі з [EQS.GetLeader], гадаю, все пройшло нормально. Вони виявили бажання розвивати тісніші відносини між нашими націями. Однак щось мене стурбувало».\nМортіція підняла брову. «Що саме?»\n«Ці поні страшенно доброзичливі. Мені важко їм довіряти, навіть якщо це здається цілком щирим. Я провів занадто багато часу з дворянами-підлабузниками...»\n[ABY.ABY_queen_loc_nocap] хихикнула. «Ой, я впевнена, що їм можна довіряти. Зрештою, дружба — це практично їхня релігія».\n«Але ж це дивно, чи не так?»\nВона закотила очі. «З їхньої точки зору, мабуть, теж було дивно бачити кота, який ходить на двох лапах і розмовляє».\nҐомез задумливо кивнув."
 abyssinia.116.a:0 "«...Так, звісно, Принцесо»."
 abyssinia.116.b:0 "«Слушне зауваження»."
 
 abyssinia.117.t:0 "Імперська прокламація"
 abyssinia.117.d_dejen:0 "Ґомез озирнувся довкола королівського палацу в колишній столиці Мейргипту. Його архітектура здавалася абсолютно чужою, але він ніяк не міг позбутися відчуття, що деякі елементи були натхненні або навіть ідентичні абіссинським архітектурним задумам.\n«Ви готові до церемонії, ваша величносте?» — запитав Дежен.\nҐомез кліпнув, зосередившись на поточній справі, і кивнув. «Так, так. Давайте з цим покінчимо».\n\nҐомез вийшов до головної зали і зайняв своє місце на подіумі, Дежен та всі інші його міністри стали праворуч від нього, а Мортіція і група баастистських жерців — ліворуч. Потім почалася церемонія: шеренги суворих котячих солдатів і поні-допоміжників увійшли в залу, несучи свої пошарпані в боях прапори, і зайняли позиції біля стін зали. Оркестр котів-музикантів гучно і тріумфально заграв абіссинський гімн. Потім прибули представники з усіх нещодавно анексованих регіонів Абіссинії, щоб віддати шану; більшість із них були колабораціоністами та іншими корисними посіпаками, хоча декого обрав їхній народ. Ця група була сумішшю поні, віслюків, коней та інших істот. Рас, чиї представники були рабами в Абіссинії протягом століття.\n\nНарешті Дежен вийшов уперед і проголосив: «Хай живе Його Величність, імператор Ґомез з дому Пазуромонів, Нґусе нявгест, Лев-завойовник!»"
 abyssinia.117.d_no_dejen:0 "Ґомез озирнувся довкола королівського палацу в колишній столиці Мейргипту. Його архітектура здавалася абсолютно чужою, але він ніяк не міг позбутися відчуття, що деякі елементи були натхненні або навіть ідентичні абіссинським архітектурним задумам.\n«Ви готові до церемонії, ваша величносте?» — запитав Гумберт.\nҐомез кліпнув, зосередившись на поточній справі, і кивнув. «Так, так. Давайте з цим покінчимо».\n\nҐомез вийшов до головної зали і зайняв своє місце на подіумі, Гумберт та всі інші його міністри стали праворуч від нього, а Мортіція і група баастистських жерців — ліворуч. Потім почалася церемонія: шеренги суворих котячих солдатів і поні-допоміжників увійшли в залу, несучи свої пошарпані в боях прапори, і зайняли позиції біля стін зали. Оркестр котів-музикантів гучно і тріумфально заграв абіссинський гімн. Потім прибули представники з усіх нещодавно анексованих регіонів Абіссинії, щоб віддати шану; більшість із них були колабораціоністами та іншими корисними посіпаками, хоча декого обрав їхній народ. Ця група була сумішшю поні, віслюків, коней та інших істот. Рас, чиї представники були рабами в Абіссинії протягом століття.\n\nНарешті Гумберт вийшов уперед і проголосив: «Хай живе Його Величність, імператор Ґомез з дому Пазуромонів, Нґусе нявгест, Лев-завойовник!»"
 abyssinia.117.a:0 "«Слава! Слава! Слава!»"
 
 abyssinia.118.t:0 "Права лапа йде у відставку"
 abyssinia.118.d_gomez:0 "Ґомез працював у своєму кабінеті, коли почув три ввічливі стуки у двері. Він поглянув на годинник і зрозумів, що настав час для зустрічі. «Заходьте, Дежене».\n\nДвері відчинилися, і темно-сірий кіт увійшов усередину, зачинив за собою двері, а потім сів на стілець по інший бік столу. «Я радий, що у вашому розкладі ще є час для приватної зустрічі зі мною», — сказав він, не виявляючи жодних ознак радості.\n«Е-е, так, звісно, Дежене. Ви ж мій Міністр Пера. Без ваших порад я б половину часу не знав, що робити». Він сухо похихикав із самого себе.\n«Саме про це я й хотів поговорити. Річ у тім, що, боюся, я мушу піти у відставку».\nПосмішка Ґомеза згасла, і він опустив вуха. «Ох, так, ви ж давно хотіли це зробити, чи не так?» Він втомлено зітхнув.\n«Так, і я більше не можу цього відкладати. Річ у тім, що я одружуюся».\nВуха Ґомеза нашорошилися. «О? Повірити не можу, я й не знав, що у вас є емоції!»\n«Я не ображаюся».\n«Хех, вибачте. І хто ж цей щасливчик?»\n«Історик, з яким я познайомився деякий час тому. З ним дуже приємно проводити час».\n«Ви ж запросите мене на весілля, правда?»\n«Я вже підготував запрошення, не варто хвилюватися. До речі, про майбутнє вам теж не варто хвилюватися. Я вірю, що за моєї відсутності ви з усім чудово впораєтеся».\n«Можливо... але будь-хто, кого я призначу новим Цехафе Таезазом, не буде таким корисним радником, як ви».\n«Я впевнений, що ви знайдете когось компетентного. А якщо ні, ви завжди можете покластися на свою дружину».\n«Дякую. Сподіваюся, ви теж зможете покластися на свого чоловіка».\nДежен усміхнувся. Ґомез не міг пригадати, коли востаннє бачив, щоб той це робив."
 abyssinia.118.d_gomez_absent:0 "Мортіція працювала у своєму кабінеті, коли почула три ввічливі стуки у двері. Вона одразу зрозуміла, що настав час для зустрічі. «Заходьте, будь ласка!»\n\nДвері відчинилися, і темно-сірий кіт увійшов усередину, зачинив за собою двері, а потім сів на стілець по інший бік столу. «Шкода, що Ґомеза тут немає, але я впевнений, що ви йому все передасте».\n«Звісно, передам! Ви його Міністр Пера, я знаю, наскільки ви для нього важливі».\n«Саме про це я й хотів поговорити. Річ у тім, що, боюся, я мушу піти у відставку».\nОчі Мортіції розширилися. «О, Ґомез казав мені, що ви планували це зробити. Ми просто не знали, коли саме».\n«Справді, і я більше не можу цього відкладати. Річ у тім, що я одружуюся».\nМортіція широко усміхнулася. «Правда? Вітаю!»\n«Дякую».\n«Якщо можна запитати, хто це?»\n«Історик, з яким я познайомився деякий час тому. З ним дуже приємно проводити час».\n«Впевнена, ви не забудете запросити [ROOT.ABY_royal_loc_nocap]у родину», — хихикнула Мортіція.\n«Я вже підготував запрошення, не варто хвилюватися. До речі, про майбутнє вам теж не варто хвилюватися. Я вірю, що Ґомез з усім чудово впорається за моєї відсутності».\n«Я вірю в нього. Однак жоден кіт не зможе стати кращим Цехафе Таезазом, ніж були ви».\n«Я впевнений, що Ґомез знайде когось компетентного. А якщо ні, він завжди зможе покластися на вас».\n«Дякую. Сподіваюся, ви теж зможете покластися на свого чоловіка».\nДежен усміхнувся. Мортіція не могла пригадати, коли востаннє бачила, щоб той це робив."
 abyssinia.118.a:0 "«Дякую за вашу службу, друже»."
 
 abyssinia.119.t:0 "Ціна війни"
 abyssinia.119.d:0 "Коли Ґомез був у палаці, мав не надто жахливий настрій і не був надто зайнятий, йому подобалося стояти ввечері на балконі королівського палацу та милуватися заходом сонця. І хоча цього разу на червоні хмари й справді було приємно дивитися, його відволікав величезний стовп диму, що здіймався з околиць Пантери. Він подивився вниз і побачив сотні багать, що палали вдалині. «Поховальні вогнища», — пробурмотів він собі під ніс, коли все зрозумів. Сім'ї та жерці кремували тіла загиблих. Хоча це було відносно звичним явищем, він ніколи не бачив їх так багато водночас. Диму було так багато, що самого призахідного сонця вже не було видно.\n\nВін був певен, що більшість із них полягли в нещодавніх боях. Проте навіть ці сотні смертей становили лише малу частину від загальних втрат. Були тисячі й тисячі котів, поранених, зниклих безвісти або взятих у полон ворогом. Дехто з тих, хто загинув, так ніколи і не буде кремований. Та й не всі з них були солдатами.\n\nҐомез важкою ходою пішов з балкона. Чи справді війна була того варта? Хіба це не була його відповідальність? Хіба його лапи не були вкриті кров'ю його підданих? Він потрусив головою, ніби намагаючись викинути ці думки з голови, а потім попрямував до покоїв Мортіції."
 abyssinia.119.a:0 "«Тіш, де ти? Ти мені потрібна...»"
 
 abyssinia.121.t:0 "Землетрус у Которае"
 abyssinia.121.d:0 "Щойно сонце зійшло над горами Которае, земля почала трястися і здригатися. Гуркіт ставав дедалі сильнішим, і за лічені хвилини будинки в селах та містах почали руйнуватися один за одним. Поштовхи тривали кілька хвилин, які здавалися годинами, поки коти тікали зі своїх домівок і ховалися на відкритих просторах, а врешті-решт сотні будівель перетворилися на руїни, поховавши під уламками тисячі котів.\n\nЗемлетруси є звичним явищем у горах Абіссинії, оскільки півострів розташований поблизу зони субдукції. Котяча архітектура враховує це і славиться своєю стійкістю під час сейсмічних подій. Проте цей землетрус був настільки надзвичайно сильним і руйнівним, що його відчули по всій Абіссинії та за її межами. Сейсмологи в Пантері оцінюють магнітуду землетрусу в 7,4 бала за шкалою Кантера.\n\nМісцева влада в Которае вже звернулася до центрального [ROOT.GetAdjective]ого уряду з проханням надіслати негайну допомогу регіону, оскільки тисячі котів поранені або опинилися в пастці в руїнах. Швидкі дії можуть врятувати багато життів, але це обійдеться недешево."
 abyssinia.121.a:0 "Негайно організуйте рятувальну операцію!"
 abyssinia.121.b:0 "Вони впораються з цим самі."
 
 abyssinia.122.t:0 "Вінґбардійська «пропозиція»"
 abyssinia.122.d_gomez:0 "«Тож, сподіваюся, тепер ви розумієте, чому Абіссинія отримала б велику вигоду від статусу протекторату під владою Вінґбардії», — пояснив нявгусу Ґомезу вільною абіссинською мовою Джиліппо Гаппі, вінґбардійський дипломат, відповідальний за справи Зебрики.\nУ відповідь він лише застогнав. «Так, я вже чув цю казочку. Але скажіть мені, шановний пане, від чого Абіссинії потрібен захист?»\n«Хіба вторгнення Короля Шторма не довело вразливість вашої нації?»\n«Король Шторм давно мертвий, і зараз ми цілком здатні захистити себе в разі потреби. Крім того, у що нам обійдеться ваш "захист"?»\nГрифон знизав плечима. «Конкретні зобов'язання залежатимуть від умов угоди».\n«Ви припускаєте, що взагалі буде якась угода. Можливо, ви думали, що мій ослаблений психологічний стан зробить мене більш поступливим. Що ж, ви помилилися. Я завжди, і я маю на увазі ЗАВЖДИ, ставитиму інтереси Абіссинії вище за власні бажання чи почуття».\nДжиліппо хихикнув. «Благаю вас заспокоїтися, ваша величносте. Така параноя невиправдана. Вінґбардія є партнером Абіссинії вже майже століття».\n«Тоді поверніть Кітрен», — прошипів Ґомез вільною вінґбардійською.\nГрифон підвівся. «Здається, у нас вийшов час для цієї зустрічі. Дякую за приємну розмову, ваша величносте. Я цілком розраховую на нашу нову зустріч».\n\nЗ цими словами дипломат пішов, залишивши Ґомеза самого в кімнаті для переговорів, потирати скроні кігтями."
 abyssinia.122.d_catrina:0 "«Тож, сподіваюся, тепер ви розумієте, чому Абіссинія отримала б велику вигоду від статусу протекторату під владою Вінґбардії», — пояснив нявгісті Кітріні вільною абіссинською мовою Джиліппо Гаппі, вінґбардійський дипломат, відповідальний за справи Зебрики.\nКітріна вишкірилася, оголивши свої гострі ікла. «Думаю, ви обмовилися. Ви, мабуть, хотіли сказати, що Вінґбардія отримала б вигоду від статусу протекторату під владою Абіссинії».\nНа мить на обличчі Джиліппо з'явився вираз глибоко ображеного шоку. Потім він зник, знову змінившись на професійний беземоційний вираз, який виказував лише легке невдоволення. «Я знаю, що вас нещодавно коронували, але такі офіційні зустрічі не місце для недоречних жартів».\nКітріна придушила посмішку лише наполовину, тож її задоволення було все ще помітним. «Жартів? Шановний пане, я не жартувала. Без сторонньої допомоги Вінґбардія врешті-решт буде розгромлена, як це було триста років тому». Кітріна звузила очі в хижому погляді. «Думаю, десь через десятиліття ви повернетеся сюди на колінах і благатимете нас про допомогу. Можливо, тоді ви сприймете мою щедру пропозицію серйозно, га?»\nГрифон підвівся. «Здається, у нас вийшов час для цієї зустрічі. Дякую за розмову. Я цілком розраховую на нашу нову зустріч».\n\nЗ цими словами дипломат пішов, залишивши Кітріну саму в кімнаті для переговорів, де вона гучно й глузливо зареготала."
 abyssinia.122.a:0 "«Світ без Вінґбардії був би чудовим місцем»."
 
 abyssinia.123.t:0 "Раптова перевірка"
 abyssinia.123.d:0 "Кроки Кітріни луною відбивалися від кам'яних сходів, коли вона спускалася в підземелля під своїм маєтком. Це був її спосіб подати знак про своє наближення. Вона вже чула метушню, адже всі займали свої місця перед її приходом. Коли вона нарешті дісталася низу, то увійшла до великої печерної зали. Її вірний помічник, Реп, стояв струнко і віддав їй честь. Позаду нього десятки чотириногих рабів працювали біля величезної машини: тягали візки з зеленим бур'яном і керували безліччю помп, дробарок і важелів під наглядом озброєних котів-охоронців.\nКітріна підійшла до двоногої рептилії. «Привіт, Репе. Як іде виробництво?»\n«Міледі, з часу вашої останньої перевірки нам вдалося виробити три сантилітри зілля».\nКішка насупила свою коричневу брову. «І все?»\nСтоїчний вираз обличчя Репа злегка здригнувся. «Стався, е-е, інцидент з рабами. Я переконався, що з цим розібралися».\nВона вишкірила ікла. «І як ти їх покарав?»\n«Я, е-е, позбавив їх привілею одного гарячого обіду на день».\n«Заради Бааст, вони раби, Репе! У них НЕМАЄ привілеїв!»\nТепер Реп нервував відверто. «В-вибачте, Кітріно, я-я думав, що більш радикальні покарання не потрібні...»\n«Згодом киньте одного з них до ями».\n«...Т-так, міледі».\nКітріна застогнала і потерла лоба. «Ух, я просто хотіла прийти сюди і сказати тобі, що коронація пройшла успішно. Замість "міледі", відтепер ти можеш називати мене "Нявгіст". Зрозумів, Репе?»\nЯщір кивнув. «Так, Кітр- моя Нявгіст!»"
 abyssinia.123.a:0 "Він корисний ідіот."
 
 abyssinia.124.t:0 "Повстання в Абіссинії!"
 abyssinia.124.d:0 "Колоніальна влада в Абіссинії вже тривалий час повідомляє про посилення партизанської активності, спрямованої на ізольовані застави та неохоронювані конвої в регіоні. Проте масове повстання все одно стало повною несподіванкою і шокувало весь [Root.GetNameDef]. З гір з'явилися десятки тисяч одягнених у мантії та озброєних котів, які атакували гарнізони по всій Абіссинії. Хоча багато з цих диких нападів було відбито, котам удалося здолати численні оборонні позиції і взяти під контроль незліченну кількість міст і сіл. Вже надходять повідомлення про те, що вони створили уряд, який претендує на роль єдиної законної державної влади в усій Абіссинії. Це, звичайно, абсурд і сміховисько, але з огляду на те, що наша держава і так розтягнула свої сили, ще невідомо, чи вдасться придушити опір так швидко, як мало б бути."
 abyssinia.124.a:0 "Цей бунт має бути придушений!"
 
 abyssinia.125.t:0 "Заминка в плані"
 abyssinia.125.d:0 "Реп увійшов до тронної зали Кітріни. «Ви хотіли поговорити зі мною, Н- моя Нявгіст?»\nКітріна посміхнулася, оголивши ряди ідеальних і гострих іклів. «Так. Мій любий Репе, куди я просила тебе відправити Королівську гвардію? Щоб навести лад і придушити заворушення рабів?»\n«До Тиграю, мем».\n«А де зараз Королівська гвардія проводить операцію з упокорення рабів? Це Тиграй? Так чи ні?»\n«Е-е, ні?»\n«ТОДІ ЩО В ІМ'Я БААСТ ВОНИ ТАМ РОБЛЯТЬ!» — вигукнула Кітріна, майже вистрибнувши з трону, мов лютий хижак.\nРеп остовпів і ледь не впав, але хвіст утримав його на ногах. «Я, е-е, я наказав їм туди вирушити. Я думав, ви не хочете, щоб раби створювали проб...»\n«Тільки ті, хто працює з моєю Машиною! Я ніколи не казала тобі чіпати рабів, що належать дворянам, ОКРІМ тих, що в Тиграї, оскільки вони переривали життєво важливу лінію постачання!»\n«Але інші раби спричиняли купу проблем, спалювали будинки і вбивали кот...»\n«Я ЗНАЮ! ЦЕ БУЛО ЧАСТИНОЮ ПЛАНУ!»\n«Кітріно, будь ласка, заспокойтеся. Я просто зробив те, що вважав найкращим».\n«Ти повинен робити точно те, що я наказую тобі робити. Не більше і не менше. Якщо хочеш, щоб я залишалася спокійною, більше ніколи не роби нічого подібного».\nРеп кволо кивнув. «Т-так, мем»."
 abyssinia.125.a:0 "Незначна заминка."
 
 abyssinia.126.t:0 "Друга реставрація Пазуромонів"
 abyssinia.126.d:0 "Рада знаті знову зібралася в королівському палаці. Кітріна всілася на місце, яке колись обіймав Ґомез з дому Пазуромонів, із самовдоволеною усмішкою на обличчі. Вона зайняла зручну позу і сказала: «Отже, навіщо ми всі сьогодні тут зібралися?»\nДворяни перезирнулися, ніби перевіряючи, у кого вистачить сміливості відповісти. Тоді заговорив Фітаврарі Гумберт: «Рада зібралася сьогодні, щоб провести голосування щодо обрання члена дому Пазуромонів на престол».\nВ одну мить посмішка Кітріни повністю випарувалася. «Що?»\n«Так, Ваша Легендарна Величносте, — сказав Рас Турстон, — ваші нещодавні дії залишили декого з нас дуже незадоволеними, боюся. Цілком імовірно, що більшість із нас проголосує за вашу заміну».\nВона підскочила зі стільця. «Але ви не можете так зі мною вчинити! У мене є детальний план порятунку Абіссинії, який залишиться незавершеним...» вона хихикнула, а потім раптом вибухнула від люті. «ВИ ЗНАЄТЕ, ЧИМ Я ПОЖЕРТВУВАЛА?!» Її кігті встромилися в дерев'яний стіл, глибоко застрягши в ньому.\n«Якщо рада вирішить обрати нового монарха, її рішення буде остаточним і незаперечним», — спокійно відповів Гумберт. «Я не бачу причин відкладати голосування. Почнімо».\n\nПоки один дворянин за іншим піднімав лапу в повітря, Кітріна обм'якла у своєму кріслі і втупилася в порожнечу."
 abyssinia.126.a:0 "Так закінчується правління Її Величності."
 
 abyssinia.127.t:0 "Опір завдає удару"
 abyssinia.127.d:0 "Цахіфе Лам Тардар вийшла з королівського палацу; її водій уже чекав на неї біля імпортного автомобіля. Джентлькіт вклонився і відчинив перед нею дверцята машини. «Сподіваюся, зустріч із Нявгіст пройшла продуктивно?»\nТардар пирхнула, сідаючи в машину. «Трата часу, як завжди. Поїхали прямо додому, в Амхашеру».\n«Як забажаєте, міледі», — сказав водій і зачинив дверцята.\n\nКілька годин по тому вони їхали звивистою ґрунтовою дорогою в західних передгір'ях. Цахіфе Лам бурчала через поганий стан дороги та безліч вибоїн. «І навіть не згадуйте мені про це дратівливе цокання. Дороги настільки жахливі, що вони зламали мою дорогу еквестрійську машину!»\nВодій насупився. «Перепрошую, мем? Цокання?»\n«Хіба ви не чуєте? Воно лунає зсередини машини. Мабуть, якась деталь відкрутилася чи щось таке. Уся ця нова техніка та механізми постійно ламаються...»\nВодій усміхнувся. «Машини не цокають, навіть коли ламаються. Це має бути щось інше».\nТардар підняла пухнасту брову. «Наприклад?»\n\nПролунав яскравий спалах і раптовий вибух полум'я, коли внутрішній годинник замінованого автомобіля завершив свій відлік. Вибух розірвав машину на шматки, ніби вона була зроблена з паперу, обсипавши пасажирів шрапнеллю, хвилею тиску й вогнем, і вбивши їх майже миттєво. Приблизно за кілометр звідти кіт, що ховався в кущах, опустив бінокль і підняв рацію. «Мишоловка спрацювала. Миша мертва. Повторюю. Миша мертва»."
 abyssinia.127.a:0 "Вони дорого за це заплатять."
 
 abyssinia.128.t:0 "Їм потрібен рятівник"
 abyssinia.128.d:0 "Рас Турстон розпластався перед Кітріною, яка сиділа на своєму троні, і поцілував кам'яну підлогу. «О Милостива, Наймудріша і Доброчесна Володарко Котячого Роду!» — благав Турстон. «Ви повинні допомогти своїм вірним Месафінтам! Раби шаленіють, і наші свити не можуть утримати їх під контролем!»\nІнші дворяни, що стояли за ним, неохоче кивнули, тоді як на обличчі самої Кітріни сяяла самовдоволена усмішка. «О? Я й гадки не мала, що все настільки погано. Гм. Думаю, я зможу допомогти, так, але мені потрібна ваша повна співпраця».\nТурстон підвівся, тепер уже стоячи на колінах і стискаючи лапи в благанні. «Справді? О, благаю, Велика Пані Фелібели! Ми зробимо все, що ви скажете!»\nКітріна обвела поглядом кімнату, дивлячись на кожного дворянина перед собою. «Мені потрібно, щоб ваші свити були інтегровані в королівську армію. розпорошені та розділені, ми не зможемо тримати рабів під контролем. Але з централізованим командуванням ми зможемо організувати військову операцію, щоб розчавити їхній опір».\nАристокоти знову кивнули, з ще більшим ваганням змушуючи свої голови рухатися.\n«Крім того, ви чітко довели свою нездатність управляти рабами. Їхні заворушення переслідують Абіссинію відтоді, як вторгнення Короля Шторма довело нашу слабкість. Відтак, усі раби стануть державною власністю».\n\nКімната ледь не вибухнула від гніву. Кітріна просто зберігала спокій і чекала, поки дворяни випустять пару.\n«Ну добре, мабуть, вам усе-таки не потрібна моя допомога. Здається, ви прагнете зустрітися з повстанням рабів самостійно».\nТепер запанувала тиша. Кітріна спостерігала за головами блакитнокровних котів. Повільно, але впевнено, вони всі кивнули. Вона не змогла стримати тихий смішок."
 abyssinia.128.a:0 "«Що ж, добре. Я врятую вас»."
 
 abyssinia.129.t:0 "Здійснення правосуддя"
 abyssinia.129.d:0 "Абіссинія була посушливою країною, тому більшість котів боялися води і не вміли плавати. Відтак покаранням для найгірших злочинців була страта через утоплення.\n\nШарп Спір дивилася зі скелі на сіро-білі океанські хвилі внизу. Вітер розвівав її гриву, коли вона стояла там зі зв'язаними передніми ногами і каменем, прив'язаним до тіла мотузкою. Вона була лише однією з ув'язнених у довгому ряду таких самих, вишикуваних уздовж краю обриву. За ними стояла дюжина озброєних абіссинських солдатів і кілька мейндалуських допоміжних військових. Вона подивилася на зебру поруч із собою. Бонту помітила це і подивилася у відповідь; її вираз обличчя голосно кричав «Я ж тобі казала!», не вимовивши при цьому жодного слова.\n\nДихання Шарп Спір перехопило. Вона відвела погляд за горизонт. Чомусь вона могла б заприсягтися, що звідси видно піщані береги Мейргипту, навіть якщо знала, що географічно це неможливо.\n\nАбіссинський жрець змахнув лапами і промовив звичайні церемоніальні слова, незважаючи на те, що в'язні не були котами: «Нехай мудрість Бааст просвітить їх у наступному житті, щоб вони могли ще знайти спокуту. В іншому разі, нехай вони крокнуть у небуття».\nПотім солдати зіштовхнули рабів зі скелі разом з їхніми каменями. Всі раби впали в унісон. Для Шарп Спір відстань до поверхні скелястих вод здавалася вічністю."
 abyssinia.129.a:0 "Це треба було зробити."
 
 abyssinia.130.t:0 "Влада"
 abyssinia.130.d:0 "Кітріна читала та перебирала папери у своєму кабінеті в королівському палаці, коли почула стукіт у двері. Вона зітхнула і відклала документи. «Заходь, не замкнено».\nРеп обережно відчинив двері і зазирнув усередину. «Гей, Н- моя Нявгіст, ви ж не зайняті?»\n«Зайнята. Це щось важливе?»\n«...Ну, це важливо для мене».\nКітріна звузила очі. Реп подивився на неї, ледь не тремтячи.\n«Гаразд, я просто піду-»\n«Заходь, я сказала».\nЯщір глибоко вдихнув і зайшов, зачинивши за собою двері. «Вибачте, що турбую, я знаю, що ви зараз дуже зайняті, але мені потрібно з вами поговорити».\nМонархиня з дому Кітве відкинулася на спинку крісла і склала лапи хаткою. «Про що? Здається, ти вагаєшся взагалі говорити».\n«Так, тому що... мені довелося набиратися сміливості, щоб хоча б прийти сюди. Недавнє повстання рабів... ви ж знали, що має статися, чи не так?»\nВона знизала плечима. «У мене є плани в планах всередині планів, Репе. Я була готова до будь-якого результату».\n«Тобто ви були готові до того, що всі ці коти, зебри та поні загинуть?»\nКітріна на мить відвела погляд від Репа. «Так».\n«Усе це частина плану, га. Знаєте, я пам'ятаю, як ви казали мені, що врешті-решт усе це буде того варте, але я починаю в цьому дуже сумніватися. Ви стали такою холодною, Кітріно».\nВона вже навіть не намагалася підтримувати зоровий контакт. «Я знаю, Репе. Я перетворила своє серце на камінь. Але тільки тому, що я роблю те, що повинно бути зроблено».\nРеп спробував посміхнутися. «Хіба ви не сумуєте за старими добрими часами? Тим, що було багато років тому? Я точно сумую».\n«Тієї дівчинки більше немає! І скатертиною дорога». Кітріна підвелася, її кігті встромилися в стіл, а ікла оголилися. «Моя порада: забудь, що ти її знав. Тому що тепер я в розквіті сил, на вершині своєї могутності, і скоро я ЗМУШУ ВВЕСЬ СВІТ ТРЕМТІТИ!»"
 abyssinia.130.a:0 "Реп з жахом витріщився на неї."
 
 abyssinia.131.t:0 "З попелу"
 abyssinia.131.d:0 "Неподалік від родинного маєтку Кітріни знаходилося село, яке тепер перетворилося на будівельний майданчик. Нявгіст особисто навідалася туди в супроводі Королівської гвардії та свого помічника Репа. Коли вона з'явилася, усі роботи на майданчику зупинилися, і до неї підійшов кіт-виконроб. Він зняв свою каску і шанобливо вклонився.\n«Ми маємо за честь приймати вас, ваша величносте».\n«Так і має бути». Вона озирнулася і побачила, що більшість спалених будівель зносять, а дерев'яні каркаси нових споруд уже зведені. Навіть стару кам'яну вежу посеред села реставрували. Перед нею розчищали місце. «Здається, все йде за графіком. Меморіальна статуя має прибути незабаром, тож добре, що її можна буде одразу встановити».\n«Звісно. У декого з робітників тут була сім'я, мем. Вони особисто зацікавлені в цьому проєкті».\nКітріна зітхнула. «Мені шкода їхньої втрати».\n«Нам усім шкода. Якщо дозволите запитати, ваша величносте, є дещо, що мене цікавить».\nВона підняла брову з цікавістю. «Так? Можете запитати».\n«Коли сюди прийшли поплічники Короля Шторма, як вийшло, що вони знищили село, але не зачепили ваш маєток?»\nНявгіст глибоко вдихнула, ніби збираючись із силами, щоб говорити. Потім вона вказала кігтем на центральну вежу. «Там знаходилося сховище стародавніх магічно-медичних сувоїв. Король Шторм, певно, думав, що вони мають якусь цінність, попри те, що ми, коти, навіть не здатні використовувати магію, як інші раси. Тим часом мій маєток у поганому стані і в ньому немає нічого особливо цінного. Коли селяни відмовилися віддавати священні сувої, єті спробували забрати їх силою. Це спровокувало бійку, внаслідок якої все згоріло вщент. Я була першим свідком тієї події».\nВиконроб мовчки дивився на неї. «Мабуть, це було жахливе видовище, мем. Таке не забувається».\nКітріна ковтнула сльози. «Так. Це залишило на мені слід і дало мені нову мету в житті».\nПозаду двох котів Реп слухав їх, а потім глибоко й сумно зітхнув."
 abyssinia.131.a:0 "Це ніколи не повинно повторитися."
 
 abyssinia.132.t:0 "На підтримку свободи"
 abyssinia.132.d:0 "Кітріна спостерігала, як раби-робітники вантажать численні ящики на корабель у гавані. Фітаврарі Гумберт, міністр закордонних справ, стояв поруч із нею.\n\n«Коли ви зустрінетеся з вінґбардійцями, — пояснювала Нявгіст диплокоту, — скажіть їм, що це щедрий подарунок відважним антиімперіалістичним борцям за свободу Вінґбардії від абіссинського уряду. Якщо вони поставлять під сумнів якість зброї, поясніть, що це все, що у нас було в наявності, оскільки ми самі відчуваємо її нестачу».\nГумберт кивнув.\n«Обов'язково скажіть, що вони не будуть у боргу, і ми не очікуємо, що вони віддячать нам послугами. Наші наміри повинні здаватися щирими і справді спрямованими на допомогу».\nГумберт знову кивнув і нічого не сказав.\n«На цьому, мабуть, усе. Є питання?»\nТепер Гумберт похитав головою замість того, щоб кивнути.\nКітріна засміялася. «Я думала, ви славитеся своїм красномовством, а ви тільки й робите, що мотаєте головою. Кіт язика проковтнув?»\nГумберт застогнав від жарту. «Ні, ваша величносте. Я просто не в балакучому настрої».\n«Розумію. У такому разі дозвольте сказати вам дещо, що може покращити ваш настрій: вірність мені буде винагороджена. Виконуйте свій обов'язок без нарікань, і все пройде гладко».\nГумберт підняв брову. «Це завуальована погроза?»\n«Залежить від обставин. Прислухайтеся до моїх слів, і тоді можете вважати це дружньою порадою». Кітріна посміхнулася, і її ікла зблиснули на сонці."
 abyssinia.132.a:0 "Гумберт кивнув."
 
 abyssinia.133.t:0 "Королівство Абіссинія надсилає допомогу"
 abyssinia.133.d:0 "Наші відносини з котячим Королівством Абіссинія були напруженими відтоді, як попередній уряд захопив портове місто Кітрен і змусив їх підписати нерівноправний договір. Відтак, було великою несподіванкою побачити вантажне судно під абіссинським прапором, що прибуло в один з наших портів. На борту перебував міністр закордонних справ Абіссинії з великою кількістю зброї. Він зустрівся з нашими представниками і сказав, що це «щедрий подарунок відважним антиімперіалістичним борцям за свободу Вінґбардії від абіссинського уряду». На жаль, зброя була переважно застарілими маленькими гарматами, розробленими для використання абіссинцями, але це краще, ніж нічого. Наша делегація подякувала котам за підтримку, і зброю передали нашим військовим."
 abyssinia.133.a:0 "Ем, дякуємо?"
 
 abyssinia.134.t:0 "Кинджал у темряві"
 abyssinia.134.d:0 "Четверо поневолених коней, що тягнули велику й вишукану карету, зупинилися перед королівським палацом. Дверцята карети відчинилися, і з неї вийшла Нявгіст Кітріна. Пара королівських гвардійців швидко підійшла, щоб супроводити її всередину.\n«Привіт, хлопці, — сказала вона, — страшенно шкода, що вам доводиться так часто виконувати цей обов'язок із супроводу. На жаль, я не можу довго залишатися в палаці, оскільки маю власні справи в моєму родинному маєтку».\nЗдавалося, гвардійців не надто хвилювало це непрохане пояснення, і вони стоїчно крокували поруч із нею. Вони відчинили перед нею ворота палацового подвір'я і пропустили всередину, незважаючи на допитливі погляди місцевих. Коли трійця наблизилася до входу в головну будівлю, один із гвардійців вийшов наперед і зупинив їх. «Ваша величносте, на вході триває ремонт. Нам доведеться скористатися бічним входом».\nКітріна скептично насупилася. «Дуже добре».\nНезабаром троє котів підійшли до темних дверей. Той самий охоронець, що говорив раніше, відчинив їх, відкриваючи темний коридор.\n«Здається, ними зовсім не користуються», — сказала Кітріна і хихикнула, а потім дістала щось зі складок свого пальта. Після того, як трійця увійшла, один охоронець зачинив двері, а інший дістав кинджал. Але коли він спробував встромити кинджал у Кітріну, дуже сильна лапа схопила його за руку. Кітріна ковтнула слину і кинула на землю порожній флакон, а її очі яскраво засяяли. «Ви двоє не впоралися зі своїм обов'язком охоронців. Цим ви звільнені».\n\nЗ коридору почувся гуркіт блискавки, достатньо гучний, щоб викликати десятки слуг і охоронців для розслідування. Вони побачили, як двері розчинилися, з них повалив чорний дим. З'явилася Кітріна, яка тягнула два обвуглених і понівечених трупи. Вона кинула їх на землю перед невеликим натовпом. «Цим я офіційно звинувачую цих двох у державній зраді!» — люто крикнула вона."
 abyssinia.134.a:0 "Провина доведена."
 
 abyssinia.135.t:0 "Абіссинія краде вінґбардійські активи"
 abyssinia.135.d:0 "Джиліппо Гаппі, дипломат, відповідальний за справи Зебрики, повідомляє, що уряд Абіссинії видав указ про негайну конфіскацію будь-якого майна, що належить «іноземним агентам». Це означає, що шахти в Кицькицю та об'єкти компанії «Талоніелі» в Абіссинії відтепер є державною власністю. Їхній уряд наказав персоналу вінґбардійської компанії негайно покинути країну. Це є кричущим порушенням Кітренського договору, який надав нам численні ексклюзивні економічні права. Багато грифонів вимагають від [Root.GetLeader] запровадити санкції проти Абіссинії у відповідь. Якщо Абіссинія продовжуватиме свою позицію відмови від співпраці, можливо, доведеться вжити жорсткіших заходів."
 abyssinia.135.a:0 "Це злочин!"
 
 abyssinia.136.t:0 "Друга реставрація Пазуромонів"
 abyssinia.136.d:0 "«Репе, негайно дістань мені радіо!» — заверещала Кітріна. Ящір запанікував і побіг до іншої кімнати, порився там і повернувся з імпортним скайфоллським радіообладнанням, яке йому ледве вистачало сил нести. Щойно його поставили на стіл і ввімкнули в мережу, Кітріна сіла за пульт і одягла навушники. Вона налаштувала приймач і знайшла канал, який хотіла послухати. Крізь балаканину і перешкоди Кітріна змогла розібрати кілька слів:\n«...Міністрів узято в заручники в палаці... Банк Абіссинії захоплено... військові бази оточено... протестувальники на підтримку перевороту на вулицях... усім лоялістам Кітве наказано здати зброю... Пазуромони-»\nКітріна зойкнула від люті і жбурнула дороге радіообладнання на підлогу, розбивши його на друзки.\n«Я знала, що це станеться! Репе! Чому ти не розібрався з залишками Пазуромонів?»\nРеп мав наляканий вигляд і помітно зіщулився. «Я... ви не наказували мені-»\n«Чому я повинна тобі щось наказувати? У тебе є власний мозок! Приймай власні рішення!»\n«В-вибачте, Кітріно, а-але-»\n«Нявгіст! Називай мене Нявгіст!» Кітріна важко дихала, намагаючись заспокоїтися. «Або... вже ні...» Вона осіла у своєму кріслі. «Неважливо. Вибач, Репе».\nРеп слабко, тремтливо усміхнувся. «В-все добре, Кітріно», — прошепотів він."
 abyssinia.136.a:0 "Хай живе Дім Пазуромонів!"
 
 abyssinia.137.t:0 "Зупинка роботи"
 abyssinia.137.d:0 "Реп у супроводі кількох охоронців Кітріни вийшов зі сходової клітки і прибув на проблемний робочий майданчик. «Що ви всі робите?» — зажадав він відповіді. «Повертайтеся до роботи, раби!»\nВеличезний натовп рабів різних рас тинявся навколо Машини. Вони майже не звернули уваги на вимогу Репа. Один з рабів, високий жеребець зебри, вийшов наперед. «Ми більше не будемо працювати. З нас досить!»\nКоли раби в натовпі в унісон закивали, тон Репа пом'якшав. «П-зачекайте, дозвольте мені поговорити з Кітріною! Можливо, я зможу вибити вам коротші робочі години?»\nРаби схвильовано загомоніли між собою. Але потім зебра похитав головою. «Запізно. Ця виснажлива праця закінчується зараз». Збудження натовпу зникло, і вони сердито насупилися, дивлячись на Репа.\n«Е-е, як щодо тижня відпустки кожного літа?» — відповів він з усмішкою.\n«Ні!» — сказав жеребець. «Ми вимкнули Машину, і тепер ми підемо». Раби позаду нього зухвало кивнули.\n«Щ-що наконт більшої кількості їжі? Вікна, щоб ви могли дивитися на вулицю?»\n«Час для розмов давно минув. Раби, єднаймося!» — вигукнув зебра і підняв копито в повітря.\n\nКілька охоронців, що супроводжували Репа, підняли зброю, хоч це було й марно проти сотень розлючених рабів. «Опустіть це!» — наказав Реп. «Нікому не потрібно постраждати!»\nЩойно він це сказав, раби кинулися до нього і повз нього, відштовхуючи його та його охоронців убік, щоб вони могли втекти через сходи позаду них.\n«Будь ласка, не робіть цього зі мною!» — безрезультатно благав Реп. «О, Кітріна перетворить мене на сумочку...»"
 abyssinia.137.a:0 "Реееееп!"
 
 abyssinia.138.t:0 "Одкровення"
 abyssinia.138.d:0 "Тисячі котів зібралися перед королівським палацом у Пантері, оскільки їм повідомили, що Нявгіст має «зробити дуже важливе оголошення разом із надзвичайно захопливою демонстрацією». Прибувши, вони побачили, що на балконі палацу було підготовлено різноманітне технічне обладнання. Більш освічені коти впізнали в ньому камери та звукозаписувальні пристрої. Усе це викликало цікавість, змушуючи натовп ставати дедалі більшим у міру поширення чуток. Коли Нявгіст нарешті з'явилася на балконі, коти вибухнули какофонічними вигуками радості.\n«Вітаю вас, мої любі піддані! Я рада бачити, що так багато з вас прийшли сюди, щоб стати свідками початку нової ери. Я готувалася до цього дня багато, багато років, і його настання сповнює моє серце хвилюванням». У її кігтях був флакон з дивною зеленою рідиною, який вона високо підняла в повітря. «Давним-давно я зробила відкриття, яке згодом змінило моє життя. Це, мої друзі, зілля з відьомського бур'яну! Так, ви почули правильно. За допомогою зебри-зіллєвара я дізналася, що цей непотрібний бур'ян можна перетворити на дещо значно більше. Тисячоліттями всі вірили, що коти не мають жодних магічних здібностей, про які варто було б говорити, але це була цілковита помилка. Це зілля розкриває наші сили, які так довго спали! Дозвольте мені продемонструвати».\n\nПоки натовп недовірливо витріщався, а камери знімали її, вона піднесла флакон до губ і випила його вміст. Настала повна приголомшлива тиша, оскільки нічого не відбулося.\n\nА потім Кітріна зістрибнула з балкона, приземлилася на лапи і почала стрімко збільшуватися в розмірах. Невдовзі вона перетворилася на неосяжну велетку. Потім вона підняла лапи і нізвідки викликала хуртовину зі снігу та льоду. Поки вона реготала, а натовп навколо неї в паніці розбігався, з її очей у небо вдарила громохка блискавка. «СТАНЬТЕ СВІДКАМИ СПРАВЖНЬОЇ МОГУТНОСТІ КОТЯЧОГО РОДУ! СКОРО ЦЕ БУДЕ ДОСТУПНО ВСІМ ВАМ! НЕ БІЙТЕСЯ МЕНЕ, А НАЙСЛІДУЙТЕ МІЙ ПРИКЛАД!»"
 abyssinia.138.a:0 "Клянуся Бааст..."
 
 abyssinia.139.t:0 "Вийшло з-під контролю"
 abyssinia.139.d:0 "«Знаєш, коли ти взяла на себе особисту відповідальність за безпеку Машини, я справді думав, що ти впораєшся краще за мене», — сказав Реп, прямуючи за Кітріною, яка підіймалася на скелястий пагорб довгими й гучними кроками в супроводі кількох королівських гвардійців.\n«Тихо, Репе», — сказала вона, люто насупившись.\n«Але це не надто дивно, — продовжив ящір, — враховуючи те, наскільки ти зараз зайнята і все таке. Чесно кажучи, тобі варто було доручити цю роботу комусь іншому».\n«Я сказала, стули пельку», — пробурмотіла Кітріна.\n«Тобі не здається, що ти занадто нервуєш? Ти ніколи не сумуєш за старими добрими часами, коли нам не було про що хвилюватися?»\n«Зараз не час для спогадів!» — вигукнула Нявгіст і дістала бінокль. Вона подивилася на горизонт, де побачила стовп диму, що здіймався від яскравого полум'я. «Хай Бааст їх прокляне, вони підпалили маєток!»\n«Згідно зі звітами, — пояснив Реп, — вони зробили це під час втечі, щоб сповільнити охоронців, які гналися за ними».\n«Так, я знаю, Репе. Від тебе зараз мало користі».\nРеп зітхнув. «Ти ж знаєш, я просто роблю все, що в моїх силах. На жаль, цього рідко буває достатньо, чи не так?»\nКітріна глянула на нього, і на її обличчі на мить з'явилося співчуття, перш ніж вона скривилася. «Я знаю, як ти можеш допомогти. Іди до вузла радіозв'язку та організуй відповідь на цей бунт рабів. Я хочу, щоб уся провінція була очищена від рабів-утікачів якомога швидше, зрозумів?»\n«Так, Кітріно...» — пробурмотів у відповідь Реп."
 abyssinia.139.a:0 "Який безлад."
 
 abyssinia.140.t:0 "Що там кажуть про цікавість і котів?"
 abyssinia.140.d:0 "«Щойно Кітріна дізнається, вона кине вас у море», — з посмішкою сказав Рас Турстон, вилизуючи свою надзвичайно довгу й пухнасту білу шерсть.\nФітаврарі Гумберт злегка посміхнувся. «Я впевнений, що якби я вихваляв її ім'я так само, як ви, вона не заподіяла б мені шкоди».\n«Якщо це зробите ви, це буде виглядати підозріло та нещиро. Залиште підлабузництво професіоналам».\n«Дуже добре. Але ви впевнені, що не хочете мені допомогти?»\n«Мені треба підтримувати репутацію! Я не можу влаштовувати змову проти свого сюзерена. Ааааааале, як я вже казав, я можу благати про пощаду для вас, коли вас неминуче викриють».\n«У мене є краща ідея. Як щодо того, щоб ви попросили її влаштувати бенкет у її маєтку, присвячений її "славі"?»\nТурстон почухав своє пухнасте підборіддя. «Нууууууу, гадаю, якщо я буду достатньо набридливим щодо цього, вона розгляне таку можливість. І, як я розумію, ви хочете запрошення?»\nГумберт кивнув. «Щось трапляється з усіма тими рабами, яких привозять до її маєтку, адже вони ніколи звідти не виходять. Але без вашої допомоги я ніколи не зможу потрапити всередину, щоб усе розслідувати».\nТурстон підняв брову. «Ви підозрюєте, що Кітріна полюбляє м'ясо коней?»\n«Заради Бааст, ні», — сказав він, хитаючи головою, ніби це не був жарт. «У мене є інша зачіпка: численні партії відьомського бур'яну. Я припускаю, що це якось пов'язано з рабами».\nТурстон кивнув. «Дуже добре, тоді я використаю свої найгучніші нявкання, щоб благати Кітріну влаштувати цю подію. Ось так!» Потім Турстон видав гучне, відчайдушне і благальне нявкання. Гумберт здригнувся і закрив вуха."
 abyssinia.140.a:0 "Ми докопаємося до суті."
 
 abyssinia.141.t:0 "Минулі дні"
 abyssinia.141.d:0 "Кітріна йшла на чергову зустріч у королівському палаці, коли перед нею раптом з'явився Реп. Вона зупинилася й насупилася. «Що таке, Репе?»\n«Ти не повіриш, що я знайшов у твоєму маєтку!» Він витягнув потерту книгу в шкіряній палітурці і широко усміхнувся. «Наш старий фотоальбом!»\nВуха Кітріни нашорошилися, а зіниці розширилися. «Д-де ти це знайшов?!»\n«Я робив прибирання, коли ми були там учора, це було закопано досить глибоко в коморі!» Він схвильовано відкрив його і показав їй сторінки. «Дивись, це коли ми грали в бадмінтон? Або коли ми каталися на пенні-фартингу?» На знімках Реп і Кітріна були одягнені в гарне вбрання і їх супроводжували усміхнені коти. На фотографіях не було жодного раба. Ностальгуючий ящір зітхнув. «Що сталося зі старими добрими часами? Чесно кажучи, ти мені більше подобалася до того, як стала могутньою».\nВуха Нявгіст притиснулися, а зіниці звузилися в гострі щілини. Вона дістала флакон і проковтнула краплину зеленого зілля.\n«Кітріно, я...» — встиг сказати Реп, перш ніж Кітріна видула повітря з рота з силою шторму. Він відлетів назад, книга випала з його рук, усі фотографії всередині вирвалися з рамок і розлетілися за вітром."
 abyssinia.141.a:0 "Минуле ніколи не повернеться."
 
 abyssinia.142.t:0 "Занурення в темряву"
 abyssinia.142.d:0 "Поки в маєтку Кітріни тривав бенкет, Фітаврарі Гумберт перепросив і вийшов з-за обіднього столу. Коли Кітріна з цікавістю поглянула на нього, Рас Турстон відвернув її увагу, розповідаючи про те, яка вона чудова правителька. Диплокіт блукав порожніми й тихими коридорами маєтку, уважно все розглядаючи.\nЗрештою він увійшов до вітальні з книжковою шафою. Він придивився уважніше і побачив, що вона вщерть заповнена класикою абіссинської літератури, книгами з історії, енциклопедіями та іноземними посібниками з інженерії. По кілька примірників кожної, насправді, ніби просто для того, щоб заповнити полиці. Гумберт насупився, а потім оглянув каркас книжкової шафи. Він схопився за нього кігтями і спробував потягнути, але той не зрушив з місця. Єдиним предметом на полицях, який не був книжкою, була невелика статуетка Бааст. «Та, що відкриває свою свідомість», — пробурмотів Гумберт і потягнув статуетку. Пролунало гучне клацання, і книжкова шафа відчинилася, відкриваючи кам'яний прохід за нею.\nОбережно він зайшов усередину і спустився гвинтовими сходами, які вели глибоко під землю. Спускаючись, він почув дивну какофонію, брязкіт і скрегіт металу, що донализу й ставали гучнішими з кожним кроком. Нарешті він досяг дна і вийшов у велику печеру, майже повністю зайняту паруючим бронзовим бегемотом, навколо якого, немов мурахи, кишіли сотні рабів, тягаючи візки, повні бур'яну та скляних колб.\nДеякий час він витріщався на це видовище з широко розплющеними очима та відкритим ротом, перш ніж голос, що пролунав ззаду, налякав його.\n«Тобі подобається те, що ти бачиш?» — запитала його Кітріна з посмішкою."
 abyssinia.142.a:0 "..."
 
 abyssinia.143.t:0 "Викриття"
 abyssinia.143.d:0 "«Кітріно, що все це означає?» — зажадав відповіді Гумберт, чий голос був сумішшю гніву та подиву.\n«Мій маленький улюблений проєкт», — відповіла Кітріна і підійшла до нього, а кілька її охоронців слідували за нею. «Я працювала над ним тривалий час, але насправді не починала використовувати його доти, доки Король Шторм не вторгся в нашу країну».\n«Тобто наказали своїм рабам використовувати це?» — запитав Гумберт, не відчуваючи загрози з боку неї та охоронців.\n«Ой, облиш, це краще за каторжну працю на плантації. Крім того, мета тут значно шляхетніша, ніж марна гонитва за прибутком».\n«Я збирався запитати про це наступним».\n«Хіба ти не допитливий? Ти перший сторонній, хто дізнався. Власне, я дозволила цьому статися, бо згодом планую перестати все це приховувати».\n«Просто скажіть мені, для чого все це».\Нявгіст похихикала. «Мета — наше виживання. Скажи мені, шановний Фітаврарі, ти віриш у те, що коти мають магічні здібності?»\n«Всі знають, що у нас їх немає».\n«Всі помиляються. За допомогою раба-зебри, який виявився зіллєваром, я винайшла формулу, яка може розблокувати наші сплячі та вроджені магічні сили. Головний інгредієнт — відьомський бур'ян, якщо тобі цікаво».\nГумберт нічого не сказав і шоковано дивився на неї.\n«І яке це має відношення до нашого виживання? Ну, ти один із більш цивілізованих дворян, тому повинен знати нашу історію. Іноземні держави помикали нами шістсот років, тому що наша нація занадто слабка. І чому так? Тому що є чотири мільйони котів без жодної магії проти решти світу. Єдиний спосіб захистити наш суверенітет — це сила. Пазуромони були занадто дурними, щоб зрозуміти це, тому я вирішила взяти владу в свої лапи. Цей проєкт — єдине, що може врятувати нас від стирання з лиця землі».\nГумберт продовжував мовчати, перетравлюючи те, що щойно почув.\n«Отже, ти збережеш мій маленький секрет, поки не прийде час його розкрити?» Кітріна підняла лапу, а потім випустила кігті. «Повір мені, ти не хочеш стояти на шляху моїх планів»."
 abyssinia.143.a:0 "«...Я буду мовчати.»"
 
 abyssinia.144.t:0 "Зміна планів"
 abyssinia.144.d:0 "«П-повна доза?» — стурбовано запитав Реп. «Ти впевнена, що це хороша ідея?»\n«Я вже приймала менші дози раніше, я впевнена, що зі мною все буде гаразд», — відповіла Кітріна, ліниво сидячи на своєму кам'яному троні.\nДо зали увійшов раб-віслюк, несучи скляну миску, повну густої зеленої рідини.\n«А, ось і воно, нарешті», — сказала Нявгіст із задоволеною посмішкою. «Чому так довго?»\nРаб підняв погляд сповненими жаху очима. «Я-я розлив трохи дорогою і мені довелося взяти ще одну дозу...»\n«ЩО?» — закричала кішка. «Ти, кульгавий муле! Ти знаєш, наскільки цінна ця речовина?!»\nРеп швидко став перед рабом і подивився на неї благальними очима. «Будь ласка, заспокойся, це було менше однієї дози, я подбаю про те, щоб її відшкодували!» Він швидко забрав миску в раба і простягнув її Кітріні. «Ось, тримай!»\nВона примружила очі, дивлячись на нього, і повільно взяла миску. «Добре, цього разу я йому пробачу». Вона піднесла миску до рота і випила весь її вміст, злегка скривившись від смаку. «Я не планувала використовувати це зілля в такій великій кількості вже зараз, але передчасне вторгнення Вінґбардії змушує мене пристосовуватися». З раптовим припливом сили вона розтерла миску в своїх лапах на пил, не отримавши при цьому жодних ушкоджень. «Досить скоро я буду готова роздати це і своїм солдатам... тоді ми станемо НЕЗУПИННИМИ!» Вона зареготала, поки раб з жахом тікав з кімнати, а Реп витріщався на неї, не знаючи, що сказати."
 abyssinia.144.a:0 "Вони навчаться боятися моєї могутності!"
 
 abyssinia.145.t:0 "Ломка"
 abyssinia.145.d:0 "Щойно Реп вийшов зі сходів, які вели до машинної зали, Кітріна підійшла до нього. «О, привіт, Кітріно!» — сказав Реп, видавивши з себе усмішку, щоб приховати нервування. «Ти щось хотіла?» Потім він ніби приготувався до удару, немов Кітріна мала вибухнути від гніву. Однак цього не сталося.\nКотяча Нявгіст потерла руку і нервово озирнулася. Вона важко дихала і дивилася на нього благальними, відчайдушними очима. «Репе, милий... т-ти не бачив ключі від комори з зіллям?»\nРеп насупився. «Е-е, а чому ти питаєш?»\nВона ковтнула слину. «Я не пила зілля вже кілька днів... починається ломка...» Її голос майже переходив у скиглення, і вона була на межі сліз.\nРеп раптом засмутився. «Я... здається, я їх десь бачив! Почекай тут, я піду пошукаю!» Він гарячково вибіг з кімнати й попрямував коридором до своєї спальні. Він стягнув ковдру зі свого ліжка, відкинув подушку і схопив захований там ключ, а потім швидко побіг назад до Кітріни. «Ось! Я знайшов його!»\nЩойно він простягнув його їй, вона схопила ключ і побігла на всіх чотирьох до комори з зіллям, її лапи тремтіли, коли вона її відмикала. Опинившись усередині, вона вилила в рот повний флакон зілля з відьомського бур'яну, видихнувши з полегшенням. «І де ж був ключ?»\n«Я, е-е, здається, ти впустила його на підлогу...» — відповів Реп, намагаючись зберігати спокій.\n«Гм, дивно. Треба буде подбати про те, щоб більше його не губити. Дякую, Репе», — сказала вона і вишкірилася.\nЩось у її виразі обличчя змусило брову Репа сіпнутися. «П-прошу, Кітріно...»"
 abyssinia.145.a:0 "..."
 
 abyssinia.146.t:0 "Доленосний вибір"
 abyssinia.146.d:0 "«Кітріно, нам треба поговорити».\n\nВона насупилася, щойно почула за спиною незвично суворий і серйозний голос Репа. Армійські генерали перед нею, здавалося, не знали, як реагувати. «Хіба ти не бачиш, що я посеред важливої зустрічі?» — відповіла вона, не обертаючись до нього.\n«Це важливіше», — сказав Реп.\nКітріна зітхнула. «Залиште нас», — пробурмотіла вона генералам, які шанобливо вклонилися і покинули залу засідань. Тоді велика магокішка Абіссинії повернулася до свого найвірнішого слуги. «Що може бути важливішим за плани моєї наступної військової кампанії?»\n«Наші стосунки», — прямо заявив Реп. «Чесно кажучи, я більше не можу цього терпіти, Кітріно. Я робив усе, про що ти мене просила, я намагався бути хорошим другом, але після того, як я побачив, що сталося з усіма нашими сусідніми країнами, я просто не можу».\nОбличчя Кітріни спотворилося, коли вона з усіх сил намагалася контролювати свої емоції. «То ти мене кидаєш?»\n«Н-ні, ні...» — він важко зітхнув. «Я хотів дати тобі останній шанс. Вибрати між мною... або тією Машиною. Клянуся, після того, як ти змусила своїх рабів побудувати її, зілля з відьомського бур'яну змінило тебе. Я тебе майже не впізнаю».\nВона змусила себе хихикнути. «Не можу повірити, що ти робиш це зі мною, Репе».\n«Мені шкода, але я досяг своєї межі. Знищ Машину, звільни всіх своїх рабів і залиш собі стільки зілля з відьомського бур'яну, скільки тобі потрібно, щоб уникнути симптомів ломки, поки ти поступово не перестанеш його вживати, або я піду у відставку. І, мабуть, повернуся до Драконячих земель».\nКітріна зціпила ікла і скривилася. Реп просто дивився на неї, його очі були втомленими, але благали її зробити правильний вибір. Секунди тягнулися довго, і вона потерла скроні кігтями. Нарешті вона відповіла. «Я вибираю...»"
 abyssinia.146.a:0 "«...Машину.»"
 abyssinia.146.b:0 "«...Тебе.»"
 
 abyssinia.147.t:0 "Зростання опору"
 abyssinia.147.d:0 "Кітріна йшла перед шеренгою котів в уніформі, схрестивши руки на грудях. «Сім'я Пазуромонів останнім часом завдає багато клопоту. Занадто багато клопоту. Багато солдатів дезертирували і приєдналися до них, відбулося багато актів саботажу та вбивств, мир і порядок опинилися під загрозою. Ваша місія може здатися простою. Знайдіть цих проблемних Пазуромонів і доставте їх мені живими чи мертвими». Вона обернулася, щоб уважно подивитися на одного з оперативників, пильно дивлячись на його стоїчне обличчя. «Але це буде нелегко. Їхній опір добре організований і поширений по всій країні. Особливо у віддалених гірських селах є багато цивільних, які підтримують і переховують цих терористів і повстанців. Вони можуть зливатися з населенням і уникати виявлення. Вони використовують сучасні радіостанції для зв'язку, а також секретні канали й зашифровані повідомлення. Ви розумієте, який виклик стоїть перед вами?»\nКіт, на якого вона витріщалася, відповів: «Так, мем!»\n«Добре». Кітріна відступила назад, щоб усі вони могли її бачити. «Тим не менш, я вірю, що ви впораєтеся. Я надам вам усю підтримку і ресурси, які тільки зможу. Я очікую, що ви прочешете всю Абіссинію дрібним гребінцем, обшукуючи кожен куточок і шпаринку. Думайте про це як... про полювання на щурів, що ховаються в норах. Якщо ви досягнете успіху, я винагороджу вас надзвичайно щедро. Зрозуміло?»\n«Так, мем!» — крикнули всі вони в унісон.\n«Добре. Ви вільні. Я очікую результатів протягом року»."
 abyssinia.147.a:0 "Геть Пазуромонів!"
 
 abyssinia.148.t:0 "Нявгіст попелу"
 abyssinia.148.d:0 "Велике місто поринуло в повну тишу.\n\nКітріна прибула, щоб оглянути військові трофеї, побачити місто, яке вона захопила. Воістину, яким же мегаполісом був Тротжир. Незліченні будівлі та пам'ятники, найкращі зразки арабської архітектури з її куполами та вежами... все пошкоджено або в руїнах. Вона також побачила багато такого, що державні ЗМІ ніколи не наважилися б показати абіссинському населенню вдома: купи обгорілих трупів мирних жителів, величезні ями, вириті для братських могил, процес впізнання абіссинських жертв, де ретельно оглядали невпізнанні купи плоті, польові шпиталі, вщерть заповнені пораненими, що стогнали. Але найгіршим був запах. Смертю смерділо скрізь, куди б вона не пішла, навіть у відносно неушкоджених частинах міста, які оминули бої.\n\nУ супроводі королівської гвардії вона вийшла на центральну площу перед палацом, який колись належав Великому Принцу Сідлової Арабії. Саме з цієї будівлі кілька століть тому надійшов наказ про вторгнення в Абіссинію. Посеред площі стояв флагшток, і солдати віддавали йому честь під час підняття абіссинського прапора. Не було вітру, який би змусив його майоріти, тому він виглядав як закривавлена ганчірка, що звисала з палиці.\n«Ви будете виголошувати свою промову?» — запитав генерал королівської гвардії. «Ми розчистили для неї місце, а камери та мікрофони готові до запису».\nКітріна виринула зі своїх думок. «Га? Ем... Я не... Думаю, мені доведеться скасувати промову. У мене немає бажання її виголошувати».\n«Мем? Ви захворіли? Вам потрібна медична допомога?»\n«Ні, нехай лікарі зосередяться на поранених. Скажіть репортерам, що промову скасовано, і супроводіть мене назад до аеропорту».\nНезважаючи на всі зусилля генерала залишатися беземоційним, він на мить розгублено насупився, після чого низько вклонився. «Як забажаєте, Ваша Величносте».\nГенерал пішов, залишивши її стояти там на самоті. Вона озирнулася навколо і зрозуміла, що ніхто не звертає на неї уваги. Вперше за багато років вона відчула себе абсолютно й цілковито самотньою."
 abyssinia.148.a:0 "Нічого, крім пилу та відлуння..."
 
 abyssinia.149.t:0 "Великий бал"
 abyssinia.149.d:0 "Аристокоти та найбагатші купці Абіссинії зібралися в маєтку родини Кітве, не для якоїсь політичної зустрічі, а на вечірку. Будівля була щедро прикрашена, котячі слуги подавали чудово приготовані абіссинські страви, а найкращі музиканти грали традиційні пісні для підняття настрою. У внутрішньому дворику дзюрчав фонтан з кришталево чистою водою, а навколо нього танцювали пари.\n\nНа вершині сходів, що вели у двір, нерішуче стояла Кітріна. Її волосся було коротко підстрижене, і вона була одягнена в довгу сукню, яку не носила десятиліттями. Вона трохи тремтіла через ломку від зілля з відьомського бур'яну, але їй вдавалося тримати це під контролем.\n«Ти виглядаєш чудово, Кітріно», — сказав Реп, одягнений у смокінг і циліндр.\n«Ти справді так думаєш, любий?» — сором'язливо запитала вона.\n«Прямо як у старі добрі часи!»\nПрожектор раптом освітив Кітріну, і Реп узяв її за лапу. «Вперед, Кітріно! Твоя публіка чекає!»\nВона насупилася. «Я б із радістю, Репе, любий, але ти стоїш на моїй сукні!» — прошипіла вона.\nРеп подивився вниз і зрозумів, що вона має рацію. Він підняв ногу і зніяковіло посміхнувся їй. «Вибач».\n\nВони вдвох спустилися сходами, а коти внизу повернулися, щоб поглянути на них і привітати вигуками. Один із дворян підняв келих і вигукнув: «Нехай живе Нявгіст Кітріна!». Інші у дворі повторили його слова, перетворивши це на радісне скандування.\nКітріна подивилася на них у відповідь і посміхнулася."
 abyssinia.149.a:0 "Хай її правління буде довгим і процвітаючим!"
 
 abyssinia.150.t:0 "Наші котячі друзі"
 abyssinia.150.d:0 "Коли коти увійшли до імпровізованого штабу, який армія рабів облаштувала в захопленому й пограбованому маєтку, раби-охоронці подивилися на них із підозрою та гнівом. Кожен раб, якого вони бачили, був чотириногим: чи то віслюк, чи то поні, чи то кінь, чи то зебра. Жоден із них не сказав їм нічого, жодного вітального слова, і за ними пильно стежили й супроводжували озброєні охоронці аж до особистого кабінету Шарп Спір.\n«Ласкаво просимо, друзі!» — сказала лідерка армії рабів із сяючою усмішкою, коли абіссинці увійшли. «Сідайте, будь ласка, нам є багато про що поговорити».\nКоли коти сіли на свої місця, вони озирнулися і побачили, що раби все ще люто дивляться на них. «Ми очікували теплішого прийому від наших імовірних союзників», — сказав один із котів. «Хіба ми не боремося за спільну справу?»\n«Прошу вибачення від їхнього імені», — відповіла фіолетова кобила. «З ними багато років жорстоко поводилися коти, тому вам знадобиться деякий час, щоб завоювати їхню довіру».\nДехто з котів з розумінням кивнув, інші — ні. «Наш альянс називається "Об'єднаний республіканський фронт"», — сказав інший кіт. «Слово "Об'єднаний" має важливе значення».\n«Згідно з зібраними мною розвідданими, — відповіла Спір, — ви, соціалісти й республіканці, теж не завжди ладнаєте. Найголовніше те, що ми всі йдемо до нашої спільної мети з ефективною координацією».\n«Згоден», — сказав найстаріший кіт у групі. «Отже, тепер ми офіційно передаємо наші нещодавно сформовані ополчення під ваше командування».\n«Так, саме таким і був план цієї зустрічі».\nКішка в окулярах підняла лапу. «Взагалі-то, Абіссинська соціалістична партія хотіла б також обговорити попередні післявоєнні політичні плани».\n«Гарна алітерація», — зауважила Спір.\n«З того, що ми зрозуміли, ваші заплановані політичні кроки відповідають нашим соціалістичним цінностям, водночас зберігаючи республіканську форму правління, якої бажає Народна Ліга».\nВона схилила голову набік і підняла брову. «Що таке "соціалістичний"?» — запитала вона без жодного натяку на гумор у своєму спантеличеному тоні.\nКоти перезирнулися, здавалося, збиті з пантелику її запитанням."
 abyssinia.150.a:0 "Разом ми переможемо!"
 
 abyssinia.151.t:0 "Кінець шляху"
 abyssinia.151.d_gomez:0 "«Я захоплююся твоїми зусиллями і рішучістю», — сказала Кітріна із самовдоволеною посмішкою, дивлячись згори вниз на Ґомеза Нявконнена, який стояв перед нею в кайданах і на колінах. Його голова була низько опущена на знак поразки. «Але, на жаль, цього виявилося недостатньо». Її усмішка перетворилася на перебільшено мелодраматичну похмурість. «Хіба не сумно, що в реальному житті історії не завжди мають щасливий кінець?»\nҐомез нічого не відповів, віддавши перевагу тому, щоб дивитися в підлогу.\n«Яким же трагічним безладом було твоє життя. Спочатку ти дозволив якимось волохатим сірим мавпам пограбувати країну, потім втратив трон, а тепер потрапив у полон до ворога. Мені майже шкода тебе». Раптом похмурість змінилася викривленою, злою гримасою, коли вона нахилилася і схопила Ґомеза за підборіддя, піднявши його голову і втупившись йому в обличчя. «Майже, тому що все сталося саме так, як казала Бааст. Гріхи минулих життів переслідуватимуть тебе до останнього життя. Твої предки відібрали трон у моєї сім'ї, тож я просто повернула його назад. Змирися з цим».\nНа обличчі Ґомеза не було жодної реакції. Його порожній вираз не передавав жодних емоцій.\nКітріна прошипіла і відпустила його, випроставшись. «Здається, він не в гуморі для розмов. Ну що ж. Охороно, сюди! Я вирішила його долю».\nКоролівська гвардія наблизилася, ставши за спиною Ґомеза, готова виконати будь-який наказ, який збиралася віддати Нявгіст."
 abyssinia.151.d_morticia:0 "«Я захоплююся твоїми зусиллями і рішучістю», — сказала Кітріна із самовдоволеною посмішкою, дивлячись згори вниз на Мортішу Аддісу, яка стояла перед нею в кайданах і на колінах. Вона зухвало дивилася на неї. «Але, на жаль, цього виявилося недостатньо». Усмішка Нявгіст перетворилася на перебільшено мелодраматичну похмурість. «Хіба не сумно, що в реальному житті історії не завжди мають щасливий кінець?»\n«Сумніваюся, що твоя історія матиме його», — прошипіла Мортіша.\nРаптом похмурість змінилася викривленою, злою гримасою, коли Кітріна нахилилася і схопила Мортішу за підборіддя. «О, я думаю, що для мене це вже щасливий кінець — бачити твою сім'ю повністю розбитою. Все сталося саме так, як казала Бааст. Гріхи минулих життів переслідуватимуть тебе до останнього життя. Твої предки відібрали трон у моєї сім'ї, тож я просто повернула його назад. Змирися з цим».\nМортіша не злякалася, дивлячись їй прямо в очі. «Твоя сім'я втратила трон не просто так. Можливо, якби вони не були такими абсолютно некомпетентними та корумпованими, вони б не втратили підтримку дворянства та простого народу».\nКітріна прошипіла і відпустила її, випроставшись. «У тебе гострий язик змії! Навіть після того, як ти втратила все! Невже смерть твого чоловіка так мало для тебе значить?»\nНарешті, тріщина в захисті Мортіші. Її стоїчний вираз обличчя помітно здригнувся.\n«Мабуть, ні. Але не хвилюйся, ти досить скоро до нього приєднаєшся. Охороно, сюди! Я вирішила її долю».\nКоролівська гвардія наблизилася, ставши за спиною Мортіші, готова виконати будь-який наказ, який збиралася віддати Нявгіст."
 abyssinia.151.a:0 "«Державна зрада завжди каратиметься смертю.»"
 abyssinia.151.b:0 "«Зрадникам місце в найглибших підземеллях.»"
 
 abyssinia.152.t:0 "Зрадники, всі до одного"
 abyssinia.152.d:0 "«Ще один підрозділ дезертирував?» — сказав генерал королівської гвардії, піднявши густу брову.\n«Так, сер. Востаннє їх бачили, коли вони прямували до території, утримуваної повстанцями».\n«Це не було збігом обставин. Відбувається занадто багато дезертирств одночасно, щоб це було так. Я хочу, щоб ви зв'язалися з кожним командиром підрозділу і наказали їм пильніше стежити за своїми солдатами. Накажіть їм обмежити контакти з цивільними, які можуть бути потенційними шпигунами. Забезпечте негайне припинення поширення будь-якої повстанської пропаганди!»\nКішка в уніформі віддала честь своєму начальнику. «Так, сер!» — вигукнула вона і пішла, залишивши генерала на самоті. Ветеран глибоко зітхнув і попрямував перевірити казарми.\n\nПо прибутті він не побачив жодного солдата, готового віддати честь своєму командиру. Натомість там було порожньо. Розгублено насупившись, самотній кіт уважно оглянув казарму. Зникли не лише коти-охоронці, а й їхнє спорядження. А потім він побачив довге повідомлення, видряпане котячим кігтем на стіні з пісковика:\n«Мій генерале,\nНам шкода, але ми не можемо продовжувати служити режиму, який завдав стільки страждань і нещасть такій великій кількості розумних істот. Називайте нас зрадниками, називайте нас дезертирами — нам байдуже. Ми бачимо себе воїнами свободи. Можливо, ви теж скоро зрозумієте, що солдати повинні служити народу, а не уряду».\n\nГенерал з недовірою дивився на напис, зціпивши ікла та стиснувши лапи. «Зрадники! Всі до одного!»"
 abyssinia.152.a:0 "Хороші солдати виконують накази."
 
 abyssinia.153.t_first_war:0 "Абіссинські повстанці просять нашої підтримки"
 abyssinia.153.d_first_war:0 "Ми отримали таємне комюніке через наші дипломатичні канали. Це послання від керівництва абіссинського повстання, яке зараз веде боротьбу за повалення чинного уряду. Хоча ми офіційно не визнали їх, вони, здається, вважають, що ми готові допомогти їм у боротьбі, надіславши добровольців і припаси.\n\nПро це доповіли [Root.GetLeader]. Крім того, нам вдалося знайти добровольців поза військовим резервом, які готові вирушити до Абіссинії, водночас частину спорядження з армійських складів також можна було б відправити. Проте залишається питання, чи варто взагалі це робити. Абіссинські повстанці мають благородну мету звільнення рабів, яку ми всім серцем підтримуємо, але серед їхніх лав є також соціалісти та республіканці. Мало того, крах або ослаблення абіссинської монархії може бути вигідним для нас, а може й не бути. Цілком можливо, що це може занурити націю в ще гірший хаос, ніж той, від якого вона вже страждає.\n\nЗрештою, рішення має прийняти [Root.GetLeader]."
 abyssinia.153.t_second_war:0 "Вільна Абіссинська Республіка просить нашої підтримки"
 abyssinia.153.d_second_war:0 "Ми отримали таємне комюніке через наші дипломатичні канали. Це повідомлення від керівництва Абіссинської республіки, яка зараз веде боротьбу проти численних повстанців. Вони вже зверталися по допомогу раніше, коли вперше повалили абіссинську монархію, але цього разу вони здаються набагато більш зневіреними. Вони просять усіх охочих надіслати добровольців і припаси, щоб допомогти їм відновити порядок в Абіссинії.\n\nПро це доповіли [Root.GetLeader]. Крім того, нам вдалося знайти добровольців поза військовим резервом, які готові вирушити до Абіссинії, водночас частину спорядження з армійських складів також можна було б відправити. Проте залишається питання, чи варто взагалі це робити. Абіссинський уряд має сумнівну легітимність, незважаючи на їхню ідеалістичну політику, і серед їхніх лав також є соціалісти та республіканці. Вони отримували допомогу раніше і не змогли зберегти мир. Звідки ми знаємо, що вони не зазнають невдачі знову?\n\nЗрештою, рішення має прийняти [Root.GetLeader]."
 abyssinia.153.a:0 "Надішліть усе, що ми можемо собі дозволити!"
 abyssinia.153.b:0 "Ми допоможемо... за певну ціну."
 abyssinia.153.c:0 "Вони впораються самі."
 
 abyssinia.154.t:0 "[From.GetNameDefCap] надсилає нам підтримку"
 abyssinia.154.d:0 "[From.GetAdjective]і добровольці, які прибули через діряві абіссинські кордони, можливо, мали власну зброю, але вони явно не були солдатами. Тим не менш, колишні раби радісно зустріли їх і влаштували теплий прийом, забезпечивши їжею та місцями для ночівлі.\n\nПочувши цю новину, Шарп Спір особисто написала повідомлення, яке мали таємно передати [From.GetLeader], дякуючи їм за щедру підтримку в боротьбі з рабством."
 abyssinia.154.a:0 "Ми вдячні."
 
 abyssinia.155.t:0 "[From.GetNameDefCap] відмовляється допомогти"
 abyssinia.155.d:0 "Від [From.GetNameDef] не було видно жодної підтримки. Натомість як відповідь від [From.GetAdjective]ого уряду було отримано таємне повідомлення, в якому стверджувалося, що вони були б раді підтримати нашу благородну справу, але не можуть цього зробити через обмежені ресурси. Шарп Спір поставила під сумнів те, як у них могло бути менше ресурсів, ніж у повсталих рабів, але не образилася на відповідь. Злість через це нікому б не допомогла. Їм просто доведеться продовжувати боротьбу без їхньої допомоги."
 abyssinia.155.a:0 "Шкода."
 
 abyssinia.156.t:0 "Введення в курс справи"
 abyssinia.156.d:0 "Шарп Спір відмовилася торкатися чашки з гарячою кавою, що парувала на столі, тоді як кішка в окулярах насолоджувалася своєю. «Багато чого сталося з того часу, як я стала рабинею, га», — пробурмотіла вона, заглиблена в думки.\n«Угу. Зимова революція омолодила всіх соціалістів по всьому світу, які втратили надію після провалу Грифонської революції. Звичайно, Скайневія існує, але... нікому насправді немає діла до того замерзлого форпосту».\nСпір підняла погляд від чашки. «Але чому Сталліонград підтримує нас? Між нами цілий океан».\n«Проста фізична відстань не стане на заваді єдності пролетаріату!» — вигукнула кішка, піднявши в повітря стиснуту лапу. «Ось чому щоразу, маючи справу зі Сталліонградом, ви повинні наголошувати на комуністичних цілях нашого режиму. Вони більш ніж раді допомогти будь-яким подібним рухам, яким тільки можуть».\n«Я... Я навіть не знала, що таке соціалізм, доки ви мені не пояснили. Мої цілі просто полягають у тому, щоб інститут рабства ніколи більше тут не відродився, і щоб ті, хто працює на плантаціях і пасовищах, володіли землею, яку вони обробляють».\n«Поки що цього достатньо для соціалізму! Звичайно, Абіссинська соціалістична партія буде більш ніж рада детально розробити майбутній уряд нації. Ми також не можемо нехтувати міським пролетаріатом».\n«Т-а-а-к», — протягнула фіолетова кобила і знову подивилася на свою чашку. «У будь-якому разі, е-е, ви ж знаєте, що я була рабинею на кавовій плантації, так? І мені не подобається її смак, вона страшенно гірка».\nКотячі очі розширилися. «Ох, мої вибачення! Я просто звикла пити це, коли вивчала теорію в школі. Вибачте!» Вона зніяковіло і швидко прибрала напій Спір."
 abyssinia.156.a:0 "Зачекайте, а яка різниця між соціалізмом та комунізмом?"
 
 abyssinia.157.t:0 "Наклеп та дифамація"
 abyssinia.157.d_gomez:0 "Ґомез подивився на листівку у своїх лапах із похмурим обличчям. Не тому, що він був не згоден з написаним у ній, а тому, що його власні помилки призвели до всього цього.\n«Ми зібрали якомога більше цих скандальних листівок, Ваша Величносте», — пояснив голова Королівської гвардії. «Потім масово їх спалили. Будь-які листівки, що були в громадян, конфісковані. Я пропоную заборонити читати або слухати пропаганду, яку поширює ворог».\nҐомез зітхнув. «Це трохи занадто суворо, чи не так? Як щодо того, щоб ми просто поширювали власну контрпропаганду?»\n«Спростовувати всі ці безглузді заяви та звинувачення? Це може спрацювати, Ваша Високосте».\nНявгус похитав головою. «Ні, ні. Зробіть так, щоб усі знали, що це правда. Немає сенсу тікати від істини».\nВуха генерала опустилися. «Але...»\n«Я визнаю свої помилки та помилки моїх попередників і пообіцяю діяти краще, щойно ми покінчимо з цим повстанням».\nНерішуче, кіт-гвардієць віддав йому честь. «Як забажаєте, Ваша Милосте. Але для поширення цього повідомлення знадобиться час. Боюся, без рішучих дій Вашій репутації буде завдано непоправної шкоди».\nҐомез злегка усміхнувся. «Хай буде так. Гірше вже навряд чи буде»."
 abyssinia.157.d_morticia:0 "Мортіша подивилася на листівку у своїх лапах з невдоволеним виразом обличчя. Не тому, що вона була особисто ображена написаним, а тому, що все це було спрямовано або проти її чоловіка, або проти решти її родини. Її там навіть не згадали.\n«Ми зібрали якомога більше цих скандальних листівок, Ваша Величносте», — пояснив голова Королівської гвардії. «Потім масово їх спалили. Будь-які листівки, що були в громадян, конфісковані. Я пропоную заборонити читати або слухати пропаганду, яку поширює ворог».\n«Колись чули про ефект Скретченд? Спроба приховати цю інформацію лише зробить її більш жаданою та популярною. Чому б нам просто не відповісти на ці заяви чесно і прямо?»\n«Спростовувати всі ці безглузді заяви та звинувачення? Це може спрацювати, Ваша Високосте».\n«Ні. Я маю на увазі визнати, що ми все це робили, бо зрештою правда на їхньому боці».\nВуха генерала опустилися. «Але...»\n«Ніяких "але"! Ми дамо чітко зрозуміти, що шкодуємо про минуле і прагнемо винести з нього уроки. Щойно мир буде відновлено, ми зможемо взятися за роботу, щоб зробити Абіссинію кращим місцем для кожної істоти».\nНерішуче, кіт-гвардієць віддав їй честь. «Як забажаєте, Ваша Милосте. Але для поширення цього повідомлення знадобиться час. Боюся, без рішучих дій репутації Вашої родини буде завдано непоправної шкоди».\nМортіша засміялася. «О, я думаю, їй вже й так завдали достатньо шкоди»."
 abyssinia.157.d_catrina:0 "Кітріна навіть не стала читати листівку, розірвавши її на шматки своїми кігтями. «Чому ви вирішили, що я захочу дивитися на цю нісенітницю?»\nГолова Королівської гвардії проігнорував запитання. «Ми зібрали якомога більше цих скандальних листівок, Ваша Величносте. Потім масово їх спалили. Будь-які листівки, що були в громадян, конфісковані. Я пропоную заборонити читати або слухати пропаганду, яку поширює ворог».\n«Хороша ідея. Я якнайшвидше напишу про це указ, а потім підпишу його, щоб він набув чинності».\n«Дуже добре. А поки що продовжуватимемо діяти як і раніше?»\n«Так, паліть кожну листівку і заарештовуйте кожного, кого підозрюєте у причетності до виробництва чи поширення пропаганди. Я подбаю про те, щоб надати Королівській гвардії будь-які розвідувальні дані, які є в розпорядженні уряду».\nКіт-гвардієць віддав їй честь. «Зрозуміло, Ваша Милосте. Я негайно повернуся до роботи і подбаю про те, щоб репутація Вашої родини не була заплямована».\nКітріна звузила очі й зіниці. «Краще б так і було. Ви добре знаєте наслідки провалу, генерале»."
 abyssinia.157.a:0 "Ми повинні зупинити їх, поки не стало надто пізно!"
 
 abyssinia.158.t:0 "Альянс між повстанцями"
 abyssinia.158.d:0 "[From.GetNameDefCap] звернулися до нас із пропозицією про альянс, переважно спрямований проти деспотичної абіссинської монархії. Вони обіцяють підтримати нашу незалежність і готові підписати з нами пакт про ненапад та постійний мир. Натомість вони хочуть, щоб ми підтримали їхні зусилля проти огидного уряду, який так довго пригнічував нас усіх. Звісно, у нас немає причин відмовляти в такому проханні, адже ми більш ніж раді помститися тим, хто жорстоко поводився з нами десятиліттями."
 abyssinia.158.a:0 "Разом ми повалимо злочинну монархію!"
 abyssinia.158.b:0 "Ми вже вибороли свою свободу, вони можуть вибороти свою і без нас."
 
 abyssinia.159.t:0 "Кінець тисячолітньої монархії"
 abyssinia.159.d:0 "«Мем, ми отримали підтвердження, що монарх втік з країни. Звістка про це поширюється як лісова пожежа, і всі ворожі підрозділи, що залишилися, масово здаються».\n\nШарп Спір шоковано дивилася на свого побратима, колишнього раба, з відвислою щелепою.\n«...Е-е, мем? З вами все гаразд?»\n«ТАК!» — заверещала вона і міцно обійняла солдата-зебру. Інші офіцери визвольної армії в командному наметі збентежено дивилися на неї, поки вона сміялася, відмовляючись його відпускати.\nСеннахеріб, командир-віслюк, прокашлявся. «Я знаю, що новини хороші, але в нас багато роботи. Святкування можуть почекати».\nСпір витерла копитом сльозу зі щоки і нарешті відпустила зебру, який з полегшенням зітхнув. «Вибачте, вибачте... ви маєте рацію, але це була найщасливіша новина, яку я чула в своєму житті».\n«Не будь таким серйозним», — сказав віслюку з чарівною усмішкою Фад Аль-Касаар, кінь та "праве копито" Шарп Спір. «Це означає, що найгірше позаду, і відтепер усе буде тільки краще. Чому б не відсвяткувати це трішки? В одному з розграбованих нами маєтків аристокотів було повно вина...»\nСеннахеріб презирливо пирхнув. «Добре. Йдіть усі на вечірку, а я складу плани демобілізації. Хоча я все ще вважаю, що ми повинні тримати солдатів у бойовій готовності, доки будь-який ворожий опір не буде повністю придушено».\n«Можемо ми поговорити про це пізніше?» — запитала його Спір. «Дайте нам спочатку насолодитися плодами нашої неймовірної перемоги».\nСеннахеріб примружив очі. «Як забажаєте, мем»."
 abyssinia.159.a:0 "Майбутнє виглядає світлим."
 
 abyssinia.160.t:0 "Розмова з котом"
 abyssinia.160.d:0 "Зебра та поні, обидва озброєні, супроводжували Деджена Ріс-Моггі до кабінету Шарп Спір. Коли він завагався біля дверей, поні вдарив його по спині прикладом своєї гвинтівки.\n«Гей, припини!» — гавкнула Шарп Спір на солдата, кинувши на нього лютий погляд.\nПерелякані, вони вдвох вийшли, залишивши Деджена наодинці з головою перехідного уряду. Її гнів уже повністю змінився привітною усмішкою. «Перепрошую за це. Будь ласка, сідайте».\nТемно-сірий кіт сів на стілець перед її столом, його поза була жорсткою та прямою. Він нічого не сказав.\n«Я... запросила вас сюди, бо хотіла б, щоб ви стали частиною нашого нового уряду. За попереднього режиму ви чудово справлялися з обов'язками міністра, тож було б шкода дозволити вашим талантам змарнуватися».\nОдна з його брів злегка піднялася.\nПобачивши це, Спір продовжила. «Крім того, більшість нинішніх посад займають представники інших рас. Нам потрібно більше котів, щоб населення Абіссинії, яке становить більшість, мало більше представництва».\nДеджен не підняв другу брову.\nСпір зітхнула і потерла чоло копитом. «Гаразд, гаразд, я не можу вас змусити... тож мені просто доведеться бути чесною». Вона зробила паузу, щоб глибоко вдихнути. «Мені потрібна ваша допомога».\nТепер піднялася і друга брова Деджена. «Для чого?» — нарешті запитав він.\n«Для всього!» — вигукнула Спір, піднявши передні ноги для переконливості. «Я солдат, а не політик! У мене такі великі ідеї та мрії, але я гадки не маю, як втілити їх у реальність. Хай йому грець, я навіть не знала, що таке соціалізм донедавна, але, мабуть, це і є моя "ідеологія" чи щось таке!»\nКіт поправив окуляри. «Розумію. І що змушує вас думати, що я захочу вам допомогти? Навіщо я взагалі вам здався? Я все життя служив монархам».\nСпір залізла на стіл і пильно подивилася на нього. «Без когось на кшталт вас я не зможу зберегти цю країну цілісною. Ви б бачили ту Конференцію. Це диво, що вона не перетворилася на бійку на копитах!»\n«Вам варто було подумати про це, перш ніж руйнувати політичний лад Абіссинії».\n«Слухайте, мені шкода! Через мене ви втратили свою владну посаду. Але я пропоную повернути її назад. Я знаю, що є хороші коти, які хочуть зробити Абіссинію кращим місцем. Повірте, я теж цього хочу. Я хочу гарантувати, що тут більше ніколи, НІКОЛИ не буде рабства, або війни з Мейргиптом, або конфлікту в Мейндалусії. Але я не можу зробити це сама». Вона виглядала так, ніби майже молилася на нього, і дивилася великими благальними очима. «Будь ласка?»"
 abyssinia.160.a:0 "«...Гаразд. За умови, що ви пообіцяєте поводитися більш професійно, ніж зараз»."
 
 abyssinia.161.t:0 "[From.GetNameDefCap] пропонує повернути колишніх рабів"
 abyssinia.161.d:0 "Новий перехідний уряд Абіссинії, який нещодавно повалив правлячу монархію, зробив нам інтригуючу пропозицію. Вони повністю скасували рабство і тепер просять нашої співпраці в організації повернення колишніх рабів до їхніх рідних країн. Абіссинія довгий час була центром работоргівлі, особливо після того, як котяче рабство було оголошено поза законом століття тому. Багато з цих рабів були вихідцями з нашої країни: вони або стали військовополоненими, або були захоплені жадібними работорговцями. Тепер, коли вони стали вільними, вони хочуть повернутися додому.\n\nХоча повернення наших колишніх громадян вітається, ймовірно, воно викличе певні незначні суспільні потрясіння. Багато з них були оголошені зниклими безвісти, а тому втратили своє майно і юридично вважалися мертвими, тому їхнє прибуття спричинить неабиякий бюрократичний безлад. Проте будь-які їхні родичі будуть надзвичайно раді побачити своїх близьких після такого довгого часу, тому це, мабуть, того варте."
 abyssinia.161.a:0 "Ласкаво просимо додому!"
 abyssinia.161.b:0 "Вони стали рабами не просто так."
 
 abyssinia.162.t:0 "[From.GetNameDefCap] погоджується на повернення колишніх рабів"
 abyssinia.162.d:0 "Щойно надійшла звістка про те, що [From.GetAdjective]а влада дозволили своїм колишнім громадянам вільно повернутися, по всій Абіссинії почався невеликий масовий виїзд. Тисячі некотячих пакували все своє майно, яке придбали після звільнення, і вирушали у велику подорож додому. Абіссинський та [From.GetAdjective]ий уряди співпрацювали, щоб гарантувати безпеку їхньої подорожі та надати будь-яку необхідну підтримку. Цікаво, що реакція місцевого абіссинського населення не була повністю негативною. Особливо звичайні коти раділи, бачачи, як інша раса залишає їхню батьківщину, а дехто навіть допомагав колишнім рабам. Однак той факт, що деякі абіссинці вигукували саркастичні расистські образи їм услід, свідчить про те, що вони були раді позбутися їх більше за все."
 abyssinia.162.a:0 "Ми прощаємося з ними."
 
 abyssinia.163.t:0 "[From.GetNameDefCap] відмовляється дозволити колишнім рабам повернутися"
 abyssinia.163.d:0 "Колишні раби, які колись були [From.GetAdjective]ими громадянами, були шоковані та розлючені новиною про те, що їхній уряд відмовився дозволити їм повернутися додому. Перехідний уряд відреагував, пообіцявши подбати про кожного з них, і нагадав, що всім колишнім рабам було надано громадянство. Хоча це заспокоїло декого з них, інші вирішили здійснити ризиковану подорож додому самостійно, без жодної підтримки чи гарантії безпеки по прибуттю. Після цього про них нічого не було чути. Цікаво, що реакція місцевого абіссинського населення не була повністю позитивною. Особливо прості коти висловлювали їм співчуття, будучи не менш розчарованими [From.GetAdjective]им урядом. Однак інші натомість розлютилися на самих ексрабів і погрожували вигнати їх силою, якщо знадобиться."
 abyssinia.163.a:0 "Дуже шкода."
 
 abyssinia.164.t:0 "Судний день"
 abyssinia.164.d:0 "Центральна зала колишнього королівського палацу спорожніла після завершення засідання перехідного уряду. Залишилося лише кілька істот: очільниця нації Шарп Спір, яка похмуро сиділа на своєму місці, її котячий радник Деджен Ріс-Моггі, який перебирав якісь папери, і її довірений генерал-віслюк Сеннахеріб, який проводжав інших лютим поглядом.\n\n«Ну, це була марна трата часу», — прогарчала Спір. «Чому всім так важко домовитися про щось?»\n«Така природа дорадчого прийняття рішень», — пояснив Деджен і відклав папери. «Схоже, останнє слово в цьому питанні залишиться за вами, як за главою держави».\n«Я думала, що зможу розслабитися після всієї своєї важкої роботи з організації революції, але, мабуть, ні». Вона зітхнула. «Чесно кажучи, це важке рішення».\n«Ні, не важке», — сказав Сеннахеріб із презирливим пирханням. «Убийте їх усіх і покінчіть із цим».\nДеджен ніколи ні на кого не дивився люто, окрім цього моменту.\n«Ми вже пролили достатньо крові», — відповіла Спір. «Принаймні я. Але це правда, що вони є потенційною загрозою для нашої безпеки...»\nСірий кіт поспішив її перебити. «Вони можуть бути корисними для нас. Я можу виступити посередником і гарантувати, що вам служитимуть лише ті, хто не має сильної відданості монархії».\nСеннахеріб заричав. «Ви серйозно? Ви маєте бути вдячні, що ми пощадили вас, а натомість ви просто хочете врятувати своїх друзів від правосуддя!»\n«Запевняю вас, друзі в мене є лише поза роботою, і всі вони цивільні. Я не дію з власних інтересів, я просто намагаюся забезпечити плавний перехід до нової форми правління».\nСпір застогнала. Це перетворювалося на повторення щойно завершеного засідання. Їй доведеться прийняти рішення, інакше суперечки ніколи не закінчаться."
 abyssinia.164.a:0 "Нам потрібна будь-яка допомога, яку ми можемо отримати."
 abyssinia.164.b:0 "Нехай гниють за ґратами."
 abyssinia.164.c:0 "Киньте їх в океан!"
 
 abyssinia.165.t:0 "Новий головнокомандувач"
 abyssinia.165.d:0 "«Ви збираєтеся відмовитися від командування збройними силами?» — недовірливо запитав Фад Аль-Касаар, широко розплющивши очі, дивлячись на Шарп Спір.\nВона глибоко вдихнула. «Я вже розповідала вам про свої плани повернутися додому в Мейргипет після майбутніх виборів. Це лише частина моїх спроб забезпечити плавний перехід влади».\nСеннахеріб насупив брови. «І ви запросили нас сюди на цю конфіденційну термінову зустріч лише для того, щоб сказати це? Могли б замість цього просто надіслати нам повідомлення».\n«Ні, перехідний уряд доручив мені призначити нового головнокомандувача армії. І я не можу придумати нікого, хто б підійшов для цієї роботи краще, ніж ви двоє».\n«...Але ми не можемо ділити одну посаду», — прямо заявив Фад, провівши мить у глибоких роздумах.\n«Очевидно, що ні, ти-!» — вигукнув Сеннахеріб, але швидко опанував себе й обернувся до Спір. «Тоді навіщо було його запрошувати?»\n«Тому що мені важко вибрати між вами двома. Я сподівалася, що ця зустріч допоможе мені в цьому».\n«Просто оберіть мене і покінчимо з цим», — відповів віслюк. «Ви добре знаєте, що завдяки моєму ретельному плануванню та твердому керівництву революційна армія була не просто розрізненою бандою, а належним чином організованою силою партизанських бійців».\n«Дозвольте мені бути чесним, мем», — сказав Фад, — «Він не надто популярний серед рядових. Під час повстання я отримував безліч петицій від солдатів із проханням перевести їх з-під його командування під моє».\nСеннахеріб сердито кректнув. «Ба! Моя дисципліна тримала армію разом, і вона все одно була набагато добрішою, ніж жорстокий батіг наших колишніх господарів». На підтвердження своїх слів він вказав на шрам на губах.\n\nШарп Спір втомлено вдивлялася вдалину, заглиблена в думки, адже їй знову доводилося приймати важливе рішення."
 abyssinia.165.a:0 "«Я вірю, що ти виконаєш свій обов'язок, Сеннахерібе»."
 abyssinia.165.b:0 "«Я знаю, що ти мене не розчаруєш, Фаде»."
 
 abyssinia.166.t:0 "Ми, народ"
 abyssinia.166.d:0 "Кішка-посильна увійшла до кабінету, опустилася на коліно перед Шарп Спір і простягнула їй три сувої. «Ваша Високосте, я представляю вам три петиції з найбільшою кількістю перевірених підписів, близько п'ятдесяти тисяч на кожній. Якщо ви бажаєте їх побачити, самі підписи зберігаються в архівах».\nФіолетова кобила усміхнулася і взяла сувої. «Дякую. І ще, будь ласка, не ставтеся до мене як до королівської особи. Я лише тимчасовий глава держави».\nКішка випросталася, але погляд тримала опущеним. «Вибачте, я ще не звикла до цих нових звичаїв».\n«Усе гаразд, ви прощені. Щось іще?»\nПосильна саме оберталася, щоб піти, коли вона про це запитала. «Е-е... можу я висловити чесну думку? Здається, ваш уряд дозволив свободу слова і таке інше».\n«Кажіть», — сказала Спір із підбадьорливим кивком.\nКішка глибоко вдихнула і подивилася їй прямо в очі. «При всій повазі, мем, ви стверджуєте, що принесли нам свободу, але насправді ви нав'язали нам політичну систему, про яку ми не просили».\nУсмішка Спір згасла, і на коротку мить вона не знала, що сказати.\nТієї ж миті посильна витягла захований пістолет і направила його на неї. «СЛАВА ДОМУ КЛОУМОН!» — крикнула вона, піднявши в повітря стиснуту лапу.\nПотім пролунав спалах і гучний постріл, і посильна безвільно впала на підлогу. Позаду неї стояв Фад Аль-Касаар, чиє копито охоплювало курок пістолета, з якого йшов дим.\nШарп Спір дивилася і на труп, і на жеребця, завмерши в шоці, все ще тримаючи в копитах три сувої з петиціями.\n«З вас випивка за це», — сказав Фад і засміявся, ховаючи пістолет назад у кобуру на боці."
 abyssinia.166.a:0 "Прийняти петицію про демобілізацію економіки."
 abyssinia.166.b:0 "Прийняти петицію про обмеження призову котів."
 abyssinia.166.c:0 "Прийняти петицію про повернення промисловості під цивільний контроль."
 abyssinia.166.e:0 "Якщо подумати, ці петиції не відповідають нашим інтересам."
 
 abyssinia.167.t:0 "Доля Мейндалусії"
 abyssinia.167.d:0 "Зустріч Шарп Спір з членами Мейндалуської національної асоціації затягнулася на години, і все погіршувалося тим фактом, що вона стала рабинею під час Мейндалуської війни всі ці роки тому. Потім вона ледве дотягнула копита до ще однієї зустрічі, цього разу з перехідним урядом. Зрештою, на жодній з них не було досягнуто згоди чи консенсусу. Абсолютно виснажена, вона вирушила випити зі своїм другом.\n\n«Виглядаєш так, ніби побувала в Тартарі, поборолася з багбером, а потім повернулася», — пожартував Фад Аль-Касаар, щиро розсміявся і відпив зі своєї чашки кави.\n«Я себе саме так і почуваю», — пробурмотіла Спір і зробила ковток медового вина зі свого кухля.\n«Шкода, що робота на кавовій плантації зіпсувала для тебе каву. Її пиття піднімає настрій!»\n«Як і це», — сказала вона з усмішкою і зробила ще один ковток.\n«Справедливо. Слухай, я знаю, що ти не любиш говорити про роботу, але чи не полегшило б це твій тягар?»\nВона зітхнула. «О, це все через цю суперечку щодо Мейндалусії. Я збиралася просто передати її законним власникам, але, очевидно, ні гривалузійці, ні уряд із цим не згодні. Перші хочуть повної незалежності, другі — лише надати їм автономію».\nФад потер підборіддя копитом. «Звучить складно, так. Але ж останнє слово все одно за тобою, хіба ні?»\n«Ну, як глава держави — так, але...»\n«Тоді просто роби те, що вважаєш за краще», — сказав він, знизавши плечима, і відпив кави.\nСпір насупилася в роздумах і теж зробила ковток."
 abyssinia.167.a:0 "Мейндалусія заслуговує на незалежність."
 abyssinia.167.b:0 "Мейндалуцям доведеться задовольнятися автономією."
 abyssinia.167.c:0 "Ми всі знаємо, хто є законними власниками Мейндалусії."
 
 abyssinia.168.t:0 "Результати відомі!"
