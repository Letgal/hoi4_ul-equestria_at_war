# == (*) ==
 # БЛОК (усе до цього)
 FAL_GATHERING_STORM_DESC:0 "Фалькор, разрушенный опустошительной войной, которая закончилась почти два десятилетия назад, находится в опасном положении между другими великими державами. Принцесса на троне и её муж делают все возможное, чтобы успокоить разозлённое население, но желание отомстить ненавистным вингбардийцам затмевает разум и логику. У грифонов Фалькора мало ресурсов и весьма немного потенциальных союзников, так что они должны приложить исключительные усилия, чтобы страна пережила надвигающийся шторм."
 ARA_GATHERING_STORM_DESC:0 "Маленькое баронство Арантига - место с богатой историей. Это родина древней империи, которая простиралась на большую часть Грифонии. Во главе с Арантигосом Фезерином, арантийцы управляли большей частью мира. Однако Империя рухнула, и баронство - это всё что осталось. Страна преодолела экономические трудности краха Гроверской империи, привязавшись к Вингбардии, но теперь, когда южное королевство постиг кризис, Арантига должна решить, должна ли она оставаться зависимой от юга. Некоторые политики хотят переделать баронство в государство, основанное на современных идеологиях. Однако, Доротеос, многообещающий генерал и потомок великого Фезерина, мечтает воссоздать древнюю Империю."
 FRE_GATHERING_STORM_DESC:0 "Пони из земель, расположенных среди гор юго-восточной Грифонии, живут простыми жизнями, полными мира и гармонии. Альянс многих небольших кланов пони и священных монастырей, Пониян мало интересуется внешним миром, но новая правительница этих земель, Кримзон НикХарт, видит грозовые тучи, собирающиеся над Грифонией.\n\nБудущее Понияна туманно, он должен модернизироваться либо же безнадёжно остаться позади. Но Пониян и Кримзон знают, что любые перемены несут риск разгневать сверхъестественные силы, которые также зовут эти холмы своим домом."
 LCT_GATHERING_STORM_DESC:0 "У Озерграда - авангарда, стоящего на пути грифонов, всегда была бурная история. Озерград был однажды столицей единых речных земель, однако годы внутренних беспорядков и атак грифонов истощили великий город и превратили его население в ожесточенную нацию, закалённую битвами. Но все не так хорошо в стране. Великий мэр Спрингтайм Фрост пришел к власти после того, как его предшественник был убит недовольными офицерами армии, имеющей немалое влияния среди общества Озерграда. Грядут выборы и пони Озерграда надеются на перемены, но есть и те, кто видит выборы как возможность для достижения собственных целей."
 WIT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_WIT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nВиттенленд, древнее королевство единорогов и магии, гордится своими меритократическими традициями, где монарх выбирается на магическом поединке, а не на основании линии наследования. И всё же за прошедшие столетия королевство застряло в прошлом и стало лишь тенью своего былого я. Теперь его могущественные маги-аристократы довольствуются жизнью в горных замках. Но времена меняются, и Виттенленд также должен измениться. У всех есть разные идеи относительно будущего нации, поэтому правящая королева-реформатор Уайт Стар должна умело ориентироваться в опасных интригах политики Виттенленда, если она надеется спасти свою нацию от гибели."
 NIM_GATHERING_STORM_DESC:0 "С древних времен Нимбусия была демократией, управляемой классом воинов-пегасов. Эти стойкие пони - одни из лучших солдат в Грифонии, но для их обеспечения нужен большой класс илотов. У демократической нации впереди бурное время. Мнения разделились между теми, кто хочет реформ, теми, кто хочет отменить демократию, и теми, кто защищает традиции. Умный и здравомыслящий политик сможет воспользоваться ситуацией, чтобы завоевать сердца жителей Нимбуси."
 DMT_GATHERING_STORM_DESC:0 "Хранилища Короля Алмазной Горы пусты, сокровища украдены рыцарями-грифонами. Нация псов должна восстановиться, чтобы король Ровер Алмазный Щит смог отомстить ворам. Однако не всё так спокойно под горой, рабы бунтуют и могут восстать. То, как псы Алмазной Горы справятся с этими волнениями, возможно, изменит их общество навсегда..."
 LUS_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГрифони Люші довго притримувалися своїх відсталих шляхів. Країна розділена між могутніми лордами, які правлять своїми кріпаками. Ці кріпаки досі прикуті до своєї землі і здебільша неосвічені. Однак молодий князь, Еліас, бажає реформувати князівство, розібравшися з лордами та звільнивши кріпаків. Але його брат Жерар має на державу інші плани, якщо йому вдасться прийти до влади..." # (&?)
 RCT_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_RCT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nВелика принцеса Софт Уотер була останнім самодержцем Рієкограда. Вона не мала спадкоємця й забажала уникнути кризи спадкування, тому віддала всю свою владу демократичному парламенту. Після її смерті в 814 році, Рієкоград став Річковою республікою. Відтоді держава тішиться епохою миру та процвітання: вона стала засновницею Коаліції та стала центром торгівлі Річкових земель, із усіх боків захищена горами. 1001 року молода єдиноріжка на ім'я Ривер Свірл стала канцлером. Під час своєї першої каденції вона осучаснила Республіку, обернувши її на найрозвиненішого члена Коаліції. Однак ріст має свою ціну, а соціалісти на чолі з Нова Вірл швидко набирають сили..."
 NCH_GATHERING_STORM_DESC:0 "Гринклиф - это гармоничная страна чейнджлингов, возглавляемая королевой Гитой из клана Липидоптера. Последняя из 800-летней династии, Гита придерживается старых подходов к жизни, принятых ещё во времена Первого обмена. Они обеспечили мирное, но однообразное правление.\n\nНо в воздухе чувствуются изменения и королева знает, что они быстро приближаются. Её народ плохо подготовлен к надвигающейся буре, и Гринклиф нуждается в пересмотре отношений с жителями континента. Пони из Речной Коалиции могут стать хорошими союзниками, но прежде они никогда не встречались с чейнджлингами, так что Гринклиф должен предстать перед ними в лучшем свете..."
 HLQ_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HLQ_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nСтойкие стражи восточной границы, рыцари Хеллквилла долго были защитниками Империи от атак речных пони. Но эти клятвы были забыты после краха Империи 30 лет назад, и теперь Хеллквилл независим и поддерживает тесные отношения со своим союзником - Лонгсвордом. Нынешний грандмастер Ордена стар и вскоре уйдёт в отставку, а после этого в Хеллквилле могут произойти изменения, но какими они будут?"
 LNS_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_LNS_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nВерный союзник Хеллквилла, небольшая страна Лонгсворд пережила множество нападений речных пони. Они доблестно сражались вместе со своими братьями из другого ордена. После обретения независимость от Империи, Лонгсворд наслаждался относительной стабильностью, пока граф Паллас Даскталон не пригласил реформистов, радикальную группу грифонов из Хеллквилла, чтобы разобраться с проблемой пони. Постепенно они получили власть над всей нацией, и теперь начали полное очищение земель Лонгсворда от пони, которых они считают лишь грязными паразитами."
 BRF_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Бродфельд — молода держава, чия нещодавня історія повна страждання. Грифони Прайвену пережили багато лих від Великого голоду 995 року до тепереішньої громадянської війни проти комуністів-революціонерів. Дехто шукає спасіння в королі та допомозі богів, поки інші сподіваються на реформи, які обернуть королівство на конституційну монархію, однак усі вони борються проти червоної загрози, котра бажає скасувати все, що їм дороге. Вони можуть сподіватися на підйом своєї країни з попелу, наче фенікс, тільки якщо переможуть." # (&+)
 SRS_GATHERING_STORM_DESC:0 "В холодной заснеженной тундре на грифоньем Крайнем Севере Социалистическая Республика Скайнавия выступает в качестве последнего бастиона эгалитаризма, свободы и социализма в мире, который день ото дня становится всё темнее. Созданная на захваченной у пони территории социалистами, изгнанными после неудавшейся Первой Грифоньей Революции, Социалистическая Республика должна стремиться сохранить свои свободы, одновременно защищая мечту о социалистической Пан-Грифонии от сил реакционеров, которые окружают республику со всех сторон и угрожают ей на каждом фронте. Достигнет ли Республика воплощения своих утопических идеалов в ближайшие годы, или же рухнет под давлением изнутри и снаружи?"
 VED_GATHERING_STORM_DESC:0 "Ведина является страной с долгой историей независимости, благодаря тщательному политическому маневрированию она не склонила головы перед Империей, но и не пала жертвой революции. Знаменитые рыцарские традиции Ведины появились одновременно с рождением страны и широко известны по всему миру. Но проблемы возникли из-за кризиса престолонаследия, поскольку дочь короля не готова править и должна доказать, что будет достойной королевой Ведины. Но какой она будет королевой? Это ещё предстоит выяснить."
 GRU_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nМинуло небагато часу відтоді, як вільні міста Ґрифусу відновили свою золоту свободу від деспотичної Імперії, але незгода всередині вже загрожує країні та її цінованій волі. І фанатичні лицарі з Герцланду, і сікамеонська купецька компанія борються за більшу владу, мало переживаючи за бажання самих міст. Щось треба вдіяти скоро, інакше цю свободу буде знову втрачено..." # (&+)
 CYA_GATHERING_STORM_DESC:0 "Цианолизия когда-то была верным вассалом Империи, но теперь оказалась в затруднительном положении, и исполнять обязанность по удержанию минотавров под контролем внутри и за пределами их границ с каждым днем становится всё труднее. Графиня уверена, что солдаты верны ей, а возможный заговор среди них - лишь слухи. На другом берегу залива реваншистский Астерион готовится к войне, и Цианолизия должна сделать все возможное, чтобы подготовиться к неминуемому."
 MIT_GATHERING_STORM_DESC:0 "Минотавры Астериона устали служить деспотам и тиранам и вырвались из своих оков. Однако первая освободительная война не смогла перекинуться и на материк, где до сих пор страдают сотни тысяч минотавров. С тех времён прошли десятилетия, и некоторые обратились к более радикальным идеям вроде коалиции между фашистами и коммунистами, но все минотавры по-прежнему согласны в одном: смерть монархистам!"
 SIC_GATHERING_STORM_DESC:0 "Сикамеон — это страна свободных грифонов, в которой нет ни одного дворянина или рыцаря. Тем не менее, им удалось создать стабильную и процветающую нацию, построенную на прочном демократическом фундаменте. Но они слабы в военном отношении, и все в Сикамеоне знают, что нужно что-то делать, когда близится тропический шторм. Но что именно? Никакого соглашения пока не было заключено, но выборы медленно приближаются и что-то нужно будет сделать в ближайшее время."

 STW_GATHERING_STORM_DESC:0 "Клубничное Герцогство - место, знаменитое своим вином и культурой среди грифоньей элиты, и её правящая семья долгое время уступала только имперской линии Гроверов. Это владение герцогини Габриэлы Иглкло - одного из самых стойких защитников империи во время революции. Тем не менее, не всё хорошо в Герцогстве в эти дни. Герцогиня проводит всё больше времени вдали от своих владений в Грифенхейме, и некоторые из её подданных задаются вопросом, не забыла ли она о них. Может быть, пришло время для Клубничного Герцогства заявить о себе за пределами, вырвавшись из хватки герцогини? Или, может быть, Клубничное Герцогство снова станет тем оплотом верности, которым оно всегда было?"
 ANG_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ANG_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЭнгривер, лежащий в обширном лесу Шайсвальд, всегда был одним из самых бедных и отсталых регионов в Империи. Густой лес служит убежищем для монстров и бандитов, а также препятствует развитию региона. Во время революции 978 года Барон Леер сохранил свою власть благодаря поддержке Гроссмаршала Штойбера, но с тех пор они оба отдалились, и Штойбер начал презирать жестокость Леера. Сегодня власти Барона угрожают остатки республиканцев, мятежники-анархисты и прочие заговорщики. Поскольку так много групп борются за власть, будущее Энгривера туманно."
 PYT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_PYT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nСельскохозяйственные земли Грайфенмаршена когда-то управлялись деспотичным герцогом, который был свергнут местными крестьянами. Поскольку он был врагом императора Гровера I, крестьяне были вознаграждены автономией, пока были верны империи. И так родилась крестьянская республика, что продолжает существовать и по сей день без особых изменений. Это прямая демократия с выборами каждые 3 месяца и проведением референдумов по всем возможным вопросам. Она очень демократична, но и обременительна. Однако до сих пор Грайфенмаршену не нужно было быстро меняться или адаптироваться, и страна по-прежнему довольна своим сельским раем. Это скоро изменится. Навсегда."
 BRZ_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BRZ_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГоворят, что единственные существа, которым император может доверять безоговорочно – это алмазные псы Бронзхилла. В 792 году император Гровер II передал Бронзовые горы группе бывших рабов, сбежавших из Алмазной Горы. С тех пор графство Бронзхилл развивалось и процветало как лояльный имперский вассал. Однако распад империи и республиканское восстание 978 года нанесли урон экономике графства немалый ущерб и она оказалась в когтях иностранных инвесторов. Возникшее напряжение привело к тому, что всё больше псов ставят под сомнение абсолютную власть графа. Здоровье Гровера V стремительно ухудшается, и гончие Бронзхилла с тревогой задаются вопросами о будущем."
 KAT_GATHERING_STORM_DESC:0 "Несмотря на то, что Катерин расположен на окраине империи, он яростно борется за то, чтобы оставаться на плаву в современную эпоху. Две великие беды почти разрушили страну. Первой была революция 978 года, в результате которой погибла почти вся правящая семья из Катеринбурга, а также была разрушена большая часть города, а вторая - единственная выжившая наследница престола - Диеллза фон Катеринбург - является сумасшедшей и её капризное и жестокое правление оставил нацию балансировать на грани. Преодолеет ли Катерин своё тёмное прошлое, или безумие принцессы разрушит его?"
 YAL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_YAL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЙель - номинальный вассал Империи Грифонов. Он был академическим центром Империи в течение нескольких поколений, а ректоры Йеля в конечном итоге стали управлять нацией. Но поскольку Империя в последние годы пришла в упадок, в Йельском Ректорате возникли трения. Йелю не хватает национальной самобытности, а слабое здоровье императора углубляет социальные разногласия. Лидер страны, ректор Микусян, стремится вести умеренный курс, в то время как революционные и реакционные университеты пытаются использовать недовольство в обществе для достижения своих собственных целей. Будет ли свет Йеля ярко сиять в темноте, или он погаснет, как и многие другие места просвещения до него?"
 FEA_GATHERING_STORM_DESC:0 "Тяжелые времена пришли в герцогство Фетизия. Правление текущего правителя Герцога Герлаха IV, который принес стране конституционные реформы и процветание, омрачено катастрофой и распадом, поразившими великую Империю Грифонов, а также последовавшей войной. Последней каплей было вытеснение Скайфолом фетизских компаний со своих рынков, что привело к экономическому коллапсу. Уровень бедности очень высок, уверенность в вечном статус-кво почти исчезла, а группы радикальных социалистов и националистов набирают силу. Может ли ситуация вернуться в норму и сможет ли Фетизия вернуть величие? Или нужно предпринять решительные меры ради грифонов Фетизии?"
 ROU_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ROU_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГород Ромау очень долго сохранял политический нейтралитет. Как один из Вольных Городов Империи, Ромау наслаждается многими экономическими свободами и военной защитой. Это привело к сильной зависимости Города от империи, и политическая структура города может не пережить грядущий коллапс Империи - главного инвестора и защитника. Тёмные тучи собираются над империей, и от её судьбы, скорее всего, будет зависеть и судьба маленького Ромау."
 TRD_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TRD_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nВ Торговой Федерации Скайфол правят богачи, мало обращающие внимания на Империю, их бывшего сюзерена. Железный Канцлер Гишар управлял Федерацией с момента её основания, изгнав Имперский гарнизон и захватив Имперский флот. Но Гишар - старый грифон, и ясно, что ему осталось недолго. Олигархи видят в этом свой шанс захватить его трон, угнетённые рабочие готовятся к революции, его молодая племянница мечтает о демократии, а в тени ведутся переговоры с архонтами Грифенхейма..."
 FEZ_GATHERING_STORM_DESC:0 "Как и соседний Скайфол, Фезера является процветающим торговым портом на западе Грифонии и местом появления культовой грифоньей фески. Однако, в отличие от своего богатого и знаменитого соседа, получение независимости во время Грифоньей Революции не привело к новому золотому веку. Скорее наоборот, город начал увядать, погряз в политической суматохе и активности мафии, и только неутомимая полиция Фезеры предотвратила тотальный хаос. Но появился один грифон, рожденный в Скайфоле - Гвенаэль Годар. После бурных выборов он пообещал вернуть Фезеру к величию. Конечно, у него нет абсолютно никаких связей с контрабандистами и мафией, несмотря на заявления некоторых полицейских."
 FLO_GATHERING_STORM_DESC:0 "Небольшой, но чрезвычайно богатый город Фловена сумел защитить свою независимость как от Аквелии, так и от Империи. Богатые патриции, владеющие банками, правят городом, не обращая внимания на простых рабочих, и выбирая мэра из своих. Нынешний мэр принимает очень мало решений и проводит слишком много вечеринок. Но недавно что-то изменилось в нём. Теперь у него появились большие амбиции, и он планирует вскоре раскрыть их своим согражданам ..."
 AVI_GATHERING_STORM_DESC:0 "Дом Авиан когда-то был частью гораздо большего герцогства Верения. Оно было относительно процветающим, несмотря на языковые проблемы. Однако грифонья революция опустошила Верению, в результате чего многие члены правящей семьи погибли, что привело к кризису престолонаследия между ветвями домов Эйри и Эри. Леди Катрина Авиан предпочла держаться подальше от конфликта и отделилась во главе того, что сейчас известно как дом Авиан. К сожалению, это завело кризис в тупик, а языковой разрыв лишь усугубился. Удастся ли дому Авиан объединить разделенные герцогства и пережить грядущий шторм? Или он останется лишь сноской в истории возвышения иного государства?"
 HAU_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HAU_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГаукленд — одна з численних держав-уламків, що виникли після розпаду Грифонської Імперії. Очолюваний ексцентричним льотчиком-асом Германом Маєром, він стоїть на роздоріжжі між Грифонією та Еквусом і став осередком піратства, до того ж піратів із підтримкою з повітря, не менше. Незважаючи на свій статус воєначальника, Маєр править державою як доброзичливий диктатор, задовольняючись тим, що залишає людей у спокої, поки вони не зазіхають на його владу і дозволяють йому його витівки. Роками він дозволяв Гаукленду плисти за течією, залишаючись у безпеці та процвітаючи у свій унікальний і рудиментарний спосіб, але тепер йому, здається, набрид статус-кво. А гауклендці знають, що Маєр ніколи не буває таким небезпечним і непередбачуваним, як тоді, коли йому нудно."
 LAK_GATHERING_STORM_DESC:0 "Крошечный остров Румейра, по мнению многих, является раем, который избежал опустошения, вызванного распадом Империи. Но культура и язык местных жителей могут вскоре стать частью этой самой истории, так как они проигрывают более популярной герцландской культуре. Новый барон, Аларик, бывший наемник, вернулся в свой дом, чтобы сменить покойного отца, полон решимости спасти свое умирающее наследие, пока не стало слишком поздно, и вернуть своей нации былую славу. Rumare am byth!"
 NCR_GATHERING_STORM_DESC:0 "Война. Война никогда не меняется.\n\nМир, нетронутый ужасами, снизошедшими на Землю. Настоящий рай. Так Эквестрию видит НКР. Портал, который связывает эти два мира был лишь недавно обнаружен, но НКР уже поторопилась занять эти земли. Теперь, Экспедиция НКР - ценнейшее владение республики, которое распространяется на оба мира. Но им тут не рады. За эту землю была пролита кровь, и путешественники принесли с собой много удивительных новых идей через врата."

 BAK_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПони Бакары бороздят моря вдоль северо-восточного побережья Грифонии, торгуя со своими соседями и собирая океанские богатства, как они делали уже на протяжении бесчисленных поколений. Помимо гордости за своё господство над волнами, бакарцы гордятся своей родиной, которая является одной из старейших республик в мире и служит маяком демократии и справедливости. Однако выборы, которые пройдут чуть позже в этом году, уже столкнулись с беспрецедентным уровнем политического насилия. Сохранит ли Бакара свой курс или пришло время ей вырваться из оков прошлого и создать новый порядок для Речных Земель?"
 BAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПроклятыми землями Баррада правит Амброзий, пони, растолстевший в полной декадентства и роскоши жизни, но уставший от этой экстравагантности и решивший обратившийся к чёрной магии, дабы удовлетворить свое любопытство. После ужасного и необъяснимого катаклизма, который опустошил Баррад, никто не осмелился бросить вызов правлению самопровозглашенного графа Амброзия. Так что теперь безумный граф мучает своих подданных ради собственного развлечения, а ему помогают четверо честолюбивых путешественников, которых соблазнили его предложения власти и запретных знаний. Вместе они образуют Пентархию и проводят свои исследования и эксперименты без каких-либо этических ограничений."
 OLV_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_OLV_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЕйстюрланд розташований у східних межах Грифонії і вирізняється тим, що є єдиною країною на континенті з більшістю оленійського населення. Країна берсерків і вікінгів, Ейстюрланд століттями залишався фактично у феодальному стані. Але така ситуація не може тривати вічно, і потрібні нагальні реформи, якщо Ейстюрланд сподівається стати чимось більшим, ніж просто державою-залишком на краю континенту. Сходження нової ярлскони, Іґрітте, дало можливість для реформ, але її особистість та минуле залишаються загадкою."
 ZES_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZES_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНароджена з повстання рабів, Вільна держава Каза існує на берегах південно-східної Грифонії вже майже століття. Готова захищати свою важко здобуту свободу копитами й зубами, Каза стала притулком для віттенлендських кріпаків, ейстюрлендських трелів і ґрифуських кабальних слуг. Оскільки її поважна лідерка, Мансу Ерба, старіє, постало питання: хто візьме на себе керівництво цією державою-притулком, коли її вже не буде? Чи зможе маяк свободи продовжувати сяяти, чи він згасне в темряві прийдешньої епохи?"

 FRN_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_FRN_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГрафство Францистрия всегда находилось между сферами влияния Аквелии и Вингбардии. И хоть это государство было основано членом династии Дискретов, оно, тем не менее, установило тесные связи с Карфинским Пактом. После падения Империи Францистрия воспользовалась членством в сильном альянсе и аквелийской революцией, дабы захватить Таррин, на который они претендовали в течение долгого времени. Но после Фалькорской войны всё покатилось под откос. Граф умер, его наследник стал марионеткой знати, Вингбардия находится в кризисе, а тарринцы яростно сопротивляются оккупации. Сможет ли маленькая нация пережить эти тёмные времена, или её поглотят более великие силы?"
 TAL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TAL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nС незапамятных времён горы защищали жителей Талузы от бесчисленных захватчиков и иноземного влияния. После отделения Вингбардии Талуза поспешила присоединиться к ней, так как Карфинский Пакт, казалось, обещал всем бесконечное процветание. Однако война с Фалькором и её последствия разрушили эти надежды. Экономика этой страны, что некогда была одной из самых процветающих в Грифонии, теперь находится в бесконечном кризисе, а население с каждым днем становится всё радикальнее под влиянием агитации социалистов и фетиволистов. Ситуация выходит из-под контроля, и сможет ли Талуза выйти из своего укрытия и встретиться лицом к лицу с миром? Или трусость этой нации приведёт к её концу?"

 HIP_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HIP_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nГіпогрифія — це домівка гіпогрифів і морських поні. Це – гармонійна абсолютна монархія, яка досі відновлюється від років ізоляції під морськими хвилями. Королева Ново захистила свою країну під час Війни Шторма, однак дехто вважає, що вона могла би зробити набагато більше, щоби зупинити спустошення з боку Короля Шторма. Але навіть поки королівський двір вагається в питанні мінливого світу та врівноважує вимоги міжнародної дипломатії й ізоляціоністів у себе, сюди проникають нові ідеї. Республіканізм і навіть комунізм переживають зліт, і ще належить побачити, як відповість королеа. Чи збереже Гіпогрифія курс гармонії, чи прийме екстремальні ідеї лівих, а може впаде в реакцію, щоби уникнути їх?" # (&)
 TBK_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_TBK_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nТобук - это скорее город, чем государство; крошечный клочок земель, недавно отнятый у зарантийских племён королём Штормом. Торговцы оружием, оппортунисты и их друзья-военачальники захватили эти земли после поражения короля Шторма и превратили город и его окрестности в прибежище для добрых и не очень добрых существ. Этот город полон возможностей для любого, кто захватит в нём власть, но для их реализации молодое государство должно пережить грядущие бурные годы..."
 BAT_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_BAT_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПосле поражения Найтмер Мун тысячу лет назад многие её сторонники бежали из Эквестрии, ища место для восстановления и тайного перевооружения. Так на землях Зебрики появилась Хироптерра - крайне милитаристское рабовладельческое государство, стремящееся приблизить Её возвращение. Эти поклоняющиеся Найтмер фанатики накопили внушительные силы в виде имперских легионов и потратили на подготовку и планирование долгие десятилетия. Они готовы оказать помощь Найтмер, ежели она восстанет во второй раз, но сумеют ли они привести Её к власти?" #Mara
 MGY_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_MGY_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nИстория Мейргипта насчитывает многие тысячелетия: его Старое Царство достигло славных высот и воздвигло грандиозные памятники, но в конце концов было завоёвано Седельной Аравией в 567 году и в течение многих веков находилось под чужеземным владычеством. После обретения независимости в 987 году Мейргипет процветал, но хорошие времена были прерваны вторжением короля Шторма, который разграбил страну и причинил вред множеству пони. Однако именно в это мрачное время Сомнамбула - великая героиня из легенд Мейргипта - вернулась из Лимба. Её чудесное возвращение дало пони новую надежду на будущее, но надолго ли?"
 ZAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЗарантия - новый игрок на мировой арене. Государство родилось всего пятьдесят лет назад после того, как племена имазебов освободили город Тобук. Это государство должно было стать союзом между пони и зебрами, компромиссом между силой и безопасностью, и возможностью сохранить свои традиции. Однако эти амбиции разрушило вторжения короля Шторма, после чего Тобук захватили иностранные преступники. Племена отступили на свои старые земли, и теперь готовятся ко дню воссоединения со своими сестрами и братьями пони. Если это произойдёт мирно, то они возрадуются. Если же им придётся отвоёвывать город силой, то они не будут колебаться."
 CTH_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CTH_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nМогучий Кольтфаген пережил вторжение короля Шторма. Залатель Зарка был избран Сенатом вести страну к славе, несмотря на обвинения в коррупции и подтасовке результатов выборов. Он стремится восстановить нацию и вернуть ей древнюю славу. Однако ряд влиятельных группировок набирают силу и стремятся выдвинуть собственные претензии на власть. Другие же хотят избавиться от коррупции и вернуть времена старой республики, пока зебры на востоке требуют земельной реформы и расширения автономии. Сможет ли Залатель выстоять, или Кольтфаген рухнет под тяжестью проблем?" #Mara
 CTL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_CTL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nОленийцы Читала, наследники древних морских королей викингов, теперь сталкиваются с угрозой своей культурной и политической гегемонии, которая куда опаснее любого восстания южан или религиозного пробуждения: инакомыслие их собственного ярила. Бенджен V, коронованный совсем недавно после смерти своего брата и отца, создал Совет Семи, дабы погасить недовольство среди коренных хиндийцев Читала, но теперь сам Совет стоит на грани открытого восстания. Южные интриганы, пламенные реформаторы и стареющая бюрократия - все они борются за одобрение доброго викинга, в то время как экстремисты с севера и юга плетут против него заговоры. Смогут ли Бенджен и его Совет выжить, или они падут, как Дирлаг до них?" # Deerlaw -> Danelaw -> Денло -> Дирло -> Дирлаг
 WAR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_WAR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nРасположенное на западной окраине Зоникии королевство Варзена просуществовало многие тысячелетия. Однако недавние события потрясли королевство до глубины души. Вторжение короля Шторма опустошило страну, лишив её богатств и короля, которого сменил на троне его неготовый к короне брат. Тем временем антимонархические элементы предпринимают попытки свергнуть древний режим, а на границах страны нарастает внешняя угроза. Удастся ли королю удержать свою корону, или его враги наконец-то сокрушат древний режим?"
 HEL_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HEL_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nСпустя двадцать лет после успеха революции разбойников, партизан и старообрядцев, освободивших Аделарт от ига грайфвальдцев и их аквелийских владык, Аделарт снова стоит на пороге порабощения. Раздираемая внутренними противоречиями и преследуемая скорым возвращением бывшего шерифа, ожесточившегося за двадцать лет изгнания, раздробленная коалиция фанатиков, верующих и идеалистов должна стать чем-то большим, чем простой конфедерацией бандитов, удерживаемой вместе лишь силой воли... или убедить своих граждан, что чувство братства всё же сильнее раздоров."
 SLC_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_SLC_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНесмотря на таланты и доблесть генералов Короля Шторма, из них мало кто обладал достаточным политическим влиянием, чтобы вступить в борьбу за трон после его смерти. А большинство из тех, кто всё же мог побороться за власть, уже создали свои собственные королевства по всей Зебрике. Остальные оставшиеся в армии йети с позором вернулись из Гиппогрифии. Однако была и та, кто никогда не ставила на кон каждую свою победу, чтобы в конце столкнуться с позорным поражением при Эйн-Тротгуре. Та, что была способна управлять населённым преимущественно зебрами регионом, не вызвав при этом восстания. Та, кто предвидела катастрофу, которая постигнет королевство. Ибыз Айспау."
 PLB_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_PLB_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nНа північних берегах Еквуса білі ведмеді нещодавно об'єдналися в сучасну цивілізацію. По Уеллінгтон, могутній воїн, який об'єднав клани, незабаром почне свій п'ятий рік правління. Проте його становище залишається хитким, і клани все ще невдоволені його владою. Але з чейнджлінґами на південному заході їм, можливо, доведеться навчитися співпрацювати. Чи зможуть ведмеді вистояти і уникнути завоювання своїми стародавніми ворогами?"
 KIR_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_KIR_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nСтолетие назад были введены указы Безмолвия в попытке спасти Кирию от хаоса и раздоров современной цивилизации. Сегодня Безмолвие отменено и царство выходит из самоизоляции в опасный и нестабильный мир, полный враждебных идеологий, хищных империй и войн. Чтобы осуществить свою мечту об открытой и процветающей Кирии, идеалистически настроенная премьер-министр Отэм Блейз должна использовать всё своё мастерство и смекалку, дабы вывести киринов из тёмного прошлого в неспокойное настоящее. Но не все согласны с тем как должна идти модернизация страны. Если вы не справитесь, то наступившая Какофония заставит киринов возжелать тишины нового Безмолвия."
 SON_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_SON_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПорабощённый Имперским Мазви века назад Зар-Хэй вновь обрёл свободу вскоре после вторжения Короля Шторма. Однако у королевства нет короля, ибо никто не знает местонахождения законного наследника трона. Пока что страной правит регент Зонни, поклявшийся превратить Зар-Хэй в империю, которая никогда более не будет страдать от чужеземного ига. Никто не знает, удастся ли ему реализовать эти амбиции, но можно с уверенностью сказать, что планы Зонни приведут ко множеству смертей."
 HYE_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_HYE_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКайлидские дервиши жили и сражались в пустынях ещё до прибытия Короля Шторма. Вторжение йети превратило их из «пустынных культистов» в «последний оплот сопротивления», но они продолжили упорную борьбу под предводительством Фахамки, Великой Просветительницы. Теперь, когда дервиши готовятся перейти в наступление, чтобы вернуть свою родину, остаётся вопрос: что же станет с некогда декадентским Королевством Гиения в случае их победы. Однако мудрость Кайлида гласит, что прошлое – это ловушка, а добродетельные идут только вперёд, навстречу будущему. И дервиши верны этому пути."
 ABY_GATHERING_STORM_DESC: "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ABY_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nКоролівство Абіссінія — це давня батьківщина абіссінської раси, розумних, прямоходячих котів, які вміють розмовляти. Воно процвітало майже століття після Пазуромонської реставрації, зумівши частково індустріалізуватися завдяки допомозі Вінґбардії. Але, як і в багатьох інших куточках Зебрики, вторгнення Короля Шторма спустошило країну. Тепер її король надто меланхолійний, щоб ефективно правити, відносини з Вінґбардією загострилися, претенденти на трон плетуть інтриги в тіні, а раби стають дедалі неспокійнішими. Абіссінія пережила перше тисячоліття, але чи переживе вона друге?"
 KXN_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_KXN_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nЛан кирцы, преданные и обесчещенные Безмолвием, были брошены на окраинах киринского мира. Царство Кирия отвернулось от их страданий, сковав себя цепями Безмолвия. Доблестные Десять Тысяч не могли поступить иначе, кроме как стойко нести долгую вахту на границе, пока Кирия спала. С тех пор прошёл век. Верховная матриарх Рейн Шайн отменила указы Безмолвия. И Лан Кир должен быть готов встретить новую эпоху с яростью и фанатичной преданностью, дабы сделать мир безопасным для Кирии и всего киринского рода."
 ZOO_GATHERING_STORM_DESC:0 "\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_ZOO_map\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nПосле катастрофической войны между Зонго и Зеблу, завершившейся смертью короля, Акида, юный наследник престола, был отправлен в Сентурию ради своей безопасности. Пока он обучался там, регентом стала королева-мать Нзузи, сумевшая сохранить стабильность, опираясь на традиционные устои, совет вождей Зонго – мани – и недавно централизованное духовенство – нганга. Однако близится окончание учёбы Акиды, а его возвращение сулит приход новых идей, с которыми юный монарх познакомился за границей. Пока неизвестно, насколько далеко простирается его замысел, но все в Зонго чувствуют: перемены, к добру или худу, уже на пороге."

